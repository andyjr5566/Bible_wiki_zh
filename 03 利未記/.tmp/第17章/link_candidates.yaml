  # === 神學類 ===
  - name: "基督的寶血贖罪"
    type: "神學"
    evidence: "利17:11「我把這血賜給你們，可以在壇上為你們的生命贖罪」；CT靈意註解：基督的寶血一次成就永遠贖罪(來9:12)；BH：Christ's blood = eternal atonement"
    surfaces:
      - "寶血"
      - "贖罪"
      - "基督的血"
  - name: "生命在血中"
    type: "神學"
    evidence: "利17:11,14「因為活物的生命是在血中」；CT靈意註解：血代表生命，神將血賜給人在壇上贖罪；BH：life is in the blood"
    surfaces:
      - "生命是在血中"
      - "血就是生命"

  # === 互文類 ===
  - name: "挪亞禁吃血（創9：4）"
    type: "互文"
    evidence: "利17:10-14；CT註解：挪亞時代已禁吃血，利未記重申此律；BH：Noahic covenant = blood prohibition"
    surfaces:
      - "挪亞"
      - "創世記9章"
  - name: "耶路撒冷會議禁吃血（徒15：20）"
    type: "互文"
    evidence: "利17:10-14；CT註解：使徒行傳15章決議外邦信徒也禁吃血；BH：Jerusalem Council = blood prohibition for Gentiles"
    surfaces:
      - "使徒行傳15章"
      - "耶路撒冷會議"
  - name: "基督的血贖罪（來9：12-14）"
    type: "互文"
    evidence: "利17:11；CT註解：基督的血一次成就永遠贖罪；BH：Christ's blood = eternal redemption"
    surfaces:
      - "希伯來書9章"
      - "基督的血"
  - name: "基督的身體為帳幕（約1：14；來9：11）"
    type: "互文"
    evidence: "利17:4-5「會幕門口...獻給耶和華」；CT註解：基督是真帳幕，信徒藉著祂親近神；BH：Christ = true tabernacle"
    surfaces:
      - "約翰福音1章"
      - "希伯來書9章"
      - "真帳幕"

  # === 事件類 ===
  - name: "頒布獻祭與禁血條例"
    type: "事件"
    evidence: "利17:1-16全章；CT壹：本章宣示集中獻祭與禁吃血的條例"
    surfaces:
      - "耶和華對摩西說"
      - "曉諭亞倫和他兒子"

  # === 文化類 ===
  - name: "古代近東獻祭與血的觀念"
    type: "文化"
    evidence: "利17:7「不可再獻祭給他們行邪淫所隨從的鬼魔」；CT註解：古代近東視獻祭為餵養神明，以色列條例將醫療診斷納入祭司職分；BH：ancient Near East viewed sacrifice as feeding gods"
    surfaces:
      - "古代近東"
      - "獻祭觀念"
      - "鬼魔"