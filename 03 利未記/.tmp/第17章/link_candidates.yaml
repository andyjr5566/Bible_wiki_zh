book: 利未記
chapter: 17
candidates:
- name: 獻祭地點（meqom zebach）
  type: 原文
  evidence: 利17:3-4,8-9「若未曾牽到會幕門口...獻給耶和華為供物」；CT註解：集中獻祭於會幕門口，防止私設祭壇；BH：centralized worship at Tent of Meeting
  surfaces:
  - 會幕門口
  - 會幕前
  - 獻給耶和華
- name: 血（dam）
  type: 神學
  evidence: 利17:10-14「凡吃血的...因為活物的生命是在血中」；CT註解：血代表生命，神將血賜給人在壇上贖罪；BH：life is in the blood = atonement
  surfaces:
  - 血
- name: 剪除（kareth）
  type: 原文
  evidence: 利17:4,9,10,14「那人必從民中剪除」；CT註解：剪除指被社群除名或死刑，嚴重後果；BH：cut off = excommunication/death
  surfaces:
  - 剪除
  - 從民中剪除
- name: 鬼魔（se'irim）
  type: 原文
  evidence: 利未記17:7 「他們不可再獻祭給他們行邪淫所隨從的鬼魔（原文作公山羊）」。丁良才：se'irim 原文作「公山羊」，「這是古時的埃及、希臘和羅馬人所敬拜之一種神的標號，這神像有公山羊的頭和下體，卻有人的身子（代下11:15，書24:14）」。李道生：「其原意是眾公山羊，乃為希臘、羅馬之林神，或稱為野山羊（賽13:21，34:14）……埃及人崇拜公山羊，為以色列人所知。」《舊約背景註釋》：「最有可能是指半人半獸（就如希臘神話中之羊人satyrlike），經常在野外或無人煙之處出沒的鬼魔。」《串珠》：「這種鬼魔相傳具羊形，故被稱為羊神，本是埃及的土地神。」「不可再獻祭」的「再」字，丁良才指出「顯明以色列人中先前曾有人獻了」。
  surfaces:
  - 鬼魔
- name: 平安祭（shelamim）
  type: 原文
  evidence: 利17:5「獻與耶和華為平安祭」；CT註解：平安祭表徵與神和好、團契；BH：peace offering = fellowship
  surfaces:
  - 平安祭
  - 平安祭牲
- name: 燔祭（olah）
  type: 原文
  evidence: 利17:8「獻燔祭或是平安祭」；CT註解：燔祭完全獻給神，馨香之氣上升；BH：burnt offering = total dedication
  surfaces:
  - 燔祭
  - 獻燔祭
- name: 吃血禁令（issur dam）
  type: 原文
  evidence: 利17:10-14「你們都不可吃血...因為活物的生命是在血中」；CT註解：血代表生命，神將血賜給人在壇上贖罪；BH：prohibition of eating blood = respect for life
  surfaces:
  - 吃血
  - 不可吃血
- name: 自死與撕裂之物（nevelah）
  type: 原文
  evidence: 利未記17:15-16 「凡吃自死的，或是被野獸撕裂的……必不潔淨到晚上」。丁良才：「這是指著誤吃說的（利11:40注）……這些牲畜的血沒有流出或沒有流盡。」KC：吃這樣的動物，就是吃了「血沒有上過壇、也沒有照神吩咐的方式倒出來用土掩蓋」的動物。出22:31 吩咐把這樣的肉丟給狗吃；到了迦南，神讓以色列人將這樣的肉送給或賣給寄居的外邦人（申14:21）。丁良才並辨明兩處「寄居的」不同：本節指受了割禮入猶太教的外人，申14:21
    指未受割禮的外人。
  surfaces:
  - 自死的
  - 被野獸撕裂的
- name: 集中獻祭條例
  type: 主題
  evidence: 利17:3-9「若未曾牽到會幕門口...流血的罪必歸到那人身上」；CT壹：本章為集中獻祭條例，防止私設祭壇；BH：centralized sacrifice = prevent idolatry
  surfaces:
  - 集中獻祭
  - 會幕門口獻祭
  - 私設祭壇
