"updates":
- "title": "血的尊重"
  "path": "link_folder/神學/血的尊重.md"
  "summary": "v10-14 凡以色列家中的人或寄居的外人若吃什麼血，神必向那人變臉，把他從民中剪除，因活物的生命在血中，血在壇上為人的生命贖罪。v11「因為活物的生命是在血中。我把這血賜給你們，可以在壇上為你們的生命贖罪；因血裡有生命，所以能贖罪」為全書對此命題最完整的陳述。"
  "relation": "本章是血的尊重神學發展線的核心章節，承接創世記9:4起的禁令，提供最完整的贖罪神學根據。"
- "title": "基督徒是否可吃血"
  "path": "link_folder/解經爭議/基督徒是否可吃血.md"
  "summary": "本章v10-14是舊約吃血禁令的核心條例。GT丁良才於v12註解引用：使徒們也曾擬定禁止在外邦中的信徒吃血和勒死的牲畜（徒十五3、20、22-29，二十一25）；CT同段引用相同經文並指出「勒死的牲畜」被禁正因含有血在內，可見禁止吃血不僅是舊約的食物規律，在新約教會仍然須要遵守。"
  "relation": "本章是這道解經爭議的舊約根源章節，摩西律法在此明訂吃血者被從民中剪除，成為新約使徒會議相關教訓的舊約背景。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」，摩西是本章私宰祭牲、禁止吃血條例的傳達者。"
  "relation": "本章條例延續摩西傳達耶和華條例給以色列人的一貫角色。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v2「你曉諭亞倫和他兒子並以色列眾人說」；v6 祭司負責把血灑在會幕門口耶和華的壇上、焚燒脂油，是私宰祭牲須獻為平安祭條例的執行者。"
  "relation": "本章祭司職責延續其在獻祭體系中灑血、焚燒脂油的一貫角色，本章特別強調私宰祭牲也須經祭司之手獻為平安祭。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "v4,5,6,9 私宰祭牲須帶到會幕門口獻與耶和華為平安祭，違者從民中剪除。"
  "relation": "本章會幕門口是集中獻祭條例的核心地點，防止百姓在田野私自獻祭給鬼魔。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "v4,9,10,14 本章四次以「從民中剪除」作為違反獻祭集中條例、拜鬼魔、吃血條例的懲罰，是全書中「剪除」一詞出現最密集的一章。"
  "relation": "本章是剪除（kareth）懲罰條款應用範圍最廣的一章，涵蓋私宰祭牲、拜鬼魔、吃血三種違例情形。"
- "title": "從民中剪除的含義"
  "path": "link_folder/解經爭議/從民中剪除的含義.md"
  "summary": "本章「剪除」四次重複用例（4,9,10,14節），分別懲罰私宰祭牲、獻祭鬼魔、吃血三類違例。GT《舊約聖經背景註釋》：一般接受的看法認為此用語反映神會施行合適懲罰的信念，不是說要對犯人採取任何司法或社會性的行動，而是靜待神的作為。"
  "relation": "本章為這道解經爭議提供全書密度最高的「剪除」用例集中範本，可用以探討其究竟是人為死刑、社群放逐，還是神親自介入的審判。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "v5,6 私宰祭牲須牽到會幕門口交祭司獻為平安祭，血灑壇上、脂油焚燒。GT丁良才：「平安祭」原文有「和好」或「福祉」之意。"
  "relation": "本章要求所有可獻為平安祭的宰殺行為都必須正式獻為平安祭，防止私宰淪為獻給鬼魔的祭物。"
- "title": "馨香之氣"
  "path": "link_folder/神學/馨香之氣.md"
  "summary": "v6「把脂油焚燒，獻給耶和華為馨香的祭」，是私宰祭牲須獻為平安祭條例中祭司職分的具體執行步驟。"
  "relation": "本章馨香之氣是平安祭正式獻祭程序的一環，與私宰祭牲被禁止的行為形成對比。"
