book: 利未記
chapter: 17
updates:
- title: 血
  path: link_folder/神學/血.md
  summary: 利17:10-14 是全卷血神學的樞紐：「活物的生命是在血中。我把這血賜給你們，可以在壇上為你們的生命贖罪；因血裡有生命，所以能贖罪」（v11）。丁良才指出聖經有時以血和生命互換（詩30:9）；並列出基督寶血六重功效：得蒙救贖（弗1:7）、得稱為義（羅5:9）、良心洗淨（來9:14）、衣裳洗白（啟7:14）、與父和好（西1:20）、進至聖所（來10:19）。《舊約背景註釋》給出鄰邦對比：「在古代近東各處地方，卻完全沒有任何禁戒吃血的規條，也沒有儀式用得著血」——把血分別為聖專屬贖罪之用，是以色列獨有的。
  relation: 本章把利3:17、7:26 兩次「不可吃血」的禁令說出理由：血是神所賜、專用於壇上贖罪的。KC：「我們可以吃動物，但神保留血的權利。不吃血，就是承認神對生命的權利。」此禁令上溯挪亞（創9:4）、下及耶路撒冷會議（徒15:28-29）。
- title: 剪除（kareth）
  path: link_folder/原文/剪除（kareth）.md
  summary: 利17 四次用「剪除」作制裁：私宰不獻（v4）、在會幕外獻祭（v9）、吃血（v10、14）。v10 更加重語氣：「我必向那吃血的人變臉」——丁良才：「變臉就是發怒的意思（創4:5，彼前3:12）。」《舊約背景註釋》在 v9 解釋這刑罰的性質：「一般接受的看法，認為這用語反映神會施行合適懲罰的信念。它不是說要對犯人採取任何司法或社會性的行動，而是靜待神的作為。」
  relation: 本章的剪除全數圍繞血的主權：血只能上壇，不能入口、不能流給鬼魔。動刑的不是法庭而是神自己（「我必向那人變臉」），與利20 交由會眾執行的死刑成對比。
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: 利17:5-6 曠野時期一切為吃肉宰殺的牛羊，都要牽到會幕門口「獻與耶和華為平安祭」：祭司把血灑在壇上、脂油焚燒為馨香的祭，胸歸眾祭司、右腿歸獻祭的祭司（利7:31-32），其餘的肉自己吃。KC 讀出用意：「對神而言，每一隻被宰的牲畜都帶著平安祭的性質……祂不要祂的百姓在沒有祂參與的情況下彼此相交。」他舉路15:29 大兒子要山羊羔「跟自己的朋友們單獨慶祝、不要父親在場」為反例。
  relation: 本章把平安祭從「自願的感恩祭」擴大為曠野時期一切肉食的必經之路——吃肉本身被納入與神相交的框架。此規定進迦南後取消（申12:20-24），但「筵席不可把神擋在外面」的原則不變（林前10:18-22）。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: 利17:8-9 「凡以色列家中的人，或是寄居在他們中間的外人，獻燔祭或是平安祭，若不帶到會幕門口獻給耶和華，那人必從民中剪除。」丁良才指出原文沒有「平安」二字，「這兩句的意思是包括燔祭和一切別的血祭」，文理譯本作「或獻燔祭或獻他祭」。他並解釋此例的背景：上古家長自作祭司隨處獻祭（約伯、亞伯拉罕），但以色列既已立國、有了一個會幕一個壇一個大祭司，神就把一切獻祭收歸會幕門口。
  relation: 本章把燔祭的「地點」立為誡命：v1-7 管吃肉的宰殺，v8-9 把獻祭也一併收攏——目的同一個：斷絕田野裡獻給鬼魔（se'irim）的邪淫祭祀（v7）。
