C_new_formal:
- name: 鬼魔（se'irim）
  suggested_type: 原文
  evidence: 利未記17:7 「他們不可再獻祭給他們行邪淫所隨從的鬼魔（原文作公山羊）」。丁良才：se'irim 原文作「公山羊」，「這是古時的埃及、希臘和羅馬人所敬拜之一種神的標號，這神像有公山羊的頭和下體，卻有人的身子（代下11:15，書24:14）」。李道生：「其原意是眾公山羊，乃為希臘、羅馬之林神，或稱為野山羊（賽13:21，34:14）……埃及人崇拜公山羊，為以色列人所知。」《舊約背景註釋》：「最有可能是指半人半獸（就如希臘神話中之羊人satyrlike），經常在野外或無人煙之處出沒的鬼魔。」《串珠》：「這種鬼魔相傳具羊形，故被稱為羊神，本是埃及的土地神。」「不可再獻祭」的「再」字，丁良才指出「顯明以色列人中先前曾有人獻了」。
  surfaces:
  - phrase: 鬼魔
  target_path: link_folder/原文/鬼魔（se'irim）.md
- name: 自死與撕裂之物（nevelah）
  suggested_type: 原文
  evidence: 利未記17:15-16 「凡吃自死的，或是被野獸撕裂的……必不潔淨到晚上」。丁良才：「這是指著誤吃說的（利11:40注）……這些牲畜的血沒有流出或沒有流盡。」KC：吃這樣的動物，就是吃了「血沒有上過壇、也沒有照神吩咐的方式倒出來用土掩蓋」的動物。出22:31
    吩咐把這樣的肉丟給狗吃；到了迦南，神讓以色列人將這樣的肉送給或賣給寄居的外邦人（申14:21）。丁良才並辨明兩處「寄居的」不同：本節指受了割禮入猶太教的外人，申14:21
    指未受割禮的外人。
  surfaces:
  - phrase: 自死的
  - phrase: 被野獸撕裂的
  target_path: link_folder/原文/自死與撕裂之物（nevelah）.md
