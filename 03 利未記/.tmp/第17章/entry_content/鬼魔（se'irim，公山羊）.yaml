name: 鬼魔（se'irim，公山羊）
type: 原文
secondary_types: []
aliases:
- 鬼魔
status: formal
definition: 希伯來文 se'irim，字面意為「公山羊」，在利未記17：7指以色列人曾在埃及隨從敬拜的半山羊半人形鬼魔偶像。埃及與古代近東民族常以公山羊為神祇標號，敬拜時伴隨邪淫禮儀，因此聖經以「行邪淫」描述此背道行為。神定例禁止再向此等鬼魔獻祭，成為世世代代永遠的定例。
accumulations:
- book: 利未記
  chapter: 17
  summary: 第7節指出以色列人不可再獻祭給他們行邪淫所隨從的鬼魔（原文作公山羊），這要作他們世世代代永遠的定例。
  relation: 本條目直接出自利未記第17章7節的原文註解，解釋「鬼魔」的希伯來原文與偶像背景。
related_entries:
