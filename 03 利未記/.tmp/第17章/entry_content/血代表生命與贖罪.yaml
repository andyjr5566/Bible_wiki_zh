name: 血代表生命與贖罪
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記17：11宣告活物的生命在血中，耶和華將血賜給以色列人用以在壇上為生命贖罪；因血裡有生命，所以能贖罪，確立血的神聖性與不可食用性。
accumulations:
- book: 利未記
  chapter: 17
  summary: 活物的生命在血中，神將血賜予人在壇上為生命贖罪；因此禁止吃任何血，凡吃血的必被剪除。
  relation: 本章神學核心，為集中獻祭、禁吃血及獵物放血掩埋提供終極理由，並預表基督寶血的贖罪功效。
related_entries:
- 吃血禁令（issur dar）
