name: 打獵放血用土掩蓋
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第17章13節規定，凡以色列人或寄居的外人打獵得了可吃的禽獸，必須放出牠的血，用土掩蓋。此舉表明尊重生命，因活物的生命在血中；放血掩埋既防止人吃血，也象徵將生命歸還給賜生命的神，並保持營地潔淨。
accumulations:
- book: 利未記
  chapter: 17
  summary: 第13節吩咐打獵所得可吃禽獸的血必須放出，用土掩蓋，作為尊重生命、不食血的具體措施。
  relation: 本條例直接出自利未記第17章，是本章關於血的神聖性與禁食血之教導的延伸應用。
