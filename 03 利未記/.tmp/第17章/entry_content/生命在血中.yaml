name: 生命在血中
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 聖經啟示活物的生命存在於血中，因此血具有神聖性，不可食用，且被神指定為在壇上為人生命贖罪的唯一媒介。
accumulations:
- book: 利未記
  chapter: 17
  summary: 第11節與第14節明確宣告活物的生命在血中，神將血賜給人用以贖罪，並以此為基礎頒布禁吃血的命令。
  relation: 本章直接陳述此神學命題，並連結贖罪禮儀與飲食禁令。
related_entries:
- 基督的寶血贖罪
- 吃血禁令（issur dam）
- 血代表生命與贖罪
sources:
- '綜合研讀註解: https://biblehub.com/study/leviticus/17.htm'
- '拾穗註解: https://www.ccbiblestudy.org/Old%20Testament/03Lev/03GT17.htm'
