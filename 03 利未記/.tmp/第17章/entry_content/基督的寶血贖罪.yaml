name: 基督的寶血贖罪
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指耶穌基督在十字架上所流的血具有永遠的贖罪功效，一次成全舊約牛羊之血所預表的救贖，使信徒得以永遠成聖。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章確立「血裡有生命，所以能贖罪」的獻祭原則，預表基督以自身生命之血成就最終贖罪。
  relation: 舊約以動物之血為預表，新約以基督之血為實體與應驗。
related_entries:
- 生命在血中
- 基督的血贖罪（來9：12-14）
sources:
- '綜合研讀註解: https://biblehub.com/study/leviticus/17.htm'
- '中文註解: https://www.ccbiblestudy.org/Old%20Testament/03Lev/03CT17.htm'
