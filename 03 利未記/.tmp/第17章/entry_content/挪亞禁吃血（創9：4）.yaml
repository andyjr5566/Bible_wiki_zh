name: 挪亞禁吃血（創9：4）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 洪水之後神與挪亞立約時首次明確禁止食用帶血的肉，表明血代表生命，此禁令早於摩西律法，具有普世與持續的約束力。
accumulations:
- book: 利未記
  chapter: 17
  summary: 重申並強化創世記第九章的禁血原則，將禁令擴及以色列人與寄居的外人，違者必被剪除。
  relation: 利未記17章是挪亞之約禁血原則的律法化與禮儀化延續。
related_entries:
- 吃血禁令（issur dam）
- 生命在血中
- 耶路撒冷會議禁吃血（徒15：20）
sources:
