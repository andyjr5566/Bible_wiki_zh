name: 吃血禁令的屬靈意義
type: 主題
secondary_types: []
aliases:
- 禁血的屬靈理由
- 尊重生命
status: formal
definition: 利未記第17章吃血禁令的屬靈意義在於：血代表活物的生命，是神所賜唯獨用於壇上贖罪的聖物；禁吃血表達對生命源頭與神贖罪恩典的敬畏，並使以色列人與異教吃血儀式分別出來。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章10-14節以「生命在血中」與「血為贖罪」為由頒布吃血禁令，強調血的神聖不可食用，違者剪除，顯明其屬靈嚴肅性。
  relation: 本章提供吃血禁令的直接屬靈根據，是此條目的核心經文。
related_entries:
- 吃血禁令（issur dam）
- 血代表生命與贖罪
- 獵物處理條例
