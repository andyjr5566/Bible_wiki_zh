name: 獵物處理條例
type: 主題
secondary_types: []
aliases:
- 打獵放血
- 用土掩蓋血
status: formal
definition: 利未記17：13規定以色列人與寄居者打獵得可吃的禽獸時，必須放出其血、用土掩蓋；此條例基於血代表生命的神學，要求對非獻祭用途的獵物之血也予以尊重和妥善處置。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章13節針對打獵所得可吃禽獸，命令放血並用土掩蓋，將血的尊重延伸至日常獵物處理。
  relation: 本章是獵物處理條例的唯一直接經文，確立放血掩蓋的規範。
related_entries:
- 吃血禁令（issur dam）
- 血代表生命與贖罪
- 吃血禁令的屬靈意義
sources:
