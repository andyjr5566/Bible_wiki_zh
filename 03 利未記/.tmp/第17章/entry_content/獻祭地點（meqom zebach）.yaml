name: 獻祭地點（meqom zebach）
type: 原文
secondary_types: []
aliases:
- 宰牲地點
- 會幕門口獻祭
status: formal
definition: 希伯來文 meqom zebach 指宰殺祭牲的地點；利未記第17章規定以色列人宰殺公牛、綿羊羔或山羊時，無論營內營外，都必須帶到會幕門口、耶和華的帳幕前獻給耶和華為供物，否則流血的罪歸到那人身上，要從民中剪除（利17：3-4）。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章規定所有宰牲獻祭必須集中於會幕門口，禁止在田野隨意獻祭，並將此與禁止獻祭給鬼魔（公山羊）連結，確立獻祭地點的獨一性。
  relation: 本章直接頒布獻祭地點集中化的條例，是此條目的核心經文。
related_entries:
- 集中獻祭條例
