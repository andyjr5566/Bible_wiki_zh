name: 古代近東獻祭與血的觀念
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 古代近東異教文化常將血視為滋養鬼神或帶有魔法力量的物質，以色列的獻祭與禁血條例刻意與之分別，強調血是生命且單單歸於耶和華用於贖罪。
accumulations:
- book: 利未記
  chapter: 17
  summary: 第7節禁止以色列人再獻祭給行邪淫所隨從的鬼魔（公山羊），並將血的使用嚴格限制於會幕壇上的贖罪禮儀，禁止食用。
  relation: 本章的禁令直接針對當時異教獻祭與吃血習俗，樹立以色列獨特的聖潔血觀念。
related_entries:
- 鬼魔／公山羊（se'irim）
- 吃血禁令（issur dam）
- 生命在血中
sources:
- '綜合研讀註解: https://biblehub.com/study/leviticus/17.htm'
- '拾穗註解: https://www.ccbiblestudy.org/Old%20Testament/03Lev/03GT17.htm'
