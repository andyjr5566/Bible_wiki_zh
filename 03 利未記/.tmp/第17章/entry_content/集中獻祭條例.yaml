name: 集中獻祭條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記17章規定以色列人一切宰牲獻祭必須帶到會幕門口、耶和華面前交給祭司，禁止在營內營外或田野私自獻祭，違者從民中剪除，以此杜絕異教崇拜並確保獻祭的聖潔與統一。
accumulations:
- book: 利未記
  chapter: 17
  summary: 凡宰公牛、綿羊羔或山羊獻為供物，若不帶到會幕門口獻給耶和華，流血的罪歸於那人，必從民中剪除；燔祭與平安祭亦同。
  relation: 本章核心條例，直接連結禁止田野獻祭給鬼魔、血的神聖用途，以及生命贖罪的神學基礎。
related_entries:
- 鬼魔／公山羊（se'irim）
- 平安祭（shelamim）
- 燔祭（olah）
- 獻祭地點（meqom zebach）
- 血代表生命與贖罪
- 吃血禁令（issur dam）
