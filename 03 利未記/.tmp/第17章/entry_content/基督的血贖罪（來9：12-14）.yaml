name: 基督的血贖罪（來9：12-14）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 希伯來書對比舊約山羊公牛的血與基督自己的血，指出基督藉著永遠的靈將自己無瑕無疵獻給神，其血能洗淨良心，除去死行，使信徒事奉永生神。
accumulations:
- book: 利未記
  chapter: 17
  summary: 說明動物之血因內含生命而被賜予在壇上為人的生命贖罪，構成舊約獻祭贖罪的基礎。
  relation: 利未記17章的血贖罪原則，在希伯來書中被基督以自身為祭的血完全應驗與超越。
related_entries:
- 基督的寶血贖罪
- 生命在血中
- 基督的身體為帳幕（約1：14；來9：11）
sources:
- '綜合研讀註解: https://biblehub.com/study/leviticus/17.htm'
- '拾穗註解: https://www.ccbiblestudy.org/Old%20Testament/03Lev/03GT17.htm'
