name: 基督的身體為帳幕（約1：14；來9：11）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 約翰福音宣告道成肉身住在人中間，希伯來書則以基督的身體為更大更全備的帳幕，祂以此路徑進入天上真聖所完成救贖，非人手所造。
accumulations:
- book: 利未記
  chapter: 17
  summary: 規定所有祭牲必須帶到會幕門口交給祭司，血灑在耶和華的壇上，確立會幕為唯一合法獻祭與贖罪之處。
  relation: 舊約會幕是基督身體的預表，利未記17章的集中獻祭指向基督作為唯一道路與帳幕。
related_entries:
- 集中獻祭條例
- 基督的血贖罪（來9：12-14）
- 獻祭地點（meqom zebach）
