name: 吃自死或被撕裂之物的潔淨條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第17章15～16節規定，凡吃自死的或被野獸撕裂的動物，無論本地人或寄居者，必不潔淨到晚上，並要洗衣服、用水洗身，到了晚上才算潔淨。若不洗衣服也不洗身，就必擔當自己的罪孽。此條例因這類動物未經正當放血，肉中可能含血，違反禁食血的原則，故須行潔淨禮儀。
accumulations:
- book: 利未記
  chapter: 17
  summary: 第15～16節規定吃自死或被野獸撕裂之物的人不潔淨到晚上，須洗衣洗身；若不潔淨自己，就必擔當罪孽。
  relation: 本條例直接出自利未記第17章，是本章禁食血原則的延伸，針對未經正常放血的動物屍體訂立潔淨規程。
