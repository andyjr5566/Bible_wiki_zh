name: 私宰祭牲須獻為平安祭的條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第17章3～7節所定條例，要求以色列人凡宰殺公牛、綿羊羔或山羊為食用時，不拘營內營外，都必須先將牲畜帶到會幕門口、耶和華的帳幕前，交給祭司獻為平安祭；祭司要把血灑在會幕門口的壇上，將脂油焚燒作馨香之祭。目的是防止百姓在田野私自獻祭給鬼魔（公山羊），並確保一切宰牲的血與脂油都歸給神。違者以流血的罪論處，必從民中剪除。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章3～7節規定，凡宰殺可獻為祭的牛羊，必須先帶到會幕門口獻為平安祭，否則算為流血的罪，要從民中剪除；目的是使以色列人不再在田野獻祭給鬼魔。
  relation: 本條例直接出自利未記第17章，是本章的核心主題之一，說明私宰祭牲的禁令及其神學理由。
related_entries:
- 平安祭（shelamim）
- 會幕門口
- 鬼魔（se'irim，公山羊）
- 剪除（kareth）
- 馨香之氣
