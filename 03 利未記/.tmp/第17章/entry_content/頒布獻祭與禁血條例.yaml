name: 頒布獻祭與禁血條例
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華在西奈曠野透過摩西曉諭亞倫、祭司與全體以色列人，頒布宰殺牲畜必須帶到會幕門口獻祭，以及嚴禁食用任何活物之血的律例，違者必被剪除。
accumulations:
- book: 利未記
  chapter: 17
  summary: 全章記載神頒布集中獻祭與禁吃血的條例，包括宰牲獻祭的地點規範、禁血的範圍與理由、獵物與自死物的處理。
  relation: 本章本身就是此事件的完整記述。
