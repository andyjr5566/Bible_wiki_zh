name: 外人同歸一律
type: 主題
secondary_types: []
aliases:
- 寄居者同例
- 外人與本地人同等
status: formal
definition: 利未記第17章多次強調寄居在以色列中間的外人與本地人同受律法約束：獻祭條例（8-9節）、吃血禁令（10、12節）、獵物處理（13節）、自死撕裂之物的潔淨條例（15節）均明文包括外人，違者同遭剪除或擔罪。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章在獻祭、禁血、獵物處理、潔淨條例上反覆申明「寄居在他們中間的外人」與以色列人同歸一律，彰顯律法在聖潔要求上的普世性。
  relation: 本章是此主題的主要經文，多次將外人納入同一律法標準。
related_entries:
- 集中獻祭條例
- 吃血禁令（issur dam）
- 獵物處理條例
- 自死／撕裂之物的潔淨條例
