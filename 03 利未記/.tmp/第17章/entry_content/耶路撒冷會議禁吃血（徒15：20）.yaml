name: 耶路撒冷會議禁吃血（徒15：20）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 使徒行傳記載的耶路撒冷會議決議，要求外邦信徒禁戒偶像的污穢、姦淫、勒死的牲畜和血，表明禁吃血的命令在新約時代對外邦信徒仍具道德與見證上的約束力。
accumulations:
- book: 利未記
  chapter: 17
  summary: 頒布禁吃血條例，無論是以色列人或是寄居的外人皆不可吃血，違者從民中剪除。
  relation: 使徒行傳15章的禁令直接追溯至利未記17章的血神學，並應用於外邦歸主者。
related_entries:
- 吃血禁令（issur dam）
- 挪亞禁吃血（創9：4）
- 外人同歸一律
sources:
- '綜合研讀註解: https://biblehub.com/study/leviticus/17.htm'
- '中文註解: https://www.ccbiblestudy.org/Old%20Testament/03Lev/03CT17.htm'
