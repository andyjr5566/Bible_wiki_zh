name: 吃血禁令（issur dam）
type: 原文
secondary_types: []
aliases:
- 禁吃血
- 不可吃血
status: formal
definition: 希伯來文 issur dam 指禁止吃血的命令；利未記17：10-12 明令以色列人與寄居的外人都不可吃任何活物的血，因活物的生命在血中，神將血賜給人在壇上為生命贖罪，違者必從民中剪除。
accumulations:
- book: 利未記
  chapter: 17
  summary: 本章頒布絕對的吃血禁令，適用於以色列人與寄居者，並以「生命在血中」與「血為贖罪」為神學基礎，違者遭剪除。
  relation: 本章是吃血禁令的核心經文，提供禁令內容、範圍與神學理由。
related_entries:
- 血代表生命與贖罪
- 吃血禁令的屬靈意義
- 獵物處理條例
- 外人同歸一律
