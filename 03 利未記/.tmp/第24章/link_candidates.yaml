book: "03 利未記"
chapter: 24
candidates:
  # === C 類：全新條目 ===
  - name: 經理這燈（祭司經理燈）
    type: 主題
    evidence: "利24:3-4 亞倫從晚上到早晨必在耶和華面前經理這燈；要在耶和華面前常收拾精金燈臺上的燈。這要作你們世世代代永遠的定例。CT：祭司經理燈表徵牧者在神面前按時分糧、挑旺恩賜，使教會見證越照越明。KC：大祭司負責修剪燈芯、添加燈油，眾祭司也能代理。BH：大祭司確保聖所燈光徹夜燃燒，預表基督大祭司職分。"
    surfaces: ["經理這燈", "常收拾精金燈臺上的燈", "從晚上到早晨經理這燈"]

  - name: 陳設餅條例
    type: 主題
    evidence: "利24:5-9 取細麵烤成十二個餅，擺列兩行每行六個，在耶和華面前精金的桌子上；把淨乳香放在每行餅上，作為紀念，就是作為火祭獻給耶和華。每安息日要常擺在耶和華面前，這為以色列人作永遠的約。這餅要給亞倫和他子孫，他們要在聖處吃，因為在獻給耶和華的火祭中是至聖的。CT：十二個餅表徵以色列十二支派，細麵表徵經過輾磨而顯明的復活生命，乳香表徵基督純淨的復活生命。KC：哥轄子孫管理陳設餅，每安息日更換，舊餅歸祭司在聖處吃。BH：陳設餅代表十二支派，乳香預表基督，祭司吃餅表徵在神面前享受祂的供應。"
    surfaces: ["陳設餅", "十二個餅", "細麵", "淨乳香", "精金的桌子", "每安息日擺列", "永遠的約", "聖處吃", "至聖的"]

  - name: 褻瀆聖名條例
    type: 主題
    evidence: "利24:10-16 以色列婦人的兒子（父親是埃及人）褻瀆了聖名，並且咒詛，被送到摩西那裡，收在監裡等候耶和華指示。耶和華吩咐把那咒詛聖名的人帶到營外，叫聽見的人都放手在他頭上，全會眾用石頭打死他。凡咒詛神的必擔當他的罪；褻瀆耶和華名的，必被治死，不管是寄居的是本地人，同歸一例。CT：褻瀆聖名是干犯神的自己，屬靈意義極深。KC：此案例為第三條誡命提供具體刑罰，摩西四次等候神指示之一。BH：褻瀆者是混血閒雜人，母親示羅密屬但支派，石刑為團體審判，按手轉移罪責。"
    surfaces: ["褻瀆了聖名", "咒詛", "收在監裡", "帶到營外", "放手在他頭上", "石頭打死", "褻瀆耶和華名", "寄居的與本地人同歸一例"]

  - name: 同態復仇法（以眼還眼）
    type: 神學
    evidence: "利24:17-22 打死人的必被治死；打死牲畜的必賠上牲畜，以命償命；人若使鄰舍身體有殘疾，他怎樣行，也要照樣向他行：以傷還傷，以眼還眼，以牙還牙。不管是寄居的是本地人，同歸一例。CT：同態復仇法目的在限制報復範圍，確保刑罰不超過傷害程度，體現司法公義對等性與節制性。KC：出21:23-25平行，猶太歷史上通常不按字面執行，傷人的可用財物補償，謀殺不可贖價。BH：利24:19-20重申出21:24同態復仇法，確立為以色列律法核心刑罰原則。"
    surfaces: ["打死人的必被治死", "打死牲畜的必賠上牲畜", "以命償命", "以傷還傷", "以眼還眼", "以牙還牙", "寄居的與本地人同歸一例"]

  - name: 示羅密（但支派底伯利的女兒）
    type: 人物
    evidence: "利24:11 他母親名叫示羅密，是但支派底伯利的女兒。CT：示羅密與埃及人通婚，犯了與外邦人通婚的罪，沒有用信仰教育好子女，造成兒子悲劇。KC：提到母親名字和支派，警戒以色列人不可使兒女與外邦人通婚，既生了兒子就須教導遵守律法。BH：母親名字和譜系記載是為了讓後人知道她是誰，做母親的注意教養子女敬畏神。"
    surfaces: ["示羅密", "但支派底伯利的女兒"]

  - name: 收在監裡等候神指示
    type: 事件
    evidence: "利24:12 他們把那人收在監裡，要得耶和華所指示的話。KC：當時尚無明文規定褻瀆聖名如何處置，故暫先關起來，免得逃逸。摩西每遇不知道耶和華旨意的事，便等候求問主。BH：四個摩西等候神指示的案例之一（民9:6-8, 15:34-36, 27:5-11）。"
    surfaces: ["收在監裡", "等候耶和華指示"]

  - name: 放手在頭上（轉移罪責）
    type: 主題
    evidence: "利24:14 叫聽見的人都放手在他頭上。KC：這樣顯明這罪原是那人的，也表示作見證的人在這罪上是無份的，這是和洗手的表意相似。BH：按手意味著與按手對象認同，將見證人所見之罪轉移到犯罪者頭上，使見證人卸責。"
    surfaces: ["放手在他頭上", "按手轉移罪責"]

  - name: 營外處死
    type: 主題
    evidence: "利24:14,23 把那咒詛聖名的人帶到營外……以色列人就照耶和華所吩咐摩西的行了。KC：免得營被污穢，一切犯死罪的人也是在營外治死的。BH：營外代表罪與污穢被移除，預表基督在城門外受苦（來13:12-13）。"
    surfaces: ["帶到營外", "營外治死"]

  # === B 類：既有條目需累積 ===
  - name: 金燈臺
    type: 主題
    evidence: "利24:1-4 吩咐以色列人把為點燈搗成的清橄欖油拿來給你，使燈常常點著。在會幕中法櫃的幔子外，亞倫從晚上到早晨必在耶和華面前經理這燈。要在耶和華面前常收拾精金燈臺上的燈。CT：清橄欖油表徵聖靈，搗碎表徵十字架對付，常常點著表徵教會燈光明亮直到主再來。KC：燈臺在聖所南邊，大祭司負責經理，眾祭司也能代理。BH：大祭司確保聖所燈光徹夜燃燒，預表基督大祭司職分。"
    surfaces: ["清橄欖油", "使燈常常點著", "會幕中法櫃的幔子外", "經理這燈", "精金燈臺", "世世代代永遠的定例"]

  - name: 陳設餅桌子
