book: 利未記
chapter: 24
candidates:
  - name: 金燈臺
    type: 主題
    evidence: v2-4「要吩咐以色列人，把那為點燈搗成的清橄欖油拿來給你，使燈常常點著...亞倫從晚上到早晨必在耶和華面前經理這燈...他要在耶和華面前常收拾精金燈臺上的燈」。KC：Verses 2-4 are an almost verbatim repetition of what we read in Exodus 27（已譯：2-4節幾乎逐字重複出埃及記27章的記載）；GT丁良才：以色列人將橄欖搗爛泡在熱水內，使油浮起，這樣的油比醡出的更精；GT啟導本：燈檯上有燈七盞，在會幕內長燃不熄，大祭司是最早點亮此燈的人，每天負責「經理這燈」——本章重申出埃及記27:20-21的燈油條例，補充亞倫「從晚上到早晨」值守的具體職責，累積於既有條目
    surfaces:
      - {phrase: 把那為點燈搗成的清橄欖油拿來給你，使燈常常點著, verses: [2]}

  - name: 陳設餅桌子
    type: 主題
    evidence: v5-9「你要取細麵，烤成十二個餅，每餅用麵伊法十分之二...要把餅擺列兩行，每行六個...又要把淨乳香放在每行餅上...每安息日要常擺在耶和華面前...這餅是要給亞倫和他子孫的；他們要在聖處吃」。GT啟導本：「陳設餅」雖在出埃及記二十五23-30提及，但詳細的記述則在本章5-9節，這十二個餅每隔七天更換一次，換餅在安息日舉行，祭司可以在聖處吃換下來的餅；GT丁良才：十二個餅大概是因為以色列人有十二支派——本章補充出埃及記25:23-30桌子造法以外的陳設餅烘烤、擺放、更換、食用完整程序，累積於既有條目
    surfaces:
      - {phrase: 你要取細麵，烤成十二個餅，每餅用麵伊法十分之二, verses: [5]}
      - {phrase: 要把餅擺列兩行, verses: [6]}
      - {phrase: 每安息日要常擺在耶和華面前；這為以色列人作永遠的約, verses: [8]}

  - name: 同態復仇法
    type: 原文
    evidence: v19-20「人若使他鄰舍的身體有殘疾，他怎樣行，也要照樣向他行：以傷還傷，以眼還眼，以牙還牙」。GT《舊約聖經背景註釋》：同態復仇，即「以眼還眼」的法律觀念，在聖經（出二十一23-25；申十九21）和美索不達米亞法典之中都可以找到，漢摩拉比法典則稍加變化，刑罰隨犯人和被害者的社會地位有所不同；GT啟導本：不過，以命償命的原則應避免用在報私仇上，主基督教訓信徒不僅不要報復，而且要加倍讓步和多給（太五38-41）——本章是利未記中同態復仇法條例的正式頒布之處，累積於既有條目
    surfaces:
      - {phrase: 以傷還傷，以眼還眼，以牙還牙, verses: [20]}

  - name: 以眼還眼
    type: 神學
    evidence: v20「以傷還傷，以眼還眼，以牙還牙。他怎樣叫人的身體有殘疾，也要照樣向他行」。GT串珠：原意是要訂定正確而公平的刑罰條例，強調賠償應與損毀相稱，要避免過分的報復或抵賴；在猶太人歷史中，通常都沒有按字面來執行這些有關報復的律例，傷人的可用適當的財物作補償，但謀殺別人卻不能以贖價代替填命（民35:31）——累積於既有條目

  - name: 以眼還眼的適用範圍
    type: 解經爭議
    evidence: v19-20 對照GT串珠與GT啟導本的補充說明：GT啟導本指出「不過，以命償命的原則應避免用在報私仇上。主基督教訓信徒，不僅不要報復，而且要加倍讓步和多給（太五38-41）」；GT串珠：「在猶太人歷史中，通常都沒有按字面來執行這些有關報復的律例；傷人的可用適當的財物作補償，但謀殺別人卻不能以贖價代替填命（民35:31）」；BH：Jesus references this principle in the Sermon on the Mount (Matthew 5:38-39), where He calls His followers to a higher standard of forgiveness and mercy（已譯：耶穌在登山寶訓引用此原則，呼召門徒活出更高的饒恕與憐憫標準）——本章條例本身與後世（猶太傳統以財物代替、新約登山寶訓的重新詮釋）之間的適用範圍之爭，累積於既有條目

  - name: 耶和華聖名的啟示
    type: 神學
    evidence: v11「這以色列婦人的兒子褻瀆了聖名，並且咒詛」；v16「那褻瀆耶和華名的，必被治死」。GT丁良才：以色列人隱諱神的聖名耶和華；GT精讀本：「耶和華」意為「自有永有者」，這個名字的真正意思通過摩西啟示給以色列百姓（出3:14,15），這個名字是彰顯神自己的名字，所以以色列百姓不能妄稱這名字，只能用意為「主」的「阿多奈」——本章是舊約中因褻瀆聖名而被處死的具體先例，累積於既有條目
    surfaces:
      - {phrase: 這以色列婦人的兒子褻瀆了聖名，並且咒詛, verses: [11]}
      - {phrase: 那褻瀆耶和華名的，必被治死, verses: [16]}

  - name: 摩西
    type: 人物
    evidence: v1,13「耶和華曉諭摩西說」；v11「就有人把他送到摩西那裡」；v23「於是，摩西曉諭以色列人」——摩西是本章條例的傳達者，也是褻瀆案的審理者
    surfaces:
      - {phrase: 耶和華曉諭摩西說, verses: [1]}
      - {phrase: 就有人把他送到摩西那裡, verses: [11]}

  - name: 亞倫和他兒子（祭司）
    type: 人物
    evidence: v9「這餅是要給亞倫和他子孫的；他們要在聖處吃」——本章明確指名亞倫和他子孫享用陳設餅
    surfaces:
      - {phrase: 這餅是要給亞倫和他子孫的, verses: [9]}

  - name: 祭司經理燈（亞倫和他兒子）
    type: 人物
    evidence: v3「在會幕中法櫃的幔子外，亞倫從晚上到早晨必在耶和華面前經理這燈。這要作你們世世代代永遠的定例」。既有條目定義：出埃及記27:21神首次指派亞倫和他的兒子在會幕聖所負責經理金燈臺，從晚上到早晨添油修剪燈芯；GT丁良才：按例這經管燈和燈油的事是大祭司的職任，但眾祭司也能代理（出二十五37，二十七20-21）——本章（利24:3）幾乎逐字重申出埃及記27:20-21對亞倫及其子孫此一職責的指派，累積於既有條目
    surfaces:
      - {phrase: 亞倫從晚上到早晨必在耶和華面前經理這燈, verses: [3]}

  - name: 褻瀆聖名案例（利未記唯一記載的具體刑罰執行事件）
    type: 事件
    evidence: v10-16,23「有一個以色列婦人的兒子，他父親是埃及人...這以色列婦人的兒子褻瀆了聖名，並且咒詛，就有人把他送到摩西那裡...他們把那人收在監裡，要得耶和華所指示的話...把那咒詛聖名的人帶到營外...全會眾就要用石頭打死他...以色列人就照耶和華所吩咐摩西的行了」。GT啟導本：本章講兩件事，一是有關至聖管理的條例，一是有關褻瀆的一個實例，這件事可能在神給了摩西有關聖油和陳設餅之後不久發生，因為按此書寫法，實例總是隨同條例一道出現；KC：This event is the second to occur in Leviticus, after the death of Aaron's sons in Leviticus 10（已譯：這是利未記中第二件具體記載的事件，僅次於利未記十章亞倫兩個兒子之死）；GT丁良才：這是摩西每遇不知道耶和華旨意的事，便等候求問主，四個必須等候神明確指示的案例之一（另參民九6-8、十五32-36、二十七5）——本事件是利未記全卷唯一詳細記載審理過程並執行死刑的具體案例，展示條例如何從頒布到落實
    surfaces:
      - {phrase: 有一個以色列婦人的兒子，他父親是埃及人，一日閒遊在以色列人中, verses: [10]}
      - {phrase: 他們把那人收在監裡，要得耶和華所指示的話, verses: [12]}
      - {phrase: 於是，摩西曉諭以色列人，他們就把那咒詛聖名的人帶到營外，用石頭打死, verses: [23]}

  - name: 示羅密（但支派底伯利的女兒，褻瀆者之母）
    type: 人物
    evidence: v11「他母親名叫示羅密，是但支派底伯利的女兒」。GT丁良才：聖書提出這婦人的支派和父親與自己的名字，無非是要人注意這事，在他身上受警誡，免得再有希伯來人將自己的女兒嫁與外邦人；GT精讀本：示羅密字面意思是「和平」、「充滿和平」，但這個婦人在埃及地與埃及人結婚，犯了與外邦人通婚的罪，這個婦人沒有用信仰教育好子女，造成兒子的悲劇；KC：This tribe has an unfavorable sound and meaning among the tribes of Israel（已譯：但支派在以色列眾支派中名聲並不美好），值得注意這宗褻瀆案與這支派有所關聯——聖經中唯一指名記載的褻瀆者母親
    surfaces:
      - {phrase: 他母親名叫示羅密，是但支派底伯利的女兒, verses: [11]}

  - name: 按手在犯人頭上作見證（利24：14）
    type: 主題
    evidence: v14「把那咒詛聖名的人帶到營外。叫聽見的人都放手在他頭上；全會眾就要用石頭打死他」。GT丁良才：這樣就顯明這罪原是那人的，也表示作見證的人在這罪上是無份的，這是和洗手的表意相似（申二十一6）；GT串珠：聽見的人因受連累而有罪，現今按手在犯罪者頭上，藉他的死而獲赦罪；GT《舊約聖經背景註釋》：石刑的功用是制裁侵犯整個社群的罪行，每個被得罪之人都必須參與，由於要斷定哪塊石頭導致罪犯死亡是不可能的，故此沒有一個人需要為這死亡負責——按手在此處的作用是見證定罪而非轉嫁贖罪，與利未記十六21大贖罪日按手在替罪羊頭上轉移全會眾罪孽的用法不同
    surfaces:
      - {phrase: 叫聽見的人都放手在他頭上, verses: [14]}

  - name: 寄居的與本地人同歸一例
    type: 主題
    evidence: v16「不管是寄居的是本地人，他褻瀆耶和華名的時候，必被治死」；v22「不管是寄居的是本地人，同歸一例。我是耶和華─你們的神」。GT啟導本：此人的父親雖為埃及人，但在司法範圍內，外國人與土生的以色列人同等對待；GT丁良才：本節（22）重複16-17節的條例，是特要使人注意；GT串珠：「同歸一例」，神的律法前，人人平等——本章在褻瀆聖名條例與人身傷害條例末尾兩度重申此一律法平等原則，形成本章結構上的呼應
    surfaces:
      - {phrase: 不管是寄居的是本地人，他褻瀆耶和華名的時候，必被治死, verses: [16]}
      - {phrase: 不管是寄居的是本地人，同歸一例, verses: [22]}

  - name: 打死人與打死牲畜的賠償原則
    type: 主題
    evidence: v17-18,21「打死人的，必被治死；打死牲畜的，必賠上牲畜，以命償命...打死牲畜的，必賠上牲畜；打死人的，必被治死」。GT丁良才：本節（18）是推廣出二十一33-34節的條例；GT精讀本：本節呈現公義的原則，公義的特點在於所有一切都按神的律法而行——人命與獸命的償還原則分列並重複兩次，形成本段的框架結構，緊接著才引出v19-20的以眼還眼傷害條例
    surfaces:
      - {phrase: 打死人的，必被治死, verses: [17]}
      - {phrase: 打死牲畜的，必賠上牲畜，以命償命, verses: [18]}

  - name: 陳設餅十二個餅預表以色列十二支派
    type: 神學
    evidence: v5-9 十二個餅的象徵意義。CT〔靈意註解〕：「十二個餅」表徵屬靈生命的供應（餅），使人達到屬天的完全，又表徵以色列十二支派（十二）；KC：The twelve loaves of the bread of the Presence represent the twelve tribes of Israel...The priests make themselves one with the people by eating this bread（已譯：陳設餅的十二個餅代表以色列十二支派，祭司吃這餅使自己與百姓合一）；GT啟導本：有人說十二個餅代表以色列人十二支派，要他們紀念所得福氣，來自供應豐富的神——本章陳設餅的預表意義是CT／KC共同著墨的神學重點，與陳設餅桌子條例的程序性內容分屬不同層次

  - name: 光與燈預表基督（世界的光）
    type: 神學
    evidence: v2-4 金燈臺常常點著的預表意義。CT〔話中之光〕：光象徵福音，點著的燈象徵神的救贖把福音賜給人，信徒有責任在日常生活中彰顯基督救恩之光；KC：Prophetically, this indicates that the people...are separate from God, yet through the high priesthood of the Lord Jesus continue to exist in heaven as a memorial before the face of God（已譯：這預表百姓雖與神隔絕，卻藉著主耶穌的大祭司職分，在神面前作為紀念繼續存在於天上）；BH：Jesus is described as the true light (John 1:9), fulfilling the symbolism of the menorah（已譯：耶穌被稱為真光，應驗了金燈臺的預表）——本章燈油與經理燈檯的條例延伸出的基督論預表，與金燈臺條目的程序性內容分屬不同層次
