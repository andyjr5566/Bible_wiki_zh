organization: "### 燈與餅的常設條例（v1-9）\n本章開篇確立兩項會幕中 ==世世代代== 的常設儀式。首先，耶和華吩咐 [[摩西]] 叫 [[以色列]]\
  \ 人獻上搗成的清橄欖油，由 [[亞倫]] 在 [[聖所]] [[內幔（隔聖所至聖所的幔子）|內幔]] 外，從晚上到早晨 [[經理這燈（祭司經理燈）|經理]]\
  \ [[金燈臺]] 上的燈，象徵神的同在不斷照耀。其次，取 [[細麵]] 烤成十二個餅，擺列兩行於 [[陳設餅桌子]] 上，每行加上 [[淨乳香（lebonah\
  \ zākkāh）]] 作為紀念火祭。每 [[安息日]] 更換一次，舊餅歸 [[亞倫和他兒子（祭司）]] 在 [[聖處（會幕院子）]] 吃，因為是 [[至聖]]\
  \ 的。這兩項條例（[[陳設餅條例]] 與燈的條例）共同構建了聖所中「光」與「糧」的雙重供應意象。\n\n### 褻瀆聖名與死刑判例（v10-16）\n經文轉入敘事：一個\
  \ [[以色列]] 婦人 [[示羅密（但支派底伯利的女兒）]] 的兒子（父親是 [[埃及地]] 人，屬 [[閒雜人]]/[[寄居的（ger）]] 性質）在營中與以色列人爭鬥，竟觸犯\
  \ [[褻瀆聖名條例]]、[[咒詛神的名]]。眾人將他 [[收在監裡等候神指示]]。耶和華判斷：帶到 [[營外處死]]，聽見者 [[放手在頭上（轉移罪責）|按手在頭上]]，[[以色列全會眾]]\
  \ 用石頭打死。此案確立了 [[褻瀆聖名條例]] 的核心原則：無論本地人或 [[寄居的（ger）]]，褻瀆耶和華名必被治死，彰顯神名的獨特聖潔與管轄權。\n\n\
  ```mermaid\nflowchart TD\n  A[爭鬥發生] --> B[褻瀆聖名/咒詛]\n  B --> C[送至摩西/收在監裡等候神指示]\n\
  \  C --> D[耶和華指示：帶到營外]\n  D --> E[見證人按手/放手在頭上]\n  E --> F[全會眾石頭打死/營外處死]\n  F -->\
  \ G[律例確立：本地人與寄居者同歸一例]\n```\n\n> [!note] 程序性正義\n> 「收在監裡等候神指示」顯示以色列法律程序中保留神聖裁決空間，避免私刑；「按手」儀式將見證人責任與判決連結，強調社群共同參與除惡。\n\
  \n### 以傷還傷的公義原則（v17-22）\n緊接著頒布 [[以傷還傷（lex talionis）]] 的公義法則：[[打死人的必被治死]]、[[打死牲畜的必賠上牲畜]]、身體殘疾以傷還傷（眼還眼、牙還牙）。這不是鼓勵私人報復，而是限制報復升級、確保懲罰與罪行相稱的司法原則。經文兩次強調「不管是\
  \ [[寄居的（ger）]] 是本地人，同歸一例」，奠定法律面前人人平等的神學基礎——「我是耶和華─你們的神」。\n\n> [!important] 核心神學\n\
  > [[律例]] 的頒布將聖潔（前段儀式）與公義（後段審判）結合：敬拜聖潔的神，必然要求社群生活中體現公義的審判。\n\n### 執行與順服（v23）\n[[摩西]]\
  \ 曉諭 [[以色列]] 人，他們照耶和華吩咐將咒詛者帶到營外石頭打死。敘事以完全順服作結，印證 [[以色列全會眾]] 在聖約下的責任共同體身分。\n\n###\
  \ 跨章脈絡：聖潔與公義的共同體\n利未記 24 章作為聖潔法典（利 17-26）的重要一環，以儀式（燈、餅）開啟，以審判（褻瀆、殺人、傷害）收尾。[[金燈臺]]\
  \ 的常燃與 [[陳設餅條例]] 的常擺，預表神永恆的同在與供應；而 [[褻瀆聖名條例]] 與 [[以傷還傷（lex talionis）]] 則劃定共同體邊界：神的名不可褻瀆，人的生命與肢體不可隨意侵害。[[寄居的（ger）]]\
  \ 納入同一法律框架，預示新約中「不分猶太人、希臘人」的福音平等（加 3:28）。本章展示聖所崇拜與社會倫理不可分割——真正的敬拜必流露為公義的生活。"
