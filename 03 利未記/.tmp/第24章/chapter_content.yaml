organization: "### 燈臺與陳設餅：聖所中的常例事奉（v1-9）\n\n利未記第二十四章在二十三章的節期律法之後，轉向會幕聖所中每日、每週持續進行的常例事奉。神吩咐以色列人要將搗成的清橄欖油拿來，使\
  \ [[金燈臺]] 上的燈常常點著。CT 在文意註解中指出，這油是由百姓將橄欖搗爛泡在熱水內使油浮起，比一般壓榨出的更精。在靈意上，CT 進一步闡述「橄欖油」表徵聖靈，必須經過「搗」（表徵十字架的對付）並保持「清」（純淨無肉體摻雜），才能在教會中發出亮光。BH\
  \ 則從新約預表的角度看，認為這持續燃燒的燈預表基督是「世界的光」（約八12），而 [[光與燈預表基督（世界的光）]] 正是這段經文的核心神學意義。\n\n亞倫從晚上到早晨必在耶和華面前經理這燈，這是世世代代永遠的定例。CT\
  \ 指出「從晚上到早晨」表示夜間燈光不可熄滅，而 [[祭司經理燈（亞倫和他兒子）]] 的工作包括修剪燈芯與添加燈油。KC 提出了一個先知性的視角：百姓雖然在屬靈黑暗中，但大祭司在聖所中維持燈光，預表主耶穌在天上不間斷的大祭司事奉；即使百姓不忠，神在聖所中仍維持對他們的紀念。\n\
  \n```mermaid\nflowchart TD\n    A[\"百姓奉獻搗成的清橄欖油\"] --> B[\"亞倫從晚上到早晨經理這燈\"]\n   \
  \ B --> C[\"常常修剪燈芯、添加燈油\"]\n    C --> D[\"精金燈臺上的燈晝夜不熄\"]\n    D --> E[\"表徵聖靈的光與基督大祭司的事奉\"\
  ]\n```\n\n接著經文轉向陳設餅的條例。祭司要取細麵烤成十二個餅，[[陳設餅十二個餅預表以色列十二支派]]，每餅用麵伊法十分之二。CT 指出「細麵」表徵經過輾磨而顯明的復活生命，「烤」表徵火煉。關於餅的擺列方式，經文寫作「兩行（或作：摞）」，GT\
  \ 引述丁良才的註解指出，按桌子的尺寸和猶太歷史學家約瑟夫的記載，這些餅大概是擺列成「兩摞」而非平行的兩行，這也成為本章的一個解經細節。餅上要放淨乳香作為紀念，每安息日更換一次。撤下來的餅歸給\
  \ [[亞倫和他兒子（祭司）]]，他們要在聖處吃，因為這是至聖的。KC 認為，祭司吃這餅是與百姓認同，在神面前以祂對百姓的愛為糧。\n\n### 褻瀆聖名的事件與刑罰（v10-16,\
  \ v23）\n\n第二十四章的後半段記載了一個具體的歷史事件。有一個以色列婦人的兒子，他父親是埃及人，在營中與一個以色列人爭鬥時褻瀆了聖名並且咒詛。GT 指出這人是以色列人與外族通婚所生的閒雜人，並特別記載他母親\
  \ [[示羅密（但支派底伯利的女兒，褻瀆者之母）]] 的名字，藉此警戒以色列人不可與外邦人通婚，並提醒母親要負起信仰教育的責任。KC 則將此事件提升為以色列整體屬靈狀態的縮影：這混血兒的心仍與埃及相連，毫不畏懼耶和華，正預表了以色列日後將褻瀆並棄絕主的罪。\n\
  \n由於當時律法尚未明文規定褻瀆神名當如何處置，摩西將那人收在監裡，等候神的指示。GT 引述丁良才的註解說明，摩西每逢不曉得神的旨意便等候求問，這是信徒與教會領袖的榜樣。神隨後指示：要把那咒詛聖名的人帶到營外，叫聽見的人都\
  \ [[按手在犯人頭上作見證（利24：14）]]，全會眾要用石頭打死他。BH 指出，帶到營外象徵將罪從社群中分離，而按手在頭上表示見證人將罪責歸於犯人，洗清自己的連累。這\
  \ [[褻瀆聖名案例（利未記唯一記載的具體刑罰執行事件）]] 最終在 v23 付諸執行，成為日後律法的判例。神在此確立了原則：不管是寄居的還是本地人，凡褻瀆耶和華名的，必被治死。\n\
  \n### 同態復仇與公平賠償原則（v17-22）\n\n在褻瀆聖名的判決之後，神一併重申了關於傷害人畜的懲罰條例。這段經文確立了 [[打死人與打死牲畜的賠償原則]]：打死人的必被治死，打死牲畜的必賠上牲畜。對於傷害鄰舍的條例，經文提出了著名的\
  \ [[同態復仇法]]——「以傷還傷，以眼還眼，以牙還牙」。\n\nGT 的《舊約聖經背景註釋》指出，這種「以眼還眼」的法律觀念在古代近東法典（如漢摩拉比法典）中也可找到，但其實際功用是規限對被告所能作出的懲罰，保證合法賠償並避免私自尋仇。CT\
  \ 補充說明，在猶太人歷史中通常少有人按字面施行報復，而是在雙方同意下給予對等相稱的懲罰。BH 進一步從新約視角說明，耶穌在馬太福音中引用此原則，是為了引導信徒超越報復，走向加倍的饒恕與愛（太五38-39）。\n\
  \n本章最後以一句總結收尾：「不管是寄居的是本地人，同歸一例。我是耶和華你們的神。」這確立了 [[寄居的與本地人同歸一例]] 的法律平等原則。BH 指出，這在古代近東\
  \ context 中是革命性的，因為許多周圍文化對不同階級有不同法律，但神命令一個統一標準，反映了祂的公正與不偏待人。\n\n```mermaid\nflowchart\
  \ TD\n    A[\"傷害人畜的行為\"] --> B[\"打死人\"]\n    A --> C[\"打死牲畜\"]\n    A --> D[\"使鄰舍身體有殘疾\"\
  ]\n    B --> E[\"必被治死（以命償命）\"]\n    C --> F[\"必賠上牲畜（以命償命）\"]\n    D --> G[\"以傷還傷、以眼還眼、以牙還牙\"\
  ]\n    E --> H[\"同歸一例：寄居的與本地人平等\"]\n    F --> H\n    G --> H\n```\n\n### 跨章脈絡：聖所事奉與曠野現實的張力\n\
  \n利未記第二十四章在結構上呈現了強烈的對比：前半段（v1-9）是聖所內完美、有序、持續的常例事奉，後半段（v10-23）則是營外混亂、衝突、褻瀆的曠野現實。KC\
  \ 特別點出這種張力：聖所中的燈光與陳設餅預表了神對百姓不間斷的紀念，但營外的褻瀆事件卻暴露了百姓屬靈狀態的失敗。這兩段經文並非隨意編排，而是互相解釋：正因為百姓在現實中失敗，聖所中大祭司持續的事奉才更顯必要。KC\
  \ 認為，神在歷史中先賜下聖所事奉的應許，再揭示百姓的失敗，這順序本身就是恩典的展現。"
