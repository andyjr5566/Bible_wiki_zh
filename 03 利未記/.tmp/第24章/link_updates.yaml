book: "03 利未記"
chapter: 24
updates:
- title: "金燈臺"
  path: "link_folder/主題/金燈臺.md"
  summary: "利24:1-4 吩咐以色列人把為點燈搗成的清橄欖油拿來給你，使燈常常點著。在會幕中法櫃的幔子外，亞倫從晚上到早晨必在耶和華面前經理這燈。要在耶和華面前常收拾精金燈臺上的燈。CT：清橄欖油表徵聖靈，搗碎表徵十字架對付，常常點著表徵教會燈光明亮直到主再來。KC：燈臺在聖所南邊，大祭司負責經理，眾祭司也能代理。BH：大祭司確保聖所燈光徹夜燃燒，預表基督大祭司職分。"
  relation: "本章將出25、27、37章金燈臺條例納入聖潔法典（利17-26）日常事奉層面，確立祭司經理燈為世世代代永遠定例，呼應出27:20-21、民8:1-4 點燈條例。"
- title: "陳設餅桌子"
  path: "link_folder/主題/陳設餅桌子.md"
  summary: "利24:6-7 要把餅擺列兩行，每行六個，在耶和華面前精金的桌子上；又要把淨乳香放在每行餅上。CT：精金桌子表徵教會必須具有神純淨的性質。KC：桌子安在聖所北邊，餅大概擺列兩摞。"
  relation: "本章將出25、37章陳設餅桌子條例納入聖潔法典日常事奉層面，確立每安息日更換陳設餅為永遠的約，呼應出25:30、撒上21:6 陳設餅使用條例。"
- title: "安息日"
  path: "link_folder/神學/安息日.md"
  summary: "利24:8 每安息日要常擺在耶和華面前；這為以色列人作永遠的約。CT：每隔七日更換新餅，表徵在神面前常保新鮮的奉獻。KC：安息日更換陳設餅，撒上21:6提到只有更換新餅。"
  relation: "本章將安息日與陳設餅更換掛鉤，確立安息日為節期條例（利23）之外的常設事奉節奏，呼應出16、20、23、31、35、利19、23 章安息日條例。"
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "利24:1,13,23 耶和華曉諭摩西說；摩西曉諭以色列人。摩西作為條例傳遞者和審判執行者。"
  relation: "本章摩西繼續其立法者角色，傳遞聖潔法典（利17-26）中日常事奉條例與褻瀆聖名審判案例。"
- title: "亞倫"
  path: "link_folder/人物/亞倫.md"
  summary: "利24:3,9 亞倫從晚上到早晨必在耶和華面前經理這燈；這餅是要給亞倫和他子孫的。亞倫作為大祭司執行點燈和吃陳設餅職分。"
  relation: "本章賦予亞倫（大祭司）日常事奉核心職責：經理燈光、更換陳設餅、在聖處吃至聖物，作為利21-22章祭司條例的儀式應用層面。"
- title: "亞倫和他兒子（祭司）"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利24:3,9 亞倫和他子孫作祭司執行點燈、更換陳設餅、在聖處吃餅的職分。KC：祭司經理燈表徵牧者按時分糧。"
  relation: "本章系統性規範祭司在日常事奉中的儀式職責：經理燈光、更換陳設餅、在聖處吃至聖物，作為利21-22章祭司條例的儀式應用層面。"
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "利24:8,10,16,22 曉諭以色列人；以色列婦人的兒子；寄居的是本地人，同歸一例。節期條例針對全會眾。"
  relation: "本章將日常事奉條例與刑罰條例頒布給全體以色列人，確立會眾參與聖會與承擔審判責任的集體身分。"
- title: "埃及地"
  path: "link_folder/地點/埃及地.md"
  summary: "利24:10,22 他父親是埃及人；不管是寄居的是本地人。KC：埃及人那時與以色列女子結婚，在以色列人出埃及時一同出來。"
  relation: "本章以埃及人為父的混血兒案例，闡明刑罰條例對寄居者與本地人同歸一例的原則，呼應利19:34,20:24,25:38,26:13,45 救贖與聖潔的神學邏輯。"
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "利24:16,22 不管是寄居的是本地人，他褻瀆耶和華名的時候，必被治死。寄居者同享同受刑罰條例。"
  relation: "本章將寄居者納入褻瀆聖名與同態復仇法的同等法律地位，體現聖會共同體法律平等的邊界。"
- title: "從民中剪除（karet）"
  path: "link_folder/原文/從民中剪除（karet）.md"
  summary: "利24:15-16 凡咒詛神的，必擔當他的罪；褻瀆耶和華名的，必被治死。KC：剪除刑罰應用於贖罪日違規，確立聖會參與的強制性與嚴肅性。"
  relation: "本章將剪除/治死刑罰應用於褻瀆聖名，確立聖名不可褻瀆的絕對性，呼應利17:10,20:3,5,6 平行條例。"
- title: "世世代代"
  path: "link_folder/神學/世世代代.md"
  summary: "利24:3,8,9 這要作你們世世代代永遠的定例。節期條例具有代際延續性。"
  relation: "本章三次重複「世世代代永遠定例」，將點燈、陳設餅、祭司吃餅確立為跨越歷史的約束性規範。"
- title: "聖所"
  path: "link_folder/地點/聖所.md"
  summary: "利24:3 在會幕中法櫃的幔子外。聖所為神臨在之處，祭司職分在此執行。"
  relation: "本章確立聖所為祭司日常事奉（經理燈光、更換陳設餅）的具體場所，呼應利21:12,23 聖所邊界條例。"
- title: "內幔（隔聖所至聖所的幔子）"
  path: "link_folder/主題/內幔（隔聖所至聖所的幔子）.md"
  summary: "利24:3 法櫃的幔子外。幔子隔絕聖所與至聖所，大祭司贖罪日才可進入。"
  relation: "本章以「法櫃的幔子外」定位金燈臺位置，確立聖所內器具佈局：燈臺南、桌子北、幔子西。"
- title: "細麵"
  path: "link_folder/原文/細麵.md"
  summary: "利24:5 取細麵，烤成十二個餅。細麵表徵經過輾磨而顯明的復活生命。"
  relation: "本章將細麵作為陳設餅原料，預表基督作生命糧的供應，呼應出29:2、利2:1 素祭用細麵條例。"
- title: "聖處（會幕院子）"
  path: "link_folder/地點/聖處（會幕院子）.md"
  summary: "利24:9 他們要在聖處吃。聖處指會幕（或聖殿）的院子。"
  relation: "本章限定祭司吃陳設餅的地點為聖處，體現聖物食用的空間聖潔界限。"
- title: "至聖"
  path: "link_folder/神學/至聖.md"
  summary: "利24:9 因為在獻給耶和華的火祭中是至聖的。陳設餅屬於至聖物。"
  relation: "本章確立陳設餅為至聖物，限定祭司在聖處食用，呼應利2:3,10, 6:17,25, 7:1 至聖物條例。"
- title: "以色列全會眾"
  path: "link_folder/人物/以色列全會眾.md"
  summary: "利24:14,16 全會眾就要用石頭打死他。死刑執行由本地人（會眾）用石頭打死，體現會眾參與除惡的連帶責任。"
  relation: "本章賦予全會眾執行褻瀆聖名死刑的責任，體現共同體聖潔的集體承擔。"