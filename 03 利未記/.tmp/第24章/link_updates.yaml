"book": "利未記"
"chapter": !!int "24"
"updates":
- "title": "金燈臺"
  "path": "link_folder/主題/金燈臺.md"
  "summary": "v2-4「把那為點燈搗成的清橄欖油拿來給你，使燈常常點著...亞倫從晚上到早晨必在耶和華面前經理這燈...他要在耶和華面前常收拾精金燈臺上的燈」。KC：2-4節幾乎逐字重複出埃及記27章的記載。"
  "relation": "本章重申出埃及記27:20-21的燈油條例，補充亞倫「從晚上到早晨」值守的具體職責。"
- "title": "陳設餅桌子"
  "path": "link_folder/主題/陳設餅桌子.md"
  "summary": "v5-9「你要取細麵，烤成十二個餅...要把餅擺列兩行...又要把淨乳香放在每行餅上...每安息日要常擺在耶和華面前...這餅是要給亞倫和他子孫的；他們要在聖處吃」。GT啟導本：本章補充出埃及記25:23-30桌子造法以外的陳設餅烘烤、擺放、更換、食用完整程序。"
  "relation": "本章是陳設餅條例最完整詳盡的程序性記載，補足出25章僅涉及桌子造法的內容。"
- "title": "同態復仇法"
  "path": "link_folder/原文/同態復仇法.md"
  "summary": "v19-20「人若使他鄰舍的身體有殘疾，他怎樣行，也要照樣向他行：以傷還傷，以眼還眼，以牙還牙」。GT《舊約聖經背景註釋》：同態復仇的法律觀念在聖經（出二十一23-25；申十九21）和美索不達米亞法典之中都可以找到。"
  "relation": "本章是利未記中同態復仇法條例的正式頒布之處，緊接褻瀆聖名案例之後重申。"
- "title": "以眼還眼"
  "path": "link_folder/神學/以眼還眼.md"
  "summary": "v20「以傷還傷，以眼還眼，以牙還牙。他怎樣叫人的身體有殘疾，也要照樣向他行」。GT串珠：原意是要訂定正確而公平的刑罰條例，強調賠償應與損毀相稱，要避免過分的報復或抵賴。"
  "relation": "本章條例本身即是「以眼還眼」原則的聖經正式出處之一。"
- "title": "以眼還眼的適用範圍"
  "path": "link_folder/解經爭議/以眼還眼的適用範圍.md"
  "summary": "v19-20對照GT串珠與GT啟導本的補充說明：GT啟導本指出「以命償命的原則應避免用在報私仇上，主基督教訓信徒不僅不要報復，而且要加倍讓步和多給（太五38-41）」；GT串珠：「猶太人歷史中通常都沒有按字面來執行這些有關報復的律例，傷人的可用適當的財物作補償，但謀殺別人卻不能以贖價代替填命（民35:31）」。"
  "relation": "本章條例本身與後世（猶太傳統以財物代替、新約登山寶訓的重新詮釋）之間的適用範圍之爭，源頭正在本章。"
- "title": "耶和華聖名的啟示"
  "path": "link_folder/神學/耶和華聖名的啟示.md"
  "summary": "v11「這以色列婦人的兒子褻瀆了聖名，並且咒詛」；v16「那褻瀆耶和華名的，必被治死」。GT丁良才：以色列人隱諱神的聖名耶和華。"
  "relation": "本章是舊約中因褻瀆聖名而被處死的具體先例，展現對耶和華聖名的極致尊崇。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1,13「耶和華曉諭摩西說」；v11「就有人把他送到摩西那裡」；v23「於是，摩西曉諭以色列人」，摩西是本章條例的傳達者，也是褻瀆案的審理者。"
  "relation": "本章展現摩西不僅傳達律例，也在律法尚未明文規定時親自等候神指示、審理具體案件的角色。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v9「這餅是要給亞倫和他子孫的；他們要在聖處吃」，本章明確指名亞倫和他子孫享用陳設餅。"
  "relation": "本章延續祭司享用聖物與執行聖所常例事奉的一貫角色，具體展現於陳設餅的食用。"
- "title": "祭司經理燈（亞倫和他兒子）"
  "path": "link_folder/人物/祭司經理燈（亞倫和他兒子）.md"
  "summary": "v3「在會幕中法櫃的幔子外，亞倫從晚上到早晨必在耶和華面前經理這燈。這要作你們世世代代永遠的定例」。GT丁良才：按例這經管燈和燈油的事是大祭司的職任，但眾祭司也能代理（出二十五37，二十七20-21）。"
  "relation": "本章（利24:3）幾乎逐字重申出埃及記27:20-21對亞倫及其子孫此一職責的指派。"
