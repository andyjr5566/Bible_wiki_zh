  phrase: 就有人把他送到摩西那裡
  target: 摩西
- verse: 11
  phrase: 他母親名叫示羅密，是但支派底伯利的女兒
  target: 示羅密（但支派底伯利的女兒，褻瀆者之母）
- verse: 12
  phrase: 他們把那人收在監裡，要得耶和華所指示的話
