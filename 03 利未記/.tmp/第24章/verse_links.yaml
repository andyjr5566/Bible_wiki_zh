  phrase: 把那為點燈搗成的清橄欖油拿來給你，使燈常常點著
  target: 金燈臺
- verse: 3
  phrase: 亞倫從晚上到早晨必在耶和華面前經理這燈
  target: 祭司經理燈（亞倫和他兒子）
- verse: 4
  phrase: 金燈臺
  target: 金燈臺
