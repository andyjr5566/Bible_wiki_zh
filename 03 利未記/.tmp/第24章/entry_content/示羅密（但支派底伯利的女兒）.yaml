name: 示羅密（但支派底伯利的女兒）
type: 人物
secondary_types: []
aliases:
- 示羅密
status: formal
definition: 但支派底伯利的女兒，嫁給埃及人，生了一個兒子。這兒子在營中與一個以色列人爭鬥時褻瀆聖名並咒詛，導致神頒布褻瀆聖名條例並被處死（利24:10-11,23）。名字「示羅密」（Šəlômîṯ，שְׁלֹמִית）意為「平安」或「完全」。她是聖經中少數被記名的負面背景女性，其子因混血身分與爭鬥引發重大法律案例。
development: 示羅密的婚姻跨越族群（嫁埃及人），兒子在以色列營中長大卻不認同神的聖潔，最終褻瀆神名。這反映出埃及出來的雜族（出12:38）若不真正歸入神的約，可能成為禍患。保羅在林前10:1-12以曠野世代為鑑戒，示羅密兒子的事可作為警戒：外在屬神子民卻心不屬神，終必顯露。
accumulations:
