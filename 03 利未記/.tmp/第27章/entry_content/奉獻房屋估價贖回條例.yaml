name: 奉獻房屋估價贖回條例
type: 主題
secondary_types: []
aliases:
- 奉獻房屋的條例
status: formal
definition: 記載於利未記27章14至15節。人若將房屋分別為聖歸給耶和華，祭司就要估定價值，房屋是好是壞，祭司怎樣估定，就要以怎樣為定。將房屋分別為聖的人若要贖回房屋，就必在祭司所估定的價值以外加上五分之一，房屋仍舊歸他。此條例應用在屬靈層面上，房屋可預表教會（神的家）或地方教會。教會問題上的奉獻是需要人出代價的，但估價的不是拿著律法的摩西，乃是作中保的祭司（主耶穌），所以這代價是我們出得起的。主耶穌救贖了教會，付了完全的代價並加上五分之一（在十字架上榮耀神到了極點），使信徒能在教會中享受與神的交通。
accumulations:
- book: 利未記
  chapter: 27
  summary: 規定奉獻房屋須由祭司估價，並允許原主加五分之一贖回。
  relation: 建立奉獻不動產的贖回機制，藉由祭司的估價與加罰款原則維護奉獻的嚴肅性。
related_entries:
