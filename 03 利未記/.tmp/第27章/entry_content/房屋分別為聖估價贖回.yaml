name: 房屋分別為聖估價贖回
type: 主題
secondary_types: []
aliases:
- 房屋分別為聖
- 房屋贖回條例
status: formal
definition: 利未記第27章14-15節規定，人將房屋分別為聖歸給耶和華，祭司估定價值（不論好壞）；原主若要贖回，須在估價外加五分之一，房屋歸還原主。此條例將不動產納入許願贖回體系。
development: 房屋作為固定資產，其「分別為聖」屬自願獻獻；祭司估價為準，贖回加五分之一防止輕率許願，確保聖所產業權益。
accumulations:
- book: 利未記
  chapter: 27
  summary: 房屋分別為聖由祭司估價，贖回加五分之一。
  relation: 將贖回原則延伸至房產，與地業贖回條例平行。
