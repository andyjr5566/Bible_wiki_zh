name: 杖下經過（taḥat haššēḇeṭ）
type: 原文
secondary_types: []
aliases:
- 經杖
- 杖下
status: formal
definition: 希伯來文「תַּחַת הַשֵּׁבֶט」（taḥat haššēḇeṭ），字面意為「在杖下」。利未記 27:32 描述牲畜什一的點算方式：「凡牛群羊群中，一切從杖下經過的，每第十隻要歸給耶和華為聖。」牧者以杖點數羊群，使其逐一通過，每第十隻即為聖。此意象亦見於耶利米書
  33:13、以西結書 20:37，象徵神對屬祂子民的點閱與主權。
development: 本章將此農牧習慣法制化為什一徵收的具體儀式，強調隨機性（不可挑揀好壞）與神的主權揀選。
accumulations:
- book: 利未記
  chapter: 27
  summary: 第32節規定牛群羊群經杖下點數，每第十隻歸耶和華為聖，不可問好壞、不可更換。
  relation: 此原文術語在本章作為什一牲畜選取的技術性儀式，連結「不可問好壞不可更換」與「更換牲畜雙方成聖」的條例。
