- 估價條例
status: formal
definition: 利未記第27章1-8節規定人許願將自己或他人歸給耶和華時，祭司須按年齡、性別與聖所平（二十季拉為一舍客勒）估定價值；若許願人貧窮，祭司再按其力量估定。此條例確立「人」被許願時的贖價標準，體現聖所度量衡的公義與對窮人的體恤。
development: 本章開篇即以「人還特許的願」為例，建立估價表（20-60歲男50舍客勒、女30舍客勒；5-20歲男20、女10；1月-5歲男5、女3；60歲以上男15、女10），並規定貧窮者可由祭司酌減，顯示神律法兼顧秩序與憐憫。
accumulations:
- book: 利未記
  chapter: 27
  summary: 規定許願人按年齡性別估價，貧窮者由祭司酌定。
  relation: 本章核心條例，奠定後續牲畜、房屋、地產估價贖回的原則。
