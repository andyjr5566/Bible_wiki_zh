name: 永獻（cherem）
type: 神學
secondary_types: []
aliases:
- 切爾姆
- 當滅
- 完全獻上
status: formal
definition: 希伯來文 cherem，指「永獻」、「分別為滅」或「絕對歸神」。利未記27:28-29顯示：永獻之物（人、牲畜、地）不可賣、不可贖，歸耶和華為至聖；被永獻之人（當滅的）不可贖，必被治死。神學上表徵徹底放棄主權、承認神絕對主權，亦關聯聖戰中迦南城邑的毀滅（書6:17-18）與違犯者受審（書7章）。
development: 從利未記27條例到約書亞記實踐，cherem 從「自願最高獻獻」延伸為「神審判工具」：亞干私留當滅物導致全族受禍，顯示永獻物一經宣告即屬神聖域，侵犯者觸犯神聖榮耀。新約雖無直接對應詞，但「將身體獻上當作活祭」（羅12:1）呼應永獻的全然歸神精神。
accumulations:
- book: 利未記
  chapter: 27
  summary: 永獻條例定義 cherem 為不可贖、歸耶和華為至聖；當滅之人必被治死。
  relation: 本章神學高峰，確立「至聖」屬級，超越可贖回的許願與什一。
