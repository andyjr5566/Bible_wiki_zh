name: 不潔淨牲畜估價贖回
type: 主題
secondary_types: []
aliases:
- 不潔淨牲畜贖回
- 不潔淨獸估價
status: formal
definition: 利未記第27章11-13節規定，不潔淨牲畜（不可作供物者）若被許願，須牽到祭司面前估價；許願人若要贖回，須在估價外加五分之一。此條例解決不潔淨牲畜無法壇獻、須以銀贖回的實務問題。
development: 區別於潔淨牲畜「獻上即成聖、不可換」，不潔淨牲畜透過祭司估價、加五分之一贖回，轉化為聖所銀庫收入，維持許願人的還願義務。
accumulations:
- book: 利未記
  chapter: 27
  summary: 不潔淨牲畜由祭司估價，贖回加五分之一。
  relation: 體現「贖回加五分之一」原則在非供物牲畜上的應用。
