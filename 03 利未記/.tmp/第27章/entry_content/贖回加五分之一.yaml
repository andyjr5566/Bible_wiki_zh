name: 贖回加五分之一
type: 主題
secondary_types: []
aliases:
- 贖回加二成
- 加五分之一贖回
status: formal
definition: 利未記 27 多處規定：人、牲畜、房屋、地業、什一等聖物若許願人欲贖回，必須在祭司估定價值外加五分之一（第13、15、19、27、31節）。此原則適用於不潔淨牲畜頭生（第27節）、分別為聖的房屋（第15節）、地業（第19節）及什一（第31節），強調聖物贖回的代價高於原值，防止輕忽許願。
development: 此條例貫穿本章各類分別為聖的物件，形成統一的贖回機制，體現聖物屬神、人欲取回須付額外代價的神學原則。
accumulations:
- book: 利未記
  chapter: 27
  summary: 第13、15、19、27、31節重複規定贖回聖物須在估價外加五分之一，涵蓋牲畜、房屋、地業、不潔淨牲畜頭生、什一。
  relation: 本章以此原則串聯許願估價條例的各類聖物，確立贖回的統一標準。
