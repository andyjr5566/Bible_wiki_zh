name: 當滅的必被治死
type: 主題
secondary_types: []
aliases:
- 永獻者必死
- 當滅者不可贖
status: formal
definition: 利未記 27:29 規定：「凡從人中當滅的都不可贖，必被治死。」此處「當滅」（希伯來文 ḥērem）指被永獻給耶和華、處於絕對聖潔狀態的人（如被判死刑的罪人或被神命令滅絕的民族），不得以贖價代替，必須執行死刑。此條例區別於第28節「永獻物不可賣不可贖」的物品規定，專指人的永獻，強調
  ḥērem 的不可逆性與嚴肅性。
development: 本章在永獻條例（第28-29節）結尾單列人當滅的處置，作為許願估價條例的最終界線：生命屬神，絕對歸屬不容贖回。
accumulations:
- book: 利未記
  chapter: 27
  summary: 第29節規定被永獻（當滅）的人不可贖回，必被治死，區別於物品永獻只歸祭司為業。
  relation: 此條例為本章許願估價體系的最高原則：若許願涉及人的永獻（ḥērem），則超越估價贖回機制，直接進入生死審判。
