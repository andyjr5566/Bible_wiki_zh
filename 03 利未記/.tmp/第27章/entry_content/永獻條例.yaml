- 切爾姆條例
status: formal
definition: 利未記第27章28-29節規定，一切「永獻」（cherem）的——無論人、牲畜、承受為業的地——都不可賣、不可贖，歸耶和華為至聖；從人中當滅的（被永獻者）不可贖，必被治死。此條例處理徹底歸神、不可逆轉的獻獻。
development: 「永獻」不同於一般許願（可贖回），乃徹底放棄所有權，物品歸祭司（民18:14）或毀滅（如迦南之戰）；第29節「當滅的必被治死」涉及被判永獻之人（如亞干，書7章），顯示神審判的嚴肅性。
accumulations:
- book: 利未記
  chapter: 27
  summary: 永獻之物不可賣不可贖，歸耶和華為至聖；當滅之人必被治死。
  relation: 確立最高層級獻獻類別，與可贖回的許願、什一形成對比。
