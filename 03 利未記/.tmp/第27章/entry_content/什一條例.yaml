status: formal
definition: 利未記第27章30-33節規定：地產什一（種子、果子）歸耶和華為聖，贖回加五分之一；牲畜什一（牛羊群中杖下經過每第十隻）歸耶和華為聖，不可問好壞、不可更換，若換則雙方成聖不可贖。此條例規範農業與牧業收成的十分之一歸神。
development: 土地出產與牲畜增殖的十分之一屬神，承認神為真正主人；牲畜什一以「杖下經過」隨機抽樣，防止人為挑選，強調順服而非品質。
accumulations:
- book: 利未記
  chapter: 27
  summary: 地產什一可贖回加五分之一；牲畜什一杖下經過不可換不可贖。
  relation: 結束全章條例，將日常生產納入聖潔體系，呼應開篇許願估價的聖所平原則。
