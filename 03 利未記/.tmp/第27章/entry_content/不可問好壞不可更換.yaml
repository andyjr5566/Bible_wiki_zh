name: 不可問好壞不可更換
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記 27 章兩處提及此原則：一、許願獻牲畜時，不可改換好壞，若換，雙方皆成聖（v.10）；二、獻上從杖下經過的十分之一牲畜時，不可問好壞、不可更換，若換，原物與換物皆成聖，不可贖回（v.33）。此規定強調獻給神之物的不可變更性。
development: 第 10 節屬許願估價條例中牲畜許願的規定，第 33 節屬什一條例中牲畜什一的特殊規定；兩者同樣採「雙方成聖、不可贖回」的懲罰機制，保護獻祭制度的嚴肅性。
accumulations:
- book: 利未記
  chapter: 27
  summary: 本章在許願牲畜（v.10）與牲畜什一（v.33）兩處規定不可挑選好壞、不可更換，違者雙方成聖不可贖。
  relation: 顯示獻給神之物的聖別性與不可侵犯性，保護獻祭制度的嚴肅性。
