organization: "### 人身許願估價（v1-8）\n本章開啟 **[[許願估價條例]]**，規範以色列人因許願將人、牲畜、房屋、地業「分別為聖」歸給耶和華後的估價與贖回機制。祭司依「聖所的平」（二十季拉為一舍客勒，v25）估定價值。人身估價按年齡、性別分級（見下表），若許願人貧窮，祭司可按其力量酌減（v8），顯示神對窮人的體恤。\n\
  \n| 類別 | 年齡 | 男（舍客勒） | 女（舍客勒） |\n|------|------|--------------|--------------|\n\
  | 成年 | 20–60 歲 | 50 | 30 |\n| 青年 | 5–20 歲 | 20 | 10 |\n| 幼童 | 1 月–5 歲 | 5 | 3 |\n\
  | 老年 | 60 歲以上 | 15 | 10 |\n\n### 牲畜許願與更換條例（v9-13）\n潔淨牲畜一經許願即成聖，**[[牲畜許願不可更換]]**；若強行更換，**[[更換牲畜雙方成聖]]**（v10）。不潔淨牲畜不可作壇上供物，須呈祭司估價，**[[不潔淨牲畜估價贖回]]**\
  \ 時**[[贖回加五分之一]]**（v11-13）。此條例強調許願的嚴肅性與聖物不可輕易變更的原則。\n\n### 房屋與地業分別為聖（v14-25）\n房屋由祭司估價，**[[房屋分別為聖估價贖回]]**\
  \ 同樣**[[贖回加五分之一]]**（v14-15）。地業分「承受為業的地」與「所買的地」兩類，**[[地業分別為聖估價贖回]]** 以撒種量（大麥一賀梅珥\
  \ = 五十舍客勒）為基準，並依距 **[[禧年（yobel）|禧年]]** 年數遞減（v16-19）。\n- **承受地**：若不贖回或賣與他人，禧年歸耶和華為聖，歸祭司為業（v20-21）。\n\
  - **所買地**：禧年歸原業主（v22-24）。\n\n```mermaid\nflowchart TD\n  A[地業分別為聖] --> B{地類型}\n\
  \  B -->|承受為業| C[按撒種量估價<br>距禧年年數遞減]\n  B -->|所買非業地| D[推算至禧年價值<br>當日歸耶和華為聖]\n  C\
  \ --> E{是否贖回}\n  E -->|是| F[加五分之一<br>永歸原主]\n  E -->|否/賣人| G[禧年歸耶和華<br>歸祭司為業]\n \
  \ D --> H[禧年歸原業主]\n```\n\n### 頭生牲畜與永獻之物（v26-29）\n**[[頭生牲畜不可再分別為聖]]**，因本屬耶和華（v26）。不潔淨頭生牲畜可**[[不潔淨牲畜頭生贖回]]**（加五分之一），否則按估價賣出（v27）。**[[永獻（cherem）|永獻]]**（cherem）之人、牲畜、地業**[[永獻條例]]**\
  \ 規定**不可賣、不可贖**，屬 **[[至聖]]** 歸耶和華（v28）；**[[當滅的必被治死]]** 指被永獻滅絕之人不可贖回（v29）。\n\n###\
  \ 什一奉獻條例（v30-33）\n**[[什一條例]]** 規定地產（種子、果子）與牲畜（牛羊）的十分之一歸耶和華為聖（**[[什一]]**）。地產什一若贖回**[[贖回加五分之一]]**（v31）。牲畜什一以\
  \ **[[杖下經過（taḥat haššēḇeṭ）|杖下經過]]** 第十隻為準，**[[不可問好壞不可更換]]**；若更換，**[[更換牲畜雙方成聖]]**\
  \ 且不可贖回（v32-33）。此法確保什一奉獻的公義與隨機性。\n\n### 總結：西乃山的命令（v34）\n本章作為利未記的附錄，以「這就是耶和華在西乃山為以色列人所吩咐摩西的命令」收尾，將許願、永獻、什一等自願與義務奉獻納入\
  \ **[[盟約]]** 法度，提醒 **[[世世代代]]** 遵守 **[[律例]]**、**[[典章]]**、**[[誡命]]**，承認 **[[我是耶和華你們的神]]**。"
