- name: 許願估價條例
  suggested_type: 主題
  evidence: 利27:2-8 人還特許的願，被許的人要按你所估的價值歸給耶和華。你估定的，從二十歲到六十歲的男人，要按聖所的平，估定價銀五十舍客勒。若是女人，你要估定三十舍客勒。若是從五歲到二十歲，男子你要估定二十舍客勒，女子估定十舍客勒。若是從一月到五歲，男子你要估定五舍客勒，女子估定三舍客勒。若是從六十歲以上，男人你要估定十五舍客勒，女人估定十舍客勒。他若貧窮，不能照你所估定的價，就要把他帶到祭司面前，祭司要按許願人的力量估定他的價。CT：許願估價表按年齡性別分級，反映勞動力價值。貧窮者祭司按力量估價，體現神的憐憫。KC：聖所平為標準度量衡。BH：估價表反映古代近東勞動力市場價值。
