book: 利未記
chapter: 27
links:
- verse: 1
  phrase: 耶和華對摩西說
  target: 摩西
- verse: 2
  phrase: 人還特許的願，被許的人要按你所估的價值歸給耶和華
  target: 許願
- verse: 3
  phrase: 你估定的，從二十歲到六十歲的男人，要按聖所的平，估定價銀五十舍客勒
  target: 許願獻人估價表（年齡性別分級）
- verse: 4
  phrase: 若是女人，你要估定三十舍客勒
  target: 三十舍客勒
- verse: 5
  phrase: 舍客勒
  target: 舍客勒
- verse: 6
  phrase: 舍客勒
  target: 舍客勒
- verse: 7
  phrase: 若是從六十歲以上，男人你要估定十五舍客勒，女人估定十舍客勒
  target: 許願獻人估價表（年齡性別分級）
- verse: 8
  phrase: 他若貧窮，不能照你所估定的價，就要把他帶到祭司面前，祭司要按許願人的力量估定他的價
  target: 貧窮人由祭司按力量估價
- verse: 10
  phrase: 人不可改換，也不可更換，或是好的換壞的，或是壞的換好的
  target: 奉獻牲畜不可更換條例
- verse: 13
  phrase: 他若一定要贖回，就要在你所估定的價值以外加上五分之一
  target: 加五分之一贖回原則
- verse: 14
  phrase: 人將房屋分別為聖，歸給耶和華，祭司就要估定價值
  target: 奉獻房屋估價贖回條例
- verse: 15
  phrase: 加上五分之一
  target: 加五分之一贖回原則
- verse: 16
  phrase: 你要按這地撒種多少估定價值，若撒大麥一賀梅珥，要估價五十舍客勒
  target: 奉獻田地的複雜計算（承受之地與買來之地的差別）
- verse: 19
  phrase: 加上五分之一
  target: 加五分之一贖回原則
- verse: 22
  phrase: 他若將所買的一塊地，不是承受為業的，分別為聖歸給耶和華
  target: 奉獻田地的複雜計算（承受之地與買來之地的差別）
- verse: 25
  phrase: 二十季拉為一舍客勒
  target: 舍客勒
- verse: 26
  phrase: 惟獨牲畜中頭生的，無論是牛是羊，既歸耶和華，誰也不可再分別為聖
  target: 頭生歸神
- verse: 27
  phrase: 若是不潔淨的牲畜生的，就要按你所估定的價值加上五分之一贖回
  target: 頭生歸神為聖
- verse: 28
  phrase: 但一切永獻的，就是人從他所有永獻給耶和華的
  target: 滅絕（herem）
- verse: 29
  phrase: 凡從人中當滅的都不可贖，必被治死
  target: 滅絕（herem）
- verse: 30
  phrase: 十分之一是耶和華的，是歸給耶和華為聖的
  target: 十分之一
- verse: 31
  phrase: 人若要贖這十分之一的什麼物，就要加上五分之一
  target: 加五分之一贖回原則
- verse: 32
  phrase: 凡牛群羊群中，一切從杖下經過的，每第十隻要歸給耶和華為聖
  target: 十分之一
- verse: 34
  phrase: 這就是耶和華在西乃山為以色列人所吩咐摩西的命令
  target: 摩西
