updates:
- title: "亞倫和他兒子（祭司）"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利27:8,11,12,14,16,23,33 祭司估定價值、估定牲畜、估定房屋、估定地業、推算到禧年、以價銀為聖。祭司為許願估價的核心執行者。"
  relation: "本章賦予祭司許願估價的專屬權威：估定人、牲畜、房屋、地業價值，推算禧年價值，以價銀為聖，作為利21-22 祭司條例的估價應用層面。"
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "利27:1,34 耶和華對摩西說...這就是耶和華在西乃山為以色列人所吩咐摩西的命令。摩西作為條例傳遞者。"
  relation: "本章摩西作為利未記全書（利1-27）的條例傳遞者，在西乃山接收並頒布許願估價條例，完成立法者角色。"
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "利27:2,34 你曉諭以色列人說...這就是耶和華在西乃山為以色列人所吩咐摩西的命令。條例針對全會眾。"
  relation: "本章將許願估價條例頒布給全體以色列人，確立會眾在許願、估價、贖回上的集體責任。"
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "利27:8 他若貧窮，不能照你所估定的價，就要把他帶到祭司面前。貧窮者包括寄居者同受估價條例。"
  relation: "本章將寄居者納入貧窮許願人祭司按力量估價的保障條例，體現寄居者在許願制度中的同等待遇。"
- title: "埃及地"
  path: "link_folder/地點/埃及地.md"
  summary: "利27:34 這就是耶和華在西乃山為以色列人所吩咐摩西的命令。西乃山條例基於出埃及救贖。"
  relation: "本章以西乃山條例為框架，隱含出埃及救贖為許願估價條例的神學基礎，呼應利25-26 以出埃及為約的根基。"
- title: "迦南地"
  path: "link_folder/地點/迦南地.md"
  summary: "利27:16,21,24 人若將承受為業的幾分地分別為聖...若撒大麥一賀梅珥...到了禧年，那地從買主手下出來的時候，就要歸耶和華為聖...歸賣主，就是那承受為業的原主。地業條例在迦南地生效。"
  relation: "本章地業分別為聖、估價、贖回、禧年歸屬條例全部在迦南地產業框架內運作，確立應許之地產業管理的法律細則。"
- title: "禧年（yobel）"
  path: "link_folder/神學/禧年（yobel）.md"
  summary: "利27:17,18,19,21,23,24 他若從禧年將地分別為聖...在禧年以後將地分別為聖...按著未到禧年所剩的年數推算價值...到了禧年，那地從買主手下出來的時候，就要歸耶和華為聖...當日，他要以你所估的價銀為聖，歸給耶和華...到了禧年，那地要歸賣主。禧年為地業估價與歸屬分水嶺。"
  relation: "本章以禧年為地業估價基準（從禧年起算、按剩餘年數推算、禧年重置歸屬），確立禧年為產業法的時間錨點，呼應利25 禧年條例。"
- title: "至聖"
  path: "link_folder/神學/至聖.md"
  summary: "利27:28,29 凡永獻的是歸給耶和華為至聖。永獻物為至聖。"
  relation: "本章將永獻物定為至聖（v28-29），不可賣、不可贖，歸神為至聖，呼應利2:3,10, 6:17,25, 7:1, 24:9 至聖物條例。"
