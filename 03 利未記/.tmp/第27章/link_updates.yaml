"book": "利未記"
"chapter": !!int "27"
"updates":
- "title": "許願"
  "path": "link_folder/文化/許願.md"
  "summary": "v2「人還特許的願，被許的人要按你所估的價值歸給耶和華」——全章總冒。GT丁良才：許願的要理——人在許願上是十分自由的（申二十三22），不可冒失許願，既許了願就必須償還。"
  "relation": "本章是利未記全卷許願條例最完整詳盡的頒布之處，涵蓋人、牲畜、房屋、田地四大許願對象的估價與贖回規則。"
- "title": "十分之一"
  "path": "link_folder/原文/十分之一.md"
  "summary": "v30-33「地上所有的，無論是地上的種子是樹上的果子，十分之一是耶和華的，是歸給耶和華為聖的...凡牛群羊群中，一切從杖下經過的，每第十隻要歸給耶和華為聖」。GT啟導本：舊約律法中提到三種什一奉獻——從每年的出產中拿十分之一奉獻給利未人。"
  "relation": "本章是利未記中十一奉獻條例的正式頒布，規定農產與牲畜的十分之一屬耶和華，不可任意更換。"
- "title": "舍客勒"
  "path": "link_folder/原文/舍客勒.md"
  "summary": "v3-7,16,25 多次以舍客勒為估價單位——五十、三十、二十、十、五、三、十五舍客勒；v25「凡你所估定的價銀都要按著聖所的平：二十季拉為一舍客勒」。GT丁良才：「聖所的平」是估價的標準，由於當時度量衡標準不一，故要指定某一標準。"
  "relation": "本章是利未記中舍客勒估價系統最集中完整的展示，貫穿人、牲畜、房屋、田地四大許願對象的估價。"
- "title": "滅絕（herem）"
  "path": "link_folder/神學/滅絕（herem）.md"
  "summary": "v28-29「但一切永獻的，就是人從他所有永獻給耶和華的...都不可賣，也不可贖。凡永獻的是歸給耶和華為至聖。凡從人中當滅的都不可贖，必被治死」。CT〔話中之光〕：「永獻」與「當滅」在希伯來文均用herem一字，指歸與神不能取回之物。"
  "relation": "本章是利未記中herem永獻／當滅條例的正式頒布，列為三類不可再作許願對象的「已屬神之物」之一。"
- "title": "頭生歸神"
  "path": "link_folder/神學/頭生歸神.md"
  "summary": "v26「惟獨牲畜中頭生的，無論是牛是羊，既歸耶和華，誰也不可再分別為聖，因為這是耶和華的」。GT丁良才：頭生的公牛、公羊原是屬耶和華的（出十三2，二十二29-30），所以不得再將這頭生的牲畜分別為聖。"
  "relation": "本章重申頭生的牲畜是既定歸神之物，不可再作許願的對象，是三類不可再許願之物之首。"
- "title": "頭生歸神為聖"
  "path": "link_folder/歷史/頭生歸神為聖.md"
  "summary": "v26-27「若是不潔淨的牲畜生的，就要按你所估定的價值加上五分之一贖回；若不贖回，就要按你所估定的價值賣了」。GT丁良才：神將出十三13、三十四20的贖驢條例略加更改推廣，使這條例包括一切不潔淨之頭生的牲畜。"
  "relation": "本章補充出埃及記13章頭生條例中，不潔淨牲畜頭生者的贖回程序細節。"
- "title": "三十舍客勒"
  "path": "link_folder/互文/三十舍客勒.md"
  "summary": "v4「若是女人，你要估定三十舍客勒」。GT丁良才：女人的工價不如男人的工價高，所以祭司所估定的贖價也不一樣，三十舍客勒本是奴婢的代價（出二十一32），也是猶大賣耶穌所得之價銀的數目（太二十七9）。"
  "relation": "本章女人估價三十舍客勒與既有條目所記奴僕身價、猶大賣主價銀的互文脈絡相連。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」；v34「這就是耶和華在西乃山為以色列人所吩咐摩西的命令」，本章（也是利未記全書）首尾皆以摩西為中介。"
  "relation": "本章作為利未記全書總結，摩西的中保角色與傳達職分在此收束，標記全書律例典章傳達的完成。"
