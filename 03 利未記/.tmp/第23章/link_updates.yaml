book: "03 利未記"
chapter: 23
updates:
- title: "田角條例"
  path: "link_folder/主題/田角條例.md"
  summary: "利23:22 收割莊稼，不可割盡田角，也不可拾取遺落的，要留給窮人和寄居的。利19:9-10 平行。KC：波阿斯（得2:14-16）為例。申24:19-22 詳述。"
  relation: "本章將利19 章田角條例納入五旬節條例中，將農業收成與社會關懷結合，體現節期的倫理維度。- title: "安息日"
  path: "link_folder/神學/安息日.md"
  summary: "利23:3 六日要做工，第七日是聖安息日，當有聖會，什麼工都不可做。安息日為耶和華節期的基礎，列在諸聖會之首。出31:13 安息日為神與以色列立約的證據。BH：安息日預表基督是我們的安息（來4:9-10）。"
  relation: "本章以安息日開啟節期條例，確立安息日為所有節期的根基與模板，呼應出16、20、23、31、35 章安息日條例。
- title: "逾越節"
  path: "link_folder/歷史/逾越節.md"
  summary: "利23:5 正月十四日黃昏，是耶和華的逾越節。出12 章詳細記載。林前5:7 基督是我們的逾越節羔羊。BH：逾越節羔羊預表基督（林前5:7）。"
  relation: "本章將逾越節作為年度節期序列的起點，預表基督救贖工作的開端，呼應出12、民9、代下30 章。
- title: "無酵節"
  path: "link_folder/歷史/無酵節.md"
  summary: "利23:6-8 正月十五日無酵節，吃無酵餅七日。出12:15-20 平行。林前5:7-8 除去舊酵，作無酵的新團。BH：無酵節象徵救贖後的聖潔生活。"
  relation: "本章將無酵節與逾越節緊密連結（十四日晚逾越、十五日無酵），構成救贖與成聖的雙重節期序列。
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "利23:1,9,22,23,26,33,44 耶和華對摩西說；摩西將耶和華的節期傳給以色列人。摩西作為節期條例傳遞者。"
  relation: "本章摩西繼續其立法者角色，傳遞聖潔法典（利17-26）中節期條例的核心章節。
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "利23:2,10,24,34,44 曉諭以色列人；你們到了迦南地；以色列家的人都要住在棚裡。節期條例針對全會眾。"
  relation: "本章將節期條例頒布給全體以色列人，確立會眾參與聖會的集體責任。
- title: "亞倫"
  path: "link_folder/人物/亞倫.md"
  summary: "利23:20 祭司要把這些和初熟麥子做的餅一同作搖祭。亞倫子孫作祭司執行節期儀式。"
  relation: "本章賦予亞倫子孫節期儀式執行的核心職責：搖禾捆、搖餅、搖平安祭。
- title: "亞倫和他兒子（祭司）"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利23:10-11,20 祭司搖禾捆、搖餅、搖祭平安祭羊羔。祭司執行節期儀式的核心角色。"
  relation: "本章系統性規範祭司在七大節期中的儀式職責，作為利21-22 章祭司條例的儀式應用層面。
- title: "迦南地"
  path: "link_folder/地點/迦南地.md"
  summary: "利23:10 你們到了我賜給你們的地，收割莊稼時要將初熟莊稼一捆帶給祭司。初熟節、五旬節、住棚節在迦南地生效。"
  relation: "本章將節期條例與進入迦南地掛鉤，體現應許之地生活的聖潔節奏。
- title: "埃及地"
  path: "link_folder/地點/埃及地.md"
  summary: "利23:43 我領以色列人出埃及地時曾使他們住在棚裡。住棚節紀念出埃及。"
  relation: "本章以出埃及救贖為住棚節的歷史根基，呼應利19:34,20:24,25:38,26:13,45 救贖與聖潔的神學邏輯。
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "利23:22 留給窮人和寄居的。利19:10,33-34 平行。寄居者同享田角條例恩典。"
  relation: "本章將寄居者納入節期社會關懷條例，體現聖會共同體的包容性邊界。
- title: "無酵餅"
  path: "link_folder/原文/無酵餅.md"
  summary: "利23:6,17 無酵節吃無酵餅七日；五旬節獻兩個加酵搖祭餅。出12:8,15,17,18,20,39 多次提及。林前5:7-8 以誠實真正的無酵餅守節。"
  relation: "本章將無酵餅從逾越節/無酵節的核心元素，對比五旬節加酵餅，構成「除酵/加酵」的神學張力。
- title: "從民中剪除（karet）"
  path: "link_folder/原文/從民中剪除（karet）.md"
  summary: "利23:29,30 贖罪日不刻苦己心、做工的，必從民中剪除/除滅。利17:10, 20:3,5,6 平行。"
  relation: "本章將剪除刑罰應用於贖罪日違規，確立聖會參與的強制性與嚴肅性。
- title: "第八天"
  path: "link_folder/神學/第八天.md"
  summary: "利23:36,39 住棚節第八日當守聖會，為聖安息日。利22:27 才生牲畜第八天可獻。第八天說話新開始。"
  relation: "本章將第八天原則應用於住棚節結束日，呼應利12 割禮、利9:1 第八天亞倫供職、利15:14,29 第八天潔淨獻祭。
- title: "世世代代"
  path: "link_folder/神學/世世代代.md"
  summary: "利23:14,21,31,41 這在你們一切住處作為世世代代永遠的定例。節期條例具有代際延續性。"
  relation: "本章四次重複「世世代代永遠定例」，將節期條例確立為跨越歷史的約束性規範。