"book": "利未記"
"chapter": !!int "23"
"updates":
- "title": "逾越節"
  "path": "link_folder/歷史/逾越節.md"
  "summary": "v5「正月十四日，黃昏的時候，是耶和華的逾越節」。GT丁良才：黃昏的時候就是從日落到天黑的時候，逾越節的羔羊原是黃昏的時候宰的；GT啟導本：逾越節是以色列民一年中的第一個宗教節期，紀念以色列民得贖離開埃及。"
  "relation": "本章是逾越節在利未記23章七大節期年曆中的定位重申，作為全年節期之首，開啟春季三節期（逾越節、無酵節、初熟節）。"
- "title": "無酵節"
  "path": "link_folder/歷史/無酵節.md"
  "summary": "v6-8「這月十五日是向耶和華守的無酵節；你們要吃無酵餅七日。第一日當有聖會...要將火祭獻給耶和華七日。第七日是聖會」。GT丁良才：無酵節或作除酵節，逾越節和除酵節本是兩個節期，但因逾越節在除酵節的起頭，兩個節期的名稱成了可以彼此通用。"
  "relation": "本章詳列無酵節首尾兩日聖會與七日火祭的條例，緊接逾越節之後，是春季節期的第二環。"
- "title": "初熟（bikkurim）"
  "path": "link_folder/原文/初熟（bikkurim）.md"
  "summary": "v10-14「你們到了我賜給你們的地，收割莊稼的時候，要將初熟的莊稼一捆帶給祭司...祭司要在安息日的次日把這捆搖一搖」。GT丁良才：「捆」字的原文是俄梅珥，這字有時是捆的意思，卻也是一種量器的名字；GT啟導本：初熟節在尼散月十六日舉行，百姓此時開始收割大麥。"
  "relation": "本章是初熟節獻禾捆搖祭的具體程序記載，在無酵節期間舉行，緊接逾越節與無酵節之後。"
- "title": "初熟果子"
  "path": "link_folder/神學/初熟果子.md"
  "summary": "v10-21 初熟節與五旬節兩層獻初熟之物的預表意義。KC：初熟的禾捆預表主耶穌，搖祭的兩個餅不是預表主耶穌，而是預表教會；GT啟導本：新約作者用「初熟」的果子比喻基督和信徒的生活——信徒是聖靈初熟的果子（羅八23）、基督是復活者初熟的果子（林前十五20）。"
  "relation": "本章是初熟果子預表主題最集中展開之處，橫跨初熟節（基督復活）與五旬節（教會建立）兩個節期。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "v11-12,15,17,20 多次出現「搖一搖」「搖祭」——禾捆搖祭（11-12）、獻禾捆為搖祭的那日（15）、兩個搖祭的餅（17）、祭司把這些和初熟麥子做的餅一同作搖祭（20）。"
  "relation": "本章是搖祭一詞在節期條例中最密集出現之處，貫穿初熟節與五旬節兩個節期的獻祭程序。"
- "title": "聖會"
  "path": "link_folder/文化/聖會.md"
  "summary": "v2-4,7-8,21,24,27,35-37 反覆出現「聖會」一詞——本章總冒即「耶和華的節期，你們要宣告為聖會的節期」，貫穿七個節期的每一個聖會日。GT丁良才：「你們要宣告為聖會的節期」就是公眾應在會幕那裡聚集敬拜神的時候。"
  "relation": "本章是既有條目所預告「利23章將聖會延伸到所有節期」的完整實現，聖會概念貫穿全部七大節期。"
- "title": "基督預表（逾越節羔羊）"
  "path": "link_folder/神學/基督預表（逾越節羔羊）.md"
  "summary": "v5 逾越節；CT：主耶穌基督釘十字架，正是猶太人守逾越節的時候，祂就是逾越節裡所預表的真羊羔（林前五7「因為我們逾越節的羔羊基督已經被殺獻祭了」）；GT李道生：基督正在逾越節的晚上被捕，為預表贖罪的羔羊被殺、獻祭，使我們得救了（可十四12-21，林前五7，彼前一19）。"
  "relation": "本章是逾越節預表基督在七節期年曆中位置的重申，作為春季三節期預表基督救贖工作（受死、除罪、復活）的起點。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1,9,23,26,33,44「耶和華對摩西說」／「耶和華曉諭摩西說」／「摩西將耶和華的節期傳給以色列人」，本章五次以此語式分段，摩西是全部七個節期條例的傳達者。"
  "relation": "本章延續摩西向以色列人傳達耶和華節期年曆條例的一貫角色，是利未記中傳達次數最密集的一章。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v11「祭司要在安息日的次日把這捆搖一搖」；v20「祭司要把這些和初熟麥子做的餅一同作搖祭」，祭司在初熟節、五旬節搖祭儀式中的執行角色。"
  "relation": "本章延續祭司在獻祭體系中執行搖祭儀式的一貫角色，具體展現於初熟節與五旬節兩個節期。"
