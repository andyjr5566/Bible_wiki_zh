book: "03 利未記"
chapter: 23
candidates:
  # === C 類：全新條目 ===
  - name: 耶和華的節期總綱
    type: 主題
    evidence: "利23:1-4 耶和華對摩西說：曉諭以色列人，耶和華的節期要宣告為聖會的節期。安息日為聖安息日，當有聖會。七大節期：逾越節、無酵節、初熟節、七七節、吹角節、贖罪日、住棚節。KC：本來是耶和華的節期，後變成猶太人的節期（約5:1）。BH：節期是神的救贖計劃預表，逾越節指向基督犧牲之死，初熟節象徵祂復活。"
    surfaces: ["耶和華的節期", "聖會的節期", "宣告為聖會"]

  - name: 安息日為節期基礎
    type: 主題
    evidence: "利23:3 六日要做工，第七日是聖安息日，當有聖會，什麼工都不可做。這是在一切住處向耶和華守的安息日。KC：安息日是神與以色列立約的證據（出31:13），也是神創造世界時立定的（創2:3）。新約信徒守主日而不守安息日（西2:16-17）。BH：安息日預表基督是我們的安息（來4:9-10）。"
    surfaces: ["聖安息日", "向耶和華守的安息日", "一切住處"]

  - name: 逾越節條例
    type: 主題
    evidence: "利23:5 正月十四日黃昏，是耶和華的逾越節。出12:1-14 平行。KC：逾越節表徵基督是神的羔羊（約1:29），被殺流血，拯救人脫離罪的刑罰。主耶穌在逾越節晚上設立餅與杯（林前11:23-26）。BH：逾越節羔羊預表基督（林前5:7）。"
    surfaces: ["逾越節", "正月十四日", "黃昏的時候"]

  - name: 無酵節條例
    type: 主題
    evidence: "利23:6-8 正月十五日是無酵節，吃無酵餅七日。第一日、第七日當有聖會，什麼勞碌工都不可做，要將火祭獻給耶和華七日。出12:15-20 平行。KC：無酵節表徵蒙恩信徒成為無酵的新團，應當除淨舊酵（林前5:7-8）。酵表徵罪惡與邪惡教訓（太16:6）。BH：無酵節緊接逾越節，象徵救贖後的聖潔生活。"
    surfaces: ["無酵節", "吃無酵餅七日", "第一日聖會", "第七日聖會", "除酵"]

  - name: 初熟節條例（搖祭禾捆）
    type: 主題
    evidence: "利23:9-14 到了迦南地收割莊稼，要將初熟莊稼一捆帶給祭司。祭司在安息日次日搖這捆，使你們蒙悅納。同獻一歲無殘疾公綿羊羔為燔祭、素祭、奠祭。不可吃餅、烘的子粒、新穗子，直等到獻供物那日。KC：初熟節預表基督從死裡復活，成為睡了之人初熟的果子（林前15:20-23）。創8:4 方舟停在亞拉臘山（七月十七日）被視為預表。BH：初熟節在逾越節後第三天，預表基督第三天復活。"
    surfaces: ["初熟節", "搖祭禾捆", "安息日次日", "初熟莊稼一捆", "蒙悅納"]

  - name: 七七節（五旬節）條例
    type: 主題
    evidence: "利23:15-22 從安息日次日獻禾捆為搖祭算起，滿了七個安息日，第七個安息日次日共五十天，獻新素祭。從住處取細麵伊法十分之二，加酵烤成兩個搖祭餅，作為初熟之物獻給耶和華。同獻羊羔七隻、公牛犢一隻、公綿羊兩隻為燔祭，公山羊一隻為贖罪祭，兩隻公綿羊羔為平安祭。
當日宣告聖會，什麼勞碌工都不可做。收割不可割盡田角，留給窮人寄居者。KC：七七節即五旬節，聖靈降臨設立教會（徒2）。猶太傳統：神在五旬節西乃山降下律法。BH：兩個加酵搖祭餅預表猶太人與外邦人在教會合一（弗2:14-16）。"
    surfaces: ["七七節", "五旬節", "五十天", "新素祭", "兩個搖祭餅", "加酵", "田角條例"]

  - name: 吹角節條例
    type: 主題
    evidence: "利23:23-25 七月初一，守為聖安息日，吹角作紀念，當有聖會。什麼勞碌工都不可做，要將火祭獻給耶和華。KC：預表以色列人將來歸回故土（賽18:3, 27:12-13, 珥2-3）。BH：吹角節預表基督再來、教會被提（帖前4:16-17）。"
    surfaces: ["吹角節", "七月初一", "吹角作紀念", "聖安息日"]

  - name: 贖罪日條例
    type: 主題
    evidence: "利23:26-32 七月初十是贖罪日，守為聖會，刻苦己心，將火祭獻給耶和華。當日什麼工都不可做。凡不刻苦己心的，必從民中剪除。凡做工的，必從民中除滅。從月初九日晚上到次日晚上，守為安息日。KC：預表以色列眾人將來悔罪歸主（申30:1,10, 珥2, 亞12:10-13, 啟1:7)。BH：贖罪日預表基督作大祭司進入天上至聖所（來9:11-14）。"
    surfaces: ["贖罪日", "七月初十", "刻苦己心", "從民中剪除", "聖安息日", "除滅"]

  - name: 住棚節（收藏節）條例
    type: 主題
    evidence: "利23:33-43 七月十五日是住棚節，在耶和華面前守七日。第一日、第八日當有聖會，什麼勞碌工都不可做，七日內將火祭獻給耶和華。收藏地的出產，從七月十五日起守節七日。第一日拿美好樹果子、棕樹枝、茂密樹枝條、河旁柳枝，在耶和華面前歡樂七日。要住在棚裡七日，使世世代代知道神領以色列人出埃及時曾使他們住在棚裡。KC：預表以色列人將來所要得的安樂（亞14:16-21, 啟21:3)。BH：住棚節預表千禧年國度（亞14:16-21, 啟20-21)。"
    surfaces: ["住棚節", "收藏節", "七月十五日", "住在棚裡七日", "美好樹果子", "棕樹枝", "柳枝", "第八日聖會", "出埃及住棚"]

  - name: 節期獻祭總結
    type: 主題
    evidence: "利23:37-38 這是耶和華的節期，要宣告為聖會的節期，將火祭、燔祭、素祭、祭物、奠祭，各歸各日獻給耶和華。
這是在耶和華的安息日以外，又在供物和所許的願、甘心獻給耶和華的以外。"
    surfaces: ["節期獻祭", "火祭燔祭素祭奠祭", "安息日以外", "甘心獻祭"]

  - name: 田角條例（收割留給窮人寄居者）
