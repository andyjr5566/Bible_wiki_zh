status: formal
definition: 利未記 23 章 26-32 節規定七月初十為贖罪日，當守聖會，刻苦己心，獻火祭；當日不可作任何工，否則從民中剪除或除滅；從初九日晚上到初十日晚上守為聖安息日，作為世世代代永遠的定例。
