status: formal
definition: 利未記23章9-14節規定，以色列人進迦南地收割莊稼時，要將初熟的莊稼一捆帶給祭司，在安息日的次日搖祭，並獻上公綿羊羔為燔祭、素祭與奠祭，作為耶和華悅納的初熟之物，這日不可吃新穀，直等到獻供物那天才可吃，為世世代代永遠的定例。
