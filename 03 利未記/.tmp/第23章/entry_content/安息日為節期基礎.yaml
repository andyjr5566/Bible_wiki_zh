name: 安息日為節期基礎
type: 主題
secondary_types: []
aliases:
- 安息日聖會
status: formal
definition: 利未記 23:3 將安息日置於節期清單之首，規定「六日要做工，第七日是聖安息日，當有聖會；你們什麼工都不可做」，並宣告「這是在你們一切的住處向耶和華守的安息日」，確立安息日為所有節期的原型與根基。
development: 經文先列安息日（v.3），再以「耶和華的節期……乃是這些」（v.4）引出年度節期，顯示安息日屬創造秩序，節期屬救贖秩序，兩者同屬「耶和華的節期」體系。
accumulations:
- book: 利未記
  chapter: 23
  summary: 第 3 節單獨規定安息日為聖會、禁工、全地守守，作為後續年度節期的律法基準。
  relation: 本條目為本章節期體系的起點，與「耶和華的節期總綱」互為總分關係。
