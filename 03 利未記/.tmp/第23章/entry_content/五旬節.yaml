status: formal
definition: 利未記23章15-21節規定，從初熟節獻禾捆搖祭的次日算起，滿七個安息日共五十天，當日要獻新素祭，並烤兩個加酵的細麵餅作為初熟之物，同獻七隻羊羔、一隻公牛犢、兩隻公綿羊為燔祭，另獻公山羊為贖罪祭、兩隻羊羔為平安祭，祭司將餅與初熟麥子搖祭，當日宣告聖會，不可作勞碌工，為世世代代永遠的定例。
