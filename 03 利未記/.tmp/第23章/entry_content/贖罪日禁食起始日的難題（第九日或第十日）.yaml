name: 贖罪日禁食起始日的難題（第九日或第十日）
type: 解經爭議
secondary_types: []
aliases:
- 贖罪日禁食起始日難題
status: formal
definition: '利未記23章32節記載：「從這月初九日晚上到次日晚上，要守為安息日。」這引發了贖罪日禁食究竟是在第九日還是第十日開始的難題。因為利未記16章29節記載贖罪日是「七月初十」，百姓要在這日刻苦己心（禁食）。解答在於猶太人的曆法計算方式，是從日落到日落算為一日。因此初九日日落的時候就是初十日的起頭。禁食開始在第九日而延續到第十日，兩處經文並不矛盾，初九日晚上即是初十日的開端。

  '
accumulations:
- book: 利未記
