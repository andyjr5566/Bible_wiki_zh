  summary: 本章32節規定贖罪日的安息日從初九日晚上守到次日晚上，與16章初十日刻苦己心的記載引發起始日的疑問。
  relation: 本章提供了猶太曆法日落為起點的計算原則，解決了贖罪日禁食起始日的表面矛盾。
