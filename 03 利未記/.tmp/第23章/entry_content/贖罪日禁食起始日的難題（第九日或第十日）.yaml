name: 贖罪日禁食起始日的難題（第九日或第十日）
type: 解經爭議
secondary_types: []
aliases:
- 贖罪日禁食難題
status: formal
definition: 利未記23章32節記載：「從這月初九日晚上到次日晚上，要守為安息日」，似乎指禁食從第九日開始；但23章27節與利未記16章29節皆指明贖罪日是初十日，百姓要在當日刻苦己心（禁食）。解答此難題的關鍵在於猶太曆法中「從日落到日落算為一天」的計算方式。初九日日落即為初十日的開始，因此禁食實際上是在初十日（贖罪日當天）進行，從初九晚上延續到初十晚上。
accumulations:
- book: 利未記
  chapter: 23
  summary: 記載贖罪日需從初九日晚上守到次日晚上，引發與初十日贖罪日定規的表面衝突。
  relation: 本章第32節的時間計算方式是產生此解經爭議的直接來源，需結合猶太曆法理解。
related_entries:
- 贖罪日聖會條例（利23角度：刻苦己心與剪除刑罰）
sources:
