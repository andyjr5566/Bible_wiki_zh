definition: 利未記23章27、29、32節規定，贖罪日（七月初十）百姓要守為聖會，並要刻苦己心（afflict your souls），不可作任何工，否則必從民中剪除；這一日為聖安息日，從初九日晚上到初十日晚上守為安息日，為世世代代永遠的定例。
