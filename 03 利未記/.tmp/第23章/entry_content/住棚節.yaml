status: formal
definition: 利未記23章33-43節規定，七月十五日起守住棚節七日，第一日聖會，七日內獻火祭，第八日也聖會並獻火祭，為嚴肅會；期間以色列人要住在棚裡，第一日拿美好樹果子、棕樹枝、茂密樹枝條、河旁柳枝在耶和華面前歡樂七日，為世世代代永遠的定例，使後代知道神領以色列人出埃及時曾使他們住棚。
