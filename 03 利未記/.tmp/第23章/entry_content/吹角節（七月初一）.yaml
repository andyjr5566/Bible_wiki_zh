name: 吹角節（七月初一）
type: 歷史
secondary_types: []
aliases:
- 吹角日
status: formal
definition: '利未記23章24至25節規定，七月初一要守為聖安息日，要吹角作紀念，當有聖會。這是猶太宗教曆七月份的三個節期之首。吹角的用意是宣告喜樂的消息，號召四散的以色列人聚集。在歷史上，這日也是猶太民事曆一年之始（新年元旦），被擄歸回後角聲響遍全國迎新年。此節期預表神的救贖計畫將從外邦教會回到以色列人，表徵提醒四散的以色列人招聚他們一同過節，也象徵耶穌基督的再臨。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章24至25節設立七月初一為吹角節，要求守聖安息日、吹角作紀念、獻火祭並禁止勞碌工作。
  relation: 吹角節作為下半年節期的起頭，預表以色列人的復興與基督再來的招聚。
