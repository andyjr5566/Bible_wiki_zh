definition: 利未記 23 章多處（14、21、31、41 節）重複「這在你們一切的住處作為世世代代永遠的定例」，強調各節期（無酵節、初熟節、五旬節、吹角節、贖罪日、住棚節）的禮儀規定不因時代改變而廢除，具有跨世代的規範性。
