name: 七七節（五旬節）條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記 23 章 15-21 節規定從安息日的次日（搖祭禾捆日）算起滿七個安息日，共五十天，獻新素祭：兩個加酵搖祭餅、七隻羊羔、一隻公牛犢、兩隻公綿羊為燔祭，一隻公山羊為贖罪祭、兩隻羊羔為平安祭；祭司將餅與初熟麥子搖祭，當日宣告聖會，不可作勞碌工，作為世世代代永遠的定例。
development: ''
accumulations:
- book: 利未記
  chapter: 23
  summary: 15-21 節記載七七節（五旬節）的計算方式、獻祭內容與聖會規定。
  relation: 本條例為利未記 23 章所列耶和華節期之一，連結初熟節與收割節期，確立五旬節的禮儀。
