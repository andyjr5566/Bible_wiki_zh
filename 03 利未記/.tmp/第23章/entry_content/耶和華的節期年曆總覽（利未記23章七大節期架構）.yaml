name: 耶和華的節期年曆總覽（利未記23章七大節期架構）
type: 主題
secondary_types: []
aliases:
- 耶和華的節期
- 七大節期
status: formal
definition: '利未記23章記載了耶和華神親自設立並吩咐以色列人遵守的七大節期，這些節期在舊約稱為「耶和華的節期」，到了新約則被稱為「猶太人的節期」。這七個節期分別為：逾越節、無酵節、初熟節、七七節（五旬節）、吹角節、贖罪日和住棚節。這些節期不僅標明了農曆年的各個階段，慶賀收成並歸功於神，更在救贖歷史的意義上預表了基督耶穌的救贖工作。節期的安排以安息日為基礎，分為春夏與秋冬兩組，並以「七」作為最要緊的數目，貫穿節期與安息年的循環。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章詳列以色列民宗教節期的曆法總綱，從安息日開始，依序宣告七大節期的條例與獻祭規定。
  relation: 本章是七大節期架構的完整來源經文，構成以色列宗教曆與救贖預表的總綱。
