name: 住棚裡是棚或帳的難題
type: 解經爭議
secondary_types: []
aliases:
- 棚或帳的難題
status: formal
definition: '利未記23章42至43節記載以色列人要住在「棚」裡七日，以紀念出埃及時曾使他們住在棚裡。然而出埃及記16章16節說百姓在曠野是住在「帳」裡，且聖經其他地方論及曠野住處皆用「帳幕」而非「棚」，這引發了難題。解答在於利未記所提的並不是百姓曠野的實際居所，而是有關於在耶路撒冷守住棚節的指示。因為為期只有一周，他們被指示當守住棚節時要住在暫時的棚裡。帳幕和棚都是人暫時居住的所在，用住棚節的棚作為在曠野所住之帳幕的標記是適當的。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章42至43節吩咐以色列人守住棚節時要住在棚裡七日，作為紀念曠野生活的標記。
  relation: 此經文引出的「棚」與「帳」之別，點出節期紀念性質的象徵用法與歷史實際居所的差異。
