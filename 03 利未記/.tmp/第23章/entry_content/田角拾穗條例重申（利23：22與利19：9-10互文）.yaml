name: 田角拾穗條例重申（利23：22與利19：9-10互文）
type: 互文
secondary_types: []
aliases:
- 田角拾穗條例
status: formal
definition: '利未記23章22節重申了田角拾穗的條例：「在你們的地收割莊稼，不可割盡田角，也不可拾取所遺落的；要留給窮人和寄居的。我是耶和華─你們的神。」此條例與利未記19章9至10節的規定互文重疊。在利未記23章中，此條例插在五旬節（七七節）的條例之後，具有雙重意義：一方面在慶祝豐收時提醒百姓顧念窮人，表徵要顧念教會中軟弱、靈性貧窮的信徒；另一方面在預言層面上，當教會（初熟莊稼）被提後，仍有窮人（以色列餘民）與寄居的（外邦人）在地上得著遺落的福分。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章22節於五旬節條例中插入不可割盡田角、不可拾取所遺落的規定，命令留給窮人和寄居的。
  relation: 此條例與利未記19章9-10節形成互文，並為五旬節的豐收預表增添了照顧弱勢與未來餘民蒙恩的屬靈意義。
