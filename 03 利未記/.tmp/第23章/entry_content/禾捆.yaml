definition: 利未記23章10-11節記載，以色列人收割莊稼時，要將初熟的莊稼一捆帶給祭司，祭司在安息日的次日將這捆在耶和華面前搖一搖，使百姓蒙悅納，這禾捆即為初熟節搖祭的核心物件。
