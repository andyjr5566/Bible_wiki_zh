definition: 希伯來文「חָמֵץ」（chametz）意指發酵的麵團或酵母。利未記23章6節規定無酵節期間不可吃酵；17節則規定五旬節要獻兩個加酵的細麵餅作為初熟之物，顯示酵在不同節期有截然不同的神學功能。
