name: 贖罪日聖會條例（利23角度：刻苦己心與剪除刑罰）
type: 主題
secondary_types: []
aliases:
- 贖罪日條例
status: formal
definition: '利未記23章26至32節從百姓任務的角度描述贖罪日（七月初十）的條例。百姓要守為聖會，並要「刻苦己心」（通常指禁食、懺悔及禱告），也要將火祭獻給耶和華。當這日，什麼工都不可做，因為要在耶和華面前贖罪。神設立了嚴厲的刑罰：凡不刻苦己心的，必從民中剪除；凡做什麼工的，神必將他從民中除滅。此條例預表以色列全家將來都要得救，表徵放下自己的行為，接受神的救恩，從前悖逆失敗的日子必須告一段落。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章27至32節詳述贖罪日的百姓守則，強調刻苦己心、禁絕工作，並宣告違反者將面臨剪除與除滅的刑罰。
  relation: 本章補充了利未記16章祭司贖罪任務之外，百姓在贖罪日當盡的本分與面對的嚴肅要求。
