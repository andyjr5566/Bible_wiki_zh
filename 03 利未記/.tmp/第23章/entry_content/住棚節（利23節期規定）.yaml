name: 住棚節（利23節期規定）
type: 歷史
secondary_types: []
aliases:
- 收藏節
- 住棚節條例
status: formal
definition: '利未記23章33至43節記載了住棚節（又稱收藏節）的條例。這是每年最後的節期，從七月十五日起守節七日，第一日與第八日均為聖安息日。以色列人要拿美好樹上的果子和棕樹枝等在神面前歡樂七日，並要住在棚裡七日，以紀念神領以色列人出埃及時曾使他們住在棚裡。此節期正值秋天收藏地的出產，是歡樂慶祝豐收的日子，所羅門聖殿的獻殿禮也在此節舉行。住棚節預表享受國度的安息，表徵千年國度的享受與神與人同住的安樂。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章33至43節詳述住棚節的歷史規定，包括守節七日、住棚紀念出埃及、收藏土產的歡樂及第八日嚴肅會。
  relation: 住棚節作為七大節期的最後一個，預表神救贖計畫最終帶來的國度安息與永遠的福樂。
