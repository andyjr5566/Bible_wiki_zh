name: 七七節安息日算法的兩種解讀之爭
type: 解經爭議
secondary_types: []
aliases:
- 安息日的次日解讀之爭
status: formal
definition: '利未記23章11節與15節提及「安息日的次日」獻禾捆為搖祭，並從該日算起滿七個安息日。對於此「安息日」的定義，歷史上存在兩種解讀。撒都該人主張這是指著無酵節期間的尋常安息日（一週的第七日），若如此，七七節每年都會落在星期日；而法利賽人則認為此「安息日」是指無酵節的頭一個聖會日（即正月十五日），因此獻初熟禾捆的日期固定為正月十六日，七七節的日期則會因月份大小而浮動。七十士譯本將其譯為「第一日的次日」，約瑟夫的記載也支持從正月十六日算起，此解讀之爭直接影響了五旬節日期的計算。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章11節與15節記載獻初熟禾捆與計算七七節的起始日為「安息日的次日」，引發不同解經派別的解讀爭議。
  relation: 本章經文是此安息日算法爭議的直接來源，涉及如何計算五旬節（七七節）的準確日期。
