name: 七七節安息日算法的兩種解讀之爭
type: 解經爭議
secondary_types: []
aliases:
- 五旬節算法爭議
- 安息日的次日解讀
status: formal
definition: 利未記23章11節與15節中的「安息日的次日」，在猶太教內有兩種解讀。撒都該人主張此「安息日」是指尋常的每週安息日，因此初熟節與五旬節的日期會隨每年落在星期幾而變動；法利賽人則主張此「安息日」是指無酵節第一日的聖會日（正月十五日），故安息日的次日即為正月十六日。約瑟夫與七十士譯本的支持偏向法利賽人的解法，猶太人至今仍從正月十六日算起五十天至七七節。
accumulations:
- book: 利未記
  chapter: 23
  summary: 記載從安息日的次日獻禾捆為搖祭起算，滿七個安息日共五十天為七七節的條例。
  relation: 本章經文是此安息日算法爭議的核心來源，經文未明確定義「安息日」是指每週安息日或節期聖會日。
