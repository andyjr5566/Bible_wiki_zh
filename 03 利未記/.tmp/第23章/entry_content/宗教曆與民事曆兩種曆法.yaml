name: 宗教曆與民事曆兩種曆法
type: 背景
secondary_types: []
aliases:
- 聖年曆與常年曆
- 宗教曆與民事曆
status: formal
definition: 以色列人擁有兩種曆法系統。宗教曆以「尼散月」（陽曆三、四月間）為正月，源於神領以色列人出埃及時的吩咐（出十二2），一切敬拜神的事皆按此聖年曆算定。民事曆則從「提斯利月」（陽曆九、十月間）開始，以提斯利月為正月，其餘諸事按此常年曆計算。利未記第23章的「耶和華的節期」依宗教曆法計算，逾越節與無酵節在宗教曆正月（春季），而吹角節、贖罪日與住棚節則在宗教曆第七個月（即民事曆的正月，秋季）。
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章記載的節期橫跨宗教曆的頭七個月，春季節期（逾越節、無酵節、初熟節、五旬節）在正月開始，秋季節期（吹角節、贖罪日、住棚節）在七月舉行。
  relation: 兩種曆法的並存解釋了為何第七個月（提斯利月）的節期既標誌著宗教曆下半年節期的開始，同時也是民事曆的新年。
