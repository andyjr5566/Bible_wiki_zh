name: 五旬節兩個有酵餅的搖祭條例
type: 主題
secondary_types: []
aliases:
- 七七節搖祭餅
- 兩個有酵餅
status: formal
definition: 利未記23章17節規定，五旬節時要從住處取出細麵伊法十分之二，加酵烤成兩個搖祭的餅獻給神。這與一般素祭不可含酵的規定不同。加酵的餅承認了教會（由猶太人與外邦人兩下合而成）在地上仍有人性與罪的成分，但因著基督贖罪的火祭同獻，酵的活動被制止，信徒得以在復活的基督裡蒙神悅納。這兩個餅作為初熟之物，預表聖靈降臨所產生的教會見證。
accumulations:
- book: 利未記
  chapter: 23
  summary: 規定五旬節獻上兩個加酵的細麵餅作為搖祭，並伴隨燔祭、贖罪祭與平安祭。
  relation: 本章確立了唯一在素祭中允許加酵的條例，預表教會在聖靈降臨後的建立與性質。
related_entries:
