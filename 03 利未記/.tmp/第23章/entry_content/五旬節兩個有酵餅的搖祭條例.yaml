name: 五旬節兩個有酵餅的搖祭條例
type: 主題
secondary_types: []
aliases:
- 七七節有酵餅
- 兩個搖祭的餅
status: formal
definition: '利未記23章17節規定，在五旬節（七七節）時，以色列人要從住處取出細麵伊法十分之二，加酵烤成兩個搖祭的餅，當作初熟之物獻給耶和華。這與一般素祭不可加酵的規定不同，解經家指出這兩個加酵的餅見證了奉獻的人承認自己有罪（酵表徵罪惡與罪性），預表教會在地上仍然有罪的成分，但在復活的基督裡仍可向神奉獻。這兩個餅只被搖在耶和華面前，卻不燒在壇上，並且需伴隨獻上贖罪祭與平安祭，承認教會在人性裡仍需基督的贖罪與彼此間的平安。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章17至20節記載五旬節獻上兩個加酵餅作為搖祭的條例，並需搭配燔祭、素祭、贖罪祭與平安祭同獻。
  relation: 此條例突顯了教會作為初熟之物獻給神時，仍帶有罪的成分（酵），需靠基督的救贖才能蒙悅納。
