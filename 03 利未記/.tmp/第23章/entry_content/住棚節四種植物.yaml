name: 住棚節四種植物
type: 文化
secondary_types: []
aliases:
- 四種植物
- 美好樹上的果子
status: formal
definition: '利未記23章40節規定，住棚節第一日要拿「美好樹上的果子和棕樹上的枝子，與茂密樹的枝條並河旁的柳枝」，在耶和華面前歡樂七日。這四種植物在猶太傳統中被具體化為香櫞（美好樹的果子）、棕樹枝、芭樂樹枝（茂密樹的枝條）和柳樹枝。這些植物象徵因神祝福而有的繁榮與和平：美好樹的果子象徵繁榮，棕樹枝象徵和平與勝利，茂密樹枝條象徵繁茂，河旁柳枝象徵新鮮。百姓在節期拿著這些植物束成紮在神面前歡樂，並用於搭棚。

  '
accumulations:
- book: 利未記
  chapter: 23
  summary: 本章40節具體列出住棚節歡樂時要拿的四種植物：美好樹果子、棕樹枝、茂密樹枝條與河旁柳枝。
  relation: 這四種植物構成了住棚節慶典的文化核心，象徵神豐富的供應與國度裡的得勝歡樂。
