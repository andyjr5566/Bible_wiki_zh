name: 兩隻公山羊的雙重預表
type: 神學
secondary_types: []
aliases:
- 雙重預表
- 兩羊預表
- 贖罪日雙羊
status: formal
definition: 利未記16:5-22 兩隻公山羊共同構成一個贖罪祭，預表基督贖罪工作的雙重面向：(1) 歸耶和華的羊被宰，血帶入至聖所彈於施恩座前，預表基督滿足神公義聖潔，以血贖罪，進了天堂如今為我們顯在神面前（羅3:25；來9:12,24）；(2)
  歸阿撒瀉勒的活羊，大祭司按手認罪，擔當一切罪孽送往曠野無人之地，預表基督除去信徒罪孽（賽53:6；詩103:12；彌7:19）。兩羊合一才完整顯明贖罪真理：神的要求得滿足，人的罪被除去。
development: GT丁良才註解指出兩隻山羊是一個祭，要表示基督因死而復活所成就之救人的大功，所以必須有兩隻；對「歸阿撒瀉勒」一詞提出兩種解釋，一為罪歸魔鬼，一為「完全除掉所贖的罪」，並傾向後者，認為第一隻羊表明贖罪的方法，第二隻羊表示贖罪的結果。
accumulations:
- book: 利未記
  chapter: 16
  summary: 5-22節完整記載兩羊從拈鬮、獻祭、彈血、按手認罪、送往曠野全過程。第5節「兩隻公山羊為贖罪祭」明確指出兩羊屬一祭。第15-16節歸耶和華羊血彈於施恩座；第21-22節歸阿撒瀉勒羊擔當罪孽帶往無人之地。
  relation: 經文直接呈現雙羊儀式與神學意涵，是神學預表的根基。
