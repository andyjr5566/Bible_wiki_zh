name: 阿撒瀉勒（Azazel）歸屬之爭
type: 解經爭議
secondary_types: []
aliases:
- 阿撒瀉勒
- Azazel
- 替罪羊
- 代罪羊
status: formal
definition: 利未記16:8,10,26 提到「阿撒瀉勒」，「阿撒瀉勒」一詞不知何所指，經文全章極其明確的記述中只有此詞未作說明。GT《啟導本聖經利未記註釋》歸納三種解釋：(1)
  作抽象的罪的「移去」或「去除」解；(2) 指擔了罪的山羊所去的地方，為罪惡的權勢所在；(3) 為曠野鬼魔的名字，為取得好感獻羊給牠——但啟導本指出十七7嚴格規定不可獻祭給鬼魔，否定取悅曠野鬼神之說，認為比較合理的解釋是「阿撒瀉勒」原意指全民罪愆的「去除」，後來在以色列人的傳奇作品中把此字人格化了。GT《利未記雷氏研讀本》：這是「山羊」和「離開」兩字的結合，或作替罪的羔羊，活的羊是撤去的羊，象徵以色列人的罪被撤去。GT《利未記讀經綱目》則從另一角度理解：罪是從撒但而來，因此百姓身上的罪藉十字架的功效仍歸給撒但。
development: GT丁良才註解列出「阿撒瀉勒」指邪鬼或魔鬼一說的六個難處：(1)聖書上沒有一處稱撒但或魔鬼為阿撒瀉勒；(2)沒有一處說魔鬼是常在曠野居住的；(3)本章20-22節並沒有提到撒但；(4)本處的禮節和十四4-7、49-53節的禮節相似，但那裡的活鳥不過是放在田野裡，並不說是歸與魔鬼；(5)這活著的羊既與那被宰的羊是一個祭，也是一同被奉與神的，以後怎能再歸與魔鬼呢；(6)聖書上禁止人獻祭與野地的鬼魔。丁良才另提出「一鬮歸與阿撒瀉勒」或作「一鬮為完全除掉所贖的罪」之解，認為這羊是完成贖罪的大功，使百姓知道所贖的一切罪愆全然除去，東離西有多遠、神叫我們的過犯離我們也有多遠（詩一百零三12），神將百姓的罪投於深海（彌七19），這羊將百姓的罪帶到無人之地，神從此再不紀念（賽四十三25，四十四22，耶三十一34）；或說第一隻羊表明贖罪的方法，第二隻羊表示贖罪的結果。GT《舊約聖經背景註釋》則指出，將「阿撒瀉勒」解釋成專有名詞、大概是鬼魔的名字，是早期猶太釋經學者的理解，偽經以諾書（主前二世紀）就是例證；並引巴比倫人相信無人煙荒地中有阿盧鬼魔（alu-demon）居住為平行資料。GT倪柝聲《聖經問答》記載：有的人（像司可福）以為阿撒瀉勒是指基督，像利未記十四章的兩隻鳥一般；但倪柝聲自己相信阿撒瀉勒是撒但，並指出有聖經字典家以為這是一個偶像的名字，且第八節是以阿撒瀉勒與耶和華對峙。GT《聖經精讀本》另舉字源三說：「山羊」與「消失／走了」的組合詞、由「被逐的邪靈」發音演變而來、指山羊被逐後所居住的場所，但指出三說一致之處在於這隻山羊背負以色列的罪遠離他們，預表背負世人罪、走向各各他的基督代贖工作。
accumulations:
- book: 利未記
  chapter: 16
  summary: 經文三次出現「阿撒瀉勒」（8,10,26節），大祭司拈鬮定兩羊歸屬，一歸耶和華獻祭，一歸阿撒瀉勒活著安置、按手認罪、送往曠野無人之地。放羊者與燒祭牲者均須洗衣洗身才能進營。
  relation: 直接經文依據，呈現阿撒瀉勒在贖罪日儀式中的角色與操作細節；四來源對其歸屬（抽象除罪、地點、鬼魔專名、基督預表）意見分歧，構成本章最主要的解經爭議。
