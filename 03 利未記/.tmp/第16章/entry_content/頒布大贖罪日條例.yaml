status: formal
definition: 利未記第16章記載耶和華在亞倫兩個兒子拿答、亞比戶因近到耶和華面前而死之後，曉諭摩西頒布大贖罪日條例（利16:1-2）。耶和華指示亞倫不可隨時進聖所幔子內到施恩座前，並詳細規定了亞倫進聖所時當帶的祭牲、當穿的聖服、當行的洗身之禮（利16:3-4），以及為自己和本家並以色列全會眾贖罪的完整儀式（利16:5-28）。此條例定於每年七月初十日執行，以色列人要刻苦己心，什麼工都不可做，作為永遠的定例（利16:29-31）。亞倫照耶和華所吩咐摩西的行了（利16:34）。
