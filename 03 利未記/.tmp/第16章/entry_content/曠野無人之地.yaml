name: 曠野無人之地
type: 地點
secondary_types: []
aliases:
- 無人之地
- 隔絕之地
status: formal
definition: 利未記16:10,22,26 提到「曠野」與「無人之地」。贖罪日儀式中，歸阿撒瀉勒的活羊被派人送往曠野，擔當百姓罪孽帶到「無人之地」（16:22）。GT丁良才註解指出，這羊將百姓的罪帶到無人之地，神從此再不紀念（賽四十三25，四十四22，耶三十一34；詩一百零三12；彌七19）。放羊者須洗衣洗身才能進營（16:26），顯示曠野與罪的關聯。
development: GT《舊約聖經背景註釋》指出，早期猶太釋經學者的理解，偽經以諾書（主前二世紀）就是例證，將阿撒瀉勒理解為曠野鬼魔的專有名詞；並指出巴比倫人相信無人煙的荒地之中有阿盧鬼魔（alu-demon）居住，本節概念與此大抵相同；又引埃卜拉版片記載淨化某個陵墓的禮儀，是將所用的山羊放到乾草原地區去，為平行資料。
accumulations:
- book: 利未記
  chapter: 16
  summary: 第10節「打發人送到曠野去，歸與阿撒瀉勒」；第22節「要把這羊放在曠野，這羊要擔當他們一切的罪孽，帶到無人之地」；第26節「那放羊歸與阿撒瀉勒的人要洗衣服，用水洗身，然後進營」。
  relation: 經文指定阿撒瀉勒羊的去向與象徵意義，連結按手認罪與罪的徹底除去。
