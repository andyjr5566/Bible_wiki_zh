name: 兩隻公山羊（shnei se'irim）
type: 原文
secondary_types: []
aliases:
- 兩隻公山羊
status: formal
definition: 希伯來文 shnei se'irim，意為「兩隻公山羊」。在利未記第16章，以色列會眾需提供兩隻公山羊作為贖罪祭。這兩隻羊透過拈鬮分配，一隻歸與耶和華被宰殺獻祭，其血帶入幔子內彈在施恩座上；另一隻歸與阿撒瀉勒，活著被送到曠野，擔當百姓罪孽。兩隻羊共同預表基督贖罪與除罪的完整救恩。
accumulations:
- book: 利未記
  chapter: 16
  summary: 亞倫從以色列會眾取兩隻公山羊為贖罪祭，安置在會幕門口，一隻獻祭贖罪，一隻放逐擔罪。
  relation: 兩隻公山羊構成贖罪日為百姓贖罪的核心祭物，預表基督一次永遠的贖罪工作。
