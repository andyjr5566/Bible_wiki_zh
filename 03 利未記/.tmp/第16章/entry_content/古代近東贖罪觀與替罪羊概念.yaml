name: 古代近東贖罪觀與替罪羊概念
type: 文化
secondary_types: []
aliases:
- 替罪羊概念
- 古代近東贖罪觀
status: formal
definition: 利未記第16章的贖罪儀式與古代近東文化中的潔淨與除罪觀念有關聯，但具有獨特的以色列神學內涵。本章中兩隻公山羊的拈鬮儀式——一隻歸與耶和華獻為贖罪祭、一隻歸與阿撒瀉勒活著送到曠野（利16:7-10）——呈現了「替罪羊」的概念：活羊擔當以色列人諸般的罪孽過犯，被送到無人之地（利16:21-22）。古代近東文化中有將罪惡或污穢轉移至動物並驅逐至曠野的儀式習俗，但以色列的贖罪觀強調罪是向耶和華得罪，唯有耶和華所設立的血祭與罪的轉移才能使百姓脫盡一切罪愆、在耶和華面前得以潔淨（利16:30）。
accumulations:
- book: 利未記
  chapter: 16
  summary: 兩隻羊的拈鬮與活羊擔罪送至曠野的儀式，呈現以色列獨特的替罪羊贖罪觀。
  relation: 本章替罪羊概念與古代近東除罪習俗相關，但以耶和華為贖罪的唯一主體。
