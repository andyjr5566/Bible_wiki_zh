name: 公牛贖罪祭（par chatat）
type: 原文
secondary_types: []
aliases:
- 公牛贖罪祭
status: formal
definition: 希伯來文 par chatat，意為「公牛贖罪祭」。在利未記第16章，大祭司亞倫進聖所時需帶一隻公牛犢為贖罪祭，為自己和本家贖罪。亞倫需宰殺公牛，將其血用指頭彈在施恩座東面和前面七次，並將脂油在壇上焚燒。此祭物專為大祭司及祭司家族的罪愆贖罪，確保贖罪日儀式的聖潔。
accumulations:
- book: 利未記
  chapter: 16
  summary: 亞倫帶公牛犢為贖罪祭，為自己和本家贖罪，其血被帶入至聖所彈在施恩座上。
  relation: 公牛贖罪祭是贖罪日大祭司為自身贖罪的首要步驟，確保其能代表百姓在神面前贖罪。
related_entries:
