name: 香爐與香料（machtah u-ketoret）
type: 原文
secondary_types: []
aliases:
- 香爐與香料
status: formal
definition: 希伯來文 machtah u-ketoret，意為「香爐與香料」。在利未記第16章，亞倫進入至聖所時，需拿香爐從耶和華面前的壇上盛滿火炭，並拿一捧搗細的香料帶入幔子內。在耶和華面前把香放在火上，使香的煙雲遮掩法櫃上的施恩座，免得他死亡。這象徵大祭司在神威嚇的聖潔中需蒙遮蔽，以免因見神的面而死。
accumulations:
- book: 利未記
  chapter: 16
  summary: 亞倫帶香爐與火炭及搗細的香料進入幔子內，使香的煙雲遮掩施恩座，免得死亡。
  relation: 香爐與香料是贖罪日大祭司進入至聖所保命的必要遮蔽，預表基督救贖之恩的覆庇。
related_entries:
