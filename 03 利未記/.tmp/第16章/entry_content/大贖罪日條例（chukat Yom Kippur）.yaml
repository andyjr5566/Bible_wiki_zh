name: 大贖罪日條例（chukat Yom Kippur）
type: 原文
secondary_types: []
aliases:
- 大贖罪日條例
status: formal
definition: 希伯來文 chukat Yom Kippur，意為「贖罪日的律例」或「定例」。在利未記第16章結尾，神明定此日為以色列人永遠的定例：每年七月初十日，大祭司需在至聖所、會幕與壇行贖罪之禮，為眾祭司和會眾百姓贖罪；百姓需刻苦己心，什麼工都不可做。此條例確立了以色列人一年一次贖罪潔淨的永恆律例。
accumulations:
- book: 利未記
  chapter: 16
  summary: 神頒布永遠定例，每年七月初十日大祭司需為聖所及百姓贖罪，百姓需刻苦己心不可做工。
  relation: 大贖罪日條例總結了本章所有儀式的規範，成為以色列人世代守贖罪日的最高準則。
