name: 搗細香料遮掩施恩座
type: 主題
secondary_types: []
aliases:
- 搗細香料
- 香料遮掩
- 燒香遮掩施恩座
status: formal
definition: 利未記16:12-13 記載大祭司進至聖所前，從耶和華面前的壇（燔祭壇）取滿火炭的香爐，又拿一捧搗細的香料，帶入幔子內，在耶和華面前把香放在火上，使「香的煙雲遮掩法櫃上的施恩座，免得他死亡」。香料須搗細（研磨極細），煙雲遮掩施恩座，使大祭司不致因直視神榮光而死。此為大祭司進至聖所的必要前置動作。
development: GT丁良才註解描述大祭司贖罪日禮節：拿香爐，從燔祭壇上盛滿火炭；拿一捧搗細的香料，盛在金杯子裡；將香爐和香帶進至聖所，在耶和華面前把香放在火上，使香的煙雲遮蓋施恩座。
accumulations:
- book: 利未記
  chapter: 16
  summary: 第12-13節詳細記載大祭司取火炭、搗細香料入幔子內，燒香使煙雲遮掩施恩座，免得死亡。此為進至聖所彈血前的必要程序。
  relation: 連結大祭司進聖所條例（利16:2-3）、施恩座、香壇與基督代禱預表。
