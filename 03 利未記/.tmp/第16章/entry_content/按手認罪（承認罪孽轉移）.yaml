name: 按手認罪（承認罪孽轉移）
type: 主題
secondary_types: []
aliases:
- 按手認罪
- 承認罪孽轉移
- 按手禮
status: formal
definition: 利未記16:21 記載大祭司「兩手按在羊頭上，承認以色列人諸般的罪孽過犯，就是他們一切的罪愆，把這罪都歸在羊的頭上」。按手表認同與轉移，將會眾之罪象徵性轉移至祭牲。大祭司雙手按（非單手）顯示鄭重與完全轉移。
development: 贖罪日按手獨特之處在於：(1) 按手對象為活羊而非宰殺之羊；(2) 大祭司代表全會眾承認「諸般罪孽、過犯、一切罪愆」，範圍最廣；(3)
  罪被轉移後，羊被送往曠野無人之地。GT《啟導本聖經利未記註釋》指出，公牛、公羊的血不能「除去」人的罪（來十4），只可以暫時「遮蓋」；GT丁良才註解指出，猶太傳統後期將活羊推下懸崖致死，但這是與神所吩咐的不合。
accumulations:
- book: 利未記
  chapter: 16
  summary: 第21節詳細記載大祭司雙手按於活羊頭上，口頭承認以色列一切罪孽過犯，將罪歸於羊頭，再派人送往曠野。第22節總結：羊擔當一切罪孽，帶到無人之地。
  relation: 本章按手認罪儀式的高潮，連結拈鬮、阿撒瀉勒羊與曠野無人之地。
