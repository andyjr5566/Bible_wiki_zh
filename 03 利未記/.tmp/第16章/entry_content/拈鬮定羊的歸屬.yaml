- 掣鬮
status: formal
definition: 利未記16:7-9 記載大祭司將兩隻公山羊安置在會幕門口耶和華面前，為兩羊拈鬮，一鬮歸與耶和華，一鬮歸與阿撒瀉勒。拈鬮顯明哪隻羊為贖罪祭獻給神，哪隻羊作活羊擔當罪孽送往曠野。兩羊原為一祭（利16:5,10），拈鬮將其功能分別：歸耶和華的羊被宰，血帶入至聖所彈於施恩座；歸阿撒瀉勒的羊活著，按手認罪後被釋放。
development: GT丁良才註解描述當耶穌在世的時候猶太人拈鬮的作法：所拈的鬮是兩個等大而圓的金版，一刻「為耶和華」，一刻「為阿撒瀉勒」，放在一個瓶子裡，大祭司把瓶子搖一搖，兩手一齊插入瓶內各拿一鬮，將右手所拿的放在右邊之山羊的頭上，左手所拿的放在左邊之山羊的頭上，那一隻歸耶和華、那一隻歸阿撒瀉勒都是按鬮上的字定的；隨後把一塊朱紅色布綁在歸與阿撒瀉勒之羊的角上，又把一塊朱紅色布綁在歸與耶和華之羊的頸項上，作為分別的記號。
accumulations:
- book: 利未記
  chapter: 16
  summary: 7-9節描述拈鬮程序：兩羊安置會幕門口，拈鬮決定歸屬，歸耶和華的羊獻為贖罪祭，歸阿撒瀉勒的羊活著安置在耶和華面前用以贖罪，後送往曠野。
  relation: 本章拈鬮儀式的核心經文，決定兩羊命運與贖罪日雙重預表的基礎。
