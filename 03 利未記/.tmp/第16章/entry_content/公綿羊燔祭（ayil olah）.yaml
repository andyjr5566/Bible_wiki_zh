name: 公綿羊燔祭（ayil olah）
type: 原文
secondary_types: []
aliases:
- 公綿羊燔祭
status: formal
definition: 希伯來文 ayil olah，意為「公綿羊燔祭」。在利未記第16章，亞倫進聖所時需帶一隻公綿羊為燔祭，同時也要從會眾取一隻公綿羊為百姓作燔祭。在完成贖罪儀式、脫下細麻布衣服並洗身後，亞倫要獻上自己和百姓的燔祭，為自己和百姓贖罪。燔祭象徵完全奉獻與神悅納的馨香之氣。
accumulations:
- book: 利未記
  chapter: 16
  summary: 亞倫為自己和百姓各獻一隻公綿羊作燔祭，在贖罪儀式完成後獻上，為百姓贖罪。
  relation: 公綿羊燔祭在贖罪日作為贖罪後的奉獻，表明人在罪得潔淨後當全然獻給神。
related_entries:
- 贖罪日（Yom Kippur）
- 亞倫
