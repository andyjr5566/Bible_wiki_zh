name: 幔子裂開（太27：51；來10：19-20）
type: 互文
secondary_types: []
aliases:
- 幔子裂開
- 聖所幔子裂開
status: formal
definition: 利未記第16章記載亞倫不可隨時進聖所的幔子內、到施恩座前，免得死亡（利16:2）。大祭司一年一次帶著血進入幔子內為百姓贖罪（利16:14-15）。新約馬太福音27:51記載耶穌斷氣時，殿裡的幔子從上到下裂為兩半；希伯來書10:19-20指出弟兄們因耶穌的血得以坦然進入至聖所，是藉著祂給我們開了一條又新又活的路，從幔子經過，這幔子就是祂的身體。利未記中阻隔人至聖所的幔子，在基督受死時裂開，標誌著大祭司基督以自己的血一次永遠進入天上聖所，使信徒得以直接來到神面前。
