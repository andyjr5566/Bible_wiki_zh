- name: 施恩座（kapporet）
  type: 主題
  evidence: 利16:2,13-15「櫃上的施恩座...香的煙雲遮掩法櫃上的施恩座...彈在施恩座的東面」；CT註解：施恩座是約櫃上的蓋板，具有遮蓋罪的功用；BH：mercy seat = atonement cover
  surfaces:
