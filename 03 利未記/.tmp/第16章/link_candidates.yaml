  evidence: 利16:8,10,26「一鬮歸與阿撒瀉勒...打發人送到曠野去，歸與阿撒瀉勒」；CT註解：阿撒瀉勒意為完全除去，指罪被完全除去或歸給撒但；BH：scapegoat = removal of sin
  surfaces:
