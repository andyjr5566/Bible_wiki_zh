book: 利未記
chapter: 16
candidates:
  - name: 大贖罪日（Yom Kippur）條例
    type: 歷史
    evidence: 全章主旨；29-34節訂定七月初十日為永遠定例，大祭司一年一次為以色列全會眾贖罪。GT丁良才：本章完結一至十五章獻祭潔淨條例，是最合宜的安排（來十1-24）；GT精讀本：大贖罪日制度是以色列百姓和神因罪分隔的和解儀式；KC：這是全書的核心，回答聖潔的神如何能住在不聖潔的百姓中間並與他們相交
    surfaces:
      - {phrase: 每逢七月初十日, verses: [29]}

  - name: 阿撒瀉勒（Azazel）歸屬之爭
    type: 解經爭議
    evidence: v8, 10, 26；兩隻公山羊拈鬮，一歸耶和華一歸阿撒瀉勒。倪柝聲：「我自己相信阿撒瀉勒是撒但」，因阿撒瀉勒與耶和華對峙（詩106:37；申32:17；利17:7；代下11:15），有聖經字典家認為是偶像名字；GT丁良才詳列兩種解法各自理由：(一)指鬼魔撒但——但列出六個難處反駁（聖書無一處稱撒但為阿撒瀉勒、無一處說魔鬼常住曠野、20-22節未提撒但、與利14活鳥放生禮相似但活鳥不歸魔鬼、活羊與被宰羊是一個祭不能歸魔鬼、十七7禁獻祭鬼魔）；(二)指「完全除去」，即道成肉身的耶穌基督除盡人的罪。艾基斯《舊約聖經難題彙編》：「替罪羊」傳統起源較後期，與妥拉贖罪原則不符，此字割裂為「出逃之山羊」的英譯可能性不高，最一致的作法是視為專有名詞（鬼魔之名），但聖經從未指出撒但或魔鬼有贖罪功用，故「阿撒瀉勒代替撒但」的假設有誤；GT《舊約背景註釋》：早期猶太釋經（偽經以諾書）將阿撒瀉勒理解為鬼魔專有名詞，這羊是「放」給阿撒瀉勒（26節）而非「獻」給它（與十七7禁獻鬼魔相合）；GT《聖經精讀本》另引詞源說：或為「山羊」與「消失、走了」的組合詞，或由「被逐的邪靈」演變而來，各家一致同意此羊背負以色列的罪遠離他們，預表背負世人的罪、走向各各他的基督
    surfaces:
      - {phrase: 阿撒瀉勒, verses: [8, 10, 26]}

  - name: 拈鬮定羊的歸屬
    type: 主題
    evidence: v8「為那兩隻羊拈鬮，一鬮歸與耶和華，一鬮歸與阿撒瀉勒」。GT《舊約背景註釋》：拈鬮給主機會挑選作為祭物的羊；GT丁良才：猶太傳說用兩個等大圓金版分別刻耶和華與阿撒瀉勒之名放入瓶中，大祭司雙手同時各取一鬮，隨即繫朱紅色布為記號
    surfaces:
      - {phrase: 拈鬮, verses: [8]}

  - name: 兩隻公山羊的雙重預表
    type: 神學
    evidence: 5, 8-10節；KC：兩隻羊代表贖罪真理的兩面——歸耶和華的羊代表基督成就神一切聖潔要求的工作，使和好的提議可以向萬人發出（提前2:3-6）；被送走的羊代表確據，承擔的是「屬神百姓」的罪（21節），非世人普遍的罪，因基督捨命是「作多人的贖價」（太20:28）而非「for all」。GT《利未記讀經綱目》：一隻歸神表明基督為神的羔羊解決了我們的罪，一隻歸阿撒瀉勒表明罪藉十字架的功效仍歸給撒但；GT賈斯樂郝威《聖經難解經文詮釋手冊》回應來10:14「一次獻祭」的難題：兩隻羊呈現的是基督同一次贖罪工作的不同觀點，非兩次獻祭——被殺的羊表死並流血贖罪，放生的羊表罪孽被帶走

  - name: 按手認罪（承認罪孽轉移）
    type: 主題
    evidence: v21「兩手按在羊頭上，承認以色列人諸般的罪孽過犯，就是他們一切的罪愆，把這罪都歸在羊的頭上」。GT丁良才：按原文一般按手是單數「手」字，本節特別用兩隻手，是越發鄭重的意思；KC：按手是認同的表示，隨後承認一切罪愆，將罪如同放在羊身上，預表基督在神面前承認信徒的每一項罪為己罪，並擔當了審判（來8:12；賽38:17；彌7:19；詩103:12）
    surfaces:
      - {phrase: 兩手按在羊頭上, verses: [21]}
      - {phrase: 承認以色列人諸般的罪孽過犯, verses: [21]}

  - name: 曠野無人之地
    type: 地點
    evidence: v22「要把這羊放在曠野，這羊要擔當他們一切的罪孽，帶到無人之地」。GT丁良才：曠野即無人之地，讓活羊獨自擔當以色列人的一切罪愆；串珠：叫羊永不能自己轉回，也不會被人尋見帶回來
    surfaces:
      - {phrase: 帶到無人之地, verses: [22]}

  - name: 搗細香料遮掩施恩座
    type: 主題
    evidence: 12-13節；大祭司拿香爐盛滿聖火壇的火炭，又拿一捧搗細的香料帶入幔子內，在施恩座前放香於火上，使香的煙雲遮掩施恩座，免得他死亡。GT丁良才：這火表示神完全的聖潔，一捧搗細的香料預表耶穌完全的功勞；KC：香雲代表基督本身一切的榮美所發的馨香之氣，不像亞倫因是罪人須靠香雲免死，基督進入聖所不需要香
    surfaces:
      - {phrase: 搗細的香料, verses: [12]}
      - {phrase: 香的煙雲遮掩法櫃上的施恩座, verses: [13]}

  - name: 彈血於施恩座與壇（大祭司一年一度贖罪禮）
    type: 主題
    evidence: 14, 15, 18-19節；公牛血用指頭彈在施恩座東面一次、前面七次；隨後宰百姓的贖罪祭公山羊，血同樣彈於施恩座上面和前面；出至壇前，取公牛血和公山羊血抹在壇上四角周圍，又用指頭彈血七次潔淨壇，使壇成聖。GT精讀本：彈血七次表示動物的血不完全，同時象徵將來「一次完全」灑上的基督寶血（來7:27；9:12）；KC：施恩座上的血是為神，一次即足；施恩座前的血是為祭司，彈七次使人得絕對確據可以因血的價值站立在那裡
    surfaces:
      - {phrase: 用指頭彈在施恩座的東面, verses: [14]}
      - {phrase: 彈血七次, verses: [14, 19]}

  - name: 洗身（水洗）
    type: 神學
    evidence: 4, 24節；亞倫進聖所前及獻完贖罪祭後，兩度在聖處用水洗全身，然後才穿戴聖服或平日禮服。GT丁良才：眾祭司平常進聖所只洗手腳，但大祭司當贖罪日每換衣服卻要遍洗全身，表明親近神必須全然聖潔；猶太傳說大祭司當日洗全身換聖服共五次

  - name: 聖衣（祭司聖服）
    type: 主題
    evidence: v4「要穿上細麻布聖內袍，把細麻布褲子穿在身上，腰束細麻布帶子，頭戴細麻布冠冕；這都是聖服」。本章大祭司進至聖所所穿為單純白色細麻四件（內袍、褲子、帶子、冠冕），與平日以弗得、胸牌等華美七件聖衣不同——GT丁良才：大祭司須先脫下華美聖服才能穿此簡樸細麻服；KC：白色細麻服說明基督個人的純潔與義行，祂親自完成十字架工作時不是顧念百姓的軟弱，而是使自己與百姓的罪成為一體
    surfaces:
      - {phrase: 細麻布聖內袍, verses: [4]}
      - {phrase: 這都是聖服, verses: [4]}

  - name: 施恩座
    type: 主題
    evidence: 2, 13, 14, 15節；本章是施恩座在歷史上唯一被使用的場合——大祭司一年一次在此彈血贖罪。GT丁良才：施恩座原文字根有「遮蓋」之意，是約櫃上面精金厚蓋板，具「遮蓋罪或贖罪」的功用；GT《舊約背景註釋》：此詞所指是設於約櫃上方的長方形實心金版，一說源自埃及語「讓人歇腳之處」

  - name: 至聖所
    type: 地點
    evidence: 2, 3, 12, 15, 16, 17, 20, 23, 27, 33節；本章反覆稱「聖所」實指幔子內的至聖所，是大祭司一年僅能進入一次之處。GT丁良才：本章每提「聖所」多指幔子以內即至聖所

  - name: 內幔（隔聖所至聖所的幔子）
    type: 主題
    evidence: 2, 12, 15節；亞倫不可隨時進聖所的幔子內。GT丁良才：這幔子上有基路伯，使人想起伊甸園基路伯把守生命樹的道路（創3:23-24）；幔子預表主耶穌的身體（來10:19-20），白細麻表祂聖潔、藍色線表屬天、紫色線表尊榮、朱紅色線表所受苦楚；主耶穌死時殿裡的幔子從上到下裂為兩半（太27:51），開了又新又活的路

  - name: 會幕門口
    type: 地點
    evidence: v7「也要把兩隻公山羊安置在會幕門口、耶和華面前」，拈鬮之處

  - name: 亞倫
    type: 人物
    evidence: 全章主角，以大祭司身分一年一度為自己、本家、祭司與以色列全會眾行贖罪之禮；v34「於是，亞倫照耶和華所吩咐摩西的行了」

  - name: 拿答
    type: 人物
    evidence: v1「亞倫的兩個兒子近到耶和華面前死了」，直接承接利10:1-2拿答亞比戶獻凡火被神火燒死之事，作為本章條例訂立的歷史背景

  - name: 亞比戶
    type: 人物
    evidence: v1 與拿答並提，GT精讀本：在贖罪日條例前記錄此事，暗示①祭司到神面前的事何等重要②人應按神所指示的律例到神面前

  - name: 營外焚燒（machutz la-machaneh saraf）
    type: 主題
    evidence: v27「作贖罪祭的公牛和公山羊的血既帶入聖所贖罪，這牛羊就要搬到營外，將皮、肉、糞用火焚燒」。GT丁良才：大贖罪日所獻祭牲之肉因血已帶入至聖所，祭司不能吃，須全部搬到營外燒掉；CT靈意：表徵接受救恩的人要到營外與基督一同受苦（來13:11-13）

  - name: 紅母牛預表基督城外受苦（來13：11-12）
    type: 互文
    evidence: CT靈意於v27明確引用「作贖罪祭的…牛羊就要搬到營外，將皮、肉、糞用火焚燒」表徵「接受救恩的人要到營外，與基督一同受苦（參來十三11~13）」；KC同段：「營外」是基督徒的位置（Heb 13:11-13），跟隨主耶穌，因祂在營外受苦。本章贖罪祭牛羊營外焚燒與既有條目所載民數記19章紅母牛營外焚燒同引來13:11-13為互文根據，屬同一預表脈絡的另一實例

  - name: 刻苦己心（禁食悔改）
    type: 主題
    evidence: 29, 31節；本地人與寄居外人這日都要刻苦己心，什麼工都不可做。GT丁良才：刻苦己心不能除掉罪惡，卻能叫人憎惡罪惡，是禁食禱告；GT精讀本：希伯來語動詞ana（刻苦己心）也用於賽58:5論禁食之日，被視為律法規定的正式禁食日
    surfaces:
      - {phrase: 刻苦己心, verses: [29, 31]}

  - name: 聖安息日（大贖罪日雙重安息）
    type: 主題
    evidence: v31「這日你們要守為聖安息日」。GT丁良才：原文除安息日外，只有大贖罪日稱為「聖」字，是「安息的安息日」，比尋常安息日更嚴——尋常聖會日只禁勞碌的工，本日則什麼工都不可做，違者從民中剪除（二十三30）；GT精讀本：希伯來語「安息的安息日」強調此日極為重要
    surfaces:
      - {phrase: 聖安息日, verses: [31]}
