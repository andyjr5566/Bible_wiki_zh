- name: 贖罪日（Yom Kippur）
  type: 原文
  evidence: 利16:29-34「這要作你們永遠的定例...一年一次為以色列人贖罪」；CT註解：大贖罪日是以色列宗教禮儀中最重要的節日；BH：Day of Atonement = most solemn day
  surfaces:
