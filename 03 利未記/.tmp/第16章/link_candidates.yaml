- name: 兩隻鳥預表基督死而復活
  type: 主題
  evidence: 利16:5-10 兩隻公山羊是一個贖罪祭。丁良才：「這兩隻山羊是一個祭（5注），要表示基督因死而復活所成就之救人的大功，所以必須有兩隻（參十四4）」——利14:4-7 的兩隻鳥與本章的兩隻羊是同一個預表：一死一放，一血一自由。他並記猶太遺風：「這兩隻公山羊的大小、毛色和價格是必須一樣的（參十四4第二注）。」賈斯樂郝威：「第一隻公山羊被殺，牠的血被彈灑在施恩座上，表示基督為我們的罪代我們死並且流血……另一隻山羊……表示羊將以色列人的罪孽帶走（賽53:6）。」丁良才總結：「第一隻羊是表明贖罪的方法，第二隻羊是表示贖罪的結果（賽53:6、11-12，約1:29，來9:26、28，彼前2:24）。」
  surfaces:
  - 預表基督死而復活
