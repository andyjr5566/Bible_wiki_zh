"book": "利未記"
"chapter": !!int "16"
"updates":
- "title": "洗身（水洗）"
  "path": "link_folder/神學/洗身（水洗）.md"
  "summary": "v4,24 大祭司進聖所前及獻完贖罪祭後，兩度在聖處用水洗全身，然後才穿戴聖服或平日禮服。GT丁良才：眾祭司平常進聖所只洗手腳，但大祭司當贖罪日每換衣服卻要遍洗全身，表明親近神必須全然聖潔；猶太傳說大祭司當日洗全身換聖服共五次，洗手洗腳共十次。"
  "relation": "本章是洗身條例在大祭司贖罪日禮儀中最嚴格的實例，兩次全身水洗遠超過眾祭司平日只洗手腳的常例。"
- "title": "聖衣（祭司聖服）"
  "path": "link_folder/主題/聖衣（祭司聖服）.md"
  "summary": "v4 大祭司進至聖所所穿為單純白色細麻四件（內袍、褲子、帶子、冠冕），與平日以弗得、胸牌等華美七件聖衣不同。GT丁良才：大祭司須先脫下華美聖服才能穿此簡樸細麻服。"
  "relation": "本章記載大祭司在贖罪日獨有的簡樸細麻聖服，與平日華美聖服形成對比，象徵謙卑親近神。"
- "title": "施恩座"
  "path": "link_folder/主題/施恩座.md"
  "summary": "v2,13,14,15 本章是施恩座在利未記中唯一被使用的場合——大祭司一年一次在此彈血贖罪。GT丁良才：施恩座原文字根有「遮蓋」之意；GT《舊約背景註釋》：此詞所指是設於約櫃上方的長方形實心金版。"
  "relation": "本章是施恩座功能實際運作的核心場景，前面章節僅記載其造法，本章記載其贖罪功用的具體實踐。"
- "title": "至聖所"
  "path": "link_folder/地點/至聖所.md"
  "summary": "v2,3,12,15-17,20,23,27,33 本章反覆稱「聖所」實指幔子內的至聖所，是大祭司一年僅能進入一次之處。GT丁良才：本章每提「聖所」多指幔子以內即至聖所，大祭司在贖罪日共進入四次。"
  "relation": "本章是至聖所唯一合法進入時機與條件的規範所在，確立大祭司一年一度進入的條例。"
- "title": "內幔（隔聖所至聖所的幔子）"
  "path": "link_folder/主題/內幔（隔聖所至聖所的幔子）.md"
  "summary": "v2,12,15 亞倫不可隨時進聖所的幔子內。GT丁良才：這幔子上有基路伯，使人想起伊甸園基路伯把守生命樹的道路（創3:23-24）；幔子預表主耶穌的身體（來10:19-20）。"
  "relation": "本章確立進入幔子內至聖所的嚴格條例與唯一合法時機，是幔子隔絕功能最完整的條例展示。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "v7 大祭司把兩隻公山羊安置在會幕門口、耶和華面前，為兩羊拈鬮之處。"
  "relation": "本章會幕門口是拈鬮定羊儀式的地點，延續其作為儀式執行場所的一貫用法。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "全章主角，以大祭司身分一年一度為自己、本家、祭司與以色列全會眾行贖罪之禮；v34「於是，亞倫照耶和華所吩咐摩西的行了」。"
  "relation": "本章是亞倫大祭司職分最核心的展現——唯一被授權一年一次進入至聖所執行贖罪禮的人。"
- "title": "拿答"
  "path": "link_folder/人物/拿答.md"
  "summary": "v1「亞倫的兩個兒子近到耶和華面前死了」，直接承接利10:1-2拿答亞比戶獻凡火被神火燒死之事，作為本章條例訂立的歷史背景。"
  "relation": "本章條例的訂立直接因拿答之死而起，作為警戒不可隨意進至聖所的歷史例證。"
- "title": "亞比戶"
  "path": "link_folder/人物/亞比戶.md"
  "summary": "v1 與拿答並提，GT《聖經精讀本》：在贖罪日條例前記錄此事，暗示祭司到神面前的事何等重要，人應按神所指示的律例到神面前。"
  "relation": "本章條例的訂立直接因亞比戶之死而起，與拿答並列為警戒例證。"
- "title": "營外焚燒（machutz la-machaneh saraf）"
  "path": "link_folder/主題/營外焚燒（machutz la-machaneh saraf）.md"
  "summary": "v27「作贖罪祭的公牛和公山羊的血既帶入聖所贖罪，這牛羊就要搬到營外，將皮、肉、糞用火焚燒」。GT丁良才：大贖罪日所獻祭牲之肉因血已帶入至聖所，祭司不能吃，須全部搬到營外燒掉。"
  "relation": "本章是營外焚燒條例在大贖罪日贖罪祭牲上的又一次應用，與利未記4、8、9章的先例一致。"
- "title": "紅母牛預表基督城外受苦（來13：11-12）"
  "path": "link_folder/互文/紅母牛預表基督城外受苦（來13：11-12）.md"
  "summary": "v27 贖罪祭牛羊營外焚燒，CT靈意：表徵「接受救恩的人要到營外，與基督一同受苦（參來十三11-13）」；KC同段：「營外」是基督徒的位置（來13:11-13），跟隨主耶穌，因祂在營外受苦。"
  "relation": "本章贖罪祭牛羊營外焚燒與既有條目所載民數記19章紅母牛營外焚燒同引來13:11-13為互文根據，屬同一預表脈絡的另一實例。"
