book: 利未記
chapter: 16
updates:
- title: 施恩座
  path: link_folder/主題/施恩座.md
  summary: 利16:2、13-15 大贖罪日的核心動作全繞著施恩座：神從雲中顯現在施恩座上；香的煙雲要遮掩它；公牛與公山羊的血要彈在它的東面與前面。《啟導本》指出譯名問題：原文 kapporet，「譯為『施恩座』並不很恰當……此詞的正確譯法應為『蓋』」，「座」的觀念可能來自詩99:1。《舊約背景註釋》同讀：「所有譯本其實都是臆測而已」，並記一說謂此字或與埃及語「歇腳之處」諧音，與約櫃稱為神的腳凳相合。KC
    讀出彈血次數的分別：施恩座上的血是為著神，「一次就夠了」；施恩座前的血彈七次，「是要給我們絕對的確據」。
  relation: 本章是施恩座在全卷唯一「被使用」的場合——平日它藏在幔內無人得見，一年只有這一天，血才臨到它上面。
- title: 彈血七次
  path: link_folder/事件/彈血七次.md
  summary: 利16:14、19 大贖罪日兩處彈血七次：施恩座前的地上、以及燔祭壇上。KC 讀出 v14 一次與七次的分別：施恩座上的血是為著神——「一次就夠了。祂完全知道那血的價值」；施恩座前彈七次是為著祭司——「是要給我們絕對的確據：我們能在那裡，是因著那血的價值」。《精讀本》：「彈血七次表示動物的血不完全，同時象徵將來『一次完全』灑上的基督寶血（來7:27; 9:12）。」
  relation: 利4 的彈血七次在聖所的幔子前；本章推進到至聖所施恩座前與燔祭壇上——一年中血所能到達的最深處。
- title: 曠野
  path: link_folder/地點/曠野.md
  summary: 利16:10、21-22 歸與阿撒瀉勒的羊由所派之人送到曠野、放在無人之地。《串珠》解「無人之地」：「叫羊永不能自己轉回，也不會被人尋見帶回來。」丁良才記後世的走樣：耶穌時代猶太人把羊推下懸崖，「但這是與神所吩咐的不合」——經文只說「放」。《舊約背景註釋》舉巴比倫平行：荒地被信為阿盧鬼魔（alu-demon）所居；埃卜拉版片也有把山羊放到乾草原淨化陵墓的禮儀。
  relation: 曠野在本章是罪被帶往的終點：「這羊要擔當他們一切的罪孽，帶到無人之地」（v22）。KC：「罪在哪裡，哪裡就沒有神的居所。」
- title: 兩隻鳥預表基督死而復活
  path: link_folder/主題/兩隻鳥預表基督死而復活.md
  summary: 利16:5-10、20-22 兩隻公山羊是一個贖罪祭：一隻歸耶和華被宰、血帶入幔內；一隻歸阿撒瀉勒，擔當諸罪送到無人之地。丁良才：「這兩隻山羊是一個祭（5注），要表示基督因死而復活所成就之救人的大功，所以必須有兩隻（參十四4）」，並記猶太遺風：兩羊須大小、毛色、價格一樣。他總結：「第一隻羊是表明贖罪的方法，第二隻羊是表示贖罪的結果。」KC 則從兩羊讀出「為多人」與「為萬人」的分別：歸耶和華的羊代表神聖潔的要求全然滿足、和好可以提供給萬人；被送走的羊只擔當「凡屬神百姓之人」承認了的罪——「祂捨命作多人的贖價」（太20:28）。
  relation: 利14 的兩隻鳥與本章的兩隻羊是同一個預表的兩次出現：一死一放、一血一自由。鳥為個人的潔淨，羊為全國的贖罪——規模不同，圖畫相同。
- title: 拿答、亞比戶
  path: link_folder/人物/拿答、亞比戶.md
  summary: 利16:1「亞倫的兩個兒子近到耶和華面前死了。死了之後，耶和華曉諭摩西說」——大贖罪日條例以他們的死開場。丁良才：「憑本章1-2節的話，有人以為拿答、亞比戶有意要進至聖所燒香（利10:1注）。」KC 讀出這個開場的份量：本章的起點是「地上最蒙特權的兩個人的死。如果連他們都不能不死地進入神的同在，人的全然敗壞就定案了。那麼人到底要怎樣才能親近神？神在本章用圖畫啟示了這條路」。
  relation: 他們的死是大贖罪日條例的直接背景：v2 隨即禁止亞倫「不可隨時進聖所的幔子內」。利10 記事件本身，本章把事件轉成制度——一年一次、帶血、燒香遮掩施恩座，缺一即死。
