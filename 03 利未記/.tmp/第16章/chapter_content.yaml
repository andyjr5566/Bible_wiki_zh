organization: "### 緣起與進入至聖所的嚴格限制（v1-2）\n\n本章開篇即點出立法背景：[[亞倫]]的兩個兒子[[拿答]]、[[亞比戶]]因獻凡火在耶和華面前死亡（參利10：1-2），神隨後曉諭摩西，嚴禁亞倫「不可隨時進聖所的幔子內、到櫃上的[[施恩座]]前」（v2）。[[至聖所]]內有約櫃與施恩座，是神從雲中顯現、與人相會的地方（出25：22），凡未按禮進入者必死。CT\
  \ 指出此規定「表徵神的僕人不可憑自己的功績進到神面前」；KC 則強調幔子預表基督的身體（來10：19-20），主死時幔子裂開，信徒如今可「坦然無懼地來到施恩的寶座前」（來4：16）。BH\
  \ 解釋「雲中顯現」代表神的榮耀同在，預表道成肉身的基督（西1：15）。這段經文確立了大贖罪日唯一合法進入至聖所的時機與條件。\n\n### 大祭司預備與獻祭流程（v3-19）\n\
  \n亞倫進入至聖所前須完成嚴謹預備：  \n1. **祭牲**：為自己和本家帶一隻公牛犢作贖罪祭、一隻公綿羊作燔祭（v3）；為會眾取兩隻公山羊作贖罪祭、一隻公綿羊作燔祭（v5）。\
  \  \n2. **聖衣**：換上細麻布[[聖衣（祭司聖服）|聖服]]——內袍、褲子、帶子、冠冕，並[[洗身（水洗）|用水洗身]]（v4）。CT 視此為「自己分別為聖，然後穿戴基督」（羅13：14）；GT\
  \ 引猶太傳統說大祭司贖罪日當天要五次洗身、十次洗手腳，顯示親近神須全然聖潔。  \n3. **拈鬮**：在[[會幕門口]]為兩隻公山羊拈鬮，一歸耶和華（被宰）、一歸阿撒瀉勒（活著送入曠野）（v7-10）。\
  \  \n\n隨後進入至聖所的具體步驟（v11-19）可用流程圖概括：\n\n```mermaid\nflowchart TD\n  A[宰公牛為自己和本家贖罪]\
  \ --> B[拿香爐盛聖壇火炭、搗細香料入幔內]\n  B --> C[燒香使煙雲遮掩施恩座]\n  C --> D[取公牛血彈施恩座東面一次、前面七次]\n\
  \  D --> E[宰歸耶和華的公山羊為百姓贖罪]\n  E --> F[帶羊血入幔內同樣彈血]\n  F --> G[為至聖所、會幕、燔祭壇抹血潔淨]\n\
  ```\n\n關鍵細節：  \n- **香煙遮掩施恩座**（v13）：KC 指出這預表基督代禱的功效，使信徒蒙悅納；BH 說香代表聖徒禱告上達（啟8：3-4）。\
  \  \n- **彈血七次**（v14,15,19）：「七」表完全。KC 對比：公牛血在施恩座東面只彈一次（神已滿意），前面彈七次（給祭司絕對確據）；山羊血同樣處理。\
  \  \n- **為聖所與壇贖罪**（v16,18-19）：因百姓污穢使聖所、會幕、壇蒙污，須用血潔淨。CT 解為「蒙恩之人因舊造敗壞，致使聖所在污穢中，故須贖罪」；KC\
  \ 則強調基督在十字架上滿足神公義，使壇成聖。  \n- **獨自進入**（v17）：「會幕裡不可有人」，預表基督獨自成就救贖（來9：12）。\n\n### 代罪羊儀式與罪的完全除去（v20-22）\n\
  \n完成聖所潔淨後，亞倫把活著的公山羊奉上，**兩手按在羊頭上**，承認以色列人「諸般的罪孽、過犯、一切的罪愆」，把罪歸在羊頭上，派人送入曠野「無人之地」（v21-22）。這是全章神學高峰，來源間對「阿撒瀉勒」解讀分歧極大，必須並陳：\n\
  \n| 觀點 | 代表來源 | 核心論據 |\n|------|----------|----------|\n| 指魔鬼/撒但 | CT、倪柝聲、GT《舊約背景註釋》\
  \ | 1. 與耶和華對峙（v8）；2. 羊被「放」給阿撒瀉勒而非「獻」（v26）；3. 向魔鬼顯明罪已完全除去（彌7：19）。 |\n| 指基督/罪的完全除去\
  \ | 丁良才、KC、GT《啟導本》 | 1. 經文無處稱阿撒瀉勒為魔鬼；2. 兩羊本是「一個祭」（v5）；3. 羊擔當罪孽帶到無人之地，預表基督除去罪（賽53：6、約1：29）。\
  \ |\n| 字義「完全移去」 | BH、艾基斯 | 希伯來詞根意「移去、分離」；七十士譯本譯「被送走之羊」；後期猶太傳說才人格化為魔鬼。 |\n\nKC 指出兩羊雙重預表：被宰羊滿足神公義（挽回祭，羅3：25）；活羊顯明罪被「東離西有多遠」除去（詩103：12）。GT《精讀本》強調按手象徵轉移，派人送羊確保不返回。這儀式生動宣告：神不再紀念百姓的罪（賽43：25）。\n\
  \n### 善後潔淨與永遠定例（v23-34）\n\n儀式尾聲強調潔淨與制度化：  \n1. **亞倫更衣沐浴**（v23-24）：脫下細麻布衣服放在會幕，在聖處[[洗身（水洗）|洗身]]，穿上常服，獻上自己與百姓的燔祭。CT\
  \ 解為「神的僕人要謹慎自己和教訓」（提前4：16）。  \n2. **脂油焚燒**（v25）：贖罪祭公牛、公山羊的脂油在壇上焚燒，表徵基督蒙神悅納。  \n\
  3. **相關人員潔淨**（v26,28）：放羊者、焚燒者皆須洗衣、洗身才能進營，顯示接觸罪污須潔淨。  \n4. **祭牲營外焚燒**（v27）：贖罪祭牲皮肉糞搬到[[營外焚燒（machutz\
  \ la-machaneh saraf）|營外焚燒]]，KC、CT 同指這預表信徒「出到營外就了祂，忍受凌辱」（來13：11-13，參[[紅母牛預表基督城外受苦（來13：11-12）|紅母牛預表基督城外受苦]]）。\
  \  \n5. **永遠定例**（v29-34）：每年七月初十日（提斯利月）守為「聖安息日」，「刻苦己心」（禁食悔改），「什麼工都不可做」，本地人與寄居外人同遵。大祭司世襲承接此職（v32），一年一次為聖所、會幕、壇、祭司、會眾贖罪（v33-34）。BH\
  \ 指出這日後稱「贖罪日」（Yom Kippur），是猶太曆最莊嚴一日。\n\n### 跨章預表：基督作大祭司成就永遠贖罪\n\n利未記16章是希伯來書9-10章的舊約底本。KC、CT、BH\
  \ 一致列出關鍵對照：\n\n| 利未記16章（影兒） | 希伯來書/新約（真像） |\n|-------------------|----------------------|\n\
  | 大祭司有罪，先為自己獻祭（v6,11） | 基督無罪，不須為自己獻祭（來7：26-27） |\n| 牛羊血，每年重複進人手所造聖所（v14-15,34） |\
  \ 基督用自己的血，一次進入天上真聖所（來9：12,24） |\n| 血只能遮蓋罪，不能除去（來10：4） | 基督一次獻祭，永遠成全被聖潔的人（來10：14）\
  \ |\n| 祭司站著事奉，工作未完（v17） | 基督獻完祭，坐在神右邊（來10：11-12） |\n| 代罪羊帶罪入曠野（v22） | 基督擔當我們罪，釘十字架在城外（來13：12）\
  \ |\n| 幔子阻隔，唯大祭司一年一度可入（v2） | 基督肉身裂開幔子，信徒隨時可進至聖所（來10：19-20） |\n\nCT 總結：「重複證明只是象徵，能力在指向基督的獻祭」；KC\
  \ 強調「基督的工作是一次完成、永遠有效」。本章儀式每一細節——洗身、聖衣、香煙、彈血、按手、營外焚燒——都在多維度預表基督作大祭司、祭物、代禱者、除罪者的完全工作。信徒今日既藉耶穌的血有坦然進入至聖所的路（來10：19），當「存著誠心和充足的信心來到神面前」（來10：22），並在「營外」與基督同受凌辱，等候祂再顯現。"
