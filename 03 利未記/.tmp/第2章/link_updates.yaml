book: 利未記
chapter: 2
updates:
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: |
    利2 中祭司的職責：接受獻祭者帶來的素祭（v2、8），從細麵中取出一把、並取些油和所有的乳香，作為紀念燒在壇上（v2、9、16）。素祭所剩的歸給亞倫和他的子孫，是「獻與耶和華的火祭中為至聖的」（v3、10）。丁良才記其分配細則：所剩的麵歸亞倫子孫的男丁大家均分（利7:10），烤餅時不得攙酵（利6:17），且須在聖處吃（利6:16）。
  relation: |
    本章確立祭司「靠壇得分」的供養原則——素祭是祭司日常食糧的來源之一。但這特權有嚴格界線：至聖之物只能在聖處吃，不能用以供養家庭（民18:9-10）。《啟導本》指出這條例的防弊用意：「本條例在祭司職位應享的特權與祭司私人的財產之間劃清界限，防止人濫用特權。在日後以色列人祭司制度腐敗之時，確有祭司利用其特殊身分圖利的事（撒上2:12-22）。」另有一條反向的例外：祭司自己獻的素祭不可吃，要全燒在壇上（利6:23）——供養是恩典，不是祭司獻祭的目的。KC 由此讀新約：「No one but the priest may bring the offering. He is called by God（來5:4）。」
- title: 燒在壇上
  path: link_folder/事件/燒在壇上.md
  summary: |
    利2 中只有「作為紀念」的一把被燒在壇上（v2、9、16），其餘歸祭司——這與燔祭的「全燒」形成明確對比。丁良才解釋這個份量差別的用意：「這一把被燒在壇上，為要使這祭與壇上的血祭相連，但所燒的，只是一把，大概是因為這祭所表示的不是注重耶穌為我們捨命，乃是注重耶穌聖潔無玷污的生活。」但乳香是例外——「所有的乳香」都要燒上，祭司不可留下一點（v2、16）。
  relation: |
    燔祭全燒、素祭只燒一把，兩者的差別正對應所預表的內容：燔祭是死，素祭是生。酵和蜜則是不可燒的一類（v11-12）——不是不可獻，而是不可上壇：「這些物要獻給耶和華作為初熟的供物，只是不可在壇上獻為馨香的祭。」丁良才：「這些物要歸與祭司（民18:13，申18:4）。」
- title: 馨香的火祭
  path: link_folder/神學/馨香的火祭.md
  summary: |
    利2:2、9、16 素祭的紀念部分燒在壇上，「是獻與耶和華為馨香的火祭」。素祭與燔祭、平安祭同列為馨香的火祭；贖罪祭則不然。KC 指出素祭得以成為馨香，關鍵在於它經過火：「All kinds are exposed to the fire. Fire represents the testing holiness of God. Through the fire, the life of the Lord Jesus only produces a soothing aroma to God.」
  relation: |
    利2 為「馨香的火祭」補上一個利1 沒有的維度：馨香不只出於死（燔祭），也出於生（素祭）。CT：「表徵耶穌基督一生全然為神而活，是神所喜悅的愛子（太3:17）。」而 v11-12 劃出界線——有酵有蜜的初熟供物可以獻，卻「不可在壇上獻為馨香的祭」，《精讀本》：「象徵腐敗和罪惡的物在耶和華面前不能成為馨香的火祭。」故「馨香」有其資格門檻，不是凡獻上的都算。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    利2 中素祭要「帶到亞倫子孫作祭司的那裡」（v2）、「帶到耶和華面前，並奉給祭司，帶到壇前」（v8）。丁良才據此區分兩種烤餅的地點：「為會眾所用之素祭的餅是利未人在聖所的院子裡烤的（代上23:28-29，結46:20），但百姓為自己所獻的餅大概是在家中烤的。」並指出界線：「百姓只能將祭物奉上，唯有祭司可以獻在壇上。」
  relation: |
    利1 的燔祭牲要牽到會幕門口，利2 的素祭同樣要帶到耶和華面前——會幕是一切獻祭的唯一地點，人不能在別處就近神。但素祭多了一層家常的味道：餅可以在自家烤好再帶來。至聖之物的食用也綁定會幕空間——素祭所剩必須在聖處（會幕院內）吃，不可帶回家（民18:9-10）。
- title: 鹽約
  path: link_folder/神學/鹽約.md
  summary: |
    利2:13 是「鹽約」在利未記的核心經文：「凡獻為素祭的供物都要用鹽調和，在素祭上不可缺了你神立約的鹽。一切的供物都要配鹽而獻。」KC 注意到鹽在這一節裡出現三次。丁良才記其風俗來歷：「按亞西的風俗，人若一同吃餅與鹽，便是好朋友。亞拉伯人立約的時候把鹽放在刀上，立約的人各都取一點吃，從此就算是至厚的朋友，所以俗語叫做鹽約。」並引拉4:14「我們既食禦鹽，不忍見王吃虧」為佐證。範圍不限素祭——「不但在各種素祭上必須加鹽，一切別的祭物也都要配鹽而獻（結43:24），在聖香中也須有鹽（出30:35）」。
  relation: |
    鹽與酵在本章是一對反命題：酵必須除盡，鹽不可缺少。《舊約聖經背景註釋》點出兩者的物理關係就是象徵關係：「鹽能防止發酵，酵若是悖逆的象徵，鹽自然就代表抑制悖逆的事。」同一份來源另記下鹽的反面——鹽也象徵不產，故用於條約的咒詛：一個赫人條約的見證人宣告「若是毀約，願這人和這人的家和他的土地，像鹽沒有種子一樣沒有後嗣」。守約是保存，毀約是絕嗣，同一樣東西兩個方向。KC 讀其對基督的意義：「the offering of the Lord Jesus keeps its value forever. The pleasure and the pleasant smell of the offering are not short-lived, transient, but permanent.」
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    利2 中燔祭雖非本章主題，卻是素祭的必要背景。丁良才：「素祭和燔祭原是相連的……因為這兩種祭都是獻心祭，故此素祭的條例接續燔祭的條例也是合宜的。」KC 指出兩者不可分：「a grain offering is always connected to a blood burnt offering」，理由是素祭無血、無贖罪之效——「Atonement can only happen through the blood」。《精讀本》同此：「素祭不能獨自獻上，一般與燔祭（9:17；出29:38-42）和平安祭（7:11-13）一同獻上。因此素祭也等於與血一同獻上。」惟《啟導本》認為素祭「似為可以單獨獻的祭」。
  relation: |
    利1 與利2 的次序本身是一層啟示。KC：歷史上素祭（基督的生）在燔祭（基督的死）之先，但神先講燔祭——「The fact that the burnt offering is spoken of first and only then of the grain offering shows that it is impossible to understand anything about the life of the Lord Jesus without first seeing what His death means.」兩祭的份量處理也對應其內容：燔祭全燒（死是全然傾倒），素祭只燒一把（生是被紀念）。丁良才：素祭「所燒的，只是一把，大概是因為這祭所表示的不是注重耶穌為我們捨命，乃是注重耶穌聖潔無玷污的生活」。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: |
    利2 中贖愆祭未直接出現，但在「至聖」的分類上與素祭同列。丁良才：「一切獻與神的祭物，連眾人所可吃之平安祭的肉都是聖的，唯有素祭（利6:16、10:12）、贖罪祭（利6:17-18、25-26）、贖愆祭（利14:13，民18:9-10）和陳設餅（利24:9），卻是至聖的。」
  relation: |
    「至聖」這個分類把素祭與贖愆祭綁在一起，儘管兩者性質相反——素祭無血無贖罪，贖愆祭則專為賠償得罪聖物而設。可見「至聖」標定的不是祭的功能，而是其歸屬的嚴格程度：至聖之物只有亞倫的子孫（男丁）能吃，且必須在聖處吃；平安祭的肉雖也是聖的，祭司卻可帶回任何潔淨的地方與全家男女同吃（利10:12-14）。
- title: 平安祭
  path: link_folder/神學/平安祭.md
  summary: |
    利2 中平安祭未直接出現，但在兩處與素祭相關：一是同列「馨香的火祭」（燔祭、素祭、平安祭三者皆是，贖罪祭則否）；二是在「聖」與「至聖」的分界上作為對照——丁良才指出平安祭的肉是「聖的」而非「至聖的」。此外，為感恩獻平安祭時可以用有酵的餅（利7:13），是本章「不可有酵」的一個明文例外。
  relation: |
    平安祭在本章扮演兩個對照角色。其一是「至聖」的反例：唯有平安祭應歸祭司的分，祭司可以在任何潔淨的地方、和他全家男女同吃（利10:12-14），素祭則必須在聖處、限亞倫子孫男丁。其二是「無酵」的例外：CT 指出「除了有特殊意義的感謝祭（利7:13）和七七節搖祭（利23:17）可以加酵之外，其他一切的素祭都不可有酵」——《啟導本》即據此主張酵本身是中立的。《精讀本》另指素祭「一般與燔祭和平安祭一同獻上」。
- title: 無酵餅
  path: link_folder/原文/無酵餅.md
  summary: |
    利2:4-5、11 素祭必須用無酵：「調油的無酵細麵餅，或是抹油的無酵薄餅」（v4）、「凡獻給耶和華的素祭都不可有酵」（v11）。《精讀本》描述其形制：「沒有放麵酵的烤餅，中間有孔、較厚、非常脆。」CT 指出兩種餅的做法差別：細麵餅是將麵粉調油揉成生麵餅放入爐中烘烤；薄餅則是「將揉好的生麵餅，攤開成薄餅狀，在外層抹上橄欖油，貼在爐上烤」。KC 讀其預表：「Unleavened means without sin. This is the Lord Jesus.」
  relation: |
    利2 的無酵與逾越節的無酵同源而異用：逾越節記念出埃及的匆促，素祭的無酵則指向所獻之物本身的無罪。KC 對煎盤的素祭（v7）有一個細膩的觀察——那一級連「無酵」二字都不見了，「indicates in the application that the awareness of the complete sinlessness of the Lord Jesus is lacking」；但他隨即指出經文沒有放寬：「The absence of awareness does not mean that there may be 'leaven' in it and that God tolerates it. Verse 11 states that 'no' grain offering may be made with leaven.」——不知道不等於被容許。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: |
    利2 中壇是素祭「作為紀念」那一把的去處（v2、9、16），也是酵與蜜被明文擋在門外的那條界線（v11-12：「不可在壇上獻為馨香的祭」）。獻祭者只能把素祭奉給祭司，「帶到壇前」（v8）——丁良才：「百姓只能將祭物奉上，唯有祭司可以獻在壇上。」
  relation: |
    利1 使壇的四面各有定用，利2 則為壇立下一條材質上的界線：什麼可以上壇、什麼不可以。有酵有蜜之物並非不潔到不能獻，它們可以作初熟的供物歸給祭司，只是不能上壇作馨香的祭。壇因此不只是焚燒的地方，更是**篩選**的地方——決定什麼配得升到神面前。
- title: 約6：31-35 耶穌是生命的糧
  path: link_folder/互文/約6：31-35 耶穌是生命的糧.md
  summary: |
    利2 的素祭以細麵、餅為供物，丁良才讀其預表為「餅，預表耶穌為生命的餅（約6:32-33、35、41、51）」。CT 同讀：素祭所剩歸亞倫和他的子孫，「亞倫和他的子孫表徵愛神、事神的信徒；全句表徵基督是信徒的生命之糧（約6:35）」。
  relation: |
    KC 在本章特別分辨了嗎哪與素祭的差異，這使約6 的互文更精準：嗎哪祭司與百姓都可以吃，說的是「the Lord Jesus in His way through this world」——供人在曠野路上得力；素祭卻「does not represent the Lord Jesus in His way through this world, but speaks of what He is in Himself, speaks of the glory of His perfect Manhood」。而且素祭所剩只有祭司能吃：「To see that distinction, you must be a priest, that is to say, be used to live in God's presence.」約6 的「生命的糧」兼含兩面——祂是給眾人的食物，也是只有親近神的人才嘗得出的那一位。
- title: 林前5：6-8
  path: link_folder/互文/林前5：6-8.md
  summary: |
    利2:11「凡獻給耶和華的素祭都不可有酵」是林前5:6-8「豈不知一點麵酵能使全團發起來嗎」的舊約底稿。CT 直接把兩處接起來：「保羅說到『惡毒與邪惡的酵』，它與『誠實真正的無酵餅』恰好相反（林前5:8）。這類酵都含有腐敗的影響，我們要嚴加排斥。」並引主的警戒為旁證：「要防備法利賽人和撒都該人的酵」（太16:6）。
  relation: |
    利2 與林前5 的接點在「一點」二字——利2:11 說「不可燒一點酵、一點蜜」，林前5:6 說「一點麵酵能使全團發起來」；分量微小正是重點所在。但須注意各家對「酵」的定性並不一致：丁良才、CT、《精讀本》讀酵為罪與假冒為善；《啟導本》則主張酵是中立的滲透力，因主也用酵比喻天國（太13:33），且律法自身容許感謝祭（利7:13）與七七節搖祭（利23:17）用酵。KC 另給第三種讀法：酵是對基督說錯話——「If we assume that the Lord Jesus could have sinned, even though He did not do it, it is leaven.」林前5 的用法屬於前者，但不宜據此斷定酵在聖經中一律是罪。
- title: 羅12：1
  path: link_folder/互文/羅12：1.md
  summary: |
    利2 的素祭是人手勞力的出產，丁良才由此點出它與燔祭的分野：「素祭的材料就是人從地裡勞力所得的出產，因此也就表示人的工作，教訓我們當把自己的工獻與神。」CT 同讀：「『素祭』乃是出自人手的操作，田園的結實，其間經過耕耘、碾磨與調製，都是預表我們在神面前擺上的事奉。」《精讀本》：「所有的信徒都應該把自己作為活祭獻給神（羅12:1）。」
  relation: |
    利1 的燔祭獻的是「生命」，利2 的素祭獻的是「生活與工作」——同指向羅12:1，卻是兩個不同的面向。KC 在本章末把這層意思說得最完整：主是頭一個完全獻給神的人，藉十字架為一大群人開了路，使他們也能像祂一樣行走，「He is our Model, our Example（腓2:5）。To bring such sacrifice to God means that we realize that we shall walk in the same manner as He walked（約壹2:6）。」CT 則指出這條路要先經過磨碎：「『作餅的糧食是用磨磨碎』的（賽28:28）。我們沒有在主的手裡被摔碎以前，主不能用我們來做世人的糧食。」
