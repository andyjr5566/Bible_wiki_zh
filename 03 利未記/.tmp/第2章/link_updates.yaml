"book": "利未記"
"chapter": !!int "2"
"updates":
- "title": "供物（qorban）"
  "path": "link_folder/原文/供物（qorban）.md"
  "summary": "利2章素祭同樣以「供物」稱之——v1「若有人獻素祭為供物給耶和華」、v12「作為初熟的供物」、v13「凡獻為素祭的供物…一切的供物都要配鹽而獻」，顯示「供物」是涵蓋燔祭、素祭在內的祭物總稱詞。"
  "relation": "利1章「供物」限於燔祭（牛羊鳥三級祭牲）；利2章擴大到無血的素祭，且v13「一切的供物」更是總括各種祭別的通用語，確認qorban是利未記祭禮制度的根本詞彙，不限某一祭別。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "素祭所剩須全數歸「亞倫和他的子孫」在聖所內吃（v3,10），不可攙酵、不可帶回家給家屬吃（參民十八9-10）；祭司在素祭中的職責是取出「一把」細麵連同油與所有乳香焚燒為紀念份（v2,9,16）。"
  "relation": "利1章祭司負責燔祭的奉血、灑血、放火、擺柴、全燒；利2章補充祭司在無血祭禮中的職責——取紀念份焚燒、其餘「至聖」食物歸祭司享用，顯示祭司職分不僅限於血祭儀式，也包含日常飲食供應的功能。"
- "title": "馨香之氣"
  "path": "link_folder/神學/馨香之氣.md"
  "summary": "素祭同樣稱「獻與耶和華為馨香的火祭」（v2,9），顯示馨香不限血祭；但v12酵蜜製的初熟供物明言「不可在壇上獻為馨香的祭」。"
  "relation": "利1章馨香三見於燔祭（v9,13,17）；利2章顯示馨香的條件不在祭物種類（血祭或素祭皆可稱馨香），而在有無攙雜酵蜜——酵蜜代表天然敗壞與甜蜜的成分，不能成為蒙神悅納的馨香。"
- "title": "初熟（bikkurim）"
  "path": "link_folder/原文/初熟（bikkurim）.md"
  "summary": "利2:14-16首次提供初熟素祭的具體操作程序：獻上烘了的青嫩禾穗子（軋了的新穗子），抹油加乳香，祭司取部分焚燒為紀念份，其餘歸祭司。"
  "relation": "出23:16僅泛稱「收割節獻初熟之物」，利2:14-16則是bikkurim總則下第一個具體操作範例，顯示初熟之物獻上前須先經烘烤、磋磨的處理程序，且與一般初熟供物（v12不上壇）不同，可以正式獻在壇上為馨香的火祭。"
- "title": "初熟果子"
  "path": "link_folder/神學/初熟果子.md"
  "summary": "素祭中的初熟之物（v12,14,16）與一般農產初熟供物不同：v12的酵蜜製初熟供物只能歸祭司食用、不可上壇；v14-16的禾穗初熟素祭則可正式獻在壇上為馨香的火祭。CT/GT均將此連於基督復活作初熟的果子（林前十五20,23）。"
  "relation": "出22:29泛稱莊稼與酒醡的初熟；利2章區分出「上壇馨香」與「歸祭司食用」兩種初熟供物的不同法律地位，深化了初熟概念在利未記祭禮體系中的具體分類。"
- "title": "燔祭"
  "path": "link_folder/神學/燔祭.md"
  "summary": "GT／丁良才指出素祭條例緊接燔祭條例是合宜的，因兩者都是「獻心祭」；素祭常與燔祭同獻（民二十九6,11,16等「常獻的燔祭」同獻「同獻的素祭」；民二十八1-5每日早晚燔祭同獻素祭）。KC：素祭預表基督完美的人性，但這完美生命本身不能贖罪，必須先有燔祭所預表基督的死，才能明白祂完全生命的意義。"
  "relation": "利1章正式立法燔祭；利2章素祭條例編排在燔祭之後，反映利未記結構刻意的神學次序——先見基督贖罪之死（燔祭），才能明白祂完全人生的價值（素祭）。"
- "title": "古代近東的獻祭與燔祭習俗"
  "path": "link_folder/背景/古代近東的獻祭與燔祭習俗.md"
  "summary": "GT／《舊約聖經背景註釋》：猶太教拉比認為素祭是為窮人而設，可以取代燔祭，美索不達米亞亦有為窮人作類似安排的記錄；「供物」一詞在烏加列語、亞喀得語中也有「禮物、貢品」的相同用法；素祭通常在慶典而非哀悼之時獻上。"
  "relation": "利1章近東背景聚焦燔祭本身的考古證據分佈（敘利亞—巴勒斯坦、安那托利亞有證據，埃及、美索不達米亞未見）；利2章補充素祭作為窮人替代燔祭的近東平行做法，以及「供物」一詞的近東語言學根源，顯示利未記祭禮用語與近東文化背景的共通性。"
- "title": "香料乳香沒藥貿易"
  "path": "link_folder/文化/香料乳香沒藥貿易.md"
  "summary": "GT／《舊約聖經背景註釋》：乳香由學名Boswellia的樹木膠脂製成，只產於阿拉伯半島南部與索馬利蘭、亞丁灣兩岸，雨量氣溫土壤不合便不生長；美索不達米亞、埃及廣為使用，法老圖坦卡門墓中亦有出土；因產量低需求高，是駱駝商隊貿易的主要商品，素祭僅用少量、全數以悶火慢慢燒盡。"
  "relation": "創37章記以實瑪利/米甸商隊用駱駝馱乳香沒藥下埃及，是貿易路線的敘事場景；利2章補充乳香本身的產地限制、氣候條件與作為昂貴貿易商品的具體背景知識，解釋了創37章商隊貨品的來源與價值。"
