book: "利未記"
chapter: 2
candidates:
  # === 既有條目累積（B類） ===
  - name: "供物（qorban）"
    type: "原文"
    evidence: "v1「若有人獻素祭為供物給耶和華」、v12「這些物要獻給耶和華作為初熟的供物」、v13「凡獻為素祭的供物都要用鹽調和…一切的供物都要配鹽而獻」。既有條目「供物（qorban）」已累積利未記1章燔祭的供物用法，本章補素祭同樣以「供物」統稱，且v13顯示「一切的供物」是涵蓋各祭別的總稱詞。"
    surfaces:
      - phrase: "供物"
        verses: [1, 12, 13]

  - name: "亞倫和他兒子（祭司）"
    type: "人物"
    evidence: "v2「帶到亞倫子孫作祭司的那裡」、v3,10「素祭所剩的要歸給亞倫和他的子孫」、v8「奉給祭司」、v9,16「祭司要」。CT/GT：素祭所剩須歸祭司在聖處吃、不可攙酵、不可帶回家給家屬吃（民十八9-10）；本章是亞倫子孫祭司職責在素祭條例中的具體展示，補充利1章燔祭職責之外的「至聖食物」供應功能。"
    surfaces:
      - phrase: "亞倫子孫作祭司"
        verses: [2]
      - phrase: "亞倫和他的子孫"
        verses: [3, 10]
      - phrase: "祭司"
        verses: [2, 8, 9, 16]

  - name: "馨香之氣"
    type: "神學"
    evidence: "v2,9「是獻與耶和華為馨香的火祭」、v12「不可在壇上獻為馨香的祭」。既有條目「馨香之氣」源自創8:21、已累積利1章燔祭用法；本章顯示「馨香的火祭」不限於血祭，沒有血的素祭同樣可稱馨香，且v12反向指出酵蜜製的初熟供物不可稱馨香——擴充「馨香」條件不在祭物種類、而在有無酵蜜攙雜。"
    surfaces:
      - phrase: "馨香"
        verses: [2, 9, 12]

  - name: "初熟（bikkurim）"
    type: "原文"
    evidence: "v14「若向耶和華獻初熟之物為素祭，要獻上烘了的禾穗子，就是軋了的新穗子，當作初熟之物的素祭」。既有條目「初熟（bikkurim）」源自出23:16收割節獻初熟之物的總則、內容尚待累積；本章v14-16提供具體操作程序：青嫩禾穗先烘烤、磋成穀粒、抹油加乳香、祭司取部分焚燒，是bikkurim總則下第一次出現的詳細素祭形式。"
    surfaces:
      - phrase: "初熟"
        verses: [12, 14]

  - name: "初熟果子"
    type: "神學"
    evidence: "v12,14,16三次提及初熟之物／初熟之物的素祭。既有條目「初熟果子」源自出22:29莊稼與酒醡的初熟總則；CT/GT均將本章初熟素祭連於基督復活作初熟的果子（林前十五20,23）。本章補充初熟素祭與一般初熟供物（v12不可獻為馨香）在律法上的分別待遇，深化「初熟」神學意涵。"

  - name: "燔祭"
    type: "神學"
    evidence: "GT／丁良才：「素祭和燔祭原是相連的…因為這兩種祭都是獻心祭，故此素祭的條例接續燔祭的條例也是合宜的」；BH引言亦指出素祭「in one breath with the burnt offering」（參出40:29），且KC引言解釋素祭預表基督完美的人性，但這完美的生命本身不能贖罪，贖罪只能藉著血、藉著燔祭所預表的死。既有條目「燔祭」已累積利1章正式立法，本章補素祭與燔祭在利未記編排次序與神學次序上「先燔祭、後素祭」的關聯：先見基督的死，才能明白祂完全生命的意義。"

  - name: "古代近東的獻祭與燔祭習俗"
    type: "背景"
    evidence: "GT／《舊約聖經背景註釋》：「猶太教拉比認為素祭是為窮人而設，可以取代燔祭。美索不達米亞亦有為窮人作出類似安排的記錄」；並指出「供物」一詞在烏加列語、亞喀得語中亦有「禮物、貢品」的相同用法，素祭通常在慶典而非哀悼時獻上。既有條目「古代近東的獻祭與燔祭習俗」已累積利1章燔祭的近東考古比較，本章補素祭作為窮人替代燔祭的近東平行做法，以及「供物」一詞的近東語言學背景。"

  - name: "香料乳香沒藥貿易"
    type: "文化"
    evidence: "GT／《舊約聖經背景註釋》v1：乳香是由學名Boswellia的樹木的膠脂製成，這種樹木只產於阿拉伯半島南部和索馬利蘭、亞丁灣兩岸，雨量、氣溫、土壤不合就不會生長；美索不達米亞和埃及都廣為使用，法老圖坦卡門墓中也有挖掘出土；因產量低、需求高，是駱駝商隊貿易的主要商品，素祭只用少量、全數以悶火慢慢燒盡。既有條目「香料乳香沒藥貿易」源自創37章以實瑪利商隊帶乳香下埃及，本章補乳香確切產地、氣候限制與作為近東貿易商品的具體背景資料。"

  # === 新建候選（C類） ===
  - name: "素祭（minchah）"
    type: "原文"
    evidence: "v1-16通篇主題。希伯來文原文作「穀物祭」，《和合本》依中國習慣譯「素祭」；GT：「供物」原文有貢物、禮物之意，若論到送禮物與人，可表明受者的尊貴和威榮，也含有送者求恩之意。CT：素祭是自願的獻祭，敬拜者藉此向神表明忠貞與感恩，也間接供應祭司生活所需的食物。BH／KC一致指出這是五祭中唯一不流血的祭，不能單獨贖罪，但常與燔祭、贖罪祭、平安祭同獻（民二十九6,11,16等；利七11-13；出二十九38-42）。此為理解利未記整個祭禮體系不可或缺的核心原文詞彙，值得建立獨立條目供後續章節（利六14-18、七12-13、二十三17等）累積。"
    surfaces:
      - phrase: "素祭"
        verses: [1, 3, 4, 5, 6, 7, 8, 9, 10, 11, 13, 14, 15]

  - name: "紀念份"
    type: "原文"
    evidence: "v2「然後要把所取的這些作為紀念，燒在壇上」、v9「祭司要從素祭中取出作為紀念的」、v16「祭司要把其中作為紀念的」。CT：『取出一把』意指充滿手掌，這一把細麵作為全部細麵的代表獻上給神，所餘的則供給祭司做食物；丁良才：『作為紀念』四字與獻在壇上的素祭多次同提，是人對神豐富供應和看顧的紀念，徒十4記羅馬百夫長哥尼流的禱告與周濟在神面前蒙紀念，可作參照。BH：'memorial portion' refers to a handful of the grain offering that is a token of the whole, acknowledging God's provision and sovereignty。此為素祭條例反覆出現的固定技術用語，與燔祭全燒不同，值得獨立建檔。"
    surfaces:
      - phrase: "作為紀念"
        verses: [2, 9, 16]

  - name: "素祭的五種形式"
    type: "主題"
    evidence: "本章按供物形態列出五種素祭：①生細麵一把加油乳香（v1-3）、②爐中烤的無酵餅或薄餅（v4）、③鐵鏊上做、分成塊子（v5-6）、④煎盤做（v7）、⑤初熟烘烤禾穗子（v14-16）。CT／《聖經精讀本》均將此五種並列說明（一細麵一把加些油；二爐中烤的物；三鐵鏊上作的物；四煎盤作的物；五烘的初熟物），BH指出以爐、鐵鏊、煎盤依序描述漸趨簡略，象徵獻祭者對基督生命認識程度的差異（KC靈意）；GT背景注則指出貧窮人用煎盤做的素祭不加乳香，神為貧窮人設想。此結構貫穿全章，值得建立主題條目對照五種形式與各自的獻祭手續、材料差異。"

  - name: "素祭不可有酵與蜜"
    type: "主題"
    evidence: "v11「凡獻給耶和華的素祭都不可有酵；因為你們不可燒一點酵、一點蜜當作火祭獻給耶和華」、v12「這些物要獻給耶和華作為初熟的供物，只是不可在壇上獻為馨香的祭」。CT：酵是一種真菌，能使麵團發起來也會使它發霉變壞，故預表罪；一點點的酵怎樣使全團麵發起，照樣一點點的罪也能敗壞人的一生；蜜是天然發甜的、古時有用蜜做酵素，故與酵同樣當為不潔。GT／啟導本：聖經沒有明說不可用蜜與酵的原因，可能與異教用蜜敬神有關，也可能是不讓天然發酵損害祭物的天然純質。KC：若我們以為耶穌基督可能犯罪（即使祂沒有犯），那便是「酵」，聖經清楚顯明基督不能犯罪。此為素祭條例的重要總則之一，且與燔祭全燒、贖罪祭等制度性禁令並列，值得獨立建檔。"
    surfaces:
      - phrase: "一點酵"
        verses: [11]
      - phrase: "一點蜜"
        verses: [11]

  - name: "立約的鹽"
    type: "主題"
    evidence: "v13「凡獻為素祭的供物都要用鹽調和，在素祭上不可缺了你神立約的鹽。一切的供物都要配鹽而獻」。CT：鹽有防腐作用，所有祭品都要加上鹽，表示神與以色列人的盟約是永恆不渝的；GT／《舊約聖經背景註釋》：鹽廣被用作防腐與盟約效力久遠的象徵，來自巴比倫、波斯、阿拉伯、希臘的文獻都一致反映此用法，聖經也用「鹽約」形容主和以色列所立的約（民十八19；代下十三5），盟友立約時常共享含鹽醃肉類的筵宴；KC：鹽象徵持久性，因它能抵抗腐敗，此約不會隨時間淡化或失效，這正應驗在基督與祂的祭上。此為古代近東盟約禮俗與利未記祭禮制度交會的重要主題，值得獨立建檔（後續民十八19、代下十三5可累積）。"
    surfaces:
      - phrase: "立約的鹽"
        verses: [13]

  - name: "至聖的供物（聖與至聖之分）"
    type: "主題"
    evidence: "v3,10「這是獻與耶和華的火祭中為至聖的」。CT：供物中有『聖的』，如平安祭的供物；有的是『至聖的』，如素祭、贖罪祭、贖愆祭和陳設餅；『至聖的』意指分別出來歸於神，素祭所餘的雖歸祭司享用，但仍為『至聖的』，故只可在聖所吃，不能攙酵和雜物，也不能給祭司的家屬吃（參民十八9-10）。啟導本：本條例在祭司職位應享的特權與祭司私人的財產之間劃清界限，防止人濫用特權；「至聖」的部分只有合資格的祭司才能吃，而且要在聖所吃。此為利未記祭物等級制度的關鍵分類概念，貫穿素祭、贖罪祭、贖愆祭、陳設餅等後續多章，值得獨立建檔追蹤。"
    surfaces:
      - phrase: "至聖"
        verses: [3, 10]
