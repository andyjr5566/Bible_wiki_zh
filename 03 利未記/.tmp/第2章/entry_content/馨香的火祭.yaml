name: 馨香的火祭
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指祭物在壇上經火焚燒後，產生蒙神悅納的香氣。在素祭中，祭司將細麵、油與所有乳香等作為紀念的部分燒在壇上，便成為獻與耶和華為馨香的火祭。這代表獻祭者對神的敬畏與奉獻之心蒙神悅納，但酵與蜜等易腐敗之物則不可作為馨香的火祭獻上。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定素祭的紀念部分燒在壇上即為獻與耶和華的馨香火祭，並禁止酵與蜜在壇上獻為此祭。
  relation: 馨香的火祭是素祭蒙神悅納的神學記號，象徵獻祭者的敬拜與奉獻達到神面前。
