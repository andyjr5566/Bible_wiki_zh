name: 素祭所剩歸祭司
type: 事件
secondary_types: []
aliases:
- 素祭所剩的要歸給亞倫和他的子孫
status: formal
definition: 祭司從獻祭者帶來的素祭供物中取出作為紀念的部分燒在壇上後，剩餘的素祭細麵與油等供物要歸給亞倫和他的子孫作為食物。這剩餘的素祭在獻與耶和華的火祭中被視為至聖的，唯有祭司家族才能食用。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定素祭中未被焚燒的剩餘部分要歸給亞倫及其子孫，並強調這是獻與耶和華火祭中為至聖的。
  relation: 本章第3節與第10節重申此規定，確立祭司靠壇火祭維生並維持聖潔身分的制度。
related_entries:
- 亞倫和他兒子（祭司）
- 素祭（minchah）
- 至聖
- 燒在壇上
