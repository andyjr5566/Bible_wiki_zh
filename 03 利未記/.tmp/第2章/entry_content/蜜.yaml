name: 蜜
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 蜜在古代近東文化中常被用作天然的甜味劑與發酵原料。在利未記的素祭條例中，明文規定不可將蜜當作火祭燒在壇上獻給耶和華，因為蜜與酵一樣容易發酵變質，不適合作為獻給神為馨香火祭的供物，但可作為初熟的供物獻上。
accumulations:
- book: 利未記
  chapter: 2
  summary: 明確禁止將蜜燒在壇上當作火祭獻給耶和華，但允許作為初熟的供物獻上。
  relation: 藉由禁止獻蜜與酵，凸顯素祭必須保持無酵、純潔且不易腐壞的文化與神學要求。
