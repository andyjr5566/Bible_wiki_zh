name: 無酵
type: 神學
secondary_types: []
aliases:
- 無酵
status: formal
definition: 在利未記第2章中，無酵是素祭的核心要求之一。凡獻給耶和華的素祭都不可有酵，無論是爐中烤的餅、鐵鏊上做的物，都必須是無酵細麵。酵在聖經中常象徵罪與敗壞，素祭中禁止有酵，表明獻給神的祭物必須是純淨無瑕的，預表基督無罪的生命。
accumulations:
- book: 利未記
  chapter: 2
  summary: 本章明文規定素祭不可有酵，爐中烤與鐵鏊上做的素祭皆須使用無酵細麵，並禁止將酵當作火祭獻給耶和華。
  relation: 無酵的要求確立了素祭的聖潔性，禁止酵與蜜的摻雜，確保獻給神的供物純淨無罪。
