name: 素祭（minchah）
type: 原文
secondary_types: [神學]
aliases: [穀物祭]
status: formal
definition: 英文研經著作稱此祭為「minchah」（BH：也稱作「meal offering」或希伯來文「minchah」）；《和合本》依中國習慣譯作「素祭」。GT／啟導本：「素祭」希伯來原文作「穀物祭」，用的供物為田間的生長物，不像燔祭用動物；「供物」原文有貢物、禮物之意，若論到送禮物與人，可表明受者的尊貴和威榮，也含有送者求恩之意。CT：素祭是自願的獻祭，敬拜者藉此向所敬拜的神表明忠貞與感恩的心意，也間接供應祭司們生活所需的食物。BH／KC一致指出這是五祭中唯一不流血的祭，不能單獨贖罪；GT指出素祭常與燔祭同獻（民二十九6,11,16等「常獻的燔祭」同獻「同獻的素祭」；利七11-13）。
accumulations:
- book: 利未記
  chapter: 2
  summary: 詳細規定素祭的材料（細麵、油、乳香、鹽）、五種製法（生細麵、爐烤、鐵鏊、煎盤、初熟禾穗）、獻祭程序（祭司取紀念份焚燒、餘下歸祭司在聖處吃）、酵蜜禁忌、鹽約要求，確立素祭為至聖火祭的核心條例。
  relation: 本章是素祭條例的主要出處，確立其材料、形式、程序與神學意義；GT指出素祭條例緊接燔祭條例編排，因兩者都是「獻心祭」，此編排本身即有神學意涵。
