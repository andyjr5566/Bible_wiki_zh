name: 紀念
type: 神學
secondary_types: []
aliases:
- 作為紀念
status: formal
definition: 紀念在素祭的條例中，指祭司從細麵中取出一把，並取些油和所有的乳香，作為紀念燒在壇上獻與耶和華。此詞在神學上代表將供物的精華部分呈獻於神面前，使獻祭者被記念在神面前。這不僅是物質的焚燒，更象徵獻祭者對神的敬拜與信靠蒙神悅納並記念。
accumulations:
- book: 利未記
  chapter: 2
  summary: 祭司從素祭中取出細麵、油和乳香作為紀念燒在壇上。
  relation: 紀念是素祭獻在壇上的核心動作，使供物成為獻與耶和華馨香的火祭。
related_entries:
