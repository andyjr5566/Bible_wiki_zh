name: 初熟之物
type: 主題
secondary_types: []
aliases:
- 初熟的供物
status: formal
definition: 初熟之物指獻給耶和華作為初熟的供物，在素祭條例中表現為烘了的禾穗子或軋了的新穗子。經文規定這些初熟之物要抹上油、加上乳香獻為素祭，但不可在壇上獻為馨香的祭。此主題強調將土地最早的收成歸給神，承認神賜予豐收的主權與恩典。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定初熟之物可用烘了的禾穗子獻為素祭，並抹油加乳香，但不可在壇上獻為馨香的祭。
  relation: 初熟之物作為素祭的一種形式，體現了將首生的收成獻給神的主題，但與一般素祭在獻祭方式上有所區別。
related_entries:
