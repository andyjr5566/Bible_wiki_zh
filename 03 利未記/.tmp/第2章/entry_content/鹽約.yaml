name: 鹽約
type: 神學
secondary_types: []
aliases:
- 立約的鹽
status: formal
definition: 鹽約指神與人立約中永恆不廢的性質。在素祭的條例中，神吩咐凡獻為素祭的供物都要用鹽調和，在素祭上不可缺了「你神立約的鹽」，一切的供物都要配鹽而獻。鹽具有防腐與保存的作用，象徵神與以色列人所立之約的永恆性、持久性與不腐壞性，表明供物背後有著神信實守約的根基。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定素祭必須用鹽調和，強調不可缺神立約的鹽。
  relation: 鹽約作為素祭不可或缺的要素，賦予素祭守約與忠誠的神學意涵。
related_entries:
- 素祭（minchah）
- 馨香的火祭
