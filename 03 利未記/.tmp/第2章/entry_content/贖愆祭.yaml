name: 贖愆祭
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 贖愆祭是針對人在具體行為上得罪神或得罪人，需要為其過犯付出賠償與贖罪的祭。雖然利未記第2章主要記載素祭條例，但贖愆祭與素祭同屬獻祭制度的一環，皆需在壇上焚燒並由祭司經手，共同維持神與人之間聖潔關係的恢復與敬拜秩序。
accumulations:
- book: 利未記
  chapter: 2
  summary: 本章未直接提及贖愆祭，但經文強調素祭為獻與耶和華火祭中至聖的，並由祭司在壇前處理，與贖愆祭同屬祭司在壇上事奉的聖潔獻祭體系。
  relation: 贖愆祭與素祭同屬至聖的火祭範疇，皆由祭司在壇前辦理，彰顯神對罪與奉獻之聖潔要求的一致性。
