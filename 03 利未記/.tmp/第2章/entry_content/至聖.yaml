name: 至聖
type: 神學
secondary_types: []
aliases:
- 至聖的
status: formal
definition: 至聖在素祭條例中用來描述素祭所剩餘歸給亞倫和他子孫的部分。這表明該祭物在神眼中具有極高的神聖性，唯有祭司家族才能在聖處食用。此詞強調獻與耶和華火祭中的供物具有超越一般聖物的神聖地位，必須以最嚴謹的態度對待。
accumulations:
- book: 利未記
  chapter: 2
  summary: 指出素祭所剩歸給祭司的部分是獻與耶和華火祭中為至聖的。
  relation: 至聖界定了素祭剩餘部分的聖潔等級，規範了祭司食用供物的神聖性與限制。
related_entries:
