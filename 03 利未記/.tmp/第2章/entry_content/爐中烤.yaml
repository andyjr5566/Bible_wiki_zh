name: 爐中烤
type: 事件
secondary_types: []
aliases:
- 爐中烤的物
status: formal
definition: 爐中烤是素祭製作方式之一。若用爐中烤的物為素祭，就要用調油的無酵細麵餅，或是抹油的無酵薄餅。此事件描述了素祭供物在準備過程中的具體烹飪方式，強調了無酵與調油的要素，作為獻與耶和華的供物。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定若用爐中烤的物為素祭，要用調油的無酵細麵餅或抹油的無酵薄餅。
  relation: 爐中烤是素祭三種烹調方式之一，與鐵鏊上做和煎盤做同為素祭的具體呈現形式。
related_entries:
