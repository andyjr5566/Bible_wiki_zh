name: 煎盤做
type: 事件
secondary_types: []
aliases:
- 煎盤做的素祭
status: formal
definition: 指以煎盤來烹製素祭的方式。獻祭者要用油與細麵做成，以此作為素祭獻給耶和華。
development: 本章第7節簡要記載此法，與爐中烤及鐵鏊上做並列，為素祭的不同製作途徑之一，同樣需符合素祭的基本材料要求。
accumulations:
- book: 利未記
  chapter: 2
  summary: 規定煎盤做的素祭須用油與細麵做成。
  relation: 豐富素祭的製作形式，讓不同階層的獻祭者都能以可得材料獻祭。
related_entries:
- 素祭（minchah）
- 細麵
- 油
