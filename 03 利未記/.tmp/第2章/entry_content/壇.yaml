name: 壇
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 壇是獻祭給耶和華的聖潔場所。在素祭的條例中，祭司必須將素祭中作為紀念的部分（細麵、油與所有乳香）帶到壇前並燒在壇上，使其成為獻與耶和華的馨香火祭。壇是神與人相會、獻祭者透過祭司將供物呈獻給神的中心地點。
accumulations:
- book: 利未記
  chapter: 2
  summary: 描述祭司將素祭的紀念部分帶到壇前並燒在壇上獻與耶和華，同時禁止將酵與蜜燒在壇上。
  relation: 壇作為獻祭的中心，規範了素祭中可燒與不可燒之物，維持獻祭的聖潔與神聖性。
