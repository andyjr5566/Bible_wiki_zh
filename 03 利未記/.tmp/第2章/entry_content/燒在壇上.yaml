name: 燒在壇上
type: 事件
secondary_types: []
aliases:
- 焚燒在壇上
status: formal
definition: 指祭司將素祭中作為紀念的部分（一把細麵、油及所有乳香）在銅壇上焚燒的動作。此焚燒動作使之成為獻與耶和華為馨香的火祭。
development: 本章第2、9、16節多次提及此程序，表明素祭中歸於神的部分必須完全燒在壇上，其餘則歸祭司為至聖之物，確立祭物在神與祭司之間的分配原則。
accumulations:
- book: 利未記
  chapter: 2
  summary: 祭司將素祭的紀念部分燒在壇上，獻與耶和華為馨香的火祭。
  relation: 焚燒動作是素祭蒙神悅納的關鍵，象徵獻祭者對神的敬拜與記念。
related_entries:
- 銅壇（燔祭壇）
- 祭司取一把
- 紀念
- 馨香的火祭
- 素祭（minchah）
- 乳香
