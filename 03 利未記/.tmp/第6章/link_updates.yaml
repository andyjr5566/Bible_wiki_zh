book: 利未記
chapter: 6
updates:
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: |
    本章1-7節是第五章贖愆祭的延續，處理人際財物罪（俗事上的愆尤）。犯罪者干犯耶和華（ma'al），須如數歸還所搶奪/欺壓/侵佔/拾遺之物，另加五分之一罰金，在查出有罪的日子交還本主；再獻無殘疾公綿羊為贖愆祭，祭司為他贖罪即蒙赦免。BH: guilt offering (asham) specifically addresses sins involving deceit against a neighbor, requiring restitution in full plus 20% penalty. CT: 贖愆祭的「還」與挽回祭的「挽」同義——在神面前要「挽」，在人面前要「還」。KC: every sin against one's neighbor is in the first place a sin against God, unfaithfulness against Him.
  relation: |
    本章補充贖愆祭在人際財物罪方面的應用（第五章側重聖物上的愆尤），強調「賠還」是悔改的果子（太3:8），預表基督作為完全的贖愆祭（西2:13）。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: |
    本章14-18節從祭司角度補充素祭條例：祭司取一把細麵+油+所有乳香燒在壇上，奉給耶和華為馨香素祭的紀念；剩下的亞倫和他子孫在聖處（會幕院子）不帶酵而吃，烤時不可攙酵。這是從獻給耶和華的火祭中賜給祭司的分，是至聖的，和贖罪祭並贖愆祭一樣。凡祭司中的男丁都可吃，直到萬代；摸這些祭物的都要成為聖。BH: grain offering represents dedication of fruits of human labor to God. CT: 素祭含有禮物或貢物的意味，自願獻祭表明忠貞與感恩。KC: eating the grain offering means taking in something spiritual so that our hearts are filled with it.
  relation: |
    本章從祭司食用角度補充第二章（獻祭者角度），強調素祭的至聖性與祭司共享的權利。素祭預表基督作為完全的人在地上為神而活。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: |
    全章反覆提及亞倫和他子孫（祭司）的職責與權利：v9-13 祭司管理壇火（收灰、添柴、穿細麻衣）；v14-18 祭司吃素祭剩餘（聖處不帶酵）；v20-23 受膏祭司每日獻素祭（全燒不可吃）；v25-29 祭司吃贖罪祭肉（聖處）、處理血衣與煮祭瓦器銅器。BH: priests as mediators between God and people. CT: 祭司供職時須穿祭司服（出28:40-41），不問工作貴賤同樣尊嚴。KC: Aaron is a picture of the Lord Jesus as High Priest, anointed by God.
  relation: |
    本章全面展示祭司在四種祭（燔祭、素祭、贖罪祭、贖愆祭）中的職責，從收灰到吃祭肉，預表基督作為大祭司的完全事奉。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    本章8-13節從祭司角度補充燔祭條例：燔祭放在壇柴上從晚上燒到天亮，壇火要常常燒著不可熄滅（三次強調）；祭司穿細麻衣收灰倒在壇旁，換衣後將灰拿到營外潔淨之處；每日早晨添柴、擺燔祭、燒平安祭脂油。BH: perpetual fire symbolizes God's continuous presence and ongoing need for atonement. CT: 火是神聖潔的表號，神與人交通的門路常常開著。KC: God wants His people to be constantly surrounded by the fragrance of the burnt offering, aware they are pleasing to God in the Beloved (Eph 1:6).
  relation: |
    本章從祭司管理壇火角度補充第一章（獻祭者角度），強調壇火不可熄滅——預表基督獻祭的馨香永遠在神面前。燔祭灰拿到營外預表基督在營外受苦（來13:11-13）。
- title: 乳香
  path: link_folder/神學/乳香.md
  summary: |
    v15 祭司取素祭上所有的乳香，連同一把細麵和油燒在壇上，奉給耶和華為馨香素祭的紀念。BH: frankincense symbolizes prayer and devotion rising to God. CT: 乳香是素祭不可或缺的成分，全燒歸神。KC: incense speaks of the Lord Jesus as true Man whose life was a soothing aroma to God.
  relation: |
    本章強調乳香全燒歸神（不歸祭司），表徵基督生命的馨香完全向著神。
- title: 公綿羊
  path: link_folder/文化/公綿羊.md
  summary: |
    v6 贖愆祭牲須是羊群中一隻沒有殘疾的公綿羊，按祭司估定價值獻上。BH: unblemished ram of proper value, foreshadowing Christ as Lamb without defect (1 Pet 1:19). CT: 基督是我們的贖愆祭（西2:13）。KC: the guilt offering must be brought to the LORD; the ram without defect speaks of the perfection of Christ's sacrifice.
  relation: |
    本章公綿羊作為贖愆祭牲，強調無殘疾與按價值估定，預表基督無瑕疵的獻祭。
- title: 血
  path: link_folder/神學/血.md
  summary: |
    v27 贖罪祭牲的血若彈在衣服上，所彈的那一件要在聖處洗淨——不可將基督寶血當作平常。v30 凡贖罪祭若將血帶進會幕在聖所贖罪，那肉都不可吃，必用火焚燒——血入至聖所表徵完全的贖罪。BH: blood representing life was crucial element in atonement process. CT: 表徵不可將基督的寶血當作平常看待。GT: 聖潔的血彈在不潔的衣服上，若不洗淨，神的聖潔也因此被玷污。
  relation: |
    本章強調贖罪祭之血的聖潔性：彈衣須聖處洗淨、血入會幕者肉不可吃，預表基督寶血的獨特與完全贖罪功效。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: |
    v7 祭司在耶和華面前為犯罪者贖罪，他無論行了什麼事都必蒙赦免——涵蓋本章1-5節所列一切人際財物罪。BH: atonement involves covering or cleansing sin, allowing reconciliation with God; foreshadows Christ's ultimate atonement (Heb 4:14-16). CT: 無論行了什麼事暗示耶穌基督為我們贖罪是完全的（來10:14-18）。KC: the priest shall make atonement for him before the LORD and he will be forgiven.
  relation: |
    本章贖罪涵蓋人際財物罪（贖愆祭）與無意犯罪（贖罪祭），預表基督一次獻上永遠贖罪（來10:10-14）。
- title: 至聖
  path: link_folder/神學/至聖.md
  summary: |
    v17 素祭剩餘是至聖的，和贖罪祭並贖愆祭一樣。v25 贖罪祭牲是至聖的。v29 凡祭司中的男丁都可吃，這是至聖的。BH: most holy signifies the highest level of sanctity, set apart for God. CT: 至聖的通指分別為聖歸給神的祭物和物件，雖蒙神賞賜給祭司享用，但仍視為至聖之物。KC: it is most holy, like the sin offering and the guilt offering.
  relation: |
    本章三次強調祭物為至聖（素祭、贖罪祭、贖愆祭），界定祭司食用供物的神聖等級與限制。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: |
    本章24-30節從祭司角度補充贖罪祭條例：宰於燔祭牲處（壇北邊）；獻祭祭司在聖處吃祭肉；凡摸祭肉成聖；血彈衣須聖處洗淨；煮祭瓦器打碎、銅器擦磨涮淨；血入會幕的贖罪祭肉不可吃必用火焚燒（包括大祭司、全會眾、大贖罪日三種贖罪祭）。BH: sin offering crucial for atoning unintentional sins and restoring relationship with God. CT: 瓦器表徵人天然生命須十字架破碎，銅器表徵審判——基督已滿足神公義審判。KC: when the anointed priest or people have sinned, all are guilty and unfit to eat it.
  relation: |
    本章從祭司處理祭肉角度補充第四章（獻祭者角度），強調贖罪祭的至聖性與血入會幕者的特殊規例。瓦器打碎/銅器擦磨預表十字架的破碎與審判。
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: |
    v12 祭司每日早晨在壇上燒柴，把燔祭擺上，在其上燒平安祭牲的脂油。BH: peace offering symbolized fellowship and reconciliation with God. CT: 脂油表徵將上好的因著感恩獻給神。KC: the fat portions of the peace offerings are offered up in smoke on the altar.
  relation: |
    本章平安祭脂油與燔祭同燒在常燃的壇火上，表徵感恩與交通建立在基督完全奉獻（燔祭）的基礎上。
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: |
    v12 祭司每日早晨在壇上燒平安祭牲的脂油——脂油與燔祭同燒在常燃的壇火上。CT: 脂油表徵將上好的因著感恩獻給神。KC: the fat portions of the peace offerings are offered up in smoke on the altar, a soothing aroma to God.
  relation: |
    本章脂油與燔祭同燒，表徵感恩（平安祭）建立在完全奉獻（燔祭）之上，將最好的歸給神。
- title: 無殘疾
  path: link_folder/神學/無殘疾.md
  summary: |
    v6 贖愆祭牲須是羊群中一隻沒有殘疾的公綿羊。BH: unblemished ram of proper value, foreshadowing Christ as Lamb without defect (1 Pet 1:19). CT: 基督是我們的贖愆祭（西2:13），無殘疾預表基督的完全無罪。
  relation: |
    本章無殘疾要求應用於贖愆祭牲，延續第一章燔祭牲的標準，預表基督無瑕疵的獻祭。
- title: 供物
  path: link_folder/主題/供物.md
  summary: |
    v20 亞倫受膏的日子，他和他子孫所要獻給耶和華的供物：細麵伊法十分之一，為常獻的素祭，早晨一半晚上一半。BH: the offering signifies consecration and dedication to the priestly office. CT: 表徵每天早晚都要過獻身事奉神的生活。KC: Aaron is a picture of the Lord Jesus as High Priest; the offering is inseparable from His coming to earth and His life on earth for God.
  relation: |
    本章供物特指大祭司受膏日開始每日常獻的素祭，表徵基督作為大祭司在地上完全為神而活的生命。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    v16 素祭剩下的在會幕院子裡吃。v26 贖罪祭肉在會幕院子裡吃。v30 凡贖罪祭若將血帶進會幕在聖所贖罪，那肉不可吃。BH: the court of the tent of meeting is a holy place set apart for sacred purposes. CT: 會幕院內有燔祭壇和洗濯盆，院子稱聖是因為會幕是神的住處。KC: a holy place is where natural thinking is not given room, everything directed toward God.
  relation: |
    本章會幕院子是祭司吃祭物的聖處，會幕聖所是血入會幕贖罪之處，彰顯神居住人中的聖別秩序。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: |
    v9-13 全段圍繞銅壇運作：燔祭放壇柴上、壇火常燒不可熄滅、收灰倒壇旁、每日早晨添柴擺燔祭燒平安祭脂油。v25 贖罪祭牲宰於宰燔祭牲的地方（壇北邊）。BH: the altar of burnt offering is central to Israel's worship. CT: 壇火不可熄滅表徵神與人交通的門路常常開著。KC: the fire on the altar shall be kept burning continually; it is not to go out — God wants His people constantly surrounded by the fragrance of the burnt offering.
  relation: |
    本章銅壇是四種祭（燔祭、素祭、平安祭脂油、贖罪祭）的共同運作中心，壇火常燒預表基督獻祭的馨香永在神面前。
