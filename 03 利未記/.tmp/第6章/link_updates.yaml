book: 利未記
chapter: 6
updates:
- title: 聖衣（祭司聖服）
  path: link_folder/主題/聖衣（祭司聖服）.md
  summary: 利未記6:10-11規定祭司收拾燔祭壇灰時，「要穿上細麻布衣服，又要把細麻布褲子穿在身上」；隨後「脫去這衣服，穿上別的衣服，把灰拿到營外潔淨之處」。
  relation: 本章首次記載聖衣在日常祭司職事（而非受膏典禮）中的實際穿脫規定——在聖所內穿聖衣，出至營外運灰前必須換穿常服，具體示範出29、39章「聖俗分別」的原則如何落實於每日崗位。
- title: 褲子（細麻布褲子）
  path: link_folder/主題/褲子（細麻布褲子）.md
  summary: 利未記6:10「祭司要穿上細麻布衣服，又要把細麻布褲子穿在身上」，重申出28:42細麻布褲子的規定，於清理壇灰的日常職事中再次出現。
  relation: 與出28章的規定一致，確認細麻布褲子是祭司供職（不限受膏大典）時的常設要求，非僅限於承接聖職七日。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: 利未記6:1-7為贖愆祭增添第三類觸發情境——虧負鄰舍（侵吞託付物、交易詭詐、搶奪、欺壓、拾遺不報、假誓），須先如數歸還並加五分之一，再牽無殘疾公綿羊獻為贖愆祭，祭司贖罪後蒙赦免。
  relation: 補齊利5章「聖物誤犯」「不可行之事誤犯」之外的第三種贖愆祭觸發類別，確立「先向人賠償、再向神獻祭」的雙軌處理程序。
- title: 公綿羊
  path: link_folder/主題/公綿羊.md
  summary: 利未記6:6再次確認公綿羊為贖愆祭指定祭牲，須「沒有殘疾」，照祭司所估之價牽到耶和華面前。
  relation: 與利5:15,18的規定一致，本章補充公綿羊獻上前須先完成「如數歸還加五分之一」的賠償程序。
- title: 賠償（shalem）
  path: link_folder/原文/賠償（shalem）.md
  summary: 利未記6:4-5規定虧負鄰舍者「就要歸還他所搶奪的……就要如數歸還，另外加上五分之一，在查出他有罪的日子要交還本主」，賠償須先於獻贖愆祭完成。
  relation: 本章是賠償（shalem）原則在利未記中的核心應用案例——不僅要求足額歸還，更加罰五分之一，且明訂交還對象是「本主」，先人後神的次序清楚可見。
- title: 供物（qorban）
  path: link_folder/原文/供物（qorban）.md
  summary: 利未記6:20「他和他子孫所要獻給耶和華的供物，就是細麵伊法十分之一」，指大祭司受膏日起每日獻上的素祭。
  relation: 延續利1-5章「供物」作為五祭通用詞的用法，本章將此詞用於大祭司自身的常獻素祭，顯示供物一詞也涵蓋祭司自己的獻祭義務，不限獻祭者向神所獻。
- title: 燔祭
  path: link_folder/神學/燔祭.md
  summary: 利未記6:9-13規定燔祭的祭司條例：燔祭整夜留在壇上直到天亮，壇上的火要常常燒著、不可熄滅，祭司每日早晨添柴並將燔祭擺在壇上。
  relation: 承接利1章燔祭獻祭規則，本章補上「祭司如何維持燔祭運作」的操作細節——晝夜不熄的壇火、灰燼處理、聖俗衣物分別，是燔祭條例從獻祭者視角轉向祭司視角的具體示範。
- title: 每日獻祭（常獻燔祭）
  path: link_folder/神學/每日獻祭（常獻燔祭）.md
  summary: 利未記6:9,12呼應出29章「早晚常獻的燔祭」節律，規定燔祭從晚上燒到天亮、祭司每日早晨添柴擺祭，是常獻燔祭在利未記中的操作補述。
  relation: 本章補充常獻燔祭「誰、如何」維持壇火晝夜不滅的祭司職責細節，與出29:38-42的「獻什麼、何時獻」互為表裡。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: 利未記6:9-13「壇」貫穿全段——燔祭放在壇的柴上、壇上的火常燒不滅、灰倒在壇的旁邊；6:25「宰燔祭牲的地方宰贖罪祭牲」同指此壇。
  relation: 本章壇的角色從利1-5章「獻祭發生地點」擴展為「祭司晝夜維護的聖所核心設施」，灰燼處理、添柴等日常操作都圍繞此壇展開。
- title: 亞倫子孫
  path: link_folder/人物/亞倫子孫.md
  summary: 利未記6:9,14,16,18,20,25多次稱「亞倫和他的子孫」／「亞倫子孫」為燔祭、素祭、贖罪祭條例的執行者與領受祭司分者，18節更明訂「亞倫子孫中的男丁都要吃這一分，直到萬代」。
  relation: 本章確立亞倫子孫作為祭司體系日常運作的主體，不僅執行獻祭儀式，更是至聖供物的合法領受者，其男性後裔世代承接此職分與供應。
- title: 脂油（chelev）
  path: link_folder/原文/脂油（chelev）.md
  summary: 利未記6:12「並要把燔祭擺在壇上，在其上燒平安祭牲的脂油」，指出祭司每日早晨添柴時，也一併焚燒前一日平安祭所留的脂油。
  relation: 本章顯示脂油的焚燒與燔祭的晝夜燃燒程序整合為同一套祭司日常職責，不是獨立於燔祭之外的動作。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: 利未記6:14-23為素祭訂立祭司條例：一般素祭（14-18節）祭司取紀念份燒壇、餘分在聖處不帶酵吃；大祭司受膏日起每日常獻的素祭（19-23節）則全燒不可吃。
  relation: 本章是利2章素祭獻祭規則之後，補上「祭司如何處理素祭」的操作細節，並新增大祭司自獻素祭全燒不留的特殊規定，形成與一般素祭的鮮明對比。
- title: 紀念份
  path: link_folder/原文/紀念份.md
  summary: 利未記6:15「祭司要從其中，就是從素祭的細麵中，取出自己的一把，又要取些油和素祭上所有的乳香，燒在壇上，奉給耶和華為馨香素祭的紀念」。
  relation: 與利2章的規定一致，本章重申紀念份是素祭中唯一焚燒歸神的部分，其餘歸祭司在聖處食用。
- title: 馨香之氣
  path: link_folder/神學/馨香之氣.md
  summary: 利未記6:15「奉給耶和華為馨香素祭的紀念」、6:21「獻給耶和華為馨香的素祭」，兩次以馨香形容素祭焚燒紀念份與大祭司常獻素祭的蒙悅納。
  relation: 本章將馨香之氣的用法從利1-5章的燔祭、平安祭等延伸到素祭的兩種形式（一般與大祭司常獻），確認馨香是五祭焚燒部分的共同蒙悅納記號。
- title: 至聖的供物（聖與至聖之分）
  path: link_folder/主題/至聖的供物（聖與至聖之分）.md
  summary: 利未記6:17「是至聖的，和贖罪祭並贖愆祭一樣」、6:25「這是至聖的」、6:29「這是至聖的」，三次確認素祭、贖罪祭、贖愆祭皆屬至聖等級，僅限祭司在聖處食用。
  relation: 本章是利2章「至聖的供物」分類原則的延伸應用，將素祭、贖罪祭、贖愆祭三祭並列同屬至聖，並具體規定其食用地點限制在會幕院子（聖處）。
- title: 永遠的定例（chuqqat olam）
  path: link_folder/神學/永遠的定例（chuqqat olam）.md
  summary: 利未記6:18「直到萬代，作他們永得的分」、6:22「要全燒給耶和華。這是永遠的定例」，分別確立亞倫子孫食用素祭餘分、以及大祭司常獻素祭全燒的規定為世代不變的永遠定例。
  relation: 本章的永遠定例延伸自利3:17脂油血不可吃的先例，將此制度性用語套用到祭司分與大祭司自獻祭物的規定上，顯示此詞涵蓋範圍不限單一祭別。
- title: 受膏的祭司（mashiach kohen）
  path: link_folder/人物/受膏的祭司（mashiach kohen）.md
  summary: 利未記6:20「當亞倫受膏的日子」、6:22「亞倫的子孫中，接續他為受膏的祭司，要把這素祭獻上」，規定受膏的大祭司（及其世代繼任者）須自受膏之日起每日獻上素祭，全燒不可吃。
  relation: 本章補充利4章受膏祭司的贖罪祭條例之外，受膏祭司自身須終身每日獻素祭的義務，顯示其職分伴隨的持續性責任，而非僅限於就職當日的儀式。
- title: 伊法
  path: link_folder/原文/伊法.md
  summary: 利未記6:20「就是細麵伊法十分之一，為常獻的素祭：早晨一半，晚上一半」，指大祭司常獻素祭所用細麵的計量單位。
  relation: 與利5:11貧窮人贖罪祭細麵的伊法十分之一計量一致，本章將此單位用於大祭司自獻素祭，約2.2公升細麵，分早晚兩半獻上。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: 利未記6:24-30為贖罪祭訂立祭司條例：在燔祭牲宰殺處宰贖罪祭牲、屬至聖；官長與百姓的贖罪祭祭司可在聖處吃祭肉，但血帶進會幕在聖所贖罪的贖罪祭（大祭司、全會眾、大贖罪日），肉不可吃，必用火焚燒。
  relation: 本章承接利4章贖罪祭獻祭規則，補上「祭司如何處理祭肉」的操作細節，並清楚劃分「可吃」與「不可吃」兩類贖罪祭的界線，呼應利4章四級贖罪祭的血禮差異。
- title: 血
  path: link_folder/主題/血.md
  summary: 利未記6:27「這祭牲的血若彈在什麼衣服上，所彈的那一件要在聖處洗淨」；6:30「若將血帶進會幕在聖所贖罪，那肉都不可吃」。
  relation: 本章展示血在贖罪祭中的兩種延伸規定——濺血衣物須在聖處洗淨、血是否進入聖所決定祭肉是否可食，凸顯血在贖罪體系中的核心地位延伸至器物與空間的潔淨規範。
- title: 潔淨之地（maqom tahor）
  path: link_folder/地點/潔淨之地（maqom tahor）.md
  summary: 利未記6:11「把灰拿到營外潔淨之處」，指燔祭灰燼最終傾倒之處，與利4:12「營外潔淨之地、倒灰之所」同一地點。
  relation: 本章確認此地點不僅是利4章贖罪祭牲餘體的焚燒處，也是燔祭壇日常清灰的固定去處，是祭司每日職事的例行終點站。
- title: 全會眾（kol ha-edah）
  path: link_folder/人物/全會眾（kol ha-edah）.md
  summary: 利未記6:30「凡贖罪祭，若將血帶進會幕在聖所贖罪，那肉都不可吃，必用火焚燒」，此規定適用的三種情形之一即利4:13-21全會眾的贖罪祭。
  relation: 本章從祭司操作角度總結利4章全會眾贖罪祭「血帶入會幕」的後果——祭肉不可食用，須全數焚燒，呼應並補足利4章當時未直接說明的祭肉去向規則。
