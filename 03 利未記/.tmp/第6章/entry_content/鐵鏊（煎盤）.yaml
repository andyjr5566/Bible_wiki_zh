name: 鐵鏊（煎盤）
type: 文化
secondary_types: []
aliases:
- 鐵鏊
- 煎盤
status: formal
definition: 一種用於烘烤祭物的平底金屬器具。在利未記第6章的常獻素祭條例中，規定祭司要將細麵伊法十分之一在鐵鏊上用油調和做成，調勻並烤好後分成塊子獻給耶和華。此器具是製作祭司每日素祭的必備工具，反映了古代以色列獻祭文化中實際的烹飪方式。
accumulations:
- book: 利未記
  chapter: 6
  summary: 規定祭司受膏日的常獻素祭必須在鐵鏊上用油調和製作並烤好獻上。
  relation: 作為製作常獻素祭的指定器具，體現獻祭儀式中具體的物質文化與製作方式。
related_entries:
- 常獻的素祭（祭司每日）
- 素祭（minchah）
- 伊法十分之一
