name: 受膏的日子
type: 事件
secondary_types: []
aliases:
- 亞倫受膏的日子
status: formal
definition: 指亞倫及其子孫接續受膏為祭司的就職日子。在受膏之日，祭司要獻上細麵伊法十分之一為常獻的素祭（早晨一半，晚上一半）， 並在鐵鏊上用油調和做成烤好分塊的素祭。此祭物要全燒給耶和華，祭司不可吃，作為永遠的定例。
accumulations:
- book: 利未記
  chapter: 6
  summary: 當亞倫受膏的日子，他和他子孫要獻細麵伊法十分之一為常獻的素祭，早晨一半晚上一半；接續受膏的祭司要把這素祭全燒給耶和華，不可吃。
  relation: 規範祭司受膏就職時所獻素祭的條例與永遠定例。
