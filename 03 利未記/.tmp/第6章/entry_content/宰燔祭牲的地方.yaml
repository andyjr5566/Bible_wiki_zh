name: 宰燔祭牲的地方
type: 地點
secondary_types: []
aliases:
- 宰贖罪祭牲的地方
status: formal
definition: 耶和華面前宰燔祭牲的地方，也是宰贖罪祭牲的指定地點。贖罪祭牲要在耶和華面前、宰燔祭牲的地方宰殺，這祭是至聖的。此地點位於銅壇（燔祭壇）所在之處，表明贖罪祭與燔祭在獻祭地點上的關聯，突顯贖罪祭牲至聖的性質。
accumulations:
- book: 利未記
  chapter: 6
  summary: 贖罪祭牲要在耶和華面前、宰燔祭牲的地方宰殺，這是至聖的。
  relation: 指明贖罪祭牲的宰殺地點與燔祭牲相同，強調其至聖性質。
related_entries:
- 贖罪祭
- 燔祭（olah）
- 至聖
- 銅壇（燔祭壇）
- 會幕（帳幕整體）
