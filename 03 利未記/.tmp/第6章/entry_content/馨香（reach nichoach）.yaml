name: 馨香（reach nichoach）
type: 原文
secondary_types: []
aliases:
- 馨香
status: formal
definition: '希伯來文 reach nichoach，reach 意為「氣味」或「香氣」，nichoach 意為「安息」或「悅納」，合指獻給神並蒙悅納的香氣。本章用於素祭的條例中，指祭司從素祭的細麵中取出油和乳香燒在壇上，獻給耶和華作為馨香素祭的紀念，以及祭司受膏日子所獻素祭的馨香之氣。

  '
accumulations:
- book: 利未記
  chapter: 6
  summary: '本章第15節記載祭司要取些油和素祭上所有的乳香燒在壇上，奉給耶和華為馨香素祭的紀念；第21節記載亞倫受膏日子所獻的素祭要烤好獻給耶和華為馨香的素祭。

    '
  relation: '本章透過原文 reach nichoach 連結了素祭的紀念部分與祭司受膏時的常獻素祭，表明這些燒在壇上的祭物是蒙神悅納的香氣。

    '
related_entries:
- 素祭（minchah）
- 乳香
- 馨香素祭的紀念
- 常獻的素祭（祭司每日）
- 受膏的日子
