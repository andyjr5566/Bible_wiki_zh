name: 營外潔淨之處
type: 地點
secondary_types: []
aliases:
- 潔淨之處
status: formal
definition: 位於以色列營外的一個特定地點，專門用來傾倒壇上燔祭所產生的灰燼。此處被視為潔淨之處，用以妥善處理獻祭後的剩餘物，同時避免將祭壇的聖灰與營內百姓的日常生活混雜，維持神聖空間的秩序。
accumulations:
- book: 利未記
  chapter: 6
  summary: 祭司處理完壇旁的灰燼後，要換上衣服將灰拿到營外潔淨之處。
  relation: 作為獻祭儀式中灰燼的最終傾倒地點，承載了維護聖俗界線的空間功能。
related_entries:
- 燔祭灰
- 細麻布衣服（祭司服）
sources:
