name: 添柴（每日早晨）
type: 神學
secondary_types: []
aliases:
- 每日早晨燒柴
status: formal
definition: 祭司每日早晨必須在祭壇上添加柴火的事奉規定。這是為了維持壇上的火常常燒著不可熄滅，並預備焚燒當日的燔祭與平安祭牲的脂油，象徵著每日持續不斷的敬拜與奉獻生活。
accumulations:
- book: 利未記
  chapter: 6
  summary: 祭司要每日早晨在壇上燒柴，並把燔祭擺在壇上，在其上燒平安祭牲的脂油，以維持壇火常燒。
  relation: 規範了祭司每日定時的維護工作，是確保壇火不熄滅的具體事奉行動。
related_entries:
- 壇火常燒（不可熄滅）
- 燔祭（olah）
