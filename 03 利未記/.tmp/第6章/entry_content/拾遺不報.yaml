name: 拾遺不報
type: 神學
secondary_types: []
aliases:
- 撿了遺失的物上行詭詐
- 侵佔遺失物
status: formal
definition: 指撿到他人遺失的物品卻隱匿不報，企圖侵佔為己有的行為。在利未記第6章中，此行為被歸類為「在撿了遺失的物上行了詭詐」，並且若為此說謊起誓，則罪加一等。這不僅是對鄰舍財物的侵佔，更被視為對耶和華的干犯。神要求犯此罪者必須將所撿的物如數歸還，外加五分之一賠償，並獻贖愆祭，以恢復公義並求得神的赦免。
accumulations:
- book: 利未記
  chapter: 6
  summary: 若在撿了遺失的物上行了詭詐並說謊起誓，就要如數歸還並加五分之一，且獻贖愆祭。
  relation: 說明侵佔遺失物亦構成贖愆祭的適用條件，彰顯神對財物產權與誠實的保護。
related_entries:
- 贖愆祭（asham）
- 干犯耶和華（ma'al）
- 賠還（歸還加五分之一）
- 假誓
