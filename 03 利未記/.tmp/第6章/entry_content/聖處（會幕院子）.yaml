name: 聖處（會幕院子）
type: 地點
secondary_types: []
aliases:
- 聖處
- 會幕的院子
status: formal
definition: 指會幕的院子，為祭司吃祭物之特定場所。祭司吃剩餘素祭與贖罪祭牲的肉時，必須在此聖處進行，以維持祭物的至聖性並與世俗隔離。 若贖罪祭牲的血彈在衣服上，該衣服亦須在此聖處洗淨。
accumulations:
- book: 利未記
  chapter: 6
  summary: 亞倫子孫要在聖處不帶酵吃剩餘的素祭；贖罪祭的祭司也要在聖處（會幕院子裡）吃祭肉，且彈血的衣服要在聖處洗淨。
  relation: 規範祭司食用至聖祭物及處理彈血衣服的專屬地點。
related_entries:
- 素祭（minchah）
- 亞倫和他兒子（祭司）
- 彈血洗衣（聖處洗淨）
