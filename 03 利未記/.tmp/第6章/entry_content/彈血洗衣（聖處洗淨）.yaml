name: 彈血洗衣（聖處洗淨）
type: 神學
secondary_types: []
aliases:
- 聖處洗淨
- 彈血的衣服洗淨
status: formal
definition: 贖罪祭牲的血若彈在什麼衣服上，所彈的那一件要在聖處洗淨。此條例表明贖罪祭的血具有至聖的性質，凡接觸到血的衣物必須在聖處（會幕院子）洗淨，不可帶到營外普通地方處理，以維護聖與俗的界線，防止聖物被玷污或被視為平常。
accumulations:
- book: 利未記
  chapter: 6
  summary: 贖罪祭牲的血若彈在衣服上，所彈的那一件要在聖處洗淨。
  relation: 規範贖罪祭血彈在衣服上的處理方式，強調血的至聖性與聖處洗淨的必要性。
