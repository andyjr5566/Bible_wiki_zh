name: 摸祭成聖
type: 神學
secondary_types: []
aliases:
- 摸祭物成聖
status: formal
definition: 指凡摸到獻給耶和華的至聖祭物（如素祭、贖罪祭肉）的人，都必成為聖。 此條例表明祭物具有傳遞聖潔的特質，接觸祭物者被分別為聖歸屬於神，同時也暗示未經授權者不可隨意觸碰聖物。
accumulations:
- book: 利未記
  chapter: 6
  summary: 凡獻給耶和華的火祭，亞倫子孫中的男丁都要吃這一分；摸這些祭物的，都要成為聖。凡摸贖罪祭肉的也要成為聖。
  relation: 說明至聖祭物傳遞聖潔的性質及接觸祭物的神學影響。
related_entries:
- 素祭（minchah）
- 亞倫和他兒子（祭司）
- 火祭（isheh）
