name: 馨香素祭的紀念
type: 神學
secondary_types: []
aliases:
- 素祭的紀念
status: formal
definition: 指祭司從素祭的細麵中取出一把，加上油和素祭上所有的乳香，燒在壇上獻給耶和華的部分。 此舉作為獻祭者在神面前的「紀念」，其焚燒所產生的香氣蒙神悅納。剩餘的素祭則歸給亞倫子孫作為食物，顯示神對祭司的供應。
accumulations:
- book: 利未記
  chapter: 6
  summary: 祭司要從素祭的細麵中取出自己的一把，取些油和所有乳香，燒在壇上奉給耶和華為馨香素祭的紀念。
  relation: 確立素祭中燒在壇上歸神部分的條例與意義。
