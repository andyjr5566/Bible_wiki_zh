name: 壇火常燒（不可熄滅）
type: 神學
secondary_types: []
aliases:
- 壇火常燒
- 不可熄滅
status: formal
definition: 神吩咐祭司要維持祭壇上的火常常燒著、不可熄滅。這火要從晚上燒到天亮，並且每日持續燃燒，象徵神子民對神持續不斷的敬拜與獻祭，以及神同在的永續性與救贖的持續性。
accumulations:
- book: 利未記
  chapter: 6
  summary: 耶和華吩咐亞倫及其子孫，燔祭要放在壇的柴上，從晚上到天亮壇上的火要常常燒著，不可熄滅。
  relation: 規範祭司在祭壇上維持常燃之火的具體神學命令與事奉要求。
related_entries:
- 燔祭（olah）
- 添柴（每日早晨）
- 燔祭灰
