name: 火祭（isheh）
type: 原文
secondary_types: []
aliases:
- 火祭
status: formal
definition: '希伯來文 isheh，字根意為「火」，在獻祭體系中指藉由火獻給耶和華的祭物。本章提及素祭中獻給耶和華為馨香素祭的紀念，以及所獻給神的火祭中賜給祭司的分，表明火祭涵蓋了素祭等可燒在壇上的祭物。

  '
accumulations:
- book: 利未記
  chapter: 6
  summary: '本章第17節指出素祭是從所獻給耶和華的火祭中賜給祭司的分，且第18節說明凡獻給耶和華的火祭，亞倫子孫中的男丁都要吃這一分。

    '
  relation: '本章透過原文 isheh 將素祭與贖罪祭、贖愆祭同列為至聖的分，並規範祭司食用火祭的權利與成聖要求。

    '
related_entries:
- 素祭（minchah）
- 馨香素祭的紀念
- 至聖
- 摸祭成聖
- 亞倫和他兒子（祭司）
sources:
