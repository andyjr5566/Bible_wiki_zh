book: 利未記
chapter: 6
candidates:
  - name: 虧負鄰舍即干犯耶和華
    type: 神學
    evidence: |
      v1-3「若有人犯罪，干犯耶和華，在鄰舍交付他的物上，或是在交易上行了詭詐，或是搶奪人的財物，或是欺壓鄰舍，或是在撿了遺失的物上行了詭詐，說謊起誓」。
      KC：「Every sin against one's neighbor is in the first place a sin against God. It is 'unfaithfulness' against Him (cf. Jam 4:4)...My act against my neighbor is seen as an act against God.」
      GT丁良才：「若有人犯罪，干犯耶和華——做害人的事，也是干犯神……對鄰舍犯罪源於對耶和華犯罪。當人沒有真正信靠耶和華時，必然會向鄰舍犯罪。」
      這是贖愆祭第三類觸發情境（v1-7），不同於利5章聖物誤犯（5:15-16）與不可行之事誤犯（5:17-19），本類專指民事層面虧負鄰舍的六項罪行。
  - name: 壇火常燒不熄滅
    type: 主題
    evidence: |
      v9「燔祭要放在壇的柴上，從晚上到天亮，壇上的火要常常燒著」；v12「壇上的火要在其上常常燒著，不可熄滅」；v13「在壇上必有常常燒著的火，不可熄滅」——三次重複強調。
      KC：「The emphasis of the law of the burnt offering is that the fire must not go out (verses 9,12,13)...God wants His people to be constantly surrounded by that fragrance...that He has made them pleasing 'in the Beloved' (Eph 1:6).」
      CT：「以色列人在帳幕裏，或者還會發怨言，但是，祭壇上的燔祭還是不止息的為他們獻上」；「這火要常常燒著，表明它是藉人維持的……需要人不住的儆醒」。
      GT串珠註釋：「這是神自己點著的聖火（9:24；代下7:1），不斷燃燒代表以色列民永遠奉獻給神。」
      BH：「The perpetual fire on the altar symbolizes God's continuous presence and the ongoing need for purification and atonement...can be connected to the New Testament call for believers to 'pray without ceasing' (1 Thessalonians 5:17).」
  - name: 聖衣（祭司聖服）
    type: 主題
    evidence: |
      v10「祭司要穿上細麻布衣服，又要把細麻布褲子穿在身上，把壇上所燒的燔祭灰收起來，倒在壇的旁邊」；v11「隨後要脫去這衣服，穿上別的衣服，把灰拿到營外潔淨之處」。
      GT：「細麻布衣服——就是眾祭司在供職時所穿的聖衣，這衣服有四件如下：（一）細麻褲子，（二）細麻袍子，（三）細麻帶子，（四）細麻裹頭巾。」
      KC：「The linen garments signify purity...represents the righteous deeds (Rev 19:8)...The priest puts on other clothes when he takes the ashes out of the camp. That represents another aspect of our lives.」
      CT：「不問工作貴賤，只要是出乎神的差遣，同樣重要，同樣尊嚴；人對神的態度如何，也表現在他的外表上。」
      與出29、39章「聖衣」為同一套祭司禮服在利未記獻祭實務中的具體應用：本章新增「脫去聖衣、換穿常服才可出營」的規定，即聖俗分別不僅在於穿戴、更在於場合。
  - name: 褲子（細麻布褲子）
    type: 主題
    evidence: |
      v10「又要把細麻布褲子穿在身上」——與出28:42「細麻布褲子」規定同一衣物，於利未記獻祭實務中再次出現。
      GT聖經精讀本：「細麻布褲子: 祭司穿在裡面的褲子(出28:42)。」
  - name: 摸聖物成聖
    type: 神學
    evidence: |
      v18「凡獻給耶和華的火祭，亞倫子孫中的男丁都要吃這一分，直到萬代，作他們永得的分。摸這些祭物的，都要成為聖」；v27「凡摸這祭肉的要成為聖」——兩處重複同一原則。
      KC：「The grain offering offered as a fire offering has a sanctifying effect: 'Whoever touches them will become consecrated.' Everything that comes into connection with the Lord Jesus is separated for God.」
      GT：「摸這些祭物的，都要成為聖……唯獨聖潔的器具和潔淨的人才可以摸著這至聖的祭物（22:6-7）。」《舊約聖經背景註釋》：「這些聖物具有傳染能力，但只限於直接接觸，間接接觸是無效的（該2:12）。美索不達米亞的規例亦同樣禁止觸摸聖物。」
      GT聖經精讀本：「不是說所有摸聖物的人都成為聖潔，乃是管理聖物的人都屬於聖所，在聖所裡參與神聖潔的事，被視為聖潔的人。」
  - name: 瓦器打碎銅器擦淨
    type: 主題
    evidence: |
      v28「惟有煮祭物的瓦器要打碎；若是煮在銅器裡，這銅器要擦磨，在水中涮淨」。
      CT：「當時的人大概還沒有發明在瓦器上加釉藥的方法……瓦器上既沒有加磁釉，就是能滲透的，必吸收其中所煮之祭肉的汁，這肉汁無法能從瓦器中洗出來，所以必須打碎……若是煮在銅器裡，祭肉汗既不得滲入銅器裡，一經擦磨就容易洗涮乾淨。」
      KC：「An earthenware vessel represents our body (2Cor 4:7). This, as an instrument used by sin, must be broken...The bronze vessel speaks of what we have become after we have come to faith...Scouring and rinsing in water speaks of cleansing through the Word of God (Eph 5:26).」
      《舊約聖經背景註釋》：「陶器本質多孔，能夠吸收所裝之物的不潔。反之，銅或青銅容器則易於清洗潔淨，供日後使用。」
  - name: 大祭司受膏日常獻的素祭
    type: 主題
    evidence: |
      v19-23「當亞倫受膏的日子，他和他子孫所要獻給耶和華的供物，就是細麵伊法十分之一，為常獻的素祭：早晨一半，晚上一半……亞倫的子孫中，接續他為受膏的祭司，要把這素祭獻上，要全燒給耶和華。這是永遠的定例。祭司的素祭都要燒了，卻不可吃。」
      GT：「這祭也列在來7:27節所提大祭司每日必須為自己所獻的祭中……有注釋家以為這種素祭是每一個大祭司只在就職的日子獻一次的。」《啟導本》：「作大祭司的人每天要為自己和全體祭司獻上素祭……數量很小，屬象徵性的獻祭……祭司一點也不可以吃，因為這是為他們自己而獻的祭。」
      KC：「It is only brought when a new high priest is anointed...This is not a voluntary, but a mandatory grain offering, which may not be eaten...Aaron is a picture of the Lord Jesus as High Priest...the same Who was born on earth as Man from the Holy Spirit (flour mixed with oil).」
      與利2章一般素祭（會被祭司剩下食用）不同：本祭全燒不留、非自願而是受膏就職的強制獻祭，與會眾常獻的素祭並存（出29:38-42）。
  - name: 贖愆祭（asham）
    type: 原文
    evidence: v6「把贖愆祭牲——就是羊群中一隻沒有殘疾的公綿羊——牽到耶和華面前，給祭司為贖愆祭」；v7「祭司要在耶和華面前為他贖罪；他無論行了什麼事，使他有了罪，都必蒙赦免」；GT「本段還是論贖愆祭……五14至18節是論在聖物上的愆尤……本段是論在俗事上的愆尤，就是虧損人的事」。
  - name: 公綿羊
    type: 主題
    evidence: v6「羊群中一隻沒有殘疾的公綿羊」——與利5:15、18同一祭牲規定，本章再次確認公綿羊為贖愆祭指定祭牲。
  - name: 賠償（shalem）
    type: 原文
    evidence: v4-5「就要歸還他所搶奪的，或是因欺壓所得的，或是人交付他的，或是人遺失他所撿的物，或是他因什麼物起了假誓，就要如數歸還，另外加上五分之一，在查出他有罪的日子要交還本主」；CT「贖愆祭的這一個『還』字，和挽回祭（羅3:25）的『挽』字，乃是同樣的意思」。
  - name: 供物（qorban）
    type: 原文
    evidence: v20「他和他子孫所要獻給耶和華的供物，就是細麵伊法十分之一」。
  - name: 燔祭
    type: 神學
    evidence: v9「你要吩咐亞倫和他的子孫說，燔祭的條例乃是這樣：燔祭要放在壇的柴上」；v12「並要把燔祭擺在壇上，在其上燒平安祭牲的脂油」——本章8-13節整段即燔祭的祭司條例。
  - name: 每日獻祭（常獻燔祭）
    type: 神學
    evidence: v9「燔祭要放在壇的柴上，從晚上到天亮」；v12「祭司要每日早晨在上面燒柴，並要把燔祭擺在壇上」——與出29章「早晚常獻的燔祭」同一常獻節律，本章補充祭司維持壇火的實際操作細節。
  - name: 銅壇（燔祭壇）
    type: 主題
    evidence: v9-13「壇」貫穿全段（放在壇的柴上、壇上的火、燔祭灰收在壇的旁邊）；v25「宰燔祭牲的地方宰贖罪祭牲」同指燔祭壇。
  - name: 亞倫子孫
    type: 人物
    evidence: v9「你要吩咐亞倫和他的子孫說」；v14「亞倫的子孫要在壇前把這祭獻在耶和華面前」；v16「所剩下的，亞倫和他子孫要吃」；v18「亞倫子孫中的男丁都要吃這一分」；v20「他和他子孫」；v25「你對亞倫和他的子孫說」——本章8-30節祭司條例的執行主體。
    surfaces:
      - 亞倫和他的子孫
      - 他和他子孫
      - 亞倫子孫中的男丁
  - name: 脂油（chelev）
    type: 原文
    evidence: v12「在其上燒平安祭牲的脂油」。
  - name: 素祭（minchah）
    type: 原文
    evidence: v14「素祭的條例乃是這樣：亞倫的子孫要在壇前把這祭獻在耶和華面前」——14-23節整段為素祭的祭司條例。
  - name: 紀念份
    type: 原文
    evidence: v15「祭司要從其中……取出自己的一把，又要取些油和素祭上所有的乳香，燒在壇上，奉給耶和華為馨香素祭的紀念」。
  - name: 馨香之氣
    type: 神學
    evidence: v15「奉給耶和華為馨香素祭的紀念」；v21「烤好了分成塊子，獻給耶和華為馨香的素祭」。
  - name: 至聖的供物（聖與至聖之分）
    type: 主題
    evidence: v17「是至聖的，和贖罪祭並贖愆祭一樣」；v25「這是至聖的」；v29「凡祭司中的男丁都可以吃；這是至聖的」。
    surfaces:
      - 至聖的
  - name: 永遠的定例（chuqqat olam）
    type: 神學
    evidence: v18「直到萬代，作他們永得的分」；v22「要全燒給耶和華。這是永遠的定例」。
    surfaces:
      - 永遠的定例
      - 永得的分
  - name: 受膏的祭司（mashiach kohen）
    type: 人物
    evidence: v20「當亞倫受膏的日子」；v22「亞倫的子孫中，接續他為受膏的祭司，要把這素祭獻上」。
  - name: 伊法
    type: 原文
    evidence: v20「細麵伊法十分之一，為常獻的素祭」。
  - name: 贖罪祭
    type: 神學
    evidence: v25「你對亞倫和他的子孫說，贖罪祭的條例乃是這樣」——24-30節整段為贖罪祭的祭司條例；v30「凡贖罪祭，若將血帶進會幕在聖所贖罪，那肉都不可吃，必用火焚燒」。
  - name: 血
    type: 主題
    evidence: v27「這祭牲的血若彈在什麼衣服上，所彈的那一件要在聖處洗淨」；v30「若將血帶進會幕在聖所贖罪」。
  - name: 潔淨之地（maqom tahor）
    type: 地點
    evidence: v11「把灰拿到營外潔淨之處」——與利4:12「營外潔淨之地、倒灰之所」同一地點。
    surfaces:
      - 營外潔淨之處
  - name: 全會眾（kol ha-edah）
    type: 人物
    evidence: v30「凡贖罪祭，若將血帶進會幕在聖所贖罪，那肉都不可吃，必用火焚燒」——此規定適用的三種情形之一即利4:13-21全會眾的贖罪祭（血帶入會幕），本節是對利4章規定的祭司條例總結。
