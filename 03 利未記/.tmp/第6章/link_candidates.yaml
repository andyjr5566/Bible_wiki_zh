book: "利未記"
chapter: 6
candidates:
  # ========== v1-7 贖愆祭續篇：侵犯鄰舍財物 ==========
  - name: "贖愆祭（asham）"
    type: "原文"
    section: "祭禮"
    evidence: "v6-7 獻贖愆祭牲（無殘疾公綿羊）為侵犯鄰舍的罪贖罪；本章1-7節是第五章贖愆祭的延續，處理人際財物罪。BH: guilt offering (asham) specifically addresses sins involving deceit against a neighbor。CT: 贖愆祭的『還』與挽回祭的『挽』同義。"

  - name: "賠還（歸還加五分之一）"
    type: "神學"
    section: "賠償與復原"
    evidence: "v4-5 犯罪者須歸還所搶奪/欺壓/侵佔/拾遺之物，如數歸還並另加五分之一，在查出有罪的日子交還本主。BH: restitution in full + add a fifth (20%) served as penalty and deterrent。CT: 真正的悔改不僅在於言語，也在於實踐，結出與悔改相稱的果子（太3:8）。GT: 五分之一是罰金。"

  - name: "干犯耶和華（ma'al）"
    type: "原文"
    section: "神學"
    evidence: "v2『若有人犯罪，干犯耶和華』——對鄰舍的欺騙、搶奪、欺壓等罪，本質上是對神不忠實。BH: sin is ultimately against God, a breach of covenant。CT: 人任何得罪別人的事，都是干犯神的。KC: every sin against one's neighbor is in the first place a sin against God, unfaithfulness against Him。"

  - name: "交易上的詭詐"
    type: "神學"
    section: "社會倫理"
    evidence: "v2『在交易上行了詭詐』——買賣中的欺騙、舞弊、攙假、不公道的尺秤升斗。CT: 包括一切欺騙、投機、作偽、舞弊、攙假、冒牌及不公道的度量。GT: 用不正當的方法來營利，把不該得的東西變成自己所有的。"

  - name: "拾遺不報"
    type: "神學"
    section: "社會倫理"
    evidence: "v3『撿了遺失的物上行了詭詐，說謊起誓』——拾獲他人失物後否認或謊稱未見。CT: 基督徒不可以拾東西，拾起來也要去還人家。GT: 在遺失的物上，有許多人行了詭詐，有變作沒有，多變作少，好變作壞。"

  - name: "假誓"
    type: "神學"
    section: "社會倫理"
    evidence: "v3,5『說謊起誓』『因什麼物起了假誓』——以假誓掩蓋侵佔他人財物的事實。BH: swearing falsely, especially in God's name, was a serious offense, misusing the sacred name of the Lord。CT: 人起假誓乃是罪上加罪。"

  # ========== v8-13 祭司獻燔祭的條例 ==========
  - name: "壇火常燒（不可熄滅）"
    type: "神學"
    section: "祭禮"
    evidence: "v9,12,13 三次強調壇上的火要常常燒著、不可熄滅。BH: perpetual fire symbolizes God's continuous presence and ongoing need for atonement。CT: 火乃是神聖潔的表號；神與人交通的門路是常常開著的。KC: God wants His people to be constantly surrounded by the fragrance of the burnt offering。"

  - name: "燔祭灰"
    type: "神學"
    section: "祭禮"
    evidence: "v10-11 祭司收燔祭灰倒在壇旁，再換衣將灰拿到營外潔淨之處。CT: 灰表徵人天然生命的盡頭，不再改變；倒在東邊日出的方向表徵死不是結局，要帶進復活。KC: the believer occupied with how perfectly the offering has been consumed, how perfectly the Lord Jesus has done His work。"

  - name: "細麻布衣服（祭司服）"
    type: "文化"
    section: "祭司"
    evidence: "v10 祭司收灰時須穿細麻布衣服和褲子。BH: linen garments signify purity and holiness, essential for approaching God。CT: 祭司供職時必須穿上祭司服（出28:40-41），遮掩下體免得擔罪而死。GT: 不問工作貴賤，只要是出乎神的差遣，同樣重要，同樣尊嚴。"

  - name: "營外潔淨之處"
    type: "地點"
    section: "聖潔空間"
    evidence: "v11 祭司換衣後將灰拿到營外潔淨之處。BH: removal of ashes outside the camp highlights the need to keep the camp pure。CT: 營外表徵世界；信徒當把身體獻上，活著事奉神（羅12:1）。KC: outside the camp means to take a place of shame, openly admitting we have taken the side of a rejected Lord。"

  - name: "添柴（每日早晨）"
    type: "神學"
    section: "祭禮"
    evidence: "v12 祭司每日早晨在壇上燒柴，把燔祭擺上，燒平安祭牲的脂油。BH: daily addition of wood signifies regular and disciplined approach in maintaining relationship with God。CT: 信徒早晨起來和晚上睡覺的時候，也當除去一切攔阻自己的事，把心中的火挑旺起來（羅12:11；提後1:6）。"

  # ========== v14-18 祭司獻素祭的條例 ==========
  - name: "素祭（minchah）"
    type: "原文"
    section: "祭禮"
    evidence: "v14-18 素祭的條例：祭司取一把細麵+油+乳香燒為紀念，剩下的祭司在聖處不帶酵而吃。BH: grain offering represents dedication of fruits of human labor to God。CT: 素祭含有禮物或貢物的意味，自願獻祭表明忠貞與感恩。"

  - name: "馨香素祭的紀念"
    type: "神學"
    section: "祭禮"
    evidence: "v15 祭司取一把細麵、油和所有乳香燒在壇上，奉給耶和華為馨香素祭的紀念。BH: memorial portion signifies the offering being wholly dedicated to God, a reminder of the covenant relationship。CT: 馨香指聞起來心曠神怡的氣味，讓神聞到而蒙悅納。"

  - name: "聖處（會幕院子）"
    type: "地點"
    section: "聖潔空間"
    evidence: "v16,26 祭司吃祭物必須在聖處，即在會幕的院子裡。BH: holy place refers to a location set apart for sacred purposes。CT: 會幕院內有燔祭壇和洗濯盆的地方，這院子稱聖是因為會幕是神的住處。KC: a holy place is where natural thinking is not given room, everything directed toward God。"

  - name: "不帶酵（無酵）"
    type: "神學"
    section: "祭禮"
    evidence: "v16-17 素祭剩下的必須在聖處不帶酵而吃，烤的時候不可攙酵。BH: leaven symbolizes sin and corruption; requirement signifies purity and holiness。CT: 無論是裡面的接受（吃）或是外面的接觸（烤），都不可有罪（酵）的成分。"

  - name: "至聖"
    type: "神學"
    section: "聖潔等級"
    evidence: "v17,25,29 素祭、贖罪祭、贖愆祭都是至聖的。BH: most holy signifies the highest level of sanctity, set apart for God。CT: 至聖的通指分別為聖歸給神的祭物和物件，雖蒙神賞賜給祭司享用，但仍視為至聖之物。"

  - name: "摸祭成聖"
    type: "神學"
    section: "聖潔傳遞"
    evidence: "v18,27 凡摸這些祭物的都要成為聖。BH: anything touching the offerings becomes holy, underscoring the sacredness。CT: 因所獻的祭物是至聖的，故凡與祭物接觸過的人與物都成為聖。GT: 聖物具有傳染能力，但只限於直接接觸。"

  # ========== v19-23 大祭司受膏日的常獻素祭 ==========
  - name: "受膏的日子"
    type: "事件"
    section: "祭司"
    evidence: "v20 當亞倫受膏的日子，他和他子孫所要獻給耶和華的供物。BH: the anointing signifies consecration and dedication to the priestly office。CT: 大約是正月初八日，就是大祭司就職的日子（八35）。KC: Aaron is a picture of the Lord Jesus as High Priest, anointed by God。"

  - name: "常獻的素祭（祭司每日）"
    type: "神學"
    section: "祭禮"
    evidence: "v20 細麵伊法十分之一，為常獻的素祭：早晨一半，晚上一半。BH: division into morning and evening highlights continual worship and devotion。CT: 表徵每天早晚都要過獻身事奉神的生活。"

  - name: "伊法十分之一"
    type: "文化"
    section: "度量與供物"
    evidence: "v20 細麵伊法十分之一。BH: a tenth of an ephah is a specific measure, indicating precision and orderliness in worship。CT: 約折合2.2公升的細麵。GT: 兩個祭的用量約是五杯麵粉。"

  - name: "鐵鏊（煎盤）"
    type: "文化"
    section: "器物"
    evidence: "v21 要在鐵鏊上用油調和做成，調勻了烤好了分成塊子。BH: griddle indicates a method of preparation common in ancient Near Eastern cultures。CT: 表徵與聖靈調和（調油）、受火煉的苦（烤）、十字架的破碎（分塊）。"

  - name: "祭司素祭全燒"
    type: "神學"
    section: "祭禮"
    evidence: "v22-23 祭司的素祭都要燒了，卻不可吃。BH: complete burning signifies total devotion and surrender to God。CT: 大祭司若吃自己所獻的，那祭就與沒有獻上一樣。KC: the Lord Jesus as High Priest in heaven is inseparable from His coming to earth and His life on earth for God。"

  # ========== v24-30 祭司獻贖罪祭的條例 ==========
  - name: "贖罪祭"
    type: "神學"
    section: "祭禮"
    evidence: "v24-30 贖罪祭的條例：宰於燔祭牲處、祭司吃、血彈衣洗淨、瓦器打碎銅器擦磨、血入會幕者肉不可吃。BH: sin offering was crucial for atoning unintentional sins and restoring relationship with God。CT: 贖罪祭的祭牲作為代贖祭物，是分別出來獻給神的。"

  - name: "宰燔祭牲的地方"
    type: "地點"
    section: "祭禮"
    evidence: "v25 要在耶和華面前、宰燔祭牲的地方宰贖罪祭牲。BH: shared location indicates interconnectedness of different types of offerings。CT: 就是在燔祭壇的北邊（一11）。KC: whoever brings a sin offering may also see that the Lord Jesus is also the burnt offering。"

  - name: "彈血洗衣（聖處洗淨）"
    type: "神學"
    section: "祭禮"
    evidence: "v27 祭牲的血若彈在衣服上，所彈的那一件要在聖處洗淨。BH: blood of sacrifice was sacred; washing in a holy place ensured respect for sacredness。CT: 表徵不可將基督的寶血當作平常看待。GT: 因為聖潔的血彈在了不潔的衣服上，若不洗淨，神的聖潔也因此被玷污。"

  - name: "瓦器打碎"
    type: "神學"
    section: "祭禮"
    evidence: "v28 煮祭物的瓦器要打碎。BH: clay pot absorbed impurities and could not be cleansed, must be destroyed。CT: 瓦器表徵人天然的生命，須十字架的破碎。GT: 瓦器會滲入油和味，清洗不掉，所以要打碎。"

  - name: "銅器擦磨涮淨"
    type: "神學"
    section: "祭禮"
    evidence: "v28 若煮在銅器裡，銅器要擦磨，在水中涮淨。BH: bronze being non-porous could be cleansed and reused。CT: 銅器表徵審判；基督已經滿足神公義的審判，信徒在基督裡面只要接受神話語的光照和話中之水的洗淨。"

  - name: "血入會幕的贖罪祭（肉不可吃）"
    type: "神學"
    section: "祭禮"
    evidence: "v30 凡贖罪祭，若將血帶進會幕在聖所贖罪，那肉都不可吃，必用火焚燒。BH: prohibition underscores seriousness of sin and sacredness of atonement。CT: 包括三種：大祭司的贖罪祭、全體會眾的贖罪祭、大贖罪日的贖罪祭。KC: when the anointed priest or people have sinned, all are guilty and unfit to eat it。"

  # ========== 跨章延續（已在先前章節建立的條目，本章繼續使用） ==========
  - name: "亞倫和他兒子（祭司）"
    type: "人物"
    section: "祭司"
    evidence: "v9-10,14,16,18,20,22,25-26,29 全章反覆提及亞倫和他子孫（祭司）的職責與權利。"

  - name: "燔祭（olah）"
    type: "原文"
    section: "祭禮"
    evidence: "v9-13 燔祭的條例：壇火常燒、收灰、添柴。本章從祭司角度補充第一章獻祭者的角度。"

  - name: "平安祭（shelamim）"
    type: "原文"
    section: "祭禮"
    evidence: "v12 祭司在壇上燒平安祭牲的脂油。BH: peace offering symbolized fellowship and reconciliation with God。"

  - name: "脂油"
    type: "主題"
    section: "祭禮"
    evidence: "v12 燒平安祭牲的脂油。CT: 表徵將上好的因著感恩獻給神。"

  - name: "乳香（levonah）"
    type: "神學"
    section: "祭禮"
    evidence: "v15 取素祭上所有的乳香燒在壇上。BH: frankincense symbolizes prayer and devotion rising to God。"

  - name: "無殘疾"
    type: "神學"
    section: "祭禮"
    evidence: "v6 贖愆祭牲須是羊群中一隻沒有殘疾的公綿羊。"

  - name: "公綿羊（ayil）"
    type: "文化"
    section: "祭禮"
    evidence: "v6 贖愆祭牲為無殘疾的公綿羊。BH: unblemished ram of proper value, foreshadowing Christ as Lamb without defect。"

  - name: "血（dam）"
    type: "神學"
    section: "祭禮"
    evidence: "v27,30 祭牲的血彈衣洗淨、血入會幕的贖罪祭肉不可吃。BH: blood representing life was crucial element in atonement process。"

  - name: "火祭（isheh）"
    type: "原文"
    section: "祭禮"
    evidence: "v17-18 從所獻給我的火祭中賜給他們的分。CT: 祭物獻給神都須經火焚燒，故稱火祭。"

  - name: "馨香（reach nichoach）"
    type: "原文"
    section: "祭禮"
    evidence: "v15,21 馨香素祭的紀念、馨香的素祭。BH: pleasing aroma indicates God's acceptance and satisfaction with the offering。"

  - name: "供物"
    type: "主題"
    section: "祭禮"
    evidence: "v20 亞倫受膏的日子所要獻給耶和華的供物。"

  - name: "贖罪（kipper）"
    type: "神學"
    section: "祭禮"
    evidence: "v7 祭司要在耶和華面前為他贖罪，他無論行了什麼事都必蒙赦免。"

  - name: "會幕（帳幕整體）"
    type: "主題"
    section: "聖潔空間"
    evidence: "v16,26 在會幕的院子裡吃。v30 將血帶進會幕在聖所贖罪。"

  - name: "銅壇（燔祭壇）"
    type: "主題"
    section: "聖所器物"
    evidence: "v9-13 壇上的火、壇的柴、壇的旁邊。全章圍繞燔祭壇的運作。"

  - name: "耶和華曉諭摩西"
    type: "事件"
    section: "啟示"
    evidence: "v1,8,19,24 四次『耶和華曉諭摩西說』，分段啟示贖愆祭續篇、燔祭條例、素祭條例、贖罪祭條例。"