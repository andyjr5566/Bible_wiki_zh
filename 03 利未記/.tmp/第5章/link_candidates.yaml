book: "利未記"
chapter: 5
candidates:
  - name: "贖愆祭（asham）"
    type: "原文"
    evidence: "利未記5章核心主題：贖愆祭條例（v1-19），希伯來文 asham 意為「罪、過犯、贖愆祭」，表為得罪聖物、誤犯罪、發誓失信而設的祭。BH、CCB、KC 均詳細解釋其字義、儀式與預表基督。"
    surfaces:
      - "贖愆祭"
      - {phrase: "供物", verses: [6, 7, 11, 15, 18]}
      - {phrase: "獻...為贖愆祭", verses: [6, 7, 11, 15, 18]}

  - name: "贖罪祭"
    type: "神學"
    evidence: "v6、9「一隻作贖罪祭」，希伯來文 chatta't。KC 指出贖愆祭與贖罪祭常配合獻上，贖罪祭處理罪的性質，贖愆祭處理罪的後果。"
    surfaces:
      - "贖罪祭"
      - "作贖罪祭"

  - name: "按手"
    type: "原文"
    evidence: "v6、18 隱含按手儀式（參利未記4:4、15、24、29、33），希伯來文 samak，表認同、轉移、委身。KC 指出此預表信徒與基督聯合（羅6:5）。"
    surfaces:
      - "按手"

  - name: "贖罪"
    type: "神學"
    evidence: "v6、10、13、16、18「祭司要為他贖了，他必蒙赦免」，希伯來文 kaphar（遮蓋、抹掉）。KC 指出贖罪預表基督寶血遮蓋罪惡；CCB 註解「祭物本身永不能除罪，反而叫人想起罪來」。"
    surfaces:
      - "贖罪"
      - "贖了"
      - "蒙赦免"
      - "赦免"

  - name: "血"
    type: "神學"
    evidence: "v9「把些贖罪祭牲的血彈在壇的旁邊，剩下的血要流在壇的腳那裡」。KC 指出血代表生命（利17:11），預表基督寶血贖罪。BH 解釋灑血預表基督之血潔淨信徒（約壹1:7）。"
    surfaces:
      - "血"
      - "彈血"
      - "流血"

  - name: "脂油"
    type: "主題"
    evidence: "v10、16「脂油」歸耶和華，與平安祭同例。KC 解釋脂油代表基督獻上自己的精力與活力；CCB 指出脂油屬神（利3:16），表基督完全為神而活。"
    surfaces:
      - "脂油"

