"book": "利未記"
"chapter": !!int "5"
"updates":
- "title": "賠償（shalem）"
  "path": "link_folder/原文/賠償（shalem）.md"
  "summary": "利未記第5章14-19節引入贖愆祭（asham）制度，核心特徵為「賠償加五分之一」：人若干犯耶和華的聖物（如誤吃聖物、不獻初熟之物、不納十分之一等），須按祭司估價（按聖所舍客勒）如數償還虧欠額，另加五分之一作為罰金給祭司，再獻無殘疾公綿羊為贖愆祭，祭司為他贖罪才蒙赦免（v15-16）。若誤犯禁令（行了耶和華所吩咐不可行的事），雖不知道仍有罪，同樣須獻公綿羊為贖愆祭（v17-19）。CT 指出贖愆祭與贖罪祭的基本不同在於「犯罪的人有償還的機會」；KC 強調賠償後須以更大熱心重新奉獻自己（加五分之一預表更深的委身）；BH 說明 restitution 是補償損失或損害，加五分之一既補償合法物主損失、也作為犯罪者的刑罰。"
  "relation": "本章為贖愆祭的賠償原則提供首次完整立法（v14-19），確立「先賠償、後獻祭、才赦免」的次序（太5:23-24 同此原則）。加五分之一的罰金制度（利5:16；6:5；民5:7）貫穿摩西律法，預表基督不僅替人死（贖罪祭）、更償還人因罪對神與人的一切虧欠（賽53:10 稱彌賽亞為贖愆祭）。"
- "title": "紀念份"
  "path": "link_folder/原文/紀念份.md"
  "summary": "利未記第5章12節規定，極貧窮者獻細麵為贖罪祭時，祭司要「取出自己的一把來作為紀念，按獻給耶和華火祭的條例燒在壇上」。CT 解釋這一把是為獻祭之用、完全焚燒成為馨香之氣獻給神，其餘細麵歸祭司享用（v13「剩下的麵都歸與祭司，和素祭一樣」）。GT 丁良才指出原文無「自己的」三字，所取出的一把燒在壇上作為紀念。此處的紀念份與素祭的紀念份（利2:2）功能相同——取一部分焚燒代表整體獻上，餘下歸祭司。"
  "relation": "本章將紀念份制度延伸至贖罪祭的細麵供物（v11-13），顯示即使無血祭物，只要與壇上火祭同焚，仍具贖罪效力。紀念份作為「代表整體獻上」的象徵，預表基督將自己完全獻上、蒙神紀念。"
- "title": "供物（qorban）"
  "path": "link_folder/原文/供物（qorban）.md"
  "summary": "利未記第5章11節為極度貧窮者設立第三級供物：力量不夠獻兩隻斑鳩或雛鴿者，「就要因所犯的罪帶供物來，就是細麵伊法十分之一為贖罪祭；不可加上油，也不可加上乳香，因為是贖罪祭」。CT 指出伊法十分之一約2.2公升細麵，價值低於兩隻鳥，是神特別優待最貧窮人的辦法。KC 強調這非血祭卻能贖罪是特例，代表對基督工作認識極淺的人——只看見耶穌是完全人、未犯他犯的罪，卻未意識到必須流血受死才能赦罪。GT 丁良才說明神特要體恤最貧窮的人，獻細麵為贖罪祭是特別優待。"
  "relation": "本章將供物（qorban）概念從素祭延伸至贖罪祭，顯示供物的核心不在物質價值、而在獻祭者誠實認罪的心。細麵供物不可加油和乳香，與素祭（利2:1）明確區分，強調贖罪祭的憂痛性質而非喜慶。"
- "title": "舍客勒"
  "path": "link_folder/原文/舍客勒.md"
  "summary": "利未記第5章15節規定贖愆祭牲的估價標準為「聖所的舍客勒」：犯罪者須「照你所估的，按聖所的舍客勒拿銀子，將贖愆祭牲——就是羊群中一隻沒有殘疾的公綿羊——牽到耶和華面前為贖愆祭」。CT 解釋聖所的舍客勒是當時在聖所內使用的砝碼，作為收取奉獻物、贖罪銀時的度量標準，每一舍客勒約折合11.5公克。GT 丁良才引猶太傳統解釋一隻羊羔價值至少兩舍客勒，有注釋家以為贖愆祭的公綿羊至少須值二舍客勒銀子。KC 則將舍客勒估價連結到基督十字架所付的代價：'The valuation in silver by shekels refers to the price the Lord Jesus paid on the cross.'"
  "relation": "本章引入「聖所的舍客勒」作為贖愆祭估價的專用標準（v15, 18），與利27章的估價制度一致。舍客勒估價確保贖愆祭的公綿羊具備足夠價值，預表基督贖價的完全充足。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "利未記第5章祭司角色貫穿全章：獻贖罪祭（v6, 8-10）、獻贖愆祭（v15-16, 18）、為犯罪者贖罪使其蒙赦免（v6, 10, 13, 16, 18）、估定贖愆祭牲價值（v15, 18）、取一把細麵作紀念份焚燒（v12）、吃剩餘的細麵（v13「剩下的麵都歸與祭司，和素祭一樣」）。CT 指出祭司是「代表人獻祭給神的聖職人物」。KC 強調祭司作中保：'The priest shall make atonement on his behalf for his sin.' BH 說明祭司角色：'The priest acted as a mediator between the people and God.'"
  "relation": "本章展示祭司在贖罪祭與贖愆祭中的多重職能——不僅獻祭，更擔任估價者（按聖所舍客勒定公綿羊價值）、紀念份焚燒者、餘物領受者。祭司作為神人之間的中保，預表基督是「永遠活著的大祭司，替我們代求」（來7:25）。"
- "title": "脂油（chelev）"
  "path": "link_folder/原文/脂油（chelev）.md"
  "summary": "利未記第5章7-10節規定窮人獻兩隻鳥為贖罪祭時，一隻作贖罪祭、一隻作燔祭。KC 解釋此安排的原因：'The sin offering is a horrible thing for God, but the fat is not. But there is no fat on a bird. That is why the second bird is destined as a burnt offering.' 鳥類脂油極少無法分離焚燒，故以第二隻全燒的燔祭代替脂油——脂油在贖罪祭中是獻給耶和華為馨香之氣的部分（利4:8-10, 31, 35），代表基督使神滿足的方面。GT 丁良才亦指出：獻公牛犢或山羊綿羊為贖罪祭時，壇上所燒的脂油表示獻祭者將自己獻給神（即燔祭所表之意），因鳥無脂油，故以一整隻鳥作燔祭替代。"
  "relation": "本章從反面（鳥無脂油故需另獻燔祭）印證脂油在贖罪祭中的關鍵地位——脂油是贖罪祭中「使神滿足、蒙神悅納」的部分，預表基督完全奉獻自己、使神心滿意足。"
