book: 利未記
chapter: 5
updates:
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: |
    利5:1-13 雖以「贖愆祭」一詞出現，所獻的其實仍是贖罪祭。丁良才給了兩個證據：「（一）這祭稱為贖罪祭（v6-9、11-12）；（二）這祭的祭牲本來也是贖罪祭的祭牲（v6，參利4:28、32），與贖愆祭的祭牲不同（v18，利6:6）。」他因此主張「本段還是論贖罪祭，故此是屬第四章」。本段列出三種要獻祭的過犯：該作見證卻不作（v1）、無意摸了不潔（v2-3）、冒失發誓（v4），並按力量分三級：母羊／羊羔／山羊、兩隻鳥、細麵伊法十分之一。
  relation: |
    本段與利4 的關鍵差別在於認罪成了必經步驟。《舊約聖經背景註釋》：「這祭與第四章的祭不同之處，在於認罪是必經步驟，相同之處則是其結果同是聖所得潔淨，神人得和好。」該書並把這幾節的罪另立一類：「這些罪行不是無意也非故意而犯，而是自屬一類。違犯的原因可能是疏忽，也可能是軟弱。但因日久遺忘或不願繳付代價，犯法至今已經過了一段時期。」KC 稱 v1-13 為「介於贖罪祭與贖愆祭之間的一種中間型態」。丁良才另把贖罪祭牲的血依祭物大小整理成一道階梯：鳥的血彈在壇的旁邊（利5:9）、羊的血抹在壇的四角（利4:25、30、34）、公牛的血帶進會幕對著幔子彈七次並抹在香壇四角（利4:6-7、17-18）。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    利5:7-10 力量不夠獻羊羔的人要獻兩隻斑鳩或雛鴿，「一隻作贖罪祭，一隻作燔祭」，且次序是先獻贖罪祭（v8「祭司就要先把那贖罪祭獻上」），第二隻「照例」獻為燔祭——丁良才指即照利1:14-17 獻鳥為燔祭的條例。
  relation: |
    利1:14 獻鳥為燔祭只要一隻，這裡卻要兩隻。理由是機械性的：丁良才指出獻牛羊為贖罪祭時，燒在壇上的脂油已經表示獻祭者把自己獻給神（那正是燔祭的意思），「但因鳥沒有多少脂油，所以就將一隻作燔祭，一隻作贖罪祭」；串珠：「因為獻鳥類的時候，不能把鳥的脂油除下，故須獻上兩隻。」KC 把它讀成神學：那第二隻要獻為燔祭的鳥，是用來代替較大祭牲身上的脂油——因為「贖罪祭在神眼中是可憎的，脂油卻不是。但鳥身上沒有脂油。」他並由此讀出神要聽的是什麼：贖罪祭無論多麼可憎，其中仍有榮耀神的成分——「神願意聽我們說：那位甘願為我們的罪而死的，也正是那位榮耀了祂的。」
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: |
    利5:11-13 極貧者可獻細麵伊法十分之一（約2.2公升）為贖罪祭，但「不可加上油，也不可加上乳香，因為是贖罪祭」——串珠指出這正是「藉此和素祭有所分別」。v13 末並言明「剩下的麵都歸與祭司，和素祭一樣」，丁良才註：「就是和爐中烤的，煎盤中煎的，並鐵鏊上烙的一樣（利7:9）。」
  relation: |
    這是素祭與贖罪祭最貼近卻又最不能混同的一處。形式上幾乎相同（細麵、取一把作紀念、燒在壇上、其餘歸祭司），差別只在拿掉油與乳香——素祭的兩樣標記正好被取消。為什麼？CT 讀其心情：「是表明為罪刻苦憂痛，與獻祭榮耀神不同」；《舊約聖經背景註釋》給的最直白：「油和乳香與喜慶有關，這不是慶典，所以不當獻。」KC 同讀：這份麵「使人想起素祭，但它不是素祭。油和乳香不可加上。它是贖罪祭，神並不以它為喜悅」。
- title: 血
  path: link_folder/神學/血.md
  summary: |
    利5:9 鳥的贖罪祭「也把些贖罪祭牲的血彈在壇的旁邊，剩下的血要流在壇的腳那裡」。丁良才解釋為何不灑在壇的周圍：「贖罪祭之鳥的血是不多的，因此難以灑在壇的周圍，只須彈在壇的旁邊」；並指出與燔祭之鳥的差別——燔祭之鳥的血是「流在壇的旁邊」（利1:15）。
  relation: |
    丁良才在本章把贖罪祭牲的血依祭物大小整理成三層，正好是一道由外而內的階梯：鳥的血彈在壇的旁邊（利5:9）、羊的血抹在壇的四角上（利4:25、30、34）、公牛的血帶進會幕對著幔子彈七次又抹在香壇的四角上（利4:6-7、17-18）。祭物愈大、罪的影響愈深，血就走得愈裡面。利5:11-13 則是這道階梯的盡頭之外——細麵無血。丁良才：「本來血祭才算是贖罪祭（來9:22），但神在此是特要體恤最貧窮的人。」但《精讀本》指出它仍未脫離流血的原則：「細麵本身不能單獨作為贖罪祭，要獻在燔祭壇上，與燔祭一同焚燒，加在他人所獻的祭牲血上。」
- title: 壇
  path: link_folder/主題/壇.md
  summary: |
    利5:9 鳥的贖罪祭血彈在「壇的旁邊」、剩下的流在「壇的腳那裡」；v12 細麵的一把「按獻給耶和華火祭的條例燒在壇上」。《精讀本》指出細麵要「獻在燔祭壇上，與燔祭一同焚燒」。
  relation: |
    本章使壇成為「連最窮的人也進得來」的那一點。利4 的壇按身分分級（香壇／燔祭壇），利5 則按力量分級，而三級的終點都是同一座燔祭壇：鳥的血彈在壇旁、細麵的一把燒在壇上。丁良才：獻細麵為贖罪祭「是一種特別優待的辦法」。KC 由此讀出全章最要緊的一句：這條為窮人中的窮人所設的條例，正證明了神赦免人不是按著我們對主耶穌工作的認識有多少，而是按著祂自己對那工作的看重。
- title: 燒在壇上
  path: link_folder/事件/燒在壇上.md
  summary: |
    利5:12 極貧者的細麵贖罪祭：「祭司要取出自己的一把來作為紀念，按獻給耶和華火祭的條例燒在壇上；這是贖罪祭。」丁良才註：原文沒有「自己的」三個字（參利2:2），所取出的一把是燒在壇上作為紀念，其餘的麵歸與獻這祭的祭司。
  relation: |
    同樣是「取一把燒在壇上」，利2 的素祭是馨香的火祭，利5 的細麵卻是贖罪祭——差別在拿掉了油與乳香。這使「燒在壇上」這個動作本身不決定祭的性質；決定性質的是配料與心情。《舊約聖經背景註釋》：「油和乳香與喜慶有關，這不是慶典，所以不當獻。」《精讀本》另指出細麵不能單獨成祭：「要獻在燔祭壇上，與燔祭一同焚燒，加在他人所獻的祭牲血上。符合『若不流血，罪就不得赦免』的原則。」
- title: 宰殺
  path: link_folder/事件/宰殺.md
  summary: |
    利5:8 鳥的贖罪祭：「從鳥的頸項上揪下頭來，只是不可把鳥撕斷。」CT 指出「揪下頭來」這個動作相當於宰殺牛羊，「不可把鳥撕斷」則連到亞伯拉罕獻祭時沒有將鳥劈開（創15:10）。
  relation: |
    丁良才對這兩句提出兩種解法：一是本處省略了利1:14-17 中用血以外的條例，只提首末兩句（揪下頭來、把鳥撕開只是不可撕斷），如此則與獻鳥為燔祭的條例相同；二是按舊譯本作「當從鳥項上揪鳥的頭，只是不可揪斷」，如此則與獻鳥為燔祭不同。丁良才自己判斷「第一個解法大概不錯」。《精讀本》採同一立場：「宰殺的方法與燔祭（利1:14-17）和贖罪祭一樣。」
- title: 按手（samak）
  path: link_folder/原文/按手（samak）.md
  summary: |
    利5 未明文提到按手，但丁良才在 v5 指出認罪與按手的關係：「有罪的人大概在獻祭以前要先承認他的罪，所以本節之認罪的話與獻祭行按手禮時的認罪未必是一事（箴28:13）。」
  relation: |
    利5:5「他有了罪的時候，就要承認所犯的罪」是本章的樞紐，也為按手補上一層：認罪先於獻祭，而按手時的認罪可能是另一次。KC 指出認罪的定義就在經文裡——認罪就是把罪指名道姓地說出來。丁良才：「認罪就是將榮耀歸與神（書7:19），使祂顯為公義。」《舊約聖經背景註釋》點出這正是本段與利4 的差別：「這祭與第四章的祭不同之處，在於認罪是必經步驟。」
- title: 無殘疾
  path: link_folder/神學/無殘疾.md
  summary: |
    利5:15、18 贖愆祭的公綿羊必須是「羊群中一隻沒有殘疾的公綿羊」。CT：「所有的祭牲都不可有殘疾。」
  relation: |
    贖愆祭在許多方面都是固定的——只有一種祭牲（公綿羊）、對每個人都一樣、沒有按身分或貧富分級（KC：這裡沒有提任何別種祭物，可見「這個祭對每一個人都是一樣的」）。而「無殘疾」這條線，從利1 的燔祭、利3 的平安祭、利4 的贖罪祭到利5 的贖愆祭，四種祭全同。所獻的價值可以按力量調整，那隻替他死的卻不能有瑕疵。
- title: 山羊
  path: link_folder/文化/山羊.md
  summary: |
    利5:6 一般情況下的祭牲是「羊群中的母羊，或是一隻羊羔，或是一隻山羊」。丁良才指出這正是本段仍屬贖罪祭的證據之一：「這祭的祭牲本來也是贖罪祭的祭牲（參利4:28、32），與贖愆祭的祭牲不同（v18，利6:6）。」
  relation: |
    利4:28 平民的贖罪祭用母山羊、利4:32 可用母綿羊羔，利5:6 則三者並列——山羊在贖罪祭系統裡始終是可用的祭牲。但到了正式的贖愆祭（v15、18），祭牲固定為公綿羊，山羊不再出現。丁良才並指出一個反證：「聖書上沒有一次記載有獻公綿羊為贖罪祭的。」兩種祭在祭牲上因此涇渭分明。
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: |
    利5 未直接處理脂油，但脂油的「缺席」正是 v7-10 要獻兩隻鳥的理由。丁良才：獻牛羊為贖罪祭時，燒在壇上的脂油就表示獻祭的人把自己獻給神（那正是燔祭所表示的意思），「但因鳥沒有多少脂油，所以就將一隻作燔祭，一隻作贖罪祭」。串珠：「因為獻鳥類的時候，不能把鳥的脂油除下，故須獻上兩隻。」
  relation: |
    KC 把這個機械性的理由讀成神學：那第二隻要獻為燔祭的鳥，是用來代替較大祭牲身上的脂油——因為「贖罪祭在神眼中是可憎的，脂油卻不是。但鳥身上沒有脂油。」也就是說，脂油在贖罪祭裡承擔一個特殊角色：它是那隻可憎的祭牲身上唯一能上壇、能使神喜悅的部分（參利4:31 唯獨平民那一級稱「馨香」）。鳥沒有脂油，所以要用整隻燔祭來補上這一分。
- title: 馨香的火祭
  path: link_folder/神學/馨香的火祭.md
  summary: |
    利5 中「馨香」一詞未出現。v12 只說細麵的一把要「按獻給耶和華火祭的條例燒在壇上；這是贖罪祭」——是火祭，卻不稱馨香。
  relation: |
    這個「不稱馨香」與利4:31 唯獨平民那一級稱「馨香」形成一組對照。丁良才在利4:31 指出：「一切燒在壇上的，連為贖罪所獻的，雖然都是馨香的祭物……但本章論為大祭司、會眾和官長所獻的贖罪祭卻沒有這樣的話。」到了利5，連平民那一句「馨香」也不見了。KC 對細麵那一級的評語正好接上：這份麵「使人想起素祭，但它不是素祭。油和乳香不可加上。它是贖罪祭，神並不以它為喜悅」。《舊約聖經背景註釋》給的理由是：「油和乳香與喜慶有關，這不是慶典，所以不當獻。」
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    利5:15、18 贖愆祭的公綿羊要「牽到耶和華面前」、「給祭司作贖愆祭」。丁良才另在 v14 指出「耶和華曉諭摩西說」是新一段的起頭，是神分段曉諭摩西的標記，「或者是給摩西留機會，把所曉諭的話記在書上」。
  relation: |
    v15 說「牽到耶和華面前為贖愆祭」，v18 卻說「給祭司作贖愆祭」，看似衝突。《聖經難解經文詮釋手冊》：「這段經文表示將公綿羊交給祭司獻給耶和華作贖愆祭的意思。在以色列，祭司是代表人向著神，而先知是神對人的代表。」丁良才用了一個更好懂的比方：「【比方】人納稅給稅務處，也可以說是給了國家。」會幕因此不只是地點，也是「交給誰＝獻給誰」這個等式成立的所在。
- title: 鹽約
  path: link_folder/神學/鹽約.md
  summary: |
    利5 未提到鹽，但利2:13 的規定涵蓋一切供物：「一切的供物都要配鹽而獻。」丁良才在利2:13 明言其範圍：「不但在各種素祭上必須加鹽，一切別的祭物也都要配鹽而獻（結43:24）。」
  relation: |
    利5:11-13 的細麵贖罪祭是這條規定最耐人尋味的一處：油與乳香明文禁止，鹽卻沒有被取消。素祭的兩樣喜慶標記被拿掉了，立約的記號卻留著——人為罪刻苦憂痛的時候，約仍然有效。《舊約聖經背景註釋》指出鹽與酵的物理對立正是象徵對立：「鹽能防止發酵，酵若是悖逆的象徵，鹽自然就代表抑制悖逆的事。」而本章正是處理悖逆之後如何回頭的條例。
