name: 宰殺
type: 事件
secondary_types: []
aliases:
- 揪下頭來
status: formal
definition: 宰殺是獻祭過程中使祭牲流血致死的動作。在利未記第5章中，針對以鳥類（斑鳩或雛鴿）為贖罪祭的情況，祭司不是用刀宰殺，而是「從鳥的頸項上揪下頭來」，並且規定「不可把鳥撕斷」。此一特殊處理方式是鳥類祭牲的宰殺替代動作，藉此完成祭牲的致死與血的分離，以滿足贖罪祭的要求。
accumulations:
- book: 利未記
  chapter: 5
  summary: 獻鳥為贖罪祭時，祭司需從鳥的頸項上揪下頭來，不可撕斷。
  relation: 本章具體規範了鳥類祭牲的宰殺方式，作為貧困者贖罪程序的一部分。
