name: 雛鴿
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:7、11與斑鳩並列，作為貧窮人獻贖愆祭的替代祭物。若力量不夠獻羊羔，可帶兩隻斑鳩或兩隻雛鴿；若連兩隻鳥也買不起，則改獻細麵。雛鴿同樣一隻作贖罪祭，一隻作燔祭，獻祭儀式同斑鳩。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第7、11節將雛鴿與斑鳩同等視為第二級贖愆祭祭物，反映神對經濟弱勢者的體恤。
  relation: 雛鴿是本章分級獻祭制度的一部分，確保人人都能依照能力獻祭贖罪。
