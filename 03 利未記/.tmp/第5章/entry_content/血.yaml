name: 血
type: 主題
secondary_types: []
aliases:
- 血
status: formal
definition: 利未記第5章9節規定獻鳥類贖罪祭時，「把些贖罪祭牲的血彈在壇的旁邊，剩下的血要流在壇的腳那裡」。因鳥類血少，故直接用指頭蘸血彈在祭壇旁邊，餘血流在壇基。經文強調「若不流血，罪就不得赦免」（來九22），血代表生命被獻上，為罪人贖罪、遮蓋罪愆。本章顯示血祭是神所定贖罪的途徑，無論牲畜或鳥類，血都必須在壇上處理，象徵生命代替生命，滿足神公義的要求。
accumulations:
- book: 利未記
  chapter: 5
  summary: 規定鳥類贖罪祭的血灑在壇旁、流在壇基，強調血為贖罪的核心要素。
  relation: 本章展示血在贖罪祭儀式中的具體操作與神學意義，血是贖罪的媒介。
related_entries:
