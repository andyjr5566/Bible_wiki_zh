name: 血
type: 神學
secondary_types: []
aliases:
- 血
status: formal
definition: 在聖經神學中，血代表生命，是贖罪與潔淨的必要媒介。利未記第5章規定獻斑鳩或雛鴿為贖罪祭時，祭司需從鳥的頸項上揪下頭來，將些贖罪祭牲的血彈在壇的旁邊，剩下的血要流在壇的腳那裡，以此完成贖罪之禮。
accumulations:
- book: 利未記
  chapter: 5
  summary: 本章記載祭司處理鳥類祭牲之血的程序，包括彈血在壇旁及流血在壇腳，作為贖罪祭的關鍵步驟。
  relation: 血是本章贖罪祭得以生效的聖潔媒介，彰顯了生命替代贖罪的神學意義。
