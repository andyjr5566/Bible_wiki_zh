name: 按手
type: 原文
secondary_types: []
aliases:
- 按手
status: formal
definition: 希伯來文 samak，意為倚靠或將重量置於其上。在獻祭儀式中，獻祭者按手於祭牲頭上，象徵獻祭者與祭牲的認同及罪的轉移。雖然利未記第5章的經文未直接提及按手動作，但贖罪祭與贖愆祭的條例隱含了獻祭者與祭物之間的認同機制。
accumulations:
- book: 利未記
  chapter: 5
  summary: 本章描述贖罪祭與贖愆祭的獻祭條例，雖未明文記載按手，但獻祭者將祭牲牽到耶和華面前承認所犯的罪，隱含了獻祭者與祭物的連結。
  relation: 按手作為獻祭認同的基礎動作，構成了本章承認罪與祭牲替代贖罪的神學基礎。
