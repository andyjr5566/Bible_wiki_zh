name: 馨香的火祭
type: 神學
secondary_types: []
aliases:
- 火祭
status: formal
definition: 指獻給耶和華並在壇上焚燒的祭物，其香氣蒙神悅納。在利未記第5章中，此詞用於描述祭司將細麵供物取出紀念部分後，按獻給耶和華火祭的條例燒在壇上的行為，表明即使是貧窮罪人所獻的極微小贖罪祭，也按神所設立的火祭條例被處理，成為蒙神悅納的贖罪基礎。
accumulations:
- book: 利未記
  chapter: 5
  summary: 祭司取細麵供物的一把作為紀念，按獻給耶和華火祭的條例燒在壇上，作為貧窮者的贖罪祭。
  relation: 顯示贖罪祭的焚燒程序遵循神所設立之火祭的通用條例，使窮人的細麵供物亦能蒙神悅納。
related_entries:
