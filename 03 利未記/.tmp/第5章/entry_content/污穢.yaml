name: 污穢
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:2-3提到的儀式不潔狀態。5:2指摸不潔之死物（死獸、死畜、死蟲）；5:3指摸「別人的污穢」，即出自別人身體的污穢物（如漏症、產婦、經血等，詳見利12-15章）。當事人起初不知道，一知道就有罪，須獻贖愆祭。污穢非指道德污穢，乃禮儀上不潔淨，阻隔人與神的交通。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第2-3節將摸不潔之物與摸別人的污穢列為須獻贖愆祭的罪，規定不知情者一旦知曉即須對付。
  relation: 污穢是本章前兩類無知犯罪的核心概念，連結利未記11-15章的潔淨律法，強調聖潔生活的細節要求。
