name: 母綿羊
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:6規定平民獻贖愆祭（此處稱為贖罪祭）的標準祭牲為「羊群中的母羊，或是一隻羊羔，或是一隻山羊」。母綿羊是經濟能力較好者的常規獻祭，區別於贖愆祭（5:15,18）必須用公綿羊。母綿羊作贖罪祭，祭司為獻祭者贖罪，罪得赦免。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第6節列出母綿羊作為贖愆祭（贖罪祭）的首選祭牲，適用於一般平民，體現分級獻祭制度的中間層級。
  relation: 母綿羊是本章分級獻祭中標準的祭牲，高於鳥類與細麵，低於贖愆祭專用的公綿羊，反映不同罪責與經濟能力的安排。
