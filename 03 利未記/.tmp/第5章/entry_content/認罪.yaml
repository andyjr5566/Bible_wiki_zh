name: 認罪
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:5規定「他有了罪的時候，就要承認所犯的罪」。認罪是獻贖愆祭的必要前置條件（5:5-6）。原文「承認」意為認罪、告白，指向神具體陳明所犯之罪。認罪表明認清罪惡、承認神聖潔、謙卑離棄罪。無認罪的獻祭無效。新約延續此原則（約壹1:9），認罪是蒙赦免的捷徑。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第5節明確要求犯罪者在獻祭前先認罪，第6節接著規定獻祭贖罪，確立「認罪—獻祭—贖罪—赦免」的完整流程。
  relation: 認罪是本章贖愆祭條例的起點，強調內心悔改優於外在儀式，貫穿舊新約贖罪神學的核心。
