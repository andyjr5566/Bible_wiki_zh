name: 無殘疾
type: 神學
secondary_types: []
aliases:
- 沒有殘疾
status: formal
definition: 指祭牲在身體上完美無瑕疵的狀態，預表無罪的代贖。在利未記第5章中，當人在聖物上誤犯罪或行了耶和華所吩咐不可行的事時，必須從羊群中牽一隻沒有殘疾的公綿羊作為贖愆祭。此要求強調獻給神的祭物必須是完全的，方能滿足神對贖罪的聖潔標準。
accumulations:
- book: 利未記
  chapter: 5
  summary: 贖愆祭的公綿羊必須是沒有殘疾的，無論是為聖物上的過犯或誤犯的罪。
  relation: 無殘疾的祭牲標準確保了贖愆祭的效力，彰顯神對代贖物完美性的神學要求。
related_entries:
- 公綿羊
- 贖愆祭（asham）
- 贖罪
