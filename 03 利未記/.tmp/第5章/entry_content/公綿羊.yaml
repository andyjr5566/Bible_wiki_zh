name: 公綿羊
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 指雄性的成年羊，在古以色列獻祭文化中作為貴重的祭牲。在利未記第5章中，公綿羊被指定為贖愆祭的專用祭牲；當人在耶和華的聖物上誤犯罪或違背了禁令時，需照祭司所估定的價，牽一隻沒有殘疾的公綿羊到耶和華面前獻為贖愆祭，以贖其罪並蒙赦免。
accumulations:
- book: 利未記
  chapter: 5
  summary: 人若在聖物上誤犯罪或行了不可行的事，需牽一隻沒有殘疾的公綿羊作贖愆祭。
  relation: 公綿羊作為贖愆祭的標準祭牲，體現了古以色列文化中對特定過犯以特定牲畜代贖的律法規範。
related_entries:
- 無殘疾
- 贖愆祭（asham）
- 聖所的舍客勒
- 亞倫和他兒子（祭司）
