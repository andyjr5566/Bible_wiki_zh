name: 公綿羊
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:15、18規定贖愆祭必須使用「沒有殘疾的公綿羊」。這是贖愆祭指定的唯一祭牲（不同於贖罪祭可用母綿羊或公山羊）。公綿羊須按聖所的舍客勒估價，價值至少二舍客勒（猶太傳統）。獻祭者將公綿羊牽到耶和華面前，祭司為他贖罪。公綿羊象徵完全的獻上與賠償，預表基督作為無瑕疵的贖愆祭（賽53:10）。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第15、18節兩次提到贖愆祭必須用無殘疾的公綿羊，並須按聖所舍客勒估價，作為對聖物誤犯之罪與誤行不可行之事的贖愆祭牲。
  relation: 公綿羊是本章贖愆祭的核心祭牲，體現神對賠償祭的嚴格要求，也預表基督的完全獻上。
