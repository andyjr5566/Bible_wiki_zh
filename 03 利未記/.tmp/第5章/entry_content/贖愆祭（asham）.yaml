name: 贖愆祭（asham）
type: 原文
secondary_types: []
aliases:
- 贖愆祭
status: formal
definition: 希伯來文 asham，指因干犯聖物或誤犯命令而需獻上的祭牲。在利未記第5章中，贖愆祭特別針對人在聖物上誤犯的過犯（15節）及行了耶和華所吩咐不可行的事（17節），祭物為無殘疾的公綿羊，並需加上五分之一的償還。
accumulations:
- book: 利未記
  chapter: 5
  summary: 規定在聖物上誤犯或行了不可行之事時，需獻上無殘疾的公綿羊為贖愆祭，並償還外加五分之一。
  relation: 本章具體定義了贖愆祭的適用情境與賠償條例，強調過犯需透過祭司贖罪方能蒙赦免。
