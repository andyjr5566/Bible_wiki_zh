name: 山羊
type: 文化
secondary_types: []
aliases:
- 公山羊
- 母山羊
status: formal
definition: 山羊是古代近東及以色列畜牧文化中常見的牲畜，常作為獻祭的動物。在利未記第5章中， 山羊與母羊、羊羔並列，作為贖愆祭的祭牲選項之一。獻祭者可根據自身能力從羊群中選取
  這些祭牲牽到耶和華面前，藉由祭司獻祭以贖其罪。
accumulations:
- book: 利未記
  chapter: 5
  summary: 犯罪者可將羊群中的母羊、羊羔或一隻山羊牽到耶和華面前作為贖愆祭的贖罪祭牲。
  relation: 山羊作為贖愆祭的合法祭牲，體現了神在贖罪制度中提供多樣祭牲選擇，以適應不同獻祭者的牲畜資源。
