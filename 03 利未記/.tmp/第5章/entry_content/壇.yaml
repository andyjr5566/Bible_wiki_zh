name: 壇
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 在利未記第5章中，壇是獻祭與贖罪的核心場所。當獻祭者因力量不夠而以鳥類或細麵作為贖罪祭時，祭司需將祭牲的血彈在壇的旁邊，剩下的血要流在壇的腳那裡；而細麵供物則按獻給耶和華火祭的條例燒在壇上。壇作為聖潔與救贖的象徵，承載了祭牲的血與火祭，使以色列人的罪得著贖清與赦免。
accumulations:
- book: 利未記
  chapter: 5
  summary: 祭司將鳥的血彈在壇旁並流在壇腳，細麵則燒在壇上作為贖罪祭。
  relation: 壇是本章中贖罪祭與燔祭執行的核心場所，彰顯神藉祭壇提供赦罪之恩。
