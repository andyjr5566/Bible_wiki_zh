name: 細麵
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:11-13規定，極度貧窮者若連兩隻鳥也無力獻，可帶「伊法十分之一的細麵」作贖罪祭。細麵不可加油、不可加乳香，以區別於素祭。祭司取一把作為紀念燒在壇上，其餘歸祭司。細麵雖無血，但獻在燔祭壇上，與燔祭同焚，符合「不流血罪不得赦免」的原則（來9:22），是神特殊的恩典供應。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第11-13節設立最低階的贖罪祭供物——細麵，不加油乳香，祭司取一把焚燒，餘歸祭司，體現神憐憫至窮之人。
  relation: 細麵是本章分級獻祭的第三級，確保無人因貧窮而無法贖罪，彰顯神的恩典與公義。
