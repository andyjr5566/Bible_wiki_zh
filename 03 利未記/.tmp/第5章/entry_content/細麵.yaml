name: 細麵
type: 主題
secondary_types: []
aliases:
- 細麵伊法十分之一
status: formal
definition: 細麵是素祭與贖罪祭中所使用的供物材料。在利未記第5章中，針對力量不足以獻上斑鳩或雛鴿的貧困者，律法允許他們獻上「細麵伊法十分之一」作為贖罪祭。此細麵供物不可加上油，也不可加上乳香，以區別於一般的素祭，表明這是純粹為著贖罪的緣故。祭司要取出自己的一把作為紀念，燒在壇上，其餘的麵則歸給祭司，與素祭一樣。
accumulations:
- book: 利未記
  chapter: 5
  summary: 貧困者無力獻鳥時，可獻細麵伊法十分之一為贖罪祭，不可加油與乳香。
  relation: 本章將細麵作為贖罪祭的替代供物，彰顯神對貧困者的恩典與贖罪途徑的普及性。
