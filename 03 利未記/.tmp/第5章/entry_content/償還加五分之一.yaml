name: 償還加五分之一
type: 事件
secondary_types: []
aliases:
- 加五分之一償還
status: formal
definition: 指在耶和華聖物上誤犯了罪的人，除了要照聖所的估價獻上贖愆祭的公綿羊外， 還必須將他在聖物上的差錯如數償還，並且另外加上五分之一，全數交給祭司。
  此事件強調贖愆祭不僅涉及屬靈的赦免，也要求在物質上作出實際的賠償與附加補償， 以彰顯神對聖物與公義的嚴格要求。
accumulations:
- book: 利未記
  chapter: 5
  summary: 人若在聖物上誤犯罪，須償還差錯並外加五分之一給祭司，祭司用公綿羊為他贖罪。
  relation: 賠償事件是贖愆祭條例中針對聖物虧欠的具體補救行動，確保虧欠得以完全彌補。
related_entries:
