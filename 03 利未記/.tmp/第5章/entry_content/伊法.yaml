status: formal
definition: 利未記5:11提到的容量單位，「伊法十分之一」約等於22公升的十分之一，即2.2公升（或約2.2升）。細麵贖罪祭的量度即以此為準。伊法是古代以色列常用的乾量單位，聖所使用標準伊法。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第11節規定細麵贖罪祭的分量為「伊法十分之一」，作為最低階獻祭的具體度量標準。
  relation: 伊法提供本章細麵贖罪祭的量度基準，確保獻祭分量的公平與統一。
