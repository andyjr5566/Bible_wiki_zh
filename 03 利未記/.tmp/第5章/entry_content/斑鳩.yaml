name: 斑鳩
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記5:7、11規定，若獻祭者力量不夠獻羊羔，可帶兩隻斑鳩或兩隻雛鴿作贖愆祭：一隻作贖罪祭，一隻作燔祭。斑鳩是常見且廉價的鳥類，適合貧窮人獻祭。獻鳥時不可撕斷，祭司從頸項揪下頭，血彈在壇旁，剩血流在壇腳。因鳥類脂油少，故需兩隻鳥分別表達贖罪與獻上（燔祭）。
development: ''
accumulations:
- book: 利未記
  chapter: 5
  summary: 第7、11節提供斑鳩作為贖愆祭的替代祭物，適用於經濟能力不足者，體現神的憐憫與公義並存。
  relation: 斑鳩是本章分級獻祭制度中的第二級祭物，顯示神照顧貧窮人也能進到祂面前贖罪。
