name: 脂油
type: 主題
secondary_types: []
aliases:
- 脂油
status: formal
definition: 脂油在獻祭條例中歸屬於耶和華，是獻給神為火祭的至聖部分。雖然利未記第5章在鳥類與細麵的贖罪祭條例中未直接提及脂油，但當獻上羊群中的母羊、羊羔或山羊時，其脂油依獻祭通例應焚燒獻給神。
accumulations:
- book: 利未記
  chapter: 5
  summary: 本章提及獻羊群中的母羊、羊羔或山羊為贖罪祭，依獻祭通例其脂油應燒在壇上歸給神。
  relation: 脂油作為獻給神的核心部分，連結了本章贖罪祭中祭物歸神的聖潔原則。
