organization: '### 引言與總綱（v1-5）

  耶和華吩咐摩西曉諭以色列人，開篇便宣告 ==“我是耶和華－你們的神”==，將一切誡命建立在神與子民的聖約關係之上。經文隨即劃出兩道清晰的邊界：以色列人既不可效法他們從前居住的
  [[埃及與迦南惡俗|埃及地之人的行為]]，也不可效法即將進入的 [[不可效法外邦惡俗|迦南地之人的惡俗]]。這表明聖潔生活的標準並非地理或文化相對主義，而是唯獨來自神的
  [[遵行律例就必活著|律例典章]]。第5節提出一個生命性的應許：==“人若遵行，就必因此活著”==——這裡的“活著”不僅指存活，更指向在約中與神相交的豐盛生命。這五節經文構成了全章的樞紐，將隨後詳列的性倫理禁令置於“分別為聖”的宏大敘事框架中。


  ### 亂倫禁令的範圍（v6-18）

  從第6節開始，經文以“露下體”（[[亂倫禁令（gillui ervah）|gillui ervah]]）這一具體用語，系統性地列舉了禁止的性關係對象。這些禁令的核心原則是保護
  [[骨肉之親（she''er besaro）|骨肉之親]] 的界限，禁止在近親圈內發生性行為。清單涵蓋了直系與旁系親屬，包括母親、繼母、姊妹（無論是同父異母或同母異父）、孫女、外孫女、姑母、姨母、伯叔母、兒婦、弟兄妻子等。值得注意的是，第17-18節將禁令擴展至多重關係的疊加：不可同時娶母女或祖孫女，也不可在妻子尚在時另娶其姊妹作對頭。這些規定不僅是性禁忌，更是對家庭結構與人倫秩序的深層保護，防止權力、慾望與嫉妒撕裂神所設立的親屬網絡。


  ### 其他性倫理與宗教禁令（v19-23）

  此段落將禁令從家庭內部延伸至更廣泛的社會與宗教領域。第19節禁止在妻子 [[月經（niddah）|行經不潔淨]] 時與她親近，將生理週期納入聖潔規範。第20節禁止與
  [[鄰舍妻行淫|鄰舍的妻行淫]]，守護婚姻盟約的排他性。第21節轉向宗教領域，嚴禁使兒女“經火”歸與 [[摩洛（Molech）|摩洛]]——這是一種將孩童獻祭給亞捫神明的可憎習俗，直接褻瀆神的名。第22節明確禁止
  [[同性戀禁令（mishkav zakhar）|男人與男人苟合]]，稱之為 ==“可憎惡的”==（[[可憎（sheqets）|toevah]]）。第23節則禁止人與獸淫合，定性為
  ==“逆性的事”==。這一系列禁令勾勒出一個全方位的聖潔框架：性行為被嚴格限定在一夫一妻的異性婚姻內，且不得沾染異教獻祭的惡俗。


  ### 玷污的後果與聖約責任（v24-30）

  經文最後一部分將視野從個體行為拉升至整個土地與民族的命運。神指出，即將被驅逐的迦南列邦正是因為行了上述一切事而 [[玷污自己與玷污地|玷污了自己，連地也玷污了]]。土地被擬人化為有道德反應的主體：==“那地也吐出他的居民”==。這是一個強烈的神學意象——聖潔的土地無法容忍持續行惡的居民。因此，以色列人無論是本地人還是
  [[寄居的（ger）|寄居的外人]]，都必須遵守這些律例，否則將面臨同樣的後果：被地“吐出”，並從民中 [[剪除（kareth）|剪除]]。結尾再次回到 ==“我是耶和華－你們的神”==，形成首尾呼應，將一切倫理要求錨定在神的自我啟示與聖約主權之中。


  > [!important] 本章樞紐

  > 利未記18章是“聖潔法典”（Holiness Code, 利17-26）的核心篇章之一。它將性倫理從社會習俗提升為聖約忠誠的標誌。以色列人之所以要遵守這些律例，不是因為它們“合乎自然”或“普遍理性”，而是因為耶和華是他們的神，且祂已將他們從埃及分別出來。本章的禁令清單與創世記中迦南地的性混亂敘事（如所多瑪、羅得與女兒）形成隱含的敘事呼應，表明神對其子民的倫理要求與對迦南人的審判標準是一致的。


  > [!quote] 關鍵引句

  > “你們要守我的律例典章；人若遵行，就必因此活著。我是耶和華。”（v5）

  > “在這一切的事上，你們都不可玷污自己；因為我在你們面前所逐出的列邦，在這一切的事上玷污了自己；連地也玷污了，所以我追討那地的罪孽，那地也吐出他的居民。”（v24-25）'
