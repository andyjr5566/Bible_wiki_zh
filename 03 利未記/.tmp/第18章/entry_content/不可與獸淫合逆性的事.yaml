name: 不可與獸淫合逆性的事
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 禁止男人與獸淫合玷污自己，也禁止女人站在獸前與獸淫合，神定此為逆性的事；「逆性」指違逆神所創造的本性，此罪在埃及與迦南異教祭祀中常見，摩西律法定為死罪（利二十15-16；出二十二19），新約亦視之為逆性的敗壞（羅一26-27）。
accumulations:
- book: 利未記
  chapter: 18
  summary: 第23節禁止人與獸淫合，包括男人與雌獸及女人與雄獸的性行為，稱為逆性的事；此禁令與同性戀禁令並列，均為違反神創造秩序的性罪行。
  relation: 本條目為本章性道德禁令的終末項目，與同性戀禁令同屬「逆性」罪行，共同構成神對一切違反創造秩序的性行為的全面禁止。
