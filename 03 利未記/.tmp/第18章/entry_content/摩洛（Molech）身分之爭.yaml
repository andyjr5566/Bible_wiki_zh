name: 摩洛（Molech）身分之爭
type: 解經爭議
secondary_types: []
aliases:
- 摩洛身分之爭
status: formal
definition: 關於「摩洛」（Molech）的身分，學界存在爭議：一說摩洛為迦南或亞捫人的特定神祇名，與碑文中的姆魯克（Muluk）或米加（Mekal）有關；另一說認為「摩洛」的輔音mlk與希伯來語「王」（melek）相同，插入不同母音後成為「羞恥之王」的蔑稱，並非特定神名；亦有學者根據迦太基碑文將molk解釋為「許願」或「誓言」，指履行對異教神的誓言而獻祭。
accumulations:
- book: 利未記
  chapter: 18
  summary: 第21節首次在聖經中提及摩洛，禁止使兒女經火歸與摩洛；後續經文（二十2-5）進一步規定犯者必被治死，顯示此罪在神眼中的嚴重性。
  relation: 本爭議直接源於本章21節對摩洛的禁令，影響對該禁令之宗教背景與神學含義的理解，並關聯到迦南宗教與以色列信仰的對立。
related_entries:
- 不可使兒女經火歸摩洛
