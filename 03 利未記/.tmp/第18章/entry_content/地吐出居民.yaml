name: 地吐出居民
type: 神學
secondary_types: []
aliases:
- 地吐出人
- 土地嘔吐居民
status: formal
definition: 利未記 18 章 25、28 節揭示土地因居民行可憎惡的事而玷污，耶和華追討地的罪孽，地便「吐出他的居民」。此神學意象將土地視為有道德感知的主體，聖約之地不容忍不潔，迦南人被趕出、以色列若犯同罪亦會被吐出，顯示聖潔與居住權的不可分割關係。
accumulations:
