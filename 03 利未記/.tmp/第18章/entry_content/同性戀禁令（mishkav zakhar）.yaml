name: 同性戀禁令（mishkav zakhar）
type: 主題
secondary_types: []
aliases:
- 男男性行為禁令
- 同性性行為禁令
status: formal
definition: 利未記 18 章 22 節禁止「不可與男人苟合，像與女人一樣」，希伯來文「mishkav zakhar」直指男性同性性行為，經文定性為「可憎惡的事」（to'evah）。此禁令置於亂倫與獸交之間，屬於違背受造秩序的性倫理紅線，違者同被剪除。
accumulations:
