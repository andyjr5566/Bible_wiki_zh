definition: 利未記 18 章 3、26-27、30 節反覆警告不可效法埃及地（出埃及背景）與迦南地（進迦南前景）的行為與惡俗。經文將這些惡俗具體化為本章列舉的性倫理違犯（亂倫、同性、獸交、獻摩洛等），強調以色列須在兩大文明夾縫中建立分別為聖的生活型態，寄居者同受此律約束。
