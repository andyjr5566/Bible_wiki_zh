name: 可憎惡的（toevah）
type: 原文
secondary_types: []
aliases:
- 可憎惡的
status: formal
definition: 希伯來文 toevah，和合本譯「可憎惡的」。利18:22 以此字定性與男人苟合，利18:26-30 又四次以它統括本章 v6-23 的一切禁令，並以它為迦南列邦被地吐出的理由。此字與利11 水族的「可憎」（sheqets）不同：sheqets 屬飲食潔淨範疇，toevah 則是道德與宗教範疇的「違反神本性之事」。《舊約聖經背景註釋》：「第22-29節中『可憎惡的』一語，指出這種行為是違反神本性的。蘇美和亞喀得的對應用語，亦認定這是神明憎嫌的行徑。」
