- 雙重玷污
status: formal
definition: 利未記 18 章 20、23、24、25、27、28、30 節密集使用「玷污」（tame'）一詞，揭示雙軌玷污機制：人行可憎惡的事（亂倫、姦淫、同性、獸交、獻摩洛）先玷污自己（v.20,23），進而玷污所居之地（v.25,27），地被玷污便吐出居民（v.25,28）。此神學將個人倫理與生態/土地聖潔綁定，聖約共同體的純潔關係到生存空間的保有。
