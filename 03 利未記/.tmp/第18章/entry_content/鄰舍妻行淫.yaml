name: 鄰舍妻行淫
type: 主題
secondary_types: []
aliases:
- 與鄰舍妻行淫
status: formal
definition: 利未記 18 章 20 節明令禁止人與鄰舍的妻子行淫，指出這會使人玷污自己。這條禁令屬於性潔淨律法的一部分，旨在維護婚姻盟約與社會倫理，防止以色列人效法埃及與迦南的惡俗（第
  3、27 節）。經文強調行這事者必從民中被剪除（第 29 節），顯示其嚴重性。
development: 本章將「與鄰舍妻行淫」列在亂倫禁令（第 6-18 節）與同性戀、獸交禁令（第 22-23 節）之間，構成完整的性道德邊界。第 20 節單獨列出此條，強調鄰舍關係的保護，並直接連結「玷污自己」與「地吐出居民」的審判後果（第
  24-28 節）。
accumulations:
- book: 利未記
  chapter: 18
  summary: 第 20 節禁止與鄰舍妻行淫，定義為玷污自己；第 24-30 節說明這些惡俗導致列國被趕出、地被玷污，違犯者必被剪除。
  relation: 本章核心經文依據，確立性道德純潔與立國根基的神學關聯。
