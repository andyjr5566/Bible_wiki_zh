name: 亂倫禁令（gillui ervah）
type: 主題
secondary_types: []
aliases:
- 露下體禁令
- 親屬性禁忌
status: formal
definition: 利未記 18 章 6-18 節詳細列舉禁止與骨肉之親（she'er besaro）發生性關係的條例，希伯來文稱「gillui ervah」（露下體/露陰），涵蓋母親、繼母、姊妹、孫女、姑母、姨母、伯叔母、兒婦、弟兄妻等近親關係，強調這些行為屬於「大惡」（v.17）與「可憎惡的事」（v.27），違者必從民中剪除（kareth）。
accumulations:
- book: 利未記
  chapter: 18
  summary: 列舉十五項親屬關係禁止露下體，確立以色列聖潔性倫理界線
  relation: 本章核心條例，奠定聖潔法典性倫理基礎
