"book": "03 利未記"
"chapter": !!int "18"
"updates":
- "title": "可憎（sheqets）"
  "path": "link_folder/原文/可憎（sheqets）.md"
  "summary": "利18:22,26,27,29,30 多次以 to'evah（可憎）描述同性戀行為及迦南人的惡俗。本章將「可憎」的應用從飲食潔淨（利11章 sheqets）擴展至性倫理領域（to'evah），強調違反神設立的性秩序是神所憎惡的。"
  "relation": "本章為可憎概念在性倫理領域的核心經文，與利11章的飲食可憎（sheqets）形成禮儀與道德兩個層面的對照。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "利18:29 規定凡行本章所列可憎之事（亂倫、同性戀、獸交等）的，必從民中剪除。此處剪除的對象是性倫理上的可憎行為，與利17章吃血剪除形成不同領域的應用。"
  "relation": "本章將剪除刑罰應用於性倫理犯罪，擴展了剪除的適用範圍（先前主要見於獻祭違規與吃血）。"
- "title": "月經（niddah）"
  "path": "link_folder/原文/月經（niddah）.md"
  "summary": "利18:19 禁止在女人行經不潔淨時與她親近（露下體）。此禁令將月經的禮儀不潔（利15章）延伸至性倫理禁令，違反者不僅沾染禮儀不潔，更構成道德上的罪。"
  "relation": "本章將月經不潔從禮儀領域（利15章）延伸至性倫理禁令，賦予其道德層面的約束力。"
- "title": "寄居的（ger）"
  "path": "link_folder/原文/寄居的（ger）.md"
  "summary": "利18:26 規定無論是本地人或是寄居在以色列中間的外人，都不可行本章所列的可憎之事。寄居者與本地人同受性倫理律法的約束。"
  "relation": "本章將寄居者納入性倫理律法的約束範圍，與利17章寄居者同受獻祭與禁血條例約束的原則一致。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利18:1-2 耶和華對摩西說話，吩咐他向以色列人頒布性倫理律法。這是利未記中首次系統性規範性行為的律法，摩西作為傳遞者將神的聖潔標準頒布給全會眾。"
  "relation": "本章摩西作為律法傳遞者，將神的性倫理標準頒布給以色列人，延續其出埃及記以來的先知與立法者角色。"
- "title": "迦南人"
  "path": "link_folder/人物/迦南人.md"
  "summary": "利18:3,24-30 指出迦南人的惡俗（性倫理上的可憎行為）玷污了地，以致地被吐出。神警告以色列人不可效法迦南人的行為，否則也必被地吐出。"
  "relation": "本章從性倫理角度解釋迦南人被逐出迦南地的神學原因——他們的可憎行為玷污了地。"
