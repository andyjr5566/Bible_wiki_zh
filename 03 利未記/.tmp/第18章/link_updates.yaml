"updates":
- "title": "不可姦淫"
  "path": "link_folder/神學/不可姦淫.md"
  "summary": "v20「不可與鄰舍的妻行淫，玷污自己」，是十誡第七誡在聖潔法典性道德條例中的具體重申，犯者依法判處死刑（二十10）。"
  "relation": "本章將姦淫禁令置於近親性關係、同性戀、人獸交等禁令之間，顯示姦淫同屬破壞創造秩序與婚姻聖潔的道德罪行。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "v29「無論什麼人，行了其中可憎的一件事，必從民中剪除」，是本章亂倫、同性戀、人獸交、獻兒女歸摩洛等各項禁令的統一刑罰。"
  "relation": "本章是剪除刑罰應用於性道德與異教敬拜雙重罪行的代表章節，涵蓋範圍廣及本章6至23節所有可憎之事。"
- "title": "從民中剪除的含義"
  "path": "link_folder/解經爭議/從民中剪除的含義.md"
  "summary": "v29 本章可憎之事一概適用剪除刑罰，v24-25「地就把你們吐出」的意象與剪除並提，為此爭議補充另一組討論素材：究竟指人為死刑、社群放逐，還是神親自介入使地吐出居民的審判。"
  "relation": "本章以「地吐出居民」的集體審判意象，與個人剪除刑罰並列，擴充了對此刑罰性質的解經討論範圍。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」，摩西是本章近親性關係、同性戀、人獸交等聖潔條例的唯一傳達者（v2「你曉諭以色列人說」）。"
  "relation": "本章延續摩西傳達耶和華律例典章給以色列人的一貫角色，本次條例對象僅限以色列人本身（不含利17章亦提及的祭司與寄居者）。"
