book: "03 利未記"
chapter: 18
candidates:
  # === C 類：全新條目 ===
  - name: 亂倫禁令（gillui ervah）
    type: 主題
    evidence: "利18:6-18 禁止露骨肉之親的下體，共列12種禁止的親屬關係。希伯來文 gillui ervah（露下體）為性交的委婉語。"
    surfaces: ["露下體", "露骨肉之親的下體", "不可露…的下體"]

  - name: 摩洛（Molech）
    type: 文化
    evidence: "利18:21 禁止使兒女經火歸摩洛。摩洛為亞捫人的國神，可能涉及廟妓或火祭。"
    surfaces: ["經火歸摩洛", "摩洛"]

  - name: 同性戀禁令（mishkav zakhar）
    type: 主題
    evidence: "利18:22 不可與男人苟合像與女人一樣，這是可憎的。希伯來文 mishkav zakhar 指男與男同寢。"
    surfaces: ["與男人苟合", "男與男同寢"]

  - name: 獸交禁令
    type: 主題
    evidence: "利18:23 不可與獸淫合玷污自己，女人也不可站在獸前與牠配合，這是逆性的事。"
    surfaces: ["與獸淫合", "逆性的事"]

  - name: 地吐出居民
    type: 神學
    evidence: "利18:25,28 地因居民行可憎的事而被玷污，將居民吐出。"
    surfaces: ["地吐出", "地將居民吐出"]

  - name: 埃及與迦南惡俗
    type: 背景
    evidence: "利18:3 不可效法埃及地和迦南地的行為，不可照他們的惡俗行。"
    surfaces: ["埃及地的行為", "迦南地的行為", "不可效法…惡俗"]

  - name: 遵行律例就必活著
    type: 神學
    evidence: "利18:5 人若遵行神的律例典章就必因此活著。此節在新舊約多次引用（結20:11,13,21; 尼9:29; 路10:25-28; 羅10:5; 加3:12）。"
    surfaces: ["就必因此活著", "遵行就必活著"]

  - name: 玷污自己與玷污地
    type: 神學
    evidence: "利18:24-30 行可憎的事玷污自己，也玷污地；地因此吐出居民。"
    surfaces: ["玷污自己", "玷污地", "地也被玷污"]

  - name: 骨肉之親（she'er besaro）
    type: 原文
    evidence: "利18:6 不可親近骨肉之親露其下體。希伯來文 she'er besaro 指血緣親屬。"
    surfaces: ["骨肉之親"]

  - name: 行經不潔淨時的禁令
    type: 主題
    evidence: "利18:19 不可親近行經不潔淨的婦人露其下體。"
    surfaces: ["行經不潔淨", "月經污穢時不可親近"]

  - name: 鄰舍妻行淫
    type: 主題
    evidence: "利18:20 不可與鄰舍的妻行淫玷污自己。"
    surfaces: ["與鄰舍妻行淫", "鄰舍的妻"]

  - name: 不可效法外邦惡俗
    type: 神學
    evidence: "利18:3-4,30 不可效法埃及和迦南的惡俗，要遵行神的律例典章。"
    surfaces: ["不可效法", "外邦惡俗", "不可行可憎的惡俗"]

  - name: 從民中剪除（kareth）的應用
    type: 主題
    evidence: "利18:29 凡行這些可憎之事的，必從民中剪除。"
    surfaces: ["從民中剪除"]

  # === B 類：既有條目需更新 ===
  - name: 可憎（sheqets）
    type: 原文
    evidence: "利18:22,26,27,29,30 多次以 to'evah（可憎）描述同性戀、迦南惡俗等。本章將 to'evah 用於性倫理領域。"

  - name: 剪除（kareth）
    type: 原文
    evidence: "利18:29 行可憎之事者從民中剪除。"

  - name: 月經（niddah）
    type: 原文
    evidence: "利18:19 禁止在女人行經不潔淨時親近她。"

  - name: 寄居的（ger）
    type: 原文
    evidence: "利18:26 無論是本地人或寄居的外人，都不可行這些可憎的事。"

  - name: 摩西
    type: 人物
    evidence: "利18:1 耶和華對摩西說話，頒布性倫理律法。"

  - name: 迦南人
    type: 人物
    evidence: "利18:3,24-30 迦南人行可憎的事玷污了地，地被吐出。"