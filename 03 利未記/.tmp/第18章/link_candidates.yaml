book: 利未記
chapter: 18
candidates:
  - name: 不可效法埃及迦南的行為
    type: 主題
    evidence: 3-5節；不可效法從前所住埃及地的行為，也不可效法將到之迦南地的行為，要遵行耶和華的典章律例。GT啟導本：這裡揭示道德條例的基本精神，指出以色列民與其他民族的不同；KC：埃及代表沒有神的世界（智慧與世俗學問，徒7:22），迦南代表神已賜下卻遍佈敗壞的應許之地——危險不在文化學問，而在其中盛行的腐敗
    surfaces:
      - {phrase: 你們從前住的埃及地，那裡人的行為，你們不可效法, verses: [3]}
      - {phrase: 也不可照他們的惡俗行, verses: [3]}

  - name: 人若遵行律例典章就必因此活著
    type: 神學
    evidence: v5「所以，你們要守我的律例典章；人若遵行，就必因此活著。我是耶和華」。KC：此節在舊約被引用四次（結20:11,13,21；尼9:29），在新約被引用三次（路10:25-28；羅10:5；加3:12）；羅10:5與加3:12顯明從未有人完全達到律法所應許的生命，唯有本乎信心從神領受新生命的人才能憑愛心遵行神旨——「律法說：行這些事的，就必因此活著；福音卻說：活著，然後才能行」
    surfaces:
      - {phrase: 人若遵行，就必因此活著, verses: [5]}

  - name: 露下體（euphemism，亂倫委婉語）
    type: 原文
    evidence: 6-19節反覆使用「露…下體」一詞禁戒近親性關係。GT啟導本：原文無性別之分，「露下體」實為「發生肉體關係」的雅詞婉約說法，特指不屬正式婚姻關係的性關係，「露下體」代替慣用的「娶妻」一語；串珠：非法性關係另用「行淫」「狎妓」等稱呼；KC：「下體」與「露」是委婉語，指非法性交（結16:36；23:18）
    surfaces:
      - {phrase: 不可露你母親的下體, verses: [7]}

  - name: 近親性關係的十二項條例
    type: 主題
    evidence: 6-18節；總冒「不可露骨肉之親的下體」後列舉十二項：母親(7)、繼母(8)、姊妹(9)、孫女外孫女(10)、繼母所生之妹(11)、姑母(12)、姨母(13)、伯叔母(14)、兒婦(15)、弟兄妻子(16)、婦人與其女兒孫女外孫女(17，稱「大惡」)、妻還在時娶其姊妹作對頭(18)。GT啟導本：直系親屬六項(7,9,10,11,12,13)，姻親關係八項(8,14,15,16,17,18)，凡未明示者可以類推；GT丁良才：埃及國准人娶姐妹為妻，波斯國准人娶母親或姐妹或女兒為妻，神定本章條例特要維持以色列人家庭與社會的清潔
    surfaces:
      - {phrase: 都不可露骨肉之親的下體, verses: [6]}
      - {phrase: 這本是大惡, verses: [17]}

  - name: 不可與經期婦人親近
    type: 主題
    evidence: v19「女人行經不潔淨的時候，不可露她的下體，與她親近」，延續利未記十五章行經不潔的條例，本章列為道德條例（非僅儀文不潔）
    surfaces:
      - {phrase: 女人行經不潔淨的時候, verses: [19]}

  - name: 不可姦淫
    type: 神學
    evidence: v20「不可與鄰舍的妻行淫，玷污自己」。GT啟導本：姦淫指已婚或已訂婚女子與非丈夫者發生關係，依法判處死刑（二十10），早為十誡所禁止（出20:14），此處明令禁制；「鄰舍」為廣義，指所有接觸到的人——本章是十誡「不可姦淫」誡命在聖潔條例中的具體重申
    surfaces:
      - {phrase: 不可與鄰舍的妻行淫, verses: [20]}

  - name: 不可使兒女經火歸摩洛
    type: 主題
    evidence: v21「不可使你的兒女經火歸與摩洛，也不可褻瀆你神的名」。GT啟導本：摩洛是迦南人所拜的神祇，祭祀方式有以兒童作火祭之事，一說將兒童拋入烈焰獻神，一說摩洛像以金屬鑄成燒至赤熱，將祭神童子放在其臂上灼死；GT《舊約聖經背景註釋》：北非迦太基及薩丁尼亞腓尼基遺址均挖掘到以孩童為祭的考古證據，然而聖經律法卻從不容許以此獻給耶和華（申18:10）
    surfaces:
      - {phrase: 不可使你的兒女經火歸與摩洛, verses: [21]}

  - name: 摩洛（Molech）身分之爭
    type: 解經爭議
    evidence: v21「摩洛」身分歷來眾說紛紜。GT李道生：摩洛原文意為「王」，又名米勒公或瑪勒堪（王上11:5；番1:5），西法瓦音人稱之亞得米勒，是亞捫人所拜的火神（王下17:31；王上11:7）；GT《舊約聖經背景註釋》另引兩種學術解法：(一)「摩洛」（molek）與希伯來語「王」（melek）輔音相同，古猶太傳統認為此字非某神專名，而是把「王」的稱號留給真神、用改換母音的mlk（molek）指迦南神明，含「羞恥之王」之意，與真君王的melek形成對比；(二)1935年艾斯費爾德公佈北非迦太基西元前400-150年碑文，用「molk」表示以動物和人為祭，因而解為「許願」或「誓言」的履行；後G·多辛在馬里城考古文獻中發現西元前十八世紀受幼發拉底河中游人崇拜的姆魯克神（Muluk），與西法瓦音人的亞得米勒（Adad-milki）、亞拿米勒有關聯，使「摩洛特指要求嬰兒火祭的異教神」一說更受採信；GT《舊約聖經背景註釋》另補：多數學者認為摩洛是冥界神祇，儀式起源自迦南祖先崇拜，某西元前八世紀腓尼基碑文記述基利家人交戰前曾向摩洛獻祭

  - name: 不可與男人苟合可憎惡的事
    type: 主題
    evidence: v22「不可與男人苟合，像與女人一樣；這本是可憎惡的」。GT丁良才：這是所多瑪人多犯的大罪（創19:5），摩西律法定為該死的罪（二十13）；CT〔問題改正〕逐點駁斥「此律屬禮儀律法、已隨新約廢除」之說：(1)本章所有律例皆屬道德律例，無一屬禮儀律法；(2)若此可接受，本章其他行為也都可接受；(3)神不僅禁止以色列人同性戀，也禁止外邦人（羅1:26），卻未要求外邦人守禮儀條例；(4)違犯禮儀條例懲罰一般輕微，但犯本條例者要被剪除（29節）；(5)新約時代許多舊約條例已廢除，僅存「禁戒偶像的污穢和姦淫，並勒死的牲畜和血」（徒15:20），但同性戀行為仍被禁止（羅1:26-27；林前6:9；提前1:10；猶7）
    surfaces:
      - {phrase: 不可與男人苟合，像與女人一樣, verses: [22]}

  - name: 利未記十八22同性戀禁令是否隨儀文律法廢除之爭
    type: 解經爭議
    evidence: GT賈斯樂郝威《聖經難解經文詮釋手冊》記載此難題與解答：〔難題〕律法禁戒同性戀（利18:22），也禁吃豬肉與無鱗水族（利11:2-3,10），但後者已因徒10:15解禁，有人因此主張同性戀禁誡也已解除。〔解答〕(1)若此誡因屬禮儀律法而可解除，同章所載強姦、亂倫、獸淫合的禁令也都可解除；(2)神同時對未受摩西律法的外邦人也禁止同性戀（羅1:26；羅2:12-15），並因迦南人犯此律而審判他們；(3)利未記中飲食禁令懲罰僅是隔離數日，同性戀懲罰卻是死刑（利18:29），輕重懸殊；(4)耶穌改變舊約飲食律法（可7:18；徒10:15），但新約對禁止同性戀的道德律法仍然維持（羅1:26-27；林前6:9；提前1:10；猶7）；另有第二則難題與解答討論「同性戀禁令是否因無法生育才被神咒詛」，答以聖經從未將同性戀與後裔問題相連，且死刑無法以「無法生育」解釋

  - name: 不可與獸淫合逆性的事
    type: 主題
    evidence: v23「不可與獸淫合，玷污自己。女人也不可站在獸前，與牠淫合；這本是逆性的事」。GT丁良才：埃及人敬拜野山羊時就行這些醜惡的事（十七7）；GT精讀本：把按神形象被造的人轉變成獸，是極其敗壞的行為，在外邦宗教祭祀儀式上進行，按神律法將人與獸一同治死（二十15-16）

  - name: 玷污自己也玷污地
    type: 神學
    evidence: 24-28節；行這一切事就玷污了自己，也玷污了地，所以神追討那地的罪孽，那地就吐出它的居民，免得以色列人玷污那地時也被地吐出。GT丁良才列人與地的五層關係：人遵主命地受咒詛（創3:17）、人行惡事地被玷污（本章）、人犯律法地就衰殘（賽24:4-5）、人蒙恩典地得福祉（二十五18-19）、人受報應地便歡樂（詩96:11-13）；GT《舊約聖經背景註釋》：本段間接表示違犯這些關乎性交的規條能使人、地污穢，將他們趕出，是以色列人在此定居前必須進行的潔淨過程
    surfaces:
      - {phrase: 連地也玷污了, verses: [25]}
      - {phrase: 地就把你們吐出, verses: [28]}

  - name: 剪除（kareth）
    type: 原文
    evidence: v29「無論什麼人，行了其中可憎的一件事，必從民中剪除」，延續本書一貫的剪除刑罰

  - name: 從民中剪除的含義
    type: 解經爭議
    evidence: v29 本章可憎之事（6-23節）行一件即從民中剪除，為既有「從民中剪除的含義」條目補充另一組適用範例——本章24-25節「地就把你們吐出」的意象與「剪除」並提，可補充討論此刑罰究竟指人為死刑、抑或神親自介入使地吐出居民的審判方式

  - name: 摩西
    type: 人物
    evidence: v1「耶和華對摩西說」，本章條例的唯一接受者與傳達者（v2「你曉諭以色列人說」，與利17章「亞倫和他兒子並以色列眾人」不同，本章僅提以色列人）
