name: 烏西雅王患大痲瘋（代下26：19-21）
type: 互文
secondary_types: []
aliases:
- 烏西雅王患大痲瘋
status: formal
definition: 烏西雅王因心高氣傲，強行進入耶和華的殿要在香壇上燒香，祭司亞撒利雅率領八十位勇敢的祭司阻擋他。烏西雅王發怒時，額上忽然發出大痲瘋。此事件與利未記第14章的大痲瘋潔淨條例形成強烈互文對比：利未記詳盡規範了長大痲瘋者得潔淨後重返營內與會幕的繁複禮儀（包括祭司出到營外察看、活鳥灑血、抹血抹油、獻贖愆祭等），但烏西雅王作為君王，因越權侵犯祭司的聖職而染病，終其一生必須住在別宮裡，與耶和華的殿隔絕，直至死日。這顯示出即使貴為君王，若干犯聖潔的界限，便無法適用利未記第14章的潔淨之禮來恢復其與神之間的禮儀關係。
development: 烏西雅王原本是蒙神賜福的君王，但因強盛而心高氣傲，導致行事邪僻。他越過君王的職分，企圖執行祭司專屬的燒香職務。當他向祭司發怒時，神親自介入，使其額上長出大痲瘋。此事件突顯了利未記中祭司職分的神聖性與不可逾越的界線，並說明大痲瘋不僅是生理疾病，更是神對干犯聖潔之罪的審判記號。
accumulations:
- book: 利未記
  chapter: 14
  summary: 詳細記載大痲瘋得潔淨的條例，祭司需出到營外察看，並透過活鳥、灑血、抹血抹油及獻贖愆祭等儀式，使患者重新融入營內與會幕的敬拜。
  relation: 利未記的潔淨條例為烏西雅王的遭遇提供了禮儀背景，凸顯君王因越權干犯祭司職任而受審，且終生被隔絕於聖殿之外，無法透過常規潔淨禮恢復。
- book: 歷代志下
  chapter: 26
  summary: 烏西雅王因驕傲越權燒香，神使其額上長大痲瘋，他急速離開聖殿，終生住在別宮，與神殿隔絕。
  relation: 烏西雅王的結局與利未記潔淨條例形成對比，表明干犯聖職所招致的痲瘋審判，使其徹底失去進入聖所的資格。
