name: 基督作大祭司醫治大痲瘋
type: 神學
secondary_types: []
aliases:
- 基督大祭司的職分
status: formal
definition: 利未記第14章中，祭司負責出到營外察看大痲瘋患者，並執行潔淨禮儀，使患者重新歸回營內。這預表耶穌基督作為升入高天尊榮的大祭司，祂不僅察看人的罪與不潔，更親自擔當人的罪。祂出到營外（被釘十字架），用自己的血成就了贖罪，並賜下聖靈（油），使罪如大痲瘋者得著徹底的醫治與潔淨，得以進入神的同在中。
accumulations:
- book: 利未記
  chapter: 14
  summary: 祭司出到營外察看痊癒者，並為其獻祭抹血抹油，使其潔淨歸回。
  relation: 預表基督作為大祭司，出到營外受苦，以血和聖靈潔淨罪人，引人回到神面前。
related_entries:
- 耶穌
- 抹血抹油：完全潔淨與聖靈印記
- 罪如大痲瘋：滲透、隔離、需神醫治
sources:
- '英文註解: Leviticus 14 — Christ as High Priest（https://www.kingcomments.com/en/bible-studies/Lev/14）'
- '綜合研讀註解: Leviticus 14 — Priestly Cleansing Ritual（https://biblehub.com/study/leviticus/14.htm）'
