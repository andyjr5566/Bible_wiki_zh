name: 瓦器盛活水（潔淨儀式）
type: 主題
secondary_types: []
aliases:
- 瓦器盛活水
status: formal
definition: 利未記 14 章 5, 50 節規定的潔淨儀式具體動作：「祭司要吩咐用瓦器盛活水，把一隻鳥宰在上面」。文意註解：「瓦器盛活水，把一隻鳥宰在上面」；靈意註解：「瓦器表徵道成肉身的基督，盛活水表徵基督滿有神的生命，宰鳥在上面表徵基督為罪人被釘十字架」。拾穗引林後
  4:7「寶貝裝在瓦器裡」。
accumulations:
- book: 利未記
  chapter: 14
  summary: 此儀式動作同時出現於大痲瘋人潔淨（5 節）與房屋潔淨（50 節），構成「血水同流於瓦器」的核心意象，連結基督道成肉身、捨命流血與聖靈生命供應。
  relation: 為潔淨禮儀的物質基礎，承上啟下連接「宰鳥」、「蘸血」、「灑七次」、「放活鳥」等步驟。
