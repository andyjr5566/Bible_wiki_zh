name: 一羅革油（log）
type: 原文
secondary_types: []
aliases:
- 一羅革油
status: formal
definition: 希伯來文 log，液體容量單位，約合半公升（0.3 升）。利未記 14 章中規定潔淨禮儀所用橄欖油的量度，無論富人或貧窮人皆須備一羅革油（10,
  12, 15, 21, 24 節）。文意註解指出「一羅革約合零點三公升」；靈意註解視為象徵聖靈的膏抹分量。
accumulations:
- book: 利未記
  chapter: 14
  summary: 本章五次出現「一羅革油」，作為潔淨大痲瘋者儀式中必備的油量，配合贖愆祭搖祭、抹血抹油、彈油七次、抹頭等步驟，象徵聖靈充滿的分量。
  relation: 核心度量單位，貫串潔淨禮儀的油膏抹部分，連結贖愆祭與聖靈工作。
related_entries:
- 贖愆祭（asham）
