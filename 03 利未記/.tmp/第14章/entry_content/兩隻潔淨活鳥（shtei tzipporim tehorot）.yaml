name: 兩隻潔淨活鳥（shtei tzipporim tehorot）
type: 原文
secondary_types: []
aliases:
- 兩隻潔淨活鳥
status: formal
definition: 希伯來文 shtei tzipporim tehorot，字面意為「兩隻潔淨的鳥」。在利未記14章大痲瘋潔淨禮的第一階段中，祭司要求為求潔淨者取兩隻活鳥，一隻宰於瓦器盛的活水之上，另一隻蘸於血與活水中灑在求潔淨者身上，隨後放生於田野。此儀式象徵患者從死境中復生並重新得著自由。
accumulations:
- book: 利未記
  chapter: 14
  summary: 規定潔淨禮中要取兩隻潔淨的活鳥，一隻宰殺於活水上，一隻蘸血灑七次後放生田野。
  relation: 作為大痲瘋潔淨禮第一階段的核心介質，象徵死亡與生命的替換。
related_entries:
- 大痲瘋潔淨禮（tzara'at taharah）
- 香柏木（erez）
- 瓦器盛活水（kli cheres mayim chayim）
- 灑七次（hizah sheva pe'amim）
- 兩隻鳥預表基督死而復活
