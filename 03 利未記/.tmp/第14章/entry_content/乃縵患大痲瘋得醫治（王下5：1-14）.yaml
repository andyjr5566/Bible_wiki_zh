name: 乃縵患大痲瘋得醫治（王下5：1-14）
type: 互文
secondary_types: []
aliases:
- 乃縵患大痲瘋得醫治
status: formal
definition: 亞蘭元帥乃縵是尊大的人，且是大能的勇士，但他長了大痲瘋。透過以色列擄來的小女子，乃縵得知撒瑪利亞有先知以利沙能醫治他。乃縵帶著金銀財寶前往，以利沙卻只吩咐他去約但河中沐浴七回。乃縵起初發怒，後來聽從僕人勸告，在約但河裡沐浴了七回，肉便復原，好像小孩子的肉。此事件與利未記第14章的互文在於：利未記規定大痲瘋得潔淨需由祭司出到營外察看，並執行繁複的灑血、抹油與獻祭儀式；然而乃縵的潔淨並未經過這些祭司禮儀，而是透過先知的吩咐與順服神的洗滌方式（河水沐浴七次）直接得醫治，顯示神的主權超越禮儀律法的框架，並施恩給外邦人。
development: 乃縵的經歷展示了大痲瘋潔淨的另一種途徑。利未記第14章的條例針對以色列人在禮儀系統內的潔淨，但乃縵作為外邦元帥，其潔淨過程省略了活鳥、香柏木、牛膝草及獻祭等物質禮儀，僅透過神藉先知發出的命令與其順服的行動便得潔淨。這預示了神的恩典將超越以色列的疆界與舊約祭司的禮儀限制，臨到信靠祂的外邦人。
accumulations:
- book: 利未記
  chapter: 14
  summary: 規範了大痲瘋痊癒後的潔淨之禮，包含祭司營外察看、活鳥灑血、剃毛洗澡、第八天獻贖愆祭與燔祭等複雜程序。
  relation: 利未記的條例提供了大痲瘋潔淨的標準禮儀背景，用以對照乃縵作為外邦人如何透過單純順服先知指令而得著超越禮儀律法的潔淨神蹟。
- book: 列王紀下
  chapter: 5
  summary: 亞蘭元帥乃縵長大痲瘋，經以利沙指示在約但河沐浴七回後得潔淨，其肉如小孩。
  relation: 乃縵的醫治對照利未記潔淨條例，顯明神的醫治大能不受限於祭司獻祭的儀式，且恩及外邦人。
