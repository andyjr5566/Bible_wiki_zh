name: 耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）
type: 互文
secondary_types: []
aliases:
- 耶穌醫治痲瘋病人
status: formal
definition: 有一個長大痲瘋的來求耶穌，向他跪下說：「主若肯，必能叫我潔淨了。」耶穌動了慈心，伸手摸他，說：「我肯，你潔淨了吧！」大痲瘋即時離開他。耶穌嚴嚴囑咐他不可告訴人，只要去把身體給祭司察看，獻上摩西所吩咐的禮物，對眾人作證據。此事件與利未記第14章緊密互文：耶穌沒有廢棄律法，而是吩咐得醫治的痲瘋病人去履行利未記14章所規定的潔淨條例（給祭司察看、獻祭）。這顯示耶穌尊重律法的禮儀要求，但同時突顯祂自己是潔淨的真正源頭——利未記的祭司只能「察看」並「宣告」痊癒，而耶穌卻是親自「醫治」並賜下潔淨。
development: 利未記第14章的潔淨禮儀是為已經痊癒的痲瘋病人進行宣告與獻祭，使其能重新融入社群與敬拜。耶穌醫治痲瘋病人時，直接發出命令「你潔淨了吧」，使痲瘋即時消退。隨後耶穌要求患者遵守利未記的規定去見祭司，這不僅表明耶穌成全了律法的要求，也暗示祂就是舊約禮儀所預表的那位終極潔淨者與大祭司。
accumulations:
- book: 利未記
  chapter: 14
  summary: 規定長大痲瘋得潔淨時，需帶去見祭司，祭司出到營外察看，並在第八天獻上贖愆祭、贖罪祭與燔祭。
  relation: 利未記的條例是耶穌吩咐得醫治的痲瘋病人去遵守的律法依據，證明耶穌醫治的真實性並符合摩西律法的見證要求。
- book: 馬太福音
  chapter: 8
  summary: 耶穌伸手摸長大痲瘋的人使其潔淨，並吩咐他去獻上摩西所吩咐的禮物給祭司察看。
  relation: 耶穌的醫治對應利未記的潔淨條例，顯明祂是潔淨的能力源頭，同時祂吩咐患者遵守律法以對眾人作證據。
