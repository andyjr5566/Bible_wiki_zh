name: 剃去毛髮（giluach）
type: 原文
secondary_types: []
aliases:
- 剃去毛髮
status: formal
definition: 希伯來文 giluach，意為「剃去」或「剃毛」。在利未記14章大痲瘋潔淨禮的第一階段中，求潔淨的人在洗衣服、用水洗澡後，需剃去全身所有的毛髮，包括頭髮、鬍鬚、眉毛等，並在第七天再次剃除。此動作象徵褪去舊有沾染不潔的外皮，徹底除去可能隱藏病菌的部位，以全新潔淨的狀態預備進入群體。
accumulations:
- book: 利未記
  chapter: 14
  summary: 規定求潔淨者在潔淨日當剃去毛髮，並在第七天再剃一次，隨後洗身洗衣服便得潔淨。
  relation: 作為患者恢復潔淨狀態、預備進入營內與後續獻祭的必要過程。
