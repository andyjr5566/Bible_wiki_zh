name: 營外七天等候（潔淨禮）
type: 主題
secondary_types: []
aliases:
- 營外七日
- 七天隔離期
status: formal
definition: 利未記14:8-9規定求潔淨者經營外兩鳥儀式、洗衣剃毛沐浴後，雖可「進營」，卻須「在自己的帳棚外居住七天」，第七天再剃全身毛、洗衣、沐浴，才算完全潔淨。GT丁良才：雖可回營，卻還不得回到自己家裡和妻子兒女同住，也不能進會幕，必須在別處再過七天，暗示他仍不能恢復正常的夫妻性生活。
development: 利未記12:2-5產婦潔淨亦有七天/十四天不潔之期，可資比較，兩者皆以「七」為潔淨等候期的計算單位。
accumulations:
- book: 利未記
  chapter: 14
  summary: 8-9節明確規定「進營」與「帳棚外居住七天」的張力狀態，第七天第二次剃毛洗濯為過渡儀式終點。
  relation: 連接營外兩鳥儀式（1-7節）與會幕第八天獻祭（10-20節），是潔淨者從「身體潔淨」進入「敬拜資格」的必要緩衝期。
