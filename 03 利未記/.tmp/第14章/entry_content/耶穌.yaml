name: 耶穌
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 耶穌基督是聖經所啟示的完全神與完全人，舊約律法與獻祭禮儀的終極應驗者。在利未記第14章大痲瘋潔淨條例的背景下，耶穌在新約中親自醫治了長大痲瘋的人（太8:1-4；可1:40-45；路5:12-16），不僅彰顯了祂超越律法限制的醫治權柄，更表明祂就是舊約祭司所預表的那位終極大祭司。祂不僅能使痲瘋病得著身體的痊癒，更透過祂在十字架上所流的寶血與所賜下的聖靈，成全了利未記14章中「抹血抹油」的潔淨禮儀，使罪人得著完全的屬靈潔淨與聖靈的印記。
accumulations:
- book: 利未記
  chapter: 14
  summary: 本章記載了大痲瘋得潔淨的條例，包含祭司察看、活鳥灑血、以及第八天抹血抹油的贖愆祭禮儀，這些禮儀細節皆為預表未來耶穌基督的救贖工作。
  relation: 耶穌是本章潔淨禮儀的實體與成全者。祂醫治痲瘋病人的神蹟直接對應本章的潔淨條例，而祂作為大祭司與祭物，應驗了本章中血與油所預表的完全救贖與聖靈膏抹。
related_entries:
- 耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）
