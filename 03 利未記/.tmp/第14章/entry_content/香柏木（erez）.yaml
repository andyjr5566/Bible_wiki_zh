name: 香柏木（erez）
type: 原文
secondary_types: []
aliases:
- 香柏木
status: formal
definition: 希伯來文 erez，指香柏木。在利未記14章的潔淨禮儀中，香柏木與牛膝草、朱紅色線及活鳥一同使用。香柏木高大堅固，常象徵力量與不朽，在此禮儀中與牛膝草（象徵謙卑潔淨）並用，可能代表著全人從高處到低處、從最大到最小皆需被潔淨與救贖。
accumulations:
- book: 利未記
  chapter: 14
  summary: 在大痲瘋患者與房屋的潔淨禮中，香柏木被列為必備的潔淨用具之一，與活鳥、牛膝草和朱紅色線一同蘸血灑水。
  relation: 作為潔淨禮儀中的物理介質，與其他物件共同構成完整的除罪與潔淨象徵。
related_entries:
- 大痲瘋潔淨禮（tzara'at taharah）
- 兩隻潔淨活鳥（shtei tzipporim tehorot）
- 房屋大痲瘋（tzara'at ba-bayit）
