name: 剃全身毛髮（潔淨禮）
type: 主題
secondary_types: []
aliases:
- 剃毛儀式
- 全身剃髮
status: formal
definition: 利未記14:8-9規定求潔淨者兩次剃毛：第一次（第1天）剃去一切毛髮，洗衣、沐浴，進營住帳棚外七天；第七天再剃「頭上所有頭髮與鬍鬚、眉毛，並全身的毛」，又洗衣、沐浴。剃毛象徵除去舊我、肉體榮耀（髮表驕傲、鬍鬚表自尊、眉毛表天然美、全身毛表天然能力），配合水洗預表聖靈與話語徹底更新。
development: GT《舊約聖經背景註釋》：剃除淨盡的作用是使人人都能看見皮膚已經復原，以及避免有任何殘餘的不潔留在毛髮上；BH：此舉與拿細耳人剃頭的作法相似，是奉獻的記號（民數記6章）。
accumulations:
- book: 利未記
  chapter: 14
  summary: 8-9節詳細列出兩階段剃毛範圍（第一次「一切毛髮」，第七天細分「頭髮、鬍鬚、眉毛、全身毛」）與配套洗衣、沐浴動作。
  relation: 營外潔淨儀式的外在標誌，使痊癒者外觀徹底更新，配合內在血油禮完成「新造」預表。
