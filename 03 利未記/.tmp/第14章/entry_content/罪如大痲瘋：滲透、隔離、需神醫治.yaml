name: 罪如大痲瘋：滲透、隔離、需神醫治
type: 神學
secondary_types: []
aliases:
- 大痲瘋的罪惡預表
status: formal
definition: 利未記中的大痲瘋在神學上常被視為罪的預表。大痲瘋具有深層滲透性（使皮膚、衣服甚至房屋變色腐爛），導致患者必須被隔離在營外，無法與神與人相交。其潔淨無法靠人為醫療達成，必須由祭司察看並透過神所設立的贖罪禮儀（血與油）方能恢復。這正預表罪的可怕：罪滲透全人，使人與神隔絕，唯有靠神所設立的基督及其救贖方能得醫治。
accumulations:
- book: 利未記
  chapter: 14
  summary: 詳述大痲瘋痊癒者需經繁複的潔淨禮，包括隔離後的察看、獻祭、抹血抹油，方能進營。
  relation: 大痲瘋的隔離與潔淨過程，深刻描繪罪的污染與隔絕，以及神救贖醫治的必要性。
related_entries:
