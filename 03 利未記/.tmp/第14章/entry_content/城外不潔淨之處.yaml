name: 城外不潔淨之處
type: 地點
secondary_types: []
aliases:
- 城外不潔淨之處
status: formal
definition: 利未記 14 章 40, 41, 45, 53 節指定的棄置污穢物地點。房屋痲瘋石頭、灰泥、木料（40, 41, 45 節）及潔淨禮畢的活鳥（53
  節）均須帶往此處。文意註解 40 節：「就是城外倒各種不潔之物的地方」；靈意註解視為「與神的聖潔斷絕、被神離棄的地方」。
accumulations:
- book: 利未記
  chapter: 14
  summary: 本章四次出現，作為房屋痲瘋處理的最終隔離區，亦為潔淨禮完成後活鳥釋放之地，象徵不潔與聖潔的徹底分離。
  relation: 地理與神學邊界，對應營外/城外概念，呼應第 13 章「住在營外」與新約「門外」意象（來 13:12-13）。
