name: 米利暗患大痲瘋（民12：10-15）
type: 互文
secondary_types: []
aliases:
- 米利暗的痲瘋
status: formal
definition: 民數記12章記載米利暗因毀謗摩西而遭神懲罰，長了大痲瘋。此事件與利未記第14章的大痲瘋潔淨條例形成互文對照：米利暗被關鎖在營外七天，符合利未記中痲瘋患者需被隔離的規定；而摩西為其代求，神吩咐她得潔淨後方可回營，也呼應了利未記14章中祭司察看並執行潔淨禮的流程，顯示大痲瘋的發生與潔淨皆在神的主權與條例之下。
accumulations:
- book: 利未記
  chapter: 14
  summary: 詳細規範大痲瘋患者痊癒後，祭司需到營外察看並執行潔淨之禮，使其隔離期滿後歸回。
  relation: 提供民數記12章米利暗患痲瘋被隔離與醫治的禮儀背景與律法依據。
related_entries:
- 大痲瘋潔淨禮（tzara'at taharah）
- 摩西
- 烏西雅王患大痲瘋（代下26：19-21）
