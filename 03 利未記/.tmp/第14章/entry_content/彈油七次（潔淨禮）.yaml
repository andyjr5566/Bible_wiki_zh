name: 彈油七次（潔淨禮）
type: 主題
secondary_types: []
aliases:
- 彈油禮
- 七次彈油
status: formal
definition: 利未記14:16, 27規定祭司將油倒於左掌，以右手指頭蘸油，在耶和華面前（會幕門口向至聖所）彈灑七次。GT丁良才：據猶太人的傳說，祭司每彈一次，便蘸一次油。七表完全，彈油象徵聖靈完全膏抹、分別為聖，使潔淨者生命徹底更新，能在神面前事奉。油先彈後抹（17,
  28節），表聖靈工作先歸神後及人。
development: 利未記4:6, 17亦有「彈血七次」贖罪儀式，可資比較，兩者皆以「七」為完全數。BH：七次象徵完全，反映創造週的完整（創世記1章）；BH另指出七次亦與啟示錄1:4「七靈」的完全數象徵相呼應。
accumulations:
- book: 利未記
  chapter: 14
  summary: 16, 27節記載標準條例與貧窮條例同樣要求「在耶和華面前用指頭彈七次」，顯示此儀式不可減省。
  relation: 抹油儀式的關鍵步驟，連結「血贖罪」與「油分別」，完成潔淨者從不潔到聖潔事奉的轉換。
