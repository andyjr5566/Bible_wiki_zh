book: 利未記
chapter: 14
candidates:
  - name: 大痲瘋得潔淨的條例（人）
    type: 主題
    evidence: 1-32節；痊癒者須經祭司營外察看、兩鳥儀式、七天等候、剃毛洗濯、第八天獻祭（贖愆祭、贖罪祭、燔祭、素祭）與抹血抹油，貧窮者另有簡化條例
    surfaces:
      - {phrase: 長大痲瘋得潔淨的日子, verses: [2]}
      - {phrase: 求潔淨, verses: [4, 7, 8, 11, 14, 17, 18, 19, 25, 28, 29]}
      - {phrase: 潔淨的禮, verses: [11, 32]}

  - name: 潔淨痲瘋者的兩鳥儀式
    type: 主題
    evidence: 4-7節；祭司吩咐取兩隻潔淨活鳥、香柏木、朱紅色線、牛膝草，一隻宰於瓦器活水上，另一隻活鳥連同香柏木朱紅色線牛膝草蘸於鳥血中，在求潔淨者身上灑七次，定為潔淨，活鳥放歸田野。49-53節房屋潔淨亦用相同儀式
    surfaces:
      - {phrase: 兩隻潔淨的活鳥, verses: [4]}
      - {phrase: 一隻鳥宰在上面, verses: [5]}
      - {phrase: 活鳥放在田野裡, verses: [7, 53]}

  - name: 房屋大痲瘋的診斷與潔淨條例
    type: 主題
    evidence: 33-53節；迦南地房屋牆上出現發綠發紅凹斑紋，祭司察看、騰空房屋、封鎖七天；若發散則挖除病石、刮灰泥、換新石新灰泥；若再發散則拆毀全房；若痊癒則用兩鳥儀式潔淨
    surfaces:
      - {phrase: 房屋中有大痲瘋的災病, verses: [34, 35]}
      - {phrase: 房子封鎖七天, verses: [38]}
      - {phrase: 蠶食的大痲瘋, verses: [44]}
      - {phrase: 拆毀房子, verses: [45]}
      - {phrase: 潔淨房子, verses: [49, 52, 53]}

  - name: 貧窮人的潔淨條例（大痲瘋）
    type: 主題
    evidence: 21-32節；貧窮不能預備夠數者，贖愆祭仍須公羊羔（不可減免），但贖罪祭與燔祭可用兩隻斑鳩或雛鴿代替，素祭減為伊法十分之一，其餘抹血抹油儀式與常人相同
    surfaces:
      - {phrase: 他若貧窮不能預備夠數, verses: [21]}
      - {phrase: 照他的力量, verses: [22, 30]}
      - {phrase: 不能將關乎得潔淨之物預備夠數, verses: [32]}

  - name: 右耳垂右手大拇指右腳大拇指（抹血抹油潔淨禮）
    type: 主題
    evidence: 14-18, 25-29節；祭司取贖愆祭牲血抹在求潔淨者右耳垂、右手大拇指、右腳大拇指上；再將油倒在左手掌，用右指頭蘸油向耶和華彈七次，然後抹油在同一位置（抹在血上），最後將所剩油抹在頭上。表徵全人（聽、做、行、心思）蒙血潔淨、受油分別為聖。此儀式與祭司承接聖職（出29:20; 利8:23-24）相同
    surfaces:
      - {phrase: 右耳垂上, verses: [14, 17, 25, 28]}
      - {phrase: 右手的大拇指上, verses: [14, 17, 25, 28]}
      - {phrase: 右腳的大拇指上, verses: [14, 17, 25, 28]}
      - {phrase: 抹在頭上, verses: [18, 29]}

  - name: 彈油七次（潔淨禮）
    type: 主題
    evidence: 16, 27節；祭司將油倒在左手掌中，用右手一個指頭蘸油，在耶和華面前（向至聖所方向）彈七次，然後將所剩油抹在求潔淨者右耳垂、右手大拇指、右腳大拇指及頭上
    surfaces:
      - {phrase: 用指頭彈七次, verses: [16, 27]}

  - name: 剃全身毛髮（潔淨禮）
    type: 主題
    evidence: 8-9節；求潔淨者第一天須剃去全身毛髮、洗衣服、用水洗澡；第七天再剃頭上所有頭髮、鬍鬚、眉毛及全身毛，再洗衣服洗身。剃毛表徵徹底除去舊有污穢與天然榮耀
    surfaces:
      - {phrase: 剃去毛髮, verses: [8]}
      - {phrase: 把頭上所有的頭髮與鬍鬚、眉毛，並全身的毛，都剃了, verses: [9]}

  - name: 營外七天等候（潔淨禮）
    type: 主題
    evidence: 8節；求潔淨者經兩鳥儀式後可進營，但須在自己的帳棚外居住七天，不得與家人同住、不得進會幕。第七天再剃全身毛髮後才完全潔淨
    surfaces:
      - {phrase: 要在自己的帳棚外居住七天, verses: [8]}

  - name: 第八天獻祭（大痲瘋潔淨）
    type: 主題
    evidence: 10-20節；第八天求潔淨者帶兩隻公羊羔（贖愆祭、燔祭）、一歲母羊羔（贖罪祭）、伊法十分之三調油細麵（素祭）、一羅革油到會幕門口，祭司行搖祭、抹血抹油、獻贖罪祭燔祭素祭後，他才完全潔淨
    surfaces:
      - {phrase: 第八天, verses: [10, 23]}

  - name: 伊法十分之三（大痲瘋潔淨素祭）
    type: 原文
    evidence: 10, 21節；常人潔淨禮的素祭分量為調油的細麵伊法十分之三（約6.8公升），貧窮者減為伊法十分之一（約2.2公升）。GT丁良才：伊法十分之三就是三俄梅珥，約十斤左右
    surfaces:
      - {phrase: 調油的細麵伊法十分之三, verses: [10]}
      - {phrase: 調油的細麵伊法十分之一, verses: [21]}

  - name: 一羅革油（log）
    type: 原文
    evidence: 10, 12, 15, 21, 24節；一羅革為液體容量單位，約0.3公升（半品脫），僅出現於本章。此油與贖愆祭羊羔一同作搖祭，後用於彈油七次及抹右耳垂、右手大拇指、右腳大拇指和頭上
    surfaces:
      - {phrase: 油一羅革, verses: [10, 12, 15, 21, 24]}

  - name: 大痲瘋條例總結（利13-14）
    type: 主題
    evidence: 54-57節；總結13-14章各類大痲瘋災病（皮膚、頭疥、衣服、房子、癤子、癬、火斑）的條例，目的為「指明何時為潔淨，何時為不潔淨」
    surfaces:
      - {phrase: 這是為各類大痲瘋的災病, verses: [54]}
      - {phrase: 指明何時為潔淨，何時為不潔淨, verses: [57]}
      - {phrase: 這是大痲瘋的條例, verses: [57]}

  - name: 香柏木（潔淨儀式用）
    type: 文化
    evidence: 4, 6, 49, 51-52節；潔淨大痲瘋患者及房屋時，與朱紅色線、牛膝草、兩鳥同用。GT丁良才：香柏木為利巴嫩山上最高最著名樹木，不易朽壞；精讀本：象徵生命的活力即永生生命；KC：speaks of impressive, natural grandeur
    surfaces:
      - {phrase: 香柏木, verses: [4, 6, 49, 51, 52]}

  - name: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
    type: 主題
    evidence: 4, 6, 49, 51-52節；本章單獨使用朱紅色線（無藍紫二色），與香柏木、牛膝草、兩鳥同綁用於潔淨大痲瘋患者及房屋的儀式，用途從既有條目累積的會幕織物染料延伸為潔淨禮的材料。GT丁良才：朱紅色線即絨線，重一舍客勒，為綁牛膝草在香柏木上作刷子用；精讀本：象徵血即耶穌基督寶血的能力和救恩（書2:18）；BH：scarlet represents sin and the blood required for atonement
    surfaces:
      - {phrase: 朱紅色線, verses: [4, 6, 49, 51, 52]}

  - name: 活水（潔淨儀式用）
    type: 原文
    evidence: 5, 6, 50-52節；潔淨禮須用瓦器盛「活水」（流動的水，如溪水，非井水），將一隻鳥宰於其上使血與水混合。KC：running water is water that rises from the earth, refers to the Word of God made alive by the Holy Spirit；BH：fresh water, or 'living water', symbolizes life and purification
    surfaces:
      - {phrase: 活水, verses: [5, 50, 51, 52]}

  - name: 瓦器盛活水（潔淨儀式）
    type: 主題
    evidence: 5, 50節；祭司吩咐用瓦器盛活水，將一隻鳥宰在上面使血流入水中。CT靈意：瓦器表徵道成肉身的基督，盛活水表徵基督滿有神的生命；GT精讀本：瓦器象徵雖軟弱但因永生水和基督寶血得救的聖徒（林後4:7）；KC：earthenware vessel indicates He became Man (Heb 2:14a)
    surfaces:
      - {phrase: 用瓦器盛活水, verses: [5, 50]}

  - name: 城外不潔淨之處
    type: 地點
    evidence: 40, 41, 45, 53節；挖出的病石、刮掉的灰泥、拆毀的房子材料均須扔在「城外不潔淨之處」；活鳥則放在「城外田野裡」。GT丁良才：即城外倒各種不潔之物的地方（參太5:22）；精讀本：與神的聖潔斷絕、被神離棄的地方（4:11-12）
    surfaces:
      - {phrase: 城外不潔淨之處, verses: [40, 41, 45]}
      - {phrase: 城外田野裡, verses: [53]}

  - name: 摩西
    type: 人物
    evidence: v1「耶和華曉諭摩西說」（1-32節人的潔淨條例）、v33「耶和華曉諭摩西、亞倫說」（33-53節房屋的潔淨條例）

  - name: 亞倫和他兒子（祭司）
    type: 人物
    evidence: v33「耶和華曉諭摩西、亞倫說」；全章潔淨禮儀（察看、灑血抹油、獻祭）皆由祭司執行

  - name: 牛膝草
    type: 原文
    evidence: 4, 6, 49, 51, 52節；與香柏木、朱紅色線、兩鳥同用於潔淨人與房屋的儀式。GT丁良才：牛膝草即成簇有香味的草，長在牆頭上（出十二22注），與出埃及記逾越節塗血於門框、民數記除污穢水灑身同屬一物；BH：hyssop用於逾越節塗血門柱（出12:22）及大衛詩51:7求潔淨的禱告，象徵潔淨與獻祭血的施用

  - name: 大痲瘋（tsara'at，皮膚病診斷條例）
    type: 原文
    evidence: 全章延續利未記13章的核心術語，本章處理痊癒後的潔淨條例（1-32節人；33-53節房屋）；54-57節總結13-14章全部條例

  - name: 大痲瘋是否等同於罪的懲罰之爭
    type: 解經爭議
    evidence: v34 GT《聖經精讀本》明確申明「並不是神對罪審判，使房屋發生麻風病」，「當時巴勒斯坦地區經常發生黴變的腐蝕，是當地的流行病」；但CT靈意注解仍將房屋大痲瘋逐節解為「教會中有明顯的罪惡」，兩種讀法在本章房屋段落再度並陳

  - name: 贖愆祭（asham）
    type: 原文
    evidence: 12-32節；GT丁良才列出本章贖愆祭與五章贖愆祭條例的九點不同（公羊羔不必長成、非按祭司估定價值、有同獻的素祭、與一羅革油同獻、祭司在耶和華前自己搖獻、活搖全祭牲而非宰後搖一部分、血有特別用法、無罰金等）

  - name: 搖祭（tenufah）
    type: 原文
    evidence: 12, 24節；GT丁良才：本章贖愆祭「活搖」全隻祭牲（一般搖祭是宰殺後才搖、且只搖一部分），且由祭司自己搖（一般是祭司同獻祭者一起搖）；GT《舊約背景註釋》：本段是唯一使用全隻祭牲的搖祭典禮實例

  - name: 沒有殘疾的祭牲
    type: 神學
    evidence: v10「兩隻沒有殘疾的公羊羔和一隻沒有殘疾、一歲的母羊羔」；延續利未記獻祭條例對祭牲完全無殘疾的一貫要求

  - name: 至聖的供物（聖與至聖之分）
    type: 主題
    evidence: v13「贖愆祭要歸祭司，與贖罪祭一樣，是至聖的」；祭司只可在聖所吃這祭肉

  - name: 會幕門口
    type: 地點
    evidence: 11, 23節；求潔淨的人與祭物須安置在「會幕門口、耶和華面前」，由祭司在此主持獻祭與贖罪

  - name: 出29：20
    type: 互文
    evidence: CT／GT丁良才均指出，抹贖愆祭牲血在求潔淨人右耳垂、右手大拇指、右腳大拇指上（14, 17, 25, 28節），與祭司承接聖職禮（出29:20；利8:23-24）抹血同一部位的儀式相同，表徵全人分別為聖

  - name: 承接聖職（分別為聖）
    type: 神學
    evidence: CT話中之光：抹血抹油於右耳、右手、右腳，「作祭司完全是神的恩典，同樣大痲瘋得痊癒也是出於神的恩典」，將本章潔淨禮與祭司承接聖職禮並列
