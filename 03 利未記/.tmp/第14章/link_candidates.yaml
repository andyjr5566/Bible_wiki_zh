- name: 贖愆祭的獨特性
  type: 主題
  evidence: 利14:12-13；丁良才逐條列出此贖愆祭與尋常贖愆祭的九處不同：（一）是公羊羔，不必是長成的；（二）不是按祭司所估定的價值；（三）有同獻的素祭，別的贖愆祭沒有；（四）是與一羅革油同獻的；（五）須在耶和華面前作搖祭；（六）別的搖祭是祭司同獻祭的人搖的，這祭是祭司自己搖的；（七）別的搖祭是宰了以後搖、且只搖一部分，這祭是搖全祭牲而且是活搖的；（八）這贖愆祭牲的血有特別的用法；（九）別的贖愆祭多有罰金，這祭沒有罰金。《舊約聖經背景註釋》證實第七點：「本段是惟一典禮使用全隻祭牲的例證。」
  surfaces:
  - 贖愆祭獨特
  - 活搖
