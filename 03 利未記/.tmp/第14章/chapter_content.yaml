organization: '### 祭司出到營外察看（v1-3）


  第13章通篇只教祭司如何察看、隔離、定為不潔淨，卻沒有給出任何醫治的辦法。本章一開頭耶和華曉諭 [[摩西]]，直接從「長大痲瘋得潔淨的日子，其例乃是這樣」講起（v2），語氣裡已經預設了一件經文自己從不解釋的事：==痊癒不是條例做出來的，條例只是承認痊癒==。整套
  [[大痲瘋潔淨禮（tzara''at taharah）|潔淨禮]] 因此與壇上其他祭儀截然不同——祭司不是治病的人，他是被差去「察看」的人。


  更值得注意的是察看的地點。病人不能進營，所以祭司必須出到營外，越過聖潔的界線，走到隔離之地與他相會（v3）。潔淨的程序不是由不潔淨者闖進聖所開始，而是由聖潔者主動走出去開始。這個動作是全章預表最濃的一筆，也是
  [[基督作大祭司醫治大痲瘋]] 這條線索的起點：後來 [[耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）|福音書中的耶穌]] 伸手去摸那長大痲瘋的人，正是把「出到營外」推到極致。在
  [[古代近東皮膚病與禮儀潔淨觀]] 的背景裡，皮膚病人是被社群推遠的一群；律法卻要求祭司往那一邊走。


  ### 兩隻活鳥與營外的第一階段（v4-9）


  察看確認痊癒後，第一階段的禮儀完全在營外進行，用的不是壇上的祭牲，而是一組奇特的材料：[[兩隻潔淨活鳥（shtei tzipporim tehorot）|兩隻潔淨的活鳥]]、[[香柏木（erez）|香柏木]]、朱紅色線與
  [[牛膝草]]。祭司吩咐用 [[瓦器盛活水（kli cheres mayim chayim）|瓦器盛活水]]，把一隻鳥宰在活水上面，使鳥血與活水相混；另一隻活鳥連同香柏木、朱紅色線、牛膝草一同蘸在這血水裡，再
  [[灑七次（hizah sheva pe''amim）|在求潔淨的人身上灑七次]]，定他為潔淨，最後把活鳥放在田野裡（v4-7）。一死一放、一血一自由，這幅畫面刻意留下強烈的視覺記憶：血是必須流的，鳥卻是要飛的。[[兩隻鳥預表基督死而復活]]
  的讀法即由此而來——一隻代死，一隻帶著血的印記回到廣闊的天空。


  灑血之後仍未結束。求潔淨的人要洗衣服、[[剃去毛髮（giluach）|剃去毛髮]]、用水洗澡，才可以進營，但還要在自己的帳棚外住七天；第七天再剃盡頭髮、鬍鬚、眉毛與全身的毛，重新洗衣洗身（v8-9）。==潔淨是分層恢復的：先恢復與會眾的空間關係，再恢復與家庭的關係，最後才恢復與神的關係。==
  剃盡全身之毛近乎一種象徵性的「重新出生」，把舊身分連同毛髮一起除去。


  > [!note]

  > 香柏木、朱紅色線、牛膝草這組材料日後在紅母牛條例中再度出現。本章只列材料而不解釋象徵，任何「香柏木代表高、牛膝草代表低」的說法都屬解讀，非經文明言。


  ### 第八天的抹血抹油（v10-20）


  第八天，禮儀從營外轉到會幕門口、耶和華面前（v11）——這是恢復的完成點，也是全章的樞紐。祭物包括兩隻無殘疾的公羊羔、一隻一歲的母羊羔、伊法十分之三調油的細麵為素祭，並油一羅革。次序極其講究：先獻的既不是燔祭也不是贖罪祭，而是
  [[贖愆祭（asham）]]，並且要與那一羅革油一同作 [[搖祭（tenufah）]]，在耶和華面前搖一搖（v12）。這正是 [[贖愆祭的獨特性]]：贖愆祭牲被整隻搖在神面前，經文又特別聲明「贖愆祭要歸祭司，與贖罪祭一樣，是至聖的」（v13）。大痲瘋不只是污穢，它被當作一種對神的虧欠，需要償還。


  接著是本章最細膩的動作。[[抹血抹油禮儀（dam ve-shemen）|抹血、抹油]] 分兩輪落在同一個部位：右耳垂、右手大拇指、右腳大拇指（v14、v17）。油要先在耶和華面前用指頭彈七次（v16），再抹在血上，剩下的油抹在頭上為他贖罪（v18）。血在下、油在上，順序不可顛倒，這是
  [[抹血抹油：完全潔淨與聖靈印記]] 這條讀法所倚重的次序：先有贖價，才有膏抹；耳聽、手作、腳行，整個人都被贖回並分別出來。最後才獻贖罪祭、燔祭與素祭，「為他贖罪，他就潔淨了」（v19-20）。'
