book: 利未記
chapter: 14
updates:
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: 利14:4、6、49、51-52 潔淨長大痲瘋者與潔淨房屋的禮儀，都要取「香柏木、朱紅色線並牛膝草」。丁良才記下一則猶太傳說：這朱紅色線「須重一舍客勒，是為綁牛膝草在香柏木上，作為刷子用的」——三樣材料合起來其實是一支刷子。《舊約聖經背景註釋》給了一個很不神學卻難反駁的理由：「使用香柏木的原因，顯然因為它與線和血一樣，都是紅色的」，並指出「很多解經家都相信紅色代表生命」。《精讀本》讀為「象徵血，即耶穌基督寶血的能力和救恩（書2:18）」；黃迦勒則讀為「我們的罪」（賽1:18）。
  relation: 朱紅色線在出埃及記是會幕布料與祭司聖衣的材料；本章則轉為潔淨禮的器具之一，與香柏木、牛膝草綁成一支刷子，蘸血水灑在求潔淨的人與房屋上。丁良才指出這三樣「多是為行各種潔淨的禮節用的」，同組材料亦見於紅母牛的灰（民19:1-10）與摩西立約灑血（來9:19-20）。
- title: 牛膝草
  path: link_folder/原文/牛膝草.md
  summary: 利14:4、6、49、51-52 牛膝草與香柏木、朱紅色線一同蘸於宰在活水上的鳥血中，用以在求潔淨的人身上灑七次，房屋的潔淨禮亦同。KC 指出牛膝草與香柏木在王上4:33 是一組刻意的兩極：香柏木說到天然的宏偉壯麗，牛膝草則是「小而不起眼的植物」。黃迦勒據此發揮：「神將香柏木和牛膝草一同使用……神的教會和事工，既需要各樣條件都好的人，也需要像牛膝草那樣條件差的人。」
  relation: 本章是牛膝草作為潔淨器具最完整的一次使用。丁良才把它放回全本聖經：出埃及時用牛膝草把逾越節羊羔的血塗在門楣上（出12:22）、紅母牛的灰（民19:1-10）、摩西立約灑血（來9:19-20），「因此大衛禱告說：求你用牛膝草潔淨我，我就乾淨」（詩51:7）。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: 利14:12-14、21、24-25 潔淨長大痲瘋者第八天所獻的第一個祭就是贖愆祭，且與一羅革油一同作搖祭。丁良才逐條列出它與尋常贖愆祭的九處不同：是公羊羔不必長成、不按祭司估價、有同獻的素祭、與一羅革油同獻、須作搖祭、由祭司自己搖、搖全祭牲而且是活搖的、血有特別的用法、沒有罰金。《舊約聖經背景註釋》證實其中一點：「本段是惟一典禮使用全隻祭牲的例證。」至於他到底虧欠了神什麼，各家給三說：補償隔離期間積欠的祭（《串珠》、背景註釋）、以防萬一自己真的誤犯了罪（背景註釋、《串珠》）、他的不潔連累了會眾（丁良才、《精讀本》）。《串珠》並老實承認「惟獨贖愆祭的意義並不明顯」。
  relation: 本章是全卷贖愆祭體例最特殊的一次：它排在贖罪祭與燔祭之前，是活搖的全祭牲，而且貧窮人也不得以鳥代替（v21）——祭物可以減，這一項不能減。
- title: 搖祭（tenufah）
  path: link_folder/原文/搖祭（tenufah）.md
  summary: 利14:12、24 贖愆祭的公羊羔要與那一羅革油一同作搖祭，在耶和華面前搖一搖。丁良才指出此處的搖祭與別處有三重不同：別的搖祭是祭司同獻祭的人搖的，這祭是祭司自己搖的；別的搖祭是宰了以後搖、且只搖一部分，這祭是搖全祭牲、而且是活搖的。《舊約聖經背景註釋》：「本段是惟一典禮使用全隻祭牲的例證。」丁良才另指出那一羅革尋常的橄欖油因被搖過「就成為至聖的」。
  relation: 本章是搖祭在全卷中最特殊的用法——活搖全隻祭牲，且由祭司獨自執行，與利7:29-34 百姓平安祭牲宰後才搖胸的常例恰成對比。
- title: 貧窮人的代替獻祭
  path: link_folder/主題/貧窮人的代替獻祭.md
  summary: 利14:21-32 「他若貧窮不能預備夠數」——條例給出縮減版：贖罪祭與燔祭的羊羔可用斑鳩或雛鴿代替，素祭由伊法十分之三減為十分之一。但界線劃得極清楚：贖愆祭的公羊羔與那一羅革油，一分都不能少。《精讀本》：「雖然貧窮但不能用其他祭物代替。贖愆祭是麻風病患者作為選民，為恢復與神所立之約的特權而獻上。」丁良才另指出 v23「第八天」暗示貧窮人也須按定例行第一和第七天的禮節，「所獻的祭物雖與別人所獻的不同，但所行的禮還是一樣的」。
  relation: 利12:8 產婦可以用兩隻鳥代替羊羔，本章把同一條恩典推得更細：明列什麼可減、什麼不可減。丁良才在此下了一句總結：「人得潔淨，不是在乎信心的大小深淺，乃是在乎耶穌永不失效的寶血；凡信的人都是一樣的得救。」
- title: 耶穌
  path: link_folder/人物/耶穌.md
  summary: 利14 通篇沒有提到耶穌，但本章的結構直接指向祂。條例從頭到尾不給任何醫治的方法——祭司只能察看、只能宣告，能醫治的只有神。丁良才讀 v3「祭司要出到營外察看」：「祭司要到長大痲瘋的人那裡，正如基督降生在世的時候與罪人來往一樣。」黃迦勒：「長大痲瘋的人不能自己來見祭司……主為救我們，撇天堂離寶座來到地上。」
  relation: 耶穌伸手摸長大痲瘋的人、說「我肯，你潔淨了吧」，做的正是本章祭司做不到的事；而祂吩咐那人把身體給祭司察看、獻上摩西所吩咐的禮物（太8:4），那份禮物的內容就是本章 v10-32 的整套祭。
- title: 基督作大祭司醫治大痲瘋
  path: link_folder/神學/基督作大祭司醫治大痲瘋.md
  summary: 利14:3 的關鍵動作是「祭司要出到營外察看」——病人不能進營，所以祭司必須越過聖潔的界線走出去。丁良才：「正如基督降生在世的時候與罪人來往一樣。」黃迦勒由此分出兩種宗教：「世上的宗教是人尋找神，福音則是神尋找人；世上的宗教要求人修道、修行、心誠、積德，以至得救，福音是神為人作成了一切。」KC 則從實務面讀：「當祭司聽見一個長大痲瘋的人得了醫治，他就往那長大痲瘋的人那裡去。」
  relation: 本章把「祭司只能察看、不能醫治」這條界線劃到最清楚，也因此把大祭司的職分留了一個缺口：誰能醫治？利13-14 從不回答，福音書才回答。
- title: 罪如大痲瘋：滲透、隔離、需神醫治
  path: link_folder/神學/罪如大痲瘋：滲透、隔離、需神醫治.md
  summary: 利14 補上利13 所缺的那一段：人怎麼回來。丁良才列出長大痲瘋的得潔淨與罪人得潔淨的五種相同之處：「（一）須覺悟自己的污穢；（二）須羨慕得潔淨；（三）須知自己不能潔淨自己；（四）須仰求能潔淨他的；（五）須依靠贖罪祭之血（來9:22）。」他並在房屋的災病上另列四層：漸漸發散、使人不潔、終必拆毀、被投到不潔之處，並把這模式推到一座城、一族人、一個國、乃至全世界。
  relation: 本章的恢復是分層的：營 → 家 → 會幕，三道門一道一道開（丁良才於 v8、v9 標得極清楚）。而全章的前提是一件條例自己從不解釋的事——痊癒不是條例做出來的，條例只是承認痊癒。
- title: 米利暗患大痲瘋（民12：10-15）
  path: link_folder/互文/米利暗患大痲瘋（民12：10-15）.md
  summary: 利14 的潔淨禮為民12 的米利暗提供了條例背景：她因說摩西的不是而長大痲瘋，被關鎖營外七天。KC 把米利暗、基哈西、烏西雅並列為舊約中神百姓長大痲瘋的三個案例，並據此解釋本章為何要先獻贖愆祭：「活在罪中是一個選擇、一個行為，人藉此把罪咎歸到自己身上。」
  relation: 米利暗被關鎖營外七天，正是本章 v8「要在自己的帳棚外居住七天」所本的期限；她的復回也必須經過祭司的察看與宣告。
- title: 烏西雅王患大痲瘋（代下26：19-21）
  path: link_folder/互文/烏西雅王患大痲瘋（代下26：19-21）.md
  summary: 利14 的條例正是烏西雅終身獨居的法源。KC 把他與米利暗、基哈西並列為舊約三個案例，用以說明本章為何先獻贖愆祭——那是為著「選擇犯罪」這件事本身而獻的。與米利暗不同的是，烏西雅的災病從未痊癒，因此本章這套潔淨禮從未臨到他身上。
  relation: 本章 v2 說「長大痲瘋得潔淨的日子」——條例的前提是痊癒。烏西雅「直到死日都長大痲瘋」（代下26:21），本章的路對他始終沒有開。
- title: 乃縵患大痲瘋得醫治（王下5：1-14）
  path: link_folder/互文/乃縵患大痲瘋得醫治（王下5：1-14）.md
  summary: 利14 的條例對乃縵是一個對照組：他是亞蘭人，不在營中，得醫治後也未行本章的禮儀。本章反覆強調的是「祭司只能察看、不能醫治」——王下5:7 以色列王撕裂衣服說「我豈是神，能使人死使人活呢？這人竟打發人來，叫我治好他的大痲瘋」，正是同一個認知。
  relation: 乃縵在約旦河裡洗七次得潔淨，與本章「灑七次」（v7）、「彈七次」（v16）同用七這個完全數；而醫治他的是神，不是禮儀——這正是本章從不解釋、卻處處預設的前提。
- title: 耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）
  path: link_folder/互文/耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）.md
  summary: 利14 是耶穌吩咐痲瘋病人去獻上「摩西所吩咐的禮物」（太8:4）時所指的那套條例。本章從頭到尾不給醫治的方法，只給痊癒之後的承認程序；耶穌卻伸手摸他、說「我肯，你潔淨了吧」，做的是祭司做不到的事。丁良才讀 v3 祭司出到營外：「正如基督降生在世的時候與罪人來往一樣。」
  relation: 耶穌吩咐那人「把身體給祭司察看」，正是本章 v2-3 的第一步；而祂說這是「對眾人作證據」——要讓祭司自己去發現：能醫治大痲瘋的那一位已經在他們中間。
- title: 古代近東皮膚病與禮儀潔淨觀
  path: link_folder/文化/古代近東皮膚病與禮儀潔淨觀.md
  summary: 《舊約聖經背景註釋》指出本章的鳥禮在鄰邦找得到平行：「胡利人的儀式使用雀鳥（兩隻獻祭，一隻放生），又焚燒香柏木，和以色列人一樣。巴比倫人則使用烏鴉和鷹隼，後者到野外釋放。」而美索不達米亞與赫人用雀鳥的理由是「雀鳥能夠將不潔帶回天上的本源」。至於房屋的黴，「他們相信發霉的牆壁表示家中有人將要死亡。黴菌是鬼魔及附同之災難將臨的先兆」。
  relation: 背景註釋兩次劃出以色列的分界：鳥禮「對以色列人來說是象徵性的，不是法術（因為人已經痊癒）」；房屋的災病「本段並沒有這些成分，需要執行儀式的是房屋，不是在其中居住的人」。《啟導本》同讀：這些條例「不帶任何異教邪魔的神秘顏色」。
