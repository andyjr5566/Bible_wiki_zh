"book": "利未記"
"chapter": !!int "14"
"updates":
- "title": "藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）"
  "path": "link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md"
  "summary": "本章單獨使用朱紅色線（無藍紫二色），與香柏木、牛膝草、兩隻鳥一同綁用，於潔淨大痲瘋患者（4,6節）及房屋（49,51-52節）的儀式中，將牛膝草綁在香柏木上蘸血灑身，用途從既有累積的會幕織物染料延伸為潔淨禮的材料。"
  "relation": "GT丁良才：朱紅色線即絨線，猶太傳說須重一舍客勒，用途是綁牛膝草在香柏木上作刷子用；GT精讀本：朱紅色線象徵血，即耶穌基督寶血的能力和救恩（書2:18）；BH：scarlet represents sin and the blood required for atonement，與既有條目「朱紅色象徵流血犧牲」的主題發展一致，此處延伸至個人與房屋潔淨禮的實際施用。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "本章記載耶和華兩度曉諭摩西：v1「耶和華曉諭摩西說」頒布大痲瘋患者痊癒後的潔淨條例（1-32節）；v33「耶和華曉諭摩西、亞倫說」頒布房屋大痲瘋的診斷與潔淨條例（33-53節）。"
  "relation": "摩西作為神與百姓之間的中保，將關乎個人與房屋潔淨的兩套條例分別傳達，延續利未記十一至十三章一貫的「耶和華曉諭摩西」授命模式。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v33「耶和華曉諭摩西、亞倫說」，祭司在本章負責出到營外察看大痲瘋是否痊癒（3節）、主持兩鳥潔淨儀式（4-7節）、抹血抹油於求潔淨者身上（14-18節）、獻贖愆祭贖罪祭燔祭素祭（19-20節），並負責察看房屋大痲瘋、決定封鎖拆毀或潔淨（36-48節）。"
  "relation": "本章是祭司「察看、宣判、施行潔淨禮儀」職分在皮膚病與房屋黴斑兩種情境下的延伸實踐，與利十三章祭司察看人身大痲瘋的職分一脈相承。"
- "title": "牛膝草"
  "path": "link_folder/原文/牛膝草.md"
  "summary": "4, 6, 49, 51, 52節；牛膝草與香柏木、朱紅色線一同綁用，蘸於宰在活水上的鳥血中，用以在求潔淨的人或房屋上灑七次。"
  "relation": "GT丁良才：牛膝草即成簇有香味的草，長在牆頭上（出十二22注），與出埃及記逾越節塗血於門框、民數記除污穢水灑身同屬一物的延伸使用；BH：hyssop用於逾越節塗血門柱（出12:22）及大衛詩51:7求潔淨的禱告，本章是牛膝草在潔淨禮中反覆施用的又一實例。"
- "title": "大痲瘋（tsara'at，皮膚病診斷條例）"
  "path": "link_folder/原文/大痲瘋（tsara'at，皮膚病診斷條例）.md"
  "summary": "本章延續利未記十三章的核心術語，處理大痲瘋痊癒後的潔淨條例（1-32節人的潔淨；33-53節房屋的診斷與潔淨），54-57節總結十三至十四章全部條例，指明何時為潔淨何時為不潔淨。"
  "relation": "利十三章訂立診斷判準，本章訂立痊癒後的潔淨程序，兩章構成大痲瘋條例的診斷與潔淨兩個階段，54節「這是為各類大痲瘋的災病和頭疥，並衣服與房子的大痲瘋」明確總結兩章範圍。"
- "title": "大痲瘋是否等同於罪的懲罰之爭"
  "path": "link_folder/解經爭議/大痲瘋是否等同於罪的懲罰之爭.md"
  "summary": "v34 GT《聖經精讀本》明確申明「並不是神對罪審判，使房屋發生麻風病」「當時巴勒斯坦地區經常發生黴變的腐蝕，是當地的流行病」，但CT靈意注解仍將房屋大痲瘋逐項解為「教會中有明顯的罪惡」，兩種讀法在本章房屋段落再度並陳。"
  "relation": "延續利十三章同一爭議在房屋大痲瘋情境下的再現：一方視災病為單純物理現象（潮濕黴變），一方視之為屬靈罪惡的表徵，本章提供第二個具體例證（房屋而非人身）。"
- "title": "贖愆祭（asham）"
  "path": "link_folder/原文/贖愆祭（asham）.md"
  "summary": "12-32節；求潔淨的人第八天須獻公羊羔為贖愆祭，祭司取其血抹在求潔淨人的右耳垂、右手大拇指、右腳大拇指上，又取油同樣抹上；貧窮人仍須獻贖愆祭公羊羔（不可減免），但贖罪祭與燔祭可用鳥代替。"
  "relation": "GT丁良才列出本章贖愆祭與利未記五章贖愆祭條例的九點不同：公羊羔不必長成、非按祭司估定價值、有同獻的素祭、與一羅革油同獻、祭司在耶和華前自己搖獻、活搖全祭牲而非宰後搖一部分、血有特別用法、無罰金——顯示大痲瘋潔淨禮的贖愆祭是全書中最特殊的一例。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "12, 24節；祭司要取公羊羔獻為贖愆祭，和一羅革油一同作搖祭，在耶和華面前搖一搖。"
  "relation": "GT丁良才：本章贖愆祭「活搖」全隻祭牲（一般搖祭是宰殺後才搖、且只搖一部分），且由祭司自己搖（一般是祭司同獻祭者一起搖）；GT《舊約背景註釋》：本段是唯一使用全隻祭牲的搖祭典禮實例，是搖祭條例中的特例。"
- "title": "沒有殘疾的祭牲"
  "path": "link_folder/神學/沒有殘疾的祭牲.md"
  "summary": "v10「他要取兩隻沒有殘疾的公羊羔和一隻沒有殘疾、一歲的母羊羔」，延續利未記獻祭條例對祭牲完全無殘疾的一貫要求，應用於大痲瘋潔淨禮的贖愆祭、贖罪祭、燔祭三祭牲。"
  "relation": "與利一至七章各類獻祭條例一致，即使是潔淨禮的特殊場合，祭牲仍須符合「沒有殘疾」的一貫標準，顯示此原則貫穿全書不因情境而放寬。"
- "title": "至聖的供物（聖與至聖之分）"
  "path": "link_folder/主題/至聖的供物（聖與至聖之分）.md"
  "summary": "v13「把公羊羔宰於聖地，就是宰贖罪祭牲和燔祭牲之地。贖愆祭要歸祭司，與贖罪祭一樣，是至聖的」，本章大痲瘋潔淨禮的贖愆祭牲歸入至聖之物的範疇。"
  "relation": "GT丁良才：贖愆祭牲的脂油和內臟要焚燒獻給神，祭肉則歸祭司享用，其他人不得有分，因為它是分別為聖的聖物，和贖罪祭一樣——本章確認贖愆祭在「至聖」等級中的地位。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "11, 23節；行潔淨之禮的祭司要將求潔淨的人和所需之物安置在會幕門口、耶和華面前；貧窮人第八天也要將這些帶到會幕門口交給祭司。"
  "relation": "會幕門口是本章第八天獻祭儀式的固定場所，延續利未記獻祭條例中「牽到會幕門口」的一貫模式，是求潔淨者從營外階段進入獻祭階段的關鍵地點。"
- "title": "出29：20"
  "path": "link_folder/互文/出29：20.md"
  "summary": "CT／GT丁良才均指出，抹贖愆祭牲血在求潔淨人右耳垂、右手大拇指、右腳大拇指上（14, 17, 25, 28節），與祭司承接聖職禮（出29:20；利8:23-24）抹血同一部位的儀式相同。"
  "relation": "GT丁良才明確引出29:20、利8:23-24為平行經文：「祭司要抹贖愆祭牲的血，在他的右耳、右手和右腳上，是顯明全身都潔淨了」，與祭司承接聖職時抹血同一部位相呼應，表徵大痲瘋得潔淨者如同祭司承接聖職般全人分別為聖。"
- "title": "承接聖職（分別為聖）"
  "path": "link_folder/神學/承接聖職（分別為聖）.md"
  "summary": "CT話中之光：抹血抹油於右耳、右手、右腳，「作祭司完全是神的恩典，同樣大痲瘋得痊癒也是出於神的恩典」，將本章潔淨禮與祭司承接聖職禮並列。"
  "relation": "本章大痲瘋潔淨禮的抹血抹油儀式（14-18，25-29節）與祭司承接聖職禮（出29章；利8章）程序相同，是「承接聖職」神學主題在非祭司場合（平民百姓蒙恩得潔淨）的又一次應用，表明蒙恩的原則相通。"
