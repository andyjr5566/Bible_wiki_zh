  \ D2[\"仍可吃聖物\"]\n    D --> D3[\"不可進幔子前/就近壇前\"]\n```\n\n> [!quote] CT 靈意註解核心\n> 「瞎眼的──屬靈的事第一在於看見。事奉神的人必須有光，明亮。沒有看見，沒有光的，不能獻食物給神。」\n\
  \n> [!question] [[利21：4「從俗沾染自己」的解釋爭議]]\n> GT《啟導本》認為此處可能指參加姻親的葬禮而沾染不潔；CT則將「從俗」理解為跟隨一般人或外邦人的習俗，強調事奉神的人不可效法世界。"
