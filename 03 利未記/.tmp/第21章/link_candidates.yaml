book: 利未記
chapter: 21
candidates:
  - name: 祭司不可為死人哀哭（居喪條例）
    type: 主題
    evidence: 1-6, 10-12節；祭司不可為民中的死人沾染自己，除非為骨肉之親的父母兒女弟兄和未出嫁的處女姊妹；不可使頭光禿、不可剃除鬍鬚周圍、不可用刀劃身；大祭司則更嚴格，連父母之死也不可沾染，不可蓬頭散髮、不可撕裂衣服、不可出聖所。與利10:6-7亞倫、以利亞撒、以他瑪不可為拿答亞比戶之死蓬頭散髮撕裂衣服同一原則，本章訂為祭司世世代代的定例。GT丁良才：神體貼祭司的感情，容許為骨肉之親沾染自己，但大祭司連父母之喪也不可像俗人一樣參與，因他沾染了不潔就沒有人能替他供職；GT啟導本：祭司不可接觸死人以免沾染不潔（民19:11-13），但至近的親屬例外，這裡沒有提到祭司的妻室，可能因妻子已與丈夫同為一體
    surfaces:
      - {phrase: 祭司不可為民中的死人沾染自己, verses: [1]}
      - {phrase: 不可挨近死屍，也不可為父母沾染自己, verses: [11]}

  - name: 祭司不可娶被玷污的婦人為妻
    type: 主題
    evidence: v7「不可娶妓女或被污的女人為妻，也不可娶被休的婦人為妻，因為祭司是歸神為聖」。GT丁良才：猶太人解法「被污的女人」幾個字連私生女也包在其內；祭司在娶妻上也要顧及神的榮耀，正如保羅勸提摩太總要在清潔上作信徒的榜樣（提前4:12）；GT《舊約背景註釋》：理由可能是在離婚訴訟中，不貞是丈夫所持的主要理由（民5:11-31；申22:13-14，24:1）
    surfaces:
      - {phrase: 不可娶妓女或被污的女人為妻, verses: [7]}

  - name: 祭司的女兒行淫用火焚燒
    type: 主題
    evidence: v9「祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火將她焚燒」。GT丁良才：大約是在治死以後才用火焚燒的，這是比治死的刑罰更重，因為有職分之人的子女若行可恥的事，辱沒父親和他的職分，罪孽更大所受刑罰也該更重；此火刑與利20:14「人若娶妻並娶其母便是大惡要用火焚燒」同屬本書最嚴厲的刑罰
    surfaces:
      - {phrase: 祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火將他焚燒, verses: [9]}

  - name: 受膏的祭司（mashiach kohen）
    type: 人物
    evidence: v10「在弟兄中作大祭司、頭上倒了膏油、又承接聖職，穿了聖衣的」。GT丁良才：在大祭司的頭上倒了膏油，就是膏大祭司和膏眾祭司的特別不同處，神膏油的冠冕在大祭司頭上（v12）

  - name: 大祭司娶處女為妻的婚姻條例
    type: 主題
    evidence: 13-15節；大祭司只可娶處女為妻，寡婦、被休的婦人、被污為妓的女人都不可娶，只可娶本民中的處女，免得在民中辱沒他的兒女。GT丁良才：按猶太人解釋，未婚夫死了大祭司也不可娶那處女；一般祭司可娶寡婦為妻（v14「寡婦」不受此限），唯大祭司連祭司所遺留的寡婦也不可娶；GT精讀本：暗示新約時代基督接受基督徒為新婦，是毫無瑕疵的童女（林後11:2-3；弗5:22-33；啟19:7-8）
    surfaces:
      - {phrase: 他要娶處女為妻, verses: [13]}
      - {phrase: 寡婦或是被休的婦人，或是被污為妓的女人，都不可娶, verses: [14]}

  - name: 有殘疾的祭司不可近前獻祭
    type: 主題
    evidence: 17-23節；凡有殘疾的（瞎眼、瘸腿、塌鼻子、肢體有餘、折腳折手、駝背、矮矬、眼睛有毛病、長癬、長疥、損壞腎子）都不可近前來獻神的食物，但仍可吃聖物至聖之物，只是不可進到幔子前也不可就近壇前。GT丁良才：此條例有三個緣故——若有殘疾人作祭司百姓就容易輕看祭祀神的禮節、神的祭司必須完全因一切歸給神的必須純全無疵、祭司預表主耶穌因此必須完全；GT《舊約背景註釋》：古代近東每個宗教都要求祭壇聖潔特區內保持儀式上的潔淨，祭物和主持宗教事務的人員都包括在內，有缺陷的祭司雖不能接近祭壇卻仍有權分享祭司當得的祭物
    surfaces:
      - {phrase: 凡有殘疾的，都不可近前來獻他神的食物, verses: [17]}
      - {phrase: 神的食物，無論是聖的，至聖的，他都可以吃, verses: [22]}
      - {phrase: 但不可進到幔子前，也不可就近壇前, verses: [23]}

  - name: 摩西
    type: 人物
    evidence: 1, 16節「耶和華對摩西說」
