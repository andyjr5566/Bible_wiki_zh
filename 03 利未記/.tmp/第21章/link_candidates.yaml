  - name: 聖物
    type: 主題
    evidence: "利21:22 神的食物，無論是聖的、至聖的，有殘疾祭司都可以吃。聖物分級：聖、至聖。祭司家屬可吃聖物（利22)。"
    surfaces: ["聖的", "至聖的", "聖物", "神的食物"]