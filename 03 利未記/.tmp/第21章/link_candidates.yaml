book: "03 利未記"
chapter: 21
candidates:
  # === C 類：全新條目 ===
  - name: 祭司不可為民中死人沾染自己
    type: 主題
    evidence: "利21:1-3 祭司不可為民中的死人沾染自己，除非為骨肉之親的父母、兒女、弟兄、未出嫁的姊妹。KC：祭司不可像一般人那樣行事，以致受影響顯現死亡氣息。"
    surfaces: ["不可為民中死人沾染自己", "骨肉之親", "父母、兒女、弟兄、姊妹"]

  - name: 祭司不可從俗沾染自己
    type: 主題
    evidence: "利21:4 祭司既在民中為首，就不可從俗沾染自己。KC：不可跟隨一般人或外邦人的習俗；新約君尊祭司（彼前2:9）不可效法世界（羅12:2）。"
    surfaces: ["不可從俗沾染自己", "在民中為首"]

  - name: 祭司不可使頭光禿剃鬍鬚用刀劃身
    type: 主題
    evidence: "利21:5 不可使頭光禿；不可剃除鬍鬚的周圍，也不可用刀劃身。利19:27-28 平行。KC：表徵事奉神的人必須順服基督作頭的權柄、接受神所安排的、不用人工顯揚自己。"
    surfaces: ["不可使頭光禿", "不可剃除鬍鬚的周圍", "不可用刀劃身", "光禿、剃鬍鬚、劃身"]

  - name: 祭司婚姻條例（不可娶妓女被污被休的女人）
    type: 主題
    evidence: "利21:7-8 不可娶妓女或被污的女人為妻，也不可娶被休的婦人為妻，因為祭司是歸神為聖。KC：表徵事奉神的人必須能管理自己的情感；林後6:14 不要與不信的同負一軛。"
    surfaces: ["不可娶妓女", "不可娶被污的女人", "不可娶被休的婦人", "祭司婚姻條例"]

  - name: 祭司女兒行淫火刑條例
    type: 主題
    evidence: "利21:9 祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火將她焚燒。利20:14 平行。KC：表徵事奉神的人必須能管理自己的兒女；提前3:4-5 平行。"
    surfaces: ["祭司的女兒若行淫", "辱沒了父親", "必用火將她焚燒", "祭司女兒火刑"]

  - name: 大祭司不可蓬頭散髮撕裂衣服
    type: 主題
    evidence: "利21:10 在弟兄中作大祭司、頭上倒了膏油、又承接聖職、穿了聖衣的，不可蓬頭散髮，也不可撕裂衣服。KC：大祭司聖潔標準更嚴格，對應拿細耳人條例（民6:1-7）；基督為大祭司（來4:14）。"
    surfaces: ["大祭司不可蓬頭散髮", "不可撕裂衣服", "頭上倒了膏油", "承接聖職"]

  - name: 大祭司不可挨近死屍為父母沾染
    type: 主題
    evidence: "利21:11 不可挨近死屍，也不可為父母沾染自己。大祭司連父母之喪也不參與，以保持儀文聖潔。KC：大祭司沒有人能替他供職，當愛神過於愛一切（太10:37）。"
    surfaces: ["不可挨近死屍", "不可為父母沾染自己", "大祭司喪禮禁例"]

  - name: 大祭司不可出聖所褻瀆聖所
    type: 主題
    evidence: "利21:12 不可出聖所，也不可褻瀆神的聖所，因為神膏油的冠冕在他頭上。KC：不可因慶吊之事擅離職守；膏油如冠冕（出28:36-38）。"
    surfaces: ["不可出聖所", "不可褻瀆神的聖所", "神膏油的冠冕"]

  - name: 大祭司婚姻條例（只可娶處女）
    type: 主題
    evidence: "利21:13-15 他要娶處女為妻；寡婦、被休的、被污為妓的都不可娶；只可娶本民中的處女為妻。不可在民中辱沒他的兒女。KC：大祭司妻子必須是處女，預表基督的新婦——教會的純潔（林後11:2，弗5:27）；結44:22 祭司只可娶處女或祭司遺留的寡婦。"
    surfaces: ["大祭司要娶處女為妻", "寡婦被休被污為妓不可娶", "本民中的處女", "不可辱沒兒女"]

  - name: 祭司有殘疾不可近前獻神食物
    type: 主題
    evidence: "利21:16-23 耶和華對摩西說：你告訴亞倫說：你世世代代的後裔，凡有殘疾的，都不可近前來獻他神的食物。列舉瞎眼、瘸腿、塌鼻子、肢體有餘、折腳折手、駝背、矮矬、眼睛有毛病、長癬長疥、損壞腎子等殘疾。KC：屬靈應用——錯誤教導致屬靈瞎眼、片面教導致屬靈駝背、主耶穌能醫治屬靈殘疾。"
    surfaces: ["凡有殘疾的不可近前來獻神食物", "瞎眼瘸腿塌鼻子", "肢體有餘折腳折手", "駝背矮矬眼睛有毛病", "長癬長疥損壞腎子", "祭司殘疾條例"]

  - name: 有殘疾祭司可吃神食物但不可進幔子前就近壇前
    type: 主題
    evidence: "利21:22-23 神的食物，無論是聖的、至聖的，他都可以吃。但不可進到幔子前，也不可就近壇前；因為他有殘疾，免得褻瀆我的聖所。KC：有殘疾不代表不潔淨，仍可吃聖物，但不可行祭司職分。"
    surfaces: ["有殘疾祭司可吃神食物", "不可進到幔子前", "不可就近壇前", "免得褻瀆聖所"]

  - name: 祭司聖潔條例總綱
    type: 主題
    evidence: "利21:6,8,15,23 多次重申：要歸神為聖，不可褻瀆神的名；我是叫你們成聖的耶和華。祭司因獻耶和華的火祭（神的食物）故要成聖。"
    surfaces: ["要歸神為聖", "不可褻瀆神的名", "我是叫你們成聖的耶和華", "獻耶和華的火祭"]

  # === B 類：既有條目需累積 ===
  - name: 祭司
    type: 人物
    evidence: "利21:1 耶和華對摩西說：你告訴亞倫子孫作祭司的說。本章為祭司聖潔條例，規範祭司喪禮、婚姻、身體、職分資格。"
    surfaces: ["祭司", "亞倫子孫作祭司的"]

  - name: 大祭司
    type: 人物
    evidence: "利21:10-15 大祭司聖潔標準更嚴格：不可蓬頭散髮、撕裂衣服、挨近死屍、為父母沾染、出聖所；婚姻只可娶處女。預表基督為完全大祭司（來4:14，7:26）。"
    surfaces: ["大祭司", "在弟兄中作大祭司", "頭上倒了膏油", "承接聖職"]

  - name: 摩西
    type: 人物
    evidence: "利21:1,16,24 耶和華對摩西說；摩西曉諭亞倫和亞倫的子孫，並以色列眾人。摩西作為祭司條例傳遞者。"
    surfaces: ["摩西"]

  - name: 亞倫
    type: 人物
    evidence: "利21:1,10,16-17,21,24 亞倫子孫作祭司的；大祭司在弟兄中；亞倫世世代代後裔；摩西曉諭亞倫和亞倫的子孫。亞倫為祭司體系始祖。"
    surfaces: ["亞倫", "亞倫子孫", "亞倫後裔"]

  - name: 骨肉之親（she'er besaro）
    type: 原文
    evidence: "利21:2-3 除非為他骨肉之親的父母、兒女、弟兄、未出嫁的姊妹。利18:6,12-13,17,19:19,20:19 平行。she'er besaro 界定祭司可沾染死屍的親屬範圍。"
    surfaces: ["骨肉之親", "父母兒女弟兄姊妹"]

  - name: 褻瀆神的名
    type: 神學
    evidence: "利21:6 不可褻瀆神的名；利21:12 不可褻瀆神的聖所；利21:23 免得褻瀆我的聖所。祭司聖潔失守即褻瀆神名。"
    surfaces: ["褻瀆神的名", "褻瀆聖所"]

  - name: 聖潔
    type: 神學
    evidence: "利21:6,8,15,23 多次重申：要歸神為聖，我是叫你們成聖的耶和華是聖的。祭司聖潔根基於神的聖潔屬性。彼前1:15-16 引用。"
    surfaces: ["歸神為聖", "成聖", "我是聖的"]

  - name: 火祭（神的食物）
    type: 主題
    evidence: "利21:6,8,17,21-22 耶和華的火祭，就是神的食物，是他們獻的。有殘疾祭司可吃聖物至聖物，但不可獻火祭。"
    surfaces: ["耶和華的火祭", "神的食物", "獻火祭"]

  - name: 膏油
    type: 原文
    evidence: "利21:10,12 頭上倒了膏油、神膏油的冠冕在他頭上。膏油象徵聖靈恩膏，大祭司受膏分別為聖。"
    surfaces: ["膏油", "頭上倒了膏油", "神膏油的冠冕"]

  - name: 聖所
    type: 地點
    evidence: "利21:12,23 不可出聖所、不可褻瀆聖所、不可進到幔子前、不可就近壇前。聖所為神臨在之處，祭司職分在此執行。"
    surfaces: ["聖所", "幔子前", "壇前", "不可出聖所"]

  - name: 幔子
    type: 主題
    evidence: "利21:23 不可進到幔子前。幔子隔絕聖所與至聖所，大祭司贖罪日才可進入（利16）。有殘疾祭司不可進幔子前。"
    surfaces: ["幔子", "進到幔子前"]

  - name: 境界
    type: 神學
    evidence: "利21:12 神膏油的冠冕在他頭上。利21:23 我是叫他成聖的耶和華。祭司聖潔界定其服事邊界：喪禮、婚姻、身體、職分。"
    surfaces: ["冠冕", "成聖", "服事邊界"]

  - name: 拿細耳人
    type: 人物
    evidence: "利21:10-12 大祭司條例對應拿細耳人條例（民6:1-7）：不可挨近死屍、不可剃頭、分別為聖歸神。KC：大祭司聖潔標準與拿細耳人平行。"
    surfaces: ["拿細耳人", "拿細耳人條例"]

  - name: 以色列眾人
    type: 人物
    evidence: "利21:24 摩西曉諭亞倫和亞倫的子孫，並以色列眾人。祭司條例向全會眾宣告，建立共同體聖潔標準。"
    surfaces: ["以色列眾人", "全會眾"]

  - name: 世世代代
    type: 神學
    evidence: "利21:17 你世世代代的後裔，凡有殘疾的都不可近前來。祭司資格條例具有代際延續性。"
    surfaces: ["世世代代", "後裔", "代際延續"]

  - name: 無瑕疵
    type: 神學
