    evidence: "利21:7,14 不可娶被污的女人、被污為妓的女人。指有過性行為的女人，猶太人認為包括私生女。祭司婚姻純潔要求。"
    surfaces: ["被污的女人", "被污為妓的女人", "妓女"]

  - name: 被休的婦人
