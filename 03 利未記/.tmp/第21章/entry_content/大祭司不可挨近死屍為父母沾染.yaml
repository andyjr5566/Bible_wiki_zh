name: 大祭司不可挨近死屍為父母沾染
type: 主題
secondary_types: []
aliases:
- 大祭司避免屍體污染
- 大祭司不為父母沾染
status: formal
definition: 利未記 21:11 規定大祭司不可挨近死屍，也不可為父母沾染自己。這比普通祭司（可為骨肉之親沾染，21:2-3）更嚴格，大祭司甚至不可為父母處理喪事。這凸顯大祭司職分的至高聖潔，其事奉不可中斷，連最親密的親情關係也須服從於聖職責任。
development: 此條例將大祭司與死亡（不潔的根源）徹底隔離，預表基督大祭司完全無罪、勝過死亡的屬靈實體。
