name: 祭司不可使頭光禿剃鬍鬚用刀劃身
type: 主題
secondary_types: []
aliases:
- 祭司禁剃髮劃身
- 祭司外貌條例
status: formal
definition: 利未記 21:5 禁止祭司使頭光禿、剃除鬍鬚周圍、用刀劃身。這些行為在古近東文化中常與喪禮、拜偶像儀式相關（參申命記 14:1、耶利米書 16:6、48:37）。祭司歸神為聖，獻耶和華的火祭（神的食物），故不可行這些褻瀆神名的習俗，以保持聖潔。
development: 此條例針對具體外在行為，將祭司的聖潔具體化為身體完整的保持，與周圍民族習俗劃清界限，預表新約信徒身體為聖靈殿的原則。
accumulations:
- book: 利未記
  chapter: 21
  summary: 禁止祭司剃髮、修鬍鬚、劃身，因這些是异教喪禮習俗，會褻瀆神的名。
  relation: 具體化第 4 節「不可從俗」的原則，列舉三項具體禁令，強調祭司獻祭角色的聖潔要求。
