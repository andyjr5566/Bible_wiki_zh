- 火刑條例
status: formal
definition: 利未記 21:9 規定祭司的女兒若行淫，辱沒自己，就是辱沒了父親，必用火將他焚燒。此刑罰極重，反映祭司家庭道德標準的嚴格性。女兒的行為直接關係父親祭司的聖潔名譽，故以火刑（焚燒）作為淨化與審判的手段。
development: 此條例將祭司的聖潔責任延伸至家庭成員，特別是女兒的性道德。火刑在舊約中較少見（另見創 38:24、利 20:14），顯示祭司家庭污穢的嚴重性。
accumulations:
- book: 利未記
  chapter: 21
  summary: 祭司女兒行淫辱沒父親，必用火焚燒，顯示祭司家庭聖潔標準之嚴格。
  relation: 祭司聖潔條例的家庭管轄延伸，以極刑維護祭司體系的純潔與榮譽。
