definition: 利未記21章1-15節規定祭司不可為死人沾染、不可從俗、婚姻限制；16-24節進一步規定大祭司更嚴格的聖潔標準與殘疾祭司的限制，構成祭司聖潔條例的完整框架。
development: ''
accumulations:
- book: 利未記
  chapter: 21
  summary: 本章前半段針對普通祭司的哀悼、外貌、婚姻；後半段針對大祭司與殘疾祭司的特殊規定。
  relation: 提供祭司聖潔的全面條例框架，奠定後續聖潔法典基礎。
related_entries:
- 祭司不可為民中死人沾染自己
- 祭司不可從俗沾染自己
