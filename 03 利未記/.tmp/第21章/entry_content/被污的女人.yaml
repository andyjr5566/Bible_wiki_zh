name: 被污的女人
type: 主題
secondary_types: []
aliases:
- 被污的女人
status: formal
definition: 指在利未記 21 章中被列為祭司與大祭司不可娶妻的對象之一。經文規定祭司「不可娶妓女或被污的女人為妻」（v.7），大祭司亦「不可娶……被污為妓的女人」（v.14）。「被污」意指女子在性關係上已被玷污、失去貞潔狀態，屬於儀式上不潔淨的範疇，與「妓女」、「被休的婦人」並列，強調祭司家庭婚姻的純潔標準。
accumulations:
- book: 利未記
  chapter: 21
  summary: 祭司不可娶被污的女人為妻（v.7）；大祭司不可娶被污為妓的女人（v.14），作為祭司婚姻條例的禁止對象。
  relation: 此條目為祭司聖潔條例中婚姻限制的核心對象之一，直接關聯祭司「歸神為聖」的身分要求。
related_entries:
- 祭司婚姻條例（不可娶妓女被污被休的女人）
