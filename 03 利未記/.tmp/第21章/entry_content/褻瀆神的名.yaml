status: formal
definition: 利未記21章6、12、23節多次提到祭司與大祭司不可褻瀆神的名、不可褻瀆聖所，強調聖潔與神名榮耀的關聯。
development: ''
accumulations:
- book: 利未記
  chapter: 21
  summary: 第6節祭司要歸神為聖，不可褻瀆神的名；第12節大祭司不可褻瀆聖所；第23節殘疾祭司不可進幔子前免得褻瀆聖所。
  relation: 顯示聖潔條例的核心動機是保護神的名與聖所不被褻瀆。
