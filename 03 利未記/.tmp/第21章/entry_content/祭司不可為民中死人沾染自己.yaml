name: 祭司不可為民中死人沾染自己
type: 主題
secondary_types: []
aliases:
- 祭司避免屍體污染
- 祭司死人沾染禁令
status: formal
definition: 根據利未記 21:1-3，耶和華吩咐摩西告訴亞倫子孫作祭司的，不可為民中的死人沾染自己。例外情況僅限於骨肉之親：父母、兒女、弟兄，以及未曾出嫁作處女的姊妹。此條例強調祭司職分的聖潔性，避免因接觸屍體而成為不潔，影響事奉。
development: 此條例確立祭司與一般百姓的區別，祭司代表神聖，不可隨意接觸死亡（不潔的象徵），除非為最親近的家屬。這反映「聖潔」與「死亡」的神學對立。
accumulations:
- book: 利未記
  chapter: 21
  summary: 規定祭司不可為民中死人沾染自己，僅准為骨肉之親（父母、兒女、弟兄、未嫁姊妹）例外沾染。
  relation: 本章祭司聖潔條例的起始規定，確立祭司避免屍體污染的原則與例外範圍。
