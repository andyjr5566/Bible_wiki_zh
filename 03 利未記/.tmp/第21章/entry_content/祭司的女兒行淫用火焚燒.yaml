name: 祭司的女兒行淫用火焚燒
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第21章9節規定，祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火將她焚燒。此條例表明祭司家族成員的聖潔直接影響祭司本人的事奉資格，對領袖家庭有更高的道德要求。
accumulations:
- book: 利未記
  chapter: 21
  summary: 本章9節記載祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火焚燒，強調祭司家庭聖潔的重要性。
  relation: 直接記載此刑罰的經文，顯明祭司家庭成員行為對祭司聖職的影響。
