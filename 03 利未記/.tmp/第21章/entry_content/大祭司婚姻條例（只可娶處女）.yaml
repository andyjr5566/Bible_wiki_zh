name: 大祭司婚姻條例（只可娶處女）
type: 主題
secondary_types: []
aliases:
- 大祭司妻子資格
- 大祭司娶處女
status: formal
definition: 利未記 21:13-15 規定大祭司要娶處女為妻。寡婦、被休的婦人、被污為妓的女人都不可娶；只可娶本民中的處女為妻。不可在民中辱沒他的兒女，因為耶和華是叫他成聖的。此條例比普通祭司（不可娶妓女、被污、被休者，21:7）更嚴格，連寡婦也不可娶，確保大祭司後裔的純潔與聖潔血統。
development: 大祭司婚姻的嚴格限制，不僅關乎個人聖潔，更關乎祭司體系的延續與純潔。處女象徵未被污染的純全，配合大祭司至高聖職的要求。
accumulations:
- book: 利未記
  chapter: 21
  summary: 大祭司只可娶本民中的處女，不可娶寡婦、被休、被污者，免得辱沒兒女，因耶和華叫他成聖。
  relation: 祭司聖潔條例的高階婚姻規範，超越普通祭司標準，保障大祭司家庭與後裔的聖潔純全。
