name: 大祭司娶處女為妻的婚姻條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第21章13至15節規定，大祭司只能娶本民中的處女為妻，不可娶寡婦、被休的婦人、被污為妓的女人，免得在民中辱沒他的兒女。此條例要求大祭司在婚姻上保持最高程度的聖潔，預表基督與教會之間純潔的聯合。
accumulations:
- book: 利未記
  chapter: 21
  summary: 本章13至15節規定大祭司必須娶本民中的處女為妻，禁止娶寡婦、被休或被污的女人，以保持祭司後裔的聖潔。
  relation: 直接記載大祭司婚姻條例的經文，確立大祭司在擇偶上比一般祭司更嚴格的要求。
related_entries:
- 祭司不可娶被玷污的婦人為妻
- 祭司的女兒行淫用火焚燒
