name: 無瑕疵
type: 神學
secondary_types: []
aliases:
- 無瑕疵
status: formal
definition: 利未記21章17-21節列舉瞎眼、瘸腿、塌鼻、肢體有餘、駝背、矮矬、眼疾、癬、疥、腎損等殘疾，規定有殘疾祭司不可近前獻祭，體現「無瑕疵」作為祭司服事的身體條件。
development: ''
accumulations:
- book: 利未記
  chapter: 21
  summary: 第17-21節詳細列出使祭司失去獻祭資格的各種身體缺陷。
  relation: 預表基督作完全無瑕疵的大祭司，也奠定獻祭制度對完美的要求。
related_entries:
- 殘疾
- 祭司有殘疾不可近前獻神食物
- 有殘疾祭司可吃神食物但不可進幔子前就近壇前
- 祭司聖潔條例總綱
