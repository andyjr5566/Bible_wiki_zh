"updates":
- "title": "祭司不可為死人哀哭（居喪條例）"
  "path": "link_folder/主題/祭司不可為死人哀哭（居喪條例）.md"
  "summary": "v1-6,10-12 祭司不可為民中的死人沾染自己，除非為骨肉之親的父母兒女弟兄和未出嫁的處女姊妹；大祭司則更嚴格，連父母之死也不可沾染，不可蓬頭散髮、不可撕裂衣服、不可出聖所。與利10:6-7亞倫、以利亞撒、以他瑪不可為拿答亞比戶之死蓬頭散髮撕裂衣服同一原則，本章訂為祭司世世代代的定例。"
  "relation": "本章是此居喪條例最完整的陳述，區分一般祭司（可為至親沾染）與大祭司（連父母也不可）兩個等級的聖潔要求。"
- "title": "受膏的祭司（mashiach kohen）"
  "path": "link_folder/人物/受膏的祭司（mashiach kohen）.md"
  "summary": "v10「在弟兄中作大祭司、頭上倒了膏油、又承接聖職，穿了聖衣的」。GT丁良才：在大祭司的頭上倒了膏油，就是膏大祭司和膏眾祭司的特別不同處，神膏油的冠冕在大祭司頭上（v12）。"
  "relation": "本章詳列受膏大祭司比一般祭司更嚴格的居喪與婚姻聖潔要求，具體展開其身分的特殊性。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1,16「耶和華對摩西說」，摩西是本章祭司聖潔條例（居喪、婚姻、殘疾限制）的唯一傳達者。"
  "relation": "本章延續摩西向亞倫子孫傳達耶和華祭司專屬條例的角色，緊接利18-20章對全體以色列人的條例之後。"
