"book": "03 利未記"
"chapter": !!int "21"
"updates":
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "利21:1 耶和華對摩西說：你告訴亞倫子孫作祭司的說。本章為祭司聖潔條例，規範祭司喪禮（1-3,11）、外貌（4-6）、婚姻（7-9,13-15）、女兒（9）、大祭司特例（10-15）、殘疾資格（16-23）。"
  "relation": "本章系統性規範亞倫子孫祭司的聖潔生活標準，作為利17-26 聖潔法典中祭司條例的核心章節。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利21:1,16,24 耶和華對摩西說；摩西曉諭亞倫和亞倫的子孫，並以色列眾人。摩西作為祭司條例傳遞者，將神的聖潔標準頒布給祭司體系與全會眾。"
  "relation": "本章摩西繼續其立法者與中保角色，傳遞聖潔法典中針對祭司體系的最高標準條例。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "利21:1,10,16-17,21,24 亞倫子孫作祭司的；大祭司在弟兄中；亞倫世世代代後裔；摩西曉諭亞倫和亞倫的子孫。亞倫為祭司體系始祖，其後裔世代承接聖職。"
  "relation": "本章以亞倫後裔為對象，確立祭司資格的代際延續性與聖潔要求。"
- "title": "骨肉之親（she'er besaro）"
  "path": "link_folder/原文/骨肉之親（she'er besaro）.md"
  "summary": "利21:2-3 除非為他骨肉之親的父母、兒女、弟兄、未出嫁的姊妹，才可以沾染自己。she'er besaro 界定祭司可沾染死屍的親屬範圍，大祭司連此例外也不適用（v11）。"
  "relation": "本章將利18-20 章骨肉之親概念應用於祭司喪禮例外，區分普通祭司與大祭司的不同標準。"
- "title": "聖潔"
  "path": "link_folder/神學/聖潔.md"
  "summary": "利21:6,8,15,23 多次重申：要歸神為聖，不可褻瀆神的名；我是叫你們成聖的耶和華是聖的。祭司聖潔根基於神的聖潔屬性，因獻耶和華的火祭（神的食物）故要成聖。彼前1:15-16 引用。"
  "relation": "本章為祭司聖潔神學的集中展開：從喪禮、外貌、婚姻、身體到職分資格，全方位展現祭司如何效法神的聖潔。"
- "title": "聖膏油"
  "path": "link_folder/原文/聖膏油.md"
  "summary": "利21:10,12 頭上倒了膏油、神膏油的冠冕在他頭上。膏油象徵聖靈恩膏，大祭司受膏分別為聖，膏油如冠冕標記其聖潔身分。"
  "relation": "本章將膏油與大祭司聖潔身分綁定：膏油冠冕使大祭司不可出聖所、不可褻瀆聖所，呼應出30:22-33 膏油配方與專用性。"
- "title": "聖所"
  "path": "link_folder/地點/聖所.md"
  "summary": "利21:12,23 不可出聖所、不可褻瀆聖所、不可進到幔子前、不可就近壇前。聖所為神臨在之處，祭司職分在此執行；大祭司不可擅離職守，有殘疾祭司不可進幔子前就近壇前。"
  "relation": "本章以聖所為祭司服事的空間邊界：大祭司不可出聖所（v12），有殘疾祭司不可進幔子前就近壇前（v23），構建聖潔空間分級。"
- "title": "內幔（隔聖所至聖所的幔子）"
  "path": "link_folder/主題/內幔（隔聖所至聖所的幔子）.md"
  "summary": "利21:23 不可進到幔子前。幔子隔絕聖所與至聖所，大祭司贖罪日才可進入（利16）。有殘疾祭司不可進幔子前，免得褻瀆聖所。"
  "relation": "本章將幔子作為有殘疾祭司服事的禁止邊界，呼應利16 贖罪日大祭司進幔子內的獨特特權。"
- "title": "火刑"
  "path": "link_folder/文化/火刑.md"
  "summary": "利21:9 祭司的女兒若行淫辱沒自己，就辱沒了父親，必用火將她焚燒。利20:14 娶妻並娶其母三人用火焚燒。極嚴厲刑罰，表徵聖潔零容忍。"
  "relation": "本章將火刑應用於祭司女兒行淫，延續利20:14 火刑條例，體現祭司家庭聖潔標準的最高嚴厲度。"
