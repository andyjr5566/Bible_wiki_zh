name: 可憎（sheqets）
type: 原文
secondary_types: []
aliases:
- 可憎
- 可憎惡的
status: formal
definition: 希伯來文 sheqets，指令人憎厭、被視為可憎惡的事物。在利未記第11章中，此詞專門用於描述水中無翅無鱗的活物、某些雀鳥（如鵰、烏鴉等）、以及有翅膀用四足爬行的物。以色列人不可吃這些生物的肉，連其屍體也當以為可憎，不可觸摸，以免玷污自己。
accumulations:
- book: 利未記
  chapter: 11
  summary: 水中無翅無鱗的活物、特定雀鳥及四足爬行之物被宣告為可憎，禁止食用與接觸。
  relation: 確立飲食與接觸上的禁忌界線，強調不潔淨之物在禮儀上令人憎厭，與神的聖潔屬性不相容。
