name: 聖潔與分別為聖
type: 神學
secondary_types: []
aliases:
- 聖潔神學
status: formal
definition: 利未記第11章的神學核心在於「聖潔與分別為聖」。神在第44至45節宣告「我是聖潔的」，要求以色列人也要在生活各方面成為聖潔。這裡的聖潔不僅是內在屬性，更是外在行為的分別：透過遵守飲食條例，將潔淨與不潔淨、可吃與不可吃的活物區分開來。這種分別為聖的實踐，是以色列人回應神救贖（將他們從埃及地領出來）的具體方式，藉此彰顯神子民與萬民有別的獨特身分。
accumulations:
- book: 利未記
  chapter: 11
  summary: 本章第44至47節總結了飲食條例的神學目的，即要求以色列人效法神的聖潔，將潔淨與不潔淨分別出來。
  relation: 本章將「聖潔」從抽象的神學概念轉化為可操作的飲食與生活規範，確立了分別為聖的具體途徑。
