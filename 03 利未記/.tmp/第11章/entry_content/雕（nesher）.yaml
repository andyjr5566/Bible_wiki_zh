name: 雕（nesher）
type: 原文
secondary_types: []
aliases:
- 雕
status: formal
definition: 希伯來文 nesher，意指「鷹/雕」。利未記 11:13 在不潔淨雀鳥名單中首列「鵰」（即 nesher），屬於不可食用的猛禽，摸其屍體同樣不潔淨至晚上。
accumulations:
- book: 利未記
  chapter: 11
  summary: 列為不潔淨的雀鳥，屬鷹類
  relation: 作為不潔淨飛鳥的代表，彰顯飛鳥分別條例
related_entries:
- 不潔淨（tame）
- 可憎（sheqets）
- 潔淨與不潔淨的飲食條例
- 聖潔的呼召與分別為聖
- 死與不潔淨的關聯
sources:
- '綜合研讀註解: 利未記 11 章關於雕的註解（https://biblehub.com/study/leviticus/11.htm）'
