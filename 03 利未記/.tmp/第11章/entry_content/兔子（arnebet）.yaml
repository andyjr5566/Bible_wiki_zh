name: 兔子（arnebet）
type: 原文
secondary_types: []
aliases:
- 兔子
- 野兔
status: formal
definition: 希伯來文 arnebet，指兔子或野兔。在利未記第11章中，兔子被列為不潔淨的動物，原因是牠「倒嚼不分蹄」。與沙番類似，兔子實際上並非反芻動物，但其咀嚼時下顎的上下運動在古人觀察中類似反芻。由於牠不具備分蹄的特徵，因此被歸類為不潔淨。
accumulations:
- book: 利未記
  chapter: 11
  summary: 指出兔子因倒嚼不分蹄而與以色列人不潔淨，禁止食用與觸摸其死屍。
  relation: 作為倒嚼不分蹄的另一範例，強化僅具單一潔淨特徵仍不蒙悅納的飲食界限。
