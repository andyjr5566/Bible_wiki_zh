name: 烏鴉（oreb）
type: 原文
secondary_types: []
aliases:
- 烏鴉
status: formal
definition: 希伯來文 orev，指烏鴉。在利未記第11章中，烏鴉被列為可憎、不可吃的雀鳥之一。烏鴉屬於雜食性鳥類，常以腐肉為食，在聖經中常與曠野、荒涼和死亡聯繫在一起。因其食腐的習性，被歸類為不潔淨與可憎的活物。
accumulations:
- book: 利未記
  chapter: 11
  summary: 將烏鴉與其類列為雀鳥中可憎、不可吃的活物。
  relation: 烏鴉的食腐習性使其成為死亡的象徵，被歸類為可憎之物，教導以色列人遠離與死亡和污穢相關的事物。
