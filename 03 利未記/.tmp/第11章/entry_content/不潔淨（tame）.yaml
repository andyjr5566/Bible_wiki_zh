name: 不潔淨（tame）
type: 原文
secondary_types: []
aliases:
- 不潔淨
- 污穢
status: formal
definition: 希伯來文 tame，指在禮儀或衛生上處於不潔的狀態。在利未記第11章中，不潔淨的動物（如不分蹄不倒嚼的走獸、無翅無鱗的魚等）及其屍體會將不潔傳染給接觸它們的人或器物。摸了不潔淨的死屍會導致人不潔淨到晚上，並需要洗衣服以得潔淨。
accumulations:
- book: 利未記
  chapter: 11
  summary: 詳列各類不潔淨的動物，並規定接觸不潔淨動物屍體者必不潔淨到晚上，需洗衣淨身。
  relation: 不潔淨是與神聖潔相對立的狀態，透過飲食與接觸條例教導以色列人認識罪的傳染性與聖潔的必要性。
