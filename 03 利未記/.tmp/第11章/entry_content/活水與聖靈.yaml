name: 活水與聖靈
type: 神學
secondary_types: []
aliases:
- 活水的潔淨功能
status: formal
definition: 利未記第11章第36節提到「泉源或是聚水的池子仍是潔淨」，即使有死物掉在其中，水本身仍保持潔淨。這項條例在神學上預表了「活水」具有超越一般不潔淨的潔淨能力。流動的泉源象徵持續的生命力與潔淨源頭，這與後來聖經中將聖靈比作活水的觀念相呼應。活水不僅能洗除污穢，更代表神持續更新的生命力量，不受死亡與不潔淨的污染。
accumulations:
- book: 利未記
  chapter: 11
  summary: 本章第36節特別指出泉源和聚水的池子不受死物污染而保持潔淨，確立了活水的特殊地位。
  relation: 本章對泉源潔淨性的規定，為後世「活水與聖靈」的神學預表提供了舊約律法的基礎。
