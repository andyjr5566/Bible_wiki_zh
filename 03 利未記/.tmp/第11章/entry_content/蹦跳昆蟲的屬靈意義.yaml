name: 蹦跳昆蟲的屬靈意義
type: 主題
secondary_types: []
aliases:
- 蹦跳昆蟲的屬靈意涵
status: formal
definition: 利未記第11章規定，有翅膀用四足爬行的物雖為可憎，但其中有足有腿能在地上蹦跳的（如蝗蟲、螞蚱）則為潔淨可吃。在屬靈寓意上，爬行象徵屬地的、貼近塵土的卑賤狀態，而「蹦跳」則代表能夠超越地上的限制與纏累，勝過屬地的引力。這象徵信徒雖身處世界，卻能藉著神的能力超越世俗的沾染。
accumulations:
- book: 利未記
  chapter: 11
  summary: 允許食用有足有腿能在地上蹦跳的昆蟲（如蝗蟲），但禁止食用一般爬行之物。
  relation: 藉由昆蟲的跳躍能力，象徵信徒能勝過屬地的纏累與污穢，超越世俗的界限。
