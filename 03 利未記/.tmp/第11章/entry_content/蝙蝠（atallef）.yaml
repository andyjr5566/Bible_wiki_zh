name: 蝙蝠（atallef）
type: 原文
secondary_types: []
aliases:
- 蝙蝠
status: formal
definition: 希伯來文 atallef，指蝙蝠。在利未記第11章中，蝙蝠被列在雀鳥的名單之末，被歸類為可憎、不可吃的活物。蝙蝠雖有翅膀，但在現代生物學中屬於哺乳動物，其棲息於黑暗洞穴、倒掛行走的習性，在禮儀上被視為與死亡、黑暗和爬物相關聯，因此被列為不潔淨。
accumulations:
- book: 利未記
  chapter: 11
  summary: 將蝙蝠列在雀鳥中可憎、不可吃的活物名單之末。
  relation: 蝙蝠作為介於鳥與獸之間且棲息於黑暗中的活物，象徵著混雜與黑暗，被歸類為可憎之物以示與聖潔的光明分別出來。
