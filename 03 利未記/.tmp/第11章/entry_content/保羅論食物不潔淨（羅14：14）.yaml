name: 保羅論食物不潔淨（羅14：14）
type: 互文
secondary_types: []
aliases:
- 羅馬書食物條例
status: formal
definition: 羅馬書第14章第14節中，保羅宣告「我憑著主耶穌確知深信，凡物本來沒有不潔淨的，惟獨人以為不潔淨的，在他就不潔淨了」。這項宣告直接回應了利未記第11章中對動物潔淨與不潔淨的嚴格區分。保羅指出，在基督裡，利未記禮儀律法中的食物分類已不再具有宗教上的不潔淨意義，食物的潔淨與否取決於信徒的良心與愛心的原則，而非舊約的字面規定。
accumulations:
- book: 利未記
  chapter: 11
  summary: 本章詳細規範了動物的潔淨與不潔淨，作為舊約選民必須遵守的飲食律法。
  relation: 利未記的食物分類是保羅在羅馬書中討論信徒良心自由的舊約背景與對比。
