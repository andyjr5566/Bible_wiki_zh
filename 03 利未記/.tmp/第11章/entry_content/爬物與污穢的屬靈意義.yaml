name: 爬物與污穢的屬靈意義
type: 主題
secondary_types: []
aliases:
- 爬物與污穢的屬靈意涵
status: formal
definition: 利未記第11章多次強調地上的爬物是可憎的、不潔淨的，不可吃也不可摸。在屬靈寓意上，爬行象徵完全貼近地面、屬土的、無法超越世俗的生活模式。這代表被屬地的慾望與罪惡所纏累的狀態。神禁止以色列人吃爬物，並告誡他們不可因爬物使自己成為可憎，旨在教導子民必須超越屬地的生命層次，追求屬天的聖潔。
accumulations:
- book: 利未記
  chapter: 11
  summary: 宣告凡地上的爬物皆為可憎，用肚子行走或用四足及多足行走的都不可吃，不可摸。
  relation: 爬物作為屬地與污穢的象徵，提醒以色列人不可讓自己沾染世俗的卑賤，必須與神的聖潔有分。
