name: 沙番（shaphan）
type: 原文
secondary_types: []
aliases:
- 沙番
status: formal
definition: 希伯來文 shaphan，意指「沙番」（岩獾/岩兔）。利未記 11:5 將其列為不潔淨的走獸，因為它「倒嚼不分蹄」，雖有反芻行為卻無分蹄，故不可食用，摸其屍體亦不潔淨至晚上。
accumulations:
- book: 利未記
  chapter: 11
  summary: 列為不潔淨的走獸，因倒嚼不分蹄
  relation: 作為飲食條例中不潔淨動物的具體例子
related_entries:
- 不潔淨（tame）
- 可憎（sheqets）
- 潔淨與不潔淨的飲食條例
- 倒嚼（ma'aleh gerah）
- 分蹄（mafris parsah）
sources:
- '綜合研讀註解: 利未記 11 章關於沙番的註解（https://biblehub.com/study/leviticus/11.htm）'
