name: 鴕鳥（bat ya'anah）
type: 原文
secondary_types: []
aliases:
- 鴕鳥
status: formal
definition: 希伯來文 bat ya'anah，字面意為「沙漠之女」，指鴕鳥。在利未記第11章中，鴕鳥被列為可憎、不可吃的雀鳥之一。鴕鳥生活在曠野荒野中，在聖經文學中常被視為不智慧、荒涼與哀鳴的象徵（如約伯記與彌迦書中的描述），因其生存環境與習性，被歸類為不潔淨的活物。
accumulations:
- book: 利未記
  chapter: 11
  summary: 將鴕鳥列為雀鳥中可憎、不可吃的活物。
  relation: 作為曠野與荒涼的象徵，鴕鳥被歸類為可憎之物，提醒以色列人遠離缺乏秩序與荒涼的生命狀態。
