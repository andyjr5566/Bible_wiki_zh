- 豬
status: formal
definition: 希伯來文 chazir，指豬。在利未記第11章中，豬被明確列為不潔淨的動物，原因是牠「蹄分兩瓣，卻不倒嚼」。豬雖然具備了分蹄的外在特徵，但缺乏倒嚼（反芻）的內在特徵，因此在禮儀上被視為不潔淨。豬在古代近東文化中常與不潔或異教祭祀相關聯，成為不潔淨動物的典型代表。
accumulations:
- book: 利未記
  chapter: 11
  summary: 指出豬因分蹄不倒嚼而與以色列人不潔淨，其肉不可吃，死屍不可摸。
  relation: 作為分蹄不倒嚼的範例，教導以色列人僅有外在的分別而無內在的默想（倒嚼）仍為不潔，無法達到神的聖潔標準。
