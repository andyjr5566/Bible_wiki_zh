name: 倒嚼（ma'aleh gerah）
type: 原文
secondary_types: []
aliases:
- 倒嚼
- 反芻
status: formal
definition: 希伯來文 ma'aleh gerah，字面意為「吐出半消化的食物」，即反芻。在利未記第11章中，這是潔淨走獸的第二個判定標準。走獸必須同時具備分蹄與倒嚼兩個特徵才可吃。倒嚼在屬靈寓意上常被解讀為反覆思想神的話語。
accumulations:
- book: 利未記
  chapter: 11
  summary: 將倒嚼（反芻）列為潔淨走獸的必要條件之一，並指出駱駝、沙番、兔子雖倒嚼但不分蹄，故為不潔淨。
  relation: 與分蹄共同構成走獸潔淨的判定標準，彰顯神對其子民日常飲食的具體規範。
