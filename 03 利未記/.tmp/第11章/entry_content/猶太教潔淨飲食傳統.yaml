status: formal
definition: 利未記第11章是猶太教潔淨飲食傳統的聖經基礎。後世的猶太教拉比與口傳律法（如米示拿與塔木德）在此基礎上進一步發展出複雜的飲食法規，統稱為 Kashrut。這些傳統不僅嚴格遵守本章對動物分類的原則（如分蹄倒嚼、有翅有鱗），還擴展到屠宰方式、肉奶分離等細節。利未記的條例因此成為猶太民族數千年來維持身分認同、在散居生活中保持分別為聖的核心文化實踐。
