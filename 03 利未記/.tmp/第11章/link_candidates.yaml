book: 利未記
chapter: 11
candidates:
  - name: 摩西
    type: 人物
    evidence: v1「耶和華對摩西、亞倫說」，本章起神首次同時向摩西和亞倫兩人說話
  - name: 亞倫和他兒子（祭司）
    type: 人物
    evidence: v1 丁良才註：本處並提摩西亞倫兩人名字，因亞倫已正式就任大祭司（參9:22-24），本章條例與二人皆有關係
  - name: 潔淨與不潔淨的早期區分
    type: 主題
    evidence: 啟導本／雷氏研讀本註：潔淨與不潔淨動物之分可追溯至挪亞時代（創七2-3），非西乃山新創
  - name: 聖潔生活
    type: 主題
    evidence: v44-45「你們要成為聖潔，因為我是聖潔的」，全章條例的神學根據
  - name: 聖潔飲食
    type: 主題
    evidence: 本章全部內容即「聖潔飲食」條例的具體規定：分別可吃與不可吃的活物
  - name: 污穢
    type: 主題
    evidence: v24-40 摸了不潔死物必不潔淨到晚上，是利5:2-3「摸不潔之死物」條例的具體展開
  - name: 瓦器打碎銅器擦淨
    type: 主題
    evidence: v33「你們要把這瓦器打破了」、v35「不拘是爐子，是鍋臺，就要打碎」，與利6:28 瓦器打碎銅器擦淨同一原則
  - name: 潔淨與不潔淨
    type: 神學
    evidence: v15「烏鴉與其類」列為不潔淨飛鳥；既有條目（創8章烏鴉鴿子）「待確認事項」已預留「利未記十一13-15烏鴉的潔淨性」待補
    surfaces:
      - phrase: 烏鴉
        verses: [15]
  - name: 分蹄倒嚼（潔淨走獸的判準）
    type: 主題
    evidence: v3-8 潔淨走獸須同時具備「蹄分兩瓣」與「倒嚼」兩個條件，缺一即不潔淨（駱駝、沙番、兔子、豬四例）
    surfaces:
      - phrase: 蹄分兩瓣
        verses: [3, 7, 26]
      - phrase: 倒嚼
        verses: [3, 4, 5, 6, 7, 26]
  - name: 沙番（shaphan）
    type: 原文
    evidence: v5「沙番，因為倒嚼不分蹄，就與你們不潔淨」；GT：「沙番」從希伯來文 shaphan 音譯過來，一般認為是蹄兔（岩石間的哺乳類動物）
    surfaces:
      - phrase: 沙番
        verses: [5]
  - name: 豬與異教祭祀的關聯
    type: 文化
    evidence: v7-8 豬因「蹄分兩瓣卻不倒嚼」不潔淨；舊約聖經背景註釋：赫人某些儀式獻豬為祭給冥界神祇，美索不達米亞豬也是獻給鬼魔的祭物，以色列人視豬為極度可憎（賽65:4,66:3,17）
    surfaces:
      - phrase: 豬
        verses: [7]
  - name: 有翅有鱗（潔淨水族的判準）
    type: 主題
    evidence: v9-12 水族潔淨與否的唯一判準是「有翅有鱗」，無論淡水鹹水皆適用
    surfaces:
      - phrase: 有翅有鱗
        verses: [9]
      - phrase: 無翅無鱗
        verses: [10, 11, 12]
  - name: 不潔淨雀鳥（二十種可憎飛禽）
    type: 主題
    evidence: v13-19 逐一列舉二十種不可吃的雀鳥，多為食肉猛禽或食腐鳥類，末尾納入蝙蝠
    surfaces:
      - phrase: 雀鳥
        verses: [13]
  - name: 蹦跳的蝗蟲類（潔淨昆蟲）
    type: 主題
    evidence: v20-23 有翅膀用四足爬行的飛蟲當以為可憎，唯獨有腿能在地上蹦跳者（蝗蟲、螞蚱、蟋蟀、蚱蜢）可吃
    surfaces:
      - phrase: 蝗蟲
        verses: [22]
  - name: 地上爬物（八種不潔爬蟲）
    type: 主題
    evidence: v29-31 列舉地上爬物中不潔淨的八種：鼬鼠、鼫鼠、蜥蜴、壁虎、龍子、守宮、蛇醫、蝘蜓
    surfaces:
      - phrase: 地上爬物
        verses: [29]
