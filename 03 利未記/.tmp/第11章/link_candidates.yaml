  surfaces:
  - 駱駝
- name: 沙番（shaphan）
  type: 原文
  evidence: 利未記11:5 沙番因為倒嚼不分蹄，就與你們不潔淨。丁良才：「這是希伯來文的原音，或作山鼠，是一種兔類的動物，常住在磐石的孔穴中」（詩104:18，箴30:26）。《啟導本》：從希伯來文 shaphan 音譯，一般認為就是今天的「蹄兔」，和兔子一般大小，尾小耳短，毛呈棕黃色，形狀似土撥鼠，足有軟掌，便於在岩石間跳躍行走。《串珠》：普遍認為是石獾——敘利亞岩石間的一種哺乳類動物。《雷氏》：石獾，是一種嚙齒動物，由於牠的口部不斷地運動，所以給人一種倒嚼的印象。
  surfaces:
  - 沙番
- name: 兔子（arnebet）
  type: 原文
  evidence: 利11:6「兔子因為倒嚼不分蹄，就與你們不潔淨」；CT註解：兔子只似乎倒嚼，神律例按眾目所見規定；GT註解：兔子非真反芻，但嘴部動作類似
  surfaces:
  - 兔子
- name: 豬（chazir）
  type: 原文
  evidence: 利11:7「豬因為蹄分兩瓣，卻不倒嚼，就與你們不潔淨」；CT靈意註解：表徵只有敬虔外貌卻背了敬虔實意的人(參提後三5)；BH：pig divides hoof but does not chew cud
  surfaces:
  - 豬
- name: 雕（nesher）
  type: 原文
  evidence: 利未記11:13 雀鳥中你們當以為可憎、不可吃的乃是：雕、狗頭雕、紅頭雕。丁良才：「鵰」文理譯本作「鷹」，原文和伯39:27、箴30:19 之「鷹」字原文一樣；伯39:29、太24:28 顯明鷹吃肉食，故此是不潔的。「狗頭鵰」按原文的意思解為破骨者，因為常把別的鳥獸吃剩的骨頭擋到空中、擲在地上摔碎，便吃其中的骨髓。「紅頭雕」多食魚類，當最饑的時候也是吃爛魚的。KC：這些猛禽如雕與兀鷹，靠別的生物的死存活。
  surfaces:
  - 雕
  - 鷹
- name: 烏鴉（oreb）
  type: 原文
  evidence: 利11:15「烏鴉與其類」；CT註解：烏鴉吃腐肉(參創八7)；GT註解：神使烏鴉供養以利亞(王上十七4-6)
  surfaces:
  - 烏鴉
- name: 鴕鳥（bat ya'anah）
  type: 原文
  evidence: 利11:16「鴕鳥、夜鷹、魚鷹、鷹與其類」；CT註解：鴕鳥體型巨大有翅不能飛；GT註解：鴕鳥住曠野不伏卵借日光熱力孵蛋(伯三十九13-18)
  surfaces:
  - 鴕鳥
- name: 蝙蝠（atallef）
  type: 原文
  evidence: 利11:19「戴鵀與蝙蝠」；CT話中之光：蝙蝠像鳥非鳥像鼠非鼠的兩面派，神討厭教會中兩面派；BH：bat = only mammal in bird list, nocturnal, caves/darkness
  surfaces:
  - 蝙蝠
- name: 蝗蟲（arbeh）
  type: 原文
  evidence: 利11:22「其中有蝗蟲、螞蚱、蟋蟀與其類；蚱蜢與其類」；CT註解：蝗蟲後腿長強壯能蹦跳；GT註解：施洗約翰以此為食；BH：locusts = have jointed legs for jumping
  surfaces:
  - 蝗蟲
  - 螞蚱
  - 蟋蟀
  - 蚱蜢
- name: 鼬鼠
  type: 原文
  evidence: 利未記11:29 地上爬物與你們不潔淨的乃是這些：鼬鼠、鼫鼠、蜥蜴與其類。KC 於此位置作 mole（鼴鼠），教訓最為明確：「這動物住在地底下，與日光隔絕。牠教導我們：不該做那些見不得白日之光的隱密事」——參林後4:2「我們已經棄絕了那些因羞恥而隱藏的事」、弗5:11-12「不要參與那暗昧無益的事……因為他們暗中所行的，就是提起來也是可恥的」。
  surfaces:
  - 鼬鼠
- name: 壁虎
  type: 原文
  evidence: 利未記11:30 壁虎、龍子、守宮、蛇醫、蝘蜓。丁良才：「壁虎」文理譯本作「蛤蚧」。《聖經精讀本》：壁虎身體淺綠色，尾巴也是綠色；守宮是壁虎的一種，非常小；蝘蜓也是壁虎的一種。
  surfaces:
  - 壁虎
- name: 蝘蜓
  type: 原文
  evidence: 利未記11:30 壁虎、龍子、守宮、蛇醫、蝘蜓。《聖經精讀本》：蝘蜓也是壁虎的一種。KC 於此位置作 chameleon（變色龍），並給了明確教訓：「牠能適應任何處境、與任何人攀談，正如變色龍能改變顏色來配合周遭環境。若我們在信徒中間表現得合宜，到了世界中卻調整自己的行為、只為與世界保持朋友關係，就很容易在牠身上認出自己。」
  surfaces:
  - 蝘蜓
