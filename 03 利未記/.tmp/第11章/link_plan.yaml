- name: 沙番（shaphan）
  suggested_type: 原文
  evidence: 利未記11:5 沙番因為倒嚼不分蹄，就與你們不潔淨。丁良才：「這是希伯來文的原音，或作山鼠，是一種兔類的動物，常住在磐石的孔穴中」（詩104:18，箴30:26）。《啟導本》：從希伯來文
    shaphan 音譯，一般認為就是今天的「蹄兔」，和兔子一般大小，尾小耳短，毛呈棕黃色，形狀似土撥鼠，足有軟掌，便於在岩石間跳躍行走。《串珠》：普遍認為是石獾——敘利亞岩石間的一種哺乳類動物。《雷氏》：石獾，是一種嚙齒動物，由於牠的口部不斷地運動，所以給人一種倒嚼的印象。
  surfaces:
  - phrase: 沙番
  target_path: link_folder/原文/沙番（shaphan）.md
- name: 雕（nesher）
  suggested_type: 原文
  evidence: 利未記11:13 雀鳥中你們當以為可憎、不可吃的乃是：雕、狗頭雕、紅頭雕。丁良才：「鵰」文理譯本作「鷹」，原文和伯39:27、箴30:19
    之「鷹」字原文一樣；伯39:29、太24:28 顯明鷹吃肉食，故此是不潔的。「狗頭鵰」按原文的意思解為破骨者，因為常把別的鳥獸吃剩的骨頭擋到空中、擲在地上摔碎，便吃其中的骨髓。「紅頭雕」多食魚類，當最饑的時候也是吃爛魚的。KC：這些猛禽如雕與兀鷹，靠別的生物的死存活。
  surfaces:
  - phrase: 雕
  - phrase: 鷹
  target_path: link_folder/原文/雕（nesher）.md
