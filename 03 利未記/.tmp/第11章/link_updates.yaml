updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 利11:1 耶和華對摩西、亞倫說話，頒布潔淨不潔淨的飲食條例。這是亞倫就任大祭司後，神首次同時向摩西與亞倫說話，將辨別聖俗潔穢的責任交託給祭司體系與全體百姓。
  relation: 作為神的僕人與中保，摩西領受並傳遞神的條例，確立以色列人在飲食上分別為聖的生活準則。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 利11:1 耶和華對摩西、亞倫說話，頒布潔淨不潔淨的飲食條例。亞倫已正式就任大祭司（參九22-24），與摩西共同領受神關於潔淨不潔淨的吩咐，負責教導百姓分辨可吃與不可吃的活物。
  relation: 作為大祭司，亞倫與摩西同受神的吩咐，將潔淨條例教導百姓，履行祭司「分別聖俗、潔淨不潔淨」的職責（參十10）。
- title: 駱駝成為家畜
  path: link_folder/文化/駱駝成為家畜.md
  summary: 利11:4 「駱駝因為倒嚼不分蹄，就與你們不潔淨」——駱駝是本章四個「只符合一半條件」的反例之首。《啟導本》解釋牠為何不合格：「駱駝雖然反芻，因為在沙漠上行走，蹄雖分但蹄底下有肉墊相連，不是完全的分開，所以不可以吃。」丁良才指出這類「不全分蹄」與「蹄分多瓣」的一概不可吃，並提到「亞拉伯人喝駱駝奶，也吃駱駝的肉」——鄰邦的慣例與以色列的條例在此分道。丁良才另在 11:26 記下一則實際的後果：法利賽人認為條例只禁止摸「不潔淨之死了的」走獸，所以「他們也常使用駱駝、驢子、馬等等不潔淨的走獸……照應這些牲畜的時候，自然常摸他們，像摸牛羊一樣，也不染什麼不潔淨」；撒都該人則認為摸活的不潔走獸也成為不潔。
  relation: 駱駝在本章由「家畜」的身分轉為「不潔淨走獸」的判例對象：牠倒嚼卻不分蹄，只符合潔淨判準的一半。KC 據此把牠讀成一種人的寫照——「他能在裡面吸收很多、也能倒嚼，行事為人卻與所吸收的相衝突」，與只分蹄不倒嚼的豬恰成一組對照。
