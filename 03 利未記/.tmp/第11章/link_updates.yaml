"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利11:1 耶和華對摩西、亞倫說話，頒布潔淨不潔淨的飲食條例。這是亞倫就任大祭司後，神首次同時向摩西與亞倫說話，將辨別聖俗潔穢的責任交託給祭司體系與全體百姓。"
  "relation": "作為神的僕人與中保，摩西領受並傳遞神的條例，確立以色列人在飲食上分別為聖的生活準則。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "利11:1 耶和華對摩西、亞倫說話，頒布潔淨不潔淨的飲食條例。亞倫已正式就任大祭司（參九22-24），與摩西共同領受神關於潔淨不潔淨的吩咐，負責教導百姓分辨可吃與不可吃的活物。"
  "relation": "作為大祭司，亞倫與摩西同受神的吩咐，將潔淨條例教導百姓，履行祭司「分別聖俗、潔淨不潔淨」的職責（參十10）。"
