"book": "利未記"
"chapter": !!int "11"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西、亞倫說」：本章食物潔淨條例神同時對摩西與亞倫兩人說話，摩西是頒布這套「潔淨與不潔淨」律例的中介者。"
  "relation": "GT 丁良才註：本處並提摩西亞倫兩人名字（十三1，十四33），因為下列條例與二人都有關係（參民九6）。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v1 神首次在亞倫正式就任大祭司後（參利9:22-24），同時對摩西和亞倫兩人說話頒布食物潔淨條例。"
  "relation": "串珠聖經註釋：通常神是單獨與摩西說話，較少與摩西及亞倫二人一同說話；這裡卻是二人一起的，可能是因亞倫及祭司們須要分別潔淨的與不潔淨的，並且要教導以色列人遵守（參10:10）。"
- "title": "潔淨與不潔淨的早期區分"
  "path": "link_folder/主題/潔淨與不潔淨的早期區分.md"
  "summary": "利未記11章將創世記早已存在、卻只用於獻祭的潔淨/不潔淨分類，系統化為涵蓋走獸、水族、飛鳥、爬物的完整飲食律例。"
  "relation": "利未記雷氏研讀本：潔淨與不潔淨之食物的區分，可追溯到挪亞的時代（創七2）；本章（v3-31）首次將這早期僅用於獻祭的分類，具體訂定為可吃與不可吃的飲食標準。"
- "title": "聖潔生活"
  "path": "link_folder/主題/聖潔生活.md"
  "summary": "v44-45「你們要成為聖潔，因為我是聖潔的」是本章全部飲食條例的神學根據——聖潔生活從飲食延伸到日常行為的分別為聖。"
  "relation": "CT 靈訓要義：神規定潔淨和不潔淨的食物，旨在讓人通過視覺直接分辨，用以操練生活的聖潔，用外在潔淨表明內在的聖潔（v44-45）。"
- "title": "聖潔飲食"
  "path": "link_folder/主題/聖潔飲食.md"
  "summary": "利未記11章是「聖潔飲食」條例最完整的具體展開：分蹄倒嚼的走獸、有翅有鱗的水族、二十種不潔飛鳥、蹦跳可吃的昆蟲，逐一分別可吃與不可吃的活物。"
  "relation": "出22章已提及「聖潔的人不吃不潔之物」的原則性宣告；利未記11章（v2-23）則是這原則首次具體逐類立法的篇章。"
- "title": "污穢"
  "path": "link_folder/主題/污穢.md"
  "summary": "v24-40 詳細規定摸了不潔死物（死獸、死畜、死蟲）必不潔淨到晚上，是利5:2-3「摸不潔之死物」條例的具體展開與操作細則。"
  "relation": "利5:2-3 規定誤犯者須獻贖愆祭補贖，但未細說「不潔淨到晚上」的具體機制；利未記11:24-40 補上這套摸屍、拿屍、器皿沾染的完整潔淨程序，是同一污穢概念的操作性延伸。"
- "title": "瓦器打碎銅器擦淨"
  "path": "link_folder/主題/瓦器打碎銅器擦淨.md"
  "summary": "v33「你們要把這瓦器打破了」、v35「不拘是爐子，是鍋臺，就要打碎」：不潔爬物屍體掉入瓦器、爐灶時，適用與利6:28贖罪祭肉相同的「瓦器打碎」原則。"
  "relation": "利6:28 是贖罪祭肉煮熟後瓦器多孔吸附祭肉汁液須打碎的條例；利未記11:33,35 將同一「瓦器多孔無法淨化、須打碎」的原理，擴大適用到爬物屍體污染食具的情境，證明這是貫穿全書的一致原則，不限於祭肉處理。"
- "title": "潔淨與不潔淨"
  "path": "link_folder/神學/潔淨與不潔淨.md"
  "summary": "v15「烏鴉與其類」將烏鴉列為二十種不潔飛鳥之一，呼應創世記八章挪亞放出烏鴉、鴿子時已顯出的潔淨與不潔淨區分。"
  "relation": "創8:6-7 烏鴉飛來飛去不肯回方舟，象徵不潔淨、屬肉體的舊造性情；利未記11:13-15 正式將烏鴉列入不可吃的不潔淨飛鳥名單，與創世記的預表呼應一致，解決該條目「待確認事項」中「利未記十一13-15烏鴉的潔淨性」的懸而未決。"
