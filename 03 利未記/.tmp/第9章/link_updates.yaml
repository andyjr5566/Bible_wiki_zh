book: 利未記
chapter: 9
updates:
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: "利9章全章核心：亞倫和他兒子在第八天正式開始執行祭司職分——為自己獻贖罪祭燔祭（v8-14）、為百姓獻四祭（v15-21）、舉手祝福（v22）。CT：大祭司先為自己贖罪才能為百姓贖罪（來5:3；7:27）。KC：亞倫預表基督作大祭司；眾祭司預表信徒祭司職分（彼前2:9）。"
  relation: "利9章是利未記祭司職分正式運作的關鍵章，實現出28-29章、40:12-15的吩咐。亞倫系祭司預表基督永遠的祭司職分（來7:17,24）和信徒作祭司（彼前2:9；啟1:6）。"
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: "利9:1,6,7,23 摩西召聚、吩咐、移交職分、與亞倫同進會幕同出祝福。摩西作中保、主禮者，完成祭司職分移交。CT：摩西此次擔任祭司角色，得搖胸為分。KC：摩西作僕人在神家忠心（來3:5），預表基督作兒子治理神家（來3:6）。"
  relation: "利9章摩西臨時行祭司職分為亞倫系祭司承接聖職，預表基督建立新約祭司體系。摩西順服「照耶和華所吩咐的行了」（v6,7,23）成為榜樣。"
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: "利9:2,3,7,8,15 本章三次贖罪祭：亞倫牛犢（v8）、百姓公山羊（v15）、亞倫為自己（v7）。贖罪祭是祭司職分運作的前提。CT：贖罪祭表徵基督在營外受苦（來13:11-13）。KC：營外焚燒說明基督在城門外受苦。"
  relation: "利9章贖罪祭是承接聖職禮的第一祭，為祭司自己贖罪（來7:27）。預表基督為百姓和自己獻上贖罪祭（來9:12,26）。"
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: "利9:2,3,4,12,16 本章燔祭：亞倫公綿羊（v12）、百姓牛犢綿羊羔（v16）、早晨燔祭（v17）。燔祭表徵完全奉獻。CT：全羊燒在壇上表徵基督完全奉獻給神。KC：燔祭說明基督對神完全的獻上（弗5:2）。"
  relation: "利9章燔祭是承接聖職禮的第二祭（先贖罪祭後燔祭），表徵祭司稱義後完全奉獻。預表基督一次獻上自己為馨香的祭（來10:10；弗5:2）。"
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: "利9:4,18,21 本章平安祭：百姓公牛公綿羊（v18）、胸右腿搖舉祭（v21）。平安祭表徵與神和好、交通（利3章；7:11-18）。CT：平安祭此名詞在希伯來文表示「和好」或「福祉」。KC：平安祭說明基督使信徒與神和好。"
  relation: "利9章承接聖職禮屬平安祭性質（shelamim），是第三祭（贖罪祭→燔祭→平安祭），表徵與神相交。預表基督使信徒與神和好（羅5:1；西1:20）。"
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: "利9:4,17 本章素祭：調油的素祭（v4）、一滿掬燒在壇上（v17）。素祭表徵感恩、奉獻生活（利2章）。CT：素祭表徵基督作生命糧。KC：素祭說明基督作生命糧。"
  relation: "利9章素祭配搭承接聖職禮的平安祭與祭司食用，預表信徒以基督為生命糧（約6:35,51）並在神面前享受交通。"
- title: 公牛犢
  path: link_folder/文化/公牛犢.md
  summary: "利9:2,4,8 亞倫贖罪祭牛犢（v8）、百姓平安祭公牛（v18）。牛犢象徵力量、代贖。CT：公牛犢預表基督作神的羔羊（約1:29）。KC：公牛犢說明基督的力量和順服。"
  relation: "利9章公牛犢用於亞倫贖罪祭和百姓平安祭，展示祭司職分雙重基礎。預表基督一次獻上成就雙重功效（來10:10,14）。"
- title: 公綿羊
  path: link_folder/文化/公綿羊.md
  summary: "利9:2,4,12,18 亞倫燔祭公綿羊（v12）、百姓平安祭公綿羊（v18）。公綿羊象徵順服、代贖。CT：公綿羊預表基督作替代的祭牲。KC：公綿羊說明基督的力量和順服。"
  relation: "利9章公綿羊分別用於燔祭和承接聖職禮，對應完全奉獻與交通兩個層面。預表基督一次獻上自己成就雙重功效（來10:10,14）。"
- title: 公山羊
  path: link_folder/文化/公山羊.md
  summary: "利9:3,15 百姓贖罪祭公山羊（v15）。公山羊用於會眾贖罪祭（利4:23；16:5）。CT：公山羊預表基督作替代的祭牲。KC：公山羊說明基督的代贖。"
  relation: "利9章百姓贖罪祭用公山羊（非公牛），因非為指定之罪，乃禮儀上贖罪標記（利4:23-24；16:5）。預表基督為會眾贖罪（來9:12）。"
- title: 綿羊羔
  path: link_folder/文化/綿羊羔.md
  summary: "利9:3,16 百姓燔祭綿羊羔（v16）。一歲羔羊表徵純真、無瑕。CT：綿羊羔預表基督作神的羔羊（約1:29）。KC：綿羊羔說明基督的純潔。"
  relation: "利9章一歲綿羊羔作百姓燔祭，表徵百姓完全奉獻。預表基督作無瑕疵的羔羊（彼前1:19）。"
- title: 搖祭（tenufah）
  path: link_folder/原文/搖祭（tenufah）.md
  summary: "利9:21 胸作搖祭，在耶和華面前搖一搖。搖祭表徵獻給神又歸祭司。CT：搖祭表徵基督獻給神超過一切。KC：搖祭說明基督獻給神超過一切。"
  relation: "利9章搖祭出現在平安祭中，胸歸祭司（利7:30-31）。預表基督獻給神又賜給信徒（約6:51）。"
- title: 舉祭（terumah）
  path: link_folder/原文/舉祭（terumah）.md
  summary: "利9:21 右腿作舉祭，歸祭司。舉祭表徵高舉獻給神。CT：舉祭表徵基督被高舉。KC：舉祭說明基督被高舉。"
  relation: "利9章舉祭出現在平安祭中，右腿歸祭司（利7:32-33）。預表基督被高舉（腓2:9-11）。"
- title: 壇
  path: link_folder/主題/壇.md
  summary: "利9:7,8,9,10,12,13,14,18,24 血抹四角、倒壇腳、脂油燒在壇上、火燒盡祭物。壇是獻祭核心場所。CT：壇表徵基督十字架；壇成聖預表基督十字架成聖信徒。"
  relation: "利9章壇是承接聖職禮的核心場所，所有血和祭物都在壇上處理。預表基督十字架是信徒事奉神的根基（來13:10-13）。"
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: "利9:5,23 會幕前獻祭、摩西亞倫進會幕。會幕是神與人相會之所。CT：會幕表徵教會；會幕門口表徵在神面前的交通。"
  relation: "利9章會幕是承接聖職禮的舞台，從門口到聖所，見證祭司職分建立。預表基督進入天上真會幕（來9:11-12）和教會作神的殿（弗2:21-22）。"
- title: 耶和華的榮光
  path: link_folder/神學/耶和華的榮光.md
  summary: "利9:6,23 榮光顯現印證悅納。榮光雲柱火柱表徵神同在。CT：耶和華的榮光就要向你們顯現。KC：耶和華的榮光意義神聖的同在。"
  relation: "利9章以榮光顯現為高潮（v23），確認神悅納獻祭和祭司職分。預表基督作神榮耀的光輝（來1:3）和聖靈內住（弗1:13-14）。"
- title: 血
  path: link_folder/神學/血.md
  summary: "利9:9,12,13,18 血抹壇四角、灑壇周圍、倒壇腳。血為贖罪核心（利17:11）。CT：血表徵基督寶血潔淨功效。KC：血在耳/拇指/腳趾說明全人獻給神。"
  relation: "利9章展示血在祭司承接聖職中的多重功用：潔淨壇、分別人、成聖衣服。預表基督寶血一次成就永遠贖罪（來9:12；10:19-22）。"
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: "利9:10,19,20 脂油、肥尾巴、腰子、肝網燒在壇上。脂油（chelev）代表祭牲最好的部分，歸神為火祭（利3:16）。CT：脂油表徵將最好的獻給神。KC：脂油說明基督將自己最好的獻給神。"
  relation: "利9章脂油在贖罪祭和承接聖職禮中都獻在壇上，表徵祭司職分要求將最好的獻給神。預表基督完全無瑕的獻上（來9:14）。"
- title: 肥尾巴
  path: link_folder/文化/肥尾巴.md
  summary: "利9:19 平安祭羊的肥尾巴（alyah）作為脂油一部分燒在壇上（利3:9）。CT：肥尾巴表徵豐盛的奉獻。KC：肥尾巴說明基督豐盛的供應。"
  relation: "利9章肥尾巴作為平安祭脂油的一部分燒在壇上，預表基督豐盛的供應（約10:10）。"
