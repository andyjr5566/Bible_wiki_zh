name: 為百姓獻素祭
type: 事件
secondary_types: []
aliases:
- 他又奉上素祭
status: formal
definition: 亞倫又奉上素祭，從其中取一滿把，燒在壇上；這是在早晨的燔祭以外（利9:17）。素祭是摩西所吩咐備妥的「調油的素祭」（v4）。祭司取一滿把作為紀念的分燒在壇上，其餘不燒。經文註明此舉是在每日早晨的燔祭以外額外加獻的。
development: 摩西吩咐取調油的素祭（v4）→ 亞倫取一滿把燒在壇上，在早晨的燔祭以外（v17）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫奉上素祭，取一滿把燒在壇上，是在早晨常獻的燔祭以外另行獻上的。
  relation: 素祭與血祭並列，顯明百姓的生活與勞碌所得同樣要獻與神。
related_entries:
- 素祭（minchah）
- 調油的素祭
- 一滿掬
- 早晨的燔祭
- 壇
- 亞倫和他兒子（祭司）
sources:
