name: 亞倫向百姓舉手祝福
type: 事件
secondary_types: []
aliases:
- 亞倫舉手為百姓祝福
status: formal
definition: 「亞倫向百姓舉手，為他們祝福。他獻了贖罪祭、燔祭、平安祭就下來了」（利9:22）。祝福發生在三祭獻完之後、亞倫從壇上下來之時。舉手是祝福的姿勢，這是大祭司職分中代神向百姓施福的一面，與他先前代百姓向神獻祭的一面互相對應。
development: 獻完贖罪祭、燔祭、平安祭（v8-21）→ 舉手祝福（v22上）→ 從壇下來（v22下）→ 與摩西進會幕再出來祝福（v23）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫在獻完贖罪祭、燔祭、平安祭之後，向百姓舉手祝福，然後從壇上下來。
  relation: 獻祭完成後才有祝福，顯明祝福建立在贖罪與奉獻的基礎上。
related_entries:
