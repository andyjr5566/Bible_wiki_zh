name: 牛犢
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 牛群中年幼的公牛，是以色列獻祭制度中最貴重的牲畜之一。在利未記第9章裡，牛犢出現在兩個場合：其一是亞倫奉命從牛群中取一隻公牛犢作自己的贖罪祭（第2節），並由亞倫親自宰殺（第8節）；其二是以色列人所獻的燔祭中，要取一隻牛犢和一隻綿羊羔，都要一歲、沒有殘疾的（第3節）。牲畜必須「沒有殘疾」，反映獻給耶和華的供物必須完全無瑕的要求；而以牛犢作祭司自己的贖罪祭牲，也顯示祭司自身的罪需要用分量最重的祭牲來對付。
development: 本章中牛犢的用途分層清楚：祭司的贖罪祭用公牛犢，其血抹在壇的四角、倒在壇腳，脂油、腰子與肝上的網子燒在壇上，肉和皮則用火燒在營外（8-11節）；百姓的燔祭則用一歲的牛犢與綿羊羔（3節）。同一種牲畜因祭別與獻祭者身分不同，處理方式與所指向的意義也隨之不同。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫取牛群中的一隻公牛犢作自己的贖罪祭並親自宰殺；以色列人則取一隻牛犢和一隻綿羊羔，一歲、沒有殘疾的，作燔祭。
  relation: 牛犢作為最貴重且必須無殘疾的祭牲，既承擔祭司自身的贖罪，也用於百姓的燔祭，顯出獻祭的完全與代價。
