name: 燒贖罪祭脂油腰子肝網
type: 神學
secondary_types: []
aliases:
- 贖罪祭的脂油和腰子並肝上的網子燒在壇上
status: formal
definition: 「惟有贖罪祭的脂油和腰子，並肝上取的網子，都燒在壇上，是照耶和華所吩咐摩西的」（利9:10）。贖罪祭牲的內臟脂油部分歸神、燒在壇上，其餘的肉和皮則燒在營外（v11）。經文特別註明「照耶和華所吩咐摩西的」，強調這不是亞倫自定的作法，而是嚴格遵行的吩咐。
development: 血的處理（v9）→ 脂油、腰子、肝上的網子燒在壇上（v10）→ 肉與皮燒在營外（v11）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 贖罪祭牛犢的脂油、腰子和肝上取的網子都燒在壇上，照耶和華所吩咐摩西的。
  relation: 最好的部分歸神燒在壇上，顯明贖罪祭中神所當得的分。
related_entries:
- 脂油
- 腰子
- 肝上取的網子
- 贖罪祭
