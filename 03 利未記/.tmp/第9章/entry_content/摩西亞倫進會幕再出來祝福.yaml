name: 摩西亞倫進會幕再出來祝福
type: 事件
secondary_types: []
aliases:
- 摩西亞倫進入會幕又出來為百姓祝福
status: formal
definition: 「摩西、亞倫進入會幕，又出來為百姓祝福，耶和華的榮光就向眾民顯現」（利9:23）。這是當日第二次祝福，由摩西與亞倫一同進入會幕之後發出；祝福話語落下，耶和華的榮光隨即向眾民顯現，接著有火從耶和華面前出來燒盡祭物（v24）。
development: 亞倫舉手祝福（v22）→ 摩西亞倫進會幕（v23上）→ 出來祝福（v23中）→ 榮光顯現（v23下）→ 天火燒盡祭物（v24）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 摩西與亞倫一同進入會幕，出來後為百姓祝福，耶和華的榮光隨即向眾民顯現。
  relation: 中保與大祭司同進同出的祝福，成為神榮光顯現的直接前導。
