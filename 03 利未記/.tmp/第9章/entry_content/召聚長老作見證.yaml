name: 召聚長老作見證
type: 事件
secondary_types: []
aliases:
- 摩西召亞倫和以色列眾長老
status: formal
definition: 第八天，摩西召了亞倫和他兒子，並以色列的眾長老來（利9:1）。長老代表全會眾在場，見證亞倫首次獻祭與耶和華的吩咐；隨後全會眾也都近前來，站在耶和華面前（利9:5）。這使祭司的就任事奉不是私下進行，而是在百姓的公開見證之下完成。
development: 召聚（v1）→ 摩西傳達耶和華的吩咐（v2-4）→ 會眾近前站立（v5）→ 榮光顯現（v23）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 摩西召亞倫父子與以色列眾長老到會幕前，全會眾近前站在耶和華面前。
  relation: 長老與會眾的在場，使祭司事奉的合法性與神的顯現同被公開見證。
related_entries:
