name: 亞倫宰贖罪祭牛犢
type: 事件
secondary_types: []
aliases:
- 宰為自己作贖罪祭的牛犢
status: formal
definition: 亞倫就近壇前，宰了為自己作贖罪祭的牛犢（利9:8）。這隻公牛犢是摩西吩咐他從牛群中取的、沒有殘疾的（利9:2）。宰殺由亞倫親手進行，是他首次以大祭司身分執行的獻祭動作，隨後由他兒子把血奉給他，進行抹血與倒血（v9）。
development: 摩西吩咐取公牛犢（v2）→ 亞倫就近壇前親手宰殺（v8）→ 兒子奉血（v9）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫就近壇前，親手宰了為自己作贖罪祭的公牛犢。
  relation: 大祭司首次親手獻祭，先處理自己的罪，才能承擔代表百姓的職分。
related_entries:
- 亞倫和他兒子（祭司）
- 贖罪祭
- 公牛犢
- 牛犢
- 壇
- 為自己與百姓贖罪
- 抹血在壇四角、倒血在壇腳
