name: 抹血在壇四角、倒血在壇腳
type: 神學
secondary_types: []
aliases:
- 抹血在壇的四角上
- 把血倒在壇腳
status: formal
definition: 亞倫的兒子把血奉給他，他就把指頭蘸在血中，抹在壇的四角上，又把血倒在壇腳那裡（利9:9）。贖罪祭的血有兩個去處：一部分以指頭抹在燔祭壇的四角，一部分傾倒在壇腳。血的塗抹使壇得以潔淨與分別，是贖罪祭處理血的固定作法，與燔祭「灑在壇的周圍」（v12）明顯不同。
development: 兒子奉血（v9上）→ 指頭蘸血抹四角（v9中）→ 餘血倒在壇腳（v9下）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫以指頭蘸贖罪祭牛犢的血抹在壇的四角上，其餘的血倒在壇腳。
  relation: 血的抹與倒是贖罪的具體標記，使壇成為神與百姓相會、罪得遮蓋之處。
related_entries:
- 血
- 壇
- 贖罪祭
- 亞倫宰贖罪祭牛犢
- 亞倫和他兒子（祭司）
