name: 以色列眾長老
type: 人物
secondary_types: []
aliases:
- 眾長老
status: formal
definition: 以色列的眾長老是百姓的代表。第八天摩西召了亞倫和他兒子，「並以色列的眾長老來」（利9:1），使他們與祭司一同在場，聽見耶和華藉摩西所吩咐的話，並見證亞倫首次獻祭。隨後全會眾也都近前來，站在耶和華面前（v5），一同經歷榮光顯現與天火降下。
development: 被召前來（v1）→ 與全會眾一同近前站立（v5）→ 見證榮光與天火（v23-24）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 摩西在第八天召以色列的眾長老與亞倫父子同來，作祭司就任獻祭的見證人。
  relation: 長老代表全會眾在場，使祭司事奉的設立與神的悅納被公開承認。
related_entries:
- 召聚長老作見證
- 摩西
- 亞倫和他兒子（祭司）
- 會幕（帳幕整體）
- 百姓歡呼俯伏敬拜
- 第八天（新開始）
sources:
