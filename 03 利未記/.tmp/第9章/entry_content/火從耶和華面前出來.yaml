name: 火從耶和華面前出來
type: 事件
secondary_types: []
aliases:
- 天火
- 有火從耶和華面前出來
status: formal
definition: 利未記9章結尾的關鍵事件：「有火從耶和華面前出來，在壇上燒盡燔祭和脂油」（利9:24）。這火的來源不是祭司所點，而是「從耶和華面前」出來的，直接臨到亞倫剛獻上的祭物之上。它出現在摩西、亞倫進入會幕又出來為百姓祝福、耶和華的榮光向眾民顯現之後（v23），因此是榮光顯現的具體行動：神親自以火承認壇上的祭物、承認亞倫按吩咐所行的贖罪祭、燔祭與平安祭。眾民一見這火，就都歡呼，俯伏在地（v24）。
development: 摩西亞倫祝福百姓 → 耶和華的榮光向眾民顯現（v23）→ 火從耶和華面前出來，燒盡壇上的燔祭和脂油（v24上）→ 眾民歡呼俯伏（v24下）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫照摩西所吩咐獻完贖罪祭、燔祭、平安祭並祝福百姓後，有火從耶和華面前出來，在壇上燒盡燔祭和脂油。
  relation: 天火是神親自悅納祭物與祭司事奉的可見憑據，使「今天耶和華要向你們顯現」（v4）的應許在壇上應驗。
