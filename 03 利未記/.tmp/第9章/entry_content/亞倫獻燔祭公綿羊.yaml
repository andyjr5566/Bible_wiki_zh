name: 亞倫獻燔祭公綿羊
type: 事件
secondary_types: []
aliases:
- 亞倫宰了燔祭牲
status: formal
definition: 亞倫為自己所獻的燔祭是一隻沒有殘疾的公綿羊（利9:2）。他宰了燔祭牲，兒子把血遞給他，他就灑在壇的周圍（v12）；又把燔祭一塊一塊地、連頭遞給他，他都燒在壇上（v13）；並洗了臟腑和腿，燒在壇上的燔祭上（v14）。燔祭全牲燒在壇上，血是「灑在壇的周圍」，與贖罪祭的抹血、倒血不同。
development: 宰燔祭牲、灑血（v12）→ 分塊連頭燒在壇上（v13）→ 洗臟腑和腿一同燒上（v14）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫宰了作自己燔祭的公綿羊，灑血在壇的周圍，把祭牲分塊連頭與洗淨的臟腑和腿都燒在壇上。
  relation: 贖罪之後獻上燔祭，全然焚燒表達大祭司完全歸與神的奉獻。
