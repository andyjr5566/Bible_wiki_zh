name: 百姓歡呼俯伏敬拜
type: 事件
secondary_types: []
aliases:
- 眾民一見就都歡呼俯伏在地
status: formal
definition: 「眾民一見，就都歡呼，俯伏在地」（利9:24下）。百姓看見榮光顯現與天火燒盡祭物之後，作出雙重回應：歡呼是喜樂的宣告，俯伏在地是敬畏的降服。這是全章的收束，也是全會眾自v5「近前來，站在耶和華面前」以來的最終回應。
development: 會眾近前站立（v5）→ 目睹榮光與天火（v23-24上）→ 歡呼並俯伏在地（v24下）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 眾民看見火從耶和華面前出來燒盡祭物，就都歡呼、俯伏在地。
  relation: 神主動的顯現引出百姓的敬拜，喜樂與敬畏並存，是蒙悅納者的正當回應。
related_entries:
- 俯伏敬拜
