name: 為百姓獻燔祭牛犢綿羊羔
type: 事件
secondary_types: []
aliases:
- 也奉上燔祭照例而獻
status: formal
definition: 摩西吩咐以色列人取一隻牛犢和一隻綿羊羔，都要一歲、沒有殘疾的，作燔祭（利9:3）；亞倫「也奉上燔祭，照例而獻」（v16）。「照例」表示按既定的燔祭條例處理，不需另作說明，與他先前為自己所獻的燔祭程序相合。
development: 摩西吩咐取牛犢與綿羊羔作燔祭（v3）→ 亞倫照例獻上（v16）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫為百姓奉上一歲無殘疾的牛犢與綿羊羔作燔祭，照例而獻。
  relation: 百姓得贖罪之後，同樣藉燔祭表達全然獻上與蒙悅納。
related_entries:
- 燔祭（olah）
- 牛犢
- 綿羊羔
- 亞倫和他兒子（祭司）
- 為百姓獻贖罪祭公山羊
- 壇
sources:
