name: 一滿掬（melo qumtso）
type: 原文
secondary_types: []
aliases:
- 一滿把
- 一把
status: formal
definition: 希伯來文 melo qumtso，字面意思是「他手所握滿的一把」，qomets 指手指彎曲握攏所能盛的份量。利未記9:17記載：「他又奉上素祭，從其中取一滿把，燒在壇上；這是在早晨的燔祭以外。」素祭是調油的細麵（v4），祭司並不把整份素祭燒盡，而是從其中取「一滿掬」焚燒在壇上作為代表全體歸神的部分（紀念的份），其餘則留下。「滿」字是關鍵：所取的不是隨意一撮，而是握滿的一把，表明獻上的份雖是全體中的一部分，卻必須是毫無保留、滿滿的。
development: 亞倫獻完百姓的贖罪祭與燔祭（v15-16）→ 奉上素祭，從其中取一滿把燒在壇上（v17上）→ 註明這是在早晨的燔祭以外（v17下）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 亞倫奉上素祭，從其中取一滿把燒在壇上，這是在早晨的燔祭以外。
  relation: 一滿掬是素祭歸神的代表份額，以「滿」的量表明部分代表全體的獻上毫無保留。
