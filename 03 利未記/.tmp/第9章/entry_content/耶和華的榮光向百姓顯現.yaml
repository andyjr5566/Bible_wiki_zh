name: 耶和華的榮光向百姓顯現
type: 神學
secondary_types: []
aliases:
- 耶和華的榮光就向眾民顯現
status: formal
definition: 摩西在第八天預先宣告：「因為今天耶和華要向你們顯現」（利9:4），又說：「這是耶和華吩咐你們所當行的；耶和華的榮光就要向你們顯現」（v6）。應許在v23應驗：摩西、亞倫出會幕為百姓祝福，「耶和華的榮光就向眾民顯現」。榮光的顯現是當日一切獻祭與順服的目的與印證，顯明神悅納並臨在於祂百姓中間。
development: 預告顯現（v4）→ 條件是照耶和華所吩咐的去行（v6）→ 獻祭與祝福完成後榮光顯現（v23）→ 天火隨之而出（v24）。
accumulations:
- book: 利未記
  chapter: 9
  summary: 摩西兩次預告耶和華要向百姓顯現，並在祭事與祝福完成後，耶和華的榮光向眾民顯現。
  relation: 榮光顯現是順服獻祭的結果與印證，也是全章的高峰。
related_entries:
