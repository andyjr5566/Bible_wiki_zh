organization: '### 第八天的召集與祭物清單（v1-6）


  七天承接聖職之禮期滿，到了[[第八天（新開始）|第八天]]，[[摩西]]召了[[亞倫和他兒子（祭司）|亞倫和他兒子]]，又召了[[以色列眾長老]]來。這一天不是七日循環的重複，而是新秩序的第一日：前七天是摩西為亞倫行禮、代他站在壇前，第八天則是亞倫自己第一次以大祭司的身分登上[[壇]]供職。摩西特意[[召聚長老作見證|召聚長老]]，使這場就職不是私下的儀節，而是全會眾都近前來、站在耶和華面前的公開事件。==「因為今天耶和華要向你們顯現」==（v4）這一句，把整章繁複的宰殺、抹血、焚燒都收束在一個目的之下：獻祭不是終點，[[耶和華的榮光]]顯現才是終點。摩西在
  v6 再說一次「耶和華的榮光就要向你們顯現」，等於預先宣告了本章結尾必然發生的事——人照吩咐把該做的做完，神照應許把祂自己顯出來。


  祭物分成兩組。亞倫為自己所取的是一隻[[公牛犢]]作[[贖罪祭]]、一隻[[公綿羊]]作[[燔祭（olah）|燔祭]]；為百姓所取的是一隻[[公山羊]]作贖罪祭，一隻[[牛犢]]和一隻一歲的[[綿羊羔]]作燔祭，另有一隻公牛和一隻公綿羊作[[平安祭（shelamim）|平安祭]]，並[[調油的素祭（minchah
  belulah bashemen）|調油的素祭]]。祭司自己的祭簡而重，百姓的祭繁而全——大祭司只需先被潔淨，會眾則要走完贖罪、全獻、共餐的整套關係。


  ### 亞倫先為自己贖罪，再為自己全獻（v7-14）


  摩西的吩咐裡有一個不可跳過的次序：「獻你的贖罪祭和燔祭，[[為自己與百姓贖罪|為自己與百姓贖罪]]，又獻上百姓的供物」（v7）。中保先要自己被潔淨，才有資格為別人站在壇前；他手上若還帶著自己的罪，就不能替人捧上供物。於是[[亞倫宰贖罪祭牛犢|亞倫宰了為自己作贖罪祭的牛犢]]，兒子把[[血]]奉給他，他用指頭蘸血，[[抹血在壇四角、倒血在壇腳|抹在壇的四角上，又把血倒在壇腳那裡]]；[[燒贖罪祭脂油腰子肝網|贖罪祭的脂油、腰子與肝上取的網子]]燒在壇上，[[肉皮燒在營外|肉和皮則帶到營外用火燒]]。這正是贖罪祭條例的實地執行：血歸壇、脂歸火、肉皮歸營外，罪被挪離營中。


  接著[[亞倫獻燔祭公綿羊|亞倫獻上自己的燔祭]]：血灑在壇的周圍，祭牲一塊一塊、連頭遞上焚燒，[[臟腑和腿]]洗淨後也一併燒在壇上的燔祭上。贖罪祭處理罪的問題，燔祭則把已被潔淨的自己整全地獻上——先赦罪、後全獻，這個次序在本章一再重複，先施於祭司，再施於百姓。


  ### 為百姓所獻的四祭（v15-21）


  自己的祭獻完，亞倫才「奉上百姓的供物」。[[為百姓獻贖罪祭公山羊|公山羊的贖罪祭]]「和先獻的一樣」，[[為百姓獻燔祭牛犢綿羊羔|燔祭]]「照例而獻」——經文以極簡的筆法指回前面的條例，說明新任大祭司所行的每一步都不是即興，而是照著已頒的律例。[[為百姓獻素祭|素祭]]時，他從其中取[[一滿掬（melo
  qumtso）|一滿把]]燒在壇上，經文特別注明「這是在[[早晨的燔祭]]以外」：日常的常獻火祭並未因就職大典而中止，新設立的祭司職分是加在既有敬拜節奏之上，而不是取代它。


  最後是[[為百姓獻平安祭公牛公綿羊|百姓的平安祭]]：血灑在壇的周圍，[[脂油]]、[[肥尾巴]]、蓋臟的脂油、[[腰子]]和[[肝上取的網子]]都遞給亞倫燒在壇上；[[胸]]和[[右腿]]由亞倫作[[搖祭（tenufah）|搖祭]]，在耶和華面前搖一搖。平安祭排在末位有其道理——贖罪與全獻在先，共餐與相交在後；人與神同席的喜樂，建立在罪已被處理、生命已被獻上的基礎上。'
