book: 利未記
chapter: 12
candidates:
- name: 產後潔淨（taharah）
  type: 原文
  evidence: 利12:4「婦人在產血不潔之中，要家居三十三天」；CT註解：產後潔淨期表徵通過神的煉淨；BH：purification after childbirth
  surfaces:
  - 產血不潔
- name: 割禮（milah）
  type: 神學
  evidence: 利12:3「第八天，要給嬰孩行割禮」；CT靈意註解：第八天表徵藉著基督復活的生命，割禮表徵靠基督十字架除去肉體情慾(參西二11)；BH：circumcision on the eighth day
  surfaces:
  - 行割禮
- name: 燔祭（olah）
  type: 原文
  evidence: 利12:6「她要把一歲的羊羔為燔祭」；CT註解：燔祭表徵完全為神而活(參羅十二1)；BH：burnt offering = total surrender to God
  surfaces:
  - 燔祭
  - 一歲的羊羔
- name: 贖罪祭（chatat）
  type: 神學
  evidence: 利12:6「一隻雛鴿或是一隻斑鳩為贖罪祭」；CT註解：贖罪祭表徵對付裏面的罪性(參羅七20)；BH：sin offering = atonement for ceremonial uncleanness
  surfaces:
  - 贖罪祭
- name: 月經污穢（niddah）
  type: 原文
  evidence: 利12:2「像在月經污穢的日子不潔淨一樣」；CT原文字義：污穢的、生病、不舒服；BH：menstruation = ceremonial uncleanness
  surfaces:
  - 月經污穢
  - 污穢的時候
- name: 聖物（qodesh）
  type: 原文
  evidence: 利12:4「不可摸聖物」；CT文意註解：聖物指經過分別為聖的聖禮物；BH：holy things = consecrated objects
  surfaces:
  - 聖物
- name: 聖所（miqdash）
  type: 地點
  evidence: 利12:4「也不可進入聖所」；CT文意註解：聖所指經過分別為聖的場所和房屋；BH：sanctuary = holy place
  surfaces:
  - 聖所
  - 會幕門口
- name: 產後潔淨條例
  type: 主題
  evidence: 利12:1-8全章；CT壹內容綱要【婦人產後潔與不潔的條例】三大段；BH：Purification after Childbirth；KC：laws of purification after childbirth
  surfaces:
  - 產後潔淨
  - 潔淨的日子
  - 產後條例
- name: 男女潔淨期差異的屬靈意義
  type: 主題
  evidence: 利12:2-5；CT靈意註解：生男孩七天表徵生命剛強者完全不潔，生女孩十四天表徵生命軟弱者加倍不潔；家居三十三天vs六十六天表徵神的煉淨vs雙倍試煉；話中之光：生女孩日子加倍讓人想起夏娃犯罪(參提前二14)
  surfaces:
  - 生男孩
  - 生女孩
  - 七天
  - 兩個七天
  - 三十三天
  - 六十六天
- name: 割禮的屬靈意義
  type: 主題
  evidence: 利12:3；CT靈意註解：第八天表徵藉著基督復活的生命，割禮表徵靠基督十字架除去肉體情慾(參西二11)；BH：eighth day = new beginnings, covenant fulfillment
  surfaces:
  - 第八天
  - 割禮
- name: 燔祭與贖罪祭的屬靈意義
  type: 主題
  evidence: 利12:6-8；CT靈意註解：燔祭表徵完全為神而活(參羅十二1)，贖罪祭表徵對付裏面的罪性(參羅七20)；話中之光：先獻燔祭後獻贖罪祭，人的不潔因未完全為神活著；BH：burnt offering = total surrender, sin offering = atonement
  surfaces:
  - 雛鴿
  - 斑鳩
- name: 貧窮人的代替獻祭
  type: 主題
  evidence: 利12:8「他的力量若不夠獻一隻羊羔，他就要取兩隻斑鳩或是兩隻雛鴿」；CT文意註解：神體恤貧窮人，使人人都能獻祭；BH：provision for the poor = two turtledoves or two pigeons
  surfaces:
  - 力量若不夠
  - 兩隻斑鳩
  - 兩隻雛鴿
  - 貧窮人
- name: 摩西
  type: 人物
  evidence: 利12:1「耶和華對摩西說」
  surfaces:
  - 摩西
- name: 耶穌
  type: 人物
  evidence: 利12:3-4；CT靈意註解：主耶穌也是依此條例在第八天行割禮(參路二21)；BH：Jesus' circumcision on eighth day (Luke 2:21)
  surfaces:
  - 主耶穌
  - 耶穌
- name: 原罪與生來不潔
  type: 神學
  evidence: 利12:2,5；CT話中之光：婦人產後不潔表徵全人類一出生就是不潔的；『從肉身生的，就是肉身』(約三6)；源頭既不潔，所生的也就不潔
  surfaces:
  - 不潔淨
  - 從肉身生的
- name: 基督的救贖與潔淨
  type: 神學
  evidence: 利12:6-8；CT話中之光：基督的救贖使我們得潔，不僅叫我們罪得赦免，並且叫我們經過死而復活，解決了神人之間的一切問題；燔祭表徵完全為神而活，贖罪祭表徵對付裏面的罪性
  surfaces:
  - 潔淨
  - 贖罪
  - 救贖
- name: 馬利亞的潔淨（路2：22-24）
  type: 互文
  evidence: 利12:6-8；CT文意註解：滿了潔淨的日子...帶到會幕門口交給祭司；BH：Mary's purification (Luke 2:22-24) - offered two turtledoves
  surfaces:
  - 路加福音2章
  - 馬利亞
- name: 夏娃犯罪與女孩潔淨期加倍（提前2：14）
  type: 互文
  evidence: 利12:5；CT話中之光：生女孩日子加倍讓人想起夏娃的犯罪，因為女人先犯罪(參提前二14)
  surfaces:
  - 提摩太前書2章
  - 夏娃
- name: 頒布產後潔淨條例
  type: 事件
  evidence: 利12:1-8全章；CT壹：本章宣示有關婦人產後潔與不潔的條例
  surfaces:
  - 耶和華對摩西說
  - 曉諭以色列人
- name: 古代以色列產後習俗與神學意義
  type: 文化
  evidence: 利12:2-5；CT話中之光：產婦不潔淨的日子是體味罪之痛苦的時間，同時也是仰望耶穌基督的時間；生女孩日子加倍讓人恨惡罪
  surfaces:
  - 產後習俗
  - 家居
