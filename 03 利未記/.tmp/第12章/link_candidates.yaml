book: 利未記
chapter: 12
candidates:
  - name: 摩西
    type: 人物
    evidence: v1「耶和華對摩西說」，本章條例由摩西單獨領受（不同於利11同時對摩西亞倫兩人說話）
  - name: 割禮之約
    type: 神學
    evidence: v3「第八天，要給嬰孩行割禮」；GT 丁良才註：以色列人的嬰孩受割禮，是顯明這嬰孩在神與亞伯拉罕所立的約上有份（創17:13，羅4:11）
  - name: 燔祭（olah）
    type: 原文
    evidence: v6,8「她要把一歲的羊羔為燔祭」；GT 丁良才註：此處燔祭列在贖罪祭前，表示婦人因神的慈悲將自己獻給神
  - name: 贖罪祭
    type: 神學
    evidence: v6,7,8「一隻雛鴿或是一隻斑鳩為贖罪祭」；祭司獻上為她贖罪，她的血源就潔淨了
  - name: 斑鳩
    type: 主題
    evidence: v6,8「一隻雛鴿或是一隻斑鳩為贖罪祭」；力量不夠獻羊羔者可取兩隻斑鳩代替
  - name: 雛鴿
    type: 主題
    evidence: v6,8 與斑鳩並列，貧窮產婦以兩隻雛鴿代替一羊羔一鳥的組合
  - name: 燔祭祭牲的貧富分級
    type: 神學
    evidence: v8「她的力量若不夠獻一隻羊羔，她就要取兩隻斑鳩或是兩隻雛鴿」，與利1、5章按力量分級獻祭同一原則
  - name: 產婦生產潔淨條例（男四十女八十天）
    type: 主題
    evidence: v2-8 全章核心：生男孩不潔七天、家居三十三天共四十天；生女孩不潔兩個七天、家居六十六天共八十天，滿了潔淨的日子獻燔祭與贖罪祭
    surfaces:
      - phrase: 家居三十三天
        verses: [4]
      - phrase: 家居六十六天
        verses: [5]
  - name: 產婦不潔原因之爭（原罪說與血液不潔說）
    type: 解經爭議
    evidence: CT/KC 傾向「婦人產後不潔表徵全人類一出生就是不潔」的原罪讀法；GT《啟導本》明確反駁：此說不能解釋何以獻贖罪祭的是產婦而非新嬰；GT《舊約背景註釋》進一步指出「這裡並沒有需贖之罪，只有在壇上被清除的不潔」，主張贖罪祭實為「潔淨祭」
