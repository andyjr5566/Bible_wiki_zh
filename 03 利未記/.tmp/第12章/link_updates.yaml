book: 利未記
chapter: 12
updates:
- title: 割禮之約
  path: link_folder/神學/割禮之約.md
  summary: 利12:3 「第八天，要給嬰孩行割禮」——割禮夾在產婦潔淨期中間。丁良才指出其實際效果：「第八天那婦人的特別不潔淨就過去了。」他並把意義接回亞伯拉罕之約：「以色列人的嬰孩受割禮，是顯明這嬰孩在神與亞伯拉罕所立的約上有份（創17:13，羅4:11），也是表示這約的成功，是在乎脫去肉體的情慾（西2:10-11，腓3:3，林後5:17）。」並補兩個實例：第八天若是安息日仍要行割禮（約7:22-23）；施洗約翰（路1:59）與主耶穌（路2:21）都在第八天受割禮。《精讀本》另從數字讀：「八是復活的數字（創17:12）……象徵使孩子重新生出來，成為屬神的百姓（西2:11-13）。」KC：「在男孩的割禮上，從屬靈的角度看，這等於承認了這孩子是不潔的。割禮說到基督的死（西2:11）。這孩子是被帶到基督之死的根基上。」
  relation: 本章把立約的記號安置在潔淨期尚未結束之時：不潔的日子還沒過去，約的記號已經先臨到孩子身上。割禮在此既是承認嬰孩生而不潔，也是宣告他在亞伯拉罕之約上有份。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: 利12:6、8 產婦潔淨期滿要把一歲的羊羔為燔祭；力量不夠的可用一隻斑鳩或雛鴿代替。本章燔祭的次序值得注意——丁良才：「在此處燔祭列在贖罪祭前，因為這贖罪祭不是為什麼指定的罪獻的，乃是禮節上的贖罪祭……這潔淨產婦的禮節，是多注重燔祭，少注重贖罪祭，表示那婦人因神的慈悲，將自己獻給神。」KC 同讀：「燔祭排在前面，因此重點在它。」丁良才並指出「所獻的燔祭是照著各人的力量獻的」；馬利亞只獻兩隻鳥（路2:24），「就暗示她的貧窮，是無力獻羊為燔祭的」。
  relation: 本章是燔祭少數排在贖罪祭之前的場合，理由在於此處的贖罪祭只是禮儀性的，重點落在婦人因神的慈悲將自己獻上，而非為某項指定的罪贖罪。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: 利12:6-8 產婦潔淨期滿要獻一隻雛鴿或斑鳩為贖罪祭；祭司獻上為她贖罪，「她的血源就潔淨了」。《舊約聖經背景註釋》在 v7 給了一個關鍵更正：「這一類案例證明舊譯的『贖罪祭』，其實應該是『潔淨祭』（NIV）。這裡並沒有需『贖』之『罪』，只有在壇上被清除的不潔。」丁良才亦指出此處「不是為什麼指定的罪獻的，乃是禮節上的贖罪祭」，且「只用一隻鳥為贖罪祭，與利5:7-10 的條例不同，大概是因為已經有羊羔為燔祭的緣故」。
  relation: 本章的贖罪祭是全卷理解此祭性質的關鍵案例：獻祭者並未犯罪，所除的是儀式上的不潔而非倫理上的罪，因此背景註釋主張此處應譯作「潔淨祭」。
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: 利12:4 「她潔淨的日子未滿，不可摸聖物，也不可進入聖所」；v6 期滿後要把祭牲「帶到會幕門口交給祭司」。《精讀本》提醒此處的「聖所」不必讀得太窄：「不是指有香壇、陳設餅桌以及金燈檯的聖所，乃是指神『分別為聖的場所』。」丁良才指出這禁令涵蓋家居的三十三／六十六天：「其餘家居的功夫，她不可進入會幕或摸什麼聖物，直等到所命定的日期滿足。」
  relation: 聖所在本章是產婦潔淨期的界線所在：不潔期間不得進入，期滿獻祭則在會幕門口完成。親近神必須經過贖罪，不能憑天然的身分闖入。
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 利12:1 「耶和華對摩西說」——本章的產後潔淨條例由摩西單獨領受。丁良才注意到一個對照：利11:1 是「耶和華對摩西、亞倫說」（因為分別潔淨與教導百姓是祭司的本業，參利10:10-11），本章卻只對摩西說。
  relation: 摩西作為神與百姓之間的中保，領受並傳遞這條專為生育婦人設立的條例，使百姓知道潔淨的日子如何計算、期滿當獻何祭。
