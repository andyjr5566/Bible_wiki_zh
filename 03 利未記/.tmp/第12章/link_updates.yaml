"book": "利未記"
"chapter": !!int "12"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」：本章產婦生產潔淨條例由摩西單獨領受，不同於利未記11章同時對摩西亞倫兩人頒布的食物條例。"
  "relation": "本章條例只對摩西一人說，未提亞倫，因產婦潔淨屬個人與家庭層面的條例，不像利未記11章的食物條例需要祭司分辨潔淨與不潔淨教導百姓。"
- "title": "割禮之約"
  "path": "link_folder/神學/割禮之約.md"
  "summary": "v3「第八天，要給嬰孩行割禮」：利未記12章是創世記17章割禮之約在以色列歷史生活中反覆實行的條例化規定。"
  "relation": "GT 丁良才註：以色列人的嬰孩受割禮，是顯明這嬰孩在神與亞伯拉罕所立的約上有份（創17:13，羅4:11），也表示這約的成功在乎脫去肉體的情慾（西2:10-11）；施洗約翰與主耶穌也都在第八天受割禮（路1:59，路2:21）。"
- "title": "燔祭（olah）"
  "path": "link_folder/原文/燔祭（olah）.md"
  "summary": "v6,8 產婦潔淨期滿獻一歲羊羔為燔祭：本章燔祭列在贖罪祭之前，是五祭次序中的特例。"
  "relation": "GT 丁良才註：此處燔祭列在贖罪祭前，因為這贖罪祭不是為指定的罪獻的，乃是禮節上的贖罪祭；這潔淨產婦的禮節多注重燔祭、少注重贖罪祭，表示婦人因神的慈悲將自己獻給神。"
- "title": "贖罪祭"
  "path": "link_folder/神學/贖罪祭.md"
  "summary": "v6-8 產婦潔淨獻一隻雛鴿或斑鳩為贖罪祭：GT《舊約背景註釋》指出此處的「贖罪祭」性質實為「潔淨祭」，並無需贖之罪，只有壇上被清除的不潔。"
  "relation": "與利未記1-7章因指定罪過所獻的贖罪祭不同，本章的贖罪祭是純禮儀性的潔淨程序，反映「贖罪祭」一詞在利未記中兼有「贖罪」與「潔淨」兩種不同情境的用法。"
- "title": "斑鳩"
  "path": "link_folder/主題/斑鳩.md"
  "summary": "v6,8 產婦潔淨期滿的祭物：力量不夠獻羊羔者，可取兩隻斑鳩代替一羊羔一鳥的組合，一為燔祭一為贖罪祭。"
  "relation": "與利未記5章相同，斑鳩是貧窮人替代羊羔的祭物選項；啟導本註：路加福音記載馬利亞的父母因家貧只獻兩隻鳥，說明約瑟當時無力獻羊為祭。"
- "title": "雛鴿"
  "path": "link_folder/主題/雛鴿.md"
  "summary": "v6,8 與斑鳩並列為產婦潔淨的祭物選項：貧窮產婦可用兩隻雛鴿代替一羊羔一鳥的組合。"
  "relation": "與利未記5章相同的替代邏輯，本章雛鴿只用於燔祭與贖罪祭兩項（不像利5另有素祭選項），因產婦條例本身已容許以鳥類全額替代羊羔。"
- "title": "燔祭祭牲的貧富分級"
  "path": "link_folder/神學/燔祭祭牲的貧富分級.md"
  "summary": "v8「她的力量若不夠獻一隻羊羔，她就要取兩隻斑鳩或是兩隻雛鴿」：與利未記1、5章相同的按力量分級獻祭原則，應用於產婦潔淨祭。"
  "relation": "路加福音記載馬利亞只獻兩隻鳥（路2:24），啟導本／GT 丁良才均指出這說明約瑟一家的貧窮，是無力獻羊為祭的具體歷史印證。"
