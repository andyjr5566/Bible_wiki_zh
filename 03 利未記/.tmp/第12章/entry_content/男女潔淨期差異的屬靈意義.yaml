name: 男女潔淨期差異的屬靈意義
type: 主題
secondary_types: []
aliases:
- 生男與生女潔淨期差異
status: formal
definition: 利未記第12章中，生女孩的不潔淨期與家居期均為生男孩的兩倍。此差異常被探討其屬靈意義，可能與夏娃首先犯罪的神學背景相關，凸顯了女性在墮落事件中的角色及其在救贖歷史中的記號。
accumulations:
- book: 利未記
  chapter: 12
  summary: 生男孩不潔淨七天加三十三天，生女孩不潔淨十四天加六十六天。
  relation: 本章經文具體呈現了男女潔淨期長短的差異，引發屬靈層面的探討。
