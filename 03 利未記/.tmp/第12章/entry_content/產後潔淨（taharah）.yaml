status: formal
definition: 希伯來文 taharah 意指潔淨的狀態或過程。在利未記第12章中，生育的婦人需經歷特定的潔淨日子，並透過獻祭完成潔淨的禮儀，使其血源得潔淨，恢復與聖物的接觸。
accumulations:
- book: 利未記
  chapter: 12
  summary: 生育婦人需經歷潔淨的日子，並透過獻祭為她贖罪，她的血源就潔淨了。
  relation: 本章直接規範了產後潔淨的條例與程序。
