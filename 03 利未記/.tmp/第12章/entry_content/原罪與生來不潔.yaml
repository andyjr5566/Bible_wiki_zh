name: 原罪與生來不潔
type: 神學
secondary_types: []
aliases:
- 產血不潔
status: formal
definition: 利未記第12章中產婦的不潔淨與產血相關，神學上常將此生理不潔連結至原罪的屬靈概念。人生來即處於不潔的狀態中，需透過潔淨的條例與贖罪祭來恢復聖潔，凸顯人類傳承罪性的事實。
accumulations:
- book: 利未記
  chapter: 12
  summary: 婦人在產血不潔之中需家居特定天數，並需獻贖罪祭為她贖罪。
  relation: 產血的不潔與贖罪之需，反映了人類生來帶有原罪的不潔本質。
related_entries:
