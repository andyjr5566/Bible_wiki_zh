name: 夏娃犯罪與女孩潔淨期加倍（提前2：14）
type: 互文
secondary_types: []
aliases:
- 夏娃犯罪與潔淨期
status: formal
definition: 提摩太前書2章14節指出女人被引誘陷在罪裡，此神學觀點常被用於解釋利未記第12章中生女孩的潔淨期加倍的原因。夏娃首先犯罪導致女性在生育上承受更深的記號，故生女孩的不潔淨期與家居期均為兩倍。
accumulations:
- book: 利未記
  chapter: 12
  summary: 生女孩的不潔淨期為兩個七天，家居期為六十六天，均為生男孩的兩倍。
  relation: 本章生女孩潔淨期加倍的規定，與夏娃首先犯罪的互文神學遙相呼應。
