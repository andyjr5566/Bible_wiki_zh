name: 貧窮人的代替獻祭
type: 主題
secondary_types: []
aliases:
- 代替獻祭
status: formal
definition: 利未記第12章展現了神對貧窮人的恩典。產婦若力量不夠獻一隻羊羔，可用兩隻斑鳩或兩隻雛鴿代替，一隻為燔祭，一隻為贖罪祭。此規定使窮人也能完成潔淨與贖罪之禮。
accumulations:
- book: 利未記
  chapter: 12
  summary: 產婦力量若不夠獻羊羔，可取兩隻斑鳩或雛鴿代替，祭司為她贖罪，她就潔淨了。
  relation: 體現了潔淨條例中對經濟弱勢者的照顧與屬靈平權。
