name: 基督的救贖與潔淨
type: 神學
secondary_types: []
aliases:
- 救贖與潔淨
status: formal
definition: 利未記第12章的產後潔淨與贖罪祭，預表了基督的救贖工作。產婦需透過祭司獻祭使血源得潔淨，如同信徒需透過基督的寶血贖罪，方能從罪與不潔中得著真正的潔淨與救贖。
accumulations:
- book: 利未記
  chapter: 12
  summary: 祭司獻祭在耶和華面前為產婦贖罪，她的血源就潔淨了。
  relation: 舊約的潔淨與贖罪條例預表了基督終極的救贖與潔淨之工。
related_entries:
