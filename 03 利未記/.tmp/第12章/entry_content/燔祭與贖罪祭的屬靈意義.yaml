name: 燔祭與贖罪祭的屬靈意義
type: 主題
secondary_types: []
aliases:
- 產後獻祭
status: formal
definition: 產婦滿了潔淨日子需獻一歲羊羔為燔祭，雛鴿或斑鳩為贖罪祭。燔祭象徵全然奉獻與神悅納，贖罪祭則為了潔淨產血的不潔並贖罪，使產婦的血源得潔淨，恢復與神的交通。
accumulations:
- book: 利未記
  chapter: 12
  summary: 滿了潔淨日子，產婦要帶羊羔為燔祭，雛鴿或斑鳩為贖罪祭，祭司為她贖罪。
  relation: 獻祭是完成產後潔淨程序的最終步驟，具贖罪與恢復聖潔的意義。
