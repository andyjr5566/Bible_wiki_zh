name: 產後潔淨條例
type: 主題
secondary_types: []
aliases:
- 生育婦人潔淨條例
status: formal
definition: 利未記第12章規定了婦人產後潔淨的條例。生男孩不潔淨七天，第八天給嬰孩行割禮，婦人要家居三十三天；生女孩則不潔淨兩個七天，家居六十六天。滿了潔淨日子需獻燔祭與贖罪祭，若力量不夠可用斑鳩或雛鴿代替。
accumulations:
- book: 利未記
  chapter: 12
  summary: 詳細記載了產婦生男或生女的不潔淨天數、家居期及潔淨後的獻祭要求。
  relation: 本章即為此條例的頒布與完整內容。
