definition: 利未記第12章的條例在新約中應驗於耶穌身上。根據路加福音記載，馬利亞在潔淨的日子滿了後，帶著嬰孩耶穌上聖殿獻祭，應驗了第八天行割禮與產後潔淨獻祭的律法要求。
