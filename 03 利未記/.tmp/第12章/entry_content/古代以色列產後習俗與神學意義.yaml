definition: 利未記第12章反映了古代以色列社會的產後習俗，結合了生理家居休養與宗教聖潔的雙重意義。產婦在產血不潔中需家居特定天數，不可摸聖物或進聖所，滿了日子需獻祭贖罪，體現了身體保健與屬靈潔淨的文化融合。
accumulations:
- book: 利未記
  chapter: 12
  summary: 規範了產後家居天數、不潔淨的狀態及潔淨後的獻祭文化。
  relation: 本章經文具體展現了古代以色列對生育、不潔與聖潔的文化觀念。
