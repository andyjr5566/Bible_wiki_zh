status: formal
definition: 利未記第12章規定生男孩後第八天要給嬰孩行割禮。割禮不僅是肉體的記號，更是神與以色列人立約的屬靈標記，象徵著將肉體的污穢與罪性除去，歸屬於神的聖約子民。
accumulations:
- book: 利未記
  chapter: 12
  summary: 婦人若生男孩，第八天要給嬰孩行割禮。
  relation: 割禮被納入產後潔淨條例的時間表中，顯示其與立約及潔淨的關聯。
