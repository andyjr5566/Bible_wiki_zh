"book": "利未記"
"chapter": !!int "8"
"updates":
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "本章是出29章承接聖職禮的歷史實行：摩西按耶和華吩咐將亞倫和他兒子帶到會幕門口，在全會眾見證下用水洗身、穿聖衣、受膏油與血的三重潔淨，並獻贖罪祭、燔祭、承接聖職之祭（平安祭），歷時七天不可出會幕門（v1-36）。"
  "relation": "出29、40章確立承接聖職禮的規格與正式受膏，利8章是其歷史落實——祭司體系從「神所吩咐的條例」正式轉為「歷史上完成的事件」，為利9章亞倫首次獨立獻祭鋪路。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "亞倫在本章正式受膏就任大祭司：穿上內袍、腰帶、外袍、以弗得、胸牌（內置烏陵土明）、冠冕與金牌後，摩西將膏油倒在他頭上使他成聖（v7-12）；隨後在贖罪祭、燔祭、承接聖職祭中按手、受血抹右耳右手右腳（v14-30）。"
  "relation": "承接出28-29章對亞倫大祭司職分的呼召與聖衣規格，本章是亞倫個人生命史的關鍵轉折——從「被揀選者」正式成為「就職的大祭司」，為利9章他首次以大祭司身分獨立獻祭、利10章拿答亞比戶事件鋪陳背景。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "摩西在本章全程主持承接聖職禮，親自擔任臨時祭司：宰殺祭牲、灑血抹血、焚燒脂油、行搖祭，並取羊胸歸自己的分（v6-30）。CT/GT指出這是因亞倫尚未正式就職，摩西代行祭司職分直到禮成。"
  "relation": "摩西在此章扮演「過渡期祭司」的獨特角色，是他在利未記中最後一次親自執行獻祭儀式的完整記載——自本章禮成後，祭司職分正式移交亞倫父子，摩西回歸立法者與中保的身分。"
- "title": "全會眾（kol ha-edah）"
  "path": "link_folder/人物/全會眾（kol ha-edah）.md"
  "summary": "本章v3-4記載摩西招聚全會眾到會幕門口見證亞倫父子承接聖職，CT指出「為要觀禮以見證他們的任職出於神」；GT補充會幕門口場地有限，實際到場者可能為長老與百姓代表，其餘百姓或輪流觀禮。"
  "relation": "全會眾在此章的角色是祭司職分正式性的公開見證者——祭司體系不是私相授受，而是在全體百姓眼前、依神所吩咐的程序建立，呼應利4章全會眾作為贖罪祭對象的集體性身分。"
- "title": "受膏的祭司（mashiach kohen）"
  "path": "link_folder/人物/受膏的祭司（mashiach kohen）.md"
  "summary": "利8:12「又把膏油倒在亞倫的頭上膏他，使他成聖」，亞倫是唯一在承接聖職禮中受膏油「倒」在頭上者，區別於其子只受膏油與血「彈」在身上衣服上（v30）——受膏程度的差異對應大祭司與眾祭司職分尊卑之別。"
  "relation": "利4章已預告「受膏的祭司」若犯罪需獻公牛犢贖罪祭，本章補上其受膏就職的具體儀式細節，說明「受膏的祭司」一詞所指的正是亞倫在本章所領受的獨特膏抹。"
- "title": "承接聖職（分別為聖）"
  "path": "link_folder/神學/承接聖職（分別為聖）.md"
  "summary": "本章是出29章承接聖職條例的歷史實行全程：水洗（v6）、穿聖衣（v7-9,13）、膏抹（v10-12）、獻贖罪祭燔祭承接聖職祭（v14-30）、七日守在會幕門口（v31-36）。v33,35兩次確認「主叫你們七天承接聖職」。"
  "relation": "出29章訂立承接聖職禮的完整規格，本章是這套規格第一次真實執行的記載——利未記1-7章已備妥獻祭條例，本章證明祭司體系正是建立在這些條例之上，禮成後利9章記亞倫首次獨立盡職。"
- "title": "膏抹成聖"
  "path": "link_folder/神學/膏抹成聖.md"
  "summary": "本章「使他成聖」一詞三次緊扣膏抹動作：v10膏帳幕使其成聖、v11膏壇及器具使其成聖、v12倒膏油在亞倫頭上使他成聖；v30再取膏油與壇上血一同彈在亞倫父子及其衣服上，使人與衣一同成聖。"
  "relation": "出40章記載膏抹成聖是會幕啟用與祭司就職的必要程序，本章是此程序在利未記中的具體重演——膏抹的對象從器物（帳幕、壇、洗濯盆）擴及人（亞倫）與衣服，顯示成聖範圍由物及人的遞進。"
- "title": "山上的樣式"
  "path": "link_folder/神學/山上的樣式.md"
  "summary": "「都是照耶和華所吩咐摩西的」公式在本章重複七次（v9,13,17,21,29,34,36），涵蓋聖衣穿戴、膏抹、三獻祭、七日條例，顯示承接聖職禮的每一細節皆嚴格遵照神在山上所指示、記於出29章的樣式執行，無一處出於人意。"
  "relation": "出25-40章確立「照山上樣式」建造會幕、製作聖衣、訂立承接聖職禮的原則，本章是這原則從出埃及記進入利未記後的首次歷史執行——利未記開卷七章條例已確立獻祭規格，本章證明祭司就職同樣一絲不苟地遵循神的吩咐。"
- "title": "洗身（水洗）"
  "path": "link_folder/神學/洗身（水洗）.md"
  "summary": "利8:6「摩西帶了亞倫和他兒子來，用水洗了他們」，是承接聖職禮的第一步；v21燔祭牲的臟腑和腿也須先用水洗過才獻上壇。"
  "relation": "出29章訂立水洗為祭司就職前的潔淨儀式，本章是其歷史實行——水洗與穿聖衣、受膏共同構成祭司分別為聖的三重預備，先潔淨己身，才能承受聖職。"
- "title": "聖衣（祭司聖服）"
  "path": "link_folder/主題/聖衣（祭司聖服）.md"
  "summary": "本章詳記亞倫穿戴聖衣全過程：內袍、腰帶、外袍、以弗得、胸牌（內置烏陵土明）、冠冕與金牌共七件（v7-9）；亞倫兒子則穿內袍、腰帶、裹頭巾三件（v13）。GT《聖經精讀本》將各件對應基督屬性：內袍表人性、外袍表神性、以弗得表榮耀、胸牌表恩典公義、冠冕表順服權柄。"
  "relation": "出29、39章確立聖衣的規格與製作，本章是聖衣首次被實際穿在亞倫父子身上、正式投入使用的歷史記載，聖衣的靈意預表在此章從「已造之物」轉為「正在穿戴、正在事奉」的活生生表號。"
- "title": "以弗得"
  "path": "link_folder/原文/以弗得.md"
  "summary": "利8:7「又加上以弗得，用其上巧工織的帶子把以弗得繫在他身上」，是亞倫聖衣穿戴次序中的第四件，穿在外袍之外。"
  "relation": "出28章詳述以弗得的製作規格與屬靈意義（表徵掛心教會的事），本章是以弗得首次被實際繫在大祭司身上的歷史時刻。"
- "title": "胸牌（決斷胸牌）"
  "path": "link_folder/原文/胸牌（決斷胸牌）.md"
  "summary": "利8:8「又給他戴上胸牌，把烏陵和土明放在胸牌內」，胸牌是亞倫聖衣中安放烏陵土明、用以求問神旨意的器物，戴於以弗得之上。"
  "relation": "出28章規定胸牌須內置烏陵土明並繫於以弗得，本章是這規定的歷史實行——大祭司自此章起正式配戴胸牌，承擔為百姓求問神旨意的職責。"
- "title": "烏陵和土明"
  "path": "link_folder/原文/烏陵和土明.md"
  "summary": "利8:8「把烏陵和土明放在胸牌內」，是亞倫就職禮中安放入決斷胸牌的關鍵器物，用以在日後為以色列人求問神的旨意。"
  "relation": "出28章首次規定烏陵土明須置於胸牌內，本章記載這規定的實際執行——烏陵土明自此隨大祭司胸牌一同就位，成為以色列人求問神旨意的合法管道。"
- "title": "冠冕（裹頭巾）"
  "path": "link_folder/原文/冠冕（裹頭巾）.md"
  "summary": "利8:9「把冠冕戴在他頭上，在冠冕的前面釘上金牌，就是聖冠」，是亞倫聖衣的最後一件；v13亞倫兒子則只包裹頭巾，前面沒有金牌，以此區別大祭司與眾祭司的身分。"
  "relation": "出28、39章規定冠冕（大祭司）與裹頭巾（眾祭司）的差異，本章是這差異首次在歷史場景中具體呈現——同樣的頭部覆蓋物，因是否釘金牌而區分出大祭司與眾祭司的職分等級。"
- "title": "內袍（雜色內袍）"
  "path": "link_folder/主題/內袍（雜色內袍）.md"
  "summary": "利8:7「給亞倫穿上內袍」；v13「給他們（亞倫兒子）穿上內袍」，內袍是大祭司與眾祭司共同的第一件貼身聖衣。"
  "relation": "出28、39章規定內袍為祭司共同的基本聖衣，本章顯示無論大祭司或眾祭司，就職禮都以穿內袍為起始步驟，象徵祭司職分內在生命的純潔為先。"
- "title": "外袍（以弗得的外袍）"
  "path": "link_folder/主題/外袍（以弗得的外袍）.md"
  "summary": "利8:7「穿上外袍，又加上以弗得」，外袍是大祭司獨有的聖衣，穿在內袍之外、以弗得之下，亞倫兒子的聖衣清單中並無外袍。"
  "relation": "出28、39章規定外袍為大祭司專屬服飾，本章的穿戴次序（內袍→腰帶→外袍→以弗得）確認外袍在整套聖衣中的位置與獨屬大祭司的地位。"
- "title": "腰帶（繡花腰帶）"
  "path": "link_folder/主題/腰帶（繡花腰帶）.md"
  "summary": "利8:7「束上腰帶」；v13「束上腰帶」，腰帶是大祭司與眾祭司共同穿戴的聖衣之一，用以束緊內袍。"
  "relation": "出28、39章規定腰帶為祭司共同聖衣，本章顯示腰帶與內袍一同構成祭司聖衣的基礎組合，不分大祭司或眾祭司皆須束上。"
- "title": "牌子（冠冕牌）"
  "path": "link_folder/原文/牌子（冠冕牌）.md"
  "summary": "利8:9「在冠冕的前面釘上金牌，就是聖冠」，是唯獨大祭司冠冕上才有的飾物，亞倫兒子的裹頭巾則無此金牌（v13）。"
  "relation": "出28、39章規定金牌須刻「歸耶和華為聖」並繫於冠冕前，本章確認金牌是區分大祭司與眾祭司頭飾的關鍵標記，唯亞倫的冠冕才配戴。"
- "title": "膏油（聖膏油）"
  "path": "link_folder/原文/膏油（聖膏油）.md"
  "summary": "本章膏油多次出現：v2帶來膏油、v10膏帳幕、v11膏壇並彈油七次、v12倒在亞倫頭上、v30取膏油與血一同彈在亞倫父子及衣服上——涵蓋物與人的全面膏抹。"
  "relation": "出29、30章規定膏油的配方與用途，本章是膏油首次在歷史敘事中被實際使用於帳幕、器具與人身上的完整記載，膏油與血的結合（v30）顯示成聖同時需要聖靈（膏油）與贖罪（血）兩方面。"
- "title": "洗濯盆（銅盆）"
  "path": "link_folder/主題/洗濯盆（銅盆）.md"
  "summary": "利8:11「並洗濯盆和盆座，使他成聖」，洗濯盆與盆座僅需抹膏油便可成聖，不同於燔祭壇需另外彈油七次。"
  "relation": "出30章規定洗濯盆供祭司洗手洗腳之用，本章記載洗濯盆與其他會幕器具一同受膏成聖，正式進入使用狀態，供日後祭司供職前潔淨之用。"
- "title": "銅壇（燔祭壇）"
  "path": "link_folder/主題/銅壇（燔祭壇）.md"
  "summary": "本章燔祭壇是全部獻祭儀式的中心：v11膏油彈壇七次並抹壇成聖，v15抹血於壇角使壇潔淨成聖，其後三獻祭的脂油、腰子、肝網、全羊皆焚燒於壇上（v16-28）。"
  "relation": "出27章規定燔祭壇的建造規格，出29章訂立膏壇彈油七次的條例，本章是壇首次在歷史場景中受膏成聖、並開始承接獻祭的記載，確立壇作為承接聖職禮唯一焚祭之處的地位。"
- "title": "按手（samak）"
  "path": "link_folder/原文/按手（samak）.md"
  "summary": "利8:14,18,22「亞倫和他兒子按手在……頭上」三次出現，分別於贖罪祭公牛、燔祭公綿羊、承接聖職公綿羊的頭上，表徵祭司與祭牲聯合，藉此代替他們流血贖罪、全然奉獻。"
  "relation": "利1-4章已確立按手為獻祭者與祭牲聯合的儀式，本章特別之處在於按手者是亞倫父子自己（為自身贖罪與奉獻），而非為他人代獻，顯示祭司蒙召前先須自己經歷按手認同的贖罪與奉獻。"
- "title": "贖罪祭"
  "path": "link_folder/神學/贖罪祭.md"
  "summary": "利8:14-17亞倫父子按手在贖罪祭公牛頭上，摩西宰牛、抹血於壇角、倒血於壇腳使壇成聖，脂油腰子肝網焚於壇上，皮肉糞則燒在營外——這是為祭司自身潔淨所獻的贖罪祭，非為特定罪過。"
  "relation": "利4章確立贖罪祭條例，本章是首次為「祭司承接聖職」而非「已犯之罪」所獻的贖罪祭，顯示贖罪祭不僅用於贖罪，也用於分別為聖的預備性潔淨，壇因此血而成聖（v15）。"
- "title": "燔祭（olah）"
  "path": "link_folder/原文/燔祭（olah）.md"
  "summary": "利8:18-21亞倫父子按手於燔祭公綿羊頭上，摩西宰羊、灑血於壇周圍，全羊（連頭帶脂油，洗淨臟腑腿）焚燒於壇上為馨香的燔祭，是獻給耶和華的火祭。"
  "relation": "利1章確立燔祭全然焚燒、表徵完全奉獻的條例，本章亞倫父子親身經歷此祭——按手於燔祭牲頭上，等於將自己全然奉獻歸神，是承接聖職三祭中表明「成聖」意義的一環。"
- "title": "脂油（chelev）"
  "path": "link_folder/原文/脂油（chelev）.md"
  "summary": "本章脂油三次獻上壇：v16贖罪祭公牛的脂油、v20燔祭公綿羊的脂油、v25-28承接聖職公綿羊的脂油（與肥尾巴、肝網、腰子、右腿及三樣無酵餅一同作搖祭後焚壇）。"
  "relation": "利3-4章確立脂油為祭牲中歸神享用的上好部分，本章在三種獻祭中均遵此例，顯示脂油焚壇的規則不因獻祭場合（就職禮或日常獻祭）而改變。"
- "title": "肝上的網子（yoteret ha-kaved）"
  "path": "link_folder/原文/肝上的網子（yoteret ha-kaved）.md"
  "summary": "利8:16,25「肝上的網子」兩次出現，分別於贖罪祭公牛（v16）與承接聖職公綿羊（v25）中，與脂油、腰子一同焚燒於壇上。"
  "relation": "利3-4章確立肝上的網子為獻祭時焚壇脂油的一部分，本章重申此細節在祭司承接聖職所獻的贖罪祭與承接聖職祭中同樣適用。"
- "title": "腰子（kilyah）"
  "path": "link_folder/原文/腰子（kilyah）.md"
  "summary": "利8:16,25「兩個腰子與腰子上的脂油」兩次出現，分別於贖罪祭與承接聖職祭中，與脂油、肝網一同焚燒於壇上，雖非脂油本身，仍歸神享用。"
  "relation": "利3-4章確立腰子隨脂油一同焚壇的條例，本章顯示這規則同樣適用於祭司自身承接聖職所獻的祭，不因獻祭對象是祭司本人而有例外。"
- "title": "皮肉頭腿臟腑糞（or basar rosh regel qereb pereq）"
  "path": "link_folder/主題/皮肉頭腿臟腑糞（or basar rosh regel qereb pereq）.md"
  "summary": "利8:17「惟有公牛，連皮帶肉並糞，用火燒在營外」，因這贖罪祭是為祭司自身所獻，祭司不能像替百姓獻贖罪祭那樣吃祭牲的肉，故連皮帶肉並糞都須用火燒在營外。"
  "relation": "利4:11-12確立為受膏祭司或全會眾所獻贖罪祭的祭牲須連皮帶肉並糞全數燒在營外，本章亞倫父子自身的贖罪祭同樣適用此例，顯示祭司自己所獻的贖罪祭與利4章條例完全一致。"
- "title": "營外焚燒（machutz la-machaneh saraf）"
  "path": "link_folder/主題/營外焚燒（machutz la-machaneh saraf）.md"
  "summary": "利8:17「用火燒在營外」，贖罪祭公牛的皮、肉、糞因祭司不得食用自己所獻的贖罪祭肉，須燒在潔淨的營外之地，而非壇上。"
  "relation": "利4章確立贖罪祭牲部分部位須營外焚燒以徹底除去罪污，本章是這規則首次應用於祭司自身承接聖職所獻的祭，象徵祭司自己的罪也須被徹底除淨方能承接聖職。"
- "title": "灑血（zaraq）"
  "path": "link_folder/主題/灑血（zaraq）.md"
  "summary": "利8:19,24「摩西把血灑在壇的周圍」兩次出現，分別於燔祭公綿羊（v19）與承接聖職公綿羊餘血（v24）中，將血投擲潑灑於壇的四周。"
  "relation": "利1、3章確立燔祭與平安祭牲的血須灑在壇周圍的條例，本章確認此規則同樣適用於祭司承接聖職所獻的燔祭與承接聖職祭（平安祭的特殊形式）。"
- "title": "火祭（isheh）"
  "path": "link_folder/主題/火祭（isheh）.md"
  "summary": "利8:21,28「是獻給耶和華的火祭」「都是為承接聖職獻給耶和華馨香的火祭」，凡在獻祭中把全部或一部分供物燒在壇上的，皆稱為火祭。"
  "relation": "利1、3章界定凡經火焚燒獻上的祭物皆稱火祭，本章的燔祭與承接聖職祭同樣冠以「火祭」之名，確認此術語適用範圍及於祭司承接聖職所獻的各祭。"
- "title": "馨香之氣"
  "path": "link_folder/神學/馨香之氣.md"
  "summary": "利8:21,28「為馨香的燔祭」「馨香的火祭」，燔祭與承接聖職祭焚燒後所發出的香氣蒙神悅納，令神心滿意足。"
  "relation": "利1章確立馨香之氣表徵神人相安、蒙神悅納的核心意象，本章亞倫父子承接聖職所獻的祭同樣以馨香之氣蒙神悅納作結，顯示這不僅是日常獻祭的果效，也是祭司就職蒙神接納的印證。"
- "title": "肥尾巴（alyah）"
  "path": "link_folder/原文/肥尾巴（alyah）.md"
  "summary": "利8:25「取脂油和肥尾巴」，肥尾巴與臟上一切脂油、肝網、腰子、右腿一同構成承接聖職祭中歸神焚壇的上好部分。"
  "relation": "利3、7章確立肥尾巴屬平安祭牲上好部分、須焚於壇上，本章承接聖職祭（平安祭之特殊形式）同樣列入肥尾巴，確認此條例的一貫適用。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "利8:22-29第二隻公綿羊稱為「承接聖職之禮的羊」，屬平安祭的特殊形式：按手、宰殺、血抹亞倫父子右耳右手右腳並灑壇周圍、脂油與三樣無酵餅作搖祭後焚壇、羊胸作搖祭歸摩西。"
  "relation": "利3、7章確立平安祭一般條例（血灑壇周圍、脂油焚壇、胸歸祭司），本章的承接聖職祭是平安祭的特殊變體——血額外抹於祭司身體三處、胸不歸眾祭司而歸主持禮儀的摩西，顯示同一祭類可因場合而有特殊細節調整。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "利8:27,29「把這一切放在亞倫的手上和他兒子的手上作搖祭」「摩西拿羊的胸作為搖祭」，搖祭是將祭物按水平方向前後擺動於耶和華面前的儀式動作。"
  "relation": "利7章確立搖祭為平安祭中胸的處理方式，本章承接聖職祭的搖祭範圍更廣——不僅胸，連同脂油、右腿、三樣無酵餅都一同放在亞倫父子手中作搖祭，象徵充滿雙手、全然獻上的授職語意。"
- "title": "至聖的供物（聖與至聖之分）"
  "path": "link_folder/主題/至聖的供物（聖與至聖之分）.md"
  "summary": "利8:31-32摩西吩咐亞倫父子將肉煮在會幕門口、只在該處吃、又吃承接聖職筐子裡的餅，剩下的肉和餅必須用火焚燒，不可帶出或留到隔日。"
  "relation": "利2、6、7章確立「至聖」供物僅限祭司在會幕院內食用、不可攙酵、剩餘須焚燒的條例，本章承接聖職祭的肉與餅同樣依此至聖等級處理，顯示承接聖職禮所獻的祭物與日常獻祭享有同等的聖別規格。"
- "title": "出29：20"
  "path": "link_folder/互文/出29：20.md"
  "summary": "利8:23-24「摩西把些血抹在亞倫的右耳垂上和右手的大拇指上，並右腳的大拇指上」，是出29:20命令的歷史實行——血抹三處表徵祭司今後專一聽從神的話、作神的工、行神的道。"
  "relation": "出29:20首次頒佈血抹右耳右手右腳的命令，並與出21:6穿耳儀式呼應（皆以身體部位表歸屬）；利8:23-24是這命令第一次被實際執行的歷史記載，完成從「條例」到「事件」的閉環。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "本章會幕門口是整個承接聖職禮的場景中心：v3招聚會眾、v4會眾聚集、v31亞倫父子在此煮肉吃祭物、v33,35七天晝夜住在此處不可離開，直到承接聖職的日子滿了。"
  "relation": "利1章起會幕門口已是獻祭者奉上供物之處，本章擴大其功能——不僅是獻祭地點，更成為祭司七日禁足、與神百姓共同見證就職禮的核心場域，顯示會幕門口在祭司體系建立過程中承載的雙重意義。"
