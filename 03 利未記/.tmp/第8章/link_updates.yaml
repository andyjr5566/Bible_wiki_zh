book: 利未記
chapter: 8
updates:
- title: 以弗得
  path: link_folder/原文/以弗得.md
  summary: 利8:7 亞倫穿上以弗得，用巧工織的帶子繫在身上。以弗得是大祭司聖衣中最特出的一件，用金線和藍色、紫色、朱紅色線並撚的細麻織成（出28:6）。肩帶上鑲有刻著以色列十二支派名字的紅瑪瑙，表徵大祭司在神面前肩負百姓（出28:9-12）。CT：以弗得表徵基督的榮耀；KC：以弗得是大祭司最美麗的衣服，象徵基督的榮耀。
  relation: 利8章記載亞倫承接聖職時穿戴以弗得，實現出28-29章的吩咐。以弗得預表基督作大祭司肩負教會（來4:14-16）。
- title: 胸牌（決斷胸牌）
  path: link_folder/原文/胸牌（決斷胸牌）.md
  summary: 利8:8 摩西給亞倫戴上胸牌，把烏陵和土明放在胸牌內。胸牌是長寬一掌的正四方形，鑲嵌十二塊寶石代表十二支派（出28:15-21）。烏陵和土明（意為「光明與完全」）放在胸牌內，用以求問神的旨意（出28:30；民27:21）。CT：胸牌表徵基督的恩典和公義；烏陵土明象徵真理和公義。KC：胸牌預表基督胸懷眾信徒。
  relation: 利8章承接聖職禮中穿戴胸牌，實現出28章吩咐。胸牌預表基督作大祭司將信徒時刻帶在神面前（來7:25）。
- title: 烏陵和土明
  path: link_folder/原文/烏陵和土明.md
  summary: 利8:8 摩西把烏陵和土明放在胸牌內。烏陵（Urim，意「光」）和土明（Thummim，意「完全」）是放在大祭司胸牌中的兩樣物件，用以求問神的旨意（出28:30；撒上28:6）。其確切形狀和用法聖經未詳述，傳統認為可能是兩塊石頭或標記，以抽籤方式顯示神的旨意。GT：烏陵土明不像其他占卜方法有不良含義；古代近東廣泛使用是非題方式求問神諭。CT：烏陵土明表徵聖靈在信徒心中使人明白神旨意（弗1:17-18）。
  relation: 利8章承接聖職禮將烏陵土明置入胸牌，完成出28:30的吩咐。預表基督賜下聖靈引導教會（約16:13；約壹2:20,27）。
- title: 聖膏油
  path: link_folder/原文/聖膏油.md
  summary: 利8:10-12,30 摩西用膏油抹帳幕和其中所有器具使成聖（v10）；在壇上彈七次抹壇和器皿、洗濯盆使成聖（v11）；倒在亞倫頭上膏他使成聖（v12）；取膏油和壇上的血彈在亞倫和他兒子並他們衣服上使成聖（v30）。膏油配方見出30:22-25（沒藥、肉桂、香蔗、桂皮、橄欖油）。CT：膏油表徵聖靈；倒在頭上表徵聖靈豐滿澆灌（詩133:2；多3:6）。KC：膏油預表聖靈的能力。
  relation: 利8章膏油用於帳幕、壇、洗濯盆、亞倫頭上、亞倫和兒子衣服上，完成出30:26-30、40:9-15的吩咐。預表基督受聖膏（路4:18；徒10:38）及信徒受聖靈膏抹（約壹2:20,27；林後1:21）。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: 利8章全章核心：亞倫和他兒子（拿答、亞比戶、以利亞撒、以他瑪，出6:23）承接聖職——洗濯（v6）、穿聖衣（v7-9,13）、受膏（v12,30）、按手獻贖罪祭（v14）、燔祭（v18）、承接聖職禮（v22-29）、七天住會幕門口（v33-35）。CT：祭司要經過三重潔淨：水、血、膏油（約壹5:8）。KC：亞倫預表基督作大祭司；眾祭司預表信徒祭司職分（彼前2:9）。
  relation: 利8章是利未記祭司職分建立的關鍵章，實現出28-29章、40:12-15的吩咐。亞倫系祭司預表基督永遠的祭司職分（來7:17,24）和信徒作祭司（彼前2:9；啟1:6）。
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 利8章摩西擔任主禮者執行神吩咐：帶亞倫和兒子來（v4,6,13）、洗濯（v6）、穿聖衣（v7-9,13）、抹膏油（v10-12）、獻贖罪祭（v14-17）、燔祭（v18-21）、承接聖職禮（v22-29）、彈膏油血（v30）、吩咐煮肉吃（v31-32）、七天住會幕（v33-36）。CT：摩西此次擔任祭司角色，得搖胸為分（v29）。KC：摩西作僕人在神家忠心（來3:5），預表基督作兒子治理神家（來3:6）。
  relation: 利8章摩西臨時行祭司職分為亞倫系祭司承接聖職，預表基督建立新約祭司體系。摩西順服「照耶和華所吩咐的行了」（v4,9,13,17,21,29,34,36）成為榜樣。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: 利8:18-21 燔祭公綿羊：亞倫和兒子按手（v18）、摩西宰殺灑血壇周圍（v19）、切塊洗臟腑腿全燒（v20-21）、為馨香的火祭獻給耶和華。燔祭（olah，意「上升」）表徵完全奉獻給神。CT：全羊燒在壇上表徵基督完全奉獻給神。KC：燔祭說明基督對神完全的獻上（弗5:2）。
  relation: 利8章燔祭是承接聖職禮的第二祭（先贖罪祭後燔祭），表徵祭司稱義後完全奉獻。預表基督一次獻上自己為馨香的祭（來10:10；弗5:2）。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: 利8:14-17 贖罪祭公牛：亞倫和兒子按手在公牛頭上（v14）、摩西宰殺、用指頭蘸血抹壇四角使壇潔淨、倒血在壇腳使壇成聖（v15）、取脂油燒在壇上（v16）、公牛連皮帶肉並糞燒在營外（v17）。CT：贖罪祭表徵基督在營外受苦（來13:11-13）。KC：營外焚燒說明基督在城門外受苦。
  relation: 利8章贖罪祭是承接聖職禮的第一祭，為祭司自己贖罪（來7:27）。預表基督為百姓和自己獻上贖罪祭（來9:12,26）。
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: 利8:22-29 承接聖職之禮的羊（第二隻公綿羊）：亞倫和兒子按手（v22）、摩西宰殺、抹血在右耳垂/右手大拇指/右腳大拇指（v23-24）、取脂油+右腿+無酵餅放在手上作搖祭（v25-27）、摩西取下燒在燔祭上為馨香火祭（v28）、摩西拿羊胸作搖祭歸摩西為分（v29）。CT：承接聖職禮表徵基督完全奉獻；搖胸歸摩西表徵摩西此次擔任祭司角色。KC：搖祭說明基督獻給神超過一切。
  relation: 利8章承接聖職禮屬平安祭性質（shelamim），是第三祭（贖罪祭→燔祭→平安祭），表徵與神相交。預表基督使信徒與神和好（羅5:1；西1:20）。
- title: 血
  path: link_folder/神學/血.md
  summary: 利8章血的應用：贖罪祭血抹壇四角、倒壇腳潔淨成聖壇（v15）；燔祭血灑壇周圍（v19）；承接聖職禮羊血抹亞倫和兒子右耳垂/右手大拇指/右腳大拇指（v23-24）、灑壇周圍（v24）；膏油和血彈在亞倫兒子和衣服上（v30）。CT：血表徵基督寶血潔淨功效；右耳/手/腳表徵聽從神話、事奉神工、行走神路。KC：血在耳/拇指/腳趾說明全人獻給神。
  relation: 利8章展示血在祭司承接聖職中的多重功用：潔淨壇、分別人、成聖衣服。預表基督寶血一次成就永遠贖罪（來9:12；10:19-22）。
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: 利8:16,25-26 脂油在承接聖職禮中的用法：贖罪祭取臟上脂油、肝網子、腰子及其脂油燒在壇上（v16）；承接聖職禮取脂油、肥尾巴、臟上脂油、肝網子、腰子、右腿，配無酵餅/油餅/薄餅放在手上作搖祭（v25-26）。脂油（chelev）代表祭牲最好的部分，歸神為火祭（利3:16）。CT：脂油表徵將最好的獻給神。KC：脂油說明基督將自己最好的獻給神。
  relation: 利8章脂油在贖罪祭和承接聖職禮中都獻在壇上，表徵祭司職分要求將最好的獻給神。預表基督完全無瑕的獻上（來9:14）。
- title: 無酵餅
  path: link_folder/原文/無酵餅.md
  summary: 利8:2,26,31-32 無酵餅在承接聖職禮中：一筐無酵餅預備（v2）；從筐子取無酵餅、油餅、薄餅放在脂油和右腿上作搖祭（v26）；亞倫和兒子在會幕門口吃承接聖職筐子裡的餅（v31）；剩下的肉和餅用火焚燒（v32）。無酵餅（matzah）象徵純潔、無罪（林前5:7-8）。CT：無酵餅表徵基督無罪的人性；油餅表徵聖靈膏抹；薄餅表徵基督受苦。
  relation: 利8章無酵餅配搭承接聖職禮的搖祭與祭司食用，預表信徒以基督為生命糧（約6:35,51）並在神面前享受交通。
- title: 馨香（reach nichoach）
  path: link_folder/原文/馨香（reach nichoach）.md
  summary: 利8:21,28 馨香（reach nichoach，意「安息的香氣」）：全羊燒在壇上為馨香的燔祭（v21）；承接聖職獻給耶和華馨香的火祭（v28）。馨香表徵神悅納祭物（創8:21；弗5:2）。CT：馨香表徵基督獻上自己為神所悅納的香氣。KC：馨香火祭預表基督完全討神喜悅的獻上。
  relation: 利8章兩次提到馨香，分別在燔祭和承接聖職禮中，顯示祭司承接聖職的獻祭都蒙神悅納。預表基督一次獻上自己為馨香的祭（弗5:2）。
- title: 火祭（isheh）
  path: link_folder/原文/火祭（isheh）.md
  summary: 利8:21,28 火祭（isheh，意「火獻祭」）：燔祭為獻給耶和華的火祭（v21）；承接聖職獻給耶和華馨香的火祭（v28）。火祭指被火燒盡獻給神的祭物。CT：火祭表徵經過神審判之火的獻祭。KC：火祭說明基督經歷神審判的火。
  relation: 利8章火祭出現在燔祭和承接聖職禮，顯示祭司職分建立在經過火（審判）的獻祭基礎上。預表基督在十字架經歷神審判之火（來12:29）。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: 利8:11,15,16,20,21,24,28 銅壇在承接聖職禮中的角色：膏油彈七次抹壇和器皿成聖（v11）；贖罪祭血抹四角、倒壇腳使壇潔淨成聖（v15）；贖罪祭脂油燒在壇上（v16）；燔祭切塊燒在壇上（v20-21）；承接聖職禮血灑壇周圍（v24）；搖祭燒在壇上燔祭上（v28）。CT：銅壇表徵基督十字架；壇成聖預表基督十字架成聖信徒。
  relation: 利8章銅壇是承接聖職禮的核心場所，所有血和祭物都在壇上處理。預表基督十字架是信徒事奉神的根基（來13:10-13）。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 利8:3-4,10,31,33,35 會幕在承接聖職禮中：會眾聚集會幕門口觀禮（v3-4）；膏油抹帳幕和其中所有使成聖（v10）；煮肉在會幕門口吃（v31）；七天不可出會幕門（v33,35）。CT：會幕表徵教會；會幕門口表徵在神面前的交通。
  relation: 利8章會幕是承接聖職禮的舞台，從門口到聖所，見證祭司職分建立。預表基督進入天上真會幕（來9:11-12）和教會作神的殿（弗2:21-22）。
- title: 按手（samak）
  path: link_folder/原文/按手（samak）.md
  summary: 利8:14,18,22 按手（samak）在承接聖職禮中三次出現：贖罪祭公牛頭上（v14）、燔祭公綿羊頭上（v18）、承接聖職禮羊頭上（v22）。按手表徵認同、轉移、委身。CT：按手表徵聯合與替代；亞倫和兒子按手將罪轉移到祭牲。KC：按手說明與祭牲認同。
  relation: 利8章三次按手對應三祭（贖罪→燔祭→平安祭），展示祭司承接聖職的完整過程：稱義→成聖→交通。預表信徒與基督聯合（羅6:3-5）。
- title: 耶和華曉諭摩西（利6：1）
  path: link_folder/事件/耶和華曉諭摩西（利6：1）.md
  summary: 利8:1 「耶和華曉諭摩西說」——全章啟示的起頭。利未記第8章記載神吩咐摩西執行亞倫和他兒子承接聖職的禮儀，實現出埃及記28-29章、40章的吩咐。這是神主動啟示建立祭司體系的權威基礎。
  relation: 利8:1 承接利6:1的啟示模式，開啟祭司職分建立的敘事單元（利8-10章）。神的話語是祭司職分合法性的唯一來源。
- title: 公綿羊
  path: link_folder/文化/公綿羊.md
  summary: 利8:2,18,22 兩隻公綿羊（ayil）在承接聖職禮中：一隻為燔祭（v18-21）、一隻為承接聖職之禮/平安祭（v22-29）。公綿羊象徵力量、順服、代贖（創22:13）。CT：公綿羊預表基督作神的羔羊（約1:29）。KC：公綿羊說明基督的力量和順服。
  relation: 利8章兩隻公綿羊分別對應燔祭（完全奉獻）和平安祭（交通相交），展示祭司職分的雙重基礎。預表基督一次獻上成就雙重功效（來10:10,14）。
- title: 細麵
  path: link_folder/原文/細麵.md
  summary: 利8:2,26 細麵（solet）在承接聖職禮中：一筐無酵餅（細麵製作，v2）；搖祭中使用無酵餅、油餅、薄餅（v26）。細麵是精細研磨的麵，象徵基督純潔無瑕的人性（約6:35）。CT：細麵表徵基督的人性；油餅表徵聖靈膏抹；薄餅表徵基督受苦。
  relation: 利8章細麵製成的無酵餅配搭承接聖職禮的搖祭，預表信徒以基督純潔人性為糧（約6:51,55）。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: 利8:34 「像今天所行的都是耶和華吩咐行的，為你們贖罪。」贖罪（kipper，意「遮蓋、贖回」）是承接聖職禮的核心目的。整章三祭（贖罪祭、燔祭、平安祭）最終指向為祭司和百姓贖罪。CT：贖罪表徵基督寶血遮蓋罪孽。KC：贖罪說明基督在十字架上成就的救贖。
  relation: 利8章以贖罪為目標（v34），祭司承接聖職是為了能為百姓贖罪（利9-10章）。預表基督作大祭司一次獻上自己成就永遠贖罪（來9:12,26）。
- title: 聖衣（祭司聖服）
  path: link_folder/主題/聖衣（祭司聖服）.md
  summary: 利8:7-9,13 聖衣在承接聖職禮中：亞倫穿內袍、束腰帶、穿外袍、加以弗得、戴胸牌（放烏陵土明）、戴冠冕（釘金牌聖冠）（v7-9）；亞倫兒子穿內袍、束腰帶、包裹頭巾（v13）。大祭司七件聖衣：內袍、腰帶、外袍、以弗得、胸牌、冠冕、金牌（出28）。CT：聖衣七件表徵基督榮耀華美的職分；內袍表徵內裡純潔；腰帶表徵謙卑束腰；外袍表徵披戴基督；以弗得表徵掛心教會；胸牌表徵愛心關懷；冠冕表徵高舉基督；金牌表徵歸神為聖。
  relation: 利8章聖衣穿戴實現出28章吩咐，祭司職分必須穿聖衣才能事奉（出28:43）。預表信徒披戴基督（羅13:14；加3:27）並在基督裡得著祭司身分。
- title: 冠冕（裹頭巾）
  path: link_folder/原文/冠冕（裹頭巾）.md
  summary: 利8:9,13 冠冕/裹頭巾在承接聖職禮中：亞倫戴冠冕，前面釘金牌聖冠（v9）；亞倫兒子包裹頭巾（v13）。冠冕（mitsnephet）是大祭司用細麻布包成的頭巾，前繫藍細帶子繫刻「歸耶和華為聖」的金牌（出28:36-38）。普通祭司穿裹頭巾（migba'ah），無金牌。CT：冠冕表徵高舉教會的頭基督（弗5:23）；金牌表徵歸神為聖（彼前3:15）。
  relation: 利8章大祭司冠冕與普通祭司裹頭巾的區別，顯示職分等級。預表基督作大祭司榮耀冠冕（來2:9）和信徒將得榮耀冠冕（彼前5:4）。
- title: 洗濯盆（銅盆）
  path: link_folder/主題/洗濯盆（銅盆）.md
  summary: 利8:6,11 洗濯盆在承接聖職禮中：摩西帶亞倫和兒子用水洗了他們（在洗濯盆處，v6）；膏油抹洗濯盆和盆座使成聖（v11）。洗濯盆用銅製成（出30:18；38:8），置於會幕和壇中間，祭司供職前必須洗手洗腳免得死亡（出30:19-21）。CT：洗濯盆表徵話中之水的洗淨（弗5:26）；銅表徵審判。KC：洗濯盆代表神的話，也是鏡子（雅1:23-25）。
  relation: 利8章洗濯盆用於祭司承接聖職的初次全身洗濯（v6）並受膏成聖（v11），預表信徒經歷重生洗滌（多3:5）和話語持續潔淨（約13:10；弗5:26）。
- title: 膏油（聖膏油）
  path: link_folder/原文/膏油（聖膏油）.md
  summary: '利8 中膏油是承接聖職之禮的核心器物（v2、10-12、30）。摩西先用膏油抹帳幕和其中所有的、使它成聖（v10），又在壇上彈了七次並抹了壇、壇的一切器皿、洗濯盆和盆座（v11），最後把膏油倒在亞倫的頭上膏他（v12）；末了又取點膏油和壇上的血，彈在亞倫、他兒子與他們的衣服上（v30）。《舊約聖經背景註釋》記其配方：「作膏抹用的香料是沒藥、肉桂、香蔗、桂皮（見出30:23-25 的配方）。」

    '
  relation: '利8 顯出膏油三種施用方式，份量各不相同：抹（會幕與器具）、彈七次（壇）、倒（惟獨亞倫的頭）。丁良才指出彈七次是燔祭壇獨有的待遇——「壇雖是安在會幕以外，卻仍是至聖的」，惟其至聖才能使獻在其上的供物成聖（出29:37、太23:19）。他並由「倒」（v12）與「彈」（v30）的差別讀出份量：「亞倫所受的聖油比他兒子所受的更多」，故利21:12 說「耶和華膏油的冠冕在亞倫的頭上」，論眾祭司卻只說「耶和華的膏油在他們身上」（利10:7）。更關鍵的是次序：亞倫在尚未抹血之前就受膏（v12），他的兒子卻是先抹血（v23-24）後受彈膏油（v30）——丁良才與 KC 各自獨立指出這個差異並給出同一解釋：亞倫預表基督，聖靈可以直接臨到那位無罪的完全人；我們是罪人，聖靈只能臨到已被基督寶血潔淨的人身上。《舊約聖經背景註釋》另指出以色列與四鄰的分野：「按照以色列的慣例，膏抹是揀選的象徵，經常和聖靈的賞賜有密切關係……埃及和赫人相信膏抹能夠保護人不受冥界神祇勢力之害。」

    '
