name: 金牌聖冠（nezer hakodesh）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 nezer hakodesh，意為「聖冠」或「分別為聖的冠冕」。在利未記第8章中，摩西將冠冕戴在亞倫頭上，並在冠冕前面釘上金牌，就是聖冠，作為大祭司聖服的一部分，象徵其歸耶和華為聖的身分與祭司尊貴的地位。
accumulations:
- book: 利未記
  chapter: 8
  summary: 摩西把冠冕戴在亞倫頭上，在冠冕前面釘上金牌，就是聖冠，都是照耶和華所吩咐摩西的。
  relation: 本章記載大祭司亞倫穿戴聖服時戴上金牌聖冠，標誌其分別為聖、歸耶和華為聖的祭司身分。
