name: 七天不可出會幕門
type: 神學
secondary_types: []
aliases:
- 七天住在會幕門口
- 承接聖職七日
status: formal
definition: 亞倫和他兒子在承接聖職期間，被要求七天不可出會幕的門，要晝夜住在會幕門口，遵守耶和華的吩咐，直到承接聖職的日子滿了。這七天的等候表明祭司的成聖需要時間，並且他們必須完全順服神的命令，停留在神的同在中，免得他們死亡。這也象徵祭司完全與世界隔離，全然歸屬於神。
accumulations:
- book: 利未記
  chapter: 8
  summary: 亞倫和他兒子被吩咐七天不可出會幕的門，要晝夜住在會幕門口遵守耶和華的吩咐，免得死亡。
  relation: 透過七日的停留與順服，表明祭司完全被分別為聖，並在神同在中等候職任的完全確立。
related_entries:
- 會幕（帳幕整體）
- 亞倫和他兒子（祭司）
- 承接聖職之禮（millu'im）
- 贖罪
