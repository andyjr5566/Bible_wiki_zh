name: 倒膏油在頭上
type: 神學
secondary_types: []
aliases:
- 倒膏油在亞倫頭上
status: formal
definition: 在祭司承接聖職的禮儀中，摩西將膏油倒在亞倫的頭上膏他，使他成聖。此動作象徵神對大祭司的揀選與設立，並將其分別為聖歸耶和華使用。膏油傾倒在頭上代表聖靈的澆灌與神賜予的屬靈能力，確立其作為神與人之間中保的獨特地位。
development: 此儀式確立了亞倫作為首任大祭司的屬靈權柄，其受膏不僅為了執行獻祭職務，更預表了未來彌賽亞（受膏者）的完全中保身分。
accumulations:
- book: 利未記
  chapter: 8
  summary: 摩西把膏油倒在亞倫的頭上膏他，使他成聖，作為大祭司就職儀式的核心步驟之一。
  relation: 本章記載大祭司亞倫首次受膏，標誌著祭司體系的正式確立與神權治理的具體化。
