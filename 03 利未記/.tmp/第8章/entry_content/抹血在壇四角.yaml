name: 抹血在壇四角
type: 神學
secondary_types: []
aliases:
- 抹血在壇的四角
status: formal
definition: 摩西用指頭蘸贖罪祭公牛的血，抹在壇上四角的周圍，並把血倒在壇的腳那裡。壇的四角象徵壇的拯救能力與普世性的見證，將血抹於四角代表以生命之血遮蓋並潔淨祭壇，使壇成聖，從而確保獻祭的器皿本身不再招致神對罪的審判。
development: 此儀式強調了血在贖罪與成聖過程中的絕對必要性，預表了基督的寶血不僅潔淨罪人，也潔淨了事奉的途徑與屬靈的根基。
accumulations:
- book: 利未記
  chapter: 8
  summary: 摩西用指頭蘸血抹在壇四角周圍並倒血在壇腳，使壇潔淨成聖。
  relation: 本章透過抹血儀式潔淨銅壇，使祭司後續獻上的燔祭與承接聖職之祭能在聖潔的壇上蒙神悅納。
related_entries:
