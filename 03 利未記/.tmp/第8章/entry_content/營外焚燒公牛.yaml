name: 營外焚燒公牛
type: 神學
secondary_types: []
aliases:
- 營外燒公牛
status: formal
definition: 贖罪祭的公牛在宰殺取血後，其皮、肉並糞被用火燒在營外。將祭牲的肉體移至營外焚燒，象徵著將罪污與不潔完全從神子民的營中移除，營外代表與神聖潔同在隔絕之地。此動動表明贖罪祭不僅需要流血代贖，更需將罪的本體徹底銷毀以滿足神的聖潔。
development: 此儀式預表了耶穌基督在耶路撒冷城門外受苦受死，用自己的血叫百姓成聖，並將罪污徹底擔當於營外，使信者得以進入至聖所。
accumulations:
- book: 利未記
  chapter: 8
  summary: 贖罪祭公牛的皮、肉與糞被帶到營外用火焚燒，遵照耶和華的吩咐。
  relation: 本章祭司就職時的贖罪祭處理方式，確立了祭司自身亦需藉由營外焚燒之祭牲來對付罪污，方能承擔會眾的罪。
