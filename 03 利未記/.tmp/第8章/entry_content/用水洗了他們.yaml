name: 用水洗了他們
type: 神學
secondary_types: []
aliases:
- 洗淨禮
status: formal
definition: 摩西帶亞倫和他兒子來，用水洗了他們。此洗淨動作在穿衣、受膏與獻祭之前進行，神學上象徵著事奉神之前的潔淨，表明人必須先被洗淨罪污，才能穿上聖服、承擔聖職並親近神。
accumulations:
- book: 利未記
  chapter: 8
  summary: 摩西在執行祭司膏立儀式之初，先用水洗了亞倫和他兒子。
  relation: 水洗的步驟為後續的穿上聖衣與受膏成聖奠定基礎，突顯事奉前的潔淨要求。
related_entries:
- 亞倫和他兒子（祭司）
- 摩西
