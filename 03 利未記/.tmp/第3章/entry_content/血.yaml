name: 血
type: 神學
secondary_types: []
aliases:
- 血
status: formal
definition: 在利未記第3章中，血代表生命，歸屬於神。祭司亞倫的子孫必須將祭牲的血灑在壇的周圍。血不可作為食物食用，經文明確規定「脂油和血都不可吃」，這要成為以色列人世世代代永遠的定例，彰顯了血在獻祭禮儀中的神聖性與不可替代性。
accumulations:
- book: 利未記
  chapter: 3
  summary: 祭司需將祭牲的血灑在壇的周圍，且明令禁止以色列人吃血，定為永遠的定例。
  relation: 血是獻給耶和華的聖物，用於壇上贖罪與獻祭之用，因其代表生命而絕對禁止食用。
