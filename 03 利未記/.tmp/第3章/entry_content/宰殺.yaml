name: 宰殺
type: 事件
secondary_types: []
aliases:
- 宰
status: formal
definition: 宰殺是獻祭過程中祭牲被結束生命的動作。在利未記第3章的平安祭中，獻祭者要在會幕門口（或會幕前）按手在供物頭上後，親手宰殺祭牲（無論是公牛、羊羔或山羊）。此動作表明祭牲作為替代，其生命被傾注以成就獻祭者與神之間的和平。
accumulations:
- book: 利未記
  chapter: 3
  summary: 獻平安祭者按手在供物頭上後，在會幕門口宰殺牛群或羊群中的祭牲。
  relation: 宰殺是平安祭獻祭流程的起始事件，為後續祭司灑血與焚燒脂油提供祭牲材料。
related_entries:
