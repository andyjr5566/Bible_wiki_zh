name: 燒在壇上
type: 事件
secondary_types: []
aliases:
- 焚燒
- 燒在壇的燔祭上
status: formal
definition: 燒在壇上是祭司將取下的脂油部分在壇上焚燒的獻祭事件。在利未記第3章中，亞倫的子孫要把取下的脂油燒在壇的燔祭上，就是在火的柴上。此焚燒動作產生獻與耶和華為馨香的火祭，作為獻給耶和華為食物的火祭，表明脂油全然歸屬於神。
accumulations:
- book: 利未記
  chapter: 3
  summary: 亞倫的子孫要把取下的脂油燒在壇的燔祭上，作為獻給耶和華為馨香火祭的食物。
  relation: 燒在壇上是平安祭獻祭程序的高潮，將屬於神的脂油藉由火焚燒化為馨香之氣獻給神。
