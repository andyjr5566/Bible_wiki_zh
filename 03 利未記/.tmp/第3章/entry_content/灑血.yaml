name: 灑血
type: 事件
secondary_types: []
aliases:
- 把血灑在壇的周圍
status: formal
definition: 灑血是祭司將祭牲的血傾倒在壇周圍的獻祭動作。在利未記第3章中，當獻祭者宰殺平安祭牲後，亞倫子孫作祭司的要負責把血灑在壇的周圍。血代表生命，灑血動作將祭牲的生命獻給神，確立了平安祭中神與人之間的聖約關係。
accumulations:
- book: 利未記
  chapter: 3
  summary: 亞倫子孫作祭司的，要把平安祭牲的血灑在壇的周圍。
  relation: 灑血是平安祭中祭司執行的關鍵事件，與不可吃血的定例相呼應，彰顯生命的歸屬。
related_entries:
