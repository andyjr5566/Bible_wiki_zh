name: 綿羊
type: 文化
secondary_types: []
aliases:
- 羊群
- 羊羔
status: formal
definition: 綿羊是古代以色列人常見的牲畜，常用於獻祭。在利未記第3章中，人若從羊群中獻平安祭，無論公母皆可，必須沒有殘疾。若獻一隻羊羔為供物，需在耶和華面前獻上，按手在其頭上宰於會幕前，祭司將血灑在壇周圍。綿羊平安祭的特殊之處在於需將整肥尾巴在靠近脊骨處取下，連同脂油與腰子獻給耶和華為火祭。
accumulations:
- book: 利未記
  chapter: 3
  summary: 規定從羊群獻平安祭的條例，包含獻羊羔、按手、宰殺、灑血，並特別提及取下整肥尾巴與脂油燒在壇上。
  relation: 綿羊是本章平安祭的核心祭牲之一，其肥尾巴與脂油歸給耶和華為馨香的火祭。
