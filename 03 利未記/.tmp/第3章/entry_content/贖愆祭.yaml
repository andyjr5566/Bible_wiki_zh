name: 贖愆祭
type: 神學
secondary_types: []
aliases:
- 贖愆祭
status: formal
definition: 贖愆祭是利未記五祭之一，主要用於贖罪，特別針對人在聖物或對鄰舍的虧欠上所犯的罪。在利未記第3章中，雖然主要論述平安祭，但獻祭的基本程序如按手在供物頭上、宰殺祭牲、祭司灑血等動作，與贖愆祭有共通的神學基礎。贖愆祭強調罪必須被對付並賠償，而平安祭則建立在贖罪的基礎上，使獻祭者能與神恢復相交。兩者共同構成完整的贖罪與相交神學。
accumulations:
- book: 利未記
  chapter: 3
  summary: 平安祭的獻祭程序（按手、宰殺、灑血）與贖愆祭共享贖罪的神學基礎。
  relation: 本章平安祭的條例與贖愆祭在獻祭動作與贖罪觀念上具有關聯性。
