name: 馨香的火祭
type: 神學
secondary_types: []
aliases:
- 馨香的火祭
status: formal
definition: 在利未記第3章中，馨香的火祭指祭司將祭牲的脂油等部分燒在壇的燔祭上，所產生令神悅納的香氣。這代表獻祭者藉由祭物向神表達感恩、還願或甘心獻上，使神的心意得到滿足，進而維持神與人之間和好的關係。
accumulations:
- book: 利未記
  chapter: 3
  summary: 祭司將平安祭的脂油燒在壇上，作為獻給耶和華為馨香的火祭與食物。
  relation: 馨香的火祭是神悅納獻祭者心意的具體表徵，彰顯平安祭中神人相交的和睦與滿足。
related_entries:
- 脂油
- 燒在壇上
- 燔祭（olah）
- 亞倫和他兒子（祭司）
sources:
