name: 脂油
type: 主題
secondary_types: []
aliases:
- 脂油
status: formal
definition: 在利未記第3章中，脂油被視為祭物中最上好的部分，專屬於耶和華。獻平安祭時，蓋臟的脂油、臟上所有的脂油、兩個腰子和腰子上的脂油，以及肝上的網子等都要一概取下，燒在壇上獻給神為馨香的火祭。經文強調「脂油都是耶和華的」，並嚴禁以色列人食用脂油。
accumulations:
- book: 利未記
  chapter: 3
  summary: 平安祭中祭牲的脂油必須完全取下並燒在壇上獻給神，且禁止食用，定為永遠定例。
  relation: 脂油象徵祭物最豐盛、最美好的部分，歸耶和華為聖，不可作為人的食物。
