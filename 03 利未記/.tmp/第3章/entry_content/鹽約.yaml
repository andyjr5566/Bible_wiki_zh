name: 鹽約
type: 神學
secondary_types: []
aliases:
- 鹽約
status: formal
definition: 鹽約在聖經中象徵永不廢棄的永恆盟約，因鹽具有防腐與持久不變的特性。在利未記第3章中，雖未直接提及「鹽約」一詞，但本章第17節強調「脂油和血都不可吃；這要成為你們世世代代永遠的定例」，其中「永遠的定例」與鹽約所代表的永恆性質具有相同的神學基礎。神藉由這些定例與以色列人建立持久不變的關係，正如鹽約所象徵的永恆信實。
