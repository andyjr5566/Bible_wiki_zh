name: 山羊
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 山羊是古代以色列人飼養的重要牲畜之一，適合在多岩石的地形生存。在利未記第3章中，人的供物若是山羊，必須在耶和華面前獻上。獻祭者要按手在山羊頭上，宰於會幕前，祭司亞倫的子孫要把血灑在壇的周圍。祭司並要取下蓋臟的脂油、兩個腰子及肝上的網子等，獻給耶和華為火祭，燒在壇上作為馨香火祭的食物。
accumulations:
- book: 利未記
  chapter: 3
  summary: 規定以山羊獻平安祭的條例，包含按手、宰殺、灑血，以及取下脂油和腰子燒在壇上獻為火祭。
  relation: 山羊是本章平安祭可獻的祭牲之一，其脂油歸耶和華為馨香火祭的食物。
