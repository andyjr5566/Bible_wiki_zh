name: 取下脂油
type: 事件
secondary_types: []
aliases:
- 取下脂油
status: formal
definition: 取下脂油是從平安祭牲體內摘取特定脂肪部位的動作。在利未記第3章中，此動作包括取下蓋臟的脂油和臟上所有的脂油、兩個腰子和腰子上的脂油（靠腰兩旁的脂油），以及肝上的網子。對於羊羔，還需在靠近脊骨處取下整條肥尾巴。這些脂油專門歸給耶和華，作為火祭焚燒。
accumulations:
- book: 利未記
  chapter: 3
  summary: 從平安祭牲中取下蓋臟的脂油、臟上脂油、兩個腰子與其上的脂油、肝上的網子，以及羊羔的整肥尾巴。
  relation: 取下脂油是為了將祭牲中最肥美的部分分別出來，預備燒在壇上獻給耶和華為馨香的火祭。
