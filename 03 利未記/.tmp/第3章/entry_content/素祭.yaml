name: 素祭
type: 主題
secondary_types: []
aliases:
- 素祭
status: formal
definition: 素祭是利未記中五祭之一，主要以細麵、油與乳香為供物，通常伴隨燔祭或平安祭獻上。在利未記第3章的平安祭條例中，祭司將平安祭牲的脂油燒在壇的燔祭上，就是在火的柴上。燔祭的基礎往往包含素祭的元素，素祭作為獻與耶和華為馨香的火祭的一部分，與平安祭的獻祭程序緊密相連。素祭象徵獻祭者將自己勞力所得的出產獻給神，表達對神供應的感恩與奉獻。
accumulations:
- book: 利未記
  chapter: 3
  summary: 平安祭的脂油燒在壇的燔祭上，與素祭的獻祭程序相連。
  relation: 本章描述平安祭牲的脂油燒在燔祭上，間接涉及素祭在獻祭系統中的伴隨角色。
