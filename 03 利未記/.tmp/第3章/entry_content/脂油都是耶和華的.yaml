name: 脂油都是耶和華的
type: 神學
secondary_types: []
aliases:
- 脂油都是耶和華的
status: formal
definition: 在利未記的獻祭體系中，脂油被視為動物身上最精華、最美好的部分，因此被分別為聖歸給神。利未記第3章明確宣告「脂油都是耶和華的」，這不僅是獻祭程序的規定，更是一項神學宣告，表明神在受造之物中擁有至高的主權與優先性。祭司在獻平安祭時，必須將蓋臟的脂油、臟上所有的脂油、兩個腰子和腰子上的脂油等全數取下，燒在壇上作為獻給耶和華為馨香火祭的食物。這項定例成為以色列人世世代代永遠的定例，強調人不可將屬於神的精華據為己有。
accumulations:
- book: 利未記
  chapter: 3
  summary: 宣告脂油屬於耶和華，祭司須將平安祭牲的脂油全數燒在壇上獻給神。
  relation: 本章第16節直接確立此神學原則，作為以色列人飲食與獻祭律法的基礎。
