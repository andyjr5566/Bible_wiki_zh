name: 公牛
type: 文化
secondary_types: []
aliases:
- 牛群
status: formal
definition: 公牛是古代近東重要的農業與宗教動物，代表力量與財富。在利未記第3章的平安祭條例中，人若從牛群中獻供物，無論是公是母，都可以作為祭牲。獻祭者需按手在公牛頭上，宰於會幕門口，祭司將血灑在壇的周圍，並將蓋臟的脂油、腰子等取下燒在壇上獻給耶和華。
accumulations:
- book: 利未記
  chapter: 3
  summary: 規定從牛群中獻平安祭時，公牛或母牛皆可，需無殘疾並按手宰殺，血灑壇周，脂油燒在壇上。
  relation: 公牛是本章平安祭可接受的祭牲種類之一，其脂油歸耶和華為火祭。
