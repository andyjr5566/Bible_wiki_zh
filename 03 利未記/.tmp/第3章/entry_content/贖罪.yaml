name: 贖罪
type: 神學
secondary_types: []
aliases:
- 贖罪
status: formal
definition: 在利未記第3章中，雖然主要記載的是平安祭條例，但經文隱含了罪必須先被處理才能與神和好的神學基礎。平安祭的祭物必須是「沒有殘疾」的，且需經過按手、宰殺與灑血的過程，這些程序與贖罪祭的潔淨觀念緊密相連，表明唯有透過祭牲的血與無瑕疵的生命，才能維持與神之間的平安與相交。
accumulations:
- book: 利未記
  chapter: 3
  summary: 平安祭要求獻上無殘疾的祭物，並透過按手、宰殺與灑血程序來維持與神的和睦。
  relation: 平安祭的基礎建立在贖罪與潔淨的觀念上，祭牲之血是維持神人平安關係的必要媒介。
related_entries:
