name: 無殘疾
type: 神學
secondary_types: []
aliases:
- 沒有殘疾
status: formal
definition: 「無殘疾」指獻給耶和華的祭物必須在身體上完美無瑕、沒有任何缺陷。在利未記第3章中，無論是從牛群或羊群中獻平安祭，公的或母的，都必須用沒有殘疾的獻在耶和華面前。這項神學要求表明對神的敬畏與尊崇，將最好的獻給神，也預表了耶穌基督作為無瑕疵的完美祭物為人贖罪。
accumulations:
- book: 利未記
  chapter: 3
  summary: 規定獻平安祭的牛群或羊群，無論公母，必須用沒有殘疾的獻在耶和華面前。
  relation: 無殘疾是本章平安祭牲物的首要神學資格，確保祭物蒙神悅納。
