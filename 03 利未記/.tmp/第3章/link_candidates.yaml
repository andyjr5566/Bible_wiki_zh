book: "利未記"
chapter: 3
candidates:
  - name: "平安祭"
    type: "神學"
    evidence: "利3:1-17 全章核心主題；CT: 平安祭條例、獻牛/羊/山羊的規定；GT: 平安祭預表基督成就和平；KC: 平安祭是自願獻祭、表達感恩與相交；BH: 平安祭預表基督是我們的平安（弗2:14）"
    surfaces:
      - "平安祭"
      - "酬恩"
  - name: "按手（samak）"
    type: "原文"
    evidence: "利3:2,8,13 獻祭者按手在供物頭上；CT: 按手表示獻祭人與祭牲合而為一；KC: 按手表達『把自己與這祭物認同、合為一』"
    surfaces:
      - "按手"
  - name: "灑血"
    type: "主題"
    evidence: "利3:2,8,13 亞倫子孫把血灑在壇周圍；CT: 灑血是祭司的工作；KC: 血灑在壇周圍表徵基督寶血遮蓋一切罪過；BH: 血說明贖罪、赦免和除去罪（來9:22）"
    surfaces:
      - "把血灑在壇的周圍"
  - name: "脂油"
    type: "原文"
    evidence: "利3:3-5,9-11,14-16 詳細列舉獻給耶和華的脂油：蓋臟的脂油、臟上所有的脂油、兩個腰子和腰子上的脂油、肝上的網子；CT: 脂油即肥肉，是牲畜體內最肥美上好的部分，要燒在壇上歸神享用；KC: 獻上脂油表徵奉獻生命的豐盛與最好的給神；BH: 脂油代表基督完全奉獻的內在能量，只有神能完全鑑賞"
    surfaces:
      - "脂油"
      - "蓋臟的脂油"
      - "臟上所有的脂油"
  - name: "腰子"
    type: "原文"
    evidence: "利3:4,10,15 兩個腰子和腰子上的脂油，就是靠腰兩旁的脂油；CT: 希伯來人認為腰子、肝上的網子代表人感情的中樞；BH: 腰子是智慧的圖畫，能分辨善惡；腰子上的脂油說明基督在分辨善惡上完美的感覺"
    surfaces:
      - "腰子"
      - "兩個腰子"
      - "腰子上的脂油"
  - name: "肝上的網子"
    type: "原文"
    evidence: "利3:4,10,15 肝上的網子和腰子，一概取下；CT: 肝上的網子或作『肝葉』，乃指肝上的脂油，其狀似網；BH: 肝在聖經以外三次出現（箴7:23、哀2:11、結21:21）都顯示方向感缺失，基督的方向是父的眼目"
    surfaces:
      - "肝上的網子"
  - name: "肥尾巴"
    type: "原文"
    evidence: "利3:9 綿羊的整肥尾巴都要在靠近脊骨處取下；CT: 巴勒斯坦一帶所產的羊羔，尾巴特別肥大，脂肪最多，故獻為供物；BH: 巴勒斯坦地主要品種之東方綿羊的肥尾巴，可重達48至73磅"
    surfaces:
      - "肥尾巴"
      - "整肥尾巴"
      - "肥尾巴都要在靠近脊骨處取下"
  - name: "馨香之氣"
    type: "神學"
    evidence: "利3:5,16 獻與耶和華為馨香的火祭；KC: 平安祭是神所欣悅的奉獻；BH: 基督的犧牲被描述為馨香的供獻（弗5:2）"
    surfaces:
      - "馨香的火祭"
      - "馨香火祭的食物"
  - name: "無殘疾"
    type: "主題"
    evidence: "利3:1,6 牛群/羊群中獻的，必用沒有殘疾的；CT: 所獻的供物應為無瑕疵的家畜；KC: 表徵奉獻給神的，必須是完好的；BH: 預表基督是無瑕疵無玷污的羔羊（彼前1:19）"
    surfaces:
      - "沒有殘疾的"
  - name: "火祭"
    type: "主題"
    evidence: "利3:3,5,9,11,14,16 將脂油作為火祭獻給耶和華；CT: 火祭指經火焚燒；KC: 火祭表徵完全奉獻給神；BH: 火祭預表基督完全的犧牲"
    surfaces:
      - "火祭"
      - "獻給耶和華為火祭"
  - name: "會幕門口"
    type: "地點"
    evidence: "利3:2,8,13 宰於會幕門口/會幕前；CT: 會幕門口是獻祭的地點；KC: 會幕門口是神與人相會的地方"
    surfaces:
      - "會幕門口"
      - "會幕前"
  - name: "亞倫的子孫"
    type: "人物"
    evidence: "利3:2,5,8,11,13,16 亞倫子孫作祭司的，要把血灑在壇的周圍/把這些燒在壇上；CT: 亞倫子孫是祭司，負責灑血和燒祭；KC: 祭司是中保，預表基督大祭司的職分"
    surfaces:
      - "亞倫子孫"
      - "亞倫的子孫"
      - "祭司"
  - name: "燔祭"
    type: "神學"
    evidence: "利3:5 亞倫的子孫要把這些燒在壇的燔祭上；CT: 祭司每天早晨先獻燔祭，然後獻平安祭等其他的祭，故此處說燒在燔祭的上面；KC: 平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的"
    surfaces:
      - "燔祭"
      - "壇的燔祭上"
  - name: "素祭（minchah）"
    type: "原文"
    evidence: "利3:9 從平安祭中，將火祭獻給耶和華；KC: 平安祭包括素祭（七11-13），表達感恩與奉獻"
    surfaces: []
  - name: "搖祭"
    type: "原文"
    evidence: "利3:9-10 胸要作搖祭；KC: 搖祭表徵將祭物在神面前搖動，表示獻給神又領回來"
    surfaces: []
  - name: "舉祭"
    type: "原文"
    evidence: "利3:9-10 右腿要作舉祭；KC: 舉祭表徵將祭物高舉獻給神"
    surfaces: []
  - name: "綿羊"
    type: "主題"
    evidence: "利3:7 若獻一隻羊羔為供物；CT: 羊羔即綿羊；KC: 綿羊預表基督的溫順"
    surfaces:
      - "羊羔"
  - name: "永遠的定例"
    type: "神學"
    evidence: "利3:17 在你們一切的住處，脂油和血都不可吃；這要成為你們世世代代永遠的定例；CT: 這是永遠的定例；KC: 神保留脂油和血的權利，因為生命在血中"
    surfaces:
      - "永遠的定例"
      - "世世代代永遠的定例"
  - name: "脂油和血都不可吃"
    type: "神學"
    evidence: "利3:17 脂油和血都不可吃；CT: 獻上的或不獻之牛羊的脂油和血都不可吃；KC: 承認所有生物的生命都屬於神，嚴格禁止使用脂油和血"
    surfaces:
      - "脂油和血都不可吃"