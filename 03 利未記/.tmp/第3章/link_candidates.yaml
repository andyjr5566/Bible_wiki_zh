book: "利未記"
chapter: 3
candidates:
  - name: "平安祭（shelamim）"
    type: "原文"
    evidence: "利未記3章核心主題：平安祭條例（v1-17），希伯來文 shelamim 意為「平安、完全、酬謝」，表甘心樂意獻上、祭肉可由獻祭者與祭司分享的祭。BH、CCB、KC 均詳細解釋其字義、儀式與預表基督。"
    surfaces:
      - "平安祭"
      - {phrase: "供物", verses: [1, 6, 12]}
      - {phrase: "獻供物", verses: [1, 6, 12]}

  - name: "按手"
    type: "原文"
    evidence: "v2、8、13「他要按手在供物的頭上」，希伯來文 samak，表認同、轉移、委身。KC 指出此預表信徒與基督聯合（羅6:5），CCB 解釋為「獻祭的人與所獻的祭牲合而為一」。"
    surfaces:
      - "按手"

  - name: "贖罪"
    type: "神學"
    evidence: "v2、8、13 按手後宰殺、灑血，雖平安祭非為罪而獻，但獻祭者本性有罪，須藉此蒙遮蓋。KC 指出平安祭預表基督成就與神與人之平安（西1:20）。"
    surfaces:
      - "贖罪"

  - name: "血"
    type: "神學"
    evidence: "v2、8、13「把血灑在壇的周圍」。KC 指出血代表生命（利17:11），預表基督寶血贖罪。BH 解釋灑血預表基督之血潔淨信徒（約壹1:7）。"
    surfaces:
      - "血"
      - "灑血"
      - "把血灑"

  - name: "脂油"
    type: "主題"
    evidence: "v3-5、9-11、14-16「蓋臟的脂油和臟上所有的脂油」、「脂油和整肥尾巴」、「脂油都是耶和華的」。KC 解釋脂油代表基督獻上自己的精力與活力；CCB 指出脂油屬神（利3:16），表基督完全為神而活。"
    surfaces:
      - "脂油"
      - "肥尾巴"
      - "蓋臟的脂油"
      - "臟上所有的脂油"
      - "腰子上的脂油"
      - "肝上的網子"

