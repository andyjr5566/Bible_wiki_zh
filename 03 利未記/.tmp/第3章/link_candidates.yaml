    type: "神學"
    evidence: "v5、11、16「馨香的火祭」，KC 指出燔祭、素祭、平安祭同為「馨香之氣」，表基督工作完全榮耀神；BH 連結弗5:2「基督愛我們，為我們捨了自己，當作馨香的供物和祭物獻給神」。"
    surfaces:
      - "馨香的火祭"
