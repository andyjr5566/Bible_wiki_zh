"book": "03 利未記"
"chapter": !!int "3"
"updates":
- "title": "平安祭"
  "path": "link_folder/神學/平安祭.md"
  "summary": "利3章詳細規定平安祭條例，分三段：牛群（v1-5）、羊群綿羊/羊羔（v6-11）、山羊（v12-16）。平安祭是五祭中唯一讓獻祭者、祭司與神三方共享的祭（CT文意註解）。獻祭程序與燔祭相似但關鍵差異：①祭牲不限公的，無殘疾的公母皆可（v1,6,12），象徵男女同蒙恩典（KC）；②不用鳥類，因平安祭包含聚餐，鳥肉不敷分配（GT丁良才）；③只有脂油、腰子、肝網子及綿羊肥尾巴作火祭焚於壇上，其餘祭肉歸獻祭者與祭司共食（v3-5,9-11,14-16）。按手表認同與轉移（v2,8,13），灑血在壇周圍表贖罪遮蓋（CT靈意註解；KC）。祭司將脂油置於每晨燔祭之上焚燒（v5,11,16），表明平安建立在贖罪與全然獻上之上（GT丁良才）。脂油被稱為「獻給耶和華為食物的火祭」（v11,16），並非神需物質供養，乃象徵神參與宴會、悅納奉獻（CT文意註解；《舊約背景註釋》）。"
  "relation": "本章為平安祭條例的正式立法（利未記首次完整規定），補充出20:24首次提及與出29:28搖祭胸舉祭腿歸祭司的背景。平安祭預表基督是神與人之間的和睦（弗2:14-15），信徒在享受和諧關係時甘心向神獻上感恩與虔敬（CT靈意註解）。"
- "title": "按手（samak）"
  "path": "link_folder/原文/按手（samak）.md"
  "summary": "利3:2,8,13 三次記載獻祭者按手在供物頭上（牛、綿羊、山羊）。CT：按手表示獻祭的人與所獻的祭牲合而為一，代表獻祭之人與祭牲聯合、認同祭牲就是自己。KC：按手表達「把自己與這祭物認同、合為一」。本章按手發生在平安祭（自願樂意獻祭）而非贖罪祭，表徵獻祭者在基督裡奉獻全人，與祭物合一。"
  "relation": "補充利1:4燔祭按手（蒙悅納、為他贖罪）與出29:10,15,19祭司按手（三個不同方向）之外的場景——凡獻平安祭的個人皆親自按手，不能假手他人，正如各人得救必須自己靠主。平安祭按手表徵與基督合一、在基督裡奉獻全人。"
- "title": "馨香之氣"
  "path": "link_folder/神學/馨香之氣.md"
  "summary": "利3:5,16 兩次出現「獻與耶和華為馨香的火祭」。KC：平安祭是神所欣悅的奉獻。BH：基督的犧牲被描述為馨香的供獻（弗5:2）。本章脂油焚燒於燔祭之上，表明平安建立在贖罪與全然獻上之上（GT丁良才）。"
  "relation": "補充創8:21挪亞獻燔祭後神「聞那馨香之氣」（敘事性單一事件）與利1章燔祭三見「馨香的火祭」（制度化固定判準語）之外的場景——平安祭同樣稱馨香，顯明神看重的是獻祭者甘心的心，不是祭物大小。新約以弗所書5:2指出基督愛我們，為我們捨了自己，當作馨香的供獻和犧牲獻給神。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "利3:2,8,13 三次記載「宰於會幕門口/會幕前」。CT：燔祭壇放置在會幕近門口之處；會幕門口是獻祭的地點。KC：會幕門口是神與人相會的地方。本章平安祭宰殺地點與燔祭（利1:3,5,11）相同，確立會幕門口作為全體百姓親近神、獻上供物的入口功能。"
  "relation": "補充出29章會幕門口作為祭司承接聖職、洗身、吃聖肉之處與利1章會幕門口作為「一般百姓獻燔祭」地點之外的場景——平安祭同樣在會幕門口宰殺，不只是祭司職事的場所，也是全體百姓親近神、獻上供物的入口。"
- "title": "燔祭"
  "path": "link_folder/神學/燔祭.md"
  "summary": "利3:5,11,16 三次記載祭司將平安祭的脂油「燒在壇的燔祭上」。CT：祭司每天早晨先獻燔祭（參六12），然後獻平安祭等其他的祭，故此處說燒在燔祭的上面。KC：平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的。本章確立平安祭與燔祭的關係：平安祭建立在每日燔祭（贖罪與完全奉獻）的根基之上。"
  "relation": "補充創8、創22、出20、出29、利1、利2之外的場景——利3章展示平安祭如何依附於燔祭（脂油燒在燔祭上），預表基督成就的和平（西1:20）建立在祂贖罪之死（燔祭）與完全順服（燔祭）的根基上。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "利3:9-10（綿羊平安祭）提及「胸要作搖祭」。KC：搖祭表徵將祭物在神面前搖動，表示獻給神又領回來。出29:24,26,27-28 承接聖職之祭中搖祭胸歸亞倫和他子孫永得的分。"
  "relation": "補充出29章承接聖職搖祭（KC：胸代表基督的愛，心在那裡；搖祭是敬拜姿態，把所看見基督的一切在神面前搖來搖去、滿了讚嘆）。利3章作為平安祭條例正式立法，確立搖祭胸歸亞倫和他子孫永得的分（參利7:30-34）。"
- "title": "舉祭（terumah）"
  "path": "link_folder/原文/舉祭（terumah）.md"
  "summary": "利3:9-10（綿羊平安祭）提及「右腿要作舉祭」。KC：舉祭表徵將祭物高舉獻給神。出29:27-28 承接聖職之公綿羊的右腿是舉祭，與搖祭的胸一同成聖，作亞倫和他子孫從以色列人所永得的分。"
  "relation": "補充出29章承接聖職舉祭（KC：腿代表基督的能力——祂藉著這能力完成了這工；胸與腿是一對：胸是愛，腿是能力——給亞倫和他兒子的，意思是作為祭司，我們特別可以默想主耶穌的愛與能力）。利3章作為平安祭條例正式立法，確立舉祭右腿歸灑平安祭血的祭司（參利7:32-33）。"
- "title": "素祭（minchah）"
  "path": "link_folder/原文/素祭（minchah）.md"
  "summary": "利3:9 平安祭條例中提及「從平安祭中，將火祭獻給耶和華」；KC 指出平安祭包括素祭（七11-13），表達感恩與奉獻。本章雖未詳細列出素祭材料與程序（詳見利2章），但確立平安祭包含素祭的規定。"
  "relation": "補充利2章素祭條例正式立法（材料、五種製法、酵蜜禁忌、鹽約）與出29:41每日燔祭同獻素祭之外的場景——平安祭同樣包含素祭，預表基督完美人性（素祭）配合贖罪之死（燔祭/平安祭）成就神人交通。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "利3章完整規定平安祭條例：牛群（v1-5）、綿羊（v6-11）、山羊（v12-16）。希伯來文 shelamim 與「平安、完全、酬謝」同根，指甘心樂意獻上、祭肉可由獻祭者與祭司分享的祭（利3章, 7:11-36）。出24:5「獻牛為平安祭」是立約儀式中的祭，表達與神和好後的交通喜樂。"
  "relation": "本章為平安祭條例的主要出處，補充出24:5立約儀式平安祭、出29:28搖祭胸舉祭腿歸祭司、利7:11-36平安祭三子類型（感謝祭、還願祭、甘心祭）之外的場景。平安祭預表基督藉十字架成就「和平」（西1:20, 弗2:14-17），使信徒得與神和好並享受交通。聖餐是新約的平安祭筵席——主耶穌說「這杯是用你們的血所立的新約」（路22:20），信徒領受餅杯，紀念基督、宣告主的死、享受與神與聖徒的交通（林前10:16-17, 11:23-26）。"
- "title": "燔祭（olah）"
  "path": "link_folder/原文/燔祭（olah）.md"
  "summary": "利3:5,11,16 三次記載平安祭脂油「燒在壇的燔祭上」。燔祭（olah）是把祭牲完全焚燒、使煙氣上升獻給神的祭。本章確立平安祭脂油置於每晨燔祭之上焚燒，表明平安建立在贖罪（燔祭）與完全奉獻（燔祭全焚）之上。"
  "relation": "補充創8挪亞燔祭、創22亞伯拉罕獻以撒、出20:24首次指示燔祭、出29章承接聖職燔祭、利1章燔祭正式立法、利2章素祭緊接燔祭等背景。利3章展示平安祭如何依附於燔祭（脂油燒在燔祭上），預表基督成就的和平（西1:20）建立在祂贖罪之死（燔祭）與完全順服（燔祭）的根基上。"
