book: 利未記
chapter: 3
updates:
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: |
    利3 是平安祭條例的本章。CT 給的原文字義是「感恩，聯盟，友誼」，並指出此名詞「在希伯來文表示『和好』或『福祉』」；《精讀本》記其字根「薛列」意為「報答」、「賠償」、「重新給」；和合本小字作「酬恩」。丁良才列出三種名目：「平安祭有三樣：（一）感恩，（二）還願，（三）樂獻（利7:11-18），這三樣都有酬恩的意思」，並記其場合：「以色列人在喜樂的日子和過節的時候多獻平安祭（民10:10，王上8:63，撒上11:15，撒下6:17）。」全章分三級：牛群（v1-5）、綿羊（v6-11）、山羊（v12-16），末以脂油和血不可吃的永遠定例收束（v17）。
  relation: |
    KC 指出平安祭在五祭中的位置不是偶然：「「平安祭」站在五祭的正中央。燔祭與素祭是甘心獻的，是為著神的。隨後的贖罪祭與贖愆祭則是義務的祭。」前二者甘心獻給神，後二者為罪不得不獻，平安祭居中，是兩者交會之處——「它所代表的是一頓相交的筵席。」其最獨特之處在於誰能吃：神得脂油、祭司得胸與右腿（利7:31），而「一切潔淨的百姓都可以吃——這是舊約中唯一這樣的祭（利7:19）」。《雷氏研讀本》同此：「『平安祭』是獻祭者能分享的惟一一種祭。」與燔祭的三個差別（丁良才）：祭牲可公可母、只燒脂油與肥尾巴、祭司和獻祭者都可以吃。
- title: 公牛
  path: link_folder/文化/公牛.md
  summary: |
    利3:1 平安祭「若是從牛群中獻，無論是公的是母的，必用沒有殘疾的獻在耶和華面前」——這是牛作為祭牲時公母皆可的唯一一種祭（燔祭必須是公的，利1:3）。牛群是平安祭最大的一級，v5 特別指明其脂油要「燒在壇的燔祭上」。
  relation: |
    利1 的燔祭要求公牛，利3 的平安祭則公母不拘。丁良才解釋這個放寬：「這大概是因為平安祭所預表的不是注重贖罪的理由，乃是注重贖罪的結果。」KC 則讀出公母各自的著眼點：「母的較多帶出一個人的地位，公的較多帶出與那地位相稱的行為」——獻公的著眼於主如何作工，獻母的著眼於祂作工時的態度，且「公或母與大小無關」。KC 另指出「燒在燔祭上」這句只出現在牛群這一段：「羊群的平安祭裡卻找不到這句話。」
- title: 無殘疾
  path: link_folder/神學/無殘疾.md
  summary: |
    利3:1、6 平安祭的祭牲「必用沒有殘疾的獻在耶和華面前」。這是平安祭唯一不放寬的條件——性別可以不拘，種類可以由牛降到羊，惟獨無殘疾不能通融。CT：「表徵奉獻給神的，必須是完好的。」
  relation: |
    利1 的燔祭與利3 的平安祭在多處放寬（公母、大小），卻在「無殘疾」上完全一致。KC 由此讀出一條界線：「無論我們把自己對主耶穌與祂工作的認識獻上多少，凡不完全的，神都不能接受。我們對主耶穌所知的無論多麼少，有一件事必須清楚：祂身上沒有瑕疵。」——認識可以有深淺，祭牲可以有大小，但所獻的那一位不能有瑕疵。
- title: 按手（samak）
  path: link_folder/原文/按手（samak）.md
  summary: |
    利3:2、8、13 平安祭的三級都要「按手在供物的頭上」。CT：「表徵與祭物合而為一，在基督裡奉獻全人。」丁良才指出燔祭與平安祭相同的儀式有四：奉獻、按手、宰牲、灑血。
  relation: |
    平安祭的按手為利1:4 的爭議提供了一個旁證。利1 的按手是否「把罪轉到祭牲身上」各家分歧，《舊約聖經背景註釋》即以「非贖罪的祭也需要按手」為由反對轉移說——利3 正是這樣一個非贖罪的祭：它是甘心獻的酬恩祭，卻同樣要按手。KC 在本章的讀法與利1 一致：「按手是認同的記號。獻祭者使自己與那牲畜的價值合一。」——按手帶出的是聯合，而聯合使人能與神相交：「他之所以能與神相交，是因為神在那祭物的價值裡看見他。」
- title: 宰殺
  path: link_folder/事件/宰殺.md
  summary: |
    利3:2 平安祭「宰於會幕門口」，v8、13 則作「宰於會幕前」。CT 在 v2 明說：「本節明確指出宰殺祭牲是獻祭之人的工作，而奉上血和灑血則是祭司的工作。」丁良才另指出經文的一個留白：「聖書上沒有說明平安祭牲是在壇哪邊宰的，卻說燔祭（利1:11）和贖罪祭並贖愆祭的祭牲都是在壇的北邊宰的，大概平安祭的祭牲也是在那裡宰的，但因平安祭的祭牲有時很多（王上8:63），所以神也不嚴定一個宰牲的地方。」
  relation: |
    利1:11 把燔祭的宰殺位置釘死在壇的北邊，利3 卻只說「會幕門口／會幕前」。丁良才讀出的理由很實際：平安祭是筵席的祭，數量可以極大（所羅門獻殿一次獻上平安祭的牛二萬二千、羊十二萬，王上8:63），若嚴定一處就不敷使用。KC 讀宰殺的意義則指向聖餐：「我們守主的晚餐時，所宣揚的不是「主的生」，而是「主的死」（林前11:26）。那是一場無言的宣揚。」
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    利3:2 平安祭「宰於會幕門口」，v8、13 作「宰於會幕前」，v1、7、12 則作「在耶和華面前獻上」。《精讀本》解釋這個稱謂：「耶和華面前指會幕門口（1:11），因耶和華臨在會幕至聖所，所以使用這樣的稱謂（出25:22）。」
  relation: |
    本章顯出會幕作為獻祭唯一地點的規定在平安祭上有一處彈性：燔祭、贖罪祭、贖愆祭都指定宰於壇的北邊，平安祭則只說「會幕門口／會幕前」，丁良才認為是因祭牲數量可能極大而不嚴定一處。另一處張力在吃的地方——本章沒有規定，要到申12:6-7、17-18 才補上三個吩咐（丁良才）：不可在自己的地方吃，要在耶和華面前吃；要與家屬同吃；應當在耶和華面前歡樂。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: |
    利3:2、5、8、13 中祭司的職責：接祭牲的血、把血灑在壇的周圍、把脂油燒在壇的燔祭上。丁良才列出為感謝獻平安祭時祭司須行的七件事：接血、灑血、把脂油燒在燔祭上、從三種餅內各取一個獻為舉祭（利7:14）、把胸在耶和華面前搖一搖並把右腿作舉祭（利7:30、32）、為自己留下所舉的餅和右腿並為眾祭司留下所搖的胸（利7:14、31-34）、將所剩下的肉和餅交給獻祭的人在當日與所請的人同吃（利7:15-28）。
  relation: |
    本章的分工界線比利1 更值得注意：取下脂油與肥尾巴是獻祭之人的事（丁良才所列六件事之第四件），祭司的職責從接血才開始。經文文法也支持——v3-4「一概取下」的主詞承接 v2 的獻祭者，到 v5 才換成「亞倫的子孫要把這些燒在壇的燔祭上」。平安祭也是祭司供養的來源之一：胸歸眾祭司，右腿歸獻這祭的祭司（利7:31-33）。
- title: 灑血
  path: link_folder/事件/灑血.md
  summary: |
    利3:2、8、13 平安祭的三級都由「亞倫子孫作祭司的，要把血灑在壇的周圍」。丁良才指出這個動作的原文力度：「『灑』字按原文有擲或潑，或扔的意思，就是從盆裡潑在壇的周圍。」
  relation: |
    利3:2 說血「灑」在壇的周圍，申12:27 卻說平安祭的血要「倒」在壇上，兩處看似衝突。丁良才從原文與譯本解決：七十士譯本即把這幾節譯作「把血倒在壇的周圍」，故兩處意思相同。《聖經難解經文詮釋手冊》另引猶太學者 Maimonides：「獻祭時，一部份的血要灑在壇的周圍，其餘的要倒在壇上」，並指出「其他的學者認為『倒』與『灑』是相同的意思。就有如今天大雨灑下，我們說大雨傾盆而下一樣」。兩說都認為沒有真正的衝突，但路徑不同：一為同義詞，一為兩個動作。KC 讀灑血的次序意義：林前10:16 先說「同領基督的血」才說「同領基督的身體」，正如平安祭必先灑血才有筵席。
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: |
    利3 是全聖經談脂油最詳細的一章。KC：「脂油在這裡被描述得比任何別的祭都詳細。」所指的是板油——《舊約聖經背景註釋》：「內臟──主要是腸、肝、腎──周圍的脂肪層，很容易整片剝下，但不可吃。」該書引米格倫（J. Milgrom）的精確譯法：「遮蓋內臟的板油和內臟周圍所有的板油；兩個腎臟和腎周圍、肌腱〔不是 NIV 所譯的『腰肉』〕之上的板油；與肝臟的尾狀葉（caudate lobe），要與腎臟一同取下。」v16 宣告「脂油都是耶和華的」。
  relation: |
    禁令的範圍比字面窄。丁良才在 v16 劃界：「本節的『都』字是指著本章所提的各種脂油……至於肥肉，神並不禁止以色列人吃，此外還有可吃不可獻之牲畜的脂油，神也不禁止他們吃（利7:23 註，申14:4-5）。」即：禁的是牛、綿羊、山羊（可獻的三種）的板油，不論該牲畜是否被獻上（利7:23）；肌肉間的肥肉與鹿等可吃不可獻的潔淨牲畜不在此列。KC 讀其屬靈意義為能力：「脂油代表主耶穌成就那工作時所用的能力。惟有神能完全賞識這一點。」《舊約聖經背景註釋》另指出「脂油為上好」並非普世共識：「美索不達米亞人不以板油為祭物，古代近東很多其他文化卻獻之為祭。」
- title: 燒在壇上
  path: link_folder/事件/燒在壇上.md
  summary: |
    利3:5「亞倫的子孫要把這些燒在壇的燔祭上，就是在火的柴上」；v11、16 則只作「祭司要在壇上焚燒」。平安祭所燒的僅限脂油、腰子、肝上的網子，綿羊則另加整肥尾巴——其餘的肉歸祭司與獻祭者。
  relation: |
    「燒在壇的燔祭上」這句只出現在牛群那一段，是本章一個容易被漏掉的細節。CT 與丁良才解釋其來歷：「祭司每天早晨先獻燔祭（利6:12），然後獻平安祭等其他的祭，故此處說燒在燔祭的上面」；丁良才讀出次序神學：「平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的。」KC 則注意到它的限制：「這顯出平安祭的這一種形式與燔祭之間的密切關聯。羊群的平安祭裡卻找不到這句話。」三祭燒的份量因此構成一組對照：燔祭全燒、素祭燒一把、平安祭只燒脂油。
- title: 馨香的火祭
  path: link_folder/神學/馨香的火祭.md
  summary: |
    利3:5、16 平安祭「是獻與耶和華為馨香的火祭」，v11、16 另稱「獻給耶和華為食物的火祭」。CT 指出平安祭之所以能是馨香：「因為不是為罪獻在壇上的祭；罪沒有香氣可言。惟有藉著耶穌基督稱義，不再定罪，而與神靈交，才是馨香甘美的。」
  relation: |
    燔祭、素祭、平安祭同為馨香的火祭，贖罪祭則否——CT 在本章把這條界線說得最清楚：「凡是預表罪與罪愆的祭物，火都得把牠燒燬。只是那些預表奉獻、事奉與交通的祭物，火在其上所生的影響，就是使之發出馨香之氣，而蒙神喜悅。」本章另新增「食物」一詞。《舊約聖經背景註釋》：「由於這術語只限於形容這一種祭，它的意思可能是神與他們分享祭筵，不是需要祭物維生。」丁良才同讀：「並不是因神有什麼缺乏（詩50:8-15），乃是要表示神和祂的僕人並敬拜祂的人相交，如朋友相交的意思。」
- title: 綿羊
  path: link_folder/文化/綿羊.md
  summary: |
    利3:6-11 綿羊為平安祭，公母皆可，須無殘疾。與牛群條例最大的差別是 v9「其中的脂油和整肥尾巴都要在靠近脊骨處取下」——本章之所以把綿羊與山羊分開記載，正因綿羊有肥尾巴而山羊沒有（CT、丁良才）。肥尾巴的重量各家記載差距極大：CT／串珠作「七公斤或以上」，丁良才作「十幾斤」，《啟導本》作「重達30公斤」，《雷氏研讀本》作「四十八至七十三磅（22～33公斤）」，《舊約聖經背景註釋》作「長達四至五呎，重達五十磅」。
  relation: |
    利1 的燔祭把綿羊與山羊合併記載（利1:10），利3 卻分開——丁良才解釋：「因為綿羊有肥尾巴（v9），但獻為燔祭的祭牲是全燒在壇上的，所以利1:10 節將獻綿羊山羊為燔祭的條例一併記上。」全燒的祭不必分辨哪一塊最肥，只燒脂油的祭才必須。KC 讀肥尾巴與脊骨：肥尾巴「是特別的美味。它指向主耶穌工作中那些特別的方面——就是信徒格外享受的那些」；脊骨則「指向主在地上的路途中，面對一切加在祂身上的不義時那份不肯彎曲。就這詞最真實的意義而言，祂是一位「有脊骨」的人。」
- title: 山羊
  path: link_folder/文化/山羊.md
  summary: |
    利3:12-16 山羊為平安祭，程序與牛群相同（《精讀本》：「獻祭方式與獻牛為供物一樣」），惟無肥尾巴可獻，故與綿羊分開記載。本段末以「脂油都是耶和華的」作結（v16）。
  relation: |
    KC 對山羊的讀法在利1 與利3 一致：「山羊其實是贖罪祭的牲畜。在這裡我們想到的不像牛與羊那樣是某種特質，而是一件負面的事：罪的除去。」用在平安祭上，他的觀察是：「許多敬拜主耶穌、也願意獻上平安祭的信徒，終究只停在為祂藉十字架除去他們的罪而感謝祂，再也走不遠了。」但他隨即補上——這仍是「為馨香」。相交的喜樂即使只停在「我的罪被赦免了」這一層，神仍悅納。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    利3:5 平安祭的脂油要「燒在壇的燔祭上」——這是燔祭在利3 的角色：它是每日早晨先獻的底座。CT／丁良才：「祭司每天早晨先獻燔祭（利6:12），然後獻平安祭等其他的祭，故此處說燒在燔祭的上面。」《精讀本》：「平安祭（脂油和腰子）放在每天獻上的燔祭（出29:38,39；民28:3-8）上，一同獻上為馨香火祭。」
  relation: |
    丁良才由這個「燒在燔祭上」的位置讀出次序神學：「平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的，獻這祭的人是已經蒙了神的悅納，與神相和（羅5:1）。」即：先有全然的獻上與贖罪，才有平安與相交——次序不能顛倒。丁良才另列出兩祭的三個差別：燔祭祭牲須是公的、須全燒（除皮）、不可吃；平安祭則公母皆可、只燒脂油與肥尾巴、祭司和獻祭者都可以吃。而相同的儀式有四：奉獻、按手、宰牲、灑血。KC 則注意到「燒在燔祭上」只見於牛群一段，不見於羊群。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: |
    利3 中素祭未直接出現，但在兩處相關：一是同列「馨香的火祭」（燔祭、素祭、平安祭三者皆是）；二是為感謝獻平安祭時要一併獻上三種餅（利7:11-13），丁良才將「獻三種餅」列為獻祭之人須行的第五件事，並將「從三種餅內各取一個獻給耶和華為舉祭」（利7:14）列為祭司的第四件事。
  relation: |
    利2 的素祭與利3 的平安祭在「誰能吃」上形成完整的階梯：燔祭無人可吃、素祭只有祭司可吃、平安祭則連獻祭者與一切潔淨的百姓都可以吃（利7:19）。KC 稱平安祭為五祭中唯一「一切潔淨的百姓都可以吃」的祭。此外為感謝獻的平安祭必須配上有酵的餅（利7:13）——這正是利2:11「不可有酵」的明文例外，也是《啟導本》主張酵本身中立的證據之一。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: |
    利3 中「贖罪」一詞未出現——這正是本章的特點。CT 指出平安祭之所以能作馨香的火祭：「因為不是為罪獻在壇上的祭；罪沒有香氣可言。」但平安祭仍須灑血，《精讀本》：「平安祭也需要祭牲的血，象徵神與人之間的交通和睦的關係，只有通過基督的寶血才成為可能。」
  relation: |
    平安祭與贖罪的關係是「本於」而非「為了」。丁良才：「平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的。」KC 同此結構：「血說到贖罪、赦免與罪的除盡（來9:22）。凡攔阻人蒙神接納的，都因此被挪去。血是我們站在神面前的根基，也是我們能與祂相交的憑藉。」丁良才另在本章列出舊約祭祀的六項教訓：人是有罪的、罪叫人與神隔絕（賽59:2）、必須贖罪神才能與人和好、神會為人設立贖罪之法、若不流血罪就不得赦免（來9:22）、人既已與神和好神就悅納他們的供獻和敬拜。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: |
    利3 中贖愆祭未直接出現，但在兩處作為對照：KC 指出燔祭與素祭是甘心獻的、贖罪祭與贖愆祭是為罪不得不獻的，平安祭居中；丁良才則指出贖愆祭的祭牲與燔祭、贖罪祭一樣都在壇的北邊宰（利7:2、14:13），惟獨平安祭經文沒有指定宰牲的地方。
  relation: |
    五祭在「自願／義務」上分成兩組，平安祭正在分界線上。KC：「燔祭與素祭是甘心獻的，是為著神的。隨後的贖罪祭與贖愆祭則是義務的祭，是為百姓、或百姓中某一個人的罪所必需的。平安祭理當居中。」平安祭是自願的最後一個，也是唯一一個獻祭者能與神、與祭司同席的祭——義務的祭處理隔閡，自願的祭表達相交，平安祭則是相交的高點。
- title: 鹽約
  path: link_folder/神學/鹽約.md
  summary: |
    利3 未提到鹽，但利2:13 的規定涵蓋本章：「一切的供物都要配鹽而獻。」丁良才在利2:13 明言其範圍：「不但在各種素祭上必須加鹽，一切別的祭物也都要配鹽而獻（結43:24）」，故平安祭亦在其中。
  relation: |
    平安祭是筵席的祭，鹽約的意象在此格外貼切。丁良才記其風俗來歷：「按亞西的風俗，人若一同吃餅與鹽，便是好朋友」；《舊約聖經背景註釋》：「盟友建立這種協議時，通常會共享菜色包括鹽醃肉類的筵宴。故此獻祭時加鹽作為盟約關係的提示，是很合適的。」利3 正是這樣一場筵席——丁良才用一個比方收束平安祭的意義：「【比方】仇敵同席，是表明他們和好了。」鹽約與平安祭因此指向同一件事：和好之後的同席，不是一次性的，而是持久有效的。
- title: 血
  path: link_folder/神學/血.md
  summary: |
    利3:2、8、13 平安祭三級皆須灑血在壇的周圍；v17 則以「脂油和血都不可吃」的永遠定例作結。CT：「『血』是為贖罪，故不可吃。」《精讀本》：「血被視為生命本身或生命的根源（利17:11）……承認所有生物的生命都屬於神。」
  relation: |
    本章把血的兩面並在一起：血必須灑在壇上（因為那是相交的基礎），血絕不可吃（因為生命屬於神）。KC 從神的權利說明後者：「因為神是生命的賜予者，祂也就是唯一有權得著生命的那一位。既然生命在血中，血就單單歸祂。」《啟導本》另提醒一處常被混淆的經文：「《申命記》12:15-16 禁止吃血，但沒有禁止吃脂油，因所講的事與這裡完全不同，不可混淆。」——申12 的脈絡是平常宰殺食用，利3 的脈絡是獻祭條例。禁血的範圍是全面的（利17:10-13），禁脂油的範圍則限於牛、綿羊、山羊的板油。
- title: 壇
  path: link_folder/主題/壇.md
  summary: |
    利3:2、5、8、13、16 中壇是灑血與焚燒脂油的所在。v5 特別指明是「壇的燔祭上，就是在火的柴上」——即每日早晨已獻上的燔祭之上。丁良才指出經文對平安祭的宰牲位置反而留白：「聖書上沒有說明平安祭牲是在壇哪邊宰的……但因平安祭的祭牲有時很多（王上8:63），所以神也不嚴定一個宰牲的地方。」
  relation: |
    利1 使壇的四面各有定用（東倒灰、西洗濯盆、南斜坡、北宰牲），利3 卻在宰牲位置上鬆開——不是規矩改了，而是這祭的規模可能大到無法拘泥一處。壇在本章的另一個角色是「疊放」：平安祭的脂油燒在燔祭之上，構成一個次序——先贖罪與全然獻上，才有平安與相交。KC 指出舊約已用「主的桌子」指稱祭壇（結44:16；瑪1:7），這正是他把平安祭接到林前10:16-21 的橋樑。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: |
    利3:2、5 中「壇」指燔祭壇。CT：「『壇』指燔祭壇，它放置在會幕近門口之處；全句意指祭牲的血灑在燔祭壇的四周（參出29:16、20）。」《靈修版》補其位置：「這祭壇（燔祭壇）是在帳幕的裡面，會幕的外面。」平安祭的脂油要燒在此壇上每日早晨已獻的燔祭之上（v5）。
  relation: |
    燔祭壇在利3 同時承擔三件事：接血（灑在四周）、承燔祭（每日早晨）、承平安祭的脂油（疊在燔祭上）。這使它成為次序的具象——丁良才：「平安祭燒在燔祭上，特要表明平安是本著贖罪及將自己全然獻與神而來的。」KC 另指出舊約以「主的桌子」稱祭壇（結44:16；瑪1:7），故燔祭壇在平安祭的脈絡裡不只是焚燒之處，也是同席之處。
- title: 弗2：14-16
  path: link_folder/互文/弗2：14-16.md
  summary: |
    利3 的平安祭是弗2:14-16 的舊約底稿。CT 在本章反覆以此作註：「平安祭預表基督是神與人之間的和睦（弗2:14-15）與平安，人在享受和諧關係之餘，甘心樂意向神獻上感恩和虔敬。」丁良才列出三層：「（一）祂成就了和平（西1:20-22，林後5:18），（二）祂來傳和平的福音（弗2:17），祂就是我們的和平（弗2:14）」，並以一個比方收尾：「【比方】仇敵同席，是表明他們和好了。」
  relation: |
    弗2:14-16 說基督「使兩下合而為一，拆毀了中間隔斷的牆」，利3 則以一場筵席把這件事演出來：神得脂油、祭司得胸與右腿、獻祭者與一切潔淨的人同吃其餘——同一隻祭牲，三方同席。KC 把落點放在主的桌子：「平安祭對我們的意義，林前10 講明了（林前10:16-21）。對我們而言，它就是主的桌子——在主的晚餐裡，神、主耶穌與一切屬祂的人之間的相交在那裡被慶祝。」而次序也對得上：林前10:16 先說「同領基督的血」，才說「同領基督的身體」，正如平安祭必先灑血才有筵席——和好在先，同席在後。
