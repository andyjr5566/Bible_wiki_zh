  "summary": "v20-21,25,27四次重複「必從民中剪除」：不潔而吃平安祭肉（v20-21）、吃脂油（v25）、吃血（v27），是利未記中此公式最集中出現的段落。CT：「從營中被逐出，不被視為神的子民」。"
  "relation": "補充既有條目（原僅出23:23「神將迦南人剪除」的滅族義）以外「逐出選民」的用法，兩者字根相同、指涉對象不同（滅族 vs. 逐出約群體）。"
