  "relation": "本章不重複贖罪祭條例本身（已見利4、6章），只在v7以「一個條例」明確宣告贖罪祭與贖愆祭祭司分例相同，是利4、6章贖罪祭祭司規則向贖愆祭延伸適用的關鍵樞紐節點。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "本章11-36節是利3章平安祭條例的正式補充篇。11-21節首次明確區分感謝祭、還願祭、甘心祭三種子類型與各自食用期限——感謝祭當日吃完，還願/甘心祭可留至次日，第三天必焚燒且吃者「擔當罪孽」。28-36節規定祭司之分：搖祭胸、舉祭右腿，「作他們從以色列人中所永得的分」。"
  "relation": "利3章確立平安祭獻祭條例（脂油焚壇、灑血），本章補上利3章未談的「食用規範」與「祭司之分」兩大板塊，兩章合起來構成平安祭完整條例。"
- "title": "平安祭"
  "path": "link_folder/神學/平安祭.md"
  "summary": "v11-21三種子類型與食用期限；v28-34搖祭胸、舉祭腿歸祭司永遠之分。CT《串珠聖經註釋》：「平安祭是在各祭中唯一准許獻祭者分享的（11-21）。耶和華的分是燒在壇上的脂油（22-25），祭司的分（30-34）包括搖的胸和舉的腿，其餘所有的肉則歸獻祭者」。"
  "relation": "與利3章、出20:24、出29章累積內容一貫呼應：平安祭是神、祭司、獻祭者三方共享的祭，本章具體規定了這三方各自實際拿到什麼、何時可以吃。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "v30「好把胸在耶和華面前作搖祭，搖一搖」；v34「取了這搖的胸……給祭司亞倫和他子孫，作他們從以色列人中所永得的分」。CT：「唯獨平安祭牲的胸被搖了」；GT《精讀本》：搖祭源於希伯來語「努帕」，意為「搖」，祭司把祭物拿在手上在耶和華壇前前後搖動。"
  "relation": "本章正式將搖祭專指平安祭「胸」的部分（與利3章、出29章承接聖職搖祭呼應），確認其歸亞倫和他子孫永得的分——首次為既有條目補上「利未記:7」累積區塊。"
- "title": "舉祭（terumah）"
