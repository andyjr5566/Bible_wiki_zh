  "summary": "v13「要用有酵的餅和為感謝獻的平安祭，與供物一同獻上」——是利2:11-12「素祭都不可有酵」規定唯一的例外情境。GT丁良才：「這裏用有酵餅乃是表示獻祭的人自己是有罪的，不配蒙神的恩典……不能因為感謝祭中獻上有酵餅，就認為酵是好的。這有酵餅只限用於平安祭」。"
  "relation": "利2章確立素祭不可有酵與蜜的核心禁例（僅初熟供物可用有酵餅為例外），本章13節補上第二個例外情境：感謝祭伴隨的有酵餅並非燒在壇上的素祭本身，而是與供物一同獻上、供人食用的部分，不違反「不可燒一點酵當作火祭」的核心禁令。"
- "title": "承接聖職（分別為聖）"
  "path": "link_folder/神學/承接聖職（分別為聖）.md"
  "summary": "v35-36「這是從耶和華火祭中，作亞倫受膏的分和他子孫受膏的分，正在摩西叫他們前來給耶和華供祭司職分的日子……這是他們世世代代永得的分」；v37「並承接聖職的禮」。CT：「『供祭司職分的日子』就是開始承接聖職的日子」。"
