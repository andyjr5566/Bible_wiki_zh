- "title": "火祭（isheh）"
  "path": "link_folder/主題/火祭（isheh）.md"
  "summary": "v5「祭司要在壇上焚燒，為獻給耶和華的火祭，是贖愆祭」；v25「無論何人吃了獻給耶和華當火祭牲畜的脂油」；v30「他親手獻給耶和華的火祭，就是脂油和胸」；v35「這是從耶和華火祭中，作亞倫受膏的分」。"
  "relation": "本章火祭一詞四次出現，涵蓋贖愆祭焚脂（v5）、被禁食的火祭牲畜脂油（v25）、平安祭焚脂與搖祭（v30）、祭司永得的分之總稱（v35），是串連五祭「焚燒歸神」共同本質的關鍵詞，補充利1、3-6章已列的火祭段落。"
- "title": "灑血（zaraq）"
  "path": "link_folder/主題/灑血（zaraq）.md"
  "summary": "v2「人在哪裡宰燔祭牲，也要在那裡宰贖愆祭牲；其血，祭司要灑在壇的周圍」。GT丁良才：「贖愆祭牲的血卻只灑在壇的周圍（本節），像燔祭、和平安祭的血一樣」，不同於贖罪祭抹壇角、倒壇腳的用法。"
  "relation": "確認贖愆祭灑血方式與燔祭、平安祭相同（灑壇周圍），有別於贖罪祭抹壇角、倒壇腳的儀式，補充利4章已建立的「灑血儀式因祭別而異」體系，是灑血法在五祭中的第三次（燔祭、平安祭、贖愆祭）確認。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "本章1-38節通篇規定祭司（亞倫和他子孫）在五祭中應得的份——皮（v8）、烤製素祭餅（v9）、生素祭均分（v10）、搖祭胸（v31）、舉祭腿（v32-34），並在v35-36確認這些是「摩西膏立亞倫及子孫」當日起永久供給。"
  "relation": "利1、2、5章確立祭司在各祭中的贖罪與代理職責，本章補上「祭司具體從各祭實得什麼份額」的完整清單，是祭司供給制度最集中的一章。"
- "title": "污穢"
  "path": "link_folder/主題/污穢.md"
  "summary": "v19「挨了污穢物的肉就不可吃，要用火焚燒」；v21「有人摸了什麼不潔淨的物，或是人的不潔淨，或是不潔淨的牲畜，或是不潔可憎之物，吃了獻與耶和華平安祭的肉，這人必從民中剪除」。CT：「『不潔淨的物』指器物或衣服的不潔淨，如碰觸到動物屍體；『人的不潔淨』指人碰觸到不潔淨之物」。"
  "relation": "利5:2-3規定誤犯者（摸不潔之物、摸別人的污穢）須獻贖愆祭補贖；本章21節則是「明知不潔仍吃祭肉」的故意情境，規定剪除刑罰，是同一污穢概念在不同祭別、不同故意程度下的延伸適用。"
- "title": "摸聖物成聖"
  "path": "link_folder/神學/摸聖物成聖.md"
  "summary": "v19-21規定祭肉沾污穢物不可吃須焚燒、不潔之人或摸了不潔之物後吃平安祭肉者必被剪除。CT：「吃平安祭的人必須潔淨，正如平安祭的肉必須潔淨一樣」。"
  "relation": "利6:18,27確立「潔淨的人／物觸聖物即成聖」的正面原則，本章19-21節提供其鏡像規定——「不潔的人／物觸聖物（吃祭肉）即玷污並招致剪除」，兩者互為聖潔傳染性原則的正反兩面。"
- "title": "永遠當祭司的職任"
  "path": "link_folder/神學/永遠當祭司的職任.md"
  "summary": "v34「作他們從以色列人中所永得的分」；v36「這是他們世世代代永得的分」。CT：「『永得的分』意指劃分出來指定給祭司做他們永遠該得的分」。"
  "relation": "出40章確立「世世代代凡受膏的，就永遠當祭司的職任」的應許，本章34、36節將此應許具體落實在祭物分配制度上——祭司從平安祭所得的搖祭胸、舉祭腿，正是這永久職任的具體物質體現。"
- "title": "皮衣與血祭"
  "path": "link_folder/神學/皮衣與血祭.md"
  "summary": "v8「獻燔祭的祭司，無論為誰奉獻，要親自得他所獻那燔祭牲的皮」。GT丁良才：「神在伊甸園給亞當夏娃作衣服所用的皮子，大概是被獻之祭牲的皮子（創三21注），獻燔祭的祭司要得他所獻之祭牲的皮，或者是從此傳起的」；並指出「以色列人用牲畜的皮作褥子、鞋、和衣服等（創三21，來十一37）」。"
  "relation": "既有條目錨定創3:21神為亞當夏娃用皮子作衣服的恩典行動；本章8節祭司得燔祭牲之皮的規定，GT明確將其溯源至這一創世記傳統，是「必須有牲畜流血才能遮蓋」神學在利未記祭司實務中的延續呼應。"
- "title": "腰子（kilyah）"
  "path": "link_folder/原文/腰子（kilyah）.md"
  "summary": "v4「兩個腰子和腰子上的脂油，就是靠腰兩旁的脂油，並肝上的網子和腰子，一概取下」——屬贖愆祭條例（1-10節）。"
  "relation": "重複利3、4章已確立之脂油清單，將腰子及其脂油列入贖愆祭須焚燒獻神的部位，與平安祭（利3章）、贖罪祭（利4章）採用同一清單，是此部位第三次（利3、4、7章）出現於祭牲脂油清單。"
- "title": "肝上的網子（yoteret ha-kaved）"
  "path": "link_folder/原文/肝上的網子（yoteret ha-kaved）.md"
  "summary": "v4「並肝上的網子和腰子，一概取下」——屬贖愆祭條例。CT：「『肝上的網子』或作『肝葉』，乃指肝上的脂油，其狀似網」。"
  "relation": "確認肝上的網子在贖愆祭中同樣須取下焚燒，與平安祭、贖罪祭一致，是利未記中此部位第三次（利3、4、7章）出現於祭牲脂油清單。"
- "title": "肥尾巴（alyah）"
  "path": "link_folder/原文/肥尾巴（alyah）.md"
  "summary": "v3「又要將肥尾巴和蓋臟的脂油」——本節明確屬贖愆祭條例（1-10節）。"
  "relation": "重要更正：既有條目「主題發展」欄原記載「安息祭、贖愆祭不列肥尾巴」，與本節經文直接矛盾——贖愆祭實際上與平安祭綿羊同樣須獻上肥尾巴，此條目「主題發展」欄需一併更正此誤植。"
- "title": "贖價（基督作贖價）（來9：22）"
  "path": "link_folder/互文/贖價（基督作贖價）（來9：22）.md"
  "summary": "v2「其血，祭司要灑在壇的周圍」。CT：「按著律法，凡物差不多都是用血潔淨的；若不流血，罪就不得赦免了（來九22）」。"
  "relation": "本章2節祭司灑贖愆祭血於壇周圍，CT直接引來9:22申明血祭赦罪的新約原理，與既有條目（出29章承接聖職贖罪祭血）同一互文脈絡的延伸引用。"
