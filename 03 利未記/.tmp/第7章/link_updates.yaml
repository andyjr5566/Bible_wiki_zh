  "summary": "v9-10補上利2、6章素祭條例之外「祭司如何分配不同做法之素祭餅」的細節：爐烤、煎盤、鐵鏊做的歸主祭祭司獨得，生的細麵則眾祭司均分。v12-14則說明素祭餅（三種無酵餅）如何伴隨平安祭感謝祭獻上。CT：「素祭有爐烤、煎盤做、鐵鏊烙三種做法……都要歸那獻祭的祭司——因素祭僅須焚燒一把細麵，其餘所做的餅都歸祭司」。"
