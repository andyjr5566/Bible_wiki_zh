  "summary": "v14「從各樣的供物中，他要把一個餅獻給耶和華為舉祭，是要歸給灑平安祭牲血的祭司」；v32-33「你們要從平安祭中把右腿作舉祭，奉給祭司」。CT：舉祭指將手中的祭物垂直向上舉起。"
  "relation": "本章確認舉祭涵蓋餅（各樣供物取一個）與平安祭右腿兩類，皆歸祭司享用，呼應利3章、出29章承接聖職之舉祭——首次為既有條目補上「利未記:7」累積區塊。"
- "title": "剪除（kareth）"
