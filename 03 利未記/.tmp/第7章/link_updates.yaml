book: 利未記
chapter: 7
updates:
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: |
    本章1-7節從祭司角度補充贖愆祭條例：宰於燔祭牲處（壇北邊）、血灑壇周圍（非抹壇角，與贖罪祭不同）、脂油（肥尾巴、蓋臟脂油、腰子、肝上網子）焚燒為火祭、祭司男丁在聖處吃祭物（至聖）。v7 贖罪祭怎樣贖愆祭也是怎樣，兩個祭一個條例，獻贖愆祭贖罪的祭司得祭物。BH: guilt offering is most holy; blood splattered on all sides indicates thoroughness of atonement. CT: 贖愆祭表徵基督應付人的罪行（複數）。GT: 贖愆祭有五樣與贖罪祭不同之處——表意、性質、用血、祭牲、條例。KC: whoever brings a guilt offering may also see that the Lord Jesus is also the burnt offering.
  relation: |
    本章補充贖愆祭的祭司實務細節（宰殺位置、灑血方式、脂油部位、祭司食用權），強調贖愆祭與贖罪祭同例——對付罪行與對付罪性不可分割。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    v2 贖愆祭牲宰於宰燔祭牲之處（壇北邊），暗示贖愆祭與燔祭相連。v8 獻燔祭的祭司無論為誰奉獻，要親自得那燔祭牲的皮——皮歸祭司為酬勞。BH: hide was valuable commodity; priests relied on portions of offerings for sustenance. CT: 表徵事奉並供應基督的人得以享用基督的保守和彰顯（皮）。KC: the skin speaks of being clothed with the value of the Son's sacrifice——knowing who you are in Christ.
  relation: |
    本章以燔祭為贖愆祭的參照點（同宰殺處），並首次規定燔祭牲皮歸祭司——皮表徵基督外在的保守與彰顯，祭司得皮預表事奉者披戴基督。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: |
    v9-10 素祭歸祭司細則：爐烤/煎盤/鐵鏊做的歸獻祭祭司；油調和或乾的歸亞倫子孫大家均分。v12 感謝祭同獻三種無酵餅（調油無酵餅、抹油無酵薄餅、油調細麵餅）。BH: grain offerings provided for priests; communal aspect of worship. CT: 表徵事奉並供應基督的人得以享用基督受苦的功效（烤、煎）和滿有聖靈的基督（油調）。KC: a believer who deals with guilt of another receives special appreciation for the perfect devotion of the Lord Jesus.
  relation: |
    本章補充素祭歸祭司的分配細則——不同做法（爐/煎盤/鐵鏊）歸不同祭司，乾/油調均分，預表事奉者從不同角度享用基督。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: |
    v7 贖罪祭怎樣，贖愆祭也是怎樣，兩個祭是一個條例——兩種祭的祭司份例相同（獻祭祭司得祭物）。BH: the same law applies to both, indicating uniformity in sacrificial system. CT: 表徵人如何對付罪性（單數），也要如何對付罪行（複數）。GT: 贖愆祭與贖罪祭有五樣不同（表意、性質、用血、祭牲、條例），但歸祭司的份相同。KC: the guilt offering is like the sin offering, there is one law for them.
  relation: |
    本章以「兩個祭是一個條例」總結贖罪祭與贖愆祭的關係——對付罪性與對付罪行互為表裡，不可分割。
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: |
    本章11-21節詳列平安祭條例：三類——感謝祭（無酵餅+有酵餅同獻、祭肉當日吃完）、還願祭（次日也可吃）、甘心祭（次日也可吃）；第三天剩肉必焚燒，違者祭不蒙悅納且擔罪；不潔者（自身不潔/摸不潔物）吃祭肉必從民中剪除。v28-36 搖祭（胸）和舉祭（右腿）歸祭司為永得之分。BH: peace offering signifies reconciliation and communion; thanksgiving/votive/freewill distinctions. CT: 平安祭是唯一准許獻祭者分享的祭。KC: the peace offering is a fellowship offering represented for us in the Table of the Lord (1Cor 10:15-21).
  relation: |
    本章是平安祭最完整的條例——涵蓋三種動機（感謝/還願/甘心）、食用期限、潔淨條件、祭司份例（搖胸舉腿），預表新約聖餐的交通筵席。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: |
    v6 祭司男丁在聖處吃贖愆祭肉（至聖）。v8 獻燔祭祭司得祭牲皮。v9-10 獻素祭祭司得爐烤/煎盤/鐵鏊素祭，眾祭司均分油調/乾素祭。v14 灑平安祭牲血的祭司得舉祭餅。v31-34 胸（搖祭）歸亞倫和他子孫，右腿（舉祭）歸獻血脂油的祭司。v35-36 這是亞倫受膏的分和他子孫受膏的分，世世代代永得的分。BH: priests as mediators provided through portions of offerings. CT: 祭司供職時須穿祭司服，不問工作貴賤同樣尊嚴。KC: the breast speaks of love, the right thigh of strength——love and strength of the work of the Lord Jesus.
  relation: |
    本章全面規定祭司從五祭中所得的分——燔祭皮、素祭餅、贖愆/贖罪祭肉、平安祭胸腿，預表事奉者從基督工作各方面得供應。
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: |
    v3-5 贖愆祭脂油（肥尾巴、蓋臟脂油、腰子、肝上網子）焚燒為火祭。v22-25 禁吃脂油：牛/綿羊/山羊脂油不可吃；自死/撕裂脂油可作他用；吃獻為火祭牲畜脂油者必從民中剪除。v30-31 平安祭脂油親手獻上、祭司在壇上焚燒。BH: fat considered the best part, reserved for God alone. CT: 脂油為祭物最好的部分，應屬耶和華神。KC: the fat speaks of the energy with which the Lord Jesus completed the work; only God can measure this energy perfectly.
  relation: |
    本章從獻祭（焚燒脂油歸神）與禁戒（民不可吃）兩面強調脂油專屬神——表徵基督工作的內在能量惟神能完全賞識。
- title: 血
  path: link_folder/神學/血.md
  summary: |
    v2 贖愆祭牲血灑在壇的周圍（非抹壇角，與贖罪祭不同）。v14 灑平安祭牲血的祭司得舉祭餅。v26-27 禁吃一切血：雀鳥/野獸血都不可吃，吃血者必從民中剪除。BH: blood representing life was crucial element in atonement; belongs exclusively to God. CT: 血是活物的生命所寄，生命既為神所給，只可歸還給祂。KC: the deep meaning of the blood of Christ to God cannot be fathomed by human understanding.
  relation: |
    本章從獻祭（灑血壇周圍）與禁戒（民不可吃血）兩面強調血專屬神——表徵基督寶血的獨特與生命惟歸神所有。
- title: 至聖
  path: link_folder/神學/至聖.md
  summary: |
    v1 贖愆祭是至聖的。v6 祭司男丁在聖處吃贖愆祭肉，是至聖的。BH: most holy indicates highest level of sanctity within sacrificial system. CT: 贖愆祭和贖罪祭一樣是至聖的。KC: the guilt offering, like the sin offering, is most holy.
  relation: |
    本章兩次強調贖愆祭為至聖，延續第六章對素祭/贖罪祭/贖愆祭至聖性的界定。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: |
    v2 宰贖愆祭牲在宰燔祭牲之處（壇北邊）。v5 祭司在壇上焚燒贖愆祭脂油為火祭。v30-31 祭司在壇上焚燒平安祭脂油。BH: the altar was the designated place for offerings. CT: 壇是神臨在之處。KC: the altar speaks of the cross of Christ where the offering is brought.
  relation: |
    本章銅壇是贖愆祭與平安祭脂油焚燒之處，也是贖愆祭牲宰殺之處——所有祭都指向銅壇（十字架）。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    v6 祭司要在聖處吃贖愆祭肉——聖處即會幕院子。BH: holy place refers to tabernacle courtyard. CT: 會幕院內有燔祭壇和洗濯盆，院子稱聖是因為會幕是神的住處。KC: a holy place is where natural thinking is not given room, everything directed toward God.
  relation: |
    本章會幕院子是祭司吃至聖祭物的聖處，延續第六章對聖處的界定。
- title: 細麵
  path: link_folder/原文/細麵.md
  summary: |
    v12 感謝祭同獻用油調勻細麵做的餅。BH: fine flour represents the best of what one can offer. CT: 細麵餅表徵生命的供應。KC: fine flour speaks of the Lord Jesus as the true Man.
  relation: |
    本章細麵用於感謝祭的素祭餅，表徵基督完美人性為感恩交通的基礎。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: |
    v7 獻贖愆祭贖罪的祭司要得這祭物——祭司藉贖愆祭為犯罪者贖罪。BH: atonement involves covering sin, restoring relationship with God. CT: 贖愆祭贖罪預表基督應付人的罪行。KC: the priest who makes atonement with it shall have it.
  relation: |
    本章贖罪體現在贖愆祭中——祭司為百姓的罪行（複數）贖罪，預表基督持續潔淨信徒的罪行（約壹1:9）。
- title: 馨香（reach nichoach）
  path: link_folder/原文/馨香（reach nichoach）.md
  summary: |
    v5 祭司在壇上焚燒贖愆祭脂油為獻給耶和華的火祭——火祭即馨香火祭。BH: food offering signifies pleasing aroma to God. CT: 脂油焚燒為馨香火祭歸神。KC: the offering by fire is a soothing aroma to the LORD.
  relation: |
    本章贖愆祭脂油焚燒為馨香火祭，延續火祭的馨香意義——基督獻己為神所悅納。
- title: 火祭（isheh）
  path: link_folder/原文/火祭（isheh）.md
  summary: |
    v5 贖愆祭脂油焚燒為獻給耶和華的火祭。v30 親手獻給耶和華的火祭（脂油和胸）。v35 從耶和華火祭中作亞倫受膏的分和他子孫受膏的分。BH: food offering/fire offering signifies dedication to God. CT: 火祭指經火焚燒所獻的祭。KC: the offerings by fire to the LORD are the basis of the priest's consecrated portion.
  relation: |
    本章三次提及火祭——贖愆祭脂油、平安祭脂油和胸、祭司受膏之分皆從火祭而出，表徵一切事奉根基在於基督獻己為火祭。
- title: 供物
  path: link_folder/主題/供物.md
  summary: |
    v13-14 有酵餅與供物一同獻上；從各樣供物中取一個餅為舉祭。v38 耶和華在西乃曠野吩咐以色列人獻供物給耶和華之日所說的。BH: offerings presented to the LORD as act of worship. CT: 供物包括祭牲和素祭餅。KC: God expects us to continually offer up a sacrifice of praise.
  relation: |
    本章供物涵蓋平安祭的祭牲與陪同的餅，v38總結全書五祭條例皆為「獻供物給耶和華」的吩咐。
- title: 無殘疾
  path: link_folder/神學/無殘疾.md
  summary: |
    v1-7 贖愆祭牲須無殘疾（參5:15;6:6）。BH: unblemished animal required for sacrifice. CT: 無殘疾預表基督的完全無罪。KC: the offering must be without defect.
  relation: |
    本章贖愆祭牲延續無殘疾要求，預表基督作為贖愆祭的完全無瑕疵。
- title: 公綿羊
  path: link_folder/文化/公綿羊.md
  summary: |
    v1-7 贖愆祭牲為公綿羊（參5:15;6:6）。BH: ram of proper value for guilt offering. CT: 贖愆祭牲只用公綿羊，不像贖罪祭有多種祭牲。GT: 贖愆祭牲必須是公的，或因這祭與燔祭所表示的相近。KC: the ram speaks of the perfection of Christ's sacrifice.
  relation: |
    本章贖愆祭牲為公綿羊，延續第五、六章規定，預表基督作為贖愆祭的完全奉獻。
- title: 耶和華曉諭摩西（利6：1）
  path: link_folder/事件/耶和華曉諭摩西（利6：1）.md
  summary: |
    v22,28 兩次「耶和華對摩西說」，分段啟示禁吃脂油和血（v22-27）及搖祭舉祭條例（v28-36）。BH: divine communication establishing authority of instructions. CT: 耶和華對摩西說標示新段落的開始。KC: the LORD spoke to Moses giving additional provisions.
  relation: |
    本章兩次「耶和華對摩西說」將禁戒（脂油與血）與祭司份例（搖舉祭）分為兩段啟示，延續利未記神直接曉諭的模式。
- title: 無酵餅
  path: link_folder/原文/無酵餅.md
  summary: |
    v12 感謝祭同獻調油無酵餅、抹油無酵薄餅、油調細麵餅——三種無酵餅陪同平安祭。BH: unleavened cakes signify purity and absence of sin. CT: 無酵表徵聖潔無罪污。KC: unleavened cakes speak of the Lord Jesus in Whom is no sin.
  relation: |
    本章無酵餅用於感謝祭（平安祭），與有酵餅同獻——無酵餅表徵基督的純潔，有酵餅表徵獻祭者仍有罪。
