- "title": "贖愆祭（asham）"
  "path": "link_folder/原文/贖愆祭（asham）.md"
  "summary": "本章1-10節補足利5:14-6:7未詳述的贖愆祭祭司操作程序：宰殺地點同燔祭（壇北），血灑壇周圍（非抹壇角），脂油（肥尾巴、蓋臟脂油、腰子、肝網子）焚壇，祭司男丁在聖處吃至聖之物。v7明訂「贖罪祭怎樣，贖愆祭也是怎樣，兩個祭是一個條例」，兩祭祭司分例完全相同。"
  "relation": "補齊利5章贖愆祭「觸發情境與賠償」之外「祭司如何操作」的空白；GT丁良才指出贖愆祭與贖罪祭五點不同（表意、性質、用血、祭牲、條例），本章2節「血灑壇周圍」與贖罪祭「抹壇角」形成對照，證實用血方式確為兩祭主要差異之一。"
- "title": "贖罪祭"
