  "path": "link_folder/解經爭議/從民中剪除的含義.md"
  "summary": "本章四次密集使用「必從民中剪除」公式（v20,21,25,27），適用於不潔淨吃祭肉、吃脂油、吃血。CT傾向「逐出說」；GT《利未記雷氏研讀本》同傾向「逐出說」；BH與GT《啟導本》則並陳「逐出」與「死亡」兩說，未有定論。"
  "relation": "既有條目原僅錨定創17:14拒受割禮一例；本章是「剪除」公式在摩西五經中最密集重複出現的段落，證實這是貫穿全律法書、持續存在的解經爭議，不因情境不同（背約 vs. 違反潔淨/獻祭條例）而有更明確答案。"
- "title": "脂油（chelev）"
  "path": "link_folder/原文/脂油（chelev）.md"
  "summary": "v23「牛的脂油、綿羊的脂油、山羊的脂油，你們都不可吃」；v24「自死的和被野獸撕裂的，那脂油可以做別的使用，只是你們萬不可吃」；v25吃火祭牲脂油者必從民中剪除。啟導本：脂油是祭物最好的部分，應屬耶和華；並補充保健理由（脂肪致血管硬化、膽固醇過高）。"
  "relation": "利3-6章的脂油禁令限於「被獻為祭之牲畜」的脂油，本章23-25節將禁令擴大到一切牛羊脂油（不限被獻者），並補充自死/被野獸撕裂脂油可作他用（如燈油）的例外規定。"
- "title": "血不可吃（血の禁令）"
  "path": "link_folder/神學/血不可吃（血の禁令）.md"
  "summary": "v26「在你們一切的住處，無論是雀鳥的血是野獸的血，你們都不可吃」；v27「無論是誰吃血，那人必從民中剪除」。CT：此禁令比脂油禁令更寬——神雖准吃羚羊野獸的脂油，但無論什麼血、連雀鳥和野獸的血都絕對不可吃。"
  "relation": "利3:17僅宣告「脂油和血都不可吃」的總則，本章是既有條目所預告「後續利未記7、17章詳細規範」的第一次兌現，具體擴大到雀鳥與野獸之血、涵蓋一切住處，並首次明訂違者「必從民中剪除」的刑罰。"
- "title": "血的尊重"
  "path": "link_folder/神學/血的尊重.md"
  "summary": "v26-27禁食一切雀鳥野獸之血，違者剪除。啟導本：「動物與鳥類的血都不可吃，因為血是活物的生命所寄（十七11）。生命既為神所給，只可以歸還給祂，人不可以佔有」。"
  "relation": "本章上承創9:4挪亞條例「肉帶著血、那就是他的生命，不可吃」，下接利17:10-14「活物的生命是在血中」的完整神學闡述，是「血代表生命、歸神主權」發展線在利未記中段的關鍵重申，並首度將此原則具體立法化（明訂剪除刑罰）。"
- "title": "脂油和血都不可吃"
  "path": "link_folder/神學/脂油和血都不可吃.md"
  "summary": "v22-27整段落實脂油血雙重禁令：牛羊山羊脂油不可吃（v23）、自死/撕裂牲畜脂油可作他用但不可吃（v24）、吃火祭牲脂油者剪除（v25）、一切雀鳥野獸血不可吃且剪除（v26-27）。啟導本：禁止吃脂油與血還有保健理由，血可能帶病菌、脂油可致心臟病。"
  "relation": "本章正是既有條目「主題發展」欄預告的「後續利未記7、17章詳細規範」中的第一次兌現：22-27節將利3:17脂油血雙重禁令從「總則宣告」擴充為具體適用範圍（牛羊山羊脂油、雀鳥野獸血、一切住處）與明確刑罰（剪除）。"
