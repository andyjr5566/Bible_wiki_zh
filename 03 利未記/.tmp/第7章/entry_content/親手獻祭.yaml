name: 親手獻祭
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 在獻平安祭的條例中，獻祭者要親手將獻給耶和華的火祭，就是脂油和胸帶來。這強調了獻祭者親自參與獻祭行動的必要性，祭司隨後將脂油在壇上焚燒，並把胸在耶和華面前作搖祭。此條例突顯了獻祭者與祭司在獻祭過程中的共同參與。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定獻平安祭者要親手將脂油和胸帶來獻給耶和華為火祭，好讓祭司把胸作搖祭。
  relation: 確立獻祭者親自奉獻脂油與胸的動作，作為平安祭中獻祭者與祭司互動的關鍵環節。
related_entries:
