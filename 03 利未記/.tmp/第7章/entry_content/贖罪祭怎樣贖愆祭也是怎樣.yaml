name: 贖罪祭怎樣贖愆祭也是怎樣
type: 神學
secondary_types: []
aliases:
- 贖罪祭與贖愆祭同一條例
status: formal
definition: 說明贖罪祭與贖愆祭在獻祭條例與處理祭物上具有相同的規範，兩個祭是一個條例。此神學連結確立了兩者在贖罪功能與祭司得分的對等性，獻贖愆祭贖罪的祭司要得這祭物。
accumulations:
- book: 利未記
  chapter: 7
  summary: 明文規定贖罪祭怎樣，贖愆祭也是怎樣，兩個祭是一個條例，祭司要得這祭物。
  relation: 確立贖罪祭與贖愆祭在條例上的合一性，並規範祭司在獻祭後得祭物的權利。
related_entries:
- 贖罪祭
- 贖愆祭（asham）
- 亞倫和他兒子（祭司）
- 至聖
sources:
- '研經註解: 利未記第7章兩祭同一條例（https://biblehub.com/study/leviticus/7.htm）'
- '逐節註解: 利未記第7章第7節贖罪與贖愆祭之關聯（https://www.ccbiblestudy.org/Old%20Testament/03Lev/03CT07.htm）'
- '拾穗/應用: 利未記第7章祭司得祭物之屬靈意義（https://www.ccbiblestudy.org/Old%20Testament/03Lev/03GT07.htm）'
- '研經註解: 利未記第7章贖罪與贖愆祭之比較（https://www.kingcomments.com/en/bible-studies/Lev/7）'
