name: 承接聖職的禮（millu'im）
type: 原文
secondary_types: []
aliases:
- 承接聖職的禮
- millu'im
status: formal
definition: 希伯來文 millu'im，原意為「充滿」，指祭司承接聖職的禮。在利未記第7章結尾，經文總結了五祭的條例後，將「承接聖職的禮」與這些獻祭條例並列，指出這一切都是耶和華在西乃山所吩咐摩西的。此詞強調了亞倫和他兒子被膏立、分別為聖擔任祭司職分的過程。
accumulations:
- book: 利未記
  chapter: 7
  summary: 本章在總結燔祭、素祭、贖罪祭、贖愆祭和平安祭的條例時，一併提及承接聖職的禮，並指明其源於西乃山的吩咐。
  relation: 作為五祭條例的總結，將祭司承接聖職的禮與獻祭條例連結於西乃山的啟示。
related_entries:
