name: 第三天焚燒
type: 神學
secondary_types: []
aliases:
- 用火焚燒祭肉
status: formal
definition: 指平安祭中還願祭與甘心祭的祭肉，若到了第三天仍有剩餘，則必須用火焚燒的條例（利7:17）。此規定確保祭肉不會腐敗，並維持獻祭的聖潔性。若有人在第三天吃平安祭的肉，這祭必不蒙悅納，獻祭也不算為祭，反為可憎嫌的，吃祭肉的人必擔當自己的罪孽（利7:18）。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定還願祭與甘心祭剩下的祭肉到第三天必須用火焚燒，違者擔當罪孽。
  relation: 作為還願祭與甘心祭食用期限的終極界線，違反此條例將導致祭物失效且獻祭者定罪。
related_entries:
