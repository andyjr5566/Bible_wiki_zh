name: 肥尾巴
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 指綿羊尾部累積的厚脂肪層，在古代近東文化中被視為祭牲最上好的部分。在贖愆祭的條例中，肥尾巴與蓋臟的脂油、腰子等需一概取下，在壇上焚燒獻給耶和華作為火祭。
accumulations:
- book: 利未記
  chapter: 7
  summary: 獻贖愆祭時，要將肥尾巴和蓋臟的脂油等取下焚燒獻給耶和華。
  relation: 屬於獻給神的火祭之重要組成部分，體現將祭牲最精華的部分歸給神的獻祭文化。
related_entries:
- 脂油
- 火祭（isheh）
- 贖愆祭（asham）
- 銅壇（燔祭壇）
sources:
- '研經註解: 利未記第7章肥尾巴之獻祭（https://biblehub.com/study/leviticus/7.htm）'
- '逐節註解: 利未記第7章第3節肥尾巴（https://www.ccbiblestudy.org/Old%20Testament/03Lev/03CT07.htm）'
