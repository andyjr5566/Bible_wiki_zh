name: 燔祭牲的皮
type: 神學
secondary_types: []
aliases:
- 燔祭的皮
status: formal
definition: 指燔祭牲被剝下來的獸皮。在燔祭條例中，祭牲的肉與脂油需全然焚燒獻給神，但祭司無論為誰奉獻，要親自得他所獻那燔祭牲的皮作為當得的分。
accumulations:
- book: 利未記
  chapter: 7
  summary: 獻燔祭的祭司要親自得他所獻那燔祭牲的皮。
  relation: 確立燔祭牲之皮歸屬獻祭祭司的條例，作為祭司事奉神所得的報酬。
related_entries:
- 燔祭（olah）
- 亞倫和他兒子（祭司）
- 供物
sources:
- '研經註解: 利未記第7章燔祭牲之皮（https://biblehub.com/study/leviticus/7.htm）'
- '逐節註解: 利未記第7章第8節祭司得皮之條例（https://www.ccbiblestudy.org/Old%20Testament/03Lev/03CT07.htm）'
- '拾穗/應用: 利未記第7章祭司供應之應用（https://www.ccbiblestudy.org/Old%20Testament/03Lev/03GT07.htm）'
- '研經註解: 利未記第7章祭司的得分（https://www.kingcomments.com/en/bible-studies/Lev/7）'
