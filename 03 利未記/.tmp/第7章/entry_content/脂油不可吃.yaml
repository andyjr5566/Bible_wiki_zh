name: 脂油不可吃
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 耶和華曉諭以色列人，牛、綿羊、山羊的脂油都不可吃。自死或被野獸撕裂之牲畜的脂油雖可做別的使用，但仍不可吃。若有人吃了獻給耶和華當火祭牲畜的脂油，那人必從民中剪除。此條例確立了脂油專屬於神的至高主權，脂油作為獻給神的火祭，歸祭司在壇上焚燒，百姓不可私自保留或食用。
accumulations:
- book: 利未記
  chapter: 7
  summary: 明文禁止百姓食用牛、羊、山羊的脂油，規定自死之物的脂油僅能做其他用途，並宣告凡吃獻給耶和華火祭牲畜脂油的人必被剪除。
  relation: 確立脂油作為獻給神之火祭的絕對歸屬，禁止百姓食用，違者面臨從民中剪除的刑罰。
related_entries:
