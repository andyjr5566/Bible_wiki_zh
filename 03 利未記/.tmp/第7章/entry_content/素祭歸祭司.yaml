name: 素祭歸祭司
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 素祭中在爐中烤的、煎盤中做的，並鐵鏊上做的，都要歸那獻祭的祭司。 凡素祭，無論是油調和的是乾的，都要歸亞倫的子孫，大家均分。 這條例確立了祭司在會幕事奉中從素祭所得的分，作為他們在壇前事奉耶和華的供應。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定爐中烤、煎盤做及鐵鏊上做的素祭歸獻祭的祭司，其餘素祭歸亞倫子孫均分。
  relation: 確立祭司從素祭中得分的神學原則與分配細則。
related_entries:
- 素祭（minchah）
- 亞倫和他兒子（祭司）
- 大家均分
- 細麵
sources:
