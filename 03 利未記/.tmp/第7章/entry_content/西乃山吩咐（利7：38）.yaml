name: 西乃山吩咐（利7：38）
type: 事件
secondary_types: []
aliases:
- 西乃山吩咐
status: formal
definition: 指耶和華在西乃曠野吩咐以色列人獻供物給耶和華之日，藉著摩西頒佈各項獻祭條例的事件。利未記第7章結尾明確指出，燔祭、素祭、贖罪祭、贖愆祭、平安祭的條例以及承接聖職的禮，全部都是耶和華在西乃山所吩咐摩西的，確立了所有祭司與獻祭制度的神聖來源與權威。
accumulations:
- book: 利未記
  chapter: 7
  summary: 本章第37至38節總結所有獻祭條例與承接聖職之禮，皆源於耶和華在西乃山曠野吩咐摩西的日子。
  relation: 作為本章的結語，將五祭條例與祭司受膏的制度統一歸於西乃山的啟示事件。
related_entries:
- 耶和華曉諭摩西（利6：1）
