name: 還願祭
type: 神學
secondary_types: []
aliases:
- 還願
status: formal
definition: 還願祭是平安祭的一種獻祭動機。根據利未記第7章16節，若所獻的平安祭是為還願，獻祭者必須在獻祭的日子吃祭肉，所剩下的第二天也可以吃。這與為感謝獻的平安祭（必須在當天吃完）在食用期限上有所不同，顯示還願祭的祭肉保存期限較長。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定還願祭的祭肉可在獻祭當天與第二天食用，第三天必須焚燒。
  relation: 作為平安祭的動機分類之一，與甘心祭同享第二天的食用寬限，但受第三天焚燒的嚴格限制。
related_entries:
- 平安祭（shelamim）
- 甘心祭（nedabah）
- 第三天焚燒
- 感謝祭（todah）
