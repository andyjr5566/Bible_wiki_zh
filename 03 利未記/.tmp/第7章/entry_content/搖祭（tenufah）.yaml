name: 搖祭（tenufah）
type: 原文
secondary_types: []
aliases:
- 搖祭
status: formal
definition: 希伯來文 tenufah，意指「搖動」或「揮動」。在利未記第7章中，此詞用於平安祭的條例，獻祭者要親手將脂油和胸帶來，祭司在耶和華面前把胸作為搖祭搖一搖。這搖祭的胸歸給亞倫和他的子孫，作為他們從以色列人中所永得的分。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定獻平安祭時，祭司要在耶和華面前把胸作搖祭搖一搖，這搖祭的胸歸給亞倫和他的子孫作為永得的分。
  relation: 本章具體描述了 tenufah（搖祭）的執行方式與歸屬，作為祭司從平安祭中所得的分。
