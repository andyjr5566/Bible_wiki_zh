name: 肝上的網子
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 指附著在肝臟上的網狀脂油（肝的尾葉或肝膜上的脂肪）。在獻祭文化中，這部分與腰子及其上的脂油同被視為屬於耶和華的分，需在壇上焚燒作為火祭，不可作為凡俗食物食用。
accumulations:
- book: 利未記
  chapter: 7
  summary: 獻贖愆祭時，要取下肝上的網子和腰子，在壇上焚燒獻給耶和華。
  relation: 屬於獻給神的脂油部分，體現獻祭文化中將內臟精華全然歸給神的具體作法。
related_entries:
- 脂油
- 火祭（isheh）
- 贖愆祭（asham）
- 銅壇（燔祭壇）
sources:
- '研經註解: 利未記第7章肝上網子之條例（https://biblehub.com/study/leviticus/7.htm）'
