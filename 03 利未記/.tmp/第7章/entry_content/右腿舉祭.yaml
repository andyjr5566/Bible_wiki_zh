name: 右腿舉祭
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 在平安祭的條例中，以色列人要從平安祭中把右腿作為舉祭奉給祭司。亞倫子孫中獻平安祭牲血和脂油的，要得這右腿為分。這是耶和華從以色列人的平安祭中，取了舉的腿給祭司亞倫和他子孫，作為他們從以色列人中所永得的分。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定要從平安祭中取右腿作舉祭奉給祭司，歸給亞倫子孫中獻平安祭牲血和脂油的祭司，作為永得的分。
  relation: 確立右腿舉祭作為祭司從平安祭中永得的分，與搖祭的胸同為祭司受膏的分。
related_entries:
