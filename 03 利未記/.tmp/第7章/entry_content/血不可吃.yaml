name: 血不可吃
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 耶和華曉諭以色列人，在他們一切的住處，無論是雀鳥的血或野獸的血，都不可吃。無論是誰吃血，那人必從民中剪除。此禁令延續了血是生命、為贖罪之用的神學原則，確立了血的神聖性，禁止百姓將其作為食物，違者將遭受最嚴厲的懲罰。
accumulations:
- book: 利未記
  chapter: 7
  summary: 禁止以色列人在一切住處吃任何雀鳥或野獸的血，並宣告凡吃血者必從民中剪除。
  relation: 確立血的神聖地位與不可食用的絕對禁令，違者將從民中剪除。
related_entries:
- 血
- 從民中剪除（karet）
