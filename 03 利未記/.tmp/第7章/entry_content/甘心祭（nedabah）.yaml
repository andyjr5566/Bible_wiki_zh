name: 甘心祭（nedabah）
type: 原文
secondary_types: []
aliases:
- 甘心獻的祭
- 甘心祭
status: formal
definition: 希伯來文 nedabah，意指「自願」、「甘心」的奉獻。在利未記第7章16節中，此詞與「還願」並列，作為平安祭的另一種獻祭動機。甘心祭的祭肉規定與還願祭相同，必須在獻祭的日子吃，剩下的第二天也可以吃，到了第三天則必須用火焚燒。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定甘心獻的平安祭祭肉可分兩天食用，並確立第三天焚燒的條例。
  relation: 本章將 nedabah 與還願祭歸為同一類食用條例，與感謝祭的當日吃完形成對比。
related_entries:
