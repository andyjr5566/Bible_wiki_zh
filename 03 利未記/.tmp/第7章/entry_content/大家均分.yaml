name: 大家均分
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 凡素祭，無論是油調和的是乾的，都要歸亞倫的子孫，大家均分。 此條例強調在亞倫子孫（祭司家族）之間，對於未指定給特定獻祭祭司的素祭，應當公平分配，
  體現了在聖所中事奉的祭司在供應上的平等原則。
accumulations:
- book: 利未記
  chapter: 7
  summary: 規定無論是油調和的或乾的素祭，都要歸亞倫的子孫大家均分。
  relation: 彰顯祭司在神供應中的平等與共享原則。
related_entries:
- 素祭（minchah）
- 亞倫和他兒子（祭司）
- 素祭歸祭司
