name: 受膏的分
type: 神學
secondary_types: []
aliases:
- 受膏的分
status: formal
definition: 指神從以色列人的平安祭中，指定歸給祭司亞倫和他子孫的永得產業。耶和華從以色列人獻的火祭中，取了搖的胸和舉的腿給祭司，作為他們受膏的分。這分產業是在摩西膏立他們為祭司的日子，耶和華吩咐以色列人給他們的，作為世世代代永得的分。
accumulations:
- book: 利未記
  chapter: 7
  summary: 耶和華從平安祭中取搖的胸和舉的腿給亞倫和他子孫，作為他們受膏的分和世世代代永得的分。
  relation: 本章首次明確定義祭司從百姓祭物中所得的永分為「受膏的分」。
related_entries:
