name: 不可欺壓鄰舍雇工工價不可過夜
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 禁止以強暴手段剝奪鄰人的權益，使他們蒙受不當的損失；雇工人的工價不可拖欠過夜，必須當天支付，因為那是他們的生活所需。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止欺壓鄰舍、搶奪其物，並規定雇工的工價不可留到早晨，必須及時支付。
  relation: 屬於向著人的聖潔生活條例，保護弱勢者的基本生存權益。
related_entries:
- 不可偷盜
- 不可咒罵聾子絆倒瞎子
