- 不可說謊
- 誠實條例
status: formal
definition: 利未記 19:11 並列三項禁止：「不可偷盜，不可欺騙，也不可彼此說謊」。這是聖潔生活在人際關係上誠實公義的基本要求，緊接著第 12 節禁止指神名起假誓，形成完整誠信體系。
development: 十誡中「不可偷盜、不可作假見證」（出 20:15-16）為核心誡命。新約以弗所書 4:25、28 勸勉棄絕謊言、偷盜，要說誠實話、勞力做工。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止偷盜、欺騙、彼此說謊（19:11），並禁止指神名起假誓褻瀆神名（19:12）。
  relation: 本章聖潔法典中人際倫理誡命的起始段落，確立誠信為聖潔生活的基石。
