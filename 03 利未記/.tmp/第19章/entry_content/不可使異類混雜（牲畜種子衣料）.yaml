name: 不可使異類混雜（牲畜種子衣料）
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 要守神的律例，不可叫牲畜與異類配合，不可用兩樣攙雜的種種地，也不可用兩樣攙雜的料做衣服穿在身上；目的是維持神創造中「各從其類」的原則，並防止以色列人與外族同化，效法外邦宗教和生活習俗。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止牲畜異類交配、田地混種、衣料攙雜，強調遵守神所命定各從其類的原則，保持信仰與生活的純粹性。
  relation: 屬於向著財物的聖潔生活條例，教導在日常生活細節中維持聖別。
related_entries:
- 不可為自己雕刻偶像
- 你們要聖潔因為我是聖潔的
