name: 不可辱沒女兒使她為娼妓
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 禁止父親或家長使女兒淪為娼妓，包括賣女為娼或容許女兒自甘墮落，尤其針對當時異教廟宇中盛行的廟妓風俗；此舉會使全地充滿淫亂與大惡。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第29節明令「不可辱沒你的女兒，使她為娼妓」，並警告否則地上的人專向淫亂，地就滿了大惡。
  relation: 本條目直接出自利未記19:29，屬於「守身敬畏神的聖潔生活條例」，維護家庭與社會的性倫理，防止迦南異教淫風敗壞選民。
related_entries:
- 你們要聖潔因為我是聖潔的
sources:
