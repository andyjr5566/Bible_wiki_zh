name: 婢女行淫的贖愆祭條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 婢女許配了丈夫，還沒有被贖、得釋放，人若與她行淫，二人要受刑罰，卻不把他們治死，因為婢女還沒有得自由；那人要把贖愆祭，就是一隻公綿羊牽到會幕門口、耶和華面前，祭司要用贖愆祭的羊為他贖罪，他的罪就必蒙赦免。
accumulations:
- book: 利未記
  chapter: 19
  summary: 規定與尚未得自由的許配婢女行淫者，須受刑罰並獻上贖愆祭，罪可得赦免，兼顧婢女權益與神的聖潔。
  relation: 屬於向著財物的聖潔生活條例，處理特殊身分下的性倫理與贖罪程序。
related_entries:
- 平安祭（shelamim）
- 不可辱沒女兒使她為娼妓
