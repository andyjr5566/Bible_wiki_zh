name: 審判度量衡不可行不義
type: 主題
secondary_types: []
aliases:
- 度量衡公義
- 公道度量衡
- 審判公義
- 利未記十九章三十五至三十六節
status: formal
definition: 利未記 19:15 要求審判不可行不義、不偏護窮人、不重看有勢力、按公義審判；19:35-36 延伸至度量衡（尺、秤、升、斗）必須公道。公義審判與誠實商業同屬聖潔生活表現。
development: 申命記 16:18-20 設立法官審判公義。箴言 11:1、16:11、20:10、23 嚴厲譴責詭詐度量衡。阿摩司書 8:5-6 先知責備以詭詐度量衡欺壓貧窮。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 15 節規定公義審判原則；第 35-36 節規定度量衡公道，並以「曾把你們從埃及地領出來」作為救贖動機。
  relation: 本章法律倫理段落，將法庭公義延伸至市場經濟誠信，彰顯神對全生命領域公義的要求。
