name: 謹守遵行一切律例典章
type: 主題
secondary_types: []
aliases:
- 遵行律例典章
- 守律例典章
status: formal
definition: 利未記 19:37 以「你們要謹守遵行我一切的律例典章。我是耶和華」作為全章總結。「律例」（ḥuqqîm）指儀式性規定，「典章」（mišpāṭîm）指司法判例。此節將前
  36 節的具體條例納入立約順服的整體框架，以耶和華的主權身分為最終權威。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 37 節總結全章，命令謹守遵行一切律例典章，並以「我是耶和華」封閉聖潔法典單元。
  relation: 本章聖潔法典的結語，將個別倫理儀式條例整合為立約群體對耶和華主權的整全回應。
