name: 不可辱沒女兒使為娼妓
type: 主題
secondary_types: []
aliases:
- 不可辱沒女兒
- 賣淫禁令
- 女兒為娼妓
status: formal
definition: 利未記 19:29 禁止父親「辱沒女兒，使他為娼妓」（ḥillēl ʾet-bitô lĕhaznōtâ）。希伯來文「辱沒」（ḥillēl）原意「褻瀆、視為平常」，指將神賜予的女兒視為可交易商品。古近東社會因貧窮或宗教習俗（如聖殿娼妓
  qĕdēšâ）常有此現象。經文警告：「恐怕地上的人專向淫亂，地就滿了大惡」，顯示家庭道德崩壞將導致社會整體淫亂與審判（參利 18:24-25；20:22-23）。
development: 此條例保護女性尊嚴，肯定家庭為社會道德基石。申命記 23:17-18 禁止娼妓收入進聖殿，何西阿書 4:13-14 譴責以色列「與娼妓同居」、女兒行淫。新約哥林多前書
  6:15-20 論及「身體是聖靈的殿」，拒絕與娼妓聯合，呼應此保護女性免受性剝削的神學軸心。早期教會視賣淫為嚴重罪惡，並建立救贖機制（如馬太福音 21:31 稅吏娼妓進神國）。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 29 節嚴禁父親賣女為娼，指出家庭道德敗壞導致社會淫亂滿地的後果。
  relation: 承接第 26-28 節身體聖潔條例，將焦點從個人儀式純潔轉向家庭與社會性倫理；第 30 節隨即轉回「守安息日、敬聖所」，形成「倫理聖潔與儀式聖潔雙軌並行」結構。
