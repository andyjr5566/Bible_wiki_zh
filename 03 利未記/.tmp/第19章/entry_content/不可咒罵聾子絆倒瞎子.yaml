name: 不可咒罵聾子絆倒瞎子
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 不可欺負身體有缺陷、殘廢的人，包括咒罵聾子和將絆腳石放在瞎子面前；要知道神是慈愛、公義的，祂對弱勢的人以憐憫為懷，對仗勢欺人者卻是可畏的，所以要敬畏神。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止咒罵聾子、在瞎子面前放絆腳石，強調要敬畏神，因為神必鑒察並保障傷殘人士。
  relation: 屬於向著人的聖潔生活條例，教導不可趁人軟弱或缺乏時佔便宜或陷害他。
related_entries:
- 不可欺壓鄰舍雇工工價不可過夜
- 審判不可行不義按公義審判
sources:
