name: 公道天平法碼升斗
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 要求在審判與商業交易上使用公道的天平、法碼、升斗、秤，不可在度量衡上施行不義；這反映出神公義的屬性，並提醒選民是蒙拯救脫離埃及的百姓。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第35-36節命令施行審判不可行不義，在尺、秤、升、斗上也要公道，並宣告「我是耶和華你們的神，曾把你們從埃及地領出來的」。
  relation: 本條目直接出自利未記19:35-36，屬於「愛人敬畏神的聖潔生活條例」，將公平交易與公正審判視為聖潔生活不可或缺的實踐。
related_entries:
- 審判不可行不義按公義審判
- 不可偷盜
sources:
