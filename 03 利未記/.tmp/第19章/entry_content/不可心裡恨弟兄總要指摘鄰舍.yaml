name: 不可心裡恨弟兄總要指摘鄰舍
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 不可心裡恨弟兄；對待族人，動機不是懷恨而是關心，如果他有錯，應當率直指出他的錯來，以免他陷於不義，否則就會招來神的罪責。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止心裡恨弟兄，吩咐總要指摘鄰舍的過錯，免得因他擔罪，強調愛心規勸的責任。
  relation: 屬於向著人的聖潔生活條例，教導以愛心而非仇恨對待弟兄，並積極挽回犯錯者。
related_entries:
- 不可搬弄是非不可與鄰舍為敵
- 利19：18
