name: 不可效法外邦喪儀習俗（剃髮劃身刺花紋）
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 禁止以色列人隨從外邦人的喪葬與宗教習俗，包括剃頭的周圍（兩鬢）、損壞鬍鬚的周圍、為死人用刀劃身，以及在身上刺花紋（紋身），這些行為與敬拜偶像假神或取悅死人的異教風俗相連。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第27-28節明確禁止剃髮、損壞鬍鬚、為死人劃身與刺花紋，並以「我是耶和華」作結，強調這些禁令基於神聖潔的屬性。
  relation: 本條目直接出自利未記19:27-28，屬於「守身敬畏神的聖潔生活條例」，要求選民在身體裝飾與哀悼方式上與迦南異教風俗徹底分別。
related_entries:
- 你們要聖潔因為我是聖潔的
