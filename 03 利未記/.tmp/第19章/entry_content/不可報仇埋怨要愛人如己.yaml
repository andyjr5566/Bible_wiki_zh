name: 不可報仇埋怨要愛人如己
type: 主題
secondary_types: []
aliases:
- 不可報仇
- 不可埋怨
- 愛鄰舍條例
status: formal
definition: 利未記 19:18 雙重禁止「不可報仇，也不可埋怨你本國的子民」，並給出正向核心誡命「卻要愛人如己」。這是舊約倫理的最高峰，耶穌稱為「其次也相仿」的大誡命（太
  22:39）。
development: 羅馬書 13:9-10 保羅總結律法歸於「愛人如己」。雅各書 2:8 稱此為「經上的至理王道」。利未記 19:34 將此愛延伸至寄居者。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止報仇、埋怨，命令愛人如己（19:18）；並在第 34 節擴展至愛寄居者如己。
  relation: 本章倫理高峰，「我是耶和華」作為頒布者與執行者的權威印證。
