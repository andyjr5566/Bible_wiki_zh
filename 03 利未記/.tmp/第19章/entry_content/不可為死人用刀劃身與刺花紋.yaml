name: 不可為死人用刀劃身與刺花紋
type: 主題
secondary_types: []
aliases:
- 不可為死人劃身
- 刺青禁令
- 刺花紋
- 喪葬劃身
status: formal
definition: 利未記 19:28 禁止兩項與異教喪葬崇拜相關的身體標記：一、「不可為死人用刀劃身」（śāraṭ，指割裂皮膚流血哀悼），二、「不可在身上刺花紋」（kĕtōḇeṯ
  qaʿăqaʿ，指刺青/紋身）。古近東（如迦南、埃及、美索不達米亞）普遍以割身、紋身表達對亡者忠誠、祈求神庇佑或標記奴隸身分。此禁令宣告：以色列人身體屬耶和華（利
  25:42；林前 6:19-20），不得作異教儀式載體。
development: 申命記 14:1 重申此禁令並連結「你們是耶和華你們神的兒女」。新約雖無明文廢除，但加拉太書 6:17 保羅說「我身上帶著耶穌的印記」，啟示錄
  7:3；14:1 額上印記、13:16 獸的印記，形成屬靈歸屬的對比。教會歷史中，君士坦丁大帝禁止臉部刺青（316 AD），中世紀教會視紋身為異教殘餘，現代宣教神學討論文化適應與聖潔界限的張力。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 28 節嚴禁為死人割身與刺青，斷絕身體作異教喪葬崇拜媒介，宣告身體屬神。
  relation: 與第 27 節剃髮禁令、第 26 節法術禁令構成「三重身體聖潔防線」；第 29 節接續保護女性免受賣淫剝削，同屬維護人格尊嚴與聖潔身分的條例群。
