name: 不可搬弄是非與不可與鄰舍為敵置之於死
type: 主題
secondary_types: []
aliases:
- 不可搬弄是非
- 不可與鄰舍為敵
- 置之於死
status: formal
definition: 利未記 19:16 禁止兩項破壞群體關係的行為：一、「在民中往來搬弄是非」（希伯來文 rāḵîl，意指散布流言、中傷），二、「與鄰舍為敵，置之於死」（原文「流他的血」，指危害鄰舍性命或導致其流血）。經文以「我是耶和華」結尾，強調此乃神聖秩序的要求，違犯即褻瀆神名。
development: 此條例屬「聖潔法典」（利 17-26）人際倫理段落的核心，將言語暴力（搬弄是非）與實體暴力（置之於死）並列，顯示神對社群公義的關切。後世猶太教傳統將「搬弄是非」視為嚴重罪惡（lashon
  hara），新約雅各書 3:5-6、4:11 亦呼應此原則。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 16 節明令禁止搬弄是非與危害鄰舍性命，奠定社群倫理基調基礎。
  relation: 本章聖潔生活總綱（19:1-2）的具體展現，與「愛人如己」（19:18）形成正反對照。
