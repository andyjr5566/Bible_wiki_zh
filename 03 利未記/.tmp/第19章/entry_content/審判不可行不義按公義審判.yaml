name: 審判不可行不義按公義審判
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 施行審判時不可行不義，不可偏護窮人，也不可重看有勢力的人，只要按著公義審判鄰舍；總要秉持公平、公正，不受任何身分影響。
accumulations:
- book: 利未記
  chapter: 19
  summary: 吩咐審判官和百姓官長應當秉公施行審判，不可枉法，不可因貧富或勢力而偏待人。
  relation: 屬於向著人的聖潔生活條例，體現神公義的屬性在司法中的應用。
related_entries:
- 不可搬弄是非不可與鄰舍為敵
- 公道天平法碼升斗
