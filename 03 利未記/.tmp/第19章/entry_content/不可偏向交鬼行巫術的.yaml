name: 不可偏向交鬼行巫術的
type: 主題
secondary_types: []
aliases:
- 不可偏向交鬼
- 不可行巫術
status: formal
definition: 利未記 19:31 嚴禁「偏向那些交鬼的和行巫術的」，並警告不可求問他們，免得被玷污。希伯來文「交鬼」為 ʾōb（靈媒/招魂者），「行巫術」為
  yiddĕʿōnî（知靈/巫師）。此條例屬於聖潔法典中「不可行外邦風俗」的範疇，強調以色列當單單仰望耶和華，不可透過死人或邪靈尋求啟示。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 31 節禁止偏向交鬼行巫術者，並警告會被玷污，結語「我是耶和華─你們的神」。
  relation: 本章聖潔生活的負面誡命之一，保護立約群體免受邪靈勢力侵蝕，維護耶和華獨一的啟示權柄。
related_entries:
