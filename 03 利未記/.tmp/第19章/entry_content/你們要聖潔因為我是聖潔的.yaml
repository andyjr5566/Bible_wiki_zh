name: 你們要聖潔因為我是聖潔的
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 本章聖潔生活條例的總綱，指出神子民應當聖潔的理由，因為耶和華神是聖潔的；人若要與神來往，便須聖潔，效法神的屬性。
accumulations:
- book: 利未記
  chapter: 19
  summary: 全章總綱，要求全體神的子民在生活各方面都要符合神聖潔的性情，因為神自己是聖潔的。
  relation: 直接定義本章所有條例的神學基礎與動機。
