name: 以色列全會眾
type: 人物
secondary_types: []
aliases:
- 以色列會眾
- 全會眾
status: formal
definition: 利未記 19:2 記載「耶和華對摩西說：你曉諭以色列全會眾說：你們要聖潔」。希伯來文「會眾」為 ʿēdâ，指立約群體的集體身分。本章聖潔法典直接對「以色列全會眾」頒布，強調聖潔不是祭司或精英的專利，乃是全體立約子民的共同呼召。摩西作為中保傳遞神的話語給全會眾。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 2 節耶和華吩咐摩西曉諭以色列全會眾，宣告聖潔呼召。
  relation: 本章聖潔法典的受眾主體，確立聖潔為全體立約群體的共同責任，而非特定階層。
