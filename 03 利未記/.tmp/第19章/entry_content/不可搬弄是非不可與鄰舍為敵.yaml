name: 不可搬弄是非不可與鄰舍為敵
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 不可在民中往來搬弄是非、傳舌造謠，也不可與鄰舍為敵，故意陷害鄰人，甚至置之於死；神的子民不可製造糾紛，也不可作假見證害人。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止在民中往來搬弄是非，以及與鄰舍為敵、流人的血，強調不可用言語或行為陷害鄰人。
  relation: 屬於向著人的聖潔生活條例，維護社群內部的誠信與生命安全。
related_entries:
- 審判不可行不義按公義審判
- 不可心裡恨弟兄總要指摘鄰舍
