name: 田角拾穗顧念窮人的條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 收割莊稼時不可割盡田角，也不可拾取所遺落的；摘葡萄園果子不可摘盡，也不可拾取所掉的果子，要留給窮人和寄居的。表明神的子民不可存貪婪、吝嗇、自私的心，應當紀念窮人，樂意施捨。
accumulations:
- book: 利未記
  chapter: 19
  summary: 吩咐以色列人在收割莊稼和摘取葡萄時，要留下田角和遺落的果子給窮人與寄居者，體現神對窮苦人的關懷。
  relation: 屬於向著人的聖潔生活條例，教導顧念貧窮、心存慷慨。
related_entries:
- 善待寄居的外人愛他如己
