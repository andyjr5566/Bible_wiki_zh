name: 迦南地栽種果樹頭三年果子如未受割禮的條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 到了迦南地，栽種各樣結果子的樹木，頭三年所結的果子如未受割禮的一樣，不可吃；第四年所結的果子全要成為聖，用以讚美耶和華；第五年才可以吃那樹上的果子，好叫樹結果子更多。
accumulations:
- book: 利未記
  chapter: 19
  summary: 規定新栽果樹頭三年果子不可吃，視為不潔淨；第四年果子歸神為聖；第五年才可食用，並應許因此結果子更多。
  relation: 屬於向著財物的聖潔生活條例，教導將初熟之果獻給神，並學習忍耐與信靠神的賜福。
