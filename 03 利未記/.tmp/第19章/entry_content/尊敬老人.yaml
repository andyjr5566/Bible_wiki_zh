name: 尊敬老人
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 吩咐以色列人在白髮的人面前要站起來，並要尊敬老人，將尊敬長者與敬畏神直接相連；老人代表神所安排的次序與人生閱歷的智慧。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第32節命令「在白髮的人面前，你要站起來；也要尊敬老人，又要敬畏你的神。我是耶和華」，把尊敬老人列為聖潔生活的一環。
  relation: 本條目直接出自利未記19:32，屬於「愛人敬畏神的聖潔生活條例」，教導選民透過尊敬長者來活出對神的敬畏。
related_entries:
- 當孝敬父母
