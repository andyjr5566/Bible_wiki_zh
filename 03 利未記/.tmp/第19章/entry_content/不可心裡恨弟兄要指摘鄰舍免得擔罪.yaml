name: 不可心裡恨弟兄要指摘鄰舍免得擔罪
type: 主題
secondary_types: []
aliases:
- 不可心裡恨弟兄
- 免得擔罪
- 內心潔淨
status: formal
definition: 利未記 19:17 禁止「心裡恨你的弟兄」，並命令「總要指摘你的鄰舍，免得因他擔罪」。這將聖潔延伸至內心態度與責任關係，避免因縱容罪惡而共同承擔罪責。
development: 馬太福音 5:21-22 耶穌將「不可殺人」深化為「不可動怒」，屬同一屬靈原則。加拉太書 6:1 勸勉屬靈人溫柔挽回犯罪的人，體現「指摘」的愛心目的。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止心裡恨弟兄，命令指摘鄰舍免得擔罪（19:17），緊接著禁止報仇、埋怨，命令愛人如己（19:18）。
  relation: 本章處理人際衝突的核心段落，從內心動機（恨）到行動責任（指摘）再到正向命令（愛）。
