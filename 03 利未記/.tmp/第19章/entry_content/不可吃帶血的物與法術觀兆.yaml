status: formal
definition: 利未記 19:26 合併兩項禁令：「不可吃帶血的物」與「不可用法術，也不可觀兆」。前者尊重生命屬神（利 17:11），後者拒絕異教占卜手段，單單倚靠耶和華啟示。
development: 利未記 17:10-14 詳細論述禁血神學。使徒行傳 15:20 耶路撒冷會議保留「禁血」給外邦信徒。申命記 18:10-14 嚴禁各類占卜，要求「在耶和華你神面前作完全人」。
accumulations:
- book: 利未記
  chapter: 19
  summary: 禁止吃血與法術觀兆（19:26），緊接著禁止為死人剃髮、刺身（19:27-28），屬哀悼與異教習俗禁令群。
  relation: 本章分別為聖生活細節，拒絕迦南宗教文化滲透，維護獨一真神崇拜純正性。
