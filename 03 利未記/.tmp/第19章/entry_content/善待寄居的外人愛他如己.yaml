name: 善待寄居的外人愛他如己
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 吩咐以色列人對待與他們同居的外人（寄居者）要如同本地人一樣，不可欺負他們，並要愛他們如己；理由是以色列人曾在埃及地作過寄居的，應當以同理心恩待外人。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第33-34節命令不可欺負同居的外人，要看他們如本地人並愛他如己，因為以色列人在埃及也作過寄居的，並以「我是耶和華你們的神」作結。
  relation: 本條目直接出自利未記19:33-34，屬於「愛人敬畏神的聖潔生活條例」，將愛鄰舍的命令延伸至外族寄居者，體現神對弱勢者的眷顧。
related_entries:
- 利19：18
- 田角拾穗顧念窮人的條例
