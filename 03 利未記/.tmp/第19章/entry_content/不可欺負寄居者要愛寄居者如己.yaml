name: 不可欺負寄居者要愛寄居者如己
type: 主題
secondary_types: []
aliases:
- 愛寄居者如己
- 不可欺負寄居者
status: formal
definition: 利未記 19:33-34 禁止欺負寄居者（gēr），並命令「要看他如本地人一樣，並要愛他如己」，理由是「因為你們在埃及地也作過寄居的」。此條例將法律保護提升至倫理內化（愛人如己），並以救恩歷史（出埃及）為動機，顯示聖潔群體當以恩典回應恩典。
accumulations:
- book: 利未記
  chapter: 19
  summary: 第 33-34 節禁止欺負寄居者，命令視同本地人、愛如己身，並以在埃及地作寄居者為神學依據。
  relation: 本章聖潔法典中社會正義的核心條例，將「愛人如己」從同胞延伸至外邦寄居者，奠定新約「愛鄰舍」的普世基礎。
related_entries:
