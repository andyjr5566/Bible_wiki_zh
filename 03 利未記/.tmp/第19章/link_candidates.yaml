book: 03 利未記
chapter: 19
candidates:
- name: 聖潔生活總綱（利19:1-2）
  type: 主題
  evidence: 利19:1-2 耶和華對摩西說，曉諭以色列全會眾：你們要聖潔，因為我耶和華你們的神是聖潔的。本章總綱，神的聖潔是百姓聖潔的根基與標準。CT：本節是全章總綱，要求對象是全體子民，理由是神的屬性。KC：利18強調分離，利19強調分別為聖歸給神。
  surfaces:
  - 聖潔生活總綱
- name: 孝敬父母與守安息日並列
  type: 主題
  evidence: 利19:3 你們各人都當孝敬父母，也要守我的安息日。第五誡與第四誡並列，孝敬父母（敬畏源頭）與守安息日（承認神創造/救贖主權）是聖潔生活的起點。GT：孝敬父母原文作「懼怕」，與申6:2、13同詞；咒罵父母與褻瀆神名同罰（利20:9，24:16）。
  surfaces: []
- name: 不可偏向虛無的神與鑄造神像
  type: 主題
  evidence: 利19:4 不可偏向虛無的神，也不可為自己鑄造神像。第二誡申命，虛無的神（elilim）指偶像假神，有名無實。KC：人所鑄造的神像非神真像，乃憑空想慾念，引誘人偏向虛妄、諂媚鬼魔。
  surfaces:
  - 虛無的神
  - 鑄造神像
  - 偏向虛無的神
- name: 平安祭獻得可蒙悅納條例
  type: 主題
  evidence: 利19:5-8 獻平安祭要獻得可蒙悅納：當天和第二天吃，第三天剩下的必用火焚燒；第三天吃者為可憎惡，不蒙悅納；吃的人擔當罪孽，褻瀆聖物，必從民中剪除。重申利7:15-18條例。KC：平安祭表甘心祭，與神交通必須保持新鮮，不可陳舊。
  surfaces:
  - 平安祭獻得可蒙悅納
  - 第三天必用火焚燒
  - 褻瀆聖物
- name: 不可偷盜欺騙說謊
  type: 主題
  evidence: 利19:11 不可偷盜，不可欺騙，也不可彼此說謊。第八誡（偷盜）延伸：欺騙、說謊。KC：信實是神百姓不可少的德行；西3:9、弗4:25新約重申。
  surfaces:
  - 不可偷盜
  - 不可欺騙
  - 不可彼此說謊
- name: 不可指神名起假誓褻瀆神名
  type: 主題
  evidence: 利19:12 不可指著我的名起假誓，褻瀆你神的名。第三誡延伸：起假誓褻瀆神名。KC：撒謊是罪，起假誓是更大的罪；凡事不可虧欠人（羅13:8，雅5:4）。
  surfaces:
  - 指著我的名起假誓
  - 褻瀆你神的名
  - 起假誓
- name: 不可咒罵聾子與絆腳石放在瞎子面前
  type: 主題
  evidence: 利19:14 不可咒罵聾子，也不可將絆腳石放在瞎子面前，只要敬畏你的神。保護身體軟弱者；屬靈應用：不可使人跌倒（羅14:13，林前8:9）。KC：神有能力抵住、聽見、看見。
  surfaces:
  - 不可咒罵聾子
  - 不可將絆腳石放在瞎子面前
  - 絆腳石
- name: 審判不可行不義偏護窮人重看有勢力
  type: 主題
  evidence: 利19:15 施行審判，不可行不義；不可偏護窮人，也不可重看有勢力的人，只要按著公義審判鄰舍。司法公正：不偏護貧窮，不偏袒權勢。雅各2:9按外貌待人便是犯罪。
  surfaces:
  - 施行審判不可行不義
  - 不可偏護窮人
  - 不可重看有勢力的人
  - 按著公義審判
- name: 不可搬弄是非與不可與鄰舍為敵置之於死
  type: 主題
  evidence: 利19:16 不可在民中往來搬弄是非，也不可與鄰舍為敵，置之於死（原文作流他的血）。KC：搬弄是非原文譯作「往來傳舌」（箴11:13，20:19）、「讒謗人」（耶6:28，9:4，結22:9）。兩層意：不可因假見證置無辜於死；不可知情不作見證置人於死。
  surfaces:
  - 不可搬弄是非
  - 不可與鄰舍為敵
  - 置之於死
  - 流他的血
  - 往來傳舌
- name: 不可報仇埋怨要愛人如己
  type: 主題
  evidence: 利19:18 不可報仇，也不可埋怨你本國的子民，卻要愛人如己。內在動機層面：愛人如己為第二大誡命（太22:39，羅13:9，加5:14，雅2:8）。KC：律法以我為準則，基督教以基督為準則（約壹3:16）。
  surfaces:
  - 不可報仇
  - 不可埋怨
- name: 婢女許配未贖身行淫條例
  type: 主題
  evidence: 利19:20-22 婢女許配丈夫未被贖身得釋放，人與他行淫，二人受刑罰但不治死（因婢女未得自由）；那人牽贖愆祭公綿羊到會幕門口，祭司贖罪，罪得赦免。保護婢女權利，不可視為商業財產。KC：屬靈意義——錯誤混雜：人與奴僕有交通，表徵認同律法原則容其進入生活。
  surfaces:
  - 婢女許配了丈夫
  - 還沒有被贖、得釋放
- name: 栽種果樹前三年如未受割禮不可吃
  type: 主題
  evidence: 利19:23-25 進迦南地栽種結果子樹木，前三年果子如未受割禮不可吃；第四年果子全成為聖，用以讚美耶和華；第五年可吃，叫樹結果子更多。KC：果子仍受迦南地污漬影響，三年不可吃；第四年歸神；承認神的產權帶來更多收成。提前4:4-5：凡物藉著神的道和禱告成聖。
  surfaces:
  - 前三年如未受割禮不可吃
  - 第四年成為聖
  - 第五年可吃
  - 未受割禮的果子
  - 橄欖樹條例
