organization: "### 聖潔的呼召與核心原則（v1-2）\n耶和華透過[[摩西]]向[[以色列全會眾]]宣告[[聖潔生活總綱（利19：1-2）|聖潔生活總綱]]：「你們要聖潔，因為我耶和華─你們的神是聖潔的。」這句話確立了全章的神學基調：[[聖潔]]不僅是禮儀潔淨，更是模倣神屬性的倫理命令，貫徹於敬拜、社會、經濟與個人生活的每一細節。KC 指出本章與利18 的分工：「利未記18 主要是消極的；本章也包含積極的元素。分別不只是遠離某些形式的惡……**更是為著某個目標或某個人成聖——為著神、積極歸給祂的奉獻**。」而「**在利未記裡，沒有別處像這裡這樣向全體百姓說話**」——這些誡命不是給祭司的，是給每一個人的。\n\
  \n《啟導本》記猶太學者的觀察：本章根本是**十誡的展開**，逐條有對應——\n\n| 十誡 | 本章對應 |\n| --- | --- |\n| 第一、二誡（獨一神、不可造像） | v4 虛無的神、鑄造神像 |\n| 第三誡（不可妄稱神名） | v12 不可指神名起假誓 |\n| 第四、五誡（安息日、孝敬父母） | v3（次序倒轉：先母後父） |\n| 第六誡（不可殺人） | v16 不可與鄰舍為敵置之於死\
  \ |\n| 第七誡（不可姦淫） | v29 不可辱沒女兒使為娼妓 |\n| 第八誡（不可偷盜） | v11 不可偷盜 |\n| 第九誡（不可作假見證） | v16 不可搬弄是非 |\n| 第十誡（不可貪戀） | v18 不可報仇埋怨 |\n\n丁良才與《啟導本》對副歌的計數略有出入——丁良才：全章分**十四段**，六段以「我是耶和華你們的神」收尾、八段以「我是耶和華」收尾；《啟導本》：**十六**小段，「每段都用『我是耶和華』一語作結」。分段之差不影響共同的觀察：==每一條誡命的理由都不是社會效益，而是神自己==。\n\
  \n### 家庭、敬拜與祭儀條例（v3-8）\n經文隨即將聖潔具體化：[[孝敬父母與守安息日並列|孝敬父母與守安息日並列]]（v3），並嚴禁[[不可偏向虛無的神與鑄造神像|偏向虛無的神與鑄造神像]]（v4）。關於[[平安祭獻得可蒙悅納條例|平安祭]]，規定必須在獻祭當天與第二天吃盡，第三天剩餘必須焚燒；若第三天吃，便成「可憎惡的」（此處原文是 piggul——利7:18 的同一個字，指過期敗壞的祭肉，與利11\
  \ 的 sheqets、利18 的 toevah 都不同字），吃的人必[[剪除（kareth）|擔當罪孽、從民中剪除]]（v5-8），顯示敬拜態度直接關係立約關係的存續。\n\n### 社會公義與弱勢關懷（v9-18）\n這一大段是本章社會倫理的高峰。\n- **經濟正義**：[[田角條例]]：收割不可割盡田角、不可拾取遺落，果園同例（v9-10），保障[[寄居的（ger）|寄居者]]與窮人的生存權。\n\
  - **誠信與言語**：[[不可偷盜欺騙說謊|不可偷盜、欺騙、說謊]]（v11），[[不可指神名起假誓褻瀆神名|不可指神名起假誓褻瀆神名]]（v12）。\n- **勞工權益**：[[雇工工價|雇工工價不可過夜]]（v13），體現神對弱勢勞工的保護。\n- **殘障友善**：[[不可咒罵聾子與絆腳石放在瞎子面前|不可咒罵聾子、不可放絆腳石絆瞎子]]（v14），核心是「要敬畏你的神」。\n- **司法公正**：[[審判不可行不義偏護窮人重看有勢力|審判不可行不義、偏護窮人、重看有勢力]]，唯按[[公義審判|公義]]審判鄰舍（v15）。\n\
  - **社區關係**：[[不可搬弄是非與不可與鄰舍為敵置之於死|不可搬弄是非、不可與鄰舍為敵置之於死]]（v16）。\n- **內心態度與對質**：[[指摘鄰舍|不可心裡恨弟兄，要指摘鄰舍免得擔罪]]（v17）；[[不可報仇埋怨要愛人如己|不可報仇、埋怨，卻要愛人如己]]（v18），這是[[愛人如己]]的經典出處，被耶穌視為律法的總綱。\n\n> [!quote] 從希勒到孔子到耶穌——消極與積極的金律\n\
  > 丁良才在 v18 記下一段比較：「有人問猶太人著名的先師**希勒**說，何為律法的要旨？希勒回答說：『**你不願意人怎樣待你，你也就不要怎樣待人**，這就是全律法，其餘的不過是解釋罷了。』**孔夫子**也曾說：『**己所不欲，勿施於人**。』這些話是配作倫理上絜矩之道的，==**但這還是消極的話**==。主耶穌在教訓人的時候，卻用**積極的**話吩咐說：『**你們願意人怎樣待你們，你們也要怎樣待人**』（太7:12）。」\n\
  >\n> KC 則把標準再抬高一層：「**在律法裡，我是標準**（愛人如『己』）。**在基督信仰裡，基督是標準**。若我是標準，我不會虧待別人；==**若基督是標準，我會為別人捨自己**（約壹3:16）==。」\n>\n> 而 v17「總要指摘你的鄰舍」是這愛的另一面。KC：「責備人也是愛與關顧鄰舍的一種形式（詩141:5；箴27:5-6）。**容忍他裡面的罪而一聲不吭，就等於恨他**……『我豈是看守我兄弟的嗎』（創4:9）**是該隱的態度**，與神在這裡所說的相對立。」\n\
  \n### 禁止混雜與聖潔分別（v19）\n[[混雜條例|禁止混雜條例]]涵蓋牲畜配合、田地播種、衣服料料三大領域，象徵以色列作為聖潔子民，在受造秩序中保持獨特身分，不與周圍列國混雜。KC 的原則句：「正如我們不可分開神在祂創造秩序裡所結合的，**我們也不可混合神在祂創造秩序裡所分開的**。」《舊約聖經背景註釋》補一個出人意料的細節：「**混合物有時保留作聖用**……==聖幕幔子和大祭司的外衣都是用羊毛和細麻攙雜製成，可見它是保留聖用==。這也是死海古卷（4QMMT）的詮釋。赫人法律亦禁止同種兩樣種子，違者處死。」——攙雜的衣料不是本質邪惡，而是**分別歸聖**的；平民不可穿，正如平民不可調製聖膏油（出30:32-33）。\n\
  \n### 特殊案例：婢女贖愆祭（v20-22）\n針對[[婢女許配未贖身行淫條例|婢女許配未贖身行淫]]的特殊情況，律法規定不處死刑（因非自由身），但犯罪者須帶[[婢女許配未贖身行淫條例|贖愆祭]]到會幕門口，由祭司代贖得赦免，顯示律法在公義與憐憫間的張力。\n\n### 果樹初熟與飲食禁忌（v23-26）\n進入[[迦南地]]栽種果樹，前三年視為[[未受割禮（arel）|未受割禮]]不可吃（v23）；第四年果子歸耶和華為聖（v24）；第五年才可食用，以增收成（v25）。隨後重申[[法術與觀兆|不可吃血、不可行法術觀兆]]（v26），強調生命屬神與拒絕異教占卜。\n\
  \n### 身體飾飾與靈性界限（v27-31）\n- [[頭周圍不可剃鬍鬚周圍不可損壞|頭周圍不可剃、鬍鬚周圍不可損壞]]（v27）。\n- [[不可為死人用刀劃身與刺花紋|不可為死人劃身、不可刺花紋]]（v28），即今之[[刺青]]禁令，切斷哀悼崇拜與異教身份標記。\n- [[賣淫|不可辱沒女兒使為娼妓]]（v29），防止淫風污染全地。\n- [[守安息日敬畏聖所|守安息日、敬畏聖所]]（v30）。\n\
  - [[不可偏向交鬼行巫術的|不可偏向交鬼行巫術的]]（v31），拒絕[[法術與觀兆|法術與觀兆]]與[[占卜|占卜]]。\n\n### 社會倫理：尊老、愛寄居、誠實度量衡（v32-37）\n- [[白髮人面前站起尊敬老人|白髮人面前站起、尊敬老人]]，並敬畏神（v32）。\n- [[不可欺負寄居者要愛寄居者如己|不可欺負寄居者，要愛寄居者如己]]，理由是「你們在[[埃及地]]也作過寄居的」（v33-34），以救恩歷史為倫理動力。\n\
  - [[度量衡|審判與度量衡不可行不義]]，要用公道天平、法碼、升斗（v35-36）。\n- 總結：[[謹守遵行一切律例典章|謹守遵行一切律例典章]]（v37）。\n\n> [!note] 關鍵神學張力\n> 本章將「儀式律」（祭物、割禮、安息日、混雜）與「道德律」（公義、愛鄰舍、誠實、保護弱勢）交織無間。[[聖潔]]的定義由此從「分別為聖」擴展為「模倣神的公義慈愛」，成為新約「愛人如己」與「完全律法」的舊約根基。\n\
  \n```mermaid\nmindmap\n  root((利未記 19 聖潔法典))\n    神學根基\n      我是耶和華你們的神（聖潔）\n      效法神聖潔\n    敬拜與禮儀\n      安息日/聖所\n      偶像禁令\n      平安祭條例\n      果樹初熟/未受割禮\n      身體飾飾/刺青/剃髮\n      拒絕交鬼/占卜\n    社會倫理\n\
  \      家庭: 孝敬父母\n      經濟: 田角/遺落/雇工工價\n      司法: 公義審判/不偏護/不重看\n      言語: 不偷盜/不謊/不假誓/不搬弄是非\n      心態: 不恨/指摘/不報仇/愛人如己\n      弱勢: 聾子/瞎子/寄居者/孤兒寡婦\n      度量衡: 公道天平/法碼\n    特殊案例\n      婢女贖愆祭\n    禁止混雜\n   \
  \   牲畜/種子/衣料\n```\n\n### 跨章脈絡：聖潔法典的倫理高峰與新約回響\n利未記 19 章是「聖潔法典」（利 17-26 章）的倫理核心。它將西奈之約的十誡內在化、社會化：安息日、孝敬父母、不可殺人（不可置鄰舍於死）、不可姦淫（婢女案）、不可偷盜、不可作假見證、不可貪婪（公道度量衡）皆在此得具體展開。[[愛人如己]]（v18) 與 [[不可欺負寄居者要愛寄居者如己|愛寄居者如己]]（v34)\
  \ 雙重命令，奠定了聖經「鄰舍神學」的基石，直接被主耶穌引為「律法和先知一切道理的總綱」（太 22:39-40），並成為保羅「愛人的就完全了律法」（羅 13:8）的神學依據。本章展示的聖潔，不是修道院式的隔離，而是在市井、法庭、田地、家庭中活出神公義慈愛屬性的見證人生。"
