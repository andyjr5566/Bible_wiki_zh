"book": "利未記"
"chapter": !!int "19"
"updates":
- "title": "當孝敬父母"
  "path": "link_folder/神學/當孝敬父母.md"
  "summary": "v3「你們各人都當孝敬父母，也要守我的安息日」，將第五誡與第四誡並列為本章「向著神的聖潔生活」段落的起點。CT：父母是子女的源頭，正如神是人的源頭，孝敬父母就是尊敬神。"
  "relation": "本章將孝敬父母置於聖潔生活總綱之後的第一條具體誡命，與守安息日並列，顯示對神的敬畏首先落實於對父母的尊敬。"
- "title": "安息日"
  "path": "link_folder/神學/安息日.md"
  "summary": "v3「也要守我的安息日」與v30「你們要守我的安息日，敬我的聖所」，本章兩次重申守安息日的命令，分別置於「向著神」段落之首與「分別為聖」段落末段。"
  "relation": "本章守安息日的命令與孝敬父母（v3）、敬重聖所（v30）並列，強調安息日既是對神的責任，也是聖潔生活不可或缺的節奏。"
- "title": "不可為自己雕刻偶像"
  "path": "link_folder/神學/不可為自己雕刻偶像.md"
  "summary": "v4「你們不可偏向虛無的神，也不可為自己鑄造神像」，直接對應十誡第二誡。CT：偶像被稱為「虛無的神」，因為有神之名卻無神之實。"
  "relation": "本章重申第二誡作為「向著神的聖潔生活」的具體條例之一，與孝敬父母、守安息日並列於v3-4。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "v5-8 規定獻平安祭必須「獻得可蒙悅納」，祭肉只能在獻祭當天和第二天吃，若留到第三天必須用火焚燒，否則為可憎惡的、不蒙悅納，吃的人必擔當罪孽、從民中剪除。"
  "relation": "本章強調平安祭的時效性規定，教導神的子民與神之間的交通必須保持新鮮，不可陳舊。"
- "title": "不可偷盜"
  "path": "link_folder/神學/不可偷盜.md"
  "summary": "v11「你們不可偷盜，不可欺騙，也不可彼此說謊」，第八誡的重申，與欺騙、說謊並列於「向著人的聖潔生活」段落。"
  "relation": "本章將不可偷盜置於罪的連鎖效應中：吝嗇的心（v9-10）容易導致偷盜欺騙（v11），謊話遮蓋不住就進一步起假誓（v12）。"
- "title": "不可妄稱耶和華你神的名"
  "path": "link_folder/神學/不可妄稱耶和華你神的名.md"
  "summary": "v12「不可指著我的名起假誓，褻瀆你神的名」，第三誡的延伸應用。GT丁良才：本節不禁止起誓，只禁止起假誓；撒謊是罪，起假誓是更大的罪。"
  "relation": "本章將此誡列為v9-12罪的連鎖效應的終點：從貪心到偷竊欺騙，最終以起假誓遮蓋收場。"
- "title": "利19：18"
  "path": "link_folder/互文/利19：18.md"
  "summary": "本章即此節的出處章節：v18「不可報仇，也不可埋怨你本國的子民，卻要愛人如己」。GT啟導本：「愛人如己」是舊約中最特出且高超的一條律法，主耶穌引此為人倫關係的總綱（太19:19；22:39；可12:31；路10:27）。"
  "relation": "本章補全此互文條目的舊約源頭脈絡，v18是「愛人如己」誡命在聖經中首次出現之處，後為主耶穌與保羅多次引用（太22:39；羅13:9；加5:14；雅2:8）。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」，摩西是本章聖潔生活總綱與各項倫理條例的唯一傳達者（v2「你曉諭以色列全會眾說」）。"
  "relation": "本章延續摩西向以色列全會眾（而非僅祭司）傳達耶和華律例的角色，對象範圍是利未記中最廣的一次。"
- "title": "血的尊重"
  "path": "link_folder/神學/血的尊重.md"
  "summary": "v26「你們不可吃帶血的物」，延續利17章「血中有生命」的神學，本章將此禁令置於法術觀兆等外邦風俗禁令之首。GT丁良才：有人以為本句在此處是指著關係古時行邪術或拜偶像的風俗說的（參結33:25）。"
  "relation": "本章重申禁血條例，並將其與行法術、觀兆等外邦異教習俗並列，顯示禁血不僅是飲食規條，也與分別於異教信仰相關。"
