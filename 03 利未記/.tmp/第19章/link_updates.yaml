"book": "03 利未記"
"chapter": !!int "19"
"updates":
- "title": "聖潔"
  "path": "link_folder/神學/聖潔.md"
  "summary": "利19:2 你們要聖潔，因為我耶和華你們的神是聖潔的。本章聖潔生活條例的神學根基：神的聖潔屬性要求子民效法。彼前1:15-16 引用此節。利19章將聖潔具體化為向神（3-8）、向人（9-18）、向財物（19-25）、守身敬畏（26-31）、愛人敬畏（32-37）五大面向的條例。"
  "relation": "本章為聖潔神學在社會倫理層面的系統性展開，呼應利11:44-45、20:7-8、21:8；新約彼前1:15-16 直接引用作為信徒聖潔的依據。"
- "title": "安息日"
  "path": "link_folder/神學/安息日.md"
  "summary": "利19:3,30 守安息日作為聖潔生活起點（v3）與結語（v30）重複出現。安息日為神與以色列立約證據（出31:13），表徵享受基督裡安息（太11:28-29，來4:9）。本章將安息日與孝敬父母並列（v3），與敬畏聖所並列（v30），顯示安息日在聖潔生活中的核心地位。"
  "relation": "本章雙重提及安息日（v3, v30），強化安息日作為聖潔生活節奏基石的地位；呼應出16、20、23、31、35章安息日條例。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "利19:8 吃第三天平安祭肉者必從民中剪除。本章將剪除刑罰應用於褻瀆聖物（平安祭逾時而吃），擴展了剪除的適用範圍（先前主要見於獻祭違規與吃血）。"
  "relation": "本章將剪除應用於平安祭條例違規，與利7:18、20-21、25、27 平行；利18:29 性倫理犯罪同被剪除，形成禮儀與道德雙重領域的剪除應用。"
- "title": "寄居的（ger）"
  "path": "link_folder/原文/寄居的（ger）.md"
  "summary": "利19:10,33-34 留田角給窮人和寄居的（v10）；寄居者與本地人同權同愛（v33-34），動機：你們在埃及地也作過寄居的。本章將寄居者保護從司法公正（出23:9）延伸至經濟供給（v10）與社會全面平等（v33-34）。"
  "relation": "本章為寄居者條例在利未記中的集大成：經濟（v10）、司法（v15）、社會（v33-34）三維度並重；呼應出22:21、23:9、申10:19。"
- "title": "可憎（sheqets）"
  "path": "link_folder/原文/可憎（sheqets）.md"
  "summary": "利19:7 第三天吃平安祭為可憎惡的（to'evah）。將可憎概念從飲食潔淨（利11 章 sheqets）延伸至獻祭領域：褻瀆聖物同屬神所憎惡。"
  "relation": "本章將 to'evah 用於獻祭違規，與利11 章飲食可憎（sheqets）、利18 章性倫理可憎（to'evah）形成禮儀、道德、敬拜三個層面的可憎應用。"
- "title": "月經（niddah）"
  "path": "link_folder/原文/月經（niddah）.md"
  "summary": "利19:19（關聯利18:19）禁止行經不潔淨時親近。聖潔法典將禮儀潔淨（利15 章 niddah）與道德純正整合。"
  "relation": "本章雖未直接提 niddah，但聖潔法典（利17-26）將月經不潔從禮儀領域延伸至性倫理禁令（利18:19），體現禮儀與道德整合特色。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利19:1 耶和華對摩西說。摩西作為聖潔法典傳遞者，將神的聖潔標準頒布給全會眾。"
  "relation": "本章摩西繼續其立法者與中保角色，傳遞聖潔法典（利17-26）核心章節。"
- "title": "迦南地"
  "path": "link_folder/地點/迦南地.md"
  "summary": "利19:23 你們到了迦南地，栽種各樣結果子的樹木。果樹條例（前三年如未受割禮不可吃、第四年歸神、第五年可吃）在迦南地生效。"
  "relation": "本章果樹條例以進入迦南地為前提，體現應許之地生活的聖潔規範。"
- "title": "聖所"
  "path": "link_folder/地點/聖所.md"
  "summary": "利19:30 敬我的聖所。聖所為神臨在之處，當敬畏。出3:5、利16:2、來10:19-22 新約開了新又活的路。"
  "relation": "本章將敬畏聖所與守安息日並列（v30），顯示聖所敬畏作為聖潔生活外在表現之一。"
- "title": "孝敬父母"
  "path": "link_folder/神學/十誡.md"
  "summary": "利19:3 孝敬父母作為聖潔生活起點（第五誡）。父母是子女源頭，如神是人源頭；孝敬父母即尊敬神。弗6:2-3 第一條帶應許誡命。"
  "relation": "本章將孝敬父母與守安息日並列為聖潔生活雙重起點，呼應出20:12、申5:16。"
