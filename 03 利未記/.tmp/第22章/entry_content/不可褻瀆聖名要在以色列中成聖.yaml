name: 不可褻瀆聖名要在以色列中成聖
type: 神學
secondary_types: []
aliases:
- 成聖與褻瀆聖名
status: formal
definition: 耶和華命令以色列人謹守遵行誡命（v.31），不可褻瀆聖名，要在以色列人中被尊為聖（v.32），因為耶和華是叫他們成聖的主，曾把他們從埃及地領出來作他們的神（v.33）。此段為全章神學總結：聖潔源於神的救贖行動（出埃及），成聖是神的主動作為，人當以順服誡命回應，不可褻瀆那救贖他們之神的名。
development: 經文從具體條例（vv.1-30）上升至神學高度：誡命的權威（v.31）→聖名的榮耀（v.32）→救贖的根基（v.33），形成「救贖—成聖—順服—榮耀」的完整神學鏈條。
accumulations:
- book: 利未記
  chapter: 22
  summary: 命令謹守誡命，不可褻瀆聖名，要在以色列中成聖，因耶和華是救贖他們出埃及、叫他們成聖的神。
  relation: 本章結語，為全章聖潔條例提供神學基礎與動力。
