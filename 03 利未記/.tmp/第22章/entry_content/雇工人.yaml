status: formal
definition: 指受僱於祭司家庭作工之人（利22:10）。經文明確規定雇工人不可吃聖物，與寄居外人同列。
development: 雇工人雖在祭司家服役，但無祭司身分，故不得分食聖物。
accumulations:
- book: 利未記
  chapter: 22
  summary: 雇工人不可吃聖物。
  relation: 強調聖物專屬祭司及其家屬，雇工人僅提供勞力。
