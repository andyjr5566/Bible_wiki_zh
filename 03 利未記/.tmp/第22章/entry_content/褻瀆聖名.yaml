name: 褻瀆聖名
type: 神學
secondary_types: []
aliases:
- 褻瀆聖名
status: formal
definition: 本章多次強調祭司與聖物的關係，不可褻瀆耶和華的聖名（利22:2,15,32）。「褻瀆」指將神視為平常、不敬重，導致神的榮耀被貶損，祭司若不潔淨而吃聖物即構成褻瀆。
development: 從祭司遠離聖物、免得褻瀆聖名，到獻祭牲必須無殘疾、不可同日宰母和子，皆圍繞「聖名不可被褻瀆」的神學主軸。
accumulations:
- book: 利未記
  chapter: 22
  summary: 耶和華吩咐亞倫和子孫遠離聖物，免得褻瀆聖名；祭司不可褻瀆以色列人所獻的聖物；以色列人中要尊耶和華為聖。
  relation: 本章以「褻瀆聖名」為核心警告，連結祭司潔淨條例與獻祭規條。
related_entries:
