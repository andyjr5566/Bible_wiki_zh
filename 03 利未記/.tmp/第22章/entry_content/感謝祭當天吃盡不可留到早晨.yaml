name: 感謝祭當天吃盡不可留到早晨
type: 主題
secondary_types: []
aliases:
- 感謝祭當天吃盡
status: formal
definition: 獻感謝祭給耶和華，要獻得可蒙悅納；要當天吃，一點不可留到早晨（利22:29-30）。此規定強調感謝祭的即時性與完全奉獻，不可延宕或保留，象徵感恩之心當新鮮、完整地回應神的恩典。
development: 承接獻祭純全要求（vv.17-28），專門針對感謝祭（平安祭的一種）規定食用時間界限，呼應利未記7:15「獻祭的肉當天要吃」，防止聖物變質或被褻瀆。
accumulations:
- book: 利未記
  chapter: 22
  summary: 規定感謝祭當天要吃盡，不可留到早晨。
  relation: 本章獻祭條例的食用時間規定，對應利未記7:15平安祭食用條例。
