name: 外人
type: 人物
secondary_types: []
aliases:
- 外人
status: formal
definition: 泛指非以色列人、非祭司家庭成員之人（利22:10,12,13,25）。經文多處禁止外人吃聖物，並規定從外人手接受有殘疾的獻祭不可蒙悅納（利22:25）。
development: 外人身分在聖物、獻祭、祭司家庭界限上均受限制，強調聖潔分別。
accumulations:
- book: 利未記
  chapter: 22
  summary: 外人不可吃聖物；祭司女兒嫁外人不可吃舉祭聖物；從外人手接受有殘疾獻祭不可蒙悅納。
  relation: 外人作為界限標記，維護聖物與獻祭的純潔。
related_entries:
