name: 寄居的外人
type: 人物
secondary_types: []
aliases:
- 寄居的外人
status: formal
definition: 指在以色列中寄居、非以色列本地人之外邦人（利22:10,18）。他們不可吃聖物，但可獻供物給耶和華（利22:18）。
development: 寄居外人雖參與敬拜獻祭，但在聖物食用上與祭司家庭有明確界限。
accumulations:
- book: 利未記
  chapter: 22
  summary: 寄居的外人不可吃聖物；但可將供物獻給耶和華作燔祭。
  relation: 顯示聖物專屬祭司家庭，寄居外人僅限於獻祭參與。
