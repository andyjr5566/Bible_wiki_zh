name: 自然關係
type: 神學
secondary_types: []
aliases:
- 自然關係
status: formal
definition: 指人與人之間基於血緣、婚姻或家庭結構所形成的關係。本章涉及祭司女兒嫁給外人（利22:12）與寡婦/被休無子女歸回父家（利22:13）的規定，顯示自然關係對聖物食用資格的影響。
development: 自然關係決定誰屬於祭司家庭，進而影響可否分食聖物；外人（非自然關係）被排除在外。
accumulations:
- book: 利未記
  chapter: 22
  summary: 祭司女兒嫁外人不可吃舉祭聖物；寡婦或被休無子女歸回父家可吃父親食物。
  relation: 自然關係界定祭司家庭成員，關聯聖物分配公義。
