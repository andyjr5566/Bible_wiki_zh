name: 不可同日宰母和子
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記22:28的禁令，規定無論是母牛或母羊，不可在同一天之內宰殺母畜和牠的幼子。此條例彰顯神憐憫的心腸，尊重生命間的天然倫常關係，也防止異教殘忍風俗滲入以色列的敬拜與生活。屬靈上表徵信徒在經歷基督時當體會神憐憫的心腸，不可輕忽生命的關聯。
accumulations:
- book: 利未記
  chapter: 22
  summary: 第28節禁止在同日宰殺母畜與其子，無論為獻祭或食用，屬於獻祭蒙悅納的條規之一。
  relation: 本條目直接對應利未記22:28的禁令，為獻祭蒙悅納條例的一部分。
related_entries:
- 才生祭牲七天當跟母第八天蒙悅納
- 平安祭（shelamim）
