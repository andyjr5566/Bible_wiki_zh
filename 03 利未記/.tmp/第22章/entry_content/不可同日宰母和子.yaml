name: 不可同日宰母和子
type: 主題
secondary_types: []
aliases:
- 母子同日不可宰
status: formal
definition: 無論是母牛是母羊，不可同日宰母和子（利22:28）。此條例禁止殘忍行為，保護母子自然關係，體現神對受造秩序的憐憫與尊重，也防止獻祭變成暴力濫殺。
development: 此為獻祭條例的人道補充，超越儀式純全性，觸及倫理層面，呼應申命記22:6-7「不可連母帶子取去」的同情心原則。
accumulations:
- book: 利未記
  chapter: 22
  summary: 禁止同日宰殺母牛或母羊與其子，保護母子自然關係。
  relation: 本章獻祭條例的倫理附則，對應申命記22:6-7母鳥條例。
