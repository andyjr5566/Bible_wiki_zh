name: 爬物
type: 主題
secondary_types: []
aliases:
- 爬物
status: formal
definition: 指在地上爬行的小動物（利22:5）。摸爬物會使人不潔淨至晚上，需水洗身才能潔淨。
development: 爬物屬於律法列舉的不潔淨生物之一，祭司須避免接觸。
accumulations:
- book: 利未記
  chapter: 22
  summary: 祭司摸使他不潔淨的爬物，必不潔淨到晚上。
  relation: 作為污穢來源，與死屍、遺精等並列，影響祭司聖潔狀態。
related_entries:
- 污穢/不潔淨（tame'）
- 死屍
- 水洗身
