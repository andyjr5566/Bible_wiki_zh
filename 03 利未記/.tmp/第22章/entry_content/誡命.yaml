name: 誡命
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指耶和華所頒布的命令、律例與典章，要求百姓順服遵行。利未記 22 章 9 節「所以他們要守我所吩咐的」，31 節「你們要謹守遵行我的誡命」，32
  節強調不可褻瀆聖名、要在以色列中成聖。本章將誡命與聖潔、敬畏神的名直接連結，顯示順服誡命是成聖生活的表現。
accumulations:
- book: 利未記
  chapter: 22
  summary: 本章結尾命令以色列人謹守遵行耶和華的誡命，並強調不可褻瀆聖名、要在以色列中成聖。
  relation: 此條目反映本章對順服神命令的神學強調。
related_entries:
- 不可褻瀆聖名要在以色列中成聖
- 成聖
- 祭司遠離聖物免褻瀆聖名
