name: 從外人手不可接受
type: 主題
secondary_types: []
aliases:
- 外人獻祭不可收
- 異邦人供物不接納
status: formal
definition: 利未記 22:25 禁止從外人（nokri，非以色列立約共同體之人）手中接受有損壞、有殘疾的牲畜作神的食物獻上。理由在於「這些都有損壞，有殘疾，不蒙悅納」。此條例強調獻祭潔淨標準的普遍性：即使獻祭者是外人，祭物仍須符合「無殘疾」要求，祭司不可降低標準接受外人帶來的有缺陷供物。
accumulations:
- book: 利未記
  chapter: 22
  summary: 第 25 節明令不可從外人手接受有殘疾的牲畜作供物，因其有損壞、不蒙悅納，維護獻祭聖潔標準的一致性。
  relation: 本章獻祭牲必須無殘疾條例的延伸應用，將標準適用於外人所獻，與「陽物損傷」「肢體有餘缺少」等具體缺陷類別相關。
