name: 死屍
type: 主題
secondary_types: []
aliases:
- 死屍
status: formal
definition: 指已死的人或動物屍體（利22:4）。摸死屍會使人不潔淨至晚上，需水洗身才能潔淨。
development: 死屍為主要污穢來源之一，祭司必須避免接觸以保持聖潔。
accumulations:
- book: 利未記
  chapter: 22
  summary: 祭司摸因死屍不潔淨的物，必不潔淨到晚上。
  relation: 作為污穢來源，直接影響祭司能否吃聖物。
related_entries:
- 污穢/不潔淨（tame'）
- 爬物
- 水洗身
