name: 當天吃盡
type: 主題
secondary_types: []
aliases:
- 當日吃完
- 不可留到早晨
- 即日吃盡
status: formal
definition: 利未記 22:30 規定感謝祭（todah）的祭肉「要當天吃，一點不可留到早晨」。這屬於聖物食用的時間界限條例，強調祭肉必須在獻祭當日內吃盡，不可過夜。違反即屬褻瀆聖物。此規定與利未記
  7:15、19:6 一致，體現聖物的時效性與敬畏神聖供物的態度。
accumulations:
- book: 利未記
  chapter: 22
  summary: 第 30 節命令感謝祭祭肉當天吃盡，不可留到早晨，違者褻瀆聖物。
  relation: 本章聖物食用條例的總結性命令，與「誡命」「成聖」相關，體現遵守神誡命即成聖的生活實踐。
