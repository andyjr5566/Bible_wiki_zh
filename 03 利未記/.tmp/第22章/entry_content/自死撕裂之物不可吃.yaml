name: 自死撕裂之物不可吃
type: 主題
secondary_types: []
aliases:
- 自死物不可吃
- 撕裂物不可吃
status: formal
definition: 祭司不可吃自死的或被野獸撕裂的牲畜，免得因此污穢自己（利22:8）。這屬於飲食潔淨律的延伸，強調祭司連非獻祭的普通食物也不可沾染屍體污穢，因為耶和華是叫他們成聖的主。
development: 此條例承接v.7「聖物是祭司的食物」，補充規定連普通肉食也不可吃自死撕裂之物，顯示祭司全生活領域的聖潔要求。
accumulations:
- book: 利未記
  chapter: 22
  summary: 禁止祭司吃自死或被野獸撕裂的牲畜，免得污穢自己。
  relation: 本章祭司聖潔條例的補充規定，將聖潔要求延伸至日常飲食。
