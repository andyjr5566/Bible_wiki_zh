name: 誤吃聖物加五分之一償還
type: 主題
secondary_types: []
aliases:
- 誤吃聖物償還
status: formal
definition: 若有人誤吃了聖物，要照聖物的原數加上五分之一交給祭司（利22:14）。此為贖愆祭原則在聖物誤用上的具體應用，強調聖物的產權屬神，誤用須加倍償還以贖罪。
development: 此條例承接v.10-13的食用資格規定，為「誤犯」提供補救途徑，體現律法的公義與恩典並存。
accumulations:
- book: 利未記
  chapter: 22
  summary: 規定誤吃聖物者須按原數加五分之一償還給祭司。
  relation: 本章聖物保護條例的補救條款，對應利未記5:16贖愆祭原則。
