"book": "利未記"
"chapter": !!int "22"
"updates":
- "title": "污穢"
  "path": "link_folder/主題/污穢.md"
  "summary": "v1-9 祭司若身上有污穢（長大痲瘋、患漏症、觸摸死屍或不潔之物）便不可吃聖物，直等潔淨了；違者「必在我面前剪除」。GT串珠：這種刑罰是「擔罪而死」，比一般百姓犯不潔的罪厲害得多，因為祭司的責任比百姓大得多。"
  "relation": "本章是既有條目「污穢」概念在祭司吃聖物資格上的具體應用，將污穢與聖物褻瀆的刑罰直接掛鉤。"
- "title": "沒有殘疾的祭牲"
  "path": "link_folder/神學/沒有殘疾的祭牲.md"
  "summary": "v18-25 凡獻供物無論是所許的願是甘心獻的燔祭或平安祭，都須獻上沒有殘疾的公牛、綿羊或山羊；瞎眼、折傷、殘廢、有瘤子、長癬、長疥、腎子損傷破裂騸了的皆不可獻，即使從外人手中收的殘疾祭牲也不可接受。"
  "relation": "本章是此神學主題最完整詳盡的條例陳述，列舉各類具體殘疾類型並涵蓋燔祭、平安祭與外人祭牲三種情境。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "v21,29-30 凡從牛群或羊群中將平安祭獻給耶和華，為要還特許的願或作甘心獻的，所獻必純全無殘疾才蒙悅納；獻感謝祭給耶和華要獻得可蒙悅納，要當天吃一點不可留到早晨。"
  "relation": "本章重申平安祭必須無殘疾以及祭肉當天吃盡的時效規定，延續利7章、利19章對平安祭條例的累積。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "v3「那人必在我面前剪除」。GT丁良才：注意「在我面前」四個字，摩西五經中只在此處有這說法，別處是說從民中剪除，有注釋家以為神必親自從祂面前剪除那人，如同剪除拿答、亞比戶一樣（十12）。"
  "relation": "本章的剪除刑罰用語「在我面前剪除」是全書用法中的特例，強調神親自介入的審判而非透過人為執行。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1,17,26「耶和華對摩西說」，摩西是本章祭司吃聖物資格、獻祭牲品質要求等條例的唯一傳達者。"
  "relation": "本章延續摩西向亞倫子孫並以色列眾人傳達耶和華祭祀條例的一貫角色，緊接利21章祭司專屬聖潔條例之後。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v2「你吩咐亞倫和他子孫說」；v18「你曉諭亞倫和他子孫，並以色列眾人說」，本章條例的傳達對象，涵蓋祭司吃聖物資格與獻祭牲品質兩大主題。"
  "relation": "本章延續亞倫子孫作祭司負責守護聖物聖潔的一貫角色，並將條例範圍擴及以色列眾人（獻祭牲品質部分）。"
