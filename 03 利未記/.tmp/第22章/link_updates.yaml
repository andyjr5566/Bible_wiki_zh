"book": "03 利未記"
"chapter": !!int "22"
"updates":
- "title": "聖物（qodesh）"
  "path": "link_folder/原文/聖物（qodesh）.md"
  "summary": "利22:2-3,10,14-16 以色列人所分別為聖、歸給耶和華的聖物（qodesh）。凡外人不可吃聖物；誤吃聖物要照原數加五分之一交給祭司。聖物表徵基督在神面前的各種神聖屬性。"
  "relation": "本章系統規範聖物的食用資格（祭司家屬、買的僕人、歸回父家的女兒）、誤吃賠償條例，構成聖物管理的完整法律框架。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "利22:3,9 凡身上有污穢親近聖物的，那人必在我面前剪除；所以他們要守我所吩咐的，免得輕忽了，因此擔罪而死。本章將剪除應用於褻瀆聖物、不潔淨吃聖物。"
  "relation": "本章將剪除刑罰從利17-21 章的獻祭違規、吃血、性倫理、祭司聖潔，延伸至聖物管理領域，構成聖潔法典完整的剪除體系。"
- "title": "無殘疾"
  "path": "link_folder/神學/無殘疾.md"
  "summary": "利22:17-25 獻供物作燔祭、平安祭，要將沒有殘疾的公牛、綿羊、山羊獻上，如此方蒙悅納。凡有殘疾的不可獻上。瞎眼、折傷、殘廢、有瘤子、長癬、長疥、肢體有餘缺少、腎子損傷壓碎破裂閹了的都不可獻。KC：有殘疾祭牲代表獻祭者對基督人位工作認識不完全。"
  "relation": "本章將無殘疾要求從利1,3,4,9,14,21 章具體化為詳細缺陷清單，並區分甘心祭（可接納不完全）與還願祭（不可），建立祭牲品質分級標準。"
- "title": "第八天"
  "path": "link_folder/神學/第八天.md"
  "summary": "利22:27 才生的公牛、綿羊、山羊，七天當跟著母；從第八天以後，可以當供物蒙悅納。KC：第八天說話新的開始，預表割禮（利12:2-3），動物雖不受割禮，圖畫相同：前七天如在古舊受造之污漬下。"
  "relation": "本章將第八天原則應用於祭牲潔淨時限，呼應利12 割禮、利9:1 第八天亞倫開始供職、利15:14,29 第八天潔淨獻祭。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "利22:2-3,9,16 你吩咐亞倫和他子孫說：要遠離聖物，免得褻瀆聖名。祭司不可褻瀆以色列人所獻給耶和華的聖物。我是叫他們成聖的耶和華。本章為祭司聖物管理條例，規範祭司及其家屬食用聖物資格、誤吃賠償、獻祭察驗責任。"
  "relation": "本章為利21 章祭司聖潔條例的延續：從身體資格（利21）延伸至聖物管理職責（利22），構成祭司條例雙重框架。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "利22:2,18 你吩咐亞倫和他子孫；你曉諭亞倫和他子孫，並以色列眾人。亞倫為祭司體系始祖，本章賦予其聖物管理與獻祭察驗雙重責任。"
  "relation": "本章亞倫同時承擔聖物守護者（v2-16）與獻祭質檢官（v18-25）兩重角色，體現大祭司權柄的全面性。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利22:1,17,26 耶和華對摩西說。摩西作為聖物條例與祭牲條例的傳遞者，將神的聖潔標準頒布給祭司體系與全會眾。"
  "relation": "本章摩西繼續其立法者角色，傳遞聖潔法典（利17-26）中聖物管理與祭牲品質的核心條例。"
- "title": "以色列眾人"
  "path": "link_folder/人物/以色列眾人.md"
  "summary": "利22:18 你曉諭亞倫和他子孫，並以色列眾人說。獻祭條例向全會眾宣告，使獻祭者知曉無殘疾要求，祭司察驗有據可依。"
  "relation": "本章將獻祭品質標準從祭司內部規範（利1-7,21）外延至全會眾知情義務，建立獻祭者與察驗者的雙向責任機制。"
- "title": "祭司女兒"
  "path": "link_folder/人物/祭司女兒.md"
  "summary": "利22:12-13 祭司的女兒若嫁外人，就不可吃舉祭的聖物；但若是寡婦或被休的，沒有孩子，又歸回父家，與她青年一樣，就可以吃她父親的食物。本章規範祭司女兒婚姻狀態變動對聖物食用權的影響。"
  "relation": "本章將利21:9 祭司女兒行淫火刑條例之外的婚姻狀態（嫁外人、寡婦、被休、歸回）納入聖物食用權管理，體現祭司家庭聖潔的動態邊界。"
- "title": "聖所"
  "path": "link_folder/地點/聖所.md"
  "summary": "利22:9,16,32 祭司要守我所吩咐的，免得褻瀆聖所。不可褻瀆以色列人所獻給耶和華的聖物。我在以色列人中，卻要被尊為聖。聖所為神臨在之處，聖物管理直接關係聖所聖潔。"
  "relation": "本章將聖物褻瀆與聖所褻瀆等同（v9,16），確立聖物管理為維護聖所聖潔的核心環節，呼應利21:12,23 大祭司不可出聖所、有殘疾祭司不可進幔子前。"
- "title": "埃及地"
  "path": "link_folder/地點/埃及地.md"
  "summary": "利22:33 把你們從埃及地領出來，作你們的神。神將誡命賜給被救贖的百姓，為要作他們的神。出埃及救贖是聖潔條例的神學根基。"
  "relation": "本章以出埃及救贖作為聖物條例與祭牲條例的終極動機（v33），呼應利19:34,20:24,25:38,26:13,45 救贖與聖潔的神學邏輯。"
- "title": "世世代代"
  "path": "link_folder/神學/世世代代.md"
  "summary": "利22:3 你們世世代代的後裔，凡身上有污穢親近聖物的，那人必在我面前剪除。聖物條例與剪除刑罰具有代際延續性，約束亞倫後裔世世代代。"
  "relation": "本章將世世代代原則應用於聖物管理（v3）、祭司資格（利21:17）、祭牲品質（v18-25），構成聖潔法典的代際約束框架。"
