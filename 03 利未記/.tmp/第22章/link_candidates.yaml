book: "03 利未記"
chapter: 22
candidates:
  # === C 類：全新條目 ===
  - name: 祭司遠離聖物免褻瀆聖名
    type: 主題
    evidence: "利22:1-3 耶和華對摩西說：你吩咐亞倫和他子孫說：要遠離以色列人所分別為聖、歸給我的聖物，免得褻瀆我的聖名。凡身上有污穢、親近聖物的，那人必在我面前剪除。KC：祭司應以戒慎戒懼「遠離」的態度對待聖物，免因自己不潔招來褻瀆刑罰。"
    surfaces: ["遠離聖物", "免得褻瀆我的聖名", "親近聖物", "必在我面前剪除"]

  - name: 祭司污穢不可吃聖物條例
    type: 主題
    evidence: "利22:4-7 亞倫後裔長大痲瘋、有漏症的，不可吃聖物，直等潔淨了。摸因死屍不潔淨的物、遺精的人、摸使他不潔淨的爬物或人，必不潔淨到晚上；若不用水洗身，就不可吃聖物。日落時候潔淨了，然後可以吃聖物。KC：表徵事奉神的人不能因自己的情況影響基督的聖潔；必須有新的起頭。"
    surfaces: ["長大痲瘋的", "有漏症的", "摸因死屍不潔淨的物", "遺精的人", "摸爬物", "不潔淨到晚上", "不用水洗身", "日落潔淨"]

  - name: 自死撕裂之物不可吃
    type: 主題
    evidence: "利22:8 自死的或是被野獸撕裂的，他不可吃，因此污穢自己。利17:15 平行。KC：表徵不可接觸或接受死亡的事物，免受污穢沾染。"
    surfaces: ["自死的", "被野獸撕裂的", "不可吃", "污穢自己"]

  - name: 外人不可吃聖物
    type: 主題
    evidence: "利22:10-13 凡外人不可吃聖物；寄居在祭司家的、雇工人都不可吃。祭司買人、生在他家的人可以吃。祭司女兒嫁外人不可吃舉祭聖物；但寡婦或被休無孩子歸回父家，與青年一樣可以吃。KC：表徵不信的外邦人無法享受基督；享受基督在於事奉多少。"
    surfaces: ["外人不可吃聖物", "寄居在祭司家的", "雇工人", "祭司買人", "生在他家的人", "祭司女兒嫁外人", "寡婦被休歸回父家"]

  - name: 誤吃聖物加五分之一償還
    type: 主題
    evidence: "利22:14-16 若有人誤吃了聖物，要照聖物的原數加上五分之一交給祭司。祭司不可褻瀆以色列人所獻給耶和華的聖物，免得他們在吃聖物上自取罪孽。KC：玷污聖物要獻贖愆祭，同時用原祭物五分之一作賠償。"
    surfaces: ["誤吃了聖物", "照聖物的原數加上五分之一", "交給祭司", "自取罪孽"]

  - name: 獻祭牲必須無殘疾
    type: 主題
    evidence: "利22:17-25 耶和華曉諭亞倫、他子孫、以色列眾人：凡獻供物作燔祭，要將沒有殘疾的公牛、綿羊、山羊獻上，如此方蒙悅納。凡有殘疾的不可獻上。瞎眼的、折傷的、殘廢的、有瘤子的、長癬的、長疥的都不可獻。公牛綿羊羔肢體有餘或缺少的，只可作甘心祭；用以還願不蒙悅納。腎子損傷、壓碎、破裂、閹了的不可獻。從外人手也不可接受這類物。KC：有殘疾祭牲代表獻祭者對基督人位工作認識不完全；甘心祭可接納不完全，還願祭不可。"
    surfaces: ["沒有殘疾的", "方蒙悅納", "有殘疾的不可獻上", "瞎眼的", "折傷的", "殘廢的", "有瘤子的", "長癬的", "長疥的", "肢體有餘的", "缺少的", "甘心祭", "還願", "腎子損傷", "壓碎", "破裂", "閹了的", "外人手"]

  - name: 才生牲畜七天後可獻
    type: 主題
    evidence: "利22:27 才生的公牛、綿羊、山羊，七天當跟著母；從第八天以後，可以當供物蒙悅納，作為耶和華的火祭。KC：第八天說話新的開始，預表割禮（利12:2-3），動物雖不受割禮，圖畫相同：前七天如在古舊受造之污漬下。"
    surfaces: ["才生的", "七天當跟著母", "第八天以後", "可以當供物蒙悅納"]

