book: 利未記
chapter: 22
candidates:
  - name: 污穢
    type: 主題
    evidence: 1-9節；祭司要遠離以色列人所分別為聖歸給耶和華的聖物，免得褻瀆聖名；凡身上有污穢親近聖物的必被剪除；長大痲瘋、有漏症、摸了不潔之物或人、摸了不潔爬物者，不可吃聖物直等潔淨了；摸了不潔之物者不潔淨到晚上，用水洗身後日落方可吃聖物；自死的或被野獸撕裂的不可吃。GT丁良才：祭司究竟不能隨意取吃百姓所獻歸他們的聖物，身上有污穢的時候就當遠離，直等到他們潔淨了；GT串珠：這種刑罰是「擔罪而死」，比一般百姓犯不潔的罪厲害得多，因為祭司的責任比百姓大得多——本章是既有條目「污穢」概念在祭司吃聖物資格上的具體應用
    surfaces:
      - {phrase: 要遠離以色列人所分別為聖、歸給我的聖物, verses: [2]}
      - {phrase: 凡身上有污穢、親近以色列人所分別為聖、歸耶和華聖物的, verses: [3]}
      - {phrase: 不可吃聖物，直等他潔淨了, verses: [4]}

  - name: 誰可吃聖物的資格條例
    type: 主題
    evidence: 10-16節；凡外人、寄居在祭司家的、雇工人都不可吃聖物；祭司用錢買的人和生在他家的人可以吃；祭司的女兒若嫁外人不可吃舉祭的聖物，若成為無子的寡婦或被休又歸回父家，仍可吃父親的食物，但外人不可吃；若有人誤吃聖物，要照原數加五分之一交給祭司。GT丁良才：與祭司同住不得吃聖物的有四種人——外人、客旅、雇工、出了嫁的女兒；GT啟導本：被「買」的僕人和生在他家裡的人，都算為家庭的一分子，便可以吃
    surfaces:
      - {phrase: 凡外人不可吃聖物, verses: [10]}
      - {phrase: 祭司的女兒若嫁外人，就不可吃舉祭的聖物, verses: [12]}
      - {phrase: 若有人誤吃了聖物，要照聖物的原數加上五分之一交給祭司, verses: [14]}

  - name: 沒有殘疾的祭牲
    type: 神學
    evidence: 18-25節；凡獻供物無論是所許的願是甘心獻的燔祭，要獻沒有殘疾的公牛、綿羊或山羊；平安祭也須純全無殘疾；瞎眼的、折傷的、殘廢的、有瘤子的、長癬的、長疥的都不可獻給耶和華；肢體有餘或缺少的只可作甘心祭，不可還願；腎子損傷、壓碎、破裂、騸了的不可獻上，境內也不可這樣行；even從外人手中收的殘疾祭牲也不可接受。GT丁良才：耶和華是尊榮的，所以凡獻與祂的一切祭物必須是完全無殘疾的（一3；瑪一7-8）
    surfaces:
      - {phrase: 要將沒有殘疾的公牛，或是綿羊，或是山羊獻上, verses: [19]}
      - {phrase: 凡有殘疾的，你們不可獻上，因為這不蒙悅納, verses: [20]}
      - {phrase: 瞎眼的、折傷的、殘廢的、有瘤子的、長癬的、長疥的都不可獻給耶和華, verses: [22]}

  - name: 肢體有餘或缺少只可作甘心祭
    type: 主題
    evidence: v23「無論是公牛是綿羊羔，若肢體有餘的，或是缺少的，只可作甘心祭獻上；用以還願，卻不蒙悅納」。GT丁良才：肢體有餘的或是缺少的，指比正常牲畜多出一部分或短少一部分，例如畸形耳朵或尾巴，也有人解作四肢較長或較短，這類牲畜只可作甘心祭獻上而不可用以還願
    surfaces:
      - {phrase: 若肢體有餘的，或是缺少的，只可作甘心祭獻上, verses: [23]}

  - name: 才生祭牲七天當跟母第八天蒙悅納
    type: 主題
    evidence: v27「才生的公牛，或是綿羊或是山羊，七天當跟著母；從第八天以後，可以當供物蒙悅納，作為耶和華的火祭」。GT串珠：初生的牲口要滿了七天才算有獨立生存的資格，參割禮律例（創17:12）；GT精讀本：從屬靈的意義上講，與出生後第八日行割禮有密切的關係；GT丁良才：才生的牲畜在一個禮拜中還是稚弱，人不該用牠作食品，所以也不可獻給神為祭物
    surfaces:
      - {phrase: 七天當跟著母, verses: [27]}
      - {phrase: 從第八天以後，可以當供物蒙悅納, verses: [27]}

  - name: 不可同日宰母和子
    type: 主題
    evidence: v28「無論是母牛是母羊，不可同日宰母和子」。GT丁良才：或為獻祭，或為吃肉，都是一律，這是要叫人想起母子之倫是何等的神聖（申22:6；出23:19），也是要養成他們一種憐恤的心；GT《舊約背景註釋》：這規定為牲口不多的人提供一定程度的保障，因為若非如此，儀式要求對他們寥寥幾隻的羊群來說，可能構成無法彌補的損失
    surfaces:
      - {phrase: 不可同日宰母和子, verses: [28]}

  - name: 平安祭（shelamim）
    type: 原文
    evidence: 21, 29-30節；凡從牛群或羊群中將平安祭獻給耶和華，為要還特許的願或作甘心獻的，所獻必純全無殘疾才蒙悅納；獻感謝祭給耶和華要獻得可蒙悅納，要當天吃一點不可留到早晨

  - name: 剪除（kareth）
    type: 原文
    evidence: v3「那人必在我面前剪除」。GT丁良才：注意「在我面前」四個字，摩西五經中只在此處有這說法，別處是說從民中剪除，有注釋家以為神必親自從祂面前剪除那人，如同剪除拿答、亞比戶一樣（十12）

  - name: 摩西
    type: 人物
    evidence: 1, 17, 26節「耶和華對摩西說」

  - name: 亞倫和他兒子（祭司）
    type: 人物
    evidence: v2「你吩咐亞倫和他子孫說」；v18「你曉諭亞倫和他子孫，並以色列眾人說」，本章條例的傳達對象
