organization: "### 拿答亞比戶獻凡火與神的審判（v1-3）\n\n利未記 10 章開啟了祭司供職第八天的悲劇。[[亞倫]] 的長子 [[拿答]]\
  \ 和次子 [[亞比戶]] 「各拿自己的香爐，盛上火，加上香，在耶和華面前獻上凡火，是耶和華沒有吩咐他們的」（v1）。「[[凡火]]」指非從[[燔祭（olah）|燔祭壇]]取來的火（參民數記16:46），也可能暗示他們擅自決定燒香時間、地點，甚至酒後亂性（v9\
  \ 禁酒令緊接其後）。CT 指出：「錯的是不遵神的命令擅自獻上凡火」；GT《啟導本》列舉六項觸犯條例：火源不聖、僭奪大祭司職權、時間逾越、酒後失態、儀式模倣異教、香料不合規定。KC\
  \ 則強調：「他們所作的不是神所禁止的，而是神沒有吩咐的——引入屬肉體、自創的敬拜元素」。\n\n火從耶和華面前出來燒滅二人（v2），身體衣物卻未燒毀（v5），顯示是超自然審判之火。摩西隨即引用神的話解釋：「我在親近我的人中要顯為聖；在眾民面前，我要得榮耀」（v3，參\
  \ [[利10：3]]）。「親近」原文 *qarab* 指祭司靠近神的特權（參 [[親近（qarab）]]），特權越大、責任越重（路 12:48）。[[亞倫]]\
  \ 「默默不言」，CT 解為「接受神的管教，不敢表達哀戚」；GT《舊約聖經背景註釋》指出「他不是震驚得啞口無言，而是決意遵守在職祭司不得哀哭的規定」。\n\n```mermaid\nflowchart\
  \ TD\n    A[拿答亞比戶拿香爐] --> B[盛火加香]\n    B --> C[獻凡火<br/>非神吩咐]\n    C --> D[火從耶和華面前出來]\n\
  \    D --> E[二人被燒滅身亡]\n    E --> F[摩西引神言解釋<br/>親近神者當顯聖]\n    F --> G[亞倫默默不言]\n```\n\
  \n### 屍體處理與祭司哀悼禁令（v4-7）\n\n摩西召喚亞倫堂叔 [[米沙利和以利撒反]] 把屍體穿著祭司袍子抬到營外（v4-5），免得聖所被死屍污染。GT《舊約背景註釋》說明：「照顧死者是親人責任，但亞倫兒子仍在供職，故召遠房親戚執行」。隨後摩西嚴令亞倫與倖存兒子\
  \ [[以利亞撒]]、[[以他瑪]]：「不可蓬頭散髮，也不可撕裂衣裳……不可出會幕的門」（v6-7），因為「耶和華的[[膏油（聖膏油）|膏油]]在你們身上」（v7）。CT\
  \ 解經：「祭司是會眾代表，若得罪神必連累全會眾」；KC 指出「膏油象徵分別為聖，打斷供職即貶低神同在的重要性」。百姓可以哀哭，但祭司必須守住身分——這不是無情，而是「事奉神比骨肉之情更優先」（CT\
  \ 靈訓）。\n\n| 禁令對象 | 禁止行為 | 理由 | 來源 |\n|----------|----------|------|------|\n| 亞倫、以利亞撒、以他瑪\
  \ | 蓬頭散髮、撕裂衣裳、出會幕門 | 免得死亡、免得耶和華向會眾發怒、膏油在身上 | v6-7 |\n| 以色列全家 | 可為耶和華所發的火哀哭 | 表達對神審判的敬畏\
  \ | v6 |\n\n### 祭司禁酒條例與聖俗分別職責（v8-11）\n\n神「曉諭[[亞倫]]」（v8），KC 注意到這是利未記極少數神直接對亞倫說話，顯示「雖兒子犯罪，神仍視亞倫為大祭司」。核心條例：「進會幕時，清酒、濃酒都不可喝……免得你們死亡」（v9），作「世世代代永遠的定例」。目的有二：(1)「使你們可以將聖的、俗的，潔淨的、不潔淨的，分別出來」（v10，參\
  \ [[聖俗潔淨不潔淨的分別]]）；(2)「將耶和華藉摩西曉諭以色列人的一切律例教訓他們」（v11）。CT 靈意註解：「不要醉酒，乃要被聖靈充滿（弗 5:18）」。GT《啟導本》補充古代近東背景：「在近東，適於人飲的食水缺乏，須用酒滲入水中來消毒，醉酒實難避免」，故須立嚴格定例。祭司的教導職責在瑪\
  \ 2:7 重申：「祭司的嘴唇當存知識，人當從他口中尋求律法」。\n\n```mermaid\nmindmap\n  root((祭司禁酒定例 v8-11))\n\
  \    範圍\n      進會幕時\n      清酒濃酒皆禁\n    目的\n      分別聖俗潔淨不潔淨\n      教導耶和華律例\n    屬靈對應\n\
  \      弗5:18 被聖靈充滿\n      免得心思昏昧失職\n```\n\n### 祭司應得之分與贖罪祭處理爭議（v12-20）\n\n摩西吩咐亞倫與兩個兒子吃剩下的\
  \ [[素祭（minchah）]]：「在壇旁不帶酵而吃，因為是至聖的」（v12-13）。[[平安祭（shelamim）]] 的 [[搖祭（tenufah）]]\
  \ 胸和舉祭腿可在「潔淨地方」由祭司全家食用（v14-15），CT 靈意：「在神同在裡享用基督，取用復活的愛（搖胸）與升天的大能（舉腿）」。然而摩西尋找為會眾贖罪的公山羊，發現已被焚燒（v16），向以利亞撒、以他瑪發怒（v17-18）。亞倫辯解：「今天獻上贖罪祭燔祭，我又遇見這樣的災，若吃了贖罪祭，耶和華豈能看為美呢？」（v19）。摩西聽罷「便以為美」（v20）。\n\
  \n這段引發解經爭議：CT 認為亞倫兒子「因家中有罪不敢吃，按指定罪獻祭條例焚燒」；KC 則說「血未進聖所，按例祭司當在聖所吃，他們卻焚燒了，屬職守疏忽」。GT《啟導本》綜合：「亞倫因劇變無心茶飯，兒子或因父未吃、或恐殃及自己，情有可原，摩西接受解釋」。BH\
  \ 強調「祭司吃贖罪祭象徵擔當會眾罪孽（v17），亞倫拒吃反映對神聖潔的敬畏與自我不配感」。\n\n```mermaid\nsequenceDiagram\n\
  \    participant 摩西\n    participant 以利亞撒/以他瑪\n    participant 亞倫\n    摩西->>以利亞撒/以他瑪:\
  \ 尋找贖罪祭公山羊<br/>發現已焚燒\n    摩西->>以利亞撒/以他瑪: 發怒責備<br/>為何不在聖所吃？\n    亞倫->>摩西: 辯解：今日獻祭遇災<br/>若吃贖罪祭神豈看為美？\n\
  \    摩西->>亞倫: 聽見便以為美<br/>接受解釋\n```\n\n### 跨章脈絡：祭司聖職的建立與試煉\n\n利未記 8-10 章構成完整單元：8\
  \ 章按立禮（七日）、9 章首次獻祭（第八日神火納祭）、10 章祭司犯罪與條例補充。三章反覆出現「照耶和華吩咐摩西的」（8:4,9,13,17,21,29；9:6,7,10,21；10:7,13,15），強調順服是聖職核心。拿答亞比戶之死成為「親近神者當顯聖」的負面教材，也引出祭司禁酒、哀悼限制、飲食條例等永久定例。KC\
  \ 總結：「人總是幾乎立即敗壞神所賜的美善——亞當、挪亞、王權、教會皆然」。新約對應：五旬節聖靈降火（徒 2:3）納基督獻祭；亞拿尼亞撒非喇獻「凡火」（私心）被擊殺（徒\
  \ 5:1-11），呼應「神是烈火」（來 12:29）。GT《丁良才利未記註釋》指出「現在的信徒也是親近神的祭司」（彼前2:9），當戰兢謹守，分別聖俗，以聖靈而非肉體事奉。"
