    among those who approach me I will be proved holy. CT: 事奉神者須在神面前顯為聖。KC: holiness
    is prerequisite for service.'
  surfaces:
  - phrase: 親近我的人
  - phrase: 顯為聖
  - phrase: 得榮耀
  - phrase: 默默不言
  target_path: link_folder/神學/在親近我的人中要顯為聖.md
