- name: 凡火（陌生的火）
  suggested_type: 神學
  evidence: '利未記10:1 拿答、亞比戶各拿香爐盛火加香，獻上凡火（耶和華未吩咐的）。CCB 指出凡火表出於肉體、未經十字架對付的事奉，KC 指出聖火來自神（9:24），凡火是人天然熱心的替代。BH:
    unauthorized fire not commanded by God. CT: 凡火就是己的火，就是屬魂生命所發出來的火。KC: strange fire
    speaks of natural zeal apart from the Spirit.'
  surfaces:
  - phrase: 凡火
  - phrase: 陌生的火
  - phrase: 耶和華沒有吩咐他們的
  target_path: link_folder/神學/凡火（陌生的火）.md
- name: 火從耶和華面前出來燒滅他們
  suggested_type: 神學
  evidence: '利未記10:2 火從耶和華面前出來，把他們燒滅，死在耶和華面前。KC 指出神是烈火（來12:29），審判不聖潔的事奉；預表末世審判（啟20:9）。BH:
    fire from the LORD consumed them. CT: 神乃是烈火，有兩種表現：燒盡祭物表悅納、燒死不法的人表降罰。KC: fire from
    God speaks of divine judgment.'
  surfaces:
  - phrase: 火從耶和華面前出來
  - phrase: 燒滅
  - phrase: 死在耶和華面前
  target_path: link_folder/神學/火從耶和華面前出來燒滅他們.md
