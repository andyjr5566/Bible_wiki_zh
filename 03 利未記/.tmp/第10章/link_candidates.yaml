book: 利未記
chapter: 10
candidates:
# === v1-5 拿答亞比戶獻凡火被火燒死 ===
- name: 凡火（陌生的火）
  type: 神學
  evidence: '利未記10:1 拿答、亞比戶各拿香爐盛火加香，獻上凡火（耶和華未吩咐的）。CCB 指出凡火表出於肉體、未經十字架對付的事奉，KC 指出聖火來自神（9:24），凡火是人天然熱心的替代。BH: unauthorized fire not commanded by God. CT: 凡火就是己的火，就是屬魂生命所發出來的火。KC: strange fire speaks of natural zeal apart from the Spirit.'
  surfaces:
  - phrase: 凡火
  - phrase: 陌生的火
  - phrase: 耶和華沒有吩咐他們的

- name: 火從耶和華面前出來燒滅他們
  type: 神學
  evidence: '利未記10:2 火從耶和華面前出來，把他們燒滅，死在耶和華面前。KC 指出神是烈火（來12:29），審判不聖潔的事奉；預表末世審判（啟20:9）。BH: fire from the LORD consumed them. CT: 神乃是烈火，有兩種表現：燒盡祭物表悅納、燒死不法的人表降罰。KC: fire from God speaks of divine judgment.'
  surfaces:
  - phrase: 火從耶和華面前出來
  - phrase: 燒滅
  - phrase: 死在耶和華面前

- name: 在親近我的人中要顯為聖
  type: 神學
  evidence: '利未記10:3 摩西對亞倫說：耶和華說「我在親近我的人中要顯為聖；在眾民面前我要得榮耀」。亞倫默默不言。KC 指出事奉神者被更高標準審判（雅3:1），聖潔是事奉的前提。BH: among those who approach me I will be proved holy. CT: 事奉神者須在神面前顯為聖。KC: holiness is prerequisite for service.'
  surfaces:
  - phrase: 親近我的人
  - phrase: 顯為聖
  - phrase: 得榮耀
  - phrase: 默默不言

- name: 不可蓬頭散髮、撕裂衣裳
  type: 祭禮
  evidence: '利未記10:6-7 摩西吩咐亞倫和剩下兒子不可蓬頭散髮、撕裂衣裳，免得死亡、耶和華向會眾發怒；不可出會幕門，因耶和華膏油在他們身上。CCB 指出祭司職分高於血肉親情，膏油表聖靈膏抹不可輕慢。BH: do not let your hair hang loose, do not tear your clothes. CT: 祭司職分高於血肉親情。KC: priesthood supersedes natural affection.'
  surfaces:
  - phrase: 蓬頭散髮
  - phrase: 撕裂衣裳
  - phrase: 不可出會幕的門
  - phrase: 耶和華的膏油在你們身上

# === v8-11 祭司不可喝酒、分別聖俗、教導律例 ===
- name: 祭司不可喝酒
  type: 神學
  evidence: '利未記10:8-11 耶和華曉諭亞倫：你和兒子進會幕時清酒濃酒不可喝，免得死亡；要將聖俗、潔淨不潔淨分別出來，教訓以色列人律例。KC 指出酒表天然喜樂，事奉須靠聖靈而非肉體興奮（弗5:18）。BH: drink no wine or strong drink when you go into the tent of meeting. CT: 酒表天然喜樂，事奉須靠聖靈。KC: wine speaks of natural joy; service must be by the Spirit.'
  surfaces:
  - phrase: 清酒、濃酒都不可喝
  - phrase: 分別聖俗
  - phrase: 分別潔淨不潔淨
  - phrase: 教訓以色列人

# === v12-15 祭司在聖處吃素祭、搖祭胸、舉祭腿 ===
- name: 祭司在聖處吃素祭、搖祭胸、舉祭腿
  type: 祭禮
  evidence: '利未記10:12-15 摩西吩咐亞倫、以利亞撒、以他瑪在聖處吃素祭、搖祭胸、舉祭腿，作永得的分。CCB 指出這預表信徒在聖潔中享受基督（約6:53-56）。BH: eat the grain offering in a holy place. CT: 預表信徒在聖潔中享受基督。KC: eating in holy place speaks of fellowship with Christ.'
  surfaces:
  - phrase: 在聖處吃
  - phrase: 素祭
  - phrase: 搖祭胸
  - phrase: 舉祭腿
  - phrase: 永得的分

# === v16-20 摩西因贖罪祭肉被燒而發怒、亞倫解釋 ===
- name: 摩西因贖罪祭肉被燒而發怒
  type: 事件
  evidence: '利未記10:16-18 摩西尋找贖罪祭公山羊，發現已被燒了，向以利亞撒、以他瑪發怒：為何不在聖處吃贖罪祭肉？贖罪祭是至聖的，神給你們擔當會眾的罪孽。BH: Moses searched for the goat of the sin offering and found it burned up. CT: 贖罪祭肉是至聖的，祭司當在聖處吃。KC: sin offering flesh is most holy.'
  surfaces:
  - phrase: 贖罪祭肉被燒了
  - phrase: 為何不在聖處吃
  - phrase: 擔當會眾的罪孽

- name: 亞倫解釋今日獻贖罪祭燔祭仍遭禍
  type: 事件
  evidence: '利未記10:19-20 亞倫對摩西說：今天他們獻贖罪祭、燔祭，這樣的事臨到我，我若今天吃贖罪祭肉，耶和華豈看為美呢？摩西聽了，便以為美。BH: Aaron replied that such things had befallen him; would the LORD have approved? CT: 亞倫的解釋顯出屬靈敏銳。KC: Aaron''s explanation showed spiritual discernment.'
  surfaces:
  - phrase: 今日獻贖罪祭燔祭仍遭禍
  - phrase: 耶和華豈看為美呢
  - phrase: 摩西聽了便以為美

