book: 利未記
chapter: 10
candidates:
- name: 凡火（陌生的火）
  type: 神學
  evidence: '利未記10:1 拿答、亞比戶各拿香爐盛火加香，獻上凡火（耶和華未吩咐的）。CCB 指出凡火表出於肉體、未經十字架對付的事奉，KC 指出聖火來自神（9:24），凡火是人天然熱心的替代。BH: unauthorized fire not commanded by God. CT: 凡火就是己的火，就是屬魂生命所發出來的火。KC: strange fire speaks of natural
    zeal apart from the Spirit.'
  surfaces:
  - phrase: 凡火
  - phrase: 陌生的火
  - phrase: 耶和華沒有吩咐他們的
- name: 火從耶和華面前出來燒滅他們
  type: 神學
  evidence: '利未記10:2 火從耶和華面前出來，把他們燒滅，死在耶和華面前。KC 指出神是烈火（來12:29），審判不聖潔的事奉；預表末世審判（啟20:9）。BH: fire from the LORD consumed them. CT: 神乃是烈火，有兩種表現：燒盡祭物表悅納、燒死不法的人表降罰。KC: fire from God speaks of divine judgment.'
  surfaces:
  - phrase: 火從耶和華面前出來
  - phrase: 燒滅
  - phrase: 死在耶和華面前
- name: 在親近我的人中要顯為聖
  type: 神學
  evidence: '利未記10:3 摩西對亞倫說：耶和華說「我在親近我的人中要顯為聖；在眾民面前我要得榮耀」。亞倫默默不言。KC 指出事奉神者被更高標準審判（雅3:1），聖潔是事奉的前提。BH: among those who approach me I will be proved holy. CT: 事奉神者須在神面前顯為聖。KC: holiness is prerequisite for
    service.'
  surfaces:
  - phrase: 親近我的人
  - phrase: 顯為聖
  - phrase: 得榮耀
  - phrase: 默默不言
- name: 不可蓬頭散髮、撕裂衣裳
  type: 文化
  evidence: 利未記10:6-7 摩西禁止亞倫與以利亞撒、以他瑪蓬頭散髮、撕裂衣裳，也不可出會幕的門，因耶和華的膏油在他們身上。《舊約聖經背景註釋》：蓬頭散髮和撕裂衣裳是哀悼的兩大表示，此外還有剃頭剃鬚、頭上蒙灰，甚至用刀劃身，哀悼通常為期七日；膏油一旦開始了這個過程，將之打斷就是貶低了聖所之聖潔和神之臨在的重要性。丁良才：蓬頭散髮是猶太人弔喪的標記（撒下15:30），撕裂衣裳亦然（伯1:20）；祭司所穿的是聖衣，所以不得撕裂。
  surfaces:
  - phrase: 蓬頭散髮
  - phrase: 撕裂衣裳
  - phrase: 不可出會幕的門
  - phrase: 耶和華的膏油在你們身上
- name: 祭司不可喝酒
  type: 神學
  evidence: '利未記10:8-11 耶和華曉諭亞倫：你和兒子進會幕時清酒濃酒不可喝，免得死亡；要將聖俗、潔淨不潔淨分別出來，教訓以色列人律例。KC 指出酒表天然喜樂，事奉須靠聖靈而非肉體興奮（弗5:18）。BH: drink no wine or strong drink when you go into the tent of meeting. CT: 酒表天然喜樂，事奉須靠聖靈。KC:
    wine speaks of natural joy; service must be by the Spirit.'
  surfaces:
  - phrase: 清酒、濃酒都不可喝
  - phrase: 分別聖俗
  - phrase: 分別潔淨不潔淨
  - phrase: 教訓以色列人
- name: 摩西因贖罪祭肉被燒而發怒
  type: 事件
  evidence: '利未記10:16-18 摩西尋找贖罪祭公山羊，發現已被燒了，向以利亞撒、以他瑪發怒：為何不在聖處吃贖罪祭肉？贖罪祭是至聖的，神給你們擔當會眾的罪孽。BH: Moses searched for the goat of the sin offering and found it burned up. CT: 贖罪祭肉是至聖的，祭司當在聖處吃。KC: sin offering flesh
    is most holy.'
  surfaces:
  - phrase: 贖罪祭肉被燒了
  - phrase: 為何不在聖處吃
  - phrase: 擔當會眾的罪孽
- name: 亞倫解釋今日獻贖罪祭燔祭仍遭禍
  type: 事件
  evidence: '利未記10:19-20 亞倫對摩西說：今天他們獻贖罪祭、燔祭，這樣的事臨到我，我若今天吃贖罪祭肉，耶和華豈看為美呢？摩西聽了，便以為美。BH: Aaron replied that such things had befallen him; would the LORD have approved? CT: 亞倫的解釋顯出屬靈敏銳。KC: Aaron''s explanation
    showed spiritual discernment.'
  surfaces:
  - phrase: 今日獻贖罪祭燔祭仍遭禍
  - phrase: 耶和華豈看為美呢
  - phrase: 摩西聽了便以為美
- name: 亞倫和他兒子（祭司）
  type: 人物
  evidence: 全章核心：亞倫默默不言（v3）、不可蓬頭撕裂（v6-7）、不可喝酒（v8-11）、在聖處吃祭物（v12-15）、解釋不吃贖罪祭肉（v19-20）。
- name: 摩西
  type: 人物
  evidence: v3,6,12,16,20 摩西傳達神話、吩咐祭司禮儀、發怒查問贖罪祭、聽亞倫解釋以為美。摩西作中保、主禮者、監督者。
- name: 拿答、亞比戶
  type: 人物
  evidence: v1-2 亞倫長子、次子，各拿香爐獻凡火，被耶和華火燒滅。CCB：他們身分無錯、程序無錯，錯在不用壇上聖火。KC：預表屬靈領袖若用肉體熱心代替聖靈，必被審判。
- name: 以利亞撒、以他瑪
  type: 人物
  evidence: v6,12,16,17 亞倫剩下兩子，接受摩西吩咐、在聖處吃祭物、被摩西責備、亞倫為他們辯護。
- name: 米沙利、以利撒反
  type: 人物
  evidence: v4-5 烏薛兒子，抬拿答亞比戶屍體出營外。
- name: 烏薛
  type: 人物
  evidence: v4 亞倫叔叔，米沙利以利撒反之父。
- name: 贖罪祭（chatta't）
  type: 神學
  evidence: v16-18 贖罪祭公山羊被燒、摩西發怒、亞倫解釋。贖罪祭肉至聖，祭司當在聖處吃，擔當會眾罪孽。
- name: 燔祭（olah）
  type: 原文
  evidence: v19 今日獻贖罪祭、燔祭仍遭禍。燔祭表徵完全奉獻。
- name: 素祭（minchah）
  type: 原文
  evidence: v12-13,17 素祭是至聖的，祭司在聖處無酵吃。素祭表徵基督作生命糧。
- name: 搖祭（tenufah）
  type: 原文
  evidence: v14-15 搖祭胸、舉祭腿在潔淨處吃。搖祭表徵獻給神又歸祭司。
- name: 舉祭（terumah）
  type: 原文
  evidence: v14-15 搖祭胸、舉祭腿在潔淨處吃。舉祭表徵高舉獻給神。
- name: 至聖
  type: 神學
  evidence: v12,13,17 素祭是至聖的、贖罪祭肉是至聖的。至聖表徵最高聖潔層級。
- name: 潔淨處
  type: 神學
  evidence: v14,15 搖祭胸、舉祭腿在潔淨處吃。潔淨處表徵在神同在中的交通。
- name: 會幕（帳幕整體）
  type: 主題
  evidence: v6,7,9 不可出會幕門、進會幕時不可喝酒、教導律例。會幕是神與人相會之所。
- name: 耶和華的膏油
  type: 原文
  evidence: v7 因為耶和華的膏油在你們身上。膏油表徵聖靈膏抹。
- name: 酒和濃酒
  type: 文化
  evidence: v9 進會幕時酒和濃酒不可喝，免得死亡。世世代代永遠定例。
- name: 永遠的定例
  type: 神學
  evidence: v9,11,15 祭司不可喝酒、教導律例、吃祭物都是世世代代永遠的定例。
- name: 教導律例
  type: 神學
  evidence: v11 祭司要將聖俗、潔淨不潔淨分別出來，教訓以色列人耶和華曉諭他們的律例。
- name: 聖俗
  type: 神學
  evidence: v10 要將聖俗、潔淨不潔淨分別出來。分別聖俗是祭司核心職責。
- name: 潔淨不潔淨
  type: 神學
  evidence: v10 要將聖俗、潔淨不潔淨分別出來。分別潔淨不潔淨是祭司核心職責。
- name: 營外
  type: 地點
  evidence: v4,5 把屍體抬到營外。營外表徵離開神同在、分別為聖的界線。
- name: 火從耶和華面前出來
  type: 事件
  evidence: v2 火從耶和華面前出來燒滅拿答亞比戶。神火表審判、悅納（9:24）。
