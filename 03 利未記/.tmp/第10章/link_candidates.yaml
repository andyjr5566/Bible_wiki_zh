book: 利未記
chapter: 10
candidates:
- name: 凡火（陌生的火）
  suggested_type: 神學
  evidence: 利未記10:1 拿答、亞比戶各拿香爐盛火加香，獻上凡火（耶和華未吩咐的）。CCB 指出凡火表出於肉體、未經十字架對付的事奉，KC 指出聖火來自神（9:24），凡火是人天然熱心的替代。
  surfaces:
  - phrase: 凡火
  - phrase: 陌生的火
  - phrase: 耶和華沒有吩咐他們的
- name: 火從耶和華面前出來燒滅他們
  suggested_type: 神學
  evidence: 利未記10:2 火從耶和華面前出來，把他們燒滅，死在耶和華面前。KC 指出神是烈火（來12:29），審判不聖潔的事奉；預表末世審判（啟20:9）。
  surfaces:
  - phrase: 火從耶和華面前出來
  - phrase: 燒滅
  - phrase: 死在耶和華面前
- name: 在親近我的人中要顯為聖
  suggested_type: 神學
  evidence: 利未記10:3 摩西對亞倫說：耶和華說「我在親近我的人中要顯為聖；在眾民面前我要得榮耀」。亞倫默默不言。KC 指出事奉神者被更高標準審判（雅3:1），聖潔是事奉的前提。
  surfaces:
  - phrase: 親近我的人
  - phrase: 顯為聖
  - phrase: 得榮耀
  - phrase: 默默不言
- name: 不可蓬頭散髮、撕裂衣裳
  suggested_type: 祭禮
  evidence: 利未記10:6-7 摩西吩咐亞倫和剩下兒子不可蓬頭散髮、撕裂衣裳，免得死亡、耶和華向會眾發怒；不可出會幕門，因耶和華膏油在他們身上。CCB 指出祭司職分高於血肉親情，膏油表聖靈膏抹不可輕慢。
  surfaces:
  - phrase: 蓬頭散髮
  - phrase: 撕裂衣裳
  - phrase: 不可出會幕的門
  - phrase: 耶和華的膏油在你們身上
- name: 祭司不可喝酒
  suggested_type: 神學
  evidence: 利未記10:8-11 耶和華曉諭亞倫：你和兒子進會幕時清酒濃酒不可喝，免得死亡；要將聖俗、潔淨不潔淨分別出來，教訓以色列人律例。KC 指出酒表天然喜樂，事奉須靠聖靈而非肉體興奮（弗5:18）。
  surfaces:
  - phrase: 清酒、濃酒都不可喝
  - phrase: 分別聖俗
  - phrase: 分別潔淨不潔淨
  - phrase: 教訓以色列人
- name: 祭司在聖處吃素祭、搖祭胸、舉祭腿
  suggested_type: 祭禮
  evidence: 利未記10:12-15 摩西吩咐亞倫、以利亞撒、以他瑪在聖處吃素祭、搖祭胸、舉祭腿，作永得的分。CCB 指出這預表信徒在聖潔中享受基督（約6:53-56）。
  surfaces:
  - phrase: 在聖處吃
  - phrase: 素祭
  - phrase: 搖祭胸
  - phrase: 舉祭腿
  - phrase: 永得的分
- name: 贖罪祭公山羊被燒了（摩西發怒、亞倫解釋）
  suggested_type: 祭禮
  evidence: 利未記10:16-20 摩西尋找贖罪祭公山羊，發現已燒了，向以利亞撒、以他瑪發怒；亞倫解釋：今日獻贖罪祭燔祭，遇這災禍，若吃贖罪祭耶和華豈看為美？摩西以為美。KC 指出亞倫屬靈洞察力勝過摩西律法執行，預表基督的憐憫大過律法（太12:7）。
  surfaces:
  - phrase: 贖罪祭公山羊
  - phrase: 已經焚燒了
  - phrase: 耶和華豈能看為美呢
  - phrase: 摩西聽見這話便以為美