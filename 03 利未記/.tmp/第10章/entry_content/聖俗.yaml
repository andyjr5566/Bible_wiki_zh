status: formal
definition: 利未記10:10所命祭司分辨的第一組界線：「使你們可以將聖的、俗的……分別出來。」「聖」是被分別出來歸給神的，「俗」是尋常、未被分別的；二者的區別不在善惡，而在歸屬。這項分辨是祭司的核心職責，緊接在禁酒令之後（10:9），因為分辨需要清醒；又緊接在教導律例之前（10:11），因為祭司須把這界線教給百姓。本章的敘事正是這條界線被越過的後果：拿答、亞比戶把不是神所吩咐的「凡」火帶到聖所，界線一破，火就從耶和華面前出來。
accumulations:
- book: 利未記
  chapter: 10
  summary: 祭司要將聖的、俗的分別出來，與潔淨不潔淨的分辨並列，並須把律例教訓以色列人。
  relation: 為本章的審判提供概念框架——凡火之所以致死，正因它跨越了聖與俗的界線。
