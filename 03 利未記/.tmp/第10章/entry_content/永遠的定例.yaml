name: 永遠的定例
type: 神學
secondary_types: []
aliases:
- 世世代代永遠的定例
- 永得的分
status: formal
definition: 利未記10:9為禁酒令所加的效力宣告：「這要作你們世世代代永遠的定例。」它把一條在特定審判事件之後頒下的命令，提升為跨越世代、對歷任祭司都有效的常規，而不是針對亞倫一家一時的處置。本章另有一處類似的恆久性表述：所舉的腿、所搖的胸「要歸你和你兒子，當作永得的分，都是照耶和華所吩咐的」（10:15）——祭司的責任是永遠的，神所定給他們的分也是永遠的。
development: 「永遠的定例」與本章開頭「耶和華沒有吩咐」形成對照：敬拜的合法性既然繫於神的吩咐，那麼神的吩咐就必須具有跨世代的穩定效力，才能持續作為分辨的準繩。
accumulations:
- book: 利未記
  chapter: 10
  summary: 進會幕禁酒被立為世世代代永遠的定例；搖胸舉腿也被定為祭司永得的分。
  relation: 使本章的祭司條例超越當下事件，成為歷世歷代祭司職分的常規與所得之分的根據。
