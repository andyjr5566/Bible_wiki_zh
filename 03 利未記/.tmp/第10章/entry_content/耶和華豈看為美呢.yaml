name: 耶和華豈看為美呢
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 利未記10:19 亞倫對摩西說：「今天他們在耶和華面前獻上贖罪祭和燔祭，我又遇見這樣的災，我今日若吃贖罪祭肉，耶和華豈看為美呢？」亞倫指出今日獻贖罪祭、燔祭仍遭禍（兒子被燒），若按常規吃贖罪祭肉，神豈能看為美？顯出屬靈洞察力勝過死守儀式。
development: 此言緊接摩西發怒查問贖罪祭肉被燒（v16-18），亞倫作為大祭司以屬靈分辨回應，摩西聽了便以為美（v20），顯示屬靈分辨重於死守儀式。
accumulations:
