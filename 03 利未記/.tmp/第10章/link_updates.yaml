book: 利未記
chapter: 10
updates:
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: "利10章全章核心：亞倫默默不言（v3）、不可蓬頭撕裂（v6-7）、不可喝酒（v8-11）、在聖處吃祭物（v12-15）、解釋不吃贖罪祭肉（v19-20）。CT：祭司職分高於血肉親情。KC：亞倫預表基督作大祭司；眾祭司預表信徒祭司職分（彼前2:9）。"
  relation: "利10章是利未記祭司職分正式運作的首次考驗，實現出28-29章、40:12-15的吩咐。亞倫系祭司預表基督永遠的祭司職分（來7:17,24）和信徒作祭司（彼前2:9；啟1:6）。"
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: "利10:3,6,12,16,19,20 摩西傳達神話、吩咐祭司禮儀、發怒查問贖罪祭、聽亞倫解釋以為美。摩西作中保、主禮者、監督者。CT：摩西作僕人在神家忠心（來3:5），預表基督作兒子治理神家（來3:6）。"
  relation: "利10章摩西臨時行祭司職分為亞倫系祭司承接聖職，預表基督建立新約祭司體系。摩西順服「照耶和華所吩咐的行了」成為榜樣。"
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: "利10:16-18 贖罪祭公山羊被燒、摩西發怒、亞倫解釋今日獻贖罪祭燔祭仍遭禍。贖罪祭肉至聖，神賜給祭司擔當會眾罪孽（利6:25-26）。CT：贖罪祭表徵基督在營外受苦（來13:11-13）。KC：營外焚燒說明基督在城門外受苦。"
  relation: "利10章贖罪祭肉被燒而非祭司吃，顯示祭司在悲慟中無法履行常規。預表基督為百姓和自己獻上贖罪祭（來9:12,26）。"
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: "利10:19 今日獻贖罪祭和燔祭，卻遇見這樣的事。燔祭表徵完全奉獻。CT：全羊燒在壇上表徵基督完全奉獻給神。KC：燔祭說明基督對神完全的獻上（弗5:2）。"
  relation: "利10章燔祭與贖罪祭同獻，表徵祭司稱義後完全奉獻。預表基督一次獻上自己為馨香的祭（來10:10；弗5:2）。"
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: "利10:12-13,17 素祭是至聖的，祭司在聖處無酵吃。素祭表徵基督無罪人性。CT：素祭無酵表徵基督純潔人性。KC：素祭說明基督作生命糧。"
  relation: "利10章素祭配搭贖罪祭、燔祭、平安祭，預表信徒以基督為生命糧（約6:35,51）並在神面前享受交通。"
- title: 搖祭（tenufah）
  path: link_folder/原文/搖祭（tenufah）.md
  summary: "利10:14-15 搖祭的胸、舉祭的腿，在潔淨處吃，作永得的分。搖祭表徵獻給神又歸祭司。CT：搖祭表徵基督獻給神超過一切。KC：搖祭說明基督獻給神超過一切。"
  relation: "利10章搖祭出現在平安祭中，胸歸祭司（利7:30-31）。預表基督獻給神又賜給信徒（約6:51）。"
- title: 舉祭（terumah）
  path: link_folder/原文/舉祭（terumah）.md
  summary: "利10:14-15 搖祭的胸、舉祭的腿在潔淨處吃。舉祭表徵高舉獻給神。CT：舉祭表徵基督被高舉。KC：舉祭說明基督被高舉。"
  relation: "利10章舉祭出現在平安祭中，右腿歸祭司（利7:32-33）。預表基督被高舉（腓2:9-11）。"
- title: 至聖
  path: link_folder/神學/至聖.md
  summary: "利10:12,13,17 素祭是至聖的、贖罪祭肉是至聖的。至聖表徵最高聖潔層級。CT：至聖表徵基督完全聖潔。KC：至聖說明基督完全聖潔。"
  relation: "利10章至聖祭物（素祭、贖罪祭肉）祭司當在聖處吃。預表信徒在基督裡得著最高聖潔（來10:10,14）。"
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: "利10:4,7,9 會幕門口抬屍體、不可出會幕門、進會幕時不可喝酒。會幕是神與人相會之所。CT：會幕表徵教會；會幕門口表徵在神面前的交通。"
  relation: "利10章會幕是承接聖職禮的舞台，從門口到聖所，見證祭司職分建立。預表基督進入天上真會幕（來9:11-12）和教會作神的殿（弗2:21-22）。"
- title: 火從耶和華面前出來
  path: link_folder/事件/火從耶和華面前出來.md
  summary: "利10:2 火從耶和華面前出來燒滅拿答亞比戶。神火有二種表現：燒盡祭物表悅納（9:24）、燒死不法者表降罰。CT：神乃是烈火（來12:29）。KC：fire from the LORD signifies divine judgment."
  relation: "利10章以神火燒滅凡火獻祭者為高潮，確認神悅納獻祭和祭司職分。預表基督作神榮耀的光輝（來1:3）和聖靈內住（弗1:13-14）。"
