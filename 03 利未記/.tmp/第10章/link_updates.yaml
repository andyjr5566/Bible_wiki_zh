"book": "利未記"
"chapter": !!int "10"
"updates":
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "亞倫兩個長子拿答、亞比戶因獻凡火被神火燒死，摩西向亞倫解釋神的聖潔要求，亞倫默默不言；神其後直接曉諭亞倫祭司禁酒定例；末了亞倫向摩西辯解未吃贖罪祭肉的原因，摩西接受其解釋（v1-20）。"
  "relation": "利8-9章記載亞倫受膏就職、首次獻祭蒙悅納，本章緊接記載他初嘗喪子之痛與職分試煉——祭司身分的尊榮與嚴格要求在本章同時彰顯，是亞倫祭司生涯的重大轉折。"
- "title": "拿答"
  "path": "link_folder/人物/拿答.md"
  "summary": "拿答與弟亞比戶各拿自己的香爐獻上凡火，是耶和華沒有吩咐的，就有火從耶和華面前出來把他們燒滅，死在耶和華面前（v1-2）——應驗了此人物條目先前記載的悲劇結局。"
  "relation": "出24章記載拿答曾與父亞倫、七十長老一同上西乃山見神，該條目已預告「後來因獻凡火被神火燒滅（利10:1-2）」，本章正是這預告的具體歷史實現。"
- "title": "亞比戶"
  "path": "link_folder/人物/亞比戶.md"
  "summary": "亞比戶與兄拿答一同獻上凡火，同被神火燒滅，死在耶和華面前（v1-2）——與拿答同樣的結局應驗於本章。"
  "relation": "出24章亞比戶條目已預告「後來因與拿答一同獻凡火被神火燒滅」，本章是這預告的具體歷史實現，與拿答條目形成對應累積。"
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "以利亞撒與弟以他瑪在兩位兄長死後成為亞倫剩下的兒子：奉命不可為兄長哀哭撕裂衣裳（v6），因未吃贖罪祭肉被摩西責問，經亞倫解釋後蒙摩西接受（v12,16-20）。"
  "relation": "出6章條目已預告「兄長拿答、亞比戶死後接續亞倫為大祭司」，本章是這場家族變故的直接歷史現場——以利亞撒在此首次以「亞倫剩下的兒子」身分登場，是他日後接續大祭司職分的起點。"
- "title": "以他瑪"
  "path": "link_folder/人物/以他瑪.md"
  "summary": "以他瑪與兄以利亞撒在兩位兄長死後成為亞倫剩下的兒子，同樣奉命不可哀哭、因未吃贖罪祭肉被摩西責問，經亞倫解釋後蒙接受（v6,12,16-20）。"
  "relation": "出38章條目記載以他瑪負責數點會幕物件的管家職責，本章是他首次在敘事中以個人身分出現、經歷家族喪變與職分試煉的記載。"
- "title": "亞倫的祭司譜系"
  "path": "link_folder/人物/亞倫的祭司譜系.md"
  "summary": "拿答、亞比戶因獻凡火死亡，亞倫四子僅剩以利亞撒、以他瑪二人承接祭司職分——這是亞倫祭司譜系在歷史上第一次遭遇折損。"
  "relation": "出6、28章確立亞倫四子同列祭司的譜系起點，本章是這譜系首次出現重大變動的記載，直接導致日後以利亞撒（而非拿答）接續亞倫為大祭司（民20:25-28）。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "摩西全程處理拿答亞比戶事件：向亞倫解釋神的話（v3）、指揮抬屍（v4-5）、吩咐禁哀悼禁出會幕（v6-7）、轉達禁酒定例（v8-11）、提醒祭司當得的分（v12-15）、追查贖罪祭肉去向並發怒（v16-18）、接受亞倫的解釋（v19-20）。"
  "relation": "利8、9章摩西的角色分別是主持者與指導者，本章摩西轉為危機處理者與監督者——在祭司體系首次出現重大過犯時，居中平衡神的聖潔要求與人的軟弱處境。"
- "title": "親近（qarab）"
  "path": "link_folder/原文/親近（qarab）.md"
  "summary": "利10:3「我在親近我的人中要顯為聖」，摩西引神的話解釋拿答亞比戶之死的原因——親近神的祭司蒙受更高的聖潔要求。"
  "relation": "出24章確立「親近」一詞用於描述摩西獨自親近耶和華的中保地位，本章擴大其應用至一般祭司身分——凡「親近」神的人（不限於摩西），都須在神面前顯為聖，否則同受懲治。"
- "title": "利10：3"
  "path": "link_folder/互文/利10：3.md"
  "summary": "本章即此互文條目核心經文的原始出處：v3「這就是耶和華所說：我在親近我的人中要顯為聖；在眾民面前，我要得榮耀」，是拿答亞比戶之死的神學解釋。"
  "relation": "出20章已引用利10:3闡明築壇規定「不可用鑿成石頭築壇」背後「親近神者當顯為聖」的神學原則，本章則是這句經文在利未記本身的原始出處與具體應用場景——祭司因獻凡火觸犯神的聖潔而被審判。"
- "title": "素祭（minchah）"
  "path": "link_folder/原文/素祭（minchah）.md"
  "summary": "利10:12-13，摩西吩咐亞倫和剩下的兒子將所剩的素祭在壇旁不帶酵而吃，因為是至聖的，是他們在獻給耶和華的火祭中當得的分。"
  "relation": "利2章確立素祭條例、利9章記百姓首次獻上素祭，本章補上祭司食用素祭剩餘部分的具體規定——地點（壇旁）、方式（不帶酵）、身分（至聖，僅限祭司）。"
- "title": "平安祭（shelamim）"
  "path": "link_folder/原文/平安祭（shelamim）.md"
  "summary": "利10:14-15，所搖的胸與所舉的腿屬平安祭中歸祭司全家食用的部分，須在潔淨地方吃，是從以色列人平安祭中永遠賜給祭司的分。"
  "relation": "利3章確立平安祭條例、利9章記百姓首次獻上平安祭，本章補上祭司及其全家（男女皆可）享用平安祭部分的具體規定，與素祭（僅限祭司男丁在聖處吃）形成對比。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "利10:14-15，所搖的胸與火祭的脂油一同帶來當搖祭，在耶和華面前搖一搖，歸祭司永得的分。"
  "relation": "利7章確立搖祭為平安祭中胸的處理方式，本章重申此規定並確認其為祭司「永得的分」（永久定例），呼應利7:34「這是從以色列人的平安祭中，取了歸與祭司亞倫和他子孫的，作永遠當得的分」。"
- "title": "至聖的供物（聖與至聖之分）"
  "path": "link_folder/主題/至聖的供物（聖與至聖之分）.md"
  "summary": "利10:12「因為是至聖的」、v13「你的分和你兒子的分」、v17「這贖罪祭既是至聖的，主又給了你們」，本章三次強調素祭與贖罪祭剩餘部分屬至聖等級，僅限祭司在聖處食用。"
  "relation": "利2、6、7章已確立至聖供物的分類原則與食用限制，本章不僅重申此原則，更因祭司未依例食用贖罪祭肉而引發摩西的責問（v16-18），顯示至聖供物的食用規定具有強制性，不可任意省略。"
- "title": "贖罪祭"
  "path": "link_folder/神學/贖罪祭.md"
  "summary": "利10:16-20，摩西尋找為會眾贖罪的公山羊發現已被焚燒，因其血未帶入聖所、按例祭司本應在聖所吃這祭肉，摩西向以利亞撒、以他瑪發怒；亞倫以喪子之痛為由解釋未吃的原因，摩西聽後接受。"
  "relation": "利6章確立血未進聖所的贖罪祭祭肉應由祭司在聖處食用的條例，本章是這條例首次因祭司未遵守而引發的實際爭議案例，顯示條例的執行也需考量人情與屬靈狀態的彈性空間。"
- "title": "膏油（聖膏油）"
  "path": "link_folder/原文/膏油（聖膏油）.md"
  "summary": "利10:7「你們也不可出會幕的門，恐怕你們死亡，因為耶和華的膏油在你們的身上」，膏油是亞倫和剩下兒子不可為兄長哀悼出會幕的理由——身上有膏油者須分別為聖、不可沾染死屍的污穢。"
  "relation": "利8章膏油首次澆灌在亞倫頭上、彈在祭司身上使其成聖，本章顯示這受膏的身分帶有持續性的約束力——即使遭逢至親變故，受膏者仍須以聖職身分為重，不可因哀悼而暫離職守。"
- "title": "燔祭（olah）"
  "path": "link_folder/原文/燔祭（olah）.md"
  "summary": "利10:19，亞倫向摩西辯解時提及「今天他們在耶和華面前獻上贖罪祭和燔祭」，是當天已完成的獻祭之一，作為亞倫解釋自己心情沉重、不宜吃贖罪祭肉的背景說明。"
  "relation": "利9章記百姓首次獻上燔祭，本章燔祭僅作為亞倫辯解時提及的背景事實，未有新的條例補充，顯示燔祭在本章敘事中的角色是既定事實而非討論焦點。"
