"book": "03 利未記"
"chapter": !!int "20"
"updates":
- "title": "摩洛（Molech）"
  "path": "link_folder/文化/摩洛（Molech）.md"
  "summary": "利20:1-5 禁止獻兒女給摩洛，違者石頭打死、從民中剪除；若本地人佯為不見，神向那人和其家變臉，把一切隨他與摩洛行邪淫的從民中剪除。本章為摩洛崇拜提供具體死刑條例（利18:21 僅禁令）。KC：摩洛為亞捫人國神，崇拜含嬰兒火祭。"
  "relation": "本章將利18:21 的禁令具體化為死刑條例，並延伸連帶責任（佯為不見者同罪），體現聖潔法典對偶像崇拜零容忍態度。"
- "title": "剪除（kareth）"
  "path": "link_folder/原文/剪除（kareth）.md"
  "summary": "利20:3,5,6,17,18 多次出現「從民中剪除」：獻摩洛（v3,5）、交鬼行巫術（v6）、娶姊妹（v17）、行經同房（v18）。本章將剪除應用於摩洛崇拜、交鬼、亂倫、行經同房四大領域。"
  "relation": "本章大幅擴展剪除的適用範圍，從利17-18 章的獻祭違規、吃血、性倫理，延伸至偶像崇拜（摩洛、交鬼）與特定亂倫（娶姊妹、行經同房），形成禮儀、道德、敬拜三重剪除體系。"
- "title": "寄居的（ger）"
  "path": "link_folder/原文/寄居的（ger）.md"
  "summary": "利20:2 寄居的外人獻兒女給摩洛同被治死；利20:22-23 寄居者同歸一律，不可隨從外邦風俗。本章將寄居者納入死刑條例與聖潔標準的同等約束。"
  "relation": "本章為寄居者條例在利未記中的最高標準：死刑同等（v2）、聖潔標準同等（v22-23），呼應利17-19 章寄居者同歸一律原則。"
- "title": "可憎（sheqets）"
  "path": "link_folder/原文/可憎（sheqets）.md"
  "summary": "利20:13 同性戀為可憎的事（to'evah）；利20:23 外邦風俗為神所厭惡。將 to'evah 用於同性戀與外邦惡俗，延續利18 章性倫理可憎用法。"
  "relation": "本章重申利18 章同性戀可憎定性，並將外邦風俗整體定性為神所厭惡，構成「可憎」在聖潔法典中的完整語義場域。"
- "title": "聖潔"
  "path": "link_folder/神學/聖潔.md"
  "summary": "利20:7-8 你們要自潔成聖，因為我是耶和華你們的神；你們要謹守遵行我的律例，我是叫你們成聖的耶和華。利20:26 你們要歸我為聖，因為我耶和華是聖潔的，並使你們與萬民有分別，叫你們歸我。本章以聖潔為死刑條例的神學根基。"
  "relation": "本章雙重宣告聖潔根基（v7-8, v26），將聖潔與律例遵行、分別為聖、歸神掛鉤，為彼前1:15-16 引用提供舊約核心依據。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "利20:1 耶和華對摩西說。摩西作為聖潔法典死刑條例的傳遞者，將神對偶像崇拜、性倫理、巫術的零容忍標準頒布給以色列人。"
  "relation": "本章摩西繼續其立法者角色，傳遞聖潔法典（利17-26）中刑罰最重的一章。"
- "title": "迦南人"
  "path": "link_folder/人物/迦南人.md"
  "summary": "利20:23 國民行了這一切事，神厭惡他們；地吐出居民。迦南人的性倫理惡俗（摩洛、亂倫、同性、獸交）為被逐出之由。"
  "relation": "本章從審判角度解釋迦南人被逐出：非單純領土爭奪，乃因性倫理惡俗玷污地，神厭惡而吐出。"
- "title": "以色列全會眾"
  "path": "link_folder/人物/以色列全會眾.md"
  "summary": "利20:2 曉諭以色列人。死刑執行由本地人（會眾）用石頭打死（v2,27），體現會眾參與除惡的連帶責任。"
  "relation": "本章將死刑執行權賦予會眾（本地人），使全體子民在除惡中承擔聖潔共同體責任，呼應申17:7 見證人先下手。"
- "title": "亞捫人"
  "path": "link_folder/人物/亞捫人.md"
  "summary": "利20:2-5 摩洛為亞捫人國神（王上11:7）。獻兒女給摩洛反映亞捫人風俗，成為以色列進迦南前必須絕對棄絕的惡俗。"
  "relation": "本章以亞捫人摩洛崇拜為反面教材，警告以色列不可效法亞捫人風俗，呼應士10:6、王上11:7 亞捫人拜摩洛歷史。"
- "title": "骨肉之親（she'er besaro）"
  "path": "link_folder/原文/骨肉之親（she'er besaro）.md"
  "summary": "利20:19 露姨母姑母下體是露了骨肉之親的下體；利20:17,20-21 涉及姊妹、伯叔之妻、弟兄之妻皆屬骨肉之親範圍。本章以 she'er besaro 界定亂倫死刑/剪除/無子女的親屬邊界。"
  "relation": "本章將利18 章骨肉之親禁令具體化為分級刑罰：死刑（繼母、兒婦、同性、獸交、娶妻並娶其母）、剪除（姊妹、行經）、無子女（伯叔之妻、弟兄之妻）、擔當罪孽（姨母、姑母），構建完整亂倫刑罰體系。"
- "title": "分別為聖"
  "path": "link_folder/神學/分別為聖.md"
  "summary": "利20:24,26 我使你們與萬民有分別，叫你們歸我。分別潔淨不潔淨動物（v25）預表分別聖潔生活。本章以分別為聖作為承受迦南地、免被地吐出的條件。"
  "relation": "本章將分別為聖從儀式（潔淨/不潔淨動物）延伸至倫理（拒絕外邦風俗）、關係（歸神）、生存（保地）三個層面，構成聖潔法典的核心神學邏輯。"
