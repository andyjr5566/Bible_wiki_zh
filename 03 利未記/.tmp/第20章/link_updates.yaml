"book": "利未記"
"chapter": !!int "20"
"updates":
- "title": "不可偏向交鬼行巫術的"
  "path": "link_folder/主題/不可偏向交鬼行巫術的.md"
  "summary": "v6,27「人偏向交鬼的和行巫術的...要把他從民中剪除」「無論男女，是交鬼的或行巫術的，總要治死他們，人必用石頭把他們打死」，與利19:31同一禁令，本章增補死刑（石刑）的具體執行。"
  "relation": "本章將此禁令從剪除刑罰升級為明確的石刑處死，並置於全章首尾（v6與v27）形成宗教罪行的框架。"
- "title": "咒罵父母"
  "path": "link_folder/神學/咒罵父母.md"
  "summary": "v9「凡咒罵父母的，總要治死他；他咒罵了父母，他的罪要歸到他身上」。BH：這裡的「咒罵」不僅是言語上的粗鄙，而是以輕藐的態度對待父母，是一種背叛與拒絕神所設立權威的態度。"
  "relation": "本章將此罪列為家庭與性倫理刑罰段落的開端，與孝敬父母的第五誡（利19:3）形成正反對照。"
- "title": "不可姦淫"
  "path": "link_folder/神學/不可姦淫.md"
  "summary": "v10「與鄰舍之妻行淫的，姦夫淫婦都必治死」，與利18:20、出20:14同一誡命，本章增補死刑處分。"
  "relation": "本章將姦淫罪與其他逆倫、性犯罪並列規定死刑，是第七誡在刑罰體系中的具體落實。"
- "title": "近親性關係的十二項條例"
  "path": "link_folder/主題/近親性關係的十二項條例.md"
  "summary": "v11,12,17,19 對照利18章逐項增補具體治罪：與繼母行淫、與兒婦同房者「總要把他們二人治死」；娶姊妹見了下體者「必在本民的眼前被剪除」；露姨母姑母下體者「必擔當自己的罪孽」。"
  "relation": "本章是利18章近親性關係禁令的刑罰對應篇，將利18章的道德禁令逐項配上具體的死刑或剪除刑罰。"
- "title": "不可與男人苟合可憎惡的事"
  "path": "link_folder/主題/不可與男人苟合可憎惡的事.md"
  "summary": "v13「人若與男人苟合，像與女人一樣，他們二人行了可憎的事，總要把他們治死」，與利18:22同一禁令，本章增補死刑處分。"
  "relation": "本章為利18:22的禁令補上具體死刑，完整呈現此罪從道德禁令到刑罰執行的體系。"
- "title": "不可與獸淫合逆性的事"
  "path": "link_folder/主題/不可與獸淫合逆性的事.md"
  "summary": "v15-16「人若與獸淫合，總要治死他，也要殺那獸。女人若與獸親近，與牠淫合...總要把他們治死」，與利18:23同一禁令，本章增補：人與獸皆治死。"
  "relation": "本章補上利18:23禁令的死刑執行，並增列連涉事的獸類也一併治死的細節。"
- "title": "不可與經期婦人親近"
  "path": "link_folder/主題/不可與經期婦人親近.md"
  "summary": "v18「婦人有月經，若與他同房，露了他的下體...二人必從民中剪除」，與利18:19同一禁令，本章增補剪除刑罰。GT丁良才：本節是論明知故犯的，利15:24是論無意犯了的。"
  "relation": "本章區分明知故犯（本章，剪除）與無意誤犯（利15:24，僅不潔七天）兩種情況的不同刑罰。"
- "title": "你們要聖潔因為我是聖潔的"
  "path": "link_folder/神學/你們要聖潔因為我是聖潔的.md"
  "summary": "v7-8,26 三度重現「你們要自潔成聖」「我是叫你們成聖的耶和華」「你們要歸我為聖，因為我耶和華是聖的」，與利19:2、11:44-45同一refrain。"
  "relation": "本章此refrain三度出現於首尾（v7-8開篇勸勉、v26結尾總結），框住全章的刑罰體系，顯明刑罰的根本目的是維持聖潔。"
- "title": "玷污自己也玷污地"
  "path": "link_folder/神學/玷污自己也玷污地.md"
  "summary": "v22「你們要謹守遵行我一切的律例典章，免得我領你們去住的那地把你們吐出」，與利18:24-28同一神學主題，本章重申此為22-26節的總勸勉。"
  "relation": "本章將此神學主題置於刑罰體系之後的總結勸勉，把個別死刑條例與「地吐出居民」的集體審判意象相連。"
- "title": "潔淨與不潔淨的早期區分"
  "path": "link_folder/主題/潔淨與不潔淨的早期區分.md"
  "summary": "v25「你們要把潔淨和不潔淨的禽獸分別出來；不可因我給你們分為不潔淨的禽獸...使自己成為可憎惡的」。GT串珠：明顯是指利11章關於飲食的律例，其主要目的乃是在以色列人和迦南人中間劃出清楚的分界線。"
  "relation": "本章將飲食潔淨條例（利11章）與分別為聖的呼召並列，作為「你們要聖潔」總綱在日常生活中的具體實踐之一。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西說」，摩西是本章死刑刑罰體系的唯一傳達者。"
  "relation": "本章延續摩西向以色列人傳達耶和華律例典章之刑罰內容的一貫角色，緊接利18、19章的道德與倫理條例之後。"
