  - name: 剪除（kareth）
    type: 原文
    evidence: "利20:3,5,6,17,18 多次出現「從民中剪除」：獻摩洛（v3,5）、交鬼行巫術（v6）、娶姊妹（v17）、行經同房（v18）。本章將剪除應用於摩洛崇拜、交鬼、亂倫、行經同房四大領域。"
    surfaces: ["從民中剪除", "剪除", "被剪除"]

