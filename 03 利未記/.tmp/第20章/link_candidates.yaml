book: "03 利未記"
chapter: 20
candidates:
  # === C 類：全新條目 ===
  - name: 摩洛死刑條例（獻兒女給摩洛）
    type: 主題
    evidence: "利20:1-5 凡以色列人或寄居外人把兒女獻給摩洛，總要治死，本地人用石頭打死；神向那人變臉，從民中剪除。若本地人佯為不見不治死，神向那人和其家變臉，把一切隨他與摩洛行邪淫的從民中剪除。KC：摩洛為亞捫人國神，崇拜含嬰兒火祭。"
    surfaces: ["獻給摩洛", "兒女獻給摩洛", "經火歸摩洛", "與摩洛行邪淫"]

  - name: 偏向交鬼行巫術死刑條例
    type: 主題
    evidence: "利20:6 人偏向交鬼的和行巫術的，隨他們行邪淫，神向那人變臉，從民中剪除。申18:10-12、賽8:19 平行。KC：基督徒以為看星相「為好玩」無害，大錯特錯；每進入黑暗領域都是屬靈姦淫。掃羅違背而死（代上10:13）。"
    surfaces: ["偏向交鬼的", "行巫術的", "隨他們行邪淫", "交鬼行巫術"]

  - name: 咒罵父母死刑條例
    type: 主題
    evidence: "利20:9 凡咒罵父母的，總要治死他；他咒罵了父母，他的罪要歸到他身上。出21:17 平行；申21:18-21 擴展至持續悖逆。弗6:1-3 以應許鼓勵孝敬。KC：父母是神權柄象徵，咒罵父母等於褻瀆神。"
    surfaces: ["咒罵父母", "總要治死他", "他的罪要歸到他身上"]

  - name: 姦淫死刑條例（與鄰舍妻行淫）
    type: 主題
    evidence: "利20:10 與鄰舍之妻行淫的，姦夫淫婦都必治死。出20:14、申22:22 平行。KC：兩人合謀犯罪，同時被治死。"
    surfaces: ["與鄰舍之妻行淫", "姦夫淫婦", "都必治死"]

  - name: 與繼母行淫死刑條例
    type: 主題
    evidence: "利20:11 與繼母行淫的，就是羞辱了他父親，總要把他們二人治死，罪要歸到他們身上。利18:8 平行。"
    surfaces: ["與繼母行淫", "羞辱了他父親", "二人治死"]

  - name: 與兒婦同房死刑條例
    type: 主題
    evidence: "利20:12 與兒婦同房的，總要把他們二人治死；他們行了逆倫的事，罪要歸到他們身上。利18:15 平行。KC：逆倫（tevel）意為混合、混亂，暗示違背創造秩序。"
    surfaces: ["與兒婦同房", "逆倫的事", "二人治死"]

  - name: 同性戀死刑條例
    type: 主題
    evidence: "利20:13 人若與男人苟合，像與女人一樣，他們二人行了可憎的事，總要把他們治死，罪要歸到他們身上。利18:22 平行。KC：律法以我為準則，基督教以基督為準則（約壹3:16）。"
    surfaces: ["與男人苟合", "行了可憎的事", "二人治死", "同性戀"]

  - name: 娶妻並娶其母火刑條例
    type: 主題
    evidence: "利20:14 人若娶妻，並娶其母，便是大惡，要把這三人用火焚燒，使你們中間免去大惡。利18:17 平行。KC：按律法先用石頭打死或絞死，再用火焚燒（書7:25 亞干為例）。"
    surfaces: ["娶妻並娶其母", "大惡", "用火焚燒", "三人"]

  - name: 獸交死刑條例
    type: 主題
    evidence: "利20:15-16 人若與獸淫合，總要治死他，也要殺那獸；女人若與獸親近淫合，要殺那女人和那獸，總要把他們治死，罪要歸到他們身上。利18:23 平行。KC：人與獸都要被殺，因為這是逆性的事。"
    surfaces: ["與獸淫合", "殺那獸", "女人與獸親近", "逆性的事"]

  - name: 娶姊妹被剪除條例
    type: 主題
    evidence: "利20:17 人若娶他的姊妹，無論異母同父、異父同母，彼此見了下體，這是可恥的事；他們必在本民眼前被剪除。他露了姊妹的下體，必擔當自己的罪孽。利18:9 平行。"
    surfaces: ["娶他的姊妹", "彼此見了下體", "可恥的事", "在本民眼前被剪除"]

  - name: 行經同房被剪除條例
    type: 主題
    evidence: "利20:18 婦人有月經，若與她同房，露了她的下體，就是露了婦人的血源，婦人也露了自己的血源，二人必從民中剪除。利18:19 平行。KC：論明知故犯者；利15:24 論無意犯的。"
    surfaces: ["婦人有月經", "露了婦人的血源", "二人必從民中剪除", "行經同房"]

  - name: 露姨母姑母下體擔當罪孽條例
    type: 主題
    evidence: "利20:19 不可露姨母或姑母的下體，這是露了骨肉之親的下體；二人必擔當自己的罪孽。利18:12-13 平行。"
    surfaces: ["露姨母的下體", "露姑母的下體", "露了骨肉之親的下體", "擔當自己的罪孽"]

  - name: 與伯叔之妻同房無子女而死條例
    type: 主題
    evidence: "利20:20 人若與伯叔之妻同房，就羞辱了他的伯叔；二人要擔當自己的罪，必無子女而死。利18:14 平行。"
    surfaces: ["與伯叔之妻同房", "羞辱了他的伯叔", "無子女而死", "擔當自己的罪"]

  - name: 娶弟兄之妻污穢無子女條例
    type: 主題
    evidence: "利20:21 人若娶弟兄之妻，這本是污穢的事，羞辱了他的弟兄；二人必無子女。利18:16 平行。"
    surfaces: ["娶弟兄之妻", "污穢的事", "羞辱了他的弟兄", "無子女"]

  - name: 地吐出居民審判
    type: 神學
    evidence: "利20:22-23 你們要謹守遵行我一切律例典章，免得我領你們去住的那地把你們吐出。我在你們面前所逐出的國民，你們不可隨從他們的風俗；因為他們行了這一切的事，所以我厭惡他們。利18:24-30 平行。"
    surfaces: ["那地把你們吐出", "不可隨從他們的風俗", "我厭惡他們", "地吐出居民"]

  - name: 承受迦南地流奶與蜜之地
    type: 神學
    evidence: "利20:24 但我對你們說過，你們要承受他們的地，就是我要賜給你們為業、流奶與蜜之地。我是耶和華─你們的神，使你們與萬民有分別的。"
    surfaces: ["承受他們的地", "流奶與蜜之地", "使你們與萬民有分別"]

  - name: 潔淨與不潔淨動物分別
    type: 主題
    evidence: "利20:25 所以，你們要把潔淨的牲畜與不潔淨的分別，潔淨的雀鳥與不潔淨的分別；不可因牲畜、雀鳥、或是地上爬物，使自己成為可憎的。利11 章平行。"
    surfaces: ["潔淨的牲畜與不潔淨的分別", "潔淨的雀鳥與不潔淨的分別", "使自己成為可憎的"]

  - name: 你們要歸我為聖
    type: 神學
    evidence: "利20:26 你們要歸我為聖，因為我耶和華是聖潔的，並且我使你們與萬民有分別，叫你們歸我。彼前1:15-16 引用。"
    surfaces: ["你們要歸我為聖", "我耶和華是聖潔的", "使你們與萬民有分別", "叫你們歸我"]

  - name: 交鬼行巫術死刑條例（男女）
    type: 主題
    evidence: "利20:27 男女中若有交鬼的或行巫術的，總要治死他們，用石頭打死他們，罪要歸到他們身上。出22:18、申18:10-12 平行。"
    surfaces: ["交鬼的", "行巫術的", "總要治死他們", "用石頭打死", "罪要歸到他們身上"]

