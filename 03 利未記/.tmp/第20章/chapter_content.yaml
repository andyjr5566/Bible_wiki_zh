organization: "### 死刑與剪除條例：摩洛崇拜與巫術（v1-8）\n本章開篇即以極嚴厲的語氣處理兩大屬靈叛逆罪行：[[摩洛死刑條例（獻兒女給摩洛）|獻兒女給摩洛]]與[[偏向交鬼行巫術死刑條例|偏向交鬼行巫術]]。[[摩西]]傳達神命令，凡以色列人或[[寄居的（ger）|寄居的外人]]將兒女獻給[[摩洛（Molech）|摩洛]]，必被[[石頭打死]]；若百姓佯為不見，神必親自向犯罪者及其家變臉，並將他們從民中[[剪除（kareth）|剪除]]。這顯示[[聖潔]]不僅是個人責任，更是共同體的公義義務。緊接著禁止[[偏向交鬼行巫術死刑條例|偏向交鬼行巫術]]，強調「我是叫你們成聖的耶和華」（v7-8），將屬靈忠誠視為[[分別為聖]]的核心。\n\
  \n### 性倫理與家庭純潔的死刑條例（v9-21）\n經文隨即列出十項性倫理犯罪，刑罰分級精確：[[咒罵父母死刑條例|咒罵父母]]、[[姦淫死刑條例（與鄰舍妻行淫）|姦淫]]、[[與繼母行淫死刑條例|與繼母行淫]]、[[與兒婦同房死刑條例|與兒婦同房]]、[[同性戀死刑條例|同性性行為]]、[[娶妻並娶其母火刑條例|娶妻並娶其母]]、[[獸交死刑條例|獸交]]均判[[石頭打死]]或[[火刑]]，罪歸自己；[[娶姊妹被剪除條例|娶姊妹]]、[[行經同房被剪除條例|行經同房]]則被[[剪除（kareth）|剪除]]；[[露姨母姑母下體擔當罪孽條例|露姨母/姑母下體]]、[[與伯叔之妻同房無子女而死條例|與伯叔之妻同房]]、[[娶弟兄之妻污穢無子女條例|娶弟兄之妻]]則擔當罪孽、[[無子女而死]]。這些條例以「[[逆倫（tevel）|逆倫]]」（tevel）、「[[骨肉之親（she'er\
  \ besaro）|骨肉之親]]」、「[[血源（maqor）|血源]]」等術語，界定家庭秩序的神聖界線，保護[[以色列全會眾]]免受[[迦南人]]風俗污染。\n\
  \n### 聖潔分別與承受應許之地（v22-26）\n神宣告遵守[[律例典章]]是免被[[地吐出居民審判|那地吐出]]的條件（v22），因[[迦南人]]行這一切事被神厭惡。應許之地[[承受迦南地流奶與蜜之地|流奶與蜜之地]]的賜予，目的是使以色列「與萬民有分別」（v24,\
  \ 26）。此處引入[[潔淨與不潔淨動物分別|潔淨不潔淨禽獸分別]]（v25），將飲食律法納入聖潔體系，呼應「你們要歸我為聖，因為我耶和華是聖的」（v26），即[[你們要歸我為聖]]。\n\
  \n### 巫術死刑重申（v27）\n章末重申[[交鬼行巫術死刑條例（男女）|男女交鬼行巫術]]必死，[[石頭打死]]，罪歸自己，形成與開頭（v6）的首尾呼應，將屬靈奸淫視為社會毒瘤。\n\
  \n### 跨章脈絡：聖潔法典的刑罰體系與新約呼應\n利未記20章構建「罪—刑—聖」三角結構：以[[石頭打死]]、[[火刑]]、[[剪除（kareth）|剪除]]、[[無子女而死]]四級刑罰，守護[[聖潔]]邊界。新約雖廢除民事刑罰，保留教會紀律（林前5:13「把那惡人從你們中間趕出去」），[[聖潔]]呼召轉為內在聖靈重生（彼前1:15-16），[[分別為聖]]從禮儀外延轉向生命內質。\n\
  \n```mermaid\nmindmap\n  root((利未記20章 刑罰與聖潔體系))\n    死刑（石頭打死/火刑）\n      摩洛崇拜\n \
  \     咒罵父母\n      姦淫/亂倫(繼母/兒婦/姊妹/姨母/伯叔妻/弟兄妻)\n      同性性行為\n      獸交\n      巫術交鬼\n\
  \      娶妻並娶其母\n    剪除（kareth）\n      獻摩洛(民不殺時神親自執行)\n      娶姊妹\n      行經同房\n   \
  \ 無子女而死/擔當罪孽\n      露姨母/姑母下體\n      與伯叔之妻同房\n      娶弟兄之妻\n    核心動機\n      聖潔(我是聖的)\n\
  \      分別為聖(與萬民有別)\n      免被地吐出\n      承受流奶與蜜之地\n```"
