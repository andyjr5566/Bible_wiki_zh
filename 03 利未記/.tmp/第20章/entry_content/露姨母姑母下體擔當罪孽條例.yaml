name: 露姨母姑母下體擔當罪孽條例
type: 主題
secondary_types: []
aliases:
- 露姨母下體條例
- 露姑母下體條例
- 與姨母姑母同房擔當罪孽
status: formal
definition: 依利未記 20:19，不可露姨母（母親的姊妹）或姑母（父親的姊妹）的下體，因為這是露了骨肉之親的下體；二人必擔當自己的罪孽。此條例屬於亂倫性罪（incest）範疇，刑罰為「擔當罪孽」（承擔罪責），而非死刑或剪除。
development: 此法保護擴大家庭結構的性界限，強調骨肉之親關係的神聖不可侵犯性。與利未記18:12-13平行。
accumulations:
- book: 利未記
  chapter: 20
  summary: 第19節禁止露姨母或姑母下體，犯者擔當罪孽。
  relation: 本章亂倫條例系列之一，區別於死刑與剪除條例，屬擔當罪孽等級。
