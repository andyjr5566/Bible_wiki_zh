status: formal
definition: 利未記20:24應許神將迦南地賜給以色列人為業，這地流奶與蜜，象徵神的恩典與聖約的實現，前提是百姓遵守律例並與萬民分別。
development: 此應許在約書亞記與士師記中逐步應驗，並成為後期先知書盼望復興的基礎。
