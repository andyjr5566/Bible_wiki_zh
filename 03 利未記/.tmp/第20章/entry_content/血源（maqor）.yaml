name: 血源（maqor）
type: 原文
secondary_types: []
aliases:
- maqor
- 血泉
- 血的源頭
status: formal
definition: 希伯來文 **maqor**（מָקוֹר），原意「泉源、源頭」，引申為血液流出的源頭。利未記 20:18 「露了婦人的血源，婦人也露了自己的血源」，指女子月經期間的經血流出。律法視月經為儀式不潔（利
  15:19-24），此時同房屬嚴重犯禁，雙方必「從民中剪除」（kareth）。「血源」一詞強調生命力（血）的神聖性與邊界——月經血代表生命潛能的暫時流失，不得被褻瀆。同根詞見於詩
  36:10「生命的泉源」、箴 5:18「泉源要蒙福」。
development: 七十士譯本譯為 pege（泉源）；拉丁譯本用 fons。猶太律法（Halakha）據此制定 niddah（經期分離）規條。新約可 5:25-34
  血漏女醫治記事，隱含對「血源」不潔狀態的解除。
accumulations:
- book: 利未記
  chapter: 20
  summary: 第 18 節以 maqor 描述月經血源，規定經期同房者雙方被剪除。
  relation: 本章將「血源」暴露列入剪除條例，呼應利 15 章身體流出律法，強化聖潔共同體對生命邊界（血）的敬畏。
