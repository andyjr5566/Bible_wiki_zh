name: 無子女而死的刑罰
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 利未記第20章對特定性犯罪的刑罰宣告：人若與伯叔之妻同房，羞辱其伯叔，二人要擔當自己的罪，必無子女而死；人若娶弟兄之妻（弟兄仍在世時），便是污穢的事，羞辱弟兄，二人必無子女。此刑罰表明神視生育為賜福，無子女而死乃莫大的咒詛，由神親自執行審判。
accumulations:
- book: 利未記
  chapter: 20
  summary: 本章宣告與伯叔之妻同房者必無子女而死，娶弟兄之妻者必無子女，顯明神對破壞家庭倫理之罪的直接刑罰。
  relation: 直接記載該刑罰的宣告與神學含義。
