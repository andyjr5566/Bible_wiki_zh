status: formal
definition: 利未記20:26命令以色列人要歸耶和華為聖，因神是聖的，並要使他們與萬民有分別，成為神的子民。這是聖潔法典的核心呼召。
development: 此呼召在新約延伸為信徒成聖的教義（彼前1:15-16）。
accumulations:
- book: 利未記
  chapter: 20
  summary: 第26節直接命令「你們要歸我為聖」，並說明神呼召以色列人分別為聖。
  relation: 奠定聖潔生活的神學基礎，連結律例遵行與身分認同。
