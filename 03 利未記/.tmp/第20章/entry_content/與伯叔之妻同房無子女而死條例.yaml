name: 與伯叔之妻同房無子女而死條例
type: 主題
secondary_types: []
aliases:
- 與伯叔妻同房條例
- 羞辱伯叔無子女而死
status: formal
definition: 依利未記 20:20，人若與伯叔之妻同房，就羞辱了他的伯叔；二人要擔當自己的罪，必無子女而死。此條例針對叔伯婚姻關係的保護，刑罰為神直接施行的「無子女而死」（屬於早逝或絕嗣的神學審判）。
development: 此法延伸十誡「不可姦淫」與「當孝敬父母」至旁系長輩婚姻關係。與利未記18:14平行。
accumulations:
- book: 利未記
  chapter: 20
  summary: 第20節規定與伯叔之妻同房者擔當罪孽、無子女而死。
  relation: 本章亂倫條例中屬「無子女而死」刑罰類型，區別於死刑與剪除。
