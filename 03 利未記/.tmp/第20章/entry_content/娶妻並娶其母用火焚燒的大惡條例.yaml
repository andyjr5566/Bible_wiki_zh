name: 娶妻並娶其母用火焚燒的大惡條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第20章所定條例：人若娶妻，同時又娶妻子的母親，便是大惡（罪大惡極的亂倫），要把這三人用火焚燒，使以色列中間免去大惡。此刑罰極其嚴厲，旨在徹底清除破壞人倫的敗壞。
accumulations:
- book: 利未記
  chapter: 20
  summary: 本章規定娶妻並娶其母為大惡，三人須用火焚燒，以杜絕此類敗壞人倫的罪行。
  relation: 直接記載該條例的完整內容與刑罰。
