name: 摩洛獻兒女治死條例（含知情連坐）
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 利未記第20章所定條例：凡以色列人或寄居的外人將兒女獻給摩洛（亞捫人的偶像假神，崇拜時可能以火焚燒孩童為祭），總要治死，本地人須用石頭將他打死；若本地人佯為不見、知情不報，神也要向那人和他的家變臉，將他及一切隨從摩洛行邪淫的人從民中剪除。此罪玷污聖所、褻瀆聖名，故刑罰極嚴，且知情者同擔罪責。
accumulations:
- book: 利未記
  chapter: 20
  summary: 本章明定將兒女獻給摩洛者必被治死，本地人知情卻佯為不見者亦遭神剪除，強調全體對拜偶像之罪的連帶責任。
  relation: 直接記載該條例的完整內容與刑罰。
