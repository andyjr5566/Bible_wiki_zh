name: 娶弟兄之妻污穢無子女條例
type: 主題
secondary_types: []
aliases:
- 娶嫂子條例
- 羞辱弟兄無子女條例
- 利未拉婚姻禁令
status: formal
definition: 依利未記 20:21，人若娶弟兄之妻，這本是污穢的事，羞辱了他的弟兄；二人必無子女。此條例禁止利未拉婚姻（娶亡兄之妻）之外的情況，即弟兄在世時娶其妻，屬污穢與羞辱，刑罰同為「無子女」。註：申命記25:5-10規定弟兄無後死後須娶嫂子延續香火（利未拉婚姻），為例外情況。
development: 此法保護婚姻獨佔性與兄弟關係尊嚴。新約馬可福音6:18施洗約翰責備希律娶兄弟之妻即本此原則。
accumulations:
- book: 利未記
  chapter: 20
  summary: 第21節規定娶弟兄之妻為污穢、羞辱弟兄，刑罰無子女。
  relation: 本章亂倫條例收尾，屬「無子女而死」刑罰類型，與第20節平行。
