name: 天如鐵地如銅（乾旱咒詛的意象）
type: 主題
secondary_types: []
aliases:
- 天如鐵地如銅
status: formal
definition: 利未記26章19節記載了神對悖逆百姓的旱災咒詛：「我必斷絕你們因勢力而有的驕傲，又要使覆你們的天如鐵，載你們的地如銅。」「天如鐵」指天不降雨，鐵門關閉，不復有雨降於其上；「地如銅」指地無收成，變得堅硬如銅無法耕種。這與4節「我就給你們降下時雨」的祝福諷刺地相對。神賜給他們的不再是時雨及土產，乃是旱災及失收。這咒詛的目的是為了斷絕百姓因勢力而有的驕傲，使他們在白白勞力卻無功效中認識神的掌權。
accumulations:
- book: 利未記
  chapter: 26
  summary: 以天如鐵、地如銅的生動意象，描述了神因百姓不順從而降下不降雨與土地堅硬無收成的乾旱咒詛。
  relation: 作為五層漸進懲罰中的第二層災禍，對應並反轉了順命應許中的時雨與土產。
