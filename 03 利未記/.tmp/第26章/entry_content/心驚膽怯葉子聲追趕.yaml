name: 心驚膽怯葉子聲追趕
type: 主題
secondary_types: []
aliases:
- 葉子聲追趕
- 驚恐逃竄
status: formal
definition: 利未記 26:36 描述餘民在仇敵之地因神的審判而「心驚膽怯」，連「葉子被風吹的響聲」都會追趕他們，使他們「逃避，像人逃避刀劍，無人追趕，卻要跌倒」。這描繪極度的心理恐懼與失去安全感，是悖逆約所帶來的咒詛之一，體現「無人追趕，你們卻要逃跑」（v.17）的應驗。
development: 此意象在箴言 28:1「惡人雖無人追趕也逃跑」與申命記 28:65-67「心裡發顫、眼目失明、精神消耗」得到呼應，顯示離棄神帶來的內在崩潰。
accumulations:
- book: 利未記
  chapter: 26
  summary: 記載餘民在擄掠中因神審判而極度驚恐，連葉子聲音都使他們逃竄跌倒。
  relation: 本章悖逆遭咒詛五階段的高潮描寫，展示約咒詛的心理層面。
