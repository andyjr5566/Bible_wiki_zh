- 神毀壞偶像崇拜場所
status: formal
definition: 利未記 26:30 「我又要毀壞你們的邱壇，砍下你們的日像，把你們的屍首扔在你們偶像的身上；我的心也必厭惡你們。」此為第五階段咒詛中神親自執行的審判行動：邱壇（bāmôt，高處祭壇）被毀壞，日像（ḥammānîm，太陽柱/方尖碑）被砍下，拜偶像者的屍首被扔在偶像上，神的心厭惡他們。這直接回應第
  1 節禁止「虛無神像、雕刻偶像、柱像、鏨成石像」，並預示約書亞、士師、列王時期偶像崇拜的審判；約西亞改革（王下23）曾部分應驗此預言，但終極應驗在被擄。
development: 「邱壇」在利未記 26:30 唯一出現於摩西五經中（其餘多在歷史書/先知書）；「日像」僅此處與以賽亞 17:8、27:9、以西結 6:4,6
  出現。神親自毀壞邱壇顯示審判的主權不在人手。
accumulations:
- book: 利未記
  chapter: 26
  summary: 第 30 節記載神親自毀壞邱壇、砍下日像、屍首扔偶像上、心厭惡百姓，為第五階段咒詛的具體執行細節。
  relation: 本條目直接對應本章第 30 節經文，為「毀壞邱壇砍下日像」在利未記 26 的唯一出處。
