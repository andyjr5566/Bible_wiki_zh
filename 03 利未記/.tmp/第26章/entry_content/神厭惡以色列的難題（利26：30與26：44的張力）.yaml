name: 神厭惡以色列的難題（利26：30與26：44的張力）
type: 解經爭議
secondary_types: []
aliases:
- 神厭惡以色列的張力
- 利26:30與26:44的張力
status: formal
definition: 利未記26章中存在一個關於神是否厭惡以色列民的解經張力。在第30節，神因百姓拜偶像而宣告審判說：「我的心也必厭惡你們」，甚至將他們的屍首扔在偶像身上。然而，在第44節，神卻應許說：「雖是這樣，他們在仇敵之地，我卻不厭棄他們，也不厭惡他們，將他們盡行滅絕，也不背棄我與他們所立的約」。GT《聖經難解經文詮釋手冊》解答此張力：這兩句經文的不同乃是神在不同的時候對以色列人在不同情況時所說的話——當以色列人對神忠誠時神就不厭棄他們，然而當他們敬拜其他神時，神就說要把他們的屍首扔在偶像身上。神恨惡的是百姓拜偶像的行為，不是百姓這個身分本身，即使在管教與審判中，神因著自己是守約的耶和華，並未完全棄絕他們。
accumulations:
- book: 利未記
  chapter: 26
  summary: 本章第30節宣告神因百姓拜偶像而「厭惡」他們，但第44節卻應許在管教中「不厭棄、不厭惡」他們，形成了同一章中關於神厭惡與不厭惡的解經張力。
  relation: 本解經爭議點突顯了利未記26章中神的公義審判（針對罪的厭惡）與神的立約恩典（不滅絕的信實）之間的張力，並指向40-45節悔改與紀念列祖之約的恢復機制。
