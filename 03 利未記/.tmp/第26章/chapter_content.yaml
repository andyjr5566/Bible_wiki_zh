organization: "### 序言：獨一真神與敬拜根基（v1-2）\n本章以兩項根本誡命開篇：嚴禁製造 [[虛無的神像]]、立柱像或鏨成石像跪拜，並命令 [[守安息日敬聖所]]。這兩節經文確立了以色列敬拜的**排他性**（單單事奉耶和華）與**節奏性**（安息日、聖所），是後續順服/悖逆雙軌制的神學基石。神自稱「我是耶和華─你們的神」（v1,\
  \ 2, 13），以救贖主身分（領你們出 [[埃及地]]）要求獨佔的忠誠。\n\n### 順服蒙福條例：約的正面應許（v3-13）\n若以色列「遵行我的律例，謹守我的誡命」（v3），神應許五重豐盛：\n\
  1. **物質供應**：時雨、土產、果實、糧食連續不斷（v4-5, 10）。\n2. **安全平安**：無惡獸、無刀劍、追趕仇敵以寡擊眾（v6-8）。\n3.\
  \ **生命興旺**：生養眾多、堅定所立的 [[盟約]]（v9）。\n4. **神的同在**：帳幕立在中間、心不厭惡、行走其中、作他們的神（v11-12）。\n\
  5. **救贖身分**：折斷軛、叫你們挺身而走（v13）。\n這段經文將 [[福分]] 具體化為農業、軍事、人口、神臨在四個維度，彰顯約的全人關懷。\n\n###\
  \ 悖逆遭咒詛五階段：漸進式審判（v14-39）\n經文呈現「若……我就……」的嚴密因果鏈，每階段以「七倍懲罰」（v18, 21, 24, 28）為升級標記，形成**五階段遞進**：\n\
  \n```mermaid\nflowchart TD\n  A[\"第一階段 v14-17<br>驚惶、癆病、熱病、撒種徒勞、敗於仇敵\"] --> B[\"\
  第二階段 v18-20<br>斷絕驕傲、天如鐵地如銅、勞力無果\"]\n  B --> C[\"第三階段 v21-22<br>走獸搶吃兒女、吞滅牲畜、人口減少、道路荒涼\"\
  ]\n  C --> D[\"第四階段 v23-26<br>刀劍報復背約、瘟疫、糧斷十婦共爐、吃不飽\"]\n  D --> E[\"第五階段 v27-39<br>烈怒、易子而食、毀壞邱壇砍下日像、城邑荒涼聖所荒場、散列邦、地享安息、心驚膽怯葉子聲追趕\"\
  ]\n```\n\n| 階段 | 經文 | 核心審判 | 關鍵意象 |\n|------|------|----------|----------|\n| 1\
  \ | v14-17 | 疾病、農業失收、軍事敗北 | 白白撒種、無人追趕卻逃跑 |\n| 2 | v18-20 | 自然秩序逆轉 | **[[天如鐵地如銅]]**\
  \ |\n| 3 | v21-22 | 野獸侵害、人口銳減 | 道路荒涼 |\n| 4 | v23-26 | 刀劍、瘟疫、糧食斷絕 | 十婦共爐、按分量秤餅 |\n\
  | 5 | v27-39 | 終極毀滅、被擄、地得安息 | **[[易子而食]]**、**[[毀壞邱壇砍下日像]]**、**[[城邑變為荒涼聖所成為荒場]]**、**[[地享受安息]]**、**[[心驚膽怯葉子聲追趕]]**\
  \ |\n\n> [!important] 七倍懲罰的神學意義\n> 「七倍」非單指數量，而表**完全、徹底**的審判，對應創世記 4:15, 24 的「七倍報應」傳統，並預表但以理書\
  \ 9:24-27 「七十個七」的終極審判與復興時間表。\n\n### 悔改蒙紀念條例：約的不可廢棄性（v40-45）\n審判並非終點。當以色列 **[[承認罪孽謙卑心]]**（v40-41），神應許\
  \ **[[記念列祖之約]]**（v42）、**[[不厭棄不滅絕不背約]]**（v44）。這段經文揭示約的**單邊恩典根基**：雖然以色列違背 [[律例]]、[[典章]]、[[誡命]]，神仍因與亞伯拉罕、以撒、雅各所立的\
  \ [[世世代代]] 之約而保留餘民。地在荒廢時享受安息（v34-35, 43），既是對安息年規例的補償，也預表被擄歸回後的復興（參代下 36:21）。\n\n\
  ### 結語：西乃山約的正式簽署（v46）\n「這些律例、典章、和法度是耶和華與以色列人在西乃山藉著摩西立的。」本節為整卷利未記（特別是 25-26 章的聖年與約之條款）畫上法理句點，確立\
  \ **[[摩西]]** 為中保、[[以色列]] 為約民、西乃山為立約地點的歷史錨點。\n\n> [!note] 本章與申命記 28 章的對照\n> 利未記 26\
  \ 章著重**祭司視角**（聖所、安息、潔淨、神的同在），申命記 28 章著重**先知/君王視角**（國度興衰、具體國際政治後果）。兩者共同構成「約之書」的雙重見證。\n\
  \n> [!quote] 關鍵應許經文\n> 「我卻要為他們的緣故記念我與他們先祖所立的約……我是耶和華。」（v45） —— 這節經文是整章神學高峰：**審判真實，但恩典更真實；約的破裂在人，約的堅立在神。**"
