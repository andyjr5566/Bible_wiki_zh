book: 利未記
chapter: 26
candidates:
  - name: 柱像（matsebah）
    type: 原文
    evidence: v1「不可立雕刻的偶像或是柱像，也不可在你們的地上安什麼鏨成的石像，向他跪拜」。GT《舊約聖經背景註釋》：立起來的聖石和神像，都同樣是遭禁的異教祭儀聖物，這些柱像可能是代表神明的單塊巨石，也可能是圍繞祭壇或神廟的一套柱子；GT串珠：被迦南人當作神明的石柱——本章重申禁止柱像敬拜的條例，累積於既有條目
    surfaces:
      - {phrase: 不可立雕刻的偶像或是柱像, verses: [1]}

  - name: 安息日
    type: 神學
    evidence: v2「你們要守我的安息日，敬我的聖所。我是耶和華」。GT《聖經精讀本》：以色列百姓要遵守安息日制度，遵守唯一聖所的制度，堅持以神為中心的信仰生活；KC：After the negative prohibition to make idols, follows the positive commandment to keep "My sabbaths"（已譯：在禁止拜偶像的消極誡命之後，緊接著是守「我的安息日」的積極誡命）——本章將守安息日與敬聖所並列為蒙福條件的總冒，累積於既有條目
    surfaces:
      - {phrase: 你們要守我的安息日，敬我的聖所, verses: [2]}

  - name: 祝福與咒詛
    type: 主題
    evidence: 全章結構v3-45；GT串珠：古時近東的條約通常都以祝福守約者及咒詛破壞條約者作結束的；GT《聖經精讀本》：本書的結論部分，由順服的祝福（3-13節）和不順服的咒詛（14-39節）；或許因墮落遭到刑罰，只要悔改就隨時給予恢復的應許（40-46節）組成，與出23:20-33西乃山之約結論、申28章摩西摩押平原講道結論一脈相承；GT《舊約聖經背景註釋》：典型的古代近東法典和條約，都在結尾附有神明祝咒的段落，咒詛照例遠比祝福為多，並且其嚴重性逐步遞增——利未記全書以此章的祝福咒詛作結，累積於既有條目
    surfaces:
      - {phrase: 你們若遵行我的律例，謹守我的誡命, verses: [3]}
      - {phrase: 你們若不聽從我，不遵行我的誡命, verses: [14]}

  - name: 亞伯拉罕之約
    type: 神學
    evidence: v42「我就要紀念我與雅各所立的約，與以撒所立的約，與亞伯拉罕所立的約，並要紀念這地」；v45「我卻要為他們的緣故紀念我與他們先祖所立的約」。GT丁良才：「與亞伯拉罕所立的約」請參閱創十二1-3、十五18-21、十七1-8、二十二15-18；在此處神是自下而上說的（就是從雅各到亞伯拉罕），在聖書別處都是亞伯拉罕在先、雅各在後；GT啟導本：神仍眷顧祂的百姓，答應「要紀念這地」；GT《聖經精讀本》：結束可怕的咒詛，神應許伴隨悔改的恢復，提出神真正的意圖——雖以色列百姓因犯罪受到神的咒詛，他們無論何時何地以痛悔的心回到主面前，慈愛憐憫的神必以迎接浪子的父親之心迎接以色列——本章以色列人被擄悔改後，神施恩的根基仍在於對亞伯拉罕（及以撒、雅各）的無條件應許，累積於既有條目
    surfaces:
      - {phrase: 我就要紀念我與雅各所立的約，與以撒所立的約，與亞伯拉罕所立的約, verses: [42]}
      - {phrase: 我卻要為他們的緣故紀念我與他們先祖所立的約, verses: [45]}

  - name: 安息年律例
    type: 事件
    evidence: v34-35,43「你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息...地多時為荒場，就要多時歇息；地這樣歇息，是你們住在其上的安息年所不能得的」。GT丁良才：以色列人違背了神的命令，不願意守安息年，使他不得歇息，故此神就刑罰他們（代下三十六20-21），到以色列人從巴比倫回來以後就有他們守安息年的證據；GT啟導本：以色列民若仍不聽從，所住之地要成為荒場，此事在主前587年應驗，猶太亡國，全民被擄往巴比倫——本章是安息年條例未守而遭清算的歷史應驗預言，累積於既有條目
    surfaces:
      - {phrase: 你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息, verses: [34]}
      - {phrase: 地這樣歇息，是你們住在其上的安息年所不能得的, verses: [35]}

  - name: 摩西
    type: 人物
    evidence: v46「這些律例、典章和法度，是耶和華與以色列人在西乃山藉著摩西立的」——摩西是全書律例典章的傳達中介
    surfaces:
      - {phrase: 是耶和華與以色列人在西乃山藉著摩西立的, verses: [46]}

  - name: 遵行誡命必蒙福的七重應許（利26:3-13）
    type: 主題
    evidence: v3-13 時雨土產（4-5）、國泰民安（6-8）、生養眾多堅立約（9）、陳糧新糧（10）、神立帳幕不厭惡（11）、神同行作神子民（12）、折斷軛挺身而走（13）。GT串珠：本節至13節宣告一連串福分，包括個人的平安，全民的繁榮和神的同在；GT串珠另段列出三方面的福氣：時雨與豐收（4-5）、國泰民安（6-10）、神的同在（11-13）——本章開篇的祝福清單以遞進結構從物質豐收推向神親自同住同行的屬靈高峰
    surfaces:
      - {phrase: 我就給你們降下時雨，叫地生出土產，田野的樹木結果子, verses: [4]}
      - {phrase: 我要在你們中間立我的帳幕；我的心也不厭惡你們, verses: [11]}

  - name: 五個人追趕一百人（蒙福的軍事應許）
    type: 神學
    evidence: v7-8「你們要追趕仇敵，他們必倒在你們刀下。你們五個人要追趕一百人，一百人要追趕一萬人；仇敵必倒在你們刀下」。GT丁良才：聖書上屢次有這一類的話（申三十二30，書二十三10，賽三十17），顯明以色列人若同心合意地順服神，神就必賜福與他們，使他們得勝；GT《聖經精讀本》：以神為王、順服神話語的人能夠擊退任何仇敵，因為戰爭屬於耶和華（撒上17:47），象徵新約時代的信徒按神的話語與撒但爭戰，若順服神的話，就有能力得勝（林後10:1-6；弗6:10-17）——這是聖經中同一應許句式反覆出現的著名經文（申32:30；書23:10；賽30:17）
    surfaces:
      - {phrase: 你們五個人要追趕一百人，一百人要追趕一萬人, verses: [8]}

  - name: 神的同在
    type: 神學
    evidence: v11-12「我要在你們中間立我的帳幕；我的心也不厭惡你們。我要在你們中間行走；我要作你們的神，你們要作我的子民」。CT〔文意註解〕：立帳幕指神要居住在他們中間，行走含有看顧保護之意，上節是同住，本節是同行；GT《聖經精讀本》：「帳幕」象徵神的臨在，對於屬神的百姓，最大的祝福是以神為自己的產業，與信實的神建立約的關係；KC：Besides this material blessing there is also spiritual blessing. It is the privilege that He dwells among them（已譯：除了物質祝福之外還有屬靈祝福，就是神住在他們中間的特權）——保羅在林後六16直接引用本節，是舊約中神與人同住同行應許最直接的表述之一，累積於既有條目
    surfaces:
      - {phrase: 我要在你們中間立我的帳幕；我的心也不厭惡你們, verses: [11]}
      - {phrase: 我要在你們中間行走；我要作你們的神，你們要作我的子民, verses: [12]}

  - name: 不聽從神的五層漸進懲罰（利26:14-39）
    type: 主題
    evidence: v14-39 五次警誡與五層加重懲罰的結構——第一層驚惶癆病熱病（16-17）、第二層加七倍旱災（18-20）、第三層加七倍野獸為害（21-22）、第四層加七倍刀劍瘟疫饑荒（23-26）、第五層加七倍食子女之肉與全地荒涼被擄（27-39）。CT〔內容綱要〕：不遵行誡命必招神厭棄（14-22節）、若不悔改必遭可怕災禍（23-39節）；GT丁良才：神對於他們有五種的警誡如下——各種疾病、地無出產、野獸為害、真神降災、全地荒涼；並列出五次受警誡、五次受刑罰、五次使神歎息的對應經文——這是利未記全書結構最嚴謹的懲罰遞升系統，適合以流程圖或表格呈現五層結構
    surfaces:
      - {phrase: 你們因這些事若還不聽從我，我就要為你們的罪加七倍懲罰你們, verses: [18]}
      - {phrase: 你們因這一切的事若不聽從我，卻行事與我反對, verses: [27]}

  - name: 加七倍懲罰
    type: 原文
    evidence: v18,21,24,28 四次重複「加七倍懲罰」「加七倍降災」「擊打你們七次」「懲罰你們七次」。GT丁良才：「七字」在此處不是指著一定的數目，乃是表示滿足的意思（伯五19，路十七4，詩一百十九161，箴二十四16），換一句話說，就是重重懲罰的意思；「七次」兩個字和「七倍」兩個字在原文上是一樣的，不是指著受刑罰的回數，乃是形容要受怎樣嚴重的刑罰；GT《聖經精讀本》：七象徵「完全」、「充滿」——七在此處代表懲罰的完全性而非字面七次
    surfaces:
      - {phrase: 我就要為你們的罪加七倍懲罰你們, verses: [18]}
      - {phrase: 因你們的罪擊打你們七次, verses: [24]}

  - name: 天如鐵地如銅（乾旱咒詛的意象）
    type: 主題
    evidence: v19-20「又要使覆你們的天如鐵，載你們的地如銅。你們要白白地勞力；因為你們的地不出土產，其上的樹木也不結果子」。GT串珠：「天如鐵……地如銅」與4節的「天下時雨」及「地出土產」諷刺地相對，神賜給他們的不再是時雨及土產，乃是旱災及失收；GT《舊約聖經背景註釋》：這個比喻性的咒詛，在申命記二十八章的咒詛部分，和以撒哈頓的條約（主前七世紀）中，都有出現，它暗示地本身將會與百姓為敵，變得堅硬如銅，原因是天的鐵門關閉，不復有雨降於其上——與v4「時雨」祝福形成本章刻意設計的正反對照
    surfaces:
      - {phrase: 又要使覆你們的天如鐵，載你們的地如銅, verses: [19]}

  - name: 吃兒女的肉（極端饑荒的咒詛）
    type: 主題
    evidence: v29「並且你們要吃兒子的肉，也要吃女兒的肉」。GT丁良才：（申二十八53-57），比方王下六28-29、耶十九8-9、哀二20、四10，羅馬人毀滅耶路撒冷城的時候就有這樣殘忍的事；GT《舊約聖經背景註釋》：只有在極端絕望和瀕臨饑饉的情況下，才會導致古代近東的人採取食人的下策，本段和申命記二十八53-57的咒詛部分，以及主前七世紀的亞述條約包括這一點，以求顯示神對悖逆之人的懲罰，是何等的可怕——這預言在主後70年羅馬圍城耶路撒冷時歷史性應驗
    surfaces:
      - {phrase: 你們要吃兒子的肉，也要吃女兒的肉, verses: [29]}

  - name: 邱壇與日像被毀（拜偶像的終極審判）
    type: 主題
    evidence: v30「我又要毀壞你們的邱壇，砍下你們的日像，把你們的屍首扔在你們偶像的身上；我的心也必厭惡你們」。GT丁良才：以色列人有時雖是藉著邱壇敬拜耶和華，但因這些邱壇往往是為拜偶像用的，故此神吩咐以色列人只可在祂所揀選的地方獻祭；這些邱壇既是被毀壞了，就顯明以色列人所敬拜的偶像是沒有能力的；GT李道生：因日光明朗，普照天下，竟有以日像為拜者，有巴比倫、亞述等國，至猶大王約西亞與諸先知時，曾革除此弊，日像被砍倒而毀滅之（耶四三13，王下廿三5、11，賽十七8，結六4、6）——與v1「不可立柱像」首尾呼應，全章以禁偶像始、以毀偶像審判終
    surfaces:
      - {phrase: 我又要毀壞你們的邱壇，砍下你們的日像, verses: [30]}

  - name: 神厭惡以色列的難題（利26:30與26:44的張力）
    type: 解經爭議
    evidence: v30「我的心也必厭惡你們」對照v44「我卻不厭棄他們，也不厭惡他們」。GT《聖經難解經文詮釋手冊》命題9〈神厭惡（abhor）以色列民嗎？〉：〔難題〕神曾一再提醒以色列人他們是祂「眼中的瞳人」（亞二8），是「神所祝福的民族」（創十二1-3），然而利未記廿六30卻說神的心必厭惡他們；【解答】利未記廿六44節神卻說「我卻不厭棄他們，也不厭惡他們」，這兩句經文的不同乃是神在不同的時候對以色列人在不同情況時所說的話：當以色列人對神忠誠時神就不厭棄他們，然而當他們敬拜其他神時，神就說要把他們的屍首扔在偶像身上——神恨惡的是百姓拜偶像的行為，不是百姓這個身分本身
    surfaces:
      - {phrase: 我的心也必厭惡你們, verses: [30]}
      - {phrase: 我卻不厭棄他們，也不厭惡他們, verses: [44]}

  - name: 未受割禮的心若謙卑（認罪悔改的條件）
    type: 神學
    evidence: v40-41「他們要承認自己的罪和他們祖宗的罪，就是干犯我的那罪，並且承認自己行事與我反對...那時，他們未受割禮的心若謙卑了，他們也服了罪孽的刑罰」。GT丁良才：未受割禮的心就是乖謬剛愎、不肯承認自己罪孽的心（參徒七51）；KC：Their uncircumcised heart...that is to say their actions in their own will and rebellion, comes to self-judgment. Circumcision speaks of judgment on the flesh（已譯：未受割禮的心，就是憑己意悖逆而行，如今來到自我審判之地，割禮預表對肉體的對付）——這是舊約中「心的割禮」概念（申十16，耶四4）在利未記中的出現
    surfaces:
      - {phrase: 他們未受割禮的心若謙卑了，他們也服了罪孽的刑罰, verses: [41]}
