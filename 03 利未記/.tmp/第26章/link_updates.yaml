book: "03 利未記"
chapter: 26
updates:
- title: "安息日"
  path: "link_folder/神學/安息日.md"
  summary: "利26:2 你們要守我的安息日。安息日為約的記號與防偶像屏障。"
  relation: "本章以守安息日、敬聖所作為順服蒙福的前提條件，確立安息日為約的記號與防偶像屏障，呼應出16、20、23、31、35、利19、23 章安息日條例。"
- title: "聖所"
  path: "link_folder/地點/聖所.md"
  summary: "利26:2,11,31 敬我的聖所；我要在你們中間立我的帳幕；使你們的眾聖所成為荒場。聖所為神同在之處，順服蒙福、悖逆荒涼的關鍵。"
  relation: "本章將聖所作為神同在的具體場所：順服時神立帳幕在中間行走（v11），悖逆時聖所成為荒場（v31），體現神同在與否取決於約的忠信。"
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "利26:46 這就是耶和華在西乃山藉著摩西立的律例、典章、和法度。摩西作為條例傳遞者。"
  relation: "本章摩西作為西乃山立約的中保，傳遞利未記全書（利17-26）的總結性條例，完成立法者角色。"
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "利26:3,14,38,44 你們若遵行我的律例；你們若不聽從我；你們在仇敵之地居住；他們在仇敵之地。條例針對全會眾。"
  relation: "本章將順服蒙福與悖逆遭咒詛的條例頒布給全體以色列人，確立會眾共同承擔約的福分與咒詛。"
- title: "埃及地"
  path: "link_folder/地點/埃及地.md"
  summary: "利26:13,45 曾將你們從埃及地領出來；他們的先祖是我在列邦人眼前、從埃及地領出來的。出埃及救贖為約的基礎。"
  relation: "本章以出埃及救贖（v13,45）作為約的神學根基：神折斷埃及的軛（v13），即使在仇敵之地仍紀念列祖之約（v45）。"
- title: "迦南地"
  path: "link_folder/地點/迦南地.md"
  summary: "利26:13 使你們不作埃及人的奴僕；我也折斷你們所負的軛，叫你們挺身而走。應許之地自由生活的基礎。"
  relation: "本章將迦南地作為自由生活的舞台：神折斷軛、叫人挺身而走（v13），悖逆則被趕出地、地享受安息（v33-35）。"
- title: "律例"
  path: "link_folder/神學/律例.md"
  summary: "利26:3,15,43,46 你們若遵行我的律例；厭棄我的律例；因為他們厭棄了我的律例；這就是耶和華在西乃山藉著摩西立的律例、典章、和法度。律例為順服/悖逆的標準。"
  relation: "本章以律例為順服與悖逆的分水嶺：遵行律例蒙福（v3），厭棄律例遭咒詛（v15,43），律例為西乃山立約的核心內容（v46）。"
- title: "典章"
  path: "link_folder/神學/典章.md"
  summary: "利26:3,15,43,46 謹守我的誡命；厭惡我的典章；心中厭惡了我的律例；這就是耶和華在西乃山藉著摩西立的律例、典章、和法度。典章為審判判例。"
  relation: "本章將典章與律例並列為順服對象：謹守典章蒙福（v3），厭惡典章遭咒詛（v15,43），典章為西乃山立約的司法框架（v46）。"
- title: "誡命"
  path: "link_folder/神學/誡命.md"
  summary: "利26:3,14,15 不遵行我的誡命；不遵行我一切的誡命。誡命為具體命令。"
  relation: "本章以誡命為具體順服標準：謹守誡命蒙福（v3），不遵行一切誡命背約（v14,15），誡命為約條款的細目。"
- title: "盟約"
  path: "link_folder/主題/盟約.md"
  summary: "利26:9,15,42,44,45 也要與你們堅定所立的約；背棄我的約；記念我與雅各所立的約；不背棄我與他們所立的約；為他們的緣故記念我與他們先祖所立的約。約為神人關係核心。"
  relation: "本章以盟約為核心：神堅定約（v9），人背棄約遭咒詛（v15），神紀念列祖三重約（v42），不背棄約（v44），為先祖之約緣故施恩（v45）。"
- title: "世世代代"
  path: "link_folder/神學/世世代代.md"
  summary: "利26:45 我卻要為他們的緣故記念我與他們先祖所立的約。約的代際延續性。"
  relation: "本章以先祖之約（雅各、以撒、亞伯拉罕）為代際延續的錨點，神因先祖之約紀念後裔（v45），體現約的跨代際效力。"
- title: "敬畏神"
  path: "link_folder/神學/敬畏神.md"
  summary: "利26:2,19,36 你們要守我的安息日，敬我的聖所；我必斷絕你們因勢力而有的驕傲；我要使他們在仇敵之地心驚膽怯。敬畏神為順服動力，驕傲與恐懼為悖逆果實。"
  relation: "本章對比敬畏神（v2）與悖逆果實：驕傲被斷絕（v19）、恐懼取代平安（v36），確立敬畏神為順服動力、悖逆為自取恐懼。"
- title: "至聖"
  path: "link_folder/神學/至聖.md"
  summary: "利26:11,12 我要在你們中間立我的帳幕；我要在你們中間行走；我要作你們的神，你們要作我的子民。神同在為至聖體驗。"
  relation: "本章將神同在（立帳幕、行走、作神、作子民）作為順服蒙福的最高層級（v11-12），超越物質福分，為至聖體驗的核心。"
- title: "從民中剪除（karet）"
  path: "link_folder/原文/從民中剪除（karet）.md"
  summary: "利26:30,33,38,39 我又要毀壞你們的邱壇；我要把你們散在列邦中；你們在列邦中滅亡；你們剩下的人必因自己的罪孽和祖宗的罪孽在仇敵之地消滅。剪除為極刑。"
  relation: "本章將剪除具體化為：毀壞邱壇（v30）、散在列邦（v33）、在列邦滅亡（v38）、在仇敵之地消滅（v39），為悖逆終極審判。"
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "利26:38,44 你們在仇敵之地居住；他們在仇敵之地。寄居者同受咒詛與恩典。"
  relation: "本章將寄居者納入被擄咒詛（v38）與神不厭棄的恩典（v44）雙重軌道，體現寄居者在約共同體中的同命運地位。"
- title: "亞倫和他兒子（祭司）"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利26:31 使你們的眾聖所成為荒場。祭司體系在咒詛中失去事奉場所。"
  relation: "本章聖所荒涼（v31）直接導致祭司職分廢廢，體現咒詛對敬拜體系的徹底摧毀，呼應利21-22 祭司聖潔條例。"
- title: "以色列全會眾"
  path: "link_folder/人物/以色列全會眾.md"
  summary: "利26:3,14,33,38,44 你們若遵行；你們若不聽從；我要把你們散在列邦中；你們在仇敵之地居住；他們在仇敵之地。全會眾共同承擔約的福分與咒詛。"
  relation: "本章以全會眾為約的主體：順服共享福分（v3），悖逆共同被擄（v33），在仇敵之地同受咒詛（v38），神仍不厭棄會眾（v44）。"
- title: "閒雜人"
  path: "link_folder/人物/閒雜人.md"
  summary: "利26:33 我要把你們散在列邦中。被擄散在列邦。"
  relation: "本章被擄散在列邦（v33）使以色列人淪為列邦中的閒雜人，失去立約共同體身分，體現約的邊界崩塌。"
- title: "營外"
  path: "link_folder/地點/營外.md"
  summary: "利26:33 我要把你們散在列邦中。被擄即出營外。"
  relation: "本章被擄散在列邦（v33）即為終極的「出營外」，失去神同在的營區保護，呼應利13-14 不潔淨者出營外、利24 褻瀆者出營外。"
- title: "以傷還傷（lex talionis）"
  path: "link_folder/神學/以傷還傷（lex talionis）.md"
  summary: "利26:17,24,28 我要向你們變臉，你們就要敗在仇敵面前；我就要行事與你們反對，因你們的罪擊打你們七次；我就要發烈怒，行事與你們反對，又因你們的罪懲罰你們七次。神的報應與罪相稱。"
  relation: "本章神的審判（變臉、擊打七次、發烈怒懲罰七次）體現同態復仇原則：神以悖逆之度回報悖逆，刑罰與罪相稱。"
- title: "打死人的必被治死"
  path: "link_folder/主題/打死人的必被治死.md"
  summary: "利26:25 我又要使刀劍臨到你們，報復你們背約的仇。刀劍報復背約。"
  relation: "本章刀劍報復背約（v25）為神執行的死刑審判，呼應利24:17,21 謀殺死刑條例，此處擴大為約共同體層面的神聖戰爭。"
- title: "打死牲畜的必賠上牲畜"
  path: "link_folder/主題/打死牲畜的必賠上牲畜.md"
  summary: "利26:22 我也要打發野地的走獸到你們中間，搶吃你們的兒女，吞滅你們的牲畜。野獸吞滅牲畜。"
  relation: "本章野獸吞滅牲畜（v22）為神審判的一環，呼應利24:18,21 牲畜賠償條例，此處為神直接以野獸執行財產損失審判。"
- title: "從民中剪除（karet）"
  path: "link_folder/原文/從民中剪除（karet）.md"
  summary: "利26:30,33,38,39 我又要毀壞你們的邱壇；我要把你們散在列邦中；你們在列邦中滅亡；你們剩下的人必因自己的罪孽和祖宗的罪孽在仇敵之地消滅。剪除為極刑。"
  relation: "本章將剪除具體化為四階段：毀壞邱壇（v30）、散在列邦（v33）、列邦滅亡（v38）、仇敵之地消滅（v39），為悖逆終極審判。"
- title: "世世代代"
  path: "link_folder/神學/世世代代.md"
  summary: "利26:45 我卻要為他們的緣故記念我與他們先祖所立的約。約的代際延續性。"
  relation: "本章以先祖之約為代際延續錨點，神因先祖之約紀念後裔（v45），體現約的跨代際效力，呼應利25 禧年條例的代際產業歸回。"
- title: "我是耶和華你們的神"
  path: "link_folder/神學/我是耶和華你們的神.md"
  summary: "利26:1,2,13,44,45 我是耶和華你們的神。條例權威基礎。"
  relation: "本章五次宣告「我是耶和華你們的神」（v1,2,13,44,45），作為禁止偶像（v1）、守安息日敬聖所（v2）、出埃及救贖（v13）、不厭棄不背約（v44）、紀念先祖之約（v45）的終極權威基礎。"
- title: "禧年（yobel）"
  path: "link_folder/神學/禧年（yobel）.md"
  summary: "利26:34-35 你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息。地享受安息補償被廢棄的禧年/安息年。"
  relation: "本章被擄期間地享受安息（v34-35）為神強迫實現安息年/禧年條例（代下36:20-21），補償以色列人居住其上時所廢棄的安息年。"
- title: "產業（nachalah）"
  path: "link_folder/神學/產業（nachalah）.md"
  summary: "利26:13 我也折斷你們所負的軛，叫你們挺身而走。自由為產業核心。"
  relation: "本章折斷軛、叫人挺身而走（v13）為產業自由的核心體驗，悖逆則失去產業自由、被趕出地（v33），產業自由與約忠信直接掛鉤。"
- title: "兄弟"
  path: "link_folder/人物/兄弟.md"
  summary: "利26:37 無人追趕，他們要彼此撞跌，像在刀劍之前。患難中兄弟相撞。"
  relation: "本章咒詛極端處（v37）描述被擄者內部恐懼導致兄弟相撞，體現約共同體在極壓下的關係崩解。"
- title: "貧窮"
  path: "link_folder/主題/貧窮.md"
  summary: "利26:26 我要折斷你們的杖，就是斷絕你們的糧。十個女人在一個爐子給你們烤餅，按分量秤給你們；你們要吃，也吃不飽。極度飢荒。"
  relation: "本章第五階段咒詛（v26）描述極度飢荒：折斷杖斷絕糧、十婦共爐按量配給、吃不飽，為神審判徹底性的具體呈現。"
- title: "雇工人"
  path: "link_folder/人物/雇工人.md"
  summary: "利26:16 你們也要白白地撒種，因為仇敵要吃你們所種的。勞力無果。"
  relation: "本章第一階段咒詛（v16）白白撒種、仇敵吃所種，呼應利25 雇工人待遇為公平基準，此處勞力完全落空為神審判的一環。"
- title: "外人"
  path: "link_folder/人物/外人.md"
  summary: "利26:33,38,44 我要把你們散在列邦中；你們在仇敵之地居住；他們在仇敵之地。被擄者在外邦為外人。"
  relation: "本章被擄散在列邦（v33）使以色列人在外邦成為外人（v38,44），失去立約共同體身分，但神仍不厭棄他們（v44），體現外人仍在神看顧中。"
- title: "自贖"
  path: "link_folder/主題/自贖.md"
  summary: "利26:40-41 他們要承認自己的罪...未受割禮的心若謙卑了，他們也服了罪孽的刑罰。悔改即自贖。"
  relation: "本章悔改條件（v40-41）即為屬靈自贖：承認罪、謙卑心、服刑罰，神即紀念列祖之約施恩，呼應利25 贖回條例的屬靈應用。"
- title: "兒女"
  path: "link_folder/人物/兒女.md"
  summary: "利26:22,29 打發野地的走獸到你們中間，搶吃你們的兒女...並且你們要吃兒子的肉，也要吃女兒的肉。兒女為咒詛犧牲。"
  relation: "本章兒女成為咒詛犧牲的雙重呈現：被野獸搶吃（v22）、易子而食（v29），為悖逆後果最慘烈的代際創傷。"
- title: "祖宗的地業"
  path: "link_folder/神學/祖宗的地業.md"
  summary: "利26:42 並要記念這地。地為祖宗之約一部分。"
  relation: "本章神紀念列祖之約時並要記念「這地」（v42），確立應許之地為約的不可分割組成部分，呼應利25 產業歸回條例。"
- title: "律例"
  path: "link_folder/神學/律例.md"
  summary: "利26:3,15,43,46 你們若遵行我的律例；厭棄我的律例；因為他們厭棄了我的律例；這就是耶和華在西乃山藉著摩西立的律例、典章、和法度。律例為順服/悖逆標準。"
  relation: "本章以律例為順服與悖逆的分水嶺：遵行律例蒙福（v3），厭棄律例遭咒詛（v15,43），律例為西乃山立約的核心內容（v46），呼應利24 律例定義。"