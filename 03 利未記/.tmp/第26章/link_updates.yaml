"book": "利未記"
"chapter": !!int "26"
"updates":
- "title": "柱像（matsebah）"
  "path": "link_folder/原文/柱像（matsebah）.md"
  "summary": "v1「不可立雕刻的偶像或是柱像，也不可在你們的地上安什麼鏨成的石像，向他跪拜」。GT《舊約聖經背景註釋》：立起來的聖石和神像，都同樣是遭禁的異教祭儀聖物，這些柱像可能是代表神明的單塊巨石，也可能是圍繞祭壇或神廟的一套柱子。"
  "relation": "本章以禁止柱像敬拜作為全章祝福與咒詛宣告的開篇前提條件之一。"
- "title": "安息日"
  "path": "link_folder/神學/安息日.md"
  "summary": "v2「你們要守我的安息日，敬我的聖所。我是耶和華」。GT《聖經精讀本》：以色列百姓要遵守安息日制度、遵守唯一聖所的制度，堅持以神為中心的信仰生活。"
  "relation": "本章將守安息日與敬聖所並列為蒙福條件的總冒，是第2、4誡命的概要。"
- "title": "祝福與咒詛"
  "path": "link_folder/主題/祝福與咒詛.md"
  "summary": "全章v3-45結構；GT《聖經精讀本》：本書的結論部分，由順服的祝福（3-13節）和不順服的咒詛（14-39節），或許因墮落遭到刑罰只要悔改就隨時給予恢復的應許（40-46節）組成。"
  "relation": "利未記全書以此章的祝福咒詛作結，與出23:20-33、申28章一脈相承，是古代近東條約典型的結尾格式。"
- "title": "亞伯拉罕之約"
  "path": "link_folder/神學/亞伯拉罕之約.md"
  "summary": "v42「我就要記念我與雅各所立的約，與以撒所立的約，與亞伯拉罕所立的約，並要記念這地」；v45「我卻要為他們的緣故記念我與他們先祖所立的約」。"
  "relation": "本章以色列人被擄悔改後，神施恩的根基仍在於對亞伯拉罕（及以撒、雅各）的無條件應許。"
- "title": "安息年律例"
  "path": "link_folder/事件/安息年律例.md"
  "summary": "v34-35,43「你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息...地這樣歇息，是你們住在其上的安息年所不能得的」。GT丁良才：以色列人違背了神的命令，不願意守安息年，使他不得歇息，故此神就刑罰他們（代下三十六20-21）。"
  "relation": "本章是安息年條例未守而遭清算的歷史應驗預言，地被擄期間補足未守的安息年數。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v46「這些律例、典章和法度，是耶和華與以色列人在西乃山藉著摩西立的」，摩西是全書律例典章的傳達中介。"
  "relation": "本章結語確立摩西作為神所賜中保的角色，是利未記全書律法傳達鏈的總結。"
- "title": "神的同在"
  "path": "link_folder/神學/神的同在.md"
  "summary": "v11-12「我要在你們中間立我的帳幕；我的心也不厭惡你們。我要在你們中間行走；我要作你們的神，你們要作我的子民」。保羅在林後六16直接引用本節。"
  "relation": "本章將神的同在列為順服者最高的屬靈祝福，是七重應許的最高峰。"
