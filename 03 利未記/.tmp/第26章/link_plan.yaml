  evidence: 利26:14-39 你們若不聽從我，不遵行我的誡命，厭棄我的律例，厭惡我的典章，不遵行我一切的誡命，背棄我的約。第一階段：我必命定驚惶，叫眼目乾癟、精神消耗的癆病熱病轄制你們；白白地撒種，因為仇敵要吃你們所種的。第二階段：我要向你們變臉，你們就要敗在仇敵面前；恨惡你們的必轄管你們；無人追趕，你們卻要逃跑。第三階段：我就要為你們的罪加七倍懲罰你們；我必斷絕你們因勢力而有的驕傲，又要使覆你們的天如鐵，載你們的地如銅。第四階段：我也要打發野地的走獸到你們中間，搶吃你們的兒女，吞滅你們的牲畜，使你們的人數減少，道路荒涼。第五階段：我就要行事與你們反對，因你們的罪擊打你們七次；我又要使刀劍臨到你們，報復你們背約的仇；聚集你們在各城內，降瘟疫在你們中間，也必將你們交在仇敵的手中。我要折斷你們的杖，就是斷絕你們的糧。那時，必有十個女人在一個爐子給你們烤餅，按分量秤給你們；你們要吃，也吃不飽。你們因這一切的事若不聽從我，卻行事與我反對，我就要發烈怒，行事與你們反對，又因你們的罪懲罰你們七次。並且你們要吃兒子的肉，也要吃女兒的肉。我又要毀壞你們的邱壇，砍下你們的日像，把你們的屍首扔在你們偶像的身上；我的心也必厭惡你們。我要使你們的城邑變為荒涼，使你們的眾聖所成為荒場；我也不聞你們馨香的香氣。我要使地成為荒場，住在其上的仇敵就因此詫異。我要把你們散在列邦中；我也要拔刀追趕你們。你們的地要成為荒場；你們的城邑要變為荒涼。你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息；正在那時候，地要歇息，享受安息。地多時為荒場，就要多時歇息；地這樣歇息，是你們住在其上的安息年所不能得的。至於你們剩下的人，我要使他們在仇敵之地心驚膽怯。葉子被風吹的響聲，要追趕他們；他們要逃避，像人逃避刀劍，無人追趕，卻要跌倒。無人追趕，他們要彼此撞跌，像在刀劍之前。你們在列邦中滅亡；仇敵之地要吞吃你們。你們剩下的人必因自己的罪孽和祖宗的罪孽在仇敵之地消滅。CT：五階段漸進刑罰：疾病飢荒→戰敗逃跑→天鐵地銅→野獸吞噬→刀劍瘟疫食人毀城散邦。KC：七倍懲罰象徵完全徹底的管教。BH：咒詛與申28平行，歷史應驗於亞述巴比倫擄掠。
