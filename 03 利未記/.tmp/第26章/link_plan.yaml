- name: 悔改蒙紀念條例
  suggested_type: 主題
  evidence: 利26:40-46 他們要承認自己的罪和他們祖宗的罪，就是干犯我的那罪，並且承認自己行事與我反對，我所以行事與他們反對，把他們帶到仇敵之地。那時，他們未受割禮的心若謙卑了，他們也服了罪孽的刑罰，我就要記念我與雅各所立的約，與以撒所立的約，與亞伯拉罕所立的約，並要記念這地。他們離開這地，地在荒廢無人的時候就要享受安息。並且他們要服罪孽的刑罰；因為他們厭棄了我的典章，心中厭惡了我的律例。雖是這樣，他們在仇敵之地，我卻不厭棄他們，也不厭惡他們，將他們盡行滅絕，也不背棄我與他們所立的約，因為我是耶和華他們的神。我卻要為他們的緣故記念我與他們先祖所立的約。他們的先祖是我在列邦人眼前、從埃及地領出來的，為要作他們的神。我是耶和華。CT：悔改三步驟：承認罪、謙卑心、服刑罰。神紀念三重約（雅各、以撒、亞伯拉罕）與地。即使在仇敵之地，神也不厭棄、不滅絕、不背約。KC：未受割禮的心謙卑預表新約割禮（羅2:29）。BH：悔改條件為承認罪、謙卑、服刑罰；神信守列祖之約。
