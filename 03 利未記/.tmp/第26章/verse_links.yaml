book: 利未記
chapter: 26
links:
- verse: 1
  phrase: 不可立雕刻的偶像或是柱像
  target: 柱像（matsebah）
- verse: 2
  phrase: 你們要守我的安息日，敬我的聖所
  target: 安息日
- verse: 3
  phrase: 你們若遵行我的律例，謹守我的誡命
  target: 祝福與咒詛
- verse: 8
  phrase: 你們五個人要追趕一百人，一百人要追趕一萬人
  target: 五個人追趕一百人（蒙福的軍事應許）
- verse: 11
  phrase: 我要在你們中間立我的帳幕；我的心也不厭惡你們
  target: 神的同在
- verse: 12
  phrase: 我要在你們中間行走；我要作你們的神，你們要作我的子民
  target: 神的同在
- verse: 14
  phrase: 你們若不聽從我，不遵行我的誡命
  target: 祝福與咒詛
- verse: 18
  phrase: 加七倍懲罰
  target: 加七倍懲罰
- verse: 19
  phrase: 又要使覆你們的天如鐵，載你們的地如銅
  target: 天如鐵地如銅（乾旱咒詛的意象）
- verse: 24
  phrase: 因你們的罪擊打你們七次
  target: 加七倍懲罰
- verse: 29
  phrase: 你們要吃兒子的肉，也要吃女兒的肉
  target: 吃兒女的肉（極端饑荒的咒詛）
- verse: 30
  phrase: 我又要毀壞你們的邱壇，砍下你們的日像
  target: 邱壇與日像被毀（拜偶像的終極審判）
- verse: 34
  phrase: 你們在仇敵之地居住的時候，你們的地荒涼，要享受眾安息
  target: 安息年律例
- verse: 35
  phrase: 地這樣歇息，是你們住在其上的安息年所不能得的
  target: 安息年律例
- verse: 41
  phrase: 他們未受割禮的心若謙卑了，他們也服了罪孽的刑罰
  target: 未受割禮的心若謙卑（認罪悔改的條件）
- verse: 42
  phrase: 我就要記念我與雅各所立的約，與以撒所立的約，與亞伯拉罕所立的約
  target: 亞伯拉罕之約
- verse: 45
  phrase: 我卻要為他們的緣故記念我與他們先祖所立的約
  target: 亞伯拉罕之約
- verse: 46
  phrase: 是耶和華與以色列人在西乃山藉著摩西立的
  target: 摩西
