name: 馨香的火祭
type: 神學
secondary_types: []
aliases:
- 馨香的火祭
- 馨香的祭
status: formal
definition: 在利未記第4章中，馨香的火祭指祭司將贖罪祭牲的脂油燒在燔祭壇上所產生的悅納之氣。此用語在平民獻母山羊為贖罪祭的條例中明確提及，表明脂油焚燒的過程如同平安祭的脂油一樣，在耶和華面前成為蒙悅納的祭，從而為獻祭者贖罪，使其必蒙赦免。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章在平民獻母山羊的贖罪祭條例中提及，祭司將羊所有的脂油在壇上焚燒，在耶和華面前作為馨香的祭，為獻祭者贖罪。
  relation: 馨香的火祭是贖罪祭中脂油焚燒的神學結果，代表神對此祭物的悅納，進而使獻祭者的罪得著赦免。
related_entries:
