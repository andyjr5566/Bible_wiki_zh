name: 公山羊
type: 文化
secondary_types: []
aliases:
- 公山羊
status: formal
definition: 在利未記第4章中，公山羊被指定為官長誤犯了耶和華所吩咐不可行的事時所獻的贖罪祭供物。 祭牲必須沒有殘疾。官長需按手在羊的頭上，在宰燔祭牲的地方宰殺。
  祭司要將血抹在燔祭壇的四角上，倒在壇腳，並將脂油燒在壇上，為官長贖罪，使他蒙赦免。
accumulations:
- book: 利未記
  chapter: 4
  summary: 官長誤犯罪時，需獻上無殘疾的公山羊作為贖罪祭。
  relation: 公山羊作為官長贖罪的指定祭牲，反映了不同身分對應不同祭物的文化階級。
