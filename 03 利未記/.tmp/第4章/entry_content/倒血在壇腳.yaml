name: 倒血在壇腳
type: 事件
secondary_types: []
aliases:
- 倒在壇的腳那裡
status: formal
definition: 在利未記第4章的贖罪祭條例中，祭司在完成彈血或抹壇角的程序後，需將祭牲剩餘的所有血倒在會幕門口燔祭壇的腳那裡。此動作適用於所有身分的贖罪祭，象徵將生命傾倒於神面前，徹底為獻祭者贖罪，使其必蒙赦免。
accumulations:
- book: 利未記
  chapter: 4
  summary: 規定各類贖罪祭的剩餘之血需倒在會幕門口燔祭壇的腳那裡。
  relation: 倒血在壇腳是贖罪程序的最終步驟，完成血的全然傾倒以滿足神對罪的公義要求並帶來赦免。
related_entries:
