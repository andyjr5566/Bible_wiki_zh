name: 搬到營外燒
type: 事件
secondary_types: []
aliases:
- 營外焚燒
status: formal
definition: 在利未記第4章中，當受膏的祭司或以色列全會眾誤犯罪而獻上公牛為贖 罪祭時，祭牲的皮、肉、頭、腿、臟、腑、糞（即全公牛）要搬到營外潔 淨之地、倒灰之處，用火燒在柴上。這代表將承擔罪孽的祭物完全移出神
  子民的營區，象徵罪的徹底除淨與隔離。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章規定受膏祭司與全會眾的贖罪祭公牛，其皮和所有的肉並頭、腿 、臟、腑、糞，要全數搬到營外潔淨之地、倒灰之所焚燒。
  relation: 此事件彰顯了為全會眾贖罪時，祭牲承擔罪污被移出營外的嚴肅性。
related_entries:
- 公牛犢
