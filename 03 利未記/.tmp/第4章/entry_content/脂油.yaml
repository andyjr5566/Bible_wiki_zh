name: 脂油
type: 主題
secondary_types: []
aliases:
- 脂油
- 蓋臟的脂油
status: formal
definition: 在利未記第4章中，脂油被視為祭牲身上最美好、屬於耶和華的部分。在贖罪祭中，祭司要取下公牛或羊隻所有的脂油，包括蓋臟的脂油、臟上所有的脂油、兩個腰子和腰子上的脂油、以及肝上的網子，將其燒在燔祭壇上。脂油的焚燒與平安祭的處理方式一樣，作為獻給神的火祭。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章規定贖罪祭中祭司必須取下祭牲所有的脂油，並燒在燔祭壇上，此程序與平安祭取脂油的條例相同。
  relation: 脂油是贖罪祭中獻給神的核心部分，將脂油燒在壇上使其成為馨香的火祭，是完成贖罪程序不可或缺的環節。
