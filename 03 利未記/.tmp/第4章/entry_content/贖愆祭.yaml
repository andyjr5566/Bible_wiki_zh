name: 贖愆祭
type: 神學
secondary_types: []
aliases:
- 贖愆祭
status: formal
definition: 贖愆祭在神學上與贖罪祭密切相關，主要針對人在具體行為上干犯了聖物或對鄰舍虧欠等罪，除了需獻祭贖罪外，通常還需加上五分之一的賠償。在利未記第4章中，經文詳細記載了針對受膏祭司、全會眾、官長及平民誤犯之罪的贖罪祭條例，強調「誤犯了罪」與「必蒙赦免」的神學意涵。此章奠定了罪需透過祭牲的血與脂油之獻祭來獲得赦免的基礎，而贖愆祭在此神學框架下，進一步處理需要具體賠償的過犯，兩者共同彰顯神對罪之潔淨與公義賠償的完備要求。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章詳述贖罪祭的條例，針對不同身分者誤犯之罪提供贖罪途徑，使罪人「必蒙赦免」。
  relation: 贖愆祭與贖罪祭同屬處理罪的祭，本章贖罪祭強調因誤犯而需流血贖罪的神學基礎，贖愆祭則在此基礎上延伸至需附加賠償的具體過犯。
