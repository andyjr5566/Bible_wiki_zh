name: 燒在壇上
type: 事件
secondary_types: []
aliases:
- 焚燒脂油在壇上
status: formal
definition: 在利未記第4章的贖罪祭條例中，「燒在壇上」特指將祭牲所有的脂油（包 括蓋臟的脂油、兩個腰子與腰子上的脂油、肝上的網子）取下，在燔祭壇 上焚燒，作為獻給耶和華的火祭。此舉適用於受膏祭司、全會眾、官長及
  平民的贖罪祭，象徵將祭物最好的部分歸給神，作為馨香的祭。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章多次記載祭司將贖罪祭牲的脂油取下，燒在燔祭壇上，正如平安 祭的脂油一樣，為獻祭者贖罪。
  relation: 焚燒脂油在壇上是贖罪祭完成贖罪步驟的關鍵獻祭行動。
related_entries:
