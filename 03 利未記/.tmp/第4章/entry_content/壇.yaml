name: 壇
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 在利未記第4章的贖罪祭條例中，「壇」主要指會幕門口的燔祭壇，以及會幕內的香壇。祭司在為受膏的祭司或全會眾贖罪時，需將祭牲的血抹在香壇的四角上，並將其餘的血倒在燔祭壇的腳那裡；而為官長或平民贖罪時，則將血直接抹在燔祭壇的四角上並倒在壇腳。此外，祭牲的脂油與腰子等部分需燒在燔祭壇上，作為獻給耶和華的火祭。壇在此章中作為贖罪與潔淨的核心場所，承載了血與脂油的祭獻，使罪人得以蒙赦免。
development: 本章展現了壇在贖罪祭程序中的多重功能：首先是「抹血」的功能，祭司將血抹在壇的四角上以贖罪；其次是「倒血」的功能，將剩餘的血倒在壇腳；最後是「焚燒」的功能，將祭牲的脂油燒在壇上作為馨香的火祭。這些程序確立了壇作為神人相遇、罪得赦免的媒介地位。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章詳細記載贖罪祭中壇的用途，包括將血抹在香壇及燔祭壇的四角上、把血倒在燔祭壇的腳那裡，以及將脂油燒在燔祭壇上。
  relation: 壇是本章贖罪祭儀式的核心場所，透過在壇上抹血、倒血與焚燒脂油，完成贖罪程序，使罪人蒙赦免。
