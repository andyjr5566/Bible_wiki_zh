name: 長老按手
type: 事件
secondary_types: []
aliases:
- 會中長老按手
status: formal
definition: 在利未記第4章中，當以色列全會眾誤犯罪並獻上公牛犢為贖罪祭時，會 中的長老要在耶和華面前按手在牛的頭上，然後將牛宰於耶和華面前。此 按手動作代表會眾的代表（長老）將全會眾的罪轉移到祭牲身上，藉由祭
  牲的代死來為會眾贖罪。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章記載以色列全會眾獻贖罪祭時，會中的長老要在耶和華面前按手 在牛的頭上，將牛宰了，作為會眾犯罪的贖罪程序。
  relation: 長老按手是全會眾贖罪祭中代表會眾認罪與罪孽轉移的關鍵步驟。
