  summary: 本章贖罪祭條例中，祭司將祭牲的脂油燒在燔祭壇上，如同平安祭的脂油一樣，作為獻給神的火祭。
  relation: 脂油焚燒作為火祭的原則，與素祭中焚燒供物之部分作為馨香火祭的概念相通，同屬獻給神的聖潔部分。
