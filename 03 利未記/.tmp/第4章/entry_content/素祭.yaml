name: 素祭
type: 主題
secondary_types: []
aliases:
- 素祭
status: formal
definition: 素祭是《利未記》中規定的獻祭制度之一，通常與燔祭、平安祭等配合獻上。其祭物主要為細麵、油與乳香，並規定不可有酵，且需配鹽調和，象徵在神面前守約的純淨與忠誠。在利未記第4章的贖罪祭條例中，雖然未直接提及素祭的具體獻法，但經文描述祭司將贖罪祭牲的脂油燒在燔祭壇上，與平安祭的脂油一樣作為獻給耶和華的火祭，此處的焚燒原則與素祭中焚燒部分供物作為「馨香的火祭」之概念相通，同屬獻給神的聖潔部分。
accumulations:
- book: 利未記
