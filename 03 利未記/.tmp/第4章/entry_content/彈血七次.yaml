name: 彈血七次
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 在利未記第4章中，當受膏的祭司或以色列全會眾誤犯罪而獻公牛犢為贖罪祭時，祭司需將公牛的血帶到會幕，把指頭蘸於血中，在耶和華面前對著聖所的幔子彈血七次。此動作專屬於涉及整體或代表整體（祭司代表百姓、會眾本身）的贖罪祭，顯示罪的嚴重性與潔淨的完全性。「七」在聖經中常代表完全，彈血七次象徵在神面前完全的贖罪與潔淨，使聖所免受罪的污染。
accumulations:
- book: 利未記
  chapter: 4
  summary: 祭司為受膏祭司或全會眾之罪，對著聖所幔子彈血七次。
  relation: 彈血七次象徵在神面前完全的潔淨與贖罪，針對較高層級的誤犯罪。
