name: 無殘疾
type: 神學
secondary_types: []
aliases:
- 無殘疾
- 沒有殘疾
status: formal
definition: 在利未記第4章的贖罪祭條例中，「無殘疾」是對祭牲（公牛犢、公山羊、母山羊、母綿羊羔）的嚴格要求。 這表明獻給耶和華的祭物必須是完美、沒有瑕疵的。神學上，這預表了無罪的替代，
  唯有無瑕疵的祭物才能滿足聖潔神對贖罪的要求，使獻祭者得蒙赦免。
accumulations:
- book: 利未記
  chapter: 4
  summary: 贖罪祭的公牛犢、公山羊與母山羊等祭牲，必須是沒有殘疾的。
  relation: 祭牲的無殘疾彰顯了神對贖罪之物完美性的神學要求。
