name: 宰殺
type: 事件
secondary_types: []
aliases:
- 宰了
status: formal
definition: 在利未記第4章的贖罪祭儀式中，宰殺祭牲是獻祭過程的關鍵步驟。獻祭者按手在祭牲頭上後，需在耶和華面前宰殺祭牲（如公牛犢、公山羊或綿羊羔）。對於官長與平民的祭牲，需在「宰燔祭牲的地方」宰殺，表明此祭牲與燔祭一樣是獻給神的。宰殺行動使祭牲流血，為後續祭司取血贖罪的儀式提供基礎，象徵罪的工價乃是死，必須藉由祭牲的代死來換取赦免。
