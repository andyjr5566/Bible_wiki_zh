name: 贖罪
type: 神學
secondary_types: []
aliases:
- 贖罪
- 赦免
status: formal
definition: 在利未記第4章中，贖罪是指透過獻上無殘疾的祭牲並經由祭司執行特定的血與脂油之祭壇儀式，來為誤犯罪的祭司、全會眾、官長或平民進行潔淨與罪孽的遮蓋。祭司將祭牲的血彈在聖所幔子前、抹在香壇或燔祭壇的四角上，並將脂油燒在壇上，以此完成贖罪程序，使獻祭者必蒙赦免。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章針對不同身分者誤犯命令的罪，規定了贖罪祭的具體執行方式，強調祭司必須透過血與脂油的處理來為百姓贖罪，最終使罪人蒙赦免。
  relation: 贖罪是本章的核心神學目的，所有獻祭細節（按手、宰殺、血與脂油的處置）皆為達成贖罪與蒙赦免的必經途徑。
