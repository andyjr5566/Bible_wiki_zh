name: 綿羊羔
type: 文化
secondary_types: []
aliases:
- 母綿羊
- 羊羔
status: formal
definition: 在利未記第4章的贖罪祭條例中，平民若誤犯罪，可以牽一隻沒有殘疾的母綿羊羔作為贖罪祭的供物。綿羊羔作為常見的牲畜，在以色列人的遊牧與農業文化中代表著溫馴與無辜，其無殘疾的特性預表了無辜代罪的概念。獻祭者需按手在羊的頭上，將羊宰於燔祭壇旁，祭司再將血抹在壇的四角並焚燒脂油，為獻祭者贖罪。
accumulations:
- book: 利未記
  chapter: 4
  summary: 平民可獻無殘疾的母綿羊羔為贖罪祭，按手宰殺後祭司為其贖罪。
  relation: 綿羊羔作為平民贖罪祭的選項之一，彰顯神為不同階層提供贖罪途徑的恩典。
