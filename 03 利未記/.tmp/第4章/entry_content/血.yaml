name: 血
type: 神學
secondary_types: []
aliases:
- 血
- 祭牲的血
status: formal
definition: 在利未記第4章的贖罪祭條例中，血代表祭牲的生命，是贖罪的核心媒介。根據獻祭者的身分不同，祭司會將公牛的血帶入會幕，用指頭蘸血彈在聖所幔子前七次，並抹在香壇的四角上，剩餘的血倒在燔祭壇的腳那裡；若獻上山羊，祭司則將血抹在燔祭壇的四角上並倒在壇腳。血的處置確保了罪的潔淨與贖罪的完成。
accumulations:
- book: 利未記
  chapter: 4
  summary: 本章詳細記載贖罪祭牲之血的處置方式，包括彈血七次、抹血於壇角及倒血在壇腳，依獻祭者身分（祭司、會眾、官長、平民）而有不同的應用層級。
  relation: 血是贖罪的神學基礎，透過祭司將血獻在耶和華面前的壇上，成就了罪的遮蓋與赦免。
