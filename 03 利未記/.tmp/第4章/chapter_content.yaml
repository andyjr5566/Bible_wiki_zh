organization: "### 贖罪祭的分級與誤犯之罪（v1-2）\n\n本章開啟「贖罪祭」新單元，耶和華對摩西說：「若有人在耶和華所吩咐不可行的什麼事上誤犯了一件」（v2）。CT\
  \ 指出：「『吩咐不可行的…事』即指律法明文規定的各種條例；『誤犯』意指不是故意違犯；『一件』意指不是累犯，只要偶犯一件。」GT《丁道爾》補充：「贖罪祭所贖的罪是人因軟弱或錯誤所致的」。KC\
  \ 則嚴厲劃界：「There is no offering for anyone who intentionally sins, who sins ‘defiantly’\
  \ or ‘willfully’… Such a person shall be cut off from among his people (Num 15:30;\
  \ Heb 10:26)。」BH 解釋：「The concept of unintentional sin highlights the difference\
  \ between sins committed knowingly and those done in ignorance or by accident.」這顯示神對「誤犯」（shagagah）與「故犯」有明確區分，贖罪祭專為前者預備。\n\
  \n贖罪祭另一大特點是「按犯罪者身分分級」：CT 列表——「受膏的祭司…公牛犢；全會眾…公牛犢；官長…公山羊；平民…母山羊或母羊，貧窮則用班鳩、雛鴿甚至細麵」。這反映「多給誰就向誰多取」（路12:48），KC\
  \ 稱「The distinction in offering represents the difference in insight that exists\
  \ among the members of the people of God.」。\n\n| 犯罪者 | 祭物 | 血灑處 | 肉處理 |\n|---|---|---|---|\n\
  | [[受膏的祭司（mashiach kohen）]] | [[公牛犢（par ben baqar）]] | 會幕內：[[內幔（隔聖所至聖所的幔子）]] 彈七次、[[金香壇（香壇）]]\
  \ 四角 | 全焚 [[營外焚燒（machutz la-machaneh saraf）]] |\n| [[全會眾（kol ha-edah）]] | 公牛犢 |\
  \ 同上 | 全焚營外 |\n| [[以色列人的官長]] | 公山羊 | [[銅壇（燔祭壇）]] 四角 | 歸祭司食用 |\n| 平民 | 母山羊/[[綿羊]]\
  \ | 銅壇四角 | 歸祭司食用 |\n\n### 祭司與全會眾的贖罪祭：血進聖所、體焚營外（v3-21）\n\n#### 受膏的祭司（v3-12）\n大祭司犯罪「使百姓陷在罪裡」（v3），CT\
  \ 解釋：「大祭司在神面前肩負以色列眾百姓…故他一人犯罪，即連累眾百姓叫他們也陷在罪裡。」KC 同調：「If he sins, it does not only\
  \ affect himself, but the whole people are guilty through his sin.」祭物必為「沒有殘疾的公牛犢」（v3），CT\
  \ 指出「表徵基督聖潔、無邪惡、無玷污（來七26）」。儀程：牽牛至[[會幕門口]]，[[按手（samak）]]，宰殺；祭司取血入會幕，在[[內幔（隔聖所至聖所的幔子）]]前[[灑血（zaraq）]]七次，又抹於[[金香壇（香壇）]]四角，餘血倒在[[銅壇（燔祭壇）]]腳旁（v5-7）。CT\
  \ 強調：「贖罪祭的重點不只贖罪，也潔淨崇拜的地方，以致神可降臨住在其間，恢復與人的交通。因此，灑血的禮儀乃是此祭的特點。」KC 則著重交通恢復：「By the\
  \ sin of the anointed priest, the way to the sanctuary is blocked. By sprinkling\
  \ the blood, the way to and in the sanctuary is sanctified again.」BH 注釋：「Sprinkling\
  \ the blood seven times signifies the thoroughness and completeness of the atonement\
  \ process.」\n\n[[脂油（chelev）]]、[[腰子（kilyah）]]、[[肝上的網子（yoteret ha-kaved）]] 焚於壇上（v8-10），CT\
  \ 認為「表徵基督使神滿足」。其餘皮肉頭腿臟腑糞，全牽往[[潔淨之地（maqom tahor）]]（即[[營外焚燒（machutz la-machaneh saraf）]]）焚燒（v11-12），CT\
  \ 引來13:12 指出「預表基督在耶路撒冷城門外為我們犧牲」。\n\n#### 全會眾（v13-21）\n會眾「誤犯了罪，是隱而未現、會眾看不出來的」（v13），一旦「知道所犯的罪」（v14）便獻公牛犢。長老代表[[按手（samak）]]（v15），血儀與祭司同（v16-18），脂油焚壇（v19），肉同樣全焚營外（v21）。CT\
  \ 指出：「全會眾贖罪的祭物，只能、也必須用公牛為贖罪祭，這表明不能輕忽了事。」KC 應用至教會：「The sin of the whole congregation\
  \ can be applied to the situation in Corinth… God came there with His discipline\
  \ (1Cor 11:30).」\n\n```mermaid\nflowchart TD\n    A[牽公牛至會幕門口] --> B[按手認同]\n    B\
  \ --> C[宰殺取血]\n    C --> D[祭司取血入會幕]\n    D --> E[對內幔彈血七次]\n    D --> F[抹金香壇四角]\n\
  \    D --> G[倒血於銅壇腳旁]\n    E --> H[取脂油/腰子/肝網焚壇]\n    G --> H\n    H --> I[其餘全牲營外焚燒]\n\
  ```\n\n### 官長與平民的贖罪祭：血灑銅壇、肉歸祭司（v22-35）\n\n#### 官長（v22-26）\n官長犯罪「誤犯了罪」（v22），獻「沒有殘疾的公山羊」（v23）。CT\
  \ 解釋：「官長若犯了罪，他們的罪就比平民的罪關係更重」。KC 指出：「The sin of a leader does not endanger the fellowship\
  \ of the whole people with God. Therefore a smaller offering can be offered.」血儀簡化：祭司以指蘸血抹[[銅壇（燔祭壇）]]四角，餘血倒壇腳（v25），不進會幕。脂油焚壇（v26），肉歸祭司（CT：「為官長或庶民所獻之贖罪祭，所有的肉都成為祭司的分」）。\n\
  \n#### 平民（v27-35）\n平民獻「母山羊」（v28）或「母綿羊」（v32），儀程同官長：[[按手（samak）]]、宰於[[銅壇（燔祭壇）]]北、血抹壇角倒壇腳（v29-30,33-34）、脂油焚壇為「馨香的祭」（v31,35）。KC\
  \ 注意到：「There is another peculiarity with this sin offering… the fat which is sacrificed\
  \ and which is a soothing aroma to the LORD. While every sin is awful in God’s eye…\
  \ all God’s pleasure rests upon Him at the same time.」CT 則強調「祭司要為他贖了，他必蒙赦免」（v26,31,35）四次重複，顯示\
  \ [[赦免（salach）]] 確據。\n\n### 跨章預表：基督作完全贖罪祭（整理）\n\nCT 總結：「贖罪祭預表背負人的罪（約1:29），在十字架上犧牲的耶穌基督。可以使我們在他裡面坦然無懼地來到神的面前（弗3:2；來10:19），事奉神（來9:12-14）。」KC\
  \ 深化：「The sin offering is a picture of the Lord Jesus and His work on the cross\
  \ through which sins can be forgiven (1Jn 2:2).」來13:11-13 明確連結：「獻贖罪祭的牲畜血被帶入聖所…牲畜的身體被燒在營外。所以耶穌也要在城門外受苦，使百姓因自己的血成聖。我們也當出到營外就了他去，忍受他所受的凌辱。」這將\
  \ [[營外焚燒（machutz la-machaneh saraf）]] 從儀式轉為門徒跟隨的呼召。\n\n> [!note] 來源差異提示\n> CT 著重「潔淨聖所」功能（灑血七次、抹香壇），KC\
  \ 著重「恢復交通與禱告道路」（血遮蓋幔子、香壇代表代求），BH 著重「七表完全」。三者互補，未見矛盾。\n> 關於祭司吃贖罪祭肉：CT 說「為大祭司或會眾所獻…其餘的肉都不可吃，要用火焚燒」；KC\
  \ 則說「The priest shall make atonement… and they will be forgiven」並未明說肉歸屬，但引來13:10-13\
  \ 指出「那些供奉帳幕的人無權在壇上吃肉」。兩家皆指向「營外焚燒」預表基督受苦。\n\n> [!question] 待探討\n> - 「誤犯」（shagagah）是否包含「明知故犯後悔」？經文僅限「隱而未現」（v13）、「自己知道了」（v23,28,32）。\n\
  > - 平民獻母羊與官長獻公羊，是否暗示贖罪代價與權柄關係？KC 認為「represents the difference in insight」，CT 則強調「神分別貧富、尊卑，是顯明祂的公義」。"
