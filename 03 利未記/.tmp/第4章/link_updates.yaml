  "relation": "補充利3:7,9綿羊平安祭肥尾巴、約1:29基督為神的羔羊、來10:10-14基督一次獻上永遠成聖。
利4章展示綿羊作為平民贖罪祭選項，預表基督作無瑕羔羊承擔世人之罪。"
- "title": "無殘疾（tamim）"
  "path": "link_folder/主題/無殘疾（tamim）.md"
