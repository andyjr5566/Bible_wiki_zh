  "relation": "補充出5:6官長、出18:21摩西立首領、民1:16各支派首領、申1:15摩西立官長。
利4章展示官長贖罪祭介於大祭司/會眾與平民之間，供物公山羊份量次於公牛，血禮簡化為壇邊禮。"
- "title": "山羊"
  "path": "link_folder/文化/山羊.md"
  "summary": "利4:23,28 官長獻公山羊、平民可獻母山羊。CT：公山羊毛長而卷、專作贖罪祭。KC：公山羊預表基督擔當罪孽。本章山羊作為贖罪祭供物，官長用公山羊、平民用母山羊，體現供物等級與身分對應。"
  "relation": "補充利3:12-16山羊平安祭、利16贖罪日雙山羊、來13:11-13基督在城門外受苦。利4章展示山羊在贖罪祭中的分級使用：公山羊給官長、母山羊給平民，體現神按身分設立分級贖罪。"
