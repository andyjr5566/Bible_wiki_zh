- "title": "贖罪"
  "path": "link_folder/神學/贖罪.md"
  "summary": "利4:20,26,31,35 四次「祭司為他們贖罪、他們必蒙赦免」。CT：須先贖罪才能蒙赦免。KC：贖罪祭預表基督代贖（林後5:21）。BH：贖罪祭指向基督一次獻上永遠成聖（來10:10-14）。本章四等級條例皆以「贖罪→赦免」收尾，確立贖罪為赦免前提的神學秩序。"
  "relation": "補充利16贖罪日、來9:12基督帶自己血入聖所成就永遠贖罪、來10:10-14基督一次獻上永遠成聖。
利4章展示贖罪祭如何按身分分級運作，最終指向基督一次成就的永遠贖罪。"
- "title": "腰子（kilyah）"
