book: 利未記
chapter: 4
updates:
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: |
    利4 是贖罪祭條例的本章，按犯罪者身分分四級：受膏的祭司獻公牛犢（v3-12）、全會眾獻公牛犢（v13-21）、官長獻公山羊（v22-26）、平民獻母山羊或母綿羊羔（v27-35）。CT 指出其原文重心：「『贖罪』希伯來文一字的字根有『潔淨』的意思。犯罪不單得罪神，更玷污了敬拜的地方；贖罪祭的重點不只贖罪，也潔淨崇拜的地方。因此，灑血的禮儀乃是此祭的特點。」丁良才在本章把五祭的辨識點各壓成一句，贖罪祭的特點是「彈血、抹血」，表示遮蓋罪惡。
  relation: |
    利1-3 與利4-5 之間是一道分水嶺。KC：「The first three chapters form a whole……it is about voluntary offerings……The offerings that now come in Leviticus 4-5 are not voluntary. God commands these offerings.」獻祭者的身分也變了——「he who offers the animal does not approach as a worshiper, but as a sinner」。但對象仍有界線：贖罪祭「is not for a sinner who lives without God, but for someone who is already a member of God's people, but has sinned」。本章的結構原則是「罪污染到哪裡，血就塗到哪裡」：祭司與全會眾的罪汙及聖所，血要帶進會幕彈在幔子前、抹在香壇角；官長與平民的罪不及於此，血只抹在燔祭壇角。各家對「分幾等」的計數基準不同：CT／串珠算四種（本章四身分），丁良才算六等（加上利5 的貧民與極貧者）或七種（按祭物：公牛犢、公山羊、母山羊、母綿羊、斑鳩、雛鴿、細麵），KC 算七個案例（利4 四個、利5:1-13 三個）。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: |
    利4 四次重複同一句宣告：「祭司要為他贖罪，他必蒙赦免」（v20、26、31、35）。丁良才提醒次序：「注意，須先贖罪，才能蒙赦免。」CT 給 kaphar 的字義是「遮蓋，平息」。
  relation: |
    《舊約聖經背景註釋》在本章對「赦免」下了一個精準的界定：「動詞赦免的主語永遠是神，不會是人，並且不排除懲罰（見民14:19-24）。因此赦免是關係性而非法律懲處的概念，是必然的結論。獻祭者所尋求的是與神和好，不是刑罰得寬宥。」同一份來源並主張贖罪祭「能夠淨化或洗淨聖所（而非獻祭者）」，這與 CT／串珠「不只贖罪，也潔淨崇拜的地方」的折衷讀法方向一致而力度更強。KC 則指出舊約與新約的關鍵差別：「With the Israelite, repetition of the offering is always necessary……The Christian may know the certainty of the forgiveness of all his sins on the basis of the once for all accomplished work of Christ（來10:1-14）。If he sins, Christ must not die again for him, but he must confess his sin.」
- title: 無殘疾
  path: link_folder/神學/無殘疾.md
  summary: |
    利4:3、23、28、32 贖罪祭的祭牲一律要「沒有殘疾的」——不論是大祭司的公牛犢、官長的公山羊，或平民的母山羊、母綿羊羔。CT：「表徵基督聖潔、無邪惡、無玷污（來7:26）。」《精讀本》：「因為這個祭物預表完全、無罪的（來4:15；9:28）真正的祭物——耶穌基督。」
  relation: |
    贖罪祭的四個等級在祭牲的種類、性別、價值上層層遞減（公牛犢→公山羊→母山羊／母綿羊羔），惟獨「無殘疾」四級全同。犯罪者的身分可以不同，罪的影響範圍可以不同，所獻的代價可以不同，但那隻替他死的必須是完全的——這條線在利1 的燔祭、利3 的平安祭、利4 的贖罪祭上完全一致。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: |
    利4 中會幕是贖罪祭分級的空間座標。祭司與全會眾犯罪時，血要「帶到會幕」（v5、16），在聖所內對著幔子彈血七次、抹在香壇的四角；官長與平民犯罪則血不進會幕，只抹在燔祭壇的四角（v25、30、34）。《精讀本》：「為官長或百姓贖罪，不必進入會幕。祭司或全會眾犯罪，要把祭物的血帶到會幕裡，在離神更近的地方獻上贖罪祭，暗示著罪的嚴重。」
  relation: |
    KC 指出會幕這個名字本身就是本章的關鍵：「Everything is connected to 'the tent of meeting', the name that indicates that God wants to come together with His people here. This has been made impossible by sin and is made possible again by the death and the blood of the sin offering.」——罪把相會的地方堵住，血把它重新打開。這也解釋了為何血的去處要分級：《舊約聖經背景註釋》主張贖罪祭「能夠淨化或洗淨聖所」，而「在以色列，維持聖所潔淨的原因卻是神的聖潔。聖所必須保持聖潔，主才會繼續住在他們中間」。
- title: 內幔（隔聖所至聖所的幔子）
  path: link_folder/主題/內幔（隔聖所至聖所的幔子）.md
  summary: |
    利4:6、17 祭司要「把指頭蘸於血中，在耶和華面前對著聖所的幔子彈血七次」——這是贖罪祭獨有、且只用於祭司與全會眾兩級的動作。丁良才推斷彈血的實際位置：「這血大概是在聖所內對著幔子彈在地上，所彈的面積既然不大，大祭司進至聖所的時候……就能從左右繞過去，不至於踏在其上。」《精讀本》：「把血彈在幔子上，象徵著把血彈在神所臨在的施恩座前。」
  relation: |
    幔子是聖所與至聖所的界線，也是罪把人擋在外面的具象。KC 讀祭司犯罪的後果：「By the sin of the anointed priest, the way to the sanctuary is blocked. By sprinkling the blood, the way to and in the sanctuary is sanctified again.」故彈血七次不是為了進至聖所（那是利16 贖罪日的事），而是為了讓被罪堵住的路重新可通。《舊約聖經背景註釋》給的則是功能解釋：「彈血七次是同時淨化聖所每一部分，不必分別處理的方法。」
- title: 香壇
  path: link_folder/主題/香壇.md
  summary: |
    利4:7、18 祭司要「把些血抹在會幕內、耶和華面前香壇的四角上」——同樣只用於祭司與全會眾兩級。《精讀本》：「香壇放在隔開聖所和至聖所的幔子前。官長或百姓犯罪，把祭物的血抹在燔祭壇的四角上（25、30節），但為祭司或全會眾贖罪，就要把血抹在聖所內香壇的四角。」《舊約聖經背景註釋》補其成分：「這些壇上所燒的香是幾種香料混合製成的，主要成分是乳香……按照後期猶太傳統，這調劑包括十二種香料。」
  relation: |
    香代表禱告（詩141:2），故香壇被血玷污意味著代求的路斷了。KC 把這一層讀得最清楚：「because of his sin it is not possible to offer fragrant incense. The blood at the horns of the altar of fragrant incense clears the way to bring again fragrant incense……There can again be strength – of which the horns speak – from prayer, from intercession.」CT 同讀：「抹血在香壇的四角上面，乃是藉著祭牲的血……在我們與神的交通當中，帶回完全的恢復」；並指出「不允許人在神面前的事奉敬拜打岔」。《舊約聖經背景註釋》另記壇角的文化背景：「在壇的四隅上安設犄角，是全古代近東共有的設計。學者的考據顯示這些角是神明的標誌，然其功用卻不明。」
- title: 宰殺
  path: link_folder/事件/宰殺.md
  summary: |
    利4:4、15、24、29、33 贖罪祭的四級都要宰殺，且位置一致——「在那宰燔祭牲的地方」（v24、29、33），《精讀本》指即燔祭壇北邊、會幕的院子裡（參利1:11）。大祭司犯罪時由他自己宰（v4），全會眾犯罪則由長老按手後宰（v15）。
  relation: |
    贖罪祭與燔祭在宰牲地點上是同一處，丁良才把這列為兩祭相連的四個地方之一。KC 讀宰殺的意義：「After this identification the bull has to be slain. The anointed priest does that himself. After all, he has sinned……The picture of slaying shows that every sin results in death: 'For the wages of sin is death'（羅6:23）。」他並補上一句對認罪的要求：「As long as there are excuses for the sin committed, the confession is incomplete.」
- title: 血
  path: link_folder/神學/血.md
  summary: |
    利4 中血的處理是全章分級的核心，且有三個去處：對著幔子彈血七次（v6、17）、抹在壇的四角（v7、18、25、30、34）、其餘倒在燔祭壇的腳那裡（v7、18、25、30、34）。CT 為三者各給一義：「彈血是把人帶去回到神面前的路」；「抹血在香壇的四角上……在我們與神的交通當中，帶回完全的恢復」；「血是倒在祭壇那裏，來顯明救贖的恩典……神在那裏看見祭牲的血，就不再追討人的罪」。
  relation: |
    利1-3 的血是「灑在壇的周圍」，利4 的血則是「彈、抹、倒」三個精細動作——《精讀本》把這個對比講得很清楚：「燔祭和平安祭把血灑在壇的周圍，贖罪祭要用指頭把血抹在香壇（祭司或全會眾犯罪）或燔祭壇（官長或百姓犯罪）的四角，剩下的血全部倒在燔祭壇的腳下。」丁良才在本章把五祭的特點各壓成一句，贖罪祭的特點正是「彈血、抹血」。KC 讀倒血：「The poured-out blood speaks of the Lord Jesus that 'He poured out Himself to death'（賽53:12），for life is in the blood.」
- title: 脂油
  path: link_folder/主題/脂油.md
  summary: |
    利4:8-10、19、26、31、35 贖罪祭的脂油處理「與平安祭公牛上所取的一樣」（v10）——蓋臟的脂油、臟上所有的脂油、兩個腰子和腰子上的脂油、肝上的網子，燒在燔祭的壇上。丁良才：「贖罪祭在祭壇上所燒的和平安祭所燒的沒有分別。」
  relation: |
    脂油是贖罪祭中唯一上燔祭壇的部分，其餘（祭司與全會眾那兩級）全要搬到營外燒。KC 由此讀出一層反差：「This is the only thing of the sin offering that comes on the altar of burnt offering. It speaks of the power, the energy with which the Lord Jesus did the work as the sin offering, and that is pleasant for God, 'for a soothing aroma' to Him.」他並在 v31 指出這正是贖罪祭最深的張力：「While every sin is awful in God's eye, and the Lord Jesus, when made sin, is awful in God's eye, all God's pleasure rests upon Him at the same time……Through sin man has robbed the honor of God. The Lord Jesus has done everything – which the fat speaks of – to restore what He has not stolen（詩69:4）。」
- title: 燒在壇上
  path: link_folder/事件/燒在壇上.md
  summary: |
    利4:10、19、26、31、35 贖罪祭的脂油要燒在燔祭的壇上。丁良才指出這個「燒」與 v12、21 營外的「燒」原文不同：利1-3 與本章 v10 的燒字「是使煙或香氣上升的意思」，v12 和 v21 的燒字則「是燒成灰燼的意思」。
  relation: |
    這組原文的分別在本章有決定性的意義。丁良才：「聖書裡有這分別，或者是顯明被燒在燔祭壇上的是表示神的喜悅，被燒在營外的是表示神的震怒。」KC 完全同此：「'To offer up in smoke' is in connection with the pleasure of God; 'to burn' is in connection with God's wrath.」故同一隻贖罪祭牲身上，脂油上壇（神的喜悅）、其餘出營（神的震怒）——兩種火，兩個方向。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    利4 中燔祭與贖罪祭多處相連。丁良才列出四點：「（一）獻燔祭或贖罪祭的人都要在會幕門口按手在祭牲的頭上（利1:3-4，4:4）；（二）燔祭和贖罪祭的祭牲是在一處宰殺的（利6:25）；（三）贖罪祭的脂油是燒在燔祭壇上（利4:9-10）；（四）為祭司和會眾所獻之贖罪祭的肉是焚於倒燔祭灰的地方（利4:12，6:11）。」
  relation: |
    燔祭是甘心的、為著神的榮耀；贖罪祭是不得不獻的、為著罪。KC 把利1-3 與利4-5 劃為兩個類別，而燔祭壇正是兩者交會之處：贖罪祭的脂油要燒在燔祭壇上，其血要倒在燔祭壇的腳，官長與平民的血只抹在燔祭壇的四角。丁良才在本章把五祭的特點各壓成一句：燔祭的特點是「在壇上焚燒全牲」，表示將自己全獻與主；贖罪祭的特點是「彈血、抹血」，表示遮蓋罪惡。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: |
    利4 中素祭未直接出現，但丁良才在本章末記下一條要緊的規定：「贖罪祭和贖愆祭，沒有同獻的素祭和奠祭（民15:1-11）。」丁良才並在本章把五祭的特點各壓成一句，素祭的特點是「麥子經過磨碾或火烤，並且加油」，表示被聖靈充滿、有完全之行為。
  relation: |
    素祭必配血祭而獻（利2），卻獨獨不配贖罪祭與贖愆祭——這個「不配」本身就是神學。素祭說的是基督完全的生，贖罪祭說的是祂被當作罪；一個是馨香，一個是震怒。兩者不能同席。利5:11 是唯一的例外：極貧的人可以用細麵作贖罪祭，但經文明言「不可加上油，也不可加上乳香，因為是贖罪祭」——素祭的兩樣標記正好被拿掉。
- title: 平安祭
  path: link_folder/神學/平安祭.md
  summary: |
    利4:10、26、31、35 反覆以平安祭作為脂油處理的標準：「與平安祭公牛上所取的一樣」、「正如平安祭的脂油一樣」、「正如取平安祭牲的脂油一樣」、「正如取平安祭羊羔的脂油一樣」。丁良才：「贖罪祭在祭壇上所燒的和平安祭所燒的沒有分別。」
  relation: |
    平安祭在本章扮演「參照系」的角色——贖罪祭的脂油怎麼取、怎麼燒，一律比照平安祭。這使兩祭在動作上疊合，在意義上卻相反：平安祭是和好之後的同席，贖罪祭是和好之前的除障。KC 由此讀出官長那一級為何血抹在燔祭壇角：「That the blood must be put on the horns of the altar of burnt offering is because there too the peace offering is brought, which speaks of fellowship with God and with the other members of the people of God. That is what we have in the Table of the Lord. If anyone has sinned, fellowship with God and with each other is only possible again after confession and looking to the offering of Christ.」丁良才在本章把五祭特點壓成一句，平安祭的特點是「祭餐」，表示和好與相交。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: |
    利4 中贖愆祭未直接出現，但丁良才在本章把五祭的特點各壓成一句，贖愆祭的特點是「納罰金」，表示賠償——這正是它與贖罪祭最清楚的分界。丁良才另記：「贖罪祭和贖愆祭，沒有同獻的素祭和奠祭（民15:1-11）。」
  relation: |
    KC 指出利5 的三個案例雖然名為贖罪祭，性質卻靠近贖愆祭：「The three cases in Leviticus 5 concern concrete, named sins. These sin offerings therefore bear more of the character of the guilt offering that is discussed in the remainder of Leviticus 5. Guilt arises when a commandment is transgressed.」——利4 的罪是「不出於順服的一切」（KC：「sin is everything that does not happen out of obedience to God」），利5 後半的愆則是具體踩到某條線。CT 另從對象上分：「基督在十字架上捨命流血，解決了人的罪行（贖愆祭）；基督死而復活的生命，對付人的罪性（贖罪祭）。」
- title: 壇
  path: link_folder/主題/壇.md
  summary: |
    利4 中「壇」按分級指向兩個不同的壇：祭司與全會眾犯罪時，血抹在「會幕內、耶和華面前香壇的四角上」（v7、18）；官長與平民犯罪時，血抹在「燔祭壇的四角上」（v25、30、34）。而所有四級的餘血，一律「倒在會幕門口、燔祭壇的腳那裡」，脂油也一律燒在燔祭壇上。
  relation: |
    本章使壇成為罪的量尺——血抹到哪一座壇，就標示了罪污染到多深。KC 解釋為何個人的罪不必動香壇：「There is no talk of putting blood on the altar of incense, as is the case in verse 7 and verse 18, because these are situations where the fellowship of the whole people with God through sin is broken. The sin of the individual does not make the altar of incense unclean.」但個人仍失去一樣東西：「The individual who has sinned loses the enjoyment of the blessing that is embodied in being part of the congregation. Therefore, the blood of the sin offering is applied to the horns of the altar of burnt offering as the place of personal access to God.」
- title: 馨香的火祭
  path: link_folder/神學/馨香的火祭.md
  summary: |
    利4:31 平民的贖罪祭「祭司要在壇上焚燒，在耶和華面前作為馨香的祭」——這是本章唯一出現「馨香」的地方。大祭司（v10）、全會眾（v19）、官長（v26）三段都沒有這句話。
  relation: |
    這個不對稱兩家都注意到了，解法不同。丁良才：「有注釋家以為這話在前三種贖罪祭上不提，卻特列在此處，是論及庶民所獻這賤價的贖罪祭，特要表明神悅納最貧苦的人所獻最賤價的祭物，正如祂悅納最富足和上級人所獻最值錢的祭物一樣。」他並收在一句上：「這樣，尊貴的、卑賤的、富足的、或貧窮的都可蒙赦罪之恩（伯34:19）。」KC 則讀為贖罪祭裡神的雙重目光：「There is another peculiarity with this sin offering that we do not have with the previous sin offerings……While every sin is awful in God's eye, and the Lord Jesus, when made sin, is awful in God's eye, all God's pleasure rests upon Him at the same time.」丁良才另注意到一個更廣的現象：「一切燒在壇上的，連為贖罪所獻的，雖然都是馨香的祭物……但本章論為大祭司、會眾和官長所獻的贖罪祭卻沒有這樣的話。」
- title: 鹽約
  path: link_folder/神學/鹽約.md
  summary: |
    利4 未提到鹽，但利2:13 的規定涵蓋一切供物：「一切的供物都要配鹽而獻。」丁良才在利2:13 明言其範圍：「不但在各種素祭上必須加鹽，一切別的祭物也都要配鹽而獻（結43:24）」，贖罪祭亦在其中。
  relation: |
    鹽約與贖罪祭放在一起看有一層張力。鹽表持久不變的約（民18:19；代下13:5），贖罪祭卻是一犯再犯、一獻再獻——KC：「With the Israelite, repetition of the offering is always necessary……When he commits a new sin, he must come with a new offering.」人的失敗是反覆的，神的約卻不變質；配鹽而獻的贖罪祭正把這兩件事放在同一個壇上。丁良才在本章末指出這條反覆的線終將收束：「須先贖罪，才能蒙赦免」，而新約的答案是一次永遠的獻上（來10:1-14）。
