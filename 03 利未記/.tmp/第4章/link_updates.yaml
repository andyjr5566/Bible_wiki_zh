"book": "03 利未記"
"chapter": !!int "4"
"updates":
- "title": "贖罪祭"
  "path": "link_folder/神學/贖罪祭.md"
  "summary": "利4章完整規定贖罪祭條例，分四等級：大祭司/全會眾獻公牛犢（v3-21）、官長獻公山羊（v22-26）、平民獻母山羊/母綿羊（v27-35）。核心原則：按犯罪者身分與影響範圍分級獻祭、分級灑血、分級處理祭肉。大祭司/會眾血帶入會幕內彈幔子七次、抹香壇角、倒銅壇腳，全牛營外焚燒；官長/平民血只在銅壇四角抹、壇腳倒，脂油焚壇，肉歸祭司。共同前提：皆為「誤犯（shagagah）」，非故意悖逆（v2,13,22,27）。CT：贖罪祭重點不只贖罪，也潔淨崇拜處所，恢復神人交通；灑血是此祭特點。KC：大祭司罪玷污聖所、牽連全民；官長罪影響支派；平民罪僅涉個人。BH：祭司罪有 corporate effect，須帶血入聖所潔淨。"
  "relation": "本章為贖罪祭條例的正式立法，補充出29:14,36承接聖職贖罪祭、來10:10-14基督一次獻上永遠成聖的背景。"
- "title": "按手（samak）"
  "path": "link_folder/原文/按手（samak）.md"
  "summary": "利4:4,15,24,29,33 五次記載獻祭者/長老按手在祭牲頭上。CT：按手表示獻祭人與祭牲合一、罪轉移到祭牲。KC：按手表達「把自己與這祭物認同、合為一」。BH：按手是罪孽轉移至祭牲的關鍵動作，確保祭牲合法有效代替獻祭者贖罪。本章按手發生在贖罪祭（非自願獻祭），表徵獻祭者在基督裡承認罪、罪歸基督。"
  "relation": "補充利1:4燔祭按手（蒙悅納、為他贖罪）、出29:10,15,19祭司按手（三個不同方向）之外的場景——凡獻贖罪祭的個人皆親自按手，不能假手他人，正如各人得救必須自己靠主。贖罪祭按手表徵與基督合一、罪歸基督。"
- "title": "灑血（zaraq）"
  "path": "link_folder/主題/灑血（zaraq）.md"
  "summary": "利4章灑血儀式分兩層：①大祭司/會眾：血帶入會幕，指頭蘸血對幔子彈七次（v6,17），抹香壇四角（v7,18），餘血倒銅壇腳（v7,18）；②官長/平民：血不進會幕，只在銅壇四角抹血（v25,30,34），餘血倒壇腳。CT：灑血是贖罪祭特點，表徵遮蓋罪行、潔淨聖所。KC：血灑幔子前、抹香壇角、倒銅壇腳，三重動作顯明基督寶血完全遮蓋、開啟禱告路、滿足神公義。BH：血代表生命，灑血七次表完全贖罪。"
  "relation": "補充利3章平安祭灑血（壇周圍）、出24:6,8立約灑血、來9:12-14基督帶自己血入天上聖所、來12:24基督血說更美的話。利4章展示灑血儀式從「壇周圍」進階到「幔子前、香壇角、壇腳」的空間遞降結構。"
- "title": "脂油（chelev）"
  "path": "link_folder/原文/脂油（chelev）.md"
  "summary": "利4:8-10,19,26,31,35 五次列舉贖罪祭須取下脂油：蓋臟脂油、臟上脂油、兩腰子脂油、肝上網子。CT：脂油即肥肉、最肥美部分、燒在壇上歸神。KC：脂油焚燒為馨香火祭，表徵基督完全順服使父滿足。BH：脂油代表基督完全奉獻的內在能量。贖罪祭脂油處理與平安祭相同（參3:3-5,9-11,14-16），確立脂油歸神的統一原則。"
  "relation": "補充利3章平安祭脂油清單（蓋臟、臟上、腰子、肝網、肥尾巴）、利7:23-25脂油禁令、弗5:2基督獻上自己為馨香祭。利4章展示贖罪祭同樣焚燒脂油作馨香，預表基督贖罪之死同時是完全順服、使父滿足。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "利4:4,14,18,24,29,33 六次記載牽牛/羊到會幕門口宰殺。CT：會幕門口有銅壇、是獻祭地點。KC：會幕門口是神與人相會之處。本章所有贖罪祭宰殺地點統一在會幕門口（銅壇北邊），確立會幕門口作為「一般百姓獻祭」的地點功能——不只是祭司職事場所，也是全體百姓親近神、獻上供物的入口。"
  "relation": "補充出29章會幕門口（祭司承接聖職、洗身、吃聖肉之處）、利1章會幕門口（一般百姓獻燔祭地點）之外的場景——贖罪祭同樣在會幕門口宰殺，會幕門口是祭司與百姓獻祭、灑血、親近神的共同門檻。"
- "title": "內幔（隔聖所至聖所的幔子）"
  "path": "link_folder/主題/內幔（隔聖所至聖所的幔子）.md"
  "summary": "利4:6,17 大祭司/會眾贖罪祭血彈七次對著聖所幔子。CT：幔子內有法櫃施恩座、彈血向著至聖所。KC：幔子隔開聖所與至聖所、血彈在神面前。BH：幔子預表基督肉身、撕裂開啟新活路（來10:20）。本章灑血儀式中，幔子是大祭司/會眾血禮的標的——血不進至聖所，只彈在幔子前，象徵贖罪祭潔淨通往神同在的路。"
  "relation": "補充出26:31-33幔子製作、來9:3第二層幔子、來10:19-20基督肉身為幔子、太27:51幔子裂開。
利4章展示贖罪祭血禮如何在幔子前運作，預表基督血灑在天上聖所幔子前（來9:11-12）。"
- "title": "金香壇（香壇）"
  "path": "link_folder/主題/金香壇（香壇）.md"
  "summary": "利4:7,18 大祭司/會眾贖罪祭血抹在香壇四角。CT：香壇在幔子前、表禱告代求；血抹四角使禱告之路重開。KC：香壇四角抹血表基督寶血贖罪功效蒙神悅納。BH：香壇代表禱告、血抹其上表代禱蒙垂聽。本章確立贖罪祭（大祭司/會眾）血必抹香壇角，預表基督寶血開啟代禱之路（來7:25）。"
  "relation": "補充出30:1-10香壇製作、出30:34-38香料、來7:25基督長遠活著替人代求、啟5:8,8:3-4聖徒禱告如香。利4章展示贖罪祭血如何在香壇上運作，預表基督寶血開啟代禱之路。"
- "title": "銅壇（燔祭壇）"
  "path": "link_folder/主題/銅壇（燔祭壇）.md"
  "summary": "利4:7,18,25,30,34 贖罪祭血在銅壇四角抹、壇腳倒。CT：燔祭壇在會幕門口、血倒壇腳表獻上全生命。KC：燔祭壇北邊宰燔祭牲、贖罪祭血抹其角。BH：燔祭壇為贖罪中心、血倒其基表基督傾倒生命。本章四等級贖罪祭血禮最終都落在銅壇——大祭司/會眾血倒壇腳，官長/平民血抹壇角倒壇腳，確立銅壇為贖罪中心。"
  "relation": "補充出27:1-8銅壇製作、出38:1-7實際建造、來13:10-13基督在城門外受苦。利4章展示贖罪祭血禮如何依附於銅壇（大祭司/會眾倒壇腳、官長/平民抹壇角），預表基督成就的贖罪建立在祂完全順服（燔祭）根基上。"
- "title": "以色列的眾長老"
  "path": "link_folder/人物/以色列的眾長老.md"
  "summary": "利4:15 會中的長老按手在牛頭上，代表全會眾。CT：長老代表全會眾。KC：長老按手表百姓罪轉到公牛身上。本章長老作為會眾代表按手，預表基督作教會元首承擔眾人之罪（來2:17）。"
  "relation": "補充出3:16神吩咐招聚長老、出4:29摩西亞倫招聚眾長老、出18:12長老參與葉忒羅獻祭、出19:7摩西召長老陳明神話、出24:1長老與摩西同吃喝在神面前。利4章展示長老在贖罪祭中代表會眾按手，預表基督作教會元首承擔眾人之罪。"
- "title": "以色列人的官長"
