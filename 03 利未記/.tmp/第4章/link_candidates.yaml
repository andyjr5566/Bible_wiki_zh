    evidence: "利4:4,15,24,29,33 獻祭者/長老按手在祭牲頭上；CT: 按手表示獻祭人與祭牲合而為一、罪孽轉移；KC: 按手表達『把自己與這祭物認同、合為一』；BH: 按手是罪孽轉移至祭牲的關鍵動作"
