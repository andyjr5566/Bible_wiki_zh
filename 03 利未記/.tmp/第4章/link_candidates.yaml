    evidence: "v5-7、16-18、25、30、34「血」多次出現：彈血七次、抹壇角、倒壇腳。KC 指出血代表生命（利17:11），預表基督寶血贖罪。BH 解釋灑血預表基督之血潔淨信徒（約壹1:7）。"
