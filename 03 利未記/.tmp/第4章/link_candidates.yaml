  - name: "贖罪祭（chatta't）"
    type: "原文"
    evidence: "利未記4章核心主題：贖罪祭條例（v1-35），希伯來文 chatta't 意為「罪、贖罪祭」，表為誤犯罪而設的祭。BH、CCB、KC 均詳細解釋其字義、儀式與預表基督。"
    surfaces:
      - "贖罪祭"
      - {phrase: "供物", verses: [3, 14, 23, 28, 32]}
      - {phrase: "獻...為贖罪祭", verses: [3, 14, 23, 28, 32]}

  - name: "按手"
    type: "原文"
    evidence: "v4、15、24、29、33「按手在...頭上」，希伯來文 samak，表認同、轉移、委身。KC 指出此預表信徒與基督聯合（羅6:5），CCB 解釋為「獻祭的人與所獻的祭牲合而為一」。"
    surfaces:
      - "按手"

  - name: "贖罪"
    type: "神學"
    evidence: "v20、26、31、35「祭司要為他贖罪，他必蒙赦免」，希伯來文 kaphar（遮蓋、抹掉）。KC 指出贖罪預表基督寶血遮蓋罪惡；CCB 註解「祭物本身永不能除罪，反而叫人想起罪來」。"
    surfaces:
      - "贖罪"
      - "蒙赦免"
      - "赦免"

