- name: 頭禿與頂門禿
  type: 原文
  evidence: 利未記13:40-44 「人頭上的髮若掉了，他不過是頭禿，還是潔淨」；「他頂前若掉了頭髮，他不過是頂門禿，還是潔淨」。《精讀本》辨明兩詞：「根據原文頭禿有兩種：一種是『卡拉哈特』（qareach），指掉頭頂的頭髮（40節）；另一種是『嘎巴哈特』（gabbach），指掉了前部頭髮（41節）。這樣的禿頭是自然現象，是潔淨的。」丁良才補上文化背景：「以色列人以頭禿為羞，有時他們也以為頭禿是出於神的刑罰（王下2:23，賽3:17，耶48:37），但本節的意思說，人頭上的髮若掉了，未必是因長大痲瘋所致的。」《串珠》列為第五套檢驗法：「禿頭本身並非不潔淨，只是禿頭也和有頭髮的一樣，會患上嚴重的皮膚病。」禿處若有白中帶紅的災病，即為大痲瘋；丁良才指出此時「頭髮既是掉了，自然就沒有頭髮變白的現象」，故改看紅瘀肉與是否發散。
  surfaces:
  - 頭禿
  - 頂門禿
  - 禿處
