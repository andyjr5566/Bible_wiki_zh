    type: "原文"
    evidence: "利13:29-37「無論男女，若在頭上有災病，或是男人鬍鬚上有災病」；CT註解：頭疥為頭上或鬍鬚上的大痲瘋；BH：scalp/beard disease = specific location diagnosis"
