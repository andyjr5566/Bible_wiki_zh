    type: "原文"
    evidence: "利13:40-44「人頭上的髮若掉了，他不過是頭禿...頭禿處或是頂門禿處若有白中帶紅的災病，這就是大痲瘋」；CT註解：禿頭本身潔淨，但禿處長災病則不潔淨；BH：baldness = clean unless diseased"
