book: 利未記
chapter: 13
candidates:
  - name: 摩西
    type: 人物
    evidence: v1「耶和華曉諭摩西、亞倫說」，本章皮膚病診斷條例由摩西與亞倫同時領受
  - name: 亞倫和他兒子（祭司）
    type: 人物
    evidence: v2「就要將他帶到祭司亞倫或亞倫作祭司的一個子孫面前」，全章由祭司負責察看、隔離、判定潔淨或不潔淨的責任
  - name: 手長大痲瘋的神蹟
    type: 神學
    evidence: 該條目「主題發展」已預留「利未記13-14章有詳細潔淨條例」的伏筆，本章正是這套條例的具體展開
  - name: 米利暗
    type: 人物
    evidence: GT 丁良才註舉「他既是不潔淨，就要獨居營外」的歷史例證時點名米利暗（民十二15；民十9-10；申二十四9）
  - name: 大痲瘋（tsara'at，皮膚病診斷條例）
    type: 原文
    evidence: 全章核心術語；BH／舊約背景註釋／艾基斯《舊約聖經難題彙編》均指出希伯來文 tsara'at／sara'at 泛指多種嚴重皮膚病、衣物黴斑，並非等同現代漢森氏病（Hansen's disease）
    surfaces:
      - phrase: 大痲瘋
        verses: [2]
  - name: 大痲瘋是否等同於罪的懲罰之爭
    type: 解經爭議
    evidence: CT／KC 將本章逐一症狀都詮釋為信徒裡面某種罪性的顯露（癤子驕傲、癬不受約束、火斑自滿等）；GT《聖經精讀本》明確提醒「聖經並沒有說大痲瘋是犯罪的結果。只是有時作為人犯罪的代價（民12:10-15），耶穌對門徒說得非常清楚（約9:1-7）」
  - name: 患痲瘋者的哀悼記號（獨居營外）
    type: 主題
    evidence: v45-46「他的衣服要撕裂，也要蓬頭散髮，蒙著上唇，喊叫說：不潔淨了！不潔淨了！...就要獨居營外」
    surfaces:
      - phrase: 獨居營外
        verses: [46]
  - name: 衣服皮子的黴斑條例
    type: 主題
    evidence: v47-59 全段另立一套條例，處理羊毛、麻布、皮子上發綠發紅的黴斑，與人身皮膚病診斷條例（v1-46）並列但判準與處理方式不同（洗滌、撕去、焚燒）
    surfaces:
      - phrase: 染了大痲瘋災病的衣服
        verses: [47]
