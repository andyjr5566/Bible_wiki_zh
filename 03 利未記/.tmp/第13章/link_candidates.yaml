- name: 火毒（michveh）
  type: 原文
  evidence: 利未記13:24-28 「人的皮肉上若起了火毒，火毒的瘀肉成了火斑」——丁良才：「或作『人的皮肉若被火燒』，文理譯本作『如人之膚為火所灼』。」《串珠》：「火毒」即疤痕。《精讀本》指出此段的意義：「大麻風在火毒中發出，暗示著大麻風有可能因其他病變發生。」判準與第一套檢驗法相同：火斑中的毛變白、現象深於皮即為不潔；若無白毛、不窪於皮、乃是發暗，就關鎖七天；火斑若在原處止住沒有發散，「不過是火毒的痕跡」，定為潔淨。KC
    把火毒讀作易受刺激與惱怒：「若有事情惹惱我們，我們的反應是什麼？它可以走進內心的感覺裡，批評擴散開來，最後沒有一樣是好的。這種惱怒與苦毒的態度應當受審判。」
  surfaces:
  - 火毒
