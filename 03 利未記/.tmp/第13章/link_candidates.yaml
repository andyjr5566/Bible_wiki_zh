      - "鬍鬚上有災病"
  - name: "白癬（bohaq）"
    type: "原文"
    evidence: "利13:38-39「皮肉上若起了火斑，就是白火斑，這是皮上發出的白癬，那人是潔淨了」；CT註解：白癬非大痲瘋，潔淨；BH：white spots = benign condition"
    surfaces:
      - "白癬"
      - "白火斑"
