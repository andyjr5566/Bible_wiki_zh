book: 利未記
chapter: 13
updates:
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 利13:1-2 「耶和華曉諭摩西、亞倫說」——本章的察看條例同時交給摩西與亞倫。丁良才指出這是體例上的關鍵：人的肉皮上若長了癤子、癬或火斑，「就要將他帶到祭司亞倫，或亞倫作祭司的一個子孫面前」——「別人雖然認識大麻風病，卻沒有定人為潔與不潔的權柄，因為只有祭司可以負這審察災病的責任（申24:8）」。這正是利10:10-11 剛交給祭司的本業：分別聖俗、潔淨不潔淨，並教導百姓。
  relation: 亞倫與他的子孫在本章領受的不是醫治的職分，而是察看與宣告的職分——祭司只能定人為潔淨或不潔淨，不能使人痊癒。丁良才因此提醒祭司「不可急速地斷定」：把真長大痲瘋的人留在百姓中違背神的聖潔，把沒有大痲瘋的人趕出營外違背神的公義和恩典。
