"book": "利未記"
"chapter": !!int "13"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華曉諭摩西、亞倫說」：本章詳細的皮膚病診斷條例由摩西與亞倫同時領受。"
  "relation": "與利未記11章食物條例相同的雙人受命模式，因本章診斷責任落在亞倫及其祭司子孫身上，摩西與亞倫同列受命。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v2-59 全章反覆規定「祭司要察看」（3, 30, 50節等），亞倫及其祭司子孫是皮膚病與衣物黴斑的唯一診斷權柄。"
  "relation": "GT 丁良才註：別人雖然認識大痲瘋病，卻沒有定人為潔與不潔的權柄，因為只有祭司可以負這審察災病的責任（申24:8）；主耶穌醫好長大痲瘋者後，也吩咐他們去把身體給祭司察看（太8:4，路17:14），承認這一祭司職權。"
- "title": "手長大痲瘋的神蹟"
  "path": "link_folder/神學/手長大痲瘋的神蹟.md"
  "summary": "利未記13-14章正是該條目「主題發展」預留的伏筆「利未記13-14章有詳細潔淨條例」的具體展開：本章訂立完整的皮膚病診斷、隔離、潔淨判定程序。"
  "relation": "出埃及記4:6-8 摩西手長痲瘋又瞬間復原，是神在何烈山向摩西展示祂對痲瘋（罪的預表）的絕對主權；利未記13章則是這套主權在以色列日常生活中具體成文的診斷條例，由摩西與亞倫共同領受、交由祭司執行。"
- "title": "米利暗"
  "path": "link_folder/人物/米利暗.md"
  "summary": "GT 丁良才註在解釋v46「獨居營外」條例的歷史例證時，點名米利暗（民12:15）因罪染上大痲瘋、依此條例被隔離於營外七天。"
  "relation": "米利暗此時尚未在利未記敘事中出場（此事記載於民數記12章，是本卷尚未寫到的未來事件），GT 僅以她作為本章條例後來如何應用在真實歷史人物身上的例證；本條目待寫到民數記12章時再詳細補上她患病與痊癒的完整記載。"
