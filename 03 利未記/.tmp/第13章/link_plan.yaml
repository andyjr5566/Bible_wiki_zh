C_new_formal:
- name: 火毒（michveh）
  suggested_type: 原文
  evidence: 利未記13:24-28 「人的皮肉上若起了火毒，火毒的瘀肉成了火斑」——丁良才：「或作『人的皮肉若被火燒』，文理譯本作『如人之膚為火所灼』。」《串珠》：「火毒」即疤痕。《精讀本》指出此段的意義：「大麻風在火毒中發出，暗示著大麻風有可能因其他病變發生。」判準與第一套檢驗法相同：火斑中的毛變白、現象深於皮即為不潔；若無白毛、不窪於皮、乃是發暗，就關鎖七天；火斑若在原處止住沒有發散，「不過是火毒的痕跡」，定為潔淨。KC
    把火毒讀作易受刺激與惱怒：「若有事情惹惱我們，我們的反應是什麼？它可以走進內心的感覺裡，批評擴散開來，最後沒有一樣是好的。這種惱怒與苦毒的態度應當受審判。」
  surfaces:
  - phrase: 火毒
  target_path: link_folder/原文/火毒（michveh）.md
- name: 頭禿與頂門禿
  suggested_type: 原文
  evidence: 利未記13:40-44 「人頭上的髮若掉了，他不過是頭禿，還是潔淨」；「他頂前若掉了頭髮，他不過是頂門禿，還是潔淨」。《精讀本》辨明兩詞：「根據原文頭禿有兩種：一種是『卡拉哈特』（qareach），指掉頭頂的頭髮（40節）；另一種是『嘎巴哈特』（gabbach），指掉了前部頭髮（41節）。這樣的禿頭是自然現象，是潔淨的。」丁良才補上文化背景：「以色列人以頭禿為羞，有時他們也以為頭禿是出於神的刑罰（王下2:23，賽3:17，耶48:37），但本節的意思說，人頭上的髮若掉了，未必是因長大痲瘋所致的。」《串珠》列為第五套檢驗法：「禿頭本身並非不潔淨，只是禿頭也和有頭髮的一樣，會患上嚴重的皮膚病。」禿處若有白中帶紅的災病，即為大痲瘋；丁良才指出此時「頭髮既是掉了，自然就沒有頭髮變白的現象」，故改看紅瘀肉與是否發散。
  surfaces:
  - phrase: 頭禿
  - phrase: 頂門禿
  - phrase: 禿處
  target_path: link_folder/原文/頭禿與頂門禿.md
