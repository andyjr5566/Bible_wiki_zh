name: 白毛（se'ar laban）
type: 原文
secondary_types: []
aliases:
- 白毛
- 毛變白
status: formal
definition: 希伯來文 se'ar laban，指患處的毛髮變白。在利未記第13章中，這是判定大痲瘋災病是否為不潔淨的關鍵症狀之一。若災病處的毛已經變白，且現象深於皮，祭司便定其為不潔淨。然而在頭疥的判定中，則是觀察是否有「細黃毛」作為不潔淨的依據。
accumulations:
- book: 利未記
  chapter: 13
  summary: 本章多處提及毛變白作為判定大痲瘋的標準，如第3、10、20、25、30節等。
  relation: 白毛是本章中辨識嚴重災病（不潔淨）的具體生理指標，與「現象深於皮」同為定罪的關鍵證據。
related_entries:
- 大痲瘋（tzara'at）
- 現象深於皮（ma'amar amok min ha'or）
- 祭司察看（kohen ra'ah）
- 頭疥（neteq ba-rosh）
