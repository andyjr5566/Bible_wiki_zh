name: 現象深於皮（ma'amar amok min ha'or）
type: 原文
secondary_types: []
aliases:
- 現象深於皮
- 窪於皮
status: formal
definition: 希伯來文 ma'amar amok min ha'or，指皮膚患處的病變現象比周圍的皮膚更深或更低陷。在利未記第13章中，這是祭司判定大痲瘋不潔淨的另一個關鍵標準。若災病現象深於皮且伴有白毛，即被定為大痲瘋；若現象不深於皮，則需關鎖七天觀察。
accumulations:
- book: 利未記
  chapter: 13
  summary: 本章第3、20、25、30節等處皆將「現象深於皮」作為判定災病嚴重性與不潔淨的核心標準之一。
  relation: 此症狀與白毛共同構成大痲瘋的確診條件，顯示病變已深入皮膚組織，具備禮儀上的傳染性與不潔。
related_entries:
- 大痲瘋（tzara'at）
- 白毛（se'ar laban）
- 祭司察看（kohen ra'ah）
- 頭疥（neteq ba-rosh）
