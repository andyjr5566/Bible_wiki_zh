name: 白癬（bohaq）
type: 原文
secondary_types: []
aliases:
- 白癬
status: formal
definition: 希伯來文 bohaq，指皮膚上出現的白火斑。在利未記第13章中，無論男女若皮肉上起了白中帶黑的火斑，祭司察看後確認這是皮上發出的白癬，那人即被定為潔淨。此病不具備大痲瘋的傳染性與不潔淨特徵。
accumulations:
- book: 利未記
  chapter: 13
  summary: 第38至39節記載了白癬的判定，指出白中帶黑的火斑即為白癬，患者為潔淨。
  relation: 白癬是本章中明確被判定為潔淨的皮膚現象，與不潔淨的大痲瘋形成對比，顯示並非所有皮膚異常都會導致隔離。
related_entries:
- 大痲瘋（tzara'at）
- 祭司察看（kohen ra'ah）
