name: 貧窮
type: 主題
secondary_types:
- 神學
- 社會倫理
aliases:
- 窮乏
- 貧苦
status: formal
definition: 本章以「漸漸窮乏」（māḵar, v.25, 35, 39, 47）描述以色列人因經濟逆境喪失產業或自由的過程。經文建立三層保護機制：(1)
  地業層面——至近親屬贖回（v.25），禧年強制歸還（v.28）；(2) 生活層面——幫補使其與你同住，不可取利、不可多要（v.35-37）；(3) 人身自由層面——賣身只可作雇工人至禧年，不可作奴僕（v.39-40,
  46）。貧窮不被視為道德失敗，而是立約共同體須共同承擔的現實，神的救贖歷史（領出埃及，v.38, 42, 55）是幫補窮乏弟兄的神學基礎。
development: 從物質匱乏延伸至人身自由受限，再到禧年完全恢復，展現「貧窮」在禧年神學中是暫態而非終態，預表福音中「靈裡貧窮的人有福了」（太5:3）與基督宣告「報恩年」（路4:18-19）。
accumulations:
- book: 利未記
  chapter: 25
  summary: 詳細規範貧窮弟兄在產業、借貸、人身自由三方面的法律保障，並以「我是耶和華你們的神」為動機。
  relation: 本章社會倫理條文的核心動機，驅動地業贖回、禁止取利、禧年釋放等所有保護條款。
