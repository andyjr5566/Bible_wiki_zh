name: 禧年（yobel）
type: 神學
secondary_types: []
aliases:
- 禧年
status: formal
definition: 希伯來文 yobel（יוֹבֵל），意指「公羊角」或「吹角之年」。利未記 25:8-13, 28, 30-31, 33, 40-41, 50,
  52, 54 規定：每七個安息年（四十九年）後的第五十年為禧年。當年七月初十日贖罪日，要在遍地大發角聲，給一切居民宣告自由。這年不可耕種、不可收割自長的莊稼、不可摘取沒修理的葡萄樹，要吃地中自出的土產。各人要歸自己的產業，各歸本家。賣地者在禧年地業要出買主的手歸回原主；城內住宅若一年內未贖回則永歸買主，但無城牆村莊房屋與利未人城邑房屋在禧年要出買主的手。賣身為雇工人者，到了禧年要和兒女一同出去歸回本家、祖宗的地業。以色列人賣給外人若未被贖，禧年也要出去得自由。禧年體現「地是耶和華的」（25:23）與「以色列人是耶和華的僕人」（25:55）的神學核心。
development: 禧年制度將安息年原則推展至社會經濟層面，定期重置產業歸屬與人身自由，防止貧富懸殊固化，預表彌賽亞時代的終極釋放（賽 61:1-2；路 4:18-19）。
