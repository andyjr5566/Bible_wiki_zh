name: 禧年宣告自由與地業歸還
type: 神學
secondary_types: []
aliases:
- 宣告自由
- 地業歸回
status: formal
definition: 禧年的核心神學意義在於神的要求完全得著滿足，責任已經卸除，大得自由。在遍地給一切的居民宣告自由，表徵不再受約束，得著自由的釋放。各人要歸自己的產業，各歸本家，表徵神所賜屬靈的產業是平等且永遠的。這不僅適用於當日的以色列人，也預表恩典時代主耶穌成功了救恩，使人自由並歸回失去的產業。
accumulations:
- book: 利未記
  chapter: 25
  summary: 第10節明確指出第五十年要當作聖年，在遍地給一切的居民宣告自由，各人要歸自己的產業，各歸本家。
  relation: 本章直接確立了禧年作為「宣告自由」與「地業歸還」的神學預表，指向神終極的救贖與恢復。
related_entries:
- 禧年（yovel，第五十年）
- 地不可永賣（地權屬神）
- 弟兄賣身為奴不可像奴僕看待
sources:
