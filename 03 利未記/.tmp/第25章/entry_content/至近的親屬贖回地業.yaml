status: formal
definition: 利未記 25 章 25-28 節規定，若以色列人因貧窮賣地，其至近的親屬（goel）有責任贖回。贖回價值按賣地至禧年的剩餘年數計算（第 27
  節）。若無親屬贖回，賣主自己富足也可自贖（第 26-27 節）。若都不能贖回，地業仍存買主手中直到禧年，禧年必歸回原主（第 28 節）。此制度保障家族產業不流失，體現族群互助責任。
development: 路得記 4 章波阿斯作至近親屬贖回以利米勒產業並娶路得，是此條例最著名實例。新約希伯來書 2:11, 14-15 將基督視為人類的「至近親屬」，藉道成肉身贖回人類產業。猶太傳統將
  goel 視為預表彌賽亞救贖角色。
accumulations:
- book: 利未記
  chapter: 25
  summary: 規定至近親屬有責任贖回賣地，價值按剩餘年數計算，禧年自動歸回（25-28 節）。
  relation: 本章土地贖回制度的核心操作條款，配合地不可永賣神學。
