name: 禧年土地贖回計算法（按距禧年年數定價）
type: 主題
secondary_types: []
aliases:
- 禧年定價法
- 土地贖回計算
status: formal
definition: 以色列人買賣土地的價格以禧年為標準設定。買賣時要按距離下次禧年的年數計算，因為到了禧年所有土地都要回到原主人手中。年歲若多，要照數加添價值；年歲若少，要照數減去價值，因為他照收成的數目賣給人。若要贖回，就要算出賣地的年數，把餘剩年數的價值還那買主。
accumulations:
- book: 利未記
  chapter: 25
  summary: 第15至16節及第27節詳細記載了土地買賣與贖回的計算方式，必須按距禧年的年數和收成數目來定價。
  relation: 本章提供了按距禧年年數定價的具體律法依據，確保交易公平並維護禧年地業歸回的原則。
related_entries:
- 禧年（yovel，第五十年）
- 地不可永賣（地權屬神）
- 救贖goel
