name: 禧年（yovel，第五十年）
type: 原文
secondary_types: []
aliases:
- 禧年
status: formal
definition: 「禧年」在希伯來文原為「公羊角」或「吹角」的意思，表示歡樂或節慶。每當七個安息年之後，第五十年為禧年，要在遍地吹號角，宣告禧年，不可耕作收割，要享受安息。當年七月初十日（贖罪日）要大發角聲，在遍地給一切的居民宣告自由，各人要歸自己的產業，各歸本家。
accumulations:
- book: 利未記
  chapter: 25
  summary: 詳細記載了禧年的計算方式（七個安息年後的第五十年）、宣告時機（贖罪日發角聲）及其核心條例（宣告自由、地業歸回、不可耕種）。
  relation: 本章是禧年（yovel）條例的最主要來源與定義出處，確立了其作為「聖年」與「自由年」的神學基礎。
related_entries:
- 禧年宣告自由與地業歸還
- 地不可永賣（地權屬神）
- 禧年土地贖回計算法（按距禧年年數定價）
