name: 兄弟
type: 人物
secondary_types:
- 神學
aliases:
- 弟兄
- 同胞
status: formal
definition: 本章「兄弟」一詞（希伯來文 ʾāḥ）專指以色列同胞，即立約共同體內的同族人（v.25, 35, 39, 46, 47）。經文反覆強調「你的弟兄」在經濟困境時（賣地、賣身）享有特殊保障：至近親屬有贖回義務（v.25,
  48-49），不可向他取利或多要（v.36-37），不可叫他像奴僕服事，只可視為雇工人與寄居者直到禧年（v.39-40, 46），且嚴禁嚴嚴轄管（v.43, 46,
  53）。這反映神將以色列人視為「我的僕人」（v.42, 55），彼此屬於同一主權者，故不可視為永久財產。
development: 從「至近親屬贖回地業」（v.25）延伸至「贖回賣身給外人的弟兄」（v.48-49），顯示兄弟關係在禧年法典中具有法律救贖功能，預表基督作真正的「至近親屬」（goʾēl）救贖屬靈貧窮的弟兄（來2:11-12）。
accumulations:
- book: 利未記
  chapter: 25
  summary: 規定弟兄賣地、賣身時的贖回權利、禁止取利、禧年釋放等條例，確立兄弟在立約共同體中的特殊法律地位。
  relation: 本章核心人物類別，貫串地業贖回、貧窮幫補、賣身限制、禧年歸回等所有條文。
