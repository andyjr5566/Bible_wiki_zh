status: formal
definition: 本章用「本家」（v.10, 13, 41）、「伯叔、伯叔的兒子、本家的近支」（v.49）、「宗族」（mišpāḥâ, v.47）指稱以色列支派下的氏族單位。宗族在禧年法典中扮演三重角色：(1)
  產業歸屬單位——禧年各人歸自己的產業、歸本家（v.10, 13, 41）；(2) 贖回責任主體——至近親屬（goʾēl）優先從宗族內產生（v.25, 48-49）；(3)
  外人購買以色列奴僕的對象——「外人的宗族」（v.47）可買以色列人，但宗族內部有贖回優先權（v.49）。宗族結構確保產業不永久流失至族外，維繫「地是我的」（v.23）的神學現實。
development: 宗族作為「至近親屬贖回」的制度載體，預表新約中教會作為「神的家」（提前3:15）承擔彼此擔當、恢復跌倒肢體的功能（加6:1-2）。
accumulations:
- book: 利未記
  chapter: 25
  summary: 規定禧年歸回本家、宗族成員贖回賣地賣身弟兄的優先順序，以及外人宗族購買以色列奴僕的情況。
  relation: 禧年產業歸回與贖回制度的操作單位，連結地業法、奴僕法與外人法。
