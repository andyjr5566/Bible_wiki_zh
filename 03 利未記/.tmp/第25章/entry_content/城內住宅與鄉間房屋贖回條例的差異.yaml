name: 城內住宅與鄉間房屋贖回條例的差異
type: 主題
secondary_types: []
aliases:
- 城內住宅條例
- 鄉間房屋條例
status: formal
definition: 城內的住宅（有城牆的城）賣了以後，一年之內可以贖回；若在一整年之內不贖回，就定準永歸買主，在禧年也不得出買主的手。但房屋在無城牆的村莊裡，要看如鄉下的田地一樣，可以隨時贖回；到了禧年，都要出買主的手。這差異在於城內住宅與土地耕耘無直接關聯，而鄉間房屋被視為土地的附屬。
accumulations:
- book: 利未記
  chapter: 25
  summary: 第29至31節區分了有城牆城內的住宅與無城牆村莊房屋的贖回條例，前者限期一年且禧年不歸回，後者視同田地可贖回且禧年歸回。
  relation: 本章明確界定了不同類型房屋在禧年條例下的差異待遇，反映了都市與農業用地在社會功能上的區別。
related_entries:
- 禧年（yovel，第五十年）
- 利未人城邑房屋隨時贖回
- 地不可永賣（地權屬神）
