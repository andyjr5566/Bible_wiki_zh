name: 城內住宅贖回權
type: 主題
secondary_types: []
aliases:
- 城內房屋贖回
- 一年贖回權
status: formal
definition: 利未記 25 章 29-30 節規定，城內住宅賣出後，賣主有一整年贖回權。若滿一年未贖回，房屋永歸買主世世代代為業，禧年也不得出買主手。這與農地、無城牆村莊房屋、利未人城邑房屋的贖回規定不同，反映城內房產屬商業性質，不涉及家族生存產業。
development: 尼希米記 5 章記載被擄歸回後猶太貴族違背此精神，強迫窮人典當田產房屋，尼希米責備並命令歸還。拉比文獻（米示拿《巴比米茲亞篇》9:11-12）詳細討論「城內」定義與一年期限計算。現代應用常對比農地保護法與都市房產交易法制差異。
accumulations:
- book: 利未記
  chapter: 25
  summary: 規定城內住宅賣後一年內可贖回，過期永歸買主，禧年不歸回（29-30 節）。
  relation: 本章房產贖回條例中唯一有期限限制且禧年不歸回的類別。
