name: 兒女
type: 人物
secondary_types:
- 神學
aliases:
- 子女
- 兒女們
status: formal
definition: 本章「兒女」（bānîm）出現於兩個禧年釋放場景：(1) 以色列弟兄賣身為雇工人，禧年「他和他兒女要離開你，一同出去歸回本家」（v.41）；(2)
  賣身給外人未被贖回，禧年「要和他的兒女一同出去」（v.54）。兒女不屬於買主，隨父親同享禧年自由，歸回祖宗地業。這反映家庭單位在禧年法典中不可分割，父親的身份與產業地位自動延伸至下一代，確保家族在神面前的完整性（v.23,
  55）。
development: 兒女隨父歸回本家預表「兒女們既同有血肉之體，祂也照樣親自成了血肉之體」（來2:14），基督作長子領許多兒女進榮耀（來2:10），在禧年終極實現中全家得贖。
accumulations:
- book: 利未記
  chapter: 25
  summary: 規定賣身弟兄的兒女在禧年隨父親一同獲得自由、歸回本家與祖宗地業，不屬買主所有。
  relation: 禧年釋放條款的受益對象，顯示家庭整體在神主權下的贖回完整性。
