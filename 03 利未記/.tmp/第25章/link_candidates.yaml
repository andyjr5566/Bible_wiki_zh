candidates:
  # === C 類：全新條目 ===
  - name: 安息年條例
    type: 主題
    evidence: "利25:2-7 你們到了我所賜你們那地的時候，地就要向耶和華守安息。六年要耕種田地，第七年地要守聖安息，不可耕種田地，也不可修理葡萄園。遺落自長的莊稼不可收割；沒有修理的葡萄樹也不可摘取葡萄。這年，地要守聖安息。地在安息年所出的，要給你和你的僕人、婢女、雇工人，並寄居的外人當食物。這年的土產也要給你的牲畜和你地上的走獸當食物。CT：安息年表徵神的要求完全得著滿足，責任已經卸除，大得自由。KC：以色列人進迦南第二十一年才守第一個安息年。BH：安息年讓土地休耕，減低鹽漬化速度，預表基督裡的安息。"
    surfaces: ["安息年", "地要向耶和華守安息", "第七年地要守聖安息", "遺落自長的莊稼不可收割", "地在安息年所出的"]

  - name: 禧年條例
    type: 主題
    evidence: "利25:8-13 你要計算七個安息年，就是七七年，共是四十九年。當年七月初十日，你要大發角聲；這日就是贖罪日，要在遍地發出角聲。第五十年，你們要當作聖年，在遍地給一切的居民宣告自由。這年必為你們的禧年，各人要歸自己的產業，各歸本家。第五十年要作為你們的禧年。這年不可耕種；地中自長的，不可收割；沒有修理的葡萄樹也不可摘取葡萄。因為這是禧年，你們要當作聖年，吃地中自出的土產。這禧年，你們各人要歸自己的地業。CT：禧年表徵神的要求完全得著滿足，責任已經卸除，大得自由。KC：禧年從贖罪日吹角開始，預表基督從天上至聖所出來與百姓顯現。BH：禧年每五十年一次，宣告自由、歸回產業、釋放奴僕。"
    surfaces: ["禧年", "七個安息年", "四十九年", "大發角聲", "贖罪日", "宣告自由", "各人要歸自己的產業", "各歸本家", "第五十年"]

  - name: 地不可永賣
    type: 神學
    evidence: "利25:23 地不可永賣，因為地是我的；你們在我面前是客旅，是寄居的。CT：神是全宇宙的主人，人只不過是管家。土地是神所創造，神對土地理所當然擁有所有權。BH：土地屬耶和華，以色列人只是佃戶，禧年時所有抵押土地歸回原主。"
    surfaces: ["地不可永賣", "因為地是我的", "你們在我面前是客旅", "是寄居的"]

  - name: 至近的親屬贖回地業
    type: 主題
    evidence: "利25:25 你的弟兄若漸漸窮乏，賣了幾分地業，他至近的親屬就要來把弟兄所賣的贖回。CT：至近的親屬預表主耶穌，世人原來承受了美好的基業，卻因犯罪將自己的基業賣了，但基督降世為人，做了我們至近的親屬，贖回了我們的基業。KC：贖回產業的近親包括親弟兄、伯叔、伯叔的兒子、本家的近支。BH：goel（救贖親屬）制度，波阿斯與路得為例。"
    surfaces: ["至近的親屬", "贖回", "弟兄所賣的贖回"]

  - name: 城內住宅贖回權
    type: 主題
    evidence: "利25:29-30 人若賣城內的住宅，賣了以後，一年之內可以贖回；在一整年，必有贖回的權柄。若在一整年之內不贖回，這城內的房屋就定準永歸買主，世世代代為業；在禧年也不得出買主的手。CT：城內的住宅表徵教會，教會的屬靈情況在一定的期限內，必須悔改回轉。KC：城內住宅多是商界、工界和外人的住處，神准隨意出賣。BH：有牆城市房屋一年內可贖回，一年後永歸買主，禧年也不歸還。"
    surfaces: ["城內的住宅", "一年之內可以贖回", "贖回的權柄", "永歸買主", "世世代代為業"]

  - name: 無城牆村莊房屋如田地
    type: 主題
    evidence: "利25:31 但房屋在無城牆的村莊裡，要看如鄉下的田地一樣，可以贖回；到了禧年，都要出買主的手。CT：房屋在無城牆的村莊裡表徵開放自由交流的團契，則不受期限的限制。KC：無城牆村莊房屋視同田地，可隨時贖回，禧年歸還。"
    surfaces: ["無城牆的村莊", "看如鄉下的田地", "可以贖回", "到了禧年都要出買主的手"]

  - name: 利未人城邑房屋永遠可贖回
    type: 主題
    evidence: "利25:32-34 然而利未人所得為業的城邑，其中的房屋，利未人可以隨時贖回。若是一個利未人不將所賣的房屋贖回，是在所得為業的城內，到了禧年就要出買主的手，因為利未人城邑的房屋是他們在以色列人中的產業。只是他們各城郊野之地不可賣，因為是他們永遠的產業。CT：利未人表徵奉神選召將身體獻上事奉神的人，他們的事奉都是在教會裏。KC：利未人沒有別的地業，只有四十八座城邑及其郊野。BH：利未人房屋永遠可贖回，禧年歸還；郊野地不可賣。"
    surfaces: ["利未人所得為業的城邑", "利未人可以隨時贖回", "到了禧年就要出買主的手", "郊野之地不可賣", "永遠的產業"]

  - name: 幫補窮乏弟兄不可取利
    type: 主題
    evidence: "利25:35-37 你的弟兄在你那裡若漸漸貧窮，手中缺乏，你就要幫補他，使他與你同住，像外人和寄居的一樣。不可向他取利，也不可向他多要；只要敬畏你的神，使你的弟兄與你同住。你借錢給他，不可向他取利；借糧給他，也不可向他多要。CT：幫助弟兄有力量活動事奉、運用恩賜。借糧給他，不可多要——給弟兄一點供應，沒有要求報還多於你給他的。KC：這條例是論對待窮人的道理，不是關係借款經商等一切的事。BH：禁止向同胞收利息，反映神的公義與憐憫。"
    surfaces: ["幫補他", "不可向他取利", "不可向他多要", "敬畏你的神", "借錢給他不可向他取利", "借糧給他也不可向他多要"]

  - name: 弟兄賣身為雇工人直到禧年
    type: 主題
    evidence: "利25:39-43 你的弟兄若在你那裡漸漸窮乏，將自己賣給你，不可叫他像奴僕服事你。他要在你那裡像雇工人和寄居的一樣，要服事你直到禧年。到了禧年，他和他兒女要離開你，一同出去歸回本家，到他祖宗的地業那裡去。因為他們是我的僕人，是我從埃及地領出來的，不可賣為奴僕。不可嚴嚴地轄管他，只要敬畏你的神。CT：對待主內弟兄姊妹，不可有優越感的態度。KC：以色列人做奴僕的限期須以六年為滿，但在期內若遇禧年，雖然限期未滿，這等僕人也要得釋放。BH：希伯來奴僕第七年或禧年釋放，不可嚴厲轄管。"
    surfaces: ["將自己賣給你", "不可叫他像奴僕服事你", "像雇工人和寄居的一樣", "服事你直到禧年", "到了禧年他和他兒女要離開你", "因為他們是我的僕人", "不可賣為奴僕", "不可嚴嚴地轄管他"]

  - name: 外邦奴僕可永遠為業
    type: 主題
    evidence: "利25:44-46 至於你的奴僕、婢女，可以從你四圍的國中買。並且那寄居在你們中間的外人和他們的家屬，在你們地上所生的，你們也可以從其中買人；他們要作你們的產業。你們要將他們遺留給你們的子孫為產業，要永遠從他們中間揀出奴僕；只是你們的弟兄以色列人，你們不可嚴嚴地轄管。CT：至於事奉神的人，可以另外在不信的外邦人中，帶領人蒙恩得救，他們也會記在你的帳上。KC：外邦奴僕可永遠為業，但以色列人不可嚴厲轄管同胞。BH：外邦奴僕可世代相傳，但希伯來同胞不可永久奴役。"
    surfaces: ["奴僕婢女可以從四圍的國中買", "寄居在你們中間的外人", "他們要作你們的產業", "遺留給你們的子孫為產業", "永遠從他們中間揀出奴僕"]

  - name: 以色列人賣給外人可被贖回
    type: 主題
    evidence: "利25:47-55 住在你那裡的外人，或是寄居的，若漸漸富足，你的弟兄卻漸漸窮乏，將自己賣給那外人，或是寄居的，或是外人的宗族。賣了以後，可以將他贖回。無論是他的弟兄，或伯叔、伯叔的兒子，本家的近支，都可以贖他。他自己若漸漸富足，也可以自贖。他要和買主計算，從賣自己的那年起，算到禧年；所賣的價值照著年數多少，好像工人每年的工價。若缺少的年數多，就要按著年數從買價中償還他的贖價。若到禧年只缺少幾年，就要按著年數和買主計算，償還他的贖價。他和買主同住，要像每年雇的工人，買主不可嚴嚴地轄管他。他若不這樣被贖，到了禧年，要和他的兒女一同出去。因為以色列人都是我的僕人，是我從埃及地領出來的。我是耶和華你們的神。CT：主內的弟兄，可能因為靈性貧窮軟弱，而流落到世界中，這時，身邊的弟兄可以幫助他，或者他自己回轉歸主。KC：goel 贖回義務包括：替賣身為奴或賣田地無力贖回的親屬贖身或贖田；近親若無子嗣承受產業，要娶他的遺孀；為無故受害的親人報仇。BH：以色列人賣給外邦人可隨時贖回，禧年自動釋放。"
    surfaces: ["外人若漸漸富足", "弟兄卻漸漸窮乏", "將自己賣給那外人", "可以將他贖回", "伯叔、伯叔的兒子、本家的近支", "自贖", "和買主計算", "按著年數償還贖價", "像每年雇的工人", "買主不可嚴嚴地轄管他", "到了禧年要和他的兒女一同出去", "以色列人都是我的僕人"]

