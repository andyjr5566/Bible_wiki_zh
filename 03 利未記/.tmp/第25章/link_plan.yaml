  suggested_type: 主題
  evidence: 利25:2-7 你們到了我所賜你們那地的時候，地就要向耶和華守安息。六年要耕種田地，第七年地要守聖安息，不可耕種田地，也不可修理葡萄園。遺落自長的莊稼不可收割；沒有修理的葡萄樹也不可摘取葡萄。這年，地要守聖安息。地在安息年所出的，要給你和你的僕人、婢女、雇工人，並寄居的外人當食物。這年的土產也要給你的牲畜和你地上的走獸當食物。CT：安息年表徵神的要求完全得著滿足，責任已經卸除，大得自由。KC：以色列人進迦南第二十一年才守第一個安息年。BH：安息年讓土地休耕，減低鹽漬化速度，預表基督裡的安息。
  surfaces:
