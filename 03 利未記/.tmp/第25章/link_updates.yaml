book: "03 利未記"
chapter: 25
updates:
- title: "安息日"
  path: "link_folder/神學/安息日.md"
  summary: "利25:2,4,6,8 地要向耶和華守安息；第七年地要守聖安息；地在安息年所出的；你要計算七個安息年。安息年將安息日原則延伸至年度。"
  relation: "本章將安息日原則（每七日）延伸為安息年（每七年）與禧年（七個七年），確立時間聖潔的層級結構，呼應出16、20、23、31、35、利19、23 章安息日條例。"
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "利25:6,23,35,40,45,47 地在安息年所出的要給寄居的外人當食物；你們在我面前是客旅，是寄居的；使他與你同住，像外人和寄居的一樣；寄居在你們中間的外人；住在你那裡的外人，或是寄居的。寄居者在安息年、禧年同享同受條例。"
  relation: "本章將寄居者納入安息年食物分配、禧年產業歸回、窮乏幫補、雇工待遇等多重保障條例，體現聖會共同體法律平等的邊界。"
- title: "埃及地"
  path: "link_folder/地點/埃及地.md"
  summary: "利25:38,42,55 我是耶和華你們的神，曾領你們從埃及地出來，為要把迦南地賜給你們，要作你們的神；因為他們是我的僕人，是我從埃及地領出來的；因為以色列人都是我的僕人，是我從埃及地領出來的。出埃及救贖為禧年條例的神學基礎。"
  relation: "本章三次引用出埃及救贖（v38,42,55）作為禧年條例（產業歸回、奴僕釋放、公平待人）的神學根基，呼應利19:34,20:24,26:13,45 救贖與聖潔的神學邏輯。"
- title: "迦南地"
  path: "link_folder/地點/迦南地.md"
  summary: "利25:2,38 你們到了我所賜你們那地的時候；為要把迦南地賜給你們。安息年、禧年在迦南地生效。"
  relation: "本章將安息年、禧年條例與進入迦南地掛鉤，體現應許之地生活的聖潔節奏。"
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "利25:1 耶和華在西乃山對摩西說。摩西作為禧年條例傳遞者。"
  relation: "本章摩西繼續其立法者角色，傳遞聖潔法典（利17-26）中產業與社會正義條例的核心章節。"
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "利25:2,17,38,46,55 曉諭以色列人；你們彼此不可虧負；我是耶和華你們的神；只是你們的弟兄以色列人；以色列人都是我的僕人。條例針對全會眾。"
  relation: "本章將產業、奴僕、貸款條例頒布給全體以色列人，確立會眾在產業管理與社會正義上的集體責任。"
- title: "亞倫和他兒子（祭司）"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利25:32-33 利未人所得為業的城邑，其中的房屋，利未人可以隨時贖回。利未人作為祭司體系一部分享有特殊產業權利。"
  relation: "本章賦予利未人（祭司體系）城邑房屋永遠可贖回的特殊產業權利，作為利21-22章祭司條例的產業應用層面。"
- title: "世世代代"
  path: "link_folder/神學/世世代代.md"
  summary: "利25:10,23,30,34,41,46 這在你們一切住處作為世世代代永遠的定例；世世代代為業；永遠的產業。禧年條例具有代際延續性。"
  relation: "本章六次重複「世世代代」或「永遠」，將禧年產業歸回、奴僕釋放、利未人產業確立為跨越歷史的約束性規範。"
- title: "敬畏神"
  path: "link_folder/神學/敬畏神.md"
  summary: "利25:17,36,43 你們彼此不可虧負，只要敬畏你們的神；只要敬畏你的神，使你的弟兄與你同住；不可嚴嚴地轄管他，只要敬畏你的神。敬畏神為公義待人的動力。"
  relation: "本章三次以「敬畏神」作為公平買賣、免息借貸、仁慈待僕的動力根基，呼應利19:14,32,25:17,36,43 敬畏與公義的連結。"
- title: "至聖"
  path: "link_folder/神學/至聖.md"
  summary: "利25:12 因為這是禧年，你們要當作聖年。禧年為聖年。"
  relation: "本章將禧年定為聖年，確立時間聖潔的最高層級（禧年>安息年>安息日），呼應利23 節期聖會體系。"
- title: "祭司"
  path: "link_folder/人物/亞倫和他兒子（祭司）.md"
  summary: "利25:32-33 利未人所得為業的城邑，其中的房屋，利未人可以隨時贖回。利未人作為祭司體系一部分。"
  relation: "本章確立利未人（祭司體系）在產業法上的特殊地位：城邑房屋永遠可贖回、郊野地不可賣，作為利21-22章祭司條例的產業應用層面。"
- title: "律例"
  path: "link_folder/神學/律例.md"
  summary: "利25:18 我的律例，你們要遵行，我的典章，你們要謹守。遵行律例典章得安然居住。"
  relation: "本章將遵行禧年律例與安然居住、豐收飽足掛鉤，確立順服與福分的因果關係，呼應利26:3-13 順服蒙福條例。"
- title: "典章"
  path: "link_folder/神學/典章.md"
  summary: "利25:18 我的律例，你們要遵行，我的典章，你們要謹守。典章為審判判例。"
  relation: "本章將典章與律例並列為順服對象，確立司法判例在社會正義中的權威地位。"
- title: "雇工人"
  path: "link_folder/人物/雇工人.md"
  summary: "利25:6,40,50,53 地在安息年所出的要給雇工人當食物；他要在你那裡像雇工人和寄居的一樣；所賣的價值照著年數多少，好像工人每年的工價；他和買主同住，要像每年雇的工人。雇工人待遇為準則。"
  relation: "本章將雇工人待遇作為希伯來奴僕待遇、贖價計算、安息年食物分配的公平基準，體現勞工權益保障。"
- title: "外人"
  path: "link_folder/人物/外人.md"
  summary: "利25:35,44,45,47 使他與你同住，像外人和寄居的一樣；至於你的奴僕婢女，可以從你四圍的國中買；並且那寄居在你們中間的外人和他們的家屬；住在你那裡的外人，或是寄居的。外人可買為奴僕，寄居者同受保護。"
  relation: "本章區分外人（可永久為奴僕）與寄居者/弟兄（享禧年釋放、免息借貸、雇工待遇），確立立約共同體邊界內外的法律差別待遇。"