"book": "利未記"
"chapter": !!int "25"
"updates":
- "title": "安息年律例"
  "path": "link_folder/事件/安息年律例.md"
  "summary": "v1-7「地就要向耶和華守安息。六年要耕種田地...第七年，地要守聖安息...遺落自長的莊稼不可收割...地在安息年所出的，要給你和你的僕人、婢女、雇工人，並寄居的外人當食物」。GT啟導本：設立安息年的目的有讓勞作者得到休息、讓貧苦寄居者得到糧食、讓土地自身得到休息與調節等。"
  "relation": "本章是安息年條例最完整詳盡的頒布之處，涵蓋六年耕種、第七年守安息、土產分享等具體規定。"
- "title": "安息年"
  "path": "link_folder/神學/安息年.md"
  "summary": "v1-7,18-22安息年的神學意義。KC：安息年每七年一次，都是千年國度平安的預表；CT〔靈意註解〕：「地」表徵代表一切受造之物，受人犯罪的影響，一同嘆息勞苦，指望脫離敗壞的轄制，得享神兒女自由的榮耀（參羅八20-21）。"
  "relation": "本章是安息年神學意涵最系統的展開，將土地休耕與受造之物的救贖盼望相連。"
- "title": "古代近東安息年"
  "path": "link_folder/背景/古代近東安息年.md"
  "summary": "v1-7對照古代近東農業休耕習俗。GT《舊約聖經背景註釋》：讓土地休息的好處，是減低鹽漬化速度，灌溉是鹽漬化的主因，土壤養分耗盡和鹽量高而成災，是美索不達米亞田地大幅丟空的原因，烏加列文獻也提到七年的耕作循環。"
  "relation": "本章的安息年條例與古代近東農業循環習俗形成對比與呼應，顯示其兼具屬靈與實際農業智慧。"
- "title": "出23：10-11安息年執行"
  "path": "link_folder/解經爭議/出23：10-11安息年執行.md"
  "summary": "v2-7對照出埃及記23:10-11既有的安息年條例。GT丁良才：論神設立安息年的六個緣故可參出二十三10-11注；GT《舊約聖經背景註釋》：這一套規定每逢第七年休耕田地的律法，與出埃及記二十三10-11對應，然而用安息一詞來形容第七年，卻只有本段經文。"
  "relation": "本章利未記25章是出埃及記23:10-11安息年條例的完整展開，並涉及以色列史上實際執行情況（代下三十六20-21記載未守安息年而被擄）。"
- "title": "救贖goel"
  "path": "link_folder/神學/救贖goel.md"
  "summary": "v25-34,47-55至近的親屬贖回地業與人身的完整條例。GT丁良才：可贖弟兄之地業的近親如親弟兄、伯叔、伯叔的兒子、本家的近支；這近親是預表主耶穌，世人原來承受了美好的基業，卻因犯罪將自己的基業賣了，但基督降世為人，做了我們至近的親屬，贖回了我們的基業。"
  "relation": "本章是goel（救贖親屬）條例最集中完整的展開，涵蓋土地贖回與人身贖回兩大範疇。"
- "title": "取利（neshek）"
  "path": "link_folder/原文/取利（neshek）.md"
  "summary": "v35-37「不可向他取利，也不可向他多要...你借錢給他，不可向他取利；借糧給他，也不可向他多要」。GT丁良才：這條例是論對待窮人的道理，不是關係借款經商等一切的事。"
  "relation": "本章重申出埃及記22:25禁止向窮困弟兄取利的條例，並具體應用於借錢與借糧兩種情境。"
- "title": "出22：25取利禁令的範圍"
  "path": "link_folder/解經爭議/出22：25取利禁令的範圍.md"
  "summary": "v35-37對照出埃及記22:25既有的取利禁令。GT丁良才：這條例是論對待窮人的道理，不是關係借款經商等一切的事（路十九23，太二十五27）。"
  "relation": "本章利未記25:35-37與出埃及記22:25禁止取利範圍的關係，究竟是專指借貸給窮困弟兄，抑或涵蓋一切商業借貸。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華在西乃山對摩西說」，本章條例的傳達者。"
  "relation": "本章延續摩西傳達耶和華律例典章給以色列人的一貫角色，是安息年與禧年制度的傳達者。"
