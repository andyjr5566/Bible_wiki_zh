"book": "利未記"
"chapter": !!int "15"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華對摩西、亞倫說」，摩西與亞倫共同領受本章潔淨條例的傳達。"
  "relation": "本章身體排泄不潔條例（漏症、夢遺、經期、血漏）與前幾章潔淨禮同樣經摩西傳達給以色列人。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "v1「耶和華對摩西、亞倫說」；祭司於本章負責在會幕門口收取患者所獻的斑鳩或雛鴿，獻一隻為贖罪祭、一隻為燔祭，為漏症或血漏痊癒者贖罪（v14-15,29-30）。"
  "relation": "本章祭司的職責延續利未記十一至十四章潔淨禮儀中判斷與獻祭贖罪的角色，處理漏症與血漏痊癒者的潔淨程序。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "v14,29 患漏症與血漏痊癒者（無論男女）第八天皆須帶兩隻鳥到「會幕門口、耶和華面前」交給祭司獻祭。"
  "relation": "本章是會幕門口作為潔淨獻祭地點的又一次出現，與大痲瘋潔淨禮（十四章）的獻祭地點相同。"
- "title": "瓦器打碎銅器擦淨"
  "path": "link_folder/主題/瓦器打碎銅器擦淨.md"
  "summary": "v12「患漏症人所摸的瓦器就必打破；所摸的一切木器也必用水涮洗」，瓦器多孔無法徹底潔淨須打碎的原則，第三度出現於利未記（另見六28贖罪祭肉瓦器打碎、十一33爬物污染瓦器打碎）。"
  "relation": "本章將瓦器打碎、木器水洗的原則擴及漏症患者所摸過的器物，與前兩次出現的原則一致。"
- "title": "斑鳩"
  "path": "link_folder/主題/斑鳩.md"
  "summary": "v14,29 患漏症者、血漏婦人痊癒後第八天須取兩隻斑鳩或兩隻雛鴿獻祭；GT丁良才指出平常獻祭只有貧窮人可獻斑鳩雛鴿，但行此潔淨禮則不分貧富皆須用鳥。"
  "relation": "本章漏症、血漏痊癒禮延續斑鳩作為潔淨獻祭代替物的用法，但特別之處在於不分貧富一律用鳥，異於一般贖罪祭可按力量獻牛羊的常例。"
- "title": "雛鴿"
  "path": "link_folder/主題/雛鴿.md"
  "summary": "v14,29 與斑鳩並列為漏症、血漏痊癒者潔淨禮所獻之祭牲，不分貧富皆用鳥代替尋常羊羔。"
  "relation": "本章雛鴿用法與斑鳩相同，見於漏症與血漏兩種痊癒後的潔淨獻祭條例。"
- "title": "潔淨與不潔淨"
  "path": "link_folder/神學/潔淨與不潔淨.md"
  "summary": "全章總論身體排泄物（漏症、夢遺、月經、血漏）的潔與不潔條例，31節點明立法目的：「使以色列人與他們的污穢隔絕，免得玷污我的帳幕」。GT丁良才將本章與十一至十四章合為利未記論禮儀不潔的四大類（動物、產婦、大痲瘋、漏症）。"
  "relation": "本章是潔淨與不潔淨主題在利未記中最集中處理身體非自願排泄不潔的一章，與前三類（食物、產婦、大痲瘋）並列完成利未記十一至十五章的潔淨法典架構。"
