book: 利未記
chapter: 15
updates:
- title: 不潔淨的傳染與隔離
  path: link_folder/主題/不潔淨的傳染與隔離.md
  summary: 利15:4-12、19-27 漏症與行經的不潔會藉接觸一圈圈往外傳：所躺的床、所坐的物、他的身體、他的唾沫、所騎的鞍子、身下之物，摸了或拿了的人都不潔淨到晚上，並要洗衣服、用水洗澡。《精讀本》：「顯示出罪的傳染性。與墮落的人交往，潔淨的人必沾染墮落之人的罪。」丁良才在 v11 指出一處全律法僅見的規定：「摩西的律法上只在此處提到用水涮手，病人在剛涮完手的時候摸人，那被摸的就不至沾染不潔」——洗濯在此不只是事後補救，也是防止蔓延的先行動作。而
    v23 另辨出更輕的一級：床上或所坐之物上「若有別的物件，人一摸了，必不潔淨到晚上」，丁良才：「只須等到晚上，不必洗衣服、洗澡。」
  relation: 本章的傳染半徑比大痲瘋更廣，後果卻更輕——KC：「雖然這玷污的範圍比長大痲瘋的人還廣，卻沒有獻祭、也沒有被挪出營外……這顯明這些不潔的案例，不像長大痲瘋的案例那樣被重重地追究。神在罪的性質上作出分別。」不潔是分級的，不是一刀切。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 利15:1「耶和華對摩西、亞倫說」——本章與利11、利13 一樣是同時對摩西與亞倫說話。丁良才指出這格式的用意：條例既要由摩西傳給全會眾，也要由亞倫一系的祭司實際執行分辨與獻祭。v31「你們要這樣使以色列人與他們的污穢隔絕」的「你們」，丁良才明說「就是摩西和亞倫」——保守帳幕不被玷污的責任，直接落在他們兩人身上。
  relation: 亞倫在本章領受的責任不是察看（本章沒有祭司察看的程序），而是在第八天為痊癒者獻上贖罪祭與燔祭，以及守住 v31 那條界線：免得百姓玷污神的帳幕，就因自己的污穢死亡。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: 利15:14-15、29-30 患漏症或血漏的人痊癒後，第八天要取兩隻斑鳩或兩隻雛鴿，帶到會幕門口交給祭司；祭司獻一隻為贖罪祭、一隻為燔祭，在耶和華面前為他贖罪。丁良才注意到一處與別章相反的規定：「在平常獻祭的時候，只有貧窮人可以獻斑鳩或雛鴿（利5:7、12:8、14:22），但為行這潔淨的禮，不論是貧的是富的都需獻這些鳥。」
  relation: 利12 與利14 的兩隻鳥是窮人的替代品，本章的兩隻鳥卻是所有人的定規——同樣的祭物，在不同章裡意思正好相反。KC 並指出本章沒有祭司的察看程序：「不像長大痲瘋的人那樣有祭司的查驗。這不是一件公開的惡事。」
- title: 耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）
  path: link_folder/互文/耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）.md
  summary: 利15 與利13-14 是一組對照。KC 把兩者的性質分得很清楚：「大痲瘋是罪、因此是玷污，而且是出於人自己的意志。漏症卻是不由自主發生的，沒有意圖……甚至不算犯了罪。」而舊約把這兩種不潔並列：大衛向約押家宣告咒詛時，「願約押家不斷有患漏症的、長大痲瘋的」（撒下3:29）——丁良才與 KC 都引此節，指出兩者在舊約裡是一組。
  relation: 耶穌摸長大痲瘋的人（太8:3）與患血漏的婦人摸耶穌的衣裳（太9:20-22），方向正好相反，結果卻一樣：不潔沒有傳給祂，潔淨反倒傳了出去。本章 v11 立下的規矩是「不潔會傳染、潔淨不會傳染」；福音書裡這條規矩在祂身上倒了過來。
