name: 月經（niddah）
type: 原文
secondary_types: []
aliases:
- 行經
- 經期
status: formal
definition: 希伯來文 niddah 意指「月經」或「經期中的不潔淨」。在利未記15章中，女人行經必污穢七天，凡摸她的或她所躺、所坐之物件的，必不潔淨到晚上，並要洗衣服、用水洗澡。男人若與經期中的女人同房，染了她的污穢，就要七天不潔淨，所躺的床也為不潔淨。
accumulations:
- book: 利未記
  chapter: 15
  summary: 規定女人行經時污穢七天，其接觸之物皆不潔淨，摸者須洗淨自身；與之同房的男人亦七天不潔淨。
  relation: 本章將女性月經視為禮儀不潔的來源，需透過隔離與清洗來維持聖潔。
related_entries:
