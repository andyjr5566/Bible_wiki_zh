name: 教會紀律與隔絕（太18：15-17；林前5：1-13）
type: 互文
secondary_types: []
aliases:
- 教會紀律與隔絕
status: formal
definition: 新約教導教會面對犯罪不悔改的信徒時，需採取紀律行動甚至將其隔絕（如林前5章將行淫的人趕出教會）。此原則對應利未記15章31節「使以色列人與他們的污穢隔絕，免得他們玷污我的帳幕」的條例。舊約中肉體漏症的不潔淨會傳染並玷污神的聖所，因此需嚴格隔離；新約中教會的罪惡同樣會在屬靈層面影響整個群體，因此需藉著紀律與隔絕來保護教會的聖潔。
accumulations:
- book: 利未記
  chapter: 15
  summary: 本章31節強調必須使不潔淨的以色列人與污穢隔絕，以免玷污神的帳幕而招致死亡。
  relation: 新約教會紀律中對不悔改者的隔絕，對應本章神要求將患漏症等不潔之人隔絕以保護帳幕聖潔的條例。
