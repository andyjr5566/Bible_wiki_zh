name: 不潔淨到晚上（tame ad erev）
type: 原文
secondary_types: []
aliases:
- 不潔淨到晚上
status: formal
definition: 希伯來文 tame ad erev，指因接觸不潔之物或人而進入的暫時性禮儀不潔狀態，此狀態持續至日落（晚上）為止。在利未記15章中，凡摸了患漏症的人、其床、坐物、鞍子，或被患漏症人吐在身上、摸其身下之物等，皆必不潔淨到晚上，並需配合洗衣服與用水洗澡的潔淨程序。
accumulations:
- book: 利未記
  chapter: 15
  summary: 本章多次重申「不潔淨到晚上」作為接觸不潔者之暫時性不潔的期限，並伴隨洗滌要求。
  relation: 確立了禮儀不潔的時間界限，表明不潔狀態需經過時間過渡與潔淨儀式方能恢復。
related_entries:
- 漏症（zav）
- 洗衣服用水洗澡（kibbus u-rechitzah）
- 夢遺（mikreh lailah）
- 男女交合（shichvat zera）
- 月經（niddah）
- 血漏（zavah）
- 不潔淨的傳染與隔離
- 洗濯儀式的屬靈意義
