name: 漏症（zav）
type: 原文
secondary_types: []
aliases:
- 漏症
- 患漏症
status: formal
definition: 希伯來文 zav，指人體不正常的排泄或流出物。在利未記15章中，此字特指男性或女性因病理原因產生的異常體液流出，導致禮儀上的不潔淨。患漏症者無論是下流或止住的，皆為不潔淨，且其躺臥的床、坐的物、騎的鞍子及所摸的器皿皆受污染，甚至吐在潔淨人身上也會傳染不潔。
accumulations:
- book: 利未記
  chapter: 15
  summary: 詳述患漏症者本身的不潔淨及其對物品與他人的污染傳染力，並規定痊癒後需計算七天、洗身並獻祭贖罪。
  relation: 本章核心主題，確立了漏症作為禮儀不潔的來源及其隔絕與潔淨條例。
related_entries:
- 不潔淨到晚上（tame ad erev）
