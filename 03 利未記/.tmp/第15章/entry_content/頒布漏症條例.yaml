name: 頒布漏症條例
type: 事件
secondary_types: []
aliases:
- 頒布漏症條例
status: formal
definition: 耶和華對摩西、亞倫說話，頒布關於人體漏症、夢遺、男女交合、月經及血漏等各種身體排泄物所導致之不潔淨的條例。此條例詳細規範了不潔淨的傳染途徑（如觸摸床鋪、物件、身體）、潔淨的程序（洗衣服、用水洗澡、計算七天）以及痊癒後的贖罪與燔祭獻祭。其核心目的在於使以色列人與他們的污穢隔絕，免得他們玷污神的帳幕而因自己的污穢死亡。
accumulations:
- book: 利未記
  chapter: 15
  summary: 本章記載耶和華向摩西與亞倫頒布各類漏症及身體排泄物之潔淨條例，包含隔離、洗濯與獻祭的規定。
  relation: 本章即為此事件的完整記載，確立了以色列人處理身體不潔淨的禮儀標準。
related_entries:
