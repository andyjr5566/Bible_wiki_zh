name: 男女交合與夢遺的屬靈意義
type: 主題
secondary_types: []
aliases:
- 遺精與交合的屬靈意義
status: formal
definition: 男方夢遺或男女交合後，雙方皆不潔淨到晚上，並要用水洗澡。這並非指婚姻內的性是罪，而是表明人類肉體生命的繁衍與體液流出，帶有亞當墮落後受造之物的局限性與不潔。此條例提醒以色列人，即使是合法的生理現象，也不能帶入聖所，必須經過潔淨，表明神對聖潔的要求超越了人類天然的生理需求。
accumulations:
- book: 利未記
  chapter: 15
  summary: 規定夢遺與男女交合皆為不潔至晚上，需用水洗澡潔淨。
  relation: 本章將生理排泄視為禮儀上的不潔，突顯神聖潔標準與天然肉體生命之間的距離。
related_entries:
