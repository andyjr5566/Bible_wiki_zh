name: 耶穌醫治痲瘋病人（太8：1-4；可1：40-45；路5：12-16）
type: 互文
secondary_types: []
aliases:
- 耶穌醫治痲瘋病人
status: formal
definition: 新約記載耶穌醫治痲瘋病人，並囑咐其去給祭司察看，獻上摩西所吩咐的禮物。雖然利未記15章主要針對漏症而非痲瘋，但兩者在禮儀潔淨的體系中同屬嚴重的不潔淨類別，皆需經過隔離、洗滌與獻祭才能恢復潔淨。耶穌醫治痲瘋病人並讓其遵守律法規定，與本章患漏症者痊癒後需向祭司獻祭贖罪的條例相互呼應，表明耶穌成全了律法中關於不潔淨者得潔淨的完整程序。
accumulations:
- book: 利未記
  chapter: 15
  summary: 本章14至15節規定患漏症者痊癒後需在第八天向祭司獻上贖罪祭與燔祭以求潔淨。
  relation: 耶穌醫治痲瘋病人後囑咐其去給祭司察看並獻祭，對應本章漏症痊癒後需向祭司獻祭贖罪的條例。
