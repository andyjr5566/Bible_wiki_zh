name: 夢遺（mikreh lailah）
type: 原文
secondary_types: []
aliases:
- 夢遺
- 遺精
status: formal
definition: 希伯來文 mikreh lailah，意指夜間發生的排泄，特指男性的夢遺。在利未記15章16-17節中，人若夢遺必不潔淨到晚上，並要用水洗全身；無論是衣服或皮子被精所染，也必不潔淨到晚上，並要用水洗。
accumulations:
- book: 利未記
  chapter: 15
  summary: 規定男性夢遺及被精液染污的衣物皮子皆為不潔，需用水洗身及洗物，並不潔淨到晚上。
  relation: 將人體自然生理排泄納入禮儀潔淨的規範，強調聖潔神對親近祂者之身體與生活細節的要求。
related_entries:
- 不潔淨到晚上（tame ad erev）
- 洗衣服用水洗澡（kibbus u-rechitzah）
- 男女交合（shichvat zera）
- 男女交合與夢遺的屬靈意義
- 保羅論肉體情慾（加5：19-21；羅7：14-25）
