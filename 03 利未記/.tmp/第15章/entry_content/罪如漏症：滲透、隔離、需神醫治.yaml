name: 罪如漏症：滲透、隔離、需神醫治
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 漏症的特徵是持續不斷地流出體液，且其不潔會滲透到床鋪、座椅及接觸者身上。這正預表了罪的性質：罪如同漏症，是從人敗壞的肉體生命中自然流露出來的，具有極強的傳染與滲透力，會污染個人的生活環境與人際關係。罪導致人與神隔離，無法靠自身行為止住，必須等候神的醫治，並藉著祭司的贖罪方能徹底痊癒與恢復潔淨。
accumulations:
- book: 利未記
  chapter: 15
  summary: 描述漏症的持續流出與對周圍物件的污染，以及痊癒後需祭司贖罪的過程。
  relation: 本章漏症的物理特徵與隔離要求，成為罪之滲透性與需神醫治的神學預表。
related_entries:
- 漏症（zav）
- 不潔淨的傳染與隔離
- 洗濯儀式的屬靈意義
- 基督作大祭司醫治漏症
