name: 計算七天（shiv'at yamim）
type: 原文
secondary_types: []
aliases:
- 計算七天
- 七天
status: formal
definition: 希伯來文 shiv'at yamim，指為確認潔淨狀態而設定的七天觀察期。在利未記15章中，患漏症的人痊癒後（13節）及女人血漏痊癒後（28節），皆需為潔淨自己計算七天，並洗衣服用活水洗身，之後才算潔淨並可進行獻祭。
accumulations:
- book: 利未記
  chapter: 15
  summary: 本章規定患漏症者與血漏婦女痊癒後，必須計算七天作為潔淨的過渡期，並配合洗身。
  relation: 七天的完整週期確保了痊癒狀態的穩定性，作為恢復禮儀潔淨並預備獻祭的必要程序。
related_entries:
