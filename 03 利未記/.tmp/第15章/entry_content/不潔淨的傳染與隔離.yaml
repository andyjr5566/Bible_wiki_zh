name: 不潔淨的傳染與隔離
type: 主題
secondary_types: []
aliases:
- 不潔淨的傳染
status: formal
definition: 利未記15章顯示不潔淨具有強烈的傳染性。患漏症者本身不潔，其躺過的床、坐過的物、騎過的鞍子皆成為不潔的媒介。凡摸這些物件或直接觸摸患者身體的人，必不潔淨到晚上，甚至患者未洗手摸人也會傳染不潔。這種接觸傳染的設計，要求以色列人必須在日常生活中與不潔者保持隔離，以防止污穢在營中擴散。
accumulations:
- book: 利未記
  chapter: 15
  summary: 規定漏症患者的床鋪、座椅及身體接觸會將不潔傳染給他人，需隔離並洗淨。
  relation: 本章具體展示不潔淨如何透過物件與人際接觸傳染，確立了隔離污穢的必要性。
related_entries:
- 漏症（zav）
- 不潔淨到晚上（tame ad erev）
- 隔絕污穢（hivdil）
- 隔絕污穢保護帳幕
- 教會紀律與隔絕（太18：15-17；林前5：1-13）
