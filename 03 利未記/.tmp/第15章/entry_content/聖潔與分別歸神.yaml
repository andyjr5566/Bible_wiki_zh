name: 聖潔與分別歸神
type: 神學
secondary_types: []
aliases:
- 與污穢隔絕
- 免得玷污帳幕
status: formal
definition: 利未記15章31節指出，神設立潔淨條例的目的是要使以色列人與他們的污穢隔絕，免得他們玷污神的帳幕而因自己的污穢死亡。這表明聖潔的神要求祂的子民在身體和禮儀上保持潔淨，將不潔之物隔離，以保護神同在的聖所。這反映了神「分別為聖」的本性，以及祂對子民過聖潔生活、與世俗污穢有所分別的要求。
accumulations:
- book: 利未記
  chapter: 15
  summary: 神要求以色列人與污穢隔絕，免得玷污帳幕而死亡，彰顯神對聖潔的要求。
  relation: 本章所有潔淨條例的最終神學目的，在於保護神的聖所並維持神與子民聖潔的關係。
