organization: '### 獻祭的啟示與燔祭總則（v1-4）


  [[耶和華呼叫摩西]]標誌著五經敘事從出埃及記的西奈山場景，正式過渡到會幕的啟示。神從會幕中發聲，曉諭以色列人獻[[供物]]的基本法則。獻祭並非出於人的發明，而是神主動設立的恩典途徑，使百姓能透過[[牛群羊群]]中的牲畜來親近祂。


  本章所記載的[[燔祭（olah）]]是獻祭制度的基礎。獻祭者首先要選取一隻[[無殘疾]]的[[公牛]]，在會幕門口獻上，使其能在耶和華面前蒙[[悅納]]。祭牲的完美無瑕象徵著奉獻者將最美好、無瑕疵的歸給神。接著，獻祭者必須實行[[按手（samak）]]的動作，將手重重按在祭牲頭上。這個動作在神學上具有深刻的意義：它不僅代表獻祭者與祭牲的聯合，更象徵著將罪惡與刑罰轉移到無辜的代罪牲畜身上。透過這個神聖的替代機制，祭牲承擔了人的罪債，使獻祭者得以[[贖罪]]，其獻祭方得蒙神悅納。


  ### 牲畜燔祭的預備與宰殺（v5-9）


  燔祭的執行涉及獻祭者與祭司的分工合作。獻祭者要在耶和華面前親自[[宰殺]]公牛，而[[亞倫和他兒子（祭司）]]則負責承接[[血]]並執行[[灑血]]的儀式，將血灑在會幕門口、[[銅壇（燔祭壇）]]的周圍。血代表著生命，灑血的動作凸顯了「若不流血罪就不得赦免」的救贖原則。隨後，獻祭者要進行[[剝皮切塊]]，祭司則在壇上添柴生火，將肉塊、頭並[[脂油]]擺在火上焚燒。特別的是，祭牲的臟腑與腿必須[[洗臟腑與腿]]，以除去污穢，確保獻上的祭物是潔淨的。最終祭司要把一切全然[[燒在壇上]]，獻與耶和華作為[[馨香的火祭]]。


  ### 羊類燔祭的壇北條例（v10-13）


  除了公牛之外，若獻祭者以[[綿羊]]或[[山羊]]為燔祭，同樣必須獻上無殘疾的公羊。整體程序與公牛燔祭高度一致，包含按手、宰殺、灑血、切塊與洗臟腑等步驟。然而，經文在此特別標明了一個空間細節：羊隻必須宰於壇的北邊，在耶和華面前。這項指定位置的條例，確立了祭壇周圍的空間秩序，使獻祭過程在神聖的會幕空間中有條不紊地進行。無論是獻牛還是獻羊，祭司最終都要將處理好的祭牲全然燒在壇上，獻與耶和華為馨香的火祭。這全然焚燒的特點，表明燔祭代表著獻祭者對神毫無保留的奉獻與順服。'
