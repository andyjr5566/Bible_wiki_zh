name: 按手（samak）
type: 原文
secondary_types: []
aliases:
- 按手
status: formal
definition: 希伯來文 samak，意為「按、壓、靠」；丁良才指出此字在詩88:7譯作「重壓」。在利未記第1章的燔祭條例中，獻祭者要按手在燔祭牲的頭上（利1:4），核心意義是獻祭者與祭牲的聯合與認同。至於是否同時「把罪轉移到祭牲身上」，各家分歧：丁良才、《精讀本》、《串珠》主張按手表示「歸給」，獻祭之人的罪歸於祭牲（據利16:21大贖罪日的按手）；《舊約聖經背景註釋》則明確反對——「其用意不是把罪轉歸給祭牲，因為非贖罪的祭也需要按手」；KC 認為燔祭的按手方向相反，是祭牲的價值歸給獻祭者（「All the value of the burnt offering is therefore as it were passed on to him, the offeror」），並指出「燔祭並非為罪而獻」。轉移說屬贖罪祭的邏輯，燔祭經文未如此明說。獻祭者必須親自按手，別人不能代行。
accumulations:
- book: 利未記
  chapter: 1
  summary: 獻祭者要在會幕門口獻無殘疾的公牛為燔祭，並按手在燔祭牲的頭上，燔祭便蒙悅納，為他贖罪（利1:4）。獻鳥為燔祭時則不行按手之禮（丁良才：因鳥原是用手帶來奉上的，已表示了按手的意思）。
  relation: 本章是按手之禮在利未記的首次出現，確立獻祭者與祭牲的聯合。但燔祭的按手不可逕自等同於贖罪祭的「罪的轉移」——KC 指出燔祭非為罪而獻，按手使祭牲的價值歸與獻祭者「God sees him in this offering」；《舊約聖經背景註釋》亦以「非贖罪的祭也需要按手」為由反對轉移說。CT 則兩面並存：「這祭牲不但是擔負了罪，也是領人到榮耀的恩典中。基督如何被接納，信徒也是照樣的被接納。」
