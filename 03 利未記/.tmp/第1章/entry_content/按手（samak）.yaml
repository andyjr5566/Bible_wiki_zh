name: 按手（samak）
type: 原文
secondary_types: []
aliases:
- 按手
status: formal
definition: 希伯來文 samak，意為「按、壓、靠」。在利未記第1章的燔祭條例中，獻祭者要按手在燔祭牲的頭上，此動作象徵獻祭者與祭牲的聯合與認同，將自身的罪與悔改之意轉移至無殘疾的祭牲身上，使祭牲作為其替代。經文指出透過此按手動作，燔祭便蒙悅納並為獻祭者贖罪。
accumulations:
- book: 利未記
  chapter: 1
  summary: 獻祭者要在會幕門口獻無殘疾的公牛為燔祭，並按手在燔祭牲的頭上。
  relation: 按手是燔祭蒙悅納與為人贖罪的必要程序，確立了獻祭者與祭牲間的替代關聯。
