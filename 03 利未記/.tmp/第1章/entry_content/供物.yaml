name: 供物
type: 主題
secondary_types: []
aliases:
- 供物
status: formal
definition: 以色列人獻給耶和華的物品，在利未記第1章中特指從牛群羊群或鳥類中挑選的牲畜。供物是敬拜者出於自願或特定目的帶到神面前的奉獻，本章詳述了供物作為燔祭時的種類（公牛、公羊、斑鳩或雛鴿）與獻祭程序，為要贖罪並蒙神悅納。
accumulations:
- book: 利未記
  chapter: 1
  summary: 以色列人中間若有人獻供物給耶和華，要從牛群羊群中獻牲畜為供物，也可獻鳥類為供物。
  relation: 本章核心主題，涵蓋燔祭之供物的動物種類、挑選標準與獻祭流程。
