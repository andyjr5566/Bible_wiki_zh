name: 供物（qorban）
type: 原文
secondary_types: []
aliases:
- 各耳板
status: formal
definition: 希伯來文 qorbān，音譯「各耳板」，字根意為「靠近、攜近」，指一切獻給神、使人得以親近神的禮物、奉獻、祭物、犧牲。GT：「供物」原文為
  qorban，意思是「攜近」聖壇的東西，獻祭因此是人就近神的途徑。CT：『獻供物』原文的意思就是就近，指就近祭壇；自從亞當犯罪以後，人不能直接就近神，只能就近祭壇——『若有人獻供物』表示獻祭乃自願而非強迫，是個別而非群體的行為。雷氏研讀本：第一至七章提到五種供物（燔祭、素祭、平安祭、贖罪祭、贖愆祭）。qorban
  與動詞「親近（qarab）」同源，但 qorban 為名詞，指「被帶近之物」本身，非「靠近」這個動作。
accumulations:
- book: 利未記
  chapter: 1
  summary: 1:2「若有人獻供物給耶和華」；1:3「他的供物若以牛為燔祭」；1:10「人的供物若以綿羊或山羊為燔祭」；1:14「人奉給耶和華的供物，若以鳥為燔祭」。「供物」一詞貫穿全章，涵蓋牛、羊、鳥三級祭牲，是本章及利未記獻祭條例的核心原文詞彙。
  relation: 供物（qorban）界定了利未記五祭的共同本質——凡獻給神、使人得以親近祂的，皆稱供物；本章燔祭是「供物」底下的第一種具體祭別，此原文詞奠定後續素祭、平安祭、贖罪祭、贖愆祭的用詞基礎。
