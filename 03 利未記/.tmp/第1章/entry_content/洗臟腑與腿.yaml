name: 洗臟腑與腿
type: 事件
secondary_types: []
aliases:
- 洗臟腑與腿
status: formal
definition: 在利未記第1章的燔祭程序中，獻祭者或祭司在將祭牲切成塊子後，必須用水洗淨祭牲的臟腑與腿，然後才由祭司將一切全燒在壇上。此步驟適用於公牛（第9節）與公綿羊或山羊（第13節）的燔祭，目的是在焚燒前潔淨祭牲的內臟與下半身，使其成為獻與耶和華馨香的火祭。
accumulations:
- book: 利未記
  chapter: 1
  summary: 燔祭牲（公牛或公羊）的臟腑與腿要用水洗，之後祭司將一切全燒在壇上作為馨香的火祭。
  relation: 本章燔祭程序中的必要潔淨步驟，確保祭牲在火中全然獻上前符合潔淨要求。
