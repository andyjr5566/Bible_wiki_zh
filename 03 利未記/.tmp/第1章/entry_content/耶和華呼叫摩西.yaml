name: 耶和華呼叫摩西
type: 事件
secondary_types: []
aliases:
- 耶和華呼叫摩西
status: formal
definition: 耶和華從會幕中呼叫摩西，對他說話。此事件標誌著利未記啟示的開端，神在會幕中直接向摩西頒佈獻祭與律法的條例，顯示神在西奈山頒佈律法後，繼續在會幕中向其子民啟示敬拜與事奉的細則。
accumulations:
- book: 利未記
  chapter: 1
  summary: 耶和華從會幕中呼叫摩西，藉著摩西曉諭以色列人獻供物的條例。
  relation: 本章及整卷利未記律法的啟示起源，確立摩西作為神命令傳遞者的中保角色。
related_entries:
