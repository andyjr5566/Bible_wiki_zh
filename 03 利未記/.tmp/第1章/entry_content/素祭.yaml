name: 素祭
type: 主題
secondary_types: []
aliases:
- 素祭
status: formal
definition: 素祭是利未記中以細麵、油、乳香等植物性材料為主的獻祭。雖然利未記第1章的經文主要記載動物性供物（牛群羊群中的燔祭牲畜與鳥類），尚未直接論及素祭的細節，但本章第2節「你們中間若有人獻供物給耶和華」的總括性宣告，為後續素祭等各類供物的條例設下了基礎。素祭通常伴隨燔祭或平安祭獻上，象徵獻祭者將地裡的出產與勞碌所得獻給神，表達對神賜福的感恩與奉獻，且素祭中不可有酵，需用鹽調和，與神立約的鹽約密切相關。
accumulations:
- book: 利未記
  chapter: 1
  summary: 本章第2節總括性地提及以色列人獻供物給耶和華，涵蓋了後續素祭等各類供物的總原則。
  relation: 本章作為獻祭條例的開端，其「獻供物給耶和華」的總則為素祭的奉獻原則與蒙悅納之基礎提供了制度上的起源。
