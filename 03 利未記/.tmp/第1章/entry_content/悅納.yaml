name: 悅納
type: 神學
secondary_types: []
aliases:
- 蒙悅納
status: formal
definition: 悅納指獻祭者所獻的祭物與獻祭態度符合耶和華神的標準，從而蒙神接納並達到贖罪之效。在利未記第1章中，祭牲必須是「沒有殘疾」的公牛或公羊，且獻祭者需在會幕門口、耶和華面前親自按手在祭牲頭上，祭牲方能蒙悅納。這表明悅納的基礎在於順服神的獻祭條例，並藉著祭牲的替代與血的灑流，使獻祭者的罪得贖，最終成為獻與耶和華馨香的火祭。
accumulations:
- book: 利未記
  chapter: 1
  summary: 獻祭者獻上沒有殘疾的公牛為燔祭，並在會幕門口按手在祭牲頭上，祭牲便蒙悅納為其贖罪。
  relation: 本章首次確立祭牲蒙神悅納的條件與程序，成為後續獻祭神學的基礎。
