name: 馨香的火祭
type: 神學
secondary_types: []
aliases:
- 馨香的火祭
status: formal
definition: 在利未記第1章中，「馨香的火祭」指燔祭牲經過剝皮、切塊、洗淨後，連同頭、脂油與肉塊全然燒在壇上所產生之上升的香氣。無論是獻公牛、公羊或鳥，祭司將祭牲完全焚燒在壇上，此全然奉獻的舉動獻與耶和華，成為神所悅納的馨香之氣，代表獻祭者全然的委身與敬拜。
accumulations:
- book: 利未記
  chapter: 1
  summary: 祭司把一切全燒在壇上當作燔祭，獻與耶和華為馨香的火祭。
  relation: 馨香的火祭是本章各類燔祭（牛、羊、鳥）全然焚燒後最終呈獻給神的結果與悅納記號。
related_entries:
