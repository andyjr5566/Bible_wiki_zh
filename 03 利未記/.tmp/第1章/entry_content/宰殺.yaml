name: 宰殺
type: 事件
secondary_types: []
aliases:
- 宰公牛
- 宰羊
status: formal
definition: 在利未記第一章的燔祭條例中，宰殺是獻祭過程中的關鍵行動。獻祭者需在耶和華面前親手宰殺祭牲。若獻牛為燔祭，要在會幕門口宰公牛；若獻羊為燔祭，則要把羊宰於壇的北邊，在耶和華面前。此動作表明祭牲代替獻祭者受死，為後續的灑血與贖罪程序預備。
accumulations:
- book: 利未記
  chapter: 1
  summary: 規定獻祭者需在耶和華面前親手宰殺公牛或公羊，作為燔祭程序的第一步。
  relation: 宰殺祭牲是贖罪的必要前置行動，使祭牲的血能夠被祭司取用並灑在壇上。
