name: 公牛
type: 文化
secondary_types: []
aliases:
- 牛
status: formal
definition: 公牛是古代以色列畜牧業中體型最大、價值最高的牲畜之一。在利未記第1章的燔祭條例中，公牛是最高等級的燔祭牲畜。獻祭者需在會幕門口親自宰殺公牛，祭司亞倫的子孫則負責將公牛的血灑在壇的周圍。公牛的皮被剝去、肉切成塊子，臟腑與腿用水洗淨後，祭司將其一切全燒在壇上，作為獻與耶和華馨香的火祭。
accumulations:
- book: 利未記
  chapter: 1
  summary: 以公牛為燔祭時，需在會幕門口獻上沒有殘疾的公牛，按手後宰殺、灑血、剝皮切塊並全燒在壇上。
  relation: 本章展示了公牛作為最高價值祭牲在燔祭中的完整處理程序，體現獻祭者對神極度的敬畏。
