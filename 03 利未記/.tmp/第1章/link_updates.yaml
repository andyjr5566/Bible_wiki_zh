book: 利未記
chapter: 1
updates:
- title: 斑鳩
  path: link_folder/文化/斑鳩.md
  summary: |
    利1:14 是斑鳩在利未記的首次出現，也是燔祭三級祭物中最小的一級：「人奉給耶和華的供物，若以鳥為燔祭，就要獻斑鳩或是雛鴿為供物。」祭司把鳥拿到壇前揪下頭來（相當於牛羊的宰殺），血流在壇的旁邊而不用盆盛（丁良才：因鳥的血很少），除掉嗉子和髒物丟在壇東邊倒灰的地方（相當於牛羊的用水洗臟腑與腿），拿著兩個翅膀把鳥撕開、只是不可撕斷。丁良才指出獻鳥不行按手之禮。
  relation: |
    本章確立了鳥作為貧窮人祭物的地位，且神對這一級的寬待最大——《啟導本》：「不但可用鳥來替代，且不限公鳥，也沒有規定必須無殘疾。」但仍不免除代價的原則。CT：「獻祭要論家之有無：富厚之家獻公牛，小康之家獻山羊，貧窮人只能獻一隻班鳩……只要人的動機存心對，就都蒙主悅納。」CT 讀其預表為「基督的溫柔、天真，同時也豫表基督為我們成為卑賤、貧窮」；KC 則讀鳥的燔祭為「represents Him as the Man Who came from heaven」，是獻祭者對基督認識最淺的一級，且其中有神不能接受、必須除掉的成分。與利5:7、12:8 的鳥類條例同屬一條體恤貧窮人的線。
- title: 雛鴿
  path: link_folder/文化/雛鴿.md
  summary: |
    利1:14 是雛鴿在利未記的首次出現，與斑鳩並列為燔祭最小的一級。獻鳥的程序幾乎全程由祭司處理（CT：因鳥的體型小），獻祭的人僅負責除掉嗉子和髒物。v17「把鳥撕開，只是不可撕斷」——CT、丁良才、《精讀本》同指向創15:10 亞伯拉罕獻祭時「只是鳥沒有劈開」。
  relation: |
    本章確立雛鴿為貧窮人可獻的燔祭。《啟導本》由此讀出一處新約的回照：「約瑟與馬利亞在聖殿中將耶穌獻給神時，用的也是鳥類（路二24），說明這對夫婦的家境並不好。」丁良才記其時代背景：「猶太人因為獻祭的緣故，多造鳥窩兒，飼養鴿子（王下六25，賽六十8）」，至新約時代仍有人在聖殿裡將鴿子賣給獻祭的人（約2:14）。
- title: 羅12：1
  path: link_folder/互文/羅12：1.md
  summary: |
    利1 的燔祭是羅12:1「將身體獻上，當作活祭」的舊約底稿。燔祭的特點是全然焚燒、不留一分給祭司或獻祭者（唯皮歸祭司，利7:8），丁良才：「燔祭全燒在壇上是預表基督將自己全然獻與神……叫我們也效法主的傍樣，將身體當作活祭全然獻上。」《串珠》在本章思想問題直接發問：「舊約以色列人若要與神相交，必須獻上燔祭。新約信徒該怎樣與神相交？參羅12:1。」
  relation: |
    利1 與羅12:1 的接點在「全然」二字，而非祭物的種類。CT：「『一切全燒在壇上』：要將祭物完全焚燒，意思是獻祭的人完全奉獻於神；燒到最後就變成一堆灰了，說出我這個人完全了了。」轉折在於祭物換成了自己——CT：「千山的牛，萬山的羊，都是神的。神原不在乎我們獻上多少的祭牲，祂所在乎的是我們是否獻上自己。」《精讀本》同讀：「所有的信徒都應該把自己作為活祭獻給神。」利1 的「若有人」是自願的，羅12:1 的「理所當然」亦然——不是強迫，是回應。
- title: 來10：5
  path: link_folder/互文/來10：5.md
  summary: |
    利1 的燔祭牲必須「沒有殘疾」（v3、10），CT 由此接到來10:5-10：「預表主耶穌的完全無過。神為主耶穌預備了一個身體，在地上無保留、無瑕疵、無玷污的完全獻給神（參來九14；十5~10）。」丁良才亦引來10:5-10 說明「燔祭全燒在壇上是預表基督將自己全然獻與神」。
  relation: |
    來10:5 引詩40:6「祭物和禮物，你不喜悅；你曾給我預備了身體」，正說明利1 的牛羊之所以不能終局地成事——CT：「祭物本身永不能除罪（參來十11），反而叫人想起罪來（參來十3）。」利1 要求一隻無殘疾的祭牲，來10:5 指出那隻祭牲最終是一個被預備的身體。KC 由此讀約翰福音為燔祭的福音：其中沒有被造成罪、沒有三小時黑暗、沒有客西馬尼，一切都出於主自己——「He went out, bearing His own cross」（約19:17）。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: |
    利1 是燔祭條例的本章，也是神講論獻祭時第一個講的祭。CT 給的原文字義：「『燔祭』火祭，上去，上升」；《串珠》：「『燔』字本指『上升之物』，它的特點就是整只祭牲都要燒在壇上作為馨香之祭上升給神。」全章分三級：牛（v3-9）、綿羊或山羊（v10-13）、斑鳩或雛鴿（v14-17），程序一致——按手、宰殺、灑血、切塊、水洗臟腑與腿、全燒（獻鳥則不行按手）。丁良才指出本章的「燒」字原文是「使之上升」，與利4:12、21 營外的「燒毀」不同：壇上的燒為著馨香上升，營外的燒毀表明神的震怒。
  relation: |
    燔祭與其他祭的分別在「全燒」——《精讀本》：「這與其他祭（把祭物的一部分歸給祭司）不同，而是完全焚燒在神面前，只將祭牲的皮歸給祭司（7:8）。」KC 解釋神為何從燔祭講起而非贖罪祭：「For the sinner, the sin offering comes first... The burnt offering represents the Lord Jesus in His work on the cross to glorify God. That is why God begins with it, for this aspect of the work of His Son is most precious to His heart.」丁良才則給了燔祭與贖罪祭最簡潔的分工：「贖罪祭預表耶穌贖人的罪過，燔祭預表耶穌補人的不及。」須注意燔祭雖有「為他贖罪」（v4），但 KC 指出「燔祭並非為罪而獻」，《舊約聖經背景註釋》亦以「非贖罪的祭也需要按手」反對把燔祭的按手讀成罪的轉移。燔祭、素祭、平安祭同稱「馨香的火祭」，贖罪祭則不然。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: |
    利1 中亞倫本人未直接行動，而是以「亞倫子孫作祭司的」的形式出現（v5、7、8、11、12），承接血、灑血、放火擺柴、擺肉塊、全燒在壇上。CT 給「亞倫」的原文字義為「帶來光的人」。獻鳥為燔祭時（v15、17），因鳥的體型小，幾乎全程由祭司處理。
  relation: |
    本章顯明亞倫一系的祭司職分在會幕啟用後隨即進入實際運作——出28-29 是膏立與聖衣的指示，出40 是會幕落成，利1 則是這個職分第一次真正供職。分工是明確的：丁良才指出「獻祭的人須自己宰殺祭牲（七30，祭司和利未人不過是幫助）」，而接血、灑血、理火、擺肉、焚燒屬祭司。CT：「本節明確指出宰殺祭牲是獻祭之人的工作，而奉上血和灑血則是祭司的工作。」
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: |
    利1 中祭司的職責：接血在盆裡並把血灑在壇的周圍（v5、11）、把火放在壇上並把柴擺在火上（v7）、把肉塊和頭並脂油擺在柴上（v8、12）、把一切全燒在壇上（v9、13）；獻鳥時另負責把鳥拿到壇前、揪下頭來、焚燒（v15、17）。丁良才列出祭司在燔祭中的七件事，並補充其中兩件延伸至次日：次日早晨仍穿供職的衣服把壇上的灰倒在壇的東邊（利6:10-16），再脫去聖衣、穿上別的衣服把灰拿到營外潔淨之處（利6:11）。
  relation: |
    本章是祭司職分在利未記的第一次實際運作，其界線也在此劃定：獻祭者做的六件事（獻上、按手、宰殺、剝皮、切塊、水洗臟腑與腿）與祭司做的事互不越界。KC 由此讀出新約的對應：「The New Testament teaches that every believer is a priest (1Pet 2:5)... A priest, a son of Aaron, is in the picture here a believer who has reached spiritual maturity, knows his privileges as a priest and uses them.」並指出舊約祭司家中有分別（如女兒不得進聖所），新約則沒有——舊約的圖畫表達的是新約真理在實際經歷上的分別。KC 另指出祭司對血與祭物各塊的價值有認識：「Through their dealings with God, priests know the value of the blood and of the pieces of the offering.」
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: |
    利1 中壇是全章動作的匯聚點：血灑在壇的周圍（v5、11）、火放在壇上、柴擺在火上（v7）、肉塊頭脂油擺在壇上火的柴上（v8、12）、一切全燒在壇上（v9、13）、鳥的血流在壇的旁邊（v15）、嗉子和髒物丟在壇的東邊倒灰的地方（v16）。《啟導本》記其規制：「壇用皂莢木包銅作成（出三十八1～2），正方形，每邊約長2.25公尺，高1.4公尺；安設在帳幕的東邊，幾乎近整個會幕的中央。」CT：「『壇』指燔祭壇，它放置在會幕近門口之處。」
  relation: |
    本章使壇的四面各有定用，構成會幕院子的空間秩序——丁良才由排除法解釋 v11 為何宰牲在北邊：東邊是倒灰的地方（v16），西邊有洗濯盆且對著會幕（出40:7、30），南邊有上壇的斜坡（出27:9-19），故只餘北邊；《舊約聖經背景註釋》則較保守：「大概是那裡有最多空間可供此用。」丁良才另指出贖罪祭與贖愆祭的祭牲也在此處宰（利4:24、29、33，六25，七2）。關於壇上的火，丁良才說明在曠野遷移時祭司要把火收在手爐中帶著，因這火要常常燒著不可熄滅（利6:13）；《啟導本》則認為 v7「每獻一次燔祭要重新點火，應是以色列人在曠野漂泊，會幕隨時遷移的結果」，後來停歇較久才有火永不熄滅的規例。CT 讀壇的預表：「『在會幕門口』有祭壇，是預表主的十字架。」
- title: 話語潔淨（弗5：26）
  path: link_folder/互文/話語潔淨（弗5：26）.md
  summary: |
    利1:9、13「但燔祭的臟腑與腿要用水洗」。KC 指出水是神話語的表記（弗5:26），並讀出一處反差：「There is nothing in the Lord Jesus that should be washed away, as is so often the case with us... the water is, so to speak, before as pure as after washing, because there is no dirt to remove.」CT 則讀我們這一面：「基督徒也要時常藉著真理和聖靈，洗淨心裡的汙穢，使心思意念都聖潔，才能蒙神悅納。『要用水藉著道，把教會洗淨，成為聖潔』（弗五26）。」
  relation: |
    出30 洗濯盆的水洗與利1 燔祭臟腑腿的水洗，同指向弗5:26 神話語的潔淨；差別在對象——洗濯盆洗的是事奉的祭司（洗手洗腳），利1 洗的是獻上的祭物本身（臟腑與腿）。KC 的讀法使這處互文有了雙向性：用在基督身上，水洗證明祂洗前洗後一樣潔淨，「Every aspect of His life and death has been tested by the Word of God」；用在信徒身上，才是真有污穢要除。《舊約聖經背景註釋》另給實務理由：需要水洗的只有內臟和腿，「使壇上不致有糞便」。
