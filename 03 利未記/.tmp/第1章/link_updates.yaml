"book": "利未記"
"chapter": !!int "1"
"updates":
- "title": "燔祭"
  "path": "link_folder/神學/燔祭.md"
  "summary": "利1章是燔祭條例的正式立法，分三級祭牲（牛v3-9、羊v10-13、鳥v14-17），每級皆含按手、宰殺、灑血、剝皮/切塊或撕開、水洗臟腑腿、全燒於壇上、獻與耶和華為馨香的火祭的固定程序。"
  "relation": "利未記首次把燔祭列為五祭之首、正式制度化；創8、創22、出20、出29的燔祭是零星先例，本章才是完整的操作規範，確立獻祭者與祭司的分工，並為後續各祭的程序範式定調。"
- "title": "按手（samak）"
  "path": "link_folder/原文/按手（samak）.md"
  "summary": "1:4「他要按手在燔祭牲的頭上，燔祭便蒙悅納，為他贖罪」——這是利未記全書首次出現「按手」的具體操作說明。CT：按手表示獻祭的人與所獻的祭牲合而為一，代表獻祭之人與祭牲聯合、認同祭牲就是自己。"
  "relation": "出29章已記亞倫按手在三隻祭牲上（贖罪祭、燔祭、承接聖職之祭三個不同方向）；利1:4是「一般信徒獻燔祭」的按手，補上出29「祭司受按手」以外的另一半場景——凡獻燔祭的個人皆親自按手，不能假手他人，正如各人得救必須自己靠主。"
- "title": "馨香之氣"
  "path": "link_folder/神學/馨香之氣.md"
  "summary": "v9,13,17三次重複「獻與耶和華為馨香的火祭」，是本章三級燔祭每段落固定的結尾語。丁良才特別指出這裡的「燒」字原文是「使之上升」，與營外焚燒（燒毀）的燒字不同。"
  "relation": "創8:21挪亞獻燔祭後神「聞那馨香之氣」是敘事性的單一事件；利1章則把「馨香的火祭」制度化為燔祭蒙悅納的固定判準語，三級祭牲不論貧富皆同稱馨香，顯明神看重的是獻祭者甘心的心，不是祭物大小。"
- "title": "銅壇（燔祭壇）"
  "path": "link_folder/主題/銅壇（燔祭壇）.md"
  "summary": "本章首次記載銅壇實際獻祭時的方位配置：壇的北邊是宰殺之處（v11），壇的東邊是倒灰之處（v16），並記血灑「壇的周圍」（v5,11）、肉塊擺在「壇上火的柴上」（v8,12）。串珠：「上壇的方向是在壇的南面，殺牲的地方是在壇的北面，倒灰的地方是在壇的東面，壇的西面對著會幕。」"
  "relation": "出27、出38記載的是銅壇的材質與尺寸（建造規格）；利未記1章補上這座壇在實際獻祭儀式中「怎麼用」——四面各有固定功能分區，銅壇作為十字架預表的意義，在本章的操作細節中具體落實為宰殺、灑血、放火、全燒的獻祭現場。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "v3「就要在會幕門口獻一隻沒有殘疾的公牛」、v5「把血灑在會幕門口、壇的周圍」——會幕門口在本章是牽牲獻祭、灑血的地點。CT：會幕門口有銅壇，是預表主的十字架；獻祭的人牽祭牲到會幕門口，是表示自己甘心樂意獻這祭，也是在眾人面前承認神為主。"
  "relation": "出29章的會幕門口是祭司承接聖職、洗身、吃聖肉之處；利1章補上會幕門口作為「一般百姓獻燔祭」的地點功能——不只是祭司職事的場所，也是全體百姓親近神、獻上供物的入口。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "本章清楚劃分獻祭者與祭司的職責：v5,7,8,11「亞倫子孫作祭司的」／「祭司亞倫的子孫」負責奉血、灑血、放火、擺柴、擺放肉塊；v9,12,13,15,17泛稱「祭司」負責全燒祭物在壇上。GT明確指出：「宰殺祭牲是獻祭之人的工作，而奉上血和灑血則是祭司的工作。」"
  "relation": "出29章記亞倫和他兒子承接聖職、正式就任祭司的整個禮儀過程；利1章是他們就任後、在日常燔祭事奉中的具體職責展示——奉血灑血、司理壇火、擺放祭物、全燒馨香，是祭司中保職分的例行實踐。"
- "title": "血的尊重"
  "path": "link_folder/神學/血的尊重.md"
  "summary": "v5,11,15記載燔祭儀式中血的處理：公牛與羊的血「灑在壇的周圍」，鳥的血因量少而「流在壇的旁邊」。GT明確引利十七11解釋：「血中有生命，故能夠贖罪。」"
  "relation": "創9:4的核心命題是「生命在血中」，因此禁止吃帶血的肉；利1章展示這神學命題的積極應用——正因生命在血中，血才能被用來灑壇贖罪，使燔祭蒙悅納。禁食血（消極面）與灑血贖罪（積極面）是同一「生命在血中」神學的一體兩面。"
