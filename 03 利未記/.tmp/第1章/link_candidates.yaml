book: "利未記"
chapter: 1
candidates:
  - name: "燔祭（olah）"
    type: "原文"
    evidence: "利未記1章核心主題：燔祭條例（v3-17），希伯來文 olah 意為「上升」，表完全獻給神的馨香火祭。BH、CCB、KC 均詳細解釋其字義、儀式與預表基督。"
    surfaces:
      - "燔祭"
      - {phrase: "供物", verses: [2]}
      - {phrase: "獻供物", verses: [2]}

  - name: "按手"
    type: "原文"
    evidence: "v4「他要按手在燔祭牲的頭上」，希伯來文 samak，表認同、轉移、委身。KC 指出此預表信徒與基督聯合（羅6:5），CCB 解釋為「獻祭的人與所獻的祭牲合而為一」。"
    surfaces:
      - "按手"

  - name: "贖罪"
    type: "神學"
    evidence: "v4「燔祭便蒙悅納，為他贖罪」，希伯來文 kaphar（遮蓋、抹掉）。KC 指出雖燔祭非為罪而獻，但獻祭者本性有罪，須藉此蒙遮蓋；CCB 註解「祭物本身永不能除罪，反而叫人想起罪來」。"
    surfaces:
      - "贖罪"

  - name: "祭司"
    type: "人物"
    evidence: "v5、7-9、11-13、15、17 多處出現「亞倫子孫作祭司的」、「祭司要把...燒在壇上」。KC 強調祭司為信徒屬靈成熟的圖畫（彼前2:5），CCB 解釋祭司職分與獻祭流程。"
    surfaces:
      - "祭司"
      - "亞倫子孫"
      - "亞倫的子孫"

  - name: "會幕"
    type: "地點"
    evidence: "v1「耶和華從會幕中呼叫摩西」，v3、5、11「會幕門口」。BH 指出會幕為神與人相會之處，預表基督「支搭帳棚住在我們中間」（約1:14）。CCB 註解會幕預表基督與教會。"
    surfaces:
      - "會幕"
      - "會幕門口"

  - name: "祭壇"
    type: "主題"
    evidence: "v5、7-9、11-13、15-17 反覆出現「壇」、「祭壇」。KC 解釋祭壇預表十字架，火表神審判的聖潔。CCB 註解銅壇（燔祭壇）的構造與意義。"
    surfaces:
      - "壇"
      - "祭壇"
      - "壇上"

  - name: "血"
    type: "神學"
    evidence: "v5、11、15「把血灑在壇的周圍」、「血要流在壇的旁邊」。KC 指出血代表生命（利17:11），預表基督寶血贖罪。BH 解釋灑血預表基督之血潔淨信徒（約壹1:7）。"
    surfaces:
      - "血"
      - "灑血"
      - "流血"

  - name: "脂油"
    type: "主題"
    evidence: "v8-9、12-13「頭並脂油」、「脂油...燒在壇上」。KC 解釋脂油代表基督獻上自己的精力與活力；CCB 指出脂油屬神（利3:16），表基督完全為神而活。"
    surfaces:
      - "脂油"
      - "脂油"

  - name: "馨香的火祭"
    type: "神學"
    evidence: "v9、13、17「馨香的火祭」，KC 指出燔祭、素祭、平安祭同為「馨香之氣」，表基督工作完全榮耀神；BH 連結弗5:2「基督愛我們，為我們捨了自己，當作馨香的供物和祭物獻給神」。"
    surfaces:
      - "馨香的火祭"
      - "馨香"

  - name: "悅納"
    type: "神學"
    evidence: "v3、4「可以在耶和華面前蒙悅納」、「燔祭便蒙悅納」。KC 解釋預表神在基督裡悅納信徒（弗1:6）；CCB 註解「蒙悅納」指神所喜悅。"
    surfaces:
      - "悅納"
      - "蒙悅納"

  - name: "無殘疾"
    type: "神學"
    evidence: "v3、10「沒有殘疾的公牛/公羊」，希伯來文 tamim（完全、無瑕）。KC 指出預表基督「無瑕疵、無玷污」（彼前1:19）；CCB 解釋「從頭到底完全」。"
    surfaces:
      - "無殘疾"
      - "沒有殘疾"
      - "完全"

  - name: "公牛"
    type: "文化"
    evidence: "v3、5「公牛」為燔祭最大牲畜。KC 指出牛預表基督忍耐、勞苦、忠心的僕人形象；CCB 解釋牛表基督在神面前又忍耐、又勞苦、又忠心。"
    surfaces:
      - "公牛"
      - "牛"

  - name: "綿羊"
    type: "文化"
    evidence: "v10「綿羊或山羊」為燔祭中等牲畜。KC 指出羊預表基督溫順、順服、甘受欺壓（賽53:7）；CCB 解釋羊表基督順服至死。"
    surfaces:
      - "綿羊"
      - "羊"
      - "羊羔"

  - name: "山羊"
    type: "文化"
    evidence: "v10「山羊」為燔祭較小牲畜。KC 指出山羊為贖罪祭特徵動物，表除去罪惡；CCB 解釋山羊表基督除去罪惡。"
    surfaces:
      - "山羊"

  - name: "鳥（斑鳩/雛鴿）"
    type: "文化"
    evidence: "v14「斑鳩或是雛鴿」為燔祭最小牲畜。KC 指出鳥預表基督為從天上來的人（約3:13）；CCB 解釋鳥表基督屬天的起源。"
    surfaces:
      - "鳥"
      - "斑鳩"
      - "雛鴿"

  - name: "宰殺"
    type: "事件"
    evidence: "v5、11、15「宰公牛」、「宰於壇的北邊」、「揪下頭來」。KC 強調宰殺表基督死是神所命定（約10:18），非被動受害；BH 解釋宰殺預表基督為罪人死。"
    surfaces:
      - "宰"
      - "宰殺"
      - "揪下頭來"

  - name: "灑血"
    type: "事件"
    evidence: "v5、11「把血灑在壇的周圍」。KC 解釋灑血表基督寶血潔淨信徒（來9:14）；BH 指出灑血在壇四角表贖罪普及四方。"
    surfaces:
      - "灑血"
      - "把血灑"

  - name: "剝皮切塊"
    type: "事件"
    evidence: "v6、12「剝去燔祭牲的皮，把燔祭牲切成塊子」。KC 解釋剝皮切塊表信徒深入思想基督內在生命（詩篇）；CCB 指出切塊表基督被擊打、破碎。"
    surfaces:
      - "剝皮"
      - "切成塊子"
      - "剝去...皮"

  - name: "燒在壇上"
    type: "事件"
    evidence: "v9、13、17「祭司就要把一切全燒在壇上」、「在壇上、在火的柴上焚燒」。KC 指出火表神審判聖潔，全燒表基督完全獻上；BH 解釋燒盡表基督工作完全。"
    surfaces:
      - "全燒"
      - "燒在壇上"
      - "焚燒"

  - name: "洗臟腑與腿"
    type: "事件"
    evidence: "v9、13「臟腑與腿要用水洗」。KC 解釋水表神的話（弗5:26），洗淨表基督內在情感與行走完全合乎神話語；CCB 指出洗淨表基督無污穢。"
    surfaces:
      - "洗"
      - "用水洗"
      - "臟腑與腿"

  - name: "耶和華呼叫摩西"
    type: "事件"
    evidence: "v1「耶和華從會幕中呼叫摩西」。BH 指出這是神第四次呼叫摩西（出3:4、19:3、19:20、本節），表神主動啟示敬拜條例；KC 指出摩西第三次被呼叫，為講論敬拜與親近神。"
    surfaces:
      - "呼叫摩西"
      - "從會幕中呼叫"

  - name: "供物"
    type: "主題"
    evidence: "v2「獻供物給耶和華」，希伯來文 qorban（親近、奉獻）。KC 指出供物表信徒將基督獻給神；CCB 解釋獻供物乃自願、個別、主動的行為。"
    surfaces:
      - "供物"
      - "獻供物"

  - name: "牛群羊群"
    type: "背景"
    evidence: "v2「要從牛群羊群中獻牲畜為供物」。KC 指出牛羊為馴服動物，預表基督順服；CCB 解釋視獻祭人財力而定，原則是甘心獻上貴重的。"
    surfaces:
      - "牛群羊群"
      - "牲畜"

  - name: "鹽約"
    type: "神學"
    evidence: "利未記2:13「一切的供物都要配鹽而獻」，雖不在本章但與燔祭制度相關。KC 指出鹽表立約永恆、不變質；CCB 解釋鹽約表神與人約關係永不廢棄。"
    surfaces:
      - "鹽"
      - "配鹽"

  - name: "無酵餅"
    type: "主題"
    evidence: "利未記2:4-5、11「不可有酵...不可燒一點酵、一點蜜」，與燔祭同為馨香火祭。KC 指出無酵表基督無罪、純潔；酵表邪惡、虛偽（太16:6）。"
    surfaces:
