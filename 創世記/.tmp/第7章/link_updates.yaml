book: 創世記
chapter: 7
updates:
- title: 挪亞
  path: link_folder/人物/挪亞.md
  summary: 挪亞六百歲時遵神命令，帶妻子、三子與兒婦以及各類活物進入方舟；洪水臨到後，只有他和方舟中的生命存留。
  relation: 第7章把第6章的吩咐化為行動，重複強調挪亞照耶和華所吩咐的行，顯明他的信心、義與順服。
- title: 閃
  path: link_folder/人物/閃.md
  summary: 閃與父親挪亞、母親、兄弟及三位妻子在洪水當日一同進入方舟。
  relation: 本章記閃在普世洪水中因屬挪亞之家而蒙保守，成為洪水後人類與應許家譜延續的一員。
- title: 含
  path: link_folder/人物/含.md
  summary: 含與挪亞一家在洪水開始時進入方舟，避過淹沒全地的水。
  relation: 第7章把含列入神所保存的八口之家，為第9至10章關於其家族的敘事留下背景。
- title: 雅弗
  path: link_folder/人物/雅弗.md
  summary: 雅弗與挪亞一家同入方舟，在洪水消滅地上一切有氣息之物時得以存留。
  relation: 本章確立雅弗是洪水後人類重新展開的祖先之一，其蒙保存完全出於神藉方舟所作的安排。
- title: 方舟的豫表
  path: link_folder/神學/方舟的豫表.md
  summary: 方舟在洪水增長、漫過高山並淹沒地上一切活物時浮起，保存挪亞一家及按類帶入的活物。
  relation: 第7章具體呈現方舟作審判中唯一避難所的功能；來源據此將進入方舟連於在基督裡蒙拯救。
- title: 義人與完全人
  path: link_folder/神學/義人與完全人.md
  summary: 耶和華對挪亞說「在這世代中，我見你在我面前是義人」，並命他和全家進入方舟。
  relation: 第7章把挪亞在神面前的義與實際遵命並列；這義使他與敗壞世代有別，卻仍以神主動提供方舟為得救途徑。
- title: 大淵的泉源與天上的窗戶
  path: link_folder/神學/大淵的泉源與天上的窗戶.md
  summary: 挪亞六百歲二月十七日，大淵泉源裂開、天上窗戶敞開，雨降四十晝夜，形成從上下同時臨到的洪水。
  relation: 這組語言描寫受造秩序在審判中彷彿被逆轉，也強調洪水不是普通暴雨，而是神所掌管的全面事件。
- title: 耶和華把他關在方舟裡
  path: link_folder/神學/耶和華把他關在方舟裡.md
  summary: 挪亞一家與活物進入方舟後，耶和華親自把他關在方舟裡，隨後洪水臨到。
  relation: 關門表明得救的安全由神親自保守，也標示寬限期結束、審判開始；方舟內外由神所定的界線分開。
- title: 潔淨與不潔淨的早期區分
  path: link_folder/主題/潔淨與不潔淨的早期區分.md
  summary: 神吩咐挪亞帶潔淨畜類七公七母，不潔淨畜類一公一母，飛鳥也帶七公七母，以保存種類。
  relation: 這是摩西律法頒布前已有潔淨與不潔淨分類的明證；較多潔淨牲畜也為洪水後獻祭及繁衍留下餘量。
- title: 四十的屬靈意義
  path: link_folder/原文/四十的屬靈意義.md
  summary: 洪水降在地上四十晝夜，水勢不斷增長，使方舟浮起並漫過高山。
  relation: 本章使「四十」與一段完整的試煉和審判時期相連；後續經文亦常以四十標示受試驗、預備或轉折。
- title: 各從其類
  path: link_folder/原文/各從其類.md
  summary: 飛鳥、牲畜、地上昆蟲都各從其類成雙來到挪亞那裡，進入方舟保存生命。
  relation: 第7章延續創造敘事「各從其類」的秩序；審判並未取消神對受造種類的保存，反而藉方舟使其延續。
