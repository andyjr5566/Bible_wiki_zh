book: 申命記
chapter: 11
knowledge_nodes:
  核心神學:
  - 愛耶和華你的神、常守祂的吩咐律例典章誡命
  - 謹守遵行誡命、愛耶和華、行祂的道、專靠祂
  - 今日將祝福與咒詛的話都陳明在你們面前
  - 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
  歷史見證:
  - 神的管教、威嚴、大能的手、伸出來的膀臂
  - 埃及神蹟奇事（十災）
  - 大坍、亞比蘭被地吞滅（可拉黨叛逆）
  - 親眼看見耶和華所做的一切大事
  地理與應許:
  - 守誡命得地、膽壯
  - 迦南地與埃及地的對比（雨水滋潤 vs 腳澆灌）
  - 早雨晚雨（秋雨春雨）
  - 牲畜有草吃、吃得飽足
  - 腳掌所踏之地都歸你們（從曠野、利巴嫩、伯拉大河、直到西海）
  - 將祝福的話陳明在基利心山上、咒詛的話陳明在以巴路山上
  - 過約但河、進去得地、在那地居住、謹守遵行律例典章
  生活實踐:
  - 將話存在心內、留在意中、繫在手上為記號、戴在額上為經文
  - 教訓兒女（坐在家裡、行在路上、躺下、起來都要談論）
  - 寫在房屋門框上、城門上
  - 日子在應許地上得以增多、如天覆地的日子那樣多
  祝福與咒詛:
  - 謹慎免得心中受迷惑、偏離正路、事奉敬拜別神
  - 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
  - 神從你們面前趕出國民、得他們的地
  - 必無一人能在你們面前站立得住、神使懼怕驚恐臨到居民
