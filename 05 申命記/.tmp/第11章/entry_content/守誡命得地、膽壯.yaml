name: 守誡命得地、膽壯
type: 神學
secondary_types: []
aliases:
- 守誡得地膽壯
status: formal
definition: 申命記 11:8-9 應許若守一切誡命，百姓必「膽壯」，能進去得地，且日子在流奶與蜜之地得以長久。這將順服與屬靈勇氣、產業得著、生命延長直接掛鉤，顯示約法遵行的具體福祉。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西勸勉守誡命使膽壯、得地、日子長久（v.8-9），並對比埃及與迦南地的水源差異（v.10-12）說明得地之美好。
  relation: 承接「親眼看見大事」（v.7）的責任感，並為後續「若留意聽從…必降雨賜福」（v.13-15）與「謹慎免受迷惑」（v.16）鋪陳動機。
related_entries:
- 愛耶和華你的神、常守祂的吩咐律例典章誡命
- 親眼看見耶和華所做的一切大事
- 迦南地與埃及地的對比（雨水滋潤 vs 腳澆灌）
- 謹守遵行誡命、愛耶和華、行祂的道、專靠祂
