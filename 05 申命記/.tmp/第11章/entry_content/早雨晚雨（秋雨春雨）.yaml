name: 早雨晚雨（秋雨春雨）
type: 神學
secondary_types: []
aliases:
- 秋雨春雨
status: formal
definition: 申命記 11:14 應許若百姓留意聽從誡命、愛神盡心盡性事奉，神必「按時降秋雨春雨」（原文：早雨晚雨）在其地上，使可收藏五穀、新酒和油。早雨（秋雨，10-11月）軟化土壤利播種，晚雨（春雨，3-4月）灌漿增產，象徵神對農業節氣的主權掌管與約恩典的具體化。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 經文應許順服者神按時降早雨晚雨（v.14），賜五穀新酒油，並使牲畜有草吃、人吃得飽足（v.15）。
  relation: 此為「迦南地靠雨水滋潤」（v.11）在約法框架下的條件性實現，與悖逆時「天閉塞不下雨」（v.17）形成鮮明對比。
related_entries:
- 迦南地與埃及地的對比（雨水滋潤 vs 腳澆灌）
- 牲畜有草吃、吃得飽足
- 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
- 愛耶和華你的神、常守祂的吩咐律例典章誡命
