name: 今日將祝福與咒詛的話都陳明在你們面前
type: 神學
secondary_types: []
aliases:
- 祝福與咒詛的選擇
status: formal
definition: 申命記 11:26 摩西宣告「今日」將「祝福與咒詛」的話陳明在以色列人面前，正式啟動約的雙邊選擇機制。第 27-28 節隨即展開：聽從誡命得福，不聽從偏離道事奉別神受禍。這確立了約法生效的當下性（今日）與雙重後果的對稱結構，為第
  29 節基利心山/以巴路山的正式立約儀式鋪墊。
development: 總結第 13-17 節（聽從得雨糧 vs 悖逆旱災滅亡）與第 18-25 節（順服得地守地 vs 隱含悖逆失地）的神學邏輯，以「祝福/咒詛」雙軌制正式呈現，引向第
  29-30 節儀式性宣讀與第 31-32 節進地守法的總動員。
accumulations:
- book: 申命記
  chapter: 11
  summary: 第 26 節宣告祝福與咒詛雙重選擇陳明在百姓面前，作為本章約法勸勉的高潮總結。
  relation: 整合第 13-25 節所有順服/悖逆的條件與後果，銜接第 27-28 節具體定義、第 29-30 節儀式落地、第 31-32 節進地守法總綱。
related_entries:
- 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
- 將祝福的話陳明在基利心山上、咒詛的話陳明在以巴路山上
- 過約但河、進去得地、在那地居住、謹守遵行律例典章
- 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
