name: 將祝福的話陳明在基利心山上、咒詛的話陳明在以巴路山上
type: 事件
secondary_types: []
aliases:
- 基利心山與以巴路山祝福咒詛
- 基利心山祝福
- 以巴路山咒詛
status: formal
definition: 申命記 11:29-30 記載耶和華命令以色列人進入迦南地後，須將祝福的話在基利心山上陳明，將咒詛的話在以巴路山上陳明。二山位於約但河西岸，基利心山在南、以巴路山在北，靠近吉甲與摩利橡樹。此儀式於約書亞記
  8:30-35 實現，象徵約法在應許地的正式生效與公開宣示。
development: 此事件為「進地-立約-宣讀律法」三部曲的關鍵環節，預表新約中基督在十字架上成就律法的咒詛（加 3:13），使信靠者得著亞伯拉罕的福（加 3:14）；教會歷史中常被視為「約的更新儀式」原型。
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西指定基利心山為宣福之山、以巴路山為宣咒之山，並確認其地理位置，作為進地後立約儀式的預備。
  relation: 本章為儀式的神學依據與地理指令，連結前文祝福咒詛的條件（26-28 節）與後文過河得地的命令（31-32 節）。
related_entries:
- 今日將祝福與咒詛的話都陳明在你們面前
- 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
- 過約但河、進去得地、在那地居住、謹守遵行律例典章
- 腳掌所踏之地都歸你們（從曠野、利巴嫩、伯拉大河、直到西海）
