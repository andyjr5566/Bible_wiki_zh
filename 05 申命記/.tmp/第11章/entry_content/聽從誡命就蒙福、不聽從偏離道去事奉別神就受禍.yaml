name: 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 本章第 13-17、26-28 節陳明若留心聽從誡命、愛神盡心事奉，必按時降秋雨春雨、五穀新酒油豐收、飽足且牲畜有草；若心中受迷惑偏離正路事奉別神，耶和華必發怒，天閉塞不下雨、地不出產、使百姓速速滅亡。
development: 本章闡述聽從誡命蒙福、悖逆事奉別神受禍的雙重後果，作為立約祝福與咒詛的核心神學。
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西闡述聽從誡命得早雨晚雨、飽足、牲畜有草；不聽從則天閉塞不下雨、地不出產、速速滅亡。
  relation: 作為立約祝福與咒詛的核心神學。
related_entries:
- 早雨晚雨（秋雨春雨）
- 牲畜有草吃、吃得飽足
- 謹慎免得心中受迷惑、偏離正路、事奉敬拜別神
- 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
- 今日將祝福與咒詛的話都陳明在你們面前
