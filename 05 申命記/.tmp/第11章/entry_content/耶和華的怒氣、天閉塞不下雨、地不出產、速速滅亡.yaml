name: 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 11:17 警告以色列人，若心中受迷惑、偏離正路去事奉別神，耶和華的怒氣必向他們發作，導致天閉塞不下雨、地不出產，使他們在耶和華所賜的美地上速速滅亡。這顯示約的咒詛層面：違背約法將失去應許之地的生存基礎（雨水與出產）。
development: 此條款承接第 16 節「謹慎免得心中受迷惑」的警告，具體陳述違約的自然與生存後果，呼應利未記 26:19-20、申命記 28:23-24
  關於天鐵地銅的咒詛描述。
accumulations:
- book: 申命記
  chapter: 11
  summary: 第 17 節記載違背約法、事奉別神將招致耶和華怒氣，導致旱災、饑荒與滅亡。
  relation: 本章核心勸勉「聽從得福、悖逆受禍」的負面後果具體化，作為第 13-15 節順服得福應許的對比。
related_entries:
- 謹慎免得心中受迷惑、偏離正路、事奉敬拜別神
- 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
