name: 神的管教、威嚴、大能的手、伸出來的膀臂
type: 神學
secondary_types: []
aliases:
- 神的管教與大能
status: formal
definition: 申命記 11:2 指出當代百姓（非兒女）親眼看見耶和華的「管教」、「威嚴」、「大能的手」與「伸出來的膀臂」。這四重描述總結神在出埃及、紅海、曠野中對埃及與悖逆者施行的審判與拯救行動，彰顯神主權統治的可見實況。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西提醒百姓當知道神的管教、威嚴、大能的手、伸出來的膀臂（v.2），並列舉埃及神蹟（v.3）、紅海淹沒敵軍（v.4）、曠野供應（v.5）、大坍亞比蘭被吞（v.6）作為具體見證。
  relation: 這段經文建立「看見神大能作為」與「當守誡命」（v.8）之間的因果邏輯，作為本章勸勉順服的歷史神學依據。
related_entries:
