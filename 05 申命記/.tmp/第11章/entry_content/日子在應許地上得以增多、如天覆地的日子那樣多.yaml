name: 日子在應許地上得以增多、如天覆地的日子那樣多
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 11:21 應許若以色列人遵行第 18-20 節（心存、教導、書寫）的誡命，他們與子孫在耶和華向列祖起誓應許之地的日子將得以增多，如天覆地的日子那樣多。這將「長久居住應許地」作為忠心傳承約法的終極獎賞，強調土地恩賜的條件性與永恆性。
development: 承接第 9 節「日子長久」的應許，具體化為「如天覆地」的恆久意象，並明確連結第 18-20 節的具體順服行動，構成本章「得地、守地、傳地」神學邏輯的高潮。
accumulations:
- book: 申命記
  chapter: 11
  summary: 第 21 節將順服誡命（含教導下一代）與在應許地長久居住的應許掛鉤。
  relation: 作為第 18-20 節順服行動的直接應許回報，並呼應第 9 節、第 22-25 節得地與守地的連續應許。
related_entries:
- 教訓兒女（坐在家裡、行在路上、躺下、起來都要談論）
- 寫在房屋門框上、城門上
- 守誡命得地、膽壯
- 謹守遵行誡命、愛耶和華、行祂的道、專靠祂
