name: 謹守遵行誡命、愛耶和華、行祂的道、專靠祂
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 11:22 總結得地與守地的核心條件：謹守遵行一切誡命、愛耶和華神、行祂一切的道、專靠祂（貼近/緊貼祂）。這四個動詞涵蓋外在行為（謹守遵行、行道）與內在關係（愛神、專靠），構成約法忠誠的完整定義。
development: 承接第 1 節「愛神、常守誡命」、第 13 節「留意聽從、盡心盡性事奉」，在第 22 節達到神學總結，為第 23-25 節趕出國民、擴張疆界、無人能敵的應許提供神學依據。
accumulations:
- book: 申命記
  chapter: 11
  summary: 第 22 節以四重動詞定義約法忠誠的完整內涵，作為後續得勝應許的條件。
  relation: 本章核心神學命題，串聯第 1、13、18 節的順服要求，並直接引出第 23-25 節的得地、擴境、得勝應許。
related_entries:
- 愛耶和華你的神、常守祂的吩咐律例典章誡命
- 守誡命得地、膽壯
- 神從你們面前趕出國民、得他們的地
- 腳掌所踏之地都歸你們（從曠野、利巴嫩、伯拉大河、直到西海）
- 必無一人能在你們面前站立得住、神使懼怕驚恐臨到居民
