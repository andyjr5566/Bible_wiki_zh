name: 腳掌所踏之地都歸你們（從曠野、利巴嫩、伯拉大河、直到西海）
type: 地點
secondary_types: []
aliases:
- 應許地疆界
status: formal
definition: 申命記 11:24 界定以色列得地的地理疆界：南從曠野（巴勒斯坦南部/西奈北部），北至利巴嫩山脈，東達伯拉大河（幼發拉底河），西至西海（地中海）。「腳掌所踏之地」象徵透過實際行走/佔有來確認神賜地的應許（參創
  13:17、書 1:3）。
development: 承接第 23 節「趕出國民、得他們的地」，將抽象的「得地」具體化為具體地理坐標，對應創世記 15:18「從埃及河直到伯拉大河」的應許疆界，為後續約書亞記征服敘事提供地理框架。
accumulations:
- book: 申命記
  chapter: 11
  summary: 第 24 節以四個地標界定應許地的最大疆界範圍。
  relation: 第 23 節趕出國民的地理具體化，配合第 25 節「所踏之地居民懼怕」，構成領土取得的神學與地理雙重保障。
related_entries:
- 神從你們面前趕出國民、得他們的地
- 必無一人能在你們面前站立得住、神使懼怕驚恐臨到居民
