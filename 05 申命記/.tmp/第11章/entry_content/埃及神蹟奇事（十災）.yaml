name: 埃及神蹟奇事（十災）
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 本章第 3-4 節記載耶和華在埃及向法老和全地所行的神蹟奇事，並使紅海水淹沒追趕以色列的埃及軍兵、車馬，彰顯神的大能與拯救。
development: 摩西回顧埃及的神蹟奇事，作為以色列人當記住並順服誡命的依據。
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西提醒百姓親眼看見耶和華在埃及向法老和全地所行的神蹟奇事，以及紅海淹沒埃及軍兵。
  relation: 作為順服誡命的動機，證明神的大能與信實。
related_entries:
- 神的管教、威嚴、大能的手、伸出來的膀臂
- 親眼看見耶和華所做的一切大事
- 守誡命得地、膽壯
