name: 愛耶和華你的神、常守祂的吩咐律例典章誡命
type: 神學
secondary_types: []
aliases:
- 愛神守誡
status: formal
definition: 申命記 11:1、13、22 強調以色列人當愛耶和華─他們的神，並常守祂的吩咐、律例、典章、誡命。這是立約關係的核心回應，連結「盡心盡性事奉祂」（11:13）與「行祂的道、專靠祂」（11:22），顯示愛神不是抽象情感，而是具體順服約法。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西吩咐百姓要愛耶和華並常守祂的誡命（v.1），應許若留意聽從、盡心盡性事奉，神必降雨賜福（v.13-15），並趕出敵人、擴張疆界（v.22-23）。
  relation: 本章將「愛神守誡」作為得地、蒙福、享受神看顧的先決條件，並作為後續警告（v.16-17）與教導下一代（v.18-21）的神學基礎。
related_entries:
- 守誡命得地、膽壯
- 謹慎免得心中受迷惑、偏離正路、事奉敬拜別神
- 謹守遵行誡命、愛耶和華、行祂的道、專靠祂
- 聽從誡命就蒙福、不聽從偏離道去事奉別神就受禍
