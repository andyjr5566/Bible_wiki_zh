  summary: 摩西命令將話語繫在手上、戴在額上、寫在房屋門框上、城門上。
  relation: 作為將神的話語內化並傳承的具體儀式。
related_entries:
- 將話存在心內、留在意中、繫在手上為記號、戴在額上為經文
- 教訓兒女（坐在家裡、行在路上、躺下、起來都要談論）
- 日子在應許地上得以增多、如天覆地的日子那樣多
