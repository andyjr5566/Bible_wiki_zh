name: 寫在房屋門框上、城門上
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 本章第 18-20 節命令將神的話語繫在手上、戴在額上，並寫在房屋的門框上、城門上，作為時常記念並教導兒女的記號。
development: 摩西吩咐將神的話語寫在門框城門，作為將神的話語內化並傳承的具體儀式。
accumulations:
