name: 牲畜有草吃、吃得飽足
type: 神學
secondary_types: []
aliases:
- 牲畜飽足
status: formal
definition: 申命記 11:15 記載神應許「使田野為你的牲畜長草」，並使你「吃得飽足」。這是早雨晚雨（v.14）帶來農業豐收後的連鎖效應：糧食充足、牧場茂盛、人畜共享神的供應，體現「流奶與蜜之地」（v.9）的具體生活場景。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 經文列舉順服蒙福的綜合供應：五穀新酒油、牲畜有草、人吃飽足（v.14-15）。
  relation: 此為「迦南地雨水滋潤」（v.11）與「早雨晚雨」（v.14）在民生層面的實踐，對比悖逆時「地不出產」（v.17）的匱乏。
related_entries:
- 早雨晚雨（秋雨春雨）
- 迦南地與埃及地的對比（雨水滋潤 vs 腳澆灌）
- 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
