name: 迦南地與埃及地的對比（雨水滋潤 vs 腳澆灌）
type: 地點
secondary_types: []
aliases:
- 迦南埃及對比
status: formal
definition: 申命記 11:10-12 對比埃及地靠「腳澆灌」（人力灌溉）像菜園，迦南地卻是「有山有谷、雨水滋潤之地」，且是耶和華所眷顧、從歲首到年終眼目時常看顧之地。這地理與神學對比強調迦南地的產業屬於神主權恩典的供應，而非人力掌控。
development: []
accumulations:
- book: 申命記
  chapter: 11
  summary: 摩西描述迦南地非如埃及靠人力灌溉，乃靠天雨、神看顧（v.10-12），作為守誡命得地之福的地理背景。
  relation: 此對比引出順服蒙福（早雨晚雨、五穀新酒油、牲畜飽足，v.13-15）與悖逆受罰（天閉塞不下雨、地不出產、速速滅亡，v.17）的農業神學框架。
related_entries:
- 早雨晚雨（秋雨春雨）
- 牲畜有草吃、吃得飽足
- 耶和華的怒氣、天閉塞不下雨、地不出產、速速滅亡
