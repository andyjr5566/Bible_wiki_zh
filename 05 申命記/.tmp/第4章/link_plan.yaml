  target_path: link_folder/事件/巴力毘珥事件.md
- name: 何烈山領受十誡
  suggested_type: 事件
  evidence: '經文：申4:10-13。「你在何烈山站在耶和華你神面前的那日，耶和華對我說：你為我招聚百姓，我要叫他們聽見我的話……他將所吩咐你們當守的約指示你們，就是十條誡，並將這誡寫在兩塊石版上。」

    ccbiblestudy CT：何烈山即西乃山，神招聚百姓聽話，使學習敬畏、教訓兒女。山上火焰沖天、昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。將十誡寫在兩塊石版上。

    ccbiblestudy GT：何烈山即西乃山，神在該處向百姓顯現。神是靈，沒有形像，十誡是約的條規。兩塊石版內容相同，立約雙方各執一塊，存放約櫃中。

    KingComments：何烈山是神向百姓顯現之地，火焰昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。十誡是約，寫在兩塊石版上。

    BibleHub Study：何烈山即西乃山，神招聚百姓聽話，使學習敬畏、教訓兒女。火焰昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。十誡寫在兩塊石版上。'
