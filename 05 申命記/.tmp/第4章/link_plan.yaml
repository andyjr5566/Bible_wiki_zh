  suggested_type: 神學
  evidence: '經文：申4:25-28。「你們在那地住久了，生子生孫，就雕刻偶像……我今日呼天喚地向你們作見證，你們必在過約但河得為業的地上速速滅盡！你們不能在那地上長久，必盡行除滅。耶和華必使你們分散在萬民中……在那裡，你們必事奉人手所造的神，就是用木石造成、不能看、不能聽、不能吃、不能聞的神。」

    ccbiblestudy CT：住久生子生孫若雕刻偶像，必速速滅盡，被分散在萬民中，事奉木石偶像。

