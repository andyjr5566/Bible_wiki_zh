- name: 神的獨一無二
  suggested_type: 神學
  evidence: '經文：申4:32-35。「你且考察在你以前的世代……曾有何民聽見神在火中說話的聲音，像你聽見還能存活呢？這樣的大事何曾有、何曾聽見呢？神何曾從別的國中將一國的人民領出來……這是顯給你看，要使你知道，惟有耶和華他是神，除他以外，再無別神。」

    ccbiblestudy CT：考察古今，無民聽見神在火中說話存活。神從別國領出一國，用試驗神蹟奇事爭戰大能手伸出膀臂大可畏事。顯明惟有耶和華是神，除他以外再無別神。

    ccbiblestudy GT：神的獨一無二：從火中說話、從埃及領出一國、用大能手伸出膀臂。顯明惟有耶和華是神。

