C_new_formal:
- name: 摩西勸勉遵守律例典章
  suggested_type: 事件
  evidence: '經文：申4:1-40。摩西勸勉以色列人聽從遵行律例典章，不可加添刪減，好叫存活、進入承受應許之地。回顧巴力毘珥事件：隨從巴力毘珥的被除滅，專靠耶和華的全都存活。強調謹守遵行是萬民眼前的智慧聰明，神與他們相近，律例典章公義。勸勉謹慎保守心靈，免得忘記何烈山所見之事，要傳給子孫。

    ccbiblestudy CT：本章是摩西教訓百姓應遵行律法的講話，鼓勵聽從神吩咐的律例典章，棄絕假神。強調以色列的神為獨一無二真神，與以色列關係親密。律例典章代表神全部律法和訓詞。

    ccbiblestudy GT：摩西力證遵守律法必要性，以神過去特殊護理為據。律法精神貫穿新舊約，基督成就了律法精神。法利賽人用人誡命替代神話語被責備。

    KingComments：摩西勸勉百姓遵守律法，俾能安居應許地。遵行律法是智慧聰明，神與他們相近，律法公義。不可加添刪減神的話。

    BibleHub Study：摩西勸勉聽從遵行律例典章，好叫存活、進入承受地。不可加添刪減。巴力毘珥事親眼看見，隨從者被除滅，專靠耶和華的存活。'
  surfaces:
