- name: 巴力毘珥事件
  suggested_type: 事件
  evidence: '經文：申4:3-4。「耶和華因巴力毘珥的事所行的，你們親眼看見了。凡隨從巴力毘珥的人，耶和華你們的神都從你們中間除滅了。惟有你們專靠耶和華你們神的人，今日全都存活。」

    ccbiblestudy CT：巴力毘珥指在毗珥山上的巴力，巴力是迦南地繁殖之神。民25:3-5,8記載此事，二萬四千人死於瘟疫。

    ccbiblestudy GT：巴力毘珥是以色列人在毗珥崇拜的巴力，巴力即主人之意，是迦南人掌五穀生產之神，敬拜混雜淫亂。

    KingComments：巴力毘珥事見民25章，二萬四千人死於瘟疫。摩西回顧此事教訓真正生活原理。

    BibleHub Study：巴力毘珥事親眼看見，隨從者被除滅，專靠耶和華的存活。'
  surfaces:
