name: 比悉（Bezer）
type: 地點
secondary_types: []
aliases:
- 比悉
status: formal
definition: 比悉是摩西在約但河東為流便支派分定的三座逃城之一，位於曠野平原，供無心殺人者逃往避難以保性命（申 4:41-43）。
development: 本章記載摩西在約但河東分定三座逃城，比悉為流便人所得，與迦得人的拉末、瑪拿西人的哥蘭並列，顯示神在進入迦南前已為誤殺者預備庇護之所，彰顯公義與憐憫並存的法律精神。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西在約但河東分定三座逃城，比悉歸屬流便支派，位於曠野平原。
  relation: 本章歷史敘事段落（4:41-43）明確點出比悉為逃城之一，屬流便支派產業範圍內。
