name: 專靠耶和華
type: 神學
secondary_types: []
aliases:
- 專靠耶和華
- 緊貼耶和華
status: formal
definition: 申命記 4:4 以巴力毘珥事件為反面教材，對比「凡隨從巴力毘珥的人……除滅了」與「惟有你們專靠耶和華─你們神的人，今日全都存活」。希伯來文
  דְּבֵקִים (deḇēqīm) 來自 דָּבַק (dāḇaq)「緊貼、依附、忠誠」，表達立約關係中獨一無二的委身與信靠，是得生命的唯一路徑。
development: 此神學主題貫穿申命記（參 10:20；11:22；13:5；30:20），將「專靠」與「存活」直接掛鉤，構成申命記神學的核心軸心：生命源於與立約神的緊密連結。
accumulations:
- book: 申命記
  chapter: 4
  summary: 第 3-4 節以巴力毘珥事件對比，指出專靠耶和華者得存活，隨從偶像者被除滅。
  relation: 本章勸勉段落的神學核心，以歷史慘痛教訓確立獨一委身的必要性。
