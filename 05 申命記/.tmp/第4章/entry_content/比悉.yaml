status: formal
definition: 申命記 4:43 指明比悉位於曠野平原，是為流便支派分定的三座逃城之一。希伯來文 בֶּצֶר (Beṣer) 含「堡壘、防禦工事」之意，地理上位於摩押高原北部，今日約旦境內的烏姆·艾勒·巴薩特附近。
development: 作為逃城，比悉體現神在約但河東為誤殺者預備的庇護所，屬流便支派產業範圍內。
accumulations:
