name: 悔改蒙恩
type: 神學
secondary_types: []
aliases:
- 悔改蒙恩
- 歸回耶和華得憐憫
status: formal
definition: 申命記 4:29-31 應許在分散萬國、遭遇患難時，若盡心盡性尋求耶和華、歸回聽從祂的話，就必尋見；因耶和華是有憐憫的神，總不撇下、不滅絕、不忘記與列祖所立的約。此神學主題展現審判中的恩典：神的忌邪（v.24）與憐憫並存，約的信實超越人的悖逆。
development: 此主題緊承「違背約的後果」（v.25-28），以「但」（v.29）轉折開啟盼望：分散地（v.27）成為尋求神的處所（v.29），患難日（v.30）成為歸回神的契機。三重動詞「尋求、歸回、聽從」對應三重應許「尋見、不撇下、不忘記約」。此恩典根基於「神愛列祖揀選後裔」（v.37）與「神的獨一無二」（v.35,
  39），並預表申命記 30 章「心受割禮」的終極復興。
accumulations:
- book: 申命記
  chapter: 4
  summary: 應許在分散患難中盡心尋求、歸回聽從，就必尋見；神有憐憫、不撇下、不滅絕、不忘記列祖之約；展現審判中的恩典與約的信實。
  relation: 本章審判後的恩典轉折，連結違背約後果、神憐憫屬性、列祖之約、獨一真神論。
