status: formal
definition: 申命記 4:43 指明拉末位於基列，是為迦得支派分定的逃城之一。希伯來文 רָמֹת (Rāmōṯ) 為「高地」之意，即基列拉末，地理上位於雅博河南岸，今日約旦境內的雷梅特附近，歷來為戰略要衝。
development: 作為迦得支派的逃城，拉末不僅提供庇護，亦是東約但地區重要的行政與軍事中心。
accumulations:
- book: 申命記
  chapter: 4
  summary: 經文列舉拉末為迦得人分定的逃城，位於基列。
  relation: 逃城制度在迦得支派產業中的具體落實。
