name: 鐵爐（埃及為奴的比喻）
type: 主題
secondary_types: []
aliases:
- 埃及鐵爐
- 鐵爐比喻
status: formal
definition: 「鐵爐」是申命記 4:20 用以形容埃及為奴經驗的比喻：耶和華將以色列人從埃及領出來，脫離鐵爐，要特作自己產業的子民。鐵爐意指高溫熔鍊的爐子，象徵埃及奴役的嚴酷、煉淨與試驗。
development: 此比喻在申命記重現（7:6, 14:2, 26:18）與列王記上 8:51、耶利米書 11:4，成為「選民身分」的奠基意象：神在苦難熔爐中分別為聖、救贖、立約的子民。本章語境中，鐵爐意象緊承何烈山烈火顯現（4:11,
  15, 24, 36），形成「埃及鐵爐—何烈山烈火—迦南地產業」的救贖歷程軸線。
accumulations:
- book: 申命記
  chapter: 4
  summary: 4:20 以鐵爐比喻埃及為奴，強調神救贖目的在使以色列作祂產業的子民。
  relation: 本章救贖歷史回顧（4:20, 34, 37-38）的核心意象，連結出埃及大能拯救（4:34, 37）與立約關係（4:23, 31），為後續「遵守律例得福長久」（4:40）奠基。
