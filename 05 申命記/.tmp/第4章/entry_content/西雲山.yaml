name: 西雲山
type: 地點
secondary_types: []
aliases:
- 西雲山
- 錫安山
- 黑門山
status: formal
definition: 申命記 4:48 記載「從亞嫩谷邊的亞羅珥，直到西雲山，就是黑門山」。希伯來文 שִׂרְיֹן (Śiryōn) 為西頓人對黑門山的稱呼（參申
  3:9），意指「胸甲」或「高峰」，標示以色列人在約但河東所得之地的北界。
development: 本章以地理界標總結約但河東征服的範圍，西雲山作為北界標記，確認神應許賜地的實際成就。
accumulations:
- book: 申命記
  chapter: 4
  summary: 經文以西雲山（黑門山）為北界，界定約但河東所得之地的範圍。
  relation: 征服地理總結的關鍵地標，見證神應許的兌現。
