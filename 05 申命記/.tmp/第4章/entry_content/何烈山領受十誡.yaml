name: 何烈山領受十誡
type: 事件
secondary_types: []
aliases:
- 何烈山領受十誡
- 西乃山領受十誡
status: formal
definition: 以色列人在何烈山（西乃山）站在耶和華面前，山上有火焰沖天、昏黑、密雲、幽暗；耶和華從火中說話，百姓只聽見聲音、未見形像。神將所吩咐當守的約——十條誡——指示他們，並寫在兩塊石版上。此事件確立約的根基，並成為後世教導兒女敬畏神的依據。
development: 此事件在申命記 4:10-13 詳細敘述，承接出埃及記 19-20 章，作為「律例典章」頒布的歷史現場。摩西強調「你們沒有看見什麼形像」（v.15），直接支撐「禁止雕刻偶像」的神學論證。事件同時確立「十誡是約」的地位，並連結「教導兒女敬畏神」（v.10）與「保守心靈傳給子孫」（v.9）的代代相傳責任。
accumulations:
- book: 申命記
  chapter: 4
  summary: 以色列人在何烈山領受十誡，神從火中說話、未見形像，將約寫在兩塊石版上，作為遵守律例典章、禁止偶像、教導子孫的根基。
  relation: 本章神學論證的歷史錨點，連結十誡、約、無形像、敬畏神、教導子孫等核心主題。
