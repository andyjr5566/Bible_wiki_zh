name: 設立逃城
type: 事件
secondary_types: []
aliases:
- 設立逃城
status: formal
definition: 申命記 4:41-43 記載摩西在約但河東、向日出之地，分定三座逃城：為流便人分定曠野平原的比悉，為迦得人分定基列的拉末，為瑪拿西人分定巴珊的哥蘭。這是為了讓素無仇恨、無心殺人者可以逃到這些城邑存活，體現神對誤殺者的保護與公義。
development: 本事件發生在摩西向以色列人陳明律法之前，作為律法實際應用的示範，顯示神的律法不僅是屬靈教導，更關乎社會公義與生命保護。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西在約但河東分定三座逃城（比悉、拉末、哥蘭），供無心殺人者逃往存活。
  relation: 本章歷史插段，展示律法中關於誤殺者保護條文的具體執行。
