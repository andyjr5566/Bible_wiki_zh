name: 教導兒女敬畏神
type: 神學
secondary_types: []
aliases:
- 教訓兒女敬畏耶和華
status: formal
definition: 申命記 4:10 記載神命摩西招聚百姓，使他們聽見神的話，學習敬畏神，並教訓兒女也這樣行。這將「敬畏神」定位為信仰教育的核心目標，並要求跨代傳承。
development: 申命記 6:7、11:19 重複此命令，形成「示瑪」家庭教育模式；箴言 1:7 以「敬畏耶和華」為知識開端；新約以弗所書 6:4 勸父母按主的教訓養育兒女，延續此原則。
accumulations:
- book: 申命記
  chapter: 4
  summary: 神在何烈山命摩西聚集百姓，目的在於使百姓及其子孫學習敬畏神，建立以敬畏為中心的信仰傳承。
  relation: 本章信仰教育神學的具體指令，與保守心靈傳給子孫互為表裡。
