name: 不可加添刪減
type: 神學
secondary_types: []
aliases:
- 不可加添刪減
- 不加不減
status: formal
definition: 申命記 4:2 命令「所吩咐你們的話，你們不可加添，也不可刪減」，希伯來文 לֹא תֹסִפוּ וְלֹא תִגְרְעוּ (lō'
  tōsīpū wəlō' tigrə'ū) 確立神話語的完整性與權威性。這原則保護啟示的純粹性，防止人為扭曲神的旨意，是舊約正典觀的基石之一（參申 12:32；箴
  30:6；啟 22:18-19）。
development: 此命令緊隨「聽從遵行」之後，強調順服的前提是忠於原文，不得隨意增減，反映立約共同體對神話語的敬畏態度。
accumulations:
- book: 申命記
  chapter: 4
  summary: 第 2 節明令不可加添刪減神所吩咐的話，以便遵守耶和華的命令。
  relation: 本章神學倫理的開篇原則，支配後續一切律法教導的詮釋邊界。
