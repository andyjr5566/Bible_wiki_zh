name: 遵守律例得福長久
type: 神學
secondary_types: []
aliases:
- 守律例蒙福延年
status: formal
definition: 申命記 4:40 應許遵守神的律例誡命，使自己和子孫得福，日子在神所賜地上得以長久。這將順服律法與立約祝福（生命、產業、延續）直接掛鉤，體現申命記「行約得生」的神學軸心。
development: 利未記 18:5「人若遵行我的律例典章，必因此得生」；羅馬書 10:5 保羅引用此語對比律法之義與信心之義；加拉太書 3:12 指出律法不本於信；但在基督裡，順服成為聖靈生命的果子（羅馬書
  8:4）。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西總結勸勉：遵守律例誡命帶來得福、長久居住應許之地的雙重祝福，作為本章神學應用的高潮。
  relation: 本章神學應用的總結，回應開頭「聽從遵行好叫你們存活」（v.1）形成夾縫結構。
