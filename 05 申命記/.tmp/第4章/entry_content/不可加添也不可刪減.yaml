name: 不可加添也不可刪減
type: 神學
secondary_types: []
aliases:
- 不可增減神的話
status: formal
definition: 申命記 4:2 禁止百姓對神所吩咐的話增添或刪減，強調神啟示的完整性與權威性，要求百姓謹守遵行耶和華的命令，不得自行更改。
development: 此命令在申命記重複出現（12:32），並呼應啟示錄 22:18-19 的原則，構成聖經正典觀的基石：神的話語純全、足夠、不可人為篡改。本章語境中，摩西緊接何烈山立約與十誡頒布後發出此警告，將「不可加添刪減」與「遵守誡命得生存、得地為業」直接掛鉤。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西吩咐以色列人不可在神的命令上加添或刪減，要謹守遵行。
  relation: 4:2 為本章首要神學命令，奠定後續「遵行律例典章顯為智慧」（4:6-8）與「謹守免得忘記」（4:9）的基礎。
