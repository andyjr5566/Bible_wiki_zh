name: 十誡是約
type: 神學
secondary_types: []
aliases:
- 十條誡即約
status: formal
definition: 申命記 4:13 明確指出神將「所吩咐你們當守的約」指示百姓，就是「十條誡」，並寫在兩塊石版上。這確立十誡作為西奈之約的核心條文，具有法律效力與約關係的雙重意義。
development: 出埃及記 34:28 同稱十誡為「約的話」；新約希伯來書 8-9 章對比舊約（石版）與新約（心版），顯示十誡作為舊約核心在基督裡被成全並內化。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西說明神親自頒布十誡作為約的條款，刻於石版，作為以色列與神立約的根本法典。
  relation: 本章約論神學的核心陳述，連結何烈山事件與後續律例典章的教導。
