name: 神無形像
type: 神學
secondary_types: []
aliases:
- 耶和華無形像
status: formal
definition: 申命記 4:12,15-18 強調耶和華在何烈山從火中說話，百姓只聽見聲音，未見形像；因此嚴禁雕刻任何男女、走獸、飛鳥、爬物、魚類的偶像。這確立神的屬靈性與不可形象化，是禁止偶像崇拜的神學基礎。
development: 此真理貫穿舊約（賽 40:18,25），新約約翰福音 4:24 宣告「神是個靈」，歌羅西書 1:15 稱基督為「不能看見之神的像」，在基督裡解決神可見與不可見的張力。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西以何烈山經歷為據，論證神無形像，故嚴禁製作任何受造物形像作為敬拜對象。
  relation: 本章禁止偶像崇拜論證的核心神學前提，直接回應何烈山神顯現象。
