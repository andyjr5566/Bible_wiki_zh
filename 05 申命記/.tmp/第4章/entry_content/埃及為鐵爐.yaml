name: 埃及為鐵爐
type: 神學
secondary_types: []
aliases:
- 埃及鐵爐
status: formal
definition: 申命記 4:20 以「鐵爐」比喻埃及，形容以色列在埃及受苦如同冶煉金屬的熔爐；神將他們從鐵爐領出，使他們成為神的產業子民。這隱喻神的拯救帶有淨化、塑造子民身分的雙重功能。
development: 以賽亞書 48:10 以「爐火」比喻神的熬煉；彼得前書 1:6-7 將試煉比作火煉金子；此意象在神學上奠定「苦難中經歷救贖」的模式。
accumulations:
- book: 申命記
  chapter: 4
  summary: 摩西回顧出埃及經歷，用鐵爐比喻埃及的苦役，強調神救贖的目的在於得著子民為產業。
  relation: 本章救贖神學的歷史錨點，連結神愛列祖揀選後裔與今日要知道耶和華是神。
