candidates:
  - name: "摩西勸勉遵守律例典章"
    type: "事件"
    evidence: |
      經文：申4:1-40。摩西勸勉以色列人聽從遵行律例典章，不可加添刪減，好叫存活、進入承受應許之地。回顧巴力毘珥事件：隨從巴力毘珥的被除滅，專靠耶和華的全都存活。強調謹守遵行是萬民眼前的智慧聰明，神與他們相近，律例典章公義。勸勉謹慎保守心靈，免得忘記何烈山所見之事，要傳給子孫。
      ccbiblestudy CT：本章是摩西教訓百姓應遵行律法的講話，鼓勵聽從神吩咐的律例典章，棄絕假神。強調以色列的神為獨一無二真神，與以色列關係親密。律例典章代表神全部律法和訓詞。
      ccbiblestudy GT：摩西力證遵守律法必要性，以神過去特殊護理為據。律法精神貫穿新舊約，基督成就了律法精神。法利賽人用人誡命替代神話語被責備。
      KingComments：摩西勸勉百姓遵守律法，俾能安居應許地。遵行律法是智慧聰明，神與他們相近，律法公義。不可加添刪減神的話。
      BibleHub Study：摩西勸勉聽從遵行律例典章，好叫存活、進入承受地。不可加添刪減。巴力毘珥事親眼看見，隨從者被除滅，專靠耶和華的存活。
    surfaces:
      - "摩西勸勉遵守律例典章"
      - "聽從遵行律例典章"
      - "不可加添刪減"

  - name: "巴力毘珥事件"
    type: "事件"
    evidence: |
      經文：申4:3-4。「耶和華因巴力毘珥的事所行的，你們親眼看見了。凡隨從巴力毘珥的人，耶和華你們的神都從你們中間除滅了。惟有你們專靠耶和華你們神的人，今日全都存活。」
      ccbiblestudy CT：巴力毘珥指在毗珥山上的巴力，巴力是迦南地繁殖之神。民25:3-5,8記載此事，二萬四千人死於瘟疫。
      ccbiblestudy GT：巴力毘珥是以色列人在毗珥崇拜的巴力，巴力即主人之意，是迦南人掌五穀生產之神，敬拜混雜淫亂。
      KingComments：巴力毘珥事見民25章，二萬四千人死於瘟疫。摩西回顧此事教訓真正生活原理。
      BibleHub Study：巴力毘珥事親眼看見，隨從者被除滅，專靠耶和華的存活。
    surfaces:
      - "巴力毘珥"
      - "巴力毘珥事件"
      - "專靠耶和華"

  - name: "何烈山領受十誡"
    type: "事件"
    evidence: |
      經文：申4:10-13。「你在何烈山站在耶和華你神面前的那日，耶和華對我說：你為我招聚百姓，我要叫他們聽見我的話……他將所吩咐你們當守的約指示你們，就是十條誡，並將這誡寫在兩塊石版上。」
      ccbiblestudy CT：何烈山即西乃山，神招聚百姓聽話，使學習敬畏、教訓兒女。山上火焰沖天、昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。將十誡寫在兩塊石版上。
      ccbiblestudy GT：何烈山即西乃山，神在該處向百姓顯現。神是靈，沒有形像，十誡是約的條規。兩塊石版內容相同，立約雙方各執一塊，存放約櫃中。
      KingComments：何烈山是神向百姓顯現之地，火焰昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。十誡是約，寫在兩塊石版上。
      BibleHub Study：何烈山即西乃山，神招聚百姓聽話，使學習敬畏、教訓兒女。火焰昏黑密雲幽暗。神從火中說話，只聽聲音不見形像。十誡寫在兩塊石版上。
    surfaces:
      - "何烈山領受十誡"
      - "何烈山"
      - "十條誡"
      - "兩塊石版"

  - name: "禁止雕刻偶像"
    type: "神學"
    evidence: |
      經文：申4:15-19。「所以，你們要分外謹慎；因為耶和華在何烈山、從火中對你們說話的那日，你們沒有看見什麼形像。惟恐你們敗壞自己，雕刻偶像……又恐怕你向天舉目觀看，見耶和華你的神為天下萬民所擺列的日月星，就是天上的萬象，自己便被勾引敬拜事奉他。」
      ccbiblestudy CT：因何烈山未見形像，故不可雕刻任何男像女像、走獸飛鳥爬物魚像，也不可敬拜日月星宿。神是烈火、忌邪的神。
      ccbiblestudy GT：神是靈，沒有形像。十誡第二誡嚴禁作形像或雕刻偶像。神居住在人不能接近的光中，故沒人見過神容顏。
      KingComments：神是靈，沒有形像。第二誡嚴禁作形像或雕刻偶像。神居住在人不能接近的光中。
      BibleHub Study：神是靈，沒有形像。第二誡嚴禁作形像或雕刻偶像。神居住在人不能接近的光中。
    surfaces:
      - "禁止雕刻偶像"
      - "不得作偶像"
      - "神無形像"

