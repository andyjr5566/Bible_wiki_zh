    evidence: v43 為瑪拿西人分定巴珊的哥蘭
    surfaces: [瑪拿西人]
  # 地點（既有）
  - name: 何烈山
    type: 地點
    evidence: v10-11,15 你在何烈山站在耶和華你神面前的那日；那時你們近前來，站在山下；因為耶和華在何烈山、從火中對你們說話的那日
  - name: 巴力毘珥
    type: 地點
    evidence: v3 耶和華因巴力毘珥的事所行的，你們親眼看見了
  - name: 拉末基列
