    type: "事件"
    evidence: |
      經文：申4:44-49。「摩西在以色列人面前所陳明的律法─就是摩西在以色列人出埃及後所傳給他們的法度、律例、典章；在約但河東伯毘珥對面的谷中，在住希實本、亞摩利王西宏之地……從亞嫩谷邊的亞羅珥，直到西雲山，就是黑門山。還有約但河東的全亞拉巴，直到亞拉巴海，靠近毘斯迦山根。」
      ccbiblestudy CT：摩西在約但河東伯毘珥對面谷中陳明律法，包括法度、律例、典章。地理範圍：從亞嫩谷亞羅珥到西雲山(黑門山)，約但河東全亞拉巴直到亞拉巴海(鹽海)，靠近毘斯迦山根。
      ccbiblestudy GT：摩西在約但河東陳明律法，地理範圍從亞嫩谷到黑門山，亞拉巴直到鹽海。
      KingComments：摩西在約但河東陳明律法，地理範圍從亞嫩谷到黑門山，亞拉巴直到鹽海。
      BibleHub Study：摩西在約但河東陳明律法，地理範圍從亞嫩谷到黑門山，亞拉巴直到鹽海。
