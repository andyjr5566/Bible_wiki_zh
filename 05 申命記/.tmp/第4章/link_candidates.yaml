  # 地點（新建）
  - name: 比悉（Bezer）
    type: 地點
    evidence: v43 為流便人分定曠野平原的比悉；BH：約但河東三座逃城之一，屬流便支派曠野平原地業；KC：位置與拉末、哥蘭並列為逃城，須地理分布均勻使誤殺者隨處可及
  # 事件（既有）
  - name: 神頒布十誡
    type: 事件
    evidence: v10-13 耶和華從火焰中對你們說話……祂將所吩咐你們當守的約指示你們，就是十條誡，並將這誡寫在兩塊石版上
  - name: 以色列與巴力毘珥連合
    type: 事件
    evidence: v3-4 耶和華因巴力毘珥的事所行的，你們親眼看見了。凡隨從巴力毘珥的人，耶和華你們的神都從你們中間除滅了；惟有你們專靠耶和華你們神的人，今日全都存活
  - name: 逃城六座
    type: 事件
    evidence: v41-43 那時，摩西在約但河東，向日出之地，分定三座城……為流便人分定曠野平原的比悉；為迦得人分定基列的拉末；為瑪拿西人分定巴珊的哥蘭；本章是約但河東三座逃城首次點名指定
  # 解經爭議（既有）
  - name: 摩西是否進過迦南地
    type: 解經爭議
    evidence: v21-22 耶和華又因你們的緣故向我發怒，起誓必不容我過約但河……我只得死在這地，不能過約但河；但你們必過去得那美地
  # 神學（既有）
  - name: 十誡
    type: 神學
    evidence: v13 祂將所吩咐你們當守的約指示你們，就是十條誡，並將這誡寫在兩塊石版上
  - name: 不可為自己雕刻偶像
    type: 神學
    evidence: v15-19 你們沒有看見什麼形像……惟恐你們敗壞自己，雕刻偶像，彷彿什麼男像女像，或地上走獸的像，或空中飛鳥的像，或地上爬物的像，或地底下水中魚的像；又恐怕你向天舉目觀看……被勾引敬拜事奉它；v23,25 重申雕刻偶像之禁
  - name: 忌邪的神
    type: 神學
    evidence: v24 因為耶和華你的神乃是烈火，是忌邪的神
  - name: 除了我以外你不可有別的神
    type: 神學
    evidence: v35,39 這是顯給你看，要使你知道，惟有耶和華祂是神，除祂以外，再無別神；所以，今日你要知道……天上地下惟有耶和華祂是神，除祂以外，再無別神
  # 神學（新建）
  - name: 不可加添也不可刪減
    type: 神學
    evidence: v2 所吩咐你們的話，你們不可加添，也不可刪減，好叫你們遵守我所吩咐的，就是耶和華你們神的命令；十二32重申此警告
  - name: 被擄分散與悔改歸回的預言
    type: 神學
    evidence: v25-31 你們在那地住久了……就雕刻偶像……必在過約但河得為業的地上速速滅盡……耶和華必使你們分散在萬民中；但你們在那裡必尋求耶和華你的神。你盡心盡性尋求祂的時候，就必尋見；日後你遭遇一切患難的時候，你必歸回耶和華你的神
  # 主題（新建）
  - name: 鐵爐（埃及為奴的比喻）
    type: 主題
    evidence: v20 耶和華將你們從埃及領出來，脫離鐵爐，要特作自己產業的子民；精讀本：一針見血地指出了以色列百姓在埃及所度過的400年的奴隸生活，栩栩如生地比喻他們所受的殘酷虐待與痛苦
