  # 人物（既有）
  - name: 摩西
    type: 人物
    evidence: v1-49 全章講者，勸勉遵行律例典章、回顧何烈山領受十誡、預言被擄分散、分定約但河東三座逃城
  - name: 亞摩利王西宏
    type: 人物
    evidence: v46-47 在住希實本、亞摩利王西宏之地；這西宏是摩西和以色列人出埃及後所擊殺的
  - name: 巴珊王噩
    type: 人物
    evidence: v47 他們得了他的地，又得了巴珊王噩的地，就是兩個亞摩利王
  - name: 流便支派
    type: 人物
    evidence: v43 為流便人分定曠野平原的比悉
