"book": "申命記"
"chapter": !!int "4"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "申4是摩西第一篇講章的結尾（1-40節）與第二篇講章的引言（41-49節）：呼籲百姓遵行律例典章、不可加添刪減，回顧何烈山領受十誡並嚴禁偶像，預言後代若拜偶像必被擄分散、但盡心尋求必蒙紀念；並在約但河東分定三座逃城。"
  "relation": "摩西以「見證人」姿態向新一代重述何烈山的親身經歷（10-14節其自身也在場並被神吩咐招聚百姓），又以「因你們的緣故不能過約但河」的遺憾（21-22節）銜接申1:37、3:23-27，勸勉百姓珍惜將得的地業。"
- "title": "亞摩利王西宏"
  "path": "link_folder/人物/亞摩利王西宏.md"
  "summary": "申4:46 重述西宏是住希實本的亞摩利王，為摩西和以色列人出埃及後所擊殺，其地在伯毘珥對面的谷中。"
  "relation": "本章以西宏之地作為摩西第二篇講章（律例典章）發表的地理座標，呼應申2:24-37、3:1-7 的征服敘事。"
- "title": "巴珊王噩"
  "path": "link_folder/人物/巴珊王噩.md"
  "summary": "申4:47 重述以色列人既得西宏之地，又得巴珊王噩的地，二者同為約但河東的亞摩利王。"
  "relation": "與西宏並提，作為本章第二篇講章發表背景的歷史座標，呼應申3章的戰勝記載。"
- "title": "流便支派"
  "path": "link_folder/人物/流便支派.md"
  "summary": "申4:43 摩西為流便人在曠野平原分定比悉為逃城。"
  "relation": "承接申3:12-16 流便支派在約但河東得地的記載，本章補充其地業內特別設立的逃城。"
- "title": "迦得支派"
  "path": "link_folder/人物/迦得支派.md"
  "summary": "申4:43 摩西為迦得人在基列分定拉末為逃城。"
  "relation": "承接申3:12-16 迦得支派得地記載，本章補充其地業內的逃城。"
- "title": "瑪拿西支派"
  "path": "link_folder/人物/瑪拿西支派.md"
  "summary": "申4:43 摩西為瑪拿西人在巴珊分定哥蘭為逃城。"
  "relation": "承接申3:13 瑪拿西半支派得巴珊地的記載，本章補充其地業內的逃城。"
- "title": "何烈山"
  "path": "link_folder/地點/何烈山.md"
  "summary": "申4:10-15 摩西回顧新一代（含其父輩）曾站在何烈山下，見山上火焰沖天、昏黑密雲幽暗，耶和華從火中說話卻不見形像，藉此指示十條誡並寫於兩塊石版。"
  "relation": "本章何烈山「有聲無形」的經歷成為第15-19節嚴禁雕刻偶像的神學根據——因未見形像，故不可妄自為神製造形像。"
- "title": "巴力毘珥"
  "path": "link_folder/地點/巴力毘珥.md"
  "summary": "申4:3-4 摩西提醒百姓親眼看見耶和華在巴力毘珥的事：凡隨從巴力毘珥的人都被除滅，惟獨專靠耶和華的人今日全都存活。"
  "relation": "作為距離講論時間最近的具體案例（申3剛結束在此對面谷中安營），巴力毘珥事件被摩西用作勸勉遵行律法、棄絕偶像的活教材，與後文23-28節拜偶像招致滅亡的警告呼應。"
- "title": "拉末基列"
  "path": "link_folder/地點/拉末基列.md"
  "summary": "申4:43 摩西在約但河東首次點名指定基列的拉末為迦得支派的逃城，是全卷中三座東岸逃城名單的最早出處。"
  "relation": "與比悉、哥蘭並列構成約但河東三座逃城；民35:14 僅原則性規定「河東三座」，本節才正式點名。"
- "title": "哥蘭"
  "path": "link_folder/地點/哥蘭.md"
  "summary": "申4:43 摩西在約但河東首次點名指定巴珊的哥蘭為瑪拿西人的逃城。"
  "relation": "與比悉、拉末並列構成約但河東三座逃城，是民35:14 原則性規定的具體落實。"
- "title": "希實本"
  "path": "link_folder/地點/希實本.md"
  "summary": "申4:46 指明希實本是亞摩利王西宏所住之地，摩西第二篇講章即在此地附近（伯毘珥對面谷中）發表。"
  "relation": "作為摩西講律法的地理背景座標，與伯毘珥、亞嫩谷等地名共同標定申4:44-49 的歷史地理框架。"
- "title": "伯毘珥（Beth-peor）"
  "path": "link_folder/地點/伯毘珥（Beth-peor）.md"
  "summary": "申4:46 指明摩西第二篇講章（法度、律例、典章）是在約但河東伯毘珥對面的谷中發表。"
  "relation": "呼應申3:29 以色列人曾在伯毘珥對面谷中安營聽摩西最後囑咐，本章明確此地即摩西頒布法度律例典章之處。"
- "title": "黑門山（Hermon）"
  "path": "link_folder/地點/黑門山（Hermon）.md"
  "summary": "申4:48 摩西描述約但河東疆域「從亞嫩谷邊的亞羅珥，直到西雲山，就是黑門山」，串珠指出西雲山即3:9的西連山，是黑門山的別名。"
  "relation": "與申3:8-9 呼應，再次確認黑門山（西頓人稱西連、亞摩利人稱示尼珥、希伯來人稱西雲）為約但河東疆域的北界地標。"
- "title": "亞嫩河"
  "path": "link_folder/地點/亞嫩河.md"
  "summary": "申4:48 摩西描述約但河東疆域範圍「從亞嫩谷邊的亞羅珥」起，作為南界地標。"
  "relation": "與亞羅珥並提，標定約但河東三王之地（西宏、噩）的南部邊界，呼應申2:24、3:8 的疆域敘述。"
- "title": "亞羅珥（Aroer）"
  "path": "link_folder/地點/亞羅珥（Aroer）.md"
  "summary": "申4:48 亞羅珥被列為約但河東疆域的南端起點，「從亞嫩谷邊的亞羅珥，直到西雲山」。"
  "relation": "與亞嫩河並提標定南界，呼應申2:36、3:12 亞羅珥作為流便支派地業南界的記載。"
- "title": "亞拉巴（Aravah）"
  "path": "link_folder/地點/亞拉巴（Aravah）.md"
  "summary": "申4:49 摩西描述約但河東疆域「還有約但河東的全亞拉巴，直到亞拉巴海，靠近毘斯迦山根」。"
  "relation": "與毘斯迦山並提，標定約但河東疆域西界（沿約但河谷地直到死海），呼應申3:17 亞拉巴全地的分地記載。"
- "title": "毘斯迦山"
  "path": "link_folder/地點/毘斯迦山.md"
  "summary": "申4:49 摩西描述約但河東疆域「靠近毘斯迦山根」，作為疆域敘述的收尾地標。"
  "relation": "呼應申3:27 耶和華吩咐摩西上毘斯迦山頂觀望迦南地，本章以其山根標定疆域範圍。"
- "title": "神頒布十誡"
  "path": "link_folder/事件/神頒布十誡.md"
  "summary": "申4:10-13 摩西回顧何烈山事件：耶和華從火中曉諭十條誡、並親自寫在兩塊石版上，作為祂與百姓所立之約的內容。"
  "relation": "本章視十誡頒布為「有聲無形」的啟示模式（12、15節），並以此作為嚴禁雕刻偶像（15-19節）的神學根據——正因百姓只聽見聲音卻未見形像，才不可擅自為神製造形像。"
- "title": "以色列與巴力毘珥連合"
  "path": "link_folder/事件/以色列與巴力毘珥連合.md"
  "summary": "申4:3-4 摩西提醒百姓「親眼看見」耶和華在巴力毘珥的事：凡隨從巴力毘珥的人都被耶和華從百姓中除滅，惟獨專靠耶和華的人存活至今。"
  "relation": "作為距離申命記講論時間最近的具體案例，本章用以印證第23-28節「拜偶像必被除滅」的警告並非空言。"
- "title": "逃城六座"
  "path": "link_folder/事件/逃城六座.md"
  "summary": "申4:41-43 摩西在約但河東首次正式點名分定三座逃城：為流便人分定曠野平原的比悉，為迦得人分定基列的拉末，為瑪拿西人分定巴珊的哥蘭，使無心殺人者得以逃入存活。"
  "relation": "民35:14 僅原則性規定「約但河東三座、迦南地西三座」，本章才是三座東岸逃城具體點名指定的正文出處；西岸三座要到申19章才另行安排。（勘誤：本條目原「定義」與民數記累積誤將三城之一記為「比珥」，經核對申4:43原文為「比悉」——「比珥」是民21:16以色列人得水的曠野井名，與逃城「比悉」是不同地名，已一併訂正。）"
- "title": "摩西是否進過迦南地"
  "path": "link_folder/解經爭議/摩西是否進過迦南地.md"
  "summary": "申4:21-22 摩西重申耶和華因百姓的緣故向他發怒，起誓不容他過約但河，他只能死在河東之地，不能像百姓一樣過去得那美地。"
  "relation": "呼應申1:37、3:23-27 已重複三次的「摩西之怒」，本章第三次提及且措辭最直接（「因你們的緣故」），並與22節「我只得死在這地」的結論並列。"
- "title": "十誡"
  "path": "link_folder/神學/十誡.md"
  "summary": "申4:13 稱十誡為耶和華「所吩咐你們當守的約」，寫在兩塊石版上；本章強調十誡是在「有聲無形」中頒布，並以此奠定嚴禁偶像敬拜的根據。"
  "relation": "與神頒布十誡（事件節點）互為表裡，本章特別強調十誡與「約」的關係——遵守十誡即是遵守與神所立的約。"
- "title": "不可為自己雕刻偶像"
  "path": "link_folder/神學/不可為自己雕刻偶像.md"
  "summary": "申4:15-19 是舊約中對第二誡最詳盡的擴充說明：因百姓在何烈山「沒有看見什麼形像」，故不可為自己雕刻偶像，無論男像女像、走獸、飛鳥、爬物、水中魚的像，也不可敬拜日月星辰等天象；23、25節重申此誡並警告後代若在應許地住久了行此惡事，必被除滅。"
  "relation": "本章是全書卷中對「無形象敬拜」神學論證最完整的一段——以何烈山「有聲無形」的親身經歷（12、15節）作為禁止偶像的邏輯前提，並列舉地上、空中、地底下水中四界受造物之像與天上萬象，涵蓋範圍最廣。"
- "title": "忌邪的神"
  "path": "link_folder/神學/忌邪的神.md"
  "summary": "申4:24 宣告「耶和華你的神乃是烈火，是忌邪的神」，精讀本指出此節描述神對人一切罪孽與不義的審判。"
  "relation": "緊接在23節「免得忘記……為自己雕刻偶像」之後，本章將「忌邪」與「烈火」並提，作為第25-28節拜偶像必遭速速滅盡之審判的神學根據。"
- "title": "除了我以外你不可有別的神"
  "path": "link_folder/神學/除了我以外你不可有別的神.md"
  "summary": "申4:35,39 兩次宣告「惟有耶和華祂是神，除祂以外，再無別神」，並以32-34節「何民曾聽見神在火中說話還能存活」「何神曾如此從別國中領出一國人民」的一連串反問句論證，結論獨一神論並非空談而是歷史經驗可證。"
  "relation": "本章提供了全書卷對第一誡最完整的歷史論證——不同於出20:3的直接宣告，申4:32-39 是以以色列出埃及、何烈山領受啟示等獨一無二的歷史事件作為「耶和華是神、再無別神」的證據鏈。"
