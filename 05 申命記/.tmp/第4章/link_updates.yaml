"book": "申命記"
"chapter": !!int "4"
"updates":
- "title": "哥蘭"
  "path": "link_folder/地點/哥蘭.md"
  "summary": "申4:43記載摩西在約但河東為瑪拿西人分定巴珊的哥蘭作逃城。哥蘭位於巴珊，是約但河東三座逃城之一，屬利未人四十八城之一，為誤殺者提供庇護(民35:14)。"
  "relation": "本章設立逃城事件的具體地點之一；體現神對誤殺者的保護安排"
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "申4:49記載約但河東地理範圍「直到亞拉巴海，就是鹽海」。鹽海即死海、亞拉巴海，位於以色列與約旦間內陸湖，地球最低點。民34:3,12以鹽海為應許之地南界起點、東界終點。預表審判(創19:24-25)、與生命水對比(結47:8-9、啟22:1)。"
  "relation": "本章地理範圍的東南界標記；鹽海作為審判之地與生命水形成對比，預表基督救贖將死海變為生命水"
- "title": "律例典章"
  "path": "link_folder/神學/律例典章.md"
  "summary": "申4章貫穿「律例典章」：摩西教訓律例典章(4:1,5)，謹守遵行是智慧聰明(4:6)，公義的律例典章(4:8)，十誡是約(4:13)，吩咐教訓律例典章(4:14)，陳明律法包括法度、律例、典章(4:44-45)。希伯來文choq(律例/成文規條)與mishpat(典章/判例/公義審判)固定搭配，構成聖約共同體完整法則框架。遵行律例典章是「成聖」途徑，也是免被迦南地「吐出」條件。"
  "relation": "本章核心神學術語，貫穿全章；摩西勸勉遵守律例典章是智慧聰明、得福長久的關鍵；申命記繼承利未記雙詞組，視為約之條款"
