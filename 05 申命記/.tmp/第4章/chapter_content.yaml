  \   火焰昏黑密雲\n      十誡立約\n      教導敬畏\n    禁偶像崇拜 (v15-24)\n      未見形像\n      禁雕刻/敬拜星宿\n\
  \      埃及鐵爐救贖\n      神是烈火忌邪\n    違約與悔改 (v25-31)\n      分散滅亡警告\n      尋求必尋見\n   \
  \   憐憫守約\n    獨一真神 (v32-40)\n      歷史獨特性\n      今日要知道\n      遵守得福長久\n    逃城與地理 (v41-49)\n\
  \      三座逃城\n      律法陳明地點\n```"
