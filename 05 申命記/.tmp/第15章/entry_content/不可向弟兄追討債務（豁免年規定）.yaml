name: 不可向弟兄追討債務（豁免年規定）
type: 神學
secondary_types: []
aliases:
- 豁免年債務豁免
- 不可追討弟兄債
status: formal
definition: 申命記 15:2-3 規定豁免年的核心操作：債主要「鬆手」豁免所借給弟兄的債，不可追討；但向外邦人則可追討。這區別反映了立約共同體內部的互助責任超越商業契約，神宣告的「豁免」具有神聖權威，債權人必須順服。
development: 這條規定在利未記 25 的禧年條例中進一步擴展為產業歸還。保羅在羅馬書 13:8 「凡事都不可虧欠人，惟有彼此相愛要常以為虧欠」屬靈化了債務倫理。猶太傳統（Mishnah
  Shevi'it）後來制定「Prosbul」制度以繞過豁免，引發拉比爭議。
accumulations:
- book: 申命記
  chapter: 15
  summary: 明確豁免年不可向弟兄追討債務的法律界限，區分弟兄與外邦人待遇。
  relation: 直接衍生自「豁免年」事件，是具體執行細則，保障窮乏弟兄不因債務淪為奴僕。
