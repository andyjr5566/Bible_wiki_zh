name: 希伯來奴僕服事六年、工價多加一倍（公平待遇）
type: 神學
secondary_types: []
aliases:
- 希伯來奴僕工價多加一倍
- 奴僕服事六年雙倍工價
status: formal
definition: 申命記 15:12-18 規定希伯來男僕或女僕服事六年，第七年必須釋放自由，且不可空手而去，要從羊群、禾場、酒醡厚賞。第 18 節指出：「因他服事你六年，較比雇工的工價多加一倍了」，強調奴僕勞動價值超過一般雇工，主人不得視釋放為虧損，反當記念在埃及為奴、蒙神救贖的恩典（15
  節），以公平慷慨待之，耶和華必在一切所行的事上賜福。
development: 本條例從出埃及記 21:2-6「第七年免費釋放」發展，加入「厚賞」（14 節）與「工價多加一倍」（18 節）的經濟補償神學，將釋放奴僕從單純法律義務提升為紀念救贖恩典的敬拜行為，並預表基督以寶血贖價釋放屬靈奴僕（加拉太書
  4:4-7）。
accumulations:
- book: 申命記
  chapter: 15
  summary: 規定希伯來奴僕服事六年第七年釋放，並須厚賞；第 18 節明確指出其勞動價值較雇工多加一倍，釋放時不可視為難事，因耶和華必賜福。
  relation: 本章核心神學條文，結合豁免年精神與出埃及救贖記憶，建立以色列社會經濟正義的神學基礎。
