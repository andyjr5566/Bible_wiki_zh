name: 豁免年（七年豁免債務）
type: 事件
secondary_types: []
aliases:
- 豁免年
- 七年豁免
status: formal
definition: 根據申命記 15:1-3，每逢七年末一年，以色列人要施行豁免。凡債主要把所借給鄰舍的豁免了，不可向鄰舍和弟兄追討，因為耶和華的豁免年已經宣告了。這是一項社會經濟重置的制度，旨在防止貧富懸殊固化，體現神對窮人的憐憫與公義。
development: 此條例在出埃及記 23:10-11（安息年）和利未記 25:1-7（安息年）有平行規定，但申命記著重於債務豁免與釋放奴僕的社會倫理層面。新約時代，耶穌在路加
  4:18-19 引用以賽亞 61:1-2 宣告「主悅納人的禧年」，屬靈應驗了豁免年的終極意義。
accumulations:
- book: 申命記
  chapter: 15
  summary: 規定每七年施行豁免年，債務人免除對弟兄的債務追討權，外邦人除外。
  relation: 本章核心事件，奠定後續關於窮人照顧、奴僕釋放等社會法典的神學基礎。
related_entries:
- 不可向弟兄追討債務（豁免年規定）
- 希伯來奴僕第七年得自由（豁免年釋放奴僕）
