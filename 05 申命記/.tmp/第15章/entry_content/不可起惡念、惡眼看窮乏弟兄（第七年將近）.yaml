name: 不可起惡念、惡眼看窮乏弟兄（第七年將近）
type: 神學
secondary_types: []
aliases:
- 第七年惡念
- 申命記15:9警告
status: formal
definition: 申命記 15:9 警告不可心裡起惡念，因「第七年的豁免年快到了」，便「惡眼看你窮乏的弟兄，什麼都不給他」。這揭露人利用神律法漏洞逃避責任的罪惡：明知豁免年將至仍拒絕借貸，實為貪婪掩飾成精明。若窮人求告耶和華，罪必歸於借貸拒絕者。
development: 「惡眼」在舊約（箴 28:22, 申 28:54,56）與新約（太 6:23, 20:15）均指貪婪吝嗇的屬靈眼疾。耶穌在馬太 6:22-23
  對比「善眼」與「惡眼」屬屬靈光照與黑暗。雅各書 5:4-6 譴責克扣工錢的富足人，呼應此公義審判。
accumulations:
- book: 申命記
  chapter: 15
  summary: 針對利用豁免年為藉口拒絕借貸的惡念發出嚴厲警告，強調神聽窮人的呼求。
  relation: 直接針對第 7-8 節命令可能被扭曲的具體試探，與第 10 節「心裡不可愁煩」形成正反對比。
