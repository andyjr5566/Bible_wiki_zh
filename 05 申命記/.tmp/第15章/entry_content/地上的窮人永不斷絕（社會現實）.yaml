name: 地上的窮人永不斷絕（社會現實）
type: 神學
secondary_types: []
aliases:
- 窮人永不斷絕
- 申命記15:11現實
status: formal
definition: 申命記 15:11 宣告「原來那地上的窮人永不斷絕」，這不是神旨意的失敗，而是人類墮落社會的持久現實。因此神命令「總要向你地上困苦窮乏的弟兄鬆開手」。這節經文將第
  4 節「在你們中間沒有窮人」的理想與現實張力誠實呈現：理想是方向，現實是常態，順服是橋樑。
development: 耶穌在馬太 26:11、馬可 14:7、約翰 12:8 引用此句回應門徒責備抹大拉馬利亞倒香膏，並非消極宿命論，而是肯定窮人事工的持續性。早期教會設立執事職分（徒
  6:1-6）專司窮人照顧，制度化回應此現實。現代社會學稱「貧窮文化」對應此神學洞見。
accumulations:
- book: 申命記
  chapter: 15
  summary: 承認窮人長期存在的社會學現實，作為持續施捨命令的現實依據。
  relation: 與第 4 節理想應許形成張力，為第 7-10 節具體施捨命令提供永久性理由。
