name: 不可忍心、揝手不幫補窮乏弟兄
type: 神學
secondary_types: []
aliases:
- 不可硬心握手
- 申命記15:7-8命令
status: formal
definition: 申命記 15:7-8 命令在神所賜地的任何城裡，對窮乏弟兄「不可忍著心、揝著手」，總要「向他鬆開手，照他所缺乏的借給他，補他的不足」。這將豁免年的原則常態化：不僅第七年豁免，平時也要主動慷慨借貸，態度上柔軟、行動上開放。
development: 這條誡命在箴言 19:17「憐憫窮人的，就是借給耶和華」得到智慧文學回響。耶穌在路加 6:34-35 推向極致：「借給人不指望償還」。早期教會在使徒行傳
  2:44-45, 4:32-35 實踐「凡物公用」，是此命令的聖靈時代應驗。
accumulations:
- book: 申命記
  chapter: 15
  summary: 確立平時對窮乏弟兄慷慨借貸的道德義務，禁止心硬手緊的自私態度。
  relation: 為豁免年精神在非豁免年的延伸應用，直接回應第 11 節「窮人永不斷絕」的現實。
