name: 借給許多國民、不向他們借貸（經濟主權）
type: 神學
secondary_types: []
aliases:
- 經濟主權應許
- 申命記15:6福分
status: formal
definition: 申命記 15:6 列舉順服帶來的具體經濟福分：「你必借給許多國民，卻不致向他們借貸；你必管轄許多國民，他們卻不能管轄你」。這象徵國家經濟獨立與政治自主，是神作王治理下的國際地位體現。
development: 歷史上所羅門時期（王上 4:20-21, 10:14-15）曾部分實現此景。後期君王因悖逆導致國庫空虛、向外國借貸（王下 16:7-9,
  18:13-16）。新約視角下，屬靈的「借給許多國民」指教會將福音借予萬民（太 28:19），不負屬靈債務。
accumulations:
- book: 申命記
  chapter: 15
  summary: 闡述順服約法後在國際關係中享有債權國與霸權地位的雙重福分。
  relation: 承接第 4-5 節「無窮人」應許，將福分從國內經濟擴展至國際政治層面。
