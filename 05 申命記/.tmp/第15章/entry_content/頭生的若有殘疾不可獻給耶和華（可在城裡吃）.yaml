name: 頭生的若有殘疾不可獻給耶和華（可在城裡吃）
type: 神學
secondary_types: []
aliases:
- 殘疾頭生不可獻祭
- 頭生有瑕疵在城內食用
status: formal
definition: 申命記 15:21-23 規定頭生公畜若有殘疾（瘸腿、瞎眼或任何惡疾），不可獻給耶和華，但可在城裡食用，潔淨與不潔淨人同樣可吃，如同吃羚羊、鹿一般（22
  節），唯不可吃血，要倒在地上如水（23 節）。此條文平衡聖潔標準（獻祭必須完全）與民生供應（不可浪費屬神產物），並維持「血歸神」的普世原則（創世記 9:4, 利未記
  17:10-14）。
development: 對應利未記 22:19-25 獻祭牲畜必須無瑕疵的祭司法典規定。申命記為平民化語境，允許有瑕疵的頭生畜在非聖所場合食用，但嚴守禁血律，顯示敬拜聖潔與日常生活的張力解決方案。
accumulations:
- book: 申命記
  chapter: 15
  summary: 第 21-23 節處理頭生公畜有殘疾的情況：不可獻祭，可在城內由潔淨不潔淨人共同食用，但嚴禁吃血，血要倒在地上。
  relation: 本章敬拜規定的例外條款，體現神學原則：神配得完全的獻祭，但祂的供應不容浪費；血代表生命歸屬神，是跨越潔淨禮儀的永恆界限。
