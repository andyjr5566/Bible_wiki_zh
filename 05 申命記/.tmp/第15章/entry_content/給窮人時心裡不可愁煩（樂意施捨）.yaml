name: 給窮人時心裡不可愁煩（樂意施捨）
type: 神學
secondary_types: []
aliases:
- 樂意施捨
- 申命記15:10態度
status: formal
definition: 申命記 15:10 命令「你總要給他，給他的時候心裡不可愁煩」。施捨不僅是行為，更是心志：不因損失而憂愁，反因順服而喜樂。應許「耶和華─你的神必在你這一切所行的，並你手裡所辦的事上，賜福與你」。這將經濟行為提升為敬拜行為。
development: 保羅在哥林多後書 9:7「樂意施捨的人，是神所喜愛的」直接引用此原則。舊約祭司制度中「甘心樂意獻祭」（利 1:3, 22:19）同樣重心態超過儀式。拉比文獻（Mishnah
  Pe'ah 1:1）列「施捨」為無定量誡命之一，強調內在動機。
accumulations:
- book: 申命記
  chapter: 15
  summary: 規定施捨時的內心態度——樂意不愁煩，並應許神在一切事上賜福作為回報。
  relation: 為第 7-9 節外在行為命令提供內在動力學基礎，完成「鬆開手」的屬靈深化。
