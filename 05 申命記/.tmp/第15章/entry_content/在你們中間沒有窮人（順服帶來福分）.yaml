name: 在你們中間沒有窮人（順服帶來福分）
type: 神學
secondary_types: []
aliases:
- 順服無窮人
- 申命記15:4-5應許
status: formal
definition: 申命記 15:4-5 應許若以色列「留意聽從耶和華─你神的話，謹守遵行」一切命令，耶和華必在賜給他們為業的地上「大大賜福」，以致「在你們中間沒有窮人了」。這是順約帶來的社會經濟理想狀態，窮人的消失是神祝福臨在的標誌。
development: 這應許與申命記 28:1-14 的福分清單平行。先知書中（如阿摩司 2:6-7, 8:4-6）責備以色列踐踏窮人，顯示此理想未實現。耶穌在馬太
  26:11 引用申 15:11「窮人常與你們同在」，並非否定此應許，而是指出人心剛硬導致理想延宕，終極實現須待新天新地（啟 21:4）。
accumulations:
- book: 申命記
  chapter: 15
  summary: 提出順服神命令將帶來無窮人社會的條件性應許，作為後續施捨命令的神學動機。
  relation: 為「不可忍心揝手」等施捨命令提供終極盼望與動力，與第 11 節「窮人永不斷絕」形成張力。
related_entries:
- 不可向弟兄追討債務（豁免年規定）
- 借給許多國民、不向他們借貸（經濟主權）
- 地上的窮人永不斷絕（社會現實）
