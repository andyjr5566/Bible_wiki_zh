name: 希伯來奴僕第七年得自由（豁免年釋放奴僕）
type: 事件
secondary_types: []
aliases:
- 希伯來奴僕釋放
- 申命記15:12-15釋奴
status: formal
definition: 申命記 15:12-15 規定希伯來男僕或女僕服事六年，第七年必任其自由出去。釋放時不可空手，要從羊群、禾場、酒醡「多多地給他」，照神賜福的程度厚待。動機是「要記念你在埃及地作過奴僕，耶和華─你的神將你救贖」。這將豁免年原則應用於人身自由與經濟賦能。
development: 出埃及記 21:2-6 同樣規定六年釋放，但申命記獨特加入「豐厚贈送」與「出埃及救贖」神學動機。利未記 25:39-43 禧年條例進一步規定歸回產業。保羅在加拉太
  5:1「基督釋放了我們，叫我們得以自由」將此預表基督救贖。美國廢奴運動常引用此段作為神學依據。
accumulations:
- book: 申命記
  chapter: 15
  summary: 規定希伯來奴僕第七年得自由並獲得豐厚啟動資金，體現豁免年對人身自由與經濟尊嚴的保障。
  relation: 豁免年事件在人身依附關係上的具體化，呼應第 1-3 節債務豁免的同一神學邏輯。
related_entries:
