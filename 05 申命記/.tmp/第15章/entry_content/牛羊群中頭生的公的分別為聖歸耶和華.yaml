name: 牛羊群中頭生的公的分別為聖歸耶和華
type: 事件
secondary_types: []
aliases:
- 頭生公畜分別為聖
- 初生公牛羊歸耶和華
status: formal
definition: 申命記 15:19-20 規定牛群羊群中頭生的公畜，必須分別為聖歸耶和華。牛不可用來耕地，羊不可剪毛（19 節），主人全家每年要在耶和華揀選的地方，在耶和華面前吃這頭生的（20
  節）。此乃承認神對生命主權的具體禮儀行動，將生產初熟之物歸還給賜福的源頭。
development: 根植於出埃及記 13:2, 12-13「凡頭生的都屬我」與民數記 18:15-18祭司分得頭生潔淨牲畜的規定。申命記將獻祭地點集中化（12:5-7,
  15:20），並連結家庭敬拜宴樂，強調在神面前享用所獻之物的團契性質。
accumulations:
- book: 申命記
  chapter: 15
  summary: 第 19-20 節命令將牛羊群中頭生的公畜分別為聖歸耶和華，不可作工也不可剪毛，全家每年在神揀選之地在神面前食用。
  relation: 本章結尾段落（19-23 節）轉向聖餐式的敬拜規定，將經濟生活（畜牧初熟）直接納入敬拜體系，呼應全章「在耶和華面前」的神學主軸。
related_entries:
