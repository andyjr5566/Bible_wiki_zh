organization: "### 豁免年與債務豁免（v1-6）\n本段確立 **[[豁免年（七年豁免債務）]]** 的核心制度：每逢七年末一年，債主必須 [[不可向弟兄追討債務（豁免年規定）|鬆手豁免]]\
  \ 向以色列弟兄所借的債，唯獨向外邦人仍可追討（v1-3）。這不僅是經濟重置，更是神學宣示——若百姓聽從耶和華的話，祂必賜福使 **[[在你們中間沒有窮人（順服帶來福分）]]**\
  \ 成為可能（v4-5），並實現 **[[借給許多國民、不向他們借貸（經濟主權）]]** 的國度願景（v6）。經文將「豁免」一詞重複使用，強調這是耶和華主動宣告的恩典年份（v2），而非單純的人類慈善行為。\n\
  \n### 照顧窮乏弟兄的誡命（v7-11）\n緊接著豁免年規定，摩西轉向具體的仁慈實踐。在應許之地任何城裡，面對窮乏弟兄，**[[不可忍心、揝手不幫補窮乏弟兄]]**，總要鬆開手借給他補足所缺（v7-8）。特別警告\
  \ **[[不可起惡念、惡眼看窮乏弟兄（第七年將近）]]**，利用豁免年臨近為由拒絕借貸，這會招致罪愆（v9）。施捨的態度至關重要：**[[給窮人時心裡不可愁煩（樂意施捨）]]**，因耶和華必在一切所行的事上賜福（v10）。經文誠實面對社會現實：**[[地上的窮人永不斷絕（社會現實）]]**，因此鬆開手的命令是長久有效的（v11）。\n\
  \n### 希伯來奴僕的釋放與待遇（v12-18）\n豁免年原則延伸至人身自由領域。希伯來男僕女僕服事六年，第七年必 **[[希伯來奴僕第七年得自由（豁免年釋放奴僕）|任他自由出去]]**（v12）。釋放時\
  \ **[[希伯來奴僕服事六年、工價多加一倍（公平待遇）|不可使他空手而去]]**，要從羊群、禾場、酒醡厚賞（v13-14），根基在於記念出埃及的救贖經驗（v15）。若奴僕因愛主家而自願永留，則以\
  \ **[[奴僕不願意離開、刺耳歸主（自願永遠為奴）|錐子刺耳在門上]]** 為永遠為奴的儀式（v16-17）。釋放不被視為虧損，因其服事價值超過雇工雙倍，順服此命必蒙福（v18）。\n\
  \n### 頭生牲畜分別為聖（v19-23）\n本章以獻祭律例收尾。牛羊群中 **[[牛羊群中頭生的公的分別為聖歸耶和華]]**，不可作工也不可剪毛，要全家在耶和華選擇的地方、在祂面前吃（v19-20）。**[[頭生的若有殘疾不可獻給耶和華（可在城裡吃）]]**，有殘疾者可在城裡由潔淨不潔淨人同吃，如同吃羚羊鹿一般，但嚴禁喫血，要倒在地上如水（v21-23）。這規定將頭生權的神聖性與祭物潔淨標準結合，並照顧祭司與百姓的食用需要。\n\
  \n```mermaid\nmindmap\n  root((申命記15章<br>豁免年律法))\n    債務豁免(v1-6)\n      七年豁免\n \
  \     區分弟兄/外邦人\n      順服→無窮人/經濟主權\n    窮人照顧(v7-11)\n      鬆開手/借給補足\n      拒絕惡念/惡眼\n\
  \      樂意施捨→蒙福\n      窮人不斷絕→長久命令\n    奴僕釋放(v12-18)\n      六年服事/第七年自由\n      厚賞不空手\n\
  \      紀念出埃及救贖\n      自願刺耳永遠為奴\n    頭生獻祭(v19-23)\n      公的分別為聖\n      無殘疾→聖所吃\n\
  \      有殘疾→城裡吃\n      禁喫血\n```\n\n### 跨章脈絡：豁免年、禧年與基督的釋放\n申命記15章的豁免年（Shemitah）與利未記25章的禧年（Yovel）構成「釋放」神學的雙重見證：前者聚焦債務與奴僕的七年週期，後者擴展至土地歸還與五十年大釋放。兩者核心皆在於\
  \ **「耶和華的豁免年已經宣告了」**（v2）——釋放的主權屬於神，人只能順服回應。新約中耶穌在拿撒勒會堂引用以賽亞書61章宣告「釋放被擄的……宣告耶和華的恩年」（路4:18-19），將豁免年/禧年的終極應驗指向祂自己：祂是真正的豁免主，不僅鬆開債務之手，更以生命贖價鬆開罪債之手（西2:13-14）。希伯來奴僕「刺耳歸主」的自願永奴意象，預表信徒因愛甘心作基督的奴僕（羅1:1；腓1:1），在自由中選擇順服。本章「窮人永不斷絕」的現實張力，也呼應主耶穌「常有窮人和你們同在」（可14:7）的宣告，提醒教會在已然/未然之間持續活出鬆開手的國度倫理。"
