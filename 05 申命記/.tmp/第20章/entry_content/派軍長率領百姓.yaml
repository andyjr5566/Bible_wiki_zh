name: 派軍長率領百姓
type: 事件
secondary_types: []
aliases:
- 立軍長
- 軍隊編制
status: formal
definition: 申命記 20:9 記載「官長對百姓宣告完了，就當派軍長率領他們。」經免役條例篩選後，剩餘的兵力由官長任命軍長（sar）統領，形成作戰單位。這顯示以色列軍隊編制並非鬆散部落聯盟，而有階層指揮結構，配合聖戰神學：神為統帥，祭司為屬靈保證，軍長為戰術執行者。
development: 此制度在民數記 31:14（千夫長、百夫長）、申命記 1:15（千夫長、百夫長、五十夫長、十夫長）與約書亞記的征戰記載中均可見影子；反映早期以色列軍事組織的常規。
accumulations:
- book: 申命記
  chapter: 20
  summary: 經文 9 節，官長宣告免役條例結束後，派立軍長率領剩餘兵力出征。
  relation: 作為免役條例的行政收尾，將經篩選的兵力正式編組，銜接後續攻城與圍城的作戰程序。
