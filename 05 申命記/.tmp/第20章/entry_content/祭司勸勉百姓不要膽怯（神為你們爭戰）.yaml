name: 祭司勸勉百姓不要膽怯（神為你們爭戰）
type: 神學
secondary_types: []
aliases:
- 祭司勸勉
- 戰前宣告
status: formal
definition: 申命記 20:2-4 規定臨陣前，祭司要到百姓面前宣告：「以色列人哪，你們當聽，你們今日將要與仇敵爭戰，不要膽怯，不要懼怕戰兢，也不要因他們驚恐；因為耶和華你們的神與你們同去，要為你們與仇敵爭戰，拯救你們。」此為聖戰儀式的一部分，強調神是真正的戰士，百姓只需信靠。
development: 此制度反映以色列獨特的「聖戰」觀：祭司代表神臨在，宣告神的應許；不同於周邊國家依賴占卜或軍事策略。後世歷史書（如代下 20:14-17）多見利未人/先知作類似宣告。
accumulations:
- book: 申命記
  chapter: 20
  summary: 經文 2-4 節，祭司在官長宣告免役前，先以神的名勸勉百姓不要懼怕，宣告神必為他們爭戰。
  relation: 承接「出征作戰時不要怕」的神學宣告，具體化為祭司的禮儀性勸勉，為後續免役條例與派軍長鋪路。
