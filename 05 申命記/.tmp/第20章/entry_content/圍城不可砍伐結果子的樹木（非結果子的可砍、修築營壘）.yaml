name: 圍城不可砍伐結果子的樹木（非結果子的可砍、修築營壘）
type: 神學
secondary_types: []
aliases:
- 保護果樹
- 圍城生態律法
status: formal
definition: 申命記 20:19-20 規定圍城許久時，不可舉斧子砍壞結果子的樹木，因為可以吃其果子，「田間的樹木豈是人，叫你蹧蹋嗎？」；惟獨非結果子的樹木可毀壞砍伐，用以修築營壘攻城。此條例體現「創造秩序」神學：即使戰爭狀態，也不可濫毀神所賜維生資源，樹木非敵對人類，不應成為洩憤對象。拉比傳統將此推廣為「毀壞禁令」（Bal
  Tashchit），成為猶太生態倫理的基石。
development: 此律法在列王記下 3:19, 25（以色列、猶大、以東聯軍圍攻摩押，毀壞美好田地、堵塞水泉、砍伐好樹）被違背，先知以利沙曾預言勝利但責備濫暴；米示拿《巴瓦·巴特拉篇》2:9-10
  等進一步界定「結果子」標準與違反後果。
accumulations:
- book: 申命記
  chapter: 20
  summary: 經文 19-20 節，圍城不可砍伐結果子樹木，非結果子可砍以建營壘；樹木非人，不可蹧蹋。
  relation: 作為本章結尾的生態/倫理神學規範，限制聖戰中的破壞範圍，呼應「耶和華你神與你同在」的聖潔要求——連樹木也在神的看顧之下。
related_entries:
