name: 出征作戰時不要怕（耶和華與你同在）
type: 神學
secondary_types: []
aliases:
- 出征不怕
- 耶和華同在
status: formal
definition: 申命記 20:1-4 記載摩西吩咐以色列人出征時，面對馬匹、車輛與更多的敵軍，不可懼怕，因為領他們出埃及的耶和華神與他們同在。這是聖戰神學的核心：勝敗不在兵力多寡，而在於神的同在與帶領。祭司與官長的宣告皆建立在此神學基礎上。
development: 從出埃及記 14:14「耶和華必為你們爭戰」延伸至此，成為以色列歷代出征的信心根基；後世先知（如賽 41:10）與新約（來 13:5-6）繼承此應許。
accumulations:
- book: 申命記
  chapter: 20
  summary: 經文 1-4 節，摩西命令百姓出征不可怕，因耶和華神與他們同在，並要為他們爭戰拯救他們。
  relation: 本條目為本章聖戰神學的宣告基礎，後續祭司勸勉、免役條例、派軍長等皆建立於此神學前提之上。
related_entries:
