name: 神揀選以色列（揀選恩典）
type: 神學
secondary_types: []
aliases:
- 耶和華喜悅列祖
- 揀選以色列為後裔
- 純恩典揀選
status: formal
definition: 申10:15說明耶和華單因喜悅列祖、愛他們，便從萬民中揀選他們的後裔（以色列），完全出於神主權恩典，非因以色列人數多或公義（參申7:7-8,
  9:4-6）。
development: 此節將「天地萬物屬神」（v.14）的主權具體化於歷史揀選中，成為以色列身分認同與順服動力的根基。
accumulations:
- book: 申命記
  chapter: 10
  summary: 耶和華喜悅列祖，愛他們，從萬民中揀選以色列作為後裔。
  relation: 連結神主權（v.14）與倫理回應（v.16），揀選恩典要求約民以受割禮的心回應。
related_entries:
