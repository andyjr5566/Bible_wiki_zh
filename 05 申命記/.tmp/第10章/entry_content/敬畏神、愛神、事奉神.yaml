name: 敬畏神、愛神、事奉神
type: 神學
secondary_types: []
aliases:
- 敬畏神、愛神、事奉神
- 敬畏耶和華你的神
- 盡心盡性事奉
status: formal
definition: 申命記10:12-13總結神對以色列的核心要求：敬畏耶和華、遵行祂的道、愛祂、盡心盡性事奉祂、遵守誡命律例。這是約關係的根本義務，亦為得福的途徑。
development: 經文從神的主權（天地萬物屬祂）、揀選恩典（愛列祖揀選後裔）、神的屬性（公義、憐憫）推導出人當有的回應。敬畏、愛、事奉三者不可分割，內心污穢須除掉（10:16），不可硬著頸項。
accumulations:
- book: 申命記
  chapter: 10
  summary: 摩西向以色列人陳明神所要的：敬畏、愛、事奉、遵守誡命，為要得福（申10:12-13）。
  relation: 本章神學核心，連結神的屬性與揀選恩典，引出生活應用。
related_entries:
- 天地萬物屬神
- 神揀選以色列（揀選恩典）
- 除掉心裡的污穢、不可硬著頸項
- 敬畏耶和華、事奉祂、專靠祂、指著祂的名起誓
sources:
