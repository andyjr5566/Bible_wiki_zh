- '逐節註解: 申命記10章逐節註解 — 盡心盡性事奉的釋義（https://www.ccbiblestudy.org/Old%20Testament/05Deut/05CT10.htm）'
- '拾穗: 申命記10章拾穗 — 敬畏與愛的關係（https://www.ccbiblestudy.org/Old%20Testament/05Deut/05GT10.htm）'
- '研經註解: 申命記10章研經註解 — 以色列的核心義務（https://www.kingcomments.com/en/bible-studies/Deu/10）'
