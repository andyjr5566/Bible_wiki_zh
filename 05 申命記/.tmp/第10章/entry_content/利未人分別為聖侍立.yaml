name: 利未人分別為聖侍立
type: 事件
secondary_types: []
aliases:
- 利未支派分別出來
- 利未人侍立事奉
status: formal
definition: 耶和華將利未支派分別出來，抬約櫃、侍立事奉、奉神名祝福，且無地業、以耶和華為業（申10:8-9）。
development: 此事件回顧西乃山金牛犢事件後（出32:26-29）利未人得蒙揀選的緣由，並確立其獨特宗教職能與產業安排。
accumulations:
- book: 申命記
  chapter: 10
  summary: 耶和華揀選利未支派抬約櫃、侍立事奉、奉名祝福，以耶和華為產業。
  relation: 闡明利未人宗教特權的神學基礎，與約櫃、祭司職分共同構成敬拜體系。
