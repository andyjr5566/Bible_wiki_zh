definition: 摩西第二次在山上住了四十晝夜，耶和華應允不滅絕百姓（申10:10），對應出埃及記34:28重寫石版之事。
development: 此事件強調摩西代禱的中保角色，與第一次上山（出24:18）形成對比，凸顯神恩典的延續。
