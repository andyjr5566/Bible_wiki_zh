- 不受賄賂
status: formal
definition: 申10:17宣告耶和華是「萬神之神，萬主之主，至大的神，大有能力，大而可畏，不以貌取人，也不受賄賂」，彰顯神的超越主權、公義審判與不可操控性。
development: 此屬性清單為「為孤兒寡婦伸冤、憐愛寄居者」（v.18）提供神學依據：神不偏待人、不受賄賂，故祂的公義必保護弱勢；同時也要求百姓效法神憐愛寄居者（v.19）。
accumulations:
- book: 申命記
  chapter: 10
  summary: 列舉神的屬性：萬神之神、萬主之主、大有能力、大而可畏、不以貌取人、不受賄賂。
  relation: 作為倫理命令（憐愛寄居者、除掉污穢）的神學根基，神的屬性決定約民當有的生活樣式。
related_entries:
