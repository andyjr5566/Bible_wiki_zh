name: 木櫃（aron）
type: 原文
secondary_types: []
aliases:
- 木櫃
- 皂莢木櫃
status: formal
definition: 希伯來文 **aron (אֲרוֹן)**，意為「櫃、箱、棺」。本章指摩西照耶和華吩咐，用皂莢木親手製作的臨時木櫃，用以盛裝重刻的兩塊石版（十誡），區別於後來比撒列製作、利未人抬運的金包約櫃（出埃及記
  25:10-22）。經文強調「你要將這版放在櫃中」（v.2）、「將這版放在我所做的櫃中」（v.5），顯示此櫃為石版的初始安放處，見證神重立約的恩典。
development: 摩西在西乃山領受二次十誡前，先按神命鑿石版、造木櫃（v.1,3）；下山後將版放入櫃中（v.5）；此木櫃為過渡性器具，待會幕建立、金約櫃完成後，石版遷入金櫃（列王紀上
  8:9），木櫃使命結束。
accumulations:
- book: 申命記
  chapter: 10
  summary: 記載神吩咐摩西鑿石版、造木櫃（v.1）；摩西用皂莢木做櫃、鑿石版上山（v.3）；神將十誡寫於版上交給摩西（v.4）；摩西下山將版放入所做的木櫃中（v.5）；並註記利未人後來被分別抬耶和華的約櫃（v.8），暗示木櫃為前身或臨時容器。
  relation: 本章核心敘事，確立木櫃為二次十誡石版的首個安放之處，見證神重立約的恩典。
