status: formal
definition: 耶和華吩咐摩西起來引導百姓進去得應許之地（申10:11），標示從西乃山出發、邁向迦南的轉折點。
development: 此命令承接神不滅絕百姓的恩典（v.10），開啟申命記後續「在曠野四十年」至「約旦河東」講論的歷史舞台。
accumulations:
- book: 申命記
  chapter: 10
  summary: 耶和華吩咐摩西率領百姓進去得列祖起誓應許之地。
  relation: 將約的更新（石版、約櫃、代禱）轉化為具體的進地使命，連結神學宣告與歷史行動。
