name: 亞倫之死與以利亞撒繼任
type: 事件
secondary_types: []
aliases:
- 亞倫之死與以利亞撒繼任
- 以利亞撒接續祭司職分
status: formal
definition: 記載亞倫在摩西拉去世、葬於該處，其子以利亞撒接續他供祭司職分（申10:6）。此事發生在以色列人曠野漂流後期，標誌祭司職分的傳承。
development: 經文在敘述利未人分別為聖抬約櫃（申10:8-9）前，插入亞倫之死與以利亞撒繼任，顯示祭司體制的連續性。亞倫死於摩西拉（即何珥山附近），以利亞撒成為大祭司，延續聖職服事。
accumulations:
- book: 申命記
  chapter: 10
  summary: 以色列人從比羅比尼亞干起行到摩西拉，亞倫死在那裡，以利亞撒接續祭司職分（申10:6）。
  relation: 本章插入的歷史註記，連結利未人分別為聖的背景。
related_entries:
- 利未人分別為聖侍立
- 木櫃（aron）
