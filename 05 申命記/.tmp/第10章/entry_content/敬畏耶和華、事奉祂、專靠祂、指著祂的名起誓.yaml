name: 敬畏耶和華、事奉祂、專靠祂、指著祂的名起誓
type: 神學
secondary_types: []
aliases:
- 敬畏神的完整回應
- 獨一崇拜與絕對委身
status: formal
definition: 申命記 10:20 以四個動詞串聯對神的完整回應：敬畏、事奉、專靠、指名起誓。這不僅是禮儀行為，更是立，涵蓋內心態度（敬畏）、生活獻上（事奉）、信賴對象（專靠）、言語見證（指名起誓）。此節呼應
  10:12-13「敬畏、愛、事奉、遵守」的核心要求，並預備 10:21「祂是你所讚美的」的讚美高潮。
development: 此四重動詞在申命記重複出現（6:13；13:4；28:58），構成「敬畏耶和華」的規範性定義；新約在來 12:28-29 以「存敬畏、戰兢的心事奉神」呼應此傳統。
accumulations:
- book: 申命記
  chapter: 10
  summary: 第 20 節列出四個連續動詞：敬畏、事奉、專靠、指名起誓，作為百姓對神屬性（10:17-18）與恩典（10:15,21-22）的總體回應。
  relation: 本章倫理與敬拜教導的高峰，將神學認識轉化為具體委身行動。
