name: 神為孤兒寡婦伸冤、憐愛寄居者
type: 神學
secondary_types: []
aliases:
- 神保護弱勢族群
- 神的公義與憐憫
status: formal
definition: 申命記 10:17-18 揭示耶和華作為「萬神之神、萬主之主」的超越主權，祂不以貌取人、不受賄賂，卻主動為無依靠的孤兒寡婦伸冤，並憐愛寄居者，賜給衣食。這彰顯神的公義不偏袒權貴，祂的憐憫主動介入社會邊緣人的生命，成為以色列效法的榜樣（參
  10:19）。
development: 此神學主題貫穿律法書（出 22:21-24；利 19:33-34）、先知書（耶 7:5-7；亞 7:9-10）與新約（雅 1:27），構成聖經「保護弱勢」的核心倫理基礎。
accumulations:
- book: 申命記
  chapter: 10
  summary: 經文 17-18 節宣告神的屬性（大有能力、大而可畏、不偏待、不受賄）與具體行動：為孤兒寡婦伸冤、憐愛寄居者賜衣食。
  relation: 本章核心神學宣告，奠定以色列當效法神憐愛寄居者的基礎（10:19）。
related_entries:
- 神的屬性（萬神之神、萬主之主、大有能力、大而可畏、不以貌取人、不受賄賂）
- 當憐愛寄居者（因你們在埃及也作過寄居的）
- 敬畏耶和華、事奉祂、專靠祂、指著祂的名起誓
