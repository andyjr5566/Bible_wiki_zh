  - name: "兩塊石版（重刻十誡）"
    type: "原文"
    evidence: "經文第1-5節「你要鑿出兩塊石版，和先前的一樣……耶和華將那大會之日、在山上從火中所傳與你們的十條誡，照先前所寫的，寫在這版上」；ccbiblestudy CT 指出先前石版是神預備、這次由摩西預備；KingComments 指出重寫法版象徵約的重建；BibleHub 連結出34:1、耶31:33。"
    surfaces:
      - phrase: "兩塊石版"
        verses: [1, 3]
      - phrase: "石版"
        verses: [1, 2, 3, 4, 5]
      - phrase: "重刻十誡"
        verses: [4]
      - phrase: "十條誡"
        verses: [4]

