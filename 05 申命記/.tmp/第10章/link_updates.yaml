"updates":
- "title": "兩塊石版（約版）"
  "path": "link_folder/原文/兩塊石版（約版）.md"
  "summary": "神重寫十誡於兩塊新石版，象徵約的重建。經文第1-5節記載神吩咐摩西鑿出兩塊石版、上山領受；神將大會之日從火中所傳的十條誡照先前所寫的寫在版上；摩西下山將版放在木櫃中。CCB CT 指出先前石版是神預備、這次由摩西預備；KingComments 指出重寫法版象徵約的重建；BibleHub 連結出34:1、耶31:33。"
  "relation": "本章第1-5節核心敘事，記載西乃之約在金牛犢事件後的正式重立，兩塊石版作為約法的載體，由摩西親自保管安放在木櫃中，見證神重立約的恩典。"
