"book": "05 申命記"
"chapter": !!int "7"
"updates":
- "title": "柱像（matsebah）"
  "path": "link_folder/原文/柱像（matsebah）.md"
  "summary": "迦南地的石柱神像，代表巴力崇拜。CCB CT 解釋柱像與巴力崇拜有關、原文為石柱製神像；KingComments 指出柱像代表神明臨在或權能；BibleHub 連結出23:24、34:13。"
  "relation": "本章第5、25節命令打碎柱像，作為聖戰毀滅原則的一部分，拆毀祭壇、打碎柱像、砍下木偶、焚燒偶像。"
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "即死海，位於迦南地東南界。CCB CT 指出鹽海即死海、迦南東南界；KingComments 連結創14:3、民34:3、書3:16；BibleHub 連結結47:8-11醫治死海預言。"
  "relation": "本章第1節提到以色列人要進去得為業的地，鹽海作為迦南地邊界地標之一。"
- "title": "當記念安息日守為聖日"
  "path": "link_folder/神學/當記念安息日守為聖日.md"
  "summary": "安息日為約的記號，申命記強調守安息日為聖日。CCB CT 連結申5:12-15守安息日；KingComments 指出安息日為約的記號；BibleHub 連結出20:8-11、來4:9-10。"
  "relation": "本章第11節勸勉謹守遵行誡命、律例、典章，隱含安息日作為約的記號與敬畏神的表現。"
- "title": "敬畏神"
  "path": "link_folder/神學/敬畏神.md"
  "summary": "敬畏神是遵守律法的動力與基礎。CCB CT 指出敬畏指害怕惹神發怒；CCB GT 指出敬畏神、謹守律例誡命，個人可享長壽，國家可享福祉；KingComments 指出摩西不停地回顧出埃及事件與西奈山頒佈律法事件，因為此二事件不僅孕育了以色列，同時還明確宣告了神是以色列的救贖者與治理者的事實。"
  "relation": "本章第11、21節勸勉以色列人敬畏耶和華神，謹守祂的律例誡命，使日子得以長久。"
- "title": "死海"
  "path": "link_folder/地點/死海.md"
  "summary": "即鹽海，位於迦南地東南界。CCB CT 指出死海即鹽海、迦南東南界；KingComments 連結創14:3、結47:8-11；BibleHub 連結民34:3、書3:16。"
  "relation": "本章第1節提到以色列人要進去得為業的地，死海作為迦南地邊界地標之一。"
