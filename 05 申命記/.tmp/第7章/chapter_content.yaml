organization: '### 進入迦南與聖戰命令（v1-5）


  耶和華將以色列領入應許之地，面前有[[七國（迦南七族）|七族]]，個個比以色列強大。KC 指出：數字「七」表明這些民族代表邪惡勢力的完全權勢——對基督徒而言，他們預表「天空屬靈氣的惡魔」（弗
  6:12），我們的爭戰不是對血肉之軀，而是對屬靈權勢。神命令「把他們滅絕淨盡」（v2），不可立約、不可憐恤、不可結親（v3），因為通婚會使兒女「轉離不跟從主，去事奉別神」（v4）。KC
  強調：這不是謀殺，而是執行神的審判——這些民族當時是地上最墮落的，神已容忍他們四百年，如今罪孽滿盈（創 15:16-21）。具體執行上要拆毀祭壇、打碎[[柱像（matsebah）|柱像]]、砍下[[木偶（亞舍拉）|木偶]]、焚燒[[雕刻的偶像（佩謝爾）|雕刻的偶像]]（v5）。KC
  警告：不可將異教之物「潔淨後歸神使用」——基督教史上將異教節日（聖誕節）和馬利亞崇拜「基督教化」正是此錯誤。這套[[聖戰毀滅原則|聖戰毀滅原則]]不僅是軍事行動，更是防止屬靈污染的隔離措施。


  ### 揀選恩典與約的信實（v6-11）


  以色列成為[[聖潔的民]]、[[神產業子民|神的產業]]，不是因人數眾多（v7），單因「耶和華愛你們」並「守他向你們列祖所起的誓」（v8）——這是[[揀選（選民論）|揀選]]的純恩典基礎。KC
  深刻指出：神的愛完全在祂自己裡面找到源頭和動機——「惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了」（羅 5:8）。神自稱「信實的神」，向愛他守誡命者[[守約施慈愛（至千代）|守約施慈愛直到千代]]（v9），向恨他的人「當面報應」、「決不遲延」（v10，[[報應恨他的人]]）。KC
  指出：神不是對「群體」而是對「個人」報應——每個人親自為所行的負責，判決立即執行，無需上訴。因此百姓要「謹守遵行」誡命律例典章（v11）。


  ### 順服得福與疾病隔離（v12-16）


  聽從典章的後果是立約慈愛的具體化：神必愛你、賜福、使你增多，在應許地上賜福「身所生的、地所產的、五穀、新酒、油、牛犢、羊羔」（v13），蒙福勝過萬民，男女牲畜無不生育（v14）。KC
  指出三層祝福的屬靈含義：(1)「身所生的」——新生命在美地成形，如同保羅為加拉太人再受生產之苦「直到基督成形在你們心裡」（加 4:19）；(2)「五穀、新酒、油」——基督為我們的食物（穀）、喜樂（酒），在聖靈能力中享受（油）；(3)「牛犢羊羔」——增添祭物，即增添敬拜。特別應許「耶和華必使一切的病症離開你；你所知道埃及各樣的惡疾，他不加在你身上，只加在一切恨你的人身上」（v15，[[免除埃及惡疾]]）。KC
  指出：對基督徒而言，「疾病」非 disobedience 的證據，而是象徵從前屬靈的病態（多 3:3）。同時重申不可事奉他們的神，免得成為網羅（v16）。


  ### 不可懼怕：神親自爭戰（v17-24）


  面對「這些國的民比我更多」的軟弱（v17），摩西命令「不要懼怕」，要「牢牢記念」神在埃及所行的大試驗、神蹟、大能的手、伸出的膀臂（v18-19）。神必照樣待所懼怕的人民，並「打發黃蜂飛到他們中間」（v20），親自在以色列中間作「大而可畏的神」（v21，[[大而可畏的神]]）。趕出方式是「漸漸趕出」（v22，[[漸漸趕出]]），免得野獸增多害民；神必「大大擾亂他們，直到滅絕」，將君王「交在你手中」，使名從天下消滅，「必無一人能在你面前站立得住」（v23-24，[[君王交在手中]]）。這段落核心是[[耶和華為你爭戰|耶和華為你爭戰]]，非靠人力。


  ### 偶像金銀與當毀滅之物（v25-26）


  對偶像的處置升級為焚燒（v25），嚴禁貪圖其上的金銀，免得陷入網羅，因這是「耶和華你神所憎惡的」。更進一步，「可憎的物不可帶進家去」，否則「你就成了當毀滅的，與那物一樣」（v26，[[當毀滅的物（赫蓮）]]）。要「十分厭惡，十分憎嫌」，因為這是當毀滅的物。這將[[聖戰毀滅原則|聖戰毀滅原則]]從戰場延伸到家庭私領域，凸顯[[聖潔的民|聖潔]]要求徹底分別。


  ### 跨章脈絡：聖潔分別與選民身分


  本章將「揀選—聖潔—毀滅偶像—得福」串成閉環：神在[[為奴之家（beit avadim）|為奴之家]]救贖以色列（v8），揀選他們作[[聖潔的民]]（v6），要求徹底清除迦南宗教痕跡（v5,25-26），應許在順服中享受立約祝福（v12-15）。KC
  總結：本章的核心思想是「全體百姓的聖別歸神」——不是祭司階級，而是全體。這邏輯在申命記反覆出現（參 6:10-19；12:1-4），也為後世「分別為聖」神學奠基。[[專靠耶和華|專靠耶和華]]不僅是軍事策略，更是立約關係的核心回應。'
