status: formal
definition: 十誡作為神與以色列立約的核心內容，申 7:9-11 將守誡命視為守約的表現，神向愛他守誡命者守約施慈愛至千代。
development: ''
accumulations:
- book: 申命記
  chapter: 7
  summary: 第 9-11 節闡述神是信實的神，向愛他、守誡命者守約施慈愛，將誡命與約的關係緊密連結。
  relation: 本章以十誡為約的條款，強調順服帶來約的祝福。
