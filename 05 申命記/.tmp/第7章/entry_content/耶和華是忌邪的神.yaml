status: formal
definition: 申命記第7章9-10節宣告耶和華是信實的神，向愛他、守誡命的人守約施慈愛，向恨他的人當面報應，顯明神的忌邪屬性——不容許拜偶像與背約。
development: 此屬性在十誡（出20:5）與後續先知書中反覆強調，成為聖潔與公義的神學基石。
