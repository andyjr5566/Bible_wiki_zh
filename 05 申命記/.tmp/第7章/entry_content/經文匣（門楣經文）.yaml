name: 經文匣（門楣經文）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 經文匣（希伯來文：תְּפִלִּין，Tephillin，音譯「特菲林」，意為「禱告帶」或「經文匣」），門楣經文（希伯來文：מְזוּזָה，Mezuzah，音譯「梅祖薩」，意為「門柱」或「門楣經文」）。二者均為以色列人將神話語繫於手臂額門、寫於房屋門框之實體表徵，具體命令見申命記6:8-9；11:18-20。本章（申7）雖未直接出現此二詞，卻在7:11-12、18-19強調「謹守誡命」與「記念神大能作為」，為日後佩戴經文匣、張貼門楣經文以時刻記念神話語之神學基礎。
development: 申命記7章著重聖戰毀滅原則、揀選恩典、守約施慈愛與漸漸趕出敵人，第11-12節吩咐謹守誡命律例典章，第18-19節命令記念耶和華向法老所行之大試驗神蹟，此「記念」與「守行」的雙重動力，正是經文匣與門楣經文功能的核心意涵（參申6:6-9）。
accumulations:
- book: 申命記
  chapter: 7
  summary: 本章未直接提及「經文匣」或「門楣經文」（該二詞見申6:8-9；11:18-20），但第11-12節強調「謹守遵行誡命律例典章」，第18-19節命令「牢牢記念耶和華向法老所行的事」，建立以色列人透過具體儀式（後世經文匣、門楣經文）將神話語內化於心、外化於行的神學邏輯。
  relation: 神學基礎與背景關聯；本章提供「記念神恩蹟、遵守神誡命」的核心動機，為經文匣與門楣經文制度之設立奠定經文依據。
