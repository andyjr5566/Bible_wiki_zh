name: 君王交在手中
type: 事件
secondary_types: []
aliases:
- 君王交在手中
status: formal
definition: 申命記 7:24 「又要將他們的君王交在你手中，你就使他們的名從天下消滅。必無一人能在你面前站立得住，直到你將他們滅絕了。」神不僅趕出列國，更將其領袖權力結構徹底瓦解，「名從天下消滅」象徵記憶與合法性的抹除。此應許回應以色列對「君王」軍事優勢的恐懼（v.17），證明神為祂子民爭戰（v.21）。
development: 歷史實現見約書亞記 10-11 章（南北諸王被擒殺），屬聖戰毀滅原則（herem）的一環，彰顯神對政治權勢的主宰。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第24節應許將敵國君王交在以色列手中，使其名從天下消滅。
  relation: 承接第22-23節漸漸趕出與大大擾亂，為聖戰最終勝利的具體保證。
