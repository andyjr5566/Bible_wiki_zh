name: 聖戰毀滅原則
type: 神學
secondary_types: []
aliases:
- 聖戰毀滅
- 赫蓮原則
- 當毀滅的原則
status: formal
definition: 申命記 7:2, 5, 16, 23-25 規定對迦南七國須「滅絕淨盡」（赫蓮 herem）：不可立約、不可憐恤、不可結親、拆毀祭壇、打碎柱像、砍下木偶、焚燒雕刻偶像、不可貪圖金銀。目的在防止以色列被引誘事奉別神（7:4,
  16, 25-26），維護聖潔的民身分。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第 2, 5, 16, 23-25 節密集陳述毀滅命令與理由；第 4, 16, 25-26 節說明屬靈危機（轉離、網羅、當毀滅的物）。
  relation: 直接關聯七國、木偶、雕刻的偶像、柱像、金銀不可貪圖、當毀滅的物（赫蓮）、別神、耶和華是忌邪的神。
related_entries:
- 七國（迦南七族）
- 木偶（亞舍拉）
- 雕刻的偶像
- 柱像（matsebah）
- 金銀不可貪圖
- 當毀滅的物（赫蓮）
- 別神
- 耶和華是忌邪的神
- 聖潔的民
