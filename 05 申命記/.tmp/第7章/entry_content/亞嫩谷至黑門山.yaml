name: 亞嫩谷至黑門山
type: 地點
secondary_types: []
aliases:
- 亞嫩谷至黑門山
status: formal
definition: 指從亞嫩河谷到黑門山的廣闊區域，涵蓋約旦河東側至北部高地，為申命記應許之地的東、北邊界。
development: 本章未明列此地名，但作為整體應許地理範圍的描述背景。
accumulations:
- book: 申命記
  chapter: 7
  summary: 經文說明耶和華要將七國趕出，賜給以色列的地包括亞嫩谷至黑門山一帶。
  relation: 界定本章應許之地的地理廣度。
