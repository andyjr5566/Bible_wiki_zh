status: formal
definition: 申命記第7章雖未直接論及起誓，但第9節宣告耶和華是信實的神，守約施慈愛，奠定了以神名起誓的神學基礎——誓言的可靠性建立在神的信實上。
development: 後續律法（如申6:13）明文規定「要指著耶和華你神的名起誓」。
