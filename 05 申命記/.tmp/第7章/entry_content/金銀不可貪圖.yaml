name: 金銀不可貪圖
type: 神學
secondary_types: []
aliases:
- 金銀不可貪圖
status: formal
definition: 申命記 7:25 「他們雕刻的神像，你們要用火焚燒；其上的金銀，你不可貪圖，也不可收取，免得你因此陷入網羅；這原是耶和華─你神所憎惡的。」嚴禁從毀滅物（herem）中取財，金銀雖有價值，因連於偶像崇拜而成「網羅」，會引誘人心離棄耶和華（v.4,
  16）。此命令考驗以色列專靠耶和華（v.17-21）與聖潔分別（v.6）的決心。
development: 亞干犯罪（書 7 章）即違此例，導致全族受禍；屬「當毀滅的物」神學延伸，強調貪婪屬偶像崇拜（西 3:5）。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第25節禁止貪圖偶像上的金銀，因這是耶和華所憎惡、會成網羅的事。
  relation: 緊承第5節拆毀偶像、第26節不可帶進家，構成聖戰後處理戰利品的純潔律例。
