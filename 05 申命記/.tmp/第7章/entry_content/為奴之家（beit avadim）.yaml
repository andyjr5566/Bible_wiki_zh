status: formal
definition: 希伯來文「בֵּית עֲבָדִים」（beit avadim），字面「奴隸之家」，申命記第7章8節提到神從「為奴之家」救贖以色列脫離埃及王法老的手，指埃及作為奴役之地。
development: 此詞在舊約多處（如出埃及記13:3、申命記5:6）重複出現，成為救贖歷史的標誌性術語。
accumulations:
- book: 申命記
  chapter: 7
  summary: 神用大能的手從為奴之家救贖以色列脫離法老
  relation: 直接引用原文術語，說明救贖出埃及的神學意義
