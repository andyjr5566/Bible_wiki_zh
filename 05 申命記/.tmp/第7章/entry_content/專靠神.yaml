status: formal
definition: 申命記第7章17-21節勸勉以色列人不可因敵眾懼怕，要記念耶和華向法老所行的大能，並應許神必照樣待所懼怕的人民，教導百姓專靠耶和華得勝。
development: 此主題在後續歷史書（如約書亞記）反覆出現，成為以色列屬靈爭戰的核心原則。
