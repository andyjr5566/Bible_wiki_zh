status: formal
definition: 申命記7:11-13,12-15 強調謹守誡命、律例、典章，神必守約施慈愛至千代，賜福長久，包括人口、產業、健康等各面祝福。
development: 此原則貫穿申命記，將順服與長久福分掛鉤，屬於以色列的義（遵守誡命得福長久）的體現。
