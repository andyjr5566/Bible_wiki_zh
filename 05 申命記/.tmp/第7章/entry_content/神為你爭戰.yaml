status: formal
definition: 申命記7:18-22 強調耶和華神必為以色列爭戰，正如祂在埃及向法老所行的神蹟，並差遣黃蜂趕出敵人，顯明神是大而可畏的神，親自為百姓爭戰。
development: 此神學主題貫穿聖戰毀滅原則，強調神的主動拯救與保護。
