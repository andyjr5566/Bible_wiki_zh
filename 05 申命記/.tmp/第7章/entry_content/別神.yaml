  summary: 第 4 節警告別神會誘惑子孫離棄耶和華；第 16 節禁止事奉他們的神；第 25-26 節吩咐焚燒偶像、不可貪圖金銀。
  relation: 本章以「別神」為負面對比，強調獨一真神的專屬敬拜。
