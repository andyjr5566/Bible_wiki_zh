name: 迦南地祝福
type: 神學
secondary_types: []
aliases:
- 迦南地祝福
status: formal
definition: 申命記7:12-15 應許若以色列聽從誡命，神必在迦南地賜福：人口增多、五穀新酒油豐盛、牲畜繁殖、除去疾病、不加埃及惡疾，顯示迦南地成為流奶與蜜之地的祝福。
development: 此祝福與守約施慈愛、揀選關係緊密，屬於神對順服子民的具體賞賜。
