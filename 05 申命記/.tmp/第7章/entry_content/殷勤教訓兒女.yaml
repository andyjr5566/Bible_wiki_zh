definition: 申命記第7章第9-11節指出耶和華向愛他、守誡命的人守約施慈愛，並命令百姓謹守遵行誡命、律例、典章，暗示父母當殷勤教導兒女遵行神的道。
development: 此教導在申命記6章進一步具體化為「早晚背誦示馬」的家庭實踐。
