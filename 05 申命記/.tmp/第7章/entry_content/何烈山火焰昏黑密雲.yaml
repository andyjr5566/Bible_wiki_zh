name: 何烈山火焰昏黑密雲
type: 事件
secondary_types: []
aliases:
- 何烈山火焰昏黑密雲
status: formal
definition: 「火焰、昏黑、密雲」描述西乃/何烈山神顯榮光（申 4:11, 5:22-23）。申命記 7 章並未提及何烈山神顯事件。本章聚焦迦南征服與約的順服，歷史依據為出埃及救贖（v.8,
  15, 18-19）而非西乃立約神顯。因此此條目在本章無直接經文依據，僅作為神學背景參照：神的可畏（v.21）與獨一（v.9）源於同一位在何烈山說話、在埃及行神蹟的耶和華。
development: 何烈山神顯確立「神無形像」（申 4:12, 15-19）與「敬畏神」（申 5:24-29）神學，為本章禁止偶像（v.5, 16, 25-26）與專靠耶和華（v.17-21）提供深層神學根基。
accumulations:
- book: 申命記
  chapter: 7
  summary: 本章無何烈山神顯記載；第9、21節神的信實與可畏屬性，與何烈山啟示一致。
  relation: 為本章「不可事奉別神」（v.16）、「拆毀偶像」（v.5）、「大而可畏的神」（v.21）提供神學溯源。
