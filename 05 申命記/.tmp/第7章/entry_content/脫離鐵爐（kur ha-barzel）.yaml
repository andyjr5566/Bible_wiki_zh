name: 脫離鐵爐（kur ha-barzel）
type: 原文
secondary_types: []
aliases:
- 脫離鐵爐
status: formal
definition: 希伯來文「כּוּר הַבַּרְזֶל」（kur ha-barzel），意為「鐵爐」，申命記第7章8節雖未直接出現此詞，但同章描述神從埃及「為奴之家」救贖，埃及常被比喻為鐵爐（參申4:20），象徵嚴酷的試煉與救贖。
development: 先知書（如耶利米11:4）進一步使用「鐵爐」比喻埃及的苦難。
accumulations:
- book: 申命記
  chapter: 7
  summary: 神從為奴之家救贖以色列，隱含脫離鐵爐意象
  relation: 提供原文比喻的神學背景
