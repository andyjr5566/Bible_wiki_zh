name: 流奶與蜜之地的祝福
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指神應許賜給以色列人之迦南地豐盛的產物與生育祝福。本章經文雖未直接出現「流奶與蜜」字句，但第13節列舉「五穀、新酒、和油，以及牛犢、羊羔」與第14節「男女沒有不能生養的，牲畜也沒有不能生育的」，具體呈現該地農業豐收與人口繁衍的雙重福氣，作為守約遵命的回應（申7:12-13）。
development: 申命記第7章將「流奶與蜜之地的祝福」置於聖戰毀滅原則與聖潔子民身分之後：神先揀選以色列為聖潔民（7:6），吩咐徹底除滅迦南七族與其偶像（7:1-5,
  25-26），隨後應許若聽從典章，神必守約施慈愛，賜下土地產物與生育豐盛（7:12-14）。這表明土地祝福非自動獲得，乃建立在獨一敬拜、拒絕同化、守約忠誠的神學基礎上。
accumulations:
- book: 申命記
  chapter: 7
  summary: 經文第12-15節應許若以色列聽從典章，神必賜福：愛他們、使人數增多、賜福身所生與地所產（五穀、新酒、油、牛犢、羊羔），並使男女牲畜皆能生育，免除埃及惡疾。
  relation: 本章將土地產物豐盛與生育祝福作為守約施慈愛的具體內容，對應「流奶與蜜之地」的神學意涵。
