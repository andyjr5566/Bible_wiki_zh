name: 七國（迦南七族）
type: 人物
secondary_types: []
aliases:
- 迦南七族
- 七國
status: formal
definition: 指申命記 7:1 所列、耶和華要從以色列人面前趕出的七個國民：赫人、革迦撒人、亞摩利人、迦南人、比利洗人、希未人、耶布斯人。經文強調他們「都比你強大」，凸顯以色列得地非靠己力，乃靠神大能。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第 1 節列出七國名單，並指出他們比以色列強大，為後文聖戰毀滅與漸漸趕出的神學基礎。
  relation: 本章聖戰毀滅原則、漸漸趕出、揀選恩典的對比背景。
related_entries:
- 聖戰毀滅原則
- 漸漸趕出
- 揀選（選民論）
- 神領以色列進迦南
