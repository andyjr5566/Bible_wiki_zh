name: 埃及鐵爐（kûr hab-barzel）
type: 原文
secondary_types: []
aliases:
- 埃及鐵爐
- 鐵爐
status: formal
definition: 希伯來文「kûr hab-barzel」（כּוּר הַבַּרְזֶל），字面「鐵熔爐」，喻指埃及為以色列受苦煉淨之地。申命記 7 章雖未直接出現此詞，但第8節「從為奴之家救贖你們脫離埃及王法老的手」、第15節「埃及各樣的惡疾」、第18-19節「向法老和埃及全地所行的事」均隱含此意象。神在「鐵爐」中以大能手、伸出來的膀臂救贖（v.8,
  19），成為以色列專靠耶和華（v.17-21）與守約（v.11-12）的歷史根基。
development: 術語見申 4:20、王上 8:51、耶 11:4，構成「出埃及救贖」核心神學意象，象徵苦難中神的鍛造與拯救。
accumulations:
- book: 申命記
  chapter: 7
  summary: 本章雖無「鐵爐」原文，但第8、15、18-19節以「為奴之家」「惡疾」「大試驗神蹟」描繪同一救贖實景。
  relation: 為本章「專靠耶和華」（v.17-21）與「守約得福」（v.11-15）提供歷史神學依據。
related_entries:
