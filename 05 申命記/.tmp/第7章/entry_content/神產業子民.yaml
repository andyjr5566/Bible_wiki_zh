definition: 申 7:6 指出以色列是耶和華從萬民中揀選、特作自己產業的子民，強調產業關係的專屬性與聖潔。
development: ''
accumulations:
- book: 申命記
  chapter: 7
  summary: 第 6 節宣告以色列為耶和華的產業子民，第 12-15 節進一步應許賜福、增多、免除疾病。
  relation: 將「聖潔的民」、「揀選（選民論）」與「流奶與蜜之地的祝福」串聯，構成產業神學。
