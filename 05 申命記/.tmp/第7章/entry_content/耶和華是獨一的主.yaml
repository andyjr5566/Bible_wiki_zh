status: formal
definition: 申命記第7章6-9節強調耶和華揀選以色列為聖潔的民、為自己的子民，並宣告祂是信實的神，守約施慈愛，暗示祂是獨一無二的主宰，不可與別神並列。
development: 此真理在申命記6:4「示馬」達到高峰，成為以色列一神論的核心宣告。
