name: 神愛列祖揀選後裔
type: 神學
secondary_types: []
aliases:
- 神愛列祖揀選後裔
status: formal
definition: 指耶和華因愛列祖（亞伯拉罕、以撒、雅各）而揀選其後裔以色列，成為聖潔的民、神的產業（申 7:6‑8）。
development: 本章第 6‑8 節闡述揀選的動機非因以色列人數多，乃因神的愛與向列祖起誓。
accumulations:
- book: 申命記
  chapter: 7
  summary: 經文第 6‑8 節說明神揀選以色列的原因：愛列祖、守誓、以大能手領出埃及。
  relation: 奠定本章選民論與神愛的神學基礎。
