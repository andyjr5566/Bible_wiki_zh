name: 專靠耶和華
type: 神學
secondary_types: []
aliases:
- 專靠耶和華
status: formal
definition: 申命記 7:17-21 回應以色列心裡恐懼「這些國的民比我更多，我怎能趕出他們呢？」（v.17）。神命令「不要懼怕」（v.18），依據為：➊
  牢記出埃及大能（v.18-19）；➋ 神必打發黃蜂（v.20）；➌ 神在你們中間是「大而可畏的神」（v.21）。專靠耶和華即拒絕靠眼見評估敵我強弱，轉而靠神的應許與同在。此信心直接關聯聖戰勝利（v.22-24）與拒絕偶像網羅（v.16,
  25-26）。
development: 申命記 1:29-31, 20:1-4 同樣教導「不懼怕，因神與你同在」；屬「敬畏神」與「專靠神」神學核心，新約引申為靠主得勝（羅 8:31-37）。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第17-21節以「不要懼怕」「牢牢記念」「大而可畏的神」三重勸勉，建立專靠耶和華的信心邏輯。
  relation: 承接第1節「七國比你強大」的挑戰，為第22-24節漸漸趕出、君王交在手中提供屬靈前提。
