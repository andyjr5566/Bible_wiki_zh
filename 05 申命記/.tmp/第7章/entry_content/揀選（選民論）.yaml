name: 揀選（選民論）
type: 神學
secondary_types: []
aliases:
- 揀選恩典
- 選民論
status: formal
definition: 申命記 7:6-8 啟示神揀選以色列作「特作自己的子民」，單純出於神的愛與向列祖起誓，非因以色列人數眾多（其實最少）。揀選帶來聖潔身分、得地應許、守約責任，並延伸至千代的慈愛（7:9,
  12）。
accumulations:
- book: 申命記
  chapter: 7
  summary: 第 6-8 節闡述揀選的主權、動機（愛、誓約）與對象（最少的民）；第 9-12 節將揀選與守約、慈愛、誡命連結。
  relation: 為聖潔的民、守約施慈愛、流奶與蜜之地的祝福、免除埃及惡疾的神學根基。
related_entries:
- 聖潔的民
- 守約施慈愛（至千代）
- 神愛列祖揀選後裔
- 神揀選後裔
- 神產業子民
- 以色列的義（遵守誡命得福長久）
sources:
