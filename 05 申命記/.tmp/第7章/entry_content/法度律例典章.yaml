name: 法度律例典章
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文將「誡命、律例、典章」分別為 mitzvot（מִצְוֹת）、chuqqim（חֻקִּים）、mishpatim（מִשְׁפָּטִים）。「法度」對應
  mishpatim（判例、公義典章），「律例」對應 chuqqim（成文律例），「典章」對應 mitzvot（誡命）或 torot（教導）。申命記 7:11 吩咐以色列人謹守遵行這三者，作為守約蒙福的基礎。
development: ''
