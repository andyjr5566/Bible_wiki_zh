name: 神領以色列進迦南
type: 事件
secondary_types: []
aliases:
- 神領以色列進迦南
status: formal
definition: 申命記第7章記載耶和華神領以色列進入迦南地，趕出七國的民（赫人、革迦撒人、亞摩利人、迦南人、比利洗人、希未人、耶布斯人），並應許為他們爭戰、漸漸趕出敵人，使他們得地為業。
development: 此事件展示神的主權與信實，屬於聖戰毀滅原則的一部分。
accumulations:
- book: 申命記
