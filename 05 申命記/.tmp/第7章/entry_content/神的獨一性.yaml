name: 神的獨一性
type: 神學
secondary_types: []
aliases:
- 神的獨一性
status: formal
definition: 指耶和華是獨一真神，沒有別神可比，申命記 7:9‑10 宣告祂是信實的神，向愛祂守誡命者守約施慈愛，向恨祂者報應。
development: 本章在第 9‑10 節明確宣告神的獨一與公義，作為以色列遵守誡命的神學依據。
accumulations:
- book: 申命記
  chapter: 7
  summary: 經文第 9‑10 節宣告耶和華是信實的神，獨一無二，守約施慈愛至千代，報應恨祂者。
  relation: 確立本章神學核心——神的獨一性與公義審判。
