    type: "神學"
    evidence: "經文第5節「新娶妻之人不可從軍出征，也不可託他辦理什麼公事，可以在家清閒一年，使他所娶的妻快活」；ccbiblestudy CT 指出生養眾多比從軍更重要，新婚夫婦需形影不離建立關係；KingComments 指出此律例保護婚姻喜樂與神聖，一年是增進感情傳宗接代的最低時間；BibleHub 連結創1:28生養眾多、太19:5二人成為一體。"
