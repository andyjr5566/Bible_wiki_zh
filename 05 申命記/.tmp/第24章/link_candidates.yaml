    type: "神學"
    evidence: "經文第7節「若遇見人拐帶以色列中的一個弟兄，當奴才待他，或是賣了他，那拐帶人的就必治死」；ccbiblestudy CT 指出古代中東雖有奴隸買賣，但法律禁止誘拐自由公民；KingComments 指出這預表基督釋放被擄者(路4:18)；BibleHub 連結出21:16拐帶人治死。"
