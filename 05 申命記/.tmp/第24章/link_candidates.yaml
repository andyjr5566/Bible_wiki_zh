    evidence: "經文第4節「打發他去的前夫不可在婦人玷污之後再娶他為妻，因為這是耶和華所憎惡的」；ccbiblestudy CT 指出這禁止隨意離婚復合，維護婚姻神聖；KingComments 指出人不能恢復人與人的合一關係，更不能恢復人與神合一的關係；BibleHub 連結太19:8-9耶穌論離婚再娶。"
