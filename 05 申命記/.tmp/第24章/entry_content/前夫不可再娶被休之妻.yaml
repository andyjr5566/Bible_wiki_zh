name: 前夫不可再娶被休之妻
type: 神學
secondary_types: []
aliases:
- 前夫不可再娶
- 被休之妻不可再嫁前夫
status: formal
definition: 申命記 24:3‑4 規定若婦人被休、改嫁他人，後夫休妻或死亡，前夫「不可在婦人玷污之後再娶他為妻」，因這是耶和華所憎惡的，會使地被玷污。此條例保護婦女免受反覆離婚再婚的羞辱，並維護社會秩序。
development: ''
accumulations:
- book: 申命記
  chapter: 24
  summary: 禁止前夫再娶曾被休且再嫁的女子，強調離婚的不可逆性。
  relation: 彰顯神對婚姻盟約的嚴肅態度，防止輕率離婚與再婚的循環。
