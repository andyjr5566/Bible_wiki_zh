definition: 申命記 24:8 命令百姓「在大痲瘋的災病上，你們要謹慎，照祭司利未人一切所指教你們的留意遵行」。此條例強調對傳染性皮膚病的診斷與隔離必須依照祭司的指導，以保護社群聖潔與公共衛生。
development: ''
