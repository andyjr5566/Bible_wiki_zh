name: 不可向寄居孤兒屈枉正直
type: 神學
secondary_types: []
aliases:
- 不可屈枉寄居者與孤兒的公理
- 保護弱勢族群司法公正
status: formal
definition: 申命記 24:17 禁止向寄居者和孤兒屈枉正直，也不可拿寡婦的衣裳作當頭。這條例將司法公正延伸至社會最無依無靠的三類弱勢族群：寄居者（外僑）、孤兒、寡婦。神自己為他們伸冤（申
  10:18；詩 146:9），違犯此命即干犯神的公義屬性。
development: 此主題貫穿申命記（10:18；14:29；16:11-14；24:17-21；26:12-13；27:19）。先知書屢次責備以色列壓制寄居孤兒寡婦（賽
  1:17, 23；耶 7:6-7；結 22:7；撒 7:10；瑪 3:5）。新約雅各書 1:27 將「看顧在患難中的孤兒寡婦」視為清潔無玷虔誠的表現。
accumulations:
- book: 申命記
  chapter: 24
  summary: 第 17 節命令不可向寄居者與孤兒屈枉正直，不可拿寡婦衣裳作當頭，保障弱勢族群司法權益。
  relation: 本章社會公義法規的司法面向，與第 18、22 節「記念在埃及作奴僕」形成神學動機雙重支撐。
