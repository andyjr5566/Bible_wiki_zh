name: 記念在埃及作奴僕得救贖
type: 神學
secondary_types: []
aliases:
- 記念埃及為奴經歷
- 救贖歷史作倫理動機
status: formal
definition: 申命記 24:18, 22 兩次命令「要記念你在埃及作過奴僕，耶和華─你的神從那裡將你救贖，所以我吩咐你這樣行」。這「記念」非單純回憶，乃是將出埃及救贖經歷內化為倫理行動的動機：因曾親身經歷被壓迫、被救贖，所以當以同樣憐憫公義對待弱勢者（寄居者、孤兒、寡婦、窮人）。這是申命記倫理學的核心神學基礎——救贖歷史決定當下倫理。
development: 此動機貫穿申命記（5:15；15:15；16:12；24:18, 22）。出埃及記 22:21-24；23:9 同樣以「你們在埃及地作過寄居的」為由命令善待寄居者。利未記
  19:33-34 更將「愛寄居者如同自己」建立在「我是耶和華─你們的神」的救贖宣告上。新約以基督救贖為更高動機（弗 4:32；西 3:13）。
accumulations:
- book: 申命記
  chapter: 24
  summary: 第 18、22 節以「記念在埃及作奴僕、耶和華救贖」作為善待弱勢族群（寄居孤兒寡婦、留下拾穗）的神學依據。
  relation: 本章社會公義法規（17, 19-21 節）的神學根基，將歷史救贖轉化為當下倫理責任。
