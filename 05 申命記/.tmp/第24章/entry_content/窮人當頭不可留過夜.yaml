- 當頭不可留過夜
status: formal
definition: 申命記 24:12‑13 規定「他若是窮人，你不可留他的當頭過夜。日落的時候，總要把當頭還他，使他用那件衣服蓋著睡覺」。此法確保貧窮借貸人夜間有衣物保暖，顯示神對貧者基本生存需求的關切。
development: ''
accumulations:
- book: 申命記
  chapter: 24
  summary: 要求債主於日落前歸還窮人作當頭的衣物，保障其夜間保暖。
  relation: 彰顯神對社會弱勢的憐憫與公義，防止剝削性借貸。
