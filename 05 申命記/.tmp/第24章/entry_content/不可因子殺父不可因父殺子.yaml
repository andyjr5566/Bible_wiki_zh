name: 不可因子殺父不可因父殺子
type: 神學
secondary_types: []
aliases:
- 各人為自己的罪被處死
- 個人刑責原則
status: formal
definition: 申命記 24:16 確立「不可因子殺父，也不可因父殺子；凡被殺的都為本身的罪」的個人刑責原則。這與古近東常見的連坐法（如漢摩拉比法典第 116、210、230
  條）形成鮮明對比，強調每人須為自己的罪負責，不得株連家屬。此原則在列王記下 14:6（亞瑪謝王遵行此律）與耶利米書 31:29-30、以西結書 18 章得到重申。
development: 此條例是聖經法律獨特的倫理進步，限制國家權力濫用。猶太傳統（Sanhedrin 27b）引用此節作為證人資格與刑法原則依據。新約雖未直接引用，但「各人要擔當自己的擔子」（加拉太書
  6:5）呼應同一神學邏輯。
accumulations:
- book: 申命記
  chapter: 24
  summary: 第 16 節訂定個人刑責原則，禁止因子殺父或因父殺子，各人為本身的罪受罰。
  relation: 本章法律段落的核心司法原則，保障人權與司法公正，區別於周圍民族的連坐慣例。
