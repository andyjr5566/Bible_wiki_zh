definition: 申命記 24:9 命令「當記念出埃及後，在路上，耶和華─你神向米利暗所行的事」。民數記 12 記載米利暗因說摩西的惡話而長大痲瘋，被隔離七日。此紀念提醒百姓謹守舌頭，不可輕慢神所立的領袖。
