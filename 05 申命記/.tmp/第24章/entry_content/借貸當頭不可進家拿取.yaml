name: 借貸當頭不可進家拿取
type: 神學
secondary_types: []
aliases:
- 借貸當頭不可進家
- 當頭不可進家拿取
status: formal
definition: 申命記 24:10‑11 規定借貸時「不可進他家拿他的當頭」，債主須站在外面等候借貸人自行拿出當頭。此法保護借貸人居住隱私與尊嚴，防止強勢催債。
