definition: 申命記 24:5 規定「新娶妻之人不可從軍出征，也不可託他辦理什麼公事，可以在家清閒一年，使他所娶的妻快活」。此法保障新婚夫婦建立關係、生育後代，體現神對家庭穩定的重視。
