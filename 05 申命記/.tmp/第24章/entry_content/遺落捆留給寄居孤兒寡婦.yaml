name: 遺落捆留給寄居孤兒寡婦
type: 神學
secondary_types: []
aliases:
- 遺落捆拾穗律法
- 收割遺漏留給窮人
status: formal
definition: 申命記 24:19 規定收割莊稼時若忘下一捆，不可回去再取，要留給寄居者、孤兒、寡婦。這是「拾穗律法」的一部分（參利 19:9-10；23:22），保障無地產弱勢族群的生存權利。經文應許遵行者「耶和華─你神必在你手裡所辦的一切事上賜福與你」，將慈悲行動與神的賞賜掛鉤。
development: 路得記 2 章生動展現此律法實踐：路得作摩押寄居寡婦，在波阿斯田間拾穗得生存。猶太傳統（Pe'ah 4:10-5:7）詳細規定「遺落捆」的定義與拾穗者權利。新約雖無直接引用，但「樂意施捨的，為神所喜愛」（林後
  9:7）承接同一恩典邏輯。
accumulations:
- book: 申命記
  chapter: 24
  summary: 第 19 節命令收割遺落一捆不可回取，留給寄居孤兒寡婦，應許神賜福於一切手裡所辦的事。
  relation: 本章拾穗三條例（19-21 節）之首，與第 18、22 節「記念埃及救贖」形成命令-動機結構。
