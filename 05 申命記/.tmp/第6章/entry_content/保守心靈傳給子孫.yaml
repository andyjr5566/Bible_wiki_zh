name: 保守心靈傳給子孫
type: 神學
secondary_types: []
aliases:
- 保守心靈
- 代代相傳
- 信仰傳承
status: formal
definition: 申命記4:9吩咐「只要謹慎，殷勤保守心靈，免得忘記...要傳給你們的子孫和子孫的子孫」。申命記第6章將此命令系統化：話語要在心上（v.6）、殷勤教訓兒女（v.7）、生活場域全覆蓋（v.7）、身體與居所作記號（v.8-9）、面對子孫詢問時述說救恩歷史與誡命意義（v.20-25）。此神學強調「保守心靈」（防止遺忘、離棄）與「傳給子孫」（主動教導、儀式化傳承）雙軌並行，是約群體存續的關鍵。
development: 從摩西（申4:9; 6:7; 11:19; 32:7）至約書亞（書4:6-7, 21-24）、士師記（士2:10-11）負面教訓、詩篇（詩78:4-7）與新約（弗6:4；提後3:15），形成聖經完整的跨代門徒訓練神學。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章為「保守心靈傳給子孫」提供最完整實踐框架：內心存留（v.6）、口耳相傳（v.7）、儀式記號（v.8-9）、敘事教導（v.20-25），將申4:9的雙重命令具體化為家庭敬虔的全生活方式。
  relation: 第6章是申命記「代代相傳」神學的核心章節，直接回應申4:9的命令，並為後續章節（申11, 32）與整本聖經的家庭信仰教育奠基。
