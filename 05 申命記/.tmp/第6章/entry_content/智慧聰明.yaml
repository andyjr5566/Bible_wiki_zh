name: 智慧聰明
type: 神學
secondary_types: []
aliases:
- 智慧與聰明
status: formal
definition: 申命記第6章雖未直接出現「智慧聰明」一詞，但本章所啟示的敬畏耶和華（v.2, 13）、聽從獨一真神（v.4）、盡心盡性盡力愛神（v.5）、將誡命存記心上並殷勤教導兒女（v.6-7,
  20-25），正是以色列在列國面前顯出「智慧聰明」的具體內涵（參申4:6)。這智慧非屬世哲理，乃在於認識耶和華為獨一的主，並以全人順服祂的約法，使生命在應許之地得福長久（v.3,
  18, 24-25）。
development: 本章將「智慧聰明」建構為三個層面：認知層面——承認「耶和華是獨一的主」（v.4）為一切知識的開端；情志層面——「盡心盡性盡力愛神」（v.5）為智慧的動力；實踐層面——「謹守遵行」誡命並「代代相傳」（v.2,
  7, 20-25）為智慧的果效。這與箴言「敬畏耶和華是智慧的開端」同一神學軌跡。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章透過示馬宣告神的獨一、誡命盡心愛神、吩咐將話語繫在手上戴在額上寫在門框、並規定兒女問起時要述說出埃及拯救歷史，構成了以色列「智慧聰明」的完整神學輪廓：認識真神、全心順服、生命見證、傳承信仰。
  relation: 申命記第6章是「智慧聰明」在摩西約框架下的核心展現，將抽象的智慧具體化為對耶和華獨一性的認信、全人愛神的回應、以及家庭與社會層面的誡命傳承與生命實踐。
