name: 神為你爭戰
type: 神學
secondary_types: []
aliases:
- 耶和華為你爭戰
- 神驅逐敵人
status: formal
definition: 申命記神學核心主題：耶和華作為「戰士」（出15:3）親自為以色列爭戰，驅逐迦南敵民（申1:30；3:22；20:4）。本章v.19應許「照耶和華所說的，從你面前攆出你的一切仇敵」，將征服土地的主動權完全歸於神，以色列只需「遵行耶和華眼中看為正、看為善的」（v.18）並「專靠耶和華」。
development: 此主題從出埃及記的紅海爭戰（出14:14），經曠野旅程（申1:30），至約書亞記的迦南征服（書10:14, 42）貫串始終；先知書進一步將「神爭戰」轉向屬靈層面（賽42:13；撒迦利亞14:3），新約在基督十字架得勝中達到高峰（西2:15；啟19:11-16）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 經文應許神必從以色列面前趕出一切仇敵（v.19），作為遵守誡命得享應許之地的保障。
  relation: 本章將「神為你爭戰」與「專心愛神、謹守誡命」連結，表明屬靈爭戰的勝敗取決於立約忠信，而非軍事優勢。
