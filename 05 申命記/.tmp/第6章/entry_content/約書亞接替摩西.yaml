name: 約書亞接替摩西
type: 事件
secondary_types: []
aliases:
- 約書亞繼任
- 摩西委身約書亞
status: formal
definition: 神指定約書亞（原名何西阿，摩西改名為約書亞，意即「耶和華拯救」）接替摩西帶領以色列進迦南（民27:18-23；申3:28；31:1-8, 14-15,
  23）。本章雖未提名，但v.2「你和你子子孫孫」及v.7「殷勤教訓你的兒女」預設新一代將在新領袖帶領下進地；整卷申命記正是摩西為這交接所作的屬靈預備。
development: 交接過程體現「僕人領導權」的轉移：摩西按手、神充滿智慧的靈（申34:9），約書亞繼續摩西的「僕人」身分（書1:1-2）；這預表新約中基督作為「大牧者」將牧養職託付給門徒（約21:15-17；彼前5:2-4）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 誡命賜給「你和你子子孫孫」（v.2），並要求代際傳承（vv.6-7），隱含領導權將平穩移交給下一代領袖約書亞。
  relation: 本章的示馬（vv.4-9）成為新一代在約書亞帶領下立國的屬靈憲章，確保立約連續性不因領袖更替而中斷。
