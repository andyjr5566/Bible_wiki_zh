name: 示馬的早晚背誦
type: 事件
secondary_types: []
aliases:
- 示馬、早晚背誦示馬
status: formal
definition: 申命記 6:4-9 記載「示馬」（希伯來文 Shema，意為「聽」）——「以色列啊，你要聽！耶和華─我們神是獨一的主」。經文規定要「記在心上」（v.6）、「殷勤教訓兒女」（v.7）、「無論坐在家裡、行在路上、躺下、起來都要談論」（v.7），並以經文匣（繫手、戴額
  v.8）與門楣經文（寫門框、城門 v.9）為具體載體。猶太傳統據此確立早晚兩次背誦示馬的禮儀（早禱 Shacharit、晚禱 Maariv），作為承認神獨一主權、立約忠誠的每日宣告。此事件將神學真理（v.4-5）轉化為生活節奏與身體操練，使「盡心盡性盡力愛神」成為具體可行的敬虔生活。
development: 耶穌肯定示馬為「最大的誡命」（可 12:29-30），早期教會保留每日禱告傳統（徒 3:1、10:9），成為基督徒屬靈操練的源頭之一。
accumulations:
- book: 申命記
  chapter: 6
  summary: 第 4-9 節確立示馬內容、背誦時機（躺下、起來）、教導方式、身體載體（經文匣）與居家載體（門楣經文），構成早晚背誦的完整規範。
  relation: 本章為示馬早晚背誦提供聖經依據與神學內核，是猶太教與基督教每日敬拜傳統的源頭。
