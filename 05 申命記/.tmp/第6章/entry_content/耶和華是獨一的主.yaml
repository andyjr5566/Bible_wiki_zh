name: 耶和華是獨一的主
type: 神學
secondary_types: []
aliases:
- 耶和華獨一
- 以色列一神論告白
status: formal
definition: 申命記 6:4 核心宣告：「以色列啊，你要聽！耶和華─我們神是獨一的主。」希伯來文「Ehad」（獨一/一）強調耶和華的獨特性、排他性與內在合一性，否認多神論與雙神論，宣告耶和華是以色列唯一的立約神與創造主。這是「示馬」的首句，也是舊約一神論神學的基石。
development: 從出埃及與西奈立約的經驗中凝練出來的信仰告白，貫穿舊約先知書（如賽 45:5-6），成為猶太教嚴格一神論的根基，新約承接此宣告並啟示父、子、聖靈三位一體的奧義（林前
  8:4-6）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 第4節作為全章神學高峰，宣告耶和華獨一的主權，是後續「盡心盡性盡力愛神」（第5節）與拒絕別神（第14節）的神學依據。
  relation: 本章以此宣告確立本章所有倫理誡命（愛神、教導、紀念、不可忘記、不可隨從別神）的神學前提：因神是獨一的主，故當全心歸向祂。
