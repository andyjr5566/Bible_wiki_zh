name: 敬拜日月星宿被勾引
type: 神學
secondary_types: []
aliases:
- 拜天象
- 偶像崇拜的誘惑
status: formal
definition: 申命記4:19警告：「免得你舉目向天，看見日頭、月亮、星宿——天上萬象——被勾引，跪拜事奉。」此揭示偶像崇拜的心理機制：被受造物的榮美「勾引」（nidach），轉離造物主。申命記第6章雖未列舉日月星宿，但v.14「不可隨從別神，就是你們四圍國民的神」，v.15「耶和華你神是忌邪的神」，v.4-5「耶和華是獨一的主...盡心盡性盡力愛祂」，皆為對抗此「被勾引」風險的神學回應：以獨一神的啟示（v.4）、全人委身的愛（v.5）、專一的敬畏事奉（v.13）、代代相傳的教導（v.7,
  20-25）建立免疫系統。
development: 此警告在列王紀（王下17:16; 21:3, 5; 23:4-5）成為以色列背約的歷史實況；保羅在羅馬書1:18-25將其神學化為「敬拜受造物不敬拜造物主」的普遍人類罪狀；新約以基督為「萬有之主」（西1:16）徹底擊敗天象崇拜的權勢。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章以「示馬」（v.4-5）確立獨一神崇拜的認知基石，以「敬畏事奉、指名起誓」（v.13）建立專一敬拜的儀式邊界，以「教導子孫述說救恩」（v.20-25）構建歷史記憶的防火牆，系統性回應申4:19「被勾引敬拜日月星宿」的屬靈危機。
  relation: 第6章為「敬拜日月星宿被勾引」提供完整的神學對策：認知上（獨一神）、情志上（全心愛）、行為上（專一事奉）、傳承上（教導子孫），形成申命記反偶像神學的核心陣地。
