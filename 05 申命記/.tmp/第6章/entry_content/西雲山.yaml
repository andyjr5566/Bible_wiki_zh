name: 西雲山
type: 地點
secondary_types: []
aliases:
- 西連山
- 黑門山別名
- 希連山
status: formal
definition: 西雲（希伯來文 שִׂרְיֹן, Siryon）是西頓人對黑門山（Mount Hermon）的稱呼（申3:9；4:48；詩29:6），意為「胸甲」或「閃亮」，指山頂終年積雪閃光。本章v.1、10、18-19所應許的「地」北界包含黑門山/西雲山一帶（申3:8-9；4:48），是以色列即將得著的產業北部邊界。
development: 西雲山作為北界標記，見證神應許的具體性；詩篇133:3以「黑門山的甘露降在錫安山上」比喻弟兄和睦的福氣，將地理地標轉化為屬靈合一的象徵。
accumulations:
- book: 申命記
  chapter: 6
  summary: 經文應許賜給列祖起誓之地（vv.10, 18），其北界達西雲山（黑門山），屬於「流奶與蜜之地」的完整疆域。
  relation: 本章強調神「向你列祖亞伯拉罕、以撒、雅各起誓應許給你的地」（v.10），西雲山作為北界地標，確證了應許疆域的歷史真實性。
