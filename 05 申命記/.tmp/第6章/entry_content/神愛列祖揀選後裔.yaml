name: 神愛列祖揀選後裔
type: 神學
secondary_types: []
aliases:
- 愛列祖、揀選後裔
status: formal
definition: 申命記 6:10、23 顯示神「向你列祖亞伯拉罕、以撒、雅各起誓應許給你的地」（v.10）、「向我們列祖起誓應許之地」（v.23）。神的愛與揀選主動臨於列祖（申
  4:37、7:7-8），並延伸至後裔，賜下非勞力得的產業（v.11）。此愛非基於以色列的公義或人數（申 9:4-6），純屬神主權恩典與約信實。後裔當「謹守遵行」誡命（v.17-18），以回應神的愛揀選，並將此救恩歷史教導兒女（v.20-24），使約愛代代相傳。
development: 保羅在羅 9-11 章深入探討神揀選以色列的主權與憐憫，新約將「揀選」延伸至在基督裡的教會（弗 1:4-5、彼前 2:9），成為「蒙愛揀選」群體的身分基礎。
accumulations:
- book: 申命記
  chapter: 6
  summary: 第 10、23 節以「向列祖起誓應許」揭示神愛列祖揀選後裔的約法依據，作為賜地恩典的根源。
  relation: 本章將神對列祖的愛與起誓應許，作為以色列得地、遵守誡命、教導後代的神學動機。
