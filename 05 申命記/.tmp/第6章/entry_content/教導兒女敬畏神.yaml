name: 教導兒女敬畏神
type: 神學
secondary_types: []
aliases:
- 代代相傳敬畏神
status: formal
definition: 申命記 6 章以「敬畏耶和華」為教導兒女的核心目標（v.2「好叫你和你子子孫孫一生敬畏耶和華」），並規定教導的內容（誡命、律例、典章）、方式（殷勤、坐在家裡、行在路上、躺下、起來都要談論
  v.7）、載體（繫在手上、戴在額上、寫在門框城門上 v.8-9）與動機（神領你們出埃及、賜福應許之地 v.20-24）。此教導非單純知識傳遞，乃是立約群體將「耶和華是神、是獨一的主」（v.4）與「盡心盡性盡力愛神」（v.5）內化為生活文化，使後代在經歷神救恩歷史中建立屬靈身分。
development: 此教導模式成為猶太教示馬禱告與經文匣傳統的基礎（v.4-9），並影響新約家庭屬靈教育（弗 6:4、提後 3:15），強調父母為首要屬靈導師，教會輔助協同。
accumulations:
- book: 申命記
  chapter: 6
  summary: 第 2、7、20-24 節詳細規定教導兒女敬畏神的目標、內容、方法、時機、載體與歷史動機。
  relation: 本章將「敬畏神」定位為家庭教育最高目標，並以出埃及救恩為教導核心敘事。
