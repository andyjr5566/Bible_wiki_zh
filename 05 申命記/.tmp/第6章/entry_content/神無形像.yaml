name: 神無形像
type: 神學
secondary_types: []
aliases:
- 神無形體
- 不可見的神
status: formal
definition: 申命記4:15-16嚴正警告：「你們當謹慎保守心靈，因為耶和華在何烈山從火中對你們說話的日子，你們未見何等形像，免得你們敗壞自己，雕刻偶像。」神無形像（不可見、不可繪製）是禁止偶像崇拜的神學基礎。申命記第6章雖未直接論述神無形像，但v.13-15要求「敬畏耶和華...事奉祂...不可隨從別神...因為耶和華你神是忌邪的神」，v.4「耶和華是獨一的主」宣告，皆建立在神無形像、超越受造物、不可被偶像代表的真理上。神的「名」（v.13）與「話語」（v.6-7）取代形像，成為神同在的媒介。
development: 此神學從申4:15-19的反偶像論證，經由以賽亞書（賽40:18-26; 44:9-20）的偶像訴訟，至新約基督為「不能看見之神的形像」（西1:15）、「神榮耀所發的光輝」（來1:3），在道成肉身中解決「無形像」與「啟示」的張力。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章以「耶和華是獨一的主」（v.4）、「敬畏事奉獨一神」（v.13）、「不可隨從別神」（v.14）構建純粹一神論崇拜，隱含拒絕一切有形像代表神的嘗試，將申4:15-16「神無形像」的神學轉化為獨一敬拜的倫理要求。
  relation: 第6章為「神無形像」提供崇拜倫理的實踐面向：既無形像可拜，則專心愛神（v.5）、事奉神（v.13）、繫話語於身（v.8）即成為正確敬拜的替代方式。
