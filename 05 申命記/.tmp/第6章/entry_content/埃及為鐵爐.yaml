name: 埃及為鐵爐
type: 神學
secondary_types: []
aliases:
- 埃及鐵爐
- 煉爐
status: formal
definition: 「埃及為鐵爐」形容以色列在埃及受苦如同在鑄鐵爐中被熬煉（申4:20；王上8:51；耶11:4）。本章雖未直接用「鐵爐」一詞，卻以「埃及地、為奴之家」（v.12）、「作過法老的奴僕」（v.21）、「重大可怕的神蹟奇事」（v.22）描繪埃及為壓迫與拯救的背景，強調神從極度苦難中救贖祂的子民，使他們成為獨屬祂的產業。
development: 此意象在申命記神學中奠定「救贖─立約」雙重基礎：埃及的苦難非無意義，乃是神預備祂百姓認識祂大能與恩典的熬煉過程；後先知書進一步將「鐵爐」擴展為神管教與潔淨的隱喻（賽48:10；耶9:7）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 摩西警告以色列人進入迦南享福時，不可忘記將他們從埃及為奴之家領出來的耶和華（v.12），並吩咐後代述說在埃及受苦與神大能拯救的歷史（vv.21-22）。
  relation: 本章以埃及拯救經驗作為敬畏神、守誡命的動機根基；「鐵爐」意象雖隱而不宣，卻構成「不可忘記」勸勉的深層神學邏輯。
