- 革尼撒勒湖
status: formal
definition: 基尼烈（希伯來文 כִּנֶּרֶת, Kinneret）指加利利海東岸的城邑、平原或湖泊本身（民34:11；申3:17；書11:2；12:3；13:27；19:35）。本章v.10-11描述應許之地有「非你所建造的城邑」、「非你所鑿成的水井」、「非你所栽種的葡萄園、橄欖園」，基尼烈地區正是這豐盛產業的具體地理呈現之一。
development: 從舊約的邊界標記（民34:11），到新約耶穌在加利利海邊傳道、呼召門徒（太4:18；可1:16），基尼烈見證神應許從物質產業延伸至屬靈收割的實現。
accumulations:
- book: 申命記
  chapter: 6
  summary: 經文列舉應許之地現成的城市、水井、葡萄園、橄欖園（vv.10-11），基尼烈作為加利利地區的核心產區，屬於這「手未勞而得」的恩典範圍。
  relation: 本章強調「耶和華領你進入……非你所建造的城邑」（v.10），基尼烈的具體地理實況印證了這應許的歷史真實性。
