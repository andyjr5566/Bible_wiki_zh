name: 專靠耶和華
type: 神學
secondary_types: []
aliases:
- 單單倚靠耶和華
- 專心仰望神
status: formal
definition: 申命記6:13-16以四個命令界定「專靠耶和華」的具體內涵：(1) 敬畏耶和華（v.13a），(2) 事奉祂（v.13b），(3) 指著祂的名起誓（v.13c），(4)
  不可隨從別神（v.14），(5) 不可試探耶和華（v.16）。這建立在示馬「耶和華是獨一的主」（v.4）與「盡心盡性盡力愛神」（v.5）之上，排除一切偶像倚靠與自主試探。
development: 此主題貫穿救恩歷史：亞伯拉罕「信耶和華」（創15:6），曠野世代因不信而倒斃（民14:11；來3:19），約書亞世代「專靠耶和華」得地（書23:8-11），先知呼籲「倚靠耶和華」（賽26:4；耶17:5-8），新約在基督裡達到高峰：「我們倚靠永生神」（提前4:10）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 經文連續發出敬畏、事奉、指名起誓、不隨從別神、不試探神等命令（vv.13-16），構成「專靠耶和華」的完整行為指標。
  relation: 本章將「專靠耶和華」建立在神的獨一性（v.4）與救贖恩典（vv.21-23）之上，使專靠非單純道德勉勵，而是立約回應的必然邏輯。
