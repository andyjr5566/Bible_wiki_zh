name: 不可試探耶和華
type: 神學
secondary_types: []
aliases:
- 不可試探主
- 瑪撒事件教訓
status: formal
definition: 申命記 6:16 命令「你們不可試探耶和華─你們的神，像你們在瑪撒那樣試探他」。瑪撒事件（出 17:1-7）中，以色列人因缺水向摩西爭鬥、試探耶和華說「耶和華在我們中間不在麼？」，以此質疑神的同在與供應。試探神意指在困境中以要求神蹟或挑戰神權柄的方式，強迫神按己意行事，顯露不信與悖逆。
development: 耶穌在曠野受試探時引用此節拒絕魔鬼要求祂從殿頂跳下（太 4:7；路 4:12），確立「不可試探主」為信靠神主權的核心原則。
accumulations:
- book: 申命記
  chapter: 6
  summary: 第16節明令不可試探耶和華，並引用瑪撒為反面教材，警告不可重蹈覆轍以不信試探神的信實。
  relation: 本章將此禁令置於「不可隨從別神」與「留意遵守誡命」之間，作為對神獨一主權與信實的回應態度：單一敬拜、不試探、全遵守。
