name: 今日要知道耶和華是神
type: 神學
secondary_types: []
aliases:
- 今日知道耶和華是神
status: formal
definition: 申命記 6 章以「今日」（希伯來文 hayom）為關鍵時間標記（v.1、2、6、17、24、25），強調認識「耶和華是神」非屬過去歷史回顧，乃是當下活潑的立約決斷。第
  4 節示馬宣告「耶和華─我們神是獨一的主」，第 13 節要求「敬畏耶和華─你的神，事奉他，指著他的名起誓」，第 24-25 節應許「今日」遵行誡命即蒙保全生命。此「今日」神學將西乃之約（何烈山）更新為摩押平原的當下約，要求每一代在「今日」親自回應神的獨一主權、救恩恩典與誡命要求，將認識神內化為敬畏、愛、順服的整全生活。
development: 「今日」概念在申命記反覆出現（申 4:39-40、11:26-28、27:9-10、29:14-15），新約引用「今日若聽他話，就不可硬著心」（來
  3:7-15、詩 95:7-8），將「今日」延伸為福音時代的悔改得救時機。
accumulations:
- book: 申命記
  chapter: 6
  summary: 全章多次使用「今日」（v.1,2,6,17,24,25）框架，將認識耶和華是神、遵守誡命、得福蒙保全定位為當代人的責任與特權。
  relation: 本章以「今日」為神學鍵詞，串聯獨一神認信、示馬背誦、教導兒女、進地得福等所有主題。
