name: 不可偏離左右
type: 神學
secondary_types: []
aliases:
- 不偏左右
- 嚴守誡命
status: formal
definition: 要求百姓嚴謹遵守神的誡命，不向右也不向左偏離（申5:32；參書1:7；箴4:27）。申命記第6章雖未用「左右」措辭，但以「留意遵守」（v.17）、「行耶和華眼中看為正、看為善的」（v.18）、「謹守遵行一切誡命」（v.25）表達同一神學意涵：順服須全心、精確、無保留，不可隨意增減（申4:2；12:32）或妥協變通。
development: 此原則從摩西（申5:32）延伸至約書亞（書1:7）、列王（王下22:2）與智慧傳統（箴4:27），成為衡量屬靈忠誠的標準，新約在基督裡以「窄路」（太7:13-14）繼承其屬靈張力。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章以「留意遵守誡命、法度、律例」（v.17）、「行正行善」（v.18）、「謹守遵行一切誡命」（v.25）具體化「不偏左右」的要求，連結敬畏神（v.13）、不可隨從別神（v.14）與教導子孫（v.7）的全方位順服。
  relation: 將「不偏左右」的抽象原則，落實於第6章對獨一神的專一敬拜、家庭信仰傳承與社會公義生活的具體規範中。
