name: 神與人相近
type: 神學
secondary_types: []
aliases:
- 神的親近
- 耶和華與我們相近
status: formal
definition: 申命記4:7宣告「有何大國，神與他們相近，像耶和華我們的神在我們求告祂的時候與我們相近呢？」申命記第6章雖未直接引用此句，但透過「話語在你心裡」（v.6）、「坐在家裡、行在路上...都要談論」（v.7）、「繫在手上、戴在額上、寫在門框上」（v.8-9），展現神將祂的話語賜給百姓，使神的旨意貼近日常生活，成為神與人相近的具體管道。神不僅在聖所，更在家庭、路途、晨昏之中與百姓同在。
development: 此主題從申4:7的神學宣告，經由申6:6-9的生活實踐，延伸至詩篇（詩145:18）、耶利米書（耶23:23）與新約（徒17:27；弗2:13、17）基督使神與人和好、賜聖靈內住的終極實現。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章將「神與人相近」具體化為話語內住（v.6）、家庭教導（v.7）、身體記號（v.8）、居所標識（v.9），使神的同在滲透生活每一時空，回應申4:7的神學宣告。
  relation: 第6章提供「神與人相近」的倫理與禮儀實踐框架，使抽象的神學真理成為可操作的信仰生活方式。
