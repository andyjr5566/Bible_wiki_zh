name: 毘斯迦山根
type: 地點
secondary_types: []
aliases:
- 毘斯迦山腳
- 尼波山山脈
status: formal
definition: 毘斯迦（希伯來文 הַפִּסְגָּה, Ha-Pisgah）意為「山頂、山脊」，是摩押地亞巴琳山脈的一座山峰（民21:20；23:14；申3:17；34:1），摩西曾登上此山眺望應許之地（申3:27；34:1-4）。「山根」指其山腳地帶。本章v.1提到「所要過去得為業的地」，即摩西在毘斯迦山根所眺望、卻不得親自進入的迦南地。
development: 毘斯迦成為「看見卻不能得」的神學符號：律法（摩西）能指向應許，卻不能領人進入；惟有恩典（約書亞/耶穌）能成就進入（來4:8-9）。新約變像山事件（太17:1-8）中摩西終於站在應許之地上，象徵律法在基督裡得滿足。
accumulations:
- book: 申命記
  chapter: 6
  summary: 經文開啟「在所要過去得為業的地上遵行」（v.1），此地正是摩西在毘斯迦山根極目遠望的應許之地。
  relation: 本章誡命的授受地點（約但河東，毘斯迦山根附近）與誡命的實踐地點（迦南）形成地理與神學的張力：誡命在「這邊」領受，為著「那邊」遵行。
