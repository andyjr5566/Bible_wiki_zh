name: 十誡是約
type: 神學
secondary_types: []
aliases:
- 十誡為約
- 約的十言
status: formal
definition: 申命記4:13宣告「祂將祂的約...就是十誡，宣傳給你們聽，並寫在兩塊石版上」。申命記第6章雖未明稱「十誡」，但v.1「誡命、律例、典章」、v.4-5「示馬」（首誡核心）、v.13-14「敬畏事奉、不可隨從別神」（一、二誡核心）、v.16「不可試探耶和華」（關係忠誠）皆為十誡內容的展開與應用。本章將「十誡是約」的神學具體化：約不僅是石版文字，更是寫在心上（v.6）、教導子孫（v.7）、繫於手額（v.8）、行正行善（v.18）、得稱為義（v.25）的生命關係。
development: 從何烈山石版（出34:28；申4:13; 10:4）到摩押平原的心版（申6:6；參耶31:33；林後3:3），「十誡是約」經歷從外在律法到內在恩約的救恩史進程，新約在基督裡成全約的要求（羅8:3-4；來8:10）。
accumulations:
- book: 申命記
  chapter: 6
  summary: 本章以「示馬」（v.4-5）為十誡核心總綱，展開專一敬拜（v.13-14）、拒絕試探（v.16）、教導傳承（v.7, 20-25）等約的生活應用，將「十誡是約」從石版條文轉化為心志與生活的約關關係。
  relation: 第6章為「十誡是約」提供最豐富的釋經與應用範本，連結申4:13的宣告與申5章十誡重述，確立約法在家庭與社會的具體運作方式。
