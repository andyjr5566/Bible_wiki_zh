name: 何烈山火焰昏黑密雲
type: 事件
secondary_types: []
aliases:
- 何烈山火焰昏黑密雲
status: formal
definition: 指耶和華在何烈山（西乃山）以火焰、昏黑、密雲向以色列人顯現的神現場景（參申 4:11），象徵神的聖潔、威嚴與不可接近的榮耀。
development: 這場神現成為以色列認識耶和華為獨一真神的根本經驗，並在申命記中被反覆提醒（如申 4:11-12），作為遵守誡命的動力。
accumulations:
- book: 申命記
  chapter: 6
  summary: 雖本章未直接描述何烈山神現，但摩西提醒百姓記住耶和華從火中說話的經歷，作為獨一神宣告的背景。
  relation: 何烈山神現提供本章「耶和華是獨一的主」宣告的歷史神學根基。
related_entries:
- 神從火中說話
- 十誡是約
- 神無形像
sources:
