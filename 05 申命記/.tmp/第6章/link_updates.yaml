"book": "05 申命記"
"chapter": !!int "6"
"updates":
- "title": "流奶與蜜之地"
  "path": "link_folder/神學/流奶與蜜之地.md"
  "summary": "指迦南地，形容其物產豐富、土地肥沃。CCB CT 指出「流奶與蜜之地」指迦南地，形容其物產豐富；CCB GT 指出象徵土地肥沃，產品豐富；KingComments 指出形容迦南地的富庶，與以色列人現居的曠野成強烈對比。"
  "relation": "本章第3節應許以色列人進入流奶與蜜之地得享福，人數極其增多，正如耶和華向列祖所應許的。"
- "title": "敬畏神"
  "path": "link_folder/神學/敬畏神.md"
  "summary": "敬畏神是遵守律法的動力與基礎。CCB CT 指出敬畏指害怕惹神發怒；CCB GT 指出敬畏神、謹守律例誡命，個人可享長壽，國家可享福祉；KingComments 指出摩西不停地回顧出埃及事件與西奈山頒佈律法事件，因為此二事件不僅孕育了以色列，同時還明確宣告了神是以色列的救贖者與治理者的事實。"
  "relation": "本章第2、13節勸勉以色列人敬畏耶和華神，謹守祂的律例誡命，使日子得以長久；第13節並要求事奉祂、指著祂的名起誓。"
- "title": "安息日"
  "path": "link_folder/神學/安息日.md"
  "summary": "安息日是記念神創造與救贖的聖日。CCB CT 在申命記第六章註解中未直接詳細釋義安息日，但第13節要求敬畏耶和華、事奉祂、指著祂的名起誓，隱含安息日的遵守；CCB GT 未直接釋義；KingComments 指出主耶穌受撒但引誘時曾引述申命記6:13、16、8:3，擊敗魔鬼所用的經文全部來自《申命記》。"
  "relation": "本章第13節要求敬畏耶和華、事奉祂、指著祂的名起誓，隱含安息日作為約的記號與敬畏神的表現。"
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "即死海，位於迦南地東南界。CCB CT 指出鹽海即死海、迦南東南界；CCB GT 指出即死海、迦南東南界；KingComments 指出即死海、迦南東南界。"
  "relation": "本章未直接提及鹽海，但屬於迦南地邊界地標，與「流奶與蜜之地」的地理範圍相關。"
- "title": "律例典章"
  "path": "link_folder/神學/律例典章.md"
  "summary": "神所吩咐教訓的誡命、律例、典章。CCB CT 指出誡命指十條誡；律例指律法，是神向人的要求；典章指審判，是神對人是否遵行律法的判定。CCB GT 指出指神在宣告十誡後，使百姓回到帳棚(5:30)，只留下摩西在西奈山，吩咐他所要教訓百姓的所有律法之詳細規定的事實。KingComments 指出摩西不停地回顧出埃及事件與西奈山頒佈律法事件，因為此二事件不僅孕育了以色列，同時還明確宣告了神是以色列的救贖者與治理者的事實。"
  "relation": "本章第1節指出這是耶和華神所吩咐教訓的誡命、律例、典章，使你們在所要過去得為業的地上遵行；第17節要求謹守耶和華神的誡命、律例、典章。"
