- name: 經文匣
  suggested_type: 事件
  evidence: '經文：申6:8-9。「也要系在手上為記號，戴在額上為經文；又要寫在你房屋的門框上，並你的城門上」。

    ccbiblestudy CT：後來猶太人以佩帶經文匣子履行。主耶穌責備法利賽人徒具形式無實質(太23:5)。主旨是把神話深銘心際、實行教訓。

    ccbiblestudy GT：猶太人直解字面，把經文寫在皮卷放在皮匣，綁臂上、繫額上(太23:5)。主旨是把神話深銘心際、實行教訓。

    KingComments：猶太人按字面實行，用羊皮紙抄四段經文制成衣帶戴身上。法利賽人以此作敬虔標誌，受耶穌責備(太23:5)。主旨是把神話深銘心際。

    BibleHub Study：猶太人按字面實行，佩帶經文匣。主耶穌責備法利賽人徒具形式。'
