  - phrase: 第一且最大誡命
  - phrase: 愛耶和華你的神
  target_path: link_folder/神學/盡心盡性盡力愛神.md
- name: 教導兒女
  suggested_type: 神學
  evidence: '經文：申6:7。「也要殷勤教訓你的兒女。無論你坐在家裡，行在路上，躺下，起來，都要談論」。

    ccbiblestudy CT：父母負有教導兒女大責，是子女靈性上祭司和生活知識教師。殷勤教訓希伯來詞意「使之銳利」或「紮」。當以神生命力話語打動教訓兒女心靈(來4:12)。

    ccbiblestudy GT：父母是子女靈性上祭司和生活知識教師。傳授謀生技能外，還應教導正確道德原則、靈性生活規範。

    KingComments：父母要將信仰核心印刻在子女心上。教導不只是理論，要在生活中實踐。家庭生活受神話語掌管。

    BibleHub Study：父母是子女靈性上祭司和生活知識教師。教導兒女是神多次重複命令。'
