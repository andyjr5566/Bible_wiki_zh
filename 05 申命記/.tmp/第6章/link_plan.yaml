    KingComments：有時忙於享受祝福而忘記賜福者。警告不可在佔有祝福中忘記賜福者。跌落最高處最可怕。

    BibleHub Study：摩西不停回顧出埃及與西奈山事件。此二事件宣告神是救贖者與治理者。'
