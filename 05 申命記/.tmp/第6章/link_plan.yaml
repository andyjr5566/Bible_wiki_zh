  - phrase: Shema
  - phrase: 以色列啊你要聽
  target_path: link_folder/神學/示馬.md
- name: 盡心盡性盡力愛神
  suggested_type: 神學
  evidence: '經文：申6:5。「你要盡心、盡性、盡力愛耶和華你的神」。

    ccbiblestudy CT：主耶穌稱此為第一且最大誡命。盡心、盡性、盡力指靈、魂、體全人投入。愛神不只是情感，更是生活實際——遵守神話語。

    ccbiblestudy GT：心、性、力表現全人格。愛神且以知、情、意全人格只愛神。基督說不能事奉兩個主(太6:24)同理。

    KingComments：愛神以全心、全靈、全意、全力(可12:30)。需要「基督的心思」(林前2:16)。愛神給人最大滿足，被造目的即事奉榮耀神。

    BibleHub Study：盡心、盡性、盡力即整個人完全投入。心、性、力用重複手法表現全人格。'
  surfaces:
