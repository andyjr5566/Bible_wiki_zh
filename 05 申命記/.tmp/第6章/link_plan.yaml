  evidence: '經文：申6:12。「那時你要謹慎，免得你忘記將你從埃及地、為奴之家領出來的耶和華」。

    ccbiblestudy CT：摩西不停回顧出埃及事件與西奈山頒佈律法。此二事件孕育以色列，宣告神是救贖者與治理者。

