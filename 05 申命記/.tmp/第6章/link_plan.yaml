- name: 敬畏耶和華
  suggested_type: 神學
  evidence: '經文：申6:2, 13。「好叫你和你子子孫孫一生敬畏耶和華你的神……你要敬畏耶和華你的神，事奉他，指著他的名起誓」。

    ccbiblestudy CT：敬畏指害怕惹神發怒。敬畏神、謹守律例誡命，個人享長壽、國家享福祉。

    ccbiblestudy GT：敬畏神、謹守律例誡命，個人享長壽、國家享福祉。敬畏神是智慧開端(箴1:7)。

    KingComments：敬畏神是智慧開端。敬畏神與愛神相伴。敬畏神是對神的尊重。

