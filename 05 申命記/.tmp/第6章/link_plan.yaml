- name: 示馬
  suggested_type: 神學
  evidence: '經文：申6:4-9。「以色列啊，你要聽！耶和華我們神是獨一的主。你要盡心、盡性、盡力愛耶和華你的神」。

    ccbiblestudy CT：這裏開始有名的「示馬」（Shema），成為猶太教基本認信。拉比傳統：示馬原本只有第4節，後擴充至5-9節、11:13-21、民15:37-41。猶太人早晚背誦。

    ccbiblestudy GT：示馬成為猶太教基本認信。猶太人早晚背誦。第4節強調耶和華的獨一性。「獨一」指絕對惟一性，排斥多神論、泛神論、單一神論。

    KingComments：第4節為舊約精義。耶和華是獨一真神，基督信仰最基本信仰。希伯來文shema意「聽哪」。猶太人視為信經，朝夕頌讀。本節排斥多神論、泛神論、單一神論。

    BibleHub Study：Shema為猶太教基本認信。耶和華是獨一真神。猶太人早晚背誦。第4節強調神的惟一性。'
  surfaces:
