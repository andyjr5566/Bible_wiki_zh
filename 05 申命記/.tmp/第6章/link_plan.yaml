- name: 安息日
  suggested_type: 神學
  evidence: '經文：申5:12-15(申6章背景)。「當照耶和華你神所吩咐的守安息日為聖日……你也要紀念你在埃及地作過奴僕；耶和華你神用大能的手和伸出來的膀臂將你從那裡領出來」。

    ccbiblestudy CT：安息日是神創造完成紀念日，也是紀念從埃及得釋放。僕婢牲畜客旅都不可做工，使僕婢也能安息。

    ccbiblestudy GT：出埃及記以創造為安息日根據，申命記以出埃及救贖為根據。安息日從舊創造演變為新創造，預表新約聖徒守主日。

    KingComments：安息日是神創造完成紀念日，也是紀念從埃及得釋放。今日信徒守主日(禮拜日)，紀念主復活得救稱義。

    BibleHub Study：安息日是神創造完成紀念日，也是紀念從埃及得釋放。'
