status: formal
definition: 以色列人進入並佔有神所應許的迦南地，申命記8:1「進去得耶和華向你們列祖起誓應許的那地」。
development: 進去得地是曠野漂流後的歷史性事件，標誌約定的應驗。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1節提到進去得地作為順服誡命的目標。
  relation: 進去得地與存活、人數增多同為神應許的三重祝福。
related_entries:
- 存活、人數增多、進去得地
