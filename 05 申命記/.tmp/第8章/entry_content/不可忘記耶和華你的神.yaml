name: 不可忘記耶和華你的神
type: 神學
secondary_types: []
aliases:
- 謹守不忘
status: formal
definition: 申命記8章11、14、18-19節多次警告不可忘記耶和華神。忘記的表現包括：不守誡命典章律例（v11）、心高氣傲（v14）、自以為得貨財靠己力（v17）、隨從別神事奉敬拜（v19）。神帶領出埃及、曠野供應（嗎哪、水、衣不穿破）、賜得財力量，皆為叫百姓記念祂，免致滅亡。
development: 本章以「記念」對抗「忘記」。從曠野試煉（v2-5, 15-16）到美地豐盛（v7-10），神的作為都是為了讓百姓認識祂、倚靠祂。忘記神不僅是記憶缺失，更是關係破裂與歸屬轉移（事奉別神），後果是必定滅亡（v19-20）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第11節提出核心警告「免得忘記」，第14節描述忘記的過程（飽足→建房→增產→心高氣傲→忘記救贖與曠野恩典），第18節點明忘記的根源（歸功己力），第19節宣告後果（事奉別神→滅亡）。
  relation: 貫穿全章的神學張力核心。與「稱頌神」（v10）、「謹守遵行」（v1,6）、「紀念神蹟」（v2-5,15-16）、「得貨財力量屬神」（v18）構成完整的「防忘記」神學體系。
