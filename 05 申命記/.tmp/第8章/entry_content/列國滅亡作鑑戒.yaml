name: 列國滅亡作鑑戒
type: 神學
secondary_types: []
aliases:
- 列國滅亡作鑑戒
status: formal
definition: 申命記 8:19-20 警告若忘記神、事奉別神，「你們必定滅亡；耶和華在你們面前怎樣使列國的民滅亡，你們也必照樣滅亡」。列國滅亡作鑑戒，提醒以色列順服神話語，免受同樣審判。
development: ''
accumulations:
- book: 申命記
  chapter: 8
  summary: 經文以列國滅亡為鑑戒，警告不聽從神話語的後果。
  relation: 列國滅亡作鑑戒與「若忘記真神而去事奉別神，你必要滅亡」、「不聽從耶和華話語的後果」同義。
