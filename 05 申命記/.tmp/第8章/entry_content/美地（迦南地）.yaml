name: 美地（迦南地）
type: 地點
secondary_types: []
aliases:
- 美地
status: formal
definition: 申命記第8章7-9節描述耶和華神領以色列人進入的「美地」。該地有河、泉、源從山谷流出；出產小麥、大麥、葡萄樹、無花果樹、石榴樹、橄欖樹和蜜；食物不缺，一無所缺；石頭是鐵，山內可挖銅。此地即迦南地，是神向列祖起誓應許賜給以色列人的產業。
development: 本章將「美地」作為曠野試煉的終點與神信實應許的實現。從曠野「缺乏」對比進入美地「一無所缺」，強調神的供應與恩典。並以此為背景，警告百姓飽足時不可忘記神（v10-14）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 詳細描述美地的地理特徵（水源、七樣產物、礦產）與生活狀態（不缺食物、一無所缺），作為神應許應驗與警告飽足忘神的舞台。
  relation: 是神向列祖起誓應許之地的具體呈現，也是以色列人從曠野試煉進入安息產業的目標，更是考驗百姓是否因飽足而心高氣傲忘記神的關鍵場景。
related_entries:
- 七樣產物（小麥、大麥、葡萄樹、無花果樹、石榴樹、橄欖樹、蜜）
- 鐵礦、銅礦
- 一無所缺
- 河、泉、源
- 應許之地
- 列祖起誓應許之地
- 吃得飽足，就要稱頌耶和華你的神
- 謹慎免得忘記
- 心高氣傲（驕傲）
