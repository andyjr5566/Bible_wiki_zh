name: 為要堅定約
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 神賜福、供應、引導一切皆為堅定祂與列祖所立的約，申命記8:18「為要堅定他向你列祖起誓所立的約」。
development: 約的堅定不在於人表現，而在於神信實的旨意與行動。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第18節說明神賜福的目的是為要堅定約。
  relation: 堅定約貫穿全章，從應許之地到曠野供應皆為此約服務。
