name: 建造房屋、牛羊加多、金銀增添
type: 事件
secondary_types: []
aliases:
- 房屋牲畜財富增加
- 物質繁榮
status: formal
definition: 申命記8:12-13「恐怕你吃得飽足，建造美好的房屋居住，你的牛羊加多，你的金銀增添，並你所有的全都加增」。描繪進入迦南後具體的物質繁榮場景：從帳棚到石屋（建造房屋）、遊牧畜群擴張（牛羊加多）、貴金屬積累（金銀增添）。此為「心高氣傲、忘記神」的誘因鏈條關鍵環節。
development: 考古發現鐵器時代以色列四間式房屋、大型糧倉、銀餅寶藏，印證經文描述；所羅門時期「銀子在耶路撒冷如石頭」（王上10:27）為此預言的歷史性應驗；先知阿摩司責備「盤石上建造華屋」（摩5:11）顯示繁榮常伴隨不義。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第12-13節以三組平行結構（建造/居住、牛羊/加多、金銀/增添）刻畫繁榮全貌，作為第14節「心高氣傲、忘記耶和華」的直接誘因，並呼應第10節「吃得飽足」與第17節「我力量得來的」自誇。
  relation: 本事件為「謹慎免得忘記」、「心高氣傲（驕傲）」、「不可忘記耶和華你的神」、「得貨財的力量」提供具體社會經濟背景。
