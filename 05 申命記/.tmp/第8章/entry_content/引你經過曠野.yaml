status: formal
definition: 神在曠野四十年引導以色列人，申命記8:2、15提到「引你經過曠野」。
development: 曠野引導包含供應嗎哪、水從磐石、保守衣服腳不壞，彰顯神的看顧。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第2、15節記述神引導以色列人經過大而可怕的曠野。
  relation: 引導曠野是苦煉試驗的背景，也是神供應與保守的見證。
