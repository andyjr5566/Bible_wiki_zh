status: formal
definition: 申命記 8:1,7-9 描述神向列祖起誓應許之地，有河、泉、源，出產七樣農產，石頭是鐵、山內可挖銅，一無所缺。
development: 應許之地是神信實應許的實現，象徵屬靈產業與永恆福分的預表。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1、7-9節描述應許之地的豐富與資源
  relation: 作為神應許實現的地理舞台，激勵百姓遵行誡命
related_entries:
- 美地（迦南地）
- 列祖起誓應許之地
- 河、泉、源
- 一無所缺
- 鐵礦、銅礦
- 存活、人數增多、進去得地
