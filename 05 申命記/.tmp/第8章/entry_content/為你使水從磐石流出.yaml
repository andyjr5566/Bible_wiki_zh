status: formal
definition: 神在曠野使水從堅硬磐石流出供應百姓飲用，申命記8:15「他曾為你使水從堅硬的磐石中流出來」。
development: 這神蹟顯示神在極端缺乏中仍能供應，預表基督作屬靈磐石。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第15節記述神使水從磐石流出，作為曠野供應的一部分。
  relation: 磐石出水與嗎哪同為神在曠野奇妙供應的證據。
