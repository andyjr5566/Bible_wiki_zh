name: 心裡思想
type: 神學
secondary_types: []
aliases:
- 心裡思量
- 心中思想
status: formal
definition: 指人內心深處的反省、推論與屬靈判斷。本章 5 節：「你當心裡思想，耶和華你神管教你，好像人管教兒子一樣」；17 節警戒：「恐怕你心裡說：這貨財是我力量、我能力得來的。」前者為正向屬靈省察，後者為驕傲的自我歸功。
development: 申命記重視「心」的回應（6:5-6；10:12-16；30:6）。箴言 23:7「他心裡怎樣思量，他為人就是怎樣」。新約強調心意更新而變化（羅
  12:2），並以基督心為準則（腓 2:5）。屬靈爭戰涉及論斷己心（來 4:12）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第 5 節命令「心裡思想」神管教的兒子意義；第 17 節描繪悖逆者「心裡說」歸功於己。兩者對比：謙卑省察 vs. 驕傲自誇。
  relation: 心裡思想決定對神管教的態度（順服/苦毒）與對財富的歸屬感（感恩/自誇），直接關係能否「謹守誡命」（8:6, 11）與「記念耶和華」（8:18）。
