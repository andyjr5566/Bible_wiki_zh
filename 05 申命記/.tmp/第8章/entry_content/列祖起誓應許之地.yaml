name: 列祖起誓應許之地
type: 神學
secondary_types: []
aliases:
- 起誓應許之地
status: formal
definition: 申命記8章1、18節兩次提及「耶和華向你們列祖起誓應許的那地」及「為要堅定他向你們列祖起誓所立的約」。這地不僅是地理領土，更是神信實、主權與恩典的約性見證。列祖指亞伯拉罕、以撒、雅各。神賜「得貨財的力量」（v18）正是為了堅定這起誓之約。
development: 本章雙重引用「列祖起誓」：開頭（v1）作為得地的法理依據；結尾（v18）作為神持續供應（得貨財力量）的神學動機。將「地」從單純產業提升為「約」的載體，「約」又由神單方面「起誓」擔保，強調神信實超越人軟弱。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1節確立得地根基於列祖之約；第18節揭示神賜福（得貨財力量）的終極目的在於「堅定約」。將應許之地與約的堅定緊密扣合。
  relation: 核心關聯「應許之地」、「列祖（亞伯拉罕、以撒、雅各）」、「堅定約」、「耶和華你的神」、「得貨財的力量」、「存活、人數增多、進去得地」；是「美地（迦南地）」的約神學定義。
