name: 火蛇、蠍子、乾旱無水之地
type: 地點
secondary_types: []
aliases:
- 曠野險境
status: formal
definition: 申命記8章15節描述曠野環境：「那裡有火蛇、蠍子、乾旱無水之地」。這是「大而可怕的曠野」的具體特徵，凸顯環境的致命威脅（毒蛇、蠍子、極度缺水），也襯托神在這絕境中供應水（磐石出水）、食物（嗎哪）、保守（衣不穿破、腳不腫）的大能恩典。
development: 此地理描述服務於神學目的：見證神在「死蔭幽谷」般的環境中作為「引導者、供應者、保守者」。將環境的惡劣與神的信實形成強烈對比，成為後世「記念」神恩典的具體錨點（v15-16）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第15節列舉曠野三大殺手級要素（火蛇、蠍子、乾旱無水），作為神蹟供應（水從磐石、嗎哪）與保守（衣鞋不壞）的背景板。
  relation: 與「水從磐石流出」、「曠野生活（曠野漂流）」、「大而可怕的曠野」、「角蝰（火蛇）」、「引你經過曠野」互文，共同構建「曠野試煉」的嚴酷真實感。
