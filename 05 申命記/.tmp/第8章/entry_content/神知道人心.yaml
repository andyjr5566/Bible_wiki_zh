name: 神知道人心
type: 神學
secondary_types: []
aliases:
- 神鑑察人心
- 耶和華試驗人心
status: formal
definition: 申命記 8:2 指出神在曠野四十年苦煉、試驗以色列人，「要知道你心內如何，肯守他的誡命不肯」。這揭示神的全知屬性：祂不僅知曉外在行為，更洞悉內心動機與忠誠度。試驗的目的非為神獲取資訊（神本全知），乃為讓百姓自己認識自心的軟弱與悖逆，從而學習倚靠神。此神學真理貫穿聖經（如撒上
  16:7、耶 17:10、來 4:12-13），強調神與人立約關係的核心在於「心」的誠實順服。
accumulations:
- book: 申命記
  chapter: 8
  summary: 經文記載神引導以色列人在曠野四十年，目的是苦煉試驗，以知他們心內如何，是否遵守誡命。
  relation: 本章核心神學動機，奠定後續嗎哪供應、管教兒子等恩典行動的基礎——神知道人心，仍以恩典相待。
related_entries:
