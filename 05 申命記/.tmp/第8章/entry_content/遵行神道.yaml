name: 遵行神道
type: 神學
secondary_types: []
aliases:
- 遵行神的道
- 行在神道中
status: formal
definition: 指信徒順服神的誡命、典章、律例，並以此作為生活準則。申命記第8章強調「遵行他的道」（v.6）與「謹守遵行」（v.1）是得著應許之地、存活增多的條件，更連結「敬畏神」與「心裡思想」神的管教，顯示遵行神道非單純外在行為，乃是內心順服的表現。
development: 從西奈山領受律法，到摩西在摩押平原重申，遵行神道成為以色列立國根基；新約時代基督成全律法，信徒靠聖靈遵行神道（羅8:4）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第8章開頭與第6節雙重強調「謹守遵行一切誡命」與「遵行他的道」，作為進入美地、享受福氣的前提，並連結曠野四十年試煉的功課——認識人心、學習倚靠神話語。
  relation: 本章核心神學動機：遵行神道源於紀念神恩典（出埃及、曠野供應），並預防因飽足而驕傲忘神。
