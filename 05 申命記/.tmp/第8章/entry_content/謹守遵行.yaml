name: 謹守遵行
type: 神學
secondary_types: []
aliases:
- 謹守誡命
- 遵行道
status: formal
definition: 申命記8章1、6、11節反覆強調「謹守遵行」神的誡命、典章、律例。第1節：「謹守遵行……好叫你們存活、人數增多、進去得地」；第6節：「謹守耶和華─你神的誡命，遵行他的道，敬畏他」；第11節警告「免得忘記……不守他的誡命、典章、律例」。這不僅是外在順服，更包含內心敬畏與生活化的遵行。
development: 本章將「謹守遵行」呈現為約關係的核心義務與得福管道。從進入應許之地的前提條件（v1），到曠野試煉的學習目標（v2,5-6），再到美地豐盛中的持續要求（v11）。「遵行他的道」與「敬畏他」連結，顯示順服源於認識神。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1、6、11節三次提及「謹守/謹慎…遵行/守」誡命典章律例，貫穿「得地前提」、「曠野功課」、「得地後警戒」三個階段，構成全章倫理與神學的主軸。
  relation: 直接關聯「誡命、典章、律例」、「今日所吩咐你的」、「遵行神道」、「敬畏神」、「存活、人數增多、進去得地」、「謹慎免得忘記」；是「曠野試煉目的：認識自己、倚靠神」的具體出口。
