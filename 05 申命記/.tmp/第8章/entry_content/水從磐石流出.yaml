name: 水從磐石流出
type: 事件
secondary_types: []
aliases:
- 磐石出水事件
status: formal
definition: 申命記8章15節記載：「他曾為你使水從堅硬的磐石中流出來」。這是曠野漂流期間（參出埃及記17章、民數記20章）神超自然供應飲水的重大拯救事件，證明神能在「乾旱無水之地」滿足百姓基本生存需求，彰顯祂作為磐石、泉源的屬性。
development: 本章將此事件置於「曠野試煉」的總結中（v15-16），與賜嗎哪並列，作為神「苦煉、試驗、叫你終久享福」過程中的關鍵供應見證。新約保羅將此磐石指為基督（林前10:4），但本章重點在歷史救贖層面的神蹟供應與保守。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第15節作為曠野恩典回顧的一部分，提及水從磐石流出，與賜嗎哪、衣不穿破共同構成神全方位保守的證據鏈。
  relation: 回應「火蛇、蠍子、乾旱無水之地」的缺水危機；與「在曠野賜嗎哪」並列為曠野兩大生存神蹟；屬「為你使水從磐石流出」與「何烈山、加低斯（磐石出水兩次）」的歷史實體。
