name: 將你從埃及地為奴之家領出來
type: 事件
secondary_types: []
aliases:
- 出埃及救贖
- 從為奴之家釋放
status: formal
definition: 申命記8:14「忘記耶和華─你的神，就是將你從埃及地為奴之家領出來的」。指神大能拯救以色列脫離埃及奴役的奠基性救贖事件（出1-14章）。此為十誡序言（出20:2）與申命記屢次勸勉（5:6,
  6:12, 7:8, 8:14, 13:5, 15:15, 16:12, 24:18, 22）的核心神學基礎：神的身分由救贖行動定義，百姓的身分由被救贖定義。
development: 出埃及事件成為舊約救贖典範，預表基督「救我們脫離黑暗的權勢」（西1:13）；逾越節羔羊預表「基督我們的逾越羔羊已被殺獻祭了」（林前5:7）；主餐設立「你們應當這樣行，為的是記念我」（路22:19）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第14節在「心高氣傲、忘記神」的高潮處，以「將你從埃及地為奴之家領出來」作為反制記憶錨點：繁榮（房屋、牛羊、金銀）不可取代救贖主的地位；第15-16節進一步串聯曠野引導、磐石出水、嗎哪供應，構建完整救贖史記憶鏈。
  relation: 為「引你經過曠野」、「曠野四十年試煉」、「紀念」、「不可忘記耶和華你的神」、「為奴之家（埃及）」提供救贖史根基。
