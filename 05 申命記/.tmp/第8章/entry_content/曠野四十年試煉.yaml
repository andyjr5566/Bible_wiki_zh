name: 曠野四十年試煉
type: 事件
secondary_types:
- 神學
aliases:
- 曠野四十年
- 四十年試煉
status: formal
definition: 申命記 8:2-5, 15-16 記載，耶和華引導以色列人在曠野漂流四十年，目的是「苦煉你，試驗你，要知道你心內如何，肯守他的誡命不肯」。這段期間神任他們飢餓、賜嗎哪、保守衣履不敝、腳不腫，並從磐石出水、在火蛇蠍子之地保護他們，最終目的是「叫你終久享福」。這是神對祂兒女管教式的訓練，彰顯父神管教兒子的心（8:5）。
development: 經文從歷史回顧（8:2-4）轉向神學意義（8:5-6, 15-16），強調試煉非為懲罰乃為建立倚靠神的生命操練，並預表新約信徒在屬靈曠野中經歷神的供應與塑造。
accumulations:
- book: 申命記
  chapter: 8
  summary: 摩西回顧曠野四十年試煉的過程與目的，強調神的管教、供應（嗎哪、水、衣履）與最終美意（終久享福、堅定約）。
  relation: 本章核心歷史神學事件，奠定後續「不可忘記神」、「防備驕傲」的勸勉基礎。
