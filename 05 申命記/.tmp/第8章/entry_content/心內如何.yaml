name: 心內如何
type: 神學
secondary_types: []
aliases:
- 心裡如何
- 心志如何
status: formal
definition: 指人內在真實的屬靈光景、動機與順服意願。本章 2 節：「耶和華……在曠野引導你這四十年，是要苦煉你，試驗你，要知道你心內如何，肯守他的誡命不肯。」神雖全知，仍透過試驗使人心顯露，讓百姓自己認識己心，並學習倚靠神。
development: 聖經常言神鑑察人心（撒上 16:7；詩 139:1-4；耶 17:9-10）。曠野試驗揭示以色列心裡不信、悖逆（民 14:11；申 9:6-7），也預表基督在曠野受試探，以完全順服勝過魔鬼（太
  4:1-11）。信徒今日亦在試煉中被熬煉，顯出信心真實（雅 1:2-4；彼前 1:6-7）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第 2 節點出曠野四十年引導的雙重目的：苦煉、試驗，以認知「心內如何」及是否肯守誡命。
  relation: 此條目連結曠野試驗的神學意義——神不僅供應物質（嗎哪），更關注百姓屬靈光景，預備他們得地後仍謹守誡命（8:6, 11）。
