name: 苦煉試驗叫你終久享福
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 神藉著苦煉與試驗，最終使百姓得享福祉，申命記8:16「是要苦煉你，試驗你，叫你終久享福」。
development: 曠野的艱難不是目的，而是為了讓百姓學習倚靠神，最終進入應許之地享福。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第16節說明苦煉試驗的最終目的是叫百姓終久享福。
  relation: 終久享福與進去得地、堅定約相呼應。
