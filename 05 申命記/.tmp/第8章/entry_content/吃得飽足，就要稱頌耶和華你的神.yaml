name: 吃得飽足，就要稱頌耶和華你的神
type: 神學
secondary_types: []
aliases:
- 飽足稱頌
status: formal
definition: 申命記8章10節命令：「你吃得飽足，就要稱頌耶和華─你的神，因他將那美地賜給你了。」這是對進入美地享受豐盛產物後，當有的正確屬靈回應：將榮耀歸給賜福的主，防止因物質滿足而產生屬靈麻木與驕傲。
development: 此命令緊接美地豐盛的描述（v7-9），並作為後續「謹慎免得忘記耶和華你的神」（v11）的正面對應行動。稱頌不僅是禮儀，更是承認神為供應者、守約者的信心宣告，將物質享受轉化為屬靈敬拜。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第10節規定在美地吃飽喝足後必須稱頌神，作為享受應許之地福分的核心禮儀與屬靈防線。
  relation: 連結「美地的豐盛」與「不可忘記神的警告」，是防止「心高氣傲、忘記神」（v14）的實踐途徑，亦是「得貨財力量是神給的」（v18）的口頭見證。
