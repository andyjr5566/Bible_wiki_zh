name: 得貨財的力量
type: 神學
secondary_types:
- 事件
aliases:
- 得財能力
- 申命記 8:18
- 財富歸屬神
status: formal
definition: 申命記 8:18 宣告：「你要記念耶和華─你的神，因為得貨財的力量是他給你的，為要堅定他向你列祖起誓所立的約，像今日一樣。」希伯來文「koach」（力量、能力）涵蓋身體健康、智慧、機會、環境等一切獲取財富的條件。此真理直接擊碎
  8:17 的謊言（「我力量、我能力得來的」），將財富視為神託付的管家資源，而非私有成就。目的單一：「堅定約」——財富服事神的救贖計畫，非滿足私慾。
development: 從纠正錯誤歸因（8:17→18）建立正確財富神學：源頭在神、性質是託付、目的是約。奠定聖經管家職分神學基礎（參路 16:11-12；林前
  4:7）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 8:18 作為對 8:17 自誇的神學回應，同時點出神賜福的終極意圖——堅定亞伯拉罕之約。
  relation: 解構「心高氣傲」（8:14）的神學根基；支撐「不可忘記神」（8:11, 19）的正向動機；連結「列祖起誓應許之地」（8:1, 18）與「曠野試煉」（8:2,
    16）的同一約性框架。
