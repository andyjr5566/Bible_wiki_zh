name: 父神管教為得益處
type: 神學
secondary_types: []
aliases:
- 神管教兒子
- 管教帶來福氣
status: formal
definition: 申命記 8:5 「你當心裡思想，耶和華─你神管教你，好像人管教兒子一樣。」結合 v.2-3, 16 的「苦煉、試驗……叫你終久享福」，揭示管教的父性本質與美好目的。管教非懲罰性報應，乃父神為兒女長成、得福而施行的愛的管教（來
  12:5-11）。曠野飢餓、嗎哪供應、四十年漂流，皆是管教工具，目的是除去悖逆、建立倚靠、確立兒子身分，最終進入應許之地享福。這神學重塑苦難觀：信徒經歷的試煉，乃父神為得益處的管教。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第 5 節明確以「父管教兒子」比喻神對以色列的曠野苦煉；第 16 節指出目的「叫你終久享福」。
  relation: 本條目連結「苦煉」、「試驗」、「兒子的地位」、「終久享福」，為理解曠野經歷與基督徒受苦的核心神學鑰匙。
