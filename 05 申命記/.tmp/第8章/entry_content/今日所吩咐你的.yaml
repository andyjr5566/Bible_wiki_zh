name: 今日所吩咐你的
type: 神學
secondary_types: []
aliases:
- 今日吩咐
- 現在的命令
status: formal
definition: 申命記8:1「我今日所吩咐的一切誡命」、11節「就是我今日所吩咐你的」。強調摩西在摩押平原「今日」重申西奈之約的即時性與權威性：「今日」非指單一歷史日子，而是每一代聽道者當下的決志時刻。神的話語不陳舊，常在「今日」臨在（來3:7,
  13, 15）。
development: 申命記反覆使用「今日」（4:40, 5:3, 6:6, 7:11, 8:1, 11, 19, 10:13, 11:8, 27, 30:2,
  15-16），構成「今日聽從、今日得福」的神學張力；新約引用詩95:7「今日若聽見祂的話，就不可硬著心」（來3:7, 15）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1節以「今日所吩咐」開啟全章，設定「謹守遵行→存活增多→得地」的因果鏈；第11節以同詞收束前段福氣描述，轉入「免得忘記」警戒，形成「今日順服→得福→今日警醒→免禍」的雙向架構。
  relation: 為「遵行神道」、「謹守遵行」、「誡命、典章、律例」、「不守誡命典章律例」、「謹慎免得忘記」提供權威基準與時間錨點。
