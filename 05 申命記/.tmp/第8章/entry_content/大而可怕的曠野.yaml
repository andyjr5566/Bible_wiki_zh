name: 大而可怕的曠野
type: 地點
secondary_types: []
aliases:
- 大曠野
- 可怕曠野
status: formal
definition: 指以色列出埃及後漂流四十年的西奈半島曠野區域。本章 15 節：「引你經過那大而可怕的曠野，那裡有火蛇、蠍子、乾旱無水之地。」強調環境險惡，凸顯神在極端條件下的保護供應（水從磐石、嗎哪）。
development: 申命記 1:19 同稱「大而可怕的曠野」；耶利米 2:6 形容「荒廢、坑洞、乾旱、死蔭之地」。地理上涵蓋西奈、巴蘭、寂等地。屬靈意義上，曠野代表試煉、倚靠神、與神親密交通之處（何
  2:14-15）。主耶穌亦曾在曠野受試探四十天（太 4:1-11）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第 15 節以「大而可怕的曠野」為背景，列舉火蛇、蠍子、乾旱無水，隨即轉折：「他曾為你使水從堅硬的磐石中流出來」，形成「險惡環境—神超自然供應」對比。
  relation: 此地點為曠野試煉（8:2-5, 15-16）的具體舞台，支撐「不可忘記耶和華」（8:11, 14, 18）的歷史依據——神在最絕望處施行拯救。
