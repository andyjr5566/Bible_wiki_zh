name: 謹慎免得忘記
type: 神學
secondary_types: []
aliases:
- 謹慎不可忘記
- 警醒不忘
status: formal
definition: 申命記8:11「你要謹慎，免得忘記耶和華─你的神，不守他的誡命、典章、律例」。此為本章轉折點：從歷史回顧（v.1-10）轉入未來警戒。「謹慎」（沙馬爾）含守望、保護之意；「忘記」非記憶消失，而是關係性的背棄——不守誡命、典章、律例。根源在於「吃得飽足、建造房屋、牛羊加多、金銀增添」後的「心高氣傲」（v.12-14）。
development: 申命記反覆警戒「不可忘記」（4:9, 6:12, 8:11, 19），顯示遺忘是約民最大屬靈危機；新約勸勉「要更加殷勤聽見所聽見的道理，恐怕我們流失了」（來2:1）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第11節發出核心警戒，第12-14節剖析遺忘的心理機制（飽足→建造/積累→驕傲→忘記救贖主），第15-16節回顧曠野恩典作反制，第17-18節揭露「力量得貨財」的謊言，第19-20節宣告後果。
  relation: 本條為本章神學重心，串聯「稱頌神」（正向操練）、「不守誡命典章律例」（具體表現）、「今日所吩咐你的」（權威來源）、「心高氣傲」（根本病因）。
