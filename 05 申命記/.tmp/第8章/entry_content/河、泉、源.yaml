name: 河、泉、源
type: 地點
secondary_types: []
aliases:
- 河流泉源
- 水源
status: formal
definition: 申命記8:7描述應許之地「有河，有泉，有源，從山谷中流出水來」，指迦南地豐富的水文系統：常流河、天然泉眼、地下水源，構成農業灌溉與生活用水的堅實基礎，與埃及靠尼羅河人工灌溉、曠野靠神蹟供水形成對比。
development: 歷史地理學證實迦南中部山區泉源密集，約旦河上游赫爾蒙山融雪匯聚成河，考古發現鐵器時代水渠系統印證經文描述。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第7節列舉河、泉、源作為美地「一無所缺」的首要物質條件，緊接第8-9節七樣產物與礦產，共同勾勒神賜福的豐盛圖景。
  relation: 此地點描寫佐證「耶和華領你進入美地」的應許實現，並為後文「吃得飽足、稱頌神」鋪陳物質基礎。
related_entries:
- 美地（迦南地）
- 七樣產物（小麥、大麥、葡萄樹、無花果樹、石榴樹、橄欖樹、蜜）
- 鐵礦、銅礦
- 一無所缺
- 吃得飽足，就要稱頌耶和華你的神
