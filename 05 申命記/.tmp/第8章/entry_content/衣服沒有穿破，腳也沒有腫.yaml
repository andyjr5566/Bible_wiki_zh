name: 衣服沒有穿破，腳也沒有腫
type: 事件
secondary_types:
- 神學
aliases:
- 衣履不敝
- 腳不腫
- 曠野神蹟保守
status: formal
definition: 申命記 8:4 記載曠野四十年間的超自然保守：「這四十年，你的衣服沒有穿破，你的腳也沒有腫。」同見申 29:5、尼 9:21。這彰顯神對祂立約子民全方位的看顧——不僅供應食物（嗎哪）、水（磐石），連日常穿著與行走健康都在神的保護之下，作為神信實、恩典與「父管教兒子」（8:5）具體見證。
development: 此節作為 8:2-3 試煉叙事的補充證據，證明「苦煉」並非拋棄，而是在嚴酷環境中彰顯神異常的供應；為後文「美地」的豐盛（8:7-9）與「不可忘記神」（8:11-14）鋪陳對比背景。
accumulations:
- book: 申命記
  chapter: 8
  summary: 8:4 單獨一節記錄此神蹟，作為曠野四十年神保守的具體見證之一。
  relation: 支撐「曠野四十年試煉」中神恩典的一面，呼應 8:5「管教如兒子」，並為 8:7-9 進入美地後的警戒（免得忘記神）提供反面對比：曠野缺乏中神尚且全備供應，豈況美地豐盛？
