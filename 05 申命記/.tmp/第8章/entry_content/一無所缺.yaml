name: 一無所缺
type: 神學
secondary_types: []
aliases:
- 毫無缺乏
- 完全供應
status: formal
definition: 申命記8:9「你在那地不缺食物，一無所缺」，表達神對進入應許之地百姓全方位的供應：糧食、水、建材（鐵、銅）皆備。此神學主題強調神作為供應者（Jehovah
  Jireh）的信實，並作為「稱頌神」（v.10）與「謹慎免得忘記」（v.11）的雙重動機。
development: 從曠野嗎哪的日日供應，進入迦南常態化的產業供應，展現神供應方式的轉變，但源頭不變；新約延伸為「神照祂榮耀的豐富，在基督耶穌裡，使你們一切所需用的都充足」（腓4:19）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第9節總結美地物質豐盛「一無所缺」，承接第7-8節水源與七樣產物，引出第10節「吃得飽足、稱頌神」的正向回應，同時為第11-14節「飽足驕傲、忘記神」的警鐘鋪墊。
  relation: 本條目為本章福與禍雙軌論述的分水嶺：供應豐盛本為引導敬拜，卻常成驕傲溫床。
related_entries:
- 吃得飽足，就要稱頌耶和華你的神
- 美地（迦南地）
- 七樣產物（小麥、大麥、葡萄樹、無花果樹、石榴樹、橄欖樹、蜜）
- 鐵礦、銅礦
- 稱頌神
- 謹慎免得忘記
- 一無所缺
