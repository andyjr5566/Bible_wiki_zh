name: 存活
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指神應許順服誡命的百姓得以存活，申命記8:1「好叫你們存活」。
development: 存活不僅是生理生存，更包含屬靈生命的延續，依靠神的話語（參8:3）。
accumulations:
- book: 申命記
  chapter: 8
  summary: 第1節將存活作為謹守誡命的結果，第3節進一步說明人活著靠耶和華口裡的話。
  relation: 存活與順服、神的話語供應緊密相連。
related_entries:
- 存活、人數增多、進去得地
- 謹守遵行
- 人活著不是單靠食物，乃是靠耶和華口裡所出的一切話
- 敬畏神
