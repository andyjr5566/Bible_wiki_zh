name: 人活著不是單靠食物，乃是靠耶和華口裡所出的一切話
type: 神學
secondary_types:
- 原文
aliases:
- 人活著不單靠食物
- 靠神話語而活
- 馬太福音 4:4 引用經文
status: formal
definition: 申命記 8:3 核心神學宣告：「他苦煉你，任你飢餓，將你和你列祖所不認識的嗎哪賜給你吃，使你知道，人活著不是單靠食物，乃是靠耶和華口裡所出的一切話。」希伯來文「motza
  pi Yahweh」（耶和華口中所出的）強調神話語的創造性、維持性能力。這不僅指物質供應（嗎哪），更指向神啟示的誡命、應許與約言作為生命真正的來源與依歸。主耶穌在受試探時引用此節（太
  4:4 / 路 4:4），確立屬靈生命優於物質需要的原則。
development: 從曠野嗎哪的具體供應（8:3, 16）上升至神話語作為生命根基的神學高度；新約將此應用於基督作為「生命的糧」（約 6:32-35）與屬靈爭戰的根基。
accumulations:
- book: 申命記
  chapter: 8
  summary: 8:3 明確陳述此真理，上下文以嗎哪供應為具體例證；16 節重申目的在於試驗、終久享福。
  relation: 本章神學核心，連結物質供應（嗎哪）與屬靈實質（神話語），支撐後續「稱頌神」（8:10）、「不可忘記神」（8:11）的動機。
