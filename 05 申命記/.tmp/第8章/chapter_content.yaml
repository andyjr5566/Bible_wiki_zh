organization: '### 曠野四十年的教訓：苦煉、試驗與供應（v1-6）

  摩西開篇強調[[謹守遵行]]一切誡命，目的是為了[[存活、人數增多、進去得地]]，進入[[列祖起誓應許之地]]（v1）。他命令百姓[[紀念]][[耶和華你的神]]在曠野引導這四十年，目的是[[苦煉]]、[[試驗（測試）]]，以知道[[心內如何]]，肯不肯守誡命（v2）。神任他們飢餓，賜[[嗎哪不勞而獲]]，使他們知道[[人活著不是單靠食物，乃是靠耶和華口裡所出的一切話]]（v3）。這段期間[[衣服沒有穿破，腳也沒有腫]]，成為[[衣服沒穿破、腳沒腫為神保守證據]]（v4）。摩西提醒他們[[心裡思想]]：[[耶和華你的神]]管教你們，如同人管教兒子，這是[[父神管教為得益處]]、[[兒子的地位]]的體現（v5）。因此當[[謹守遵行]]誡命，[[遵行神道]]，[[敬畏神]]（v6）。


  ### 美地的豐盛與稱頌的責任（v7-10）

  神領他們進入[[美地（迦南地）]]，那地有[[河、泉、源]]，出產[[七樣產物（小麥、大麥、葡萄樹、無花果樹、石榴樹、橄欖樹、蜜）]]，且[[一無所缺]]，石頭是鐵、山裡可挖銅（[[鐵礦、銅礦（Barzel,
  Nechoshet）]]）（v7-9）。摩西囑咐：[[吃得飽足，就要稱頌耶和華你的神]]，因祂將美地賜給你們（v10）。這[[稱頌神]]的行動正是[[稱頌神防止忘記]]的屬靈機制。


  ### 警戒富足驕傲與忘記神的後果（v11-20）

  摩西嚴厲警告：[[謹慎免得忘記]][[耶和華你的神]]，不守[[誡命、典章、律例（mitzvah, chuqqah, mishpat）]]（v11）。當[[建造美好的房屋居住]]、[[牛羊加多、金銀增添]]時，恐怕[[心高氣傲（驕傲）]]，忘記將你們從[[為奴之家（埃及）]]領出、引導經過[[大而可怕的曠野]]（有[[火蛇、蠍子、乾旱無水之地]]）、使[[水從磐石流出]]、賜[[在曠野賜嗎哪]]的神（v12-16）。這一切是為[[苦煉試驗叫你終久享福]]、[[為要堅定約]]（v16）。若[[心裡說這貨財是我力量得來的]]，卻不知[[得貨財力量是神給的]]（v17-18）。若[[不可忘記耶和華你的神]]而[[隨從別神事奉敬拜]]，你們[[你們必定滅亡]]，如同[[列國民滅亡作鑑戒]]、[[列國滅亡作鑑戒]]，因[[不聽從耶和華話語]]（v19-20）。


  ### 跨章脈絡：試煉、恩典與基督預表

  本章將[[曠野四十年試煉]]定性為認識自己軟弱、學習倚靠神話語的過程（[[曠野試煉目的：認識自己、倚靠神]]）。[[嗎哪象徵基督]]、[[屬靈磐石是基督]]（參林前10:3-4），指向新約[[神的話語是生命糧]]的真理。[[管教（懲戒）]]非為刑罰，乃為[[終久享福]]、[[堅定約]]。[[驕傲忘神導致滅亡]]的警告貫穿聖經歷史，成為後世列王與教會的鑑戒。'
