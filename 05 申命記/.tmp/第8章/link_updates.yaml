"book": "05 申命記"
"chapter": !!int "8"
"updates":
- "title": "敬畏神"
  "path": "link_folder/神學/敬畏神.md"
  "summary": "敬畏神是遵守律法的動力與基礎。CCB CT 指出敬畏指害怕惹神發怒；CCB GT 指出敬畏神、謹守律例誡命，個人可享長壽，國家可享福祉；KingComments 指出摩西不停地回顧出埃及事件與西奈山頒佈律法事件，因為此二事件不僅孕育了以色列，同時還明確宣告了神是以色列的救贖者與治理者的事實。"
  "relation": "本章第6節勸勉以色列人敬畏耶和華神，謹守祂的律例誡命，遵行祂的道。"
- "title": "紀念"
  "path": "link_folder/神學/紀念.md"
  "summary": "紀念在素祭條例中指祭司取細麵、油、乳香作為紀念燒在壇上。神學上代表將供物精華呈獻於神面前，使獻祭者被記念在神面前。申命記8章強調「你也要紀念」、「你要記念耶和華─你的神」，指回顧曠野四十年神的引導、試驗、供應，以免驕傲忘記神。"
  "relation": "本章第2、18節命令以色列人紀念耶和華神在曠野引導四十年、苦煉試驗、賜嗎哪、衣服沒穿破、腳沒腫，以及得貨財力量是神給的。"
- "title": "管家職分"
  "path": "link_folder/神學/管家職分.md"
  "summary": "人只是神賜財物的管家，當為神旨意善用。CCB CT 指出人只是管家；KingComments 強調財物當為神旨意善用；BibleHub 連結路12:16-21、提前6:17-19。"
  "relation": "本章第18節明確指出「得貨財的力量是他給你的」，強調財富來源於神，人當記念神、為管家職分忠心。"
