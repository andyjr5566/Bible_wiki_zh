name: 一年三次朝見（除酵節、七七節、住棚節）
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 申命記 16:16-17 規定所有男丁每年三次在耶和華所選擇的地方朝見，分別為除酵節（無酵節）、七七節（五旬節）和住棚節（帳棚節）；朝見時不可空手，各人要按神所賜的福分獻上禮物。
development: ''
accumulations:
- book: 申命記
  chapter: 16
  summary: 規定所有男丁一年三次在神所選之處朝見，分別為除酵節、七七節、住棚節，並不可空手，按所得獻上禮物。
  relation: 確立三大節期為全民朝見的時機，強調獻祭與感恩。
