organization: "### 逾越節與除酵節（v1-8）\n本章開篇規定 [[守逾越節（亞筆月、無酵餅、困苦餅）|逾越節]] 須在亞筆月守行，紀念耶和華夜間領以色列出埃及。祭牲必須從牛群羊群中取，且只能在\
  \ [[逾越節只能在神揀選的地方獻祭|耶和華揀選立名的居所]] 獻上，不可在各城任意獻祭。七日內吃無酵餅（即困苦餅），頭一日晚獻的肉不可留到早晨，第七日當向耶和華守嚴肅會，不可做工。\n\
  \n### 七七節（v9-12）\n緊接著是 [[一年三次朝見（除酵節、七七節、住棚節）|七七節]]，從開鐮收割禾稼算起七七日，照耶和華所賜的福甘心獻祭。當在揀選之地與兒女、僕婢、利未人、寄居者、孤兒寡婦同樂，並要記念在埃及作過奴僕，謹守遵行律例。\n\
  \n### 住棚節（v13-15）\n收藏禾場穀、酒醡酒後守 [[一年三次朝見（除酵節、七七節、住棚節）|住棚節]] 七日，同樣在揀選之地歡樂。因為耶和華在一切土產和手裡所辦的事上賜福，使百姓非常歡樂。\n\
  \n### 一年三次朝見的規定（v16-17）\n經文總結三大節期——除酵節、七七節、住棚節——所有男丁一年三次要在揀選之地朝見耶和華，**不可空手朝見**，各人要按自己的力量、照神所賜的福分奉獻禮物。\n\
  \n| 節期 | 時間觸發點 | 核心儀式 | 參與對象 | 關鍵神學意義 |\n| --- | --- | --- | --- | --- |\n| 除酵節（逾越節）\
  \ | 亞筆月（出埃及月） | 獻逾越祭、吃無酵餅七日 | 全家、利未人、寄居者 | 紀念出埃及的拯救與急速 |\n| 七七節（五旬節） | 開鐮收割後七七日\
  \ | 甘心祭、按福分獻上 | 全家、利未人、寄居者、孤兒寡婦 | 紀念蒙福收割、分享喜樂 |\n| 住棚節 | 收藏禾場穀酒後 | 住棚七日、極盡歡樂 | 全家、利未人、寄居者、孤兒寡婦\
  \ | 紀念曠野漂流、感恩豐收 |\n\n### 設立審判官與公義審判（v18-20）\n以色列人在耶和華賜的各城裡，按支派設立 [[設立審判官和官長（公義審判）|審判官和官長]]，必須按公義審判百姓。**不可屈枉正直、不可看人的外貌、不可受賄賂**，因為賄賂能叫智慧人的眼變瞎，顛倒義人的話。百姓要追求至公至義，好叫他們存活，承受耶和華神所賜的地。\n\
  \n### 禁止偶像崇拜的儀式（v21-22）\n為耶和華築壇時，**不可在壇旁栽什麼樹木作為 [[不可在壇旁栽樹木作木偶（禁止亞舍拉）|木偶（亞舍拉）]]**，也不可為自己設立\
  \ [[不可為自己設立柱像（禁止立柱像）|柱像]]；這兩樣都是耶和華神所恨惡的，強調敬拜的純正性與獨一性。\n\n### 章節結構與神學脈絡\n```mermaid\n\
  mindmap\n  root((申命記16))\n    節期制度\n      \"逾越節/除酵節 (v1-8)\"\n      \"七七節 (v9-12)\"\
  \n      \"住棚節 (v13-15)\"\n      \"一年三次朝見 (v16-17)\"\n    司法制度\n      \"設立審判官/官長\
  \ (v18)\"\n      \"公義審判原則 (v19-20)\"\n    純正敬拜\n      \"禁亞舍拉木偶 (v21)\"\n      \"\
  禁立柱像 (v22)\"\n```\n本章將**節期敬拜**、**社會公義**與**純正敬拜**三大面向串聯：節期以「神揀選的地方」為中心，強調同樂與記念；司法以「公義」為核心，確保社會公平；敬拜以「除去偶像」為界線，維護獨一真神的聖潔。"
