  ]\n  B -->|外邦神| D[\"毀滅迦南敬拜場所（高山、山岡、青翠樹下）\"]\n  C --> E[\"集中獻祭：燔祭/平安祭/十一奉獻/頭生/還願/甘心/舉祭\"\
  ]\n  C --> F[\"聖餐：在神面前歡樂、與利未人同享\"]\n  E --> G[\"燔祭：肉血全獻壇上\"]\n  E --> H[\"平安祭：血灑壇、肉自吃\"\
  ]\n  C -.->|距離過遠| I[\"在各城可宰殺吃肉（非祭物之肉）\"]\n  I --> J[\"嚴禁吃血（血是生命）\"]\n  D --> K[\"\
  不可照外邦人敬拜神的方式敬拜耶和華\"]\n  K --> L[\"不可隨從被剪除國民的惡俗\"]\n  style C fill:#e1f5fe\n  style\
  \ D fill:#ffebee\n```\n\n> [!important] 本章樞紐：集中敬拜與生活化聖潔的張力\n申命記 12 章建立「一地、一壇、一民」的敬拜架構，同時為分散居住的現實預留「非祭物之肉」的空間。這張力貫穿以色列歷史（參士師記\
  \ 17-18 米迦家私設祭壇；列王記上 12 耶羅波安設立丹、伯特利金牛犢），也預表新約時代「在靈裡真理裡拜父」不再限於耶路撒冷或基利心山（約 4:21-24），卻同樣要求敬拜方式由神定義、生命聖潔與敬拜一致。"
