name: 親屬勸誘事奉別神（至親勸誘）
type: 解經爭議
secondary_types: []
aliases:
- 至親勸誘
- 親屬勸誘事奉別神
status: formal
definition: 此主題經文見於申命記13:6-11，記載至親（弟兄、兒女、妻、朋友）暗中勸誘事奉別神之案例，屬解經爭議議題。申命記第12章雖未直接記載此案例，但確立「耶和華揀選立名的地方」（v.5,11,14,18,21,26）、「不可照外邦人敬拜方式敬拜耶和華」（v.4,30-31）與「毀滅迦南敬拜場所」（v.2-3）等核心原則，為第13章審判勸誘者提供神學與法律基礎：既定獨一敬拜地點與方式，任何勸誘轉事奉別神即屬叛教，須依律法處死。
development: 申12章建立中央聖所敬拜體系（v.5-7,11,13-14,18,21,26）與排他性敬拜原則（v.4,29-31），構成申13章「至親勸誘」與「假先知」（v.1-5）、「叛教之城」（v.12-18）三大勸誘案例的判斷標準。爭議點常圍繞：勸誘者關係的親疏是否影響定罪、秘密勸誘與公開勸誘的證據標準、以及「不可憐憫、不可寬容」（申13:8）與新約恩典的張力。
accumulations:
- book: 申命記
  chapter: 12
  summary: 確立中央聖所敬拜原則、毀滅迦南敬拜場所、禁止照外邦方式敬拜耶和華、規定獻祭地點集中化、規定非祭物宰殺吃肉條例、強調不可吃血、利未人不可被忽略、警告不可隨從被剪除國民惡俗
  relation: 為第13章至親勸誘案例的神學背景：既定獨一敬拜地點與方式，任何勸誘事奉別神即屬叛教，須依「不可隨從被剪除國民的惡俗」（v.30）與「凡我所吩咐的都要謹守遵行」（v.32）處理
related_entries:
- 耶和華揀選立名的地方（中央聖所）
- 獻祭只能在神揀選的地方（集中敬拜）
- 不可照外邦人敬拜神的方式敬拜耶和華
- 毀滅迦南敬拜場所（高山、山岡、青翠樹下）
- 不可隨從被剪除國民的惡俗（不可事奉他們的神）
- 凡我所吩咐的都要謹守遵行、不可加添也不可刪減
- 先知或作夢的人勸誘事奉別神（假先知）
- 惡人勸誘全城事奉別神（叛教之城）
