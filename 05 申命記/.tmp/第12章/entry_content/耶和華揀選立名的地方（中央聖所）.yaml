name: 耶和華揀選立名的地方（中央聖所）
type: 神學
secondary_types:
- 敬拜
- 選民
aliases:
- 中央聖所
- 耶和華揀選之地
- 立名之居所
status: formal
definition: 耶和華從以色列各支派中揀選特定地點，立為祂名的居所（申12:5, 11, 14, 18, 21, 26）。此處成為全以色列合法敬拜、獻祭、守節、奉獻十分之一與各類聖物的唯一中心。此教義確立「集中敬拜」原則，與迦南分散的高山敬拜截然不同。
development: 從示羅（書18:1）到耶路撒冷（王上8:29, 代下6:6）歷史性實現，預表基督為真帳幕（約1:14, 來9:11）。
accumulations:
- book: 申命記
  chapter: 12
  summary: 耶和華將從各支派中揀選一處，立為祂名的居所，作為以色列人敬拜獻祭的唯一合法中心。
  relation: 確立集中敬拜的神學基礎，是本章後續一切獻祭、吃聖物、利未人供養條文的前提。
related_entries:
- 毀滅迦南敬拜場所（高山、山岡、青翠樹下）
- 獻祭只能在神揀選的地方（集中敬拜）
- 聖物、還願祭、甘心祭、頭生牛羊必帶到神揀選的地方
- 利未人不可被忽略（利未人無分無業）
sources:
