name: 惡人勸誘全城事奉別神（叛教之城）
type: 解經爭議
secondary_types: []
aliases:
- 叛教之城
- 惡人勸誘全城事奉別神
status: formal
definition: 此主題經文見於申命記13:12-18，記載惡人（比利亞人）勸誘全城居民事奉別神之案例，屬解經爭議議題。申命記第12章雖未直接記載此案例，但確立「耶和華揀選立名的地方」（v.5,11,14,18,21,26）、「不可照外邦人敬拜方式敬拜耶和華」（v.4,30-31）與「毀滅迦南敬拜場所」（v.2-3）等核心原則，為第13章審判叛教之城提供神學與法律基礎：全城背棄中央聖所敬拜、轉事奉別神，屬集體叛教，須依「毀滅之物」（herem）律法徹底毀滅。
development: 申12章建立中央聖所敬拜體系（v.5-7,11,13-14,18,21,26）與排他性敬拜原則（v.4,29-31），構成申13章「叛教之城」案例的判斷標準。爭議點常圍繞：何謂「惡人」（比利亞人）的認定標準、全城參與的範圍與證據要求、毀滅之物（herem）執行的細節（如牲畜、財物處理）、以及新約視角下教會紀律與國家刑罰的區別。
accumulations:
- book: 申命記
  chapter: 12
  summary: 確立中央聖所敬拜原則、毀滅迦南敬拜場所、禁止照外邦方式敬拜耶和華、規定獻祭地點集中化、規定非祭物宰殺吃肉條例、強調不可吃血、利未人不可被忽略、警告不可隨從被剪除國民惡俗
  relation: 為第13章叛教之城案例的神學背景：既定獨一敬拜地點與方式，全城背棄耶和華轉事奉別神即屬集體叛教，須依「毀壞了……拆毀……打碎……焚燒……砍下……除滅」（v.2-3）之原則徹底清除，並符合「不可隨從被剪除國民的惡俗」（v.30）與「凡我所吩咐的都要謹守遵行」（v.32）
related_entries:
- 耶和華揀選立名的地方（中央聖所）
- 獻祭只能在神揀選的地方（集中敬拜）
- 不可照外邦人敬拜神的方式敬拜耶和華
- 毀滅迦南敬拜場所（高山、山岡、青翠樹下）
- 不可隨從被剪除國民的惡俗（不可事奉他們的神）
- 凡我所吩咐的都要謹守遵行、不可加添也不可刪減
- 先知或作夢的人勸誘事奉別神（假先知）
- 親屬勸誘事奉別神（至親勸誘）
