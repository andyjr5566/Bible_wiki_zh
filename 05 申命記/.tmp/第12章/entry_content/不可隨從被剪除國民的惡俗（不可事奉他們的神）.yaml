name: 不可隨從被剪除國民的惡俗（不可事奉他們的神）
type: 神學
secondary_types:
- 警戒
- 屬靈爭戰
- 進地後試驗
aliases:
- 不可效法惡俗
- 進地後警戒
- 拒絕異教同化
status: formal
definition: 耶和華將國民從以色列面前剪除、以色列得地居住後，嚴誡不可隨從他們的惡俗、陷入網羅，不可訪問他們的神說「這些國民怎樣事奉他們的神，我也要照樣行」（申12:29-31）。因為他們向神行耶和華所憎嫌、所恨惡的一切事，甚至將兒女用火焚燒獻給神。此警告針對進地後「得勝驕傲」與「文化滲透」的雙重試驗。
development: 士師記、列王記歷史反覆驗證此警告（士2:11-13, 王上11:4-8）；新約勸勉「不要效法這個世界」（羅12:2）、「與不信的不相配」（林後6:14-17）。
accumulations:
- book: 申命記
  chapter: 12
  summary: 進地得業後，警告不可因國民被剪除而跟隨其惡俗、訪問其神、效法其敬拜（含獻兒女火祭），強調持續的屬靈警醒。
  relation: 承接第2-4節毀滅偶像與不可效法敬拜方式，為第13章假先知誘惑鋪墊，構成「敬拜純正」的完整防禦圈。
related_entries:
- 毀滅迦南敬拜場所（高山、山岡、青翠樹下）
- 不可照外邦人敬拜神的方式敬拜耶和華
- 凡我所吩咐的都要謹守遵行、不可加添也不可刪減
- 先知或作夢的人勸誘事奉別神（假先知）
sources:
