name: 凡我所吩咐的都要謹守遵行、不可加添也不可刪減
type: 神學
secondary_types: []
aliases:
- 不可加添不可刪減
- 遵行神命不可增減
- 申命記十二章三十二節
status: formal
definition: 本條目對應申命記 12:32，是摩西在規定中央聖所敬拜條例（12:1-28）與禁止效法外邦敬拜（12:29-31）之後，給出的總結性神學原則。經文強調神的啟示具有完備性與權威性，百姓當謹守遵行（謹守、遵行），絕不可自行增添（加添）或刪減（刪減）神的命令。這原則保護敬拜的純正性，防止混合異教習俗（如
  12:30-31 焚燒兒女），並奠定「聖經充足」的神學基礎，後見於申 4:2、13:1、啟 22:18-19。
development: 此「不可加添刪減」原則貫穿聖經典正觀。申 4:2 同樣警告不可增減耶和華的命令；申 13:1 重申先知或作夢者若勸誘事奉別神，雖有神蹟也不當聽從，因耶和華試驗百姓是否專心愛祂；新約啟
  22:18-19 將此原則應用於預言書，警告增減者必受災禍。本章語境下，此命令封閉了人以「善意」或「情境化」為由，將外邦敬拜方式（高山、青翠樹、焚燒兒女）引入耶和華敬拜的可能性，確立「惟獨聖經規定敬拜」的神學根基。
accumulations:
- book: 申命記
  chapter: 12
  summary: 摩西頒布敬拜條例，命令毀壞迦南敬拜場所，集中於耶和華揀選之處獻祭，禁止效法外邦敬拜，最後以第 32 節總結：凡我所吩咐的都要謹守遵行，不可加添也不可刪減。
  relation: 本章第 32 節為本條目直接出處，作為全章敬拜律法的封閉條款，確立神命令的絕對權威與完備性。
