name: 先知或作夢的人勸誘事奉別神（假先知）
type: 解經爭議
secondary_types:
- 神學
- 假先知
- 護教學
aliases:
- 假先知誘惑
- 申命記13假先知
- 異夢誘惑
status: formal
definition: 雖主要條文見於申命記13:1-5，但申命記12:29-32關於「不可隨從國民惡俗、不可訪問他們的神、不可增減律法」的警告，為第13章假先知誘惑事奉別神的法條提供直接神學背景與經文銜接。註解常於本章結尾引介此議題：假先知或作夢的人雖顯神蹟奇事，若勸誘事奉別神，即為耶和華試驗百姓是否全心全魂愛神，必須治死，不可憐憫。此條目屬解經爭議，因涉及「神蹟與真理關係」、「舊約死刑律法屬靈意義」、「新約假先知鑑別（太7:15,
  約壹4:1, 啟19:20）」等詮釋張力。
development: 猶太傳統（米示拿Sanhedrin 7-11）與基督教神學（加爾文、衛斯理、現代釋經）對假先知定義、神蹟功能、處死執行者（公會/民眾/神）有不同理解；屬靈爭戰觀點視其為撒但模仿神蹟欺騙選民（帖後2:9）。
accumulations:
- book: 申命記
  chapter: 12
  summary: 本章結尾（v.29-32）關於不可隨從國民惡俗與不可增減律法的警告，為第13章假先知誘惑事奉別神的法條鋪路；註解常於此處引介假先知議題。
  relation: 經文銜接與神學延伸：集中敬拜與純正信仰的防衛機制，從外在偶像清除（第12章）進入內在教義防衛（第13章）。
