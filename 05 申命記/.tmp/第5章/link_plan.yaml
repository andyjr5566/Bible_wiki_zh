- name: 何烈山立約
  suggested_type: 事件
  evidence: '經文：申5:2-5。「耶和華我們的神在何烈山與我們立約……耶和華在山上，從火中，面對面與你們說話。那時我站在耶和華和你們中間，要將耶和華的話傳給你們」。

    ccbiblestudy CT：何烈山即西乃山，神頒賜十誡，人若遵行必蒙神發慈愛直到千代。摩西作中保傳話，百姓懼怕火未上山。

    ccbiblestudy GT：何烈山之約指以色列若遵守耶和華的約，就作歸神的聖民。此次神親自與整個以色列民族立約。

    KingComments：何烈山即西乃山，神親自與已具國家規模的以色列民族立約。摩西作中保，預表基督中保事工。

    BibleHub Study：耶和華在何烈山與我們立約。神在山上從火中面對面說話。摩西站在中間傳話，百姓懼怕火未上山。'
