- name: 第五誡：孝敬父母
  suggested_type: 神學
  evidence: '經文：申5:16。「當照耶和華你神所吩咐的孝敬父母，使你得福，並使你的日子在耶和華你神所賜你的地上得以長久」。

    ccbiblestudy CT：孝敬父母使得福、日子長久。父母是子女靈性上祭司和生活知識教師，負有教導兒女大責。

    ccbiblestudy GT：孝敬父母使得福、日子長久。父母是子女靈性上祭司和生活知識教師。

