  - phrase: 西乃山立約
  target_path: link_folder/事件/何烈山立約.md
- name: 第一誡：不可有別神
  suggested_type: 神學
  evidence: '經文：申5:7。「除了我以外，你不可有別的神」。

    ccbiblestudy CT：第一誡確立對神敬拜原則，建立人神關愛。神宣告唯一性，排斥多神論泛神論。不可有別神，意指在我面前容不下與我相提並論者。

    ccbiblestudy GT：第一誡確立對神敬拜原則。神是唯一一位，不是第一位。凡愛人過於愛神的，那人就是別神。

    KingComments：第一誡確立對神敬拜原則。神是唯一一位，不是第一位。今天許多事物可能成為別神：傳道人、金錢、名望、工作、享樂。

    BibleHub Study：第一誡確立對神敬拜原則。神宣告唯一性，排斥多神論泛神論。神要我們完全被祂佔據。'
  surfaces:
