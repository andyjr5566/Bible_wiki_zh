- name: 第三誡：不可妄稱神名
  suggested_type: 神學
  evidence: '經文：申5:11。「不可妄稱耶和華你神的名；因為妄稱耶和華名的，耶和華必不以他為無罪」。

    ccbiblestudy CT：妄稱神名指為錯誤目的操縱人、行法術或自私慾望，甚至禱告中也可能犯此錯。

    ccbiblestudy GT：妄稱神名指任何存心對神不恭敬的態度言行，也指企圖用神名作咒語達到個人目的。

    KingComments：妄稱神名指任何存心對神不恭敬的態度言行，也指企圖用神名作咒語達到個人目的。

    BibleHub Study：妄稱神名指任何存心對神不恭敬的態度言行，也指企圖用神名作咒語達到個人目的。'
