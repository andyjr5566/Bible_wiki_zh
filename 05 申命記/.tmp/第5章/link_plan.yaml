- name: 摩西重申十誡
  suggested_type: 事件
  evidence: '經文：申5:1-21。摩西召集以色列眾人，重申律例典章，復述十誡。強調這約不是與列祖立的，乃是與今日存活之人立的。耶和華在何烈山從火中面對面說話，摩西站在中間傳話。

    ccbiblestudy CT：本章至11章是摩西第二篇談話，關於律法基本原則。重申十誡，確保以色列人信仰純正專一，侍奉唯一真神。

    ccbiblestudy GT：摩西第二篇談話開始，重複說明十誡。十誡是律法核心，亦是神與以色列人立約的規條重點。

    KingComments：摩西重申十誡，這約不是與列祖立的，乃與今日存活之人立的。神在何烈山從火中面對面說話。

    BibleHub Study：摩西召集以色列眾人，重申律例典章。這約不是與列祖立的，乃與今日存活之人立的。神在何烈山從火中面對面說話。'
