- name: 第二誡：不可雕刻偶像
  suggested_type: 神學
  evidence: '經文：申5:8-10。「不可為自己雕刻偶像，也不可做什麼形像……不可跪拜那些像，也不可事奉他，因為我耶和華你的神是忌邪的神。恨我的，我必追討他的罪，自父及子，直到三四代；愛我、守我誡命的，我必向他們發慈愛，直到千代」。

    ccbiblestudy CT：第二誡禁止雕刻偶像、做形像、跪拜事奉。神是忌邪的神，恨神的追討罪到三四代，愛神守誡命的發慈愛到千代。

    ccbiblestudy GT：第二誡禁止作偶像、敬拜偶像。神是忌邪的神，罪惡後果到三四代，慈愛到千代。

    KingComments：第二誡禁止作偶像、敬拜偶像。神是忌邪的神，罪惡後果到三四代，慈愛到千代。

    BibleHub Study：第二誡禁止作偶像、敬拜偶像。神是忌邪的神，罪惡後果到三四代，慈愛到千代。'
