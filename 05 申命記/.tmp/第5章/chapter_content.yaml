organization: "### 立約背景與中保職分（v1-5）\n摩西召集全以色列，強調[[何烈山立約]]非與列祖亞伯拉罕、以撒、雅各所立，乃與「今日在這裡存活之人」立（v3）。這體現約的**當代性**與**代際責任**。經文回顧[[神從火中面對面說話]]的盛況（v4），並點出[[百姓懼怕火不敢上山]]，因此[[摩西重申十誡]]時特別提醒自己曾站在耶和華與百姓中間傳達話語（v5），確立中保地位。\n\
  \n### 十誡重申：核心倫理與禮儀並重（v6-21）\n本章將西乃山十誡（出20）重述，並加入出埃及救贖動機（v6, 15）。前四誡規範與神關係：[[第一誡：不可有別神]]（v7）、[[第二誡：不可雕刻偶像]]（v8-10）嚴禁偶像崇拜，宣告神的忌邪與慈愛代際原則；第三誡禁妄稱神名（v11）；第四誡守安息日（v12-15）以「出埃及」取代創世記「創造」作為依據，強調救贖恩典是安息的根基。後六誡規範人際關係：孝敬父母（v16）、不可殺人（v17）、姦淫（v18）、偷盜（v19）、作假見證（v20）、[[第十誡：不可貪圖]]（v21）將貪念內在化為罪。\n\
  \n```mermaid\nmindmap\n  root((十誡結構 v6-21))\n    \"神人關係 (v7-15)\"\n      \"第一誡：獨一真神\"\
  \n      \"第二誡：禁偶像\"\n      \"第三誡：尊聖名\"\n      \"第四誡：守安息日（出埃及動機）\"\n    \"人際關係 (v16-21)\"\
  \n      \"第五誡：孝敬父母\"\n      \"第六誡：不可殺人\"\n      \"第七誡：不可姦淫\"\n      \"第八誡：不可偷盜\"\
  \n      \"第九誡：不可作假見證\"\n      \"第十誡：不可貪圖（內心）\"\n```\n\n### 百姓懼怕求中保，神悅納其心（v22-33）\n\
  神將誡命寫於兩塊石版（v22），百姓見火焰燒山、聽見聲音，懼怕死亡（v23-26），請求摩西作中保：「求你近前去……將他對你說的話都傳給我們，我們就聽從遵行」（v27）。耶和華應允並讚賞：「他們所說的都是。惟願他們存這樣的心敬畏我，常遵守我的一切誡命」（v28-29），這正是[[神願百姓存敬畏心謹守遵行]]的核心神學。隨後神吩咐百姓回帳棚，摩西留下領受律例典章（v30-31），並以[[摩西吩咐謹守遵行不偏左右]]作結（v32-33），強調順服帶來生命、福樂與長久居住應許之地。\n\
  \n> [!important] 本章樞紐\n> **「惟願他們存這樣的心敬畏我，常遵守我的一切誡命，使他們和他們的子孫永遠得福。」**（v29）  \n> 此節揭示律法賜予的目的：非外在律法主義，乃是內心敬畏與代際福樂的關鍵。\n\
  \n> [!note] 與出埃及記 20 章比較\n> - **安息日理由**：出20:11 本於創造（六日創造、第七日安息）；申5:15 本於救贖（曾在埃及作奴僕，神大能手領出）。\n\
  > - **第十誡措辭**：出20:17 「不可貪戀人的房屋……妻子」；申5:21 將「妻子」提前，並加入「田地」，反映進入迦南產業分配的現實需求。"
