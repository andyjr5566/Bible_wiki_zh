book: 申命記
chapter: 5
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 申5:1 摩西召集全以色列宣讀律例典章，要求「聽、學習、謹守遵行」；v5,27-31 摩西站在耶和華和百姓中間作中保，代百姓聽受神的話並轉達，也代神將其餘「誡命、律例、典章」教訓百姓。GT（精讀本）指出摩西的三重吩咐「聽、學習、謹守遵行」是「對於所有屬神、信從祂之人的最佳勸告」。
  relation: 本章是摩西中保角色最完整的自述——他既是傳話者（v5）也是教師（v31），為申命記後續6-26章的律法詳述立下權柄基礎。
- title: 何烈山
  path: link_folder/地點/何烈山.md
  summary: 申5:2「耶和華我們的神在何烈山與我們立約」；v4「耶和華在山上，從火中，面對面與你們說話」。CT指出「何烈山」即西乃山，是神頒賜十誡之處。
  relation: 本章何烈山是十誡全文首次完整覆述的地點，與第4章「有聲無形」的立約回顧前後呼應，構成申命記開篇兩章共同的立約現場敘事。
- title: 百姓懼怕神的顯現
  path: link_folder/事件/百姓懼怕神的顯現.md
  summary: 申5:22-27記載百姓在何烈山經歷「火焰燒山」、「從黑暗中出來的聲音」（v23），首領長老前來對摩西說：「看哪，耶和華我們神將他的榮光和他的大能顯給我們看……今日我們得見神與人說話，人還存活。現在這大火將要燒滅我們，我們何必冒死呢？……求你近前去，聽耶和華我們神所要說的一切話……我們就聽從遵行」（v24-27）。
  relation: 與出20:18-19為同一歷史事件的申命記回顧版，本章補上百姓完整的自白言詞（v24-27）與神其後的回應（v28-29），是全書中對「中保職分因何設立」記載最詳盡的一段。
- title: 申5：6-21
  path: link_folder/互文/申5：6-21.md
  summary: v6-21十誡全文第二次頒佈，經文與出二十1-17基本相同。差異有二：(1) 安息日理由由出20:11「創造」改為v15「你也要記念你在埃及地作過奴僕……因此，耶和華你的神吩咐你守安息日」，即「救贖」；(2) v21次序為「不可貪戀人的妻子；也不可貪圖人的房屋」，妻子列房屋之前，且動詞與出20:17不同——艾基斯《舊約聖經難題彙編》：申命記用tit'awweh取代出埃及記的tahmod，兩者意思相同，只是申命記使風格更和諧一致。
  relation: 本章是這組互文關係的「申命記端」——首次在申命記正文中完整呈現與出埃及記平行的十誡經文，補齊此互文條目原僅有出埃及記單邊記錄的缺口。
- title: 十誡
  path: link_folder/神學/十誡.md
  summary: 申5:6-21十誡在何烈山之約的脈絡下第二次頒佈給即將進迦南的新一代。精讀本（GT）指出：「本文是為了重複說明十誡的導文」，並將十誡的性質歸納為「神完全的救贖與審判的誡命、律法，同時也是慈愛之約」。
  relation: 與出埃及記20章、34章、利未記19章累積並列，本章代表十誡在「摩西臨終前對新一代的重申」場景，強調的是「教育與傳承」而非首次頒布的震撼場面。
- title: 十誡的條分法
  path: link_folder/神學/十誡的條分法.md
  summary: 申5:21「不可貪戀人的妻子；也不可貪圖人的房屋、田地、僕婢、牛、驢」，妻子列於房屋之前，次序與出20:17（房屋在先）不同；且用了不同動詞。艾基斯《舊約聖經難題彙編》解釋：「在申命記五21，『房屋』之前也用了一個與出埃及記不同的動詞『妄想』（即tit'awweh取代tahmod)。不過，這兩個動詞的意思完全相同，原因只不過是作者希望使申命記的風格比出埃及記二十17……更和諧一致罷了。」
  relation: 本章提供了條分法爭論之外的另一項文本差異證據——用字與次序的調動不影響教訓本身，艾基斯指出這反映申命記作為「摩西五經最後一卷具有教導性目的之書」的文風特色。
- title: 西乃之約
  path: link_folder/神學/西乃之約.md
  summary: 申5:2-3「耶和華我們的神在何烈山與我們立約。這約不是與我們列祖立的，乃是與我們今日在這裡存活之人立的」。精讀本（GT）指出：「此次神是親自與已具備國家規模的整個以色列民族立了約……聖約的內容與本質沒有差別。」啟導本（CT）解釋：此約「不因當日在場的人現已不在而失效……對現在存活之人繼續有效，完全適用」。
  relation: 本章對西乃之約的貢獻在於「代際適用性」的神學闡釋——約不因立約當事人的世代交替而失效，而是每一代都被算作立約的一方，為申命記全書向新一代重申律法的合法性提供神學基礎。
- title: 面對面見神
  path: link_folder/神學/面對面見神.md
  summary: 申5:4「耶和華在山上，從火中，面對面與你們說話」。精讀本（GT）指出：「面對面與你們說話：意指正如人與朋友面對面說話一樣，神也如此親密地將律法曉諭給以色列人。然而，這並不意味著摩西或百姓們曾親眼見過神的容顏，他們只是看見了神的榮耀。」
  relation: 與出33:11「面對面說話卻不得見神的面」的張力一致——本章「面對面」指的是話語的直接與親密，而非視覺上的容顏顯現，補充了此節點在西乃啟示脈絡下的具體案例。
- title: 中保
  path: link_folder/神學/中保.md
  summary: 申5:5「那時我站在耶和華和你們中間，要將耶和華的話傳給你們」；v27百姓求「近前去，聽……將他對你說的話都傳給我們」；v31神應允「至於你，可以站在我這裡，我要將一切誡命、律例、典章傳給你；你要教訓他們」。精讀本（GT）指出：「這仲裁者的原理在舊約時代人是不可缺的，預表了新約時代神人之間的惟一中保耶穌基督的事工（提前2:5；來8:5,6）。」
  relation: 本章是摩西中保職分「因何設立」的完整敘事——不同於出24、32章的行動場景，這裡記載的是百姓親口請求（v27）與神親口應允（v28-31）的對話過程，補上中保職分建立的法源依據。
- title: 除了我以外你不可有別的神
  path: link_folder/神學/除了我以外你不可有別的神.md
  summary: 申5:7「除了我以外，你不可有別的神」，第一誡在申命記的重述，文字與出20:3相同。
  relation: 本章未添加新的詮釋材料，僅確認此誡在十誡重申中的位置不變。
- title: 不可為自己雕刻偶像
  path: link_folder/神學/不可為自己雕刻偶像.md
  summary: 申5:8-9「不可為自己雕刻偶像，也不可做什麼形像……不可跪拜那些像，也不可事奉他」，第二誡重述，文字與出20:4-5基本相同。
  relation: 本章的第二誡與第4章15-19節對「有聲無形」的擴充說明前後呼應——第4章已就此誡命作最詳盡的神學論證，本章則回到十誡原文的簡潔表述。
- title: 忌邪的神
  path: link_folder/神學/忌邪的神.md
  summary: 申5:9「因為我耶和華你的神是忌邪的神」，與出20:5b文字相同。
  relation: 呼應第4章24節「耶和華你的神乃是烈火，是忌邪的神」，本章與第4章共同構成申命記對神忌邪屬性的雙重強調。
- title: 追討罪自父及子直到三四代
  path: link_folder/神學/追討罪自父及子直到三四代.md
  summary: 申5:9「恨我的，我必追討他的罪，自父及子，直到三、四代」，與出20:5c文字相同。啟導本（CT）解釋：「這話似乎與『兒子必不擔當父親的罪孽』（結十八20）相抵觸……按照常理，兒女和子孫難免受到父母、祖父母的連累，譬如疾病的遺傳、家境的貧困、觀念的傳遞、行為的模仿等，都會令子孫受到不良影響。」
  relation: 本章重申此警告時未添加新材料，CT的解釋補充了「非直接刑罰、乃自然連帶影響」的詮釋角度，可與既有累積的以西結十八章個人責任原則並列參考。
- title: 發慈愛直到千代
  path: link_folder/神學/發慈愛直到千代.md
  summary: 申5:10「愛我、守我誡命的，我必向他們發慈愛，直到千代」，與出20:6文字相同。啟導本（CT）指出：「從9~10節看來，愛神所引起正面積極的影響，遠超過恨神所引起負面消極的影響；真正愛神、守神誡命的人，自然也會關心自己兒孫向著神的情況。」
  relation: 本章與追討之罪並列重申，CT特別點出「千代恩典」與「三四代追討」兩者力度懸殊，彰顯神慈愛遠勝審判的比例。
- title: 不可妄稱耶和華你神的名
  path: link_folder/神學/不可妄稱耶和華你神的名.md
  summary: 申5:11「不可妄稱耶和華你神的名；因為妄稱耶和華名的，耶和華必不以他為無罪」，第三誡重述，文字與出20:7基本相同。
  relation: 本章未添加新的詮釋材料。
- title: 當記念安息日守為聖日
  path: link_folder/神學/當記念安息日守為聖日.md
  summary: 申5:12-15「當照耶和華你神所吩咐的守安息日為聖日……你也要記念你在埃及地作過奴僕；耶和華你神用大能的手和伸出來的膀臂將你從那裡領出來。因此，耶和華你的神吩咐你守安息日。」KC明確指出本章與出埃及記的關鍵差異：「在出埃及記二十章，守安息日的動機是耶和華在六日內造了天地，然後安息（出20:11），而這裡的動機是神成就了一項救贖之工（v15）……最後五條誡命在此明確地以『和』字連接，這在出埃及記二十章是沒有的。」精讀本（GT）補充：「若說出埃及記是側重了安息日的創造性意義，本書則是強調了安息日的救贖史性意義……本書早已啟示了舊約時代的守聖安息日演變為今日的新約聖徒為了紀念的復活與救恩而聖守主日的原理。」啟導本（CT）也指出：「守安息日這條誡命具有兩種根據：(1)第一個根據是神的創造事工的完工；(2)第二個根據是神的救贖事工的完成（參申五15）。」
  relation: 本章是此節點跨書卷累積中唯一提供「救贖式安息日」神學基礎的段落，與出20:11的「創造式安息日」形成申命記與出埃及記的經典對比案例，三家來源（KC/GT/CT）一致確認此差異，是本章最重要的神學亮點。
- title: 當孝敬父母
  path: link_folder/神學/當孝敬父母.md
  summary: 申5:16「當照耶和華你神所吩咐的孝敬父母，使你得福，並使你的日子在耶和華你神所賜你的地上得以長久」，第五誡重述，文字與出20:12基本相同（微幅擴寫應許語句）。啟導本（CT）指出：「『使你得福』這是十誡中唯一可得福分的應許」；「本誡命中父母並提，《利未記》十九3原文且先提母親後提父親……孝敬父母不可有輕重偏頗，養育之恩來自父母雙方。」
  relation: 呼應既有累積利未記19:3「孝敬父母作為聖潔生活起點」的記載，CT在本章補充「父母並提次序」的跨卷比較材料。
