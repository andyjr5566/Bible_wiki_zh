"updates":
- "title": "何烈山"
  "path": "link_folder/地點/何烈山.md"
  "summary": "申5章記載耶和華在何烈山與以色列人立約(5:2)，從火中面對面說話(5:4)，摩西站在中間傳話(5:5)。何烈山即西乃山，是神頒賜十誡、立約之地，以色列人在此住了一年左右。神在何烈山從火中面對面說話，百姓懼怕火未上山，摩西作中保傳話。"
  "relation": "本章十誡頒賜的地理背景；何烈山立約是申命記十誡復述的歷史根基；摩西作中保預表基督中保事工"
- "title": "埃及地"
  "path": "link_folder/地點/埃及地.md"
  "summary": "申5:6,15記載耶和華將以色列從埃及地為奴之家領出來(5:6)，並以此為守安息日理由：紀念在埃及作奴僕、神用大能手伸出膀臂領出來(5:15)。出埃及救贖是十誡頒賜的神學基礎，也是守安息日的救贖史理由。"
  "relation": "十誡序言的救贖背景；出埃及救贖是律法頒賜的神學根基，也是安息日誡命的救贖史理由；顯示律法建立在恩典救贖之上"
