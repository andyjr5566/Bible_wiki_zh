- title: 不可貪戀
  path: link_folder/神學/不可貪戀.md
  summary: 申5:21「不可貪戀人的妻子；也不可貪圖人的房屋、田地、僕婢、牛、驢，並他一切所有的」，第十誡重述。與出20:17相比，次序將「妻子」移至「房屋」之前，且改用不同動詞——艾基斯：申命記用tit'awweh取代出埃及記的tahmod，意思相同，僅為文風考量。
  relation: 此節點的次序差異正是[[十誡的條分法]]所討論的文本現象之一，兩節點互為參照；艾基斯的解釋確立這只是文風調整，不影響誡命實質。
