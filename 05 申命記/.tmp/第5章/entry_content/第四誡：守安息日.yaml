  summary: 第12-15節詳細規定安息日的聖別、禁止作工範圍，並以神大能救贖為守安息日的動機。
  relation: 體現神作為創造主與救贖主的雙重身分，連結何烈山立約與神願百姓存敬畏心謹守遵行的主題。
