name: 第二誡：不可雕刻偶像
type: 神學
secondary_types: []
aliases:
- 不可雕刻偶像
- 禁止偶像崇拜
status: formal
definition: 申命記第5章第8-10節記載，耶和華禁止為自己雕刻偶像，也不可做上天、下地、地底下水中百物的形像，不可跪拜事奉。因為耶和華是忌邪的神，恨他的必追討罪到三四代，愛他守誡命的必發慈愛到千代。此誡命規範敬拜的方式，拒絕以有形形象代表無形的神。
development: 此誡命承接第一誡，從「崇拜對象」延伸至「崇拜方式」。在古近東以偶像代表神明的普遍文化中，此誡命徹底斷絕了以可見之物代表不可見之神的企圖，強調神的屬靈性、超越性與忌邪屬性，並將後果延伸至世代。
accumulations:
- book: 申命記
  chapter: 5
  summary: 摩西重申十誡，第二誡禁止雕刻偶像與形像崇拜，宣告神的忌邪與慈愛世代。
  relation: 緊隨第一誡之後，具體規範敬拜形式，防止以色列人效法列國用偶像事奉耶和華，維護神的榮耀與聖潔。
