name: 第一誡：不可有別神
type: 神學
secondary_types: []
aliases:
- 不可有別神
status: formal
definition: 申命記第5章第7節記載，耶和華吩咐以色列人：「除了我以外，你不可有別的神。」這是十誡之首，確立耶和華作為唯一真神的獨佔性地位，要求以色列人絕對的忠誠與單一崇拜，禁止任何形式的多神崇拜或將其他神明置於耶和華之旁。
development: 此誡命在申命記5章的語境中，緊隨著出埃及的救贖歷史序言（第6節）之後，強調救贖主耶和華要求被救贖之民的專一回應。這不僅是禁止外邦神明，更是奠定以色列作為聖潔子民、單單歸屬耶和華的立約基礎。
accumulations:
- book: 申命記
  chapter: 5
  summary: 摩西重申十誡，第一誡禁止有別神，確立耶和華獨一的神性與立約關係。
  relation: 本章十誡之首，建立在出埃及救贖（第6節）與何烈山立約（第2-3節）之上，為後續誡命的神學基礎。
