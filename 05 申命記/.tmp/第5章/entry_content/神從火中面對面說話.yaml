name: 神從火中面對面說話
type: 事件
secondary_types: []
aliases:
- 神面對面說話
- 何烈山神說話
status: formal
definition: 申命記 5:4-5, 22-24 記載耶和華在何烈山上從火中、雲中、幽暗中，大聲向以色列全會眾面對面說話。摩西站在神與百姓中間傳達神的話，因百姓懼怕火不敢上山。這事件確立了十誡的神聖來源與立約的歷史實在性。
development: 第 4 節總結神從火中面對面說話；第 5 節補充摩西作中保角色；第 22-24 節由百姓首領長老回顧當時場景，見證神的榮光大能與聲音從火中出來，人仍能存活。
accumulations:
- book: 申命記
  chapter: 5
  summary: 第 4-5, 22-24 節記載神在何烈山從火中面對面向全會眾說話，摩西作中保，百姓親眼看見神的榮光並聽見聲音。
  relation: 此事件為十誡頒布的歷史基礎，證明約詞出自神親自啟示，非摩西自造，奠定後續誡命權威。
