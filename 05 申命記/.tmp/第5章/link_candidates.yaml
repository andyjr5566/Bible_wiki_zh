book: 申命記
chapter: 5
candidates:
  # 人物（既有）
  - name: 摩西
    type: 人物
    evidence: v1 摩西將以色列眾人召了來，對他們說；v5,27,28,31 摩西作神與百姓之間的中保，站在耶和華和百姓中間傳話
  # 地點（既有）
  - name: 何烈山
    type: 地點
    evidence: v2 耶和華我們的神在何烈山與我們立約；v4 耶和華在山上，從火中，面對面與你們說話
  # 事件（既有）
  - name: 百姓懼怕神的顯現
    type: 事件
    evidence: v23-27 那時，火焰燒山，你們聽見從黑暗中出來的聲音；你們支派中所有的首領和長老都來就近我，說：看哪……現在這大火將要燒滅我們，我們何必冒死呢？求你近前去，聽耶和華我們神所要說的一切話……我們就聽從遵行——與出20:18-19為平行事件的申命記版本，篇幅更詳盡
  # 互文（既有）
  - name: 申5：6-21
    type: 互文
    evidence: v6-21 十誡全文重複記載，與出二十1-17基本相同，主要差異在安息日理由（v15 以出埃及救贖為基礎，出20:11以創造為基礎）與v21貪戀誡命的次序（妻子先於房屋）
  # 神學（既有）
  - name: 十誡
    type: 神學
    evidence: v6-21 十誡全文在此重複記載
  - name: 十誡的條分法
    type: 神學
    evidence: v21 「不可貪戀人的妻子；也不可貪圖人的房屋、田地」——妻子列於房屋之前，且用了與出20:17不同的動詞（原文 tit'awweh 取代 tahmod），艾基斯《舊約聖經難題彙編》就此討論申命記版本與出埃及記版本用字次序差異的原因
  - name: 西乃之約
    type: 神學
    evidence: v2-3 耶和華我們的神在何烈山與我們立約。這約不是與我們列祖立的，乃是與我們今日在這裡存活之人立的——強調立約對象是「活著的一代」而非已故列祖
  - name: 面對面見神
    type: 神學
    evidence: v4 耶和華在山上，從火中，面對面與你們說話
    surfaces: [面對面]
  - name: 中保
    type: 神學
    evidence: v5 那時我站在耶和華和你們中間，要將耶和華的話傳給你們；v27 求你近前去，聽耶和華我們神所要說的一切話，將他對你說的話都傳給我們；v31 至於你，可以站在我這裡，我要將一切誡命、律例、典章傳給你；你要教訓他們
  - name: 除了我以外你不可有別的神
    type: 神學
    evidence: v7 除了我以外，你不可有別的神
  - name: 不可為自己雕刻偶像
    type: 神學
    evidence: v8-9 不可為自己雕刻偶像，也不可做什麼形像……不可跪拜那些像，也不可事奉他
  - name: 忌邪的神
    type: 神學
    evidence: v9 因為我耶和華你的神是忌邪的神
  - name: 追討罪自父及子直到三四代
    type: 神學
    evidence: v9 恨我的，我必追討他的罪，自父及子，直到三、四代
  - name: 發慈愛直到千代
    type: 神學
    evidence: v10 愛我、守我誡命的，我必向他們發慈愛，直到千代
  - name: 不可妄稱耶和華你神的名
    type: 神學
    evidence: v11 不可妄稱耶和華你神的名；因為妄稱耶和華名的，耶和華必不以他為無罪
  - name: 當記念安息日守為聖日
    type: 神學
    evidence: v12-15 當照耶和華你神所吩咐的守安息日為聖日……你也要記念你在埃及地作過奴僕；耶和華你神用大能的手和伸出來的膀臂將你從那裡領出來。因此，耶和華你的神吩咐你守安息日——本章安息日理由改為出埃及救贖，與出20:11以創造為基礎不同
    surfaces: [守安息日為聖日]
  - name: 當孝敬父母
    type: 神學
    evidence: v16 當照耶和華你神所吩咐的孝敬父母，使你得福，並使你的日子在耶和華你神所賜你的地上得以長久
    surfaces: [孝敬父母]
  - name: 不可殺人
    type: 神學
    evidence: v17 不可殺人
  - name: 不可姦淫
    type: 神學
    evidence: v18 不可姦淫
  - name: 不可偷盜
    type: 神學
    evidence: v19 不可偷盜
  - name: 不可作假見證陷害人
    type: 神學
    evidence: v20 不可作假見證陷害人
  - name: 不可貪戀
    type: 神學
    evidence: v21 不可貪戀人的妻子；也不可貪圖人的房屋、田地、僕婢、牛、驢，並他一切所有的
  # 神學（新建）
  - name: 惟願他們存這樣的心敬畏我
    type: 神學
    evidence: v29 惟願他們存這樣的心敬畏我，常遵守我的一切誡命，使他們和他們的子孫永遠得福——神在百姓正確回應（求摩西代言）後表達的心願，盼望敬畏不只是一時的懼怕反應，而是恆常的心志
  - name: 不可偏離左右
    type: 神學
    evidence: v32 所以，你們要照耶和華你們神所吩咐的謹守遵行，不可偏離左右——申命記反覆出現的順服慣用語（另見十七11,20；二十八14），標誌完全依從律法、不憑己意增減方向
