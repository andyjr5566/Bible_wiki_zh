name: 不可沾染當毀滅之物（潔淨自己）
type: 神學
secondary_types: []
aliases:
- 潔淨自己
- 不可取當毀滅之物
status: formal
definition: 申命記 13 章 17 節命令：「那當毀滅的物連一點都不可粘你的手。」此指叛教之城被焚燒的財物（v.16）屬於「哈列姆」（Herem，當毀滅/分別為聖之物），不可私自取用。百姓必須潔淨自己，不沾染背道之物，好叫耶和華轉意不發烈怒，恩待、憐恤百姓，使人數增多。這強調審判的徹底性與聖潔群體不可與被咒詛之物有染。
development: 此原則見於耶利哥城毀滅（書 6:17-19）與亞干犯罪（書 7 章）。新約應用於信徒與不法配搭的分離（哥林多後書 6:14-17「你們要從他們中間出來，與他們分別，不要沾不潔淨的物」)。屬靈爭戰中須拒絕屬靈背道的果子與利益。
accumulations:
- book: 申命記
  chapter: 13
  summary: 經文 17 節禁止沾染叛教之城當毀滅之物（財物），應許順服者神必轉怒為喜，憐恤加增。
  relation: 本章神學應用，為「叛教之城必被毀滅」事件設定事後潔淨界限，連結「聽從耶和華的話得蒙憐恤」的條件性應許。
