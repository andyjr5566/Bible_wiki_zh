name: 至親勸誘事奉別神（至親勸誘）
type: 解經爭議
secondary_types: []
aliases:
- 至親勸誘
- 至親勸誘事奉別神
status: formal
definition: 申命記 13 章 6-11 節規定：若同胞弟兄、兒女、懷中的妻、如同性命的朋友暗中引誘你去事奉素來不認識的別神，不可依從、聽從，眼不可顧惜，不可憐恤、遮庇，總要殺他，由被引誘者先下手，然後眾民下手，用石頭打死。因為他想勾引人離開領他們出埃及的耶和華。以色列眾人聽見都要害怕，不敢再行這惡。
development: 此段將「至親」納入嚴懲對象，顯示對耶和華的忠誠超越最親密的人倫關係（參馬太福音 10:37）。「暗中引誘」與「公開勸誘」同罪，強調內心忠誠的純粹性。石刑由受試者先動手，象徵個人對約的責任優先於情感。
accumulations:
- book: 申命記
  chapter: 13
  summary: 經文 6-11 節列舉至親關係範圍、引誘方式（暗中）、應對原則（不寬容、先下手）、刑罰細節（石頭打死）與威懾目的。
  relation: 本章第二解經爭議單元，探討親情與信仰忠誠的衝突優先序。
