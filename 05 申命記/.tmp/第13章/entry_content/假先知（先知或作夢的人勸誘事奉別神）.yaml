name: 假先知（先知或作夢的人勸誘事奉別神）
type: 解經爭議
secondary_types: []
aliases:
- 假先知
- 先知或作夢的人勸誘事奉別神
status: formal
definition: 申命記 13 章 1-5 節描述「假先知」的情況：若你們中間有先知或作夢的起來，向你顯神蹟奇事，並勸誘你去隨從、事奉素來不認識的別神，即使神蹟奇事應驗，也不可聽從。經文指出這是耶和華試驗百姓，看他們是否盡心盡性愛神。該先知或作夢之人因用言語叛逆救贖他們的耶和華，勾引百姓離開神所吩咐的道，必須被治死，以便從民中除掉惡。
development: 本段確立了驗證先知真偽的標準不在於神蹟奇事的應驗，而在於教導內容是否忠於耶和華的啟示。這成為舊約後續先知書（如耶利米書 23、28 章）及新約（馬太福音
  7:21-23，帖撒羅尼迦後書 2:9-10）辨別假先知的神學基礎。
accumulations:
- book: 申命記
  chapter: 13
  summary: 經文 1-5 節定義假先知的特徵（行神蹟、勸事奉別神）、測試目的（試驗愛心）、審判方式（治死除惡）。
  relation: 本章核心解經爭議段落，確立「神蹟非真理絕對標準」的原則。
