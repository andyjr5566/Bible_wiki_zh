name: 不可敬拜別神（專心敬拜耶和華）
type: 神學
secondary_types: []
aliases:
- 專心敬拜耶和華
- 不可事奉別神
status: formal
definition: 申命記 13 章 3-4, 6, 8 節反覆強調：面對假先知、至親、匪類的勸誘，核心誡命是「不可聽從」、「不可依從」，要「順從耶和華」、「敬畏他」、「謹守誡命」、「聽從他的話」、「事奉他」、「專靠他」。第
  3 節指出試驗目的是要知道百姓是否「盡心盡性愛耶和華」。這確立了獨一敬拜（Monolatry/Monotheism）為約的核心，任何勸誘事奉別神的行為皆屬叛逆。
development: 此神學主題貫穿申命記（6:4-5, 13-14），成為以色列立國根基。先知書常以「靈姦」形容拜偶像（何西阿書 1-3 章）。新約繼承此原則（哥林多前世
  8:4-6, 10:14, 21），視拜偶像為與鬼交往。
accumulations:
- book: 申命記
  chapter: 13
  summary: 經文 3-4, 6, 8 節以正面（順從、敬畏、專靠）與負面（不聽、不依、不顧惜）雙重命令，確立專心敬拜耶和華為應對一切勸誘的唯一標準。
  relation: 本章神學核心，貫串三類勸誘情境（先知、至親、匪類），為審判惡人提供神學依據。
