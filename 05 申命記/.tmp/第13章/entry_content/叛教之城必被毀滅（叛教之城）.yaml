name: 叛教之城必被毀滅（叛教之城）
type: 事件
secondary_types: []
aliases:
- 叛教之城
- 城邑背道毀滅
status: formal
definition: 申命記 13 章 12-16 節記載「叛教之城」的審判事件：經查證屬實後，必須用刀殺盡城中居民與牲畜，將所奪財物堆積街市，用火將城與財物在耶和華面前燒盡，城永為荒堆，不可再建造。這屬於「當毀滅之物」（Herem/哈列姆）的獻祭式毀滅，表示整座城因集體背道而被分別為聖歸給神的忿怒，不留餘燼。
development: 此律法在約書亞記 7 亞干犯罪、士師記 20 便雅憫人基比亞事件中有類似適用。歷史上猶太傳統認為此律法從未實際執行過（Sanhedrin
  71a），因條件極嚴（需大多數居民被誘、經大公會判決）。神學上預表最終審判（啟示錄 18 巴比倫傾覆）。
accumulations:
- book: 申命記
  chapter: 13
  summary: 經文 12-16 節描述叛教之城從查證、定罪、殺盡居民牲畜、焚燒財物城池、永不重建的完整審判事件流程。
  relation: 本章事件類條目，對應「惡人勸誘全城事奉別神」的調查確認後，具體執行「惡人必被除滅」與「不可沾染當毀滅之物」的群體性審判。
