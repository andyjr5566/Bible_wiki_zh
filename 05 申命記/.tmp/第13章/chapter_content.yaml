organization: '### 假先知與神蹟的試驗（v1-5）

  經文開啟三層勸誘場景的第一層：[[假先知（先知或作夢的人勸誘事奉別神）|先知或作夢者]]雖能行神蹟奇事並應驗，卻勸誘百姓去事奉「素來所不認識的別神」。這不是能力的試驗，而是耶和華為了「知道你們是盡心盡性愛耶和華─你們的神不是」（v3）而許可的測試。核心原則在於
  [[不可敬拜別神（專心敬拜耶和華）|專一敬拜耶和華]] 超越一切神蹟顯現；違背此誡者屬叛逆，必須 [[惡人必被除滅（清除惡人）|治死]]，將惡從民中除掉。


  ### 至親勸誘的零容忍（v6-11）

  第二層場景轉向最隱密、情感綁定最深的[[至親勸誘事奉別神（至親勸誘）|至親勸誘]]：同胞弟兄、兒女、懷中妻、性命之友「暗中引誘」。經文以七個否定命令構嚴密防線：不可依從、聽從、顧惜、憐恤、遮庇，總要殺他，且由被勸誘者先下手，眾民隨後。這體現
  [[親屬勸誘也不得寬容（至親不得寬容）|血緣情誼不得干擾公義]]，石頭打死的公開處決旨在使「以色列眾人都要聽見害怕」，建立威懾。


  ### 叛教之城的聖戰審判（v12-18）

  第三層擴大至社會系統性背道：[[惡人勸誘全城事奉別神（叛教之城）|匪類]]勸誘全城居民事奉別神。程序上要求「探聽、查究、細細地訪問」（v14），確認屬實後執行
  [[叛教之城必被毀滅（叛教之城）|全然毀滅]]（Herem）：居民與牲畜盡殺，財物堆積街市連同城池焚燬，永為荒堆不再重建。執行者手不可沾 [[不可沾染當毀滅之物（潔淨自己）|當毀滅之物]]，唯有徹底順服、行耶和華眼中看為正的事，耶和華才「轉意，不發烈怒，恩待你，憐恤你」，應驗
  [[聽從耶和華的話得蒙憐恤（順服得福）|順服得福]] 的約言應許。


  ### 跨章脈絡：獨一敬拜與共同體純潔

  本章以同心結構揭示申命記神學核心：從個人領袖、核心家庭、至整座城市，三層滲透路徑皆指向同一威脅——「事奉別神」。神蹟非真理試金石，唯有「盡心盡性愛耶和華」才是。審判嚴厲度隨影響力擴大而升級（個人死刑→家庭石刑→城市焚毀），彰顯聖約共同體純潔的不可妥協性，預表新約教會治理中「清除舊酵」（林前5）與辨別異端（約壹4:1）的屬靈原則。'
