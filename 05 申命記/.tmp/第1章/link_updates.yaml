"book": "申命記"
"chapter": !!int "1"
"updates":
- "title": "何烈山"
  "path": "link_folder/地點/何烈山.md"
  "summary": "申1章指出從何烈山經西珥山到加低斯巴尼亞有十一天路程(1:2)，耶和華在何烈山曉諭以色列人「你們在這山上住的日子夠了」(1:6)，並從何烈山起行往亞摩利人山地去(1:19)。何烈山即西乃山，是神頒佈十誡、立約之地，以色列人在此住了一年左右。"
  "relation": "本章地理與時間起點；十一天路程卻走四十年，凸顯不信的代價"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "申1章記載以色列人從何烈山起行，經大而可怕的曠野，到了加低斯巴尼亞(1:19)。在此打發十二探子窺探迦南(1:22-24)，百姓拒絕進地、發怨言(1:26-27)，神起誓這惡世代不得見美地(1:34-35)，百姓擅自上山被亞摩利人擊敗直到何珥瑪(1:44)，於是在加低斯住了許多日子(1:46)。"
  "relation": "本章核心地理舞台；信心抉擇分水嶺，探子惡報、百姓拒絕進地、神審判四十年漂流皆發生於此"
- "title": "亞摩利王西宏"
  "path": "link_folder/人物/亞摩利王西宏.md"
  "summary": "申1:4記載摩西擊殺了住希實本的亞摩利王西宏。這發生在摩西講律法之前，是以色列人在約但河東首次重大軍事勝利，證明神已開始將地賜給他們。"
  "relation": "本章時間背景的關鍵事件；擊敗西宏和噩是神應許賜地的初步實現，為百姓進迦南建立信心基礎"
- "title": "巴珊王噩"
  "path": "link_folder/人物/巴珊王噩.md"
  "summary": "申1:4記載摩西擊殺了住以得來、亞斯她錄的巴珊王噩。與擊敗西宏並列，是以色列人在約但河東的第二次重大勝利，佔領了巴珊地區。"
  "relation": "本章時間背景的關鍵事件；擊敗西宏和噩雙王，代表神將約但河東地賜給以色列，預表將來征服迦南全地"
- "title": "希實本"
  "path": "link_folder/地點/希實本.md"
  "summary": "申1:4提到「住希實本的亞摩利王西宏」。希實本原是摩押地，後被西宏佔據為首都。以色列擊敗西宏後佔領此地，成為流便支派和迦得支派的產業之一。"
  "relation": "西宏的首都，擊敗西宏後成為以色列產業一部分；地理上位於約但河東，是進入迦南前的重要據點"
- "title": "以得來"
  "path": "link_folder/地點/以得來.md"
  "summary": "申1:4提到「住以得來、亞斯她錄的巴珊王噩」。以得來是巴珊王噩的首都之一，位於巴珊地區。以色列擊敗噩後佔領此地。"
  "relation": "噩的首都之一，擊敗噩後成為以色列產業；標示約但河東征服範圍的北部邊界"
- "title": "摩押地"
  "path": "link_folder/地點/摩押地.md"
  "summary": "申1:1,5記載摩西在約但河東的摩押地、疏弗對面的亞拉巴，向以色列眾人講律法。這是以色列人進入迦南前最後的安營地，也是申命記全書講述的地點。出埃及第四十年十一月初一日在此開始講解律法。"
  "relation": "本章及全書的地理背景；申命記在此頒布，是曠野漂流結束、進迦南前最後預備的場所"
- "title": "迦勒"
  "path": "link_folder/人物/迦勒.md"
  "summary": "申1:36記載神起誓：「惟有耶孚尼的兒子迦勒必得看見，並且我要將他所踏過的地賜給他和他的子孫，因為他專心跟從我」。在十二探子中，迦勒與約書亞獨持信心報告，不隨眾發怨言，成為專心跟從耶和華的典範。"
  "relation": "本章信心與不信的鮮明對比；迦勒專心跟從神，得以進入美地並得產業，預表屬靈爭戰中忠心者的獎賞"
- "title": "約書亞"
  "path": "link_folder/人物/約書亞.md"
  "summary": "申1:38記載「伺候你、嫩的兒子約書亞，他必得進入那地；你要勉勵他，因為他要使以色列人承受那地為業」。約書亞是摩西的伺候者，因百姓不信，摩西不得進地，約書亞接替帶領以色列人進迦南得地為業。"
  "relation": "摩西的繼任者；因百姓不信，摩西不得進地，約書亞蒙神揀選接續帶領百姓得地，體現神計劃不因人的失敗而落空"
- "title": "亞摩利人"
  "path": "link_folder/人物/亞摩利人.md"
  "summary": "申1章多次提到亞摩利人：神吩咐起行往亞摩利人的山地(1:7,19-20)；百姓怨言說神要將他們交在亞摩利人手中除滅(1:27)；擅自上山時亞摩利人出來攻擊，如蜂擁般追趕直到何珥瑪(1:44)。亞摩利人是迦南地主要居民之一，住在山地。"
  "relation": "本章主要對手族群；神應許賜地的對象、百姓恐懼的對象、最終擊敗以色列人的執行者；代表迦南地需征服的敵人"
- "title": "西珥山"
  "path": "link_folder/地點/西珥山.md"
  "summary": "申1:2記載「從何烈山經過西珥山到加低斯巴尼亞有十一天的路程」；1:44記載亞摩利人追趕以色列人「在西珥殺退你們，直到何珥瑪」。西珥山是以東地的邊緣山區，以色列人繞過此地(申2:4)。"
  "relation": "地理路標；十一天路程的中途點，也是以色列人被擊敗追趕的路線；代表以東地區邊界"
- "title": "巴蘭的曠野"
  "path": "link_folder/地點/巴蘭的曠野.md"
  "summary": "申1:1提到摩西在「巴蘭、陀弗、拉班、哈洗錄、底撒哈中間」向以色列人說話。這裡的巴蘭是指亞拉巴範圍內的地名，非南地以南的巴蘭曠野(民12:16)。巴蘭意為「充滿洞穴的地方」。"
  "relation": "本章講律法的地理背景之一；區別於巴蘭曠野，此處巴蘭是約但河谷地帶的地名"
- "title": "哈洗錄"
  "path": "link_folder/地點/哈洗錄.md"
  "summary": "申1:1列在摩西講律法的地理範圍內：「巴蘭、陀弗、拉班、哈洗錄、底撒哈中間」。哈洗錄意為「駐紮」，確切地點不詳，與民12:16的哈洗錄(米利暗被關押處)同名不同地。"
  "relation": "本章講律法地點的地理標記之一；同名不同地，需與民數記哈洗錄區分"
- "title": "何珥瑪"
  "path": "link_folder/地點/何珥瑪.md"
  "summary": "申1:44記載亞摩利人追趕擅自上山的以色列人，「在西珥殺退你們，直到何珥瑪」。何珥瑪意為「毀滅」或「被毀之地」，是以色列人不聽神命擅自進攻、被亞摩利人擊敗追殺的終點(民14:45)。"
  "relation": "不信與悖逆的後果地標；百姓拒絕神命令、擅自行動導致慘敗的地點，見證「神不在你們中間」的嚴重後果"
- "title": "伯拉大河"
  "path": "link_folder/地點/伯拉大河.md"
  "summary": "申1:7記載神應許賜給以色列的地界：「並利巴嫩山又到伯拉大河」。伯拉大河即幼發拉底河，是神對亞伯拉罕所立之約(創15:18)中應許之地的北界。"
  "relation": "神應許之地的北界標記；從亞拉巴、山地、高原、南地直到伯拉大河，顯示應許之地的廣闊範圍"
- "title": "南地"
  "path": "link_folder/地點/南地.md"
  "summary": "申1:7列在神應許賜給以色列的地界中：「就是亞拉巴、山地、高原、南地」。南地即尼革夫，是迦南地南部乾旱地區，後來屬猶大支派產業(書15:21)。"
  "relation": "應許之地南部邊界組成部分；顯示神應許之地的完整範圍，從南地北至伯拉大河"
- "title": "安密巴"
  "path": "link_folder/地點/安密巴.md"
  "summary": "申1:24記載十二探子「上山地去，到以實各谷，窺探那地」。以實各谷位於希伯崙附近，即創14:7的安密巴(意為「審判的泉」)，也是加低斯巴尼亞的舊名。探子在此窺探並帶回葡萄證實是美地。"
  "relation": "十二探子窺探迦南的具體地點；帶回果子證實神應許是真，成為百姓信心抉擇的見證地"
