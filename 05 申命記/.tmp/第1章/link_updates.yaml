book: 申命記
chapter: 1
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出埃及第四十年十一月初一日，摩西在約但河東摩押地向以色列眾人講律法（1:1-5），回顧從何烈山至加低斯的行程、立首領、探子事件與神的審判；因百姓的緣故耶和華也向他發怒，說你必不得進入那地（1:37）。
  relation: 全章是摩西臨終告別講章的開端，以上一代的失敗史警戒將進迦南的新世代信服神的話。
- title: 亞摩利王西宏
  path: link_folder/人物/亞摩利王西宏.md
  summary: 摩西講律法之前，已經擊殺了住希實本的亞摩利王西宏（1:4）。
  relation: 精讀本：先論二王被打敗才講律法，表明神聖約的信實——任何勢力都不能攔阻神引領選民進入應許之地。
- title: 巴珊王噩
  path: link_folder/人物/巴珊王噩.md
  summary: 與西宏並列：已擊殺住以得來、亞斯她錄的巴珊王噩（1:4）。
  relation: 得勝二王是神為以色列爭戰的直接證據，成為本章「不要懼怕」勸勉的根據。
- title: 迦勒
  path: link_folder/人物/迦勒.md
  summary: 惟有耶孚尼的兒子迦勒必得看見美地，神要將他所踏過的地賜給他和子孫，因為他專心跟從耶和華（1:36）。
  relation: 在惡世代全被剪除的判決中作例外，是本章信心與眼見對比的正面見證；KC：「迦勒名意『全心』，他深知耶和華的喜悅，深深珍賞神的產業。」
- title: 約書亞
  path: link_folder/人物/約書亞.md
  summary: 伺候摩西的嫩的兒子約書亞必得進入那地；神吩咐摩西勉勵他，因他要使以色列人承受那地為業（1:38）。
  relation: 摩西不得進入（1:37）與約書亞被指定接續並列，構成本章領袖交棒的伏筆。
- title: 亞衲族人（Anaqim）
  path: link_folder/原文/亞衲族人（Anaqim）.md
  summary: 探子的報告使百姓心消化：那地的民又大又高、城邑廣大堅固高得頂天，「並且我們在那裡看見亞衲族的人」（1:28）。
  relation: 亞衲族巨人是眼見壓倒信心的具體符號；啟導本：考古所見城牆實高僅10至15公尺，「高得頂天」確是過甚其詞。
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 應許之地是耶和華向列祖亞伯拉罕、以撒、雅各起誓應許賜給他們和後裔為業之地（1:8）；百姓多如天上的星，應驗對亞伯拉罕的應許（1:10；創15:5）。
  relation: 起誓應許是本章「進去得地」命令的法理根據——地不是憑己力賺得，乃是承受應許。
- title: 以撒
  path: link_folder/人物/以撒.md
  summary: 列祖起誓應許的對象之一（1:8）。
  relation: 與亞伯拉罕、雅各並列，見證應許跨世代的延續。
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 列祖起誓應許的對象之一（1:8）。
  relation: 三代並提，強調神的信實不因人的世代更替而改變。
- title: 亞摩利人
  path: link_folder/人物/亞摩利人.md
  summary: 神吩咐往亞摩利人的山地去（1:7,19-20）；百姓怨言說神要把他們交在亞摩利人手中除滅（1:27）；擅自上去後被亞摩利人如蜂擁追趕，在西珥殺退直到何珥瑪（1:44）。
  relation: 從「應許要得之地的居民」變成「審判的工具」，前後對照顯出順服與悖逆的分別結局。
- title: 迦南人
  path: link_folder/人物/迦南人.md
  summary: 神命起行所列疆界包括「沿海一帶迦南人的地」（1:7）。
  relation: 應許地範圍的組成部分，指迦南地北部沿海地區（CT）。
- title: 何烈山
  path: link_folder/地點/何烈山.md
  summary: 耶和華在何烈山曉諭「你們在這山上住的日子夠了」（1:6）；從何烈山經西珥山到加低斯巴尼亞十一天路程（1:2）；「我們照著耶和華所吩咐的從何烈山起行」（1:19）。
  relation: 本章回顧的起點；KC：摩西述說行程不從埃及而從何烈山開始——以色列族是在西乃山下與神立約後才成形的。
- title: 加低斯
  path: link_folder/地點/加低斯.md
  summary: 從何烈山十一天路程到加低斯巴尼亞（1:2,19）；探子事件與悖逆都發生於此；「於是你們在加低斯住了許多日子」（1:46）。
  relation: CT：加低斯乃是原出發點——不服神命令的結局，乃是原地踏步。
- title: 西珥山
  path: link_folder/地點/西珥山.md
  summary: 從何烈山經過西珥山到加低斯巴尼亞（1:2）；擅自上山的百姓在西珥被殺退（1:44）。
  relation: 行程的地標，也成了戰敗之地；串珠：以東人所住的山地。
- title: 希實本
  path: link_folder/地點/希實本.md
  summary: 亞摩利王西宏的都城（1:4）。
  relation: 啟導本：亞摩利人首邑，距死海北部東岸約20公里。
- title: 以得來
  path: link_folder/地點/以得來.md
  summary: 巴珊王噩所住之地之一（1:4）。
  relation: 啟導本：或為離宮所在，位於加利利海東岸45公里處。
- title: 摩押地
  path: link_folder/地點/摩押地.md
  summary: 摩西在約但河東的摩押地講律法（1:5）。
  relation: CT：摩押地即指亞拉巴的中南部；申命記全書講章的地理舞台。
- title: 何珥瑪
  path: link_folder/地點/何珥瑪.md
  summary: 擅自上山地的百姓被亞摩利人追趕，「在西珥殺退你們，直到何珥瑪」（1:44）。
  relation: CT：何珥瑪是雙關語——原本可得「庇護」的地名，轉為「完全毀滅」的所在。
- title: 伯拉大河
  path: link_folder/地點/伯拉大河.md
  summary: 應許地疆界的北限：「並利巴嫩山又到伯拉大河」（1:7）。
  relation: GT：即幼發拉底河；本節疆界與神應許亞伯拉罕的範圍相符（創15:18）。
- title: 南地
  path: link_folder/地點/南地.md
  summary: 神命起行所列地區之一（1:7）。
  relation: BH：Negev，別是巴以南的乾旱地，南方商道的門戶。
- title: 海（紅海）
  path: link_folder/地點/海（紅海）.md
  summary: 神命惡世代轉回「從紅海的路往曠野去」（1:40）。
  relation: 啟導本：原文蘆葦海，此處指阿卡巴灣方向；轉回紅海之路，象徵沒有信心的人退回曠野起點。
- title: 耶和華曉諭摩西差遣探子
  path: link_folder/事件/耶和華曉諭摩西差遣探子.md
  summary: 申1 補充視角：是百姓就近摩西說「我們要先打發人去窺探那地」（1:22），摩西以為美，才從中選了十二個人，每支派一人（1:23）。
  relation: 精讀本：民13 記神命差派，申1 顯明起因是百姓的要求——神允准了多疑百姓所求；兩處互補，顯出差探子出於不信而非出於神的本意。
- title: 全會眾哭號發怨言
  path: link_folder/事件/全會眾哭號發怨言.md
  summary: 申1 回顧：百姓不肯上去，在帳棚內發怨言說「耶和華因為恨我們，所以將我們從埃及地領出來，要交在亞摩利人手中，除滅我們」（1:26-27）。
  relation: 摩西以此史事警戒新世代；控告神「恨我們」與神「如同人撫養兒子」（1:31）成最尖銳的對照。
- title: 百姓擅自上山被擊敗
  path: link_folder/事件/百姓擅自上山被擊敗.md
  summary: 申1 回顧：百姓口稱「我們得罪了耶和華」卻各帶兵器爭先上山，違背「不要上去」的命令，被亞摩利人如蜂擁追趕，從西珥殺退直到何珥瑪；回來在耶和華面前哭號，祂卻不聽（1:41-45）。
  relation: 精讀本：認罪只在口頭、行動仍按己意——與法老、掃羅、猶大的空言認罪同列（出9:27；撒上15:24；太27:3-4）。
- title: 摩西立首領
  path: link_folder/事件/摩西立首領.md
  summary: 申1 補充出18 視角：摩西向百姓說明重任獨自擔當不起（1:9-12），吩咐各支派選舉有智慧、有見識、為眾人所認識的人，立為千夫長、百夫長、五十夫長、十夫長（1:13-15），並囑咐審判官按公義判斷（1:16-17）。
  relation: CT：出18 未載會眾贊同的經過，申1 補明「你們回答我說：照你所說的行了為妙」（1:14）——各支派舉薦、摩西任命，二者並行。
- title: 耶和華的爭戰
  path: link_folder/神學/耶和華的爭戰.md
  summary: 「在你們前面行的耶和華你們的神必為你們爭戰，正如他在埃及和曠野，在你們眼前所行的一樣」（1:30）。
  relation: 摩西以出埃及與曠野的史實作信靠的證據駁斥懼怕；與擅自上山時「我不在你們中間」的慘敗（1:42-44）互為反證。
- title: 雲柱火柱
  path: link_folder/歷史/雲柱火柱.md
  summary: 「他在路上，在你們前面行，為你們找安營的地方；夜間在火柱裡，日間在雲柱裡，指示你們所當行的路」（1:33）。
  relation: KC：百姓要打發探子先行，摩西提醒——耶和華自己一直作他們前面的探路者；人的窺探與神的引路成對照。
- title: 公義審判
  path: link_folder/神學/公義審判.md
  summary: 摩西囑咐審判官：聽訟無論是弟兄彼此爭訟或與同居的外人爭訟，都要按公義判斷；審判不可看外貌、不可分貴賤、不可懼怕人（1:16-17）。
  relation: 精讀本：與利19:15 同一原則——平等精神與神本公義思想的結合，是摩西律法與外邦法典的明確區別。
- title: 敬畏神、誠實、恨不義之財
  path: link_folder/神學/敬畏神、誠實、恨不義之財.md
  summary: 申1 補充首領資格的另一半：「有智慧、有見識、為眾人所認識的」（1:13,15）。
  relation: 啟導本：與出18:21 的敬畏神、誠實無妄、恨不義之財合為六條件——前三者屬道德，後三者屬智慧與知識（參提前3:1-13）。
- title: 信心與眼見
  path: link_folder/神學/信心與眼見.md
  summary: 申1 的完整案例鏈：求窺探＝憑眼見（1:22）→惡報使心消化（1:28）→「你們在這事上卻不信耶和華你們的神」（1:32）→惡世代不得見美地（1:35）。
  relation: CT 靈訓要義：窺探表徵眼見，眼見使人失去信心；惟迦勒、約書亞憑信得進——「若憑信心看就不會懼怕」。
