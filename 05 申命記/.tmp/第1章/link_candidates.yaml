  - name: "以色列人不信拒絕進地"
    type: "事件"
    evidence: |
      經文：申1:26-33。百姓不肯上去，違背耶和華命令，在帳棚內發怨言說耶和華恨他們，要交在亞摩利人手中除滅。摩西勸說不要驚恐，耶和華必為你們爭戰，如在埃及和曠野所行的一樣，又如人撫養兒子一般撫養你們。但你們不信耶和華。
      ccbiblestudy CT：回來後發怨言惹怒了神(26~33節)，百姓不肯上去，違背命令，發怨言說神恨他們。
      ccbiblestudy GT：百姓不信，拒絕進地，發怨言惹神怒氣。
      KingComments：百姓不肯上去，違背命令，發怨言說神恨他們。摩西提醒神在埃及和曠野的作為，如撫養兒子般照顧，但百姓不信。
      BibleHub Study：百姓不肯上去，違背命令，發怨言。摩西勸說神必為他們爭戰，如撫養兒子般照顧，但百姓不信。
    surfaces:
      - "不信拒絕進地"
      - "發怨言"
      - "不信耶和華"

  - name: "神起誓惡世代不得見美地"
    type: "事件"
    evidence: |
      經文：申1:34-40。耶和華聽見發怒，起誓說這惡世代的人連一個也不得見應許賜給列祖的美地；惟有迦勒必得看見，並將他所踏過的地賜給他和子孫，因他專心跟從。耶和華也向摩西發怒，說摩西必不得進入那地；嫩的兒子約書亞必得進入，要勉勵他。婦人孩子和不知善惡的兒女必進入得地為業。
      ccbiblestudy CT：神命以色列人轉回曠野(34~40節)，起誓這惡世代連一個也不得見美地，惟迦勒和約書亞例外。
      ccbiblestudy GT：神起誓這惡世代不得見美地，只有迦勒和約書亞能進去。
      KingComments：神起誓這惡世代不得見美地，只有迦勒和約書亞例外。摩西也因百姓緣故不得進地。這是屬靈功課：不信使人失去產業。
      BibleHub Study：神起誓這惡世代不得見美地，只有迦勒和約書亞例外。摩西也因百姓緣故不得進地。
    surfaces:
      - "神起誓惡世代不得見美地"
      - "迦勒專心跟從"
      - "約書亞必得進入"

  - name: "以色列人擅自上山被擊敗"
    type: "事件"
    evidence: |
      經文：申1:41-46。百姓承認得罪，情願照命上去爭戰。耶和華吩咐摩西說不要上去，因我不在你們中間，恐怕被仇敵殺敗。      百姓不聽，違背命令擅自上山地。亞摩利人出來攻擊，如蜂擁一般，在西珥殺退他們，直到何珥瑪。百姓在耶和華面前哭號，耶和華不聽，也不側耳。於是你們在加低斯住了許多日子。
      ccbiblestudy CT：不服神命擅自上山地而遭殺敗(41~46節)，亞摩利人如蜂擁般追趕，直到何珥瑪。
      ccbiblestudy GT：百姓不聽神命擅自上山，被亞摩利人擊敗，如蜂擁般追趕到何珥瑪。
      KingComments：百姓承認得罪，擅自上山爭戰。神說不在你們中間，不要上去。百姓不聽，被亞摩利人如蜂擁般追趕到何珥瑪。哭號無用，神不聽。
      BibleHub Study：百姓承認得罪，擅自上山。神說不在你們中間，不要上去。百姓不聽，被亞摩利人擊敗，追趕到何珥瑪。哭號無用。
    surfaces:
      - "擅自上山被擊敗"
      - "何珥瑪"
      - "亞摩利人擊敗以色列"

