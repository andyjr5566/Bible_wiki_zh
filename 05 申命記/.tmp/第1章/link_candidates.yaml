  - name: "摩西派立官長審判"
    type: "事件"
    evidence: |
      經文：申1:9-18。摩西因百姓太多，獨自擔當不起，按支派選立有智慧、有見識、為眾人所認識的為首領、千夫長、百夫長、五十夫長、十夫長。囑咐審判官按公義判斷，不看外貌，不分貴賤，不懼怕人，因審判屬乎神。
      ccbiblestudy CT：摩西指派各級官長審判案件(9~18節)，這是從出埃及記18章葉忒羅建議演變而來的制度。
      ccbiblestudy GT：摩西設立審判制度，分級管理，體現公義原則。
      KingComments：摩西無法獨自承擔百姓的重擔，設立千夫長、百夫長等分級管理。審判屬乎神，不可看人外貌、分貴賤、懼怕人。
      BibleHub Study：摩西設立分級審判制度，從千夫長到十夫長，強調公義審判、不偏不倚。
    surfaces:
      - "摩西派立官長"
      - "摩西設立審判制度"
      - "千夫長、百夫長、五十夫長、十夫長"

  - name: "十二探子窺探迦南"
    type: "事件"
    evidence: |
      經文：申1:19-25。從何烈山起行，經過大而可怕的曠野，到加低斯巴尼亞。百姓請求打發人窺探，摩西以為美，選十二個人，每支派一人。他們上山地到以實各谷窺探，拿果子回報說是美地。
      ccbiblestudy CT：又派十二探子窺探迦南地(19~25節)，探子到以實各谷，帶回果子報告是美地。
      ccbiblestudy GT：十二探子窺探迦南，帶回果子證實是美地。
      KingComments：百姓請求打發人窺探，摩西選十二人，每支派一人。他們到以實各谷，帶回果子報告是美地。
      BibleHub Study：百姓請求窺探，摩西選十二人，每支派一人。他們上山地到以實各谷，帶回果子報告是美地。
    surfaces:
