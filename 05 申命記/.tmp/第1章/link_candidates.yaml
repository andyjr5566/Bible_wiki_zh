book: "申命記"
chapter: 1
candidates:
  - name: "摩西在摩押地講律法"
    type: "事件"
    evidence: |
      經文：申1:1-5。摩西在約但河東的摩押地，向以色列眾人講述耶和華所吩咐的話。這是申命記全書的開端背景：出埃及第四十年十一月初一日，摩西擊殺西宏和噩後，在摩押地開始講解律法。
      ccbiblestudy CT：申命記第一章回顧曠野飄流史(一)，簡述從西乃山至加低斯巴尼亞(1~8節)，摩西指派各級官長審判案件(9~18節)。
      ccbiblestudy GT：摩西在約但河東的曠野向以色列眾人所說的話，這是申命記的歷史背景。
      KingComments：這本書包含摩西所說的話(1節)，完全照耶和華的旨意(3節)，摩西加以闡述(5節)。這使整本書成為神直接權威的說話。
      BibleHub Study：摩西在約但河東的曠野、疏弗對面的亞拉巴向以色列眾人所說的話。出埃及第四十年十一月初一日，摩西照耶和華藉著他所吩咐以色列人的話都曉諭他們。
    surfaces:
      - "摩西在摩押地講律法"
      - "摩西講律法"

  - name: "何烈山"
    type: "地點"
    evidence: |
      經文：申1:2, 6, 19。「從何烈山經過西珥山到加低斯巴尼亞有十一天的路程」(v2)；「耶和華我們的神在何烈山曉諭我們說：你們在這山上住的日子夠了」(v6)；「我們照著耶和華我們神所吩咐的從何烈山起行」(v19)。
      ccbiblestudy CT：何烈山指整條山脈，是磐石出水的地方(出17:6)，其中一峰稱西乃山，就是神的山(出3:1)，是神頒佈十誡以及建造會幕的樣式之處(出24:12; 31:18)。
      ccbiblestudy GT：何烈山即西乃山，神頒佈十誡之地。
      KingComments：旅程本可十一天完成(何烈山到加低斯巴尼亞)，因不信卻花了四十年。何烈山即西乃山，百姓在那裡住了一年左右。
      BibleHub Study：何烈山是神向以色列人說話、頒佈律法之地。
    surfaces:
      - "何烈山"
      - "西乃山"

  - name: "加低斯巴尼亞"
    type: "地點"
    evidence: |
      經文：申1:2, 19, 46。「從何烈山經過西珥山到加低斯巴尼亞有十一天的路程」(v2)；「到了加低斯巴尼亞」(v19)；「於是你們在加低斯住了許多日子」(v46)。
      ccbiblestudy CT：加低斯巴尼亞位於西珥山的西面，是尋的曠野中一處地方，簡稱加低斯，與迦南地的「南地」接壤，摩西從這裡打發十二探子(民13:26; 33:36)。
      ccbiblestudy GT：加低斯巴尼亞是以色列人進入迦南前的關鍵地點。
      KingComments：加低斯巴尼亞是迦南南部入口，摩西從這裡打發十二探子窺探。
      BibleHub Study：加低斯巴尼亞位於西珥山西面，是尋的曠野中一處地方，摩西從這裡打發十二探子。
    surfaces:
      - "加低斯巴尼亞"
      - "加低斯"

  - name: "西宏"
    type: "人物"
    evidence: |
      經文：申1:4。「那時，他已經擊殺了住希實本的亞摩利王西宏」。
      ccbiblestudy CT：西宏是住希實本的亞摩利王，被以色列人擊殺(民21:21-32)。
      ccbiblestudy GT：西宏是亞摩利王，首都希實本，被以色列擊敗。
      KingComments：西宏是亞摩利王，統治約但河東南部曠野地區。以色列擊敗西宏和噩是屬靈爭戰的預表。
      BibleHub Study：西宏是住希實本的亞摩利王，被以色列人擊殺。
    surfaces:
      - "西宏"

