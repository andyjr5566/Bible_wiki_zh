definition: 申命記1:4提到巴珊王噩住在以得來、亞斯她錄，屬巴珊地區的重要城邑。
development: 亞斯她錄為巴珊王噩的都城之一，後在約書亞記與士師記再被提及。
accumulations:
- book: 申命記
  chapter: 1
  summary: 記載巴珊王噩的居住地包括亞斯她錄。
  relation: 標示以色列人擊敗巴珊王噩前的地理背景。
