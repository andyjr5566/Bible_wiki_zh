status: formal
definition: 亞斯她錄（希伯來文：עַשְׁתָּרוֹת，Ashtaroth）為巴珊王噩的都城之一，位於約但河東巴珊地區（今敘利亞南部/約旦北部）。本章第
  4 節記載摩西擊殺「住以得來、亞斯她錄的巴珊王噩」，標誌以色列在約但河東首次大勝，佔有巴珊地。
development: 從征服希實本亞摩利王西宏，延伸至巴珊亞斯她錄，顯示神賜給以色列約但河東全地。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西擊殺住以得來、亞斯她錄的巴珊王噩（1:4）。
  relation: 約但河東征服戰役的關鍵據點，證實神應許開始應驗。
