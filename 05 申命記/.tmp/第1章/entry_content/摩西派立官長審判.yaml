name: 摩西派立官長審判
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 申命記1:9-18記載摩西因獨自擔當審判重任而按支派選立有智慧、有見識的首領作官長、千夫長、百夫長、五十夫長、十夫長，並囑咐他們按公義審判。
development: 此為以色列社會司法制度的雛形，強調審判屬乎神、不可看人外貌。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西設立多層級審判官體系，分擔治理重擔。
  relation: 體現神對公義治理的要求，預表後來以色列的司法架構。
