status: formal
definition: 申命記第1章記載摩西在約但河東摩押地向以色列眾人講述耶和華所吩咐的律法（申1:1-5）。
development: 此事件為摩西在進入迦南前最後的教導，奠定後續律法重述的基礎。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西在摩押地向百姓講律法，回顧出埃及至今的歷程。
  relation: 確立摩西作為中保傳遞神旨意的角色，開啟申命記全書的教導架構。
