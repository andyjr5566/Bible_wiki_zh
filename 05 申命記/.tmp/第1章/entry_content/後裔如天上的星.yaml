definition: 申命記 1:10-11 記載摩西提醒百姓「你們今日像天上的星那樣多」，並祝福「使你們比如今更多千倍」。此意象源自創世記 15:5、22:17，象徵亞伯拉罕、以撒、雅各後裔極其繁多，並預表神應許的實現。
