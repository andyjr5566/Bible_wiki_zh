name: 十一天的路程與三十八年飄流
type: 主題
secondary_types: []
aliases:
- 十一天的路程與三十八年飄流
status: formal
definition: 本章第 2 節括號註記：「從何烈山經過西珥山到加低斯巴尼亞有十一天的路程」，與第 3 節「第四十年」形成強烈對比：本該十一天的旅程，因百姓不信悖逆（1:26-33），延長為三十八年曠野飄流（參民
  14:33-34）。此主題貫穿申命記，警戒後世「今日若聽他話，就不可硬著心」（來 3:7-11）。
development: 路程與年日的張力，揭示「不信」的代價與「順服」的捷徑。
accumulations:
- book: 申命記
  chapter: 1
  summary: 十一天路程（1:2）對比第四十年仍在曠野（1:3），隱含三十八年飄流。
  relation: 核心神學主題：悖逆使應許延遲，順服使應許加速。
