definition: 申命記1:41-44記載百姓認罪後擅自帶兵器上山地，違背神命令，被亞摩利人如蜂擁攻擊，追殺至何珥瑪。
development: 顯示未得神同在的爭戰必致失敗。
accumulations:
- book: 申命記
