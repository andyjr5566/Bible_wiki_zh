name: 神起誓惡世代不得見美地
type: 事件
secondary_types: []
aliases:
- 神起誓惡世代不得見美地
status: formal
definition: 本章第 34-35 節記載耶和華聽見百姓發怨言、不信，發怒起誓：「這惡世代的人，連一個也不得見我起誓應許賜給你們列祖的美地」。此為神對出埃及第一代（除迦勒、約書亞外）的審判宣告，導致三十八年曠野漂流，直到該世代死盡。
development: 此誓言將「十一天路程」延長為「三十八年飄流」，成為申命記神學核心：悖逆招致審判，順服蒙福。
accumulations:
- book: 申命記
  chapter: 1
  summary: 耶和華因百姓不信發怒起誓，惡世代不得見美地（1:34-35）。
  relation: 曠野漂流神學轉折點，直接關聯「專心跟從耶和華」的迦勒得福。
