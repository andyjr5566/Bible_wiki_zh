name: 神起誓惡世代不得見美地
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 申命記1:34-35記載耶和華聽見百姓怨言，發怒起誓：這惡世代連一個也不得見應許之美地，唯有迦勒與約書亞例外。
development: 此誓言確立曠野四十年漂流的神學依據。
accumulations:
- book: 申命記
  chapter: 1
  summary: 神因百姓不信起誓，惡世代不得進入迦南。
  relation: 體現神的公義與信實，同時保留迦勒、約書亞的應許。
