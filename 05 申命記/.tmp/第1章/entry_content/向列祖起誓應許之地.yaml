definition: 申命記 1:8 宣告「耶和華向你們列祖亞伯拉罕、以撒、雅各起誓應許賜給他們和他們後裔為業之地」。此處強調神以起誓方式確立迦南地為產業，彰顯約的不可更改性，並成為後續進取迦南的神學基礎。
