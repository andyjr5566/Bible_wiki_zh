status: formal
definition: 申命記 1:39 提到「今日不知善惡的兒女」，指尚未具備道德辨別能力的幼童。神應許將迦南地賜給他們，顯示神的恩典不以人的功德為轉移，也預表神如父撫養兒子的憐憫（參
  1:31）。
