name: 神如父撫養兒子
type: 神學
secondary_types: []
aliases:
- 神如父撫養兒子
status: formal
definition: 本章第 31 節摩西勉勵百姓：「你們在曠野所行的路上，也曾見耶和華─你們的神撫養你們，如同人撫養兒子一般」。希伯來文「撫養」（נָשָׂא，nasa）含「背負、扶持、寬容」意。此意象揭示神與以色列的父子關係（參何
  11:1-3），在曠野四十年飄流中，神供應嗎哪、水、衣服不舊、腳不腫（申 8:2-4），彰顯父愛的忍耐與信實。
development: 父子關係為申命記立約框架基礎，順服源於愛，非懼怕。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西見證神在曠野如父撫養兒子（1:31）。
  relation: 曠野恩典的神學總結，支撐「專心跟從耶和華」的動力。
