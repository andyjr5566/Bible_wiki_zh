definition: 希伯來文動詞 בָּאַר (ba'ar) 原意「挖掘、說明、使明瞭」。申命記 1:5 「摩西在約但河東的摩押地講律法說」，指摩西詳細闡釋、解釋耶和華的律法，使百姓明白遵行。
