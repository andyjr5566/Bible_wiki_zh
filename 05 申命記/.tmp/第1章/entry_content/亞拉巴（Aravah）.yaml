name: 亞拉巴（Aravah）
type: 地點
secondary_types: []
aliases:
- 亞拉巴
status: formal
definition: 亞拉巴（希伯來文：עֲרָבָה，Aravah）意指「乾燥地、荒漠、平原」，特指約但河谷與死海一帶的低窪地帶。本章第 1 節記載摩西在「約但河東的曠野、疏弗對面的亞拉巴」向以色列眾人說話；第
  7 節神應許賜給以色列的地界包含「亞拉巴」。地理上屬大裂谷南段，氣候乾熱，為以色列進入迦南前的重要地標。
development: 本章以地理定點開啟摩西遺言，強調曠野漂流結束、進入應許之地的臨界點。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西在約但河東亞拉巴向百姓講律法（1:1）；神將亞拉巴列入應許之地疆界（1:7）。
  relation: 作為摩西遺言發佈地與應許地疆界一部分的雙重意義。
