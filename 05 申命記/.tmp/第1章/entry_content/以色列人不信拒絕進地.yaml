definition: 申命記1:26-33記載百姓聽探子報告後不肯上去，違背耶和華命令，在帳棚發怨言，指責神恨他們，心消化不敢進入。
development: 此不信導致神起誓惡世代不得見美地。
accumulations:
- book: 申命記
  chapter: 1
  summary: 百姓因恐懼拒絕進入應許之地，表現出不信。
  relation: 直接觸發神的審判與誓言，成為曠野漂流四十年的原因。
