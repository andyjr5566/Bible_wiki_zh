name: 亞拉巴（Arabah）
type: 地點
secondary_types: []
aliases:
- 亞拉巴
status: formal
definition: 申命記1:1、7提到摩西在約但河東的曠野、疏弗對面的亞拉巴向百姓講話；又列為神應許賜給以色列的地界之一。
development: 亞拉巴指約但河谷及南北延伸的低地帶，為以色列進入迦南的重要地理標記。
accumulations:
- book: 申命記
  chapter: 1
  summary: 記載摩西講律法的地點包括亞拉巴，並列為應許地範圍。
  relation: 標示神應許之地的地理邊界，連結何烈山至迦南的路線。
related_entries:
- 疏弗
- 陀弗
- 底撒哈
- 巴蘭的曠野
- 何烈山
