name: 出埃及第四十年十一月初一日
type: 事件
secondary_types: []
aliases:
- 出埃及第四十年十一月初一日
status: formal
definition: 本章第 3 節明確標示摩西講律法的時間：「出埃及第四十年十一月初一日」。此乃曠野漂流結束、進入迦南前最後階段的時間錨點，距西奈立約約三十八年，距約但河渡河僅數月。
development: 時間標記強調神應許的確定性——雖因悖逆延遲，神的時間表從未改變。
accumulations:
- book: 申命記
  chapter: 1
  summary: 摩西在第四十年十一月初一日照耶和華吩咐曉諭以色列人（1:3）。
  relation: 摩西遺言的歷史定點，連結何烈山之約與摩押之約。
