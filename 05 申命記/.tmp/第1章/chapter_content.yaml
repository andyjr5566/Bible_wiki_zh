organization: '### 講律法的時空背景：約但河東的回顧（v1-8）


  《申命記》開卷五節是全書的「前言」，交代[[摩西]]向以色列眾人「講律法」的時間與地點。地點在[[亞拉巴（Aravah）|亞拉巴]]——約但河東的曠野。《啟導本聖經申命記註釋》說它「指約但河流域從北邊的加利利海到死海南端以迄阿卡巴灣的河谷地帶」。KC（King
  Comments）點出這地形的屬靈意味：他們正站在把百姓與美地隔開的約但河岸邊，而亞拉巴意思是「在平原上」，是「一個無人能藏身、能從那裡清楚看見四圍的地方」。時間則精確到[[出埃及第四十年十一月初一日]]；正如
  BH（BibleHub）所言，這是「摩西臨終告別講論」的日子，約兩個月後百姓便要過河進迦南。


  在講律法之前，經文先追述神已藉以色列的手擊殺了住[[希實本]]的[[亞摩利王西宏]]，和住[[以得來]]、[[亞斯她錄（Ashtaroth）|亞斯她錄]]的[[巴珊王噩]]（v4）。KC
  指出這段回顧是理解摩西下文的屬靈前提：「屬天之地的福分不會向我們顯明，除非我們已經好好地得著了地上的福分。」《舊約背景註釋》（華爾頓）補充亞斯她錄的地理：「今日稱為亞斯他拉遺址（Tell
  ''Ashtarah），位於雅穆克河畔，加利利海東面二十五哩左右之處」，並提醒西宏與噩「都沒有在任何經外文獻中出現」。


  「[[摩押地]]……[[講律法（ba''ar）|講律法]]」的「講」是理解全書性質的關鍵。《聖經精讀本》解釋這希伯來字：「『講』的希伯來語 baar 意指『明確地闡明或講解』」，因此摩西所作的「並不是傳講新的律法，乃是清楚地解析神在從前所賜給他們的律法」；KC
  同樣說摩西是要「竭力使神的話向百姓清楚明白，叫他們正確地領會」。這種「講解舊律法、使之適用於應許之地」的定位，正是本書稱作《申命記》的由來。接著摩西轉述神在[[何烈山]]的命令：「你們在這山上住的日子夠了」，要起行去得那沿海一帶[[迦南人]]之地、直到[[伯拉大河]]的全地——這是[[向列祖起誓應許之地|神向列祖起誓應許]]給[[亞伯拉罕]]、[[以撒]]、[[雅各]]的產業。KC
  有一句常被引用的話：「這地不是他們揀選的，而是為他們揀選的；神為他們揀選了這地，也揀選了他們住在其中。」


  v7 為應許之地勾出輪廓，各家對其中地理用語的認定如下：


  | 用語 | 地理所指 | 出處 |

  | --- | --- | --- |

  | 亞拉巴 | 約但河谷與死海地區 | 《啟導本》 |

  | 山地 | 迦南中部綿延的高山山脈 | 《啟導本》 |

  | 高原（Shephelah） | 山地與非利士地之間的低地丘陵 | 《雷氏研讀本》 |

  | 南地（Negev） | 迦南南疆與沙漠間的貧瘠牧地 | 《雷氏研讀本》 |


  ### 立領袖與公義審判（v9-18）


  摩西接著回顧[[摩西立首領]]的往事。百姓已多如[[後裔如天上的星|天上的星]]（v10）。《聖經精讀本》說「這成就了神在創15:5所賜給亞伯拉罕的應許……當年下到埃及的人數不過是70名，過了四百年後，他們的人口超過了兩百萬」。人多，麻煩與爭訟也多，摩西獨自擔當不起，於是照岳父葉忒羅之議（出18），分層設立官長與審判官。KC
  把這一幕與教會相比：「百姓增多，紛爭也隨之增多，教會也不例外」（徒6:1）。


  領袖的條件，《啟導本》把出18:21與申1:13兩處合列為六項，前三項屬道德、後三項屬智慧：


  | 面向 | 條件（綜合出18:21與申1:13） |

  | --- | --- |

  | 道德 | 敬畏神、誠實無妄、恨不義之財 |

  | 智慧與知識 | 有智慧、有見識、為眾人所認識（有經驗） |


  審判官的職責是「按公義判斷」「不可看人的外貌」「不可懼怕人，因為[[審判是屬乎神的]]」，這是全章一個樞紐（[[公義審判]]），也牽涉敬畏神這領袖的首要德性。KC
  歸納審判官須符四個條件：秉公判斷（無論弟兄或外人）、不徇情面、不畏人的報復（知道自己是奉神說公義）、承認有難斷之案而呈交摩西。《舊約背景註釋》從古代近東角度說：「在大部分其他司法系統中，難斷的案件都是呈交給君王處理，在此的最高裁判則是摩西」，並指出「無論是古代近東典籍或是聖經，都視公正和明察為至重要的美德」。《精讀本》更點出這正是「摩西律法與其它外邦法典的明確區別」——審判的原理是「人本主義的平等精神與神本主義的公義思想」。


  ### 窺探美地、拒絕上去與神的信實（v19-33）


  以色列人從何烈山起行，經過[[大而可怕的曠野]]到了[[加低斯]]（原名又稱安密巴）。《精讀本》形容這曠野「山脈如同被火燒，只有尖岩陡石和荒沙遍滿全地……時常有猛烈的風沙席捲全地」。摩西勉勵百姓上去得地「不要懼怕，也不要驚惶」，但這裡開始顯出[[信心與眼見]]的分野。百姓求先打發人去窺探（[[耶和華曉諭摩西差遣探子]]）。民數記記為神先命令派探子，本章卻記為百姓提出；KC
  與《精讀本》都作了調和——《精讀本》說「是神先命令派遣探子，但這並非出自神的本意，乃是神允許了多疑百姓的要求」，KC 則說「當神看見他們的意已定，就給他們所求的」。探子到以實各谷帶回果子，回報說「是[[美地]]」。KC
  注意到「『美地』（good or fair land）這說法在本書出現十次」。


  然而百姓卻不肯上去，[[全會眾哭號發怨言|在帳棚內發怨言]]說「耶和華因為恨我們」，又因[[亞衲族人（Anaqim）|亞衲族人]]與「高得頂天」的城邑而心消化。摩西以神的作為回應：在他們前面行的神必為他們[[耶和華的爭戰|爭戰]]，又曾在曠野[[神如父撫養兒子|如同人撫養兒子一般撫養他們]]，夜間[[雲柱火柱|在火柱裡，日間在雲柱裡]]指示道路。BH
  說這正是神對「祂恨我們」這控訴的回答：「神以慈父般的溫柔照顧祂的百姓，這回答本該叫他們羞愧。」百姓仍不信——這一整段的不信因果鏈可整理如下：


  ### 惡世代的判決與例外（v34-40）


  耶和華聽見怨言就發怒起誓：這惡世代的人連一個也不得見所應許的美地（v34-35）。判決中有兩個例外與一個牽連：[[迦勒]]因「專心跟從耶和華」必得看見，他所踏過的地要賜給他和子孫（v36）；[[約書亞]]必得進入，摩西要勉勵他，因他要使以色列人承受那地為業（v38）；而耶和華也因百姓的緣故向摩西發怒——「你必不得進入那地」（v37）。CT指出，摩西把相隔近四十年的米利巴事件（民20:11-12）與探子事件放在一起講，要新一代聽眾注意：聽從神的話是信仰的中心。判決同時帶著應許：「今日不知善惡的兒女必進入那地」（v39）——啟導本說明這指道德上無辨別力的孩童，不涉不信之罪。至於惡世代，神命他們轉回，從紅海的路往曠野去（v40）。KC：「因著自己的失敗與不忠，我們往往要花比忠心持守長得多的時間，才承受得了祝福。」


  ### 認罪卻擅自上山：何珥瑪的殺敗（v41-46）


  聽見判決，百姓口稱「我們得罪了耶和華」，卻各人帶著兵器、爭先上山地去（v41）——耶和華明說「不要上去，也不要爭戰；因我不在你們中間」（v42），他們仍不聽從，擅自上去（v43）。結果亞摩利人如蜂擁一般追趕他們，在西珥殺退他們，直到[[何珥瑪]]（v44）。CT指出「何珥瑪」是雙關語：原本可以得到「庇護」的地名，轉成「完全毀滅」的所在。精讀本把這樣的認罪與法老、掃羅、猶大的空言認罪並列——口裡認罪、行動仍按己意，於是「你們便回來，在耶和華面前哭號；耶和華卻不聽你們的聲音」（v45）。本章以「你們在加低斯住了許多日子」收尾（v46）——CT：加低斯乃是原出發點，不服神命令的結局，乃是原地踏步。'
