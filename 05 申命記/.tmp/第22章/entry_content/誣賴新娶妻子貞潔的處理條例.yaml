name: 誣賴新娶妻子貞潔的處理條例
type: 事件
secondary_types: []
aliases:
- 誣賴新娶妻子貞潔的處理條例
status: formal
definition: 申命記 22:13-21 處理丈夫誣賴新娶妻子無貞潔憑據的案件。丈夫若恨惡妻子、信口誣賴，女子父母可將貞潔憑據（初夜血跡布）呈交城門長老，長老懲治丈夫，罰銀一百舍客勒給岳父，妻子終身不可被休。若誣賴屬實，女子因在父家行淫亂，被帶到父家門口用石頭打死。此條例保護婦女名譽與婚姻安全，嚴懲誣告，同時維護社會性純潔。
development: 「貞潔憑據」反映古近東婚姻習俗（參 創 38:25-26）；城門長老審判體現社區司法公開化；刑罰對等——誣告者受罰金與終身不得休妻，犯淫者被處死，顯示「淨除你們中間的惡」（v.21）的神學動機。
accumulations:
- book: 申命記
  chapter: 22
  summary: 丈夫誣賴妻子無貞潔憑據，岳父呈證據至長老，誣告者罰銀一百舍客勒且終身不可休妻；若屬實女子被石頭打死。
  relation: 本章婚姻性倫理段落首案，確立保護婦女權益與淨除社區惡行的雙重目標。
