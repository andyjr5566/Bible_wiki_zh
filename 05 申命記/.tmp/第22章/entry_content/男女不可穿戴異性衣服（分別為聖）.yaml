name: 男女不可穿戴異性衣服（分別為聖）
type: 神學
secondary_types: []
aliases:
- 男女不可穿戴異性衣服
status: formal
definition: 申命記 22:5 禁止婦女穿戴男子所穿戴的，男子也不可穿婦女的衣服，稱這樣行都是耶和華神所憎惡的。此條例維護神創造秩序中性別的分別（創 1:27），防止模糊性別界限導致的混淆與悖逆，體現「分別為聖」原則在日常生活細節上的應用。
development: 此禁令不僅關乎外在裝扮，更關乎身分認同與創造秩序的尊重，違背者被視為「可憎」（to'evah），與偶像崇拜、性悖逆同列（參 申 7:25-26；利
  18:22）。
accumulations:
- book: 申命記
  chapter: 22
  summary: 禁止男女互穿異性衣服，稱此為耶和華神所憎惡。
  relation: 本章「分別為聖」段落的首條，確立性別界限在穿著上的具體表現。
