name: 拾獲迷途牲畜歸還原主（愛鄰舍如己）
type: 神學
secondary_types: []
aliases:
- 拾獲迷途牲畜歸還原主
status: formal
definition: 申命記 22:1-4 規定，若看見弟兄的牛、羊、驢或任何失物迷路或跌倒，不可佯為不見，必須主動牽回歸還或幫助拉起。這條例將「愛鄰舍如己」（利
  19:18）具體化為對鄰舍財產的積極保護責任，強調不可漠視他人的損失，體現盟約群體中彼此看顧的倫理義務。
development: 此條例從單一牲畜擴及一切失物（v.3），並從歸還延伸至救助跌倒牲畜（v.4），顯示保護鄰舍產業的原則具有普遍性與延伸性。
accumulations:
- book: 申命記
  chapter: 22
  summary: 規定拾獲迷途牲畜與失物必須歸還原主，看見跌倒牲畜必須幫助拉起，不可佯為不見。
  relation: 本章開啟「愛鄰舍」實踐段落，確立對鄰舍財產與安全的積極保護責任。
related_entries:
- 建造房屋要在房上四圍安置欄杆（生命安全）
- 遇見鳥窩不可連母帶雛一併取去（愛護動物）
