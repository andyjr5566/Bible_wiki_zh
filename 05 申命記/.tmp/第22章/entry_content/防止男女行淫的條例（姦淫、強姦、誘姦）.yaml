name: 防止男女行淫的條例（姦淫、強姦、誘姦）
type: 事件
secondary_types: []
aliases:
- 防止男女行淫的條例
status: formal
definition: 申命記 22:22-30 綜合處理四種性犯罪情境：(1) 已婚婦人與人行淫，姦夫淫婦同死（v.22）；(2) 城內許配處女被誘姦，因未呼救，男女同死（v.23-24）；(3)
  田野許配處女被強姦，僅男子死，女子無罪（v.25-27）；(4) 未許配處女被誘姦/強暴，男子罰銀五十舍客勒給父親，娶女為妻終身不可休（v.28-29）。條例以「淨除你們中間的惡」為核心，區分自願與被迫、城內與田野、許配與未許配，兼顧公義保護與社會淨化。
development: v.30 禁止娶繼母（參 利 18:8；林前 5:1）作為性倫理段落的總結性界石。本段落對「同意」與「環境」的細緻區分，顯示神律法對受害者保護的超前關懷，並預表基督為新婦捨己的潔淨（弗
  5:25-27）。
accumulations:
- book: 申命記
  chapter: 22
  summary: 規定姦淫雙死、城內誘姦雙死、田野強姦僅男死、未許配處女被犯者罰銀娶妻終身不休，並禁娶繼母。
  relation: 本章性倫理段落高潮，以分案判斷建立公義保護與社區聖潔的完整框架。
