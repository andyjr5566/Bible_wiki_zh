name: 睚珥（瑪拿西的子孫）
type: 人物
secondary_types: []
aliases:
- 睚珥
- 雅伊珥
status: formal
definition: 希伯來文 יָאִיר（Yair），意為「他發光／照耀」。瑪拿西支派的後裔，在以色列人征服巴珊地時，佔領了亞珥歌伯全境（即巴珊王噩國內的利乏音人之地），疆界直達基述人與瑪迦人的交界，並按自己的名將該地命名為「哈倭特睚珥」（睚珥的帳棚/村莊），此名保留至申命記成書之日（申
  3:14）。
development: 睚珥作為瑪拿西子孫的代表人物，在約但河東得地分配中展現族裔擴張的具體行動。其命名行為反映古代近東以人名冠地的習慣，也見證以色列在摩西率領下透過耶和華的爭戰取得應許之地的歷程。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載睚珥佔領亞珥歌伯全境，並以其名命名為哈倭特睚珥，作為瑪拿西半支派在巴珊地產業的一部分。
  relation: 見證耶和華將巴珊地賜給以色列人，並透過瑪拿西子孫睚珥實際佔有與命名，應驗神對列祖的應許。
