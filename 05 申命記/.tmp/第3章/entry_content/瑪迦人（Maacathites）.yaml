name: 瑪迦人（Maacathites）
type: 人物
secondary_types: []
aliases:
- 瑪迦族人
status: formal
definition: 住在巴珊地邊界的族群。本章記載睚珥佔領亞珥歌伯全境，「直到基述人和瑪迦人的交界」（申3:14），顯示瑪迦人與基述人同居巴珊東北邊境。後來以色列未趕出他們（書13:13），大衛時期仍為獨立小國（撒下10:6）。
development: 本章為瑪迦人在聖經中的首次地理定位提及，確立其與基述人並列為巴珊北界的族群。
accumulations:
- book: 申命記
  chapter: 3
  summary: 睚珥佔領亞珥歌伯全境，直到基述人和瑪迦人的交界。
  relation: 本章以瑪迦人作為睚珥所得地界的北界標記，與基述人並列。
