name: 瑪吉（Machir）
type: 人物
secondary_types: []
aliases:
- 瑪吉
- Machir
status: formal
definition: 瑪吉是瑪拿西的長子（創世記 50:23；民數記 26:29），在申命記 3:15 摩西將基列地分給他的後裔（瑪吉的子孫），作為約但河東產業的一部分。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載摩西將基列地賜給瑪吉（及其子孫）為業。
  relation: 確立瑪拿西半支派在約但河東得地的法理基礎，屬二個半支派得地事件的一環。
related_entries:
- 二個半支派得約但河東地
- 征服巴珊王噩
sources:
