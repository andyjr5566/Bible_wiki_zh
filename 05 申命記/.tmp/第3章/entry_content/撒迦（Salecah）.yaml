definition: 巴珊王噩國內的邊界城邑之一，位於巴珊全地的極邊（申3:10），作為以色列奪取巴珊地東南界的地標。
development: 撒迦與以得來並列，標示巴珊王噩國度的邊界範圍，確認以色列征服的完整性。
