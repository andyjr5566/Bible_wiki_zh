name: 睚珥（Jair）
type: 人物
secondary_types: []
aliases:
- 睚珥
- Jair
status: formal
definition: 睚珥是瑪拿西的後裔（民數記 32:41 稱其為瑪拿西的子孫），他在征服巴珊時佔領了亞珥歌伯全境，直到基述人和瑪迦人的交界，並按自己的名將這地稱為哈倭特睚珥（意即「睚珥的帳棚/村莊」），見於申命記
  3:14。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載睚珥佔領亞珥歌伯地，並以其名命名為哈倭特睚珥。
  relation: 展示以色列人在約但河東得地的具體過程，以及瑪拿西半支派如何繼承產業。
related_entries:
- 亞珥歌伯
- 基述人
- 瑪迦人
- 哈倭特睚珥
- 睚珥得亞珥歌伯地
- 二個半支派得約但河東地
