name: 基述人（Geshurites）
type: 人物
secondary_types: []
aliases:
- 基述族人
status: formal
definition: 住在巴珊地邊界的族群。本章記載瑪拿西子孫睚珥佔領亞珥歌伯全境，「直到基述人和瑪迦人的交界」（申3:14），顯示基述人居住於巴珊東北邊境，與以色列人為鄰。後來以色列未趕出他們（書13:13），大衛娶基述王達買的女兒瑪迦為妻（撒下3:3）。
development: 本章為基述人在聖經中的首次地理定位提及，確立其與巴珊地、亞珥歌伯的鄰接關係。
accumulations:
- book: 申命記
  chapter: 3
  summary: 睚珥佔領亞珥歌伯全境，直到基述人和瑪迦人的交界。
  relation: 本章以基述人作為睚珥所得地界的北界標記，顯示其地理位置。
