name: 基述人（Geshurites）
type: 人物
secondary_types: []
aliases:
- 基述人
- 基述居民
status: formal
definition: 居住在巴珊地區北部邊界的族群，睚珥佔領亞珥歌伯全境時，其疆界達到基述人的交界（申3:14）。基述人後來未被以色列趕出，仍住在以色列中（書13:13）。
development: 基述人作為巴珊北鄰族群，其邊界成為以色列得地的標誌之一。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載睚珥佔領亞珥歌伯，疆界直到基述人的交界。
  relation: 本章以基述人交界作為睚珥得地北界的地標。
