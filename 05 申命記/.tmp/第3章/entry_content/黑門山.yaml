name: 黑門山
type: 地點
secondary_types: []
aliases: []
status: formal
definition: 黑門山是以色列人征服約但河東地的北界標誌。經文記載西頓人稱其為西連，亞摩利人稱其為示尼珥。以色列人從亞嫩谷直到黑門山之地都奪過來了，包括平原各城、基列全地、巴珊全地，直到撒迦和以得來。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載黑門山作為征服領土北界的地標，並註記其在不同民族中的名稱（西連、示尼珥），確立以色列人佔領範圍延伸至該山區。
  relation: 本章將黑門山作為約但河東地征服範圍的北端邊界，與亞嫩谷（南界）對應，界定神賜給以色列人的產業疆域。
