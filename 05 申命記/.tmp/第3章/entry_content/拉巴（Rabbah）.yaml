status: formal
definition: 亞捫人的首都拉巴（申3:11），巴珊王噩的鐵床（長九肘、寬四肘）存放於此，作為利乏音人體型巨大的實物見證。
development: 拉巴雖屬亞捫人領地，但保存著巴珊王噩的鐵床，成為利乏音人遺跡的重要考古見證點，佐證申命記對巨人族群的記載。
accumulations:
