name: 征服巴珊王噩
type: 事件
secondary_types:
- 聖戰
aliases:
- 征服巴珊
- 擊敗巴珊王噩
status: formal
definition: 以色列人在摩西率領下，遵照耶和華命令向巴珊進軍，在以得來與巴珊王噩及其眾民交戰。神將噩王、其民與全地交在以色列手中，以色列盡行毀滅，奪取其六十座堅固城邑與無城牆鄉村，並取牲畜財物為掠物，完成對巴珊全境的征服（申3:1-7,
  10-11）。
development: 本事件緊接擊敗希實本王西宏之後，顯示神應許賜給以色列約但河東地的信實；噩王作為利乏音人餘孽，其被滅絕象徵神對迦南地勢力的審判與清除。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載以色列轉向巴珊，神命不懼怕，將噩王交付以色列；以色列擊殺噩王與其民，奪取六十城與鄉村，毀滅人口，取牲畜財物為掠物。
  relation: 本章核心軍事事件，奠定二個半支派得地基礎，並作為後來摩西勉勵約書亞的見證基礎（申3:21-22）。
