name: 基尼烈
type: 地點
secondary_types:
- 水體/城市/平原
aliases:
- 基尼烈海
- 加利利海
status: formal
definition: 指基尼烈湖（即加利利海）或其西北岸平原/城市。以色列產業東界從基尼烈直到亞拉巴海（鹽海），沿約但河東岸分給流便、迦得支派（申3:17）。
development: 作為約但河東地南北向東界的南端標誌，與黑門山（北）、鹽海（南）形成完整邊界框架；新約時期為耶穌事工核心區域。
accumulations:
- book: 申命記
  chapter: 3
  summary: 經文以基尼烈為南界起點，劃定二個半支派產業東界沿約但河至鹽海。
  relation: 與黑門山、鹽海共同定義約但河東地版圖，連結流便、迦得支派產業範圍。
related_entries:
