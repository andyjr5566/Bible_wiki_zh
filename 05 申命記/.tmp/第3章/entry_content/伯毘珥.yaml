name: 伯毘珥
type: 地點
secondary_types:
- 營地/對面地標
aliases:
- 伯毘珥對面
status: formal
definition: 位於約但河東摩押平原地區，以色列在征服約但河東諸王後，住在伯毘珥對面的谷中（申3:29）。地名意為「毘珥廟/巴力毘珥之家」，靠近毘斯迦山。
development: 作為申命記最後幾章（含摩西講道、去世）的地理背景點；與民數記25章巴力毘珥事件地點相關，此處以色列安營預備進迦南。
accumulations:
- book: 申命記
  chapter: 3
  summary: 經文結尾提到以色列住在伯毘珥對面的谷中，作為本章地理收尾與後續講道背景。
  relation: 標示以色列當前駐紮位置，連結前文征服與後文摩西遺言，地理上靠近毘斯迦山（摩西觀望地）。
related_entries:
