name: 撒迦（Salcah）
type: 地點
secondary_types: []
aliases:
- 撒迦城
status: formal
definition: 巴珊王噩國內的邊境重鎮。本章記載以色列奪了地「直到撒迦和以得來，都是巴珊王噩國內的城邑」（申3:10）。撒迦位於巴珊東南邊界，靠近亞捫地，後歸瑪拿西半支派（書13:11），為約但河東地界的極端標記。
development: 本章明確點出撒迦為噩王國度的東南界城市，與以得來（西北）對應，界定巴珊地的疆域範圍。
accumulations:
- book: 申命記
  chapter: 3
  summary: 以色列奪取巴珊地，疆域東南達到撒迦，為噩王國內城邑之一。
  relation: 本章以撒迦作為巴珊地東南界的地理標記，確認征服範圍的廣度。
