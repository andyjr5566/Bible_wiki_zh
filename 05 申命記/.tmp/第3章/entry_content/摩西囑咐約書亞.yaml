name: 摩西囑咐約書亞
type: 事件
secondary_types:
- 領袖交接
aliases:
- 摩西勉勵約書亞
- 約書亞受委任
status: formal
definition: 神命摩西囑咐約書亞，勉勵他膽壯，因約書亞必在百姓前過去，使他們承受摩西所觀看之地。摩西提醒約書亞親眼見神向二王所行，神必向所去之國照樣行，不要懼怕（申3:21-22,
  28）。
development: 此為公開委任儀式，以過往神蹟（擊敗西宏、噩）為信心基礎，將征服迦南使命傳遞給新一代領袖，確立約書亞權威與神同在應許。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載摩西奉神命囑咐約書亞，以二王被滅為據，勉勵其帶領百姓得地，並應許神為他們爭戰。
  relation: 承接摩西懇求被拒後的領袖交接，回顧征服巴珊事件，展望約但河西征戰，神學上為約書亞記開端鋪路。
