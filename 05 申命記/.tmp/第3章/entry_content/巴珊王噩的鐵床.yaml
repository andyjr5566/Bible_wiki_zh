name: 巴珊王噩的鐵床
type: 事件
secondary_types:
- 文物記載
aliases:
- 噩王鐵床
- 利乏音人遺物
status: formal
definition: 巴珊王噩留下的鐵床，長九肘、寬四肘（約4.05×1.8公尺），以人肘為度，存放於亞捫人的拉巴。作為噩王身為利乏音人餘孽、身材高大的實物見證（申3:11）。
development: 經文以括號插入方式記載此文物，強調利乏音人巨人體格與神將這等強敵交付以色列的大能；鐵床存放於亞捫地拉巴，暗示後世可考證。
accumulations:
- book: 申命記
  chapter: 3
  summary: 經文以括號補充記載噩王鐵床尺寸與存放地，作為利乏音人體格與神拯救大能的旁證。
  relation: 補強征服巴珊事件的歷史真實性，呼應利乏音人主題，並與亞珥歌伯稱利乏音人之地互證。
