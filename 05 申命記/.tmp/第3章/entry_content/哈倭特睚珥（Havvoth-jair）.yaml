name: 哈倭特睚珥（Havvoth-jair）
type: 地點
secondary_types: []
aliases:
- 睚珥的帳棚
- 睚珥村莊
status: formal
definition: 意為「睚珥的帳棚/村莊」。本章記載瑪拿西子孫睚珥佔了亞珥歌伯全境，「就按自己的名稱這巴珊地為哈倭特睚珥，直到今日」（申3:14）。此地位於巴珊東部，基述人、瑪迦人交界以南，原屬亞珥歌伯全境（申3:13-14），後成為睚珥家族的產業。
development: 本章記載此地命名由來，民數記32:41、約書亞記13:30、歷代志上2:23均回顧此事，確立睚珥在約但河東的產業權。
accumulations:
- book: 申命記
  chapter: 3
  summary: 睚珥佔領亞珥歌伯全境，按自己名字命名為哈倭特睚珥，直到今日。
  relation: 本章為哈倭特睚珥命名的權威出處，連結睚珥個人、亞珥歌伯地理與瑪拿西半支派產業分配。
