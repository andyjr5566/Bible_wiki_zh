- Adonai YHWH
- 主YHWH
status: formal
definition: 希伯來文「Adonai YHWH」（אֲדֹנָי יְהוִה），意為「主耶和華」或「主─永恆者」。摩西在申3:24禱告時稱呼神為「主耶和華啊」，承認神的大能主權，並懇求容許過約但河。此稱謂結合「主」（Adonai，主權者）與「耶和華」（YHWH，立約之神），表達僕人對主的絕對順服與信靠。
development: 此稱謂在摩西被拒進迦南的禱告中出現，凸顯摩西雖屬神親密僕人，仍須在神主權下謙卑懇求，體現「主─僕人」關係的神學張力。
accumulations:
- book: 申命記
  chapter: 3
  summary: 摩西禱告時稱神為「主耶和華」，懇求過約但河，被神拒絕。
  relation: 本章展現摩西以「主耶和華」稱呼神，承認神主權與大能，卻接受神不讓進迦南的判決，為領袖交棒鋪路。
