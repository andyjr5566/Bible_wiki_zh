status: formal
definition: 巴珊地的一個區域，即噩王國內的亞珥歌伯全境（申3:4,13），共有六十座堅固城邑（申3:4-5）。瑪拿西子孫睚珥佔領全境，並命名為哈倭特睚珥（申3:14）。本章稱此地為「利乏音人之地」（申3:13）。
development: 亞珥歌伯作為巴珊核心區，其六十座堅固城的攻取顯示耶和華大能的拯救，後成為瑪拿西半支派的核心產業。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載亞珥歌伯為巴珊噩王國核心區，有六十座堅固城，後歸睚珥所有並改名哈倭特睚珥。
  relation: 本章詳細記載亞珥歌伯的城邑數量、堅固程度、歸屬變更與命名，是以色列戰勝巴珊王噩的關鍵地理舞台。
