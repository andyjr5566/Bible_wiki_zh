name: 示尼珥（Senir）
type: 地點
secondary_types: []
aliases:
- 示尼珥
- Senir
status: formal
definition: 示尼珥是黑門山的另一個名稱，為亞摩利人所用（西頓人稱該山為西連）。見於申命記 3:9，摩西述說以色列人征服約但河東地時，提到這座山的不同族群稱呼。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載示尼珥為亞摩利人對黑門山的稱呼，與西頓人稱之為西連並列。
  relation: 標示以色列人所得之地的北界地標，見證神應許賜給以色列的地界。
related_entries:
- 黑門山
- 西連
sources:
