- 哈倭特睚珥命名
status: formal
definition: 瑪拿西子孫睚珥佔據亞珥歌伯全境，直到基述人與瑪迦人交界，按自己名稱將巴珊地命名為哈倭特睚珥，延續至今日（申3:14）。
development: 睚珥作為瑪拿西族人，在征服後主動佔據邊境地區，以個人名命名城市群，顯示族裔遷徙與領土整合過程；地名保留至作者時代，見證歷史連續性。
accumulations:
- book: 申命記
  chapter: 3
  summary: 記載睚珥佔據亞珥歌伯全境，命名為哈倭特睚珥，界至基述、瑪迦交界。
  relation: 展示二個半支派得地細節，連結亞珥歌伯地理與瑪拿西半支派產業，並涉及基述、瑪迦鄰族關係。
