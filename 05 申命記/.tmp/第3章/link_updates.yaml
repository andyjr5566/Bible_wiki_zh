"book": "申命記"
"chapter": !!int "3"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "摩西回顧攻滅巴珊王噩、分地給流便迦得瑪拿西半支派、勉勵約書亞接棒，並懇求進迦南被拒，只准上毘斯迦山頂觀望（3:1-29）。"
  "relation": "本章是摩西臨終講章「回顧曠野飄流史」第三段，也是他個人生命的關鍵轉折——完成約但河東的征服與分地後，親自面對「不得過河」的定案，轉而全力裝備約書亞接續。"
- "title": "巴珊王噩"
  "path": "link_folder/人物/巴珊王噩.md"
  "summary": "本章詳述噩在以得來出戰、被殺無一倖免、六十座城被奪，並補充他是利乏音人最後餘裔，鐵床長九肘寬四肘，存放在亞捫人的拉巴（3:1-11）。"
  "relation": "本章是巴珊王噩戰役最詳細的記載，補上民二十一33-35戰報所沒有的巨人身分與鐵床尺寸細節，成為[[以色列戰勝巴珊王噩互文（申3：1-11；詩135：10-12；136：17-22）]]的正文核心。"
- "title": "亞摩利王西宏"
  "path": "link_folder/人物/亞摩利王西宏.md"
  "summary": "本章兩次以西宏戰役為對照基準：「你要待他像從前待希實本的亞摩利王西宏一樣」（3:2），「我們將這些都毀滅了，像從前待希實本王西宏一樣」（3:6）。"
  "relation": "西宏之役在本章不再是敘事焦點，而是作為既有得勝經驗，被摩西引用來說明神對付噩的模式完全相同——重複的得勝模式建立百姓對神信實的確據。"
- "title": "亞捫人"
  "path": "link_folder/人物/亞捫人.md"
  "summary": "本章兩次提及亞捫人的地界：噩的鐵床存放在「亞捫人的拉巴」（3:11）；流便迦得的產業「直到亞捫人交界的雅博河」（3:16）。"
  "relation": "本章亞捫人僅作地理界標出現，其地未被以色列侵犯，呼應申二19,37「不可擾害亞捫人」的既定原則——巴珊王噩之戰止於亞捫邊界，未曾越界。"
- "title": "利乏音人"
  "path": "link_folder/人物/利乏音人.md"
  "summary": "本章補充利乏音人身分細節：「利乏音人所剩下的只有巴珊王噩」，其鐵床長九肘寬四肘（3:11）；亞珥歌伯全地／巴珊全地「這叫做利乏音人之地」（3:13）。"
  "relation": "本章是利乏音人系列記載的終點——巴珊王噩是這一巨人族「所剩下的」最後一人，他的敗亡標誌利乏音人在約但河東的徹底終結，與申二10-11、20-21的以米人、散送冥並列的巨人更替系列相呼應。"
- "title": "約書亞"
  "path": "link_folder/人物/約書亞.md"
  "summary": "摩西以打敗西宏、噩二王的親眼見證勉勵約書亞：「耶和華也必向你所要去的各國照樣行」「因那為你爭戰的是耶和華你的神」（3:21-22）；並奉命囑咐勉勵約書亞使他膽壯（3:28）。"
  "relation": "本章是約書亞在申命記中第二、三次被點名交棒（另見申一38），這次交棒具體訴諸已完成的戰績作信心根據，為他即將獨力帶領百姓過約但河預作裝備。"
- "title": "約書亞被立為繼任者"
  "path": "link_folder/人物/約書亞被立為繼任者.md"
  "summary": "摩西向約書亞重申神必為他爭戰（3:21-22），並奉神吩咐囑咐、勉勵、堅固約書亞，因他必在百姓前面過去，使他們承受應許之地（3:28）。"
  "relation": "承接民二十七18-23按手委任的正式程序，本章是摩西在言語與心志上的具體交棒行動——用已見證的戰績鼓勵約書亞，是民數記委任禮之後、實際接班前的關鍵訓勉。"
- "title": "流便支派"
  "path": "link_folder/人物/流便支派.md"
  "summary": "流便人與迦得人同得亞羅珥起、基列山地一半及其城邑為業（3:12,16），條件是所有勇士須帶兵器在弟兄以色列人前面過河爭戰（3:18-20）。"
  "relation": "本章詳述流便支派得地的具體範圍與附帶條件，呼應民三十二流便迦得請求約但河東地業的原始協議，確立「先得產業、仍須助戰」的原則。"
- "title": "迦得支派"
  "path": "link_folder/人物/迦得支派.md"
  "summary": "迦得人與流便人同得亞羅珥起、基列山地一半及其城邑為業（3:12,16），須帶兵器隨眾支派過河爭戰，妻兒牲畜可暫留原地（3:18-20）。"
  "relation": "本章詳述迦得支派得地的具體範圍與附帶條件，與流便支派並列受地，共同承擔「先得產業、仍須助戰」的義務。"
- "title": "瑪拿西支派"
  "path": "link_folder/人物/瑪拿西支派.md"
  "summary": "瑪拿西半支派得其餘基列地與巴珊全地（即亞珥歌伯／利乏音人之地）為業（3:13）；其中睚珥族得亞珥歌伯全境並改名哈倭特睚珥，瑪吉族得基列（3:14-15）。"
  "relation": "本章詳述瑪拿西半支派在約但河東的產業範圍，並進一步點名其下睚珥、瑪吉兩支系的個別分地，是瑪拿西支派「一分為二」（河東半支派、河西半支派）格局的地理起點。"
- "title": "巴珊"
  "path": "link_folder/地點/巴珊.md"
  "summary": "本章詳述巴珊全地的攻取過程：六十座堅固城盡被奪取並毀滅（3:1-7），巴珊全地直到黑門山（3:8-10），巴珊全地（亞珥歌伯）分給瑪拿西半支派（3:13）。"
  "relation": "本章是巴珊征服與分地最詳盡的記載，補上民二十一33-35戰報之後的疆界細節與分地去向，確立巴珊成為瑪拿西半支派產業的完整過程。"
- "title": "基列地（Gil'ad）"
  "path": "link_folder/地點/基列地（Gil'ad）.md"
  "summary": "基列山地之半連同城邑給流便迦得（3:12,16），其餘基列地給瑪拿西半支派（3:13），其中基列本身另給瑪吉族（3:15）。"
  "relation": "本章詳述基列地在三支派半之間的具體切分，補上民三十二籠統分地記載之後的精確範圍——基列山地一半、其餘基列地、基列本身分屬三個不同承受人。"
- "title": "亞嫩河"
  "path": "link_folder/地點/亞嫩河.md"
  "summary": "以色列從約但河東兩個亞摩利王手中，將亞嫩谷直到黑門山之地奪過來（3:8）；亞嫩谷邊的亞羅珥起是流便迦得產業的南界（3:12,16）。"
  "relation": "本章再次確認亞嫩河作為約但河東征服地的南界地標，並成為流便迦得產業範圍的起點座標，與申二24「起來前往，過亞嫩谷」的界線劃分相呼應。"
- "title": "亞羅珥（Aroer）"
  "path": "link_folder/地點/亞羅珥（Aroer）.md"
  "summary": "流便迦得所得的基列山地一半，是「從亞嫩谷邊的亞羅珥起」（3:12）。"
  "relation": "本章確認亞羅珥作為流便迦得產業的起始座標，與申二36「從亞嫩谷邊的亞羅珥」一致，是約但河東征服地南部的固定地標。"
- "title": "雅博"
  "path": "link_folder/原文/雅博.md"
  "summary": "流便迦得的產業「直到亞捫人交界的雅博河」（3:16），劃定其東北界。"
  "relation": "本章確認雅博河作為流便迦得產業的東北界，與申二37「凡靠近雅博河的地……都沒有挨近」呼應，說明以色列嚴守神所禁止進入的亞捫邊界。"
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "流便迦得所得亞拉巴之地「從基尼烈直到亞拉巴海，就是鹽海」，並毘斯迦山根東邊之地（3:17）。"
  "relation": "本章確認鹽海（死海）作為流便迦得產業西界的南段地標，經文明確將「亞拉巴海」與「鹽海」等同，補充其地理定位。"
- "title": "亞拉巴（Aravah）"
  "path": "link_folder/地點/亞拉巴（Aravah）.md"
  "summary": "摩西將亞拉巴和靠近約但河之地，從基尼烈直到亞拉巴海（鹽海），並毘斯迦山根東邊之地，都給了流便迦得（3:17）。"
  "relation": "本章確認亞拉巴（約但河谷地）作為流便迦得產業西界的完整範圍，從加利利海南延至死海，與申一1,7「亞拉巴」的地理範疇一致。"
- "title": "毘斯迦山"
  "path": "link_folder/地點/毘斯迦山.md"
  "summary": "毘斯迦山根東邊之地劃入流便迦得產業（3:17）；神吩咐摩西上毘斯迦山頂向四方舉目觀望應許之地，因他不能過約但河（3:27）。"
  "relation": "本章是毘斯迦山最重要的記載——不僅是流便迦得產業的地界標記，更是神容許摩西觀看應許地全景的地點，預告申三十四1-4摩西實際登山遠眺與辭世的場景。"
- "title": "以色列戰勝巴珊王噩"
  "path": "link_folder/事件/以色列戰勝巴珊王噩.md"
  "summary": "本章是此戰役最詳盡的正文記載：噩率眾在以得來出戰，神應許「不要怕他」，以色列殺盡噩與眾民，奪六十座堅固城與無數鄉村，盡行毀滅唯留牲畜財物為掠物（3:1-7）。"
  "relation": "民二十一33-35只有三節的簡短戰報，本章擴展為七節的完整敘事，並補上噩的利乏音人身分與鐵床尺寸（3:11），是這場戰役在正典中最完整的版本。"
- "title": "以色列戰勝巴珊王噩互文（申3：1-11；詩135：10-12；136：17-22）"
  "path": "link_folder/互文/以色列戰勝巴珊王噩互文（申3：1-11；詩135：10-12；136：17-22）.md"
  "summary": "本章3:1-11是此互文網絡的申命記正文所在，詳述以得來交戰、殺盡眾民、奪六十座城、噩鐵床尺寸與利乏音人身分等民數記戰報未載的細節。"
  "relation": "相較民二十一33-35的簡短戰報與詩篇一三五、一三六的敬拜詠唱，本章提供最完整的敘事版本，是這場戰役被後續文本引用、詠唱的原始詳情來源。"
- "title": "流便迦得瑪拿西半支派得地"
  "path": "link_folder/事件/流便迦得瑪拿西半支派得地.md"
  "summary": "本章詳述三支派半分地的具體範圍：流便迦得得亞羅珥起基列山地一半（3:12,16-17），瑪拿西半支派得其餘基列地與巴珊全地，其下睚珥得亞珥歌伯、瑪吉得基列（3:13-15）；並重申勇士須帶兵器助戰的條件（3:18-20）。"
  "relation": "民三十二記載分地的請求與應允過程，本章是摩西在講章中對這段歷史的具體疆界重述，並補上民三十二簡略提及的睚珥、瑪吉個別分地細節。"
- "title": "聖戰毀滅原則"
  "path": "link_folder/主題/聖戰毀滅原則.md"
  "summary": "以色列將巴珊各城「都毀滅了，像從前待希實本王西宏一樣，把有人煙的各城，連女人帶孩子，盡都毀滅」，惟牲畜財物取為掠物（3:6-7）。"
  "relation": "本章是聖戰毀滅原則（herem）在約但河東的第二次具體執行，與申二34西宏之役的執行模式完全相同，確立這是以色列征服約但河東地的一貫原則，而非單一事件。"
- "title": "耶和華的爭戰"
  "path": "link_folder/神學/耶和華的爭戰.md"
  "summary": "神應許「我已將他和他的眾民，並他的地，都交在你手中」（3:2），「耶和華我們的神也將巴珊王噩和他的眾民都交在我們手中」（3:3）；摩西勉勵約書亞「不要怕他們，因那為你爭戰的是耶和華你的神」（3:22）。"
  "relation": "本章三次申明爭戰的主權在神不在人，與申二24,33,36「交在你手中」的用語一致，並將此信念從摩西個人經歷傳遞給約書亞，成為下一代領袖信心的根基。"
- "title": "摩西是否進過迦南地"
  "path": "link_folder/解經爭議/摩西是否進過迦南地.md"
  "summary": "本章是這場爭議的核心正文：摩西懇求容他過約但河看美地（3:23-25），耶和華因百姓的緣故向他發怒不應允，只准他上毘斯迦山頂舉目觀望，因他必不能過約但河（3:26-27）。"
  "relation": "相較民二十12、民二十七12-14的簡短提及，本章是摩西親口敘述禱告被拒的完整過程，成為這樁解經爭議（審判的公義性、聖潔的嚴肅性、律法與恩典的對照）最詳細的文本依據。"
