"book": "申命記"
"chapter": !!int "3"
"updates":
- "title": "毘斯迦山"
  "path": "link_folder/地點/毘斯迦山.md"
  "summary": "申3:17,27記載毘斯迦山是尼波山的一峰，摩西在此觀望應許之地四方(東、西、南、北)，因神不允許他過約但河。毘斯迦山根東邊之地分給流便、迦得支派。摩西在此登山頂觀望佳美山地和利巴嫩，見證神應許之地的廣闊。"
  "relation": "本章摩西人生的終點地標；神命摩西上山頂觀望而不得進入，見證神主權與恩典並存"
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "申3:17記載流便、迦得支派得地「從基尼烈直到亞拉巴海，就是鹽海」。鹽海即死海、亞拉巴海，位於以色列與約旦間內陸湖，地球最低點。民34:3,12以鹽海為應許之地南界起點、東界終點。預表審判(創19:24-25)、與生命水對比(結47:8-9、啟22:1)。"
  "relation": "二個半支派得地的東南界標記；鹽海作為審判之地與生命水形成對比，預表基督救贖將死海變為生命水"
- "title": "利乏音人"
  "path": "link_folder/人物/利乏音人.md"
  "summary": "申3:11,13記載「利乏音人所剩下的只有巴珊王噩……亞珥歌伯全地乃是巴珊全地；這叫做利乏音人之地」。噩是最後一個利乏音人，其鐵床尺寸(長9肘寬4肘)顯示身材魁梧。亞珥歌伯全地稱為利乏音人之地。神從各族面前除滅利乏音人，將地賜給羅得子孫(摩押、亞捫)和以掃子孫(以東)，預表神將迦南賜給以色列。"
  "relation": "本章巨人族群的代表；噩王作為最後利乏音人被擊敗，見證神主權除滅巨人族群、將地賜給揀選之民；預表迦南征服"
- "title": "以得來"
  "path": "link_folder/地點/以得來.md"
  "summary": "申3:1記載「巴珊王噩和他的眾民都出來，在以得來與我們交戰」。以得來是巴珊王噩的王都(與亞斯他錄並列為兩大首都)，位於加利利海東面約一百多公里。以色列人在此擊敗噩王，奪取巴珊全地。"
  "relation": "巴珊王噩的王都，本章決戰發生地；擊敗噩王後成為以色列產業一部分"
