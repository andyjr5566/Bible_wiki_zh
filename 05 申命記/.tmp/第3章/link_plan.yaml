- name: 摩西懇求過約但河
  suggested_type: 事件
  evidence: '經文：申3:23-27。「那時我懇求耶和華說：主耶和華啊，你已將你的大力大能顯給僕人看……求你容我過去，看約但河那邊的美地，就是那佳美的山地和利巴嫩。

    但耶和華因你們的緣故向我發怒，不應允我，對我說：罷了！你不要向我再提這事。

    你且上毘斯迦山頂去，向東、西、南、北舉目觀望，因為你必不能過這約但河。」

    ccbiblestudy CT：摩西懇求神容許過約但河看美地(佳美山地、利巴嫩)。神因百姓緣故向摩西發怒，不允許，命上毘斯迦山頂觀望，因摩西不能過約但河。

    ccbiblestudy GT：摩西懇求過河看美地，神因百姓緣故發怒不允，命上毘斯迦山頂觀望四方，因不能過河。

