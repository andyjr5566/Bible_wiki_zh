- name: 征服巴珊王噩
  suggested_type: 事件
  evidence: '經文：申3:1-7。以色列人轉向巴珊，噩王和眾民在以得來出來交戰。耶和華說不要怕，已將他交在手中，要待他像待西宏一樣。      神將噩和眾民交在手中，殺了他們，沒留下一個。奪了六十座城，全亞珥歌伯地區，就是巴珊噩王的國。城都有堅固高牆、門閂，還有許多無城牆鄉村。將城中男女老少盡都毀滅，牲畜財物取為掠物。

    ccbiblestudy CT：巴珊位於雅博河以北、黑門山以南的高原(今戈蘭高原)，牧草繁茂。噩王身量高大，是最後一個利乏音人(11節)；以得來是巴珊副都。神命不要怕，因已將噩交在手中，要待他像待西宏一樣。六十座城全被奪取，為亞珥歌伯全境。

    ccbiblestudy GT：巴珊在基列之北，以產牛馳名。噩與西宏同為亞摩利人建立北方王國統治者，稱為利乏音人中最後一人(11節)。巴珊王國擁有60多個要塞化堅固城邑。征服約但河東目的：①使百姓確信神同在必得勝；②顯明迦南征服的預兆，撫慰摩西之心。

    KingComments：噩未因西宏被敗而受警告，倚靠自身力量出戰。從其鐵床尺寸(9肘×4肘)推測身材魁梧。神鼓勵不要怕，引用戰勝西宏為證。勝利常被一同提及(書9:10;
    詩135:10-11; 136:19-20)。聖戰原則：徹底毀滅敵人城邑人口(赫蓋姆)。

    BibleHub Study：轉向巴珊路，噩王在以得來交戰。神說不要怕，已將他交在手中。神將噩王和眾民交在手中，殺盡無倖存。奪取六十座城，全亞珥歌伯地區。城有高牆門閂，多無城牆鄉村。徹底毀滅，像待西宏一樣。牲畜財物取為掠物。'
  surfaces:
  - phrase: 征服巴珊王噩
  - phrase: 擊敗巴珊王噩
  - phrase: 巴珊之戰
  target_path: link_folder/事件/征服巴珊王噩.md
- name: 亞珥歌伯
  suggested_type: 地點
  evidence: '經文：申3:4, 13-14。「那時，我們奪了他所有的城，共有六十座……這為亞珥歌伯的全境，就是巴珊地噩王的國」(v4)；「亞珥歌伯全地乃是巴珊全地；這叫做利乏音人之地」(v13)；「瑪拿西的子孫睚珥佔了亞珥歌伯全境……就按自己的名稱這巴珊地為哈倭特睚珥」(v14)。

    ccbiblestudy CT：亞珥歌伯本是巴珊境內東北部多石的一區，此句代表全巴珊。從王上4:13所記，這60座城都是有城牆的大城，還有許多鄉村。

    ccbiblestudy GT：亞珥歌伯此名具有「多石之地」意思，源於巴珊東北部多石地理特徵。      KingComments：亞珥歌伯本是巴珊境內的一區，此處代表全巴珊。從王上4:13所記，這60座城都是有城牆的大城，還有許多鄉村。

    BibleHub Study：亞珥歌伯是巴珊境內的一區，此處代表全巴珊。睚珥佔領亞珥歌伯全境，按自己名稱命名為哈倭特睚珥。'
