- name: 巴珊王噩的鐵床
  suggested_type: 事件
  evidence: '經文：申3:11。「利乏音人所剩下的只有巴珊王噩。他的床是鐵的，長九肘，寬四肘，都是以人肘為度。      現今豈不是在亞捫人的拉巴嗎？」

    ccbiblestudy CT：噩是最後一個利乏音人。他的床是鐵的，長九肘(約4公尺)，寬四肘(約1.8公尺)，顯出噩的魁梧身材。      ccbiblestudy
    GT：噩被稱為利乏音人中最後一人(11節)。他是了不起的人。以得來是巴珊王噩所居住的王都。他的床是鐵的，長九肘寬四肘，顯出噩的魁梧身材。

    KingComments：噩是利乏音人中最後一人。他的鐵「床」被理解為用鐵裝飾的石棺、或預備放在墓穴中有鐵裝飾的臥榻、或由玄武岩(含鐵石)鑿刻的紀念碑。      尺寸(13.5×6英尺，約4.1×1.8米)顯出噩的魁梧身材。      BibleHub
    Study：噩是利乏音人中最後一人。他的鐵床尺寸顯示身材魁梧。床可能指棺木或石棺。'
