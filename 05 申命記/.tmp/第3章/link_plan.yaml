- name: 二個半支派得約但河東地
  suggested_type: 事件
  evidence: '經文：申3:12-17。「那時，我們得了這地。從亞嫩谷邊的亞羅珥起，我將基列山地的一半，並其中的城邑，都給了流便人和迦得人。

    其餘的基列地和巴珊全地，就是噩王的國，我給了瑪拿西半支派……我又將基列給了瑪吉。

    從基列到亞嫩谷，以谷中為界，直到亞捫人交界的雅博河，我給了流便人和迦得人，

    又將亞拉巴和靠近約但河之地，從基尼烈直到亞拉巴海，就是鹽海，並毘斯迦山根東邊之地，都給了他們。」

    ccbiblestudy CT：從亞嫩谷邊亞羅珥起，將基列山地一半給流便、迦得；其餘基列和巴珊全地給瑪拿西半支派。亞珥歌伯全地乃巴珊全地，叫利乏音人之地。      睚珥佔亞珥歌伯全境，直到基述、瑪迦交界，按自己名稱叫哈倭特睚珥。瑪吉得基列。流便、迦得得從基列到亞嫩谷、雅博河為界之地。

    ccbiblestudy GT：基列山地一半給流便、迦得；其餘基列和巴珊給瑪拿西半支派。      KingComments：摩西將約但河東地分給二個半支派：流便、迦得得基列山地一半(從亞嫩谷到雅博河)；瑪拿西半支派得基列另一半和巴珊全地(噩王國)。睚珥(瑪拿西子孫)佔亞珥歌伯，命名哈倭特睚珥。瑪吉得基列。

    BibleHub Study：從亞嫩谷亞羅珥起，基列山地一半給流便、迦得。其餘基列和巴珊給瑪拿西半支派。睚珥佔亞珥歌伯，命名哈倭特睚珥。瑪吉得基列。流便、迦得得從基列到亞嫩谷、雅博河為界之地。    surfaces:

