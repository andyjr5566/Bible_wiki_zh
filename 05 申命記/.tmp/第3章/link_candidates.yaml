book: 申命記
chapter: 3
candidates:
  # 人物（既有）
  - name: 摩西
    type: 人物
    evidence: v1-29 全章講者，回顧攻取巴珊、分地、懇求進迦南被拒
  - name: 巴珊王噩
    type: 人物
    evidence: v1-3,11,13 巴珊王噩和他的眾民出來交戰，被殺無一倖免；利乏音人所剩下的只有他
    surfaces: [噩]
  - name: 亞摩利王西宏
    type: 人物
    evidence: v2,6 你要待他像從前待希實本的亞摩利王西宏一樣；我們將這些都毀滅了，像從前待希實本王西宏一樣
    surfaces: [西宏]
  - name: 亞捫人
    type: 人物
    evidence: v11,16 現今豈不是在亞捫人的拉巴嗎；直到亞捫人交界的雅博河
  - name: 利乏音人
    type: 人物
    evidence: v11,13 利乏音人所剩下的只有巴珊王噩；這叫做利乏音人之地
  - name: 約書亞
    type: 人物
    evidence: v21,28 那時我吩咐約書亞說；你卻要囑咐約書亞，勉勵他，使他膽壯
  - name: 約書亞被立為繼任者
    type: 人物
    evidence: v21-22,28 摩西以打敗二王勉勵約書亞，囑咐勉勵使他膽壯，因他必在百姓前面過去
  - name: 流便支派
    type: 人物
    evidence: v12,16 都給了流便人和迦得人
    surfaces: [流便人]
  - name: 迦得支派
    type: 人物
    evidence: v12,16 都給了流便人和迦得人
    surfaces: [迦得人]
  - name: 瑪拿西支派
    type: 人物
    evidence: v13 我給了瑪拿西半支派
    surfaces: [瑪拿西半支派]
  # 人物（新建）
  - name: 睚珥（瑪拿西的子孫）
    type: 人物
    evidence: v14 瑪拿西的子孫睚珥佔了亞珥歌伯全境，就按自己的名稱這巴珊地為哈倭特睚珥，直到今日；精讀本：字面意義是瑪拿西的後裔睚珥，若從父系是猶大的五代子孫，這裡則從母系（代上2：21-23）
  - name: 瑪吉
    type: 人物
    evidence: v15 我又將基列給了瑪吉；GT：瑪吉是瑪拿西唯一的兒子，瑪吉又僅有一個兒子基列，本句指瑪吉族與基列族
  - name: 基述人
    type: 人物
    evidence: v14 直到基述人和瑪迦人的交界；GT：巴珊北面加利利海東岸的小邦，到大衛王時代仍存在（撒下三3；十6）
  - name: 瑪迦人
    type: 人物
    evidence: v14 直到基述人和瑪迦人的交界；GT：巴珊北面的小邦，在基述之北
  # 地點（既有）
  - name: 巴珊
    type: 地點
    evidence: v1,3,10,13-14 我們轉回向巴珊去；就是奪了……巴珊全地；亞珥歌伯全地乃是巴珊全地
  - name: 基列地（Gil'ad）
    type: 地點
    evidence: v10,12-13,15-16 基列全地；基列山地的一半；其餘的基列地；我又將基列給了瑪吉
    surfaces: [基列]
  - name: 亞嫩河
    type: 地點
    evidence: v8,12,16 從亞嫩谷直到黑門山之地；從亞嫩谷邊的亞羅珥起；到亞嫩谷
    surfaces: [亞嫩谷]
  - name: 亞羅珥（Aroer）
    type: 地點
    evidence: v12 從亞嫩谷邊的亞羅珥起
    surfaces: [亞羅珥]
  - name: 雅博
    type: 地點
    evidence: v16 直到亞捫人交界的雅博河
    surfaces: [雅博河]
  - name: 鹽海
    type: 地點
    evidence: v17 直到亞拉巴海，就是鹽海
  - name: 亞拉巴（Aravah）
    type: 地點
    evidence: v17 又將亞拉巴和靠近約但河之地……都給了他們
    surfaces: [亞拉巴]
  - name: 毘斯迦山
    type: 地點
    evidence: v17,27 並毘斯迦山根東邊之地；你且上毘斯迦山頂去，向東西南北舉目觀望
  # 地點（新建）
  - name: 黑門山
    type: 地點
    evidence: v8-9 直到黑門山之地；這黑門山，西頓人稱為西連，亞摩利人稱為示尼珥；CT：位於利巴嫩之南，長年積雪，約三千公尺高，峰頂現仍有巴力廟遺址
  - name: 亞珥歌伯
    type: 地點
    evidence: v4,13-14 這為亞珥歌伯的全境，就是巴珊地噩王的國；亞珥歌伯全地乃是巴珊全地；CT：本是巴珊境內東北部多石的一區，此句代表全巴珊
  - name: 撒迦
    type: 地點
    evidence: v10 直到撒迦和以得來，都是巴珊王噩國內的城邑；CT：撒迦位置不詳，或在巴珊最北端
  - name: 拉巴（Rabbah）
    type: 地點
    evidence: v11 現今豈不是在亞捫人的拉巴嗎；CT：位於雅博河上游支流北岸，亞捫人的首邑，即今約但首都亞曼
  - name: 伯毘珥
    type: 地點
    evidence: v29 於是我們住在伯毘珥對面的谷中；CT：原為摩押人城鎮，後分給流便支派；以色列人曾在此對面谷中安營聆聽摩西最後囑咐（申四46）
  # 事件／神學（既有）
  - name: 以色列戰勝巴珊王噩
    type: 事件
    evidence: v1-11 本章詳細記載以得來交戰、殺盡眾民、奪六十座城、噩鐵床尺寸等
  - name: 以色列戰勝巴珊王噩互文（申3：1-11；詩135：10-12；136：17-22）
    type: 互文
    evidence: v1-11 本章正是此互文網絡的申命記正文所在，補充鐵床尺寸與利乏音人身分細節
  - name: 流便迦得瑪拿西半支派得地
    type: 事件
    evidence: v12-17 本章詳述分地範圍：亞羅珥起基列山地一半給流便迦得，其餘基列與巴珊全地給瑪拿西半支派
  - name: 聖戰毀滅原則
    type: 主題
    evidence: v6-7 我們將這些都毀滅了……惟有一切牲畜和城中的財物都取為自己的掠物
  - name: 耶和華的爭戰
    type: 神學
    evidence: v2,3,22 因我已將他和他的眾民……都交在你手中；耶和華也將巴珊王噩交在我們手中；那為你爭戰的是耶和華你的神
  - name: 摩西是否進過迦南地
    type: 解經爭議
    evidence: v23-27 摩西懇求容他過去看那美地，耶和華不應允，只准他上毘斯迦山頂觀望
  # 原文（新建）
  - name: 主耶和華（Adonai YHWH）
    type: 原文
    evidence: v24 主耶和華啊，你已將你的大力大能顯給僕人看；串珠：此詞在申命記僅出現兩次（另一處9：26），皆為摩西祈禱時對神的稱呼，與亞伯拉罕對神的稱呼相同（創十五2，8）
