name: 拜偶像者必被治死（清除惡人）
type: 神學
secondary_types: []
aliases:
- 清除拜偶像之惡
status: formal
definition: 根據申命記 17:2-7，若有人在神所賜的城中事奉別神、拜日月星宿，經查證屬實，須將該男人或女人拉到城門外，用石頭打死；需兩三見證人作見證，見證人先下手，隨後眾民執行，以除掉中間的惡。
development: ''
