- book: 申命記
  chapter: 17
  summary: 規定拜偶像者經查證後必被治死，需兩三見證人，見證人先下手，眾民隨後執行。
  relation: 顯示以色列社群必須清除拜偶像的惡，維護約的純潔。
related_entries:
