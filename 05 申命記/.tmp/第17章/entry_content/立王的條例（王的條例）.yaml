name: 立王的條例（王的條例）
type: 事件
secondary_types: []
aliases:
- 王權規範
status: formal
definition: 根據申命記 17:14-20，若以色列人想立王，必須是耶和華揀選的弟兄，不可立外邦人；王不可為自己加添馬匹、使百姓回埃及、多立妃嬪、多積金銀；登位後要抄寫律法書，存放在身邊，平生誦讀，學習敬畏神、謹守律法，免得心高氣傲、偏離誡命，使王位在以色列中長久。
development: ''
accumulations:
- book: 申命記
  chapter: 17
  summary: 規定立王條件與限制：必為神揀選的弟兄，不可加馬、回埃及、多妃、多金銀；王須抄寫律法書並終身誦讀，以學敬畏神、守誡命。
  relation: 規範王權，防止王偏離神的律法，保障國家屬靈純正。
related_entries:
