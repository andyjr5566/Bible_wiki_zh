organization: "### 不可查知兇手的贖罪禮（v1-9）\n經文開啟一項獨特的公案程序：當在耶和華賜給以色列為業的地上，發現被殺屍首倒在田野，**不知道是誰殺的**（v1），社區不能視若無睹，必須啟動[[發現屍首無法查出兇手的處理條例（贖罪禮）]]。長老和審判官從屍首量起，測量至四周城邑，**哪城離被殺的人最近**，該城長老便須從牛群中取一隻**未曾耕地、未曾負軛的母牛犢**（v3），牽到**流水、未曾耕種的山谷**，在谷中**打折母牛犢的頸項**（v4）。祭司利未子孫近前，因耶和華揀選他們事奉、奉耶和華名祝福、判斷爭訟毆打（v5）。最近城邑的長老在打折頸項的母牛犢以上**洗手**，禱告說：「我們的手未曾流這人的血；我們的眼也未曾看見這事」（v6-7），求耶和華赦免所救贖的以色列民，**不要使流無辜血的罪歸在百姓中間**（v8）。如此，**流血的罪必得赦免**，你們就從中間除掉流無辜血的罪（v9）。此禮彰顯社會對無辜生命的共同責任，與土地不被玷污的聖潔要求緊密相連。\n\
  \n```mermaid\nflowchart TD\n  A[\"發現屍首（不知兇手）\"] --> B[\"長老審判官量距離\"]\n  B --> C[\"\
  最近城邑取母牛犢<br/>（未耕地、未負軛）\"]\n  C --> D[\"牽至流水未耕種山谷\"]\n  D --> E[\"打折母牛犢頸項\"]\n  E\
  \ --> F[\"利未祭司近前站立\"]\n  F --> G[\"長老在母牛犢上洗手宣告無辜\"]\n  G --> H[\"禱告求赦免流血罪\"]\n \
  \ H --> I[\"流血罪得赦免<br/>社區除掉血罪\"]\n```\n\n### 娶被擄女子為妻的條例（v10-14）\n進入應許地後，以色列人出去與仇敵爭戰，若擄獲**美貌女子**並**戀慕他，要娶他為妻**（v11），經文訂定[[娶被擄女子為妻的條例]]以保護弱勢。男子可領她進家，女子須**剃頭髮、修指甲、脫去被擄時所穿衣服**，住在家中**哀哭父母一個整月**（v12-13），然後始可同房，正式成為妻子。這段期間象徵喪禮與身分轉換，給予女子哀悼與適應空間。若後來男子**不喜悅他**，必須**由他隨意出去**，**決不可為錢賣他，也不可當婢女待他**，**因為你玷污了他**（v14）。條例在戰爭暴力與人性尊嚴之間劃定底線，禁止將戰利品視為可任意買賣的財產。\n\
  \n### 長子名分不可隨意更改（v15-17）\n面對一夫多妻（或先後娶妻）產生的偏愛問題，經文嚴禁父親憑私意廢長立幼。若人有二妻，**一為所愛，一為所惡**，長子是**所惡之妻生的**（v15），到了分產業時，**不可將所愛之妻生的兒子立為長子，在所惡之妻生的兒子以上**（v16），卻要**認所惡之妻生的兒子為長子，將產業多加一分給他**；**因這兒子是他力量強壯時候生的，長子的名分本當歸他**（v17）。[[長子名分不可隨意更改（長子雙分條例）]]確立長子權利的客觀性，防止情感偏私破壞家庭秩序與產業繼承公義，呼應創世記雅各偏愛約瑟導致家庭悲劇的反面教材。\n\
  \n### 頑梗悖逆兒子的處理條例（v18-21）\n針對嚴重破壞家庭權威與社會秩序的兒子，經文規定嚴厲制裁。若兒子**頑梗悖逆，不聽從父母的話**，父母雖懲治他，**他仍不聽從**（v18），父母要抓住他，**帶到本地城門、本城長老那裡**（v19），控告說：「我們這兒子頑梗悖逆，不聽從我們的話，**是貪食好酒的人**」（v20）。**本城眾人就要用石頭將他打死**，**這樣，就把那惡從你們中間除掉，以色列眾人都要聽見害怕**（v21）。[[頑梗悖逆兒子的處理條例（被石頭打死）]]將家庭管教上升為公共司法程序，強調父母無私刑權，必須經長老審理、全會眾執行，目的是淨化社群、建立威懾。猶太傳統（如《密西拿》Sanhedrin\
  \ 8:1-4）對「貪食好酒」的定義、年齡限制、父母意見一致等極嚴格限制，使此條例幾乎無法執行，顯見律法重在教導而非單純刑罰。\n\n### 犯死罪被掛屍的規定（v22-23）\n\
  章末處理死刑執行後的屍體待遇。人若**犯該死的罪，被治死了，你將他掛在木頭上**（v22），但**屍首不可留在木頭上過夜，必要當日將他葬埋**，**免得玷污了耶和華─你神所賜你為業之地**；**因為被掛的人是在神面前受咒詛的**（v23）。[[犯死罪被掛在木頭上（屍身不可留到晚上）]]揭示「地」的聖潔與「咒詛」的神學張力：掛屍雖為警示，但過夜則污穢聖地，因被掛者承擔神的咒詛。新約加拉太書3:13引用此節，指基督為我們成了咒詛，**吊在木頭上**，替贖我們脫離律法的咒詛，成為跨約神學的核心預表。\n\
  \n### 跨章脈絡：生命聖潔與社會公義\n申命記21章以五個看似分散的條例，實則圍繞**「不可玷污耶和華你神所賜你為業之地」**（v23）這一核心神學主軸：無辜血污染土地（v1-9）、戰爭中弱勢女性的尊嚴保護（v10-14）、產業繼承的公義秩序（v15-17）、淨除社群內部的惡（v18-21）、死刑執行後的土地聖潔維護（v22-23）。這些條例共同建構一個「聖潔社群」的倫理想像：生命不可輕視、弱勢不可欺壓、秩序不可紊亂、惡不可容忍、咒詛不可留存。這正是申命記「公義、公義，你要追求」（16:20）在具體社會層面的展開。"
