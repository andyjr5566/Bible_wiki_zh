name: 犯死罪被掛在木頭上（屍身不可留到晚上）
type: 神學
secondary_types: []
aliases:
- 掛屍示眾條例
- 屍身當日入葬法
status: formal
definition: 人犯該死的罪被治死，若將屍首掛在木頭上，不可留到過夜，必要當日葬埋，免得玷污耶和華神所賜為業之地，因被掛的人是在神面前受咒詛的（申21:22-23）。
development: 規範死刑執行後的屍體處理，限制公開示眾時間，保護土地不被咒詛玷污，保障死者基本尊嚴；新約加拉太書3:13引用此節論基督替贖咒詛。
accumulations:
- book: 申命記
  chapter: 21
  summary: 規定犯死罪被掛木頭者屍身不可留過夜，當日必須葬埋，因被掛者受神咒詛。
  relation: 本章刑罰執行細節，涉及土地聖潔與咒詛神學，為新約基督論奠基。
related_entries:
