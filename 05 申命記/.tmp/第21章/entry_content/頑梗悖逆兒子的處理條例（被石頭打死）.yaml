name: 頑梗悖逆兒子的處理條例（被石頭打死）
type: 事件
secondary_types: []
aliases:
- 悖逆兒子石刑條例
- 頑梗兒子處死法
status: formal
definition: 人若有頑梗悖逆的兒子，不聽從父母話語，經懲治仍不聽從，父母將他帶到城門長老面前，指控他頑梗悖逆、貪食好酒，本城眾人用石頭將他打死，除掉中間的惡，使以色列眾人聽見害怕（申21:18-21）。
development: 此條例以極端刑罰維護家庭權威與社會秩序，強調父母管教責任與社區共同執行公義，屬於「除惡」類律法。
accumulations:
- book: 申命記
  chapter: 21
  summary: 規定頑梗悖逆兒子經父母呈報長老，由全城眾人石頭打死。
  relation: 本章家庭與社會秩序條例，展現嚴厲的除惡機制。
related_entries:
