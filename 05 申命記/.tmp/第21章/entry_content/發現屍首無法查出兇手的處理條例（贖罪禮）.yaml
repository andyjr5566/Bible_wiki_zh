name: 發現屍首無法查出兇手的處理條例（贖罪禮）
type: 事件
secondary_types: []
aliases:
- 打折母牛犢禮
- 未破案殺人贖罪禮
status: formal
definition: 當在耶和華所賜地上發現被殺屍首、不知兇手為誰時，長老與審判官量度距離，最近之城的長老取未曾耕地、未曾負軛的母牛犢，牽至流水未耕種的山谷打折頸項；利未子孫祭司近前，長老在母牛犢以上洗手禱告：「我們的手未曾流這人的血，我們的眼也未曾看見」，求神赦免以色列民流無辜血的罪，使罪得赦免（申21:1-9）。
development: 本條例為社會無法追究兇手時的集體贖罪機制，強調社區對無辜流血的責任與潔淨土地的神學關切。
accumulations:
- book: 申命記
  chapter: 21
  summary: 規定發現屍首無法查出兇手時，最近城邑長老以母牛犢贖罪、洗手禱告，除掉流無辜血的罪。
  relation: 本章核心贖罪禮儀，確立社區對無辜血的共同責任與潔淨程序。
related_entries:
