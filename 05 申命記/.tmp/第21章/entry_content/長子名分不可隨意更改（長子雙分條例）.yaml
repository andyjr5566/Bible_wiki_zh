name: 長子名分不可隨意更改（長子雙分條例）
type: 神學
secondary_types: []
aliases:
- 長子雙分條例
- 長子名分保障法
status: formal
definition: 人若有二妻，一為所愛、一為所惡，長子若是所惡之妻所生，分產業時不可將所愛之妻生的兒子立為長子超過他，必須認所惡之妻生的兒子為長子，將產業多加一分給他，因這兒子是父親力量強壯時生的，長子名分本當歸他（申21:15-17）。
development: 保障長子繼承權不因父親偏愛而被剝奪，確立「長子雙分」為不可讓與的法律權利，反映神對公義與秩序的維護。
accumulations:
- book: 申命記
  chapter: 21
  summary: 禁止因偏愛而更改長子名分，規定長子得雙分產業。
  relation: 本章家庭產業繼承法，維護長子權利與社會公義。
related_entries:
