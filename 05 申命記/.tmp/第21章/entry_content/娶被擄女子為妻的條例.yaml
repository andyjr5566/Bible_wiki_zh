name: 娶被擄女子為妻的條例
type: 神學
secondary_types: []
aliases:
- 娶俘虜女子條例
- 戰爭俘虜婚姻法
status: formal
definition: 以色列人出戰擄掠時，若見美貌女子戀慕欲娶為妻，可領回家，女子須剃髮、修指甲、脫去被擄衣服，哀哭父母一個月，然後始可同房；若後來不喜悅，必須任其隨意出去，不可為錢賣他、也不可當婢女待他，因為玷污了他（申21:10-14）。
development: 此條例在古近東戰爭習慣中，為被擄女子提供法律保護，限制戰勝者任意處置權，體現神對弱勢者的公義關懷。
accumulations:
- book: 申命記
  chapter: 21
  summary: 規定娶被擄女子為妻的程序與保障，包括哀哭期、不可賣錢、不可當婢女。
  relation: 本章婚姻倫理與人權保障條例，展現戰爭情境下的神學倫理要求。
related_entries:
