    type: "神學"
    evidence: "經文第6、13、24節「你本是硬著頸項的百姓」；ccbiblestudy CT 解釋硬著頸項意指剛硬、倔強、頑梗、悖逆；KingComments 指出比喻源於不肯負軛的公牛；BibleHub 連結出32:9、33:3、34:9。"
