  - name: "亞衲族（亞衲人）"
    type: "人物"
    evidence: "經文第2節「那民是亞衲族的人，又大又高」；ccbiblestudy CT 解釋亞衲族為身材魁偉的巨人族、原文字義「頸項」；KingComments 指出亞衲族代表屬靈意義上的艱難；BibleHub 連結民13:33。"
    surfaces:
      - phrase: "亞衲族"
        verses: [2]
      - phrase: "亞衲族人"
        verses: [2]

  - name: "烈火（神如烈火）"
    type: "神學"
    evidence: "經文第3節「耶和華─你的神在你前面過去，如同烈火，要滅絕他們」；ccbiblestudy CT 指出烈火指神忌邪的怒火(申4:24)；KingComments 指出神走在子民前面與他們一同作戰；BibleHub 連結出24:11。"
    surfaces:
      - phrase: "如同烈火"
        verses: [3]
      - phrase: "烈火"
        verses: [3]

  - name: "非因你的義（得地非因義）"
    type: "神學"
    evidence: "經文第4-6節三次強調「並不是因你的義」；ccbiblestudy CT 指出神一切所作都是白得的恩典；KingComments 強調自以為義是靈命重病；BibleHub 連結弗2:8-9。"
    surfaces:
      - phrase: "不是因你的義"
        verses: [4, 5, 6]
      - phrase: "非因你的義"
        verses: [4, 5, 6]
      - phrase: "得地非因義"
        verses: [4, 5, 6]

  - name: "迦南人的惡（國民的惡）"
    type: "神學"
    evidence: "經文第4-5節「耶和華將他們從你面前趕出去是因他們的惡」；ccbiblestudy CT 指出迦南人因拜偶像的惡行失去所有權；KingComments 指出罪孽滿盈(創15:16)；BibleHub 連結創15:16。"
    surfaces:
