    type: "原文"
    evidence: "經文第9-11、15、17節「兩塊石版，就是耶和華與你們立約的版」；ccbiblestudy CT 指出兩塊石版即十誡、神用指頭寫的；KingComments 指出兩塊石版即約版、法版；BibleHub 連結出31:12、34:28。"
