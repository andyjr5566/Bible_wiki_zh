        verses: [4, 5]
      - phrase: "國民的惡"
        verses: [4, 5]
      - phrase: "因他們的惡"
        verses: [4, 5]

  - name: "堅定祂向列祖起誓所應許的話"
    type: "神學"
    evidence: "經文第5節「又因耶和華要堅定祂向你列祖亞伯拉罕、以撒、雅各起誓所應許的話」；ccbiblestudy CT 指出信實的神必須履行所立的約；KingComments 指出神照著自己可喜悅的旨意揀選；BibleHub 連結創15:18、17:7-8、28:13。"
