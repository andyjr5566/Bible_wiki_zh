organization: '### 進迦南非因義，乃因列祖之約與國民之惡（v1-6）


  摩西以「以色列啊，你當聽！」開篇（與 6:4 示馬呼召呼應），提醒以色列即將過河，面對[[亞衲族]]這等又大又高的國民與堅固城邑（v1-2）。GT 指出：以色列不過是經歷四百年為奴與四十年曠野、精疲力竭的烏合之眾，軍事力量懸殊。關鍵在於：耶和華必如烈火在前滅絕他們（v3）。GT
  解釋「速速滅亡」與 7:22「漸漸趕出」不矛盾——前者指迦南社會體系的迅速瓦解，後者指居民的逐步驅逐。摩西嚴正警告：得地**非因你的義**，也非因心裡正直，乃是因這些國民的惡（[[迦南人的惡（國民的惡）]]），並為要**堅定祂向列祖起誓所應許的話**[[堅定祂向列祖起誓所應許的話]]（v4-5）。GT
  指出：迦南人被滅的根本理由與所多瑪蛾摩拉相同——自亞伯拉罕得啟示（創 15:16）後七百年不斷加增的罪孽。百姓本是**硬著頸項的百姓**[[硬著頸項的百姓]]（v6），GT
  解釋此比喻源於不肯負軛的公牛。這一章反覆以此為底色，對比神的信實與人的悖逆。這段經文確立了申命記核心神學：產業的得著單單出於恩典與約，而非人為的功勞。


  ### 何烈山拜金牛犢：約版未冷，約已犯（v7-21）


  摩西命令百姓**記念不忘**在曠野如何惹神發怒，**自出埃及直到如今，時常悖逆**（[[曠野悖逆（時常悖逆）]]，v7）。GT 指出：「自從出埃及的那日」強調四十年曠野史全是悖逆史。焦點落在**何烈山**事件：摩西上山四十晝夜領受兩塊石版，是神用指頭寫的，內容是**大會的日子（西奈山大會）**[[大會的日子（西奈山大會）]]從火中所說的話（v9-10）。GT
  指出：七十士譯本將「大會」譯為 ekklesia（教會，徒 7:38）。山上約版未冷，山下百姓已**快快偏離**鑄成金牛犢（v12, 16）。GT 指出：神在此稱以色列為「你（摩西）的百姓」而非「我的百姓」——因拜偶像，聖約已被破壞。摩西親見摔碎約版（v17），並為百姓與亞倫雙重代禱（v18-20），將牛犢燒毀磨細撒入溪水（v21）。此段揭示**亞倫的罪（神向亞倫發怒）**[[亞倫的罪（神向亞倫發怒）]]與百姓的頑梗同樣嚴重，唯有摩西的代求擋住滅絕之禍。


  ### 曠野多處悖逆與加低斯巴尼亞不信（v22-24）


  經文串聯他備拉、瑪撒、基博羅哈他瓦等地的悖逆（v22），並點出加低斯巴尼亞拒絕進地、違背命令、不信不聽（v23）。摩西總結：自從認識你們以來，**常常悖逆耶和華**（v24），將「硬著頸項」具體化為一連串歷史見證。這些地名串聯起來，構成了[[曠野悖逆（時常悖逆）]]的完整證據鏈，證明百姓的頑梗非一日之寒。


  ### 摩西兩次四十晝夜代禱：訴諸神的名、產業與榮耀（v25-29）


  面對神要滅絕百姓的宣告，摩西**第二次俯伏四十晝夜**（v25），代禱內容極具神學深度：求神因祂的大能救贖（v26）、因列祖亞伯拉罕、以撒、雅各（v27）、因神的名在列邦中不被褻瀆（v28）、因百姓是神的產業（v29）而饒恕。這不是為百姓的義，單單訴諸神的約與榮耀——呼應本章開頭「非因你的義」的核心神學。這雙重**摩西代禱（為百姓代求）**[[摩西代禱（為百姓代求）]]成為舊約中保職分的經典範式。


  ### 跨章脈絡：從「非因義」到「唯獨恩典」的申命記神學樞紐


  本章是申命記「歷史回顧」單元（1-11章）的神學高峰。它將**得地之由**（非因義、因列祖之約、因迦南之惡）、**百姓之質**（硬頸、悖逆、拜偶像）、**中保之功**（摩西雙重四十晝夜代禱、摔碎重立約版）三大張力張滿。GT
  總結：摩西的講論核心是「當紀念神的慈愛時，決不能誇耀自己的功勞，反而存感恩之心，變得更加謙卑」。這為後續第 10 章重立約版、第 11 章勸勉愛神遵命、以及全書「因恩典得地、當順服守約」的雙重動力奠定基石。新約保羅在羅馬書
  9-11 章、加拉太書 3 章對「非出於行為、乃是出於召喚之人」的論述，即深植於此章神學土壤。'
