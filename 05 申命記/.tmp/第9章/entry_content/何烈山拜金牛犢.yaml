definition: 申命記 9:8-12,16-17 記載以色列在何烈山鑄造金牛犢，惹耶和華大發烈怒，摩西摔碎兩塊約版。
development: 此事件導致摩西第一次四十晝夜代禱，並促使神重立約版。
