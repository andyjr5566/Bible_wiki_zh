name: 非因你的義（得地非因義）
type: 神學
secondary_types: []
aliases:
- 得地非因義
status: formal
definition: 根據申命記 9:4-6，以色列得迦南地並非因自身的義或心裡正直，乃是因迦南國民的惡與神向列祖起誓的應許。
development: 摩西提醒百姓不可自誇，強調神的恩典與公義是得地的根基。
accumulations:
- book: 申命記
  chapter: 9
  summary: 經文 4-6 節說明得地非因義，乃因國民的惡與神的應許。
  relation: 本章核心神學論點，奠定以色列得地的依據。
related_entries:
- 迦南人的惡（國民的惡）
- 堅定祂向列祖起誓所應許的話
