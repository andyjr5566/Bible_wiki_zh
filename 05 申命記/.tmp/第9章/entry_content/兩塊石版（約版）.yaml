name: 兩塊石版（約版）
type: 原文
secondary_types: []
aliases:
- 約版
- 兩塊石版
- 石版
- luchot (לֻחֹת)
- luach (לֻחַ)
status: formal
definition: 希伯來文「盧阿赫」（luach, לֻחַ，複數 luchot, לֻחֹת），意指「石版」、「木板」或「書版」。在申命記第9章，特指「兩塊石版」（v.9,
  10, 11, 15, 17）即「約版」（v.9, 11, 15），是西奈山（何烈山）上耶和華與以色列立約的憑據。版上文字為「神用指頭寫的」（v.10），內容是「耶和華在大會的日子、在山上、從火中對你們所說的一切話」（v.10），即十誡。摩西在山上四十晝夜不吃不喝領受（v.9,
  11），下山見百姓拜金牛犢，便在百姓眼前摔碎兩塊版（v.17），象徵約關係的破裂。此後摩西再次代禱四十晝夜（v.18, 25），神吩咐摩西鑿出兩塊石版重上山（參申10:1-5），重寫十誡。
development: 本術語貫穿出埃及記至申命記。出埃及記24:12 神應許賜給摩西石版；31:18 交給摩西兩塊見證的版，是神用指頭寫的；32:15-19 摩西摔碎版；34:1,
  4, 28 神吩咐重鑿兩塊版並重寫十誡。申命記9章摩西在講論中詳細回顧此事，強調領受約版的神聖過程（四十晝夜、不吃不喝、神親筆寫成）與以色列悖逆的嚴重性（摔碎版），作為勸勉新一代順服的反面教材。申命記10章記載重版細節。
accumulations:
- book: 申命記
  chapter: 9
  summary: 摩西回顧在何烈山領受兩塊約版（神用指頭寫成）及因金牛犢事件摔碎版的經歷，強調約版代表神與以色列立約的根基。
  relation: 本章核心事件，見證神賜約與人破約，摩西代禱挽回。
