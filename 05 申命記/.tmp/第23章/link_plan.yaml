- name: 以東人埃及人不可憎惡
  suggested_type: 神學
  evidence: 經文第7-8節「不可憎惡以東人，因為他是你的弟兄。不可憎惡埃及人，因為你在他的地上作過寄居的」；ccbiblestudy CT 指出以東人是以掃後裔有血緣關係，埃及人曾在飢荒時收留雅各一家；KingComments
