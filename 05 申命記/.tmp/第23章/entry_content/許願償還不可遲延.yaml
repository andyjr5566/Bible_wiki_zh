name: 許願償還不可遲延
type: 神學
secondary_types: []
aliases:
- 許願不可遲延
- 還願不可拖延
status: formal
definition: 申命記 23:21-23 規定向耶和華許願必須儘速償還，遲延即有罪；不許願則無罪。口中所出的、甘心獻的，必須謹守遵行。強調自願敬拜的誠實性與神對言語的嚴肅追討（傳道書
  5:4-6）。
development: 民數記 30 詳細規定婦女許願的生效條件。士師記 11 耶弗他許願獻女兒為警世案例。詩篇 50:14、116:14、18 將還願視為感恩祭核心。耶穌在馬太福音
  5:33-37 教導「不可起誓」，將誠實內化為生命本質，超越外在儀式。
accumulations:
- book: 申命記
  chapter: 23
  summary: 確立許願還願的神學嚴肅性，禁止輕率與拖延。
  relation: 承接娼妓所得不可獻殿，進一步規範敬拜誠信；與借貸條例同屬言語/契約忠信範疇。
related_entries:
