name: 借給弟兄不可取利
type: 神學
secondary_types: []
aliases:
- 弟兄借貸不可取利
- 免息借貸
status: formal
definition: 申命記 23:19-20 規定借給弟兄（以色列同胞）錢財、糧食或任何可生利之物，不可取利；借給外邦人則可取利。遵行此命，神必在所得之地賜福。此條例保障立約共同體內部經濟弱勢，防止高利貸壓榨導致失地為奴（利
  25:35-37）。
development: 尼希米 5:1-13 記載尼希米責備貴族胥取利並強制歸還。詩篇 15:5、箴言 28:8 以不放債取利為義人標記。新約路加福音 6:34-35
  耶穌教導「借給人不指望償還」，將免息原則推向無條件恩典。
accumulations:
- book: 申命記
  chapter: 23
  summary: 確立立約社區內免息借貸原則，應許順服蒙福。
  relation: 與逃奴條例同屬社會經濟正義，體現「聖潔」的具體經濟倫理表現。
related_entries:
