name: 以東人埃及人不可憎惡
type: 神學
secondary_types: []
aliases:
- 以東人不可憎惡
- 埃及人不可憎惡
status: formal
definition: 申命記 23:7-8 命以色列不可憎惡以東人（因為是弟兄，雅各的雙生兄以掃後裔）與埃及人（因以色列曾在其地寄居）。他們第三代子孫可入耶和華的會。展現神對歷史恩情的記取與對血緣關係的尊重，超越民族仇恨。
development: 以東後來屢次敵對以色列（民 20:14-21；俄巴底亞書），但律法仍要求不憎惡。埃及雖曾奴役以色列，也曾提供避難（創 47；太 2:13-15）。第三代入會條款在尼希米
  13:1-3 執行時未被廢除，顯示律法的持續效力。
accumulations:
- book: 申命記
  chapter: 23
  summary: 規定以東、埃及人第三代可入會，與亞捫、摩押永不可入會形成強烈對比。
  relation: 體現「不以惡報惡」的倫理原則，預表新約「愛仇敵」教導（太 5:43-48）。
related_entries:
- 亞捫人摩押人不可入會
