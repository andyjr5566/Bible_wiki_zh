name: 私生子（非婚生子）（mamzēr）
type: 神學
secondary_types: []
aliases:
- 私生子
- 非婚生子
status: formal
definition: 希伯來文 mamzēr（מַמְזֵר），指非合法婚姻關係所生之子（如姦淫、亂倫）。申命記 23:2 規定私生子及其子孫至十代不可入耶和華的會，強調立約共同體的血統純潔與婚姻聖潔。
development: 猶太律法傳統（Mishnah Yevamot）將 mamzēr 限定為聖經禁止之性關係所生；拉比文獻討論其身分繼承與贖回問題。新約無直接引用，但加拉太書
  4:22-31 象徵性對比「按肉體生」與「按應許生」。
accumulations:
- book: 申命記
  chapter: 23
  summary: 列為不可入會之第二條，限制延續十代。
  relation: 與外腎受傷同屬會眾資格限制，但屬血統/倫理範疇而非生理。
related_entries:
