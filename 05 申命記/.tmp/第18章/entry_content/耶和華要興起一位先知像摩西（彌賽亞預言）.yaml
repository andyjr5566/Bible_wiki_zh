name: 耶和華要興起一位先知像摩西（彌賽亞預言）
type: 神學
secondary_types: []
aliases:
- 像摩西的先知
- 彌賽亞先知預言
status: formal
definition: 申命記 18:15-19 應許耶和華從以色列弟兄中興起一位先知像摩西，百姓要聽從他。這預言回應何烈山百姓懼怕直接聽神聲音（出 20:18-19），神設立中保先知傳達旨意。新約使徒行傳
  3:22、7:37 明確應驗於基督，祂是終極「像摩西的先知」——更大的中保、立法者、救贖主。
development: 歷代先知皆為部分應驗；基督在變像山（太 17:5）獲父神宣告「要聽從他」，完成此預言終極意義。
accumulations:
- book: 申命記
  chapter: 18
  summary: 經文應許興起一位像摩西的先知，將神的話傳給百姓，不聽者必被討罪（18:15-19）。
  relation: 直接回應第 9-14 節禁絕占卜：真屬靈引導來自神所立先知，終極指向基督。
related_entries:
