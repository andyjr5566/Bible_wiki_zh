name: 初熟之物歸祭司（五穀、新酒、油、羊毛）
type: 神學
secondary_types: []
aliases:
- 初熟之物歸祭司
status: formal
definition: 申命記 18:4 規定初收的五穀、新酒、油，並初剪的羊毛歸祭司。這「初熟之物」（reshit）奉獻承認神是全地的主，祭司代表神領受，並作為祭司家庭生活供應。此條例將農業初熟果與羊毛初剪納入祭司供應體系，補足獻祭肉類之外的糧油衣物需求。
development: 民數記 18:12-13 已規定初熟之物歸祭司；此處重申並細化品項，強調進迦南地後農牧產初熟同樣適用。
accumulations:
- book: 申命記
  chapter: 18
  summary: 經文列舉五穀、新酒、油、羊毛初熟之物歸祭司（18:4）。
  relation: 完成祭司供應全貌：獻祭肉（第 3 節）+ 農牧初熟（第 4 節）= 完整生活所需。
related_entries:
