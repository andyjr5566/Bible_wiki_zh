name: 利未祭司無分無業、耶和華是他們的產業
type: 神學
secondary_types: []
aliases:
- 利未祭司無分無業
status: formal
definition: 申命記 18:1-2 指出利未支派（包括祭司）在以色列諸支派中不得地土產業（nachalah），他們的產業是耶和華自己。這神學宣告將祭司職任與土地經濟脫鉤，確立「神自己」作為事奉者的供應根基，並預表新約信徒以神為福分（參
  彼前 2:9）。
development: 從出埃及記 19:6「祭司的國度」到此處具體化為利未支派的制度性安排；後在以西結 44:28 重申「我就是他們的產業」，新約延伸至全體信徒的屬靈產業。
accumulations:
- book: 申命記
  chapter: 18
  summary: 經文明文規定利未全支派無分無業，耶和華是他們的產業（18:1-2）。
  relation: 本章神學基石，確立祭司供應來源非土地乃神自己。
related_entries:
- 祭司應得的分（前腿、兩腮、胃）
- 初熟之物歸祭司（五穀、新酒、油、羊毛）
- 耶和華揀選利未人永遠奉祂名侍立事奉
- 利未人可來到耶和華揀選的地方事奉（同工得同酬）
