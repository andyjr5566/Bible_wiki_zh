name: 耶和華揀選利未人永遠奉祂名侍立事奉
type: 神學
secondary_types: []
aliases:
- 耶和華揀選利未人
status: formal
definition: 申命記 18:5 宣告神從諸支派中揀選利未人及其子孫，永遠奉耶和華的名侍立事奉。「侍立」（amad）語帶法庭/聖殿服侍意象，強調職任源於神主權揀選而非人意，「永遠」指出制度延續性，奠定利未祭司職分的神學合法性。
development: 回應民數記 16-17 可拉黨爭祭司職；新約希伯來書 5:4 引用此原則論基督大祭司職分同樣出於神召。
accumulations:
- book: 申命記
  chapter: 18
  summary: 經文明言耶和華揀選利未人永遠奉祂名侍立事奉（18:5）。
  relation: 為祭司供應條例（第 1-4 節）提供神學依據：既蒙揀選事奉，理當由神透過百姓供應。
related_entries:
- 利未祭司無分無業、耶和華是他們的產業
- 祭司應得的分（前腿、兩腮、胃）
- 初熟之物歸祭司（五穀、新酒、油、羊毛）
- 利未人可來到耶和華揀選的地方事奉（同工得同酬）
