name: 假先知的審判（擅自說話、奉別神名說話）
type: 解經爭議
secondary_types: []
aliases:
- 假先知審判
- 先知試驗標準
status: formal
definition: 申命記 18:20-22 訂定假先知審判標準：(1) 擅自託耶和華名說未曾吩咐的話；(2) 奉別神名說話——均必治死。另給百姓試驗標準：先知託耶和華名說話，若不成就、無效驗，即屬擅自說的，不可怕他。此段在解經上常引發「預言成就與否」作為真假先知唯一標準之爭議，亦涉及有條件預言（如約拿尼尼微）如何適用。
development: 耶利米 28 亞撒利雅與哈拿尼雅對峙實例；新約約翰一書 4:1 要求試驗諸靈；教會歷史曾用此段審視蒙派運動等預言運動。
accumulations:
- book: 申命記
  chapter: 18
  summary: 經文訂定假先知死刑與預言成就試驗標準（18:20-22）。
  relation: 為第 15-19 節真先知應許設立保護機制，防止假冒「像摩西的先知」欺騙百姓。
