organization: "### 祭司利未人的產業與供養（v1-8）\n本段確立[[利未祭司無分無業、耶和華是他們的產業|利未支派無地業]]的神學基礎：耶和華自己就是他們的產業（v2）。這不僅是經濟安排，更是關係性的宣告——祭司的生存完全倚靠神。經文隨即細列[[祭司應得的分（前腿、兩腮、胃）|具體供養條目]]：獻祭時的前腿、兩腮、胃（v3），以及[[初熟之物歸祭司（五穀、新酒、油、羊毛）|初熟之物]]（v4），這些「火祭」與「初熟」代表百姓將最好的先歸給神，神再轉賜給侍立事奉者。v5\
  \ 強調這是基於[[耶和華揀選利未人永遠奉祂名侍立事奉|神的揀選]]，而非人謀人算。v6-8 進一步規定[[利未人可來到耶和華揀選的地方事奉（同工得同酬）|利未人若遷徙至中央聖所]]，享有同工同酬的權利，除非他有祖產收入（v8），顯見神關顧事奉者的基本生計，也保障敬拜中心的人力需求。\n\
  \n### 禁絕列國可憎惡的占卜巫術（v9-14）\n進入迦南前，神嚴禁以色列學習列國的「可憎惡之事」（v9）。經文列出九項禁令（v10-11），涵蓋[[不可學習列國可憎惡的事（占卜、巫術等）|兒女經火、占卜、觀兆、法術、邪術、迷術、交鬼、巫術、過陰]]，這些行為試圖操控屬靈領域、繞過神的啟示來掌握未來或權勢。v12\
  \ 指出這些正是神趕出迦南人的原因；v13-14 以「在耶和華面前作完全人」為正面呼召，與周圍民族「聽信觀兆占卜」形成鮮明對比。這段經文劃清了「尋求神旨意」與「操控超自然」的界線：前者建立在順服啟示上，後者屬於屬靈奸淫。\n\
  \n### 像摩西的先知應許與假先知審判（v15-22）\n神應許[[耶和華要興起一位先知像摩西（彌賽亞預言）|興起一位先知像摩西]]（v15,18），這是舊約最核心的彌賽亞預言之一。背景是何烈山大會百姓懼怕直接聽神聲音（v16），神肯定他們的請求（v17），並設立中保機制：先知口傳神語（v18），百姓聽從即聽從神（v19），不聽者神親自追討。為防濫用，經文設立雙重鑑別標準（v20-22）：\n\
  1. **內容測試**：擅自說神未吩咐的話、或奉別神名說話 → [[假先知的審判（擅自說話、奉別神名說話）|必被治死]]（v20）。\n2. **應驗測試**：託耶和華名說話卻不成就、無效驗\
  \ → 乃擅自說的，不可懼怕（v22）。\n這雙重保障既維護神話語的純淨，也保護百姓免受欺騙。\n\n```mermaid\nflowchart TD\n  A[先知宣稱奉耶和華名說話]\
  \ --> B{內容是否符合已啟示真理？}\n  B -- 否/奉別神名 --> C[假先知 → 治死 v20]\n  B -- 是 --> D{預言是否應驗？}\n\
  \  D -- 不成就 --> E[假先知 → 不可懼怕 v22]\n  D -- 應驗 --> F[真先知 → 當聽從 v15,19]\n```\n\n###\
  \ 跨章脈絡：從摩西到基督的中保職分\n本章「先知像摩西」的應許在新約得到終極成就：彼得在徒3:22-23 引用 v15,19 指向基督；希伯來書3:1-6 對比摩西作僕人、基督作兒子掌管神的家。申18\
  \ 的三重職分輪廓至此浮現：祭司（v1-8）代表百姓親近神、先知（v15-22）代表神對百姓說話、君王（申17:14-20）代表神治理百姓，三者在基督裡合一。舊約祭司制度的「無分無業」預表基督捨己成全；假先知審判的嚴厲預警教會須以聖經為唯一標準試驗諸靈（約壹4:1）。"
