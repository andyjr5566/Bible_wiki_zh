"book": "申命記"
"chapter": !!int "14"
"updates":
- "title": "聖潔的民"
  "path": "link_folder/神學/聖潔的民.md"
  "summary": "申命記14:1-2 重申以色列歸耶和華為聖潔的民，根基在於神的揀選（v2「耶和華從地上的萬民中揀選你特作自己的子民」）。本章將聖潔身分具體化為三大領域：哀悼禁令（v1）、飲食律例（v3-21）、十一奉獻（v22-29），呼應申7:6聖潔民身分的倫理與敬拜延伸。"
  "relation": "本章為聖潔的民身分提供具體實踐框架：既是神的兒女（v1），就不可效法外邦喪俗（v1）；既被揀選為聖潔民（v2），飲食與財務敬拜便須分別為聖（v3-29）。與申7章聖潔民宣告互為宣告與實踐關係。"
- "title": "揀選（選民論）"
  "path": "link_folder/神學/揀選（選民論）.md"
  "summary": "申命記14:2 明確宣告「耶和華從地上的萬民中揀選你特作自己的子民」，作為聖潔生活（哀悼禁令、飲食律例、十一奉獻）的神學根基。揀選非因以色列功德，單純出於神的愛與主權，呼應申7:7-8揀選動機。"
  "relation": "本章將揀選教義應用於具體生活領域：揀選產生聖潔身分（v2→v1禁令），揀選要求飲食分別（v2→v3-21），揀選引導敬拜奉獻（v2→v22-29）。與申7章揀選宣告形成「根基→應用」關係。"
- "title": "敬畏神"
  "path": "link_folder/神學/敬畏神.md"
  "summary": "申命記14:23 指出十一奉獻在耶和華揀選立名的居所吃用，目的是「學習時常敬畏耶和華─你的神」。敬畏神在此非抽象觀念，乃透過具體敬拜行動（帶十分之一上耶路撒冷、在神面前吃喝快樂）來操練與內化。"
  "relation": "本章將敬畏神與十一奉獻敬拜連結（v23），延伸申6:2、13、7:11、21、8:6「敬畏神為遵守律法動力」的脈絡。十一奉獻成為敬畏神的具體訓練場域，呼應箴1:7「敬畏耶和華是智慧開端」。"
