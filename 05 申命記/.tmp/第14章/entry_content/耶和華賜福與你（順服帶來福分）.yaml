name: 耶和華賜福與你（順服帶來福分）
type: 神學
secondary_types: []
aliases:
- 耶和華賜福與你
status: formal
definition: 申命記 14:29 結尾應許「耶和華─你的神必在你手裡所辦的一切事上賜福與你」。此福分以順服三年一次十一奉獻、照顧利未人/寄居者/孤兒寡婦為條件。申命記反覆強調「順服帶來福分」（申
  28:1-14），福分涵蓋農業豐收、家庭興旺、國度穩固。此處特別連結社會公義行動與神經濟供應。
development: 申命記的「福分-咒詛」框架（申 27-28 章）以約法順服為軸。新約轉向屬靈福分（弗 1:3），但「神愛樂意奉獻的人」（林後 9:6-11）與「憐恤人蒙憐恤」（太
  5:7）原則承接舊約社會倫理。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 29 節作為三年十一奉獻條例的結語，應許順服照顧弱勢者必蒙神在一切手裡所辦的事上賜福。
  relation: 本章社會福利制度的神學動機與終極保障，將人際責任提升至神人關係層面。
