name: 你們是耶和華你們神的兒女（不可為死人劃身、剃額）
type: 神學
secondary_types: []
aliases:
- 神的兒女身分
status: formal
definition: 申命記 14:1-2 指出以色列人作為耶和華兒女的身分，是建立在神的揀選與聖潔呼召之上。因為屬於神、被揀選為聖潔的民、作祂的產業（v.2），所以不可效法外邦人為死人劃身、剃額（v.1），這些哀悼習俗與聖潔身分不符。兒女身分帶出順服律法的動機：不是為得地位，乃是回應已賜的身分。
development: 此段將「兒女」身分與「聖潔」行為連結，作為飲食律例與十一奉獻等後續律例的神學基礎。新約延伸此概念（羅 8:14-17；加 3:26），強調信徒在基督裡得著兒女的名分，同樣當活出聖潔。
accumulations:
- book: 申命記
  chapter: 14
  summary: 開篇宣告以色列為耶和華的兒女，因聖潔、被揀選，不可行為子民，故不可行外邦哀悼習俗（劃身、剃額）。
  relation: 本章一切律例（飲食、十一奉獻、社會關懷）皆建立於此身分與聖潔呼召之上。
