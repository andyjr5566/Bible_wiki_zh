name: 三年一次的十一奉獻（社會福利制度）
type: 事件
secondary_types: []
aliases:
- 三年一次的十一奉獻
- 社會福利制度
status: formal
definition: 申命記 14:28-29 規定「每逢三年的末一年」，將當年土產十分之一「積存在你的城中」，不帶往中央聖所，而是讓城裡的利未人、寄居者、孤兒寡婦「來，吃得飽足」。這是申命記獨有的「三年十一奉獻」（希伯來文
  ma'aser shlishi），又稱「窮人十一奉獻」，功能為社會福利再分配，確保弱勢群體基本生存，並以此順服換取神在「一切事上賜福」（第 29 節）。
development: 申命記 26:12-15 有詳細禱告宣告確認履行此制。拉比傳統（米示拿 Ma'aser Sheni）區分第一、二年十一奉獻（帶往聖所）與第三、六年十一奉獻（留本地）。此制展現律法內建社會安全網，新約教會救濟基金（徒
  4:34-35；林前 16:1-3）承接此精神。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 28-29 節訂定三年一次十一奉獻留在本城，供利未人、寄居者、孤兒寡婦食用，並應許神賜福。
  relation: 本章十一奉獻制度的社會經濟高潮，將敬拜奉獻轉化為具體扶貧制度。
