name: 潔淨與不潔淨的食物（飲食律例）
type: 神學
secondary_types: []
aliases:
- 飲食律例總綱
status: formal
definition: 申命記 14:3-21 列出可吃與不可吃的生物，分為走獸（v.4-8）、水族（v.9-10）、飛鳥（v.11-18）、昆蟲（v.19）四類，並重申不可吃自死之物（v.21）與不可用山羊羔母的奶煮山羊羔（v.21）。核心原則在
  v.2-3、21：因你們歸耶和華為聖潔的民，所以飲食須分別潔淨不潔淨，以彰顯屬神子民的身分。
development: 此律例源於創世記 7:2（挪亞方舟已有潔淨不潔淨之分），利未記 11 詳細列表，申命記 14 重申並強調神學意義：聖潔、揀選、身分認同。新約馬可
  7:19、使徒行傳 10:15、羅馬書 14:14、提前 4:4-5 指出在基督裡食物不再分潔淨不潔淨，但「凡事都要榮耀神」的原則長存。
accumulations:
- book: 申命記
  chapter: 14
  summary: 本章 3-21 節系統性列出走獸、水族、飛鳥、昆蟲的潔淨標準，並禁止自死物與煮山羊羔在母奶中。
  relation: 此飲食律例是「聖潔的民」身分在日常生活中的具體化，與十一奉獻、三年一次十一奉獻同屬敬拜與生活整全的表現。
related_entries:
