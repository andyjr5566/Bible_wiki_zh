name: 潔淨與不潔淨的水族（有翅有鱗）
type: 神學
secondary_types: []
aliases:
- 水族潔淨標準
status: formal
definition: 申命記 14:9-10 規定水族潔淨標準：「凡有翅有鱗的都可以吃；凡無翅無鱗的都不可吃，是與你們不潔淨」。此標準同利未記 11:9-12。有翅有鱗者（如多數魚類）可吃；無翅無鱗者（如貝類、甲殼類、鰻魚、鯊魚）不可吃。此標準簡單明確，易於辨識。
development: 此標準在利未記 11、申命記 14 完全一致。猶太律法視此為神賜邊界，保護百姓免受食物中毒（貝類易致敏、積聚毒素）並訓練順服。新約廢除食物律（徒
  10:15；提前 4:4），但「辨別潔淨不潔淨」的屬靈操練（來 5:14）仍屬信徒功課。
accumulations:
- book: 申命記
  chapter: 14
  summary: 9-10 節以「有翅有鱗」為水族潔淨唯一標準，無翅無鱗者一律不潔淨。
  relation: 此為「潔淨與不潔淨的食物」中水族部分，與走獸、飛鳥、昆蟲並列，構成完整飲食分別體系。
