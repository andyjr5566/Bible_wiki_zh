name: 自死的不可吃（可給寄居者或賣與外人）
type: 神學
secondary_types: []
aliases:
- 自死的不可吃
status: formal
definition: 申命記 14:21 規定「凡自死的，你們都不可吃，可以給你城裡寄居的吃，或賣與外人吃」。自死之物（希伯來文 nevelah）指非經宰殺而自然死亡的牲畜，因血未盡流出，屬不潔淨。但允許給城裡的寄居者（ger）食用或賣與外人（nokri），顯示律法對聖潔民（以色列人）與非立約者有不同要求，並體現對寄居者的照顧。
development: 利未記 17:15 規定吃自死之物須潔淨至晚上，此處申命記更嚴格禁止以色列人食用，強化「歸耶和華為聖潔的民」身分。新約提及「勒死的牲畜」仍勸戒外邦信徒禁食（徒
  15:20）。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 21 節禁止以色列人吃自死之物，但允許給寄居者吃或賣與外人，並連帶禁止「用山羊羔母的奶煮山羊羔」。
  relation: 本章飲食律例的總結性規定，彰顯聖潔民的飲食分別與社會關懷張力。
related_entries:
- 潔淨與不潔淨的食物（飲食律例）
- 利未人、寄居的、孤兒寡婦（社會關懷）
- 不可用山羊羔母的奶煮山羊羔
- 你們是耶和華你們神的兒女（神的兒女身分）
