name: 利未人不可被忽略（利未人無分無業）
type: 神學
secondary_types: []
aliases:
- 利未人供養
status: formal
definition: 申命記 14:27、29 兩次提到「住在你城裡的利未人，你不可丟棄他，因為他在你們中間無分無業」。利未人因服事聖所、教導律法，不分地業（民
  18:20-24），仰賴十一奉獻與百姓供養。本章在年度十一奉獻（v.27）與三年一次十一奉獻（v.29）中，均強調不可忽略利未人，並將他們與寄居者、孤兒、寡婦並列為社會弱勢群體。
development: 此規定貫穿申命記（12:12,19；14:27,29；16:11,14；18:1-2；26:11-13），顯示神對事奉者與弱勢者的關懷。新約延伸為「勞苦得工價」（提前
  5:17-18；林前 9:13-14）與教會照顧同工責任。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 27 節（年度十一奉獻）與第 29 節（三年一次十一奉獻）雙重強調不可丟棄無分無業的利未人。
  relation: 此條款是十一奉獻制度中社會正義與敬拜整全的體現，連結「利未人、寄居的、孤兒寡婦（社會關懷）」與「耶和華賜福與你」。
