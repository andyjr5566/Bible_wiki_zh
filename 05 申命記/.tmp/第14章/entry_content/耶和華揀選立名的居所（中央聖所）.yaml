name: 耶和華揀選立名的居所（中央聖所）
type: 神學
secondary_types: []
aliases:
- 耶和華揀選立名的居所
- 中央聖所
status: formal
definition: 申命記 14:23 提到「耶和華─你神所選擇要立為他名的居所」，即中央聖所（希伯來文 maqom asher yivchar Yahweh
  leshaken shemo sham）。這是神指定獨一敬拜中心，以色列人須將十一奉獻（五穀、新酒、油、牛羊頭生）帶往該處，在耶和華面前吃喝，學習敬畏神。此概念貫穿申命記
  12 章以降的敬拜改革，預表耶路撒冷聖殿（王上 8:29）。
development: 從會幕（示羅）到聖殿（耶路撒冷），中央聖所制度防止拜高崗、混合崇拜，統一敬拜規範。新約時代耶穌成爲真居所（約 2:21），信徒靈與真理拜父（約
  4:21-24），地理聖所功能完成。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 23、24 節兩次提到「耶和華所選擇要立為他名的居所/地方」，作為十一奉獻宴樂與敬畏神的地點。
  relation: 本章十一奉獻條例的核心地理神學支點，連結敬拜、奉獻與敬畏教育。
