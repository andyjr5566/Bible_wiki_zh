name: 潔淨與不潔淨的飛鳥
type: 神學
secondary_types: []
aliases:
- 飛鳥潔淨名單
status: formal
definition: 申命記 14:11-18 採「列舉不可吃之鳥」方式，共 20 種：鵰、狗頭鵰、紅頭鵰、鸇、小鷹、鷂鷹與其類、烏鴉與其類、鴕鳥、夜鷹、魚鷹、鷹與其類、鴞鳥、貓頭鷹、角鴟、鵜鶘、禿鵰、鸕鶿、鸛、鷺鷥與其類、戴鵀、蝙蝠（v.12-18）。特徵多為猛禽、食腐鳥、夜行鳥、水鳥。第
  11、20 節兩次重申「凡潔淨的鳥，你們都可以吃」。利未記 11:13-19 列表略有差異（如鷹、鵰順序、鴕鳥譯名），但核心相同。
development: 聖經未給飛鳥通用形態標準（如走獸分蹄倒嚼、水族翅鱗），僅列舉禁鳥。猶太傳統推導出「非猛禽、非食腐、有嗉囊、有可剝胃皮、爪非四趾三前一後」等判斷規則。新約同樣廢除食物律，但「鷹聚屍首處」（太
  24:28）等意象保留不潔淨鳥的屬靈象徵。
accumulations:
- book: 申命記
  chapter: 14
  summary: 11-18 節列舉 20 種不可吃的飛鳥（含蝙蝠），兩次確認潔淨鳥可吃，採否定列舉法而非正向標準。
  relation: 此為「潔淨與不潔淨的食物」中飛鳥部分，完成走獸、水族、飛鳥、昆蟲四大類分類，彰顯聖潔民飲食生活的全面分別。
