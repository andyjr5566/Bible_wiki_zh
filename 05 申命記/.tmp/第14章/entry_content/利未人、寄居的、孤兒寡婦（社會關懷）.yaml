name: 利未人、寄居的、孤兒寡婦（社會關懷）
type: 神學
secondary_types: []
aliases:
- 利未人、寄居的、孤兒寡婦
status: formal
definition: 申命記 14:27, 29 列出三類社會弱勢群體：利未人（無分無業）、寄居者（ger，無地業權）、孤兒寡婦（無家長庇護）。第 27 節命令不可丟棄利未人；第
  29 節規定三年一次的十一奉獻積存在城中，讓他們「來，吃得飽足」。這體現神對弱勢者的特別保護，並將照顧他們視為順服約法、蒙福的條件（第 29 節下）。
development: 此三類群體在申命記重複出現（10:18; 14:29; 16:11,14; 24:19-21; 26:12-13; 27:19），形成「社會正義三角」。新約教會延續此原則（徒
  6:1-6; 雅 1:27; 提前 5:3-16），視照顧弱勢為真宗教表現。
accumulations:
- book: 申命記
  chapter: 14
  summary: 第 27 節保護利未人權益；第 29 節三年十一奉獻專供利未人、寄居者、孤兒寡婦吃飽，並應許神賜福。
  relation: 本章十一奉獻制度的社會福利面向，將敬拜奉獻轉化為具體關懷行動。
