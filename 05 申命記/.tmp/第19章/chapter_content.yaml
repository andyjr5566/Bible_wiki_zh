organization: "### 逃城的設立與誤殺人的庇護（v1-7）\n本章開啟逃城制度，耶和華吩咐以色列人在承受為業的地上分定三座城，並預備道路，使[[誤殺與謀殺的區別（無心殺人\
  \ vs 恨人謀殺）|誤殺人者]]可逃往那裡存活。經文以斧頭脫把擊中鄰舍為例，具體界定「誤殺」：行兇者素無仇恨、無心殺人，非出於惡意。此制度保護無辜性命，免得報血仇者心中火熱追趕，因路遠追上將他殺死，導致無辜血流在境內。逃城的設立彰顯神對生命的憐憫，也為公義審判預留空間。\n\
  \n### 擴張境界時增設逃城（v8-10）\n神應許若照向列祖起誓擴張境界，將所應許之地全然賜下，百姓若謹守誡命、愛神遵行其道，就要在原三座城之外[[若耶和華擴張境界、再添三座逃城|再添三座城]]。這顯示逃城制度隨著應許地的拓展而擴大，目的是免得無辜之人的血流在耶和華賜為業的地上，流血的罪就歸於百姓。地理上的擴張對應著司法保護的延伸，強調「無辜血不流於地」是立國根基。\n\
  \n### 謀殺者不可得庇護（v11-13）\n與誤殺形成強烈對比，若有人恨鄰舍、埋伏謀殺，便逃到逃城，本城長老須打發人帶出他來，交在報血仇者手中治死。[[謀殺者不可在逃城存活（須交給報血仇者治死）|謀殺者不可在逃城存活]]，眼不可顧惜，務要從以色列中除掉流無辜血的罪，使以色列可以得福。這段經文劃定逃城庇護的界限：逃城非作惡者的避難所，而是保護無辜者的機制，公義必須執行到底。\n\
  \n### 產業界石與見證制度（v14-15）\n經文轉向產業與司法根基：不可挪移鄰舍的地界，那是先人所定的（[[不可挪移鄰舍的地界（產業界石不可動）|產業界石不可動]]），維護產業公義；定案不可憑一個人的口，總要憑[[見證人須兩三個口（不可憑一個人定案）|兩三個見證人]]才可定案。這兩項規定分別保障產業權與司法程序公正，是社會穩定的基石。\n\
  \n### 惡見證人的懲治與以眼還眼原則（v16-21）\n若有凶惡見證人起來作假見證，審判官要細細查究。若證實是假見證，就要[[惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）|以其謀害弟兄的方式待他]]：以命償命、以眼還眼、以牙還牙、以手還手、以腳還腳。這「以眼還眼」原則（Lex\
  \ Talionis）在此非鼓勵私人報復，乃是法庭判決的上限與公義標準——懲罰與罪行相稱，且必須經由審判官查實執行。如此把惡從中間除掉，其餘人聽見都要害怕，不敢再行這樣的惡。\n\
  \n| 情況 | 主觀意圖 | 典型例子 | 逃城庇護 | 處理方式 |\n| --- | --- | --- | --- | --- |\n| 誤殺 | 無仇恨、無心\
  \ | 砍樹斧頭脫把擊中人 | **可** 逃往逃城存活 | 留在逃城至大祭司死 |\n| 謀殺 | 有仇恨、預謀 | 埋伏起來擊殺 | **不可** 留在逃城\
  \ | 長老交給報血仇者治死 |\n\n```mermaid\nflowchart TD\n  A[\"發生殺人案件\"] --> B{\"審判官查究動機\"\
  }\n  B -- \"無心誤殺\" --> C[\"逃往逃城庇護\"]\n  C --> D[\"報血仇者不可殺害\"]\n  B -- \"預謀謀殺\" -->\
  \ E[\"長老從逃城帶回\"]\n  E --> F[\"交給報血仇者治死\"]\n  F --> G[\"除掉流無辜血的罪\"]\n  style C fill:#d4f6d4,stroke:#2e7d32\n\
  \  style F fill:#f6d4d4,stroke:#c62828\n```\n\n### 跨章脈絡：逃城制度的神學意涵\n申19章的逃城制度在約書亞記20章落實執行，新約希伯來書6:18將其預表為「逃避罪刑、抓住指望」的信徒。逃城預表基督是終極的避難所：誤殺者（罪人）若奔入基督（逃城），便得庇護免受審判（報血仇者）；但頑梗不悔的謀殺者（拒絕基督者）無分於此庇護。經文中「除掉流無辜血的罪」與「以眼還眼」的公義原則，最終在十字架上由基督替罪人擔當，成就憐憫與公義的親嘴。"
