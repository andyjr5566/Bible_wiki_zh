book: 申命記
chapter: 19
links:
- verse: 4
  phrase: 素無仇恨，無心殺了人的
  target: 誤殺與謀殺的區別（無心殺人 vs 恨人謀殺）
- verse: 5
  phrase: 斧頭脫了把，飛落在鄰舍身上
  target: 誤殺與謀殺的區別（無心殺人 vs 恨人謀殺）
- verse: 9
  phrase: 再添三座城
  target: 若耶和華擴張境界、再添三座逃城
- verse: 12
  phrase: 本城的長老就要打發人去，從那裡帶出他來
  target: 謀殺者不可在逃城存活（須交給報血仇者治死）
- verse: 12
  phrase: 交在報血仇的手中，將他治死
  target: 謀殺者不可在逃城存活（須交給報血仇者治死）
- verse: 13
  phrase: 你眼不可顧惜他，卻要從以色列中除掉流無辜血的罪
  target: 謀殺者不可在逃城存活（須交給報血仇者治死）
- verse: 14
  phrase: 不可挪移你鄰舍的地界
  target: 不可挪移鄰舍的地界（產業界石不可動）
- verse: 14
  phrase: 那是先人所定的
  target: 不可挪移鄰舍的地界（產業界石不可動）
- verse: 15
  phrase: 不可憑一個人的口作見證
  target: 見證人須兩三個口（不可憑一個人定案）
- verse: 15
  phrase: 總要憑兩三個人的口作見證才可定案
  target: 見證人須兩三個口（不可憑一個人定案）
- verse: 16
  phrase: 若有凶惡的見證人起來，見證某人作惡
  target: 惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）
- verse: 19
  phrase: 你們就要待他如同他想要待的弟兄
  target: 惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）
- verse: 21
  phrase: 以命償命，以眼還眼，以牙還牙，以手還手，以腳還腳
