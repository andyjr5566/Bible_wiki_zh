book: "05 申命記"
chapter: 19
candidates:
  - name: "逃城（三座逃城、誤殺者的庇護所）"
    type: "事件"
    evidence: |
      經文第1-10節「你要在耶和華─你神所賜你為業的地上分定三座城……使誤殺人的，都可以逃到那裡去存活」；ccbiblestudy CT 指出逃城是神的恩典、預表基督為避難所；KingComments 指出逃城預表基督為罪人的避難所。
    surfaces:
      - phrase: "分定三座城"
        verses: [2]
      - phrase: "誤殺人的，都可以逃到那裡去存活"
        verses: [3]
      - phrase: "逃到那些城的一座城，就可以存活"
        verses: [4, 5]
      - phrase: "預備道路，使誤殺人的，都可以逃到那裡去"
        verses: [3]

  - name: "誤殺與謀殺的區別（無心殺人 vs 恨人謀殺）"
    type: "神學"
    evidence: |
      經文第4-6、11-13節區分誤殺（斧頭脫把、素無仇恨）與謀殺（恨鄰舍、埋伏擊殺）；ccbiblestudy CT 指出神看重心意、區分無心與故意；KingComments 指出這預表基督審判人心。
    surfaces:
      - phrase: "素無仇恨，無心殺了人的"
        verses: [4]
      - phrase: "斧頭脫了把，飛落在鄰舍身上"
        verses: [5]
      - phrase: "若有人恨他的鄰舍，埋伏著起來擊殺他"
        verses: [11]
      - phrase: "以命償命，以眼還眼，以牙還牙"
        verses: [21]

  - name: "若耶和華擴張境界、再添三座逃城"
    type: "事件"
    evidence: |
      經文第8-10節「耶和華─你神若照他向你列祖所起的誓擴張你的境界……就要在這三座城之外，再添三座城」；ccbiblestudy CT 指出神應許擴張境界、逃城隨之增加；KingComments 指出這預表恩典不斷擴展。
    surfaces:
      - phrase: "耶和華你神若照他向你列祖所起的誓擴張你的境界"
        verses: [8]
      - phrase: "再添三座城"
        verses: [9]
      - phrase: "免得無辜之人的血流在耶和華你神所賜你為業的地上"
        verses: [10]

  - name: "謀殺者不可在逃城存活（須交給報血仇者治死）"
    type: "神學"
    evidence: |
      經文第11-13節「若有人恨他的鄰舍，埋伏著起來擊殺他……本城的長老就要打發人去，從那裡帶出他來，交在報血仇的手中，將他治死」；ccbiblestudy CT 指出謀殺者不可庇護、必須清除惡；KingComments 指出這預表基督審判惡人。
    surfaces:
      - phrase: "若有人恨他的鄰舍，埋伏著起來擊殺他"
        verses: [11]
      - phrase: "本城的長老就要打發人去，從那裡帶出他來"
        verses: [12]
      - phrase: "交在報血仇的手中，將他治死"
        verses: [12]
      - phrase: "你眼不可顧惜他，卻要從以色列中除掉流無辜血的罪"
        verses: [13]

  - name: "不可挪移鄰舍的地界（產業界石不可動）"
    type: "神學"
    evidence: |
      經文第14節「在耶和華─你神所賜你承受為業之地，不可挪移你鄰舍的地界，那是先人所定的」；ccbiblestudy CT 指出地界代表神的秩序、不可侵犯；KingComments 指出這預表基督徒不可侵犯他人產業。
    surfaces:
      - phrase: "不可挪移你鄰舍的地界"
        verses: [14]
      - phrase: "那是先人所定的"
        verses: [14]

  - name: "見證人須兩三個口（不可憑一個人定案）"
    type: "神學"
    evidence: |
      經文第15節「人無論犯什麼罪，作什麼惡，不可憑一個人的口作見證，總要憑兩三個人的口作見證才可定案」；ccbiblestudy CT 指出多重見證確保公義；KingComments 指出這預表教會紀律需多重見證。
    surfaces:
      - phrase: "不可憑一個人的口作見證"
        verses: [15]
      - phrase: "總要憑兩三個人的口作見證才可定案"
        verses: [15]

  - name: "惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）"
    type: "神學"
    evidence: |
      經文第16-21節「若有凶惡的見證人起來，見證某人作惡……你們就要待他如同他想要待的弟兄。這樣，就把那惡從你們中間除掉」；ccbiblestudy CT 指出以其人之道還治其人之身；KingComments 指出這預表基督公義審判。
    surfaces:
      - phrase: "若有凶惡的見證人起來，見證某人作惡"
        verses: [16]
      - phrase: "你們就要待他如同他想要待的弟兄"
        verses: [19]
      - phrase: "以命償命，以眼還眼，以牙還牙，以手還手，以腳還腳"
        verses: [21]