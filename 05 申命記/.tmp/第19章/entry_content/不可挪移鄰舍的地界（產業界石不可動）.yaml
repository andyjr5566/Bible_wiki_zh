name: 不可挪移鄰舍的地界（產業界石不可動）
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 19 章 14 節命令在耶和華神所賜承受為業之地，不可挪移鄰舍的地界，那是先人所定的。地界石代表神所分配的產業權利，挪移地界屬侵佔產業、違背神旨意的惡行。
development: 此條例緊接逃城條例之後，從生命公義延伸至產業公義。神是土地的主人，透過拈鬮分給各支派家族，祖先所立界石乃神旨的具體標記，挪移地界即侵犯神的主權與鄰舍的產業權。
accumulations:
- book: 申命記
  chapter: 19
  summary: 禁止挪移祖先所定的產業界石，維護神所分配的產業秩序與鄰舍權益。
  relation: 從保護生命（逃城）延伸至保護產業（地界），構成社會公義的完整圖景。
