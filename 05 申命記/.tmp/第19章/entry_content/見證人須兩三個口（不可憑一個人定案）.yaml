name: 見證人須兩三個口（不可憑一個人定案）
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 19 章 15 節規定人無論犯什麼罪、作什麼惡，不可憑一個人的口作見證，總要憑兩三個人的口作見證才可定案。此為司法程序的基本原則，確保證詞可靠，防止誣告與誤判。
development: 此條例為後續處理惡見證人（16-21 節）奠定基礎。多重見證要求反映對人性謊言傾向的認知，並保障被告權益，體現法律程序的公正與嚴謹。
accumulations:
- book: 申命記
  chapter: 19
  summary: 確立定案須憑兩三個見證人之口，不可單憑一人，作為司法審判的程序正義基石。
  relation: 為審判惡見證人提供程序基準，並保障被告免受單一證詞誣陷。
related_entries:
- 惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）
