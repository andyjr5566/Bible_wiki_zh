name: 惡見證人以其謀害弟兄的方式被待（以命償命、以眼還眼）
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 19 章 16-21 節規定若有凶惡見證人起見證某人作惡，審判官要細細查究，若見證人果然作假見證陷害弟兄，就要待他如同他想要待的弟兄：以命償命、以眼還眼、以牙還牙、以手還手、以腳還腳。眼不可顧惜，把惡從中間除掉，使眾人聽見害怕，不敢再行這惡。
development: 此為「以牙還牙」律法（lex talionis）在司法誣告上的具體應用。惡見證人企圖用法律謀害無辜，反受其謀害之刑罰。此法兼具懲罰、威嚇、潔淨社群功能，強調司法公義不可被惡意操弄。
accumulations:
- book: 申命記
  chapter: 19
  summary: 規定惡見證人（凶惡見證人）被查實後，須按其意圖陷害弟兄的刑罰受罰（以命償命、以眼還眼），除惡嚇阻。
  relation: 保護見證制度公信力，與「兩三見證人定案」互補，維護司法公義不被濫用。
related_entries:
- 見證人須兩三個口（不可憑一個人定案）
