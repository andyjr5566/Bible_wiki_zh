name: 謀殺者不可在逃城存活（須交給報血仇者治死）
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 19 章 11-13 節規定，若有人恨鄰舍、埋伏擊殺致死，雖逃往逃城，本城長老仍須打發人將他帶出，交在報血仇者手中治死。眼不可顧惜，要從以色列中除掉流無辜血的罪，使國度得福。
development: 經文強調逃城非謀殺者的避罪所。長老有責任審查案情，若確為謀殺，必須主動移交兇手給報血仇者執行死刑，體現公義不可被儀式性庇護所推翻，並強調「除掉流無辜血的罪」是社群蒙福的前提。
accumulations:
- book: 申命記
  chapter: 19
  summary: 規定謀殺者雖逃入逃城，長老仍須移交報血仇者治死，不可顧惜，以除掉流無辜血的罪。
  relation: 保護逃城制度不被濫用，維護公義與聖潔，對比誤殺者得庇護的恩典。
related_entries:
- 誤殺與謀殺的區別（無心殺人 vs 恨人謀殺）
