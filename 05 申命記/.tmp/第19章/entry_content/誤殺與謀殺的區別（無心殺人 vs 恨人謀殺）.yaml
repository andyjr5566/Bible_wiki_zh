name: 誤殺與謀殺的區別（無心殺人 vs 恨人謀殺）
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 申命記 19 章 4-6、11 節區分「誤殺」（無心殺人）與「謀殺」（恨人謀殺）。誤殺指素無仇恨、無預謀的意外致死（如斧頭脫把飛落擊中鄰舍），可逃往逃城存活；謀殺指懷恨埋伏、故意擊殺鄰舍，屬謀害無辜之血，不可在逃城庇護。
development: 經文以具體案例（伐木斧頭脫把）說明誤殺情況，對比謀殺者「恨鄰舍、埋伏起來擊殺」的主觀惡意與預謀，確立逃城庇護的適用界線：只有無心殺人者才得庇護，謀殺者須被交出治死，以除掉流無辜血的罪。
accumulations:
- book: 申命記
  chapter: 19
  summary: 界定誤殺（無心、無仇恨、意外）與謀殺（懷恨、埋伏、故意）的法律標準，誤殺者可逃往逃城存活，謀殺者則不可。
  relation: 本章逃城制度的核心神學依據，區分「無辜之血」與「謀殺之血」，保障前者性命、追討後者罪責。
related_entries:
- 謀殺者不可在逃城存活（須交給報血仇者治死）
