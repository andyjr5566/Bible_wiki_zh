book: 申命記
chapter: 2
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 摩西回顧：在西珥山繞行許多日子後，神命轉向北去，經以東、摩押、亞捫之境不可爭戰，過撒烈溪與亞嫩谷，先禮後兵擊敗希實本王西宏（2:1-37）。
  relation: 本章是摩西講章「從歷史學取教訓」的第二段：三個「不可」與三個「可」的命令，訓練新世代單單聽從神的話（CT 靈訓要義）。
- title: 以掃
  path: link_folder/人物/以掃.md
  summary: 神稱以東人為「你們弟兄以掃的子孫」，已將西珥山賜給以掃為業，連腳掌可踏之處都不給以色列（2:4-5）；以掃子孫曾除滅何利人得地居住（2:12,22）。
  relation: 以掃雖無份於應許之約，神仍為他定地業——KC：神的眷顧也臨到約以外的民族，以色列必須尊重神所給別人的。
- title: 羅得
  path: link_folder/人物/羅得.md
  summary: 神兩次申明「我已將那地賜給羅得的子孫為業」：亞珥歸摩押人、亞捫人之地歸亞捫人（2:9,19）。
  relation: 羅得子孫得地業出於神對亞伯拉罕之侄的紀念——精讀本：神按著對以掃與羅得的憐恤與應許保護此三族，顯明神應許的不變與信實。
- title: 摩押人
  path: link_folder/人物/摩押人.md
  summary: 不可擾害摩押人也不可與他們爭戰，因亞珥已賜羅得子孫為業（2:9）；其地先前住著身體高大的以米人（2:10-11）。
  relation: 摩押人是羅得長女之後（創19:37），與以色列有血緣關係；GT：日後大衛與基督的直系祖先路得正是摩押女子。
- title: 亞捫人
  path: link_folder/人物/亞捫人.md
  summary: 走近亞捫人之地不可擾害不可爭戰，因那地已賜羅得子孫為業（2:19,37）；其地先前屬散送冥（利乏音人），神從亞捫人面前除滅他們（2:20-21）。
  relation: 以色列繞開亞捫全境（凡靠近雅博河的地都沒有挨近），是本章「聽從神的話」的具體憑據（2:37）。
- title: 亞摩利人
  path: link_folder/人物/亞摩利人.md
  summary: 亞摩利人希實本王西宏的地是神明令要得為業之地：「我已將西宏和他的地交在你手中」（2:24）。
  relation: 與兄弟三族相反，亞摩利人是神所命定除滅的異族（雷氏：因沉溺偶像崇拜；創15:16 罪孽滿盈）——本章一放一收，界線全由神定。
- title: 亞摩利王西宏
  path: link_folder/人物/亞摩利王西宏.md
  summary: 摩西從基底莫差使者用和睦的話求過境，西宏不容，因耶和華使他心中剛硬，為要將他交在以色列手中；在雅雜交戰，西宏與眾子眾民全被擊殺（2:26-33）。
  relation: KC：西宏原有不戰而讓路的機會，因頑梗喪失土地、王國與性命；神使他剛硬只是印證他既有的不屈態度。
- title: 何利人
  path: link_folder/人物/何利人.md
  summary: 先前何利人住在西珥，以掃子孫將他們除滅、得地居住，「就如以色列在耶和華賜他為業之地所行的一樣」（2:12,22）。
  relation: 何利人被逐是本章民族更替四例之一；啟導本：即主前1500年前後活躍於巴勒斯坦北部與敘利亞的赫倫人（Hurrians），大本營在西珥。
- title: 利乏音人
  path: link_folder/人物/利乏音人.md
  summary: 以米人與散送冥都「算為利乏音人」（2:11,20）：民數眾多、身體高大像亞衲人，分別被摩押人與亞捫人（靠神除滅）取代。
  relation: 啟導本：利乏音不是單一民族，而是迦南早期高大英雄人物的統稱——摩押人稱以米、猶大人稱亞衲、亞捫人稱散送冥；本章為此詞的分佈提供完整對照。
- title: 亞衲族人（Anaqim）
  path: link_folder/原文/亞衲族人（Anaqim）.md
  summary: 本章三次以「像亞衲人一樣」為身量標尺，形容以米人與散送冥（2:10,11,21）。
  relation: KC：連像亞衲人那樣可畏的民族都被以東、亞捫（靠神）趕出——這正反襯四十年前以色列因懼怕亞衲人而不敢進迦南的懦弱，也給新世代打氣。
- title: 以米人
  path: link_folder/人物/以米人.md
  summary: 先前有以米人住在摩押地，民數眾多、身體高大像亞衲人，也算為利乏音人；「以米」是摩押人給他們的稱呼（2:10-11）。
  relation: 原文字義「恐怖」；連這樣的巨人族都被除滅換代，見證神為列國定地業的主權。
- title: 西珥山
  path: link_folder/地點/西珥山.md
  summary: 以色列在西珥山繞行許多日子，直到神說「繞行這山的日子夠了」（2:1,3）；神已將西珥山賜給以掃為業（2:5）；先前住著何利人（2:12）。
  relation: 繞行西珥＝三十八年管教的地理座標；KC：對忠心者（摩西、約書亞、迦勒）而言，全體的不忠也使他們同受繞行之苦。
- title: 海（紅海）
  path: link_folder/地點/海（紅海）.md
  summary: 轉回「從紅海的路」往曠野去（2:1），呼應申1:40 的命令。
  relation: 啟導本：此處紅海指阿卡巴灣；從紅海之路繞行，是舊世代退回起點的具體路線。
- title: 亞拉巴（Aravah）
  path: link_folder/地點/亞拉巴（Aravah）.md
  summary: 離開西珥後「從亞拉巴的路」經過以拉他、以旬迦別，轉向摩押曠野（2:8）。
  relation: 亞拉巴之路以阿卡巴灣頂端的以拉他、以旬迦別為起點北上，是本章行程的幹道。
- title: 摩押曠野
  path: link_folder/地點/摩押曠野.md
  summary: 離開以東地界後轉向「摩押曠野的路」去（2:8）。
  relation: CT：摩押曠野在摩押地東邊（民21:11）——以色列不入摩押本土，沿其東緣繞行，正是「不可擾害摩押人」的執行路線。
- title: 加低斯
  path: link_folder/地點/加低斯.md
  summary: 自從離開加低斯巴尼亞到過撒烈溪，共三十八年（2:14）。
  relation: 加低斯是計算三十八年的起點——從不信的地點出發，到舊世代滅盡的終點撒烈溪，構成本章的時間框架。
- title: 亞嫩河
  path: link_folder/地點/亞嫩河.md
  summary: 神命「起來前往，過亞嫩谷」，同時宣告將西宏和他的地交在以色列手中（2:24）；亞羅珥在亞嫩谷邊（2:36）。
  relation: CT：亞嫩河谷深約五百公尺、寬約三公里，是摩押與亞摩利人的分界（民21:13）——過亞嫩谷即從「不可爭戰」轉入「要爭戰」的地界。
- title: 希實本
  path: link_folder/地點/希實本.md
  summary: 西宏稱「希實本王」（2:24,26,30）。
  relation: KC：希實本原屬摩押，被亞摩利人奪去（民21:26-29）——以色列取希實本，並未取摩押人現有的產業。
- title: 基列
  path: link_folder/地點/基列.md
  summary: 從亞嫩谷邊的亞羅珥直到基列，沒有一座城高得不能攻取（2:36）。
  relation: 基列為本次征服的北界；CT：此處指狹義的基列（雅博河以北）。
- title: 雅博
  path: link_folder/原文/雅博.md
  summary: 凡靠近雅博河的地與山地的城邑，以色列都沒有挨近，因神禁止（2:37）。
  relation: 雅博河標出亞捫人地界——征服的界線止於神的禁令，與 2:36「沒有一座城攻不下」並讀，顯出「能取而不取」的順服。
- title: 以色列戰勝亞摩利王西宏
  path: link_folder/神學/以色列戰勝亞摩利王西宏.md
  summary: 申2 補充民21 視角：先差使者說和睦的話（2:26-29）；西宏不容經過是因耶和華使他心剛硬（2:30）；戰於雅雜，殺盡各城人煙，惟牲畜財物取為掠物（2:32-35）。
  relation: 精讀本：此役是迦南征服戰的序幕戰，勝訊使周邊國家聞風喪膽（書2:9-11），印證「耶和華之軍隊無所謂軍力強弱」。
- title: 以色列戰勝亞摩利王西宏互文（申2：24-37；3：1-7；詩135：10-12；136：17-22）
  path: link_folder/互文/以色列戰勝亞摩利王西宏互文（申2：24-37；3：1-7；詩135：10-12；136：17-22）.md
  summary: 申2:24-37 為互文網絡的申命記本文：神主動宣告交付（2:24,31）、西宏被使剛硬（2:30）、雅雜之戰與盡行毀滅（2:32-35）。
  relation: 本章補足互文的神學重心：勝敗繫於神的交付而非軍力——「耶和華我們的神將他交給我們」（2:33）。
- title: 申命記2章西珥賜給以掃
  path: link_folder/互文/申命記2章西珥賜給以掃.md
  summary: 本章正文：「他們的地，連腳掌可踏之處，我都不給你們，因我已將西珥山賜給以掃為業」（2:5）。
  relation: 創36 的以掃家譜與此呼應：神對非應許族裔也有定地業的眷顧；本章以此為「不可爭戰」條例的根據。
- title: 耶和華的爭戰
  path: link_folder/神學/耶和華的爭戰.md
  summary: 「我已將西宏和他的地交在你手中」（2:24）、「耶和華我們的神將他交給我們」（2:33）、「沒有一座城高得使我們不能攻取」（2:36）。
  relation: 本章顯出爭戰主權的兩面：神交付的必然得勝，神禁止的一步不越（2:37）——與申1:42「我不在你們中間」的慘敗成對照。
- title: 十一天的路程與三十八年飄流
  path: link_folder/主題/十一天的路程與三十八年飄流.md
  summary: 繞行西珥山「許多日子」；自離開加低斯巴尼亞到過撒烈溪共三十八年，等那世代兵丁滅盡（2:1,14-15）。
  relation: KC：三十八年每一天都被數算——繞行既是不信的代價，也是新世代承受應許前的預備；神看日子足夠，就命轉向北去。
