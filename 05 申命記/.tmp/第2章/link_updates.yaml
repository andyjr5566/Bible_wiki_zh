"book": "申命記"
"chapter": !!int "2"
"updates":
- "title": "基列"
  "path": "link_folder/地點/基列.md"
  "summary": "申2:36記載以色列征服西宏後，「從亞嫩谷邊的亞羅珥和谷中的城，直到基列」，耶和華都交給他們了。基列是約但河東山區，成為征服地的北界，後分給迦得、流便、瑪拿西半支派為業(民32:1-5)。"
  "relation": "本章征服西宏之地的北界標記；神賜以色列從亞嫩谷到基列全地，無城不可攻取"
- "title": "雅博"
  "path": "link_folder/原文/雅博.md"
  "summary": "申2:37指出神禁止以色列挨近亞捫人之地，「凡靠近雅博河的地，並山地的城邑，與耶和華我們神所禁止我們去的地方，都沒有挨近」。雅博河是亞捫人與亞摩利人邊界河，神主權劃定以色列不得侵犯的界限。"
  "relation": "神禁止以色列挨近的邊界河；顯示神主權分配列國產業，以色列須順服神劃定的界限"
- "title": "利乏音人"
  "path": "link_folder/人物/利乏音人.md"
  "summary": "申2章多次提到利乏音人：以米人「也算為利乏音人」(2:11)；亞捫人之地「也算為利乏音人之地，先前利乏音人住在那裡」(2:20)；散送冥也是利乏音人(2:20-21)。神從各族面前除滅利乏音人，將地賜給羅得子孫(摩押、亞捫)和以掃子孫(以東)，預表神將迦南賜給以色列。"
  "relation": "本章巨人族群的代表；神從列國面前除滅利乏音人賜地給旁系後裔，預表將迦南賜給以色列；顯示神主權掌管歷史"
