    type: "神學"
    evidence: |
      經文：申2:7。「因為耶和華你的神在你手裡所辦的一切事上已賜福與你。你走這大曠野，他都知道了。這四十年，耶和華你的神常與你同在，故此你一無所缺」。
      ccbiblestudy CT：四十年曠野漂流中，神賜福、同在、一無所缺，顯示神信實看顧。
      ccbiblestudy GT：四十年神賜福同在，一無所缺。
      KingComments：四十年曠野漂流，神賜福、同在、一無所缺。即使在審判中，神的恩典仍持續供應。
      BibleHub Study：四十年曠野漂流，神賜福、同在、一無所缺。