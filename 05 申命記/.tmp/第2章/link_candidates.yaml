book: 申命記
chapter: 2
candidates:
  # 人物
  - name: 摩西
    type: 人物
    evidence: v1-37 全章講者，回顧繞行西珥與征服西宏
  - name: 以掃
    type: 人物
    evidence: v4-5 你們弟兄以掃的子孫住在西珥；我已將西珥山賜給以掃為業
  - name: 羅得
    type: 人物
    evidence: v9,19 我已將亞珥／亞捫人的地賜給羅得的子孫為業
  - name: 摩押人
    type: 人物
    evidence: v9 不可擾害摩押人；GT：羅得長女之後裔（創19:37），路得為摩押女子
  - name: 亞捫人
    type: 人物
    evidence: v19,37 走近亞捫人之地不可擾害；羅得次女之後裔（創19:38）
  - name: 亞摩利人
    type: 人物
    evidence: v24 亞摩利人希實本王西宏；雷氏：與以色列無關的異族，神吩咐毀滅
  - name: 亞摩利王西宏
    type: 人物
    evidence: v24-33 希實本王西宏不容經過，在雅雜交戰被擊殺
  - name: 何利人
    type: 人物
    evidence: v12,22 先前何利人住在西珥，以掃子孫將他們除滅；啟導本：主前1500年的赫倫人（Hurrians）
  - name: 利乏音人
    type: 人物
    evidence: v11,20 以米人也算為利乏音人；啟導本：巨人統稱，各族稱呼不同
  - name: 亞衲族人（Anaqim）
    type: 原文
    evidence: v10,11,21 民數眾多身體高大像亞衲人一樣
    surfaces: [亞衲人]
  - name: 以米人
    type: 人物
    evidence: v10-11 先前有以米人住在那裡；原文字義「恐怖」；摩押人對利乏音人的稱呼
  - name: 散送冥
    type: 原文
    evidence: v20 亞捫人稱他們為散送冥；CT：原文字義「陰謀者」，聖經僅此一見
  - name: 迦斐託人
    type: 人物
    evidence: v23 從迦斐託出來的迦斐託人將亞衛人除滅；啟導本：迦斐託即克里特島，迦斐託人即非利士人
  - name: 亞衛人
    type: 人物
    evidence: v23 先前住在鄉村直到迦薩的亞衛人；啟導本：巴勒斯坦西南原住民
  # 地點
  - name: 西珥山
    type: 地點
    evidence: v1-5 在西珥山繞行了許多日子；我已將西珥山賜給以掃為業
    surfaces: [西珥]
  - name: 海（紅海）
    type: 地點
    evidence: v1 從紅海的路往曠野去；啟導本：指阿卡巴灣
    surfaces: [紅海]
  - name: 亞拉巴（Aravah）
    type: 地點
    evidence: v8 從亞拉巴的路，經過以拉他、以旬迦別
    surfaces: [亞拉巴]
  - name: 以拉他
    type: 地點
    evidence: v8；啟導本：與以旬迦別同為阿卡巴灣頂端港城，亞拉巴路起點
  - name: 以旬迦別
    type: 地點
    evidence: v8；精讀本：紅海最北端港口城市，戰略要地，字義「人的背脊之骨」
  - name: 摩押曠野
    type: 地點
    evidence: v8 轉向摩押曠野的路去；CT：摩押曠野在摩押地的東邊（民21:11）
  - name: 亞珥
    type: 地點
    evidence: v9,18,29 我已將亞珥賜給羅得的子孫；CT：摩押首邑，用來代表摩押地
  - name: 撒烈溪
    type: 地點
    evidence: v13-14 起來過撒烈溪；CT：以東與摩押的天然分界；精讀本：旱溪（Wadi），結束曠野流浪之地
  - name: 加低斯
    type: 地點
    evidence: v14 自從離開加低斯巴尼亞共三十八年
    surfaces: [加低斯巴尼亞]
  - name: 迦薩
    type: 地點
    evidence: v23 住在鄉村直到迦薩的亞衛人；啟導本：非利士五首領管區之一
  - name: 亞嫩河
    type: 地點
    evidence: v24,36 起來前往過亞嫩谷；CT：河谷深約五百公尺寬三公里，摩押與亞摩利人分界（民21:13）
    surfaces: [亞嫩谷]
  - name: 基底莫
    type: 地點
    evidence: v26 從基底莫的曠野差遣使者；串珠：大概在亞嫩河以北接近希實本疆土東界
  - name: 希實本
    type: 地點
    evidence: v24-30 希實本王西宏；KC：希實本原屬摩押，被亞摩利人奪去（民21:26-29）
  - name: 雅雜
    type: 地點
    evidence: v32 西宏在雅雜與我們交戰；串珠：主前九世紀摩押碑文提及此城
  - name: 亞羅珥
    type: 地點
    evidence: v36 從亞嫩谷邊的亞羅珥；啟導本：死海東南20公里亞嫩河畔之城
  - name: 基列
    type: 地點
    evidence: v36 直到基列，沒有一座城高得不能攻取；CT：狹義指雅博河以北，廣義泛指約但河東
  - name: 雅博
    type: 原文
    evidence: v37 凡靠近雅博河的地；啟導本：約但河東支流，雅各與天使摔跤之地
    surfaces: [雅博河]
  # 事件／互文
  - name: 過撒烈溪舊世代滅盡
    type: 事件
    evidence: v13-16 過撒烈溪共三十八年，那世代兵丁從營中滅盡，耶和華的手攻擊他們；應驗民14:26-35 起誓
  - name: 以色列戰勝亞摩利王西宏
    type: 神學
    evidence: v32-36 在雅雜交戰，擊殺西宏和眾民，奪一切城邑直到基列
  - name: 以色列戰勝亞摩利王西宏互文（申2：24-37；3：1-7；詩135：10-12；136：17-22）
    type: 互文
    evidence: v24-37 本章為互文網絡中的申命記回顧視角
  - name: 申命記2章西珥賜給以掃
    type: 互文
    evidence: v5 我已將西珥山賜給以掃為業——創36 時代所建之前向互文節點，本章為其正文所在
  # 主題／神學
  - name: 不可與兄弟民族爭戰（以東摩押亞捫）
    type: 主題
    evidence: v5,9,19 三次「不可爭戰」；GT：因血緣關係且其地為神所賜；精讀本：神按對以掃與羅得的憐恤保護他們
  - name: 神為列國定地業（民族更替）
    type: 神學
    evidence: v5,9,12,19-23 神將西珥賜以掃、亞珥賜羅得子孫；KC 引申32:8、徒17:26 神給萬族定疆界；四組民族更替平行記事
  - name: 用錢買糧買水
    type: 主題
    evidence: v6,28 要用錢向他們買糧買水；KC：不可佔弟兄便宜，公平待人
  - name: 四十年一無所缺
    type: 神學
    evidence: v7 這四十年耶和華常與你同在故此你一無所缺；精讀本：懲罰期同時是磨練養育期
  - name: 使天下萬民驚恐的名聲
    type: 主題
    evidence: v25 使天下萬民聽見你的名聲都驚恐懼怕；精讀本引書2:9-11 喇合見證
  - name: 爭戰前先說和睦的話
    type: 主題
    evidence: v26-29 差遣使者用和睦的話；精讀本：先提和親符合律法（申20:10）
  - name: 神使西宏心中剛硬
    type: 神學
    evidence: v30 耶和華使他心中剛硬性情頑梗為要將他交在你手中；串珠：神的預定與人的責任不能分割（參出7:3 法老）
  - name: 耶和華的爭戰
    type: 神學
    evidence: v24,31,33,36 我已將西宏交在你手中；耶和華將他交給我們；沒有一座城高得不能攻取
  - name: 聖戰毀滅原則
    type: 主題
    evidence: v34 將有人煙的各城盡都毀滅；啟導本：herem 專用字，聖戰中將戰俘擄物當作對神的奉獻
    surfaces: [盡都毀滅]
  - name: 十一天的路程與三十八年飄流
    type: 主題
    evidence: v1,14 在西珥山繞行許多日子＝三十八年；KC：每一天都是管教也是預備
  - name: 申2：12「就如以色列所行」是否後人補註
    type: 解經爭議
    evidence: CT：有學者認為此句為文士以斯拉後加補充；另解為預言完成式，鼓勵以色列取迦南如以東取西珥；精讀本兩說並陳
