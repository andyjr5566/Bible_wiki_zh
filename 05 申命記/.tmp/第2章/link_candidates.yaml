book: "申命記"
chapter: 2
candidates:
  - name: "以色列繞行西珥山"
    type: "事件"
    evidence: |
      經文：申2:1-3。「此後，我們轉回，從紅海的路往曠野去……我們在西珥山繞行了許多日子。耶和華對我說：你們繞行這山的日子夠了，要轉向北去」。
      ccbiblestudy CT：以色列人從紅海路往曠野去，繞行西珥山許多日子，直到神說「夠了」才轉向北去。這是神命令的轉折點。
      ccbiblestudy GT：以色列人繞行西珥山，神定意要他們轉向北去。
      KingComments：以色列人繞行西珥山多日，神說「你們繞行這山的日子夠了」，這是神時間表的體現。四十年曠野漂流結束，新世代興起。
      BibleHub Study：以色列人從紅海路往曠野去，繞行西珥山多日。神命令轉向北去，結束漂流期。
    surfaces:
      - "繞行西珥山"
      - "西珥山繞行"

  - name: "不可擾害以掃子孫"
    type: "神學"
    evidence: |
      經文：申2:4-6。「你們弟兄以掃的子孫住在西珥，你們要經過他們的境界……不可與他們爭戰；他們的地，連腳掌可踏之處，我都不給你們，因我已將西珥山賜給以掃為業。你們要用錢向他們買糧吃，也要用錢向他們買水喝」。
      ccbiblestudy CT：神禁止以色列擾害以掃子孫，因西珥山已賜給以掃為業。以色列要用錢買糧買水，不可佔便宜。
      ccbiblestudy GT：神保護以掃子孫的產業，以色列不可爭戰，要用錢買糧水。
      KingComments：神將西珥山賜給以掃，以色列不可侵犯。這顯示神對列國產業的主權分配。以色列要用錢買糧水，體現公義原則。
      BibleHub Study：神命令不可擾害以掃子孫，不可爭戰，因西珥山賜給以掃為業。要用錢買糧水。

  - name: "不可擾害摩押人"
    type: "神學"
    evidence: |
      經文：申2:9。「耶和華吩咐我說：不可擾害摩押人，也不可與他們爭戰。他們的地，我不賜給你為業，因我已將亞珥賜給羅得的子孫為業」。
      ccbiblestudy CT：神禁止擾害摩押人，因亞珥已賜給羅得子孫為業。摩押人是羅得的後裔(創19:37)。
      ccbiblestudy GT：神保護摩押人的產業，因他們是羅得後裔。
      KingComments：神將亞珥賜給羅得子孫，以色列不可侵犯。這顯示神對亞伯拉罕家族旁系後裔的看顧。
      BibleHub Study：神命令不可擾害摩押人，不可爭戰，因亞珥賜給羅得子孫為業。

  - name: "以米人與利乏音人"
    type: "人物"
    evidence: |
      經文：申2:10-11。「先前，有以米人住在那裡，民數眾多，身體高大，像亞衲人一樣。這以米人像亞衲人；也算為利乏音人；摩押人稱他們為以米人」。
      ccbiblestudy CT：以米人身材高大像亞衲人，也算利乏音人，摩押人稱他們為以米人。後來被摩押人除滅。
      ccbiblestudy GT：以米人是巨人族群，像亞衲人，屬利乏音人。
      KingComments：以米人是巨人族群(利乏音人)，摩押人稱之為以米人。神從摩押人面前除滅他們，摩押人得其地。
      BibleHub Study：以米人是巨人族群，像亞衲人，屬利乏音人。摩押人稱之為以米人。

  - name: "何利人被以掃子孫除滅"
    type: "事件"
    evidence: |
      經文：申2:12。「先前，何利人也住在西珥，但以掃的子孫將他們除滅，得了他們的地，接著居住，就如以色列在耶和華賜給他為業之地所行的一樣」。
      ccbiblestudy CT：何利人原住西珥，被以掃子孫除滅得地，正如以色列將來在迦南所行。
      ccbiblestudy GT：何利人被以掃子孫除滅，預表以色列征服迦南。
      KingComments：何利人被以掃子孫除滅，得地為業。這是神主權分配產業的模式：神除滅原住民，賜地給揀選的族群。
      BibleHub Study：何利人原住西珥，被以掃子孫除滅得地，預表以色列征服迦南。

  - name: "過撒烈溪"
    type: "事件"
    evidence: |
      經文：申2:13-14。「現在，起來過撒烈溪！於是我們過了撒烈溪。自從離開加低斯巴尼亞，到過了撒烈溪的時候，共有三十八年，等那世代的兵丁都從營中滅盡，正如耶和華向他們所起的誓」。
      ccbiblestudy CT：過撒烈溪標誌著三十八年曠野漂流結束，那世代兵丁滅盡，神的誓言應驗。
      ccbiblestudy GT：過撒烈溪是進入新階段的標誌，老一代滅盡，新世代興起。
      KingComments：過撒烈溪結束三十八年漂流，老一代兵丁滅盡，神的誓言應驗。這是曠野漂流的終點，征服迦南的起點。
      BibleHub Study：過撒烈溪，從加低斯巴尼亞到此共三十八年，那世代兵丁滅盡，神的誓言應驗。

  - name: "不可擾害亞捫人"
    type: "神學"
    evidence: |
      經文：申2:19。「耶和華吩咐我說：你今天要從摩押的境界亞珥經過，走近亞捫人之地，不可擾害他們，也不可與他們爭戰。亞捫人的地，我不賜給你們為業，因我已將那地賜給羅得的子孫為業」。
      ccbiblestudy CT：神禁止擾害亞捫人，因他們是羅得子孫(創19:38)，神已將地賜給他們。
      ccbiblestudy GT：亞捫人是羅得後裔，神保護他們的產業。
      KingComments：神將地賜給羅得子孫(亞捫人)，以色列不可侵犯。神對亞伯拉罕家族旁系後裔的看顧一貫。
      BibleHub Study：神命令不可擾害亞捫人，不可爭戰，因地賜給羅得子孫為業。

  - name: "散送冥與利乏音人"
    type: "人物"
    evidence: |
      經文：申2:20-21。「那地也算為利乏音人之地，先前利乏音人住在那裡，亞捫人稱他們為散送冥。那民眾多，身體高大，像亞衲人一樣，但耶和華從亞捫人面前除滅他們，亞捫人就得了他們的地，接著居住」。
      ccbiblestudy CT：散送冥是利乏音人(巨人族)，被亞捫人除滅得地。
      ccbiblestudy GT：散送冥是巨人族群(利乏音人)，被亞捫人除滅。
      KingComments：散送冥是利乏音人(巨人)，亞捫人稱之為散送冥。神從亞捫人面前除滅他們，亞捫人得地。
      BibleHub Study：散送冥是利乏音人(巨人)，亞捫人稱之為散送冥。神從亞捫人面前除滅他們。

  - name: "迦斐託人除滅亞衛人"
    type: "事件"
    evidence: |
      經文：申2:23。「從迦斐託出來的迦斐託人將先前住在鄉村直到迦薩的亞衛人除滅，接著居住」。
      ccbiblestudy CT：迦斐託人(非利士人祖先)從迦斐託出來，除滅亞衛人得地。
      ccbiblestudy GT：迦斐託人除滅亞衛人，佔據迦薩地區。
      KingComments：迦斐託人(非利士人祖先)除滅亞衛人，得地為業。這顯示神主權分配產業給不同族群。
      BibleHub Study：迦斐託人從迦斐託出來，除滅亞衛人，佔據迦薩地區。

  - name: "征服希實本王西宏"
    type: "事件"
    evidence: |
      經文：申2:24-37。「你們起來前往，過亞嫩谷；我已將亞摩利人希實本王西宏和他的地交在你手中，你要與他爭戰，得他的地為業……那時，西宏和他的眾民出來攻擊我們，在雅雜與我們交戰。耶和華我們的神將他交給我們，我們就把他和他的兒子，並他的眾民，都擊殺了。我們奪了他的一切城邑，將有人煙的各城，連女人帶孩子，盡都毀滅，沒有留下一個」。
      ccbiblestudy CT：神將西宏和他的地交給以色列，西宏心硬不肯讓路，在雅雜交戰被擊殺，以色列奪其全地，毀滅各城。
      ccbiblestudy GT：神硬化西宏心，使他出戰被滅，以色列得其地為業。
      KingComments：神將西宏之地賜給以色列，硬化西宏心使他出戰。以色列在雅雜擊敗西宏，奪取全地，毀滅各城(聖戰原則)。這是征服迦南的第一戰。
      BibleHub Study：神將西宏之地賜給以色列，硬化西宏心使他出戰。以色列在雅雜擊敗西宏，奪取全地，毀滅各城。

  - name: "亞嫩谷至基列全地得勝"
    type: "事件"
    evidence: |
      經文：申2:36-37。「從亞嫩谷邊的亞羅珥和谷中的城，直到基列，耶和華我們的神都交給我們了，沒有一座城高得使我們不能攻取的。惟有亞捫人之地，凡靠近雅博河的地，並山地的城邑，與耶和華我們神所禁止我們去的地方，都沒有挨近」。
      ccbiblestudy CT：從亞嫩谷到基列全地都交給以色列，沒有城高得不能攻取。      ccbiblestudy GT：神賜以色列從亞嫩谷到基列全地，無城不可攻取。
      KingComments：從亞嫩谷到基列全地賜給以色列，無城不可攻取。      BibleHub Study：從亞嫩谷到基列全地賜給以色列，無城不可攻取。

