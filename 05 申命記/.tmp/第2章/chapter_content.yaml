organization: "### 繞行西珥與轉向北上（v1-7）\n\n以色列離開加低斯巴尼亞後，順著紅海的路轉入曠野，在[[以色列繞行西珥山|西珥山]]繞行許多日子（v1）。KC\
  \ 指出：摩西用「我們」把自己也包含在繞行者中——因全體的不信，連忠信者（摩西、迦勒、約書亞）也一同承受繞行的後果。GT 補充：「許多日子」指加低斯巴尼亞探子事件後的三十八年，是不信的代價。耶和華指示摩西：「你們繞行這山的日子夠了，要轉向北去」（v3）。神吩咐百姓經過[[不可擾害以掃子孫|以掃子孫]]（以東人）的境界，雖然以東人必懼怕以色列，但以色列[[不可擾害以掃子孫|不可與他們爭戰]]，連腳掌可踏之處也不賜給以色列，因[[以色列繞行西珥山|西珥山]]已賜給以掃為業（v4-5）。以色列當用錢向他們買糧買水（v6）。KC\
  \ 強調：以色列是富足的百姓——雖有怨言，神四十年同在使他們一無所缺（路 22:35）；他們不必乞求，而是用錢購買。摩西回顧：「耶和華─你的神在你手裡所辦的一切事上已賜福與你……這四十年，耶和華─你的神常與你同在，故此你一無所缺」（v7），見證[[神賜福四十年無缺]]的恩典。GT\
  \ 指出「他都知道了」意為「都看顧你們」（創 39:6；詩 1:6）。\n\n### 經過摩押與亞捫之地：不可擾害的命令（v8-23）\n\n以色列離開以東，從亞拉巴的路經[[以拉他]]、[[以旬迦別]]，轉向[[不可擾害摩押人|摩押曠野]]的路去（v8）。耶和華吩咐[[不可擾害摩押人|不可擾害摩押人]]，也不與他們爭戰，因[[亞珥]]已賜給羅得的子孫為業（v9）。經文插入歷史註記：先前有[[以米人與利乏音人|以米人]]（意為「可怕、可畏」）住在那裡，民數眾多、身體高大，像[[亞衲人]]一樣，也算為[[利乏音人]]（v10-11）。同樣，[[何利人被以掃子孫除滅|何利人]]先住西珥，後被以掃子孫除滅得地而居（v12），這成為以色列得地的預表。KC\
  \ 指出：這些歷史註記是為鼓勵以色列——神既已幫助親屬驅逐巨人，也必幫助以色列。\n\n繼而神吩咐過[[撒烈溪]]（v13）。從離開加低斯巴尼亞到過[[過撒烈溪|撒烈溪]]，共三十八年，等那世代的兵丁都從營中滅盡，應驗耶和華的誓言（v14-15），標誌[[四十年曠野漂流結束]]。GT\
  \ 深刻指出：舊世代軍人雖有作戰經驗（出 17:8-16），卻因違背指揮官的命令而被神除去，征服迦南的榮耀託付給毫無戰鬥經驗的新世代——「爭戰的勝敗全在乎耶和華」。KC\
  \ 補充：耶和華的手攻擊他們直到滅盡，意味許多人並非自然死亡，而是受神直接的審判之手。\n\n接著神吩咐從摩押境界[[亞珥]]經過，走近[[不可擾害亞捫人|亞捫人]]之地，同樣[[不可擾害亞捫人|不可擾害他們]]，因那地賜給羅得子孫為業（v18-19）。經文再記載：那地先有[[利乏音人]]（亞捫人稱[[散送冥與利乏音人|散送冥]]，意為「熙嚷挑剔的宗族」），身材高大如亞衲人，被耶和華從亞捫人面前除滅（v20-21）。又記[[迦斐託人除滅亞衛人|迦斐託人]]從迦斐托（克里特島）出來，除滅[[迦斐託人除滅亞衛人|亞衛人]]而居住（v23）。這些歷史註記強調「耶和華從他們面前除滅他們，他們得了他們的地，接著居住」（v22），彰顯神主權賜地的歷史模式。\n\
  \n> [!note]- 歷史註記的神學功能\n> 經文中關於以米人、利乏音人、何利人、散送冥、亞衛人被除滅的插入記載（v10-12, 20-23），並非單純地理志，而是神學論證：耶和華曾為外邦人（以掃、羅得子孫）行「聖戰」除滅巨人得地，如今必為以色列行同樣的事。這構成「得地」合法性的類比論證。KC\
  \ 進一步指出：這些征服也是對原住民的審判——神在不忠時收回祝福，轉賜他人，而後者亦須經考驗。\n\n### 征服希實本王西宏：聖戰的開始（v24-37）\n\n\
  神命令以色列起行，過[[亞嫩谷]]，將[[征服希實本王西宏|亞摩利人希實本王西宏]]和他的地交在手中，要與他爭戰，得地為業（v24），並預告要使天下萬民聽見以色列名聲都驚恐懼怕（v25）。GT\
  \ 指出：此次爭戰是迦南征服戰的序幕戰，得勝消息傳遍迦南全地（書 2:9-11）。摩西從基底莫曠野差遣使者用和睦話請求經過，承諾只走大道、用錢買糧買水（v26-29）。但西宏不允，因「耶和華─你的神使他心中剛硬，性情頑梗，為要將他交在你手中」（v30），見證[[神硬化西宏心]]的主權。KC\
  \ 指出：西宏的剛硬是神主動的作為，為要將他交付以色列——這與法老的心剛硬模式相同（出 4:21）。\n\n耶和華對摩西說：「從此起首，我要將西宏和他的地交給你」（v31）。西宏率眾在[[雅雜]]交戰，耶和華將他交給以色列，擊殺他、他的兒子與眾民（v32-33）。以色列奪取一切城邑，將有人煙的各城連女人帶孩子盡都[[聖戰毀滅原則|毀滅]]，沒有留下一個（v34），惟牲畜和財物取為掠物（v35）。從[[亞嫩谷]]邊的[[亞羅珥]]和谷中的城，直到[[基列]]，沒有一座城高得使以色列不能攻取的（v36），成就[[亞嫩谷至基列全地得勝]]。惟有亞捫人之地、靠近[[雅博]]的地與山地城邑，因耶和華禁止，都沒有挨近（v37）。\n\
  \n`mermaid\nflowchart LR\n  A[加低斯巴尼亞] --> B[繞行西珥山<br/>許多日子]\n  B --> C{神命令：轉向北去}\n\
  \  C --> D[經過以東<br/>買糧買水<br/>不可爭戰]\n  D --> E[摩押曠野<br/>不可擾害摩押]\n  E --> F[過撒烈溪<br/>三十八年漂流結束]\n\
  \  F --> G[亞捫人境界<br/>不可擾害亞捫]\n  G --> H[過亞嫩谷<br/>攻擊西宏]\n  H --> I[雅雜交戰<br/>神交付得勝]\n\
  \  I --> J[佔領亞嫩谷至基列<br/>聖戰毀滅]\n  J --> K[停於雅博河<br/>不侵犯亞捫]\n`\n\n### 跨章脈絡：從曠野漂流到得地為業\n\
  \n本章是申命記歷史回顧的轉折點。前半段（v1-23）總結「繞行」與「等待」的四十年，核心是[[神賜福四十年無缺]]的供應與對外邦產業界限的尊重（以東、摩押、亞捫）；後半段（v24-37）進入「爭戰」與「得地」的新階段，核心是[[神硬化西宏心]]啟動[[聖戰毀滅原則]]，標誌應許之地征服的實質性開端。地理上從[[以色列繞行西珥山|西珥山]]、亞拉巴、[[以拉他]]、[[以旬迦別]]、[[過撒烈溪|撒烈溪]]、[[亞珥]]、[[亞嫩谷]]、[[雅雜]]、[[亞羅珥]]至[[基列]]的路線，串聯起「曠野漂流」到「約但河東得地」的救恩史地標。\n\
  \nKC 提供重要的屬靈區分框架：以東、摩押、亞捫是「親屬民族」，神已賜他們產業，以色列不可侵擾——這教導我們尊重神所設立的關係（如婚姻，太 19:6），也不可輕看其他信徒所得的分。西宏和噩則是「敵對勢力」，雖不在應許地內卻鄰近而構成持續威脅，必須先征服才能安全享受產業。GT\
  \ 總結：本章區分了「不可與之爭戰的族類」（v1-23）與「當攻打征服的族類」（v24-37），耶和華是以色列的總指揮，爭戰的勝敗全在乎祂。"
