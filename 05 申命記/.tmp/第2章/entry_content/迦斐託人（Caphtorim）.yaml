definition: 希伯來文 כַּפְתֹּרִים（Caphtorim），指從迦斐託（Caphtor）而來的族群，後成為非利士人的祖先。申2:23記載他們從迦斐託出來，滅絕住在鄉村直到迦薩的亞衛人，佔據該地。
