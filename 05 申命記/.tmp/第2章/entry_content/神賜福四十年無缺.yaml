name: 神賜福四十年無缺
type: 神學
secondary_types: []
aliases:
- 四十年無缺
- 神供應曠野
status: formal
definition: 根據申命記 2:7，摩西回顧四十年曠野生活，見證耶和華神在以色列手裡所辦的一切事上賜福，神知道他們走大曠野的路，四十年常與他們同在，故此他們一無所缺。
development: 此神學宣告強調神的信實供應與同在，與民數記記載的抱怨缺乏形成對比，凸顯神恩典超越人軟弱。此見證成為以色列面對新挑戰（如征服西宏）的信心基礎。
accumulations:
- book: 申命記
  chapter: 2
  summary: 摩西提醒百姓四十年來神的賜福、同在與供應，使他們在曠野一無所缺，作為順服神命令征服應許之地的動力。
  relation: 本章第 7 節為神學核心見證，連結過去曠野恩典與當前聖戰使命。
