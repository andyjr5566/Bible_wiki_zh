name: 以色列繞行西珥山
type: 事件
secondary_types: []
aliases:
- 繞行西珥山
status: formal
definition: 以色列人出埃及後，在曠野漂流期間，照耶和華吩咐從紅海的路轉向曠野，在西珥山（以掃子孫居住之地）繞行了許多日子（三十八年），直到那世代的兵丁從營中滅盡。這段期間神看顧以色列，使他們一無所缺。
development: 此事件標誌著以色列從加低斯巴尼亞失敗後的懲罰期結束，預備進入應許之地的新階段。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載以色列人繞行西珥山的過程、年限（三十八年）、神的看顧與吩咐轉向北去。
  relation: 本章開啟摩西回顧曠野歷程的第二階段，顯示神主權帶領與管教的完成。
