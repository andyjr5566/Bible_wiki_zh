status: formal
definition: 希伯來文 זַמְזֻמִּים（Zamzummim），意指「喧嘩者」或「低語者」，為亞捫人對先前住在該地之利乏音人的稱呼（申2:20）。此詞僅見於申命記，顯示神安排民族更替，將原住民除滅，把地賜給羅得的後裔。
development: ''
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載亞捫人稱先前住在那地的利乏音人為散送冥，並說明耶和華從亞捫人面前除滅他們。
  relation: 顯示神主導列國地業更替，作為以色列認識神賜地原則的背景。
