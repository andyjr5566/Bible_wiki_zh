name: 使天下萬民驚恐的名聲
type: 主題
secondary_types: []
aliases:
- 名聲傳揚使萬民驚恐
- 神賜威懾力
status: formal
definition: 耶和華應許從今日起，使天下萬民聽見以色列的名聲都驚恐懼怕，且因他們發顫傷慟（申2:25）。這名聲源於神為以色列所行的大事（如紅海、西宏、噩），成為征服迦南前的心理戰術優勢。
development: 此應許緊接在吩咐與西宏爭戰之前（申2:24-25），實際應驗於耶利哥人喇合的見證（書2:9-11）及迦南諸王心膽喪盡（書5:1）。
accumulations:
- book: 申命記
  chapter: 2
  summary: 神應許使天下萬民聽見以色列名聲而驚恐發顫（申2:25）。
  relation: 作為神主動為以色列爭戰、以威懾力軟化敵人抵抗意志的神學機制。
