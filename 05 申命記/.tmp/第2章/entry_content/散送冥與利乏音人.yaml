name: 散送冥與利乏音人
type: 人物
secondary_types: []
aliases:
- 散送冥
- 亞捫稱利乏音人為散送冥
status: formal
definition: 散送冥是先前住在亞捫地的族群，民數眾多、身材高大，像亞衲人一樣，被算為利乏音人。亞捫人稱他們為散送冥。耶和華從亞捫人面前除滅他們，亞捫人就得了他們的地，接著居住。
development: 作為利乏音人在約但河東另一支系的歷史見證，與以米人（摩押地）、利乏音人（巴珊地）平行，顯示神在以色列進迦南前，已透過亞捫、摩押、以掃三族清除約但河東的利乏音人勢力。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載散送冥的身分（利乏音人）、特徵（高大如亞衲人）、被亞捫人除滅的歷程。
  relation: 本章括號說明（第20-21節），為「不可擾害亞捫人」提供歷史神學依據，並與以米人、何利人、亞衛人構成平行結構。
