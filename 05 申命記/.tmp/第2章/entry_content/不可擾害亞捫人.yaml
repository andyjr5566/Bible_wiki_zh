name: 不可擾害亞捫人
type: 神學
secondary_types: []
aliases:
- 不可與亞捫人爭戰
- 亞捫得地為業
status: formal
definition: 耶和華吩咐以色列人走近亞捫人之地時，不可擾害他們，也不可與他們爭戰，因神已將那地賜給羅得的子孫（亞捫人）為業。經文說明該地原為利乏音人之地（亞捫人稱之為散送冥），後被亞捫人除滅得地，正如以掃子孫除滅何利人、以色列得迦南地一樣。
development: 完成「不可擾害」三部曲（以掃、摩押、亞捫），確立神對亞伯拉罕家族旁系（羅得後裔）產業應許的信實，並以歷史先例（利乏音人被列國除滅）預表以色列聖戰的合法性。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載神禁止擾害亞捫人、地為羅得子孫的業、散送冥（利乏音人）被亞捫人除滅的背景。
  relation: 本章第三個「不可擾害」命令（第19節），與以掃、摩押平行，構成神主權分配產業的完整神學畫面。
