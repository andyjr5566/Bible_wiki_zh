definition: 申命記 2:10-11、20-21 描述亞衲人為身材高大的巨人族群，以米人、散送冥被比擬為亞衲人。
development: 作為利乏音人（利乏音）的代表，顯示神在征服過程中除滅巨人族群。
accumulations:
