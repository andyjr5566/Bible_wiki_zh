status: formal
definition: 申命記 2:24‑36 記載，神將亞摩利人希實本王西宏及其地交給以色列；神硬化西宏心，使他出戰，以色列在雅雜擊敗他，毀滅其一切城邑、婦女兒童，僅取牲畜財物為掠物，並佔領從亞嫩谷到基列全地。
