name: 四十年曠野漂流結束
type: 事件
secondary_types: []
aliases:
- 曠野漂流結束
- 三十八年漂流終結
status: formal
definition: 根據申命記 2:14-16，從加低斯巴尼亞出發到過撒烈溪共三十八年，這期間那世代的兵丁按耶和華所起的誓從營中滅盡。兵丁滅盡後，神吩咐摩西率領百姓過摩押境界亞珥，標誌著四十年曠野漂流正式結束。
development: 此事件承接民數記 14 世代審判的應驗，三十八年漂流期滿，新世代興起，準備進入應許之地。過撒烈溪（2:13）為地理與神學的轉折點。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載從加低斯巴尼亞到過撒烈溪歷經三十八年，世代兵丁滅盡，神命令以色列轉向北方進入摩押地，曠野漂流時期結束。
  relation: 本章以時間標記（三十八年）與地理標記（過撒烈溪）確認漂流結束，為後續征服戰役鋪路。
