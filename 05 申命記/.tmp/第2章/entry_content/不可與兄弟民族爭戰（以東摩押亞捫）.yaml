name: 不可與兄弟民族爭戰（以東摩押亞捫）
type: 主題
secondary_types: []
aliases:
- 不可擾害兄弟民族
- 以東摩押亞捫和平原則
status: formal
definition: 神命令以色列不可與以東（以掃子孫）、摩押、亞捫（羅得子孫）爭戰，因神已將西珥山賜給以掃，將亞珥賜給摩押，將亞捫地賜給亞捫人為業（申2:4-5,
  9, 19）。這體現神主權分配列國地業的原則。
development: 摩西三次傳達神的命令：不可與以掃子孫爭戰（申2:5）、不可擾害摩押人（申2:9）、不可擾害亞捫人（申2:19），每次都附帶神已將地賜給他們為業的神學理由。
accumulations:
- book: 申命記
  chapter: 2
  summary: 三次禁止與兄弟民族爭戰的命令及其神學依據：西珥賜給以掃（申2:5）、亞珥賜給摩押（申2:9）、亞捫地賜給亞捫（申2:19）。
  relation: 確立神主權分配地業、以色列須尊重神所定列國疆界的核心神學主題。
