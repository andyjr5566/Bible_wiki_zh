name: 聖戰毀滅原則
type: 主題
secondary_types: []
aliases:
- 聖戰毀滅律
- 赫蓮原則
status: formal
definition: 以色列擊敗西宏後，將他的一切城邑、有人煙的各城，連女人帶孩子盡都毀滅，沒有留下一個（申2:34），惟有牲畜和財物取為掠物（申2:35）。這是「赫蓮」（cherem，分別為聖毀滅）原則的執行，針對神審判之對象（亞摩利人罪惡滿盈，創15:16）實行完全毀滅，防止以色列被偶像教誘惑。
development: 本章記載對西宏王國的完全毀滅（申2:33-35），作為後續對巴珊王噩（申3:1-7）及迦南諸國（申7:1-2, 20:16-18）執行聖戰毀滅的樣板。
accumulations:
- book: 申命記
  chapter: 2
  summary: 以色列毀滅西宏一切城邑、連婦女孩子盡行毀滅，只取牲畜財物為掠物（申2:33-35）。
  relation: 展現神對罪惡滿盈之民族執行公義審判、保護選民屬靈純潔的聖戰神學。
