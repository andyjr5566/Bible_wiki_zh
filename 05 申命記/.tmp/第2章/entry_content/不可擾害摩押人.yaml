name: 不可擾害摩押人
type: 神學
secondary_types: []
aliases:
- 不可與摩押人爭戰
- 摩押得亞珥為業
status: formal
definition: 耶和華吩咐以色列人不可擾害摩押人，也不可與他們爭戰，因神已將亞珥賜給羅得的子孫（摩押人）為業。這延續了神主權分配地界給亞伯拉罕家族（羅得）的原則，並說明摩押人先前所住之地原有以米人（利乏音人），後被摩押人除滅得地。
development: 強化神對列國疆界主權分配的神學，並為以色列不可侵犯親族之地設定界限。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載神禁止擾害摩押人、亞珥為羅得子孫的業、以米人被摩押人除滅的背景。
  relation: 本章第二個「不可擾害」命令，呼應以掃子孫的案例，構成神分配產業給亞伯拉罕家族旁系的神學脈絡。
related_entries:
