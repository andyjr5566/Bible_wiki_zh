name: 亞羅珥（Aroer）
type: 地點
secondary_types: []
aliases:
- 亞羅珥
status: formal
definition: 位於亞嫩谷邊緣的城市，為以色列征服亞摩利王西宏領地時所得的邊界城市之一（申2:36）。標誌著神應許賜給以色列之地的南界起點。
development: 本章記載以色列從亞嫩谷邊的亞羅珥直到基列，所有城市都被神交付，沒有一座城高得使他們不能攻取（申2:36），顯示神信實成就應許。
accumulations:
- book: 申命記
  chapter: 2
  summary: 以色列征服西宏之地，邊界從亞嫩谷邊的亞羅珥直到基列（申2:36）。
  relation: 作為征服亞摩利人領地南界的標誌性地點，見證神將地賜給以色列的應許應驗。
related_entries:
- 亞嫩河
- 希實本
