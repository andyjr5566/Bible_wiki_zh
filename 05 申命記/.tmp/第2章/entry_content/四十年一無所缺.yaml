name: 四十年一無所缺
type: 神學
secondary_types: []
aliases:
- 曠野四十年供應
- 神信實供應
status: formal
definition: 摩西見證耶和華神在以色列手裡所辦的一切事上賜福，這四十年耶和華常與他們同在，故此他們一無所缺（申2:7）。這涵蓋從西奈山到摩押平原的整個曠野飄流期間，神對衣食、健康、引導的全方位供應。
development: 這見證作為命令以色列用錢買糧買水（申2:6）的基礎——因神已豐豐富富供應，所以他們有能力也有責任付費購買，不至於討飯或搶奪。
accumulations:
- book: 申命記
  chapter: 2
  summary: 摩西回顧四十年曠野飄流，見證神全程供應、一無所缺（申2:7）。
  relation: 確立神信實守約、全然供應的神學見證，成為以色列對待列國存誠信態度的動力基礎。
