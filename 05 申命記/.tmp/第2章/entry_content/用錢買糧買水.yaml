name: 用錢買糧買水
type: 主題
secondary_types: []
aliases:
- 付費購買糧水
- 商業原則在曠野
status: formal
definition: 神命令以色列經過以東、摩押、亞捫之地時，要用錢向他們買糧吃、買水喝（申2:6, 28），不可白佔便宜，展現公義誠信的行為準則，也見證神供應的豐足（申2:7）。
development: 此原則應用於三個兄弟民族：以東（申2:6）、摩押（隱含於申2:28-29）、亞捫（隱含於申2:28-29），並作為向西宏求和平通行時的誠意展示（申2:28-29）。
accumulations:
- book: 申命記
  chapter: 2
  summary: 吩咐以色列用錢向以東買糧買水（申2:6），並作為向西宏求通行的條件（申2:28-29）。
  relation: 體現神子民在過境時當存公義誠信，不佔便宜，並見證神四十年供應一無所缺的事實。
