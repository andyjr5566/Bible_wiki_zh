name: 何利人被以掃子孫除滅
type: 事件
secondary_types: []
aliases:
- 以掃子孫除滅何利人
- 何利人滅亡
status: formal
definition: 先前何利人住在西珥，但以掃的子孫將他們除滅，得了他們的地，接著居住。經文明確將此事比擬為「正如以色列在耶和華賜給他為業之地所行的一樣」，作為神主權轉移產業給以掃後裔的歷史佐證。
development: 此事件與後文「迦斐託人除滅亞衛人」、「亞捫人除滅散送冥」構成平行結構，強調神在以色列進迦南前，已透過列國完成利乏音人/原住民的清除。
accumulations:
- book: 申命記
  chapter: 2
  summary: 記載何利人原住西珥、被以掃子孫除滅得地、作為以色列得地的預表。
  relation: 本章括號說明（第12節），為「不可擾害以掃子孫」提供歷史依據，並預表以色列聖戰模式。
related_entries:
