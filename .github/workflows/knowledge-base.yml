name: Knowledge Base Quality

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyYAML
      - run: python -m unittest discover -s util/tests -v
      - run: python util/build_link_index.py --check
      - run: python util/validate_knowledge_base.py --base HEAD^
      - run: python util/link_quality_check.py
      - run: python util/verify_links.py
      - run: python util/audit_knowledge_base.py --check-due
