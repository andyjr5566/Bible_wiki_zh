name: Knowledge Base Quality

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyYAML
      - run: python -m unittest discover -s tests -v
      - run: python build_link_index.py --check
      - run: python validate_knowledge_base.py --base HEAD^
      - run: python link_quality_check.py
      - run: python verify_links.py
      - run: python audit_knowledge_base.py --check-due
