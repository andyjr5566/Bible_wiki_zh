    type: 神學
    evidence: 8節；約瑟宣告「解夢不是出於神嗎？」把榮耀歸給神
    surfaces:
      - {phrase: 解夢不是出於神嗎？, verses: [8]}
  - name: 葡萄樹_葡萄_杯
    type: 神學
    evidence: 9-11節；酒政夢中的葡萄樹、葡萄與法老的杯
