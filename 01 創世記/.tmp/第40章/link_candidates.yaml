book: 創世記
chapter: 40
candidates:
  - name: 約瑟
    type: 人物
    evidence: 全章；在監中伺候二臣、為他們解夢、求酒政記念他
  - name: 酒政_酒政長
    type: 人物
    evidence: 1-2、5、9、13、20-21、23節；掌王的飲料，夢見葡萄枝，三日官復原職，卻忘了約瑟
    surfaces:
      - {phrase: 酒政, verses: [1, 2, 5, 9, 13, 20, 21, 23]}
  - name: 膳長
    type: 人物
    evidence: 1-2、5、16、20、22節；主理王的膳食，夢見三筐白餅，三日被掛木頭上
  - name: 護衛長_波提乏
    type: 人物
    evidence: 3-4節；把二臣交給約瑟伺候
    surfaces:
      - {phrase: 護衛長, verses: [3, 4]}
  - name: 法老
    type: 人物
