book: 創世記
chapter: 32
candidates:
  - name: 雅各
    type: 人物
    evidence: 全章；歸途遇天軍、懼怕以掃、禱告、雅博渡口摔跤改名以色列
  - name: 以掃
    type: 人物
    evidence: 3-20節；雅各所懼的哥哥，帶四百人來迎，雅各備禮解恨
  - name: 拉班
    type: 人物
    evidence: 4節；雅各所寄居之處
  - name: 亞伯拉罕
    type: 人物
    evidence: 9節；雅各禱告所稱我祖之神
  - name: 以撒
    type: 人物
    evidence: 9節；雅各禱告所稱我父之神
  - name: 神的使者
    type: 人物
    evidence: 1節；歸途遇見雅各，安慰激勵，顯明神的同在
  - name: 耶和華
    type: 神學
    evidence: 9節；雅各禱告所呼求、曾吩咐他回本地的神
  - name: 神的軍兵
    type: 神學
    evidence: 2節；天上軍隊護送雅各，命名瑪哈念
  - name: 面對面見神
    type: 神學
    evidence: 30節；雅各宣稱面對面見神而性命保全
    surfaces:
      - {phrase: 面對面見了神, verses: [30]}
  - name: 瑪哈念
    type: 地點
    evidence: 2節；意二軍兵，神的營與雅各的營相遇之地
  - name: 以東
    type: 地點
    evidence: 3節；即西珥地，以掃所居之地
    surfaces:
      - {phrase: 西珥地, verses: [3]}
      - {phrase: 以東地, verses: [3]}
  - name: 約旦河
    type: 地點
    evidence: 10節；雅各先前只拿杖過此河，如今成兩隊（raw 作「約但河」）
    surfaces:
      - {phrase: 約但河, verses: [10]}
  - name: 雅博渡口
    type: 地點
    evidence: 22節；雅各送家眷過此，獨留摔跤之地
  - name: 毗努伊勒
    type: 地點
    evidence: 30-31節；意神之面，雅各摔跤見神命名之地
    surfaces:
      - {phrase: 毘努伊勒, verses: [30, 31]}
  - name: 解恨之禮
    type: 文化
    evidence: 20-21節；雅各以五百八十頭牲畜禮物解以掃之恨
    surfaces:
      - {phrase: 禮物, verses: [20, 21]}
  - name: 摔跤
    type: 原文
    evidence: 24節；一人主動來與雅各摔跤直到黎明
  - name: 大腿窩的筋
    type: 原文
    evidence: 25、32節；神摸雅各大腿窩使其扭傷，以色列人因此不吃此筋
    surfaces:
      - {phrase: 大腿窩, verses: [25]}
  - name: 以色列
    type: 原文
    evidence: 28、32節；雅各新名，意與神較力得勝、神的王子
