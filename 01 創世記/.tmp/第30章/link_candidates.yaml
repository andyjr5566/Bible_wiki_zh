book: 創世記
chapter: 30
candidates:
  - name: 拉結
    type: 人物
    evidence: 1-24節；因不育嫉妒利亞，以辟拉代孕生但、拿弗他利，末後神顧念生約瑟
  - name: 利亞
    type: 人物
    evidence: 9-21節；以悉帕代孕生迦得、亞設，用風茄換同寢生以薩迦、西布倫、底拿
  - name: 雅各
    type: 人物
    evidence: 全章；承認生育主權在神，議訂新工價，用計使羊群增多而發大
  - name: 辟拉
    type: 人物
    evidence: 3-8節；拉結的使女，為雅各生但與拿弗他利
  - name: 悉帕
    type: 人物
    evidence: 9-13節；利亞的使女，為雅各生迦得與亞設
  - name: 拉班
    type: 人物
    evidence: 25-42節；不願雅各離去，承認因雅各蒙福，議工價後又暗中挑走斑點羊
  - name: 流便
    type: 人物
    evidence: 14節；利亞長子，割麥時尋見風茄拿給母親
