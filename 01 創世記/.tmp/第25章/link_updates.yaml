book: 創世記
chapter: 25
updates:
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 撒拉死後亞伯拉罕又娶基土拉生六子；他將一切所有的都給了以撒，把財物分給庶出眾子並打發他們往東方去。享壽一百七十五歲，氣絕而死歸到本民，由以撒與以實瑪利同葬於麥比拉洞，與撒拉同穴。
  relation: 本章是亞伯拉罕生平的收束：他以分產保護應許之子以撒的地位，以壽終應驗「享大壽數」（創15:15），並在葬禮上見以撒與以實瑪利重逢和好——救贖史的焦點由他轉向以撒。
- title: 麥比拉洞
  path: link_folder/地點/麥比拉洞.md
  summary: 亞伯拉罕死後，以撒與以實瑪利把他葬在幔利前、以弗崙田中的麥比拉洞（創25:9-10），與先前所葬的妻子撒拉同穴。
  relation: 本章使麥比拉洞由撒拉的葬地擴為亞伯拉罕夫婦同葬之處，印證創23章購地的復活盼望——族長夫婦在應許之地的墳中一同等候。
- title: 瑣轄
  path: link_folder/人物/瑣轄.md
  summary: 本章重述麥比拉洞在「赫人瑣轄的兒子以弗崙的田中」（創25:9），再次點出瑣轄為以弗崙之父。
  relation: 本章與創23章呼應，於亞伯拉罕葬禮處再次標明田主以弗崙的父系，鞏固該墳地的法律歸屬。
- title: 利百加
  path: link_folder/人物/利百加.md
  summary: 以撒四十歲娶利百加；她婚後二十年不生育，以撒為她祈求，神應允使她懷孕。胎兒腹中相爭，她求問耶和華得「大的要服事小的」的神諭；生下以掃與雅各，她偏愛雅各。
  relation: 本章使利百加由創24章的新婦進入母親的角色：她親自求問耶和華、領受揀選的神諭，並在偏愛雅各上與神的揀選一致，卻也埋下家庭衝突的伏筆。
- title: 以掃輕看長子名分
  path: link_folder/主題/以掃輕看長子名分.md
  summary: 以掃打獵累昏，為一碗紅豆湯把長子的名分起誓賣給雅各，吃喝完便起來走了——「這就是以掃輕看了他長子的名分」（創25:34）。
  relation: 本章是此主題的敘事本源：以掃只顧眼前、輕看神所賜的名分，成為新約「貪戀世俗」之人的鑑戒（來12:16-17）。
