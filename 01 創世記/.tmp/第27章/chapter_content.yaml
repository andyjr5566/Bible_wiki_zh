organization: '本章是一齣家庭悲劇：一個認識神的家庭，卻沒有一個人求問神——以撒憑口腹之慾偏心、利百加憑詭計搶先、雅各憑說謊冒充、以掃輕看名分又動殺機。神的揀選（大的服事小的）終究成就，但每個人都付上代價。


  ### 以撒欲祝福以掃（1-4節）


  以撒年老[[以撒的眼睛昏花|眼睛昏花]]——在應用上，屬靈的辨識力也隨之衰退，看不清神所看的（KC）。他想祝福以掃，儘管神早已啟示「大的要服事小的」（創25:23），也儘管以掃已賣了長子名分——這出於他對[[野味]]的偏愛（[[以撒偏愛以掃]]；創25:28）。「祝福」（berakah）與「長子名分」（bekorah）原文發音相近，以撒想把名分給以掃，是不尊重神的旨意。


  > [!note] 「未死之先」的祝福

  > 以撒此時約137歲（受同父異母兄以實瑪利137歲卒的影響，自以為將死），實則活到180歲，此後還有43年（CT/KC）。族長臨終的[[族長祝福的不可更改性|祝福具約束力與預言能力，一經出口不能更改]]（創9:24-27；49:28）。


  ### 利百加的詭計（5-17節）


  利百加聽見後，不去提醒以撒神的旨意、也不求問神（她從前會，創25:22），反而設計欺騙：叫雅各拿兩隻肥山羊羔做成[[野味|美味]]，穿上以掃的衣服、手與頸包上[[山羊羔皮]]冒充。雅各的顧慮不是罪咎感，只是「怕被摸出來招咒詛」；利百加說「你招的咒詛歸到我身上」。


  KC 指出：夫妻在婚姻中彼此認識的知識，本該堅固合一，這裡卻被利百加用來欺騙丈夫——知識反成拆毀合一的工具。


  ### 雅各騙取祝福（18-29節）


  雅各冒充以掃到父親面前（[[雅各騙取祝福]]）。以撒三次起疑（來得太快、聲音是雅各的、親手摸辨），卻因倚賴觸覺與嗅覺而信了謊言——「聲音是雅各的聲音，手卻是以掃的手」（22節）。KC
  應用：一個信徒可以「說話像信徒，行事卻像世界」。雅各更妄稱「耶和華─你的神使我遇見」——以掃決不會這樣說，反露出破綻般的角色扮演。


  以撒摸辨並[[親嘴]]確認，聞衣服的香氣就祝福他（[[猶大出賣耶穌|親嘴日後成為出賣的記號]]）。祝福三方面：


  | 面向 | 內容（28-29節） |

  |---|---|

  | 物質豐盛 | 天上甘露、地上肥土、五穀新酒 |

  | 統治權 | 多民事奉、多國跪拜、作弟兄的主 |

  | 屬靈保護 | 咒詛你的受咒詛、祝福你的蒙福（[[祝福與咒詛]]；創12:3） |


  ### 以掃的痛哭與次等祝福（30-40節）


  以掃打獵回來獻上野味求福，以撒「大大地戰兢」——不是惱怒雅各，而是良心說話，忽然進入神的光中，看見是神介入了；他沒有收回，反而確認「他將來也必蒙福」（33節），這順服正是以撒的信心之舉（來11:20）。


  以掃放聲痛哭求福，卻被棄絕（[[以掃輕看長子名分|來12:16-17]]）；他把責任推給雅各（36節），像犯罪之初的推諉。以撒給他一個次等的祝福：住肥土之外、倚靠[[刀劍]]度日、事奉弟兄，但預言「到你強盛的時候，必從你頸項上掙開他的軛」。雅各先得天上甘露，以掃只得地上肥土——被排除在屬天的份之外。


  ### 以掃的殺機與雅各逃亡（41-46節）


  [[以掃的怨恨|以掃怨恨雅各]]，心裡打算在父親居喪後殺他——這正是「該隱屬那惡者、殺了兄弟」的靈（[[該隱殺亞伯]]；約壹3:12）。利百加得知，打發雅各[[雅各逃往哈蘭|逃往哈蘭]]拉班處「住些日子」——她以為只是幾天，實則此去二十年，母子再未相見（何12:12）。她又借[[赫人]]女子之事對以撒抱怨，把逃亡轉成得以撒祝福的「合法出行」。


  > [!quote] KC

  > 利百加和雅各在爭取所要的上都「贏」了，卻也失去了許多想抓住的。偷來的祝福只帶來憂傷與分離；雅各要漂流二十年——這是他自己招來的。然而神竟能藉人的失敗成就祂的計畫，這絲毫不減人的責任，反而加增神當得的敬拜（[[神的旨意與人的詭詐]]）。


  雅各的一生始於欺詐詭計，末了我們讀到他所作的最後一件事卻是「敬拜」（來11:21）——這正是神在他身上塑造的工作。'
