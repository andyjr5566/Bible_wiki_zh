organization: '本章有兩條線交織：**一邊是雅各一家在埃及安頓、生養眾多；一邊是埃及全國在饑荒中把一切交在法老手裡。**而全章收在一個老人扶著杖頭（或伏在床頭）敬拜的畫面上。


  ### 經文大綱


  1. **五個弟兄見法老，得住歌珊**（1-6節）

  2. **雅各見法老，兩次為他祝福**（7-10節）

  3. **約瑟按人口奉養父家**（11-12節）

  4. **饑荒政策：銀子、牲畜、田地**（13-26節）

  5. **雅各的十七年與臨終的囑咐**（27-31節）


  ### 一、「你們以何事為業？」（1-6節）


  約瑟「**從他弟兄中挑出五個人來**」——CT 選了體面且有口才的；GT 另提一層：**埃及人認為「五」是最有意義的數字**（參43:34；45:22）。KC
  則說：**「五」是責任的數字——是人所當作的。**


  他們照約瑟先前的教導誠實回答：「**你僕人是牧羊的，連我們的祖宗也是牧羊的**」，並且說明「我們來到這地[[寄居身分|寄居]]」。


  > [!note] 「寄居」這兩個字，是他們的護照，也是他們的身分

  > 丁良才：**「寄居」顯明以色列人遲早要回到迦南；他們在埃及只不過是客旅。**KC：**他們無意在那裡定居，因為他們真正的居所在迦南；他們只想在饑荒持續期間留在埃及。**——**這正是信徒在世上的寫照**（來11:13；彼前2:11）。


  法老不但准了，還說：「你若知道他們中間有什麼**能人**，就派他們看管我的牲畜。」KC 由此看見一個屬靈的次序：**弟兄們所求的（住歌珊），正是法老已經應許給約瑟的。神也是這樣——藉著我們的禱告，把祂在旨意中早已定意要給我們的，賜給我們。**


  ### 二、逃荒的老人，為天下最有權勢的人祝福（7-10節）


  「約瑟領他父親雅各進到法老面前，**雅各就給法老祝福**。」——而且**一見面就祝福，離開前再祝福**（7、10節）。


  > [!quote] 從來位分大的給位分小的祝福

  > CT 寫得極好：**「雅各雖然是宰相的父親，總比法老小一點。並且雅各又是一個逃荒的人，他到法老的地方來，還得靠法老得糧食……但是在這裡我們看見，雅各在法老面前並不失去他的地位；他知道在屬世方面法老的位分是大的，但在屬靈方面法老的位分卻是小的，所以他能替法老祝福。這是他站住屬靈的地位。」**（來7:7：「從來位分大的給位分小的祝福。」）

  >

  > KC：**約瑟並不以他年老、跛腳的父親為恥。這是給所有社會地位高過父母的年輕人的功課——雅各也許是個貧窮的白髮老人，但他在神裡面是富足的。**KC 又補一個新約的對照：**保羅這個囚犯站在非斯都面前，向亞基帕王說話時，也是這樣**（徒26:29）。

  >

  > CT 還看出雅各一生的翻轉：**「雅各從前想盡辦法求取別人的祝福（27:19），如今卻是為別人祝福。靈命幼稚的人，只想從別人有所得；靈命成熟的人，卻想讓別人有所得。」**


  「我[[寄居身分|寄居在世]]的年日是一百三十歲，我平生的年日**又少又苦**，不及我列祖在世寄居的年日。」


  | | 年歲 |

  |---|---|

  | 亞伯拉罕 | 175 歲 |

  | 以撒 | 180 歲 |

  | 雅各 | 147 歲（見法老時 130 歲） |


  「又苦」——丁良才數了九樣：**以掃的怨恨、拉班的欺哄、底拿被辱、拉結去世、流便不孝、約瑟被害、猶大行淫、西緬被囚、幼子（便雅憫）離家。**KC 卻誠實地指出另一面：**他的年日之所以「又少又苦」，是因為他沒有接受耶和華的引導，總是走自己的路；他不信靠神，以為必須自己想辦法去得著神所應許的。**


  ### 三、銀子、牲畜、田地（13-26節）


  饑荒政策是分三步、跨兩年的：


  | 階段 | 百姓交出 | 經文 |

  |---|---|---|

  | 一 | **銀子**（糴糧的銀子盡歸法老的宮） | 14-15節 |

  | 二 | **牲畜**（牛、羊、驢、馬） | 16-17節 |

  | 三 | **身體與田地**（並求種子） | 18-20節 |


  **要留意：第三步是百姓自己提出來的**——CT：**「注意這種出賣土地和勞力的辦法，並非出於約瑟的要求，而是出於埃及百姓自動的提議。」**


  約瑟隨即：**[[約瑟的饑荒土地政策|為法老買了埃及所有的地]]**、叫百姓各歸各城（丁良才：**大概是預備領糧**；《精讀本》：**集中在囤糧的城市，便於迅速供糧**；但七十士譯本此句另譯作「**使各人都成為奴隸**」）、給他們種子，並定下**收成[[約瑟的饑荒土地政策|五分之一納給法老]]、四分歸自己**的常例。


  > [!note] 這是善政還是暴政？

  > 來源多半持正面評價：《串珠》：**「五分之一是極低的稅收；上古中東的人借錢時通常要付出百分之五十的利息。」**《舊約背景註釋》：**「百分之二十的稅額在古代世界並不反常。」**《精讀本》：**與各國稅制相比，交納五分之一決非殘酷；且在古時，經濟上不能自立的人往往自願為僕，這種主僕關係不是剝削，而是以順從為條件的保護關係。**——**經文自己給的評價，是從百姓口中說出來的：「你救了我們的性命。」**

  >

  > 但經文也清楚記載了另一面：**土地與勞役由此集中在王權之下**（20-21、23、25節）。這兩面都在經文裡，不必只取一面。

  >

  > KC 從中讀出一個豫表：**約瑟用他為主的地位，把一切完全歸服法老——先是銀子，再是牲畜，最後是人和地。主耶穌也要照樣使萬有服在神以下**（林前15:24-28）；**而祂是用重價買了這一切**（啟5:9）。


  **惟有祭司的地，約瑟沒有買**——因為祭司有從法老所得的常俸。KC 也在這裡看見一幅圖畫：**有一班人不在這被買的範圍之內——祭司。這叫我們想起今日的信徒：我們是祭司**（彼前2:5）；**當萬有都服在主之下時，教會卻不在其中——教會是要與祂一同作王的**（弗1:22-23）。


  ### 四、十七年（27-31節）


  「以色列人住在埃及的歌珊地，他們在那裡**置了產業，並且生育甚多**」——這正應驗了46:3 的應許（並見出1:7）。（CT 也留下一句警語：**以色列人樂不思蜀，在埃及置產落戶，以致後來被埃及人忌恨**，出1:8-10。）


  「雅各住在埃及地**十七年**」——CT 注意到一個對稱：**「十七年」正是約瑟被賣時的歲數**（37:2）。


  > [!quote] 他的結局比他的祖宗更美

  > KC 的觀察極深：**在信心的道路上，雅各不及亞伯拉罕和以撒；但他的結局卻更美。我們沒有亞伯拉罕或以撒臨終的記載，卻讀到雅各臨終極其詳盡的記載——這正是要顯明：神的恩典最終如何在這個人身上得勝。這是神那忍耐的管教工作的高峰。**


  臨終時他叫約瑟「[[大腿底下起誓|把手放在我大腿底下]]」起誓——這是亞伯拉罕當年叫老僕人起誓的方式（24:2），**手所觸近生殖之處，意味著若違背誓言，就要遭受絕後的報應**。


  > [!note] 他不在乎吃什麼穿什麼，卻極在乎葬在哪裡

  > CT：**「雅各在埃及地沒有注意吃什麼、穿什麼……但是，他對於自己死後該葬在什麼地方這一個問題並沒有放鬆，因為這一個問題與神應許的地和國發生關係。」**丁良才數出兩個理由：**①他相信他的後裔必得迦南地為業；②他要使他的子孫知道——埃及不是他們常住的地方。**KC
  更把它連到復活：**他要葬在那地，是著眼於復活，以及神就那應許之地所起的一切誓**（參太22:31-32：「神不是死人的神，乃是活人的神」）。


  末了一句：「於是以色列在[[床頭或杖頭|床頭上【或作扶著杖頭】]]敬拜神。」


  > [!quote] 床頭，還是杖頭？

  > 這是一個著名的異文：**未標母音的希伯來輔音完全相同**——「床」（mittah）與「杖」（matteh）。**馬所拉文本讀作「床」；七十士譯本讀作「杖」，希伯來書11:21
  引用的正是後者。**《串珠》：**「在床頭」描寫這個體弱的老人家不能從床上起來跪地敬拜，只有伏在床頭禱告神。**——**兩種讀法都保留了同一個核心動作：約瑟起誓之後，雅各敬拜神。**

  >

  > 而 KC 從「杖」讀出雅各一生的縮影：**在毘努伊勒，神摸了他的大腿窩，從此他瘸腿而行（32:25,31）；那根杖，是他起初不肯接受、後來卻不可或缺的扶持。如今他承認：神一直是他的扶持——於是他敬拜。**CT
  同聲：**「杖」的含意：一生在地上奔波，乃是作客旅；一生受神的帶領，是蒙神憐憫的記號（32:10）。所以這句話的意思乃是對神說：你在我身上和我一生的路上所作的，沒有一件不是最好的，所以我要敬拜你。**

  >

  > KC 的結語：**他的死，以敬拜神、並把祝福分給後裔為標記。還能想像比這更好的結局嗎？**


  ### 關鍵神學點


  1. **[[寄居身分]]**：「寄居」是雅各家在法老面前的自我介紹，也是雅各對自己一生的總結——他們在埃及蒙保全，盼望卻始終連於應許之地。

  2. **[[神的護理]]**：饑荒之中，全地餓昏，雅各全家卻按人口得奉養；同一場饑荒，成了選民保全與繁衍的搖籃。

  3. **[[約瑟的饑荒土地政策]]**：百姓說「你救了我們的性命」，經文同時記下土地與勞役集中於王權——兩面並存。

  4. **[[大腿底下起誓]]／[[床頭或杖頭]]**：老雅各最在意的不是餘生，而是歸葬何處；他的最後一個動作，是敬拜。'
