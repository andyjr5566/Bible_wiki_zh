updates:
- title: 耶和華的使者
  path: link_folder/神學/耶和華的使者.md
  summary: 耶和華的使者兩次從天上呼叫亞伯拉罕（創廿二11、15）：第一次阻止他下手並宣告「現在我知道你是敬畏神的了」，第二次傳達神指著自己起誓的祝福。
  relation: 本章12節「留下不給我」與16節「耶和華說」顯明這位使者以神的身分說話，是「耶和華的使者即耶和華自己」理解的關鍵經文之一。
- title: 清早起來
  path: link_folder/主題/清早起來.md
  summary: 亞伯拉罕領受獻以撒的命令後「清早起來」備驢、劈柴、起行（創廿二3）；他不與神理論、不為以撒求情、不與撒拉商量，立即遵行。
  relation: 本章是此主題最沉重的一次出現：即時的順服不僅針對可行的吩咐（廿一14打發夏甲同樣清早起來），也針對要求捨出獨生愛子的試驗。
- title: 第三日
  path: link_folder/神學/第三日.md
  summary: 亞伯拉罕行了三日路程，「到了第三日舉目遠遠的看見那地方」（創廿二4）；在心中他已捨了以撒，第三日彷彿把他從死裡得回（來十一19）。
  relation: 本章是「第三日」復活意涵的重要舊約根源：受苦與捨出在前，第三日的得回與盼望在後，豫指基督第三日復活（路廿四46）。
- title: 公羊
  path: link_folder/神學/公羊.md
  summary: 亞伯拉罕舉目看見一隻公羊兩角扣在稠密的小樹中，就取來獻為燔祭「代替他的兒子」（創廿二13）。
  relation: 本章是公羊作代替祭物的敘事本源：神的預備使替代成為可能，豫表神的羔羊代死（約一29）；角被扣住亦被讀作基督甘受限制、不從十字架下來的圖像。
