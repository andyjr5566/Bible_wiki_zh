book: 創世記
chapter: 23
updates:
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 撒拉死於希伯崙，亞伯拉罕為她哀慟哭號（聖經首記他流淚），隨後起來以寄居者身分向赫人求購墳地；不受贈與、按足價平了四百舍客勒銀子向以弗崙買下麥比拉田與洞，公開買妥後安葬撒拉。
  relation: 本章呈現他信心的另一面：在應許之地仍自認外人與寄居的（來十一13），卻以購置墳地宣告對神應許與復活的盼望——所得唯一永久產業竟是一塊墳地。
- title: 希伯崙
  path: link_folder/地點/希伯崙.md
  summary: 撒拉死在迦南地的基列亞巴，就是希伯崙（創廿三2）；亞伯拉罕在此買下幔利前的麥比拉田間之洞，安葬撒拉（19節）。
  relation: 本章使希伯崙成為族長家族的祖墳所在：其後亞伯拉罕、以撒、利百加、利亞、雅各皆葬於此（創廿五9；四十九29-31；五十13）。
- title: 死人
  path: link_folder/主題/死人.md
  summary: 亞伯拉罕四次說要「埋葬我的死人」（創廿三4、6、8、13）；死人無論多親愛都必須埋葬，他從死人面前起來辦理後事。
  relation: 本章是「死人必須埋葬」主題的敘事本源：埋葬既是對死者的尊重，也連於復活的盼望——埋葬是種下，等候收成。
- title: 四百舍客勒
  path: link_folder/文化/四百舍客勒.md
  summary: 以弗崙開價四百舍客勒銀子（創廿三15），遠高於大衛買禾場的五十舍客勒與耶利米購地的十七舍客勒；亞伯拉罕不還價，用買賣通用的銀子平足給他（16節）。
  relation: 本章是此度量衡條目的出處：全額付款確保永久產權、避免後人追討口實，也顯出亞伯拉罕不佔別人便宜的見證。
- title: 樹木
  path: link_folder/主題/樹木.md
  summary: 交易標的明列「田間四圍的樹木」（創廿三17），與田、洞一同定準歸亞伯拉罕——產業界線完整劃定。
  relation: 本章是此主題的出處：樹木入約顯示交易之完備；靈意上樹木的生機被讀作復活生命的圖像（CT）。
- title: 城門口交易
  path: link_folder/文化/城門口交易.md
  summary: 以弗崙在「城門出入的赫人面前」應對亞伯拉罕（創廿三10），交易也在城門出入的人面前買妥定準（18節）。
  relation: 本章是此文化條目的出處：城門口是古代近東公眾集會、審判與買賣之地，公開見證使買賣合約具法律保障。
