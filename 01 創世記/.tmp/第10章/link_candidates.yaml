book: 創世記
chapter: 10
candidates:
  - name: 萬國同源
    type: 神學
    evidence: 1、32節全章框架：列國都出自挪亞三子（徒十七26）
    surfaces:
      - {phrase: 挪亞的兒子, verses: [1]}
      - {phrase: 挪亞三個兒子的宗族, verses: [32]}
  - name: 閃
    type: 人物
    evidence: 1、21-31節；希伯子孫之祖，家系通往亞伯蘭
  - name: 含
    type: 人物
    evidence: 1、6-20節；後裔佔全章約半篇幅，多成以色列世仇
  - name: 雅弗
    type: 人物
    evidence: 1、2-5、21節；後裔多在安那托利亞、愛琴海與北方地區
  - name: 宗族方言地土地與邦國
    type: 主題
    evidence: 5、20、31節重複公式；CT 分析血緣、語言、地緣、政治四層關係
    surfaces:
      - {phrase: 方言、宗族立國, verses: [5]}
      - 宗族、方言，所住的地土、邦國
  - name: 迦南
    type: 人物
    evidence: 6、15-19節；迦南支系集中於地中海東岸
  - name: 寧錄
    type: 人物
    evidence: 8-12節；原文意「反叛」；世上英雄之首，國起頭在示拿地
  - name: 寧錄的在耶和華面前
    type: 解經爭議
    evidence: 9節；CT/KC 讀作目中無神的逞強，呂振中與 BH 保留「靠耶和華的恩」或卓著聲名的可能
    surfaces:
      - {phrase: 他在耶和華面前是個英勇的獵戶, verses: [9]}
  - name: 巴別
    type: 地點
    evidence: 10節寧錄國的起頭，巴比倫的前身
  - name: 示拿地
    type: 地點
    evidence: 10節巴比倫平原；11章建塔之地
  - name: 寧錄還是亞述建造尼尼微
    type: 解經爭議
    evidence: 11節希伯來文主詞可讀寧錄或亞述；兩種譯法並存
    surfaces:
      - {phrase: 他從那地出來往亞述去, verses: [11]}
  - name: 尼尼微
    type: 地點
    evidence: 11-12節；後成亞述帝國都城（拿三3大城）
  - name: 非利士人出自迦斯路希或迦斐託
    type: 解經爭議
    evidence: 14節；句法接迦斯路希之後，申二23等又連迦斐託；遷徙路線資料不足
    surfaces:
      - {phrase: 從迦斐託出來的有非利士人, verses: [14]}
  - name: 迦南地
    type: 地點
    evidence: 19節從西頓經基拉耳到迦薩、平原諸城的境界描述
    surfaces:
      - {phrase: 迦南的境界, verses: [19]}
  - name: 希伯
    type: 人物
    evidence: 21、24-25節；閃被特稱「希伯子孫之祖」，焦點移向亞伯蘭家系
  - name: 亞述
    type: 地點
    evidence: 22節閃的兒子；亦為地名（11節）
  - name: 法勒
    type: 人物
    evidence: 25節希伯之子；名字意「分」
  - name: 法勒名字與分地
    type: 原文
    evidence: 25節經文自注「法勒就是分的意思」
    surfaces:
      - {phrase: 法勒就是分的意思, verses: [25]}
  - name: 法勒時代的分地指什麼
    type: 解經爭議
    evidence: 25節；巴別分散為主流解釋，另有土地劃分、群體遷徙、定居與遊牧分開諸說
    surfaces:
      - {phrase: 分地居住, verses: [25]}
  - name: 挪亞
    type: 人物
    evidence: 1、32節全章家譜源頭
  - name: 列國表
    type: 背景
    evidence: 全章通稱；承接九18-19，為11章巴別與12章亞伯蘭蒙召預備
  - name: 七十的屬靈意義
    type: 原文
    evidence: 傳統在本章數出七十宗族單位；出一5、廿四1等以七十表完整
  - name: 生養眾多與治理
    type: 主題
    evidence: 列國分布延續九1、7遍滿全地的命令
  - name: 希伯與希伯來名稱
    type: 原文
    evidence: 21、24節；「希伯」與「希伯來」字形相關，與 Habiru 的關係仍有討論；亞伯蘭於十四13首稱希伯來人
  - name: 雅弗住在閃的帳棚
    type: 互文
    evidence: 2-5節雅弗分布呼應九27神諭；KC 指擴張要到第四帝國才顯著
  - name: 巴別塔
    type: 主題
    evidence: 10節巴別、25節分地與11章敘事相連
  - name: 寧錄與敵基督
    type: 互文
    evidence: CT 靈訓以寧錄的名字、能力、性情、態度、工作預表大罪人（帖後二；啟十三）
  - name: 列國表的古代地理與現代族群
    type: 解經爭議
    evidence: GT 背景註釋：名稱可指人、宗族、地區或城市，親屬語言可表政治關係，不能按名稱相似推定現代民族血統
  - name: 寧錄與巴別塔的關係
    type: 解經爭議
    evidence: 經文未載寧錄建塔；約瑟夫等後來傳統把他寫成煽動者
  - name: 第10章多種方言與第11章一種語言
    type: 解經爭議
    evidence: 賈斯樂郝威命題28：兩章按主題安排，10章敘分布結果、11章敘原因
  - name: 挪亞三子神諭的性質
    type: 解經爭議
    evidence: 本章列國分布常被讀作九25-27神諭的展開
  - name: 迦南咒詛的種族主義誤用
    type: 解經爭議
    evidence: 迦南人、腓尼基人語言屬閃語族卻列含系，顯示本章非按膚色或現代語族分類
