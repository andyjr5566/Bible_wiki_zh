organization: '雅各從[[毗努伊勒]]（創32:31）出發，與[[以掃]]相隔二十年後重逢。這是[[雅各以掃和好|全章的高峰]]：昨夜與神摔跤的人，今日面對他一生最懼怕的人——而神已先動了工。


  ### 雅各與以掃的和好（1-11節）


  雅各見以掃帶四百人前來，採取防禦性佈署：兩個使女（比拉、悉帕）和孩子在最前，[[利亞]]和她的孩子在中間，最愛的[[拉結]]和[[約瑟]]在盡後頭——這既反映[[信心與恐懼|內心仍存懼怕]]，也流露[[雅各安排家人順序是否偏愛|根深蒂固的偏愛]]（創29:30）。但雅各自己走在最前頭，一連[[七次俯伏
  (古代朝見禮儀)|俯伏在地]]才就近哥哥：若有危險，他要自己先受（CT）。


  > [!note] 七次俯伏＝覲見帝王之禮

  > [[古代朝見禮儀七次下拜|一連七次俯伏在地]]是古代近東覲見君王的標準禮儀——亞瑪拿文獻（主前14世紀）記載藩屬向法老下拜七次（華爾頓）。這既是[[謙卑與悔改|極度的謙卑與屈服]]，也顯示雅各良心有虧；CT
  說得傳神：「子彈是從『俯伏的人』頭上飛過去；只有謙卑才能消除別人的怒氣。」（參[[謙卑像基督 (腓2-7-8)]]）


  出人意料地，以掃跑來迎接，擁抱、摟頸、親嘴，兩人同哭——真有如[[浪子比喻 (路15)|父親迎接浪子]]（路15:20）。四份來源一致：[[以掃饒恕雅各是否真心還是神感動|這是神特別的感動]]，不是出於以掃本心——「[[王心在神手中
  (箴21-1)|王的心在耶和華手中]]」「[[神使仇敵與人和好 (箴16-7)|人所行的若蒙耶和華喜悅，耶和華也使他的仇敵與他和好]]」。雅各先前的懼怕愁煩（創32:7），如今證實是多餘的。


  對話中雅各稱以掃「我主」、自稱「僕人」（[[雅各稱以掃為主、自稱僕人是否失去尊嚴|解經爭議]]：KC 認為這是失去神所賜的尊嚴；CT 認為天然生命雖被對付，外面行為仍需時日脫去），以掃卻直呼「兄弟」——強烈對比。


  | 用語 | 雅各 | 以掃 |

  |---|---|---|

  | 稱呼對方 | 我主（8、13、14節） | 兄弟（9節） |

  | 自稱 | 你的僕人（5節） | ── |

  | 論所有 | 神恩待我，使我**充足**（11節） | 我的已經**夠了**（9節） |


  「[[古代送禮習俗 (賄賂-禮貌-表達愛)|禮物]]」（minchah）原文與「[[禮物挽回怒氣 (箴21-14)|福分]]」（創27:35）同字——雅各藉此把當年詭計奪來的「福分」歸還給哥哥（CT／GT／啟導本）。收禮象徵和好確立、放棄報復（書9:14-15）。雅各說「[[雅各見面如見神面是否冒犯神榮耀|我見了你的面，如同見了神的面]]」（10節）——KC
  質疑這是把神的榮耀歸給一個「貪戀世俗的人」（[[以掃為虔誠人 (來12-16)|來12:16]]）；CT 則解為：所得罪、所虧欠之人的面，就如同神的面。他又承認「[[神的恩典與保護|神恩待我，使我充足]]」——正是[[神賜福賜財富能力
  (申8-18)|申8:18]]「得貨財的力量是他給你的」；兒女也是[[兒女為神賞賜 (詩127-3)|神的賞賜]]（5節）。


  ### 雅各拒絕與以掃同行（12-16節）


  以掃提議同行前導，雅各以孩子嬌嫩、牛羊乳養婉拒，並承諾「直走到[[西珥]]我主那裡」——這屬中東客套話，雅各實際往北去[[疏割]]，聖經未記他何時到西珥（CT／GT）。以掃再提議留人保護，雅各仍拒。CT
  提醒兩層原因：[[牧人與獵人生活差異|獵人與牧人的思想作法不同]]，不宜相處；且「和解是一回事，同在一起是另一回事」。


  ### 雅各在疏割與示劍定居（17-20節）


  雅各往[[疏割]]（意[[疏割 (棚)|棚]]），為自己蓋房、為牲畜搭棚——表明要長住；他可能住了多年（底拿從六七歲長成少女，創34:1）。隨後渡河到[[迦南地]]的[[示劍（城）|示劍城]]東支搭帳棚，用一百塊[[客西達錢幣單位|客西達銀子]]向[[哈抹]]的子孫[[迦南地買地習俗|買地]]（此地後來成為[[約瑟骸骨葬於示劍|安置約瑟骸骨之處]]，書24:32），並[[祭壇敬拜|築壇]]起名[[伊利伊羅伊以色列
  (神、以色列神)|伊利伊羅伊以色列]]（[[亞伯拉罕在示劍築壇|亞伯拉罕也曾在示劍築壇]]，創12:7）。


  > [!quote] 疏割型的基督徒

  > CT 一針見血：神並未說祂是「疏割的神」，而說祂是「[[伯特利之約 (創28)|伯特利的神]]」（創31:13）——雅各往疏割是[[疏割居住是否屬靈倒退|向後倒退一步]]。「雅各在疏割僅為自己蓋造房屋、為牲畜搭棚，他並沒有為神蓋造甚麼；今日也有許多基督徒，是疏割型的基督徒，只為自己卻不為神。」


  這段暴露雅各屬靈狀態的複雜：


  - **正面**：承認神的恩典（11節）、履行伯特利許願「耶和華必作我的神」（創28:21）、在應許之地[[帳棚生活與定居對比|支搭帳棚]]又買地、[[示劍築壇意義：紀念神還是佔領地土|築壇敬拜]]。壇名宣告「神是**以色列的**神」——這是認識新名後的信心行動（司可福）。

  - **負面**：[[雅各未去西珥卻往疏割示劍是否違背神旨意|未上伯特利]]、久居疏割、定居示劍（神未吩咐之地），埋下底拿事件的禍根（創34）。壇名雖稱「以色列」，行為卻仍帶「雅各」（抓後腳跟者）的陰影——KC：「我們也很會用敬虔的話語，來掩飾自己錯誤的道路。」'
