book: 創世記
chapter: 13
candidates:
  - name: 亞伯蘭
    type: 人物
    evidence: 1-18節；回伯特利恢復求告、讓羅得先選、得應許遷希伯崙築壇
  - name: 羅得
    type: 人物
    evidence: 1-12節；財物甚多、舉目自選約但河平原、漸漸挪移直到所多瑪
  - name: 埃及
    type: 地點
    evidence: 1、10節；從埃及上南地；平原「像埃及地」
  - name: 南地
    type: 地點
    evidence: 1、3節尼革乾旱區，回伯特利的路線
  - name: 伯特利
    type: 地點
    evidence: 3節回到起先支搭帳棚築壇之地
  - name: 帳棚與祭壇
    type: 主題
    evidence: 4、18節；回到起先築壇處求告耶和華的名，又在幔利築壇
    surfaces:
      - {phrase: 築壇, verses: [4]}
      - {phrase: 築了一座壇, verses: [18]}
  - name: 牧人水草與土地承載
    type: 背景
    evidence: 6-7節；GT 背景註釋論季節性遷牧與水草使用權常引發爭執；「容不下」指同一放牧區資源不足
    surfaces:
      - {phrase: 那地容不下他們, verses: [6]}
  - name: 謙讓
    type: 主題
    evidence: 8-9節亞伯蘭放棄先選權；KC 指他不堅持權利，留給神選擇（詩四十七4）
    surfaces:
      - {phrase: 亞伯蘭就對羅得說, verses: [8]}
  - name: 骨肉原文作弟兄
    type: 原文
    evidence: 8節；原文弟兄可泛指男性親屬，中文依叔姪關係譯作骨肉
    surfaces:
      - {phrase: 骨肉【原文作弟兄】, verses: [8]}
  - name: 約但河
    type: 地點
    evidence: 10-11節全平原直到瑣珥，水源充足
  - name: 所多瑪
    type: 地點
    evidence: 10、12-13節；罪大惡極之城，羅得漸漸挪移直到所多瑪
  - name: 耶和華的園子
    type: 原文
    evidence: 10節；形容平原如伊甸般水源植物豐盛（結四十七6-12）
  - name: 羅得的世俗選擇與後果
    type: 主題
    evidence: 11-13節；KC 指羅得只看眼前利益、心隨眼走如夏娃；GT 整理眼錯心錯腳錯的次序
    surfaces:
      - {phrase: 羅得選擇約但河的全平原, verses: [11]}
  - name: 迦南地
    type: 地點
    evidence: 12節亞伯蘭住迦南地；GT 背景註釋指約但河為迦南東界，羅得等於離開了迦南
  - name: 後裔如地上的塵沙
    type: 原文
    evidence: 16節；數量極多的修辭；傳統以塵沙表屬地後裔、十五5眾星表屬天後裔
    surfaces:
      - {phrase: 地上的塵沙, verses: [16]}
  - name: 希伯崙
    type: 地點
    evidence: 18節；原文意「聯合、交通」；猶大山地古道交會處，後為族長家族中心
  - name: 幔利
    type: 地點
    evidence: 18節；既是地點也是十四13與亞伯蘭結盟者之名
  - name: 撒萊
    type: 人物
    evidence: 1節「帶著他的妻子」與全家同回迦南
  - name: 亞伯拉罕之約
    type: 神學
    evidence: 14-17節重申土地與後裔應許，直到永遠
  - name: 信心與世俗的對比
    type: 主題
    evidence: 全章敘事對照：神吩咐舉目對比自己舉目、留迦南對比住平原城邑、築壇對比無壇
