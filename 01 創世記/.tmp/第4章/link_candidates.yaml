book: 創世記
chapter: 4
candidates:
  - name: 夏娃
    type: 人物
    evidence: 1節生該隱時的信仰告白「耶和華使我得了一個男子」；來源指出她以為得著創三15應許的後裔
  - name: 該隱
    type: 人物
    evidence: 1-25節全章主角；原文意「得著」；CT 整理其墮落過程：不順啟示、發怒、嫉妒殺弟、說謊、自憐、離開神面
  - name: 亞伯
    type: 人物
    evidence: 2-25節；原文意「氣息、虛空」；牧羊為獻祭，因信獻更美的祭（來十一4）
  - name: 血祭與素祭
    type: 主題
    evidence: 3-5節兩種供物；來源側重不同：流血與否、初熟上好與否、獻祭者信心與生活；GT 背景註釋指 minhah 本可為不帶血的禮物
    surfaces:
      - {phrase: 供物, verses: [3]}
  - name: 希伯來書11章亞伯因信獻祭
    type: 互文
    evidence: 4節耶和華看中亞伯和他的供物；來十一4指亞伯因著信獻上更美的祭（改連 raw 現有片語）
    surfaces:
      - {phrase: 看中了亞伯和他的供物, verses: [4]}
  - name: 罪伏在門前
    type: 神學
    evidence: 7節罪被人格化為蹲伏門前的野獸；GT 指借用古巴比倫「守門惡魔」意象；神在殺人前已給該隱制伏罪的呼召
    surfaces: [罪就伏在門前]
  - name: 該隱殺亞伯
    type: 互文
    evidence: 8節人類第一宗謀殺；約壹三12該隱屬那惡者；KC 指自義的宗教總是逼迫恩典之路
    surfaces:
      - {phrase: 把他殺了, verses: [8]}
  - name: 我豈是看守我兄弟的麼
    type: 主題
    evidence: 9節該隱說謊又頂撞神；來源指出人有彼此看顧的本分（raw 經文作「嗎」）
    surfaces:
      - {phrase: 我豈是看守我兄弟的嗎, verses: [9]}
  - name: 亞伯的血哀告
    type: 神學
    evidence: 10節血有聲音從地裡哀告；無辜之血在神面前作見證（raw 經文作「你兄弟的血」）
    surfaces:
      - {phrase: 你兄弟的血, verses: [10]}
  - name: 該隱的記號
    type: 神學
    evidence: 15節；GT 指非烙印而是保護的憑據，是審判中的憐憫；背景註釋比較結九4-6額上記號
    surfaces: [該隱立一個記號]
  - name: 伊甸
    type: 地點
    evidence: 16節該隱住在伊甸東邊挪得之地
  - name: 挪得
    type: 地點
    evidence: 16節；原文意「流浪、飄蕩」，呼應12節流離飄蕩的判決
  - name: 該隱妻子的來源
    type: 解經爭議
    evidence: 17節；來源多以創五4「生兒養女」解為亞當其他兒女，近親婚禁令是摩西律法之後才有
    surfaces:
      - {phrase: 妻子, verses: [17]}
  - name: 以諾（該隱之子）
    type: 人物
    evidence: 17-18節；原文意「開始、奉獻」；該隱以其名建城，象徵離神後的重新開始
    surfaces: [以諾]
  - name: 以拿
    type: 人物
    evidence: 18節；原文意「見證的城」
  - name: 米戶雅利
    type: 人物
    evidence: 18節；原文意「神要抹除」
  - name: 瑪土撒利
    type: 人物
    evidence: 18節；原文意「屬神的人」
  - name: 拉麥
    type: 人物
    evidence: 18-24節該隱線第七代；原文意「健壯有能力」；多妻與復仇之歌顯示支線敗壞高峰
  - name: 拉麥的一夫多妻
    type: 神學
    evidence: 19節多妻惡俗的源起，破壞創二24一夫一妻定規
    surfaces: [娶了兩個妻]
  - name: 亞大（拉麥之妻）
    type: 人物
    evidence: 19-20節；原文意「裝飾、娛樂」
    surfaces: [亞大]
  - name: 洗拉
    type: 人物
    evidence: 19、22節；原文意「保護、遮藏」
  - name: 雅八
    type: 人物
    evidence: 20節住帳棚牧養牲畜之人的祖師；遊牧文化開端
  - name: 猶八
    type: 人物
    evidence: 21節彈琴吹簫之人的祖師；音樂藝術文化開端
  - name: 土八該隱
    type: 人物
    evidence: 22節打造銅鐵利器；GT 背景註釋詳論古代冶金科技
  - name: 拿瑪
    type: 人物
    evidence: 22節土八該隱的妹子；原文意「悅心、美麗」；經文外的象徵解讀需保守
  - name: 拉麥之歌
    type: 主題
    evidence: 23-24節聖經最早期詩歌；拉麥自誇以更大報復自保，與主寬恕七十個七次成對比（太十八22）
    surfaces: [亞大、洗拉，聽我的聲音]
  - name: 亞當
    type: 人物
    evidence: 25節又生塞特
  - name: 塞特
    type: 人物
    evidence: 25-26節；原文意「設立、代替」；神另立的後裔，延續應許之線
  - name: 以挪士
    type: 人物
    evidence: 26節；原文意「軟弱必死的人」；人認識自己軟弱才轉而求告神
  - name: 求告耶和華的名
    type: 主題
    evidence: 26節；串珠指多指公開敬拜，集體敬拜自以挪士起
  - name: 該隱的道路
    type: 神學
    evidence: 3、16節；猶11「該隱的道路」＝憑己意親近神的人意宗教，終至離開神面
  - name: 該隱的後代與無神文化
    type: 主題
    evidence: 17-24節建城、遊牧、音樂、冶金；CT 以人名字義串講無神文化的自養、自娛、自衛
  - name: 希伯來書12章亞伯的血與基督的血
    type: 互文
    evidence: 10節血的哀告；來十二24基督的血所說的比亞伯的血更美
  - name: 猶大書該隱的道路
    type: 互文
    evidence: 3節憑己意獻祭；猶11「他們走了該隱的道路」
