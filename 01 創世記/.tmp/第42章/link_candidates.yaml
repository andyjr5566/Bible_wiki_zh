book: 創世記
chapter: 42
candidates:
  - name: 雅各
    type: 人物
    evidence: 1、4、29、36、38節；打發十子下埃及糴糧，卻不肯放便雅憫去
  - name: 約瑟
    type: 人物
    evidence: 3、6-9、12、14、17-18、23-25、36節；埃及宰相，認得哥哥卻裝作生人，以嚴厲與恩慈試驗他們
  - name: 便雅憫
    type: 人物
    evidence: 4、36節；拉結僅存的兒子，雅各不肯打發他同去
  - name: 流便
    type: 人物
    evidence: 22、37節；當年主張不可害約瑟，如今以兩子性命擔保便雅憫
  - name: 西緬
    type: 人物
    evidence: 24、36節；被挑出捆綁作人質；他生性殘忍（創34:25；49:5），可能是當年謀害約瑟的主謀
  - name: 埃及
    type: 地點
    evidence: 1-3節；有糧之地，雅各打發兒子們下去糴糧
  - name: 迦南地
    type: 地點
    evidence: 5、7、13、29、32節；也有饑荒，哥哥們自述來歷之地
  - name: 約瑟的夢（應驗）
    type: 神學
    evidence: 6、9節；哥哥們臉伏於地下拜，二十年前的夢完全應驗（創37:7,10）
    surfaces:
      - {phrase: 那兩個夢, verses: [9]}
  - name: 神的護理
    type: 神學
    evidence: 18、28節；約瑟自陳「我是敬畏神的」；哥哥們戰兢說「這是神向我們做什麼呢」
    surfaces:
      - {phrase: 神, verses: [18]}
      - {phrase: 這是神向我們做什麼呢, verses: [28]}
  - name: 古埃及的起誓方式
    type: 文化
    evidence: 15-16節；「指著法老的性命起誓」是古埃及鄭重誓詞——「就如法老活著那樣實在」
    surfaces:
      - {phrase: 指著法老的性命起誓, verses: [15, 16]}
  - name: 古埃及銀子交易
    type: 文化
    evidence: 27節；主前六世紀纔有錢幣，此前以銀按重量交易；埃及無銀礦，銀子是受歡迎的貿易標準
    surfaces:
      - {phrase: 銀子, verses: [27]}
  - name: 通事（傳譯員）
    type: 原文
    evidence: 23節；約瑟刻意透過翻譯與哥哥們對話，藉此隱藏身分
    surfaces:
      - {phrase: 通事, verses: [23]}
  - name: 陰間（Sheol）
    type: 原文
    evidence: 38節；雅各說「使我白髮蒼蒼、悲悲慘慘地下陰間去了」——希伯來人觀念中人死後所居之處
    surfaces:
      - {phrase: 陰間, verses: [38]}
