book: 創世記
chapter: 21
updates:
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 亞伯拉罕百歲時，神按先前的話使撒拉生以撒；他照吩咐在第八日給以撒行割禮，斷奶日設豐盛筵席。神命他聽從撒拉打發夏甲和以實瑪利，他清早起來遵行；後與亞比米勒在別是巴立約，解決水井之爭，栽垂絲柳樹並求告耶和華永生神（El
    Olam）的名。
  relation: 本章呈現亞伯拉罕信心路程的三個面向：等候二十五年後領受應許成就、在骨肉之情與神命令間順服神、以寄居者身分與外邦王和平立約並公開敬拜。
- title: 加拉太書四章
  path: link_folder/互文/加拉太書四章.md
  summary: 加四22-31直接引用本章「把使女和她兒子趕出去」（創廿一10），以夏甲對應西奈之約、撒拉對應應許之約，以實瑪利按血氣生、以撒憑應許生，作兩約的寓意閱讀。
  relation: 本章8-21節趕出夏甲與以實瑪利的敘事，是保羅這段寓意論證的舊約本文；「按血氣生的逼迫按靈生的」（加四29）即指本章9節的戲笑。
- title: 以實瑪利與以撒的豫表
  path: link_folder/主題/以實瑪利與以撒的豫表.md
  summary: 以撒斷奶設筵之日，以實瑪利「戲笑」以撒（與「以撒」同字根的加強形式，含譏嘲之意）；撒拉要求趕出使女之子，神指定「從以撒生的才要稱為你的後裔」，同時應許以實瑪利的後裔成立一國。
  relation: 本章是這一豫表主題的敘事高峰：按血氣生與憑應許生的兩線在承受產業一事上正式分開，但被逐者仍蒙神看顧（神聽見童子的聲音）。
- title: 「以撒」名字含義
  path: link_folder/原文/「以撒」名字含義.md
  summary: 以撒出生後，撒拉說「神使我喜笑，凡聽見的必與我一同喜笑」（創廿一6），名字「喜笑」由不信的暗笑轉為信心的歡笑；第9節「戲笑」為同字根的加強形式，形成對比的雙關。
  relation: 本章使「以撒＝喜笑」的命名達到敘事成就：名字在創十七19預定，在本章由撒拉的頌讚公開解明。
