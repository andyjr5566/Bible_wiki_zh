book: 創世記
chapter: 36
candidates:
  - name: 以掃
    type: 人物
    evidence: 全章；以東人的始祖，離開雅各遷居西珥山
  - name: 雅各
    type: 人物
    evidence: 6節；以掃所離開的兄弟
  - name: 亞大
    type: 人物
    evidence: 2、4、10、12、16節；赫人以倫的女兒，生以利法
  - name: 巴實抹
    type: 人物
    evidence: 3-4、10、13、17節；以實瑪利的女兒、尼拜約的妹子，生流珥
  - name: 阿何利巴瑪
    type: 人物
    evidence: 2、5、14、18、25、41節；亞拿的女兒，生耶烏施、雅蘭、可拉
  - name: 以實瑪利
    type: 人物
    evidence: 3節；巴實抹之父
  - name: 尼拜約
    type: 人物
    evidence: 3節；以實瑪利長子，巴實抹之兄
  - name: 以利法
    type: 人物
    evidence: 4、10-12、15-16節；以掃長子，亞瑪力之父
  - name: 流珥（以掃之子）
    type: 人物
    evidence: 4、10、13、17節；巴實抹之子，意「神的朋友」
    surfaces:
      - {phrase: 流珥, verses: [4, 10, 13, 17]}
  - name: 亭納
    type: 人物
    evidence: 12、22、40節；以利法的妾，亞瑪力之母；亦為羅坍的妹子
