    type: 人物
    evidence: 12、16節；以利法與亭納所生，日後成為以色列的世仇
    surfaces:
      - {phrase: 亞瑪力, verses: [12, 16]}
  - name: 何利人
    type: 人物
    evidence: 20-21、29-30節；西珥地原住民，穴居者，後被以掃後裔同化
  - name: 西珥（何利人）
    type: 人物
    evidence: 20-21節；何利人的先祖，西珥地原有居民之始祖
    surfaces:
      - {phrase: 西珥, verses: [20, 21]}
  - name: 亞拿（何利人）
    type: 人物
    evidence: 2、14、18、20、24-25、29節；祭便之子，在曠野放驢遇著溫泉者
    surfaces:
      - {phrase: 亞拿, verses: [2, 14, 18, 20, 24, 25, 29]}
  - name: 祭便
    type: 人物
    evidence: 2、14、20、24、29節；希未人，亞拿之父，阿何利巴瑪的祖父
  - name: 迦南地
    type: 地點
    evidence: 2、5-6節；以掃娶妻與生子之地，日後所離開之地
    surfaces:
      - {phrase: 迦南, verses: [2]}
  - name: 西珥山
    type: 地點
    evidence: 8-9、30節；以掃遷居之地，神所賜給以掃的地業（申2:5）
    surfaces:
      - {phrase: 西珥地, verses: [30]}
