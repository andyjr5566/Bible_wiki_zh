  - name: 利河伯（大河邊）
    type: 地點
    evidence: 37節；大河（伯拉河）邊之地，掃羅的出身地
    surfaces:
      - {phrase: 利河伯, verses: [37]}
  - name: 溫泉或騾子（創36：24）
    type: 原文
    evidence: 24節；亞拿在曠野遇著的，武加大譯本作溫泉，猶太傳統作騾子
    surfaces:
      - {phrase: 溫泉, verses: [24]}
