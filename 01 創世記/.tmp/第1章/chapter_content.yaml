organization: '### 經文大綱


  1. **起初創造與未成形狀態**（1-2節）

  2. **第一日：光與暗分開**（3-5節）

  3. **第二日：上下之水分開**（6-8節）

  4. **第三日：海地分開，植物出現**（9-13節）

  5. **第四日：光體作記號並定時間**（14-19節）

  6. **第五日：水族與飛鳥受造並蒙福**（20-23節）

  7. **第六日：地上動物與人受造，食物安排完成**（24-31節）


  ### 核心神學觀點


  **1. 神是萬有的創造主，創造由神的主權與話語發動**

  第1節以「起初，神創造天地」作全章根基；來源都強調神在創造以前已存在，創造不是神與混沌勢力爭戰，也不是藉既有材料受限制地加工，而是神憑祂的能力、旨意與話語建立萬有。第3節以後反覆出現「神說」，顯示[[神的話（創造媒介）]]不是附帶說明，而是創造敘事的推進力量。


  **2. 1-2節的關係需要保留解經辨識**

  CT/GT 將「地是空虛混沌」理解為審判後的荒涼，因而稱3-31節為復造；KC 則說曾採此看法，後來改認為神可先創造未成形的狀態，再繼續塑造並充滿；BH 也著重神使混沌、無居住狀態進入秩序。因此本章整理把[[創世記1章第1-2節間隔問題]]列為解經爭議，而不把任何一方寫成唯一結論。


  **3. 六日結構呈現從分別到充滿、從環境到人的秩序**

  第一至三日多是分別與安排：光暗、上下、海地；第四至六日則安排光體並充滿生命，最後以[[人]]受造為高峰。此結構顯示神的創造有秩序、有界限、有目的，不是混亂堆疊。


  **4. 人按神形像受造，並承受治理託付**

  第26-28節是全章高峰。人不是另一種普通活物，而是按神的[[形像與樣式]]被造，男與女同承載神所賜的尊嚴。人的治理權柄來自神的祝福與委派，因此[[治理與管理]]不是剝削受造界，而是在神之下代表祂管理。


  **5. 「好」與「甚好」表明創造按神目的完成**

  神反覆看所造為好，至第31節總結為「甚好」。這不是人的主觀評價，而是神對創造秩序、功用與完成狀態的認可。原初食物安排也顯出神供應生命，使人與受造界活在未流血的和平秩序中。


  ### 應用反思


  - 信仰從「起初神」開始：世界與人都不是偶然，生命的意義也不是自我發明出來的。

  - 神的話帶出光與秩序；人的混亂不能靠自我命名得救，仍需要神的光照與分別。

  - 人的尊嚴與責任相連：按神形像被造，意味著人既不可被貶低，也不可把受造界當成任意消耗的資源。

  - 對解經爭議要誠實：來源不完全一致時，最好的整理不是抹平差異，而是標明差異並讓經文主線保持清楚。'
