book: 創世記
chapter: 20
candidates:
  - name: 亞伯拉罕
    type: 人物
    evidence: 1-18節；遷基拉耳再稱妻為妹，被責備後為亞比米勒代求
  - name: 撒拉
    type: 人物
    evidence: 2、14、16、18節；被取入宮又蒙保守歸還，公開昭雪
  - name: 亞比米勒
    type: 人物
    evidence: 2-18節；基拉耳王，夢中受警告，歸還撒拉並賠償
  - name: 基拉耳
    type: 地點
    evidence: 1-2節；尼革西部城邑或地區，非利士人之地
  - name: 南地
    type: 地點
    evidence: 1節亞伯拉罕向南地遷去
  - name: 加低斯
    type: 地點
    evidence: 1節寄居在加低斯和書珥中間
  - name: 書珥
    type: 地點
    evidence: 1節；近埃及東界的地區
  - name: 先知
    type: 主題
    evidence: 7節聖經首次使用；功能與代求直接相連
  - name: 心正手潔
    type: 主題
    evidence: 5節亞比米勒自辯動機純正行為清潔
  - name: 遮羞
    type: 主題
    evidence: 16節原文作眼；撒拉名譽的公開恢復
  - name: 我以為這地方的人總不懼怕神
    type: 神學
    evidence: 11節；亞伯拉罕的預設與亞比米勒臣僕甚懼怕成反差
  - name: 神在夢中顯現與引導
    type: 神學
    evidence: 3-7節；神以夢向非以色列君王說話
  - name: 神是生育的源頭
    type: 神學
    evidence: 17-18節；神使不能生育又恢復生育
  - name: 神攔阻人犯罪
    type: 神學
    evidence: 6節；未發生的罪歸因於神的保守
    surfaces:
      - {phrase: 我也攔阻了你，免得你得罪我, verses: [6]}
  - name: 古代近東同父異母婚姻
    type: 背景
    evidence: 12節；族長時代容許，利二十17後來禁止
  - name: 亞比米勒名字與王號
    type: 原文
    evidence: 2節；「王的父親」，如法老、凱撒的稱銜
  - name: 亞伯蘭稱撒萊為妹子的性質
    type: 解經爭議
    evidence: 2、13節；與創12章相同策略，離開父家時早已約定
  - name: 亞比米勒為何取撒拉
    type: 解經爭議
    evidence: 2節；被吸引說與政治聯盟說皆非經文明言
  - name: 一千銀子與遮羞的含義
    type: 解經爭議
    evidence: 16節難譯句；昭雪名譽與補償諸說
    surfaces:
      - {phrase: 一千銀子，作為你在閤家人面前遮羞, verses: [16]}
