organization: '### 全能的神與約的重申（1-8節）


  以實瑪利出生時亞伯蘭八十六歲，本章開始時他已九十九歲。經文沒有記載這十三年間神是否曾向他說話，因此只能說敘事留下了一段空白，不能進一步斷言神因第16章的事沉默十三年。


  神自稱「全能的神」，希伯來文是 *El Shaddai*（[[全能的神（El Shaddai）]]）。傳統譯法著重神足以成就應許；資料對 *Shaddai* 的語源卻有不同解釋，包括與「山」相關，或解作豐足、全有。舊約背景資料明言其確切語源未定，所以不宜把任何一說當成唯一字義（詳見[[「全能的神」原文]]）。


  > [!quote] KC

  > 這次神不是以「耶和華神」而是以「全能者」自我介紹——重點不在祂對亞伯蘭是誰，而在祂自己本身是誰。行在全能的神面前、時刻知道祂與你同在，對憑信心生活的人是極大的鼓勵。


  「在我面前作完全人」可理解為在神面前行事純全、正直，不是宣稱亞伯拉罕從此毫無罪過。神重申後裔與土地應許，並加入「多國」、「君王」及「我要作他們的神」（[[神堅定與亞伯拉罕的約]]）。這延續創12、15章的應許，本章則進一步指定名字、約的記號與承受應許的兒子。


  ### 亞伯拉罕與撒拉改名（5、15-16節）


  | 舊名 | 新名 | 經文所繫的含義 |

  |---|---|---|

  | 亞伯蘭（尊貴／被高舉的父） | 亞伯拉罕 | 「因為我已立你作多國的父」（5節） |

  | 撒萊（與公主相關） | 撒拉 | 蒙福生子、作多國之母（16節） |


  「亞伯蘭」通常解作「尊貴／被高舉的父」，「亞伯拉罕」在本節由經文直接解釋為「多國的父」（[[「亞伯拉罕」名字含義]]）。改名使神所應許的身分成為他日後公開使用的名字（[[改名與立約]]）。


  「撒萊」與「撒拉」都和「公主」相關（[[「撒拉」名字含義]]）。有些註釋分別解作「我的公主」與「公主」，另有資料認為兩者含義相同，主要是形式或讀音改變。經文明確說明的是：撒拉要蒙福、生一個兒子，並有多國和君王從她而出；「多國之母」是應許，不是「撒拉」一名無爭議的字典定義。


  部分傳統註釋說神把自己名字中的一個字母加入亞伯蘭和撒萊的名字，藉此作屬靈解讀。這可作猶太字母觀察或講道應用，但本章沒有親自解釋改名是以這種方式構成。


  ### 割禮作為約的記號（9-14節）


  神命亞伯拉罕家中所有男子受割禮，包括親生後裔、家裡生的僕人及用銀子從外人買來的人；日後出生的男嬰在第八日受割禮。這說明記號涵蓋整個家戶，不只亞伯拉罕的直系血親（[[割禮的意義]]）。拒絕受割禮者被說成「背了我的約」，要從民中剪除（詳見[[從民中剪除的含義]]）。


  割禮在古代近東並非以色列獨有，其他族群也在青春期、婚姻或其他人生階段施行（[[古代近東割禮背景]]）。創17章的特點是把它定為亞伯拉罕之約的記號，並指定第八日和整個家戶的範圍。資料提出健康、嬰兒存活觀察、儀式流血或「第八日象徵新開始」等理由，但經文本身沒有說明為何選第八日；這些應保留為背景推測或神學詮釋。


  ### 亞伯拉罕的笑與以撒之名（17-19節）


  亞伯拉罕俯伏喜笑，心中想到自己將近一百歲、撒拉九十歲，又請求以實瑪利活在神面前。資料對這笑有三種相近但不同的判斷（[[亞伯拉罕的喜笑是信心還是疑惑]]）：


  | 解讀 | 主要依據 |

  |---|---|

  | 喜樂與信心 | 他仍俯伏敬拜；羅4:19-21強調他相信神能成就應許 |

  | 驚訝中帶疑問 | 年齡使應許超越常理；笑不必等同拒絕相信 |

  | 疑惑或信心一時軟弱 | 內心反問，隨後又提出以實瑪利 |


  敘事只明說他笑、反問並為以實瑪利祈求，沒有像18章對撒拉那樣直接責備他的笑。神以「不然」明確指定撒拉所生的以撒承受約。「以撒」意為「他笑」（[[「以撒」名字含義]]），使人的笑與神後來成就應許的喜樂連在一起（創21:6）。


  ### 以撒承受約，以實瑪利仍蒙福（18-21節）


  神沒有接受以實瑪利取代撒拉所生的兒子作約的承受者；祂把約堅定在以撒及其後裔身上，並給出「明年這時節」的期限。另一方面，神也應允亞伯拉罕為以實瑪利所求，使以實瑪利昌盛、生十二個族長並成為大國（[[以實瑪利十二族]]）。創25:12-16列出十二子的名字，形成這項應許在創世記內的敘事回應。


  兩人的應許必須分開陳述：以撒承受本章所說的約；以實瑪利得到繁衍和成國的福分。經文沒有把「不承受此約」等同於「完全不蒙神眷顧」。


  ### 當日遵行（22-27節）


  神說完後，亞伯拉罕「正當那日」就為自己、十三歲的以實瑪利及家中所有男子行割禮。這段重複年齡、家戶範圍和「正當那日」，突出命令得到立即而完整的執行（詩119:60）。


  新約以割禮發展出「內心的割禮」和「非人手所行的割禮」等用法（[[羅馬書2_28-29 真割禮是內心的]]；[[歌羅西書二章|西2:11-12]]）；羅4:11又稱割禮是亞伯拉罕「未受割禮的時候因信稱義的印證」（[[羅馬書四章]]）。不同基督教傳統對割禮與洗禮是否具有取代或對應關係看法不一（詳見[[割禮與洗禮的關係]]）；KC
  由西2章的次序指出：肉體是在基督十架的「割禮」中被除去，隨後才是「受洗與祂一同埋葬」——洗禮描繪埋葬，跟在割禮之後，而非取代割禮。創17章本身只把肉身割禮定為神與亞伯拉罕及其後裔立約的記號，不能單憑本章解決後來的洗禮爭論。'
