organization: '本章是《創世記》唯一以以撒為單獨主角的一章——他從不離開應許之地（不像亞伯拉罕下埃及），卻在饑荒中走到邊界的基拉耳，一路重演父親的腳蹤，也一路經歷神的信實。


  ### 饑荒、遷居與約的重申（1-6節）


  「這時又有[[饑荒]]」——[[饑荒]]常是神的試驗，看人的心往何處去（創12:10；得1:1）。以撒往[[基拉耳]]（[[非利士人]]之地）去，走進邊界地帶。神向他顯現，明令「不要下[[埃及]]去」，要住在指示之地，並把[[亞伯拉罕之約|亞伯拉罕的約]]（同在、賜福、賜地、後裔如星、萬國得福）親自重申給他（3-4節）——「都因亞伯拉罕聽從我的話」（5節），顯明上一代的順服影響下一代蒙福。


  > [!note] 神的准許 ≠ 神的旨意

  > CT 指出：神阻止以撒下埃及，卻「准許」他寄居基拉耳——這是權宜措施而非本意。信徒當尋求神的「旨意」，不以得著神的「准許」為滿足。


  ### 重蹈稱妻為妹的過犯（7-11節）


  以撒因怕死，稱[[利百加]]為妹子——[[稱妻說謊|重蹈父親兩次的覆轍]]（創12、20章），顯出他忘了神「我必與你同在」的應許。他在那裡「住了許久」都平安無事，證明恐懼是多餘的。[[亞比米勒]]從窗戶見以撒與利百加「戲玩」（與「以撒」原文相近的雙關語）而揭穿，責備他險些使人陷在罪裡——神的兒女被外邦人指摘，是羞恥的事。


  ### 蒙福、嫉妒與挖井（12-22節）


  以撒在饑荒之年耕種得[[百倍收成]]，昌大成為大富戶。[[非利士人的嫉妒|非利士人就嫉妒他]]，把亞伯拉罕所挖的井[[塞井|塞住]]填土——「塞井」即切斷別人生存的倚賴。亞比米勒請他離開，以撒遷到[[基拉耳谷]][[支搭帳棚]]，[[挖井|重新挖出]]父親的井，仍用父親起的舊名。


  三口井的屬靈進程——以撒不爭競、步步退讓，終得神所賜的寬闊：


  | 井名 | 經歷 |

  |---|---|

  | [[埃色（相爭）]] | 相爭——基拉耳牧人爭競「這水是我們的」 |

  | [[西提拿（為敵）]] | 為敵——衝突加劇 |

  | [[利河伯（寬闊）]] | 寬闊——不再爭競，「耶和華現在給我們寬闊之地」 |


  > [!quote] KC

  > 水井是神多方之道的圖像；父輩挖的井被世界的「土」（生活的事物）塞住，我們要先除去那「土」，才能重新挖開。從古聖的著作領受亮光，但仍要親自「頭手」地挖，並且不可給真理另起別名、另加別意。


  ### 別是巴的顯現與立約（23-33節）


  以撒上[[別是巴]]（亞伯拉罕長期居住、最合神心意之地），當夜神二次向他顯現，重申同在與賜福。以撒隨即[[築壇]]、[[求告耶和華的名]]、[[支搭帳棚]]、挖井——這是屬靈生活的次序：先敬拜、信靠，再作客旅、尋求供應。


  與非利士人分別後，反得他們的承認：[[亞比米勒]]帶著朋友[[亞戶撒]]和軍長[[非各]]來求立約——「我們明明的看見[[神的同在被人看見|耶和華與你同在]]」（28節）。神的同在連世人也看得見（箴16:7）。二人設筵、起誓、[[立約]]；當日僕人報告挖井得水，以撒起名[[示巴（起誓、豐盛）|示巴]]，城因此叫別是巴。


  ### 以掃娶外邦女子（34-35節）


  [[以掃]]四十歲（以撒一百歲）娶[[赫人]][[比利]]之女[[猶滴]]、赫人[[以倫]]之女[[巴實抹]]為妻（[[以掃娶外邦女子]]）——他像該隱一樣「自己娶妻」，不像亞當與以撒從神領受妻子（KC）。這顯明長子名分於他毫無分量（呼應創25章輕看名分），兩個媳婦常使以撒和利百加心裡愁煩。神的信實貫穿全章：人一再軟弱，神的約卻絲毫不改（[[神的信實]]）。'
