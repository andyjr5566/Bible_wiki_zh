organization: '### 為以撒擇偶的囑咐（1-9節）


  亞伯拉罕年約一百四十歲（以撒娶妻時四十歲，創25:20），「向來在一切事上耶和華都賜福給他」是他一生的總結。他叫管理全業最老的僕人（傳統認為即大馬色人以利以謝，創15:2）把手放在他[[大腿底下起誓|大腿底下]]起誓——古代最鄭重的起誓禮，手所按之處靠近生殖器官，關乎後裔傳承（創47:29）。


  誓約的兩個條件：

  1. **不可娶迦南女子**（3節）——迦南各族拜偶像，恐後裔被誘離真神；擇偶首在信仰傳承的純潔（申7:3-4；林後6:14）。

  2. **不可帶以撒回本地**（6、8節）——神既呼召亞伯拉罕出來並應許迦南地，就絕不能走回頭路；「祂必差遣使者在你面前」（7節）顯出他堅定的信心。


  ### 井旁的禱告與利百加（10-28節）


  僕人帶[[十匹駱駝]]與各樣財物往[[米所波大米]]的拿鶴之城（哈蘭一帶，約八百公里）。天將晚，他在城外的[[水井]]旁禱告，求神以一個記號顯明「[[神約定之妻|你所預定給你僕人以撒的妻]]」（14節）：肯給客旅水喝、又主動為駱駝打水的女子。這記號考驗的正是品格——十匹駱駝的飲水量極大，非有愛心、勤快與體力者不能為。


  「話還沒有說完」，[[利百加]]扛著水瓶出來——神的答覆迅速而即時。她給僕人水喝，又「急忙」「跑」著為所有駱駝打上水來；僕人定睛看她、一句話也不說，要曉得耶和華賜他通達的道路沒有（21節）——觀察印證，不急於下結論（哈2:1）。駱駝喝足了，僕人拿出重半[[舍客勒]]的[[金環]]（戴在鼻上，47節）與重十舍客勒的兩個[[金鐲]]給她；問明她是[[密迦]]與[[拿鶴]]之子[[彼土利]]的女兒——正合「本族」條件——就低頭向耶和華下拜。


  僕人的成功在於完全依賴神的引領：禱告→觀察→感恩。


  ### 提親與利百加的「我去」（29-61節）


  利百加的哥哥[[拉班]]看見金環金鐲就跑出來迎接——為日後他重財的性情埋下伏筆（創31章）。僕人不肯先吃飯：「等我說明白我的事情再吃」（33節）——受託之事重於身體需要。他從神的角度重述始末（34-49節），簡明透徹，使人知所進退。


  拉班和彼土利回答：「這事乃出於耶和華，我們不能向你說好說歹」（50節）——人一看出是出於神，就只能順服。僕人三次禱告的姿勢逐步降卑：站著求（13節）→低頭下拜（26節）→俯伏在地（52節）（CT）。


  次日家人欲留她「至少十天」，僕人以神的帶領辭謝耽延。他們叫了利百加來問：「你和這人同去嗎？」她說：「**我去**」（58節）——雖未見過以撒，卻信僕人所述而果斷順服；「我們雖然沒有見過祂，卻是愛祂」（彼前1:8）。家人祝福她「願你作[[千萬人的母]]！願你的後裔得著仇敵的城門！」（60節）——正應和神對亞伯拉罕的賜福（創22:17）。


  ### 以撒迎娶（62-67節）


  以撒住在南地，天將晚在田間默想，舉目見駱駝隊來了。利百加見以撒便下駱駝、拿帕子蒙上臉——按當時風俗，新娘在婚禮完成前以帕蒙面，表端莊與尊重。僕人將所辦的一切事都告訴以撒——完滿交代任務。


  以撒領利百加進了他母親[[撒拉的帳棚]]——表明她承接主母的地位；「娶了他為妻，並且愛他」——這是聖經第二次出現「愛」字：第一次是父對子（創22:2，父神與愛子的圖畫），這次是夫對妻（基督與教會之愛的圖畫）。以撒自從母親不在了，這才得了安慰。


  ### 三一神同工的豫表


  > [!quote] KC

  > 僕人述說的滿是主人和主人兒子的豐富——聖靈今日也照樣向我們述說父與子的榮耀（約十六13-15）。


  | 角色 | 豫表 | 要點 |

  |------|------|------|

  | 亞伯拉罕 | 父神 | 發起計劃：一切所有的都給了兒子（36節；西1:19），差遣僕人為子娶妻 |

  | 老僕人 | 聖靈（[[聖靈的引領]]） | 管理全業、奉差遣尋找對象、介紹子的豐富、引領新婦走曠野路直到見面 |

  | 以撒 | 基督 | 承受萬有、留在應許之地等候、田間默想（為教會代求的圖畫）、迎娶新婦 |

  | 利百加 | 教會（[[基督之新婦（豫表）]]） | 同族（有其生命）、未見而信而愛、撇下所有跟隨引領、使新郎得安慰 |


  撒拉被利百加接續，KC 讀作以色列與教會的救贖史圖畫；這一切豫表都以「這事乃出於耶和華」為根基——婚姻與救恩同樣出於神的預定與引領。'
