# 模型端點控制器設定。
#
# orchestrator 的內容任務透過 util/model_client.py 呼叫模型；實際打哪個端點
# 由本檔的 active 決定，可隨時切換：
#   python util/model_client.py list          # 列出端點、目前 active 與任務路由
#   python util/model_client.py use local-4001 # 切換 active
#   python util/model_client.py test           # 對 active 端點做一次煙霧測試
#   python util/model_client.py test --task entry   # 對 tasks.entry 指到的端點測試
#
# 也可用環境變數臨時覆蓋，不改檔：
#   MODEL_ENDPOINT=local-4000 python util/run_chapter.py 出埃及記 27
#   MODEL_ENDPOINT_CHAPTER=claude-cli python util/run_chapter.py 出埃及記 27
#
# 端點 type：
#   openai —— OpenAI 相容 HTTP（如本機 litellm proxy）；需 base_url 與 model
#   claude —— shell 到 `claude -p`（標準 Claude Code 安裝）；model/effort 皆可省略
#     model:  別名（sonnet/opus/fable...）或完整模型名（claude-sonnet-5 等），
#             省略則用 claude CLI 目前設定的預設模型
#     effort: low / medium / high / xhigh / max，省略則用 CLI 預設 effort
#
# 不要把 API key 寫進本檔。需要金鑰時用 api_key_env 指向環境變數名稱。

active: local-4001

# 任務 → 端點路由：run_chapter.py 把「做條目」（M3 entry_content，量大、
# 逐批填 schema）與「本章整理」（M6 chapter_content，單次、長篇整合寫作）
# 拆成兩次獨立呼叫，各自可指定端點；省略的任務用 active 當預設。
# 選擇順序：明確指定 → MODEL_ENDPOINT_<TASK> 環境變數 → MODEL_ENDPOINT
# 環境變數 → 這裡的設定 → active。
tasks:
  entry: local-4000
  chapter: local-4000

endpoints:
  local-4000:
    type: openai
    base_url: http://localhost:4000/v1
    model: nvidia/nemotron-3-ultra-550b-a55b #deepseek-ai/deepseek-v4-pro #z-ai/glm-5.2 #minimaxai/minimax-m2.7 #  

  local-4001:
    type: openai
    base_url: http://localhost:4001/v1
    model: nvidia/nemotron-3-ultra-550b-a55b:free

  claude-cli:
    type: claude
    model: opus
    effort: high
