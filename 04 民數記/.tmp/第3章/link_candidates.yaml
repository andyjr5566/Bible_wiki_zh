  # === C 類：全新條目 ===
  - name: 亞倫家族祭司職分
    type: 主題
    evidence: "民3:1-4 亞倫的兒子拿答、亞比戶、以利亞撒、以他瑪都是受膏的祭司。拿答、亞比戶因獻凡火死在耶和華面前，無兒子。以利亞撒、以他瑪在亞倫面前供祭司職分。CT：事奉神必須按神心意，獻凡火是不接受神權柄。KC：亞倫預表基督，兒子預表信徒祭司職分。BH：祭司職分傳承顯示神主權揀選。"
    surfaces: ["亞倫的兒子", "受膏的祭司", "拿答", "亞比戶", "以利亞撒", "以他瑪", "凡火", "承接聖職"]

  - name: 利未人代替頭生歸神
    type: 神學
    evidence: "民3:11-13 耶和華揀選利未人代替以色列一切頭生的，利未人要歸神。凡頭生的是神的，因在埃及擊殺頭生時分別為聖歸神。CT：利未人代替長子預表基督代替罪人。KC：神主權揀選利未人代替長子。BH：長子歸神基於逾越節救贖。"
    surfaces: ["利未人代替頭生", "利未人要歸我", "凡頭生的是我的", "分別為聖歸我", "代替以色列人一切頭生的"]

