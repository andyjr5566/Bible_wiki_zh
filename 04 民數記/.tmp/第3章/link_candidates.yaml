    evidence: "民3:14-16 耶和華在西乃曠野吩咐摩西照利未人宗族、家室數點，凡一個月以外的男子都要數點。摩西照吩咐數點。CT：一個月以外不限年齡，生命價值不在年歲。KC：利未人從一個月數起，不同於別支派二十歲起數。BH：利未人從一個月數起，反映生命價值不在年歲。"
    surfaces: ["照利未人的宗族、家室數點他們", "凡一個月以外的男子都要數點", "摩西照耶和華所吩咐的數點他們"]

