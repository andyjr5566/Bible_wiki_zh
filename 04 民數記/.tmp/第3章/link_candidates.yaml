  # B 類：既有條目需累積
  - name: 利未支派
    type: 人物
    reason: |
      全章核心：利未三族數點（v14-39）、利未人代替頭生的（v11-13,40-51）、利未人服事祭司（v5-10）。
      v6「你使利未支派近前來，站在祭司亞倫面前好服事他」；v12「我從以色列人中揀選了利未人，代替以色列人一切頭生的」。
    b_class_target: true

  - name: 亞倫
    type: 人物
    reason: |
      v1-4 亞倫的兒子名單與祭司職任；v6-9 利未人給亞倫和他的兒子；v38 摩西、亞倫和亞倫的兒子在東邊安營。
    b_class_target: true

  - name: 亞倫的祭司譜系
    type: 人物
    reason: |
      v1-4 亞倫四子：拿答、亞比戶（獻凡火死）、以利亞撒、以他瑪。拿答亞比戶無子而死，祭司譜系經以利亞撒、以他瑪延續。
      v32 以利亞撒作利未人眾首領的領袖。
    b_class_target: true

  - name: 會幕（帳幕整體）
    type: 主題
    reason: |
