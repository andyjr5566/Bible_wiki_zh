    evidence: "民3:17-37 利未三子革順、哥轄、米拉利各有家室族系。革順7500人看守帳幕罩棚門簾(西邊)；哥轄8600人看守約櫃桌子燈臺壇器皿(南邊)；米拉利6200人看守板柱帶卯座橛子繩子(北邊)。CT：三族分工按才能，預表信徒按恩賜事奉。KC：三族分工各有專長，預表教會恩賜多樣。BH：三族安營位置圍繞會幕，形成保護圈。"
    surfaces: ["革順", "哥轄", "米拉利", "立尼", "示每", "暗蘭", "以斯哈", "希伯倫", "烏薛", "抹利", "母示", "革順族", "哥轄族", "米拉利族"]

