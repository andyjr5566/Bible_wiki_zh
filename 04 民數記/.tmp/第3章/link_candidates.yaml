    b_class_target: true

  - name: 十二支派起源
    type: 神學
    reason: |
      v17-20 利未三子（革順、哥轄、米拉利）及其後裔家室，為利未支派內部結構的起源記載。
    b_class_target: true

  # C 類：新建條目
  - name: 利未三族分工
    type: 事件
    reason: |
      全章核心結構：利未三族（革順、哥轄、米拉利）按方位安營並各司其職。
      - 革順（v21-26）：西邊安營，看守帳幕、罩棚、蓋、門簾、院帷、繩子
      - 哥轄（v27-32）：南邊安營，看守約櫃、桌子、燈臺、兩座壇、聖所器皿、簾子
      - 米拉利（v33-37）：北邊安營，看守板、閂、柱子、帶卯的座、橛子、繩子
      - 摩西亞倫及亞倫兒子（v38）：東邊安營，看守聖所
      三族分工預表新約教會中各肢體按恩賜配搭事奉（林前12）。

  - name: 利未人代替長子
    type: 神學
    reason: |
      v11-13 神揀選利未人代替以色列一切頭生的歸神，根基是逾越節擊殺埃及長子時以色列頭生的蒙保守（出13:2）。
      v40-51 數點以色列頭生的（22,273名）vs 利未人（22,000名），多出273名需付贖銀每人五舍客勒（共1,365舍客勒）。
      此為「代替」神學的經典範例，預表基督以無罪代替有罪。
    b_class_target: true

  - name: 贖銀五舍客勒
    type: 文化
    reason: |
      v46-51 以色列頭生的比利未人多273名，每人取贖銀五舍客勒（一舍客勒二十季拉），按聖所的平，共1,365舍客勒，交給亞倫和他兒子。
      CT：五舍客勒是一個月到五歲男子估定價銀（利27:6）。
    surfaces:
      - phrase: 贖銀
      - phrase: 五舍客勒