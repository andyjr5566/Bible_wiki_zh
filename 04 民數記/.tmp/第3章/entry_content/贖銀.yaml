name: 贖銀
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 以色列頭生男子超過利未人二百七十三人，須按「聖所的平」每人繳五舍客勒贖銀給亞倫和他的兒子（民3:46-51）。共收一千三百六十五舍客勒。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載頭生男子超額部分須繳納贖銀，按聖所平每人五舍客勒，總計一千三百六十五舍客勒交給亞倫父子。
  relation: 實踐「代替」神學的具體贖買機制，顯示頭生歸神的嚴肅性。
