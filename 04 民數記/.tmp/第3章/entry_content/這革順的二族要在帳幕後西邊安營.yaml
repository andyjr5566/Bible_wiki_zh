definition: 民數記3:23 規定革順二族（立尼族、示每族）安營於帳幕後西邊。
development: 利未三族環繞帳幕安營，革順族居西、哥轄族居南、米拉利族居北、摩西亞倫居東，形成保護聖所的同心圓陣型。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載革順族安營位置在帳幕西邊，看守帳幕、罩棚、門簾與院子帷子等器具。
  relation: 本章利未三族分工與安營佈局的關鍵經文，體現聖所中心的敬拜秩序。
