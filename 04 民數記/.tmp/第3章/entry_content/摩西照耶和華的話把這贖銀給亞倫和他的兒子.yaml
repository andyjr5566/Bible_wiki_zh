name: 摩西照耶和華的話把這贖銀給亞倫和他的兒子
type: 事件
secondary_types: []
aliases:
- 摩西交贖銀予亞倫父子
status: formal
definition: 民數記 3:51 記載，摩西遵照耶和華的吩咐，將從以色列人頭生男子多出之人所收的贖銀，交給亞倫和他的兒子們。這顯示摩西完全順服神的指示，執行贖回程序。
accumulations:
- book: 民數記
  chapter: 3
  summary: 摩西執行神命令，將贖銀交付亞倫家族（第 51 節）。
  relation: 本章贖銀制度的落實行動，體現祭司領受贖銀的權柄與百姓順服的模式。
