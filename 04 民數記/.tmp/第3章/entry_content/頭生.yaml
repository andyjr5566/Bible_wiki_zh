status: formal
definition: 指每胎首生的男子與牲畜。神在埃及擊殺頭生之日，將以色列一切頭生的分別為聖歸自己；後揀選利未人代替以色列一切頭生的歸神。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載頭生歸神的神學依據、利未人代替頭生、頭生男子數點與贖銀細節（3:12-13, 40-51）。
  relation: 本章利未人取代頭生、贖銀制度的核心主題。
