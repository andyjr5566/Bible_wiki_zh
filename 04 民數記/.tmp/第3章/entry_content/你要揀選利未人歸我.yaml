name: 你要揀選利未人歸我
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記第3章第41節，耶和華宣告揀選利未人歸屬祂自己，代替以色列一切頭生的。這是神主權性的揀選，確立利未人聖別歸神的神學基礎。
accumulations:
- book: 民數記
