status: formal
definition: 米拉利兒子母示的後裔，屬米拉利家族兩個宗族之一（民數記 3:20, 33）。
development: 母示族與抹利族同列為米拉利的二族，同樣駐紮帳幕北邊，分擔看守帳幕板、閂、柱子等職任。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文記載母示族為米拉利的兒子所生，屬米拉利二族之一。
  relation: 與抹利族共同構成米拉利家族，執行帳幕結構性器具的看守與搬運。
