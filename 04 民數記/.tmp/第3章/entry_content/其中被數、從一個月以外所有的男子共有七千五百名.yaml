name: 其中被數、從一個月以外所有的男子共有七千五百名
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記3:22 記載革順族（立尼族、示每族）一個月以上男子的總數為七千五百名。
development: 此數字為摩西遵耶和華吩咐，按宗族家室數點利未人時所得，顯示革順族在利未三族中人數排行第二（少於哥轄族八千六百，多於米拉利族六千二百）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載革順族被數男子總數為七千五百名，作為利未人代替以色列頭生歸神的統計基礎。
  relation: 本章利未人數點條例的核心數據之一，連結利未人總數與贖銀計算。
