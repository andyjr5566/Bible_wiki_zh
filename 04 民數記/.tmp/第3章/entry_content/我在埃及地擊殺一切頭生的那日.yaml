name: 我在埃及地擊殺一切頭生的那日
type: 事件
secondary_types: []
aliases:
- 埃及擊殺頭生事件
status: formal
definition: 此語出自民數記3:13，指涉出埃及記11-12章第十災：耶和華在埃及地擊殺一切頭生者（從法老長子到囚犯長子，並牲畜頭生）的那一夜。這事件是神審判埃及諸神、拯救以色列的高潮，也成為神宣稱「凡頭生的是我的」歷史根基。
development: 此事件在民數記3章被神親口回顧，作為頭生歸神神學的歷史錨點，並作為利未人代替頭生者的救贖依據。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華提到在埃及地擊殺一切頭生的那日，將以色列頭生者分別為聖歸我（3:13）。
  relation: 本章將出埃及記的救贖事件內化為利未人職分設立的神學依據，連結歷史拯救與當下聖職制度。
