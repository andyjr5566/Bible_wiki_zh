status: formal
definition: 米拉利的兒子（民3:20），抹利族的始祖（民3:33）。屬米拉利宗族，在帳幕北邊安營，負責看守帳幕結構組件（民3:35-37）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載抹利為米拉利兒子，其族人被數六千二百名，掌管帳幕板、閂、柱子、帶卯的座等架構。
  relation: 體現利未人米拉利族分工看守帳幕骨架的具體職務分配。
