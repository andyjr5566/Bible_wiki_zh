status: formal
definition: 指屬於米拉利家族的利未人，包括抹利族和母示族兩個宗族（民數記 3:33）。
development: 本章記載利未人三大家族（革順、哥轄、米拉利）的分工與人數，米拉利家族負責帳幕結構性器具的看守與搬運。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文列出米拉利的兩個宗族（抹利、母示），並記錄其男丁人數與職分。
  relation: 顯示利未人按家族分工服事會幕，米拉利家族掌管帳幕的板、閂、柱子等結構部件。
