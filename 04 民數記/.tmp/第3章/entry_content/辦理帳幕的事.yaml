name: 辦理帳幕的事
type: 主題
secondary_types: []
aliases:
- 辦理會幕的事
status: formal
definition: 利未人具體服事內容：在會幕前辦理帳幕的事（民3:7-8），包括拆搭、運輸、看守器具等。各族分工明確：革順族管帳幕罩棚（民3:25-26）、哥轄族管聖所器具（民3:31）、米拉利族管帳幕架構（民3:36-37）。
development: 帳幕事務分工預表教會肢體各司其職（林前12:4-11），共同建造神的殿。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人替亞倫和會眾辦理帳幕的事；三族具體分工看守帳幕各部分。
  relation: 本章詳細記載利未三族辦理帳幕事務的分工細節。
