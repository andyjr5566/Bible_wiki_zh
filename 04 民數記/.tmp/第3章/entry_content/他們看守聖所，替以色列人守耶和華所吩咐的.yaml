name: 他們看守聖所，替以色列人守耶和華所吩咐的
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 摩西、亞倫及其兒子看守聖所，代表以色列人遵守耶和華的吩咐（民數記 3:38）。
development: 此職責強調祭司作為中保，代替百姓守聖所的律例，違者（外人近前）必被治死。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文闡述祭司看守聖所的神學意義：代替百姓守耶和華的命令。
  relation: 呼應第 10 節「近前來的外人必被治死」，顯示聖所聖潔與祭司職分的嚴肅性。
