name: 將利未人給亞倫和他的兒子
type: 主題
secondary_types: []
aliases:
- 將利未人給亞倫和他的兒子
status: formal
definition: 耶和華命令摩西將利未人完全歸給亞倫和他的兒子，作為他們的幫手，協助祭司處理會幕事務（民3:9）。這是神主權的安排，非人為決定。
development: 此命令緊接在利未人被數點與分派職分之前，確立利未人隸屬祭司體系的法律地位。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華吩咐摩西將利未人給亞倫和他的兒子，因為他們是從以色列人中選出來給他的。
  relation: 本章第9節為利未人歸屬祭司體系的法理依據，後續章節（如民8、18章）進一步展開。
