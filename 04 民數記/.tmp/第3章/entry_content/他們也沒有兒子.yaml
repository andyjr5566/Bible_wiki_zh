name: 他們也沒有兒子
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記第3章第4節，記載拿答、亞比戶死在耶和華面前，「他們也沒有兒子」。這說明他們的祭司譜系中斷，祭司職分轉移給以利亞撒、以他瑪，也顯示違逆神命的嚴重後果影響後代。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載拿答亞比戶無子而死，祭司譜系轉移的關鍵細節。
  relation: 連結亞倫祭司譜系的延續與中斷，配合利未人被揀選代替頭生的背景，顯示神主權的安排。
