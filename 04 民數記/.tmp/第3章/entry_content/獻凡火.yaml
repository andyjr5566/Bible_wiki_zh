name: 獻凡火
type: 主題
secondary_types: []
aliases:
- 獻上凡火
- 未奉命獻火
status: formal
definition: 指拿答、亞比戶在西乃曠野擅自向耶和華獻上神未吩咐的火（民 3:4；利 10:1-2）。此舉違背祭司職分規範，導致二人被耶和華火燒死。象徵事奉神不可按己意，必須遵循神所定條例。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載拿答、亞比戶因獻凡火死在耶和華面前（第 4 節）。
  relation: 本章祭司譜系中插入此事，為後續利未人代替頭生、祭司職分嚴謹性提供神學背景。
related_entries:
- 拿答、亞比戶在西乃的曠野向耶和華獻凡火的時候就死在耶和華面前了
- 亞倫長子拿答
- 亞倫次子亞比戶
- 在西乃的曠野
- 西乃的曠野
- 死在耶和華面前
- 他們也沒有兒子
- 近前來的外人必被治死
sources:
