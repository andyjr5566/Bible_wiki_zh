name: 在會幕前
type: 主題
secondary_types: []
aliases:
- 在帳幕前
status: formal
definition: 利未人服事的地點——會幕（帳幕）前（民3:7,8,38）。摩西、亞倫與其子在帳幕前東邊安營看守聖所（民3:38）。會幕前是敬拜服事的中心區域。
development: 會幕前服事模式延續至聖殿時代，最終指向天上真帳幕（來9:11-12）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人在會幕前守所吩咐的、辦理帳幕的事；摩西亞倫在帳幕前東邊安營看守聖所。
  relation: 本章多次提及會幕前作為服事與安營的核心地點。
