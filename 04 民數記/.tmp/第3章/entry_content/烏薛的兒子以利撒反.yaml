status: formal
definition: 烏薛的兒子，哥轄孫子，利未曾孫。作哥轄宗族家室的首領（民3:19, 30），負責看守約櫃、桌子、燈臺、兩座壇與聖所內使用的器皿等至聖物（民3:31）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以利撒反為烏薛兒子，擔任哥轄家族首領，掌管聖所至聖物的看守職務。
  relation: 體現利未人哥轄族分工看守聖物的制度。
