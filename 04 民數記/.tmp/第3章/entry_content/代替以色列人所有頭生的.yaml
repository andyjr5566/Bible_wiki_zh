name: 代替以色列人所有頭生的
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記第3章第41節，利未人被揀選代替以色列人所有頭生的。這「代替」概念建立在出埃及時神擊殺埃及頭生、分別以色列頭生歸祂的救贖歷史上，利未人成為贖回的活祭。
accumulations:
- book: 民數記
  chapter: 3
  summary: 闡述利未人代替以色列頭生男子的神學意義。
  relation: 連結出埃及救贖事件與利未人職分的神學邏輯，是利未人歸神的核心依據。
