name: 利未人代替頭生歸神
type: 神學
secondary_types: []
aliases:
- 利未人代替頭生
- 利未人贖頭生
status: formal
definition: 神從以色列人中揀選利未人，代替以色列人一切頭生的（頭生男子與頭生牲畜）歸屬神。這根基於神在埃及擊殺一切頭生之日，將以色列中一切頭生的分別為聖歸神。利未人總數（一個月以上男子）為22,000，以色列頭生男子為22,273，多出的273人需按聖所的平每人贖銀五舍客勒（一舍客勒二十季拉），贖銀交給亞倫和他的兒子。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章詳細記載利未人代替頭生的神學依據、數點過程、人數對比與贖銀細節。
  relation: 體現「代替」與「贖回」的救贖神學，預表基督作贖價代替罪人。
