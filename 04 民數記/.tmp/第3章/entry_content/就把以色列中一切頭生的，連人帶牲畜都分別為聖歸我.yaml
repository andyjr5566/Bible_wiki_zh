name: 就把以色列中一切頭生的，連人帶牲畜都分別為聖歸我
type: 神學
secondary_types: []
aliases:
- 頭生分別為聖歸神
status: formal
definition: 此語出自民數記3:13，記載神在擊殺埃及頭生者那日，將以色列中一切頭生者（人與牲畜）分別為聖、歸屬神。這不僅是歷史回顧，更是神學宣示：頭生者的聖別地位源於神的救贖行動，而非人的選擇。此聖別後來由利未人代替履行（3:12,
  41, 45）。
development: 此陳述將「分別為聖」與「歸神」連結，構成舊約聖別神學的核心：被救贖者理當全然歸神。民數記3章進一步以利未人代替、贖銀贖回制度具體化此神學。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華宣告在埃及擊殺頭生者那日，將以色列一切頭生者連人帶牲畜分別為聖歸我（3:13）。
  relation: 本章以此為依據，建立利未人代替頭生者歸神的制度，並規定超額頭生者以聖所平五舍客勒贖銀贖回。
