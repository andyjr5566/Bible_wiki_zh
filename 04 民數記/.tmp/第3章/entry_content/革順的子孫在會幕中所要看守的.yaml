name: 革順的子孫在會幕中所要看守的
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記3:25-26 列舉革順子孫在會幕中所要看守的器具：帳幕、罩棚、罩棚的蓋、會幕的門簾、院子的帷子、院子門簾、並一切使用的繩子。
development: 革順族負責會幕的織物結構與覆蓋物，屬較輕便但範圍廣泛的看守職分，與哥轄族看守聖所內聖物、米拉利族看守框架結構形成互補。
accumulations:
- book: 民數記
  chapter: 3
  summary: 詳細列出革順族看守職分範圍，涵蓋帳幕本體、覆蓋、門簾、院子圍牆織物與繩索。
  relation: 本章利未三族分工的核心經文，展示神對聖所事奉的精細規劃。
