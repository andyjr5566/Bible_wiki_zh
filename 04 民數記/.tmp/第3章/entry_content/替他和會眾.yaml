name: 替他和會眾
type: 主題
secondary_types: []
aliases:
- 替亞倫和會眾
status: formal
definition: 利未人服事不僅針對亞倫，也替會眾（以色列全會眾）在會幕前守所吩咐的、辦理帳幕的事（民3:7）。體現利未人作中保角色，維繫神與百姓關係。
development: 此中保服事預表基督作大祭司替信徒代求（來7:25），也預表信徒彼此服事（加5:13）。
