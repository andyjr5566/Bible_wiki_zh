name: 亞倫四子以他瑪
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 亞倫的第四個兒子（民3:2）。拿答、亞比戶死後，他與哥哥以利亞撒在他們父親亞倫面前供祭司職分（民3:4）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以他瑪為亞倫四子之一，在長兄拿答、次兄亞比戶死後，與以利亞撒一同在亞倫面前供祭司職分。
  relation: 展示亞倫祭司家族的延續與職分傳承。
