name: 凡一個月以外的男子都要數點
type: 主題
secondary_types: []
aliases:
- 一個月以上男子數點
- 利未人數點年齡
status: formal
definition: 民數記 3:15 耶和華吩咐：「凡一個月以外的男子都要數點。」利未人數點年齡門檻為一個月以上，不同於以色列人軍籍數點（二十歲以上，民 1:3）及利未人事奉數點（三十至五十歲，民
  4:3）。一個月以上對應贖價條例（利 27:6，一個月至五歲男童估價五舍客勒），也呼應民 3:40-43 數點頭生男子贖價的基準。
development: 年齡門檻反映利未人「屬神」的身分從出生滿月即確立，不待成年；後民 8:24-26 規定二十五歲進職、五十歲退職，實際事奉有年齡限制。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人數點對象為一個月以上男子，共計二萬二千人（3:39），作為代替頭生者的基數。
  relation: 本章數點標準，決定利未人總數與頭生者贖價計算基礎。
