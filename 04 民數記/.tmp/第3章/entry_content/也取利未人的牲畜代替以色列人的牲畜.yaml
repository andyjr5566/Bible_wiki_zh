name: 也取利未人的牲畜代替以色列人的牲畜
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記第3章第41節，神命令取利未人的牲畜代替以色列人的牲畜。這將「代替」原則從人延伸至產業，顯示神對全人與全有的主權主張。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載利未人牲畜代替以色列人牲畜的規定。
  relation: 落實「利未人歸我」的整全性，牲畜同屬神，利未人牲畜代表以色列人牲畜歸神。
