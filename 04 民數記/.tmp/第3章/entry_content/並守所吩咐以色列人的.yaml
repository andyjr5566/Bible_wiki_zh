name: 並守所吩咐以色列人的
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指利未人被分派「看守會幕的器具，並守所吩咐以色列人的，辦理帳幕的事」（民3:8）。這表明利未人代表全以色列會眾，在會幕前守耶和華所吩咐的職分（民3:7,
  38），履行代替頭生歸神的服事責任。
development: 此語句出現於利未人被獻給亞倫和他的兒子、辦理帳幕事務的吩咐中（民3:6-9），並在第38節重申摩西、亞倫和亞倫的兒子「替以色列人守耶和華所吩咐的」，顯示祭司與利未人共同承擔會眾的守望責任。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人被吩咐看守會幕器具，並守所吩咐以色列人的，辦理帳幕的事。
  relation: 闡明利未人服事的雙重對象：直接事奉亞倫祭司，並代表以色列會眾守耶和華的吩咐，構成利未人代替頭生歸神的神學基礎。
