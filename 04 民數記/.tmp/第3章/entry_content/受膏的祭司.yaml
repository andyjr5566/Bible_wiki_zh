name: 受膏的祭司
type: 主題
secondary_types: []
aliases:
- 受膏的祭司
status: formal
definition: 指經膏油膏立、分別為聖承接祭司職分的人。本章記載亞倫的四個兒子「都是受膏的祭司，是摩西叫他們承接聖職供祭司職分的」（民3:3）。
development: 本章顯示受膏的祭司身分來自神的揀選與摩西的膏立，他們負責聖所事奉，近前來的外人必被治死（民3:10,38）。拿答、亞比戶因獻凡火被神擊殺，顯示受膏祭司必須嚴守神的吩咐（民3:4）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 定義亞倫兒子為受膏的祭司，說明其職分來源、任命方式，並記載其中二人因違犯聖職而死。
  relation: 受膏的祭司是利未人中獨特的聖職群體，代表亞倫家族在聖所事奉的核心權柄與責任。
