name: 利未人數點條例
type: 主題
secondary_types: []
aliases:
- 利未人數點
- 利未人普查條例
status: formal
definition: 神吩咐摩西照利未人的宗族、家室數點他們，凡一個月以外的男子都要數點。這與以色列別支派二十歲以上能出去打仗的數點不同，利未人從一個月大就被計算，因他們專歸神服事。摩西照耶和華吩咐數點，總數為22,000名。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章記載利未人數點的命令、對象（一個月以上男子）、方式（按宗族家室）及結果（22,000名）。
  relation: 確立利未人服事資格的基礎，並為後續代替頭生、分工服事提供數據依據。
related_entries:
