name: 在帳幕前東邊，向日出之地安營的是摩西、亞倫，和亞倫的兒子
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 記載摩西、亞倫及其兒子安營在帳幕前東邊，向日出之地（民數記 3:38）。
development: 東邊為會幕入口方向，祭司家族駐守此處，象徵祭司職分的優先次序與守護聖所的責任。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文規定祭司家族的安營位置與方向。
  relation: 與利未三族分別環繞帳幕三面（西、南、北）安營形成對比，突顯祭司在會幕事奉中的核心地位。
