name: 他們被數的，按所有男子的數目，從一個月以外的，共有六千二百名
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 記載米拉利家族一個月以上男丁總數為六千二百名（民數記 3:34）。
development: 此數字屬於利未人分族點數的一部分，與革順族（七千五百）和哥轄族（八千六百）合共二萬二千名（民數記 3:39）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文給出米拉利家族具體點數結果。
  relation: 體現神吩咐按宗族家室數點利未人，作為代替以色列頭生子歸神的依據。
