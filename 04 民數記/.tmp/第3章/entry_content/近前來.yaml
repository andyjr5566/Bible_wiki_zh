name: 近前來
type: 主題
secondary_types: []
aliases:
- 使近前來
status: formal
definition: 耶和華吩咐摩西使利未支派近前來，站在祭司亞倫面前服事（民3:6）。同時警告近前來的外人必被治死（民3:10,38）。顯示親近神聖事務有嚴格資格與秩序。
development: 利未人「近前來」取代以色列頭生男子（民3:12-13），預表基督徒藉基督得以親近神（來10:19-22）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 吩咐利未人近前來服事亞倫；外人擅近必被治死。
  relation: 本章建立利未人服事資格與聖所守護界限的核心經文。
