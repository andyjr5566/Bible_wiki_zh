name: 哥轄的兒子
type: 人物
secondary_types: []
aliases:
- 哥轄四子
- 暗蘭以斯哈希伯倫烏薛
status: formal
definition: 民數記 3:19 記載「哥轄的兒子，按著家室，是暗蘭、以斯哈、希伯倫、烏薛」。哥轄為利未次子（出 6:18），其四子成為哥轄族四大家室（3:27「暗蘭族、以斯哈族、希伯倫族、烏薛族」）。哥轄族人數一個月以上男子八千六百名（3:28），安營會幕南邊（3:29），職掌約櫃、桌子、燈臺、兩座壇、聖所器皿、簾子（3:31），族長為烏薛的兒子以利撒反（3:30）。暗蘭為摩西亞倫之父（出
  6:20），使祭司系統屬哥轄族。
development: 四子名見出 6:18、代上 6:2, 18；哥轄族事奉細則見民 4:4-15，強調聖物須亞倫父子遮蓋後哥轄人才可抬運，不可觸摸聖物免死（4:15）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 列舉哥轄四子名字，作為哥轄族家室劃分、人數統計、聖所器具看守分工依據。
  relation: 本章利未三族家譜核心，連結祭司譜系（暗蘭系）與至聖物看守職任。
