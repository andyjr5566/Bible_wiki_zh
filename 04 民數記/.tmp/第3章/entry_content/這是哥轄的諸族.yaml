name: 這是哥轄的諸族
type: 主題
secondary_types: []
aliases:
- 哥轄諸族
- 哥轄四族
status: formal
definition: 經文總結哥轄四個家族：暗蘭族、以斯哈族、希伯倫族、烏薛族（民3:27）。這四族共同構成哥轄宗族，負責看守聖所最聖潔的器具（民3:31），人口八千六百名（民3:28），安營於帳幕南邊（民3:29），由烏薛的兒子以利撒反作宗族首領（民3:30），並在祭司以利亞撒總轄下服事（民3:32）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 定義哥轄諸族組成、職分、人口、安營位置與領導架構。
  relation: 本章利未人分工的核心單元，展示聖所至聖物由特定家族看守的神學原則。
related_entries:
