- 烏薛族
- 烏薛的兒子以利撒反作哥轄宗族家室的首領
- 他們所要看守的是約櫃、桌子、燈臺、兩座壇與聖所內使用的器皿，並簾子和一切使用之物
- 祭司亞倫的兒子以利亞撒作利未人眾首領的領袖
- 要監察那些看守聖所的人
