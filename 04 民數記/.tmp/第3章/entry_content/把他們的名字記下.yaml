status: formal
definition: 民數記第3章第40節，耶和華吩咐摩西將被數點的以色列頭生男子名字記下。這顯示神對每個人的認識與紀念，也為後續贖銀按人名計算提供依據。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載神命令記錄頭生男子名字的細節。
  relation: 配合數點頭生男子的行政程序，強調名單的具體性與責任。
