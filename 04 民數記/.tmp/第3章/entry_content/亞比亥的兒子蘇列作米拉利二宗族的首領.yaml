name: 亞比亥的兒子蘇列作米拉利二宗族的首領
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 亞比亥的兒子蘇列被立為米拉利兩個宗族（抹利、母示）的首領（民數記 3:35）。
development: 蘇列帶領米拉利家族在帳幕北邊安營，負責統管該家族看守帳幕結構器具的事務。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文記載米拉利家族首領的名字與父系。
  relation: 顯示利未人各族有明確的領導結構，首領負責執行神所派定的職分。
related_entries:
- 屬米拉利的
- 抹利族
- 母示族
- 米拉利子孫的職分是看守帳幕的板、閂、柱子、帶卯的座，和帳幕一切所使用的器具
- 利未三族分工
