- 立尼示每
status: formal
definition: 民數記 3:18 記載「革順的兒子，按著家室，是立尼、示每」。革順為利未長子（創 46:11），其兩子立尼、示每成為革順族兩大家室（3:21「立尼族、示每族」）。革順族人數一個月以上男子七千五百名（3:22），安營會幕西邊（3:23），職掌帳幕、罩棚、蓋、門簾、院子帷子、門簾、繩子（3:25-26），族長為拉伊勒的兒子以利雅薩（3:24）。
development: 立尼、示每名見出 6:17、代上 6:17, 20:21-22；革順族事奉範圍在民 4:24-28 進一步規定三十至五十歲服事細則。
accumulations:
- book: 民數記
  chapter: 3
  summary: 列舉革順二子名字，作為革順族家室劃分、人數統計、事奉分工依據。
  relation: 本章利未三族家譜細節，支撐後續革順族人數、安營、職掌記載。
