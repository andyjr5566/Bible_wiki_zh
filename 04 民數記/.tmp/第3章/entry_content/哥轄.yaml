definition: 利未的次子，利未三大家族之一的始祖。其子孫分暗蘭、以斯哈、希伯倫、烏薛四族，負責約櫃、桌子、燈臺、兩座壇、聖所器皿與簾子的看守，安營在帳幕南邊。
accumulations:
