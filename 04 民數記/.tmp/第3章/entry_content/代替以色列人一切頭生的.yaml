name: 代替以色列人一切頭生的
type: 神學
secondary_types: []
aliases:
- 代替以色列人一切頭生的
- 代替頭生
status: formal
definition: 利未人被神揀選，代表以色列全會眾的頭生男子（與頭生牲畜）歸給神，作為贖替與事奉的對象（民3:12, 41, 45）。這是「代贖」神學在舊約祭司體系的具體化。
development: 此概念源於出埃及記13章神擊殺埃及頭生、救贖以色列頭生，利未人取代頭生成為神的產業，預表基督作「許多人的贖價」（可10:45）與「初熟果子」（林前15:20）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華說我從以色列人中揀選了利未人，代替以色列人一切頭生的；第41、45節再次重申揀選利未人歸神，代替以色列人所有頭生的。
  relation: 本章第12、41、45節三重見證，構成利未人代替頭生的完整神學論述，連結贖銀條例（3:46-51）。
