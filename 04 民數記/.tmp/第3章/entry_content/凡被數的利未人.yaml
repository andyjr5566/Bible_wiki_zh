name: 凡被數的利未人
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指摩西、亞倫照耶和華吩咐，按家室數點所得的一個月以上利未男丁總數，共二萬二千名（民數記 3:39）。
development: 此總數作為利未人代替以色列頭生子歸神的基礎，後續並以贖銀處理超額的二百七十三名頭生子（民數記 3:40-51）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文給出利未人總點數，並說明其統計依據（按家室、一個月以上男子）。
  relation: 連結利未人代替頭生子的神學主題，與後續贖銀條例構成完整敘事單元。
