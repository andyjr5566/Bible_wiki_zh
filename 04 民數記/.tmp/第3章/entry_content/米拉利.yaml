status: formal
definition: 利未的三子，利未三大家族之一的始祖。其子孫分抹利族、母示族，負責帳幕板、閂、柱子、帶卯的座與器具、院子柱子座橛繩子的看守，安營在帳幕北邊。
accumulations:
