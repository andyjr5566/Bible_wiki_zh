name: 看守會幕的器具
type: 主題
secondary_types: []
aliases:
- 看守帳幕器具
status: formal
definition: 利未人核心職責之一：看守會幕的器具（民3:8）。各族具體負責：革順族看守帳幕、罩棚、門簾、院子帷子、繩子（民3:25-26）；哥轄族看守約櫃、桌子、燈臺、壇、器皿、簾子（民3:31）；米拉利族看守板、閂、柱子、帶卯的座、橛子、繩子（民3:36-37）。祭司以利亞撒監察看守聖所的人（民3:32）。
development: 器具看守體現聖物分別為聖、不可褻慢原則，預表新約信徒守護屬靈寶貝（提後1:14）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人看守會幕器具；三族分工看守不同器具；以利亞撒監察看守聖所的人。
  relation: 本章將看守器具具體化為三族分工，並設監察機制。
