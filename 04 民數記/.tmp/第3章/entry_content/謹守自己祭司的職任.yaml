name: 謹守自己祭司的職任
type: 主題
secondary_types: []
aliases:
- 謹守自己祭司的職任
status: formal
definition: 要求亞倫和他的兒子嚴格遵守、維護祭司職分的一切條例與界限，不得越權、不得疏忽（民3:10）。這包括獻祭、燒香、教導律法、察驗潔淨等專屬聖職。
development: 此命令針對祭司職分的專屬性與排他性，配合利未人協助體系，防止如可拉黨叛亂（民16）類越職之事。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華囑咐亞倫和他的兒子要謹守自己祭司的職任，近前來的外人必被治死。
  relation: 本章第10節為祭司職分的核心定義，後續民數記18章詳細列出祭司與利未人職分條例。
