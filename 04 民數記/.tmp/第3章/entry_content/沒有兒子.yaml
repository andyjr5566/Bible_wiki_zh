name: 沒有兒子
type: 主題
secondary_types: []
aliases:
- 沒有兒子
status: formal
definition: 指無後代繼承。本章記載拿答、亞比戶「在西乃的曠野向耶和華獻凡火的時候就死在耶和華面前了。他們也沒有兒子」（民3:4），因此祭司職分轉由以利亞撒、以他瑪承接（民3:4）。
development: 本章以「沒有兒子」說明亞倫長子、次子死後無嗣，導致祭司職分由幼子繼承，顯示神對祭司家系的主權安排，也呼應後文利未人代替以色列頭生的主題（民3:12-13,41,45）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載拿答、亞比戶因獻凡火死亡且無後代，祭司職分由以利亞撒、以他瑪繼承。
  relation: 「沒有兒子」是本章祭司傳承變動的關鍵原因，凸顯神對聖職人選的掌管，也為利未人代替頭生的神學奠定基礎。
