name: 利未人歸我
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 上帝宣告利未人屬於祂，代替以色列一切頭生的歸祂（民3:12-13,45）。這確立利未人作為聖職人員的神學地位，並顯示「歸神」的贖回原則。
development: 此觀念在後來利未人服事會幕、聖殿的制度中延續，成為以色列敬拜體系的核心。
