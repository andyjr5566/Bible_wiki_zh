name: 在他們的父親亞倫面前
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指以利亞撒和以他瑪在父親亞倫仍在世時，於亞倫面前承接祭司職分供職（民3:4）。這顯示祭司職分的傳承是在長子拿答、亞比戶因獻凡火死亡、無子嗣後，由次子和三子在父親監督下繼續服事，確立亞倫家族祭司譜系的延續性。
development: 此短語僅見於民數記3:4，強調祭司職分在亞倫親自監督下傳遞給倖存兒子，預表後來以利亞撒接任大祭司（民20:25-28）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載拿答、亞比戶死後，以利亞撒、以他瑪在他們的父親亞倫面前供祭司職分。
  relation: 確立亞倫家族祭司職分在父親在世時的傳承秩序，為後來利未人代替頭生歸神的服事奠定祭司領導基礎。
