name: 亞倫的兒子以利亞撒
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 亞倫的第三個兒子（民3:2）。拿答、亞比戶死後，與以他瑪在父親亞倫面前供祭司職分（民3:4）。後作利未人眾首領的領袖，監察看守聖所的人（民3:32）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以利亞撒為亞倫三子，繼承祭司職分，並擔任利未人領袖監察聖所看守事務。
  relation: 展示祭司權柄從亞倫延伸至以利亞撒，統管利未人服事秩序。
