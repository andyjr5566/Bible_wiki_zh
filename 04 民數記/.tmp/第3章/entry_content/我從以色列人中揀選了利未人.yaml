name: 我從以色列人中揀選了利未人
type: 神學
secondary_types: []
aliases:
- 我從以色列人中揀選了利未人
- 揀選利未人
status: formal
definition: 耶和華宣告主權揀選利未支派，從以色列眾支派中分別出來，代替一切頭生的歸屬神（民3:12）。這是利未人身分與職分的神學根基：非人謀劃，乃神主權拣選。
development: 此宣告回應出埃及記13章神擊殺埃及頭生、分別以色列頭生歸神的事件，利未人成為頭生的贖替代者，預表基督作教會元首、初熟果子（西1:18）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華曉諭摩西說：我從以色列人中揀選了利未人，代替以色列人一切頭生的；利未人要歸我。
  relation: 本章第12節為利未人神學地位的核心宣告，連結出埃及記13章頭生歸神與民數記8章利未人分別為聖禮儀。
