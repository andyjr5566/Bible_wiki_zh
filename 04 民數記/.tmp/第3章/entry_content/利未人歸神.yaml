name: 利未人歸神
type: 神學
secondary_types: []
aliases:
- 利未人屬神
- 利未人分別為聖
status: formal
definition: 神宣告「利未人要歸我」，因為神在埃及擊殺頭生之日，將以色列一切頭生的分別為聖歸神，現在揀選利未人代替頭生，所以利未人屬神。這是基於神的主權揀選與救贖行動（出埃及），利未人完全歸屬神，為神服事。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章第12-13、41、45節三次重申「利未人要歸我」，神學依據為神擊殺埃及頭生、分別為聖以色列頭生。
  relation: 確立利未人身份的神學根基：非人為選擇，乃神主權歸屬。
related_entries:
- 利未人
- 耶和華我是
- 埃及地
- 擊殺一切頭生的
- 分別為聖歸我
- 代替
- 歸神
- 利未人代替頭生歸神
