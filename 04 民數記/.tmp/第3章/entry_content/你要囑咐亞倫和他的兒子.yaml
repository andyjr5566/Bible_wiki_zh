name: 你要囑咐亞倫和他的兒子
type: 主題
secondary_types: []
aliases:
- 囑咐亞倫家族
status: formal
definition: 此語出自民數記3:10，耶和華命摩西囑咐亞倫和他的兒子謹守自己祭司的職任，並警告近前來的外人必被治死。這強調祭司職分的專屬性與聖潔界限，只有亞倫家族被膏立者才能承接聖職，違者死罪。
development: 此命令緊接利未人歸給亞倫之後，確立祭司權柄的排他性，並為後世祭司職分的傳承與界限立下法則。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華吩咐摩西囑咐亞倫和他的兒子謹守祭司職任，外人近前必被治死（3:10）。
  relation: 本章將祭司職任的守護責任明確化，與利未人輔助服事形成「祭司主導、利未人協助」的雙層架構。
