name: 贖銀五舍客勒
type: 文化
secondary_types: []
aliases:
- 贖銀
- 五舍客勒贖價
status: formal
definition: 為贖回超過利未人數目之以色列頭生男子（273人），上帝規定每人繳納聖所平五舍客勒（一舍客勒二十季拉）作為贖價，總計1,365舍客勒，交給亞倫和他的兒子。此制度源於逾越節神擊殺埃及長子、分別以色列長子歸己（出13:2,12-13），後以利未人代替長子事奉（民3:12-13,41,45），因利未人數（22,000）少於長子數（22,273），不足額須以銀贖補。贖銀歸祭司，象徵贖價屬神、救贖榮耀歸主，預表基督以寶血贖回信徒（彼前1:18-19）。
development: 此為摩西律法確立的長子贖價標準（利27:6亦引用五舍客勒為一月至五歲男丁估價），後世猶太教延續 pidyon haben（贖長子禮）儀式至今。新約視角下，基督作為「頭生的」（西1:15）以自己為贖價（可10:45），成就終極救贖，信徒不再以銀贖，乃以基督寶血得贖。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章40-51節記載點算長子、計算差額、訂定贖銀標準、收取與交付全過程。
  relation: 完成利未人代替長子的補救措施，彰顯神主權與救贖原則。
