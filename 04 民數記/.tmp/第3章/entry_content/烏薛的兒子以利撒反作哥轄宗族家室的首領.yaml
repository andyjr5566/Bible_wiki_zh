definition: 民數記3:30 記載烏薛的兒子以利撒反擔任哥轄宗族家室的首領。
development: 以利撒反為哥轄族領袖，統轄暗蘭、以斯哈、希伯倫、烏薛四族，帶領族人看守約櫃、桌子、燈臺、兩座壇、聖所器皿與簾子等至聖物（民3:31）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以利撒反為哥轄族首領，負責統領族人安營帳幕南邊，執行看守聖所聖物的重任。
  relation: 本章利未人宗族領導結構的關鍵人物，確保至聖物搬運與看守的秩序。
