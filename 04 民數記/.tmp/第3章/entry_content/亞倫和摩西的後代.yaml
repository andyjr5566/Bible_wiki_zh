name: 亞倫和摩西的後代
type: 人物
secondary_types: []
aliases:
- 亞倫和摩西的後代
status: formal
definition: 指亞倫與摩西的子孫後代。本章開頭記載「耶和華在西乃山曉諭摩西的日子，亞倫和摩西的後代如下」（民3:1），隨後列出亞倫四個兒子：拿答、亞比戶、以利亞撒、以他瑪（民3:2）。
development: 本章詳細記載亞倫兒子的名字與身分：他們都是受膏的祭司，承接聖職供祭司職分（民3:3）。拿答、亞比戶因獻凡火死在耶和華面前，沒有兒子（民3:4）；以利亞撒、以他瑪在父親亞倫面前供祭司職分（民3:4）。摩西的後代在本章未詳細列出，但摩西與亞倫同在帳幕前東邊安營（民3:38）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載亞倫四個兒子的名字、身分、命運，以及他們供祭司職分的情況；摩西的後代未展開記載。
  relation: 亞倫和摩西的後代是利未支派祭司體系的核心，亞倫的兒子們承接祭司職分，摩西則與亞倫同為利未人領袖。
