name: 這是米拉利的二族
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 經文總結米拉利家族下轄抹利族、母示族兩個宗族（民數記 3:33）。
development: 此句作為米拉利家族家譜的結語，引出隨後的點人數目與職分分配。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文確認米拉利家族由抹利、母示二族組成。
  relation: 為後續記載米拉利男丁總數（六千二百名）與首領蘇列、職分分工提供依據。
related_entries:
- 屬米拉利的
