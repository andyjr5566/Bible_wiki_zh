status: formal
definition: 米拉利兒子抹利的後裔，屬米拉利家族兩個宗族之一（民數記 3:20, 33）。
development: 抹利族與母示族同為米拉利的二族，參與帳幕北邊的安營與看守職分（民數記 3:35-36）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文記載抹利族為米拉利的兒子所生，屬米拉利二族之一。
  relation: 作為米拉利家族的分支，共同承擔帳幕結構器具的看守責任。
