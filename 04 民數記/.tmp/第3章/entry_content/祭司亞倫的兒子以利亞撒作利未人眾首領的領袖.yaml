definition: 民數記3:32 記載祭司亞倫的兒子以利亞撒作利未人眾首領的領袖，監察看守聖所的人。
development: 以利亞撒為大祭司亞倫的第三子，繼承祭司職分（民3:4），獲授利未人最高領導權，統轄革順、哥轄、米拉利三族首領，負責監督聖所看守事務（民3:32）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以利亞撒為利未人眾首領的領袖，監察三族看守聖所工作，位居利未人領導階層頂點。
  relation: 本章建立祭司與利未人雙層領導架構，以利亞撒連結亞倫祭司譜系與利未人服事秩序。
