status: formal
definition: 利未的長子，利未三大家族之一的始祖。其子孫分立尼族、示每族，負責帳幕、罩棚、蓋、門簾、院子帷子與繩子的看守，安營在帳幕後西邊。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載革順為利未長子，其家族人數、安營位置、職掌與首領以利雅薩（3:17-26）。
  relation: 本章利未三族分工與安營秩序的首個家族。
