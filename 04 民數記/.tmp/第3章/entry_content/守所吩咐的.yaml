name: 守所吩咐的
type: 主題
secondary_types: []
aliases:
- 守耶和華所吩咐的
status: formal
definition: 利未人要在會幕前守所吩咐的（民3:7），並守所吩咐以色列人的（民3:8）；摩西亞倫替以色列人守耶和華所吩咐的（民3:38）。強調順服神命令、維護聖所秩序的責任。
development: 「守吩咐」贯穿舊約祭司律法，新約轉化為遵守基督命令（約14:15）。
