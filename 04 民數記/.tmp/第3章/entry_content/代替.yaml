name: 代替
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 上帝揀選利未人「代替」以色列一切頭生的歸祂自己（民3:12, 41, 45）。此為贖買神學基礎：利未人以生命事奉替代全民頭生歸神的權利。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載耶和華三次宣告利未人代替以色列人一切頭生的（民3:12, 41, 45），確立利未人歸神的神學依據。
  relation: 奠定利未人職分的贖買神學基礎，對應後續贖銀制度。
