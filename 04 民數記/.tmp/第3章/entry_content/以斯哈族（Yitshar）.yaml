status: formal
definition: 以斯哈族是利未人哥轄的次子以斯哈的後裔所組成的家族（民3:19, 27）。他們屬於哥轄諸族之一，負責看守聖所中最聖潔的器具，如約櫃、桌子、燈臺、壇和器皿等（民3:31）。在西乃曠野人口普查中，哥轄諸族（含以斯哈族）一個月以上的男子共有八千六百名（民3:28），安營在帳幕南邊（民3:29）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載以斯哈族為哥轄四族之一，參與聖所看守職分、人口統計與安營方位。
  relation: 本章確立利未人分工，以斯哈族作為哥轄子孫承擔至聖物看守責任。
