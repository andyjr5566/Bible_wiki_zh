name: 米拉利子孫的職分是看守帳幕的板、閂、柱子、帶卯的座，和帳幕一切所使用的器具
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 經文規定米拉利子孫負責看守帳幕的結構性器具：板、閂、柱子、帶卯的座，以及帳幕一切使用的器具（民數記 3:36）。
development: 此職分與革順族（看守帳幕罩棚、帷子）和哥轄族（看守聖所器皿）形成利未人三族分工的完整體系。
accumulations:
- book: 民數記
  chapter: 3
  summary: 經文詳細列出米拉利家族具體的看守職分範圍。
  relation: 體現神對會幕服事的秩序安排，各族各司其職，確保帳幕拆遷與搭建的有序進行。
