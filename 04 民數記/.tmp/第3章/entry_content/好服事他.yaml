name: 好服事他
type: 主題
secondary_types: []
aliases:
- 為要服事他
status: formal
definition: 利未人近前來、站在亞倫面前的目的，是好服事亞倫（民3:6）。服事內容包括守所吩咐的、辦理帳幕的事、看守器具（民3:7-8）。強調利未人服事的對象與性質。
development: 服事對象從亞倫個人延伸至會眾與聖所，形成完整的敬拜服事體系。
accumulations:
- book: 民數記
  chapter: 3
  summary: 利未人站在亞倫面前好服事他，並替他和會眾守所吩咐的。
  relation: 本章定義利未人服事目標與範圍的關鍵經文。
