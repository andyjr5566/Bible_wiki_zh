name: 父親亞倫面前
type: 主題
secondary_types: []
aliases:
- 在父親亞倫面前
status: formal
definition: 指以利亞撒和以他瑪在父親亞倫仍在世時，於亞倫面前供祭司職分（民3:4）。強調祭司職分的傳承與監督關係，亞倫作為大祭司，其子孫在其權柄下服事。
development: 此詞語顯示祭司職分的家族傳承模式，後來以利亞撒繼任大祭司（民20:25-28），延續亞倫的祭司體系。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載拿答、亞比戶死後，以利亞撒、以他瑪在父親亞倫面前供祭司職分。
  relation: 本章祭司譜系與職分傳承的關鍵經文。
