definition: 民數記3:27 指屬於哥轄宗族的利未人，包括暗蘭族、以斯哈族、希伯倫族、烏薛族四族。
development: 哥轄族為利未三族中人數最多（八千六百名），安營帳幕南邊，負責看守約櫃、桌子、燈臺、壇、聖所器皿與簾子等最聖潔之物（民3:28-31）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載哥轄族四支族系、人數、安營位置與看守聖所聖物的職分。
  relation: 本章利未三族分工的核心，哥轄族承擔最高聖職風險與榮耀的看守任務。
