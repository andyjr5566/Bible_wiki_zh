definition: 米拉利的兒子（民3:20），母示族的始祖（民3:33）。屬米拉利宗族，在帳幕北邊安營，與抹利族同負責帳幕結構組件看守（民3:35-37）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載母示為米拉利兒子，其族人屬米拉利二族之一，共同掌管帳幕架構看守職務。
  relation: 完整呈現米拉利族兩支族（抹利、母示）共同承擔帳幕骨架看守責任。
