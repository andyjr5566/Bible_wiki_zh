name: 利未人總數與贖銀
type: 主題
secondary_types: []
aliases:
- 利未人總數
- 贖銀計算
status: formal
definition: 利未人一個月以上男子總數為22,000（革順7,500+哥轄8,600+米拉利6,200）。以色列頭生男子總數為22,273，多出273人。神命摩西按聖所的平每人取贖銀五舍客勒（一舍客勒二十季拉），共得1,365舍客勒，交給亞倫和他的兒子作為贖價。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章記載利未人總數統計、與頭生男子人數比對、贖銀標準與總額、交付對象。
  relation: 體現神對數字的精確掌管，以及贖價概念的具體操作。
