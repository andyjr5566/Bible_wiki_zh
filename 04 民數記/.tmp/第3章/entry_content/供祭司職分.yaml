name: 供祭司職分
type: 主題
secondary_types: []
aliases:
- 供祭司職分
status: formal
definition: 指執行祭司的職任、事奉聖所。本章記載亞倫的兒子們「承接聖職供祭司職分」（民3:3），以利亞撒、以他瑪「在他們的父親亞倫面前供祭司的職分」（民3:4），並囑咐亞倫和他的兒子「謹守自己祭司的職任」（民3:10）。
development: 本章將供祭司職分與利未人的事奉區分：祭司負責聖所內的祭壇、器具、贖罪等核心聖職（民3:38），利未人則輔助看守帳幕器具、搬運結構（民3:7-8,25-26,31,36-37）。祭司職任嚴肅，外人近前必被治死（民3:10,38）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載亞倫家族供祭司職分的任命、繼承、職責範圍，以及與利未人輔助關係的界定。
  relation: 供祭司職分是本章祭司體系建立的核心主題，確立亞倫家族在聖所事奉的獨特地位與責任。
