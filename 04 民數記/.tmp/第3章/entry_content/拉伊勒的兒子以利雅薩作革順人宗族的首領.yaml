definition: 民數記3:24 記載拉伊勒的兒子以利雅薩擔任革順人宗族的首領。
development: 以利雅薩為革順族的領袖，統轄立尼族與示每族，負責帶領族人看守會幕帳幕、罩棚、門簾與院子帷子等器具（民3:25-26）。
accumulations:
