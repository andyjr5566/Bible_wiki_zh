definition: 亞比亥的兒子，作米拉利二宗族的首領（民3:35），在帳幕北邊安營，負責看守帳幕的板、閂、柱子、帶卯的座等結構組件（民3:36-37）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載蘇列為亞比亥兒子，擔任米拉利家族首領，掌管帳幕結構組件的看守職務。
  relation: 體現利未人米拉利族分工看守帳幕架構的制度。
