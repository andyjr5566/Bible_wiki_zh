name: 烏薛族（Uzziel）
type: 人物
secondary_types: []
aliases:
- 烏薛族
status: formal
definition: 烏薛族是利未人哥轄的四子烏薛的後裔所組成的家族（民3:19, 27）。屬哥轄諸族，同負責至聖物看守（民3:31）。族長為烏薛的兒子以利撒反（民3:30）。普查計入哥轄總數八千六百名（民3:28），安營帳幕南邊（民3:29）。
accumulations:
- book: 民數記
  chapter: 3
  summary: 記載烏薛族為哥轄最小家族，其族長以利撒反統領哥轄宗族家室。
  relation: 烏薛族透過族長以利撒反在哥轄諸族中擔任領導角色。
