name: 在埃及地擊殺一切頭生的那日
type: 事件
secondary_types: []
aliases:
- 擊殺頭生之日
- 埃及擊殺頭生
status: formal
definition: 指神在埃及降下第十災，擊殺埃及地一切頭生的（連人帶牲畜）那一夜（出 12:29-30）。民數記 3:13 記載耶和華宣告：「我在埃及地擊殺一切頭生的那日，就把以色列中一切頭生的，連人帶牲畜都分別為聖歸我」。此事件成為神宣稱以色列頭生者屬祂、並以利未人代替頭生者的神學依據。
development: 此事件在出埃及記 12 章詳細記載，為逾越節的起源；在民數記 3 章成為利未人代替頭生者的救贖神學基礎。
accumulations:
- book: 民數記
  chapter: 3
  summary: 耶和華宣告因在埃及擊殺頭生者，將以色列一切頭生的分別為聖歸祂，並揀選利未人代替。
  relation: 本章神學論證的核心歷史事件，奠定利未人代替頭生者的依據。
