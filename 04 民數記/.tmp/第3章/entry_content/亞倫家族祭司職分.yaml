name: 亞倫家族祭司職分
type: 主題
secondary_types: []
aliases:
- 亞倫祭司職分
- 亞倫家族祭司
status: formal
definition: 指亞倫及其子孫被神揀選、受膏承接聖職，專門供祭司職分，負責看守聖所、辦理帳幕事務，並監察利未人服事。根據民數記第3章，亞倫的四個兒子（拿答、亞比戶、以利亞撒、以他瑪）均受膏為祭司，但拿答、亞比戶因獻凡火被神擊殺，無子而亡；以利亞撒、以他瑪在父親亞倫面前供職。神吩咐摩西囑咐亞倫和他的兒子謹守祭司職任，近前來的外人必被治死。
accumulations:
- book: 民數記
  chapter: 3
  summary: 本章記載亞倫家族祭司職分的建立、人員名單、職責範圍（看守聖所、監察利未人），以及因違規而被除名的拿答、亞比戶。
  relation: 確立亞倫家族為以色列唯一合法祭司體系，奠定後續利未人服事祭司的架構。
