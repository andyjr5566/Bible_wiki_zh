  "summary": "v2 亞倫次子亞比戶；v3 受膏為祭司；v4 與拿答同獻凡火而死，無子嗣。CT：亞比戶與拿答同死在工作中，但他們的死卻是被神一直定罪的——一切工作若不是根據神、出於神、彰顯神，就沒有事奉的成分。GT（精讀本）：拿答亞比戶之死說明人雖因局限性免不了死亡，但神所制訂的制度將永遠繼續下去。KC：亞比戶與拿答一樣，沒有考慮神話語的權柄，以自以為能親近神的方式進入聖所。"
