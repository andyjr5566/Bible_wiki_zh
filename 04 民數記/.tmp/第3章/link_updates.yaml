- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "v2 亞倫三子以利亞撒；v3 受膏為祭司；v4 在拿答亞比戶死後，與弟以他瑪在父親亞倫面前供祭司職分。v32「祭司亞倫的兒子以利亞撒作利未人眾首領的領袖，要監察那些看守聖所的人」——以利亞撒不僅將來繼承亞倫作大祭司（民20:25-28），且已是利未人眾首領的領袖，監督利未人的事工。CT：以利亞撒代表正常的盡職。GT（精讀本）：以利亞撒和以他瑪雖然一同供祭司職分的弟兄死了，仍然堅強執行祭司職分，說明神制度永遠繼續。KC：以利亞撒在父親有生之年服事，年輕人服事在長者監督之下是好的。"
