- "title": "出13：2,15"
  "path": "link_folder/互文/出13：2,15.md"
  "summary": "v13「因為凡頭生的是我的；我在埃及地擊殺一切頭生的那日，就把以色列中一切頭生的，連人帶牲畜都分別為聖歸我；他們定要屬我。我是耶和華」——此節回溯出13:2「以色列中凡頭生的，無論是人是牲畜，都是我的，要分別為聖歸我」及出13:15「那時法老幾乎不容我們去，耶和華就把埃及地所有頭生的，無論是人是牲畜，都殺了。因此，我把一切頭生的公牲畜獻給耶和華為祭，但將頭生的兒子都贖出來」。CT：凡頭生的是我的——因神付出犧牲祂獨生愛子的代價而取得的。GT（精讀本）：神對頭生之人的特別要求，是以擊殺埃及地的長子拯救以色列百姓的逾越節事件為基礎（出13:1-16）。KC：利未人代替頭生的根基是逾越節羔羊之血（出12:1-28;13:1-13）。"
  "relation": "[[利未人代替長子]]、[[利未支派]]"
- "title": "彼前2：9"
  "path": "link_folder/互文/彼前2：9.md"
  "summary": "GT（精讀本）引用彼前2:9說明：在新約時代，在基督耶穌裡的信徒作為祭司是被神分別為聖直接事奉神的人（彼前2:9;啟1:6;5:10;西1:24）。利未人事奉預表新約信徒皆為「屬靈利未人」、全體聖徒皆祭司。KC：利未人被賜給亞倫，正如信徒被賜給基督（約17:6;6:37），服事目的是使眾信徒成為更好的祭司。"
  "relation": "[[利未支派]]、[[利未人代替長子]]"