- "title": "凡火"
  "path": "link_folder/主題/凡火.md"
  "summary": "v4「拿答、亞比戶在西乃的曠野向耶和華獻凡火的時候就死在耶和華面前了。他們也沒有兒子。」CT：凡火指祭壇以外任何地方取來的火，祭壇上的聖火來自神自己（利9:24），其後早晚添柴不可熄滅（利6:12）；獻凡火是人的糊塗，是不接受神的權柄。GT（精讀本）：凡火指按自己意志而非按神旨意事奉神的一切行為（利10:1-2），再華麗的祭祀和事奉若無視神旨意神絕不悅納（賽1:10-17）。KC：拿答亞比戶獻凡火是他們自己發明的祭司職分——沒有考慮神話語的權柄，以自以為能的方式親近神。"
