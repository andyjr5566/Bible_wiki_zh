book: "04 民數記"
chapter: 3
updates:
  - title: "摩西"
    path: "link_folder/人物/摩西.md"
    summary: "民3:5,11,14,16,39,40,42,44,49,51 耶和華曉諭摩西說...於是摩西照耶和華所吩咐的數點他們...摩西就照耶和華所吩咐的把以色列人頭生的都數點了...摩西照耶和華的話把這贖銀給亞倫和他的兒子。摩西作為條例傳遞者和數點執行者。"
    relation: "民數記第3章：摩西接收神關於利未人代替長子、利未人分工、贖銀條例的啟示，並忠實執行數點與分發贖銀。"
  - title: "亞倫"
    path: "link_folder/人物/亞倫.md"
    summary: "民3:1,2,3,4,6,7,9,10,32,38,39 亞倫和摩西的後代...亞倫的兒子...受膏的祭司...你使利未支派近前來，站在祭司亞倫面前好服事他...祭司亞倫的兒子以利亞撒作利未人眾首領的領袖...在帳幕前東邊...安營的是摩西、亞倫，和亞倫的兒子。亞倫作為大祭司和利未人領袖。"
    relation: "民數記第3章：亞倫為大祭司，其子孫承接聖職；利未人歸給亞倫協助祭司職分；亞倫與摩西在會幕東邊安營看守聖所。"
  - title: "以色列"
    path: "link_folder/原文/以色列.md"
    summary: "民3:11,12,13,40,41,43,43,45,46,46,51 我從以色列人中揀選了利未人...代替以色列人一切頭生的...以色列人中頭生的...以色列人頭生的...以色列人的牲畜...以色列人頭生的...以色列人...頭生的。條例針對全會眾。"
    relation: "民數記第3章：以色列全會眾為利未人代替長子、頭生歸神、贖銀條例的對象。"
  - title: "利未人"
    path: "link_folder/人物/利未人.md"
    summary: "民3:6,7,8,9,12,14,15,16,17,39,40,41,45,46,51 你使利未支派近前來...利未人要歸我...你要照利未人的宗族、家室數點他們...凡被數的利未人...共有二萬二千名...利未人要歸我...利未人的牲畜。利未人專供聖職，代替長子歸神。"
    relation: "民數記第3章：利未人被神揀選代替以色列一切頭生的，按宗族家室數點（一個月以上男丁），三族分工看守會幕，牲畜也代替以色列人的牲畜。"
  - title: "西乃山"
    path: "link_folder/地點/西乃山.md"
    summary: "民3:1,11,14 耶和華在西乃山曉諭摩西的日子...耶和華曉諭摩西說...耶和華在西乃的曠野曉諭摩西說。西乃山為神頒布律法之地。"
    relation: "民數記第3章：神在西乃山向摩西啟示利未人代替長子、分工看守會幕、贖銀等條例。"
  - title: "西乃的曠野"
    path: "link_folder/地點/西乃的曠野.md"
    summary: "民3:1,14,39 耶和華在西乃山曉諭摩西的日子...耶和華在西乃的曠野曉諭摩西說...摩西、亞倫照耶和華吩咐在西乃的曠野數點他們。西乃曠野為數點利未人地點。"
    relation: "民數記第3章：神在西乃曠野向摩西啟示條例，摩西亞倫在西乃曠野數點利未人。"
  - title: "曠野"
    path: "link_folder/地點/曠野.md"
    summary: "民3:1,4,14,39 耶和華在西乃的曠野...在西乃的曠野向耶和華獻凡火...耶和華在西乃的曠野曉諭摩西說...摩西、亞倫照耶和華吩咐在西乃的曠野數點他們。曠野為以色列人漂流四十年之地。"
    relation: "民數記第3章：神在曠野啟示條例，拿答亞比戶在曠野獻凡火被擊殺，利未人在曠野被數點。"
  - title: "埃及地"
    path: "link_folder/地點/埃及地.md"
    summary: "民3:13,41 我在埃及地擊殺一切頭生的那日...也取利未人的牲畜代替以色列人的牲畜。出埃及救贖為利未人代替長子的神學基礎。"
    relation: "民數記第3章：神在埃及擊殺頭生子確立頭生歸神原則，利未人代替長子以此為基礎。"
  - title: "分別為聖"
    path: "link_folder/神學/分別為聖.md"
    summary: "民3:13 就把以色列中一切頭生的，連人帶牲畜都分別為聖歸我。分別為聖歸神，預表信徒分別為聖歸基督。"
    relation: "民數記第3章：神將以色列一切頭生的分別為聖歸自己，預表信徒分別為聖歸基督。"
  - title: "舍客勒"
    path: "link_folder/原文/舍客勒.md"
    summary: "民3:47,50 每人取贖銀五舍客勒...有一千三百六十五舍客勒。舍客勒為貨幣單位。"
    relation: "民數記第3章：贖銀以聖所平計算，每人五舍客勒，總計1365舍客勒歸給亞倫兒子。"
  - title: "亞米拿達（Amminadab）"
