- "title": "利未人代替長子"
  "path": "link_folder/神學/利未人代替長子.md"
  "summary": "v11-13 神揀選利未人代替以色列一切頭生的歸神，根基是逾越節擊殺埃及長子時以色列頭生的蒙保守（出13:2,11-16）。v40-51 數點以色列頭生的（22,273名）vs 利未人（22,000名），多出273名需付贖銀每人五舍客勒（共1,365舍客勒），交給亞倫和他兒子。CT：利未人代替頭生的是出於神的主權；人代替人、牲畜代替牲畜——不同生命不能作代替，真正能起代替作用的必須有同一生命，預表神的兒子必須成為人才能顯明「以無罪的代替罪」的果效。GT（精讀本）：利未人因對神的奉獻（出32:26-29）被神呼召代替以色列長子成了事奉神的人，暗示必須在神主權性的呼召之下才能做事奉神的工作。GT（背景註釋）：把長子身分轉授給利未人，暗示以色列當有的不是由長子負責保持的家庭式先祖崇拜，而是由祭司維持管制的全國性宗教活動。KC：利未人代替頭生的是「代替」原則——教會是「名錄在天上諸長子之會所共聚的總會」（來12:23）；利未人數少於頭生人數，意味著在教會實踐中不是每個信徒都履行利未人任務，需要付贖價——意識到被基督寶血所買（林前6:20）會促使人履行利未人事奉。BH：利未人代替頭生的是神主權揀選的體現，預表基督代替萬民。"
  "relation": "[[利未支派]]、[[贖銀五舍客勒]]、[[亞倫]]"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "v1「耶和華在西乃山曉諭摩西的日子，亞倫和摩西的後代如下」——摩西與亞倫同列為利未世系的屬靈父輩。v5-10 神透過摩西吩咐利未支派服事亞倫。v11-13 神曉諭摩西利未人代替頭生的原則。v14-16 摩西遵命數點利未人。v38 摩西、亞倫和亞倫的兒子在帳幕前東邊安營。v40-51 摩西數點以色列頭生的、收取贖銀交給亞倫父子。CT：摩西的名字列在亞倫之後，因亞倫是長子且摩西職位不傳子孫；摩西的事奉在靈裡與神交通中，是亞倫事奉的指導。GT（丁良才）：摩西的職任只屬本人一身，亞倫的職任卻歸與子孫，故本章只提亞倫後裔未提摩西子孫。KC：摩西和亞倫一同預表主耶穌——摩西代表神話語的權柄，亞倫代表體恤我們軟弱的大祭司（來3:1;4:12-16）。"
