- "title": "利未支派"
  "path": "link_folder/人物/利未支派.md"
  "summary": "全章核心：利未三族數點（v14-39）、利未人代替頭生的（v11-13,40-51）、利未人服事祭司（v5-10）。v6「你使利未支派近前來，站在祭司亞倫面前好服事他」；v9「你要將利未人給亞倫和他的兒子，因為他們是從以色列人中選出來給他的」。v12「我從以色列人中揀選了利未人，代替以色列人一切頭生的；利未人要歸我」。v17-20 利未三子革順、哥轄、米拉利及其後裔家室。v21-37 三族安營方位與職掌：革順西邊（帳幕罩棚門簾院帷繩子）、哥轄南邊（約櫃桌子燈臺兩壇聖所器皿簾子）、米拉利北邊（板閂柱子帶卯座橛子繩子）。v38 摩西亞倫及亞倫兒子東邊安營看守聖所。v39 利未人總數 22,000（一個月以上男子）。v40-51 利未人代替以色列頭生的，多出 273 名以每人五舍客勒贖銀（共 1,365 舍客勒）交給亞倫父子。CT：利未人事奉的要點是作神所要作的，根據神去供應神；事奉不能脫離工作，但工作不就是事奉，只有根據神又作在神面前的才夠得上事奉。GT（精讀本）：利未人因對神的奉獻（出32:26-29）被神呼召代替以色列長子成了事奉神的人，暗示必須在神主權性的呼召之下才能做事奉神的工作；利未人事奉分三類是按各人才能能力交給他們，暗示新約信徒按聖靈所賜恩賜作神的工作（羅12:4-8；林前12:7-11）。GT（啟導本）：利未支派一個月以上男丁總數 22,000，但三族加起來 22,300，多出 300 可能來自抄寫錯誤（哥轄族 8,600 應為 8,300）。GT（背景註釋）：利未人在聖所周圍安營奉命格殺擅入者，古代赫人與馬里文獻也視祭司為守衛者。KC：利未人是賜給祭司的禮物，預表教會中恩賜人被賜給基督（弗4:11）；每個利未人各有自己的任務，神按己意分配（林前12:5）；利未人從三十歲才開始服事，此前全是預備。BH：利未人被分別出來在會幕中協助亞倫和祭司，預表信徒作「皇家祭司」（彼前2:9）服事神。"
  "relation": "[[利未三族分工]]、[[利未人代替長子]]、[[會幕（帳幕整體）]]、[[亞倫]]、[[亞倫的祭司譜系]]、[[贖銀五舍客勒]]"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "v1-4 亞倫的兒子名單與祭司職任：長子拿答、亞比戶、以利亞撒、以他瑪，皆受膏為祭司。v4 拿答亞比戶因獻凡火死在耶和華面前，無子嗣。v6-9 利未支派被帶到亞倫面前服事他，利未人歸給亞倫和他的兒子作幫手。v10 亞倫和他兒子須謹守祭司職任，近前來的外人必被治死。v38 摩西、亞倫和亞倫的兒子在帳幕前東邊安營，看守聖所。v48,51 多餘之人的贖銀交給亞倫和他的兒子。CT：亞倫名字列在摩西之前因亞倫是長子且摩西職位不傳子孫；亞倫的事奉顯在人眼前，摩西的事奉在靈裡與神交通中。GT（丁良才）：亞倫名字記在先，不但因亞倫是長子，也因摩西職任只屬本人一身，亞倫職任卻歸與子孫。KC：摩西和亞倫一同預表主耶穌——摩西代表神話語的權柄，亞倫代表體恤我們軟弱的大祭司（來3:1;4:12-16）。"
  "relation": "[[亞倫的祭司譜系]]、[[利未支派]]、[[拿答]]、[[亞比戶]]、[[以利亞撒]]、[[以他瑪]]、[[凡火]]"
- "title": "亞倫的祭司譜系"
  "path": "link_folder/人物/亞倫的祭司譜系.md"
  "summary": "v1-4 亞倫四子名單：拿答（長子）、亞比戶、以利亞撒、以他瑪，皆受膏為祭司。v4 拿答亞比戶因獻凡火死在耶和華面前，無子嗣，祭司譜系僅剩以利亞撒、以他瑪延續。v32 以利亞撒作利未人眾首領的領袖，監察看守聖所的人，確立其為亞倫之後的領導地位。CT：拿答亞比戶之死使他們這一家族在事奉神的職事上完結了，是非常嚴肅的記錄。GT（精讀本）：無兒子暗示受神咒詛（詩127:3），以利亞撒和以他瑪堅守職分說明神制度永遠繼續、人間祭司不完全，終指向基督完全永遠的大祭司（來10:10-12）。KC：拿答亞比戶之死表明祭司職分不連結於家族重要性，乃連結於神的主權揀選；特權不等於自動忠心。"
  "relation": "[[亞倫]]、[[拿答]]、[[亞比戶]]、[[以利亞撒]]、[[以他瑪]]、[[凡火]]"
- "title": "會幕（帳幕整體）"
  "path": "link_folder/主題/會幕（帳幕整體）.md"
  "summary": "v7-8 利未人替祭司和會眾在會幕前守所吩咐的、辦理帳幕的事、看守會幕器具。v23 革順二族在帳幕後西邊安營。v25-26 革順子孫看守帳幕和罩棚、罩棚的蓋、會幕門簾、院帷和門簾、一切繩子。v29 哥轄諸族在帳幕南邊安營。v31 哥轄看守約櫃、桌子、燈臺、兩座壇、聖所器皿、簾子和一切使用之物。v35 米拉利二族在帳幕北邊安營。v36-37 米拉利看守帳幕的板、閂、柱子、帶卯的座、院子柱子、橛子和繩子。v38 摩西亞倫及亞倫兒子在帳幕前東邊安營看守聖所。CT：利未人的事奉是在事務上作神要他們作的，全體利未人在神管理下一同配搭；各站各位就是配搭事奉，完整顯出會幕的功用。GT（精讀本）：神以會幕為中心安置利未各族的營，象徵神作為以色列真正的統治者臨在於生活中。KC：革順（西邊）負責罩棚簾子——信徒在試煉中顯出基督；哥轄（南邊右側）負責聖物——教師使信徒認識在神面前榮耀地位；米拉利（北邊）負責結構——牧者保守教會站立抵禦仇敵攻擊。"
  "relation": "[[利未三族分工]]、[[利未支派]]、[[安營與纛]]"
- "title": "拿答"
  "path": "link_folder/人物/拿答.md"
  "summary": "v2「亞倫的兒子，長子名叫拿答」；v3 拿答為受膏的祭司，承接聖職供祭司職分；v4「拿答、亞比戶在西乃的曠野向耶和華獻凡火的時候就死在耶和華面前了。他們也沒有兒子」。CT：拿答之死表明事奉神非常嚴肅，不能憑人意或單憑熱心，必須根據神的心意；獻凡火是不接受神的權柄、不知道要活出分別見證的結果。GT（精讀本）：凡火指按自己意志而非按神旨意事奉的一切行為（利10:1-2），再華麗的祭祀若無視神旨意神絕不悅納（賽1:10-17）。KC：拿答沒有考慮神話語的權柄，以自以為能親近神的方式進入聖所——那是自己發明的祭司職分，這樣的祭司職分會消亡。"
  "relation": "[[亞倫]]、[[亞比戶]]、[[凡火]]、[[亞倫的祭司譜系]]"
- "title": "亞比戶"
