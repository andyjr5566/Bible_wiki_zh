- "title": "外人近前來必被治死"
  "path": "link_folder/主題/外人近前來必被治死.md"
  "summary": "v10「你要囑咐亞倫和他的兒子謹守自己祭司的職任。近前來的外人必被治死」——「外人」指非亞倫子孫者（利22:10）。v38「在帳幕前東邊……安營的是摩西、亞倫，和亞倫的兒子。他們看守聖所，替以色列人守耶和華所吩咐的。近前來的外人必被治死」——再次強調聖所入口把守的嚴肅性。CT：v10「外人」指非亞倫子孫者；v38「外人」指非利未人者。GT（丁良才）：v10「外人」指凡不做亞倫子孫的；v38「外人」指凡不是利未人的。GT（精讀本）：沒有被神呼召也沒有被膏立為祭司的人進到神面前時必被治死，這死亡是神為了護衛自己聖潔所採取的緊急措施。GT（背景註釋）：利未人在聖所周圍安營奉命格殺擅入者，古代赫人與馬里文獻也視祭司為守衛者。KC：v10「外人」指不屬亞倫家族者（參v38b），民1章則指非利未人者（民1:51）；拿答亞比戶雖有資格仍因以己意親近而被殺。"
  "relation": "[[利未支派]]、[[亞倫]]、[[凡火]]"
- "title": "十二支派起源"
  "path": "link_folder/神學/十二支派起源.md"
  "summary": "v17-20 利未三子（革順、哥轄、米拉利）及其後裔家室：革順生立尼、示每；哥轄生暗蘭（摩西亞倫之父）、以斯哈、希伯倫、烏薛；米拉利生抹利、母示。v21-37 三族按宗族分為八族（立尼族、示每族、暗蘭族、以斯哈族、希伯倫族、烏薛族、抹利族、母示族），各按安營方位與職掌分工。GT（精讀本）：家譜不是毫無意義之名字的羅列，背後包含神拯救以色列的歷史。KC：利未人的祖先利未以暴力和殘忍為特徵（創49:5;34:25-31），但神榮耀自己，使自以為是和殘忍的人成為奉獻的信徒。"
