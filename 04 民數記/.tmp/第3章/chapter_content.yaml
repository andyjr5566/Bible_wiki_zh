organization: "### 亞倫家族祭司譜系與利未人分別為聖（v1-13）\n\n本章開啟[[利未人|利未支派]]的編組記載。經文首先列出 [[亞倫|亞倫]]\
  \ 四子：**拿答、亞比戶、[[亞倫的兒子以利亞撒|以利亞撒]]、[[亞倫的兒子以他瑪|以他瑪]]**，皆為 [[受膏的祭司|受膏的祭司]]，受命 [[供祭司職分|供祭司職分]]（v3）。但拿答、亞比戶因在\
  \ [[西乃的曠野|西乃的曠野]] 向耶和華 [[獻凡火|獻凡火]]，死在耶和華面前，**[[沒有兒子|沒有兒子]]**（v4）；祭司職分遂由以利亞撒、以他瑪在\
  \ [[父親亞倫面前|父親亞倫面前]] 承接。\n\n耶和華吩咐 [[摩西|摩西]] 使 [[利未人|利未支派]] [[近前來|近前來]]，[[站在祭司亞倫面前|站在祭司亞倫面前]]\
  \ [[好服事他|好服事他]]，[[替他和會眾|替他和會眾]] [[在會幕前|在會幕前]] [[守所吩咐的|守所吩咐的]]，[[辦理帳幕的事|辦理帳幕的事]]，並\
  \ [[看守會幕的器具|看守會幕的器具]]（v6-8）。利未人被 [[將利未人給亞倫和他的兒子|從以色列人中選出來給]] 亞倫和他的兒子（v9），[[近前來的外人必被治死|外人近前來必被治死]]（v10）。\n\
  \n核心神學宣告：**「[[我從以色列人中揀選了利未人|我從以色列人中揀選了利未人]]，[[代替以色列人一切頭生的|代替以色列人一切頭生的]]；[[利未人要歸我|利未人要歸我]]」**（v12）。依據出埃及擊殺頭生之夜，**[[凡頭生的是我的|凡頭生的是耶和華的]]**，連人帶牲畜都\
  \ [[分別為聖歸我|分別為聖歸祂]]（v13）。\n\n> [!important] 本章樞紐\n> 利未人 [[代替|代替]] 以色列 [[頭生|頭生]]\
  \ 歸神，建立「贖回」與「事奉」的雙重邏輯：贖價（五舍客勒）解決數目差額，事奉分工解決聖所運作。\n\n### 利未三族人口普查與安營分工（v14-39）\n\n\
  耶和華在 [[西乃的曠野|西乃的曠野]] 命摩西 [[你要照利未人的宗族、家室數點他們|照利未人的宗族、家室數點他們]]，對象為 [[凡一個月以外的男子都要數點|凡一個月以外的男子]]（v15）。[[利未眾子的名字是革順、哥轄、米拉利|利未三子：革順、哥轄、米拉利]]（v17），各衍生出家族：\n\
  \n| 宗族 | 家族 | 男丁數（一個月以上） | 安營方位 | 主要看守職掌 | 族長 |\n|------|------|---------------------|----------|--------------|------|\n\
  | **[[革順|革順]]** | [[立尼（Libni）|立尼]]、[[示每（Shimei）|示每]] | 7,500 | 帳幕後 **西邊** | 帳幕、罩棚、蓋、門簾、院子帷子、門簾、繩子\
  \ | **[[拉伊勒的兒子以利雅薩|拉伊勒的兒子以利雅薩]]** |\n| **[[哥轄|哥轄]]** | [[暗蘭|暗蘭]]、[[以斯哈（Izhar）|以斯哈]]、[[希伯倫（Hebron）|希伯倫]]、[[烏薛|烏薛]]\
  \ | 8,600 | 帳幕 **南邊** | **約櫃、桌子、燈臺、兩座壇、聖所器皿、簾子** | **[[烏薛的兒子以利撒反|烏薛的兒子以利撒反]]** |\n\
  | **[[米拉利|米拉利]]** | [[抹利|抹利]]、[[母示|母示]] | 6,200 | 帳幕 **北邊** | 帳幕板、閂、柱子、帶卯的座、器具、院子柱子、座、橛子、繩子\
  \ | **[[亞比亥的兒子蘇列|亞比亥的兒子蘇列]]** |\n\n**[[祭司亞倫的兒子以利亞撒作利未人眾首領的領袖|祭司亞倫的兒子以利亞撒]]** 作 **[[祭司以利亞撒作利未人領袖|利未人眾首領的領袖]]**，**[[要監察那些看守聖所的人|監察那些看守聖所的人]]**（v32）。\n\
  \n**[[在帳幕前東邊，向日出之地安營的是摩西、亞倫，和亞倫的兒子|摩西、亞倫，和亞倫的兒子]]** 在 **帳幕前東邊，向日出之地安營**，**[[他們看守聖所，替以色列人守耶和華所吩咐的|看守聖所，替以色列人守耶和華所吩咐的]]**（v38）。\n\
  \n利未人總數：**[[共有二萬二千名|二萬二千名]]**（v39）。\n\n> [!note] 數字張力\n> 三族男丁相加（7,500 + 8,600 +\
  \ 6,200 = 22,300）與總數 22,000 相差 300。猶太傳統解釋：這 300 是利未人中自己的頭生子，不計入「代替以色列頭生」的名額中。\n\n\
  ### 頭生子贖價與贖銀歸屬（v40-51）\n\n[[耶和華對摩西說|耶和華對摩西說]]：[[你要從以色列人中數點一個月以外、凡頭生的男子|數點以色列人中一個月以外、凡頭生的男子]]，共\
  \ **[[按人名的數目，從一個月以外、凡頭生的男子，共有二萬二千二百七十三名|二萬二千二百七十三名]]**（v43）。比利未人多 **[[以色列人中頭生的男子比利未人多二百七十三個|二百七十三個]]**，須\
  \ **[[必當將他們贖出來|贖出來]]**（v46）。\n\n贖價標準：**[[你要按人丁，照聖所的平，每人取贖銀五舍客勒|按人丁，照聖所的平，每人五舍客勒]]**（一舍客勒\
  \ = **[[一舍客勒是二十季拉（shekel, gerah）|二十季拉]]**）（v47）。贖銀總額：**[[從以色列人頭生的所取之銀，按聖所的平，有一千三百六十五舍客勒|一千三百六十五舍客勒]]**（v50）。\n\
  \n摩西將贖銀 **[[把那多餘之人的贖銀交給亞倫和他的兒子|交給亞倫和他的兒子]]**，**[[正如耶和華所吩咐的|正如耶和華所吩咐的]]**（v51）。\n\
  \n```mermaid\nflowchart LR\n  A[以色列頭生子 22,273] -->|超額 273| B[贖銀 5舍客勒/人]\n  C[利未人\
  \ 22,000] -->|一對一代替| A\n  B --> D[總計 1,365 舍客勒]\n  D --> E[交給亞倫與兒子]\n```\n\n###\
  \ 跨章脈絡：從「頭生子歸神」到「利未人事奉」\n\n本章將出埃及記 13 章 **[[凡頭生的是我的|凡頭生的是我的]]** 具體制度化：\n1. **選召替代**：利未人取代全以色列頭生子，成為耶和華的產業（v12-13,\
  \ 41, 45）。\n2. **空間秩序**：三族環繞會幕，**[[摩西亞倫東邊安營|摩西亞倫東邊把守]]**，形成同心圓聖潔區域（v23, 29, 35,\
  \ 38）。\n3. **職分分工**：哥轄掌聖物（至聖）、革順掌幔幕、米拉利掌結構，祭司以利亞撒總督（v31-32）。\n4. **贖價原則**：數目不足以一對一時，以銀贖回，錢歸祭司，預表基督「以寶血贖回」（彼前\
  \ 1:18-19）。\n\n> [!question] 待探討\n> 利未人總數 22,000 與三族小計 22,300 的 300 差額，是否暗示利未人內部也有「頭生子不計入代替名額」的邏輯？這在後續章節（如民\
  \ 8）如何運作？"
