"book": "04 民數記"
"chapter": !!int "18"
"updates":
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民18章記載耶和華單獨對亞倫說話，吩咐祭司職任、至聖物分、無分無業神為分。亞倫與兒子擔當聖所罪孽、祭司職任罪孽，帶利未人聯合服事，守祭司職任為永遠定例。四份註解均記載亞倫為大祭司單獨領受神吩咐，確立祭司利未人雙層保護機制。"
  "relation": "本章為亞倫大祭司職分的制度性確立：從民16-17章神蹟驗證，到此處制度化規定祭司利未人職任、分別、供養。亞倫單獨領受神話（v1,8,20）顯示大祭司作神與百姓中保的獨特地位，預表基督作大祭司單獨進入天上聖所（來9:11-12）。"
- "title": "利未人"
  "path": "link_folder/人物/利未人.md"
  "summary": "民18章記載利未人被揀選歸耶和華，歸給亞倫作賞賜，與亞倫聯合服事，看守會幕、辦理帳幕事務，不可挨近聖所器具和壇。利未人得以色列人十分之一為業，從中再獻十分之一舉祭給亞倫。四份註解均記載利未人為神揀選歸給祭司作助手，建立雙重奉獻系統。"
  "relation": "本章確立利未人在以色列中的獨特地位：無地業、得十一奉獻、歸給祭司、雙重奉獻。與民3-4章利未人職任、民16-17章可拉黨背叛形成完整軌跡：從職任分工到背叛審判再到制度確立。預表新約信徒作祭司體系中被揀選服事者（彼前2:9）。"
- "title": "亞倫和他兒子（祭司）"
  "path": "link_folder/人物/亞倫和他兒子（祭司）.md"
  "summary": "民18章記載亞倫和兒子擔當聖所罪孽、祭司職任罪孽，守祭司職任凡靠近壇和幔子內事都要辦理，得至聖物、舉祭、搖祭、初熟為食物供應，在以色列中無分無業神為分。四份註解均記載祭司職任永久傳承、鹽約永恆。"
  "relation": "本章系統規定祭司職任範圍、供養來源、無地業特權。與出28-29章祭司聖職、利8-9章就任、民16-17章神蹟驗證形成完整祭司制度。預表基督作大祭司單獨進入天上聖所（來9:11-12），信徒作祭司同得屬天產業（彼前2:9）。"
- "title": "聖所"
  "path": "link_folder/地點/聖所.md"
  "summary": "民18:3,5 不可挨近聖所器具和壇，要看守聖所和壇，免得忿怒再臨到以色列人。丁良才：衛護基督與十字架真理；啟導本：不可將己意代替神意。"
  "relation": "本章將聖所確立為祭司利未人雙層看守的核心區域：利未人守會幕外圍，祭司守聖所內部。與出25-27章會幕結構、利10章拿答亞比戶獻凡火、來9章天上聖所形成神學脈絡：聖所為神同在顯現之地，不可輕慢。"
- "title": "舉祭（terumah）"
  "path": "link_folder/原文/舉祭（terumah）.md"
  "summary": "民18:11,19,24,26,28,29 以色列人獻給耶和華的舉祭，利未人從十分之一中獻舉祭歸給亞倫。原文 תְּרוּמָה (terumah) 意為舉起、獻上、分別為聖。丁良才：舉祭表徵將初熟歸神；啟導本：進地後首要承認神是供應者。"
  "relation": "本章將舉祭從利未記祭司條例（利2:9,7:14,22:12）延伸至全民進地生活與利未人雙重奉獻：吃那地糧食時要舉祭（民15:19-21），利未人從十分之一中獻舉祭給祭司（v26-29）。與民15章舉祭條例、申26章初熟果子獻上形成完整神學：神是供應源頭，百姓以初熟回應。"
- "title": "搖祭（tenufah）"
  "path": "link_folder/原文/搖祭（tenufah）.md"
  "summary": "民18:11,18,27,30 以色列人獻給耶和華的搖祭。原文 תְּנוּפָה (tenufah) 意為搖動、舉起、獻上。丁良才：搖祭表徵將收成歸神；啟導本：視覺提醒屬天身分。"
  "relation": "本章將搖祭與舉祭並列為祭司家庭食物供應（v11,18），利未人從十分之一中獻搖祭給亞倫（v27,30）。與出29:24-27搖祭條例、利7:30-34祭司得搖祭胸、來9:24基督在天上聖所為我們顯現形成神學脈絡：搖祭為將生命舉起歸神的見證。"
- "title": "初熟（bikkurim）"
  "path": "link_folder/原文/初熟（bikkurim）.md"
  "summary": "民18:12-13 凡獻給耶和華初熟的油、酒、穀。原文 בִּכּוּרִים (bikkurim) 意為初熟、首先成熟之物。丁良才：初熟獻祭表徵全盤收成歸屬神；啟導本：預表基督為初熟果子（林前15:20）。"
  "relation": "本章將初熟獻祭從利未記節期條例（利23:10-14）延伸至祭司利未人日常供應：初熟油、酒、穀歸祭司（v12-13），頭生人與不潔淨牲畜須贖回（v15-16）。與民15章舉祭條例、林前15:20基督為初熟果子、來12:23初熟果子名冊形成神學脈絡：初熟代表整體歸屬神。"
- "title": "十分之一"
  "path": "link_folder/原文/十分之一.md"
  "summary": "民18:21,24,26,28 以色列中一切的十分之一歸給利未人，利未人從中再獻十分之一給亞倫。原文 מַעֲשֵׂר (maaser) 意為十分之一、十一奉獻。丁良才：十一奉獻為利未人產業；啟導本：新約奉獻供應福音工人。"
  "relation": "本章確立十一奉獻制度的法律地位：以色列人出產十分之一歸利未人為業（v21,24），利未人從中再獻十分之一給祭司（v26-28），形成雙重奉獻系統。與創14:20亞伯拉罕納十一、利27:30-33十一奉獻條例、來7:9-10利未在亞伯拉罕身上納十一、林前9:13-14傳福音靠福音養生形成完整神學：十一奉獻為事奉者供養的神聖原則。"
