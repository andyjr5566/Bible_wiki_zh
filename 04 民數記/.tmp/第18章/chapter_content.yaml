organization: '### 祭司與利未人的職責分工（v1-7）

  耶和華**單獨對亞倫說話**，強調祭司體系獨特的責任：[[亞倫和他兒子（祭司）|亞倫和他兒子]]要「擔當干犯聖所的罪孽」與「擔當干犯祭司職任的罪孽」（v1）。希伯來文
  [[擔當（nasa）|nasa'']] 含「背負、承擔」之意，預表基督作大祭司背負世人罪孽（參 [[亞倫杖發芽預表基督永遠大祭司（民18：1-7）|亞倫杖發芽預表基督永遠大祭司]]）。神吩咐亞倫帶[[利未人|利未人]]聯合服事，他們看守會幕、辦理帳幕一切事務，但**不可挨近聖所器具和壇**，免得雙方死亡（v3-4）。這建立了「祭司供職聖所、利未人守會幕」的雙層保護機制，[[看守聖所壇免得忿怒臨到|看守聖所壇免得忿怒臨到]]以色列人（v5）。利未人被揀選「歸耶和華，是給你們為賞賜的」（v6），[[利未人歸耶和華作賞賜給亞倫|歸耶和華作賞賜給亞倫]]。


  ### 祭司當得的分：聖物與初熟（v8-19）

  神將以色列人歸給祂的[[舉祭（terumah）|舉祭]]、[[搖祭（tenufah）|搖祭]]、[[初熟（bikkurim）|初熟之物]]交給亞倫經管（v8-13）。這些分為三類：

  1. **至聖物**：素祭、贖罪祭、贖愆祭中存留不經火的部分，只有男丁可在聖處吃（v9-10）。

  2. **舉祭與搖祭**：亞倫全家潔淨者皆可吃（v11）。

  3. **初熟獻給耶和華**：油、新酒、五穀中至好的，以及地上初熟之物，潔淨家人可吃（v12-13）。

  頭生人與不潔淨牲畜須贖回（銀五舍客勒，v15-16）；潔淨牲畜頭生不可贖，血灑壇上、脂油焚燒，肉歸祭司（v17-18）。這一切立為「永遠的鹽約」（v19），鹽象徵不壞、永恆。


  ### 祭司無分無業：神為分（v20）

  亞倫在以色列境內「不可有產業，也不可有分」，因「我就是你的分，是你的產業」（v20）。這[[祭司在以色列中無分無業|無地業]]的設計，非貧窮而是特權——神自己成為產業，預表新約信徒「得著基督為產業」（參
  [[祭司無分無業神為分預表基督徒產業（民18：20）|祭司無分無業神為分預表基督徒產業]]）。


  ### 利未人當得的分：十分之一（v21-24）

  以色列人出產的[[十分之一|十分之一]]賜給利未人為業，作為他們辦會幕事的勞酬（v21）。從此以色列人不可挨近會幕（v22），利未人獨自辦事、擔當罪孽，世世代代為定例（v23），且在以色列中不可有產業（v24）。這[[利未人當得的分：十分之一|十一奉獻制度]]確立了「事奉者由事奉對象供養」的原則（參
  [[十一奉獻預表新約奉獻原則（民18：21-24）|十一奉獻預表新約奉獻原則]]）。


  ### 利未人從十分之一中獻舉祭給祭司（v25-32）

  利未人從所得十分之一中，再取十分之一作[[舉祭（terumah）|舉祭]]獻給耶和華，歸給亞倫（v26-28）。這「雙重十分之一」體現屬靈領袖同樣須向神獻上（參
  [[利未人獻十分之一預表雙重奉獻（民18：26-28）|利未人獻十分之一預表雙重奉獻]]）。利未人將至好的舉起後，其餘可隨處吃作賞賜（v31），若不獻上至好則擔罪、褻瀆聖物必死（v32）。


  > [!important] 本章樞紐

  > 民18章建立**祭司-利未人-百姓**三層聖潔架構：祭司直事聖所（神為分），利未人守會幕（十一奉獻為業），百姓獻十分之一（供給利未人）。此制度以「擔當罪孽」為核心邏輯，預表基督大祭司獨自擔當、信徒作祭司體系同蒙恩典。


  > [!question] 待釐清議題

  > - [[祭司無地業是否為貧窮（民18：20）|祭司無地業是否意味貧窮]]？經文顯示神供應極豐富（聖物、初熟、舉祭），非缺乏。

  > - [[十一奉獻是否適用新約信徒（民18：21-24）|十一奉獻是否直接移植新約]]？原則「勞工得工價」延續，但形式屬恩典下自願樂意。

  > - [[利未人是否也要奉獻十分之一（民18：26-28）|利未人獻十分之一]]是否意味所有事奉者皆須奉獻？經文明確要求利未人同樣獻上，打破「只收不出」迷思。'
