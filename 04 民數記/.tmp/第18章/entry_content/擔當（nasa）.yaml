name: 擔當（nasa）
type: 原文
secondary_types: []
aliases:
- 擔當
status: formal
definition: 希伯來文 nasa（נָשָׂא），基本意為「舉起、背負、擔當」。本章第 1 節「擔當干犯聖所的罪孽」、第 22、23 節「利未人要……擔當罪孽」均用此詞，表達祭司與利未人須承擔聖所服事的責任與罪責。
development: ''
accumulations:
- book: 民數記
  chapter: 18
  summary: 耶和華吩咐亞倫與其子孫、利未人擔當聖所與祭司職任的罪孽，並看守會幕。
  relation: 直接引用本章經文說明 nasa 在祭司與利未人職責中的用法。
related_entries:
- 耶和華單獨對亞倫說話擔當聖所罪孽
- 亞倫帶利未人聯合服事
- 看守聖所壇免得忿怒臨到
- 利未人歸耶和華作賞賜給亞倫
