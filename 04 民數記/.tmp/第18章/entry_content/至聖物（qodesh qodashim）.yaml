name: 至聖物（qodesh qodashim）
type: 原文
secondary_types: []
aliases:
- 至聖物
status: formal
definition: 希伯來文 qodesh qodashim（קֹדֶשׁ קָדָשִׁים），意為「至聖的物、至聖物」。本章第 9-10 節列舉素祭、贖罪祭、贖愆祭中「存留不經火的」歸為至聖物，僅祭司與其男丁可吃，並須視為聖。
development: ''
accumulations:
- book: 民數記
  chapter: 18
  summary: 規定以色列人獻給耶和華的至聖供物歸祭司食用，強調其聖潔性。
  relation: 本章為至聖物分配給祭司的法律依據。
related_entries:
