name: 利未人是否也要奉獻十分之一（民18：26-28）
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 本章 26-28 節明文規定利未人「從所得的十分之一中再取十分之一獻給祭司」，但歷代志、尼希米記等後期記載中利未人有時直接領取十一奉獻而無再獻記載，學者對此是否為普遍義務或特定時期規定存有爭議。
