name: 利未人歸耶和華作賞賜給亞倫
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華宣告已將利未人從以色列人中揀選出來歸耶和華，再賜給亞倫與其兒子作賞賜，為要辦理會幕的事（民18:6）。利未人屬於神，神再將他們「賞賜」給祭司，建立利未人服事祭司的產權與關係基礎。
development: 此事件緊接亞倫帶利未人聯合服事（民18:2-4），從神學層面定義利未人的雙重歸屬：先歸耶和華（被揀選、分別為聖），再歸亞倫（作賞賜、輔助服事）。這解釋為何利未人不可挨近聖所器具（屬神），卻要服事祭司（屬亞倫），並為後續利未人無地業、以十分之一為業（民18:20-24）鋪路。
