  summary: 利未人被揀選歸耶和華，再賜給亞倫作賞賜辦理會幕事（民18:6）。
  relation: 本章祭司利未人關係的神學奠基事件，連結前節聯合服事與後節利未人產業規定，確立利未人「屬神、賜祭司」的獨特地位。
