name: 祭司無地業是否為貧窮（民18：20）
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 經文說祭司「不可有產業……我就是你的分」，學者爭論此意是否意味祭司生活貧窮，或僅指無土地產業而享有聖物供應。本章 8-19 節列舉祭司所得諸聖物，顯示其經濟來源豐富，故多數解經家認為「無地業」不等於貧窮。
