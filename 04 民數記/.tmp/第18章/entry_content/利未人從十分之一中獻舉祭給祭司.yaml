name: 利未人從十分之一中獻舉祭給祭司
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華吩咐摩西曉諭利未人：從以色列人所取的十分之一中，再取十分之一作為舉祭獻給耶和華，歸給祭司亞倫（民18:25-28）。利未人從至好的中獻上舉祭，算為場上穀、酒醡酒；利未人與家屬可吃剩餘部分，作為辦會幕事的賞賜（民18:29-31）。利未人若不獻上至好的，就要擔罪、褻瀆聖物、死亡（民18:32）。
development: 此事件完成祭司利未人供應鏈的閉環：百姓獻十分之一給利未人 → 利未人獻十分之一的十分之一給祭司。利未人雖領受十一奉獻，自己也須奉獻，體現「領受者亦是奉獻者」的屬靈原則。獻上至好的（舉祭）歸祭司，其餘作利未人賞賜，違者擔罪死刑，凸顯聖物不可褻瀆的嚴肅性。
accumulations:
- book: 民數記
  chapter: 18
  summary: 利未人從十分之一中再獻十分之一為舉祭給祭司，其餘可吃為賞賜；不可褻瀆聖物（民18:25-32）。
  relation: 本章利未人供應體系的完成事件，回應祭司當得的分（民18:8-19）與利未人得十分之一（民18:21-24），建立雙重十一奉獻模型。
