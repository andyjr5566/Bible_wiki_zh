name: 祭司當得的分：舉祭搖祭
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華將以色列人所獻的舉祭並搖祭賜給亞倫與其兒女，作永得的分；凡祭司家中潔淨人都可以吃（民18:11）。舉祭與搖祭屬次聖物，食用範圍較至聖物寬鬆，延伸至祭司全家潔淨成員。
development: 緊接至聖物規定後，神規定舉祭與搖祭歸祭司家屬。舉祭與搖祭源於百姓平安祭、初熟祭等自願獻祭（利7:29-34），此處確認為祭司永得的分。潔淨家屬可食用，體現祭司家庭共同參與聖職供應的群體性，並預表新約信徒祭司體系共享屬靈供應（彼前2:5,
  9）。
accumulations:
- book: 民數記
  chapter: 18
  summary: 舉祭與搖祭歸祭司與兒女，潔淨家屬可食用，作永得的分（民18:11）。
  relation: 本章祭司當得的分第二類，補充至聖物僅限男丁食用的限制，擴展至祭司家庭，與初熟物並列構成完整供應。
