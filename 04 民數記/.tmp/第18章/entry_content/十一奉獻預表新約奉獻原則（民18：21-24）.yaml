name: 十一奉獻預表新約奉獻原則（民18：21-24）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 第 21-24 節規定以色列人將出產的十分之一歸給利未人作業，作為他們服事會幕的酬勞。新約哥林多前書 9:13-14、哥林多後書 9:7 以此為原則，教導信徒按收入比例、甘心樂意奉獻供應福音工人。
