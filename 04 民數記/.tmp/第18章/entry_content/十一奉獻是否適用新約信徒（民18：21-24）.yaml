name: 十一奉獻是否適用新約信徒（民18：21-24）
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 關於舊約十一奉獻制度是否直接延續至新約教會，學者意見分歧。支持者引用本章 21-24 節作為比例奉獻原則；反對者指出新約強調「甘心樂意」（林後
  9:7）而非法定比例，且基督已成全律法。本章僅規定利未人得十一奉獻作業，未直接命令新約信徒。
