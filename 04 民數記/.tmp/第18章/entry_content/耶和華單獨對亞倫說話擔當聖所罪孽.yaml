name: 耶和華單獨對亞倫說話擔當聖所罪孽
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華單獨對亞倫說話（民18:1），命令亞倫、他的兒子與本族的人一同擔當干犯聖所的罪孽，以及亞倫與兒子一同擔當干犯祭司職任的罪孽。這是神在可拉叛亂後（民16-17章），為確立祭司與利未人責任界線，直接向亞倫宣告的職責分工核心宣示。
development: 此事件發生在可拉一黨質疑亞倫祭司職分、耶和華以杖發芽證明亞倫被揀選（民17章）之後。神不再透過摩西轉達，而是直接對亞倫說話，強調祭司體系對聖所聖潔的獨特擔當責任，奠定後續利未人輔助、祭司獨自承擔聖所與祭司職任罪孽的神學基礎。
accumulations:
- book: 民數記
  chapter: 18
  summary: 耶和華單獨對亞倫說話，命亞倫與兒子及本族擔當聖所罪孽，亞倫與兒子擔當祭司職任罪孽（民18:1）。
  relation: 本章開篇核心事件，確立祭司獨特擔當責任，為後續利未人聯合服事、祭司利未人分工提供神學依據。
