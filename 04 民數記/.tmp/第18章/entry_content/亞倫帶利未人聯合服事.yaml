name: 亞倫帶利未人聯合服事
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華命令亞倫帶領利未人（其祖宗支派的人）前來與他聯合，服事亞倫與其兒子；利未人要守所吩咐亞倫的，並守全帳幕，但不可挨近聖所器具和壇，免得雙方死亡（民18:2-4）。這確立利未人輔助祭司、不得越界接觸至聖物的服事模式。
development: 緊接神單獨對亞倫說話後，神指示亞倫主動帶領利未人，形成「祭司主導、利未人輔助」的雙層服事架構。利未人被賜給亞倫作賞賜（民18:6），其服事範圍限於會幕外務，嚴禁觸碰聖所器具與壇，違者死刑，保護聖所聖潔與祭司權柄。
accumulations:
- book: 民數記
  chapter: 18
  summary: 亞倫帶利未人聯合服事，利未人守會幕辦事，不可挨近聖所器具與壇（民18:2-4, 6）。
  relation: 本章祭司與利未人分工的具體落實事件，回應前節祭司擔當罪孽的需求，建立利未人作祭司「賞賜」的服事關係。
