name: 利未人獻十分之一預表雙重奉獻（民18：26-28）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 第 26-28 節規定利未人從所得的十分之一中再取十分之一獻給祭司亞倫，形成「雙重十分之一」制度。新約希伯來書 7:9-10 論及利未在亞伯拉罕身上仍輸納十分之一，預表基督徒在奉獻上有「先歸神、再供應同工」的雙重原則。
