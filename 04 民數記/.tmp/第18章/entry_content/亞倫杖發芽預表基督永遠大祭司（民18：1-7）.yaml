name: 亞倫杖發芽預表基督永遠大祭司（民18：1-7）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 17 章亞倫杖發芽確認亞倫家系獨享祭司職任；本章 1-7 節重申亞倫與其子孫「擔當聖所罪孽」、「守祭司職任」，新約希伯來書 7-8
  章以此預表基督為永遠大祭司，一次獻上自己成就永贖。
