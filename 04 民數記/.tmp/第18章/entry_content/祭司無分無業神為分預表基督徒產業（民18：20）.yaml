name: 祭司無分無業神為分預表基督徒產業（民18：20）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 第 20 節「你在以色列人的境內不可有產業……我就是你的分，是你的產業」。新約彼得前書 2:9、以弗所書 1:11-14 將信徒視為「屬神的產業」，預表祭司無地業、以神為分的屬靈實況。
development: ''
