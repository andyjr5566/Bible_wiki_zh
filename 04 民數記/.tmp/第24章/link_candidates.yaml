      - "拍起手來"
      - "三次竟為他們祝福"
      - "快回本地去"
      - "阻止你不得尊榮"
  - name: "巴蘭宣稱只說神的話"
    type: "事件"
    evidence: "民24:12-13 巴蘭對巴勒說：我豈不是對你所差遣到我那裡的使者說：巴勒就是將他滿屋的金銀給我，我也不得越過耶和華的命，憑自己的心意行好行歹。耶和華說什麼，我就要說什麼？丁良才：巴蘭宣稱順服神命，但心仍貪圖卦金。"
