      - "水從桶裡流出"
      - "王必超過亞甲"
      - "國必要振興"
      - "神領他出埃及"
      - "有野牛之力"
      - "吞吃敵國"
      - "蹲如公獅"
      - "臥如母獅"
      - "誰敢惹他"
      - "凡給你祝福的願他蒙福"
      - "凡咒詛你的願他受咒詛"
  - name: "巴勒向巴蘭生氣拍手"
    type: "事件"
    evidence: "民24:10-11 巴勒向巴蘭生氣，就拍起手來，對巴蘭說：我召你來為我咒詛仇敵，不料，你這三次竟為他們祝福。如今你快回本地去吧！我想使你得大尊榮，耶和華卻阻止你不得尊榮。丁良才：巴勒表徵屬肉體的人，不死心企圖咒詛神的子民。"
