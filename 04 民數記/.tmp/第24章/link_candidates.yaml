candidates:
  - name: "巴蘭見神喜悅賜福不求法術"
    type: "事件"
    evidence: "民24:1-2 巴蘭見耶和華喜歡賜福與以色列，就不像前兩次去求法術，卻面向曠野。神的靈就臨到他身上。丁良才：巴蘭第三次預言完全順服神旨意，不再求法術。"
    surfaces:
      - "不像前兩次去求法術"
      - "面向曠野"
      - "神的靈臨到"
  - name: "巴蘭舉目看見以色列按支派居住"
    type: "事件"
    evidence: "民24:2 巴蘭舉目，看見以色列人照著支派居住。神的靈就臨到他身上。丁良才：以色列按支派有序居住，顯出神的秩序與祝福。"
    surfaces:
      - "舉目看見"
      - "照著支派居住"
      - "神的靈臨到"
  - name: "巴蘭第三次詩歌預言祝福以色列"
    type: "事件"
    evidence: "民24:3-9 巴蘭題起詩歌說：雅各啊，你的帳棚何等華美！以色列啊，你的帳幕何其華麗！...凡給你祝福的，願他蒙福；凡咒詛你的，願他受咒詛。丁良才：以色列營盤之美、得勝之勢、蒙福之確據。"
    surfaces:
      - "帳棚何等華美"
      - "帳幕何其華麗"
      - "接連的山谷"
      - "河旁的園子"
      - "沉香樹"
