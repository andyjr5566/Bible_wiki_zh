name: 巴蘭預言基尼人被亞述擄去
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭觀看基尼人，題起第六首詩歌：你的住處本是堅固，窩巢做在巖穴中，然而基尼必至衰微，直到亞述把你擄去（民24:21-22）。
development: 基尼人（葉特羅後裔）雖居險要巖穴，仍難逃亞述帝國擄掠，顯示倚靠地利不如倚靠神。
accumulations:
- book: 民數記
  chapter: 24
  summary: 第六首詩歌：基尼人住處堅固卻被亞述擄去衰微。
  relation: 針對基尼人的審判預言，與亞述興起歷史相符，呼應巴蘭預言以色列得摩押亞瑪力基尼地。
