definition: 巴蘭舉目看見以色列人照著支派居住，神的靈就臨到他身上，使他能以神的視角看見以色列的秩序與榮美（民24:2）。
development: 視覺觀察與聖靈感動結合，成為第三首詩歌預言的啟示基礎。
accumulations:
- book: 民數記
  chapter: 24
  summary: 巴蘭看見以色列按支派安營，神的靈臨到他身上。
  relation: 觸發第三次詩歌預言的視覺與屬靈雙重準備。
