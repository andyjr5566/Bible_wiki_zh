name: 巴蘭預言亞瑪力終必沉淪
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭觀看亞瑪力，題起第五首詩歌：亞瑪力原為諸國之首，但他終必沉淪（民24:20）。
development: 亞瑪力雖曾強盛（諸國之首），因敵對神子民必滅亡，應驗神向亞瑪力世世代代爭戰的宣告（出17:16）。
accumulations:
- book: 民數記
  chapter: 24
  summary: 第五首詩歌：亞瑪力雖為諸國之首，終必沉淪滅亡。
  relation: 針對以色列宿敵亞瑪力的審判預言，呼應巴蘭預言以色列得摩押亞瑪力基尼地。
