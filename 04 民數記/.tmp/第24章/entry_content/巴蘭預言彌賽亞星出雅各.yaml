name: 巴蘭預言彌賽亞星出雅各
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭題起第四首詩歌，宣告「有星要出於雅各，有杖要興於以色列」，必打破摩押四角、毀壞擾亂之子，得以東與西珥為基業，以色列行事勇敢，有位出於雅各掌大權、除滅城中餘民（民24:15-19）。
development: 此預言從近期掃羅/大衛征服摩押、以東，遠指彌賽亞基督普世掌權，星與杖為彌賽亞雙重意象。
accumulations:
- book: 民數記
  chapter: 24
  summary: 第四首詩歌：星出雅各、杖興以色列、擊敗摩押以東、彌賽亞掌權除滅餘民。
  relation: 本章彌賽亞預言核心，連結舊約王權與新約基督成就。
