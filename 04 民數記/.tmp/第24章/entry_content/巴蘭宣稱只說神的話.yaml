name: 巴蘭宣稱只說神的話
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭回應巴勒，提醒他先前已對使者說明：即使巴勒給滿屋金銀，我也不得越過耶和華的命憑己意行好行歹，耶和華說什麼我就說什麼（民24:12-13）。
development: 重申先知職分的單一順服原則，雖然巴蘭動機複雜，但此時口稱順服神話語權柄。
accumulations:
- book: 民數記
  chapter: 24
  summary: 巴蘭自辯只能說神的話，不敢越過耶和華命令行好行歹。
  relation: 回應巴勒指責，並為隨後第四至七首詩歌預言奠定權威基礎。
