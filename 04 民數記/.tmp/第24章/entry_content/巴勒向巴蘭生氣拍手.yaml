name: 巴勒向巴蘭生氣拍手
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴勒聽完三次祝福後向巴蘭生氣，拍手表示憤怒與失望，責備巴蘭三次為敵人祝福而非咒詛，並命令巴蘭快回本地，聲稱原想使他得大尊榮，卻被耶和華阻止（民24:10-11）。
development: 拍手在古近東文化中表達極度惱怒與拒絕，巴勒的反應凸顯人謀無法廢棄神旨。
accumulations:
- book: 民數記
  chapter: 24
  summary: 巴勒拍手發怒，責備巴蘭三次祝福以色列，命令他回去不給尊榮。
  relation: 巴蘭預言事工與巴勒期待的決裂點，引出巴蘭最後的自辯與後續預言。
