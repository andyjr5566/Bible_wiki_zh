name: 巴蘭預言基提人苦害亞述希伯
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭又題起第七首詩歌：哀哉，神行這事誰能得活？必有人乘船從基提界而來，苦害亞述、苦害希伯，他也必至沉淪（民24:23-24）。
development: 基提人（指塞浦路斯/希臘海上勢力，後引申為羅馬）從海上而來征服亞述與希伯（迦勒底/巴比倫），但最終亦歸沉淪，呈現列國興衰在神主權下的循環。
accumulations:
