name: 亞甲（亞瑪力王）
type: 原文
secondary_types: []
aliases:
- 亞甲
- 亞甲（亞瑪力王）
status: formal
definition: 希伯來文「אֲגַג」（Agag），意義不詳，或為「高貴」、「烈火」。這是亞瑪力王的世襲稱號（如撒上15:8, 33），非單一個人名。民數記24:7巴蘭預言：「他的王必超過亞甲；他的國必要振興。」意指以色列未來的王（彌賽亞）將超越亞瑪力最強的王權，顯示神國度的勝利。
accumulations:
- book: 民數記
  chapter: 24
  summary: 巴蘭第二次詩歌中提到以色列的王必超過亞甲，預示以色列王權勝過亞瑪力王權。
  relation: 本章以亞甲為對比基準，彰顯以色列彌賽亞王權的超越性。
related_entries:
- 巴蘭預言亞瑪力終必沉淪
- 巴蘭預言以色列得摩押亞瑪力基尼地
- 亞述
