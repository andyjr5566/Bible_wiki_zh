name: 巴蘭回本地巴勒也回去
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 巴蘭起來回本地去，巴勒也回去了，標誌摩押王雇請先知咒詛以色列的事件正式結束（民24:25）。
development: 雙方各自散去，神的祝福旨意無法被人為阻擋，巴蘭雖回鄉，後來仍因教導巴勒使以色列人犯罪而被殺（民31:8,16）。
accumulations:
- book: 民數記
  chapter: 24
  summary: 巴蘭回本地，巴勒也回去，咒詛事件以祝福收場。
  relation: 本章敘事結尾，為後續以色列在什亭犯罪（民25）與米甸之戰（民31）埋下伏筆。
