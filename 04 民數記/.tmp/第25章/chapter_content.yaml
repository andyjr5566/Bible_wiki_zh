organization: "### 什亭的淫亂與拜偶像（v1-3）\n以色列人安營在 [[什亭]]，百姓與 [[以色列在什亭與摩押女子行淫|摩押女子]] 行淫，並參與她們向神獻祭、跪拜的儀式，導致\
  \ [[以色列在什亭與摩押女子行淫]] 與 [[以色列與巴力毘珥連合]]。這不僅是性道德的敗壞，更是屬靈的奸淫，直接觸犯耶和華的忌邪，引發 [[瘟疫作為神的審判]]。\n\
  \n### 神的審判與摩西的執行（v4-5）\n耶和華命令摩西將所有族長在日頭下懸掛（[[神吩咐摩西懸掛族長]]），以平息怒氣；摩西轉傳命令給審判官，要他們殺死凡與巴力毘珥連合的人（[[摩西吩咐審判官殺死拜巴力者]]）。此處出現執行層面的張力：神說「懸掛族長」，摩西卻吩咐「審判官殺死拜偶像者」，引發關於\
  \ [[神是否命令摩西懸掛族長還是審判官執行]] 的討論。\n\n### 非尼哈的熱心與瘟疫止息（v6-9）\n正當會眾在 [[會幕門前]] 哭泣求告時，西緬族首領\
  \ [[心利]] 公開帶米甸女子 [[哥斯比]] 進入亭子（[[心利帶米甸女人哥斯比進亭子]]），這是 [[公開的罪與公開的審判]] 的極致挑釁。祭司非尼哈（亞倫孫子、以利亞撒兒子）憤而起身，手持槍刺透二人（[[非尼哈以熱心止息瘟疫]]、[[心利與哥斯比被殺]]），瘟疫隨即止息，但已有二萬四千人死亡。\n\
  \n```mermaid\nsequenceDiagram\n  participant God as 耶和華\n  participant Moses as\
  \ 摩西\n  participant Judges as 審判官\n  participant Zimri as 心利\n  participant Cozbi\
  \ as 哥斯比\n  participant Phinehas as 非尼哈\n  God->>Moses: 懸掛族長以消怒\n  Moses->>Judges:\
  \ 殺死拜巴力者\n  Zimri->>Cozbi: 公開進亭子（會幕門前）\n  Phinehas->>Zimri: 刺透二人\n  Phinehas->>God:\
  \ 熱心止息忿怒\n  God->>Phinehas: 賜平安的約、永遠祭司職任\n```\n\n### 神賜非尼哈平安的約（v10-13）\n耶和華向摩西確認非尼哈的行動「以我的忌邪為心」，使神不至在忌邪中滅絕以色列（[[非尼哈的熱心止息神的忿怒（民\
  \ 25：11-13）]]）。神因此賜給他「平安的約」與「永遠當祭司職任的約」（[[神賜非尼哈平安的約]]、[[非尼哈的熱心為神]]）。這約既是獎賞，也預表基督作為大祭司以熱心成就永久贖罪（[[非尼哈的熱心預表基督的代贖（民\
  \ 25：11-13；來 7：23-28）]]），但也留下關於動機的探討：[[非尼哈是否真心為神還是為個人榮耀]]。\n\n### 被殺者身份與針對米甸的命令（v14-18）\n\
  經文具體點名：以色列人是西緬族首領 [[心利（Zimri）|心利]]，米甸女子是首領蘇珥的女兒 [[哥斯比（Cozbi）|哥斯比]]（v14-15），凸顯這是領袖級的公開叛逆。耶和華隨後命令摩西\
  \ [[神吩咐擾害擊殺米甸人]]，因他們用詭計在 [[毘珥（Peor）|毘珥]] 之事上誘惑以色列（[[米甸人的詭計與毘珥之事]]），為後續第 31 章米甸之戰埋下伏筆。\n\
  \n> [!important] 本章樞紐\n> 非尼哈的暴力介入雖然現代讀者感到不適，但在敘事邏輯中卻是「止息瘟疫」的關鍵轉折，並成為祭司職任永續的神學依據。\n\
  \n> [!question] 懸而未決\n> - 摩西為何將「懸掛族長」改為「審判官殺死拜偶像者」？是寬容還是誤解？\n> - 非尼哈的熱心是否包含個人野心？拉比文獻與新約視角有異同。\n\
  \n### 神學反思：熱心、代贖與預表（跨章脈絡）\n本章呈現「罪—審判—代求/熱心—和好—立約」的完整循環，預表基督在十字架上以熱心滿足神公義、止息忿怒，並建立永約。非尼哈的祭司職任因熱心而永續，指向基督「因永遠活著，能以拯救到底」（來\
  \ 7:25）。同時，米甸人的詭計提醒屬靈爭戰中「誘惑」比「敵對」更隱蔽、更致命。"
