"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民25:4-5 耶和華吩咐摩西說：將百姓中所有的族長在我面前對著日頭懸掛...摩西吩咐以色列的審判官說：凡屬你們的人，有與巴力毘珥連合的，你們各人要把他們殺了。四份註解均記載摩西作中保領袖執行神的審判。"
  "relation": "摩西在民25章作為中保領袖執行神的審判：接收神吩咐懸掛族長、吩咐審判官處決拜巴力者，展現中保領袖在罪惡面前執行公義的角色。"
- "title": "非尼哈"
  "path": "link_folder/人物/非尼哈.md"
  "summary": "民25:7-13 祭司亞倫的孫子，以利亞撒的兒子非尼哈看見了，就從會中起來，手裡拿著槍，跟隨那以色列人進亭子裡去，便將以色列人和那女人由腹中刺透。這樣，在以色列人中瘟疫就止息了...耶和華曉諭摩西說：祭司亞倫的孫子，以利亞撒的兒子非尼哈，使我向以色列人所發的怒消了；因他在他們中間，以我的忌邪為心，使我不在忌邪中把他們除滅。因此，你要說：我將我平安的約賜給他。這約要給他和他的後裔，作為永遠當祭司職任的約；因他為神有忌邪的心，為以色列人贖罪。丁良才：非尼哈的熱心為神，止息了神的忿怒，得永遠祭司職任。"
  "relation": "非尼哈作為亞倫的孫子、以利亞撒的兒子，以熱心為神止息瘟疫（民25:7-9），得著平安的約與永遠祭司職任（民25:10-13）。與出6:25族譜、士20:28接續大祭司形成連貫軌跡，預表基督代贖止息神忿怒（來7:25，羅5:9）。"
