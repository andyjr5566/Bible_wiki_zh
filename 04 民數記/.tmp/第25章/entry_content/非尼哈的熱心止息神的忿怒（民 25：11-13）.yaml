name: 非尼哈的熱心止息神的忿怒（民 25：11-13）
type: 互文
secondary_types: []
aliases:
- 非尼哈的熱心
- 非尼哈止息忿怒
status: formal
definition: 民數記 25 章 11-13 節記載非尼哈因為以神的忌邪為心，刺殺心利與哥斯比，使神向以色列人發的怒氣止息，並得著「平安的約」與「永遠當祭司職任的約」。此事在詩篇
  106:30-31 被詩人回顧：「非尼哈起來執行判斷，這才使瘟疫止息。這算為他的義，直到永遠。」成為舊約「熱心為神」止息忿怒的典範，並為新約基督代贖止息神忿怒的預表奠基。
accumulations:
