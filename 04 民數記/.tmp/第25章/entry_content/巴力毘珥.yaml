name: 巴力毘珥
type: 地點
secondary_types: []
aliases:
- 巴力毘珥
status: formal
definition: 摩押/米甸邊境的拜偶像之地，名稱意為「巴力的毘珥」。以色列人在此與巴力毘珥連合，行淫獻祭（民數記 25:3, 5, 18）。
development: 巴力毘珥代表外邦偶像崇拜的具體地點，成為以色列犯罪的焦點。
accumulations:
- book: 民數記
  chapter: 25
  summary: 以色列人與巴力毘珥連合，招致神忿怒，非尼哈刺殺心利與哥斯比後瘟疫止息。
  relation: 作為拜偶像與淫亂的地點，直接連結公開的罪、審判與非尼哈的熱心。
related_entries:
- 以色列與巴力毘珥連合
- 公開的罪與公開的審判
- 米甸人的詭計與毘珥之事
- 會幕門前
