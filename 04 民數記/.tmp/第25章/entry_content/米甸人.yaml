name: 米甸人
type: 人物
secondary_types: []
aliases:
- 米甸人
status: formal
definition: 住在摩押旁邊的游牧民族，因用詭計誘惑以色列人拜巴力毘珥、行淫，被神命令摩西擾害擊殺（民數記 25:16-18）。
development: 米甸人作為外邦誘惑者，其命運與以色列的聖潔要求緊密相連。
accumulations:
- book: 民數記
  chapter: 25
  summary: 米甸人因在毘珥之事上用詭計誘惑以色列人，神吩咐摩西擾害擊殺他們。
  relation: 米甸人的詭計直接導致以色列犯罪與神的審判，構成神學上「外邦誘惑」的反面教材。
related_entries:
