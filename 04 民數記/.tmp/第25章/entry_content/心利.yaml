name: 心利
type: 人物
secondary_types: []
aliases:
- 心利
status: formal
definition: 西緬支派宗族首領撒路的兒子，名叫心利。他在會幕門前公開帶米甸女人哥斯比進入亭子，被祭司非尼哈刺殺，成為公開審判的對象（民數記 25:14）。
development: 心利的行為與結局展示個人公開悖逆如何招致即時審判。
accumulations:
- book: 民數記
  chapter: 25
  summary: 心利為西緬宗族首領，帶米甸女人哥斯比進亭子，被非尼哈刺殺，瘟疫止息。
  relation: 作為公開的罪人，其被殺直接止息神的忿怒，連結公開的罪與公開的審判主題。
