status: formal
definition: 以色列人在約旦河東岸安營的地方，民數記 25:1 記載「以色列人住在什亭」，此地成為百姓與摩押女子行淫、拜巴力毘珥的發生地。
development: 什亭作為事件發生的地理背景，連結以色列進入迦南前的屬靈危機。
accumulations:
- book: 民數記
  chapter: 25
  summary: 以色列人在什亭與摩押女子行淫、拜巴力毘珥，引發後續審判。
  relation: 什亭是公開的罪與審判事件的發生地點，地理與神學意義並重。
related_entries:
