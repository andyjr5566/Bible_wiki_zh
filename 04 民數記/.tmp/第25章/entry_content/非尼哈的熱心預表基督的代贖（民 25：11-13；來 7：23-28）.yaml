name: 非尼哈的熱心預表基督的代贖（民 25：11-13；來 7：23-28）
type: 互文
secondary_types: []
aliases:
- 非尼哈預表基督
- 非尼哈熱心與基督代贖
status: formal
definition: 非尼哈因熱心為神，以流血止息瘟疫、為百姓贖罪（民 25:13），蒙神立永遠祭司之約。新約希伯來書 7 章 23-28 節對比利未祭司因死不能長久，與基督因永遠長存、一次獻上自己、完全能拯救到底的大祭司職任。教會歷代神學（如加爾文、馬太·亨利）視非尼哈的熱心與贖罪行動為基督代贖工作的預表：基督以聖潔忌邪的熱心（約
  2:17；羅 3:25-26），在十字架上一次獻上自己，永遠止息神對選民的忿怒，成就永約。
accumulations:
