name: 米甸人的詭計與毘珥之事
type: 神學
secondary_types: []
aliases:
- 米甸人的詭計與毘珥之事
status: formal
definition: 指米甸人透過詭計誘惑以色列人參與巴力毘珥的拜偶像與性淫亂，導致神的忿怒。民數記 25:16-18 明確指出米甸人用詭計在毘珥之事上誘惑以色列人，並提到首領女兒哥斯比的角色。
development: 經文揭示米甸人主動設計陷阱，使以色列人陷入拜偶像與淫亂，成為神審判的緣由。
accumulations:
- book: 民數記
  chapter: 25
  summary: 神吩咐摩西擾害擊殺米甸人，因他們在毘珥之事上用詭計誘惑以色列人，哥斯比為首領女兒。
  relation: 米甸人的詭計直接導致以色列人的罪與隨後的審判，構成神學上「外邦誘惑」的典型案例。
related_entries:
