definition: 米甸首領蘇珥的女兒，名叫哥斯比。她與以色列人心利一同進入亭子，被非尼哈刺殺（民數記 25:15, 18）。
development: 哥斯比作為米甸詭計的關鍵人物，其死亡標誌著誘惑者的審判。
accumulations:
- book: 民數記
  chapter: 25
  summary: 哥斯比為米甸首領女兒，與心利同被非尼哈刺殺，瘟疫因此止息。
  relation: 她的身分與結局連結米甸人的詭計、公開的罪與審判。
