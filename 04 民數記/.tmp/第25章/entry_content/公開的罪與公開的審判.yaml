name: 公開的罪與公開的審判
type: 神學
secondary_types: []
aliases:
- 公開的罪與公開的審判
status: formal
definition: 指罪行在會眾面前公開顯露，神隨即以公開的方式施行審判。民數記 25 章記載以色列人在什亭公開與摩押女子行淫、拜巴力毘珥，招致瘟疫與族長被懸掛，非尼哈公開刺殺心利與哥斯比，使瘟疫止息，顯示公開的罪必招致公開的審判。
development: 本章以連續事件展示公開的罪如何引發神的公開審判，並以非尼哈的熱心作為轉折點。
accumulations:
- book: 民數記
  chapter: 25
  summary: 以色列人在什亭與摩押女子行淫、拜巴力毘珥，神降瘟疫，命摩西懸掛族長，非尼哈刺殺心利與哥斯比，瘟疫止息。
  relation: 直接記載公開的罪與公開的審判過程，作為神學觀點的經文基礎。
