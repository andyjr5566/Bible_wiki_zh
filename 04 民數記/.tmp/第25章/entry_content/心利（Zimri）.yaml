name: 心利（Zimri）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 זִמְרִי (Zimri)，意為「我的音樂」或「讚美」。民數記 25 章記載他是撒路的兒子，西緬支派一個宗族的首領。他在以色列人面前、摩西和會眾在會幕門前哭泣時，膽大包天地帶一個米甸女人哥斯比進入亭子（帳棚）。祭司非尼哈拿槍跟進去，將他和那女人由腹中刺透，使瘟疫止息。他的死成為公開審判公開罪惡的典型案例。
development: ''
accumulations:
- book: 民數記
  chapter: 25
  summary: 記載心利身為西緬族長，公開帶米甸女人進亭子行淫拜偶像，被非尼哈刺殺，瘟疫因而止息。
  relation: 作為領袖卻帶頭犯罪，其死顯明神對屬靈領袖墮落的嚴厲審判，也彰顯非尼哈熱心為神的代贖行動。
