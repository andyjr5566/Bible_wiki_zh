name: "潔淨(maqom tahor)"
type: "神學"
secondary_types: []
aliases: []
status: "formal"
definition: |
  潔淨（tahor）是舊約中事奉神的先決條件。在《民數記》第8章，神特別吩咐摩西要將利未人從以色列人中選出並潔淨他們，包含彈除罪水、用剃頭刀刮全身、洗衣服等步驟。這表明事奉神的人必須先對付自己的罪與天然肉體，將自己分別為聖，方能合乎主用。事奉的基礎不僅在於被揀選，更在於生命的潔淨與成聖。
accumulations:
  - book: "民數記"
    chapter: 8
    summary: "神要求利未人在正式辦理會幕的事之前，必須經過嚴格的潔淨儀式。"
    relation: "潔淨是利未人取代首生子事奉神的前提，預表新約信徒事奉前必須被基督的血與道洗淨。"
related_entries:
  - "利未支派"
  - "除罪水"
  - "剃頭刀"
sources:
  - "華人基督徒查經資料: 民數記第8章 (https://www.ccbiblestudy.org/Old%20Testament/04Num/04CT08.htm)"
