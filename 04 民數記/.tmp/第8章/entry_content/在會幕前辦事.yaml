name: 在會幕前辦事
type: 主題
secondary_types: []
aliases:
- 在會幕辦事
- 會幕事奉
status: formal
definition: 指利未人潔淨、歸神後，進入會幕執行神指派的事奉（民 8:15, 22, 24, 26）。包括搬運、看守、協助祭司等職務，年齡限制為 25-50
  歲（民 8:24-25），50 歲後退下改為輔助弟兄看守所吩咐的（民 8:26）。
development: 本章將「在會幕前辦事」作為利未人潔淨歸神的最終目的（民 8:15, 22），並訂定任職年歲與退休輔助條例（民 8:24-26）。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人潔淨後進去在會幕前辦事，25 歲起任職，50 歲退下輔助弟兄看守所吩咐的。
  relation: 為利未人事奉的具體內容與規範，承接選出、潔淨、歸神、搖祭等前置程序。
