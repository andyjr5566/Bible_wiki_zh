definition: 民數記第8章利未人潔淨儀式中的具體動作：「用剃頭刀刮全身」（第7節）。此為除罪水彈灑後、洗衣服前的必要步驟，象徵徹底除去舊污穢，預備獻上為搖祭。
development: 刮全身作為潔淨程序的核心物理動作，配合除罪水、洗衣服構成「水、刀、衣」三重潔淨意象，強調利未人進入聖所事奉前須經歷徹底更新。
