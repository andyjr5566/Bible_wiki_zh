name: 為以色列人贖罪
type: 神學
secondary_types: []
aliases:
- 為以色列人贖罪
status: formal
definition: 指利未人被分別為聖歸給耶和華，並作為搖祭獻上，在會幕中辦事，目的是為以色列人贖罪，免得他們挨近聖所時有災殃臨到（民8:19）。這體現了代贖與中保的神學意義：利未人代替以色列人承擔聖所服事的責任，避免百姓因擅自接近聖潔而受審判。
development: 從利未人被選出、潔淨、按手、作搖祭、獻贖罪祭與燔祭，到最終進入會幕事奉，形成完整的贖罪與分別為聖程序。
accumulations:
- book: 民數記
  chapter: 8
  summary: 耶和華將利未人賞賜給亞倫和他兒子，在會幕中辦以色列人的事，又為以色列人贖罪，免得他們挨近聖所有災殃（8:19）。
  relation: 本章核心神學動機，說明利未人事奉的贖罪功能。
