name: 利未人作搖祭
type: 主題
secondary_types: []
aliases:
- 利未人搖祭
- 利未人作為搖祭
status: formal
definition: 亞倫將利未人奉到耶和華面前，為以色列人當作搖祭，使他們好辦耶和華的事（民8:11）。利未人按手在兩隻牛頭上，一隻作贖罪祭、一隻作燔祭，為利未人贖罪（民8:12）。亞倫使利未人站在亞倫和他兒子面前，將他們當作搖祭奉給耶和華（民8:13）。潔淨後，利未人進去在亞倫和他兒子面前、在會幕中辦事（民8:22）。「搖祭」意指將利未人完全獻給神，再由神賜回給祭司作助手，象徵生命完全歸神、再領受神的差遣。
development: 搖祭原為祭物儀式（出29:24-27），此處獨特地將活人作搖祭，預表羅馬書12:1「將身體獻上，當作活祭」，以及新約信徒被聖靈分別為聖、事奉主。
accumulations:
- book: 民數記
  chapter: 8
  summary: 亞倫將利未人作搖祭奉給耶和華，為以色列人贖罪，使利未人得以在會幕事奉。
  relation: 連結利未人潔淨條例與其事奉資格，確立利未人「歸神再歸祭司」的神學邏輯。
