  chapter: 8
  summary: 規定利未人潔淨程序：除罪水、剃毛、洗衣、獻公牛犢燔祭與贖罪祭、以色列人按手、亞倫搖祭。
  relation: 本章核心段落（5-22節），建立利未人取代長子、事奉會幕的資格基礎。
