status: formal
definition: 耶和華吩咐摩西從以色列人中選出利未人，潔淨他們（民8:5-6）。潔淨儀式包括：用除罪水彈在他們身上、用剃頭刀刮全身、洗衣服、潔淨自己（民8:7）。隨後取一隻公牛犢作燔祭（配調油細麵素祭），另取一隻公牛犢作贖罪祭（民8:8）。將利未人奉到會幕前，招聚以色列全會眾，以色列人按手在他們頭上（民8:9-10）。此條例確立利未人進入聖職前的分別為聖程序。
development: 此條例與利未記8-9章祭司潔淨禮平行，但利未人屬於亞倫祭司的助手，其潔淨程度較祭司為輕，預表新約信徒藉基督寶血潔淨（來9:13-14）而事奉神。
accumulations:
