name: 代替長子
type: 神學
secondary_types: []
aliases:
- 代替長子
status: formal
definition: 耶和華揀選利未人代替以色列人中一切頭生的（民8:16, 18），因為一切頭生的（連人帶牲畜）都屬神，自擊殺埃及頭生之日分別為聖歸神（8:17）。利未人作為贖價替代品，完全歸給神，再賞賜給亞倫父子事奉（8:19）。
development: 埃及擊殺頭生→頭生歸神→利未人代替頭生→利未人歸神→賞賜給祭司事奉，構成代贖神學的完整邏輯鏈。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人是從以色列人中全然給神的，揀選他們代替以色列人中一切頭生的，因一切頭生的都是神的（8:16-18）。
  relation: 本章利未人身分與歸屬的神學基石，解釋為何利未人完全屬神並被賞賜給祭司。
