name: 利未人代替長子
type: 神學
secondary_types: []
aliases:
- 利未人取代長子
- 利未人贖長子
status: formal
definition: 耶和華揀選利未人從以色列人中全然給祂，代替以色列人中一切頭生的（民8:16, 18）。因為以色列人中一切頭生的，連人帶牲畜，都是耶和華的；在埃及擊殺一切頭生的那天，將他們分別為聖歸神（民8:17）。神將利未人當作賞賜給亞倫和他的兒子，在會幕中辦以色列人的事，又為以色列人贖罪，免得他們挨近聖所有災殃（民8:19）。此神學宣示確立利未人職分的救贖基礎：逾越節拯救的長子歸神，神以利未人代替，彰顯「贖買與代贖」的雙重恩典。
development: 此教義回溯出埃及記13:2, 11-16（長子歸神）與民數記3:11-13, 40-51（利未人代替長子），預表基督作「首生的」（西1:15,
  來1:6）代替萬民，並將教會作「長子的教會」（來12:23）獻給父神。
accumulations:
- book: 民數記
  chapter: 8
  summary: 神宣告利未人代替以色列一切頭生的歸祂，作賞賜給亞倫家，在會幕事奉並為民贖罪，免遭災殃。
  relation: 本章神學高峰（16-19節），將利未人職分建立在逾越節救贖與神主權揀選之上。
