name: 退下
type: 主題
secondary_types: []
aliases:
- 停工退任
status: formal
definition: 指利未人到了五十歲必須停止重擔的會幕事奉（如搬運、拆架等勞力工作），不再辦理原本的事務，轉為利未人任職年歲規定的終點（民8:25）。
development: 耶和華規定利未人從二十五歲任職，五十歲退下（v.24-25）。「退下」並非完全離開會幕，而是職務性質改變：從「辦事」轉為「伺候、謹守所吩咐的」（v.26），體現事奉階段的調適與傳承。
accumulations:
- book: 民數記
  chapter: 8
  summary: 規定利未人五十歲停工退任，不再辦事，轉為輔助弟兄謹守吩咐。
  relation: 本章利未人任職年歲條例的下限，顯示神對事奉者體力與職務的體恤，並安排退休後的輔助角色。
