name: 免得遭災
type: 神學
secondary_types: []
aliases:
- 免得有災殃
- 避免審判
status: formal
definition: 耶和華設立利未人事奉制度，目的是「免得以色列人挨近聖所，有災殃臨到他們中間」（民 8:19）。顯示聖潔神與罪人之間需要中保事奉體系，否則擅闖聖所必招致死亡審判。
development: 本章將利未人作為神賜給亞倫祭司的賞賜，在會幕辦事、為以色列人贖罪（民 8:19），形成「利未人代替百姓承擔聖所危隬」的神學邏輯。
accumulations:
- book: 民數記
  chapter: 8
  summary: 神將利未人賞賜給亞倫，在會幕辦事、為以色列人贖罪，免得百姓挨近聖所遭災殃。
  relation: 為利未人制度設立的神學理由，連結贖罪、聖所、審判等核心主題。
