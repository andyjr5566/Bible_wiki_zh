name: 看守所吩咐的
type: 主題
secondary_types: []
aliases:
- 謹守所吩咐的
- 伺候謹守吩咐
status: formal
definition: 指已退下（五十歲以上）的利未人，雖不再辦理會幕重工，仍須留在會幕裡，與弟兄一同伺候，專心謹守遵行耶和華所吩咐的一切規條（民8:26）。強調事奉雖分階段，但順服與看守聖所職責不因年齡而廢。
development: 經文對比「辦事」（v.24-25）與「伺候、謹守所吩咐的」（v.26），前者指具體勞務，後者指屬靈秩序的維護與協助。退下的利未人以經驗輔助現任者，確保會幕運作符合神的吩咐。
accumulations:
- book: 民數記
  chapter: 8
  summary: 退下的利未人在會幕裡幫助弟兄，謹守所吩咐的，不再辦事。
  relation: 本章利未人條例的總結性規定，顯示事奉的連續性：從積極辦事轉為被動看守吩咐，同樣屬於歸給耶和華的事奉。
