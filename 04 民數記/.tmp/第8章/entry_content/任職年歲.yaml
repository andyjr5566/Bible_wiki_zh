name: 任職年歲
type: 主題
secondary_types: []
aliases:
- 任職年歲
status: formal
definition: 規定利未人從二十五歲以外前來任職，辦會幕的事（民8:24）；到了五十歲要停工退任，不再辦事（8:25）。這設定了利未人事奉的起始與結束年齡界限。
development: 二十五歲開始→五十歲退下→退休後輔助看守，構成利未人事奉年齡的完整規範。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人二十五歲以外任職，五十歲停工退任（8:24-25）。
  relation: 本章利未人條例的結尾部分，規定事奉的年齡資格與界限。
