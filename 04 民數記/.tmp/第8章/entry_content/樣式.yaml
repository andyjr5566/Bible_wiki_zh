status: formal
definition: 指神指示摩西製造燈臺的具體圖樣與規格。民數記 8:4 記載「摩西製造燈臺，是照耶和華所指示的樣式」，強調會幕器具製作須完全遵循神的啟示藍圖。
development: 本章將燈臺的「樣式」與「錘出的做法」並列，顯示神聖器具的製造不容人意更改。
accumulations:
- book: 民數記
  chapter: 8
  summary: 摩西照耶和華指示的樣式製造燈臺，連座帶花皆為錘出的金子。
  relation: 樣式為燈檯條目之依據，亦為會幕一切器具製作的神學原則。
