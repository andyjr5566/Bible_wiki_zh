name: 進入會幕前
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指利未人經過潔淨禮（彈除罪水、剃全身毛、洗衣服）並獻上贖罪祭與燔祭、經亞倫作搖祭奉給耶和華後，被准許進入會幕在亞倫和他兒子面前辦事的行動與狀態（民8:9,
  15, 22）。這標誌著利未人正式開始代替以色列頭生的歸耶和華、在會幕中事奉的職分。
development: 經文記載利未人被奉到會幕前（v.9）、潔淨後進去辦會幕的事（v.15）、實際進去在亞倫面前辦事（v.22），顯示「進入會幕前」是潔淨、奉獻、搖祭程序完成後的結果，且有嚴格秩序：先在會眾面前、後在耶和華面前、再在祭司面前。
