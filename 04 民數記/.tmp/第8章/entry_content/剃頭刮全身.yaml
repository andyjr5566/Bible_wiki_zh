name: 剃頭刮全身
type: 主題
secondary_types: []
aliases:
- 全身剃毛
- 利未人剃毛禮
status: formal
definition: 潔淨利未人時，叫他們用剃頭刀刮全身（民8:7）。此儀式象徵除去舊有污穢、完全更新，類似拿細耳人結願剃髮（民6:18）與麻風病人潔淨剃毛（利14:8-9）。利未人剃盡全身毛髮，洗衣服，潔淨自己，表示由內而外的分別為聖，預備進入神的聖工。
development: 剃毛儀式在聖經多表「徹底更新、歸零重來」（賽7:20, 林前11:6），預表信徒脫去舊人、穿上新人（弗4:22-24, 西3:9-10），以潔淨生命事奉主。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人潔淨儀式要求用剃頭刀刮全身，配合洗衣服、除罪水，完成分別為聖程序。
  relation: 本章潔淨條例（7節）的核心動作，象徵利未人生命徹底更新、配得聖職。
