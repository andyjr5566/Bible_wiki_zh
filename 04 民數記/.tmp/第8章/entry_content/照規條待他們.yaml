- 依條例待之
status: formal
definition: 指摩西、亞倫與以色列全會眾完全遵照耶和華吩咐摩西關於利未人的一切規條辦理（民 8:20, 22）。「規條」涵蓋選出、潔淨、獻祭、搖祭、任職年歲等全套條例。
development: 本章以「以色列人就向他們這樣行」（民 8:20）與「耶和華指著利未人怎樣吩咐摩西，以色列人就怎樣向他們行了」（民 8:22）雙重見證，強調順服神話語的典範。
accumulations:
- book: 民數記
  chapter: 8
  summary: 摩西、亞倫、以色列全會眾照耶和華吩咐摩西的一切規條向利未人行，完全順服。
  relation: 為本章結語，總結利未人潔淨歸神全過程的順服實踐，呼應開頭的神吩咐。
