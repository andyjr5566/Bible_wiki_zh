status: formal
definition: 民數記第8章規定利未人潔淨禮儀中須獻上的贖罪祭牲。經文指示取一隻公牛犢作贖罪祭（第8、12節），利未人按手在牛頭上，由亞倫獻上為利未人贖罪，使他們潔淨能事奉耶和華。
development: 本章作為利未人分別為聖程序的核心環節，公牛犢贖罪祭與公牛犢燔祭雙重獻祭，完成利未人「潔淨、贖罪、搖祭」三階段儀式，確立利未人代替以色列頭生子歸耶和華的神學基礎。
