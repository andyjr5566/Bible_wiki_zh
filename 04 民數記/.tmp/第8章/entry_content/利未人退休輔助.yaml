name: 利未人退休輔助
type: 主題
secondary_types: []
aliases:
- 利未人退休輔助
status: formal
definition: 規定利未人五十歲退下不再辦重工，但仍可在會幕裡和弟兄一同伺候，謹守所吩咐的（民8:25-26）。體現事奉的年齡界限與退休後仍參與看守職責的安排。
development: 從二十五歲任職、五十歲退任，到退休後轉為輔助性看守，形成完整的利未人事奉生命週期。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人五十歲停工退任，不再辦事，只要在會幕裡和弟兄一同伺候，謹守所吩咐的（8:25-26）。
  relation: 本章利未人任職條例的尾聲，規定退休後的輔助角色。
