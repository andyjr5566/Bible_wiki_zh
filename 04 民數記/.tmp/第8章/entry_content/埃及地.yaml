    summary: "神宣告在埃及地擊殺一切頭生的那天，已將以色列人一切頭生的分別為聖歸給祂。"
    relation: "提及神在埃及地擊殺長子的歷史事件，作為揀選利未人代替首生子歸給神的法理依據。"
