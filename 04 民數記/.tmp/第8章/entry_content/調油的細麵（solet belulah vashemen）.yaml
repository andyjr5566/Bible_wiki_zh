name: 調油的細麵（solet belulah vashemen）
type: 原文
secondary_types: []
aliases:
- 調油細麵
status: formal
definition: 希伯來文 solet belulah vashemen（סֹלֶת בְּלוּלָה בַשֶּׁמֶן），意指「調油的細麵」。民數記第8章第8節規定利未人潔淨禮儀中，與公牛犢同獻的素祭須用「調油的細麵」，作為贖罪祭與燔祭的配搭獻祭。
development: 本章作為利未人分別為聖儀式的素祭材料，調油的細麵與公牛犢贖罪祭、燔祭共同構成完整獻祭系統，體現「素祭配搭獻祭」的利未記獻祭邏輯在利未人就職禮中的應用。
