name: 完全給我
type: 神學
secondary_types: []
aliases:
- 全然歸我
- 完全屬神
status: formal
definition: 耶和華宣告利未人「是從以色列人中全然給我的」（民 8:16），強調利未人的生命與事奉完全屬於神，非屬自己或百姓，乃神主動揀選、代替頭生而得。
development: 本章三次重申利未人歸神（民 8:14, 16, 18），神學意義在於「代替頭生」（民 8:16-18）與「作搖祭歸神」（民 8:11, 13,
  15, 21），確立利未人事奉的神聖所有權基礎。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人從以色列人中全然給神，代替一切頭生的，歸耶和華為聖。
  relation: 為利未人事奉身分的神學根基，貫穿潔淨、獻祭、搖祭、任職年歲等條例。
