name: 公牛犢燔祭
type: 主題
secondary_types: []
aliases:
- 公牛燔祭
- 利未人燔祭
status: formal
definition: 潔淨利未人時，要取一隻公牛犢，並同獻的素祭，就是調油的細麵（民8:8）。利未人按手在牛頭上，將一隻作燔祭獻給耶和華（民8:12）。燔祭完全焚燒於壇上，馨香氣歸耶和華，象徵利未人完全獻上自己、毫無保留地事奉神。配搭調油細麵素祭，表達生命與勞苦的奉獻。
development: 燔祭為最高等級獻祭（利1章），預表基督完全順服至死（腓2:8, 弗5:2），也預表信徒將身體獻上當作活祭（羅12:1）。利未人獻燔祭確立其事奉的奉獻基調。
accumulations:
- book: 民數記
  chapter: 8
  summary: 利未人潔淨禮中獻一隻公牛犢作燔祭，配調油細麵素祭，利未人按手其上，象徵完全獻上。
  relation: 本章潔淨條例（8, 12節）的獻祭核心，與贖罪祭雙雙為利未人贖罪、分別為聖。
