definition: 民數記第8章記載的會幕內金燈臺，亞倫照耶和華吩咐點燈，使七盞燈向燈臺前面發光（第1-3節）。燈臺是用金子錘出來的，連座帶花都是錘出的，摩西製造是照耶和華所指示的樣式（第4節）。
development: 本章開啟利未人事奉前的燈光條例，強調「向前發光」的方向性與「照樣式」的順服性，為後續利未人在會幕中事奉鋪陳聖所光照的神學背景。
