status: formal
definition: 指用除罪水灑在利未人身上作潔淨禮儀潔淨的一部分（民 8:7）。希伯來動詞 נָזָה (nazah) 多用於祭牲血灑在壇上或灑水潔淨。
development: 本章作為潔淨利未人條例的第一步，緊接著剃毛、洗衣、洗身（民 8:7）。
accumulations:
- book: 民數記
  chapter: 8
  summary: 潔淨利未人時，用除罪水彈在他們身上。
  relation: 屬於潔淨利未人條例的起始儀式，預備利未人能在會幕前辦事。
