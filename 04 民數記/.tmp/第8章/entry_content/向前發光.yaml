name: 向前發光
type: 主題
secondary_types: []
aliases:
- 向前發光
status: formal
definition: 點燈時七盞燈要向燈臺前面發光（民8:2-3），意指光照方向朝向聖所前方（陳設餅桌一側），象徵神的光照引導與同在覆庇會幕事奉。
development: 神吩咐→亞倫遵行→燈臺樣式說明，三步驟確立點燈方向的規條性與神學意義。
accumulations:
- book: 民數記
  chapter: 8
  summary: 點燈時七盞燈都要向燈臺前面發光，亞倫便這樣行，使燈向前發光，照耶和華所吩咐摩西的（8:2-3）。
  relation: 本章燈臺單元的核心動作規定，強調順服與光照方向的神聖意義。
