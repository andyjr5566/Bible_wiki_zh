name: 利未人歸耶和華
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記第8章宣告利未人屬於耶和華的神學宣告。神揀選利未人代替以色列一切頭生的（第16-18節），將利未人從以色列人中分別出來歸給祂自己（第14節），並當作賞賜給亞倫和他兒子在會幕中事奉（第19節）。
development: 此神學主題貫穿本章：從潔淨儀式（5-13節）到神學宣告（14-19節）再到順服執行（20-22節），確立利未人「完全給我」「代替長子」「在會幕前辦事」「免得遭災」的四重神學意義。
