status: formal
definition: 民數記第8章記載神吩咐摩西從以色列人中選出利未人來潔淨他們（第5-6節），作為分別為聖歸耶和華的起始動作。此選出非單純挑選，乃神主權揀選（第16、18節）的執行。
development: 選出利未人啟動整章潔淨、按手、搖祭、贖罪、歸神的完整程序，體現「神揀選、人順服、祭司執行」的三方互動模式，為利未人職任奠定群體基礎。
