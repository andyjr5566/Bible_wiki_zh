- 贖罪水
status: formal
definition: 潔淨利未人時，要用除罪水彈在他們身上（民8:7）。此水可能指民數記19章紅母牛灰燼調和的潔淨水（民19:9, 17），用於除去污穢、潔淨不潔之人。在此語境中，作為利未人分別為聖儀式的第一步，象徵內在污穢被洗淨，預備承接聖職。
development: 除罪水預表基督的寶血與聖靈的洗（來9:13-14, 弗5:26, 提前3:5-6），新約信徒藉著道與靈的潔淨，得以事奉活神。
accumulations:
- book: 民數記
  chapter: 8
  summary: 潔淨利未人儀式中，用除罪水彈在他們身上，作為潔淨程序的起始步驟。
  relation: 本章潔淨條例（7節）的首要元素，連結民19章紅母牛條例與利未人分別為聖。
