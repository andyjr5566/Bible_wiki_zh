name: 幫助弟兄
type: 主題
secondary_types: []
aliases:
- 幫助弟兄
status: formal
definition: 五十歲退休的利未人雖不再辦重工，但要在會幕裡和他們的弟兄一同伺候，謹守所吩咐的（民8:26）。體現退休後轉為輔助、看守、傳承的角色，維持會幕秩序與事奉連續性。
development: 從主要事奉者→退休輔助者，角色轉換但仍屬會幕事奉體系，強調代際合作與職責傳承。
accumulations:
- book: 民數記
  chapter: 8
  summary: 退休利未人在會幕裡和弟兄一同伺候，謹守所吩咐的，不再辦事（8:26）。
  relation: 本章利未人條例的最後一節，定義退休後的具體輔助內容。
