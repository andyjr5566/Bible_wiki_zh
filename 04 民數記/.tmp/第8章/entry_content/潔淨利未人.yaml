name: 潔淨利未人
type: 主題
secondary_types: []
aliases:
- 潔淨利未人
status: formal
definition: 耶和華吩咐從以色列人中選出利未人潔淨他們（民8:6-7），程序包括：用除罪水彈在他們身上、剃頭刮全身、洗衣服、潔淨自己（8:7）；隨後獻公牛犢贖罪祭與燔祭、按手、作搖祭（8:8-13）。完成後利未人得以進入會幕辦事（8:15,
  22）。
development: 選出→潔淨儀式（水、剃髮、洗衣）→獻祭贖罪→按手認同→搖祭歸神→進入事奉，形成完整的分別為聖流程。
accumulations:
- book: 民數記
  chapter: 8
  summary: 耶和華吩咐潔淨利未人：除罪水彈、剃頭刮全身、洗衣服；獻公牛犢贖罪祭與燔祭、按手、作搖祭；潔淨後進入會幕辦事（8:6-15, 21-22）。
  relation: 本章核心敘事主體，詳述利未人分別為聖的完整條例。
