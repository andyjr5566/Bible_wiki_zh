organization: '### 點燈的法則與燈臺的啟示（v1-4）


  耶和華在會幕中曉諭[[摩西]]，指示他告訴大祭司[[亞倫]]關於點燈的法則（v1-2）。神吩咐：「點燈的時候，七盞燈都要向燈臺前面發光。」（v2）。這燈臺是用精金錘出來的，連座帶花都是錘出來的，完全是照著耶和華在西奈山上所指示的樣式製造的（v4）。


  [[亞倫]]完全遵照耶和華的吩咐行事，點燃了燈臺上的燈，使燈向前發光（v3）。在屬靈的意義上，這七盞燈代表了神完全的光照，而燈臺則預表了基督與教會發光照耀。燈光向前照射，不僅照亮了聖所，更光照了對面的陳設餅桌子，象徵神生命的光不斷地照耀著十二支派，使屬神子民時刻活在神的臉光之中。事奉神的人，必須在基督全備生命的光中事奉。


  ### 潔淨與奉獻利未人歸神（v5-15）


  接著，耶和華指示[[摩西]]，要從[[以色列|以色列人]]中選出[[利未支派|利未人]]，並將他們潔淨（v5-6）。潔淨的儀式包含三個步驟：首先，用除罪水彈在他們身上，以洗淨罪污；其次，用剃頭刀刮全身的細毛，預表徹底對付天然的肉體；最後，洗淨衣服，使自己完全聖潔（v7）。


  完成潔淨後，要獻上祭物。利未人要取一隻公牛犢作燔祭，並同獻調油的細麵作素祭；另取一隻公牛犢作贖罪祭（v8）。[[以色列|以色列人]]全會眾聚集在會幕前，將利未人奉到耶和華面前，並由首領代表在利未人頭上按手（v9-10）。這按手的動作，表徵了以色列人與利未人的完全聯合。


  隨後，[[利未支派|利未人]]也要按手在那兩隻牛的頭上，使祭牲代替他們，獻上贖罪祭與燔祭，為利未人贖罪（v12）。[[亞倫]]將利未人當作搖祭奉獻給神，使他們站在復活的地位上，專心辦理耶和華的事（v11,
  13）。這樣，利未人就被正式分別出來歸神，進去辦理會幕的事（v14-15）。


  ### 利未人的替代、職責與年齡限制（v16-26）


  神宣告，利未人是從以色列人中全然歸祂的。耶和華揀選利未人，是為了代替以色列人中一切頭生的（v16）。神回顧了逾越節的歷史：「我在[[埃及地]]擊殺一切頭生的那天，將他們分別為聖歸我。」（v17）。因此，所有頭生的都屬乎神，而神以利未人來替代他們（v18）。


  神將利未人當作賞賜給[[亞倫]]和他的兒子，在會幕中辦理以色列人的事，又為以色列人贖罪，免得百姓違規挨近[[聖所]]而遭遇災殃（v19）。摩西、亞倫與全會眾完全遵行神的吩咐，利未人潔淨自己，除了罪，便進入會幕辦事（v20-22）。


  最後，神定規了利未人服事的年限。從二十五歲以外，他們要前來任職，辦理會幕的事（v24）；到了五十歲，則要停工退任，不再辦事（v25）。退任後，他們只需在會幕裡與弟兄一同伺候，謹守所吩咐的（v26）。這象徵著屬靈生命需要長進成熟才能獨立事奉，而到了晚年則轉入生命與守望的服事，成全後進。'
