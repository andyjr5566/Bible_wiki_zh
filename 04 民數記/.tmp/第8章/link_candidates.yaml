book: 民數記
chapter: 8
candidates:
- name: 耶和華
  type: 人物
- name: 摩西
  type: 人物
- name: 亞倫
  type: 人物
- name: 以色列人
  type: 人物
- name: 利未人
  type: 人物
  evidence: v6-26，神揀選利未人代替以色列人一切頭生的，歸給神辦會幕的事。CT：利未人代表所有信徒被神分別出來服事。GT：利未人的奉獻與潔淨。KC：Levites
    represent believers completely dedicated to God.
  surfaces:
  - 利未人
- name: 燈臺
  type: 主題
  evidence: v1-4，點燈的時候，七盞燈都要向燈臺前面發光，用金子錘出來的。CT：燈臺預表基督是世界的光，也預表教會作為金燈臺發光。GT：光照在神面前。KC：The
    lampstand signifies Christ and His church shining the divine light.
  surfaces:
  - 燈臺
- name: 除罪水
  type: 主題
  evidence: v7，潔淨利未人時，用除罪水彈在他們身上。CT：預表基督流血和聖靈的洗淨。GT：對付外面的罪污。KC：Water of purifying
    represents the washing of water by the Word.
  surfaces:
  - 除罪水
- name: 剃頭刀
  type: 主題
  evidence: v7，用剃頭刀刮全身。CT：預表對付肉體和天然的生命。
  surfaces:
  - 剃頭刀
- name: 素祭(minchah)
  type: 原文
  evidence: v8，同獻的素祭，調油的細麵。CT：預表基督完美無瑕的為人生活。
  surfaces:
  - 素祭
- name: 贖罪祭
  type: 神學
  evidence: v8, 12，一隻公牛犢作贖罪祭，為利未人贖罪。CT：對付罪性。
  surfaces:
  - 贖罪祭
- name: 燔祭(olah)
  type: 原文
  evidence: v12，一隻作燔祭。CT：完全奉獻給神。
  surfaces:
  - 燔祭
- name: 搖祭(tenufah)
  type: 原文
  evidence: v11, 13, 15, 21，將利未人當作搖祭奉給耶和華。CT：搖祭預表復活的生命。利未人如同死而復活獻給神。GT：搖祭是在神面前搖一搖。
  surfaces:
  - 搖祭
- name: 按手(samak)
  type: 神學
  evidence: v10, 12，以色列人按手在利未人頭上，利未人按手在牛頭上。CT：按手代表聯合（identification）和聯合。以色列人與利未人聯合，利未人與祭牲聯合。
  surfaces:
  - 按手
- name: 埃及地
  type: 地點
  evidence: v17，神在埃及地擊殺一切頭生的那天，將他們分別為聖。
  surfaces:
  - 埃及地
- name: 會幕
  type: 地點
  evidence: v15, 19, 22, 24, 26，利未人進去辦會幕的事。
  surfaces:
  - 會幕
- name: 潔淨(maqom tahor)
  type: 神學
  evidence: v6, 7, 15, 21，潔淨利未人。CT：事奉神的人必須先得潔淨。
  surfaces:
  - 潔淨
  - 潔淨自己
- name: 聖所
  type: 地點
  evidence: v19，免得他們挨近聖所，有災殃臨到他們中間。
  surfaces:
  - 聖所
