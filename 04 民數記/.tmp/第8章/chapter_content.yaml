organization: "### 金燈臺點燈條例（v1-4）\n耶和華吩咐[[摩西]]轉告[[亞倫]]：點燈時[[七盞燈]]都要[[向前發光]]，照亮[[金燈臺|燈臺]]前面。這[[金燈臺]]是用純金錘出的（原文\
  \ *mikshah*），連座帶花一體成形，完全照[[樣式]]——即神在山上指示摩西的天上原型。[[亞倫]]順服執行，彰顯祭司在聖所中維持光照的責任，也預表神的同在恆常照耀祂的子民。這段經文確立了[[燈臺點燈條例]]，使聖所內的光永不熄滅。\n\
  \n### 潔淨利未人與分別為聖（v5-22）\n神指示[[摩西]]從[[以色列全會眾]]中[[選出利未人]]，按[[潔淨利未人條例]]使他們潔淨：用[[除罪水]]（mei\
  \ chatta't）[[彈]]在他們身上，叫他們[[剃頭刮全身]]、洗衣服。隨後獻上兩隻公牛犢：一隻作[[公牛犢贖罪祭]]，一隻作[[公牛犢燔祭]]，同獻[[調油的細麵（solet\
  \ belulah vashemen）]]。[[以色列全會眾]]聚集會幕前，按手在利未人頭上（轉移認同）；[[亞倫]]將利未人作[[利未人作搖祭|搖祭]]奉給耶和華，象徵他們完全歸神、在聖所前[[在會幕前辦事]]。[[亞倫和他兒子（祭司）]]再為他們贖罪，利未人才得以[[進入會幕前]]事奉。整個流程嚴謹有序，體現[[潔淨利未人]]的聖潔標準。\n\
  \n> [!important] 核心神學：利未人代替長子\n> 神宣告：「利未人是從以色列人中全然給我的，我揀選他們歸我，是[[代替長子]]」（v16-18）。因神在埃及擊殺長子之夜，將以色列一切[[頭生]]（人與牲畜）[[歸神|分別為聖歸我]]。如今[[利未人代替長子]]，成為[[完全給我]]的群體，[[為以色列人贖罪]]，[[免得遭災]]（v19）。這是「贖買」神學的制度化體現，也奠定[[利未人歸耶和華]]的身分基礎。\n\
  \n### 利未人任職年歲與退休輔助（v23-26）\n服役年齡設定為 **25-50 歲**（v24-25），即[[利未人任職年歲]]／[[任職年歲]]。滿五十歲[[退下]]，不再承擔重工，但仍留在會幕裡[[幫助弟兄]]、[[看守所吩咐的]]（mishmeret），屬靈經驗轉化為輔助與教導。這[[利未人退休輔助]]機制兼顧體力現實與屬靈傳承，顯示神對事奉生命週期的關懷。\n\
  \n```mermaid\nflowchart TD\n  A[神吩咐摩西] --> B[亞倫點燈：七盞燈向前發光]\n  A --> C[潔淨利未人：除罪水、刮身、洗衣]\n\
  \  C --> D[獻祭：贖罪祭+燔祭+素祭]\n  D --> E[會眾按手、亞倫搖祭]\n  E --> F[利未人歸耶和華、代替長子]\n  F -->\
  \ G[進入會幕事奉、為民贖罪]\n  G --> H[25-50歲任職、50歲退休輔助]\n```\n\n### 跨章脈絡：從聖所光照到事奉群體\n本章承接第\
  \ 7 章獻壇禮，轉向聖所內部運作：[[燈臺點燈條例]]維持光照，[[潔淨利未人]]建立事奉人員。利未人[[利未人歸耶和華|完全歸神]]、[[代替長子]]，成為[[贖罪]]管道，保護百姓[[免得遭災]]。年齡制度（25/50\
  \ 歲）與[[利未人退休輔助]]機制，顯示神對事奉生命週期的關懷。[[以色列人順服]]「凡耶和華吩咐的……就向他們這樣行」（v20,22），成為曠野旅程中順服的典範。"
