  evidence: 民28:1-8 耶和華曉諭摩西吩咐以色列人：每日獻兩隻一歲無殘疾公羊羔為常獻燔祭，一隻在早晨，一隻在黃昏，配細麵伊法十分之一調油、奠酒祭欣一欣。這是在西乃山所立定、作為耶和華馨香火祭的常獻燔祭。丁良才：常獻燔祭表徵基督作神悅納的祭，也是信徒每日獻上自己為活祭（羅12:1）。
