  - phrase: 公山羊贖罪祭
  target_path: link_folder/事件/月朔獻祭.md
- name: 逾越節與無酵節獻祭
  suggested_type: 事件
  evidence: 民28:16-25 正月十四日是耶和華的逾越節，十五日無酵節吃無酵餅七天。首日、第七日聖會、不作工。獻公牛犢二、公綿羊一、羊羔七（無殘疾），配細麵調油、奠酒祭；另獻公山羊贖罪祭。七日每日獻同樣火祭，第七日聖會。丁良才：逾越節預表基督作逾越羊被殺（林前5:7），無酵節預表除去舊酵（惡毒、邪惡）誠實真正（林前5:8）。
  surfaces:
