- name: 月朔獻祭
  suggested_type: 事件
  evidence: 民28:11-15 每月朔獻兩隻公牛犢、一隻公綿羊、七隻一歲公羊羔（皆無殘疾），配細麵調油：公牛犢伊法十分之三、公綿羊伊法十分之二、羊羔伊法十分之一；奠酒祭：公牛犢半欣、公綿羊三分之一欣、羊羔四分之一欣。另獻一隻公山羊為贖罪祭。丁良才：月朔獻祭預表新約信徒按月更新獻上自己（羅12:1）。
  surfaces:
