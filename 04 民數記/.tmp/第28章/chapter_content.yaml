organization: '### 每日常獻燔祭（v1-8）

  耶和華吩咐摩西，要以色列人按日期獻上「我的供物、我的食物、作馨香火祭的食物」（v2）。核心是[[每日常獻燔祭|每日常獻燔祭]]：早晚各獻一隻一歲無殘疾的公羊羔，配以伊法十分之一細麵、欣四分之一搗成的油調和的[[素祭與奠酒祭（minchah
  與 nesekh）|素祭]]，並奠酒欣四分之一（v3-7）。這在西乃山已命定，為「常獻的燔祭，是獻給耶和華為馨香的火祭」（v6, 8）。[[馨香火祭（isheh
  reyach nichoach）|馨香火祭]]一詞重複出現，強調祭物蒙悅納的氣息。


  ### 安息日加倍獻祭（v9-10）

  當[[安息日獻祭|安息日]]，在常獻燔祭之外，再獻兩隻公羊羔，素祭加倍為伊法十分之二，奠酒同增。這[[安息日加倍獻祭預表安息|安息日加倍獻祭預表安息]]，彰顯安息日的特殊聖別——神的子民在安息中獻上雙倍的敬拜，預表基督作我們永恆的安息。


  ### 月朔獻祭（v11-15）

  每[[月朔獻祭|月朔]]獻兩隻公牛犢、一隻公綿羊、七隻公羊羔，素祭依序為伊法十分之三、十分之二、十分之一；奠酒分別為半欣、欣三分之一、欣四分之一（v12-14）。另獻一隻[[公山羊贖罪祭（se''ir
  izzim）|公山羊贖罪祭]]，在常獻燔祭以外（v15）。月朔標誌新月開始，[[月朔獻祭預表更新|月朔獻祭預表更新]]，提醒百姓在時間的循環中常常歸向神。


  ### 逾越節與無酵節獻祭（v16-25）

  正月十四日為[[逾越節與無酵節獻祭|逾越節]]，十五日起吃無酵餅七日（v16-17）。首日、第七日皆有[[聖會不作工（miqra'' qodesh lo ta''asu
  melakha）|聖會不作工]]（v18, 25）。七日每日獻兩公牛、一公羊、七羊羔，素祭奠酒同月朔例，另獻一公山羊贖罪（v19-24）。這[[逾越節無酵節預表基督與聖潔|逾越節無酵節預表基督與聖潔]]：羔羊的血遮蓋，無酵餅象徵除去罪惡的酵，七日獻祭指向完全的救贖。


  ### 七七節（初熟節）獻祭（v26-31）

  七七節獻新素祭，當有[[聖會不作工（miqra'' qodesh lo ta''asu melakha）|聖會不作工]]（v26）。獻祭內容同逾越節：兩公牛、一公羊、七羊羔，素祭奠酒同例，另獻一公山羊贖罪（v27-30）。這[[七七節預表聖靈澆灌|七七節預表聖靈澆灌]]——五旬節聖靈澆灌正是在這節期，初熟的禾捆預表教會作初熟果子。


  | 節期/時段 | 公牛 | 公羊 | 羊羔 | 素祭(伊法) | 奠酒(欣) | 贖罪祭 |

  |-----------|------|------|------|------------|----------|--------|

  | 每日常獻 | — | — | 2(早晚各1) | 1/10 | 1/4 | — |

  | 安息日(加倍) | — | — | 2 | 2/10 | 1/2 | — |

  | 月朔 | 2 | 1 | 7 | 3/10, 2/10, 1/10 | 1/2, 1/3, 1/4 | 1公山羊 |

  | 逾越節/無酵節(每日) | 2 | 1 | 7 | 同上 | 同上 | 1公山羊 |

  | 七七節 | 2 | 1 | 7 | 同上 | 同上 | 1公山羊 |


  ### 跨章脈絡與預表整理

  本章建立以色列敬拜的**時間聖架構**：每日→每週→每月→每年三大節期。[[常獻燔祭預表基督|常獻燔祭預表基督]]作「神羔羊，除去世人罪孽的」（約1:29），早晚不斷指向基督一次獻上永遠成聖（來10:10-14）。[[素祭與奠酒祭（minchah
  與 nesekh）|素祭與奠酒祭]]表達獻祭者全人獻上——細麵為生命果子，油為聖膏，酒為喜樂奔流。[[伊法、欣、羅馬度量衡（ephah, hin, Roman
  measures）|度量衡]]的精確（伊法≈22公升，欣≈3.7公升）顯示神對敬拜細節的看重。每逢節期必加獻[[公山羊贖罪祭（se''ir izzim）|公山羊贖罪祭]]，提醒：沒有流血就沒有赦免（來9:22），也預表基督作贖罪祭（羅8:3）。[[聖會不作工（miqra''
  qodesh lo ta''asu melakha）|聖會不作工]]重複七次，核心神學是「停工敬拜」——生命不在勞碌，而在於仰望供應者。'
