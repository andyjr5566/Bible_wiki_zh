name: 月朔獻祭預表更新
type: 神學
secondary_types: []
aliases:
- 月朔獻祭神學
- 新月獻祭預表更新
status: formal
definition: 神學觀點認為民數記 28 章 11-15 節月朔獻祭規模最大（兩公牛、一公羊、七羊羔、公山羊贖罪祭），預表在基督裡「舊事已過，都變成新的了」（林後
  5:17），每月朔以豐盛獻祭開啟新月份，象徵信徒在基督裡不斷經歷屬靈更新；贖罪祭公山羊（15 節）預表基督贖罪使更新成為可能。
development: 經文詳細規定月朔獻祭牲畜數量最多、素祭奠祭分級最全（11-14 節），並特設贖罪祭（15 節），形成「更新」的完整神學圖景：豐盛獻上（燔祭）、生命供應（素祭）、喜樂奉獻（奠祭）、罪得赦免（贖罪祭）。
accumulations:
- book: 民數記
  chapter: 28
  summary: 月朔獻祭牲畜最多、素祭奠祭分級最全，另加公山羊贖罪祭，均在常獻燔祭外（11-15 節），預表在基督裡的屬靈更新。
  relation: 本章定期獻祭中規模最大者，以豐富層次預表新造生命的持續更新。
