name: 安息日加倍獻祭預表安息
type: 神學
secondary_types: []
aliases:
- 安息日獻祭預表安息
- 安息日燔祭神學
status: formal
definition: 神學觀點認為民數記 28 章 9-10 節安息日獻兩隻羊羔（加倍於每日一隻），預表基督完成救贖後進入榮耀安息（來 4:9-10），信徒在基督裡享受屬靈安息；素祭加倍（伊法十分之二）預表基督豐盛生命供應；「在常獻燔祭以外」指出安息建立在基督救贖根基上。
development: 經文以「加倍」獻祭（9 節）與「在常獻燔祭以外」（10 節）為特徵，對應新約「安息日是為人設立的」（可 2:27）與「基督是安息日的主」（太
  12:8），安息日獻祭預表在基督裡得享真安息。
accumulations:
- book: 民數記
  chapter: 28
  summary: 安息日獻兩隻羊羔、素祭加倍，在常獻燔祭外另行獻上（9-10 節），預表基督裡的豐盛安息。
  relation: 以每日常獻燔祭為根基，安息日加倍獻祭指向救贖完成後的安息實質。
