name: 常獻燔祭預表基督
type: 神學
secondary_types: []
aliases:
- 每日燔祭預表基督
- 常獻燔祭基督論
status: formal
definition: 神學觀點認為民數記 28 章 3-8 節每日早晚常獻燔祭，預表基督作為神羔羊（約 1:29），一次獻上永遠成聖（來 10:10, 14），卻又如早晚獻祭般持續為信徒代求（來
  7:25），其無殘疾（3 節）預表基督無罪（彼前 1:19），馨香火祭（6, 8 節）預表基督獻祭蒙神悅納（弗 5:2）。
development: 本章以每日常獻燔祭為開端（3-8 節），並反覆強調後續所有獻祭均「在常獻燔祭以外」（10, 15, 23-24, 31 節），神學上對應基督一次成就的救贖為根基，信徒生活與事奉在此根基上建造。
accumulations:
- book: 民數記
  chapter: 28
  summary: 每日早晚獻無殘疾羊羔為馨香火祭（3-8 節），作為所有獻祭基準（10, 15, 23-24, 31 節），預表基督完全救贖與持續代求。
  relation: 本章獻祭體系的神學核心，指向基督獻祭的一次成就與永遠功效。
