name: 逾越節與無酵節獻祭
type: 事件
secondary_types: []
aliases:
- 逾越節獻祭
- 無酵節獻祭
- 逾越節無酵節燔祭
status: formal
definition: 指民數記 28 章 16-25 節規定，正月十四日逾越節，十五日起守無酵節七日；首日、第七日有聖會、不作工。七日內每日獻兩公牛、一公羊、七羊羔為燔祭，素祭奠祭分級同月朔，另獻公山羊贖罪祭；均在早晨常獻燔祭以外。這將出埃及記
  12 章家庭逾越節擴展為聖所公共獻祭體系。
development: 經文將逾越節（16 節）與無酵節（17-25 節）連貫，強調七日每日同樣獻祭（24 節），首尾聖會不作工（18, 25 節），並反覆指出「在常獻的燔祭以外」（23-24
  節），形成節期獻祭的完整單元。
accumulations:
- book: 民數記
  chapter: 28
  summary: 規定逾越節、無酵節七日獻祭：每日兩公牛、一公羊、七羊羔，素祭奠祭分級，另加公山羊贖罪祭，首尾聖會不作工，均在常獻燔祭外（16-25 節）。
  relation: 本章首個年度節期獻祭單元，以七日重複獻祭強調救贖紀念與聖潔生活。
