name: 公山羊贖罪祭（se'ir izzim）
type: 原文
secondary_types: []
aliases:
- 公山羊贖罪祭
status: formal
definition: 希伯來文「שְׂעִיר עִזִּים」（se'ir izzim），意指「公山羊」。本章規定於月朔（民28:15）、逾越節無酵節（民28:22）、七七節（民28:30）獻上一隻公山羊作贖罪祭，為會眾贖罪，須在常獻燔祭與同獻素祭、奠祭之外另行獻上，且必須無殘疾。
development: 本章三次出現公山羊贖罪祭（月朔、無酵節、七七節），顯示定期節期皆須以贖罪祭處理百姓誤犯之罪，維持與神立約關係；後世聖殿制度沿用此例（參拉16:17；結45:17）。
accumulations:
- book: 民數記
  chapter: 28
  summary: 第15、22、30節規定月朔、無酵節、七七節各獻一隻公山羊為贖罪祭，附於常獻燔祭之外。
  relation: 本章核心獻祭條例之一，彰顯節期獻祭須含贖罪成分，指向完全贖罪祭——基督（來10:1-4）。
