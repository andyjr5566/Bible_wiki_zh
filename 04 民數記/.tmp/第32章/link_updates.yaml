"book": "民數記"
"chapter": !!int "32"
"updates":
- "title": "基列"
  "path": "link_folder/地點/基列.md"
  "summary": "本章重點：摩西將基列地賜給流便、迦得、瑪拿西半支派為業（民32:33,39-40）。流便建希實本、以利亞撒、基列亭等；迦得建底本、亞他羅特、雅謝等；瑪拿西馬吉族攻取基列、雅益攻取帳棚村、挪伯攻取基納特。基列成為二支派半在約但河東的核心產業地。"
  "relation": "本章將基列定位為「約但河東地」產業分配的核心區域。從創31、37章基列作為雅各歸回、約瑟被賣的商隊來源地，到民32章成為二支派半得地為業的中心，見證神應許從曠野漂流到產業得著的歷史轉折。基列「香料/乳香/沒藥」預表基督滿有恩典真理（約1:14），士師睚珥/耶弗他預表基督拯救者身分。"
- "title": "雅謝"
  "path": "link_folder/地點/雅謝.md"
  "summary": "本章重點：雅謝為迦得支派建城之一（民32:35）。迦得支派在雅謝地區建城、安置牲畜與兒女，作為過約但河打仗前的後方基地。"
  "relation": "本章將雅謝納入迦得支派在約但河東的建城名單，作為二支派半「為牲畜建羊圈、為兒女建城邑」（民32:16）的具體落實。雅謝地區後來成為利未人城（書21:39），見證神對利未人無產業卻賜城邑居住的應許（民35:2-3）。"
- "title": "希實本"
  "path": "link_folder/地點/希實本.md"
  "summary": "本章重點：希實本為流便支派建城之首（民32:37），原為亞摩利王西宏都城（民21:25-26）。流便支派重建希實本、以利亞撒、基列亭、尼波、巴力勿、西比瑪（更名），作為約但河東產業的行政中心。"
  "relation": "本章將希實本從「亞摩利王都城」轉為「流便支派產業首府」，見證神將敵人產業轉賜給祂百姓（申2:31-36）。希實本更名（西比瑪）預表基督使萬物更新（啟21:5）。希實本後來成為利未人城（書21:39），連結祭司職分與產業分配的神學主題。"
