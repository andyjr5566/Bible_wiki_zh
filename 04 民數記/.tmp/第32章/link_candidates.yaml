book: "民數記"
chapter: 32
candidates:
  - name: "流便支派迦得支派求約旦河東地"
    type: "事件"
    evidence: "民32:1-5 流便、迦得二支派牲畜極多，見雅謝、基列地宜養牲畜，求摩西、以利亞撒、會眾首領將此地賜為業，不使過約但河。丁良才：二支派貪戀眼前利益，輕看神應許之地，預表信徒貪戀世界、失去天上產業（來11:13-16）。"
    surfaces:
      - "流便支派"
      - "迦得支派"
      - "牲畜極多"
      - "雅謝、基列地"
      - "不使過約但河"
  - name: "摩西責備二支派"
    type: "事件"
    evidence: "民32:6-15 摩西責備：你們弟兄去打仗，你們卻坐在這裡嗎？這必使以色列人灰心、不進迦南，像加低斯巴尼亞探子惡報使民灰心、在曠野漂流四十年。你們興起、代替你們的父親、作罪人的後裔，更加耶和華向以色列發怒。丁良才：屬靈領袖須顧全大局，不可因私利阻礙神旨意。"
    surfaces:
      - "你們弟兄去打仗"
      - "你們卻坐在這裡"
      - "使以色列人灰心"
      - "加低斯巴尼亞探子"
      - "罪人的後裔"
  - name: "二支派承諾先打仗後歸家"
    type: "事件"
    evidence: "民32:16-27 流便、迦得回應：我們在這裡為牲畜建羊圈、為兒女建城邑，但我們自己帶兵器、在耶和華面前前行、直等以色列人得地為業，然後才回這裡。不與他們在約但河西得業。丁良才：承諾須落實，不可有始無終（傳5:4-5、太21:28-31）。"
    surfaces:
      - "為牲畜建羊圈"
      - "為兒女建城邑"
      - "帶兵器在耶和華面前前行"
      - "直等以色列人得地"
      - "不與他們在約但河西得業"
  - name: "摩西應允條件分地"
    type: "事件"
    evidence: "民32:28-32 摩西吩咐以利亞撒、約書亞、各支派族長：若流便、迦得帶兵器過約但河、在耶和華面前打仗、地被制伏，就將基列地賜為業；若不帶兵器過河，就在迦南地中得業。二支派應允。丁良才：有條件的應許，須憑信心順服（來11:6）。"
    surfaces:
      - "摩西吩咐以利亞撒、約書亞"
      - "帶兵器過約但河"
      - "在耶和華面前打仗"
      - "地被制伏"
      - "將基列地賜為業"
  - name: "流便迦得瑪拿西半支派得地"
    type: "事件"
    evidence: "民32:33-42 摩西將亞摩利王西宏、巴珊王噩之地、連城邑、四圍地界，賜給流便、迦得、瑪拿西半支派。流便建希實本、以利亞撒、基列亭等；迦得建底本、亞他羅特、雅謝等；瑪拿西半支派馬吉族取基列、雅益攻取帳棚村、挪伯、基納。丁良才：神恩典超過所求（弗3:20)，瑪拿西半支派因信心得加倍產業。"
    surfaces:
      - "亞摩利王西宏"
      - "巴珊王噩"
      - "流便建城"
      - "迦得建城"
      - "瑪拿西半支派"
      - "馬吉族"
  - name: "二支派半求約旦河東地預表屬世信徒"
    type: "神學"
    evidence: "民32:1-5,33 流便、迦得、瑪拿西半支派選擇約旦河東地（曠野這邊），不進迦南美地。預表屬世信徒：得救卻不追求屬靈豐盛、滿足今生安逸、失去天上產業（來4:1-11、林前3:12-15）。"
    surfaces:
      - "約旦河東地"
      - "不進迦南美地"
      - "屬世信徒"
      - "失去天上產業"
  - name: "摩西代禱與屬靈領袖責任"
    type: "神學"
    evidence: "民32:6-15 摩西不顧個人榮辱、極力勸阻二支派，免得全會眾獲罪。預表基督為教會代禱（約17章、來7:25）、屬靈領袖為羊群負責（來13:17、彼前5:2-4）。"
    surfaces:
      - "摩西責備"
      - "免得全會眾獲罪"
      - "基督代禱"
      - "屬靈領袖負責"
  - name: "有條件的應許"
    type: "神學"
    evidence: "民32:20-24 摩西應允條件：若帶兵器過河、在耶和華面前打仗、地被制伏，才得基列地；否則在迦南地得業。神應許常附帶順服條件（申28:1-2、約15:10）。"
    surfaces:
      - "帶兵器過河"
      - "在耶和華面前打仗"
      - "地被制伏"
      - "有條件的應許"
      - "順服條件"
  - name: "瑪拿西半支派得加倍產業"
    type: "神學"
    evidence: "民32:33,39-42 瑪拿西半支派（馬吉族）因信心勇敢攻取基列、帳棚村等地，得加倍產業。預表殷勤追求的信徒得加倍賞賜（來6:10-12、啟2:26-28）。"
    surfaces:
      - "瑪拿西半支派"
      - "馬吉族"
      - "攻取基列"
      - "加倍產業"
      - "殷勤追求"
  - name: "建城與更名"
    type: "原文"
    evidence: "民32:34-42 列舉二支派半建城名：流便建希實本、以利亞撒、基列亭、尼波、巴力勿、西比瑪（更名）；迦得建底本、亞他羅特、雅謝、約革波哈、伯寧拉、伯哈蘭；瑪拿西馬吉族攻取基列、雅益攻取帳棚村（更名）、挪伯攻取基納特（更名）。更名預表基督使萬物更新（啟21:5）。"
    surfaces:
      - "建城"
      - "更名"
      - "希實本"
      - "底本"
      - "帳棚村"
      - "基納特"
  - name: "約旦河作分界"
    type: "原文"
    evidence: "民32:19,32 我們不與他們在約但河西得業，因為我們的產業在約但河東。約旦河作為曠野與迦南、今生與永生、屬世與屬靈的分界。預表信徒須過約但河（死與基督同死）才得天上產業（羅6:3-4、西3:1-3）。"
    surfaces:
      - "約但河東"
      - "約但河西"
      - "分界"
      - "過約但河"
      - "天上產業"
  - name: "基列地"
    type: "地點"
    evidence: "民32:1,26,29,39 基列地位於約但河東、雅博河南北，宜養牲畜，原屬亞摩利王西宏、巴珊王噩。流便、迦得、瑪拿西半支派得為業。預表基督徒在基督裡得屬靈產業（弗1:11、彼前1:4）。"
    surfaces:
      - "基列地"
      - "雅博河"
      - "亞摩利王西宏"
      - "巴珊王噩"
      - "屬靈產業"