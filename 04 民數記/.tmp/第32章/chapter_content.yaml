organization: "### 牲畜眾多引發求地（v1-5）\n[[流便支派迦得支派求約旦河東地|流便、迦得二支派]] 因牲畜極多，看中雅謝、基列一帶肥美牧場，便來見摩西、以利亞撒與眾首領，請求將耶和華在約旦河東已攻取之地（亞大錄、底本、雅謝、寧拉、希實本、以利亞利、示班、尼波、比穩）賜為產業，**「不要領我們過約但河」**。這請求乍看合理，實則隱含停留舒適區、不願進迦南爭戰的屬靈危機。\n\
  \n### 摩西嚴厲責備並引曠野教訓（v6-15）\n摩西聽後大為震驚，責備他們：「難道你們的弟兄去打仗，你們竟坐在這裡嗎？」並將此比作四十年前加低斯巴尼亞探子惡報使民心消化的事件。摩西指出：若二支派退縮，必使全以色列灰心，重蹈先祖覆轍，招致耶和華烈怒，甚至導致全會眾在曠野滅亡。這段對話凸顯\
  \ [[摩西責備二支派|屬靈領袖的責任]]——不僅要帶領爭戰，更要守望會眾的合一與順服。\n\n### 二支派承諾先戰後歸（v16-19）\n二支派回應極具智慧：願在基列為婦人孩子建堅固城、為羊群壘圈，但**「我們自己要帶兵器行在以色列人的前頭」**，直等以色列人各得產業才歸家。他們明確表示不在約但河西受產業，產業在河東。這承諾化解摩西疑慮，也確立\
  \ [[二支派承諾先打仗後歸家|先盡公義義務、後享私人產業]] 的原則。\n\n### 摩西立約：有條件應許（v20-24）\n摩西應允，但立下嚴格條件：所有帶兵器者必在耶和華面前過河打仗，直到耶和華趕出仇敵、制伏那地，才可歸回，向耶和華與以色列「為無罪」，地才歸他們為業。摩西並警告：「倘若你們不這樣行，就得罪耶和華，要知道你們的罪必追上你們。」這正是\
  \ [[有條件的應許|有條件應許]] 的經典範例——神的賜福與人的順服緊密連結。\n\n```mermaid\nflowchart LR\n  A[二支派請求河東地]\
  \ --> B{摩西責備}\n  B --> C[二支派承諾先戰後歸]\n  C --> D[摩西立約：帶兵器過河]\n  D --> E{是否履行？}\n \
  \ E -- 是 --> F[得地為業、向神無罪]\n  E -- 否 --> G[得罪耶和華、罪必追上]\n```\n\n### 立約確認與囑咐領袖（v25-32）\n\
  二支派公開確認：「耶和華怎樣吩咐僕人，僕人就怎樣行。」摩西隨即囑咐祭司以利亞撒、約書亞與各支派族長，將約條記錄備查：若迦得、流便帶兵器過河，賜基列為業；否則須在迦南地中得業。這程序確保約束力跨越摩西生命，延續至後續領導層。\n\
  \n### 分地與建城更名（v33-42）\n摩西將西宏、噩二王之地賜給迦得、流便與[[瑪拿西半支派得加倍產業|瑪拿西半支派]]。經文詳細記載三支派建城與更名：\n\
  \n| 支派 | 建造/佔據城市 | 備註 |\n|------|---------------|------|\n| 迦得 | 底本、亞他錄、亞羅珥、亞他錄朔反、雅謝、約比哈、伯寧拉、伯哈蘭\
  \ | 皆為堅固城，並壘羊圈 |\n| 流便 | 希實本、以利亞利、基列亭、尼波、巴力免、西比瑪 | 尼波、巴力免名字被改；另起別名 |\n| 瑪拿西（瑪吉）\
  \ | 基列 | 趕出亞摩利人 |\n| 瑪拿西（睚珥） | 基列村莊 | 稱哈倭特睚珥 |\n| 瑪拿西（挪巴） | 基納及鄉村 | 以自己名命名為挪巴 |\n\
  \n更名行為（v38、41-42）彰顯得地者對產業的主權宣告，也呼應創世記雅各改名、約書亞改名希伯崙等「命名即佔有」的聖經母題。\n\n### 跨章神學省思：預表與屬靈功課\n\
  本章常被視為 [[二支派半求約旦河東地預表屬世信徒|屬世信徒的預表]]：看重眼前牧場利益，不願渡過「約但河」（預表與基督同死同復活）進迦南（預表天上產業）。摩西的責備與立約，提醒我們：神的應許雖是恩典，卻非廉價——**順服是產業的管道**。瑪拿西半支派後來加入（v33），或許暗示神的憐憫超過人的算計，也預表外邦人蒙恩同承產業。[[建城與更名|建城與更名]]則提醒：真正的產業不是被動接受，而是主動經營、以神的名重新定義生命版圖。"
