name: 瑪拿西半支派得加倍產業
type: 神學
secondary_types: []
aliases:
- 瑪拿西半支派產業
- 約瑟長子雙分
status: formal
definition: 瑪拿西為約瑟長子，按長子名分得雙分產業（申 21:17）。本章記載瑪拿西半支派（父系瑪吉、睚珥、挪巴）在約旦河東得基列、巴珊廣大地業（民 32:33,
  39-42），另半支派後在迦南地西得產業（書 17 章），合併成為以色列地理跨度最大、產業最豐富的支派之一。神學意義：神信實成就對約瑟「加倍賜福」的應許（創 48:22），且不受約旦河阻隔，顯明神主權超越地理界限。
development: 從歷史分地見證神對列祖應許的精確應驗，鼓勵信徒信靠神超越環境的供應。
accumulations:
- book: 民數記
  chapter: 32
  summary: 記載瑪拿西半支派在河東得基列地，為其雙分產業之一部分。
  relation: 驗證長子名分與列祖應許在分地中的具體實現。
related_entries:
