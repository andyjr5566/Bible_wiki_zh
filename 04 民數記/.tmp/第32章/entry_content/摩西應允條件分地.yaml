name: 摩西應允條件分地
type: 事件
secondary_types: []
aliases:
- 摩西立約分地
status: formal
definition: 摩西應允二支派請求，但設定嚴格條件：必須帶兵器在耶和華面前過約旦河打仗，直到地被制伏、仇敵被趕出，才可歸回，得地為業；若違背，便得罪耶和華，罪必追上他們（民
  32:20-23）。摩西囑咐以利亞撒、約書亞和族長執行：若過河打仗，給基列地為業；否則在迦南地中得產業（民 32:28-30）。二支派確認遵行（民 32:31-32）。
development: 確立有條件應許的法律框架，將軍事義務與產業繼承權綁定。
accumulations:
- book: 民數記
  chapter: 32
  summary: 摩西設立「先打仗後分地」條件，並委託祭司與領袖監督執行，二支派公開宣誓順服。
  relation: 將口頭承諾轉化為具法律效力的盟約條款。
related_entries:
- 二支派承諾先打仗後歸家
- 流便迦得瑪拿西半支派得地
- 有條件的應許
