status: formal
definition: 基列地是約旦河東邊的地區，民數記第32章記載流便、迦得二支派請求在此得地為業，摩西應允並分給他們及瑪拿西半支派；希伯來文「גִּלְעָד」（Gil'ad）。
development: ''
accumulations:
- book: 民數記
  chapter: 32
  summary: 本章記載基列地被賜給流便、迦得及瑪拿西半支派為業。
  relation: 基列地是二支派請求並獲得的產業之地。
related_entries:
- 流便支派迦得支派求約旦河東地
- 流便迦得瑪拿西半支派得地
- 建城與更名
- 瑪拿西半支派得加倍產業
