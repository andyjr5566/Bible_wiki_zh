name: 流便支派迦得支派求約旦河東地
type: 事件
secondary_types: []
aliases:
- 二支派求東地
- 流便迦得求產業
status: formal
definition: 流便子孫和迦得子孫因牲畜極多，看見雅謝地和基列地適合牧放，便來見摩西、祭司以利亞撒和會眾首領，請求將約旦河東邊被征服之地（亞大錄、底本、雅謝、寧拉、希實本、以利亞利、示班、尼波、比穩）賜給他們為業，不願過約旦河（民數記
  32:1-5）。
development: 此請求引發摩西嚴厲責備，後經雙方協商達成有條件應許，成為以色列分地的重要轉折。
accumulations:
- book: 民數記
  chapter: 32
  summary: 記載流便、迦得二支派因牲畜眾多，請求佔有約旦河東基列地為業，不欲過河。
  relation: 本章開端事件，引出後續責備、協商與分地。
