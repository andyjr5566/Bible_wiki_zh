name: 流便迦得瑪拿西半支派得地
type: 事件
secondary_types: []
aliases:
- 二支派半得基列地
status: formal
definition: 摩西將亞摩利王西宏和巴珊王噩的國，連地帶城邑，賜給迦得、流便和瑪拿西半支派（民 32:33）。迦得子孫建造底本、亞他錄、亞羅珥、亞他錄朔反、雅謝、約比哈、伯寧拉、伯哈蘭等堅固城並壘羊圈（民
  32:34-36）。流便子孫建造希實本、以利亞利、基列亭、尼波、巴力免、西比瑪，並更改城名（民 32:37-38）。瑪拿西子孫瑪吉佔基列趕出亞摩利人得地（民 32:39-40）；睚珥佔村莊稱哈倭特睚珥（民
  32:41）；挪巴佔基納稱挪巴（民 32:42）。
development: 條件確立後的具體產業分配與建設實施，完成約旦河東分地。
accumulations:
- book: 民數記
  chapter: 32
  summary: 記載三支派正式獲得約旦河東產業，並進行城市建設與更名。
  relation: 本章高潮與結局，應驗應許並展現支派發展。
