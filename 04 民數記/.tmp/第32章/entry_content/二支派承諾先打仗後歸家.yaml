name: 二支派承諾先打仗後歸家
type: 事件
secondary_types: []
aliases:
- 二支派立約過河打仗
status: formal
definition: 迦得、流便二支派回應摩西，承諾在約旦河東為牲畜壘圈、為婦人孩子造堅固城，自己帶兵器在耶和華面前率先過河打仗，直等以色列人各承受產業才歸回，不在迦南地求產業（民
  32:16-19）。
development: 此承諾回應摩西責備，確立「先盡義務、後得權利」原則，獲摩西有條件應允。
accumulations:
- book: 民數記
  chapter: 32
  summary: 二支派提出具體軍事承諾：留守家屬，精兵過河協助奪地，任務完成始返鄉。
  relation: 解決衝突的關鍵協議，連結責備與應允。
related_entries:
- 流便支派迦得支派求約旦河東地
- 摩西責備二支派
- 摩西應允條件分地
- 有條件的應許
