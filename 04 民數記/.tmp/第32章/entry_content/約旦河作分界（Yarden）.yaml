name: 約旦河作分界（Yarden）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 約旦河在民數記第32章中作為以色列人承受產業的分界線，東邊為基列地，西邊為迦南地；希伯來文「יַרְדֵּן」（Yarden）即指此河。
development: ''
accumulations:
- book: 民數記
  chapter: 32
  summary: 本章記載流便、迦得二支派請求在約旦河東的基列地得產業，摩西以條件允許，約旦河成為分界。
  relation: 約旦河作為東西兩地的分界線，決定產業分配。
related_entries:
- 流便支派迦得支派求約旦河東地
