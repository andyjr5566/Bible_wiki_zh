"updates":
- "title": "會幕（帳幕整體）"
  "path": "link_folder/主題/會幕（帳幕整體）.md"
  "summary": "民1:1 記載「耶和華在西乃的曠野、會幕中曉諭摩西說」，此時會幕已建立一個月（出40:17），利未記律例已頒佈完畢。本章以會幕為全以色列安營的中心——利未人四圍安營守護（v50-53），十二支派分四營環繞外圍。v50,53 特別稱「法櫃的帳幕」，強調見證的面向：法櫃藏有十誡法版，是帳幕中最要緊的聖器（GT 丁良才）。GT 丁良才詳列立會幕後至數點民數之間發生的十一件事（立會幕→獻祭禮節→膏抹成聖→亞倫受聖職→祭司初供職→拿答亞比戶→首領奉獻→其餘律例→守逾越節→數點民數），呈現會幕為神與人相會的中心樞紐。KC 指出此處稱「法櫃的帳幕」側重外在見證的面向，教會也是真理的柱石和根基（提前3:15）。BH 視會幕為基督道成肉身「住在我們中間」的預表（約1:14）。"
  "relation": "[[法櫃]]、[[約櫃]]、[[會幕建立一個月後]]、[[利未支派]]、[[安營與纛]]"
- "title": "西乃的曠野"
  "path": "link_folder/地點/西乃的曠野.md"
  "summary": "民1:1 精確定位事件地點為「西乃的曠野」，民1:19 重申摩西「在西乃的曠野數點他們」。CT 指出西乃原文字義「多刺的」。GT 背景註釋說明西乃的曠野指以色列安營之山四周的曠野地帶。此時以色列人已在此停留約一年（出19:1 抵達，出40:17 立會幕，民1:1 二月初一），即將啟程前往迦南。BH 指出西乃曠野是以色列人領受律法之地，也是曠野旅程的起點。"
  "relation": "[[西乃山]]、[[會幕（帳幕整體）]]、[[出埃及第二年二月初一日]]"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民1:1 記載「耶和華…曉諭摩西說」——CT 指出「耶和華曉諭摩西」這樣的模式在本書至少記載了八十次以上，任何屬靈領袖必須經常直接從神得著頭手的話語。摩西與亞倫一同執行數點（v3,17,44），當日招聚全會眾（v18），「耶和華怎樣吩咐摩西，他就怎樣在西乃的曠野數點他們」（v19）——CT 視此為完全順從神命令的樣式，對比大衛擅自數點招致審判（撒下24）。GT 難解經文指出摩西五經有明言記載是摩西所寫（民1:1, 33:2），新約多次引用民數記且提到是摩西寫的（徒7:13；林前10:2-8；來3:7-16）。KC 指出摩西與亞倫一同數點預表基督為使徒與大祭司（來3:1），也預表基督為君王-祭司（亞6:13）。"
  "relation": "[[亞倫]]、[[十二族長協助數點]]、[[數點民數]]、[[大衛擅自數點百姓（撒下24）]]"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民1:3「你和亞倫要照他們的軍隊數點」；v17「摩西、亞倫帶著這些按名指定的人」；v44「是摩西、亞倫…所數點的」。CT 指出亞倫原文字義「帶來光的人」。GT 丁良才補充拿順是亞倫的妻兄（出6:23），也是大衛的先祖（得4:21-20）。KC 指出摩西與亞倫一同數點預表基督為君王-祭司（亞6:13），二人合在一起預表主耶穌被稱為「我們所信認的使徒和大祭司」（來3:1）。BH 強調亞倫作為大祭司與摩西一同組織百姓，數點是神聖委派的任務，凸顯秩序與結構的重要性。"
  "relation": "[[摩西]]、[[十二族長協助數點]]、[[數點民數]]、[[拿順]]"
- "title": "十二支派起源"
  "path": "link_folder/神學/十二支派起源.md"
  "summary": "民1:20-43 按十二支派逐一數點，以法蓮與瑪拿西取代約瑟和利未成為兩個正式支派以補「十二」之數——雅各在埃及時曾將約瑟的兩個兒子立為自己的兒子（創48:5），利未支派已蒙揀選在會幕中侍奉不列在十二支派當中（GT 啟導本）。GT 精讀本指出數點人數使以色列從自然群體形成神權國家體制，所要進行的戰爭是以建立神國度為目的的聖戰，神是以色列的元帥。GT 背景註釋詳述四營安排：猶大為眾支派之首領導東營（聖幕入口朝東），長子流便領導南營，但支派為北營之首（因為但是妾生眾子最長的一個），拉結眾子的支派位於西面、居首的是被立為約瑟長子的以法蓮。"
  "relation": "[[流便]]、[[猶大支派]]、[[但支派]]、[[以法蓮]]、[[瑪拿西]]、[[利未支派]]、[[安營與纛]]"
- "title": "以色列人的軍隊"
  "path": "link_folder/神學/以色列人的軍隊.md"
  "summary": "民1:3 限定數點對象為「從二十歲以外，能出去打仗的」，全章每支派重複此條件。CT 靈意註解：男丁按原文含有頭顱的意思，意指能為國家拋頭顱灑熱血的男子；「二十歲以外」表徵生命必須成熟的信徒才能有分於屬靈戰爭——不單要有兒子的身分，還必須是長成的人；「能出去打仗」首先是認清了爭戰的目的，其次是知道爭戰的法則，再次就是熟練爭戰的方法。GT 精讀本指出以色列百姓所要進行的戰爭是以建立神國度為目的的聖戰，神是以色列的元帥，預表新約教會以耶穌為元首與撒但爭戰（弗6:10-17）。KC 區分信徒三重身分：祭司（敬拜）、利未人（服事）、精兵（爭戰），強調入伍者須放下個人利益、聽從命令（路7:8）。"
  "relation": "[[二十歲以外能打仗的]]、[[數點民數]]、[[利未支派]]、[[安營與纛]]"
- "title": "猶大支派"
  "path": "link_folder/人物/猶大支派.md"
  "summary": "民1:26-27 猶大支派 74,600 人，人數最多。CT 指出猶大支派相當特殊——大衛王和其後的猶大國諸王都出自該支派（太1:3,6），甚至主耶穌也是大衛的後裔（羅1:3）。GT 丁良才指出猶大支派人數最多（創49:8），後來成了為首的支派（民2:3, 7:12）。GT 精讀本指出猶大作為利亞的第四個兒子得到神屬靈的祝福，成了領導以色列的屬靈長子（創49:8-12），後來耶穌基督也誕生在猶大支派（太1:2；啟5:5）。GT 背景註釋指出猶大為眾支派之首，領導最重要的東營（聖幕入口朝東）。BH 指出猶大支派是「猶大支派的獅子」（啟5:5）耶穌基督的支派。"
  "relation": "[[十二支派起源]]、[[安營與纛]]、[[流便]]、[[但支派]]"
- "title": "但支派"
  "path": "link_folder/人物/但支派.md"
  "summary": "民1:38-39 但支派 62,700 人，人數僅次於猶大。GT 丁良才指出但子孫的後代加增甚多——但原來只有一個兒子名戶伸（創46:23；民26:42），若以色列人在埃及共住四百三十年就沒有什麼難處。GT 精讀本指出但支派後來從以色列支派中脫離出去，獨自流離、拜偶像、行惡（士18:1-31），最後從啟示錄的十二支派名單中消失（啟7:5,8），這成就了雅各對但的預言（創49:16-18）。GT 背景註釋指出但支派為北營之首，因為但是妾生眾子最長的一個。BH 指出參孫是但支派最著名的成員（士13-16）。"
  "relation": "[[十二支派起源]]、[[安營與纛]]、[[猶大支派]]、[[流便]]"
- "title": "流便"
  "path": "link_folder/人物/流便.md"
  "summary": "民1:20-21「以色列的長子，流便子孫的後代」46,500 人。CT 指出流便因犯淫亂而失去長子的名份，被猶大和約瑟兩人分得。GT 丁良才指出流便因犯罪失了尊榮（創49:3-4），當時流便支派的人數不多。GT 背景註釋指出長子流便領導南營。BH 指出流便是雅各與利亞的長子，因與辟拉的不當關係失去長子權（創35:22, 49:3-4），支派後來定居約旦河東的牧場（民32:1-5）。"
  "relation": "[[十二支派起源]]、[[安營與纛]]、[[猶大支派]]、[[流便失去長子名分]]"
- "title": "以法蓮"
  "path": "link_folder/人物/以法蓮.md"
  "summary": "民1:32-33 以法蓮 40,500 人。CT 指出約書亞的祖父以利沙瑪為以法蓮族長。GT 丁良才指出瑪拿西雖是約瑟的長子，以法蓮支派的名字卻被列在先（創48:19-20），人數也多（申33:16）；但在曠野飄流的時候這支派的人數卻減少了八千名（民26:37）。GT 精讀本指出小兒子以法蓮列在哥哥瑪拿西前，在行軍和安營時成為中心，是因為以法蓮是神主權性的揀選，得到了比瑪拿西更大的祝福（創48:13-14,17-19）。GT 背景註釋指出拉結眾子的支派位於西面，居首的是被立為約瑟長子的以法蓮。BH 指出以法蓮後來成為北國以色列的代表支派。"
  "relation": "[[瑪拿西]]、[[十二支派起源]]、[[安營與纛]]、[[約書亞]]"
- "title": "瑪拿西"
  "path": "link_folder/人物/瑪拿西.md"
  "summary": "民1:34-35 瑪拿西 32,200 人，當時人數最少。GT 丁良才指出瑪拿西當時人數最少（創48:19），但在曠野飄流期間卻加增了二萬零五百名（民26:34），參伯12:23「使邦國興旺而又毀滅」。GT 精讀本指出神超越人的意思成就自己的工作，在神揀選的工作面前人應該謙卑讚美神的旨意（羅9:18-29）。BH 指出瑪拿西後來分裂為約旦河東西兩個半支派，產業廣大反映雅各對約瑟眾子的祝福（創48:19）。"
  "relation": "[[以法蓮]]、[[十二支派起源]]、[[安營與纛]]"
