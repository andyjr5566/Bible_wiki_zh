book: "04 民數記"
chapter: 1
updates:
- title: "流便"
  path: "link_folder/人物/流便.md"
  summary: "民1:5,20,21 屬流便的，有示丟珥的兒子以利蓿...流便子孫的後代...共有四萬六千五百名。流便為雅各長子，但失去長子名分。"
  relation: "本章將流便列為首個被數點的支派，族長以利蓿帶領，人數46,500。呼應創29:32、35:22、49:3-4 流便長子身分與失去名分的脈絡。"
- title: "西緬"
  path: "link_folder/人物/西緬.md"
  summary: "民1:6,22,23 屬西緬的，有蘇利沙代的兒子示路蔑...西緬子孫的後代...共有五萬九千三百名。西緬與利未常相提並論。"
  relation: "本章西緬支派人數59,300，族長示路蔑帶領。呼應創34:25、49:5-7 西緬與利未暴烈性情及支派分散預言。"
- title: "猶大（雅各之子）"
  path: "link_folder/人物/猶大（雅各之子）.md"
  summary: "民1:7,26,27 屬猶大的，有亞米拿達的兒子拿順...猶大子孫的後代...共有七萬四千六百名。猶大支派出大衛王和彌賽亞。"
  relation: "本章猶大支派人數最多(74,600)，族長拿順帶領。呼應創49:8-10 猶大得權杖、民2:3-9 猶大居東方領頭支派。"
- title: "西布倫（同住）"
  path: "link_folder/人物/西布倫（同住）.md"
  summary: "民1:9,30,31 屬西布倫的，有希倫的兒子以利押...西布倫子孫的後代...共有五萬七千四百名。
西布倫與猶大、以薩迦同組。"
  relation: "本章西布倫支派人數57,400，族長以利押帶領。
與猶大、以薩迦同屬東方營(民2:7-8)，呼應創49:13 西布倫住海濱的預言。"
- title: "以法蓮"
  path: "link_folder/人物/以法蓮.md"
  summary: "民1:10,32,33 約瑟子孫、屬以法蓮的...以法蓮子孫的後代...共有四萬零五百名。
以法蓮為約瑟長子，雅各立以法蓮在瑪拿西之上。"
  relation: "本章以法蓮支派人數40,500，族長以利沙瑪帶領。
呼應創48:13-20 雅各交叉按手祝福以法蓮居首、民2:18-24 以法蓮為西方營龍頭。"
- title: "瑪拿西"
  path: "link_folder/人物/瑪拿西.md"
  summary: "民1:10,34,35 屬瑪拿西的，有比大蓿的兒子迦瑪列...瑪拿西子孫的後代...共有三萬二千二百名。
瑪拿西為約瑟長子，但以法蓮居首位。"
  relation: "本章瑪拿西支派人數32,200，族長迦瑪列帶領。
呼應創48:13-20 雅各立以法蓮在瑪拿西之上、民2:20-21 瑪拿西屬西方營次序。"
- title: "便雅憫"
  path: "link_folder/人物/便雅憫.md"
  summary: "民1:11,36,37 屬便雅憫的，有基多尼的兒子亞比但...便雅憫子孫的後代...共有三萬五千四百名。
便雅憫為拉結幼子，與以法蓮、瑪拿西同組。"
  relation: "本章便雅憫支派人數35,400，族長亞比但帶領。
呼應創35:18 拉結產難命名便雅憫、民2:22-23 便雅憫屬西方營。"
- title: "但（審判）"
  path: "link_folder/人物/但（審判）.md"
  summary: "民1:12,38,39 屬但的，有亞米沙代的兒子亞希以謝...但子孫的後代...共有六萬二千七百名。
但為辟拉所生，與拿弗他利、亞設同組殿後。"
  relation: "本章但支派人數62,700，族長亞希以謝帶領。
呼應創30:6 拉結得但、民2:25-31 但為北方營殿後、士18 但支派遷徙。"
- title: "亞設（有福）"
  path: "link_folder/人物/亞設（有福）.md"
  summary: "民1:13,40,41 屬亞設的，有俄蘭的兒子帕結...亞設子孫的後代...共有四萬一千五百名。
亞設與但、拿弗他利同組殿後。"
  relation: "本章亞設支派人數41,500，族長帕結帶領。
呼應創30:13 樂亞設、民2:27-28 亞設屬北方營、申33:24-25 亞設蒙福的預言。"
- title: "迦得（萬幸）"
  path: "link_folder/人物/迦得（萬幸）.md"
  summary: "民1:14,24,25 屬迦得的，有丟珥的兒子以利雅薩...迦得子孫的後代...共有四萬五千六百五十名。
迦得與流便、西緬同組。"
  relation: "本章迦得支派人數45,650，族長以利雅薩帶領。
呼應創30:11 迦得出生、民2:14-15 迦得屬南方營、申33:20-21 迦得得地寬廣的預言。"
- title: "拿弗他利"
  path: "link_folder/人物/拿弗他利.md"
  summary: "民1:15,42,43 屬拿弗他利的，有以南的兒子亞希拉...拿弗他利子孫的後代...共有五萬三千四百名。
拿弗他利與但、亞設同組殿後。"
  relation: "本章拿弗他利支派人數53,400，族長亞希拉帶領。
呼應創30:8 拿弗他利出生、民2:29-30 拿弗他利屬北方營、申33:23 拿弗他利得福的預言。"
- title: "利未人"
  path: "link_folder/人物/利未人.md"
  summary: "民1:47-54 利未人卻沒有按著支派數在其中...只要派利未人管法櫃的帳幕和其中的器具...利未人要在法櫃帳幕的四圍安營。
利未人專供聖職，不參軍，代替長子歸神。"
  relation: "本章確立利未人豁免兵役、專司會幕事奉與守衛(47-54節)。呼應出13:2,12-13 長子歸神、民3:5-13 利未人代替長子、民4 利未人分工細則。"
- title: "會幕中"
  path: "link_folder/地點/會幕中.md"
  summary: "民1:1,50,53 耶和華在西乃的曠野、會幕中曉諭摩西說...只要派利未人管法櫃的帳幕和其中的器具...利未人並要謹守法櫃的帳幕。
會幕為神與人相會之所，利未人專司其事。"
  relation: "本章會幕為神與摩西面對面說話之處(1節)，利未人專司其事(50-53節)，呼應出25:8,22 會幕為神同在之所。"
- title: "摩西"
  path: "link_folder/人物/摩西.md"
  summary: "民1:1,16,17,19,44,46,47,54 耶和華在西乃的曠野、會幕中曉諭摩西說...這都是從會中選召的...摩西、亞倫帶著這些按名指定的人...耶和華怎樣吩咐摩西，他就怎樣在西乃的曠野數點他們。
摩西作為條例傳遞者和數點執行者。"
  relation: "本章摩西作為普查執行者，接收神指示並帶領族長執行(1,16-19,44-54節)。呼應出3:10,18:13-26 摩西領袖與審判角色。"
- title: "亞倫"
  path: "link_folder/人物/亞倫.md"
  summary: "民1:1,16,17,44,46,47,54 耶和華曉諭摩西說...這都是從會中選召的...摩西、亞倫帶著這些按名指定的人...摩西、亞倫，和以色列中十二個首領所數點的。
亞倫作為大祭司協助數點。"
  relation: "本章亞倫作為大祭司協助摩西執行普查(1,16-17,44-54節)。呼應出28:1,29:9 亞倫大祭司職分、民3:1-4 亞倫兒子祭司職分。"
- title: "以色列"
  path: "link_folder/原文/以色列.md"
  summary: "民1:2,16,19,45,46 你要按以色列全會眾的家室...這都是從會中選召的...以色列人中被數的...凡以色列人中被數的...凡以色列人中被數的。
條例針對全會眾。"
  relation: "本章普查條例針對全體以色列會眾(2,16,19,45-46節)。呼應創32:28 雅各改名以色列、出1:1-7 以色列族群增長。"
- title: "支搭帳棚"
  path: "link_folder/主題/支搭帳棚.md"
  summary: "民1:52 以色列人支搭帳棚，要照他們的軍隊，各歸本營，各歸本纛.
支搭帳棚按軍隊編組，各歸本纛。"
  relation: "本章規定各支派按軍隊編組支搭帳棚、各歸本纛(52節)。呼應民2 四面安營圖、出40:34-38 雲柱火柱引導安營。"
- title: "以色列全會眾"
  path: "link_folder/人物/以色列全會眾.md"
  summary: "民1:16,53 這都是從會中選召的...免得忿怒臨到以色列會眾.
會眾為立約共同體整體。"
  relation: "本章族長從會中選召(16節)，利未人守衛防止忿怒臨到會眾(53節)。呼應出12:3,16:3 會眾概念。"
- title: "西乃的曠野"
  path: "link_folder/地點/西乃的曠野.md"
  summary: "民1:1,19 耶和華在西乃的曠野、會幕中曉諭摩西說...耶和華怎樣吩咐摩西，他就怎樣在西乃的曠野數點他們.
西乃曠野為數點地點。"
  relation: "本章數點發生在西乃曠野會幕中(1,19節)。呼應出19:1-2 以色列到達西乃、民10:11-12 離開西乃。"
- title: "曠野"
  path: "link_folder/地點/曠野.md"
  summary: "民1:1,19 耶和華在西乃的曠野...他在西乃的曠野數點他們.
曠野為以色列人漂流四十年之地。"
  relation: "本章數點發生在西乃曠野(1,19節)。呼應出15:22,16:1 曠野漂流、申8:2-5 曠野試驗。"