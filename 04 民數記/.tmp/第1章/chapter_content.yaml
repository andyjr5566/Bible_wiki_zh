organization: "### 神命令數點軍旅男丁（v1-19）\n\n本章開篇精確鎖定時間地點：「以色列人出埃及地後，第二年二月初一日，耶和華在西乃的曠野、會幕中曉諭摩西」（v1）。CT\
  \ 指出此時會幕已建立一個月（出40:17），利未記律例已頒佈完畢，百姓屬靈裝備告一段落，神遂命摩西、亞倫「按以色列全會眾的家室、宗族、人名的數目計算所有的男丁」（v2），對象限定「從二十歲以外，能出去打仗的」（v3）。GT《丁良才註釋》對比出38:25-26\
  \ 兩次普查：前次為收贖命銀建會幕，後次為編組軍隊，兩次相隔不足一月，人數吻合（603,550），故非重複勞民。BH 強調「家室、宗族、人名」三層架構對應古代近東氏族制普查慣例，確保產業繼承與軍隊編制雙軌並行。\n\
  \n神另揀選十二族長協助（v4-16），名單按軍營編組次序而非出生順序（流便長子權已失，猶大居首）。KC 指出名字多含「El」（神）字根，顯示埃及期間信仰傳承未斷。v17-19\
  \ 記摩西、亞倫「帶著這些按名指定的人」，當日招聚全會眾，「述說自己的家譜」，「耶和華怎樣吩咐摩西，他就怎樣在西乃的曠野數點他們」——CT 靈意註解視此為「完全順從神命令」的樣式，對比大衛擅自數點招致審判（撒下24）。\n\
  \n> [!quote] 關鍵引文\n> 「任何屬靈的領袖，必須經常直接從神得著頭手的話語」（CT 民一1 話中之光）。\n> 「這次人口統計只限二十歲以上男丁，顯然是為了組成軍隊，預備可能發生的戰爭」（GT《啟導本》民一1）。\n\
  \n### 十二支派兵丁清冊與總數（v20-46）\n\n經文以高度結構化公式逐支派報數：支派名 → 家室/宗族/人名 → 二十歲以上能打仗男丁 → 具體數字。GT《精讀本》注意到唯獨迦得支派（45,650）保留十位數，其餘皆整百，或許反映實際點閱而非估算。總計\
  \ 603,550 人（v46），與出38:26 贖命銀普查數字完全一致。\n\n| 支派 | 人數 | 備註 |\n|------|------|------|\n\
  | 流便 | 46,500 | 長子卻失長子名分（創49:3-4） |\n| 西緬 | 59,300 | 後銳減至 22,200（民26:14），或因巴力毘珥之罪（民25）\
  \ |\n| 迦得 | 45,650 | 唯一保留十位數 |\n| 猶大 | 74,600 | 最多，領頭東營（民2:3），彌賽亞支派 |\n\
  | 以薩迦 | 54,400 | 與猶大、西布倫同營（民2:5） |\n| 西布倫 | 57,400 | 同上 |\n| 以法蓮 | 40,500\
  \ | 約瑟次子卻列長子前（創48:19） |\n| 瑪拿西 | 32,200 | 約瑟長子，後增至 52,700（民26:34） |\n| 便雅憫\
  \ | 35,400 | 拉結幼子，與以法蓮、瑪拿西同西營 |\n| 但 | 62,700 | 次多，殿後北營（民2:25），後墮入偶像（士18）\
  \ |\n| 亞設 | 41,500 | 與但、拿弗他利同營 |\n| 拿弗他利 | 53,400 | 同上 |\n| **總計** | **603,550**\
  \ | 不含利未人、婦孺、幼年 |\n\nCT 靈意註解將「二十歲以外、能出去打仗」對應「生命長成、能參與屬靈爭戰」的信徒；KC 則連結新約「屬靈軍裝」（弗6:10-17），強調數點非為誇數，乃為「知道正確數額，好量情況調派、輸送供應、計算損耗增補」（CT\
  \ 民一45-46 話中之光）。\n\n```mermaid\nmindmap\n  root((民數記1章 十二支派兵力))\n    東營_猶大為首\n \
  \     猶大[74,600]\n      以薩迦[54,400]\n      西布倫[57,400]\n    南營_流便為首\n      流便[46,500]\n\
  \      西緬[59,300]\n      迦得[45,650]\n    西營_以法蓮為首\n      以法蓮[40,500]\n      瑪拿西[32,200]\n\
  \      便雅憫[35,400]\n    北營_但為首\n      但[62,700]\n      亞設[41,500]\n      拿弗他利[53,400]\n\
  \    中央_利未人\n      免役守幕\n```\n\n### 利未支派分別為聖、免役守幕（v47-54）\n\nv47-54 突然轉折：「利未人卻沒有按著支派數在其中」，因耶和華吩咐「惟獨利未支派你不可數點」（v49）。改派他們「管法櫃的帳幕和其中的器具……在帳幕的四圍安營」（v50），拆卸、豎起、搬運、守衛皆屬其職（v51），「免得忿怒臨到以色列會眾」（v53）。GT《舊約背景註釋》指出此安排呼應古埃及軍營方陣：君王居中受護，會幕為神同在中心，利未人環繞形成「聖潔緩衝帶」。BH\
  \ 解經將「外人近前來必被治死」（v51）視為聖潔律核心：神的同在不可輕慢（參利10:1-2 納答、亞比戶）。\n\nCT 話中之光發展三層神學意義：(一) 後方穩固勝過前線激烈——利未人維持神見證、保守交通道路暢通；(二)\
  \ 爭戰得勝不在裝備訓練，而在「與神關係對了」；(三) 利未人營盤成「界線」，教導百姓「尊神為大，不越過神的界限」。KC 則對應新約「信徒作祭司」，區分「祭司（敬拜）、利未人（服事）、精兵（爭戰）」三重身分，勉勵信徒「竭力依靠神，與神面對面交通」（GT《精讀本》\
  \ 民一49 不可數點）。\n\n> [!note] 來源分歧記錄\n> - CT 民一50 話中之光：利未人免役是為「鞏固後方」，屬靈爭戰重「見證持守」勝過「接戰激烈」。\n\
  > - GT《精讀本》民一49：利未人免役預表信徒「履行利未人職能的時間」即禱告交通時刻（太6:6,18）。\n> - GT《丁良才》民一47：利未人在金牛犢事件後「為耶和華熱心」（出32:26-29），至今始正式分派襄辦帳幕事。\n\
  \n### 跨章脈絡與預表整理\n\n本章作為民數記「曠野旅程」的序幕，完成三項部署：① 軍隊編制（v1-46）→ 民2 營盤次序、民10 起行次序；② 利未人聖職確立（v47-54）→\
  \ 民3-4 具體分工、民8 獻祭潔淨、民18 祭司利未權責；③ 家譜制度鞏固（v2,18）→ 民26 第二次普查分地業、書13-19 產業分配。\n\n```mermaid\n\
  timeline\n  title 民數記1章在全書與救恩史的定位\n  出埃及第二年正月 : 會幕立好（出40:17）\n  出埃及第二年二月初一 : 神命數點民數（民1:1）\n\
  \  出埃及第二年二月二十日 : 以色列起行離西乃（民10:11）\n  出埃及第四十年 : 摩押平原二次普查（民26）\n  進迦南 : 照人數分地（民26:52-56）\n\
  ```\n\n兩次普查對比（民1 vs 民26）揭示神主權保守：總數幾乎不變（603,550 → 601,730），但支派消長劇烈——西緬銳減 62%，瑪拿西暴增\
  \ 64%。CT 指出西緬衰落應驗雅各預言「我要使他們在雅各中分居，在以色列中分散」（創49:7），而猶大、以法蓮、瑪拿西興起對應彌賽亞系譜與北國王朝。KC 強調「神讓以色列百姓數點人數，是為了讓他們認識到神的恩典和能力」（KC\
  \ 民一20-46），預表教會歷代雖經患難，餘民數目神早已預定（啟7:4-8）。\n\n> [!important] 本章樞紐\n> - **數點目的**：軍隊編組\
  \ + 產業分地雙軌（GT《丁良才》民一2）。\n> - **利未人免役**：非特權乃重任——「謹守法櫃的帳幕」（v53），守護神同在中心。\n> - **家譜宣告**：每人「述說自己的家譜」（v18），確認屬靈身分與產業權。\n\
  \n> [!question] 懸而未決\n> 1. 60 萬軍丁對應總人口 200-250 萬，西乃曠野資源能否負荷？考古學與解經家眾說紛紜（GT《啟導本》民一20-21）。\n\
  > 2. 迦得支派為何唯一保留「五十」？是實際點閱抑或抄寫傳承細節？（KC 民一24-25）。\n> 3. 利未人免役起始時間：金牛犢後（出32）還是會幕立好後（民1）？諸家說法不一（GT《丁良才》vs\
  \ CT 民一47）。"
