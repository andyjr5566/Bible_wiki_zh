book: 民數記
chapter: 1
candidates:
  # ── B 類：既有條目，走累積 ──
  - name: 會幕（帳幕整體）
    type: 主題
    section: 場景與制度
    evidence: 民1:1「耶和華在西乃的曠野、會幕中曉諭摩西說」；全章以會幕為中心，利未人四圍安營守護（v50-53）。民1:50,53 特別稱「法櫃的帳幕」（tabernacle of the testimony），強調見證的面向——「法櫃」指藏有十誡法版的約櫃（GT啟導本），「法櫃的帳幕」指整個會幕，因法櫃是帳幕中最要緊的聖器（GT丁良才）；「其中的器具」指陳設餅桌、燈檯、燔祭壇等附屬用品（GT精讀本），「屬乎帳幕的」指橛子和繩子等（GT精讀本）。CT：會幕已建立一個月（出40:17），這一個月期間大概就是摩西寫《利未記》的時候；「會幕中」意指神和摩西面對面說話。GT（丁良才）：立會幕後有十一件事依序發生——(1)立會幕（正月初一），(2)神曉諭獻祭禮節（利1-7），(3)摩西膏抹帳幕使之成聖（利8:10），(4)亞倫與子承受聖職七日（利8），(5)祭司初次供職第八天（利9），(6)拿答亞比戶被火焚燒（利10），(7)十二支派首領奉獻禮物（民7），(8)神宣示其餘律例（利11-27），(9)神吩咐守逾越節（民9:1-3），(10)以色列人守逾越節正月十四日（民9:4-5），(11)神命摩西計算民數二月初一日（民1:1）。KC：tabernacle erected one month prior (Exo 40:17); here called "tabernacle of the testimony" — aspect of external testimony; church is pillar and support of truth (1Tim 3:15). BH：Tent of Meeting was central place of worship and God's presence, constructed according to detailed instructions in Exodus 25-31; tabernacle of the Testimony refers to portable sanctuary housing Ark of Covenant containing tablets of the Law; foreshadows Jesus Christ who "tabernacled" among us (John 1:14).
    surfaces:
      - 法櫃的帳幕
      - 帳幕

  - name: 西乃的曠野
    type: 地點
    section: 場景與制度
    evidence: 民1:1「耶和華在西乃的曠野」；民1:19「在西乃的曠野數點他們」。CT：西乃原文字義「多刺的」。GT（背景註釋）：西乃的曠野指以色列安營之山四周的曠野地帶。BH：Wilderness of Sinai is where Israelites camped after leaving Egypt and received the Law.

  - name: 摩西
    type: 人物
    section: 人物
    evidence: 全章摩西為神諭接收者與數點執行者。民1:1「耶和華…曉諭摩西說」——CT指出「耶和華曉諭摩西」這樣的模式在本書至少記載了八十次以上，任何屬靈領袖必須經常直接從神得著頭手的話語。CT：摩西立刻遵命沒有遲延（v18「當二月初一日招聚全會眾」）；摩西並非擅自數點以色列人（v19），大衛擅自數點民數則有罪（撒下24:10）。GT（丁良才）：摩西兩次數點民數——初次摩西和亞倫（民1），二次摩西和以利亞撒（民26:1）。GT（難解經文）：摩西五經有明言記載是摩西所寫（民1:1, 33:2），新約多次引用民數記且提到是摩西寫的（徒7:13；林前10:2-8；來3:7-16），基督引用民數記證明摩西在曠野怎樣舉蛇（約3:14；民21:9）。KC：Moses and Aaron together picture of Lord Jesus as Apostle and High Priest (Heb 3:1); Moses and Aaron number together, picture of Christ as King-Priest (Zec 6:13). BH：Moses' role as prophet and leader reflects unique relationship with God — LORD spoke to Moses face to face (Exo 33:11).

  - name: 亞倫
    type: 人物
    section: 人物
    evidence: 民1:3「你和亞倫要照他們的軍隊數點」；v17「摩西、亞倫帶著這些按名指定的人」；v44「是摩西、亞倫…所數點的」。CT：亞倫原文字義「帶來光的人」。GT（丁良才）：拿順是亞倫的妻兄（出6:23），也是大衛的先祖（得4:21-20）。KC：Moses and Aaron number together, picture of Christ as King-Priest (Zec 6:13); together they are picture of Lord Jesus called "Apostle and High Priest of our confession" (Heb 3:1). BH：Aaron as high priest, responsible with Moses for organizing the people; census is divinely ordained task highlighting importance of order and structure.

  - name: 十二支派起源
    type: 神學
    section: 制度與組織
    evidence: 全章按十二支派逐一數點（v20-43）。GT（精讀本）：數點人數使以色列從自然群體形成神權國家體制；以色列百姓所要進行的戰爭是以建立神國度為目的的聖戰，神是以色列的元帥。GT（啟導本）：以法蓮與瑪拿西成為兩個正式支派以補「十二」之數，取代了約瑟和利未——雅各在埃及時曾將約瑟的兩個兒子立為自己的兒子（創48:5），利未支派已蒙揀選在會幕中侍奉不列在十二支派當中。GT（背景註釋）：祭司和利未人營地設於聖所四面，其他支派每邊三個安營在外圍形成方形；猶大為眾支派之首領導最重要的東營（聖幕入口朝東），長子流便領導南營，但支派為北營之首（因為但是妾生眾子最長的一個），拉結眾子的支派位於西面、居首的是被立為約瑟長子的以法蓮。BH：twelve tribes descended from sons of Jacob, each with distinct identity and role.

  - name: 以色列人的軍隊
    type: 神學
    section: 制度與組織
    evidence: 民1:3「能出去打仗的，你和亞倫要照他們的軍隊數點」；v16「都是以色列軍中的統領」；v52「要照他們的軍隊，各歸本營」。CT：男丁按原文含有頭顱的意思，意指能夠出去打仗、為國家拋頭顱灑熱血的男子；「從二十歲以外，能出去打仗的」表徵生命必須成熟的信徒才能有分於屬靈戰爭——不單要有兒子的身分，還必須是長成的人；「能出去打仗」首先是認清了爭戰的目的，其次是知道爭戰的法則，再次就是熟練爭戰的方法。GT（精讀本）：以色列百姓所要進行的戰爭是以建立神國度為目的的聖戰，而不是單單以掠奪和領土擴張為目的的戰爭；神是以色列的元帥，以色列百姓只要順服神的命令就能獲得勝利；這預表了新約的教會以耶穌為元首與撒但爭戰（弗6:10-17）。GT（啟導本）：凡是20歲以上的男丁都有參加軍隊的義務，畏縮不前視為大罪（參民14；申20）。KC：militant men, not children or elderly; age of twenty is military service age — spiritually means certain maturity needed to serve as warrior in God's army (1Jn 2:13b-14b; cf. 2Tim 2:3-4); whoever is in service is expected to follow orders without contradicting (Lk 7:8); new testament believer is priest (praising God in sanctuary), Levite (serving church), or warrior (standing up for truth when attacked). BH：census was for military purposes; service in Israel's army tied to being part of God's covenant people; spiritual warfare theme echoed in NT (Eph 6:10-18).

  - name: 猶大支派
    type: 人物
    section: 支派
    evidence: 民1:26-27 猶大支派 74,600 人，人數最多。CT：猶大支派相當特殊，大衛王和其後的猶大國諸王都出自該支派（太1:3,6），甚至主耶穌也是大衛的後裔（羅1:3）。GT（丁良才）：猶大支派人數最多（創49:8），後來成了為首的支派（民2:3, 7:12）。GT（精讀本）：猶大作為利亞的第四個兒子得到神屬靈的祝福，成了領導以色列的屬靈長子（創49:8-12），後來耶穌基督也誕生在猶大支派（太1:2；啟5:5）。GT（背景註釋）：猶大為眾支派之首，領導最重要的東營（聖幕入口朝東）。KC：Judah 74,600, largest tribe. BH：Judah's prominence — tribe of King David and Jesus Christ, "Lion of the tribe of Judah" (Rev 5:5); territory included Jerusalem.

  - name: 但支派
    type: 人物
    section: 支派
    evidence: 民1:38-39 但支派 62,700 人。GT（丁良才）：但子孫的後代加增甚多——但原來只有一個兒子名戶伸（創46:23；民26:42），若以色列人在埃及共住四百三十年就沒有什麼難處。GT（精讀本）：但支派後來從以色列支派中脫離出去，獨自流離、拜偶像、行惡（士18:1-31），最後從以色列的十二支派中消失了（啟7:5,8），這成就了雅各對但的將來的預言（創49:16-18）。GT（背景註釋）：但支派為北營之首，因為但是妾生眾子最長的一個。BH：Dan's role in encampment was on north side, forming rear guard alongside Asher and Naphtali; Samson most famous member (Judges 13-16); notably absent from list of sealed tribes in Revelation 7:4-8.

  - name: 流便
    type: 人物
    section: 支派
    evidence: 民1:20-21「以色列的長子，流便子孫的後代」46,500 人。CT：流便因犯淫亂而失去長子的名份，被猶大和約瑟兩人分得。GT（丁良才）：流便因犯罪失了尊榮（創49:3-4），當時流便支派的人數不多。GT（背景註釋）：長子流便領導南營。BH：Reuben was firstborn son of Jacob and Leah; lost birthright due to indiscretion with Bilhah (Gen 35:22, 49:3-4); tribe settled east of Jordan in pasturelands (Num 32:1-5); often struggled with maintaining prominence.

  - name: 以法蓮
    type: 人物
    section: 支派
    evidence: 民1:32-33 以法蓮 40,500 人。CT：約書亞的祖父以利沙瑪為以法蓮族長。GT（丁良才）：以利沙瑪是約書亞的祖父（代上7:26-27）；瑪拿西雖是約瑟的長子，以法蓮支派的名字卻被列在先（創48:19-20），人數也多（申33:16）；在曠野飄流的時候這支派的人數卻減少了八千名（民26:37）。GT（精讀本）：在約瑟的兩個兒子中小兒子以法蓮列在哥哥瑪拿西前，在行軍和安營時成為中心，是因為以法蓮是神主權性的揀選，得到了比瑪拿西更大的祝福（創48:13-14,17-19）。GT（背景註釋）：拉結眾子的支派位於西面，居首的是被立為約瑟長子的以法蓮。BH：Ephraim younger son of Joseph received greater blessing from Jacob (Gen 48:19); tribe became one of most prominent in Israel, often representing northern kingdom in prophetic literature.

  - name: 瑪拿西
    type: 人物
    section: 支派
    evidence: 民1:34-35 瑪拿西 32,200 人。GT（丁良才）：當時瑪拿西的人數是最少的（創48:19），在曠野的時候這支派中卻加增了二萬零五百名（民26:34，參伯12:23）。GT（精讀本）：神超越人的意思成就自己的工作，在神揀選的工作面前人應該謙卑讚美神的旨意（羅9:18-29）。BH：Manasseh split into two half-tribes east and west of Jordan; tribe's inheritance was large reflecting blessing Jacob gave to Joseph's sons (Gen 48:19).

  # ── C 類：新建條目 ──
  - name: 數點民數
    type: 事件
    section: 核心主題
    evidence: 全章核心事件——第一次人口普查。民1:2-3「你要按以色列全會眾的家室、宗族、人名的數目計算所有的男丁…從二十歲以外，能出去打仗的」。CT：此次數點是為著準備打仗；男丁按原文含有頭顱的意思，意指能夠出去打仗、為國家拋頭顱灑熱血的男子。GT（丁良才）：摩西兩次數點民數——初次在西奈曠野（出埃及後第二年，民1），二次在摩押平原（出埃及後第四十年，民26）；這種按宗族家室登記的數點法有四層益處：(1)好修成可靠的家譜，(2)得詳知各支派的人數，(3)能分佈各支派應占的位置，(4)可規定出發的次序；摩西兩次數點比較表——初次在西奈曠野、出埃及後第二年、出埃及的那一代、603,550人；二次在摩押平原、出埃及後第四十年、進迦南的那一代、601,730人。GT（啟導本）：第一次在建造會幕前為收銀子建會幕向二十歲以上男丁收取半舍客勒銀子（出30:11-16; 38:25-26），第二次即本章為組成軍隊；603,550人中除了迦勒和約書亞二人，全都在曠野的旅程中死去（民14,20）；若連婦孺及利未人總人口當在二百萬左右。GT（串珠）：民1與民26比較——西緬從59,300暴跌至22,200（可能因民25瘟疫），瑪拿西從32,200增至52,700，總數相差不遠。GT（難解經文）：出38和民1兩次普查目的不同——第一次為宗教目的（收集帳幕獻金），第二次為軍事目的（核定能打仗男丁）；兩次核定人數接近相符因日期相近不遠。GT（精讀本）：被數的意味著蒙神揀選成了居住在神榮耀中的人——領受征服迦南使命、為老弱婦孺爭戰、被呼召成為神手中的器皿；在這個世界上最大的祝福是被數點為神的百姓。KC：Numbering is proof of ownership; being numbered for heaven, knowing our names are recorded there, is something to be happy for (Lk 10:20b); God knows every single one, every person is important to Him; all numbered here except Joshua and Caleb will fall in wilderness (Num 14:29); those numbered in Num 26 form a new generation; the journey to the land should only take eleven days but became forty years due to unfaithfulness. BH：census served both practical and spiritual purposes, organizing people for military and religious duties; reflects God's promise to Abraham to make descendants as numerous as stars (Gen 15:5); total 603,550 underscores strength and potential of Israelite nation.
    surfaces:
      - 計算所有的男丁
      - 數點
      - 被數的

  - name: 利未支派
    type: 人物
    section: 制度與組織
    evidence: 民1:47-53 利未支派不數點在軍隊中，專責管理法櫃的帳幕。v49「惟獨利未支派你不可數點」；v50「只要派利未人管法櫃的帳幕和其中的器具」；v53「利未人要在法櫃帳幕的四圍安營，免得忿怒臨到以色列會眾」。CT：利未人因供聖職不在計算之列；利未支派不可算在軍隊之內，但他們另行數點以代替以色列人頭生的（民3:39-46）；利未人從一個月以外的男子就被數點（不像十二支派從二十歲以外）；利未人雖早已在敬拜金牛犢之人受罰之事上為耶和華熱心（出32:26-29；申33:8-9），也曾幫助祭司（出38:21），到這時候方被分派襄辦帳幕的事。GT（丁良才）：利未人不列在十二支派中因為要辦理會幕的事；利未三子：革順、哥轄和米拉利（創46:11），摩西和亞倫都是哥轄的子孫（出6:16-20；民3:14-24；代上6:1-48）。GT（啟導本）：以色列人的祭司必須是亞倫的後裔（亞倫的祭司體系）；利未人被揀選擔任會幕拆卸運輸支搭及聖殿侍奉；他們沒有分得迦南的地業，分住在各支派的城邑中（書21）；早期利未人侍奉年歲為三十至五十歲，後來降到二十歲（代下31:7）；律法對祭司的要求比對利未人嚴格；不久前利未人曾協助摩西剿滅拜金牛者所以被選為侍奉神的人（出32:27）。GT（精讀本）：利未支派是獻給神的支派，免去服兵役義務；利未人代替以色列的長子獻給神（民3:12; 8:9-15; 18:3-7; 出13:2,13）；信徒在靈裡應不斷與撒但爭戰，盡心事奉神並在神裡面享受安息（太11:28; 約4:24; 羅1:9; 來4:1-11）。KC：Levites not among warriors; take care of tabernacle and camp right around it; tabernacle here called "tabernacle of the testimony" — aspect of external testimony; church has to uphold testimony of truth in world, creates resistance and requires struggle; new testament believer is priest (praising God in sanctuary), Levite (serving church), or warrior (standing up for truth when attacked). BH：Levites were set apart for religious duties, exempt from military census; their role primarily spiritual, serving in Tabernacle and later Temple; Levites' separation can be seen as type of Christ set apart for ultimate priestly role; Levites' encampment around tabernacle serves as type of church called to be holy community set apart for God's purposes.
    surfaces:
      - 利未人
      - 利未支派

  - name: 家室與宗族
    type: 主題
    section: 制度與組織
    evidence: 民1:2「按以色列全會眾的家室、宗族、人名的數目」；v18「會眾就照他們的家室、宗族、人名的數目…都述說自己的家譜」。CT：家室指略大於家庭的家族，宗族指介於支派和家族之間的部族；以色列人相當重視家譜，甚至根據家譜來斷定是以色列人不是（尼7:5,61）；家譜是各以色列人生命來源的記錄，教會也應該重視生命來源的見證——教會不是人的組織，不是看屬地的財富身分才幹，而是看屬天的生命。GT（丁良才）：這種數點法有四層益處——好修成可靠的家譜、得詳知各支派人數、能分佈各支派應占位置、可規定出發次序；古時候的以色列人以他們的家譜為重要，這樣辦為將來之救主的家譜使後人有法考察。GT（精讀本）：家室指親屬，宗族是父親、族長和家、家族的組合詞，指各支派；這樣按家室和宗族計算人數是為了讓人記住自己的出身，也是為了讓各個支派明確選民意識和歷史意識，好使他們協調一致完成神的神聖計畫。KC：every member must know his origin and where he belongs; every believer must know his place in Christ, know he is a child of God and what his spiritual family is; must declare pedigrees — declaring goes beyond inner conviction, must testify for others of his faith and not be ashamed (2Tim 1:8,12); declaration necessary because of "mixed multitude" (Exo 12:38; Num 11:4) among them — people who joined company of Christians but do not have life from God. BH：organization by clans and families highlights tribal structure crucial for identity and inheritance rights; listing every man by name signifies value of individual within community; one by one emphasizes thoroughness and precision — God's attention to detail and care for each member.
    surfaces:
      - 家室
      - 宗族
      - 家譜

  - name: 二十歲以外能打仗的
    type: 主題
    section: 制度與組織
    evidence: 民1:3「凡以色列中，從二十歲以外，能出去打仗的」；全章每支派重複此條件（v20,22,24,26,28,30,32,34,36,38,40,42）。CT：二十歲以外表徵生命必須成熟的信徒才能有分於屬靈戰爭——不單要有兒子的身分，還必須是長成的人；「能出去打仗」首先是認清了爭戰的目的，其次是知道爭戰的法則，再次就是熟練爭戰的方法；近世的基督教趨向以工作來代替生命的追求，只會使幼小的生命萎縮；沒有長成的生命，神不能接受這人參加進爭戰的隊伍中。GT（啟導本）：凡是20歲以上的男丁都有參加軍隊的義務，畏縮不前視為大罪（參民14；申20）。GT（丁良才）：以下五等人都不在數點之內——凡二十歲以內的男丁、婦女、外邦人、利未人、年老不能上陣的人。KC：age of twenty is military service age in many countries; spiritually means certain maturity needed to serve as warrior in God's army (1Jn 2:13b-14b; cf. 2Tim 2:3-4); a baby in faith is not expected to be a warrior — it is expected of a young man in faith; once someone is in active service he renounces personal interests and makes his time and strength available; effectiveness depends on listening to superiors, following orders without contradicting (Lk 7:8). BH：age of twenty marks transition to adulthood and eligibility for military service; consistent throughout Pentateuch (Exo 30:14, Num 14:29); highlights readiness and responsibility expected of young men to defend and uphold community's values.
    surfaces:
      - 從二十歲以外

  - name: 安營與纛
    type: 主題
    section: 制度與組織
    evidence: 民1:52「以色列人支搭帳棚，要照他們的軍隊，各歸本營，各歸本纛」。CT：各支派各有指定的營地和旗幟。GT（丁良才）：共分四營四纛（民2:1-34）。GT（精讀本）：以會幕為中心支搭自己的帳幕（民2:1-34），表示他們應過以神為中心的生活。GT（背景註釋）：祭司和利未人營地設於聖所四面，其他支派每邊三個安營在外圍形成方形——軍營呈方形是這時代埃及的慣例，主前九世紀亞述藝術也顯示君王位居受保護的中央；猶大為眾支派之首領導最重要的東營（聖幕入口朝東），長子流便領導南營，但支派為北營之首（因為但是妾生眾子最長的一個），拉結眾子的支派位於西面居首的是被立為約瑟長子的以法蓮；埃及軍兵每個部隊以神祇為名、旗幟之上都有所屬神祇的標記，因此假定每個支派都有象徵該支派事物在其纛上是理所當然的事；但另一方面亦有釋經家將「纛」解作軍兵的單位而非旗幟。BH：standard refers to banner or flag representing each tribe, rallying point and symbol of identity; foreshadows believers rallying under banner of Christ (Heb 12:1-2); echoes prophetic vision in Isaiah 11:10 where root of Jesse stands as banner for peoples drawing all nations to Him.
    surfaces:
      - 各歸本營
      - 各歸本纛

  - name: 外人近前來必被治死
    type: 主題
    section: 制度與組織
    evidence: 民1:51「近前來的外人必被治死」。CT：「外人」意指非利未人，包括以色列其他支派和外族人；利未人的營在神的百姓中作為一條界線，讓百姓在每天的生活中學習尊神為大，不越過神的界限，免得引來死亡——這是見證嚴肅的一面，人的天性是喜歡越過神的，神從各方面的安排來提醒人，讓人時刻去學習尊重神。GT（丁良才）：「外人」就是外族人（參民16:40；利22:12）。GT（啟導本）：「外人」指非利未人，包括一切非利未人的以色列人——從會幕的侍奉來說這些人都是外人（參出29:33；利22:12）。GT（精讀本）：利未人擔當著護衛神聖潔的任務，神以死亡刑罰無視並破壞神聖潔的人（撒上5章）。BH：severe warning highlights holiness of tabernacle and seriousness of approaching God's presence without authorization; restriction serves as reminder of separation between God and humanity due to sin, ultimately bridged by Jesus Christ (Heb 10:19-22); echoes incident with Nadab and Abihu (Lev 10:1-2) where improper worship led to immediate judgment.
    surfaces:
      - 近前來的外人必被治死

  - name: 十二族長協助數點
    type: 事件
    section: 人物
    evidence: 民1:4「每支派中必有一人作本支派的族長，幫助你們」；v5-15 十二族長名單；v16「這都是從會中選召的，各作本支派的首領，都是以色列軍中的統領」。CT：選立意為才能出眾被神按名指定（v17）；首領指官長平時治理本支派的事務，統領指將領戰時統帥本支派的軍士；十二個首領在摩西和亞倫的監督下數點各自支派的人數。GT（丁良才）：這些族長大概是摩西先前所分派的首領（參出18:21-26）；各支派的名字不是完全照長幼的次序排列，而是按著他們所屬之營排列的——迦得的名字列在流便西緬之後因為這三支派在一營之中。GT（精讀本）：各支派的首領都是以色列軍中統領，暗示著他們在以色列中擔負大事的人；他們與長老不同——長老是屬靈方面的領袖（出4:29; 24:9），而他們是在行政方面的領袖；數點人數的工作能在一天內結束是因為以前次的數點為基礎（出30:11-12）所以較為容易，且他們擁有對耶和華的信仰具有明確的使命意識。KC：names of heads also found in Num 2,7,10; in most names 'El' (God) resounds — Israelites did not forget God during stay in Egypt, in names they gave their children they kept memory of God; twelve names with meanings — Elizur=「my God is a rock」, Shelumiel=「in peace with God」, Nahshon=「prophet」, Nethanel=「gift of God」, Eliab=「my God is Father」, Elishama=「my God has heard」, Gamaliel=「God is a rewarder」, Abidan=「my Father is Judge」, Ahiezer=「brother of help」, Pagiel=「God has met me」, Eliasaph=「God has added」, Ahira=「brother of evil」; Timothy is one of those 'numbered' by older brothers (Acts 16:1-2). BH：leaders were not only chosen from congregation but representatives of respective tribes; appointment from within congregation underscores importance of communal involvement in leadership selection; reflects theocratic nature of Israelite society where God directed Moses to choose leaders already recognized by the people.
    surfaces:
      - 族長
      - 首領
      - 統領