candidates:
  # === C 類：全新條目 ===
  - name: 數點以色列男丁條例
    type: 主題
    evidence: "民1:2-3 你要按以色列全會眾的家室、宗族、人名的數目計算所有的男丁。凡以色列中，從二十歲以外，能出去打仗的，你和亞倫要照他們的軍隊數點。CT：神所看重的乃是屬靈的生命，凡是屬神的人都當謹遵生命的傳承，追求生命的長進。KC：數點是為著準備打仗，照軍隊編組方式數點。BH：人口普查為軍事動員，二十歲以上適齡男性。"
    surfaces: ["計算所有的男丁", "從二十歲以外", "能出去打仗的", "照他們的軍隊數點"]

  - name: 十二支派族長名單
    type: 主題
    evidence: "民1:5-15 這都是從會中選召的，各作本支派的首領，都是以色列軍中的統領。流便以利蓿、西緬示路蔑、猶大拿順、以薩迦拿坦業、西布倫以利押、以法蓮以利沙瑪、瑪拿西迦瑪列、便雅憫亞比但、但亞希以謝、亞設帕結、迦得以利雅薩、拿弗他利亞希拉。CT：這些人都是從會中選召的，各作本支派的首領，表徵必須順服屬靈的權柄。KC：選召意指才能出眾，被神按名指定。BH：十二支派首領代表各族系，軍隊編制核心。"
    surfaces: ["各作本支派的首領", "以色列軍中的統領", "從會中選召的", "族長"]

  - name: 以色列十二支派人口統計
    type: 主題
    evidence: "民1:20-46 以色列人中被數的，照著宗族，從二十歲以外，能出去打仗、被數的，共有六十萬零三千五百五十名。流便46500、西緬59300、迦得45650、猶大74600、以薩迦54400、西布倫57400、以法蓮40500、瑪拿西32200、便雅憫35400、但62700、亞設41500、拿弗他利53400。CT：總數603550，表徵神的軍隊極其龐大，生命長成才能進入爭戰隊伍。KC：總數與出38:26、民26:51平行。BH：人口普查為軍事動員，總數約60萬成年男性。"
    surfaces: ["六十萬零三千五百五十名", "被數點的", "各支派人數"]

  - name: 利未支派不被數點條例
    type: 主題
    evidence: "民1:47-54 利未人卻沒有按著支派數在其中，因為耶和華曉諭摩西說：惟獨利未支派你不可數點，也不可在以色列人中計算他們的總數。只要派利未人管法櫃的帳幕和其中的器具，並屬乎帳幕的；他們要抬帳幕和其中的器具，並要辦理帳幕的事，在帳幕的四圍安營。CT：利未人專供聖職，不參軍，表徵事奉神的人當專心事奉。KC：利未人代替長子歸神，專司帳幕事奉。BH：利未人豁免兵役，專司會幕事奉與守衛。"
    surfaces: ["利未人卻沒有按著支派數在其中", "不可數點", "派利未人管法櫃的帳幕", "在帳幕的四圍安營"]

  - name: 會幕四圍安營條例
    type: 主題
    evidence: "民1:50-54 只要派利未人管法櫃的帳幕和其中的器具，並屬乎帳幕的；他們要抬帳幕和其中的器具，並要辦理帳幕的事，在帳幕的四圍安營。帳幕將往前行的時候，利未人要拆卸；將支搭的時候，利未人要豎起。近前來的外人必被治死。以色列人支搭帳棚，要照他們的軍隊，各歸本營，各歸本纛。但利未人要在法櫃帳幕的四圍安營，免得忿怒臨到以色列會眾。CT：利未人圍帳幕安營，保護聖所免受褻瀆。KC：利未人為會幕守衛，防止神的忿怒臨到會眾。BH：利未人環繞會幕安營，形成保護緩衝區。"
    surfaces: ["在帳幕的四圍安營", "利未人要拆卸", "利未人要豎起", "近前來的外人必被治死", "利未人要在法櫃帳幕的四圍安營"]

