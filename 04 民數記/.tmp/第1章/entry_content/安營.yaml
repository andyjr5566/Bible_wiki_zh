name: 安營
type: 主題
secondary_types: []
aliases:
- 紮營
- 駐紮
status: formal
definition: 指軍隊或會眾按序駐紮。本章第 50 節「利未人……在帳幕的四圍安營」，第 52 節「以色列人支搭帳棚，要照他們的軍隊，各歸本營，各歸本纛」，第
  53 節「利未人要在法櫃帳幕的四圍安營」，建立會幕為中心、利未人內圈、十二支派外圈的同心圓安營秩序。
development: 民數記 2 章詳細規定東南西北三支派一組的安營次序；3:23, 29, 35, 38 利未四族安營方位；9:15-23 雲柱火柱指引起行安營；約書亞記
  4:19 吉甲安營延續此模式。
accumulations:
- book: 民數記
  chapter: 1
  summary: 利未人在帳幕四圍安營（50, 53 節）；以色列人各歸本營、本纛安營（52 節）；免得忿怒臨到會眾（53 節）。
  relation: 「安營」將神的同在（會幕）置於群體幾何中心，利未人作緩衝區，防止聖潔與俗常混淆引發忿怒，是曠野神政體制的空間神學表達。
