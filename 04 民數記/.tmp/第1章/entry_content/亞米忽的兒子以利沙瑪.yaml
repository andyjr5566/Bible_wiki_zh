name: 亞米忽的兒子以利沙瑪
type: 人物
secondary_types: []
aliases:
- 以利沙瑪
status: formal
definition: 以利沙瑪是以法蓮支派的族長，亞米忽的兒子。民數記 1 章 10 節記載：「約瑟子孫、屬以法蓮的，有亞米忽的兒子以利沙瑪」。他在以色列出埃及後第二年二月初一日，被神指定協助摩西、亞倫數點以法蓮支派二十歲以上能出去打仗的男丁。以法蓮為約瑟次子，卻得長子祝福（創
  48:17-20），其支派在北國時代極具影響力。
development: 本章作為十二支派族長名單之一，以利沙瑪代表以法蓮支派參與首次人口普查。以利沙瑪後來在曠野行軍中率領以法蓮軍隊（民 2:18, 10:22），其孫子約書亞繼承摩西帶領以色列進迦南。
accumulations:
- book: 民數記
  chapter: 1
  summary: 以利沙瑪被列為以法蓮支派族長，協助數點本支派男丁（民 1:10, 16-17, 32-33）。
  relation: 本章族長名單人物，連結以法蓮支派領袖身分與人口統計（四萬零五百名），並預表後續領袖約書亞的家系。
