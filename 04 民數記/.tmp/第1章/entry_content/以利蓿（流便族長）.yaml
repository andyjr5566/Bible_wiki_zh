status: formal
definition: 示丟珥的兒子，流便支派族長（民1:5）。在十二支派族長名單中排第一（民1:5, 16），協助摩西、亞倫數點流便男丁46,500名（民1:20-21）。名字意為「神是磐石」或「我的神是磐石」。
development: 亦見於民數記2:10（流便營首領）、7:30-35（獻禮順序第三）、10:18（起行次序），顯示其在支派領導層的持續角色。
accumulations:
- book: 民數記
  chapter: 1
  summary: 列為十二族長之首，身分為示丟珥兒子、流便支派族長，參與第一次人口普查。
  relation: 本章提供其身分、父名、支派歸屬與族長職務的首見記載。
