name: 數點民數
type: 事件
secondary_types: []
aliases:
- 第一次人口普查
- 西乃曠野數點
status: formal
definition: 上帝吩咐摩西、亞倫在西乃曠野會幕中，按家室、宗族、人名，逐一計算以色列全會眾中「從二十歲以外、能出去打仗」的男丁總數。此次普查於出埃及第二年二月初一日進行，由十二支派族長協助，共點得六十萬零三千五百五十名（民
  1:1-46）。利未支派因專司帳幕事奉，不列入軍籍（民 1:47-49）。此事件標誌以色列從自然群體轉型為神權軍隊體制，預備進迦南聖戰。
development: 此為曠野漂流期間第一次大型人口普查；三十八年後在摩押平原舉行第二次普查（民 26 章），總數相近但各支派增減明顯。屬靈應用為信徒須有生命長成（二十歲以上）才能參與屬靈爭戰（提後 2:3-4；約壹 2:13-14）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 記載上帝命令、執行過程、十二支派分項數字、總數及利未人豁免細節。
  relation: 本章核心事件，確立軍隊編制與營盤秩序的基礎。
