name: 外人近前來必被治死
type: 主題
secondary_types: []
aliases:
- 外人擅近帳幕死刑
- 非利未人禁入聖所
status: formal
definition: 民數記 1:51 規定：「近前來的外人必被治死」。「外人」指非利未支派者，包括其他以色列支派與外族人。利未人負責拆卸、豎立帳幕，並環繞帳幕安營形成保護圈，防止非聖職人員誤闖聖所觸犯神的聖潔，招致忿怒臨到會眾（民
  1:53）。此嚴刑彰顯神的聖潔不可褻瀆。
development: 後續利未記 10 章拿答、亞比戶獻凡火被火燒死；撒母耳記上 6 章伯示麥人窺約櫃被擊殺，皆為此原則的歷史實踐。
accumulations:
- book: 民數記
  chapter: 1
  summary: 明文規定非利未人擅近帳幕必死，並說明利未人環營保護會眾免受忿怒。
  relation: 本章建立聖所存取管制的法律依據，貫穿五經聖潔法典。
