name: 十二族長協助數點
type: 事件
secondary_types: []
aliases:
- 十二支派首領協助普查
- 族長協助點兵
status: formal
definition: 上帝命令「每支派中必有一人作本支派的族長，幫助你們」（民 1:4）。這十二人由神按名指定（民 1:17），名單見民 1:5-15（以利蓿、示路蔑、拿順、拿坦業、以利押、以利沙瑪、迦瑪列、亞比但、亞希以謝、帕結、以利雅薩、亞希拉）。他們是「從會中選召的，各作本支派的首領，都是以色列軍中的統領」（民
  1:16），在摩西、亞倫監督下執行各支派登記工作（民 1:17-18, 44）。名字多含「神」（El）字根，見證埃及期間信仰傳承。
development: 同名單再見於民 2 章營盤次序、民 7 章獻禮順序、民 10 章行軍次序，確立領袖權威的連貫性。KC 指出提摩太也是被年長弟兄「數點」的人之一（徒16:1-2）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 記錄十二族長名單、出身、選召依據、職銜（首領/統領）及協助普查過程。
  relation: 本章建立領袖團隊合法性，為後續軍事、宗教、行政領導奠基。
