- 利未族
status: formal
definition: 以色列十二支派之一，源自雅各第三子利未。民數記 1 章上帝明令「不可數點」，也不計入以色列軍隊總數（民 1:47-49）。改派利未人管理法櫃帳幕及其器具，負責拆卸、搬運、豎立帳幕，並在帳幕四圍安營，謹守帳幕職務，免得忿怒臨到會眾（民
  1:50-53）。他們代替以色列頭生子歸耶和華（民 3:12, 41, 45），專司屬靈事奉，不分地業。
development: 利未支派在金牛犢事件中站在摩西一方（出 32:26-29），被揀選承接祭司輔助職分。後續章節詳細記載三大家族（革順、哥轄、米拉利）具體分工（民
  3-4 章）。KC 指出新約信徒有三重身分：祭司（敬拜）、利未人（服事教會）、精兵（為真理爭戰）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 記載利未人不被數點、受命管理帳幕、四圍安營、外人近前必死的規定。
  relation: 本章確立利未支派獨特地位與職分，為後續帳幕事奉條例奠基。
