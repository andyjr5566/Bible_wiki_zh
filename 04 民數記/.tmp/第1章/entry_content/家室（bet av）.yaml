definition: 家室（希伯來文 bet av）指以色列人的家庭單位，民數記 1 章按家室、宗族、人名數點男丁。
development: 本章強調按家室與宗族進行人口普查，顯示家庭結構在以色列社會中的基礎地位。
accumulations:
- book: 民數記
  chapter: 1
  summary: 經文說明摩西、亞倫按家室、宗族、人名的數目計算所有男丁。
  relation: 家室作為基本單位，配合族長制度完成全國性的軍隊編組與人口統計。
