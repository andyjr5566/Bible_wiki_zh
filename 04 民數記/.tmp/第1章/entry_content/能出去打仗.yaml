name: 能出去打仗
type: 主題
secondary_types: []
aliases:
- 可出戰
- 服役合格
status: formal
definition: 指身體健全、具備作戰能力的男性。本章第 3 節「凡以色列中，從二十歲以外，能出去打仗的」，及第 20-46 節各支派統計均以「凡能出去打仗」為限定語，顯示點閱目的在編組軍隊（軍隊一詞見
  3, 16, 52 節），而非單純人口普查。
development: 申命記 20:5-8 列出免役事由（新房、新葡萄園、新娶妻、膽怯），顯示「能出去打仗」兼具生理與心理條件；約書亞記 1:14 重申「大能的勇士」過約旦河，延續此概念。
accumulations:
- book: 民數記
  chapter: 1
  summary: 摩西、亞倫照軍隊數點「能出去打仗」的男丁（3 節）；各支派統計反覆引用此語（20, 22, 24, 26, 28, 30, 32, 34, 36,
    38, 40, 42, 45 節），總數 603,550。
  relation: 本章以「能出去打仗」界定屬靈爭戰的可用人力，預備進迦南地；利未人被排除（47-49 節），顯示屬靈事奉與軍事服役分工。
