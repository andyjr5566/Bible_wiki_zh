status: formal
definition: 蘇押的兒子，以薩迦支派族長（民1:8）。在十二支派族長名單中排第四（民1:8, 16），協助數點以薩迦男丁54,400名（民1:28-29）。名字意為「神的恩賜」。
development: 亦見於民數記2:5（以薩迦營首領）、7:18-23（獻禮順序第二）、10:15（起行次序第二）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 列為十二族長第四位，身分為蘇押兒子、以薩迦支派族長，參與第一次人口普查。
  relation: 本章提供其身分、父名、支派歸屬與族長職務的首見記載。
