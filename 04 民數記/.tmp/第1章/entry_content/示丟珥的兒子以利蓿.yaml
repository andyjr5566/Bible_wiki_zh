name: 示丟珥的兒子以利蓿
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 民數記第1章記載，流便支派的族長，示丟珥的兒子，在西乃曠野會幕中被耶和華指定，協助摩西、亞倫按名數點以色列二十歲以上能出去打仗的男丁，作本支派的首領，代表流便宗族參與人口普查。
development: 本章僅記其身份與職務，未述及其他生平事蹟；後續章節（如民2:10、7:30、10:18）顯示他持續擔任流便支派首領，帶領軍隊行軍與獻祭。
accumulations:
- book: 民數記
  chapter: 1
  summary: 經文第5節列名為流便支派族長，奉命協助摩西、亞倫數點會眾，代表本宗族述說家譜，確立其在十二支派族長中的地位。
  relation: 作為流便支派代表，直接參與本章核心事件「數點以色列男丁」，屬十二支派族長名單之一。
