status: formal
definition: 蘇利沙代的兒子，西緬支派族長（民1:6）。在十二支派族長名單中排第二（民1:6, 16），協助數點西緬男丁59,300名（民1:22-23）。名字意為「神是我的平安」或「神是酬報」。
development: 亦見於民數記2:12（西緬營首領）、7:36-41（獻禮順序第四）、10:19（起行次序）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 列為十二族長第二位，身分為蘇利沙代兒子、西緬支派族長，參與第一次人口普查。
  relation: 本章提供其身分、父名、支派歸屬與族長職務的首見記載。
