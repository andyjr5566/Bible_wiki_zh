name: 會幕四圍安營條例
type: 主題
secondary_types: []
aliases:
- 帳幕四圍安營規例
- 利未人環繞安營條例
status: formal
definition: 耶和華吩咐利未人在法櫃帳幕四圍安營（民1:50, 53），免得忿怒臨到以色列會眾；利未人並要謹守法櫃帳幕（民1:53）。以色列其餘支派則照軍隊、各歸本營、各歸本纛支搭帳棚（民1:52）。此條例確立「聖所在中、利未環繞、支派外圍」的神聖空間秩序，民數記2章進一步展開四方安營細節。
development: 此空間神學貫穿曠野漂流時期，預表神與百姓同在（出25:8），亦為後來聖殿敬拜「聖所、院宇、外邦人院」分級聖潔的原型。
accumulations:
- book: 民數記
  chapter: 1
  summary: 規定利未人四圍帳幕安營、守護聖所，其餘支派按軍隊編制、各歸本纛安營，建立聖潔空間秩序。
  relation: 本章1:50-54為全章結語，將普查的軍事目的（備戰）轉向敬拜目的（守護神同在），銜接第2章詳細安營圖。
