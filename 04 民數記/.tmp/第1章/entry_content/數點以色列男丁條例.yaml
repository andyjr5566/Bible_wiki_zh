name: 數點以色列男丁條例
type: 主題
secondary_types: []
aliases:
- 數點男丁條例
- 以色列人口普查條例
status: formal
definition: 耶和華吩咐摩西、亞倫按以色列全會眾的家室、宗族、人名數目，計算所有二十歲以上、能出去打仗的男丁（民1:2-3）。此條例確立以軍隊編制為導向的普查原則，並要求各支派有一位族長協助（民1:4,
  16-17）。普查於出埃及後第二年二月初一日在西乃曠野會幕中進行（民1:1, 18-19）。
development: 此條例為後續曠野漂流期間的軍事動員、營盤編制、產業分配奠定基礎；民數記26章第二次普查沿用同一原則。
accumulations:
- book: 民數記
  chapter: 1
  summary: 記載耶和華吩咐摩西進行第一次人口普查的條例、對象、時間、地點與執行過程。
  relation: 本章核心主題，確立普查的神學依據（神命令）與操作細節（族長協助、按家室宗族、二十歲以上能打仗者）。
