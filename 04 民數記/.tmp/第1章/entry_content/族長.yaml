status: formal
definition: 族長指各支派的首領，民數記 1 章記載十二支派族長協助摩西、亞倫進行人口普查與軍隊編組。
development: 本章列出十二位族長名單，顯示神對以色列領導結構的安排。
accumulations:
- book: 民數記
  chapter: 1
  summary: 經文列出十二支派族長名字，並說明他們是會中選召的首領，作各支派代表。
  relation: 族長制度體現神所設立的治理秩序，為後續軍隊編組與分配地業奠基。
