- 會幕器具
status: formal
definition: 指會幕（帳幕）中用於事奉的各類聖器，包括法櫃、桌子、燈台、壇等（出25-27, 30-31）。民1:50-51規定利未人負責「管法櫃的帳幕和其中的器具」、「抬帳幕和其中的器具」，並「辦理帳幕的事」。器具屬聖，非利未人不可擅碰，否則必死（民1:51,
  4:15, 20）。
development: 本章首次在民數記明確界定利未人對器具的職責：搬運、看管、事奉。這延續出埃及記的製造規範，預備曠野行軍時聖物的遷移秩序。器具的聖潔性要求利未人「拆卸」、「豎起」、「抬」（民1:51），任何外人近前必被治死（民1:51），顯示神同在的榮耀不可褻瀆。
accumulations:
- book: 民數記
  chapter: 1
  summary: 利未人被派管法櫃帳幕與其中器具，負責搬運、拆卸、豎起、事奉。
  relation: 確立利未人聖職分工，保護會幕聖潔，防止忿怒臨到會眾（民1:53）。
