status: formal
definition: 指摩西遵照耶和華吩咐，在西乃曠野會幕中於第二年二月初一日召集以色列全會眾的行動（民1:18）。此舉為進行人口普查、編組軍隊、確立支派秩序的起始步驟，體現神對祂子民的組織與治理。
development: 經文記載摩西、亞倫帶著按名指定的十二支派族長，「當二月初一日招聚全會眾」（民1:17-18）。這不是單純的集合，乃是按家室、宗族、人名數目，讓二十歲以上的男丁述說家譜，以備數點。這動作回應了神在民1:2-3的命令，顯示以色列人順服神的行政安排。
accumulations:
- book: 民數記
  chapter: 1
  summary: 摩西遵命招聚全會眾，作為數點男丁、編組軍隊的前置動作。
  relation: 本章敘事起始點，連結神的吩咐與以色列的順服回應。
