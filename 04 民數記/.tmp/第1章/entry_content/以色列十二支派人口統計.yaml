name: 以色列十二支派人口統計
type: 主題
secondary_types: []
aliases:
- 十二支派人數統計
- 以色列男丁總數
status: formal
definition: 民數記1章記錄十二支派二十歲以上能出去打仗的男丁被數點人數（民1:20-43）：流便46,500、西緬59,300、迦得45,650、猶大74,600、以薩迦54,400、西布倫57,400、以法蓮40,500、瑪拿西32,200、便雅憫35,400、但62,700、亞設41,500、拿弗他利53,400。總計603,550名（民1:45-46）。利未支派不在其中（民1:47-49）。
development: 此統計為曠野時期軍事編制、營盤佈局（民2章）、利未人贖價計算（民3章）的數據基礎；民數記26章第二次普查數字有變動，反映四十年曠野漂流的人口更替。
accumulations:
- book: 民數記
  chapter: 1
  summary: 逐支派列出被數點男丁確切數字，並給出總和603,550，特別註明利未人未被計算。
  relation: 本章提供具體統計數據，驗證神應許亞伯拉罕「子孫如眾星」的部分實現，並為後續律法典與敘事提供人口基數。
