- 旗幟與安營
status: formal
definition: 民數記 1:52-53 規定以色列人「照他們的軍隊，各歸本營，各歸本纛」安營；利未人則「在法櫃帳幕的四圍安營」。此為後續民數記 2 章四面營盤（東猶大、南流便、西以法蓮、北但）與會幕中心佈局的依據。「纛」指支派旗幟/軍旗，象徵身分、秩序與神中心的群體生活。
  GT 背景註釋指出軍營呈方形是這時代埃及的慣例，君王位居受保護的中央；埃及軍兵每個部隊以神祇為名、旗幟之上都有所屬神祇的標記，因此假定每個支派都有象徵該支派事物在其纛上是理所當然的事。
development: 營盤秩序體現「神在百姓中間居住」的神學；BH 指出纛預表信徒聚集在基督的旗幟之下（來12:1-2），也呼應以賽亞書11:10「耶西的根立作萬民的大旗」。
