status: formal
definition: 希伯來文 degel（דֶּגֶל），指支派或軍隊的旗幟/旌旗。本章第 52 節「各歸本纛」，民數記 2:2, 3, 10, 18, 25
  進一步說明各支派「按著旗幟、照著宗族的旗幟」安營，作為軍隊辨識與集結標誌。
development: 雅歌 2:4 「他的旗幟在我以上是愛」；以賽亞書 11:10-12 列國萬民歸向耶西的根如旗幟；啟示錄 7:4-8 十二支派印記延續「旗幟」辨識功能，象徵屬靈軍隊歸屬。
accumulations:
- book: 民數記
  chapter: 1
  summary: 以色列人支搭帳棚，各歸本營，各歸本纛（52 節），確立旗幟為軍隊編制與安營的視覺標識。
  relation: 「纛」將抽象的支派歸屬具體化為可視旗幟，配合「安營」秩序，使六十萬人在曠野能有序集結、行軍、駐紮。
