name: 守法櫃帳幕（Mishkan HaEdut）
type: 主題
secondary_types: []
aliases:
- 法櫃帳幕
- 證據帳幕
status: formal
definition: 指存放法櫃（約櫃）的帳幕，即會幕中至聖所所在的帳幕結構。根據民數記第1章，耶和華吩咐摩西派利未人看守法櫃的帳幕、其中的器具，並負責搬運、豎立、拆卸，且在帳幕四圍安營，免得忿怒臨到以色列會眾（民1:50-53）。
development: ''
accumulations:
- book: 民數記
  chapter: 1
  summary: 利未人被派定看守法櫃帳幕，負責搬運、服事、安營在其四圍。
  relation: 本章確立利未人專職守護法櫃帳幕的制度，區別於其他支派被數點服兵役。
