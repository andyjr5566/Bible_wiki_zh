name: 述說家譜
type: 主題
secondary_types: []
aliases:
- 申報家譜
- 登記家譜
status: formal
definition: 指以色列男丁在被數點時，按家室、宗族、人名數目，口頭陳報自己的家族世系與歸屬（民1:18）。這是古代近東人口普查的常見做法，確保支派界限清晰、產業繼承有據、軍隊編組準確。
development: 民1:18記載「會眾就照他們的家室、宗族、人名的數目，從二十歲以外的，都述說自己的家譜」。這動作配合摩西招聚全會眾後的數點工作（民1:19），由十二支派族長協助（民1:4,
  16-17）。述說家譜不僅是行政登記，更彰顯神對亞伯拉罕後裔應許的具體實現（創15:5），每個名字都在神的紀念冊上。
accumulations:
- book: 民數記
  chapter: 1
  summary: 以色列男丁述說家譜，作為人口普查與軍隊編組的依據。
  relation: 回應神吩咐「按人名的數目計算所有的男丁」（民1:2），連結族長制度與支派身分。
