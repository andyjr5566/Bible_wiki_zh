name: 拿順（猶大族長）
type: 人物
secondary_types: []
aliases:
- 拿順
- Nahshon
status: formal
definition: 亞米拿達的兒子，猶大支派族長（民1:7）。在十二支派族長名單中排第三（民1:7, 16），協助數點猶大男丁74,600名（民1:26-27），為十二支派中人數最多。名字意為「巫術師」或「預言者」。新約馬太福音1:4、路加福音3:32列入耶穌家譜。
development: 亦見於民數記2:3（猶大營首領、龍頭）、7:12-17（獻禮順序第一）、10:14（起行次序第一），顯示猶大支派領袖地位。
accumulations:
- book: 民數記
  chapter: 1
  summary: 列為十二族長第三位，身分為亞米拿達兒子、猶大支派族長，參與第一次人口普查，所屬支派男丁數最多。
  relation: 本章提供其身分、父名、支派歸屬與族長職務的首見記載。
