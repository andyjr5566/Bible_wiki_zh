name: 十二支派族長名單
type: 主題
secondary_types: []
aliases:
- 十二支派首領名單
- 以色列十二族長
status: formal
definition: 民數記1章記載耶和華指定十二支派各一族長，協助摩西、亞倫數點男丁（民1:4-15, 16-17）。名單依支派順序：流便—以利蓿（示丟珥子）、西緬—示路蔑（蘇利沙代子）、猶大—拿順（亞米拿達子）、以薩迦—拿坦業（蘇押子）、西布倫—以利押（希倫子）、以法蓮—以利沙瑪（亞米忽子）、瑪拿西—迦瑪列（比大蓿子）、便雅憫—亞比但（基多尼子）、但—亞希以謝（亞米沙代子）、亞設—帕結（俄蘭子）、迦得—以利雅薩（丟珥子）、拿弗他利—亞希拉（以南子）。這些人均為會中選召、各作本支派首領、以色列軍中統領（民1:16）。
development: 此名單亦見於民數記2章（安營次序）、7章（獻禮順序）、10章（起行次序），顯示族長權威在曠野時期的延續性。
accumulations:
- book: 民數記
  chapter: 1
  summary: 詳細列出十二支派族長姓名、父名與支派歸屬，並說明其身分為會中選召的首領與軍中統領。
  relation: 本章提供族長名單的權威來源，作為後續各章編制、獻禮、行軍秩序的基準名單。
