name: 曉諭摩西說
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 「曉諭摩西說」是舊約常用的啟示公式，表示耶和華向摩西傳達神聖指令。民數記1:1、1:48兩次出現此語，分別啟動人口普查與利未人分別為聖的條例，凸顯摩西作為中保領受神旨的權威管道。
development: 此公式貫穿五經（如出25:1、利1:1、民1:1等），形成「耶和華曉諭摩西說→摩西傳達→百姓順從」的啟示-回應模式；本章雙重出現結構化全章內容：普查令（1:1-46）與利未人職任令（1:48-54）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 第1節與第48節兩度出現「耶和華曉諭摩西說」，分別引出以色列男丁普查與利未人不被數點、專司帳幕事奉的兩大條例。
  relation: 作為本章雙重結構的啟示標記，將普查與利未人分別兩大主題串聯在神命權威下。
