definition: 帕結為亞設支派族長，俄蘭的兒子，在民數記 1 章被選為協助摩西、亞倫數點軍隊的首領。
development: 本章記載其被按名指定為族長，參與人口普查。
accumulations:
- book: 民數記
  chapter: 1
  summary: 帕結作為亞設支派族長，協助摩西、亞倫數點二十歲以上能出去打仗的男丁。
  relation: 顯示神指定各支派族長參與軍隊編組，體現秩序與領導結構。
