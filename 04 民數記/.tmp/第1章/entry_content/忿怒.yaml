name: 忿怒
type: 主題
secondary_types: []
aliases:
- 神的忿怒
- 震怒
- 烈怒
status: formal
definition: 指神因聖潔被冒犯而發出的公義審判。民1:53「利未人要在法櫃帳幕的四圍安營，免得忿怒臨到以色列會眾」。此處「忿怒」非人類情緒，乃神對未經授權接近聖物者的必然回應（參民1:51「外人近前必被治死」；民16-17可拉黨、亞倫杖發芽等事件）。
development: 利未人四圍安營形成「緩衝區」，保護會眾免受神聖潔烈火般的忿怒（參來12:29「我們的神乃是烈火」）。這安排顯示神的恩典：祂提供中保（利未人）、秩序（安營次序）、遮蓋（帳幕），使有罪百姓能存活在祂同在中。忿怒與恩典同在——神住在會眾中，卻設下防線。
accumulations:
- book: 民數記
  chapter: 1
  summary: 利未人環繞法櫃帳幕安營，擋開忿怒不臨到以色列會眾。
  relation: 揭示神聖潔與人罪惡的張力，預表基督作中保擋開神忿怒（羅5:9）。
