name: 比大蓿的兒子迦瑪列
type: 人物
secondary_types: []
aliases:
- Gamaliel
status: formal
definition: 瑪拿西支派族長，比大蓿的兒子。在西乃曠野會幕中，耶和華指名揀選他協助摩西、亞倫進行人口普查，數點瑪拿西支派二十歲以上能出去打仗的男丁（民1:10）。他是約瑟次子瑪拿西支派的代表。
development: 本章記載他被耶和華按名指定為瑪拿西支派的族長（民1:10），與其他十一位族長一同站立，協助摩西、亞倫招聚全會眾、述說家譜、照耶和華吩咐數點男丁（民1:17-19）。名列以法蓮之後，約瑟兩支派中瑪拿西的代表。
accumulations:
- book: 民數記
  chapter: 1
  summary: 耶和華指名揀選迦瑪列作瑪拿西支派族長，協助摩西亞倫數點男丁
  relation: 十二支派族長名單之一，代表瑪拿西支派參與西乃曠野首次人口普查
