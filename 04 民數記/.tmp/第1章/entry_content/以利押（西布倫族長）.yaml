name: 以利押（西布倫族長）
type: 人物
secondary_types: []
aliases:
- 以利押
- Eliab
status: formal
definition: 希倫的兒子，西布倫支派族長（民1:9）。在十二支派族長名單中排第五（民1:9, 16），協助數點西布倫男丁57,400名（民1:30-31）。名字意為「神是父」或「我的神是父」。須與利未人以利押（代上6:27）、大衛兄長以利押（撒上16:6）區別。
development: 亦見於民數記2:7（西布倫營首領）、7:24-29（獻禮順序第三）、10:16（起行次序第三）。
accumulations:
- book: 民數記
  chapter: 1
  summary: 列為十二族長第五位，身分為希倫兒子、西布倫支派族長，參與第一次人口普查。
  relation: 本章提供其身分、父名、支派歸屬與族長職務的首見記載。
