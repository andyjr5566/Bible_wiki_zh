    evidence: "民17:8-9 第二天摩西進法櫃的帳幕去，誰知利未族亞倫的杖已經發了芽，生了花苞，開了花，結了熟杏。摩西就把所有的杖從耶和華面前拿出來，給以色列眾人看，他們就看見了，各人認自己的杖。四份註解均記載此為復活生命顯明神揀選。"
    surfaces:
      - "亞倫杖發芽"
      - "生花苞開花結杏"
      - "復活生命顯明"
      - "神揀選證據"
