book: "民數記"
chapter: 17
candidates:
  - name: "耶和華吩咐取十二支派杖放法櫃前"
    type: "事件"
    evidence: "民17:1-7 耶和華對摩西說：你曉諭以色列人，從他們手下取杖，每支派一根，從他們所有的首領按著支派共取十二根。將各人的名字寫在各人的杖上，並要將亞倫的名字寫在利未的杖上。摩西曉諭以色列人，他們的首領就把杖交給他，按著支派每首領一根，共有十二根；亞倫的杖也在其中。摩西就把杖存在法櫃的帳幕內，在耶和華面前。四份註解均記載此為神主權揀選祭司的公開試驗。"
    surfaces:
      - "取杖每支派一根"
      - "寫名字在杖上"
      - "存在法櫃前"
      - "亞倫杖在其中"
  - name: "亞倫杖發芽生苞開花結杏"
