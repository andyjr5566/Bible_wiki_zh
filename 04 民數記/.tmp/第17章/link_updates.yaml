- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民17章記載耶和華吩咐摩西取十二支派杖放法櫃前，摩西曉諭以色列人收杖、存放、次日進帳幕見亞倫杖發芽，取出眾杖給百姓看，照耶和華吩咐將亞倫杖放回法櫃前作記號。四份註解均記載摩西作中保領袖執行神揀選試驗，展現順服與忠心。"
  "relation": "本章為摩西在可拉黨背叛後（民16），執行神主權揀選祭司的公開試驗：從吩咐取杖、寫名、存法櫃前，到見證亞倫杖發芽、示眾、存放，全程摩西不為自己辯護，唯獨順服執行神命，展現「極其謙和，勝過世上眾人」（民12:3）的中保風範。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民17章記載亞倫的名字寫在利未杖上，亞倫杖發芽生苞開花結杏，成為神揀選大祭司的公開證據，杖被放回法櫃前作永久記號。四份註解均記載亞倫為神揀選的大祭司，杖發芽預表復活生命。"
  "relation": "本章為亞倫大祭司職分的公開驗證：民16章香爐試驗中神以火顯明亞倫為真祭司，民17章以死杖發芽結杏顯明亞倫杖有復活生命，雙重見證確立亞倫祭司職分的神聖性與永久性。  預表基督「憑無盡生命的大能」成就永遠大祭司（來7:16）。"
