name: 死杖發芽表徵復活生命
type: 神學
secondary_types: []
aliases:
- 枯杖發芽預表復活
- 死木生生命
status: formal
definition: 亞倫杖原是枯乾死木，一夜之間發芽、開花、結熟杏，象徵神使死而復活的生命權柄，預表基督復活成為永遠大祭司（民17:8；參約11:25，來7:16）。
development: 經文強調「發芽、生苞、開花、結杏」四階段同時呈現（v.8），超越自然生長規律，彰顯創造主賜生命權能，作為祭司職分屬靈生命供應的神學隱喻。
accumulations:
- book: 民數記
  chapter: 17
  summary: 枯杖發芽結果，表徵神賜復活生命，確立祭司職分屬靈性質。
  relation: 從神蹟現象引申神學意義，連結新約基督復活大祭司職分。
