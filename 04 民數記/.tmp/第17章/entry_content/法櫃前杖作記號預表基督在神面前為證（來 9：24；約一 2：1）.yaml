name: 法櫃前杖作記號預表基督在神面前為證（來 9：24；約一 2：1）
type: 互文
secondary_types: []
aliases:
- 法櫃前杖作記號
status: formal
definition: 民數記 17:10 耶和華吩咐將亞倫的杖「還放在法櫃前，給這些背叛之子留作記號」。這預表基督升天進入「天上真聖所」（來 9:24），在神面前為我們顯現，作為神悅納我們、赦免我們叛逆的永恆憑據。約翰一書
  2:1 稱基督為「在父面前作我們中保的義者耶穌基督」。
development: 亞倫杖放在法櫃前（地上聖所的中心），作為神揀選的有形記號；基督進入天上聖所（真實的聖所），以復活榮耀的身體常為信徒代求，作為神恩典與赦免的永恆記號。地上記號會朽壞，天上中保卻長存不朽。
accumulations:
- book: 民數記
  chapter: 17
  summary: 亞倫杖存放法櫃前，作為給背叛之子的記號，止息怨言。
  relation: 提供預表框架，法櫃前的杖象徵神面前的見證。
- book: 希伯來書
  chapter: 9
  summary: 基督進入天上真聖所，在神面前為我們顯現。
  relation: 新約實現，基督親自成為在神面前的活記號與中保。
