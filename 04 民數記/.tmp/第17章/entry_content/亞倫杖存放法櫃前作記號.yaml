name: 亞倫杖存放法櫃前作記號
type: 事件
secondary_types: []
aliases:
- 亞倫杖作記號
- 杖存法櫃
status: formal
definition: 耶和華命摩西將亞倫杖放回法櫃前（見證櫃前），給悖逆之子留作記號，使怨言止息，免得死亡（民17:10-11）。
development: 眾杖被取出觀看後（v.9），神指示單獨保留亞倫杖在法櫃前長存（v.10），摩西照辦（v.11），成為神揀選祭司制度的永久見證（參來9:4）。
accumulations:
- book: 民數記
  chapter: 17
  summary: 亞倫杖被放回法櫃前作為永久記號，止息怨言。
  relation: 事件收尾，確立祭司職分神聖不可動搖的目擊證據。
