name: 發芽（parach）
type: 原文
secondary_types: []
aliases:
- parach
- 發芽
status: formal
definition: 希伯來文 פָּרַח (parach)，基本義「發芽、發嫩芽、開花」；本章用於亞倫杖「發了芽」（民17:8），描述枯杖瞬間長出嫩芽，並連續生苞、開花、結杏，強調超自然生命爆發。
development: 該詞在舊約多用於植物生長（如創40:10葡萄藤發芽，出9:31亞麻開花），本章獨特用於死木復生，成為神揀選祭司、賜復活生命的標誌性動詞。
accumulations:
- book: 民數記
  chapter: 17
  summary: 經文記載亞倫杖 parach（發芽），作為神揀選的神蹟核心動作。
  relation: 原文動詞精確描繪神蹟過程第一階段，奠定「死杖發芽表徵復活生命」神學基礎。
related_entries:
- 亞倫杖發芽生苞開花結杏
- 死杖發芽表徵復活生命
- 杏（shaqed）
