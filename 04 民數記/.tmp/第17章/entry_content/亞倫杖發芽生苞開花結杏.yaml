name: 亞倫杖發芽生苞開花結杏
type: 事件
secondary_types: []
aliases:
- 亞倫杖發芽
- 杖生杏
status: formal
definition: 翌日摩西進帳幕，見利未支派亞倫的杖已發芽（parach）、生花苞、開花、結熟杏（shaqed），顯明神揀選亞倫為大祭司（民17:8）。
development: 此神蹟發生在杖安置法櫃前一夜之後（v.7-8），摩西取出眾杖給百姓看，各首領認回自己的杖（v.9），唯亞倫杖留下作永久記號（v.10）。
accumulations:
- book: 民數記
  chapter: 17
  summary: 亞倫杖在一夜之間發芽開花結果，證明神揀選。
  relation: 本章高潮神蹟，以死杖復活生命回應可拉黨質疑祭司職分。
