name: 亞倫杖發芽預表基督復活大祭司（來 4：14-16；9：11-12）
type: 互文
secondary_types: []
aliases:
- 亞倫杖預表基督
status: formal
definition: 民數記 17 章亞倫的死杖一夜之間發芽、開花、結熟杏，預表耶穌基督作為大祭司，雖死卻復活，以不能滅壞的生命權柄進入天上真聖所，成就永遠贖罪。希伯來書
  4:14-16；9:11-12 肯定基督為「已經升入高天尊榮的大祭司」，其復活生命即是神揀選的終極印證。
development: 亞倫杖的神蹟在舊約確立利未祭司職分的合法性；新約以此為影兒，指向基督復活大祭司的真實與永效。死杖發芽象徵死裏復活，結熟杏象徵生命豐盛成熟，皆在基督身上完全應驗。
accumulations:
- book: 民數記
  chapter: 17
  summary: 亞倫杖在法櫃前發芽結杏，作為神揀選亞倫的記號。
  relation: 提供舊約預表基礎，死杖復甦結實預表基督復活升天作大祭司。
- book: 希伯來書
  chapter: 9
  summary: 基督作大祭司，憑自己的血一次進入聖所，成了永遠贖罪。
  relation: 新約應驗，基督復活生命取代亞倫杖神蹟，成為神揀選的永恆憑據。
