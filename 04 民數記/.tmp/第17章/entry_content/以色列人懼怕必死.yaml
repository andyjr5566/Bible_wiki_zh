name: 以色列人懼怕必死
type: 事件
secondary_types: []
aliases:
- 百姓恐懼死亡
- 我們死啦
status: formal
definition: 見證亞倫杖神蹟後，以色列人向摩西喊稱「我們死啦！我們滅亡啦！都滅亡啦！」，恐懼凡挨近耶和華帳幕的必死，連自己也難逃一死（民17:12-13）。
development: 此反應緊隨亞倫杖存放法櫃前（v.11），顯示百姓雖見神蹟止息怨言暫止，卻因聖潔敬畏轉為極端恐懼，預備進入第18章祭司利未守職贖罪的安排。
accumulations:
- book: 民數記
  chapter: 17
  summary: 百姓因見神蹟而極度恐懼，自認必死。
  relation: 本章結尾的群體反應，凸顯聖潔神與罪人之間的張力，引出下章祭司職分贖罪供應。
