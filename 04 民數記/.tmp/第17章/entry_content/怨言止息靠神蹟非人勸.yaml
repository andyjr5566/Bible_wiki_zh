name: 怨言止息靠神蹟非人勸
type: 神學
secondary_types: []
aliases:
- 神蹟止息怨言
- 怨言因神蹟止住
status: formal
definition: 耶和華宣告以杖發芽神蹟使以色列人向摩西亞倫的怨言止息，免得他們死亡（民17:5, 10）；人勸無效，唯有神主權神蹟能徹底平息叛逆（參民16-17對比）。
development: 經文兩次提及「怨言止息」（v.5, 10），對照第16章地裂火燒仍不悔改，本章單一神蹟即達成人言不可及的效果，顯示神蹟在確立權柄上的獨特功用。
accumulations:
- book: 民數記
  chapter: 17
  summary: 神以杖發芽神蹟止息百姓怨言，非人勸所能。
  relation: 強調神蹟在權柄確認上的決定性角色，對比人類勸說的無力。
