name: 祭司職分嚴肅性
type: 神學
secondary_types: []
aliases:
- 祭司職分神聖不可侵犯
- 祭司職分嚴重性
status: formal
definition: 本章以死杖發芽、存放法櫃前作記號、百姓恐懼必死（民17:8, 10, 12-13），多重印證祭司職分乃神聖特權，非屬靈野心可覬覦，違犯者必死，預表基督大祭司職分永不更改（來7:24）。
development: 從神蹟驗證（v.8）、永久記號（v.10）到百姓敬畏（v.12-13），層層遞進彰顯祭司職分的聖潔嚴肅，為第18章祭司利未守職責任奠定神學基礎。
accumulations:
- book: 民數記
  chapter: 17
  summary: 透過神蹟、記號、百姓恐懼，確立祭司職分極嚴肅神聖。
  relation: 本章神學總結，連結下章祭司利未職分與贖罪供應。
