organization: "### 摩押平原的危機與巴勒的召喚（v1-7）\n以色列人在出埃及四十年後，終於來到 **[[摩押平原]]** 安營，對著 **[[耶利哥]]**（v1）。**[[摩押王巴勒]]**\
  \ 親眼看見以色列擊敗亞摩利人，**[[巴勒看見以色列擊敗亞摩利人|心生大懼]]**（v2-3）。他聯同 **[[摩押長老]]** 與 **[[摩押米甸長老拿卦金見巴蘭|米甸長老]]**，手持\
  \ **[[卦金（qesem）|卦金]]** 派遣使者往 **[[毗奪]]** 召 **[[巴蘭是否真先知還是假先知|巴蘭]]** 來咒詛以色列（v4-7）。巴勒深信「你為誰祝福誰就得福，你咒詛誰誰就受咒詛」（v6），這反映古近東普遍視咒詛為可操控的屬靈武器，卻忽略\
  \ **[[神主權超越咒詛祝福|耶和華的主權]]**。\n\n### 神的雙重回應與巴蘭的動搖（v8-20）\n首次詢問時，**[[神禁止巴蘭同去咒詛|神明確禁止]]**\
  \ 巴蘭同去，因以色列是蒙福的民（v12）。巴蘭順服拒絕首批使臣（v13-14）。**[[巴勒再差遣更多更尊貴的使臣|巴勒加派重臣]]** 並許以厚利（v15-17），巴蘭雖口稱「不得越過耶和華的命」（v18），卻再次求問神，顯露\
  \ **[[巴蘭預表假先知貪圖卦金|貪圖不義之工價]]** 的內心（參彼後 2:15）。神此次 **[[神允許巴蘭同去但只說神的話|許可同去]]** 但嚴守「只說我對你說的話」（v20），這引發\
  \ **[[神是否改變心意允許巴蘭同去|神心意是否改變]]** 的神學討論：實為容許計畫在審判中成就祝福。\n\n### 驢與使者：神奇妙的攔阻與啟示（v21-35）\n\
  巴蘭騎驢上路，**[[神使驢開口責備巴蘭互文|耶和華發怒]]** 派使者攔阻（v22）。驢三次避開持刀使者（v23、25、27），巴蘭三次毆打驢。神開驢口責備，再開巴蘭眼看見使者（v28-31）。這\
  \ **[[驢開口說話預表神奇妙拯救|非常手段]]** 證明：連畜牲都比屬靈眼瞎的先知更敏銳。**[[巴蘭眼目明亮看見耶和華使者|巴蘭眼目明亮]]** 後俯伏認罪（v34），使者重申只許說神的話（v35）。\n\
  \n> [!note] 三次相遇對照\n> | 次數 | 地點 | 驢的反應 | 巴蘭的反應 |\n> |------|------|------------|--------------|\n\
  > | 1 | 寬闊大路 | 闖入田間 | 打驢趕回路 |\n> | 2 | 葡萄園窄路 | 貼牆擠傷巴蘭腳 | 再打驢 |\n> | 3 | 無法轉折之處 |\
  \ 臥在地上 | 發怒用杖打驢 |\n\n```mermaid\nsequenceDiagram\n    participant B as 巴蘭\n    participant\
  \ D as 驢\n    participant A as 耶和華使者\n    participant G as 神\n    B->>D: 騎驢上路\n\
  \    G->>A: 派使者攔阻\n    A->>D: 站在路中持刀\n    D->>B: 三次避開\n    B->>D: 三次毆打\n    G->>D:\
  \ 開口責備\n    G->>B: 開眼看見使者\n    B->>A: 俯伏認罪\n    A->>B: 只許說神的話\n```\n\n### 巴蘭抵達摩押：初見以色列營（v36-41）\n\
  **[[巴勒迎接巴蘭到基列胡瑣|巴勒在邊境迎接]]** 巴蘭至 **[[基列胡瑣]]**（v36-37）。巴蘭再次聲明 **[[巴勒召巴蘭咒詛以色列互文|只能說神賜的話]]**（v38）。巴勒宰牛羊款待，清早帶巴蘭上\
  \ **[[巴力的高處]]**，從此 **[[巴勒獻牛羊巴蘭觀看以色列營|觀看以色列營邊界]]**（v39-41），為後續三次求神發託、反成祝福鋪排。\n\n\
  > [!important] 本章樞紐\n> 神的主權不受人操控：咒詛無法凌駕亞伯拉罕之約的祝福（創 12:3）。巴蘭雖具先知恩賜，卻因貪慾成為 **[[巴蘭愛不義之工價互文|假先知的反面典型]]**（猶\
  \ 1:11），神卻借驢、借使者、借敵對國王，將咒詛轉為祝福，彰顯 **[[神主權超越咒詛祝福|救恩計畫的不可阻擋]]**。"
