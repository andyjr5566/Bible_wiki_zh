definition: 民數記22章記載巴蘭因貪圖巴勒所送的卦金，接受差遣前往咒詛以色列，顯示假先知為不義之財而出賣屬靈恩賜的典型。
development: 本章透過巴蘭與巴勒的互動，揭示假先知內心貪婪、不顧神旨意的屬靈光景。
