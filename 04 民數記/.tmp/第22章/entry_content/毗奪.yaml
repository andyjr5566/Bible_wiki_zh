definition: 毗奪位於大河邊，是比珥的兒子巴蘭的本鄉，巴勒差遣使者往該處召巴蘭。
development: 毗奪作為巴蘭的居住地，成為巴勒尋求咒詛以色列的起點，顯示地理與屬靈事件的連結。
