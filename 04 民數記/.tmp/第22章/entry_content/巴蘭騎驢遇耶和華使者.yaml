name: 巴蘭騎驢遇耶和華使者
type: 事件
secondary_types: []
aliases:
- 巴蘭驢遇天使
status: formal
definition: 神因巴蘭去而發怒，耶和華使者站在路上敵擋。巴蘭騎驢，驢三次看見使者手持拔出的刀而避讓（進田間、貼牆擠傷腳、臥在地上），巴蘭三次打驢。耶和華叫驢開口責備巴蘭，隨後開巴蘭眼目，看見使者站在路上。使者責備巴蘭行事偏僻，說若非驢避讓，早殺巴蘭存驢。巴蘭認罪，使者囑咐同去但只說神的話（民22:22-35）。
development: ''
accumulations:
- book: 民數記
  chapter: 22
  summary: 記載巴蘭在路上遭遇耶和華使者攔阻，驢三次避讓、開口說話、巴蘭眼目明亮看見使者，確認神對巴蘭言語的絕對掌控。
  relation: 以神蹟介入保護神旨意，回應「巴蘭是否真先知還是假先知」爭議，並預表神奇妙拯救（驢開口說話預表神奇妙拯救）。
