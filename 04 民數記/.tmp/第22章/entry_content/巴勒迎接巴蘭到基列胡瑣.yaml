name: 巴勒迎接巴蘭到基列胡瑣
type: 事件
secondary_types: []
aliases:
- 巴勒迎巴蘭至基列胡瑣
status: formal
definition: 巴勒聽見巴蘭來了，往摩押京城（在邊界上、亞嫩河旁）迎接他，責問為何不早來、豈不能使他得尊榮。巴蘭回應：「我已經到你這裡來了！現在我豈能擅自說什麼呢？神將什麼話傳給我，我就說什麼。」二人同行來到基列胡瑣（民22:36-39）。
development: ''
accumulations:
- book: 民數記
  chapter: 22
  summary: 記載巴勒親自迎接巴蘭至邊境城市基列胡瑣，巴蘭重申只說神話語的原則。
  relation: 為後續巴力高處觀看以色列營、獻祭、發預言鋪陳場景與關係張力。
