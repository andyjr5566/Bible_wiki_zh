name: 巴蘭的驢
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 巴蘭騎乘的驢，在路上三次看見耶和華的使者並避開，後被耶和華開口責備巴蘭，成為神奇妙介入的工具。
development: 驢的靈敏與開口說話，反襯巴蘭屬靈的盲目，彰顯神能使用卑微受造物成就旨意。
