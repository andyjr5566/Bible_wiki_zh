name: 神允許巴蘭同去但只說神的話
type: 事件
secondary_types: []
aliases:
- 神許巴蘭同去限制言語
status: formal
definition: 當夜神臨到巴蘭說：「這些人若來召你，你就起來同他們去，你只要遵行我對你所說的話」（民22:20）。巴蘭早晨備驢與摩押使臣同去（民22:21）。神雖允許同行，但嚴格限制只能說神所賜的話。
development: ''
accumulations:
- book: 民數記
  chapter: 22
  summary: 記載神在第二次求問中允許巴蘭同去，但附加「只說神的話」條件，顯示神主權掌控巴蘭言語。
  relation: 解釋為何神先禁止後允許（神是否改變心意允許巴蘭同去），並預示後續巴蘭只能發出祝福而非咒詛。
