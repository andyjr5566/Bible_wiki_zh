status: formal
definition: 神在民數記22章明確宣告以色列是蒙福的百姓，禁止巴蘭咒詛，彰顯神的主權高過任何咒詛或祝福的操控。
development: 經文顯示神主動干預，阻止巴蘭的咒詛計畫，證明祝福與咒詛最終掌握在神手中。
accumulations:
- book: 民數記
  chapter: 22
  summary: 神禁止巴蘭咒詛以色列，宣告該民蒙福
  relation: 本章以神的命令直接否定咒詛，彰顯神主權超越人為的咒詛祝福
