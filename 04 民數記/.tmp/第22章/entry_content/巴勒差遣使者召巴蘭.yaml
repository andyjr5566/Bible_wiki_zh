  chapter: 22
  summary: 記載巴勒首次差遣使者攜帶卦金召巴蘭咒詛以色列，揭開巴蘭與巴勒互動的序幕。
  relation: 開啟本章核心衝突：巴勒企圖以屬靈手段對抗神祝福的百姓。
