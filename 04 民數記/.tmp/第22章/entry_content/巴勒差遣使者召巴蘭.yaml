name: 巴勒差遣使者召巴蘭
type: 事件
secondary_types: []
aliases:
- 巴勒召巴蘭
status: formal
definition: 巴勒差遣使者往大河邊的毘奪，到比珥的兒子巴蘭本鄉那裡，召巴蘭來為他咒詛以色列民（民22:5-6）。巴勒自述這民比他強盛，求巴蘭咒詛，好得勝趕出此地，因知道巴蘭祝福誰誰就得福，咒詛誰誰就受咒詛。
development: ''
