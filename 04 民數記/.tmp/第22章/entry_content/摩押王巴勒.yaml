name: 摩押王巴勒
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 摩押王巴勒（西撥的兒子）因懼怕以色列民眾多，差遣使者帶卦金召巴蘭來咒詛以色列，後親自迎接巴蘭並獻祭。
development: 巴勒代表世俗君王試圖以屬靈手段操控神的旨意，最終見證神的主權不可被人掌控。
accumulations:
- book: 民數記
  chapter: 22
  summary: 巴勒差遣使者召巴蘭，後迎接巴蘭到基列胡瑣並獻牛羊
  relation: 本章記載巴勒的恐懼、謀劃與最終無法阻擋神的祝福
