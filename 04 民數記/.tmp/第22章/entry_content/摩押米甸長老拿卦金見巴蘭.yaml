status: formal
definition: 摩押的長老和米甸的長老手裡拿著卦金，到了巴蘭那裡，將巴勒的話都告訴了他（民22:7）。這顯示摩押與米甸聯手，以占卜酬勞（卦金）尋求屬靈操控。
development: ''
accumulations:
- book: 民數記
  chapter: 22
  summary: 記載摩押米甸長老攜帶卦金親自前往毘奪，向巴蘭轉達巴勒的請求。
  relation: 具體執行巴勒差遣使者的命令，將卦金作為咒詛服務的代價，引出巴蘭求問神的回應。
