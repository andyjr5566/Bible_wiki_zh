status: formal
definition: 以色列人起行，在摩押平原、約但河東，對著耶利哥安營（民22:1）。這標誌著以色列進入迦南地前的最後一站，地理位置鄰近摩押與耶利哥，引發摩押王巴勒的恐懼與後續召喚巴蘭咒詛的事件。
