status: formal
definition: 摩押王西撥的兒子巴勒看見以色列人向亞摩利人所行的一切事（民22:2）。這包括擊敗西宏王與噩王（民21:21-35），使巴勒與摩押人大大懼怕、心內憂急（民22:3）。
development: ''
