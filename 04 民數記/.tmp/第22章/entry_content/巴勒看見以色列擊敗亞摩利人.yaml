- book: 民數記
  chapter: 22
  summary: 記載巴勒目睹以色列擊敗亞摩利人的戰果，導致摩押極度恐慌，成為召喚巴蘭咒詛的動機。
  relation: 直接觸發巴勒差遣使者召巴蘭的決策（民22:5-6）。
