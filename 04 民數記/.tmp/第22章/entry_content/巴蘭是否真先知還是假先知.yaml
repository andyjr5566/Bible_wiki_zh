name: 巴蘭是否真先知還是假先知
type: 解經爭議
secondary_types: []
aliases:
- 巴蘭先知身分爭議
- 巴蘭真假先知辨析
status: formal
definition: 學者對巴蘭身分存有爭議：(1) 真先知說——巴蘭能聽神話語（民22:8-9, 12-13, 18-20），神確實藉他說預言（民23-24），新約彼後2:15稱他為「先知」；(2)
  假先知/占卜者說——他以占卜為業（民22:7 qesem），貪圖卦金（民22:17-18；彼後2:15），後來教導巴勒使以色列犯淫（民31:16），猶1:11列為「巴蘭的錯謬」。本章呈現其雙重面向：外在順服神命、內心貪戀尊榮金銀。
development: 爭議貫穿舊約敘事與新約神學評價。本章關鍵在於「神使用不合格的器皿成就旨意」（民22:20, 35, 38），而非認證巴蘭屬靈狀態。解經需區分「蒙召/被使用」與「得救/屬靈真實」兩個層面。
accumulations:
- book: 民數記
  chapter: 22
  summary: 巴蘭自稱「耶和華─我神」（22:18），能聽神話（22:9-12, 20），卻因貪圖卦金再求神（22:19）並獲准同去（22:20-21），引發神怒（22:22）。
  relation: 本章提供雙向證據，支撐雙方論點，核心張力在於「神主權使用」與「人責任回應」的辨別。
