name: 卦金（qesem）
type: 原文
secondary_types: []
aliases:
- 卦金
- qesem
- 占卜費
status: formal
definition: 希伯來文 qesem（קֶסֶם），原意「占卜、算命」，引申為「占卜的報酬、卦金」。摩押與米甸長老手拿卦金前往召巴蘭（民22:7），顯示巴蘭被視為職業占卜先知，巴勒期望以金銀購買咒詛服務。
development: 此詞在本章僅出現於第7節，但貫穿巴蘭敘事的貪財動機主軸（彼後2:15「不義之工價」；猶1:11「巴蘭的錯謬」），成為評價巴蘭屬靈屬性的關鍵詞彙。
accumulations:
- book: 民數記
  chapter: 22
  summary: 摩押長老與米甸長老手裡拿著卦金，到了巴蘭那裡（22:7）。
  relation: 直接揭示巴蘭被召的商業交易性質，為後續「巴蘭愛不義之工價」的新約定論鋪墊。
