definition: 以色列人在民數記22章1節於摩押平原、約但河東、對著耶利哥安營，作為進入迦南前的最後駐紮地。
development: 此地點標誌以色列即將進入應許之地，也成為巴勒恐懼與召喚巴蘭的背景。
