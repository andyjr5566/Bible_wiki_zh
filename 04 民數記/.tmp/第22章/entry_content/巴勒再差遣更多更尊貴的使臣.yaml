name: 巴勒再差遣更多更尊貴的使臣
type: 事件
secondary_types: []
aliases:
- 巴勒再派使臣
status: formal
definition: 巴勒聽聞巴蘭拒絕，又差遣使臣，比先前又多又尊貴（民22:15）。他們到巴蘭那裡，轉達巴勒應許極大尊榮、隨意給予代價，只求來咒詛這民（民22:16-17）。
development: ''
accumulations:
- book: 民數記
  chapter: 22
  summary: 記載巴勒不死心，升級誘餌再次派遣高規格使團，試圖動搖巴蘭決心。
  relation: 考驗巴蘭是否堅守神命令，引出巴蘭再次求問神、神有條件允許同去的轉折。
