  summary: 記載巴勒獻祭款待巴蘭，並帶往巴力高處觀看以色列營邊界，作為咒詛/預言的視覺定位。
  relation: 直接引出民數記23章巴蘭第一次預言（在巴力高處），顯示巴勒企圖以祭祀與視角操控屬靈結果。
