status: formal
definition: 巴勒宰了牛羊，送給巴蘭和陪伴的使臣。早晨，巴勒領巴蘭到巴力的高處，巴蘭從那裡觀看以色列營的邊界（民22:40-41）。這是巴蘭第一次預言前的準備儀式。
