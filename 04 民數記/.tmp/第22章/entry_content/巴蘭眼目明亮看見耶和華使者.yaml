name: 巴蘭眼目明亮看見耶和華使者
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記22章31節記載耶和華使巴蘭的眼目明亮，得以看見手持拔出刀的耶和華使者，顯示神賜屬靈眼光使人認識神的審判與保護。
development: 巴蘭原本屬靈眼瞎，唯有神開啟其眼目才能看見屬靈實相，預表屬靈覺醒的必要性。
accumulations:
- book: 民數記
  chapter: 22
  summary: 耶和華使巴蘭眼目明亮，看見耶和華使者站在路上
  relation: 本章展示神主動開啟屬靈眼目，使巴蘭認識神的阻擋與恩典
