    type: "事件"
    evidence: "民22:18-20 巴蘭回答巴勒的臣僕說：巴勒就是將他滿屋的金銀給我，我行大事小事也不得越過耶和華─我神的命。現在我請你們今夜在這裡住宿，等我得知耶和華還要對我說什麼。當夜，神臨到巴蘭那裡，說：這些人若來召你，你就起來同他們去，你只要遵行我對你所說的話。丁良才：神允許巴蘭去，但限制他只能說神的話。"
