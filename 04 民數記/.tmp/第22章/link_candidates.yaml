    type: "事件"
    evidence: "民22:8-12 巴蘭說：你們今夜在這裡住宿，我必照耶和華所曉諭我的回報你們。神臨到巴蘭那裡，說：在你這裡的人都是誰？巴蘭回答說：是摩押王西撥的兒子巴勒打發人到我這裡來...神對巴蘭說：你不可同他們去，也不可咒詛那民，因為那民是蒙福的。丁良才：巴蘭是異教徒，可能風聞真神耶和華，把祂當成眾神之一。"
