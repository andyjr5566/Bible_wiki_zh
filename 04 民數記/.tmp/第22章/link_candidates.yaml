    type: "事件"
    evidence: "民22:5-6 他差遣使者往大河邊的毗奪去，到比珥的兒子巴蘭本鄉那裡，召巴蘭來，說：有一宗民從埃及出來，遮滿地面，與我對居。這民比我強盛，現在求你來為我咒詛他們。丁良才：巴勒企圖借助鬼魔超自然的能力。"
