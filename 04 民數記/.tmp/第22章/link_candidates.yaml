      - "不得越過耶和華的命"
      - "遵行我對你所說的話"
  - name: "巴蘭騎驢遇耶和華使者"
    type: "事件"
    evidence: "民22:21-35 巴蘭早晨起來，備上驢，和摩押的使臣一同去了。神因他去就發了怒；耶和華的使者站在路上敵擋他...驢看見耶和華的使者站在路上，手裡有拔出來的刀，就從路上跨進田間...耶和華叫驢開口，對巴蘭說：我向你行了什麼，你竟打我這三次呢？...當時，耶和華使巴蘭的眼目明亮，他就看見耶和華的使者站在路上，手裡有拔出來的刀，巴蘭便低頭俯伏在地。丁良才：巴蘭雖蒙神光照，仍屬肉體，貪圖卦金，神用驢開口責備他。"
