    type: "事件"
    evidence: "民22:13-17 巴勒又差遣使臣，比先前的又多又尊貴。他們到了巴蘭那裡，對他說：西撥的兒子巴勒這樣說：求你不容什麼事攔阻你不到我這裡來，因為我必使你得極大的尊榮。丁良才：巴勒對巴蘭讚賞的話，顯出他受信任之深；但也隱示其人以沒有原則著名，只要有錢就可辦事。"
