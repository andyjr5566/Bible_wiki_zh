organization: "### 耶和華吩咐安營次序與纛旗意義（v1-2）\n\n本章開篇記載「耶和華曉諭摩西、亞倫」（v1），確立一切編組源於神的主權命令。v2\
  \ 核心指令有三層：一、各歸自己的纛下（standard），以旗號為識別與號令單位，這就是[[安營與纛|安營與纛]]的基本原則；二、在本族的旗號那裡，強調宗族單位；三、對著[[會幕（帳幕整體）|會幕]]的四圍安營，確立會幕為幾何與屬靈中心。CT\
  \ 指出「對著會幕的四圍安營」表徵以基督為中心，全軍在基督率領之下；GT《啟導本》補充「對著會幕」亦可譯「與會幕間有相當距離」，《約書亞記》三4 規定約櫃與營邊距二千肘（約一公里），顯示神的聖潔與臨在既親近又超越。KC\
  \ 強調「纛」是指揮方向、維持秩序的工具，猶太傳統認為四大纛分別繪獅子（猶大）、人首（流便）、牛（以法蓮）、鷹（但），四活物意象預表基督四面榮耀（啟4:7）。BH\
  \ 註釋指出「各人在自己的旗幟下」反映神秩序的神性，也預表教會各肢體在基督身上各有定位（林前12:18）。\n\n### 四面營陣：母系關聯與屬靈方位（v3-31）\n\
  \n經文按東、南、西、北四方依次排列，每方三支派共十二支派，形成十字架隊形。CT 與 GT 同指此結構象徵十字架乃防守禦敵之道。四營母系淵源清晰可見，現整理如下表（表格內不加別名連結，純文字呈現）：\n\
  \n| 方位 | 領頭支派（纛） | 隸屬支派 | 母系來源 | 人數 | 起行次序 |\n|------|----------------|----------|----------|------|----------|\n\
  | 東（日出） | 猶大支派 | 以薩迦、西布倫 | 利亞所生 | 186,400 | 第一隊 |\n| 南（右側） | 流便\
  \ | 西緬、迦得 | 利亞與婢女悉帕 | 151,450 | 第二隊 |\n| 西（海側） | 以法蓮 | 瑪拿西、便雅憫 | 拉結所生（孫/子）\
  \ | 108,100 | 第三隊 |\n| 北（隱藏） | 但支派 | 亞設、拿弗他利 | 婢女辟拉、悉帕 | 157,600 | 末隊 |\n\
  \n**東邊——猶大營（v3-9）**：會幕門朝東，摩西亞倫營於東側內層（三38），為最尊榮方位。猶大意「讚美」，拿順為亞倫妻兄、大衛先祖（得四21-22），預表基督出自猶大（來7:14）。KC\
  \ 指出猶大因流便、西緬、利未失位而成為長子領袖（創49:8-10），「讚美的靈是能力的靈」（代下20:22），教會聚會首要目的是讚美敬拜。\n\n**南邊——流便營（v10-16）**：南方意「右側」，象徵尊榮地位（來1:3）。流便雖為長子卻因犯罪失權（創49:3-4），此處由利亞二子西緬、婢女長子迦得陪伴。KC\
  \ 注意到實際行軍時，革順族與米拉利族抬帳幕在猶大營後、流便營前（十17-20），故流便營實為第三行列。\n\n**中間——會幕與利未營（v17）**：會幕與[[利未支派|利未營]]夾在前二隊與後二隊中間，「他們怎樣安營就怎樣往前行」，KC\
  \ 強調帳幕聖物佔最中心位置，神要百姓隨時以神為中心。利未人不列作戰名冊（v33），專司搬運會幕器具。\n\n**西邊——以法蓮營（v18-24）**：西方意「海側」，象徵試煉與結果（創1:20-23）。以法蓮意「雙倍果子」，與瑪拿西、便雅憫同為拉結後裔。KC\
  \ 引詩八十1-2，三支派在約櫃後行走，預表患難中結出果子。\n\n**北邊——但營（v25-31）**：北方意「隱藏」，最遠日光，象徵屬靈黑暗面。但被雅各比為蛇（創49:17），後來最早引入偶像崇拜（士十八30）。但營人數最多（157,600），擔任殿後護衛，KC\
  \ 指出三支派皆出婢女，地位較低卻負重責。\n\n### 總數點驗與順服記載（v32-34）\n\nv32 總計六十萬零三千五百五十名（與一46 相符），這就是[[以色列人的軍隊|以色列人的軍隊]]總數；v33\
  \ 重申利未人不在數中；v34 結語「以色列人就這樣行……都是照耶和華所吩咐摩西的」。CT 點出這表示百姓對神絕對順服，「人在神面前最美麗的樣式是謙卑和順服」（撒上15:22）。GT《串珠註釋》感嘆數百萬人曠野四十年秩序井然，全因神起初匠心組織；《精讀本》強調「安營起行」涵蓋三十八年曠野旅程（申2:14）。\n\
  \n> [!note] 來源解讀非經文明言\n> - 四大纛圖騰（獅子/人/牛/鷹）源自猶太傳統，經文未記載。\n> - 《舊約背景註釋》提出「千」（'lp）可譯「軍事單位」，總數或僅兩萬人，屬學術假說，非經文本意。\n\
  > - 十字架隊形屬靈意註解（CT、KC），經文僅記方位編排。\n\n### 跨章脈絡：從西乃山秩序到迦南征戰模型\n\n本章將一章單純點兵轉化為立體軍陣：會幕為心、利未為膽、四營為肢、纛旗為神經。此模型貫穿民數記行軍記載（十11-28）、約書亞記渡河圍城（書三-六），並成新耶路撒冷四面三門（啟21:12-13）的原型。猶大居前、但居後、利未居中，預表基督作先鋒（來12:2）、保惠師作後盾（約14:16）、教會以神為中心（弗2:21-22）的屬靈陣式。十二支派按母系分組（利亞/拉結/婢女），在神主權下化解嫉妒與爭競，成為「曠野教會」（林前12:4-31）合一多元的典範。這套[[行軍次序|行軍次序]]與[[十二支派起源|十二支派起源]]的母系關聯，展現神如何在多樣性中建立秩序。\n\
