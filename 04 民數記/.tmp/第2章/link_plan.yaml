  evidence: 'v18「在西邊，按著軍隊是以法蓮營的纛」；v24「凡屬以法蓮營…共有十萬零八千一百名，要作第三隊往前行」。

    CT：西邊——以法蓮、瑪拿西、便雅憫都是同一個祖母（拉結）的子孫，他們在法櫃後行走（詩80:1-2）。

    GT（精讀本）：西邊是帳幕的後邊，瑪拿西、便雅憫支派以以法蓮支派為中心安營；他們是拉結的子孫。

    GT（丁良才）：以法蓮、瑪拿西、便雅憫都是同一個祖母（拉結）的子孫，他們在法櫃後行走；此處可解明詩80:1-2的話，這些支派所得的地都相連接。

    KC：West side is literally ''side of the sea'' — speaks of trials and difficulties
    in the life of the believer；in those trials they produce fruit for God（創1:20-23）；Ephraim
