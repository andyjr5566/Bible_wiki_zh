- name: 利未支派
  suggested_type: 人物
  evidence: 'v17「隨後，會幕要往前行，有利未營在諸營中間。他們怎樣安營就怎樣往前行，各按本位，各歸本纛」。

    v33「惟獨利未人沒有數在以色列人中，是照耶和華所吩咐摩西的」。

    CT：利未營在諸營中間，會幕和利未支派構成全軍的中心。

    GT（丁良才）：有利未營在諸營中間——就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。

    GT（精讀本）：指哥轄子孫抬著聖物往前行（民10:21）；帳幕中的聖物與帳幕分開，佔據了以色列所有支派中最中心的位置；神就是這樣讓以色列百姓即使在行軍中也維持以神為中心的信仰生活。

    KC：The tent of meeting is the center of the people；both in worship and approaching
    God（camp）as well as in defense and protection（set out）it is about the relationship
    of God with His people；Levites have their own specific task, inseparable from
    both services.

    BH：Levites were not numbered among the sons of Israel, just as the LORD had commanded
    Moses；their role was spiritual rather than military.


    會幕在諸營中間（v17）——

    GT（丁良才）：有利未營在諸營中間——就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。

    GT（精讀本）：指哥轄子孫抬著聖物往前行（民10:21）；帳幕中的聖物與帳幕分開，佔據了以色列所有支派中最中心的位置；神就是這樣讓以色列百姓即使在行軍中也維持以神為中心的信仰生活；神向以色列百姓所要求的是隨時隨地時刻都以神為中心。

    KC：The tent of meeting is the center of the people, from there come their marching
    orders；both in worship and approaching God as well as in defense and protection
    it is about the relationship of God with His people.

    BH：The central positioning reflects the need for God to be the focal point in
    the lives of believers（太6:33）。'
