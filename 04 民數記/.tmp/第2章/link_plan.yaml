- name: 安營與纛
  suggested_type: 主題
  evidence: '全章為第1章「安營與纛」原則的具體展開。v2「以色列人要各歸自己的纛下，在本族的旗號那裡，對著會幕的四圍安營」。

    CT：各支派各有指定的營地和旗幟；以會幕為中心，表徵以基督為中心，全軍在基督的率領之下；十二支派分作四組各占一個方位圍著會幕安營，形成十字隊形——神藉著這個隊形向人啟示了十字架的生活原則。

    GT（啟導本）：以色列民在曠野紮營排列的方式是個正方形，會幕在正中央，祭司在會幕東面，利未三族（米拉利、革順、哥轄）各在北、西、南三面；十二支派分成四組，每組三支派，在利未人與祭司的四圍安營；「對著會幕」也可譯為「與會幕間有相當距離」，《約書亞記》3:4
    規定約櫃與支派安營間的距離為二千肘（約一千公尺）。

    GT（串珠）：營陣是四方形，會幕在中心，祭司利未人環繞著會幕安營，十二支派也朝向會幕；這陣形象徵神住在子民中間，神子民的生活也以神為核心；這也是聖城的模式，是神永恆的計畫，因此先知以西結（結40章）與使徒約翰（啟21章）所見到的聖城都有類似的結構。

    GT（精讀本）：四個纛代表東西南北四個方向——猶大纛（東，獅子綠旗）、流便纛（南，人首紅旗）、以法蓮纛（西，牛犢黃旗）、但纛（北，鷹紅白旗）；這四個支派代表以色列，也暗示著將來要得救的所有被造物（四是被造物的數字）。

    GT（背景註釋）：四組支派的排列和他們的母系有很大關係——東營（猶大、以薩迦、西布倫）皆利亞所生；南營（流便、西緬、迦得）利亞所生＋利亞婢女所生；西營（以法蓮、瑪拿西、便雅憫）皆拉結所生/孫；北營（但、亞設、拿弗他利）婢女所生。

    KC：Everything in battle revolves around the tabernacle which is the center of
    the army；每個信徒必須知道自己在神居所周圍的位置（林前12:18）；三個支派在一個纛下聯合，如同地方教會因地理位置而連結；只有一個中心——主耶穌，真正的會幕，祂要將四散的兒女聚集為一；主耶穌如「超乎萬人之上」的纛（歌5:10）。

    BH：The Tabernacle was the dwelling place of God among His people, symbolizing
    His presence and guidance；standards provided organization and identity within
    the camp；family banners emphasize the importance of family units within the larger
    community。


    四營方位神學——

    CT：十二支派分作四組各占一個方位圍著會幕安營，形成十字隊形；東南西北四方位形成十字架，表徵十字架乃防守、禦敵之道。

    GT（串珠）：營陣是四方形，會幕在中心，祭司利未人環繞著會幕安營，十二支派也朝向會幕；這陣形象徵神住在子民中間，這也是聖城的模式——先知以西結（結40章）與使徒約翰（啟21章）所見到的聖城都有類似的結構。

    GT（精讀本）：四個纛代表東西南北四個方向——猶大纛（東，獅子綠旗）、流便纛（南，人首紅旗）、以法蓮纛（西，牛犢黃旗）、但纛（北，鷹紅白旗）；這四個支派代表以色列，也暗示著將來要得救的所有被造物（四是被造物的數字）。

    KC：The four standards lie in four directions from which the influences come from
    outside；east side — entrance to the tabernacle, sunrise, looking forward to the
    coming of the Lord Jesus；south side — right side, dignity of position, seated
    with Christ in heavenly places（弗2:6）；west side — side of the sea, trials and difficulties
    producing fruit for God；north side — darkest side, hiding, gloomy side of testimony。'
