- name: 會幕（帳幕整體）
  suggested_type: 主題
  evidence: 'v2「對著會幕的四圍安營」；v17「隨後，會幕要往前行，有利未營在諸營中間」。

    全章以會幕為絕對中心，四營環繞，利未人緊鄰會幕安營。

    CT：以會幕為中心，就是以主為中心；人的難處是以自己為中心，若中心從自己的身上轉移到主身上，人所有的難處就全可以解決了。

    GT（精讀本）：神以會幕為中心安置以色列各支派的營，這象徵神作為以色列真正的統治者，臨在於他們的生活中；人存在的價值和意義，是把神迎接在自己的生活中心裡。

    GT（丁良才）：會幕在以色列人當中，有三樣教訓——（一）神與人同在，（二）都當倚靠神，（三）都可親近神。

    KC：The tent of meeting is the center of the people, from there come their marching
    orders.

    BH：The Tabernacle was the dwelling place of God among His people, symbolizing
    His presence and guidance；central positioning reflects the need for God to be
    the focal point in the lives of believers（太6:33）。


    會幕在諸營中間（v17）——

    GT（丁良才）：有利未營在諸營中間——就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。

    GT（精讀本）：帳幕中的聖物與帳幕分開，佔據了以色列所有支派中最中心的位置；神就是這樣讓以色列百姓即使在行軍中也維持以神為中心的信仰生活。'
