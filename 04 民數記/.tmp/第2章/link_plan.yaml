  suggested_type: 事件
  evidence: '全章規定以色列全軍起行的先後次序。

    v9「要作第一隊往前行」（猶大營：猶大、以薩迦、西布倫，186,400人）；

    v16「要作第二隊往前行」（流便營：流便、西緬、迦得，151,450人）；

    v17「隨後，會幕要往前行，有利未營在諸營中間」；

    v24「要作第三隊往前行」（以法蓮營：以法蓮、瑪拿西、便雅憫，108,100人）；

    v31「要歸本纛作末隊往前行」（但營：但、亞設、拿弗他利，157,600人）。

    CT：猶大營擔任以色列全軍的開路先鋒，正面迎敵時首當其衝。

    GT（精讀本）：猶大支派站在行軍行列的前面，預表耶穌作為全人類的救主和君王站在全人類的前面（約10:4）；屬於流便營的行進之前，革順的子孫和米拉利的子孫抬著帳幕往前行（民10:17-20）；屬於以法蓮營的在實際行軍時跟在抬聖物的利未人哥轄子孫的後面（民10:21）；但營擔負著守衛以色列陣營後方的重要任務。

    GT（丁良才）：有利未營在諸營中間——就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。

    KC：First we talk about "camp", then "set out", but both actions take place in
    agreement with each other；both in worship and approaching God（camp）as well as
    in defense and protection（set out）it is about the relationship of God with His
    people.

    BH：Judah''s position as the first to set out underscores its leadership and preeminence
    among the tribes；being first implies a role of guidance and protection for the
    other tribes.'
