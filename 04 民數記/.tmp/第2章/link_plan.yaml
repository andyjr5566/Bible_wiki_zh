- name: 以色列人的軍隊
  suggested_type: 神學
  evidence: '全章按軍隊編排四營，每營三支派，各有首領、人數、行軍次序。

    v9「要作第一隊往前行」；v16「要作第二隊往前行」；v24「要作第三隊往前行」；v31「要歸本纛作末隊往前行」。

    CT：十二支派分作四組各占一個方位圍著會幕安營，形成十字隊形——十字架乃防守、禦敵之道，無懈可擊；會幕裡面的內容是十字架，安營的隊形也是十字架，裡外都是十字架。

    GT（精讀本）：以色列百姓所要進行的戰爭是以建立神國度為目的的聖戰，而不是單單以掠奪和領土擴張為目的的戰爭；神是以色列的元帥，以色列百姓只要順服神的命令就能獲得勝利。

    GT（串珠）：數以百萬計的以色列民，能夠有條不紊地安營和起行，在曠野中生活了四十年而蒙保守，都是因為神起初匠心的組織和編排；當神的子民以神為中心，按次序而行時（林前14:40），便能夠克服很多環境和人事的問題。

    KC：The tribes must camp in relation to the tabernacle according to the wind directions；the
    four standards lie in four directions from which the influences come from outside
    and which the people of God must face in the power of Him Who dwells in their
    midst.

    BH：The organization of the tribes around the Tabernacle has theological significance,
    symbolizing God''s presence at the center of the Israelite community；each tribe''s
    position and number were divinely ordained, emphasizing order and obedience.'
