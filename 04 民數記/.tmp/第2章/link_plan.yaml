- name: 流便
  suggested_type: 人物
  evidence: 'v10「在南邊，按著軍隊是流便營的纛」；v16「凡屬流便營…共有十五萬一千四百五十名，要作第二隊往前行」。

    CT：南邊——流便雖為長子，因犯罪失去長子名分，在此仍被安排為南營之首。

    GT（精讀本）：南邊按行軍的方向來看指右邊，對希伯來人來講右邊意味著「力量」和「祝福」，可以理解為對以色列的長子流便的特殊照顧（出15:6; 傳10:2）。

    GT（丁良才）：南邊有流便、西緬支派（就是利亞之長子和次子的後裔，這樣就使他們少生嫉妒猶大支派的心）並迦得支派（就是利亞之婢女悉帕之長子的後裔）。

    KC：South side is literally ''the right side'' — speaks in the Scriptures of dignity
    of position；主耶穌「坐在高天至大者的右邊」（來1:3; 8:1; 10:12; 12:2）；Reuben means ''see, a son''
