- name: 猶大支派
  suggested_type: 人物
  evidence: 'v3「在東邊，向日出之地，照著軍隊安營的是猶大營的纛」；v9「凡屬猶大營…共有十八萬六千四百名，要作第一隊往前行」。

    CT：東邊向日出之地——會幕門口即面向東邊（出27:13,16），摩西和亞倫也安營在東邊的內層，可見是最重要的方位；猶大支派相當特殊，大衛王和其後的猶大國諸王都出自該支派（太1:3,6），甚至主耶穌也是大衛的後裔（羅1:3）。

    GT（精讀本）：猶大支派站在行軍行列的前面，預表耶穌作為全人類的救主和君王，站在全人類的前面，把人引到永遠的國度裡（約10:4）；耶穌是藉著猶大支派的血統道成了肉身（太1:3-16）。

    GT（背景註釋）：東邊向日出之地——會幕前面的方向（民3:38），在神面前是榮耀的位置；成就了雅各對猶大的預言（創49:10），在大衛時期展開（撒下2:4-7;
    5:1-3），並通過耶穌基督得以成就（來7:14）。

    KC：Judah means ''praise'' — the spirit of praise is the spirit of power（代下20:22）；the
    main purpose of the meeting of the church is to praise and worship God；Judah becomes
    the royal line from whom the Messiah will be born（創49:10; 得4:18-22）；拿順列在主耶穌的家譜中（太1:4）。

    BH：Judah''s position at the forefront of the camp signifies their role as leaders
    and protectors；the east side holds significant symbolism — new beginnings, hope,
    divine presence；Judah''s prominence points to the future coming of the Messiah,
    "Lion of the tribe of Judah"（啟5:5）。'
