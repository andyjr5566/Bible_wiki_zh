  # === C 類：全新條目 ===
  - name: 四面安營條例
    type: 主題
    evidence: "民2:2 以色列人要各歸自己的纛下，在本族的旗號那裡，對著會幕的四圍安營。GT：以會幕為中心，四方形安營，利未人在中間，十二支派分四組各三支派。KC：四組支派按母系分組——東邊利亞所生三支派、南邊利亞與婢女所生、西邊拉結子孫、北邊婢女所生。"
    surfaces: ["各歸自己的纛下", "本族的旗號", "對著會幕的四圍安營", "四面安營"]

  - name: 纛與旗號
    type: 主題
    evidence: "民2:2-3 各歸自己的纛下，在本族的旗號那裡。GT：纛代表四個方向的陣旗，猶大纛(獅子)、流便纛(人首)、以法蓮纛(牛)、但纛(鷹)。KC：纛有標準、象徵字義，也作標記。KC引猶太傳統：猶大綠旗獅子、流便紅旗人首、以法蓮黃旗牛、但紅白旗鷹。"
    surfaces: ["纛", "旗號", "各歸自己的纛下", "本族的旗號"]

  - name: 十字架隊形
    type: 神學
    evidence: "民2:3,10,18,25 東邊猶大、南邊流便、西邊以法蓮、北邊但，形成十字架隊形。CT：東邊猶大、南邊流便、西邊以法蓮、北邊但，形成十字架，表徵十字架乃防守禦敵之道。
GT：四組支派排列形成十字架，象徵神住在子民中間，也是聖城模式(結40、啟21)。"
    surfaces: ["東邊", "南邊", "西邊", "北邊", "十字架隊形", "四面安營"]

  - name: 起行次序
    type: 主題
    evidence: "民2:9,16,17,24,31 猶大營第一隊、流便營第二隊、會幕利未營第三、以法蓮營第三隊、但營末隊。
GT：起行次序：猶大領頭、流便其次、利未人會幕第三、以法蓮第四、但殿後。
KC：猶大營第一隊往前行(9節)、流便營第二隊(16節)、會幕利未營在中間(17節)、以法蓮營第三隊(24節)、但營末隊(31節)。"
    surfaces: ["第一隊往前行", "第二隊往前行", "第三隊往前行", "末隊往前行", "起行次序", "會幕要往前行"]

  - name: 會幕中心安營
    type: 神學
    evidence: "民2:2,17 以會幕為中心，四圍安營。
GT：會幕在中心，象徵神作為真正統治者臨在他們生活中。
CT：以會幕為中心，表徵以基督為中心，全軍在基督率領下。"
    surfaces: ["對著會幕的四圍安營", "會幕要往前行", "利未營在諸營中間", "會幕中心"]

  - name: 猶大營(東方第一隊)
    type: 主題
    evidence: "民2:3-9 東邊猶大營，拿順作首領，74600人；以薩迦拿坦業54400；西布倫以利押57400；共186400，作第一隊往前行。
CT：猶大營在東邊向日出之地，會幕門口面向東，最重要方位。拿順為亞倫妻兄、大衛先祖。
GT：猶大支派站在行軍隊列前面，預表耶穌作救主君王站在人類前面引到永遠國度(約10:4)。耶穌借猶大血統道成肉身(太1:3-16)。"
    surfaces: ["猶大營", "東邊", "第一隊往前行", "猶大營的纛", "拿順", "以薩迦", "西布倫"]

