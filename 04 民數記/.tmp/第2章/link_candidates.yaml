  - name: 利未營在中間
    type: 主題
    evidence: "民2:17,33 會幕往前行，利未營在諸營中間。
他們怎樣安營就怎樣往前行。利未人沒有數在以色列人中。
CT：利未營在諸營中間，會幕聖物佔據最中心位置。
神讓百姓即使行軍也維持以神為中心。
GT：利未營在中間，哥轄子孫抬聖物(10:21)。帳幕聖物佔最中心位置，神要百姓隨時以神為中心。
"
