name: 會幕中心安營
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 耶和華命令以色列人對著會幕四圍安營，利未營在諸營中間，會幕隨利未營起行，象徵神同在居於百姓中央，生命與行動以神為中心（民2:2, 17）。
