name: 以色列人就這樣行
type: 主題
secondary_types: []
aliases:
- 以色列人照著行
- 百姓順服
status: formal
definition: 指以色列人完全照耶和華吩咐摩西的話去行，依家室、宗族歸於本纛安營起行。民數記 2:34 記載：「以色列人就這樣行，各人照他們的家室、宗族歸於本纛，安營起行，都是照耶和華所吩咐摩西的。」這句總結性陳述，標誌著第
  2 章安營與起行條例的落實，顯示百姓在摩西帶領下對神命令的完全順服。
accumulations:
- book: 民數記
  chapter: 2
  summary: 本章結尾總結以色列人完全順服神關於安營起行的一切吩咐。
  relation: 本章從神吩咐（2:1-2）、詳細條例（2:3-33）到百姓順服（2:34）形成完整敘事弧。
