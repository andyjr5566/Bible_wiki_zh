name: 起行次序
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 本章規定五組起行順序：猶大營（東）第一、流便營（南）第二、會幕與利未營在中間、以法蓮營（西）第三、但營（北）末隊（民2:9, 16, 17,
  24, 31），安營次序與起行次序一致。
