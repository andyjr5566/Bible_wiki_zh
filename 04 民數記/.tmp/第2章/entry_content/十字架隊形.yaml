definition: 根據四營人數（東猶大營186,400、南流便營151,450、西以法蓮營108,100、北但營157,600），四面環繞會幕形成十字架形狀，預表基督救贖為中心，神同在居於教會中間的神學意象（民2:9,
  16, 24, 31）。
