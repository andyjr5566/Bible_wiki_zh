name: 第三隊往前行
type: 主題
secondary_types: []
aliases:
- 第三隊
status: formal
definition: 指以法蓮營（含以法蓮、瑪拿西、便雅憫三支派）在起行時作第三隊往前行。民數記 2:24 記載：「凡屬以法蓮營、按著軍隊被數的，共有十萬零八千一百名，要作第三隊往前行。」這顯示神為以色列人設立嚴謹的行軍次序，以法蓮營位於西邊，在會幕與利未營之後、但營之前起行。
accumulations:
- book: 民數記
  chapter: 2
  summary: 記載以法蓮營兵丁總數與其作第三隊往前行的命令。
  relation: 本章明確規定四營起行次序，第三隊為以法蓮營，彰顯神秩序的安排。
