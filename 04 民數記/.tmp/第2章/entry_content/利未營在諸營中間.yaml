name: 利未營在諸營中間
type: 主題
secondary_types: []
aliases:
- 利未營居中
- 利未人在中間
status: formal
definition: 指利未支派安營與起行時均位於四營（猶大、流便、以法蓮、但營）中央，靠近會幕。民數記 2:17 記載：「有利未營在諸營中間」；2:33 記載：「惟獨利未人沒有數在以色列人中，是照耶和華所吩咐摩西的。」這安排使會幕與事奉神的利未人處於全軍核心，受四面營隊保護，也象徵神在祂百姓中央掌權。
accumulations:
- book: 民數記
  chapter: 2
  summary: 記載利未營安營與起行均在諸營中間，且不列入兵丁人數統計。
  relation: 本章以地理位置與人數統計雙重方式，確立利未營居中、分別為聖的地位。
