name: 會幕要往前行
type: 主題
secondary_types: []
aliases:
- 會幕起行
- 聖幕前行
status: formal
definition: 指會幕（帳幕）在以色列人起行時，於第二隊（流便營）之後、第三隊（以法蓮營）之前前行。民數記 2:17 記載：「隨後，會幕要往前行，有利未營在諸營中間。」這顯示會幕作為神同在的象徵，居於行軍隊伍的核心位置，由利未人抬運，彰顯神在百姓中間引導前行。
accumulations:
- book: 民數記
  chapter: 2
  summary: 記載會幕起行的位置次序——在第二隊之後、第三隊之前，利未營在諸營中間。
  relation: 本章確立會幕在行軍中的中心地位，象徵神帶領祂的百姓前行。
