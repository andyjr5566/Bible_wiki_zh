name: 四面安營條例
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 耶和華吩咐摩西、亞倫，以色列人要各歸自己的纛下，在本族的旗號那裡，對著會幕的四圍安營（民2:2、34）。此條例確立四支營隊分居東南西北、環繞會幕的秩序，並規定安營與起行次序一致。
