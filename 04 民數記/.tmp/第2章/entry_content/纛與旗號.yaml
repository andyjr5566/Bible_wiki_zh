name: 纛與旗號
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 本章多次提到「纛」（degel，營隊大旗）與「旗號」（oth，支派標識），各支派、各營隊皆有其標識，作為辨識、集結與行軍的依據（民2:2-3,
  10, 18, 25, 34）。
