- "title": "安營與纛"
  "path": "link_folder/主題/安營與纛.md"
  "summary": "民2章為第1章「安營與纛」原則的具體展開。v2「以色列人要各歸自己的纛下，在本族的旗號那裡，對著會幕的四圍安營」。CT：各支派各有指定的營地和旗幟；十二支派分作四組各占一個方位圍著會幕安營，形成十字隊形——神藉著這個隊形向人啟示了十字架的生活原則。GT（啟導本）：紮營排列為正方形，會幕在正中央，祭司在會幕東面，利未三族（米拉利、革順、哥轄）各在北、西、南三面；十二支派分成四組，每組三支派，在利未人與祭司的四圍安營；「對著會幕」也可譯為「與會幕間有相當距離」，《約書亞記》3:4規定約櫃與支派安營間的距離為二千肘（約一千公尺）。GT（串珠）：營陣是四方形，會幕在中心，祭司利未人環繞著會幕安營，十二支派也朝向會幕；這陣形象徵神住在子民中間，這也是聖城的模式——先知以西結（結40章）與使徒約翰（啟21章）所見到的聖城都有類似的結構。GT（精讀本）：四個纛代表東西南北四個方向——猶大纛（東，獅子綠旗）、流便纛（南，人首紅旗）、以法蓮纛（西，牛犢黃旗）、但纛（北，鷹紅白旗）；這四個支派代表以色列，也暗示著將來要得救的所有被造物（四是被造物的數字）。GT（背景註釋）：四組支派的排列和母系有很大關係——東營（猶大、以薩迦、西布倫）皆利亞所生；南營（流便、西緬、迦得）利亞所生＋利亞婢女所生；西營（以法蓮、瑪拿西、便雅憫）皆拉結所生/孫；北營（但、亞設、拿弗他利）婢女所生。KC：Everything in battle revolves around the tabernacle which is the center of the army；每個信徒必須知道自己在神居所周圍的位置（林前12:18）；三個支派在一個纛下聯合，如同地方教會因地理位置而連結；只有一個中心——主耶穌，真正的會幕，祂要將四散的兒女聚集為一；主耶穌如「超乎萬人之上」的纛（歌5:10）。四方位神學——東：會幕入口、日出、盼望主再來；南：右側、尊榮地位、與基督同坐天上（弗2:6）；西：海側、試煉與困難中為神結果子；北：最暗面、隱藏、地上見證的陰暗面。"
  "relation": "[[行軍次序]]、[[會幕（帳幕整體）]]、[[利未支派]]、[[以色列人的軍隊]]"
- "title": "利未支派"
  "path": "link_folder/人物/利未支派.md"
  "summary": "v17「隨後，會幕要往前行，有利未營在諸營中間。他們怎樣安營就怎樣往前行，各按本位，各歸本纛」。v33「惟獨利未人沒有數在以色列人中，是照耶和華所吩咐摩西的」。GT（丁良才）：有利未營在諸營中間——就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。GT（精讀本）：指哥轄子孫抬著聖物往前行（民10:21）；帳幕中的聖物與帳幕分開，佔據了以色列所有支派中最中心的位置；神就是這樣讓以色列百姓即使在行軍中也維持以神為中心的信仰生活；神向以色列百姓所要求的是隨時隨地時刻都以神為中心。KC：The tent of meeting is the center of the people, from there come their marching orders；both in worship and approaching God（camp）as well as in defense and protection（set out）it is about the relationship of God with His people；Levites have their own specific task, inseparable from both services."
  "relation": "[[會幕（帳幕整體）]]、[[安營與纛]]、[[行軍次序]]"
- "title": "會幕（帳幕整體）"
  "path": "link_folder/主題/會幕（帳幕整體）.md"
  "summary": "v2「對著會幕的四圍安營」；v17「隨後，會幕要往前行，有利未營在諸營中間」。全章以會幕為絕對中心，四營環繞，利未人緊鄰會幕安營。CT：以會幕為中心，就是以主為中心；人的難處是以自己為中心，若中心從自己的身上轉移到主身上，人所有的難處就全可以解決了。GT（精讀本）：神以會幕為中心安置以色列各支派的營，這象徵神作為以色列真正的統治者，臨在於他們的生活中；人存在的價值和意義，是把神迎接在自己的生活中心裡。GT（丁良才）：會幕在以色列人當中，有三樣教訓——（一）神與人同在，（二）都當倚靠神，（三）都可親近神。v17 會幕在行軍時也居中——GT（丁良才）：有利未營在諸營中間，就是哥轄族（民10:17註）；「他們怎樣安營，就怎樣往前行」（民10:11-28），這樣神的住處常在選民中間（參詩46:5）。GT（精讀本）：帳幕中的聖物與帳幕分開，佔據了以色列所有支派中最中心的位置；神就是這樣讓以色列百姓即使在行軍中也維持以神為中心的信仰生活。"
  "relation": "[[安營與纛]]、[[利未支派]]、[[行軍次序]]、[[神的同在]]"
- "title": "猶大支派"
  "path": "link_folder/人物/猶大支派.md"
  "summary": "v3「在東邊，向日出之地，照著軍隊安營的是猶大營的纛」；v9「凡屬猶大營…共有十八萬六千四百名，要作第一隊往前行」。CT：東邊向日出之地——會幕門口即面向東邊（出27:13,16），摩西和亞倫也安營在東邊的內層，可見是最重要的方位。GT（精讀本）：猶大支派站在行軍行列的前面，預表耶穌作為全人類的救主和君王，站在全人類的前面，把人引到永遠的國度裡（約10:4）；耶穌是藉著猶大支派的血統道成了肉身（太1:3-16）。GT（背景註釋）：東邊向日出之地——會幕前面的方向（民3:38），在神面前是榮耀的位置；成就了雅各對猶大的預言（創49:10），在大衛時期展開（撒下2:4-7; 5:1-3），並通過耶穌基督得以成就（來7:14）。KC：Judah means 'praise' — the spirit of praise is the spirit of power（代下20:22）；the main purpose of the meeting of the church is to praise and worship God；拿順列在主耶穌的家譜中（太1:4）。"
  "relation": "[[安營與纛]]、[[行軍次序]]、[[十二支派起源]]、拿順"
- "title": "流便"
  "path": "link_folder/人物/流便.md"
  "summary": "v10「在南邊，按著軍隊是流便營的纛」；v16「凡屬流便營…共有十五萬一千四百五十名，要作第二隊往前行」。GT（精讀本）：南邊按行軍的方向來看指右邊，對希伯來人來講右邊意味著「力量」和「祝福」，可以理解為對以色列的長子流便的特殊照顧（出15:6; 傳10:2）。GT（丁良才）：南邊有流便、西緬支派（就是利亞之長子和次子的後裔，這樣就使他們少生嫉妒猶大支派的心）並迦得支派（就是利亞之婢女悉帕之長子的後裔）。KC：South side is literally 'the right side' — speaks in the Scriptures of dignity of position；主耶穌「坐在高天至大者的右邊」（來1:3; 8:1; 10:12; 12:2）；Reuben means 'see, a son' — believers come together who know that they are sons of God."
  "relation": "[[安營與纛]]、[[行軍次序]]、[[十二支派起源]]"
- "title": "以法蓮"
  "path": "link_folder/人物/以法蓮.md"
  "summary": "v18「在西邊，按著軍隊是以法蓮營的纛」；v24「凡屬以法蓮營…共有十萬零八千一百名，要作第三隊往前行」。GT（精讀本）：西邊是帳幕的後邊，瑪拿西、便雅憫支派以以法蓮支派為中心安營；他們是拉結的子孫。GT（丁良才）：以法蓮、瑪拿西、便雅憫都是同一個祖母（拉結）的子孫，他們在法櫃後行走；此處可解明詩80:1-2的話，這些支派所得的地都相連接。KC：West side is literally 'side of the sea' — speaks of trials and difficulties in the life of the believer；in those trials they produce fruit for God（創1:20-23）；Ephraim means 'double fertility', an appropriate standard-bearer for the west side."
  "relation": "[[安營與纛]]、[[行軍次序]]、[[瑪拿西]]、[[十二支派起源]]"
- "title": "但支派"
  "path": "link_folder/人物/但支派.md"
  "summary": "v25「在北邊，按著軍隊是但營的纛」；v31「凡但營被數的，共有十五萬七千六百名，要歸本纛作末隊往前行」。GT（精讀本）：北邊是在帳幕的周圍安置以色列各支派的陣營時最後提到的地方；除了猶大以外被數點的人數最多的但支派是勇敢的人群，擔負著守衛以色列陣營後方的重要任務。GT（丁良才）：北邊——但支派是從拉結的婢女辟拉所生之長子的後裔，亞設支派是悉帕的後裔，拿弗他利是辟拉的後裔。KC：The north side is the darkest side, furthest from the sun；north is literally 'hiding' — represents the gloomy side of the testimony of God on earth；Dan is called 'a serpent' by Jacob（創49:17）；Danites have the doubtful honor of being first to introduce idolatry in Israel（士18:30）。"
  "relation": "[[安營與纛]]、[[行軍次序]]、[[十二支派起源]]"
- "title": "以色列人的軍隊"
  "path": "link_folder/神學/以色列人的軍隊.md"
  "summary": "全章按軍隊編排四營，每營三支派，各有首領、人數、行軍次序。v9「要作第一隊往前行」；v16「要作第二隊往前行」；v24「要作第三隊往前行」；v31「要歸本纛作末隊往前行」。CT：十二支派分作四組各占一個方位圍著會幕安營，形成十字隊形——十字架乃防守、禦敵之道，無懈可擊；會幕裡面的內容是十字架，安營的隊形也是十字架，裡外都是十字架。GT（精讀本）：以色列百姓所要進行的戰爭是以建立神國度為目的的聖戰，神是以色列的元帥，以色列百姓只要順服神的命令就能獲得勝利。GT（串珠）：數以百萬計的以色列民，能夠有條不紊地安營和起行，在曠野中生活了四十年而蒙保守，都是因為神起初匠心的組織和編排；當神的子民以神為中心，按次序而行時（林前14:40），便能夠克服很多環境和人事的問題。KC：The tribes must camp in relation to the tabernacle according to the wind directions；the four standards lie in four directions from which the influences come from outside and which the people of God must face in the power of Him Who dwells in their midst."
  "relation": "[[安營與纛]]、[[行軍次序]]、[[十二支派起源]]、[[利未支派]]"
- "title": "十二支派起源"
  "path": "link_folder/神學/十二支派起源.md"
  "summary": "四營分組反映母系結構：東營（猶大、以薩迦、西布倫）皆利亞所生；南營（流便、西緬、迦得）利亞所生＋利亞婢女悉帕所生；西營（以法蓮、瑪拿西、便雅憫）皆拉結所生/孫；北營（但、亞設、拿弗他利）婢女所生（但、拿弗他利為拉結婢女辟拉所生，亞設為利亞婢女悉帕所生）。GT（啟導本）：四組支派的排列和他們的母系有很大關係。GT（丁良才）：南邊有流便、西緬支派（利亞之長子和次子的後裔，這樣就使他們少生嫉妒猶大支派的心）並迦得支派（利亞之婢女悉帕之長子的後裔）。KC：Reuben and Simeon are the oldest sons of Leah；Levi is not numbered, in his place comes Gad, the first son of Zilpa, the maid of Leah；Ephraim, Manasseh, Benjamin are descendants of Rachel, Joseph represented by his two sons；Dan, Asher, Naphtali are all three sons of maids."
  "relation": "[[安營與纛]]、[[利亞]]、[[拉結]]、[[辟拉]]、[[悉帕]]"
- "title": "十二族長協助數點"
  "path": "link_folder/事件/十二族長協助數點.md"
  "summary": "本章重複第1章的十二族長名單，但按營盤方位分組排列（而非第1章的支派次序）。v3-31每支派均列出首領名字：拿順（猶大）、拿坦業（以薩迦）、以利押（西布倫）、以利蓿（流便）、示路蔑（西緬）、以利雅薩（迦得）、以利沙瑪（以法蓮）、迦瑪列（瑪拿西）、亞比但（便雅憫）、亞希以謝（但）、帕結（亞設）、亞希拉（拿弗他利）。GT（精讀本）：首領名單與第1章相同，但排列次序按營盤方位而非出生順序。KC：The leaders are the same as in Numbers 1, now arranged by camp positions."
  "relation": "[[安營與纛]]、[[行軍次序]]、[[數點民數]]"
- "title": "神的同在"
  "path": "link_folder/神學/神的同在.md"
  "summary": "v2「對著會幕的四圍安營」；v17「隨後，會幕要往前行，有利未營在諸營中間。他們怎樣安營就怎樣往前行」。全章以會幕為絕對中心，四營環繞，利未人緊鄰會幕安營，無論安營或起行，會幕始終居中。GT（丁良才）：會幕在以色列人當中，有三樣教訓——（一）神與人同在，（二）都當倚靠神，（三）都可親近神。GT（精讀本）：神以會幕為中心安置以色列各支派的營，這象徵神作為以色列真正的統治者，臨在於他們的生活中；人存在的價值和意義，是把神迎接在自己的生活中心裡。GT（串珠）：營陣是四方形，會幕在中心，祭司利未人環繞著會幕安營，十二支派也朝向會幕；這陣形象徵神住在子民中間，這也是聖城的模式——先知以西結（結40章）與使徒約翰（啟21章）所見到的聖城都有類似的結構。KC：The tent of meeting is the center of the people, from there come their marching orders；both in worship and approaching God（camp）as well as in defense and protection（set out）it is about the relationship of God with His people。"
