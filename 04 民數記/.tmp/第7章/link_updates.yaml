    summary: "民7:1,4,6,89 摩西立完了帳幕...耶和華曉諭摩西說...於是摩西收了車和牛...摩西進會幕要與耶和華說話。摩西作為會幕建立者、條例執行者、與神面對面說話者。"
    relation: "民數記第7章：摩西完成會幕膏抹、分配車牛給利未人、進會幕聽神說話。"
  - title: "亞倫"
    path: "link_folder/人物/亞倫.md"
    summary: "民7:8 他們都在祭司亞倫的兒子以他瑪手下。亞倫為大祭司，利未人在其兒子以他瑪手下服事。"
    relation: "民數記第7章：亞倫兒子以他瑪掌管革順米拉利二族車牛分配。"
  - title: "以他瑪"
    path: "link_folder/人物/以他瑪.md"
    summary: "民7:8 他們都在祭司亞倫的兒子以他瑪手下。以他瑪掌管革順米拉利二族事奉。"
    relation: "民數記第7章：以他瑪監督革順族得2車4牛、米拉利族得4車8牛。"
  - title: "利未人"
    path: "link_folder/人物/利未人.md"
    summary: "民7:5,6,7,8,9 都要照利未人所辦的事交給他們...交給利未人...交給他們...交給他們...都沒有交給哥轄子孫。利未人三族按職務得車牛分配。"
    relation: "民數記第7章：利未人三族按職務不同得車牛：革順2車4牛、米拉利4車8牛、哥轄無車抬聖物。"
  - title: "革順"
    path: "link_folder/人物/革順.md"
    summary: "民7:7 把兩輛車，四隻牛，照革順子孫所辦的事交給他們。革順族得2車4牛運罩棚蓋。"
    relation: "民數記第7章：革順族職務較輕，得2車4牛運罩棚蓋。"
  - title: "米拉利"
    path: "link_folder/人物/米拉利.md"
    summary: "民7:8 又把四輛車，八隻牛，照米拉利子孫所辦的事交給他們。米拉利族得4車8牛運板柱座。"
    relation: "民數記第7章：米拉利族職務最重，得4車8牛運板柱座。"
  - title: "哥轄"
    path: "link_folder/人物/哥轄.md"
    summary: "民7:9 但車與牛都沒有交給哥轄子孫；因為他們辦的是聖所的事，在肩頭上抬聖物。哥轄族抬至聖物不得用車。"
    relation: "民數記第7章：哥轄族辦聖所事務，肩頭抬聖物，大衛用車運約櫃違例害烏撒命。"
  - title: "成聖"
    path: "link_folder/神學/成聖.md"
    summary: "民7:1 使它成聖...都抹了，使它成聖。CT：成聖表分別為聖歸神。KC：膏抹使成聖。BH：出埃及記29:43-44榮耀使成聖。"
    relation: "民數記第7章：摩西膏抹會幕器具壇使成聖，神榮光充滿會幕。"
  - title: "器具"
    path: "link_folder/主題/器具.md"
    summary: "民7:1 又把其中的器具和壇，並壇上的器具，都抹了。器具包括約櫃、香壇、燈台、桌子、洗濯盆、祭壇等。"
    relation: "民數記第7章：會幕器具經膏抹成聖，用於獻祭事奉。"
  - title: "壇"
    path: "link_folder/主題/壇.md"
    summary: "民7:1,10,11,88,89 又把其中的器具和壇...用膏抹壇的日子...為行奉獻壇的禮...平安祭...摩西進會幕。壇為獻祭中心、奉獻禮焦點。"
    relation: "民數記第7章：壇經膏抹成聖，十二支派在壇前獻供物行奉獻壇禮。"
  - title: "以色列"
