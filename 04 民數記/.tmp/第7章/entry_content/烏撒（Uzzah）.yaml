name: 烏撒（Uzzah）
type: 人物
secondary_types: []
aliases:
- 烏撒
status: formal
definition: 亞比拿達的兒子（撒下6:3；代上13:7），大衛初次運約櫃時與其兄亞希約一同趕車。當牛絆腳、約櫃搖動，烏撒伸手扶住約櫃，因觸犯聖潔被神擊殺（撒下6:6-7；代上13:9-10）。此事發生因大衛違背民數記7:9「肩頭上抬」的律例，用車運櫃。烏撒的死成為嚴厲警戒：事奉神必須遵循神所定的方式，不可憑人意圖好心而越距。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節確立聖物必須肩抬不可用車，為烏撒被擊殺事件提供律法依據。
  relation: 烏撒之死直接關聯民數記7:9的規定；大衛因此懼怕、暫停運櫃三個月（撒下6:9-11；代上13:12-14），後來遵照律法由利未人肩抬（代上15:15）。
