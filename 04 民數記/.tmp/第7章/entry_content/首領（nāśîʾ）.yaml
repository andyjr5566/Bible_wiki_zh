name: 首領（nāśîʾ）
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 nāśîʾ（נָשִׂיא），意指「首領、領袖、王子、族長」。民數記7:2, 10, 11, 18, 24, 30, 36, 42,
  48, 54, 60, 66, 72, 78, 84 記載「以色列的眾首領，就是各族的族長，各支派的首領，管理那些被數的人」，他們連續十二日各自代表本支派獻供物。身分為各支派最高領袖，兼具軍事、行政、屬靈代表性。
development: 民數記1:5-16、2章、10:14-28 列出十二首領名單（納順、拿坦業、以利押、以利蓿、示路蔑、以利雅薩、以利沙瑪、迦瑪列、亞比但、亞希以謝、帕結、亞希拉），確立其權威。本章獻壇禮中，首領們同心合意、依序奉獻，展現屬靈領袖帶領百姓敬拜的模範；第89節摩西進會幕聽神聲音，回應首領們的奉獻。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派首領代表各支派，在獻壇禮十二日中每日一位獻上相同供物，經文重複記載其名、支派、父名，強調領袖責任與秩序。
  relation: 本章核心行動者，其奉獻行為構成獻壇禮的主體，彰顯領袖帶領敬拜的神學意義。
