name: 摩西分配車牛給利未人
type: 主題
secondary_types: []
aliases:
- 摩西分車牛
- 利未人得車牛
status: formal
definition: 民數記 7:6-9 記載摩西遵命將車牛交給利未人：革順子孫得兩輛車四隻牛（負責較輕的幔子等），米拉利子孫得四輛車八隻牛（負責較重的板、柱、卯座等），哥轄子孫不得車牛，因他們辦聖所的事，在肩頭上抬聖物（約櫃、桌子、燈台、壇等）。
development: 分配體現「按職任分工、按需要配備」的原則，哥轄族抬聖物更彰顯聖物極度聖潔，不可用車運送（後大衛用車運約櫃導致烏撒死亡，驗證此規例）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 摩西按神吩咐分配車牛給革順、米拉利兩族；哥轄族肩抬聖物。
  relation: 落實神指示，展現利未三族事奉分工差異，預表新約肢體各司其職。
