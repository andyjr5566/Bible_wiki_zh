name: 肩頭上抬（肩抬聖物）
type: 主題
secondary_types: []
aliases:
- 肩頭上抬
status: formal
definition: 指利未人哥轄子孫抬運聖物的方式——用杠穿過環子，扛在肩上行走（出埃及記25:14；民數記4:15, 7:9）。民數記7:9明文：「因為他們辦的是聖所的事，在肩頭上抬聖物。」這方式強調聖物的聖潔不可被褻慢，也不可用車牛運送（參撒下6:3-7；代上13:7-10）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節規定哥轄子孫不分車牛，必須肩頭上抬聖物。
  relation: 此原則貫穿曠野漂流至進迦南，大衛初次運櫃違例用車，導致烏撒伸手扶櫃被擊殺（撒下6）；後來大衛遵照律法命利未人用杠抬櫃（代上15:15），神才賜福。
