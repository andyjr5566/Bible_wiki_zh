name: 十二代表完全
type: 神學
secondary_types: []
aliases:
- 十二數字神學
- 十二支派完全
status: formal
definition: 聖經中「十二」常象徵神子民的完全與治理（十二支派、十二使徒）。本章十二支派首領連續十二日各獻相同供物（v.12-83），器皿各十二（銀盤、銀碗、金盂
  v.84-86），燔祭牲畜各十二（公牛、公羊、公羊羔、公山羊 v.87），平安祭為十二的倍數（公牛24、綿羊60、山羊60、羊羔60 v.88），結構上以「十二」為單位呈現全會眾完全的獻祭與事奉，預表新約十二使徒建立教會的根基（弗2:20，啟21:12-14）。
development: 民數記7以極大篇幅重複十二次同樣清單，文學上以重複強調「完全」的神學意義；總數統計（v.84-88）將十二的倍數關係明確化。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派、十二日、十二套器皿、十二隻燔祭牲畜、平安祭為十二倍數，構成「完全」的數字神學。
  relation: 本章為舊約「十二代表神子民完全」的經典範例，與新約十二使徒、新耶路撒冷十二門/十二根基互文照應。
