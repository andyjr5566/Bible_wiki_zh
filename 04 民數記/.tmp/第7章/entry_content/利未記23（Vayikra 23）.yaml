status: formal
definition: 希伯來文「Vayikra」第23章，列舉耶和華的節期（安息日、逾越節、無酵節、初熟節、七七節、吹角節、贖罪日、住棚節）。民數記7章雖未直接引用節期名稱，但記載會幕於「出埃及第二年正月初一」立完（1節，參出埃及記40:17），首領們連續十二日獻壇禮（10-83節），顯示正月期間會幕已進入常規敬拜運作，為後續利未記23節期條例的執行奠定時間與場地基礎。
accumulations:
- book: 民數記
  chapter: 7
  summary: 會幕於正月初一立完膏抹，首領們隨即連續十二日獻壇禮，標誌敬拜制度正式啟動。
  relation: 本章提供會幕啟用的時間錨點（正月初一），為利未記23節期條例在曆法上的落實提供歷史背景。
