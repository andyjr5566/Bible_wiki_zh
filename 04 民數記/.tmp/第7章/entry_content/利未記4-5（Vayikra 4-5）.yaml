definition: 希伯來文「Vayikra」第4-5章，記載贖罪祭與贖愆祭條例，為誤犯罪、聽見發誓聲音等過犯所設。民數記7章獻壇禮中，十二支派首領每日各獻「一隻公山羊作贖罪祭」（16,22,28,34,40,46,52,58,64,70,76,82節），總計十二隻（87節），顯示贖罪祭為潔淨壇與會幕、使首領蒙悅納的必要供物。
accumulations:
