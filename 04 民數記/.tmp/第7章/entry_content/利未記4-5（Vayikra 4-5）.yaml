  chapter: 7
  summary: 十二日獻壇禮每日均含一隻公山羊贖罪祭，總計十二隻，對應利未記4-5贖罪祭條例。
  relation: 本章記錄利未記4-5贖罪祭條例於會幕奉獻禮中的制度性遵行。
