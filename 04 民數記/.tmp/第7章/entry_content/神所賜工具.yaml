name: 神所賜工具
type: 神學
secondary_types: []
aliases:
- 神所賜工具
status: formal
definition: 指民數記7:3-9中，以色列首領們奉獻的六輛篷子車和十二隻公牛，經神指示摩西照利未人所辦的事分給革順子孫（兩車四牛）與米拉利子孫（四車八牛），作為會幕事奉的運輸工具。這些車牛非人謀私取，乃神主動賜下、按需要分配，象徵神為祂的工作預備相稱的資源與器皿（參林後9:8「神能將各樣的恩典多多地加給你們」）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 首領奉獻車牛（3節），神吩咐摩西收下分給利未人（4-5節），摩西按革順、米拉利職任分配（6-8節），哥轄子孫因抬聖物不得車牛（9節）。
  relation: 本段落直接記載神如何將人的奉獻轉化為事奉工具，並按職分合宜配搭，彰顯「神所賜工具」的神學意義。
