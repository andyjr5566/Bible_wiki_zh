name: 安息日不停
type: 主題
secondary_types: []
aliases:
- 安息日不停
status: formal
definition: 民數記7章獻壇禮連續十二日進行（11-83節），期間若遇安息日（七日一循環），獻祭並未中斷。這顯示神所命定的獻壇禮優先於安息日常規，祭司在聖殿裡作工「犯了安息日卻沒有罪」（太12:5），預表基督為安息日的主（太12:8），真正的安息在於完成神的旨意而非單純停工。
accumulations:
- book: 民數記
  chapter: 7
  summary: 11節神吩咐「每天一個首領來獻供物」，12-83節連續記載十二日無間斷，暗示期間包含安息日仍持續獻祭。
  relation: 本章十二日連續獻祭的記載，為「安息日不停」提供舊約祭儀層面的佐證。
