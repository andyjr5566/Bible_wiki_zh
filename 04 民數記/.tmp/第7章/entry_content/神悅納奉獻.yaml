name: 神悅納奉獻
type: 神學
secondary_types: []
aliases:
- 神悅納奉獻
status: formal
definition: 民數記7章結尾（89節）記載：摩西進會幕要與耶和華說話時，「聽見法櫃的施恩座以上、二基路伯中間有與他說話的聲音，就是耶和華與他說話」。這發生在十二日獻壇禮完成之後（88節），表明神悅納了以色列首領們按吩咐獻上的供物，並以在施恩座上與摩西說話（同在、引導）作為悅納的印證。這呼應創4:4「耶和華看中了亞伯和他的供物」、瑪3:10「以此試試我、是否為你們敞開天上的窗戶」、來13:16「這樣的祭是神所喜悅的」。
accumulations:
- book: 民數記
  chapter: 7
  summary: 88節總結獻壇禮供物，89節緊接記載摩西進會幕聽見神在施恩座上與他說話，時序上顯示神悅納奉獻並回應同在。
  relation: 本章最後一節為整章獻壇禮的神學高潮：神以同在與啟示回應百姓的順服奉獻。
