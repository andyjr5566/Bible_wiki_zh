name: 雅1
type: 原文
secondary_types: []
aliases:
- 雅各書1章
status: formal
definition: 雅各書第1章，雅各勸勉信徒以喜樂面對試煉、尋求智慧、貧窮與富足的榮耀、忍受試探得生命冠冕、聽道與行道、以及純全潔淨的虔誠。
development: 本章為雅各書實踐神學的序論，確立「信心無行為是死的」核心主題，強調屬靈生命的真實表現。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章詳細記載十二支派首領獻供物的細目與總數，摩西進會幕聽神說話，展現敬拜的條例與秩序。
  relation: 雅1章強調「純全潔淨的虔誠」（雅1:27），民7章首領們按神吩咐獻上最好的供物（銀盤、銀碗、金盂、牛羊），體現「行道不單聽道」（雅1:22）；十二日連續獻祭（民7:10-88）預表「忍受試探」（雅1:12）的恆心；摩西聽神聲音（民7:89）對應「快快地聽、慢慢地說」（雅1:19）的屬靈領受。
