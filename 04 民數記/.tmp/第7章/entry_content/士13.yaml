name: 士13
type: 原文
secondary_types: []
aliases:
- 士師記13章
status: formal
definition: 士師記第13章，記載參孫出生的預告，耶和華的使者向瑪挪亞夫婦顯現、指示拿細耳人條例、夫婦獻祭、使者在火焰中升天、參孫出生並蒙耶和華賜福。
development: 本章為參孫敘事的開端，展現神主動揀選拯救者、拿細耳人分別為聖的條例、以及神與人互動的神現模式。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章會幕膏抹成聖、利未人分工事奉、首領獻供、摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 士13章耶和華使者向瑪挪亞夫婦顯現（士13:3,13,16-18）呼應民7:89摩西在施恩座前聽神說話，皆為神主動啟示；拿細耳人條例（士13:4-5,7,14）與民6章拿細耳條例平行，民7章利未人分工（革順、米拉利、哥轄）預表不同呼召的分別為聖；瑪挪亞獻祭火焰升天（士13:19-20）對應民7章壇上火燒祭（民7:13-83）蒙神悅納。
