status: formal
definition: 希伯來曆第二月（西弗月）的第一日。本章未直接提及此日期，但民數記1:1、10:11記載二月初一有數點百姓、起行離開西乃山的事件。本章獻壇禮持續十二日（正月初一至十二日），結束於二月初一之前。
development: 雖本章未明文提及二月初一，但作為民數記時間線的重要節點，補充說明本章事件（正月初一至十二日）發生於二月初一數點百姓、起行前往巴蘭曠野之前，構成西乃山駐營末期的敬拜高峰。
