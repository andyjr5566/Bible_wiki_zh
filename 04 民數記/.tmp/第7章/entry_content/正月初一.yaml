status: formal
definition: 希伯來曆第一月（尼散月）的第一日。本章背景為出埃及第二年正月初一，會幕建成、膏抹成聖，並開始首領奉獻與獻壇禮。此日為獻壇禮十二日奉獻的第一日（猶大支派納順獻供物）。
development: 正月初一作為聖曆年的起始，見證會幕建成、膏抹、奉獻車牛、獻壇禮啟動等密集事件，標誌以色列在西乃山敬拜生活的正式展開。
