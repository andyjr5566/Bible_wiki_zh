name: 神記著行義的人
type: 神學
secondary_types: []
aliases:
- 神記念義人
- 記在冊上
status: formal
definition: 本章詳細記載十二位首領的名字、父名、支派與獻供物日期（v.12-83），雖供物內容完全相同，神仍逐一紀錄每位獻祭者的身分，顯示神不忽視任何一位順服獻上的義人（瑪3:16，來6:10）。這與「生命冊」（啟20:12）和「神不忘記你們的工」（來6:10）一致，強調神對個人忠心的記念與賞賜。
development: 經文可只寫總數，卻特意保留12×4=48個人名細節，文學結構凸顯「神記著各人」的神學真理。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二日獻祭，每日記載首領姓名、父名、支派，雖供物同卻不合併敘述。
  relation: 本章為「神記著行義的人」的敘事證據，與瑪拉基書3:16「記念冊」、希伯來書6:10「神不忘記你們的工」互文印證。
