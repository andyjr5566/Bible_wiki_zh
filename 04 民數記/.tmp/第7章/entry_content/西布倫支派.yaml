definition: 民數記第7章第24-29節記載西布倫支派首領希倫的兒子以利押，在獻壇禮第三日獻上供物。供物規格與各支派同，包含銀盤、銀碗、金盂、燔祭、贖罪祭、平安祭。西布倫為雅各第六子利亞所生，曠野營於猶大營東側（民數記2章）。
development: 經文以相同結構記載西布倫支派奉獻，凸顯十二支派同心合意、無分彼此地參與獻壇禮。
