status: formal
definition: 撒母耳記下第6章記載大衛從基列耶琳亞比拿達家用新車運約櫃（第1-5節），烏撒伸手扶櫃被擊殺（第6-7節），大衛懼怕、將櫃送到俄別以東迦勒家三個月（第8-11節），後見神賜福迦勒家，才按禮儀（利未人肩抬）將櫃運入耶路撒冷（第12-19節）。此章與代上13平行，印證民數記7:9「肩頭上抬」的律例不可輕忽。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節規定聖物必須肩抬不可用車，為撒下6大衛運櫃事件的成敗提供律法依據。
  relation: 撒下6是民數記7:9律例在王國時期的具體驗證；大衛初次違例用車（第3節），後來遵循律法由利未人肩抬（第13節），神才賜福。
