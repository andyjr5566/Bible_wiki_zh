name: 合宜配搭
type: 神學
secondary_types: []
aliases:
- 合宜配搭
status: formal
definition: 指民數記第7章中十二支派首領按著神的吩咐，每日一位、依序獻上完全相同的供物（銀盤、銀碗、金盂、燔祭、贖罪祭、平安祭），展現以色列眾支派在神面前同心合意、秩序井然的奉獻姿態。這「合宜」不在於供物的獨特性，而在於順服神所定的次序與內容，彰顯合一的屬靈實質（參弗4:16「全身都聯絡得合式、百節各按各職、照著各體的功用彼此相助」）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派首領連續十二日，各按次序獻上完全相同的供物清單（12-83節），總結於84-88節統計總數，顯示神所悅納的「合宜配搭」是順服與合一。
  relation: 本章核心敘事展現十二支派在獻壇禮中同心合意、無分彼此的奉獻模式，為「合宜配搭」的經典例證。
