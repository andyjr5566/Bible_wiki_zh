name: 彼前1
type: 原文
secondary_types: []
aliases:
- 彼得前書1章
status: formal
definition: 彼得前書第1章，彼得問安後頌讚神賜下重生的盼望，論述信心的試驗、先知探究的救恩、聖潔的呼召、以及神話語長存的真理。
development: 本章為散居信徒建立末世盼望與聖潔生活的神學基礎，強調基督受苦與得榮耀的樣式。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章記載摩西立完帳幕、膏抹成聖，首領們獻供物，摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 彼前1章提到「基督的靈預先證明基督受苦、後來得榮耀」（彼前1:11），民7章的會幕、壇、供物、施恩座、基路伯、神的聲音，皆是基督受苦與榮耀的預表；信徒因基督寶血得贖（彼前1:18-19），勝過民7章金銀供物的贖價；神的話長存（彼前1:25），應驗民7:89神與摩西說話的應許延續。
