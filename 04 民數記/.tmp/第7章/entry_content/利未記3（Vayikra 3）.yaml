name: 利未記3（Vayikra 3）
type: 原文
secondary_types: []
aliases:
- 利未記第三章
status: formal
definition: 利未記第三章記載平安祭的條例，規定獻牛、羊、山羊作平安祭，獻祭者按手宰殺，祭司灑血，將脂油、腎、肝網子等內臟脂肪在壇上焚燒作為馨香之氣，胸搖祭和右腿舉祭歸祭司，其餘肉由獻祭者與祭司同吃，象徵與神和好共餐。
development: 本章確立平安祭為自願獻祭（3:1）、脂肪歸神（3:16-17）、祭司分胸腿（7:29-34）、信徒共餐的團契祭，預表基督成就和好（西1:20）。
accumulations:
- book: 利未記
  chapter: 3
  summary: 平安祭條例，獻牛羊山羊，脂肪焚燒歸神，胸搖祭右腿舉祭歸祭司，其餘肉共餐。
  relation: 本章核心內容，確立平安祭為和好共餐的祭物。
- book: 民數記
  chapter: 7
  summary: 各支派首領獻壇禮時，每日獻兩隻公牛、五隻公綿羊、五隻公山羊、五隻一歲公羊羔作平安祭，數量最多。
  relation: 民數記7章記錄首領獻壇禮時依利未記3章條例大量獻上平安祭，作為會幕啟用的慶賀與共餐。
