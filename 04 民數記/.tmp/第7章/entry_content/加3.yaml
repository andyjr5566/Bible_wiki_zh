name: 加3
type: 原文
secondary_types: []
aliases:
- 加拉太書3章
status: formal
definition: 加拉太書第3章，保羅駁斥靠律法稱義的錯謬，論述亞伯拉罕因信稱義、律法的功用（監護人）、以及在基督裡成為亞伯拉罕後裔的應許。
development: 本章為保羅神學中「因信稱義」與「律法與應許關係」的經典論述，奠定新約救恩論基礎。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章記載以色列十二支派首領按秩序獻上同樣供物，彰顯律法下獻祭的條例與集體參與。
  relation: 加3章強調律法不能廢掉神預先立的應許（加3:17），民7章的獻祭條例屬於後來加添的律法（加3:19），功用在於引導人認識罪、等候基督；十二支派同獻一樣供物預表在基督裡不分猶太人、希臘人，同為一體（加3:28）。
