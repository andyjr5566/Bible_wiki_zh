name: 亞比拿達（Abinadab）
type: 人物
secondary_types: []
aliases:
- 亞比拿達
status: formal
definition: 基列耶琳人，其家在山上（撒上7:1）。非利士人歸還約櫃後，約櫃被送到亞比拿達家，由其子以利亞撒聖別看守（撒上7:1-2），前後約二十年（撒上7:2）。大衛初次運櫃時，從亞比拿達家起運（撒下6:3-4；代上13:7），其子烏撒、亞希約趕車。亞比拿達家成為約櫃在大衛運往耶路撒冷前的暫存處，見證神在以色列中間的同在。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節肩抬聖物的律例，為後來大衛從亞比拿達家運櫃時的對錯提供標準。
  relation: 亞比拿達家看守約櫃二十年（撒上7），大衛從其家起運櫃（撒下6；代上13），卻違背民數記7:9用車運送，導致烏撒被擊殺。
