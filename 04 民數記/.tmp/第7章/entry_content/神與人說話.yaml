- 耶和華與摩西說話
status: formal
definition: 指神主動向人啟示旨意、發出聲音與人溝通。本章結尾記載摩西進會幕，在施恩座上、兩基路伯中間聽見耶和華與他說話的聲音，確立會幕作為神與人會面、說話的地方。
development: 會幕建成、膏抹成聖、獻壇禮完成後，神在會幕中與摩西說話，實現出埃及記25:22「我要在施恩座上、兩基路伯中間與你相會」的應許。此為舊約神臨在與啟示的高峰，預表基督作中保（來10:19-22）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 摩西進會幕聽見施恩座上基路伯間有聲音，就是耶和華與他說話。
  relation: 會幕功能的高潮——神臨在與啟示的場所；連結出埃及記25:22、利未記1:1。
