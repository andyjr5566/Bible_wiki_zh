name: 神為產業
type: 神學
secondary_types: []
aliases:
- 耶和華為產業
- 神是產業
status: formal
definition: 民數記18:20「我在以色列人中你們不可有產業……我是你們的產業」；申命記10:9「利未人在弟兄中無分無業，耶和華是他的產業」。本章雖未直接引述，但整章呈現：(1)
  利未人得車牛服事會幕（v.6-9）；(2) 祭司處理龐大供物得養贍（v.84-88）；(3) 摩西進會幕聽神說話（v.89），神的同在成為事奉者最大的產業與獎賞。這三重面向共同證明「神自己」才是事奉者真正、永恆的產業。
development: 本章結構由外在資源（車牛、供物）推進至內在同在（v.89摩西聽神說話），神學高潮落在「神與人說話」——神自己成為產業的終極實現。
accumulations:
- book: 民數記
  chapter: 7
  summary: 全章從車牛分配、供物統計到摩西進會幕聽神聲音，層層遞進指向「神為產業」的終極真理。
  relation: 本章v.89為神學高峰，與民數記18:20、申命記10:9、詩16:5、73:26、拉3:24、來13:5互文，構成「神為產業」的聖經神學脈絡。
