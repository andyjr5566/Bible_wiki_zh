name: 祭司收入
type: 神學
secondary_types: []
aliases:
- 祭司分得分
- 祭司養贍
status: formal
definition: 依利未記2、7、民數記18規定，素祭（細麵調油）、贖罪祭、贖愆祭的祭肉、平安祭的胸腿、初熟之物等歸祭司作食物。本章十二支派獻上大量素祭（銀盤銀碗盛滿細麵調油
  v.13,19...79）、贖罪祭公山羊12隻（v.87）、平安祭公牛24、綿羊60、山羊60、羊羔60（v.88），祭司（亞倫與其子孫）按律例分得其中可食用的部分，作為事奉神、無地業者的養贍（民18:20-24，申10:9）。
development: 本章雖未明述祭司分取細節，但供物總數（v.84-88）提供祭司收入的龐大數據背景；利未記與民數記18章為法理依據。
accumulations:
- book: 民數記
  chapter: 7
  summary: 供物總數統計顯示素祭、贖罪祭、平安祭數量極大，為祭司收入提供實質來源。
  relation: 本章供物數據與利未記2、7、民數記18、申命記10:9共同構成「祭司無產業、神為產業、祭司收入來自獻祭」的神學體系。
