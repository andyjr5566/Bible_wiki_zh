name: 銀碗（mizraq kesef）
type: 原文
secondary_types: []
aliases:
- 銀碗
status: formal
definition: 希伯來文 מִזְרַק כֶּסֶף (mizraq kesef)，意為「銀噴碗」或「銀盆」。每首領獻一個，重七十舍客勒，按聖所的平，同盛調油細麵作素祭（7:13,
  19等）。十二個總重八百四十舍客勒（7:85）。
development: 銀碗與銀盤配搭，同為素祭器皿，較淺寬便於灑祭或盛載。
accumulations:
- book: 民數記
  chapter: 7
  summary: 每支派獻一銀碗重70舍客勒盛素祭
  relation: 本章多節記載及第85節統計
