name: 路9（Loukas 9）
type: 原文
secondary_types: []
aliases:
- 路加福音 9
- 路加第九章
status: formal
definition: 希臘文「Loukas」第九章，記載差遣十二門徒、希律聽見耶穌名聲、五餅二魚喂飽五千人、彼得認信基督、耶穌預言受死復活、變像山上、醫治鬼癲童子、再預言受死、門徒爭論誰大、阻擋不跟隨者、跟隨代價。本章為路加福音轉折點：從加利利事工轉向耶路撒冷受難路（9:51），確立基督身分與門徒職分。
development: 變像山事件（出24、但7、彼後1:16-18平行）確認耶穌為榮耀彌賽亞；「定意上耶路撒冷」（9:51）成為路加下半卷結構軸心；門徒代價教導（9:23-27,
  57-62）為歷代門徒訓練藍本。
accumulations:
- book: 路加福音
  chapter: 9
  summary: 記載差遣十二門徒、五餅二魚、彼得認信、變像山、醫治鬼癲童子、門徒爭大、跟隨代價，標誌事工轉向耶路撒冷受難。
  relation: 本章為路加福音結構分水嶺，前半卷加利利事工高潮於基督身分認信與變像，後半卷開啟受難路程，神學上連結基督榮耀與受苦雙重彌賽亞職分。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載十二首領同心獻供、摩西聽神說話，路9章記載十二門徒被差遣、變像山聽神聲音「要聽從祂」，兩者同見證神揀選僕人、賜下權柄與話語的立約模式。
