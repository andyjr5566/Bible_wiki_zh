name: 路1（Loukas 1）
type: 原文
secondary_types: []
aliases:
- 路加福音 1
- 路加第一章
status: formal
definition: 希臘文「Loukas」第一章，記載天使向撒迦利亞報喜施洗約翰出生、向馬利亞報喜耶穌道成肉身、馬利亞訪問以利沙伯、馬利亞頌、施洗約翰出生與命名、撒迦利亞頌。本章以精緻希臘文敘事，確立耶穌為大衛後裔、至高者兒子、永遠掌管雅各家的王，並呼應舊約應許。
development: 路加作為歷史學家強調事件可靠性（1:1-4）；馬利亞頌與哈拿詩（撒上1）平行，彰顯神拯救計劃的連續性；施洗約翰作為以利亞預表（瑪3:1,
  4:5-6）預備主路。
accumulations:
- book: 路加福音
  chapter: 1
  summary: 記載天使報喜約翰與耶穌出生、馬利亞頌、約翰出生與撒迦利亞頌，確立耶穌彌賽亞身分與神救恩計劃應驗。
  relation: 本章為路加福音開端，以雙重報喜結構平行施洗約翰與耶穌，神學上宣告舊約應許在基督裡成全，開啟新約時代。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載會幕奉獻完成神與摩西面對面說話，路1章記載道成肉身神與人同住，兩者同指向神主動啟示與同在的救恩歷程。
