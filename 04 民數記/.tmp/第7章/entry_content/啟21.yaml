name: 啟21
type: 原文
secondary_types: []
aliases:
- 啟示錄21章
status: formal
definition: 啟示錄第21章，約翰看見新天新地、新耶路撒冷從天降下、神與人同住、不再有死亡悲哀、基督使萬物更新、城的榮耀與根基、以及進城的條件。
development: 本章為聖經末世論的高峰，描繪神永恆國度的完全實現，回應創世記開端，成就救贖歷程終極盼望。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章會幕膏抹成聖、壇的獻壇禮、十二支派首領獻供、摩西在施恩座基路伯中間聽神說話。
  relation: 啟21章「神的帳幕在人間」（啟21:3）終極成就民7章會幕膏抹成聖（民7:1）的預表；新耶路撒冷「城牆有十二根基石，寫著羔羊十二使徒的名字」（啟21:14）對應民7章十二支派首領（民7:10-83）；「不再有死亡、悲哀、哭號、疼痛」（啟21:4）超越民7章贖罪祭、平安祭的遮蓋；摩西聽神聲音（民7:89）預表「神要親自與他們同在」（啟21:3）的面對面交通。
