name: 燔祭牲畜
type: 主題
secondary_types: []
aliases:
- 燔祭供物
status: formal
definition: 民數記7章每日獻供物中包含燔祭：一隻公牛犢、一隻公綿羊、一隻一歲公羊羔（7:15, 21等）。十二日共計公牛十二隻、公羊十二隻、羊羔十二隻（7:87）。燔祭全獻於神，象徵完全奉獻與贖罪（利1章）。
development: 燔祭數量較少於平安祭，但每日固定，顯示持續獻身的生活態度。
accumulations:
- book: 民數記
  chapter: 7
  summary: 每日燔祭牲畜固定三種，十二日總數統計於87節
  relation: 本章第15,21等節及87節統計
