status: formal
definition: 希伯來書第三章（希臘文：Hebraious），勸勉聖潔的弟兄們思想耶穌，祂為神家盡忠，比摩西更榮耀，如建造房屋的比房屋更尊貴；摩西在神全家作僕人盡忠，基督作兒子掌管神的家；引用詩95警告不可硬心，要天天彼此相勸。
development: ''
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章描述摩西立完帳幕、膏抹成聖、分配車牛給利未人、首領獻供物、摩西進會幕聽神聲音。來3章對比基督與摩西：「摩西在神全家作僕人盡忠」、「基督作兒子掌管神的家」，並引用曠野試探（民數記14背景）警告不可硬心。民數記7章「會幕建成」、「摩西」、「曠野」、「西乃山」（隱含背景）、「神與人說話」為來3章「神的家」、「僕人與兒子」、「曠野試探」、「聽神聲音」提供敘事背景與神學對比基礎。
  relation: 摩西僕人職分與基督兒子職分的對比背景
