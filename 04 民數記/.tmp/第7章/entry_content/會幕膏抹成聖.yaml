status: formal
definition: 民數記 7:1 記載摩西立完帳幕後，用膏抹帳幕及其一切器具、壇及壇上器具，使其成聖。這標誌著會幕正式分別為聖，歸於耶和華使用，預備祭司職分與獻祭制度運作。
development: 此事件緊接出埃及記 40 章會幕立起，膏抹儀式確立聖所與器具的聖別身分，為後續首領奉獻、利未人事奉奠定基礎。
accumulations:
