name: 撒上1（Shmuel Aleph 1）
type: 原文
secondary_types: []
aliases:
- 撒母耳記上 1
- 撒上第一章
status: formal
definition: 希伯來文「Shmuel Aleph」第一章，記載以利加拿家庭背景、哈拿禱告求子、許願將兒子獻給耶和華、撒母耳出生與斷奶後被帶到示羅交給祭司以利，以及哈拿的感恩詩（禱告）。本章展現神垂聽禱告、興起先知撒母耳開啟王國時代的關鍵轉折。
development: 猶太傳統視哈拿為禱告典範；基督教神學常將哈拿詩歌視為馬利亞頌（路1:46-55）的舊約背景，強調神使卑微者升高、使饑餓者得飽足的救恩反轉主題。
accumulations:
- book: 撒母耳記上
  chapter: 1
  summary: 記載哈拿在示羅禱告求子、許願、生子撒母耳並獻於耶和華，以及哈拿感恩詩歌。
  relation: 本章為撒母耳記開端，記載先知撒母耳誕生與獻身，開啟以色列從士師時代進入王國時代的歷史軸心。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，屬不同時期啟示，無直接經文互涉，但同樣彰顯神與百姓立約同在的真理。
