name: 米拉利子孫得車牛
type: 主題
secondary_types: []
aliases:
- 米拉利族得車牛
status: formal
definition: 民數記7:8記載摩西將四輛車、八隻牛照米拉利子孫所辦的事交給他們，用以運送會幕的板、橫木、柱子、卯座等較重結構件（參民4:31-32）。米拉利族在祭司以他瑪手下服事。
development: 同革順族，米拉利族因負責較重框架結構，獲分配較多車牛（四車八牛），顯示神按工作性質合宜配搭。
accumulations:
