name: 何3（Hoshea 3）
type: 原文
secondary_types: []
aliases:
- 何西阿書 3
- 何西阿三章
status: formal
definition: 希伯來文「Hoshea」第三章，記載神命何西阿再去愛一個淫婦，象徵神雖然以色列人拜偶像、離棄耶和華，仍堅持選民之愛，必以重價贖回，使他們歸回尋求耶和華與大衛王（彌賽亞）。本章是何西阿書神學核心：神堅定的慈愛（chesed）超越人類的悖逆。
development: 猶太傳統視此為神與以色列立約關係的隱喻；基督教神學視為基督救贖教會的預表，強調單方面恩典與和好。
accumulations:
- book: 何西阿書
  chapter: 3
  summary: 記載神命何西阿以銀子大麥贖回淫婦，預表神必贖回以色列，使他們末後歸回尋求耶和華與大衛王。
  relation: 本章為何西阿書神學高峰，以先知生活作活預表，啟示神堅忍的救贖之愛與末世復興應許。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，屬不同時期啟示，無直接經文互涉，但同樣彰顯神與百姓立約關係的核心——神主動親近、說話、接納。
