status: formal
definition: 指摩西照耶和華吩咐立起帳幕、抹膏成聖、安置器具的過程。本章第1節記載摩西立完帳幕，用膏抹帳幕與器具、壇與壇的器具，使之成聖，發生於出埃及第二年正月初一。
development: 此事件為本章一切奉獻與啟示的基礎。會幕建成後，首領們才來奉獻車牛與供物，神才在會幕中與摩西說話。對應出埃及記40章詳細記載的立幕過程。
