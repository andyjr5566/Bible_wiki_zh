definition: 詩篇第一四一篇（希伯來文：Tehillim），大衛詩，禱告求耶和華速速臨到，願禱告如香陳列在神面前，舉手如晚祭，求神看守口門，不偏向惡事。
development: ''
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章記載各支派首領獻供物時，均包括「一個金盂，重十舍客勒，盛滿了香」（v14, 20, 26...），並有燔祭、平安祭等晚祭儀式。詩141篇將禱告比作「香」，舉手比作「晚祭」，直接對應民數記7章獻壇禮中「金盂盛香」與「燔祭、平安祭」的具體儀式元素。
  relation: 禱告如香、舉手如晚祭對應獻壇禮儀式
