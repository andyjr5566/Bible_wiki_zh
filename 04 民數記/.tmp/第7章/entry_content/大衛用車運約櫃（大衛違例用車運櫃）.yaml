name: 大衛用車運約櫃（大衛違例用車運櫃）
type: 事件
secondary_types: []
aliases:
- 大衛用車運約櫃
status: formal
definition: 大衛王初次將約櫃從基列耶琳運往耶路撒冷時，仿照非利士人歸還約櫃的方式（撒上6:7），用新車運送（撒下6:3；代上13:7），違背民數記7:9「肩頭上抬」的律例。途中烏撒伸手扶櫃，被神擊殺（撒下6:6-7；代上13:9-10）。此事印證民數記7章確立的聖所事奉原則：聖物不可用車運，必須由利未人肩抬。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節確立哥轄子孫肩抬聖物的律例，成為後世評估大衛運櫃是否合乎神心意的依據。
  relation: 民數記7:9的規定直接關聯撒下6與代上13的歷史事件；大衛後來悔改，按律法命利未人用杠抬櫃（代上15:15），神才賜福（代上15:26）。
