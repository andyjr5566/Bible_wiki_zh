name: 路17（Loukas 17）
type: 原文
secondary_types: []
aliases:
- 路加福音 17
- 路加十七章
status: formal
definition: 希臘文「Loukas」第十七章，記載關於絆跌與赦免教導、芥菜種信心、無用僕人比喻、醫治十個大麻風病人（唯一回頭感謝的是撒瑪利亞人）、神國來臨方式（不隨眼見觀察、乃在你們心裡）、人子降臨如挪亞羅得時代、蓮花婦人警戒。本章強調信心屬靈品質、感恩回應、神國已然與未然張力、末世警醒。
development: 十大麻風病人獨一感謝者為外邦人，路加獨有，彰顯福音普世性；神國「在你們心裡」（entos hymon）譯法爭議，改革神學傾向「在你們中間」（基督同在）；人子日子教導（17:22-37）為橄欖山講論（21:5-36）平行簡略版。
accumulations:
- book: 路加福音
  chapter: 17
  summary: 記載絆跌赦免、芥菜種信心、無用僕人、醫治十大麻風感謝、神國來臨教導、人子日子如挪亞羅得、蓮花婦人警戒，闡明門徒生命操練與末世盼望。
  relation: 本章承接前段門徒代價教導，轉向內在屬靈生命品格（信心、順服、感恩）與末世論視野，為進入耶路撒冷受難週作神學預備。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載獻壇禮供物總數統計與神同在說話，路17章記載神國不隨眼見觀察乃在心裡、人子降臨審判拯救，兩者同見證神超越儀式外在、眷顧內心誠實與末世公義實現。
