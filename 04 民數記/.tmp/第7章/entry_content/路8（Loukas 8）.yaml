name: 路8（Loukas 8）
type: 原文
secondary_types: []
aliases:
- 路加福音 8
- 路加第八章
status: formal
definition: 希臘文「Loukas」第八章，記載耶穌傳道巡迴與跟隨婦女、撒種比喻與解釋、燈台比喻、真親屬定義、平靜風浪、醫治革拉森鬼癲、醫治血漏女與睚魯女兒復活。本章強調神國奧秘藉話語啟示、信心回應決定屬靈產效、耶穌權柄超越自然與屬靈勢力。
development: 撒種比喻為馬可4、馬太13平行，路加獨特強調「誠實善良的心」（8:15）；平靜風浪與醫治鬼癲顯示基督主權，早期教會視為教會歷程中基督同在保護的預表。
accumulations:
- book: 路加福音
  chapter: 8
  summary: 記載撒種比喻、燈台比喻、真親屬、平靜風浪、趕鬼、醫治血漏女與睚魯女兒，闡明神國話語與信心回應的關係。
  relation: 本章為路加福音核心教導段，以比喻與神蹟雙軌揭示神國屬靈屬性，呼應前章恩典主題，並預備十二門徒差遣（9:1-6）。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載首領獻供物與神說話，路8章記載話語撒種與聽從者得福，兩者同指向神話語啟示與百姓回應的立約互動模式。
