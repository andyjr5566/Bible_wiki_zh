name: 聖所的事（聖所服事）
type: 主題
secondary_types: []
aliases:
- 聖所的事
status: formal
definition: 指利未人哥轄子孫所承擔的職任，即抬運聖物（約櫃、桌子、燈台、壇等）的責任。民數記7:9指出：「但車與牛都沒有交給哥轄子孫；因為他們辦的是聖所的事，在肩頭上抬聖物。」這強調聖物不可用車運，必須由人肩抬，顯示聖潔與尊榮。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節說明哥轄子孫不得車牛，因他們辦聖所的事，必須肩抬聖物。
  relation: 本章在分配車牛給革順、米拉利子孫時，特意排除哥轄子孫，確立聖所事奉的原則：聖物須人肩抬，不可倚靠人力發明（車），預表大衛用車運約櫃導致烏撒被擊殺的教訓（撒下6；代上13）。
