name: 銀盤（qe'arat kesef）
type: 原文
secondary_types: []
aliases:
- 銀盤子
status: formal
definition: 希伯來文 קְעָרַת כֶּסֶף (qe'arat kesef)，直譯「銀盤子」。民數記7章每位首領獻一個銀盤，重一百三十舍客勒，按聖所的平，盛滿調油細麵作素祭（7:13,
  19, 等）。總計十二個，銀子共二千四百舍客勒（7:84-85）。
development: 十二個銀盤象徵十二支派同心合意獻給神，重量統一顯示公平公正，素祭表達感恩與獻身。
accumulations:
- book: 民數記
  chapter: 7
  summary: 每支派獻一銀盤重130舍客勒盛素祭
  relation: 本章多節重複記載及第84-85節統計
