status: formal
definition: 約瑟次子以法蓮的後裔所組成的支派（創48:13-20雅各交叉按手祝福，以法蓮超過瑪拿西）。民7:48-53記載其首領亞米忽的兒子以利沙瑪，在獻壇禮「第七日」獻上標準供物。民1:32-33、民2:18-19、民10:22、民26:35-37記載其人數、營次（西面）、行軍次序。以法蓮支派在北國歷史中極具代表性，先知常用「以法蓮」代指北國以色列（何4:17、賽7:17）。
development: 以法蓮支派曠野營於西面（民2:18），行軍第七隊（民10:22）。士師記12:1-6記載以法蓮人與基列人衝突「示伯萊特」典故。何西阿書深刻描繪以法蓮屬靈淫亂與神憐恤張力（何11:8-9）。新約啟7:8十二支派得救名單中以法蓮隱含在約瑟支派中，彰顯神應許不廢棄。
accumulations:
- book: 民數記
  chapter: 7
  summary: 以法蓮支派首領以利沙瑪於獻壇禮第七日獻供物，細目與其他十一支派完全相同，屬十二日奉獻序列第七位。
  relation: 本章第48-53節專述以法蓮支派首領獻供，為第七日獻供者。
