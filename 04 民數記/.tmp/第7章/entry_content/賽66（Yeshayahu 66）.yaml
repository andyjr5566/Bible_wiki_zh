name: 賽66（Yeshayahu 66）
type: 原文
secondary_types: []
aliases:
- 以賽亞書 66
- 以賽亞六十六章
status: formal
definition: 希伯來文「Yeshayahu」第六十六章，為以賽亞書結尾，宣告神超越聖殿、眷顧謙卑痛悔者、審判偽善敬拜與拜偶像者、應許錫安生產眾子、列國歸向耶路撒冷、新天新地永存、人人來敬拜耶和華。本章展現神普世主權、屬靈敬拜優於儀式、末世救恩與審判的終極實現。
development: 猶太解經視為彌賽亞時代與世界末日的異象；基督教神學引用於新天新地（啟21-22）、福音傳萬國（徒13:47）、屬靈以色列（加6:16）等教義基礎。
accumulations:
- book: 以賽亞書
  chapter: 66
  summary: 宣告神超越聖殿、眷顧謙卑者、審判悖逆者、應許錫安榮耀、列國歸主、新天新地永存、萬民敬拜。
  relation: 本章為以賽亞書大結論，總結神救恩計劃從以色列擴展到萬國，從舊約儀式進入新約屬靈實質，直指永恆國度。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載會幕奉獻與神同在，賽66章宣告神超越殿宇、眷顧謙卑心，兩者同指向神渴望與人真實交通的心意。
