name: 王下7（Melakhim Bet 7）
type: 原文
secondary_types: []
aliases:
- 列王紀下 7
- 王下七章
status: formal
definition: 希伯來文「Melakhim Bet」第七章，記載以利沙預言撒馬利亞城內糧食價格將大幅下跌、四個長大麻風病人發現亞蘭軍隊驚逃、百姓出城搶奪糧食應驗預言、王的臣僕被踐踏致死。本章展現神主導歷史、拯救祂百姓的大能，以及不信者必受審判的原則。
development: 猶太解經強調神藉先知話語掌管列國命運；基督教神學常將此視為神恩典臨到絕望者的預表，並預表福音傳開使屬靈饑荒得解。
accumulations:
- book: 列王紀下
  chapter: 7
  summary: 記載以利沙預言糧價下跌、亞蘭軍隊驚逃、麻風病人報信、百姓搶糧應驗、不信臣僕被踐踏致死。
  relation: 本章為以利沙神蹟事工高潮之一，顯明神在國度衰微時仍保守餘民，應驗先知話語的可靠性。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，屬不同時期啟示，無直接經文互涉，但同樣彰顯神主權掌管歷史與立約信實。
