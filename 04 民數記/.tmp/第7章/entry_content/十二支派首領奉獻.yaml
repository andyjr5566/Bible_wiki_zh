status: formal
definition: 民數記 7:2-3 記載以色列十二支派首領（各族族長）同心合意，自願奉獻六輛篷子車和十二隻公牛（每兩首領一車，每首領一牛），送到會幕前，為會幕事奉預備交通工具。
development: 這是首領們自發性的集體奉獻，顯示各支派對會幕事奉的支持與合一，也為利未人運送會幕器具提供實際幫助。
