name: 利未記2（Vayikra 2）
type: 原文
secondary_types: []
aliases:
- 利未記第二章
status: formal
definition: 利未記第二章記載素祭的條例，規定素祭須用細麵、調油、加乳香，不可有麵酵和蜜，須用鹽，祭司取一把作為紀念燒在壇上，其餘歸祭司食用，作為至聖的供物，象徵生命純潔與感恩奉獻。
development: 本章規範無血祭物的獻法，強調「無酵無蜜」（純潔）、「加鹽」（永約）、「歸祭司」（供應），與燔祭、平安祭構成獻祭體系的三大支柱。
accumulations:
- book: 利未記
  chapter: 2
  summary: 素祭條例，細麵調油加乳香，無酵無蜜，加鹽，祭司取紀念部分焚燒，其餘歸祭司。
  relation: 本章核心內容，確立素祭作為無血祭物的規範。
- book: 民數記
  chapter: 7
  summary: 各支派首領獻壇禮時，每日獻一銀盤一銀碗，盛滿調油細麵作素祭，並一金盂盛滿乳香。
  relation: 民數記7章記錄首領獻壇禮時依利未記2章條例獻上素祭與乳香，銀器盛裝細麵調油符合條例。
