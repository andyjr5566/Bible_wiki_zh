name: 免除嫉妒自誇
type: 神學
secondary_types: []
aliases:
- 免除嫉妒自誇
status: formal
definition: 民數記7章十二支派首領獻上「完全相同」的供物（13-83節各段落結構、重量、牲畜數量一模一樣），沒有任何支派能比較多寡、貴賤，從根源上杜絕了屬靈比較、嫉妒與自誇的空間。這反映神的旨意：在祂面前，奉獻的價值不在外在差異，而在順服與同心（參林後10:12「我們不敢將自己和那自薦的人同列比較」；加6:4「各人應當察驗自己的行為，這樣他就可因自己有誇口，不在別人」）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 13-83節十二段落供物清單完全相同（銀盤130舍客勒、銀碗70舍客勒、金盂10舍客勒、燔祭3隻、贖罪祭1隻、平安祭17隻），84-88節總結統計再次確認均等。
  relation: 本章以極繁瑣的重複記載強調供物的完全一致，為「免除嫉妒自誇」提供最有力的經文證據。
