name: 篷子車（ʿăgālôt）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 ʿăgālôt（עֲגָלוֹת），意指「篷子車、有蓋的車、運輸用車」。民數記7:3、6-8記載以色列首領奉獻六輛篷子車、十二隻公牛，摩西遵耶和華指示分給利未人革順子孫兩輛四牛、米拉利子孫四輛八牛，用以運送會幕器具；哥轄子孫因辦聖所之事，在肩頭上抬聖物，不分車牛。
development: 此詞在舊約僅見於民數記7章（7:3, 6, 7, 8）。體現神對利未人服事分工的具體供應：革順族管幔子帷幔（較輕）、米拉利族管板柱卯座（較重），故車牛分配有別；哥轄族抬聖物（約櫃、桌子、燈台、壇）不可用車，後大衛用車運約櫃導致烏撒被擊殺（撒下6、代上13），印證此規例的嚴肅性。
accumulations:
- book: 民數記
  chapter: 7
  summary: 首領奉獻六輛篷子車十二隻牛，摩西按耶和華指示分給革順、米拉利兩族利未人，哥轄族不分車牛因須肩抬聖物。
  relation: 本章具體記載篷子車的來源、分配原則與神學意義，顯明神對聖物運送方式的規定。
