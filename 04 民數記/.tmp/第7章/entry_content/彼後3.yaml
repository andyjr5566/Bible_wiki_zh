name: 彼後3
type: 原文
secondary_types: []
aliases:
- 彼得後書3章
status: formal
definition: 彼得後書第3章，彼得回應末世褻慢者的質疑，論述主的日子必臨到、天地將被火燒毀、信徒當在聖潔敬虔上有何等為人、並勉勵在恩典與知識上長進。
development: 本章為基督教末世論與倫理勸勉的重要經文，強調神忍耐的救贖目的與新天新地的盼望。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章記載會幕膏抹成聖、壇的獻壇禮、十二支派首領按日獻供、摩西進會幕聽神從施恩座說話。
  relation: 彼後3章提到「主的日子要像賊一樣來到」（彼後3:10），民7章會幕、壇、供物、膏抹成聖的儀式屬「現今的天地」（彼後3:7）被火燒毀的預表；摩西在施恩座前聽神說話（民7:89）預表新天新地中「有義居在其中」（彼後3:13）的親密交通；神的忍耐（彼後3:9）在民7章十二日連續獻祭中顯現，給人悔改機會。
