status: formal
definition: 民數記7:10-83記載獻壇禮連續十二日，每日一位支派首領獻供物，從猶大支派拿順（第一日）到拿弗他利支派亞希拉（第十二日），共十二日。這「十二天」對應十二支派，象徵完全、秩序與神所設立的代表性完全數（十二代表完全），也預表新耶路撒冷十二門、十二根基的完全建制（啟21:12-14）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 11節神吩咐「每天一個首領來獻供物」，12-83節詳細記載第一日至第十二日各支派首領獻供物的次序與內容。
  relation: 本章以十二日結構呈現十二支派完全的獻壇禮，為「十二天」主題的直接經文基礎。
