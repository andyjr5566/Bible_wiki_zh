definition: 羅馬書第十二章（希臘文：Romaiois），保羅勸勉信徒將身體獻上當作活祭，不效法這世界，心意更新而變化，並按恩賜彼此服事，以愛心無偽，勝過惡。
development: ''
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章描述會幕膏抹成聖、首領奉獻供物、利未人按職分服事（革順、米拉利用車牛，哥轄肩抬聖物），摩西進會幕與神說話。羅12章呼籲獻上身體為「活祭、聖潔、蒙神喜悅」，這是「合理的事奉」（logiken
    latreian），與民數記7章「成聖」、「獻供物」、「利未人服事」、「會幕膏抹成聖」的儀式性獻祭形成新約屬靈化的對應。
  relation: 活祭與合理事奉對應舊約獻祭儀式
