name: 聲音
type: 主題
secondary_types: []
aliases:
- 神的聲音
status: formal
definition: 民數記第7章第89節記載摩西進會幕，聽見法櫃施恩座以上、兩基路伯中間有聲音與他說話。此聲音即耶和華的聲音，代表神的顯現，是神與摩西交通的媒介。
development: 經文以「聲音」作為神臨在的可聞證據，連結獻壇禮的完成與神話語的啟示，呼應出埃及記會幕充滿榮光、神從帳幕呼喚摩西的情境。
accumulations:
- book: 民數記
  chapter: 7
  summary: 記載摩西聽見從施恩座發出的聲音與他說話。
  relation: 獻壇禮高潮，神以聲音回應百姓奉獻，確立摩西領受律法的管道。
