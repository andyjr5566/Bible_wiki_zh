name: 管家職分
type: 神學
secondary_types: []
aliases:
- 管家職分
status: formal
definition: 指民數記7:5-9中，神吩咐摩西將首領奉獻的車牛「照利未人所辦的事交給他們」，摩西遂按革順子孫掌管帳幕幔子、繩索等輕重較輕之物（得兩車四牛），與米拉利子孫掌管板、柱、卯、帶等重器具（得四車八牛）的職任分配；哥轄子孫因職任是「在肩頭上抬聖物」（9節），故不分車牛。此顯示神的管家職分原則：按恩賜與職任分工，各盡其責，不越位、不缺乏（參彼前4:10「各人要照所得的恩賜彼此服事，作神百般恩賜的好管家」）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 神指示分配車牛（5節），摩西執行分配（6-8節），說明哥轄子孫不得車牛的原因（9節），呈現按職任分工的管家原則。
  relation: 本段落為舊約利未人事奉分工的具體案例，直接對應新約「管家職分」神學。
