status: formal
definition: 以色列人出埃及後第二年第一月的第一日。根據出埃及記40:17，這是摩西立起帳幕的日子。本章第1節「摩西立完了帳幕」即指此日，也是首領奉獻車牛、獻壇禮開始的時間錨點。
development: 這一天會幕建成、膏抹成聖，首領們奉獻六輛蓬子車十二隻牛，耶和華指示摩西分配給利未人。獻壇禮從這天起連續十二日，每日一支派獻供物。
