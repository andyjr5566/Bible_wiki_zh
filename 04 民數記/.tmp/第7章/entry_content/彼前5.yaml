name: 彼前5
type: 原文
secondary_types: []
aliases:
- 彼得前書5章
status: formal
definition: 彼得前書第5章，彼得勸勉長老牧養神的群羊、年輕人順服長老、眾人以謙卑束腰、警醒抵擋魔鬼、並以末世榮耀為盼望。
development: 本章為教會領袖與肢體關係提供屬靈領導原則，並以基督受苦榮耀為榜樣，勉勵信徒在試煉中站立得穩。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章展現利未人（革順、米拉利、哥轄）按職任分工事奉，首領們同心合意獻供物，摩西作中保進會幕聽神說話。
  relation: 彼前5章長老牧養群羊（彼前5:2）呼應民7章利未人各盡其職（革順抬帳幕、米拉利抬板、哥轄抬聖物）；首領們同獻供物（民7:10-88）預表長老與肢體同心事奉（彼前5:5）；摩西進會幕聽神說話（民7:89）預表基督作大牧者（彼前5:4）與父神交通，賜下完全恩典。
