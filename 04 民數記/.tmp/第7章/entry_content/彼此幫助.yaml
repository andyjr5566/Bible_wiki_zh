name: 彼此幫助
type: 神學
secondary_types: []
aliases:
- 互相扶持
- 肢體相顧
status: formal
definition: 指神的子民在事奉中互相分擔、協作。民數記第7章記載首領們奉獻六輛篷子車、十二隻公牛（v.3），神指示摩西分給利未人革順子孫兩輛車四隻牛、米拉利子孫四輛車八隻牛，以協助他們運送會幕器具（v.7-8）；哥轄子孫因辦聖所的事，在肩頭上抬聖物，不需車牛（v.9），顯見神按各人職分供應所需，肢體彼此配搭幫助。
development: []
accumulations:
- book: 民數記
  chapter: 7
  summary: 記載首領奉獻車牛，神指示分配給革順、米拉利兩族利未人協助運送會幕重物，哥轄族則肩抬聖物。
  relation: 彰顯會幕事奉中不同職分的利未人族群，透過首領奉獻的資源與神的分配，實踐彼此幫助、合宜配搭的事奉原則。
