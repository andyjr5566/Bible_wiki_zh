name: 路14（Loukas 14）
type: 原文
secondary_types: []
aliases:
- 路加福音 14
- 路加十四章
status: formal
definition: 希臘文「Loukas」第十四章，記載安息日醫治水臌病人、謙卑選座位比喻、宴請比喻、大筵席比喻、跟隨門徒代價（背十字架、計算代價、棄絕一切）、鹽的比喻。本章在法利賽人家宴席場合，以比喻揭示神國價值觀顛覆世俗榮辱、呼召門徒付上絕對代價。
development: 大筵席比喻（太22:1-14平行）路加版本強調「強迫人進來」（14:23）顯明神恩典主動性；門徒代價教導（9:23-27平行）此處更具體化為家庭與產業放棄，為歷代宣教動員神學基石。
accumulations:
- book: 路加福音
  chapter: 14
  summary: 記載安息日醫治、選座位比喻、宴請比喻、大筵席比喻、門徒代價（背十字架、計算代價、棄絕一切）、鹽的比喻，闡明神國倫理與門徒絕對委身。
  relation: 本章位於路加「耶路撒冷旅程」（9:51-19:27）中段，以宴席場合為背景，系統性教導神國反文化價值觀，預備門徒面對十字架現實。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載首領獻供物同心合意、平安祭最多（共餐預表），路14章記載大筵席比喻與門徒棄絕一切，兩者同指向神國宴樂與跟隨主付代價的雙重真理。
