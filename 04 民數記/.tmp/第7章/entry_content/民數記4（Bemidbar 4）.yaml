status: formal
definition: 希伯來文「Bemidbar」第4章，規定哥轄、革順、米拉利三族利未人抬運會幕器具的職任：哥轄族抬聖物（肩頭上抬），革順、米拉利族用車牛運輸。民數記7章記載摩西按耶和華指示（4-5節），將首領獻的「六輛篷子車、十二隻公牛」分給革順族兩車四牛（7節）、米拉利族四車八牛（8節），唯「車與牛都沒有交給哥轄子孫；因為他們辦的是聖所的事，在肩頭上抬聖物」（9節），精確執行民數記4職任分工條例。
accumulations:
- book: 民數記
  chapter: 7
  summary: 摩西依耶和華指示分配車牛給革順、米拉利族，哥轄族不分車牛因須肩抬聖物。
  relation: 本章為民數記4利未人職任條例在會幕運輸資源分配上的具體落實記錄。
