status: formal
definition: 以色列長子流便的後裔所組成的支派。民7:30-35記載其首領示丟珥的兒子以利蓿，在獻壇禮「第四日」獻上標準供物。民1:20-21、民2:10-11、民10:18、民26:5-11等處記載其人數、營次、行軍次序。流便因亂父床（創35:22、創49:3-4）失去長子名分，支派地位次於猶大、約瑟二支派。
development: 流便支派在曠野營於南面（民2:10），行軍第二隊（民10:18）。歷代志上5:1-2確認長子名分歸約瑟。新約啟7:5十二支派得救名單中流便列第三，顯示神恩典超越人過犯。
accumulations:
- book: 民數記
  chapter: 7
  summary: 流便支派首領以利蓿於獻壇禮第四日獻供物，細目與其他十一支派完全相同（銀盤、銀碗、金盂、燔祭、贖罪祭、平安祭）。
  relation: 本章第30-35節專述流便支派首領獻供，屬十二日奉獻序列第四位。
