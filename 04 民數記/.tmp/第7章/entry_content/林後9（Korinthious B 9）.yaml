definition: 哥林多後書第九章（希臘文：Korinthious B），保羅勸勉哥林多教會為耶路撒冷聖徒捐輸，強調樂意奉獻、神愛樂意奉獻的人、恩典充足、善行常存。
development: ''
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章記載十二支派首領為奉獻壇禮，各按日子獻上同樣的供物（銀盤、銀碗、金盂、牲畜），總數統計顯示集體奉獻的豐盛。林後9章教導「少種的少收，多種的多收」、「神愛樂意奉獻的人」，與民數記7章「供物總數統計」、「平安祭最多」、「神悅納奉獻」的場景在奉獻神學上互文。
  relation: 奉獻神學與集體獻祭的互文
