definition: 希伯來文「Shemot」第30章，吩咐製造香壇、調製聖膏油、聖香。民數記7章記載首領獻供物含「一個金盂，重十舍客勒，盛滿了香」（14,20,26,32,38,44,50,56,62,68,74,80節），總計十二個金盂、一百二十舍客勒金子（86節），並提「用膏抹壇的日子」（10,84,88節）、「摩西立完了帳幕，就把帳幕用膏抹了」（1節），直接對應出埃及記30聖香與聖膏油的製造與使用條例。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派首領各獻一金盂盛滿香，總重一百二十舍客勒；會幕、壇均用膏抹成聖。
  relation: 本章詳細記錄出埃及記30聖香（金盂）與聖膏油（抹壇、抹帳幕）於會幕啟用時的具體應用。
