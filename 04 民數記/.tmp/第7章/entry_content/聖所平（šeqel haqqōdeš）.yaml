name: 聖所平（šeqel haqqōdeš）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 šeqel haqqōdeš（שֶׁקֶל הַקֹּדֶשׁ），意指「聖所的舍客勒、聖所平」。民數記7:13, 19, 25,
  31, 37, 43, 49, 55, 61, 67, 73, 79, 85, 86反覆出現，規定各首領獻供物的銀盤（重130舍客勒）、銀碗（重70舍客勒）、金盂（重10舍客勒）均「按聖所的平」，即以聖所權衡的標準度量衡為準，確保奉獻公平、合乎神的聖潔標準。
development: 「聖所平」在出埃及記30:13、利未記27:25、民數記3:47、18:16等處確立為贖價、估價的唯一標準。本章十二次重複強調，凸顯奉獻不可隨意，必須符合神所定的公義度量衡（利19:35-36、申25:13-16），預表基督作完全公義的審判者。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二位首領獻供物的銀器、金器重量均註明「按聖所的平」，總結統計（85-86節）再次確認總銀重2400舍客勒、總金重120舍客勒，皆依聖所平。
  relation: 本章反覆出現的度量衡標準，保障奉獻的公平性與聖潔性，對應神公義的屬性。
