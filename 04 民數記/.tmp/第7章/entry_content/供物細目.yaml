status: formal
definition: 民數記 7:13-17 等經文規定每位首領每日獻供物細目：銀盤一個（重 130 舍客勒）、銀碗一個（重 70 舍客勒），皆按聖所平，盛滿調油細麵作素祭；金盂一個（重
  10 舍客勒），盛滿香；公牛犢一隻、公綿羊一隻、一歲公羊羔一隻作燔祭；公山羊一隻作贖罪祭；公牛兩隻、公綿羊五隻、公山羊五隻、一歲公羊羔五隻作平安祭。素祭歸祭司，平安祭最多（共
  17 隻牲畜），贖罪祭最少（1 隻），燒祭 3 隻。
development: 供物組合涵蓋素祭、燔祭、贖罪祭、平安祭四大祭類，象徵奉獻者完全獻上（燔祭）、贖罪潔淨（贖罪祭）、與神與人和好交通（平安祭）、將勞力果實歸給神（素祭）；平安祭數量最多反映慶賀獻壇的喜樂氣氛。
accumulations:
- book: 民數記
  chapter: 7
  summary: 規定每位首領每日獻供物之銀器、金器、牲畜種類與數量細目。
  relation: 為十二日重複獻祭與總數統計提供單位標準，展現奉獻的規範性與豐富性。
