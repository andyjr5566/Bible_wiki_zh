status: formal
definition: 民7:17、23、29等節記載各支派首領獻壇禮時所獻平安祭牲畜：每支派獻「兩隻公牛、五隻公綿羊、五隻公山羊、五隻一歲的公羊羔」（共17隻）。十二支派合計公牛24隻、公綿羊60隻、公山羊60隻、一歲公羊羔60隻（7:88），為所有祭類中數量最多。平安祭（希伯來文
  זֶבַח שְׁלָמִים zevaḥ šəlāmîm）表達與神和好、團契喜樂，祭肉可由獻祭者與祭司同食（利3、7:11-36），象徵神人共餐。
development: 本章平安祭數量遠超燔祭（12隻公牛/公羊/羊羔）與贖罪祭（12隻公山羊），凸顯奉獻壇禮的慶賀性質。利未記規定平安祭分感謝祭、許願祭、甘心祭；此處屬甘心樂獻。新約以基督為我們的平安（弗2:14），信徒獻上「讚美為祭」（來13:15）屬屬靈平安祭。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二日獻壇禮中，每支派獻平安祭牲畜17隻，總計24公牛、60公綿羊、60公山羊、60一歲公羊羔，為供物總數統計中佔比最高者。
  relation: 本章第17、23、29、35、41、47、53、59、65、71、77、83、88節重複記載平安祭細目與總數。
