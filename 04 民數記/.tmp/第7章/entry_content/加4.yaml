name: 加4
type: 原文
secondary_types: []
aliases:
- 加拉太書4章
status: formal
definition: 加拉太書第4章，保羅繼續論述兒子的名分與自由，以夏甲與撒拉兩約為喻，勸勉加拉太信徒站立得穩，不再被奴僕的軛轄制。
development: 本章深化「兒子名分」神學，對比律法的奴僕身分與恩典的兒子身分，並應用於教會生活。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章描述會幕膏抹成聖後，首領們為壇行獻壇之禮，十二日各獻供物，秩序井然。
  relation: 加4章指出「時候滿足，神就差遣兒子」（加4:4），民7章的會幕制度、獻祭條例、利未人職任皆屬「世俗的初步學問」（加4:3,9）下的監護階段；十二支派首領代表整體以色列在律法下事奉，預表基督來到後，信徒領受兒子名分，不再作奴僕，乃是兒子，既是兒子，就靠神為後嗣（加4:7）。
