definition: 希伯來文「Shemot」第25章，吩咐製造法櫃、施恩座、基路伯、桌子、燈台等會幕器具。民數記7章記載摩西「進會幕要與耶和華說話的時候，聽見法櫃的施恩座以上、二基路伯中間有與他說話的聲音」（89節），直接見證出埃及記25:17-22施恩座與基路伯製造條例的實現，並確認神臨在與說話的地點。
accumulations:
- book: 民數記
  chapter: 7
  summary: 摩西在會幕聽見從法櫃施恩座上、二基路伯中間發出的聲音，耶和華與他說話。
  relation: 本章89節為出埃及記25法櫃、施恩座、基路伯製造條例的功能驗證文本。
