name: 雅4
type: 原文
secondary_types: []
aliases:
- 雅各書4章
status: formal
definition: 雅各書第4章，雅各責備信徒因私慾互相爭鬥、與世俗為友、驕傲自誇，勸勉順服神、親近神、潔淨手心、謙卑在主面前、不可論斷弟兄、並依靠神的旨意謀劃人生。
development: 本章深入探討教會內部衝突的屬靈根源，提出悔改與謙卑的解方，強調神恩典給謙卑人。
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章十二支派首領依次獻上完全相同的供物，無爭競、無自誇，同心合意為壇行獻壇之禮。
  relation: 雅4章責備「你們中間的爭戰鬥毆是從哪裡來的呢？」（雅4:1），民7章首領們按神所定次序（民7:12-83）各獻供物，無嫉妒、無競爭，展現「順服神、親近神」（雅4:7-8）的榜樣；供物細目統一（民7:13-83）反映「在主面前自卑」（雅4:10）的平等地位；摩西進會幕聽神說話（民7:89）印證「神賜恩給謙卑的人」（雅4:6）。
