name: 細麵調油（solet belulah vashamen）
type: 原文
secondary_types: []
aliases:
- 細麵調油
- 調油細麵
- 素祭麵
status: formal
definition: 希伯來文「solet」（細麵/細面）與「belulah vashamen」（調和油/攙油），指用油調和的細麵，為素祭的基本材料。本章每位首領獻一銀盤一銀碗，皆盛滿調油細麵作素祭（v.13,19,25,31,37,43,49,55,61,67,73,79），銀盤重130舍客勒、銀碗重70舍客勒，按聖所平（v.13,84-85），象徵生命果實獻給神，並為祭司收入來源（利未記2,
  民數記18）。
development: 十二支派同樣獻上銀器盛裝的調油細麵，彰顯獻祭的規範性與公平性；總計銀器重量於v.84-85統計。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二位首領各獻一銀盤一銀碗，皆盛滿調油細麵作素祭，銀器總重2400舍客勒。
  relation: 本章素祭的統一規格，顯示神對獻祭細節的規定與各支派同等份量的參與。
