name: 路7（Loukas 7）
type: 原文
secondary_types: []
aliases:
- 路加福音 7
- 路加第七章
status: formal
definition: 希臘文「Loukas」第七章，記載耶穌醫治百夫長僕人、使拿因城寡婦兒子復活、回應施洗約翰疑問、在法利賽人西門家被罪女膏抹、講論兩個債主比喻。本章展現耶穌權柄超越疾病、死亡、律法傳統，並揭示赦免之恩引發極大的愛。
development: 早期教父視百夫長信心為外邦人得救預表；罪女膏抹事件常與約12:1-8、太26:6-13平行討論，強調因信稱義與愛的關係（羅4-5）。
accumulations:
- book: 路加福音
  chapter: 7
  summary: 記載醫治百夫長僕人、拿因城寡婦兒子復活、回應約翰疑問、罪女膏抹耶穌腳、兩債主比喻，顯明耶穌彌賽亞權柄與赦罪恩典。
  relation: 本章為路加福音「加利利事工」段落高潮，以神蹟與比喻雙重見證耶穌身分，並預備後續門徒訓練與上耶路撒冷受難路程。
- book: 民數記
  chapter: 7
  summary: 民數記第7章詳細記載十二支派首領為奉獻壇禮連續十二日獻上相同供物的細目與總數，並記載摩西進會幕聽神從施恩座基路伯中間說話。
  relation: 本條目為聖經另一卷書章節，與民數記第7章同屬正典，民7章記載獻壇禮供物與神同在，路7章記載耶穌以醫治復活彰顯神國臨在，兩者同見證神主動臨近百姓、接納獻上與信心。
