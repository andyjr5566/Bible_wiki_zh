status: formal
definition: 民數記第7章提到摩西立完帳幕，用膏抹帳幕、器具、壇與壇上器具，使其成聖（第1節）；又記載「用膏抹壇的日子」首領來行奉獻壇之禮（第10、84、88節）。膏抹象徵分別為聖、歸耶和華專用，是會幕啟用的關鍵儀式。
development: 經文將膏抹與成聖、獻壇禮緊密連結，顯示聖所器物必須經膏抹成聖，才能承接後續十二日的奉獻儀式。
accumulations:
- book: 民數記
  chapter: 7
  summary: 記載摩西膏抹帳幕與器具成聖，並以膏抹壇之日為獻壇禮起始點。
  relation: 本章儀式啟動的基礎動作，連結會幕建成與首領奉獻。
