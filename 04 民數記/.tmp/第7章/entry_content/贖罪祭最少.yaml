name: 贖罪祭最少
type: 神學
secondary_types: []
aliases:
- 贖罪祭最少
status: formal
definition: 民數記7:87統計十二日獻壇禮，贖罪祭僅「公山羊十二隻」（每日一隻），是三類祭中數量最少者（燔祭36隻、平安祭204隻）。這顯示贖罪祭雖屬必要（遮蓋誤犯之罪，利4-5章），但神的心意不在於重複贖罪，而在於贖罪後進入豐盛的交通（平安祭）與完全獻上（燔祭），預表基督一次獻祭成就永遠贖罪（來10:10-14），信徒當進入「不再有罪的記念」（來10:17-18）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 87節明列贖罪祭總數「公山羊十二隻」，與燔祭36隻、平安祭204隻形成強烈對比。
  relation: 本章統計數據直接呈現贖罪祭數量最少的事實，支持該神學觀點。
