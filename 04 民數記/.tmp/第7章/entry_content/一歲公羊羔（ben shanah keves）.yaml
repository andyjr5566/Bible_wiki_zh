status: formal
definition: 希伯來文「ben shanah keves」（一歲公羊羔），指滿一歲的公羊羔。民數記第7章各支派首領獻供物時，每日獻一隻一歲公羊羔作燔祭（第15、21、27、33、39、45、51、57、63、69、75、81節），總計十二隻（第87節）；平安祭則每日獻五隻，總計六十隻（第88節）。燔祭象徵完全獻上，一歲公羊羔代表無殘疾、力壯的祭物，符合聖所的平（利未記1:3,
  10）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派首領連續十二日各獻一隻一歲公羊羔作燔祭，平安祭各獻五隻，總數分別為十二隻與六十隻。
  relation: 本章詳細記錄各支派同心合意、按次序獻上一歲公羊羔，顯示以色列十二支派在會幕膏抹成聖後，同心樂獻、無嫉妒自誇，神悅納奉獻。
