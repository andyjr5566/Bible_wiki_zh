status: formal
definition: 希伯來書第一章（希臘文：Hebraious），論述神在古時藉先知說話，末世藉兒子說話；兒子是神榮耀所發的光輝，本體真像，藉著權能命令托住萬有，洗淨了罪，坐在高天至大者右邊，遠超天使。
development: ''
accumulations:
- book: 民數記
  chapter: 7
  summary: 民數記7章結尾記載「摩西進會幕要與耶和華說話的時候，聽見法櫃施恩座以上、二基路伯中間有與他說話的聲音，就是耶和華與他說話」。來1章宣告「神在這末世藉著兒子曉諭我們」，並描述兒子「洗淨了罪，坐在高天至大者右邊」，與民數記7章「施恩座」、「基路伯」、「聲音」、「對他說話」、「摩西進會幕聽神說話」的舊約啟示方式形成「兒子超越先知/摩西」的基督論對比。
  relation: 神說話方式的舊約影兒與新約實體對比
