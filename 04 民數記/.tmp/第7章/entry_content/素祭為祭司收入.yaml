name: 素祭為祭司收入
type: 神學
secondary_types: []
aliases:
- 素祭為祭司收入
status: formal
definition: 民數記7章各支派供物中均包含「調油的細麵作素祭」（13、19、25等節），按利未記2:3、6:14-18規定，素祭的大部分歸祭司（亞倫子孫）為食物，作為他們在聖所事奉的供給。因利未人（含祭司）在以色列中無產業分（民18:20-24），神指定祭物中的素祭、贖罪祭、贖愆祭等為祭司收入（民18:8-10），體現「神為他們的產業」。
accumulations:
- book: 民數記
  chapter: 7
  summary: 每支派供物皆含「盛滿了調油的細麵作素祭」（13、19、25、31、37、43、49、55、61、67、73、79節），總計十二個銀盤、十二個銀碗的細麵（84-85節），皆屬素祭一部分。
  relation: 本章記載大量素祭被獻上，配合利未記、民數記18章祭司條例，證明素祭為祭司主要收入來源之一。
