name: 樂獻
type: 神學
secondary_types: []
aliases:
- 甘心樂意獻上
status: formal
definition: 指以甘心樂意、非出於勉強或慾望的態度向神獻上供物。本章十二支派首領依序獻上完全相同的供物，展現同心合意、樂獻的榜樣（參林後9:7），神悅納這樣的奉獻。
development: 本章詳細記載十二日來每支派首領獻上完全相同的供物，無競爭、無嫉妒，體現「樂獻」的群體性表現。這預表新約教導「樂意奉獻」，並顯出神看重奉獻的心志超過禮物本身。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派首領連續十二日各獻相同供物，展現樂獻、同心合意的屬靈光景。
  relation: 獻壇禮的核心屬靈意義，對應新約「樂意奉獻」的教導。
