- book: 民數記
  chapter: 7
  summary: 民數記7章詳述十二支派首領為壇獻供物，供物細目重複十二次，彰顯秩序與樂獻。彼前4章勸勉信徒作神恩賜的好管家（彼前4:10），與民數記7章利未人按職分服事（革順、米拉利得車牛，哥轄抬聖物）、首領按次序奉獻的「管家職分」、「合宜配搭」主題呼應。
  relation: 管家職分與服事秩序的神學呼應
