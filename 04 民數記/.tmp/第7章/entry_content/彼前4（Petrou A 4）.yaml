definition: 彼得前書第四章（希臘文：Petrou A），勸勉信徒既因基督受過肉身的苦，就當以此為兵器，不再隨從人情，只隨從神旨意；並論及末世近了，要謹慎自守，彼此款待，按恩賜服事。
development: ''
