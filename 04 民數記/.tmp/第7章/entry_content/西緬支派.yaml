status: formal
definition: 以色列次子西緬的後裔所組成的支派。民7:36-41記載其首領蘇利沙代的兒子示路蔑，在獻壇禮「第五日」獻上標準供物。民1:22-23、民2:12-13、民10:19、民26:12-14記載其人數、營次、行軍次序。西緬與利未因屠殺示劍人（創34、創49:5-7）被雅各預言「分散在以色列中」，後在迦南地產業被併入猶大支派（書19:1-9）。
development: 西緬支派曠野營於南面流便旁（民2:12），行軍第三隊（民10:19）。民26:14人數銳減至22,200（較民1:23的59,300），可能因巴力毗珥事件（民25）受重創。新約啟7:7十二支派得救名單中西緬列第五，神紀念此支派。
accumulations:
- book: 民數記
  chapter: 7
  summary: 西緬支派首領示路蔑於獻壇禮第五日獻供物，細目與其他十一支派完全相同，體現十二支派在獻壇禮上平等同心。
  relation: 本章第36-41節專述西緬支派首領獻供，屬十二日奉獻序列第五位。
