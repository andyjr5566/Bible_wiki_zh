name: 證據櫃（ʾărôn hāʿēdûṯ）
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 ʾărôn hāʿēdûṯ（אֲרוֹן הָעֵדֻת），意指「見證之櫃、證據櫃、法櫃」。民數記7:89 記載摩西進會幕與耶和華說話時，「聽見法櫃的施恩座以上、二基路伯中間有與他說話的聲音」。此櫃盛裝兩塊法版（出25:16、申10:5），是神與以色列立約的見證，置於至聖所，施恩座為神顯現、說話之處。
development: 出埃及記25:10-22 詳述製作規格；利未記16:2, 13-15 大贖罪日大祭司進至聖所灑血於施恩座；民數記4:5-6 哥轄子孫抬運時須用幔子遮蓋；撒母耳記上4-6
  非利士人擄約櫃、神擊殺烏撒（撒下6）；列王記上8:9 所羅門聖殿置約櫃；希伯來書9:4-5 新約視為天上真聖所的影子。本章89節是民數記首次明確提及神在約櫃施恩座上與摩西說話，標誌會幕功能啟動。
accumulations:
- book: 民數記
  chapter: 7
  summary: 摩西進會幕聽見從法櫃施恩座上、二基路伯中間發出的聲音，就是耶和華與他說話。
  relation: 本章結尾高潮，獻壇禮完成後，神在約櫃施恩座上與摩西說話，確認奉獻被悅納、會幕成為神與人會面之所。
