name: 平安祭最多
type: 神學
secondary_types: []
aliases:
- 平安祭最多
status: formal
definition: 民數記7:88統計十二日獻壇禮總數，平安祭牲畜共「公牛二十四隻，公綿羊六十隻，公山羊六十隻，一歲的公羊羔六十隻」，合計204隻，遠超燔祭（公牛12、公羊12、羊羔12，共36隻）與贖罪祭（公山羊12隻）。平安祭數量最多，象徵神與人、人與人因贖罪而享有的豐盛和好、交通與喜樂（參利3章、林前10:16-17「我們擘開的餅、豈不是同領基督的身體麼」）。
accumulations:
- book: 民數記
  chapter: 7
  summary: 87節統計燔祭總數（36隻），88節統計平安祭總數（204隻），對比顯然平安祭最多。
  relation: 本章結尾統計表直接提供數據，證明平安祭在獻壇禮中佔最大比例。
