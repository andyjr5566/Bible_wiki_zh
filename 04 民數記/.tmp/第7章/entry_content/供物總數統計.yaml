- 十二日供物加總
status: formal
definition: 民數記 7:84-88 統計十二日獻壇禮供物總數：銀盤 12 個、銀碗 12 個、金盂 12 個；銀器總重 2,400 舍客勒，金器總重 120
  舍客勒。牲畜：燔祭用公牛 12、公羊 12、一歲公羊羔 12；贖罪祭用公山羊 12；平安祭用公牛 24、公綿羊 60、公山羊 60、一歲公羊羔 60。平安祭牲畜總數最多（204
  隻），贖罪祭最少（12 隻），銀器重量遠大於金器。
development: 統計數字彰顯「十二」代表完全、合一（十二支派）；龐大牲畜數量顯示獻壇禮的盛大與百姓樂獻的心；總結為後世聖殿獻祭規模提供參考。
accumulations:
