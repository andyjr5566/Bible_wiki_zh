name: 金杯（kaf zahav）
type: 原文
secondary_types: []
aliases:
- 金盂
status: formal
definition: 希伯來文 כַּף זָהָב (kaf zahav)，直譯「金掌/金勺」。每首領獻一個，重十舍客勒，按聖所的平，盛滿了香（7:14, 20等）。十二個金杯總重一百二十舍客勒（7:86）。香象徵禱告升達神前（詩141:2，啟5:8）。
development: 金杯較小，專盛香料，顯示敬拜中禱告與讚美的重要性，金質貴重表達尊榮。
accumulations:
- book: 民數記
  chapter: 7
  summary: 每支派獻一金杯重10舍客勒盛香
  relation: 本章多節記載及第86節統計
