name: 蓬子車（ʿăgālôt）
type: 原文
secondary_types: []
aliases: []
status: formal
definition: 希伯來文 ʿăgālôt（עֲגָלוֹת），同「篷子車」，意指有蓋的運輸車輛。民數記7:3, 6-8 以色列首領奉獻六輛蓬子車十二隻牛，摩西按耶和華指示分給利未人革順、米拉利兩族運送會幕器具；哥轄族因辦聖所之事，肩頭上抬聖物，不分車牛。此為「篷子車」的異體寫法，指同一實物。
development: 本章僅此處出現。與「篷子車」條目內容相同，為同一希伯來詞的不同中文譯法。神指定運送方式區分聖物等級：約櫃、桌子、燈台、壇等至聖物必須肩抬（民4:15,
  7:9），不可用車，違者必死（撒下6:6-7）。此規例在大衛運約櫃事件（代上13、撒下6）得到嚴厲驗證。
accumulations:
- book: 民數記
  chapter: 7
  summary: 首領奉獻六輛蓬子車十二隻牛，摩西遵命分給革順族兩輛、米拉利族四輛，哥轄族不分車牛。
  relation: 本章記載蓬子車的來源、分配與神學意義，與「篷子車」條目指向同一經文事實。
