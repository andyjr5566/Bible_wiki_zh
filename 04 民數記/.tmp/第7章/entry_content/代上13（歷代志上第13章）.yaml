status: formal
definition: 歷代志上第13章記載大衛咨詢眾首領、會眾，決定從基列耶琳亞比拿達家用新車運約櫃往耶路撒冷（第1-7節）。途中烏撒伸手扶櫃被擊殺（第8-10節），大衛懼怕、將櫃送到俄別以東迦勒家三個月（第11-14節）。此章與撒下6平行，共同見證民數記7:9「肩頭上抬」律例的嚴肅性。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第9節確立哥轄子孫肩抬聖物的律例，為代上13記載大衛違例用車運櫃提供神學評估依據。
  relation: 代上13是民數記7:9律例在歷史中的負面教材；大衛後來在代上15按律法命利未人用杠抬櫃（代上15:15），神才賜福（代上15:26）。
