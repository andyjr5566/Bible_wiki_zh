name: 祭司無產業
type: 神學
secondary_types: []
aliases:
- 祭司無地業
- 祭司無分
status: formal
definition: 民數記18:20、申命記10:9、18:1-2明文規定利未支派（含祭司）在以色列中無產業、無地業，耶和華是他們的產業。本章雖未直接論述，但大量供物（v.84-88）歸入會幕，由祭司處理、分食，實際印證祭司經濟來源不在於土地生產，而在於百姓按律例獻上的供物與神的供應。
development: 本章供物總數作為祭司無地業卻蒙神供應的具體佐證；配合民數記18、申命記10、18章讀經，形成完整神學圖景。
accumulations:
- book: 民數記
  chapter: 7
  summary: 十二支派獻上龐大供物（銀器、金器、牲畜），透過祭司事奉轉化為祭司家庭的養贍。
  relation: 本章供物數據為「祭司無產業、神為產業」提供物質基礎見證，與民數記18:20、申命記10:9、18:1-2互證。
