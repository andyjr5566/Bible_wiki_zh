name: 贖罪祭牲畜
type: 主題
secondary_types: []
aliases:
- 贖罪祭供物
status: formal
definition: 每日獻供物包含一隻公山羊作贖罪祭（7:16, 22等）。十二日共十二隻（7:87）。贖罪祭為無意之罪贖愆（利4-5章），公山羊象徵代替受罰，預表基督作贖罪祭（來10:12）。
development: 贖罪祭數量最少（僅12隻），但不可或缺，提醒百姓在獻壇喜慶中仍須面對罪的問題。
accumulations:
