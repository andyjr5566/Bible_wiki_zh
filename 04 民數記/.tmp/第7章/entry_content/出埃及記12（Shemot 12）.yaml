status: formal
definition: 希伯來文「Shemot」第12章，訂立逾越節條例，規定正月十四日宰羊羔、塗門框、吃無酵餅。民數記7章雖未提逾越節，但記載會幕於「出埃及第二年正月初一」立完（1節），且首領獻壇禮使用「一歲的公羊羔」（15,21,27,33,39,45,51,57,63,69,75,81節）作燔祭，呼應出埃及記12:5「羊羔要沒有殘疾、一歲的公羊羔」，顯示逾越節羊羔標準延伸為常規燔祭標準。
accumulations:
- book: 民數記
  chapter: 7
  summary: 獻壇禮燔祭牲畜指定「一歲的公羊羔」十二隻（87節），符合出埃及記12逾越節羊羔資格。
  relation: 本章燔祭牲畜規格繼承出埃及記12逾越節羊羔條例，彰顯救贖與獻祭的連續性。
