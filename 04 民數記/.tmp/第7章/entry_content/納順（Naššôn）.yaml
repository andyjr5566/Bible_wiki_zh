definition: 希伯來文 Naššôn（נַחְשׁוֹן），猶大支派首領，亞米拿達之子。民數記7:12-17記載他是十二日獻壇禮中第一日獻供物的首領，供物包括銀盤、銀碗、金盂、燔祭、贖罪祭、平安祭牲畜，細目與後十一日完全相同。另見民數記1:7、2:3、10:14等處作猶大軍隊統領、行軍先鋒。
development: 納順作為猶大支派首領，在會幕建成、獻壇禮開始時率先獻供，象徵猶大領袖地位（創49:10、士1:2）。新約馬太福音1:4、路加福音3:32將其列入耶穌家譜，顯示救恩歷程中神揀選的連續性。
