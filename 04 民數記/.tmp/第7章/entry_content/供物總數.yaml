name: 供物總數
type: 主題
secondary_types: []
aliases:
- 供物統計
- 獻祭總數
status: formal
definition: 本章第84-88節統計十二支派首領為行奉獻壇之禮所獻供物的總數：銀盤12個、銀碗12個、金盂12個；銀器總重2400舍客勒、金器總重120舍客勒；燔祭公牛12、公羊12、一歲公羊羔12、贖罪祭公山羊12；平安祭公牛24、公綿羊60、公山羊60、一歲公羊羔60。此統計彰顯神對每項獻祭的紀念與悅納，也顯出十二支派同心合一、樂意奉獻的整體畫面。
development: 經文先逐日記載各支派同樣清單（v.12-83），再以總數收尾（v.84-88），結構上呈現「個別順服→集體完全」的神學動態。
accumulations:
- book: 民數記
  chapter: 7
  summary: 第84-88節詳細列出銀器、金器、燔祭、贖罪祭、平安祭的總數量與重量。
  relation: 本章高潮段落，將十二日重複的獻祭匯總，強調神記著每一筆獻祭，並確認壇的奉獻禮圓滿完成。
