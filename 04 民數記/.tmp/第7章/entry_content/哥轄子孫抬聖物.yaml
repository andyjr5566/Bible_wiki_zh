name: 哥轄子孫抬聖物
type: 主題
secondary_types: []
aliases:
- 哥轄族抬聖物
status: formal
definition: 民數記7:9指出車與牛都沒有交給哥轄子孫，因為他們辦的是聖所的事，在肩頭上抬聖物（參民4:15, 7:9）。聖物包括約櫃、桌子、燈台、壇等，必須用杠抬在肩上，不可用車運，後大衛用車運約櫃導致烏撒被擊殺（撒下6:6-7）即為反面教材。
development: 本章強調哥轄族的特殊聖職：直接接觸至聖物，須親身擔負，象徵聖潔不可輕褻，也預表基督徒須親自背負屬靈責任。
accumulations:
- book: 民數記
  chapter: 7
  summary: 哥轄子孫不得車牛，須肩抬聖物
  relation: 本章第9節說明原因
