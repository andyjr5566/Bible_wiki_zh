organization: '### 七月初一：吹角節（v1-6）

  七月（提斯利月）是以色列宗教曆最密集的月份。月初一日定為**吹角節**，當有**聖會**，**不可作任何勞碌工**（[[聖會不可作工]]）。獻祭配置為：公牛犢1隻、公綿羊1隻、一歲公羊羔7隻作燔祭，配以調油細麵的[[素祭與奠酒祭（minchah
  與 nesekh）|素祭]]（公牛3/10伊法、公羊2/10、羊羔各1/10），另加一隻[[公山羊贖罪祭（se''ir izzim）|公山羊贖罪祭]]。這些祭物**在月朔常獻祭與奠祭之外**獻上（v6）。吹角聲喚醒百姓預備進入審判與恩典的季節，預表[[吹角節預表基督再來|基督再來的角聲]]。


  ### 七月初十：大贖罪日（v7-11）

  初十日為[[大贖罪日（七月初十）]]，同樣**聖會、不可作工**，並要**刻苦己心**（禁食悔改）。獻祭數量與吹角節相同（公牛1、公羊1、羊羔7、素祭按例、公山羊贖罪祭1），但經文強調「這是在贖罪祭和常獻燔祭……以外」（v11），顯示贖罪日的獨特贖罪功能。大祭司獨自進至聖所灑血，為全會眾贖罪，預表[[大贖罪日預表基督永遠贖罪|基督一次獻上自己成就永遠贖罪]]。


  ### 七月十五至二十一：住棚節七日（v12-34）

  十五日開始**住棚節**，首日聖會不可作工，守節七日。此節期獻祭規模最大，呈現獨特的**公牛犢遞減模式**（[[公牛犢遞減獻祭（parim mitma''atim）]]）：

  | 日次 | 公牛 | 公羊 | 羊羔 | 公山羊贖罪祭 |

  |------|------|------|------|--------------|

  | 第1日 | 13 | 2 | 14 | 1 |

  | 第2日 | 12 | 2 | 14 | 1 |

  | 第3日 | 11 | 2 | 14 | 1 |

  | 第4日 | 10 | 2 | 14 | 1 |

  | 第5日 | 9  | 2 | 14 | 1 |

  | 第6日 | 8  | 2 | 14 | 1 |

  | 第7日 | 7  | 2 | 14 | 1 |

  七日共獻公牛**70隻**（13+12+…+7），公羊14隻，羊羔98隻，公山羊7隻。公牛總數70與傳統列國數目呼應，象徵為萬國代求；遞減則暗示列國最終歸向神、獻祭漸止。每日素祭、奠祭按數照例（[[伊法、欣度量衡（''ephah,
  hin）]]）。此節期預表[[住棚節預表千禧年與神同住|千禧年萬國與神同住]]，也是[[住棚節總計獻祭（chag ha-sukkot kol ha-olah）]]的具體展開。


  ### 七月二十二：第八日聖會（v35-38）

  節期第八日為**[[第八日聖會（shemini atzeret）]]**，又稱「嚴肅會」，聖會不可作工。獻祭大幅簡化：公牛1、公羊1、羊羔7、公山羊贖罪祭1，素祭奠祭按例。第八日脫離七日遞減序列，象徵進入永恆安息，不再為列國代求，專享神與子民親密同在。


  ### 總結與屬靈意義（v39-40）

  經文以總結句收尾：以上諸節期獻祭，**在所許的願並甘心獻的以外**（v39），顯示定規獻祭是底線，甘心祭是超越回應。摩西照耶和華吩咐傳達（v40），確立第七月祭儀為永遠定例。整章結構呈現「吹角警醒→贖罪潔淨→住棚同住→第八永恆」的救恩劇情，每個節期都以**聖會不可作工**為界，提醒以色列：敬拜優於勞作，恩典先於功勞。'
