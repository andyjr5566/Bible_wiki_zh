- "title": "公山羊贖罪祭（se'ir izzim）"
  "path": "link_folder/原文/公山羊贖罪祭（se'ir izzim）.md"
  "summary": "本章重點：住棚節七日（民29:16,19,22,25,28,31,34）與第八日（民29:38）、吹角節（民29:5）、大贖罪日（民29:11）均獻一隻公山羊為贖罪祭，附於燔祭之外。公山羊贖罪祭在各節期重複出現，彰顯定期節期皆須以贖罪祭處理百姓誤犯之罪，維持與神立約關係。"
  "relation": "本章將公山羊贖罪祭延伸至秋季三大節期（吹角節、大贖罪日、住棚節七日、第八日），形成「節期無不含贖罪」的完整體系。預表基督一次獻上自己成就永遠贖罪（來9:12、10:10），除去罪孽（約1:29），大贖罪日雙山羊（利16章）中一隻為耶和華、一隻阿撒瀉勒，雙重預表基督贖罪與除罪。"
- "title": "素祭與奠酒祭（minchah 與 nesekh）"
  "path": "link_folder/原文/素祭與奠酒祭（minchah 與 nesekh）.md"
  "summary": "本章重點：住棚節七日每日燔祭（公牛犢遞減13→7、公綿羊二、羊羔十四）均配素祭（細麵調油：公牛犢伊法十分之三、公綿羊十分之二、羊羔十分之一）與奠酒祭（酒：公牛犢半欣、公綿羊三分之一欣、羊羔四分之一欣）。吹角節、大贖罪日、第八日同規。素祭預表基督純全人性（細麵）與聖靈膏抹（油）；奠酒祭預表基督寶血傾流（太26:28）、保羅以命為奠酒祭（腓2:17）。"
  "relation": "本章為素祭與奠酒祭在秋季節期中的大量應用例：住棚節七日總計素祭用麵伊法三十（70×3/10+14×2/10+98×1/10）、酒欣三十五（70×1/2+14×1/3+98×1/4），展現神對敬拜秩序精確要求（申25:13-16），預表基督完全符合神公義標準，也是信徒獻上自己為活祭（羅12:1）的榜樣。"
