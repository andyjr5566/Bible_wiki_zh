name: 大贖罪日預表基督永遠贖罪
type: 神學
secondary_types: []
aliases:
- 贖罪日預表基督
- 永遠贖罪預表
status: formal
definition: 民數記 29:7-11 的大贖罪日獻祭（公牛、公羊、羊羔燔祭，公山羊贖罪祭）預表基督作大祭司，憑自己的血一次進入天上真聖所，成就永遠贖罪（來
  9:11-12）。舊約贖罪日需每年重複，且獻祭牲畜之血不能除罪（來 10:1-4）；基督獻上自己，單獻一次便使成聖的人永遠得以完全（來 10:10, 14）。
development: 利未記 16 章大祭司進至聖所灑血儀式；希伯來書 9-10 章系統論證基督贖罪優於舊約獻祭；啟示錄 5:6-9 羔羊像被殺過的站在寶座中，彰顯永遠贖罪成就。
accumulations:
- book: 民數記
  chapter: 29
  summary: 列出大贖罪日獻祭細目，為希伯來書論述基督永遠贖罪提供舊約對照。
  relation: 本章獻祭條例是希伯來書 9-10 章「影兒」與「本體」對比的直接經文依據。
