name: 住棚節總計獻祭（chag ha-sukkot kol ha-olah）
type: 原文
secondary_types: []
aliases:
- 住棚節獻祭總計
- 帳棚節總獻祭
status: formal
definition: 希伯來文 chag ha-sukkot（住棚節），kol ha-olah（全部燔祭）。民數記 29:12-34 住棚節七日獻祭總計：公牛犢
  70 隻（13+12+11+10+9+8+7）、公綿羊 14 隻（2×7）、公羊羔 98 隻（14×7）、公山羊 7 隻（贖罪祭，每日1隻）。素祭細麵總計：公牛
  70×3/10=21 伊法、公羊 14×2/10=2.8 伊法、羊羔 98×1/10=9.8 伊法，共 33.6 伊法。第八日另加公牛1、公羊1、羊羔7、公山羊1。這龐大數目顯示住棚節為全年獻祭最多的節期，象徵豐收感恩與萬國歸主（亞
  14:16）。
development: 利未記 23:36-37 概略規定住棚節獻祭；列王記上 8:65-66 所羅門聖殿落成守住棚節七日又七日；以斯拉記 3:4 歸回聖殿重建後按數獻住棚節祭；撒迦利亞
  14:16-19 千禧年萬國上耶路撒冷守住棚節。
accumulations:
- book: 民數記
  chapter: 29
  summary: 提供住棚節七日逐日獻祭明細，使總計數目可被精確統計，為舊約獻祭數量最詳細的單一節期記載。
  relation: 本章是計算住棚節總計獻祭的唯一完整數據來源，利未記 23 僅概述原則。
