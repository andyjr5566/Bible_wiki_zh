name: 第八日聖會（shemini atzeret）
type: 事件
secondary_types: []
aliases:
- 第八日嚴肅會
- Shemini Atzeret
status: formal
definition: 希伯來文 shemini atzeret（第八日嚴肅會/聚集）。民數記 29:35-38 規定住棚節後第八日為聖會，不可作勞碌工，獻公牛1隻、公羊1隻、羊羔7隻燔祭，配素祭、奠祭，另獻公山羊1隻贖罪祭。這一日獨立於住棚節七日之外，猶太傳統視為神留住以色列「再住一日」的親密時刻（拉比文獻
  Sukkah 55b）。神學上預表千禧年後永恆狀態（新天新地），神永遠與子民同住（啟 21:3）。
development: 利未記 23:36 同稱「嚴肅會」；尼希米記 8:18 以斯拉時代守第八日；約翰福音 7:37 耶穌在「節期的末日，就是最大之日」宣稱賜活水，可能指此日；啟示錄
  21-22 永恆帳幕預表終極實現。
accumulations:
- book: 民數記
  chapter: 29
  summary: 記載第八日聖會獻祭細目（公牛1、公羊1、羊羔7、公山羊1），與住棚節七日獻祭形成對比。
  relation: 本章為第八日聖會獻祭條例的主要律法經文，與住棚節七日遞減獻祭形成鮮明對照。
