updates:
- title: "約書亞"
  path: "link_folder/人物/約書亞.md"
  summary: "民11:28 約書亞（嫩的兒子）請求摩西禁止伊利達、米達說預言。摩西回應：你為我的緣故嫉妒人嗎？惟願耶和華的百姓都受感說話！四份註解均記載此為約書亞早期事奉表現，顯出其維護摩西權威卻被摩西以更大胸襟教導。
"
  relation: "本章展現約書亞年輕領袖保護既有秩序，摩西屬靈眼光更遠，預表約書亞日後接續摩西領導百姓進迦南。
"
- title: "基博羅哈他瓦"
  path: "link_folder/地點/基博羅哈他瓦.md"
  summary: "民11:34 因百姓貪戀肉食、耶和華降下鵪鶉並擊殺貪婪者，該地名基博羅哈他瓦（貪慾之人的墳墓）。丁良才、啟導本、串珠註釋、聖經精讀本均確認地名含義與審判關聯。
"
  relation: "本章記載貪慾審判的具體地點，連結民10章起行敘事與民12章米利暗長大痲瘋的連續地理脈絡.
"