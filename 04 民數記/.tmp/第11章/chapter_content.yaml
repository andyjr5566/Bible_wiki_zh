organization: "### 火燒他備拉：怨言招致審判（v1-3）\n以色列人剛離開西乃山三日路程，[[怨言（mitlonen）|怨言]]聲便傳入耶和華耳中。經文未具體記載怨言內容，只說「惡語」，卻足以引發[[神的怒氣與審判|神的怒氣]]——火從耶和華那裡出來，燒毀營邊。百姓向摩西哀求，摩西[[摩西的代禱與代求|代禱]]，火才熄滅。該地遂名[[他備拉|他備拉]]（意即「燒盡」），成為[[火燒營邊預表神審判（來12：29）|神審判聖潔的預表]]（來\
  \ 12:29）。這段敘事確立全章基調：百姓的不滿、神的烈怒、領袖的代求，三者交織貫穿始終。\n\n### 閒雜人貪慾、百姓厭棄嗎哪（v4-9）\n[[閒雜人是誰（出12：38）|閒雜人]]（出\
  \ 12:38）率先「大起[[貪慾（ta'avah）|貪慾]]的心」，以色列人隨聲附和，在帳棚門口哭號：「誰給我們肉吃？」他們美化埃及飲食——魚、黃瓜、西瓜、韭菜、蔥、蒜，卻將神每日供應的[[百姓厭棄嗎哪（約6：31-35）|嗎哪]]視為「心血枯竭」的單調食物（v6）。經文特意插入嗎哪的形狀、採集、加工與口感（v7-9），強調神的供應豐富且可變化，百姓的不滿純屬屬靈眼瞎。這段對比為後續[[百姓貪慾要吃肉（貪慾事件）|貪慾事件]]埋下伏筆，也預表約翰福音\
  \ 6 群眾只求餅餅、拒絕生命糧的光景。\n\n### 摩西求死：領袖的崩潰與誠實（v10-15）\n聽見全營哭號，摩西「不喜悅」，更向神傾吐苦水：為何苦待僕人？這百姓豈是我懷的胎？重任獨自擔當不起，寧求神「立時將我殺了」（v15）。這不是信心軟弱的表現，乃是領袖在極限壓力下向神完全敞開的誠實——正如詩篇\
  \ 106:23 所記，[[摩西代禱熄滅神怒（詩106：23）|摩西站在破口前代求]]，神卻回應以制度性供應而非單靠摩西一人。\n\n```mermaid\n\
  sequenceDiagram\n  participant M as 摩西\n  participant G as 耶和華\n  M->>G: 為何苦待僕人？重任獨自擔當不起（v11-14）\n\
  \  M->>G: 求你立時將我殺了（v15）\n  G->>M: 招聚七十長老，分賜靈在他們身上（v16-17）\n  G->>M: 應許賜肉一個月，直到厭惡（v18-20）\n\
  \  M->>G: 六十萬人，羊牛魚夠嗎？（v21-22）\n  G->>M: 耶和華的膀臂豈縮短了？（v23）\n```\n\n### 七十長老受靈：分擔重擔的制度起源（v16-17,\
  \ 24-25）\n神吩咐摩西從長老中選七十人到會幕前，將降於摩西身上的[[聖靈分賜七十長老|靈分賜他們]]，使他們「同當這管百姓的重任」（v17）。這是[[七十長老制度起源|以色列長老制度的正式起點]]，預表新約教會多元恩賜共同牧養（弗\
  \ 4:11-12），更遠指[[聖靈分賜預表五旬節（徒2：1-4）|五旬節聖靈澆灌全體信徒]]（徒 2:1-4）。靈停在他們身上時「受感說話，以後卻沒有再說」（v25），顯示這是一次性授職標記，而非持續性預言恩賜。此事件確立了[[七十長老受靈|七十長老受靈]]的歷史記載。\n\
  \n### 神應許肉吃一個月：恩典還是審判？（v18-23）\n神命百姓自潔，預備吃肉「一個整月，甚至肉從你們鼻孔裡噴出來，使你們厭惡」（v20），因為他們「厭棄住在你們中間的耶和華」（v20），這正是[[百姓拒絕耶和華|百姓拒絕耶和華]]的表現。摩西以六十萬步行男人為由質疑供應可能性（v21-22），神以「耶和華的膀臂豈是縮短了嗎？」（v23）回應。這應許雙重性質明顯：表面滿足慾望，實為[[神給肉吃一個月是恩典還是審判|審判性的飽足]]——讓貪慾者在飽足中見證自己的悖逆與神的大能。\n\
  \n### 伊利達、米達在營中說預言：約書亞的嫉妒與摩西的胸襟（v26-30）\n[[伊利達|伊利達]]、[[米達|米達]]雖在錄名單中卻未到會幕，靈仍降在他們身上，在營中說預言。[[約書亞|約書亞]]請摩西禁止，摩西卻說：「你為我的緣故嫉妒人嗎？惟願耶和華的百姓都受感說話！」（v29）這段揭示兩層真理：(1)\
  \ [[七十長老是否包含伊利達、米達|神的恩賜不受儀式空間限制]]，(2) [[約書亞請禁伊利達、米達說預言是否嫉妒|屬靈領袖當以神榮耀為重，非維護個人權威]]。摩西的胸襟預表[[基督作中保（來7：25）|基督作大祭司的廣大胸懷]]（來\
  \ 7:25）。這也是[[伊利達、米達在營中說預言（伊利達、米達）|伊利達、米達在營中說預言]]的具體記載。\n\n### 風颳鵪鶉、瘟疫擊殺：基博羅哈他瓦的慘痛教訓（v31-34）\n\
  [[風颳鵪鶉（風颳鵪鶉）|風從耶和華颳起]]，將[[鵪鶉（selav）|鵪鶉]]吹至營邊四圍，厚約二肘、廣約一天路程（v31）。百姓貪婪採集，至少也有十[[賀梅珥（homer）|賀梅珥]]（約\
  \ 2,200 公升），鋪滿營外（v32）。「肉在他們牙齒之間尚未嚼爛」，[[神的怒氣與審判|耶和華的怒氣]]發作，用最重災殃擊殺他們（v33）。該地名[[基博羅哈他瓦|基博羅哈他瓦]]（意即「貪慾之人的墳墓」），永記[[貪慾（ta'avah）|貪慾]]的代價。這審判並非神殘忍，乃是聖潔對悖逆的必然回應，也警戒後世：貪慾是拜偶像（西\
  \ 3:5）。\n\n### 從基博羅哈他瓦到哈洗錄（v35）\n百姓從[[基博羅哈他瓦|基博羅哈他瓦]]起行，來到[[哈洗錄|哈洗錄]]安營。地理移動標記著一段慘痛教訓的結束，也預備下一章米利暗、亞倫毀謗摩西的事件——百姓的怨言未止，領袖的試煉接踵而至。\n\
  \n### 跨章脈絡與神學預表\n本章呈現「百姓怨言 → 神審判 → 領袖代求 → 制度建立 → 神供應 → 審判落實」的完整循環。關鍵神學張力在於：神同時是「賜嗎哪的供應者」與「降火燒營的審判者」；摩西同時是「軟弱求死的僕人」與「分享靈恩的中保」。[[七十長老受靈|七十長老受靈]]開啟共同治理模式，[[伊利達|伊利達]]、[[米達|米達]]事件打破空間限制，[[風颳鵪鶉（風颳鵪鶉）|風颳鵪鶉]]展示神對受造界的主權。新約視角下：嗎哪預表基督（[[百姓厭棄嗎哪（約6：31-35）|約\
  \ 6:31-35]]），聖靈分賜預表五旬節（[[聖靈分賜預表五旬節（徒2：1-4）|徒 2:1-4]]），摩西代求預表基督永遠活著替我們祈求（[[基督作中保（來7：25）|來\
  \ 7:25]]），貪慾審判警戒教會不可試探主（林前 10:6-11），火燒營邊預表神審判（[[火燒營邊預表神審判（來12：29）|來 12:29]]）。"
