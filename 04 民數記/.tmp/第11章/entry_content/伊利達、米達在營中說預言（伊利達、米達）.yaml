name: 伊利達、米達在營中說預言（伊利達、米達）
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 摩西招聚七十位長老到會幕，耶和華將摩西身上的靈分賜他們，他們受感說話。但伊利達、米達二人留在營中未到會幕，靈同樣停在他們身上，他們就在營裡說預言。約書亞請摩西禁止，摩西卻說：「惟願耶和華的百姓都受感說話！」（民11:24-29）。
development: 事件顯示聖靈的主權不受地點限制，摩西的回應預表新約時代聖靈澆灌眾人的光景（徒2:17-18）。
accumulations:
- book: 民數記
  chapter: 11
  summary: 伊利達、米達未到會幕仍在營中受靈說預言，摩西拒絕約書亞的禁止請求。
  relation: 本章聖靈分賜七十長老的高潮，彰顯神恩賜的自由與摩西屬靈的胸襟。
