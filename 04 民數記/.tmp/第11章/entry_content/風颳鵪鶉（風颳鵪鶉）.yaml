name: 風颳鵪鶉（風颳鵪鶉）
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 有風從耶和華那裡颳起，把鵪鶉由海面颳來，飛散在營邊和營的四圍，這邊約有一天的路程，那邊約有一天的路程，離地面約有二肘。百姓起來終日終夜並次日一整天捕取鵪鶉，至少的也取了十賀梅珥（民11:31-32）。
development: 神藉風帶來鵪鶉，既是供應也是審判；百姓貪婪大量捕取，肉在牙齒間尚未嚼爛，耶和華便用重災殃擊殺他們，地名基博羅哈他瓦（民11:33-34）。
accumulations:
- book: 民數記
  chapter: 11
  summary: 風從耶和華颳起帶來鵪鶉，百姓大量捕取，隨即遭神審判。
  relation: 百姓貪慾要吃肉的神回應，同時是恩典供應與審判工具的雙重功能。
