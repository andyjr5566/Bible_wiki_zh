name: 基督作中保（來7：25）
type: 互文
secondary_types:
- 神學
aliases:
- 基督中保職分
status: formal
definition: 此條目探討民數記 11 章摩西為百姓代求（第 2、11-15 節）如何預表基督作信徒永遠的中保（來 7:25）。摩西作為舊約中保，其代禱雖蒙垂聽，但受限於人性與死亡；基督則因長遠活著，能以永遠救到底那些靠著祂進到神面前的人。
development: 從摩西的暫時性代求（民 11）發展至基督永恆、完全的中保職分（來 7），體現救贖歷史中中保職分的漸進啟示與成就。
accumulations:
- book: 民數記
  chapter: 11
  summary: 摩西因百姓怨言向神代求，求神減輕重擔或取去性命（11-15 節），神應允分靈給七十長老分擔（16-17 節）。
  relation: 摩西在此作為中保介立神人之間，預表基督的代求事工。
- book: 希伯來書
  chapter: 7
  summary: 基督因長遠活著，常為信徒祈求，能以永遠救到底（25 節）。
  relation: 基督是摩西中保職分的終極成就與實體，其代求不因死亡中斷，功效永恆。
related_entries:
