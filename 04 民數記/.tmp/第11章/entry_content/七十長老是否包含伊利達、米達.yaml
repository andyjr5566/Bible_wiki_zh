name: 七十長老是否包含伊利達、米達
type: 解經爭議
secondary_types:
- 原文考據
aliases:
- 伊利達米達身分爭議
status: formal
definition: 民數記 11 章 26 節提到伊利達、米達「本是在那些被錄的人中」（或譯「在冊上的人」），卻沒有到會幕，靈仍降在他們身上說預言。爭議在於：「被錄的人」是指剛被選的七十長老名單（意味著他們是七十長老中缺席的兩人，實際到會幕者只有六十八人），還是指更早的長老名冊（出
  18 或出 24 的長老），他們額外蒙恩？前說支持七十長老名額固定；後說顯示神主權超越人為名單。
development: 早期猶太解經（如塔古姆、拉希）多傾向他們是七十長老中缺席者；部分現代學者（如米爾格倫）認為「被錄」指民 11:16 新選名單，強調神恩典不受儀式限制；另一些學者聯繫出
  24:1 七十長老名單，認為他們是舊長老獲新恩膏。
accumulations:
- book: 民數記
  chapter: 11
  summary: 經文記載伊利達、米達在被錄名單中但未上會幕，仍受靈說預言（26 節）。
  relation: 核心經文依據，釐清「被錄」與「七十長老」關係的關鍵。
