name: 七十長老制度起源
type: 歷史
secondary_types:
- 神學
- 社會結構
aliases:
- 七十長老起源
status: formal
definition: 七十長老制度在民數記 11 章 16-17 節正式建立，神命摩西招聚七十位長老到會幕，分賜摩西身上的靈給他們，協助治理百姓。其淵源可追溯至出埃及記
  18 章葉忒羅建議設立千百五十十的首領（18:21-25），及出埃及記 24 章 1、9 節七十長老與摩西、亞倫、拿答、亞比戶上山見神。民 11 章賦予其屬靈權柄（聖靈分賜），確立為以色列屬靈治理機構的雛型，後發展為公會（Sanhedrin）前身。
development: 從行政輔助（出 18）到立約見證（出 24）再到屬靈治理共同體（民 11），體現以色列領導結構從摩西獨攬走向共同治理的歷史演進。
accumulations:
- book: 民數記
  chapter: 11
  summary: 神吩咐摩西招聚七十長老，分靈賜他們共同治理（16-17, 24-25 節）。
  relation: 制度正式賦予屬靈權柄（聖靈）的關鍵節點。
- book: 出埃及記
  chapter: 18
  summary: 葉忒羅建議摩西選立能幹人作首領分擔審判（21-25 節）。
  relation: 行政分工的起源，奠定領導層級基礎。
- book: 出埃及記
  chapter: 24
  summary: 七十長老隨摩西上西乃山見神（1, 9 節）。
  relation: 確立七十長老作為立約群體代表的地位。
- book: 申命記
  chapter: 1
  summary: 摩西回顧設立千百五十十首領（9-18 節）。
  relation: 總結領導制度建立的過程與目的。
