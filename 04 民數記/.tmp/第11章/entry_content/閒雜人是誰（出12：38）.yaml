  summary: 閒雜人大起貪慾心，挑動以色列人哭號要吃肉，引發鵪鶉審判。
  relation: 本章將出 12:38 的歷史註腳轉化為神學張力：外族人的慾望如何感染選民，並觸發神對全營的審判。
