name: 閒雜人是誰（出12：38）
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 民數記 11:4 提到「他們中間的閒雜人大起貪慾的心」，引發對「閒雜人」（asaphsuf/erev rav）身分的解經討論。出埃及記 12:38
  記載「有閒雜人和羊群牛群，與以色列人一同上去」。學者觀點分歧：(1) 指出埃及時跟隨的外邦雜族（埃及人或其他被擄者）；(2) 指混血婚姻所生或未受割禮的外族人；(3)
  象徵屬靈狀態不純、隨眾信主卻無真信心的群體。本章顯示他們率先貪慾、挑動以色列人哭號要吃肉，成為引發全營悖逆的催化劑。
development: 術語「閒雜人」僅見於出 12:38、民 11:4、申 29:11、尼 13:3。猶太傳統（如拉希）多視為埃及改宗者；現代學者傾向視為社會邊緣族群。神學上常作「稗子與麥子」（太
  13:24-30）或「屬肉體基督徒」（林前 10:6）的預表。爭議核心在於：他們是否屬約民一部分？其悖逆責任歸屬？是否預表教會內假弟兄？
accumulations:
