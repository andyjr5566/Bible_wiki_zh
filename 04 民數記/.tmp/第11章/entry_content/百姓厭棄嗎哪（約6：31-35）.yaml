name: 百姓厭棄嗎哪（約6：31-35）
type: 互文
secondary_types:
- 神學
aliases:
- 厭棄嗎哪
status: formal
definition: 民數記 11 章 4-6 節記載閒雜人與以色列人厭惡嗎哪，渴慕埃及的魚肉蔬菜，這在約翰福音 6 章 31-35 節被耶穌引用並對比：祖先在曠野吃嗎哪還是死了，耶穌自稱是從天上降下的生命糧，吃這糧的就永遠活著。本章顯示人對神供應的悖逆，新約啟示基督為真實的屬靈糧食。
development: 從舊約曠野嗎哪的預表（神供應物質食物）進展至新約基督作生命糧的實體（神供應永恆屬靈生命），揭示人厭棄神供應的根本問題在於屬靈眼瞎。
accumulations:
- book: 民數記
  chapter: 11
  summary: 百姓厭棄嗎哪，想念埃及飲食，發怨言（4-6 節）。
  relation: 顯示百姓拒絕神的供應，成為後來約翰福音 6 章對比的背景。
- book: 約翰福音
  chapter: 6
  summary: 群眾引用嗎哪要求神蹟，耶穌宣稱自己是生命糧（31-35 節）。
  relation: 耶穌以嗎哪為預表，指向自己為真糧，回應人類深層屬靈飢渴。
