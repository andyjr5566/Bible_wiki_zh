name: 摩西求死
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 摩西因百姓哭號要吃肉，管理重任難擔，向耶和華說：「求你立時將我殺了，不叫我見自己的苦情」（民11:11-15）。這反映屬靈領袖在極限壓力下的誠實掙扎。
development: 神未責備摩西，反而供應七十長老分擔重任（民11:16-17），並應許賜肉（民11:18-23），顯示神體恤軟弱。
accumulations:
- book: 民數記
  chapter: 11
  summary: 摩西因百姓貪慾與管理重擔向神求死，神回應賜長老分擔並供應肉。
  relation: 展現領袖人性軟弱與神恩典供應的對比，為後續聖靈分賜鋪路。
