name: 火燒營邊預表神審判（來12：29）
type: 互文
secondary_types:
- 神學
aliases:
- 他備拉火燒營邊預表
status: formal
definition: 民數記 11 章 1-3 節記載耶和華的火在營邊燒滅百姓（他備拉），因他們發怨言。希伯來書 12 章 29 節宣告「我們的神乃是烈火」。此互文指出曠野審判的火預表末世神公義的審判，火既潔淨也毀滅，提醒信徒當存敬畏事奉神。
development: 從歷史具體審判事件（他備拉之火）推演至神學屬性宣告（神是烈火），強調神聖潔公義不變，審判必臨到悖逆者。
accumulations:
- book: 民數記
  chapter: 11
  summary: 百姓發怨言，耶和華降火燒營邊，摩西禱告火才熄滅，地名他備拉（1-3 節）。
  relation: 具體歷史審判事件，作為「神是烈火」的歷史見證。
- book: 希伯來書
  chapter: 12
  summary: 勸勉信徒存敬畏寒心事奉神，因神是烈火（29 節）。
  relation: 將歷史事件神學化，作為新約信徒敬畏神的依據。
