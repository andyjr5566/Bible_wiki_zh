definition: 使徒行傳 2:1-4 記載五旬節聖靈降臨，門徒受靈說方言，預表民數記 11:25-26 耶和華將摩西身上的靈分賜七十長老，並臨到伊利達、米達，顯示聖靈不受人數與場所限制，預表新約聖靈澆灌。
