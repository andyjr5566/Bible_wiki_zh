name: 摩西的代禱與代求
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 摩西兩次代禱：一次為火燒營邊求神熄火（民11:2），一次為管理重任求神解救或賜死（民11:11-15）。神垂聽：火熄了（民11:2）、賜七十長老分擔（民11:16-17）、應許賜肉（民11:18-23）。摩西代禱體現中保職分，預表基督永遠活著替信徒祈求（來7:25）。
development: 代禱不改變神旨意，卻引出神恩典供應；摩西誠實傾訴軟弱，神以供應回應，顯示代禱蒙應允的關鍵在於神信實而非人功德。
accumulations:
- book: 民數記
  chapter: 11
  summary: 摩西為百姓與自身代禱，神回應熄火、賜長老、賜肉，展現中保功效。
  relation: 連結舊約中保職分與新約基督大祭司代求，為屬靈領袖代禱提供範本。
