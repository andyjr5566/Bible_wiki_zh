name: 潔淨軍兵與戰利品
type: 事件
secondary_types: []
aliases:
- 戰後潔淨
- 七日潔淨禮
status: formal
definition: 摩西吩咐殺了人、摸了被殺的、擄來的人口，要在營外駐紮七日，第三日、第七日潔淨自己（民31:19）。也要因衣服、皮物、山羊毛織物、木器潔淨自己（民31:20）。祭司以利亞撒向兵丁宣告耶和華吩咐摩西律法中的條例：金、銀、銅、鐵、錫、鉛等能見火的，要經火潔淨，仍要用除污穢的水潔淨；不能見火的，要過水（民31:21-23）。第七日洗衣服，就為潔淨，然後可以進營（民31:24）。
development: 建立戰後人員與物品潔淨的律法典範，區分耐火與非耐火物品處理方式，強調接觸屍體污穢需經儀式潔淨才能回到會眾中。
accumulations:
- book: 民數記
  chapter: 31
  summary: 記載戰後軍兵與戰利品的潔淨程序：七日駐紮、第三七日潔淨、耐火物經火與水、非耐火物過水、第七日洗衣進營。
  relation: 回應摩西責備後的具體執行細節，為戰利品分配前的必要準備。
