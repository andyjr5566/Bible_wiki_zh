name: 戰利品歸屬分配
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 民數記 31 章記載耶和華吩咐摩西、祭司以利亞撒與會眾族長計算擄來的人口與牲畜總數，將戰利品分作兩半：一半歸出征的精兵，一半歸全會眾；並從中按比例提取貢物歸耶和華（給祭司）與利未人（看守帳幕者），確立戰利品分配的律例。
