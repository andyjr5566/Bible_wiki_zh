name: 攻擊米甸報仇
type: 事件
secondary_types: []
aliases:
- 米甸報仇戰
- 民數記31章戰役
status: formal
definition: 耶和華吩咐摩西在米甸人身上為以色列人報仇（民31:1-2）。摩西遵命從各支派挑選一千人，共一萬二千人帶兵器出征，並派祭司以利亞撒的兒子非尼哈同去，手持聖所器皿和號筒（民31:3-6）。這是以色列進入迦南前最後一次主要軍事行動，屬於聖戰性質，為耶和華伸冤。
development: 此事件顯示神對誘導祂百姓犯罪之勢力的審判，也預表末世神對敵對勢力的最終審判。
accumulations:
- book: 民數記
  chapter: 31
  summary: 記載神命令摩西攻擊米甸報仇，摩西遣派一萬二千精兵由非尼哈帶領出征的過程。
  relation: 本章開端事件，奠定後續殺戮、擄掠、潔淨、分配等一系列處理的基礎。
