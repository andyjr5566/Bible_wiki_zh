name: 軍長獻金贖命
type: 事件
secondary_types: []
aliases:
- 軍長獻金
- 獻金贖命
status: formal
definition: 千夫長、百夫長向摩西報告兵丁總數並不短少一人（民31:48-49）。他們將各人所得的金器（腳鍊子、鐲子、打印的戒指、耳環、手釧）送來為耶和華的供物，好在耶和華面前為他們的生命贖罪（民31:50）。摩西和以利亞撒收了金子，共一萬六千七百五十舍客勒，帶進會幕，在耶和華面前作為以色列人的紀念（民31:51-54）。兵丁各自保留所奪的其餘財物（民31:53）。
development: 軍長自發獻上戰利品中的金飾為贖罪祭，見證神超自然保守（零傷亡），表達感恩與贖罪意識，金子歸入聖所作紀念。
accumulations:
- book: 民數記
  chapter: 31
  summary: 記載軍長報告零傷亡，並獻上金飾共16750舍客勒為贖罪祭，摩西以利亞撒收納置於會幕前作紀念。
  relation: 戰役完美收官的見證，呼應神保守，並以獻金封存戰役屬靈意義。
