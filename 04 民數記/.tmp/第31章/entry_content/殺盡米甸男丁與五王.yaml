name: 殺盡米甸男丁與五王
type: 事件
secondary_types: []
aliases:
- 米甸男丁被殺
- 米甸五王陣亡
status: formal
definition: 以色列人照耶和華吩咐摩西的，與米甸人打仗，殺了所有的男丁（民31:7）。在所殺的人中，殺了米甸的五王：以未、利金、蘇珥、戶珥、利巴（民31:8）。這五王是米甸的領袖，曾參與誘惑以色列人在毘珥拜巴力（參民25）。
development: 徹底消滅男丁與王室，象徵神對引誘百姓犯罪之權勢的完全審判，斷絕米甸復國可能。
accumulations:
- book: 民數記
  chapter: 31
  summary: 記載以色列軍殺盡米甸所有男丁及五王的戰果。
  relation: 戰役核心執行階段，直接回應「報仇」命令，並為後續處理婦女兒童鋪墊。
