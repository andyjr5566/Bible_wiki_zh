name: 經火潔淨（ʿābar bāʾēš）
type: 原文
secondary_types: []
aliases:
- 經火
- 火煉
status: formal
definition: 希伯來文「עבר באש」（ʿābar bāʾēš），字面意為「經過火」或「通過火」。出現於民數記31:23，祭司以利亞撒宣告律法條例：「凡能見火的，你們要叫他經火就為潔淨，然而還要用除污穢的水潔淨他」。指金、銀、銅、鐵、錫、鉛等耐火金屬戰利品，必須經過火燒煉以除去污穢（可能指接觸屍體或偶像污染），隨後仍需灑除污穢的水（紅母牛灰水）完成雙重潔淨程序。非耐火物品則只需過水。
development: 此條例建立物質潔淨的物理與儀式雙重標準，預表神的審判如火煉淨（瑪3:2-3，林前3:13-15），也象徵信徒經歷試煉與話語水洗雙重成聖。
accumulations:
- book: 民數記
  chapter: 31
  summary: 記載以利亞撒祭司關於戰利品潔淨的條例：耐火物須經火並用除污穢水，非耐火物過水。
  relation: 潔淨軍兵與戰利品事件中的核心技術性條文，規範聖戰物資進入聖潔社群的標準。
