name: 戰利品歸屬律例
type: 神學
secondary_types: []
aliases:
- 戰利品分配條例
- 戰利品分半律例
status: formal
definition: 依民數記 31:25-47，耶和華設立聖戰戰利品分配的永久律例：將擄獲（人口與牲畜）劃一分為二，一半歸出戰精兵，一半歸全會眾；再從精兵的那一半中每五百取一歸耶和華（交祭司以利亞撒作舉祭），從會眾的那一半中每五十取一歸利未人（看守帳幕者）。此條例彰顯神對勝利的主權、祭司利未階層的供給原則，以及聖戰屬神而非屬人的神學實質。
development: 經文先記錄神的指令（25-30 節），隨即詳細敘述摩西、以利亞撒與族長的完全遵行（31-47 節），並列出具體數目（羊、牛、驢、人），強調律例的精確執行。緊接著軍長們因零傷亡而自發獻金贖命（48-54
  節），進一步印證戰利品歸屬權在神，人僅是管家。
accumulations:
- book: 民數記
  chapter: 31
  summary: 耶和華吩咐摩西、以利亞撒與族長將擄獲分為兩半，歸戰兵與會眾，並從中提取貢物歸耶和華（祭司）與利未人，摩西完全遵行。
  relation: 本章核心神學條例，確立聖戰戰利品分配的神權原則與祭司利未供給制度。
