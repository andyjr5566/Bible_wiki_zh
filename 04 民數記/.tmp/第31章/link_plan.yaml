  evidence: 民31:25-47 耶和華吩咐摩西、以利亞撒、會眾首領點算戰利品，分為兩半：一半歸出征兵丁，一半歸會眾。從兵丁半分中抽五十分之一歸祭司以利亞撒作耶和華舉祭；從會眾半分中抽五十分之一歸利未人看守帳幕。丁良才：得勝分賜預表基督升天分賜恩賜（弗4:8）、十分之一預表獻上初熟果子（羅11:16）。
