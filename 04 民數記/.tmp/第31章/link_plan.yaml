- name: 軍長獻金贖命
  suggested_type: 事件
  evidence: 民31:48-54 千夫長、百夫長來見摩西說：僕人點算兵丁，一人未缺。我們將所得金器（臂釧、手鐲、戒指、耳環、項鍊）獻給耶和華，為我們贖命。摩西、以利亞撒收下，重一千六百七十五舍客勒，放在會幕前作紀念。丁良才：零傷亡見證神保守（詩91:7），獻金感恩預表信徒獻上贖罪感恩（羅12:1）。
