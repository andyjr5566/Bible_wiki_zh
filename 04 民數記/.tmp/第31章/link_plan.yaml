  evidence: 民31:7-8 以色列人照耶和華吩咐摩西的，攻擊米甸，殺盡一切男丁。米甸五王以未、利金、蘇珥、戶珥、利巴被殺；巴蘭比珥之子也被刀殺。丁良才：巴蘭雖曾蒙神說預言，終因貪圖不義工價陷害以色列，被殺預表假先知下場（彼後2:15-16、猶1:11）。
