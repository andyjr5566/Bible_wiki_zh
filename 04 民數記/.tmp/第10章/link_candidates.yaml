  - name: "約櫃在營中間還是前頭（民2:17 vs 10:33）"
    type: "解經爭議"
    evidence: "民2:17 安營時約櫃在營中間；民10:33 起行時約櫃在前頭行三天。丁良才：或有兩個約櫃（摩西造的在前、比撒列造的在中）；或平常在中間、起行時在前頭；或「在前頭」象徵領導地位而非物理位置。賈斯樂郝威《聖經難解經文詮釋手冊》收錄此爭議。"
    surfaces:
