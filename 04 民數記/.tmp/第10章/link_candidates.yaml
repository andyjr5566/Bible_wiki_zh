  # ========== 銀號段落 (v1-10) ==========
  # 事件類
  - name: "兩枝銀號條例"
    type: "事件"
    evidence: "民10:1-10 耶和華吩咐摩西用銀子錘出兩枝號，用以招聚會眾、叫眾營起行、戰時吹號、節期獻祭吹號。ccbiblestudy_CT、GT、KingComments 均詳述銀號的四大用途、材質象徵（銀表救贖）、祭司專司吹號（世世代代定例）。"
    surfaces:
      - "兩枝號"
      - "銀號"
      - "錘出來的"
      - "招聚會眾"
      - "叫眾營起行"

  - name: "銀號招聚會眾"
    type: "事件"
    evidence: "民10:3-4,7 兩枝齊吹→全會眾聚集會幕門口；單吹一枝→眾首領聚集；招聚時吹悠長聲、不吹大聲。丁良才、啟導本、串珠註釋均區分號聲種類與對象。"
    surfaces:
      - "吹這號"
      - "全會眾聚集"
      - "會幕門口"
      - "單吹一枝"
      - "眾首領"

  - name: "銀號指揮起行次序"
    type: "事件"
    evidence: "民10:5-6 吹大聲（急促響號）一次→東邊營（猶大營）起行；二次→南邊營（流便營）起行。丁良才、ccbiblestudy_CT、GT、KingComments 均確認起行次序與民2章安營次序一致。"
    surfaces:
      - "吹出大聲"
      - "東邊安的營"
      - "南邊安的營"
      - "二次吹出大聲"

  - name: "銀號戰時吹號求救"
    type: "事件"
    evidence: "民10:9 在迦南地與敵人打仗，吹大聲，在耶和華面前得蒙紀念、蒙拯救脫離仇敵。丁良才、聖經精讀本、KingComments 均強調：吹號不僅發號施令，更是向神呼求紀念與拯救。"
    surfaces:
      - "打仗"
      - "吹出大聲"
      - "得蒙紀念"
      - "蒙拯救脫離仇敵"

  - name: "銀號節期獻祭吹號"
    type: "事件"
    evidence: "民10:10 快樂日子、節期、月朔，獻燔祭平安祭時吹號，在神面前作紀念。丁良才列舉代下5:12、7:6、29:27、斯9:19、約10:22 等快樂日子例子；聖經精讀本：素祭與燔祭平安祭同獻。"
    surfaces:
