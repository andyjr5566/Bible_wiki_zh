name: 銀號製作工藝（錘出法）
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 民數記 10:2 規定「你要用銀子做兩枝號，都要錘出來的」。希伯來動詞 miqshah（מִקְשָׁה）意為「錘打、鍛造」，指將整塊銀錠以錘子敲打成型，而非鑄造或焊接拼湊。同詞用於燈台（出
  25:31）、基路伯（出 25:18），強調聖物製作的整體性與純度。古埃及圖繪（如圖特摩斯三世時期墓葬壁畫）顯示直筒喇叭為錘打金屬製品，印證當時工藝背景。
development: 拉比文獻《米德拉什·拉巴》民數記 15:15 指出銀號必須「從一塊銀子錘出」，象徵會眾合一；中世紀註解拉希、伊本·以斯拉均強調「非焊接」，以免聲音破碎，喻意屬靈合一不可破裂。
accumulations:
- book: 民數記
  chapter: 10
  summary: 吩咐用銀子錘出兩枝號（10:2）。
  relation: 確立銀號製作的材質與工藝標準。
- book: 出埃及記
  chapter: 25
  summary: 燈台、基路伯同用 miqshah 錘出法製作（25:18, 31）。
  relation: 顯示聖所器具共享「整體錘造」的神聖工藝規範。
