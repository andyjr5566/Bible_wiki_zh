- 民數記10:11起行
status: formal
definition: 第二年二月二十日，雲彩從法櫃的帳幕收上去，以色列人離開西乃曠野，按站往前行，雲彩停住在巴蘭曠野（民10:11-12）。這是以色列人出埃及後、在西乃山領受律法、建立會幕、完成人口普查與營隊編組後，首次按神命令起行邁向應許之地的關鍵時間點。
development: 經文以精確日期（第二年二月二十日）標記歷史轉折：從「領受律法/建立聖所」的靜態階段，進入「跟隨雲柱火柱行軍」的動態階段。
accumulations:
- book: 民數記
  chapter: 10
  summary: 記載第二年二月二十日雲彩收起、以色列人離開西乃山、雲彩停於巴蘭曠野，標記首次起行的時間地點。
  relation: 此為本章歷史敘事的起點，後續第13-28節詳細記載起行次序，第33-36節記載約櫃前行與摩西禱告。
