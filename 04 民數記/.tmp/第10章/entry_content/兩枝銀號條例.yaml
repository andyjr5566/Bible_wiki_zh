name: 兩枝銀號條例
type: 事件
secondary_types: []
aliases:
- 兩枝銀號
- 銀號條例
status: formal
definition: 耶和華吩咐摩西用銀子錘造兩枝號，用以招聚會眾並指揮眾營起行（民10:1-2）。這是以色列人在曠野行軍與敬拜中，神所設立的聲音信號制度，具有招聚、起行、爭戰、節期紀念等多重功能，並由亞倫子孫祭司世代吹奏（民10:8）。
development: 從製作材質（銀子）、工藝（錘出）、數量（兩枝）、用途（招聚、起行、爭戰、節期）、吹奏者（祭司）、永遠定例等層面，構成完整的銀號條例。
accumulations:
- book: 民數記
  chapter: 10
  summary: 記載耶和華吩咐摩西製作兩枝銀號的材質、工藝、用途與吹奏規定，確立為世世代代永遠的定例。
  relation: 本章是銀號條例的起源與核心法源，後續各條目皆由此展開。
