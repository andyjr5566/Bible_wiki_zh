name: 銀號指揮起行次序
type: 事件
secondary_types: []
aliases:
- 吹號起行
- 銀號指揮行軍
status: formal
definition: 吹出大聲（teruah）一次，東邊營起行；再吹大聲一次，南邊營起行；招聚會眾時吹號卻不吹大聲（民10:5-7）。這建立了以號聲區分「起行」與「招聚」，並按東、南、西、北四隊次序起行的行軍指揮系統。
development: 經文明確區分「大聲」（teruah，急促響號/起行信號）與一般吹號（招聚信號），並規定起行次序由東邊營開始，依序為南、西、北四隊。
accumulations:
- book: 民數記
  chapter: 10
  summary: 記載吹大聲一次東邊營起行，再吹大聲一次南邊營起行，招聚時不吹大聲，確立號聲區分與起行次序。
  relation: 此為銀號條例中行軍指揮的核心規定，與第14-28節實際起行次序互為對應。
