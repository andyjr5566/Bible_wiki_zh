name: 摩西請何巴作眼目是否缺乏信心
type: 解經爭議
secondary_types: []
aliases:
- 摩西邀何巴同行
- 摩西求何巴作向導
status: formal
definition: 記載於民數記 10:29-32，摩西邀請岳父（或內兄）何巴與以色列人同行，何巴拒絕後，摩西再三挽留說：「因為你知道我們要在曠野安營，你可以當作我們的眼目。」此舉引發解經爭議：摩西既有雲柱火柱、約櫃在前引導（10:33-34），為何仍需人帶路？是否顯示信心不足，或屬謙卑借用人智慧協助神帶領？
development: 早期猶太解經（如拉希）多肯定摩西謙遜借重人經驗；宗教改革時期加爾文視為「神使用次級工具」，非缺乏信心；現代學者分歧：有人指摩西軟弱（參士
  1:16 何巴後裔基尼人仍留曠野），有人強調「眼目」指熟悉地形水草地水源、氣候，屬實際需要，與神超自然引導並不衝突。
accumulations:
- book: 民數記
  chapter: 10
  summary: 摩西邀何巴同行，何巴拒絕，摩西以「作眼目」挽留，應許分享神的福分（10:29-32）。
  relation: 本章核心敘事，引發關於屬靈帶領與人智慧關係的神學討論。
