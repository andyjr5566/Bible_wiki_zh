name: 約櫃在營中間還是前頭（民2：17 vs 10：33）
type: 解經爭議
secondary_types: []
aliases:
- 約櫃位置爭議
- 民2:17與10:33
status: formal
definition: 民數記2:17規定約櫃（法櫃）在營隊中央，利未人抬著帳幕在各營中間行進；但民數記10:33記載「耶和華的約櫃在前頭行了三天的路程，為他們尋找安歇的地方」。此為經文表面張力：約櫃究竟在中央還是前頭？主要解釋包括：(1)
  不同階段：2章描述平常行軍秩序，10章描述初次起行的特殊情況；(2) 約櫃與雲柱配合：約櫃物理上在中央，但象徵神同在的雲柱在前引導；(3) 10:33「在前頭」指屬靈帶領而非物理位置；(4)
  文獻假說視為不同傳統編輯。本章經文顯示約櫃前行與摩西禱告（10:35-36）連結，強調神作前鋒爭戰、尋找安歇。
development: 此爭議涉及行軍秩序與神同在的象徵，後續約書亞記3章約櫃前行渡約旦河呼應此主題。
