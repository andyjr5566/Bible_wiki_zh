name: 銀號戰時吹號求救
type: 事件
secondary_types: []
aliases:
- 爭戰吹號
- 銀號求救
status: formal
definition: 以色列人在自己的地與敵人打仗時，要用銀號吹出大聲，便在耶和華面前得蒙紀念，蒙拯救脫離仇敵（民10:9）。這將銀號功能延伸至戰爭禱告/求救信號，強調神作為拯救主的回應。
development: 從曠野行軍指揮延伸至應許之地的戰爭情境，銀號成為呼求神介入的儀式性行動，預表屬靈爭戰中呼求主名得救。
accumulations:
- book: 民數記
  chapter: 10
  summary: 規定在應許之地打仗時吹大聲，求神紀念並拯救，確立銀號戰時求救功能。
  relation: 此為銀號條例在爭戰情境下的應用，與節期吹號同屬「在神面前作紀念」的雙重功能（參民10:10）。
