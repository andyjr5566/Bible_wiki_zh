name: 號聲區分與屬靈洞察力
type: 神學
secondary_types: []
aliases:
- 號聲分辨
- 屬靈聽覺
status: formal
definition: 經文嚴格區分「吹大聲」（teruah，急促響號，起行/爭戰信號）與「吹號不吹大聲」（taqa，悠長響號，招聚信號）（民10:5-7）。這要求神的子民具備屬靈洞察力，能分辨號聲性質並作相應回應：聚集、起行、爭戰、敬拜，預表屬靈爭戰中分辨聖靈聲音的重要性。
development: 從聲音學區分（teruah vs taqa）延伸至屬靈操練：神的百姓必須學會分辨不同「號聲」所代表的神旨意，不致混淆招聚與起行、平安與爭戰的信號。
accumulations:
- book: 民數記
  chapter: 10
  summary: 明確區分大聲（teruah）為起行/爭戰信號，一般吹號（taqa）為招聚信號，要求百姓分辨回應。
  relation: 此為銀號條例中最精細的操作規定，屬靈應用上對應保羅「號若發聲不清，誰能預備打仗」（林前14:8）的屬靈分辨原則。
related_entries:
