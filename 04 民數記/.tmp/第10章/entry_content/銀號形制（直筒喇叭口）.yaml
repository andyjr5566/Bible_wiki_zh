name: 銀號形制（直筒喇叭口）
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 民數記 10:2 的「號」（chatsotserah, חֲצֹצְרָה）在考古與圖像學上對應古近東直筒喇叭：管身細長、管徑均勻、末端微擴成喇叭口，無彎曲、無活塞。提圖斯凱旋門浮雕（羅馬
  81 年）描繪耶路撒冷聖殿被擄物品中，有兩枝直筒銀號，管身有飾帶、喇叭口微張，長約 1 公尺，符合猶太傳統《密西拿·基林》「長一肘」的記載。此形制區別於彎角羊角號，專供祭司吹奏，聲音尖銳穿透遠距。
development: 第二聖殿時期銀號為祭司專用，每日獻祭、安息日、節期皆吹；AD 70 聖殿毀後，銀號失傳，會堂改用羊角號，拉比規定「若無銀號，羊角號可代」，保留號聲功能而非形制。
accumulations:
- book: 民數記
  chapter: 10
  summary: 吩咐做兩枝銀號，祭司吹奏，作永遠定例（10:2, 8）。
  relation: 奠定銀號形制與使用者的律法基礎。
- book: 歷代志下
  chapter: 5
  summary: 聖殿落成時一百二十祭司吹號（5:12）。
  relation: 見證第二聖殿時期銀號數量與編制的擴展。
