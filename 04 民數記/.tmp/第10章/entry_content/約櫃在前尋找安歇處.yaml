name: 約櫃在前尋找安歇處
type: 事件
secondary_types: []
aliases:
- 約櫃前行
- 約櫃尋安歇
status: formal
definition: 民數記10:33-36記載以色列人離開耶和華的山，行三天路程，耶和華的約櫃在他們前面行三天路程，為他們尋找安歇之處。日間有耶和華的雲彩在他們以上。約櫃前行時摩西禱告：「耶和華啊，求你興起！願你的仇敵四散！」約櫃停住時禱告：「耶和華啊，求你回到以色列的千萬人中！」顯示神親自引導、保護並賜安息。
development: 此事件承接第11-12節雲彩收上、停住巴蘭曠野的敘事，強調約櫃作為神同在象徵的引導功能，並預表後來約書亞記3章約櫃渡約但河先行尋路。
accumulations:
- book: 民數記
  chapter: 10
  summary: 記載約櫃在前行三天尋找安歇處，摩西隨約櫃起行停住的兩段禱告。
  relation: 本章結尾的神學高潮，將行軍秩序轉向神同在的實際引導與保護。
