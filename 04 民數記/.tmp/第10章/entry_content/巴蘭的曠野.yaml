name: 巴蘭的曠野
type: 地點
secondary_types: []
aliases:
- 巴蘭曠野
- 巴蘭
status: formal
definition: 民數記10:12「雲彩停住在巴蘭的曠野」。位於西乃半島北部、迦南南境，是以色列人離開西乃山後第一個主要安營地（行三天路程）。此地後來成為探子出發點（民13:3）、基底斯巴尼亞所在區域，也是後來以色列因不信而漂流四十年的核心區域。
development: 本章標記從「耶和華的山」邁向應許之地的第一站，地理上連接西乃與迦南，神學上預表後來試驗與悖逆的舞台。
accumulations:
- book: 民數記
  chapter: 10
  summary: 雲彩從法櫃帳幕收上，以色列人按站起行，雲彩停住在巴蘭曠野。
  relation: 本章行軍的終點地標，連結前文起行次序與後文約櫃尋安歇。
