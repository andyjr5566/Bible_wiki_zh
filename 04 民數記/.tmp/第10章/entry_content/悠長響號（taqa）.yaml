name: 悠長響號（taqa）
type: 原文
secondary_types: []
aliases:
- 悠長響號
- 長聲
- taqa
- 吹長聲
status: formal
definition: 希伯來文 תָּקַע (taqa)，原意「吹、擊、刺」，引申為吹長聲、悠長連續的號聲。民數記10:3-4、7規定「吹號卻不要吹出大聲」（即吹長聲
  taqa）作為招聚全會眾或眾首領的信號。與 teruah（急促大聲）形成功能互補：taqa 為集合、靜默、敬拜；teruah 為分散、行動、爭戰。
development: 本章確立 taqa 作為「招聚」專用號聲，反映神呼召百姓就近親密的屬靈意義；後世聖殿敬拜（代下5:12-13）與末世聚集（太24:31）皆承接此號聲神學。
accumulations:
- book: 民數記
  chapter: 10
  summary: 規定吹長聲（taqa）招聚會眾到會幕門口，或招聚首領；招聚時不可吹大聲（teruah）。
  relation: 本章銀號條例中關於「招聚會眾」與「祭司職務」的核心信號術語。
