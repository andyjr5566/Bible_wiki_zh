name: 第二年二月二十日時間點
type: 歷史
secondary_types: []
aliases: []
status: formal
definition: 民數記 10:11 明確記載「第二年二月二十日，雲彩從法櫃的帳幕收上去」。這是出埃及後第二年（即出埃及記 40:17 立帳幕後約一個月），以色列人在西乃山領受律法、建造帳幕、數點軍隊、遵守第二次逾越節（補逾越節（9:1-14）後，正式啟程離開「耶和華的山」（10:33）前往巴蘭曠野。這日期標示曠野漂流「駐紮階段」結束、「行軍階段」開始的歷史分水嶺。
development: 猶太曆法將「二月」即「伊亞月」（Ziv），約當公曆 4-5 月；拉比《次經·犹滴記》1:1 亦以「二月二十日」作為歷史定錨；現代學者結合西乃山考古層位，估算約前
  1446/1250 年春季。
accumulations:
- book: 民數記
  chapter: 10
  summary: 雲彩收上去，以色列人按站起行，離開西乃曠野（10:11-13）。
