    type: "事件"
    evidence: "民20:9-11 摩西從耶和華面前取了杖去。摩西、亞倫就招聚會眾到磐石前。摩西說：你們這些背叛的人聽我說：我為你們使水從這磐石中流出來嗎？摩西舉手，用杖擊打磐石兩下，就有許多水流出來。丁良才：摩西錯謬有五：違逆主命、自大過分、不信神、不尊主為聖、擅自發怒。"
