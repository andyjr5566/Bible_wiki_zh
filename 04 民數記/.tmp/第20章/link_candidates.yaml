  - name: "亞倫死在何珥山"
    type: "事件"
    evidence: "民20:22-29 以色列全會眾從加低斯起行，到了何珥山。耶和華曉諭摩西、亞倫說：亞倫要歸到他列祖那裡。他必不得入我所賜給以色列人的地；因為在米利巴水，你們違背了我的命。你帶亞倫和他的兒子以利亞撒上何珥山，把亞倫的聖衣脫下來，給他的兒子以利亞撒穿上；亞倫必死在那裡。摩西就照耶和華所吩咐的行。三人當著會眾的眼前上了何珥山。摩西把亞倫的聖衣脫下來，給他的兒子以利亞撒穿上，亞倫就死在山頂那裡。於是摩西和以利亞撒下了山。全會眾，就是以色列全家，見亞倫已經死了，便都為亞倫哀哭了三十天。丁良才：亞倫因米利巴水之罪不得進迦南，大祭司職分傳給以利亞撒。"
    surfaces:
      - "何珥山"
      - "歸到列祖那裡"
      - "不得入迦南地"
      - "米利巴水違背命令"
      - "聖衣脫下給以利亞撒"
      - "大祭司職分傳承"
      - "哀哭三十天"
