  - name: "米利暗死在加低斯"
    type: "事件"
    evidence: "民20:1 正月間，以色列全會眾到了尋的曠野，就住在加低斯。米利暗死在那裡，就葬在那裡。丁良才：表徵屬靈領袖因肉體軟弱背叛神託付，終至死亡。啟導本：曠野四十年生活面臨結束，領袖交接開始。"
    surfaces:
      - "米利暗死"
      - "葬在加低斯"
      - "正月間"
  - name: "會眾無水攻擊摩西亞倫"
    type: "事件"
    evidence: "民20:2-5 會眾沒有水喝，就聚集攻擊摩西、亞倫。百姓向摩西爭鬧說：我們的弟兄曾死在耶和華面前，我們恨不得與他們同死。你們為何把耶和華的會眾領到這曠野、使我們和牲畜都死在這裡呢？這地方不好撒種，也沒有無花果樹、葡萄樹、石榴樹，又沒有水喝。丁良才：新一代品行與父輩相似，忘記神恩典。"
    surfaces:
      - "沒有水喝"
      - "攻擊摩西亞倫"
      - "向摩西爭鬧"
      - "恨不得同死"
      - "壞地方"
