name: 摩西擊打磐石是否故意違命
type: 解經爭議
secondary_types: []
aliases:
- 摩西擊打磐石是否故意違命
status: formal
definition: 關於民數記 20 章 8-11 節摩西「擊打磐石兩下」而非「吩咐磐石」是否屬故意違背神命令，歷代解經家有異說：(1) 故意違命說：摩西憤怒失控（第
  10 節「你們這些背叛的人」），以杖擊打取代吩咐，屬故意悖逆；(2) 習慣/誤解說：摩西沿用出埃及記 17 章 6 節「擊打磐石」的先例，未察覺神此次命令改為「吩咐」；(3)
  象徵/預表說：擊打兩下破壞「磐石預表基督一次被擊打（來 9：26-28；10：10）」的神學預表，屬屬靈層面的違命。經文第 12 節神定罪依據為「不信我、不在以色列人眼前尊我為聖」，未明說「故意」，故爭議在於動機判斷而非行為本身。
development: 此爭議貫穿猶太拉比文獻（如 Rashi、Ramban）、宗教改革時期（加爾文《民數記註釋》）、現代註釋（Wenham, Milgrom,
  Ashley）與華語研經資料（基督教聖經資源網註解、拾穗）。核心張力在於：神的命令改變（吩咐 vs 擊打）、摩西的情緒狀態（第 10 節）、以及預表論的神學權重。
accumulations:
- book: 民數記
  chapter: 20
  summary: 神吩咐摩西吩咐磐石出水，摩西卻擊打磐石兩下，神因不信不尊主為聖判摩西亞倫不得入迦南。
  relation: 本章 8-12 節為爭議核心經文，第 12 節定罪依據與第 10-11 節行為細節構成解經張力。
