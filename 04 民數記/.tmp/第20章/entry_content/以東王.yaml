name: 以東王
type: 人物
secondary_types: []
aliases:
- 以東國王
status: formal
definition: 民數記 20 章 14, 18, 20-21 節出現的以東統治者。摩西差遣使者請求經過其地，自稱「你的弟兄以色列」，以東王兩次拒絕（v.18,
  20），並率領許多人帶刀出來攻擊以色列人，迫使以色列轉離。顯示以東王雖知雙方弟兄關係，仍選擇敵對。
development: 本章未記載其名字，僅記其拒絕以色列經過的行動，成為以色列繞行以東地的原因。
accumulations:
- book: 民數記
  chapter: 20
  summary: 以東王拒絕摩西請求，率軍阻擋以色列人經過其境界。
  relation: 作為以色列與以東弟兄關係破裂的關鍵人物，其強硬態度導致以色列須繞道而行。
