name: 會眾無水攻擊摩西亞倫
type: 事件
secondary_types: []
aliases:
- 會眾因無水聚集攻擊
status: formal
definition: 以色列會眾在加低斯因缺水而聚集，向摩西和亞倫發怨言、爭鬧，指責他們將會眾領到曠野致死，並懷念埃及的糧食水源。
development: 這是以色列人在曠野漂流末期再次因缺水向神與領袖發怨言的事件（參出17:1-7）。民數記20:2-5記載百姓聚集攻擊摩西亞倫，言辭激烈，甚至寧願早死在耶和華面前，顯示百姓信心軟弱、不滿神的帶領。
accumulations:
- book: 民數記
  chapter: 20
  summary: 會眾沒有水喝，聚集攻擊摩西、亞倫；百姓爭鬧說寧願死在耶和華面前，指責摩西亞倫領他們到這壞地方（民20:2-5）。
  relation: 此事件直接引發摩西亞倫俯伏會幕門口尋求神，以及神吩咐摩西吩咐磐石出水的指示。
