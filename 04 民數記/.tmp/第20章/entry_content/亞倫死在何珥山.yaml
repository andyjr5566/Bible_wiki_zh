name: 亞倫死在何珥山
type: 事件
secondary_types: []
aliases:
- 亞倫在何珥山去世
status: formal
definition: 耶和華吩咐摩西帶亞倫和兒子以利亞撒上何珥山，將亞倫的聖衣脫下給以利亞撒穿上，亞倫死在山頂，摩西和以利亞撒下山。全會眾為亞倫哀哭三十天。
development: 亞倫因在米利巴水違背神命（民20:24），不得進迦南地。神安排大祭司職分傳承給以利亞撒，體現祭司職分的延續性。亞倫死於曠野漂流第40年第5月一日（民33:38），標誌出埃及一代祭司長的離世。
accumulations:
- book: 民數記
  chapter: 20
  summary: 耶和華在何珥山吩咐摩西帶亞倫和以利亞撒上山，將聖衣傳給以利亞撒，亞倫死在山頂，全會眾哀哭三十天（民20:22-29）。
  relation: 此事件承接米利巴水之罪（民20:24），並完成大祭司職分傳承（民20:25-28），為以色列進入迦南前的領袖更迭畫上句點。
