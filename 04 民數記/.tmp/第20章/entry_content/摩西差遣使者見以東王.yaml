name: 摩西差遣使者見以東王
type: 事件
secondary_types: []
aliases:
- 摩西從加低斯差遣使者往以東
status: formal
definition: 摩西從加低斯差遣使者去見以東王，自稱「你的弟兄以色列」，請求容許以色列人經過以東地，承諾不走田間葡萄園、不喝井水、只走大道，直到過境。
development: 以色列與以東本為弟兄民族（雅各與以掃後裔）。摩西禮貌請求經過，強調歷史淵源與不佔便宜，顯示以色列寬容和平的態度。這也是以色列進入迦南前繞行以東的開端。
accumulations:
- book: 民數記
  chapter: 20
  summary: 摩西從加低斯差遣使者見以東王，自稱弟兄以色列，請求經過以東地，承諾只走大道不偏左右（民20:14-17）。
  relation: 此事件引出以東王拒絕，導致以色列轉離以東，改往別處行（民20:18-21）。
