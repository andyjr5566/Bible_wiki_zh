name: 米利暗死在加低斯
type: 事件
secondary_types: []
aliases:
- 米利暗之死
status: formal
definition: 記載米利暗在以色列人到達尋的曠野加低斯時去世，並葬於該地。這標誌著出埃及一代領袖的相繼離世，也預示著以色列人即將進入應許之地的新階段。
development: 米利暗作為摩西、亞倫的姐姐，曾在出埃及初期帶領婦女唱詩讚美（出15:20-21），後因毀謗摩西而患痲瘋（民12）。她在加低斯的死，發生在民數記第20章開頭，緊接著會眾因無水向摩西亞倫發怨言，顯示領袖更迭的緊迫性。
accumulations:
- book: 民數記
  chapter: 20
  summary: 正月，以色列全會眾到達尋的曠野加低斯，米利暗死在那裡，葬在那裡（民20:1）。
  relation: 本章首節記錄米利暗之死，作為後續缺水爭鬧、摩西擊打磐石、亞倫在何珥山去世等事件的背景。
