name: 摩西亞倫俯伏會幕門口
type: 事件
secondary_types: []
aliases:
- 摩西亞倫俯伏在會幕門口
status: formal
definition: 面對會眾的攻擊，摩西和亞倫離開會眾，來到會幕門口，俯伏在地；耶和華的榮光向他們顯現。
development: 這是摩西亞倫面對百姓叛逆時，尋求神指引的典型回應（參民14:5, 16:4, 16:22, 20:6）。俯伏表達謙卑、代禱與等候神的指示。神的榮光顯現，證實神與他們同在，並即將賜下解決之道。
accumulations:
- book: 民數記
  chapter: 20
  summary: 摩西、亞倫離開會眾到會幕門口，俯伏在地；耶和華的榮光向他們顯現（民20:6）。
  relation: 此事件承接會眾攻擊，引出神吩咐摩西吩咐磐石出水的指示（民20:7-8）。
