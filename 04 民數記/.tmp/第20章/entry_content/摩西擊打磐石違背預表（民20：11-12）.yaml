name: 摩西擊打磐石違背預表（民20：11-12）
type: 互文
secondary_types: []
aliases:
- 摩西擊打磐石違命
- 磐石被擊打兩下
status: formal
definition: 民數記 20 章 8 節神吩咐摩西「吩咐磐石發出水來」，第 11 節摩西卻「舉手，用杖擊打磐石兩下」。第 12 節神責備：「因為你們不信我，不在以色列人眼前尊我為聖」。這違背了出埃及記
  17 章磐石被擊打一次（預表基督一次被擊打/受死）的預表模式，破壞了「基督一次獻祭永遠有效」（來 7:27, 9:28, 10:10）的神學圖景，故神嚴厲審判摩西、亞倫不得進迦南。
development: 此事件成為聖經神學中「預表不可隨意更改」的經典反面教材，並引出摩西、亞倫領袖世代結束的轉折。
accumulations:
- book: 民數記
  chapter: 20
  summary: 摩西違背神命擊打磐石兩下，神因不信、不尊主為聖，判摩西亞倫不得進迦南。
  relation: 直接關聯出 17 章擊打磐石與來 7-10 章基督一次獻祭，摩西違命擊打破壞預表完整性。
