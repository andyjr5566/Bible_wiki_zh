name: 何珥山（Hor haHar）
type: 原文
secondary_types: []
aliases:
- Hor haHar
- הֹר הָהָר
status: formal
definition: 希伯來文 **הֹר הָהָר (Hor haHar)**，字面意為「山的山」或「山峰之山」，Hor 為山、haHar 為「那山」，合稱「何珥山」。本章
  v.22, 23, 25, 27, 28 反覆出現，強調其為「在附近以東邊界的何珥山」（v.23），是亞倫歸到列祖、大祭司聖衣傳承的特定地點。
development: 原文雙重「山」字結構凸顯其地理顯著性，並作為亞倫生平終點與祭司職分交接的神聖地標。
accumulations:
- book: 民數記
  chapter: 20
  summary: 耶和華在以東邊界的 Hor haHar 吩咐摩西帶亞倫、以利亞撒上山進行職分傳承。
  relation: 原文 Hor haHar 標記神指定的大祭司交接地點，與民數記 33:37-38 行程記載一致。
