name: 摩西擊打磐石兩下出水
type: 事件
secondary_types: []
aliases:
- 摩西用杖擊打磐石兩下
status: formal
definition: 摩西違背神吩咐「吩咐磐石」，反而向會眾責備說「你們這些背叛的人」，然後舉手用杖擊打磐石兩下，水就湧出，會眾和牲畜都喝了。
development: 摩西的行動包含三個錯誤：1. 擅自擊打磐石而非吩咐；2. 向百姓發怒責備「背叛的人」，將榮耀歸自己（「我為你們使水流出來嗎？」）；3. 連擊兩下顯示不耐煩與不信。這導致神判決摩西亞倫不得進迦南地（民20:12）。
accumulations:
- book: 民數記
  chapter: 20
  summary: 摩西招聚會眾到磐石前，責備百姓為背叛的人，舉手用杖擊打磐石兩下，水湧出給會眾和牲畜喝（民20:9-11）。
  relation: 此事件直接違背神吩咐「吩咐磐石」，導致神宣判摩西亞倫不得進應許之地（民20:12），並使該水名為「米利巴水」（民20:13）。
