name: 以東拒絕以色列經過
type: 事件
secondary_types: []
aliases:
- 以東王拒絕以色列經過境
status: formal
definition: 以東王拒絕以色列經過其境，並率領許多人帶刀出來攻擊以色列人。以色列再次請求只走大道並願付水錢，仍被拒絕。以色列於是轉去，離開以東。
development: 以東的拒絕顯示其敵視弟兄民族，也應驗神預言「年長的要服事年幼的」（創25:23）的反面。以色列選擇忍讓繞行，不與以東爭戰，遵循神吩咐「不可惹他們」（申2:4-5）。
accumulations:
- book: 民數記
  chapter: 20
  summary: 以東王拒絕以色列經過，率眾帶刀出來攻擊；以色列再求只走大道並付水錢，仍被拒，於是轉去離開以東（民20:18-21）。
  relation: 此事件導致以色列繞行以東，改往何珥山方向，並為後來亞倫在何珥山去世鋪路（民20:22-29）。
