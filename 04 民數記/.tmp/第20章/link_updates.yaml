"book": "民數記"
"chapter": !!int "20"
"updates":
- "title": "磐石預表基督"
  "path": "link_folder/神學/磐石預表基督.md"
  "summary": "民20:8,11 神吩咐摩西吩咐磐石出水，摩西卻擊打磐石兩下。林前10:4 那磐石就是基督。丁良才：磐石預表基督，被擊打一次（出17）出水，第二次只需吩咐（民20），摩西擊打兩下破壞預表。"
  "relation": "民20章磐石出水事件是磐石預表基督的關鍵驗證點：基督一次被擊打（十字架）賜活水永流不息，不可再擊打。摩西違命擊打兩下，破壞「一次成就、永遠有效」的救贖預表。"
- "title": "米利暗"
  "path": "link_folder/人物/米利暗.md"
  "summary": "民20:1 正月，以色列全會眾來到尋的曠野，就住在加低斯。米利暗死在那裡，葬在那裡。四份註解均記載米利暗為摩西亞倫姊姊、女先知，曾領唱詩歌（出15:20-21），因嫉妒受罰（民12），此處結束四十年曠野生涯。"
  "relation": "米利暗之死標誌老一代領袖相繼離世（緊接亞倫死、摩西被判不得進地），為新一代進迦南鋪路。其死葬加低斯與三十八年前探子惡報（民13:26）同地，形成悲涼對照。"
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民20:6-12 摩西、亞倫退到會幕門口俯伏，耶和華榮光顯現。神吩咐摩西拿杖吩咐磐石出水，摩西卻對會眾說「你們這些背叛的人聽我說：我為你們使水從這磐石中流出來嗎？」隨即舉杖擊打磐石兩下。水雖湧出，神宣判：「因為你們不信我，不在以色列人眼前尊我為聖，所以你們必不得領這會眾進我所賜給他們的地去」。四份註解均記載摩西作中保領袖，此處因血氣犯罪失去進地資格。"
  "relation": "摩西在民20章面臨領導生涯最大危機：面對新一代同樣的試探，他未將榮耀歸神、未尊神為聖，違背磐石預表基督「一次被擊打」的神學核心。此事與出17章擊打磐石形成對照，標誌摩西領導權終結。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民20:12,24-28 耶和華對摩西、亞倫說：因為你們不信我，不在以色列人眼前尊我為聖……亞倫必歸到他列祖那裡。他必不得入我所賜給以色列人的地。你帶亞倫和他的兒子以利亞撒上何珥山，把亞倫的聖衣脫下來，給他的兒子以利亞撒穿上。亞倫就死在山頂那裡。四份註解均記載亞倫作大祭司，因米利巴之罪不得進地。"
  "relation": "亞倫作為大祭司與摩西同負米利巴之責，大祭司職分由以利亞撒繼承（聖衣傳遞象徵職分傳承）。此為民數記中大祭司更替的關鍵節點，預表基督大祭司職分永不更替（來7:24）。"
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "民20:25-28 你帶亞倫和他的兒子以利亞撒上何珥山，把亞倫的聖衣脫下來，給他的兒子以利亞撒穿上。亞倫就死在山頂那裡。丁良才：亞倫兒子、未來大祭司繼承人（民20:25-28），接任大祭司預表基督。"
  "relation": "以利亞撒在何珥山接受聖衣傳遞，正式接任大祭司，完成祭司職分傳承。與民19章主持紅母牛條例、民16章收取審判香爐形成連貫軌跡，預表基督大祭司永遠存留（來7:24）。"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "民20:1,14 以色列全會眾到了尋的曠野，就住在加低斯。摩西從加低斯差遣使者去見以東王。丁良才：加低斯是以色列人三十八年前失敗的地方（民13:26），表徵始於失敗，終於死亡。"
  "relation": "加低斯作為民20章事件發生地，連結三十八年前探子惡報（民13-14）與今次新危機：米利暗死、會眾無水攻擊摩西、摩西擊打磐石、求經過以東被拒。地理位置處應許地南界（民34:3-4），是進迦南前最後驛站。"
- "title": "米利巴（ strife ）"
  "path": "link_folder/原文/米利巴（ strife ）.md"
  "summary": "民20:13 這水名叫米利巴水（米利巴就是爭鬧的意思），是因以色列人向耶和華爭鬧，耶和華就在他們面前顯為聖。希伯來文 מְרִיבָה (Meribah) 意為爭鬧、爭辯。出17:7 也稱利非訂為米利巴。"
  "relation": "米利巴一名見證神在審判中仍施恩（水仍湧出），卻也標誌摩西亞倫領導權終結。與出17章利非訂米利巴呼應，兩次試驗神供應形成對照：第一次擊打一次、第二次本當吩咐、摩西擊打兩下。"
