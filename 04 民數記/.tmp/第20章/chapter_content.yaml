organization: "### 米利暗之死與加低斯新危機（v1-5）\n正月，以色列全會眾來到 [[尋的曠野|尋的曠野]] 的 [[加低斯|加低斯]]。[[米利暗|米利暗]]\
  \ 死在那裡，葬在那裡——這位曾在紅海邊領唱詩歌的女先知，結束了四十年曠野生涯。緊接著，會眾因無水喝再次聚集攻擊 [[摩西|摩西]]、[[亞倫|亞倫]]，控訴他們將耶和華的會眾領到這「壞地方」死在曠野，甚至恨不得早死在耶和華面前（v3-5）。這場危機與出埃及記17章利非訢試探神的事件形成鏡像，卻更顯悲涼：老一代幾乎盡亡，新一代仍重蹈覆轍。\n\
  \n### 米利巴水：擊打磐石與領袖的失敗（v6-13）\n摩西、亞倫退到會幕門口俯伏，耶和華的榮光顯現。神吩咐摩西「拿著杖去……在他們眼前吩咐磐石發出水來」（v8）。然而摩西卻對會眾說：「你們這些背叛的人聽我說：我為你們使水從這磐石中流出來嗎？」隨即舉杖擊打磐石兩下（v10-11）。水雖湧出，神卻宣判：「因為你們不信我，不在以色列人眼前尊我為聖，所以你們必不得領這會眾進我所賜給他們的地去」（v12）。這處\
  \ [[米利巴水|米利巴水]]（意即「爭鬧」）見證神在審判中仍施恩，卻也標誌著摩西、亞倫領導權的終結。\n\n> [!important] 關鍵神學張力\n>\
  \ - **預表破裂**：保羅在林前10:4指磐石預表基督——基督一次被擊打（十字架）便賜活水永流不息。摩西再次擊打，破壞了「一次成就、永遠有效」的救贖預表（[[磐石出水預表基督活水|磐石出水預表基督活水]]）。\n\
  > - **「不信」與「不尊為聖」**：摩西的罪不僅是違命，更是將榮耀歸自己（「我為你們使水流出來嗎？」），未將聖潔彰顯於百姓眼前（[[摩西不信不尊主為聖|摩西不信不尊主為聖]]）。\n\
  \n```mermaid\ntimeline\n  title 民數記20章關鍵事件線\n  section 加低斯\n    v1   : 米利暗死、葬於加低斯\n\
  \    v2-5 : 會眾因無水攻擊摩西亞倫\n    v6-9 : 摩西亞倫俯伏會幕，神吩咐吩咐磐石\n    v10-11: 摩西擊打磐石兩下出水\n \
  \   v12-13: 神審判摩西亞倫不得進迦南，名水為米利巴\n  section 以東邊境\n    v14-17: 摩西差遣使者求經過以東\n    v18-21:\
  \ 以東王拒絕並出兵威脅，以色列轉離\n  section 何珥山\n    v22-23: 全會眾到何珥山\n    v24-26: 神宣告亞倫將死，囑咐聖衣傳給以利亞撒\n\
  \    v27-29: 亞倫死於山頂，以色列哀哭三十天\n```\n\n### 以東拒絕：弟兄國的關門（v14-21）\n摩西從加低斯差遣使者見 [[以東王|以東王]]，以「弟兄」身分（雅各/以色列與以掃/以東）請求走「王道」經過，承諾不飲井水、不踐田園、付費飲水（v14-19）。以東王卻以刀劍相向拒絕，甚至率軍出來攻擊（v20-21）。這段\
  \ [[以色列與以東弟兄關係|以色列與以東弟兄關係]] 的破裂，預示後來以東在巴比倫入侵時落井下石（俄巴底亞書），也迫使以色列繞道而行，延長曠野旅程。\n\n\
  ### 亞倫之死與大祭司職分傳承（v22-29）\n會眾來到 [[何珥山|何珥山]]（即 [[何珥山（Hor haHar）|Hor haHar]]）。神宣告亞倫因在米利巴水違命，必死於此，不得進迦南（v24）。摩西遵命帶亞倫和兒子\
  \ [[以利亞撒|以利亞撒]] 上山，當眾將亞倫的聖衣脫下給以利亞撒穿上；亞倫死於山頂，全會眾為他哀哭三十天（v27-29）。這場 [[大祭司職分傳承|大祭司職分傳承]]\
  \ 以可見儀式確立：舊秩序在曠野結束，新大祭司在應許之地前接棒。\n\n> [!note] 亞倫死因的釋經討論\n> 經文明說「因為在米利巴水，你們違背了我的命」（v24），但亞倫在擊打磐石事件中似屬被動配合。學者討論\
  \ [[亞倫死因是否僅因米利巴之罪|亞倫死因是否僅因米利巴之罪]]，或包含金牛犢事件（出32）的積累責任。希伯來書7:23-24以此對比：利未祭司因死而阻隔，惟基督永遠活著，擁有「不更改的祭司職分」（[[亞倫死預表大祭司更換（來7：23-24）|亞倫死預表大祭司更換]]）。\n\
  \n### 跨章脈絡：從米利巴到約旦河東——審判與恩典的雙重奏\n本章集中呈現「曠野世代」的終結：米利暗死、摩西亞倫被判不得入地、亞倫死於何珥山。然而 [[磐石出水預表基督活水|磐石出水]]\
  \ 仍賜下生命水，[[以利亞撒|以利亞撒]] 接任大祭司延續中保職分，神的應許未因人失敗而落空。這張力貫穿民數記後段（銅蛇、巴蘭、第二次人口普查），直指約書亞記渡過約旦河的新開始。\n\
  \n> [!question] 留待後章追蹤\n> - 摩西在申命記如何回顧此事（申1:37, 3:26, 32:51）？\n> - 以利亞撒在分地（書14:1）、約書亞受任（民27:18-23）中扮演何種角色？\n\
  > - 以東拒絕經過對後來以色列繞道摩押、亞摩利地有何戰略影響？"
