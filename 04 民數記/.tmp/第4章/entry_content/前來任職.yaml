status: formal
definition: 民數記第4章中利未人服事的資格條件之一，指年滿三十歲、未滿五十歲、有能力「前來任職、在會幕裡辦事」者。此詞強調主動響應、具備體力與屬靈準備進入聖所服事的狀態。
development: 本詞在本章重複出現（v.3,23,30,35,39,43,47），界定服事人員的合格門檻，區別於單純人口普查。
accumulations:
- book: 民數記
  chapter: 4
  summary: 三族利未人數點標準皆為「從三十歲直到五十歲，凡前來任職、在會幕裡辦事的」，作為服事資格的核心定義。
  relation: 本詞將利未人服事從身分繼承轉為年齡與能力雙重認證的制度化規範。
