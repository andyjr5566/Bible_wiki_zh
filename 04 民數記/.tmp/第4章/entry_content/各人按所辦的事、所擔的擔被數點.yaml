name: 各人按所辦的事、所擔的擔被數點
type: 神學
secondary_types: []
aliases:
- 按職任分派被數
status: formal
definition: 民數記 4:49 總結性神學陳述：利未人被數點不是單純計數，乃是依據各人具體的服事職任（所辦的事）與搬運負擔（所擔的擔）而被點算，彰顯「按恩賜分工、按呼召計數」的原則。
development: 本節將全章職任分派（哥轄抬聖物、革順抬幔帳、米拉利抬板柱）與人口統計（30-50 歲任職男丁）神學化整合，呼應新約「各按所得的恩賜彼此服事」（彼前
  4:10）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 摩西按他們所辦的事、所抬的物，憑耶和華的吩咐數點他們（v.49）。
  relation: 利未人普查的神學總結：身分、職任、順服三位一體。
