status: formal
definition: 希伯來文 nerot（燈盞/燈）、melqachayim（剪刀/剪燈剪）、mahtehot（油壺/盛油器）。民數記4:9記載燈臺及其器具：用藍色毯子遮蓋燈臺與燈盞、剪子、蠟花盤（油壺），並一切盛油的器皿。此三器為金燈臺日常服事必備工具。
development: 本章第9-10節描述燈臺起營遮蓋：先用藍色毯子遮蓋燈臺及所有器具（燈盞、剪刀、油壺等），再包海狗皮放抬架上。器具隨燈臺由哥轄子孫抬運，屬至聖物範疇。
