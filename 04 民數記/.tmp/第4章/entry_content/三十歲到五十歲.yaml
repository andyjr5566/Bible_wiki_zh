name: 三十歲到五十歲
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記第4章反覆出現的利未人服事年齡資格（第3, 23, 30, 35, 39, 43, 47節）。規定利未人（哥轄、革順、米拉利三族）從三十歲到五十歲、凡前來任職在會幕裡辦事者，才可被數點編入服事名冊。三十歲為服事起始年齡，五十歲為退休界線，體現體力與成熟度的平衡。
development: 本章七次重複此年齡條款（分別針對三族數點與總結），強調年齡資格為服事編制的硬性門檻，與「前來任職」「在會幕裡辦事」構成雙重條件。
accumulations:
- book: 民數記
  chapter: 4
  summary: 全章七處引用此年齡範圍作為利未人服事編制的統一標準。
  relation: 利未人服事法典的核心參數，貫穿三族數點與總結，確保服事隊伍的體能與經驗結構。
