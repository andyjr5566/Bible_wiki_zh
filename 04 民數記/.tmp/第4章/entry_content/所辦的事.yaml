name: 所辦的事
type: 主題
secondary_types: []
aliases:
- 職任內容
- 服事項目
status: formal
definition: 民數記第4章中各利未族具體執行的工作內容。哥轄族「所辦的事」為搬運至聖物並遮蓋包裹（v.4）；革順族「所辦的事」為抬幔帳、門簾、繩索等（v.24,28）；米拉利族「所辦的事」為抬板、閂、柱、座、橛、繩等（v.31,33）。皆在祭司監督下按名分派。
development: 本詞將抽象服事具體化為可執行、可監督、可傳承的職務清單，體現祭司律法典的秩序觀。
accumulations:
- book: 民數記
  chapter: 4
  summary: 三族各有專段記載「所辦的事」：哥轄（v.4,15）、革順（v.24,28）、米拉利（v.31,33），總結於v.49「摩西按他們所辦的事、所抬的物...數點他們」。
  relation: 本章以「所辦的事」為分類依據，建立利未人服事的標準作業程序。
