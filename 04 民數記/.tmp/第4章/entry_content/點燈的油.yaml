status: formal
definition: 指民數記第4章16節記載，由以利亞撒掌管的「點燈的油」，即出埃及記27:20、利未記24:2規定的「搗碎的純橄欖油」，用於金燈臺常點的燈。此油象徵聖靈膏抹、神的同在與光照，為聖所每日不滅之火的燃料，屬於祭司核心掌管物資之一。
development: 本章第16節將點燈的油列為以利亞撒掌管的四大類物資之首（油、香、素祭、膏油），顯示其優先地位。燈臺在聖所南邊，晝夜常點（出27:21），油的供應不可斷絕。以利亞撒作為大祭司繼承人，親自負責此項核心供應，確保聖所光照不斷，預表基督作世界的光（約8:12）與聖靈澆灌（徒2:1-4）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載點燈的油為以利亞撒掌管的首要物資，屬聖所核心供應品。
  relation: 本章祭司掌管職任的關鍵物資，連結燈臺常點燈的律法與聖靈神學。
