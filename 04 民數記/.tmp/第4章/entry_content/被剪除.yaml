name: 被剪除
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指神命令不可將哥轄人的支派從利未人中剪除（民4:18）。此處「剪除」意指被移除、滅絕或失去服事資格與群體身分。神透過規定祭司派定各人所辦的事、所抬的，使他們活著不致死亡（4:19），以防止被剪除。
development: 經文將「被剪除」與「死亡」平行（4:18-20），顯示違反聖物規條會導致生命與群體雙重喪失。祭司的派定職任是保護機制，確保哥轄族在聖潔秩序中存活。
accumulations:
- book: 民數記
  chapter: 4
  summary: 禁止將哥轄支派從利未人中剪除，並設立祭司派定職任的保護措施。
  relation: 體現神對利未人宗族的保守旨意，與聖潔律法中「從民中剪除」的刑罰形成對比，此處為預防性保護而非懲罰性宣告。
