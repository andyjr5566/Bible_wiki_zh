name: 米拉利子孫的宗族、家室
type: 主題
secondary_types: []
aliases:
- 米拉利族宗族家室
status: formal
definition: 見民數記 4:29, 33, 42, 45，指米拉利族作為普查與服事分工的基本單位。神命摩西「照著家室、宗族」數點（4:29），執行時摩西、亞倫與首領亦同（4:42），結果記載「米拉利子孫中各族被數的，照著家室、宗族」（4:42）。
development: 此組織單位貫穿米拉利族普查命令、執行、統計、總結四個階段，顯示服事編制嚴謹對應宗族結構。
accumulations:
- book: 民數記
  chapter: 4
  summary: 米拉利子孫按宗族、家室被數點，歸在祭司亞倫兒子以他瑪手下服事。
  relation: 本章米拉利族普查與服事編組的組織基礎。
