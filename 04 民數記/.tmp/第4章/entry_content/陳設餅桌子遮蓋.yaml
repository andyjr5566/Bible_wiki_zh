name: 陳設餅桌子遮蓋
type: 神學
secondary_types: []
aliases:
- 餅桌遮蓋
- 陳設餅桌包裹
status: formal
definition: 指起營時亞倫和他兒子對陳設餅桌子進行的遮蓋程序：先鋪藍色毯子，擺上盤子、調羹、奠酒的爵、杯與常設的餅；再蒙朱紅色毯子，外蒙海狗皮，把槓穿上（民4:7-8）。藍色毯子直接接觸聖器與餅，朱紅色毯子次之，海狗皮最外層。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載桌子遮蓋的四步驟：鋪藍色毯子→擺器具與餅→蒙朱紅色毯子→蒙海狗皮→穿槓（4:7-8），器具與餅同在藍色毯上，顯示供物與器具同屬聖潔。
  relation: 象徵基督為生命餅（約6:35）在世上被遮蔽（朱紅色指向贖罪之血，海狗皮指向人性遮蔽），器具同被遮蓋預表事奉工具同歸聖潔。
