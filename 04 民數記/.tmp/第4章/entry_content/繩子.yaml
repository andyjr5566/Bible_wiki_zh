definition: 指用於拉繫固定帳幕幔帳與院子帷子的繩索。民數記 4:26 革順子孫經理「繩子，並所用的器具」；4:32 米拉利子孫抬運「院子四圍的柱子……橛子、繩子」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 革順子孫負責會幕幔子、蓋、門簾、院子帷子與繩子；米拉利子孫負責院子柱子、橛子、繩子。
  relation: 繩子是會幕結構穩固的關鍵配件，分屬革順與米拉利兩族經理。
