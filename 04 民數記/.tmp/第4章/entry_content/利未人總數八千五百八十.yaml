name: 利未人總數八千五百八十
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記4:46-48記載摩西、亞倫並以色列眾首領按家室、宗族所數點的利未人，從三十歲到五十歲、凡前來任職在會幕裡做抬物之工的，共有八千五百八十名。此為三族（哥轄2750+革順2630+米拉利3200）總和，代表會幕搬運與服事的總人力編制。
development: 本章第46-48節為全章統計總結，確認三族分別數點後之匯總數字，強調「摩西按他們所辦的事、所抬的物，憑耶和華的吩咐數點他們」，體現神權治理下的精確編制。
