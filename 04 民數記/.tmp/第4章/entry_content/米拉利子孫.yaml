status: formal
definition: 利未人中米拉利的後裔，屬利未第三族。民數記第4章記載他們被數點、服事年齡（三十至五十歲）、職任內容（抬會幕板、閂、柱子、帶卯的座、院子柱子與座、橛子、繩子等），並在祭司亞倫兒子以他瑪手下服事。本章記錄被數點者共三千二百名。
development: 本章為米拉利子孫在曠野行軍中職任分工的權威依據，後世猶太傳統承接此分工概念。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載米拉利子孫被數點人數（三千二百名）、服事年齡範圍、具體抬運物品清單，及歸以他瑪監督。
  relation: 本章確立米拉利族在會幕搬運中負責結構性重器材的職任定位。
