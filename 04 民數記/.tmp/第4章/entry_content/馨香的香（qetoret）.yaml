name: 馨香的香（qetoret）
type: 原文
secondary_types: []
aliases:
- 馨香的香
status: formal
definition: 希伯來文 qetoret（קְטֹרֶת），指調和香料製成的聖香。民數記4:16記載以利亞撒掌管「香料」（即馨香的香），作為聖所日常燒香與年贖罪日進入至聖所之用，屬祭司專屬職掌。
development: 本章僅於第16節提及以利亞撒掌管香料，屬祭司看守聖所器物與物品職責之一環，強調聖香的神聖性與專屬管理權。
accumulations:
- book: 民數記
  chapter: 4
  summary: 第16節列以利亞撒掌管香料，屬祭司看守聖所物品職掌之一部分。
  relation: 聖香為聖所核心敬拜元素，由大祭司家族專管，體現聖物管理嚴謹性。
