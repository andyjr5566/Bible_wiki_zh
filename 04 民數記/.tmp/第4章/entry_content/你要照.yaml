status: formal
definition: 見民數記 4:29，「至於米拉利的子孫，你要照著家室、宗族把他們數點」。此為神對摩西發出的第三次普查命令，語式承接前二族（哥轄 4:2、革順
  4:22），統一規範米拉利族數點方式。
development: 此短語作為命令式引導，確立三族普查程序的一致性：皆「照著家室、宗族」進行。
accumulations:
- book: 民數記
