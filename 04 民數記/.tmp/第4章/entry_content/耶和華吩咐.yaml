name: 耶和華吩咐
type: 主題
secondary_types: []
aliases:
- 神的吩咐
- 耶和華命令
status: formal
definition: 民數記第4章中反覆出現的神學核心，指耶和華對摩西、亞倫發出的具體指令，內容涵蓋利未人數點範圍、年齡條件、職任分工、包裹聖物程序、禁觸聖物條例、監督層級等。全章行動皆本於此權威。
development: 本章以「耶和華曉諭摩西說/曉諭摩西、亞倫說」為標記，構成祭司律法典中神命令與人順服的典範文本。
accumulations:
- book: 民數記
  chapter: 4
  summary: 全章多處出現「耶和華曉諭摩西說」（v.1,17,21）、「耶和華曉諭摩西、亞倫說」（v.1,17）、「照耶和華吩咐」（v.37,41,45,49），貫串數點、分派、監督全過程。
  relation: 本章確立神命令為以色列會幕服事組織的唯一合法性來源。
