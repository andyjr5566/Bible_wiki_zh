name: 搬運
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指利未人（特別是哥轄族）肩負、抬運會幕聖物與結構組件的動作。經文用「搬運」（4:4）、「抬」（4:15, 24, 27, 31, 47）、「抬物」（4:27,
  47）描述此核心勞務。
development: 哥轄族搬運已被祭司遮蓋妥當的至聖之物（4:15）；革順族搬運幔子、蓋、門簾、帷子、繩子（4:25-26）；米拉利族搬運板、閂、柱子、座、橛子、繩子（4:31-32）。搬運前必須由祭司完成包裹遮蓋，不可直接觸摸聖物（4:15,
  19-20）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 詳細規定三族利未人搬運會幕各部分的分工、包裹程序與禁忌。
  relation: 搬運是利未人辦事的核心體力工作，嚴格區分聖物等級與搬運資格，體現聖潔秩序。
