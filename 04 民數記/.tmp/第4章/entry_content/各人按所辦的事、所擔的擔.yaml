name: 各人按所辦的事、所擔的擔
type: 神學
secondary_types: []
aliases:
- 按職任分派
- 各盡其職
status: formal
definition: 總結利未人事奉的核心原則：每人按神所派定的具體工作（所辦的事）與負擔（所擔的擔）被數點、被分派。民數記4:49「摩西按他們所辦的事、所抬的物，憑耶和華的吩咐數點他們」；4:19、27、32同義。強調事奉的個體化、具體化與責任化。
development: 此原則將集體事奉分解為個人責任：哥轄人擔至聖之物（4:15），革順人擔幔帳繩索（4:26），米拉利人擔板柱座卯（4:31-32）。祭司監督下（以利亞撒、以他瑪），各人專注自己的擔子，不越界、不推卸，構成有序的聖工身體。
accumulations:
- book: 民數記
  chapter: 4
  summary: 以「所辦的事、所擔的擔」為依據數點分派三族利未人（第19、27、32、49節）
  relation: 將事奉神學化為個人蒙召的具體回應，而非模糊的集體參與
