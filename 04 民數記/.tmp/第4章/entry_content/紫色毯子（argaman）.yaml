- 紫色毯子
- argaman毯子
status: formal
definition: 希伯來文 argaman（אַרְגָּמָן），指用紫色貝類染料織成的羊毛毯子/布。民數記第4章13節唯一出現：銅壇（燔祭壇）起營時，收灰後鋪在壇上作第一層遮蓋，器具置其上，再蒙上海狗皮。紫色象徵王權、尊貴與贖罪（王袍、聖殿幔子用紫色），呼應銅壇作為贖罪中心、君王祭司代求的地位。
development: 本章僅用於銅壇遮蓋，順序為：紫色毯子（第一層，直接鋪在壇面）→器具（火鼎、肉鍤子、鏟子、盤子）→海狗皮（外層）。這與聖所內器具（藍色毯子為首層）形成對比：銅壇在院子，屬「聖」而非「至聖」，其遮蓋用王權色紫色而非天上色藍色。紫色毯子直接接觸壇面灰燼，象徵贖罪工作的王權覆庇。
accumulations:
