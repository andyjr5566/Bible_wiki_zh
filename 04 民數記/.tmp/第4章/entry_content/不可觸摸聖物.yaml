- 禁觸聖物
status: formal
definition: 神學禁令，禁止非祭司（特別是哥轄利未人）直接觸摸至聖之物。民數記4:15明文：「只是不可摸聖物，免得他們死亡」；4:20再強調「連片時不可進去觀看聖所，免得他們死亡」。此規定保護聖物的聖別，也保護利未人的生命。
development: 此禁令與「被剪除」（4:18）形成雙重保障：祭司包裹後，哥轄人只能抬運已遮蓋的聖物。違反者必死，顯示神聖潔的嚴肅性與恩典的供應（透過祭司中介）。
accumulations:
