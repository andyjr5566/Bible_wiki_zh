name: 以利亞撒掌管
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指祭司亞倫兒子以利亞撒被委派看守點燈的油、香料、素祭、膏油，並掌管全帳幕與其中所有的、聖所和聖所器具（民4:16）。此為大祭司繼承人在會幕運作中的具體監督職任。
development: 以利亞撒的掌管範圍涵蓋燈油、香料、素祭、膏油四類消耗性聖物，以及全帳幕結構與聖所器具的整體監督。這與以他瑪監督革順、米拉利兩族搬運事務（4:28,
  33）形成分工。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載以利亞撒掌管聖所油香膏油與全帳幕器具的職任內容。
  relation: 確立祭司家族內部的職任分工，以利亞撒負責聖所核心消耗品與整體監督，為大祭司職任預備。
