definition: 米拉利子孫中符合服事年齡被數點的總人數（民4:43）。由摩西、亞倫照耶和華吩咐按家室、宗族數點得出（4:42-45）。
development: 米拉利族人數最少，負責搬運會幕板、閂、柱子、帶卯的座、院子柱子、橛子、繩子等堅硬結構組件（4:31-32）。此數字佔利未人總數約37%，雖人數最少但搬運物件最重且結構性最強。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載米拉利子孫被數點的確切人數與點閱程序。
  relation: 為利未人服事總人數統計的組成部分，對應米拉利族負責會幕骨架結構搬運的人力配置。
