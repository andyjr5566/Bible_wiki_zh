definition: 希伯來文 menakkiyyot（מְנַקִּיּוֹת），指用於奠酒祭的杯/爵/壺。民數記 4:7 列於陳設餅桌子器具：「盤子、調羹、奠酒的爵，和杯」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 陳設餅桌子上的奠酒器具，隨桌子遮蓋穿杠由哥轄子孫抬運。
  relation: 聖所事奉器具，與素祭、奠酒祭相關，屬至聖之物。
