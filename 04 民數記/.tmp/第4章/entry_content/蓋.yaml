name: 蓋
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指起營時用毯子、皮子覆蓋聖物與會幕結構的動作與材料。經文大量使用「蒙蓋」（4:5, 8, 9, 11, 12, 14）、「遮蓋」（4:15,
  19）、「鋪上」（4:7, 9, 13）、「摘下」（4:5）描述包裹程序。材料包括藍色毯子、朱紅色毯子、紫色毯子、海狗皮、遮掩櫃的幔子（4:5-14, 25）。
development: 每件聖物有指定遮蓋層次與顏色：法櫃三層（幔子、海狗皮、藍色毯子，4:5-6）；桌子雙層（藍色毯子、朱紅色毯子、海狗皮，4:7-8）；燈臺雙層（藍色毯子、海狗皮，4:9-10）；金壇雙層（藍色毯子、海狗皮，4:11-12）；銅壇雙層（紫色毯子、海狗皮，4:13-14）。革順族負責搬運會幕的蓋與海狗皮（4:25）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 詳細記載各聖物與會幕組件的遮蓋材料、層次、顏色與負責族群。
  relation: 蓋是保護聖物聖潔、防止人眼直視、使搬運成為可能的關鍵儀式動作，體現聖潔與凡俗的界限管理。
