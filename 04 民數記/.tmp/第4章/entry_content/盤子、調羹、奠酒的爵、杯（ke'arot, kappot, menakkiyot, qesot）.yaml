name: 盤子、調羹、奠酒的爵、杯（ke'arot, kappot, menakkiyot, qesot）
type: 原文
secondary_types: []
aliases:
- 盤子、調羹、奠酒的爵、杯
status: formal
definition: 希伯來文 ke'arot（盤子）、kappot（調羹/掌）、menakkiyot（奠酒的爵/澆奠器）、qesot（杯/杏花杯）。民數記4:7記載陳設餅桌子上擺設之器具：用藍色毯子鋪桌，將盤子、調羹、奠酒的爵、杯擺在上頭，桌上也必有常設的餅。此四器為陳設餅桌專用聖器。
development: 本章第7-8節描述陳設餅桌起營遮蓋程序：先鋪藍色毯子，擺上四器與常設餅，再蒙朱紅色毯子、海狗皮，穿上槓。四器皆屬聖所器具，隨桌子由哥轄子孫抬運。
