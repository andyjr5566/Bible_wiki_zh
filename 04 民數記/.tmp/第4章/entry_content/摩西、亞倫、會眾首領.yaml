definition: 民數記第4章中執行耶和華吩咐、負責數點利未三族（哥轄、革順、米拉利）人數與職任的領導群體。摩西為領袖，亞倫為大祭司，會眾首領為各支派代表，三者共同依神命令完成普查與分派工作。
development: 本章展現以色列領導層三級合作模式：先知領袖、祭司長、民間長老共同執行神的行政命令。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載摩西、亞倫、會眾首領三度合作數點三族利未人（哥轄、革順、米拉利），並照耶和華吩咐分派職任。
  relation: 本章確立領導層執行神命令的權威與程序，為後續曠野行軍組織奠基。
