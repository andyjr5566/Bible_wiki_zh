status: formal
definition: 祭司亞倫和他兒子按神吩咐，將具體搬運任務指派給每個哥轄利未人。民數記4:19：「亞倫和他兒子要進去派他們各人所當辦的，所當抬的」。確保秩序井然，人人知曉責任，避免擅自接觸聖物導致死亡。同樣原則應用於革順族（4:27）和米拉利族（4:32、49）。
development: 此分派體現「各按其職」的事奉原則：神不混亂，藉祭司權柄分配聖工。哥轄人抬至聖之物（4:4-15），革順人抬幔帳（4:24-26），米拉利人抬板柱（4:31-32），各有專屬擔子，不可混淆。
