name: 米拉利子孫所辦的事
type: 主題
secondary_types: []
aliases:
- 米拉利族服事內容
status: formal
definition: 見民數記 4:31-33, 45, 49，指米拉利族在會幕搬運中負責的具體工作：抬帳幕的板、閂、柱子、帶卯的座，院子四圍的柱子、帶卯的座、橛子、繩子，並一切使用的器具（4:31-32）。此為神指派米拉利族的職任範圍，歸在祭司亞倫兒子以他瑪手下服事（4:33）。
development: 與哥轄族（搬運聖物）、革順族（搬運幔帳）互補，三族共同完成會幕遷移的結構性拆裝與運輸。
accumulations:
- book: 民數記
  chapter: 4
  summary: 米拉利子孫辦理會幕的事，抬板、閂、柱子、座、院子柱子、橛子、繩子等結構組件。
  relation: 本章定義米拉利族服事職任的經文依據。
