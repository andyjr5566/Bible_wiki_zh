status: formal
definition: 民數記 4:22-28, 38-41 記載利未人中革順子孫，按宗族、家室數點，從三十歲到五十歲凡前來任職在會幕裡辦事的，共二千六百三十名。他們負責抬運帳幕的幔子、會幕、罩棚、海狗皮、門簾、院子帷子、門簾、繩子並一切器具，在亞倫兒子以他瑪手下服事。
accumulations:
- book: 民數記
  chapter: 4
  summary: 革順子孫被數點二千六百三十名，職任為抬運會幕幔帳與院子帷子等柔性結構，在以他瑪手下服事。
  relation: 為利未三族之一；職任與哥轄（抬至聖物）、米拉利（抬板柱）互補；受以他瑪監督。
