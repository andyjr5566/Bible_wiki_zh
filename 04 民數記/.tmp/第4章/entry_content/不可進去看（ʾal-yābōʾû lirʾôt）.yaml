name: 不可進去看（ʾal-yābōʾû lirʾôt）
type: 神學
secondary_types: []
aliases:
- 不可進去看
- 連片時不可進去觀看
- 禁止直視聖物
status: formal
definition: 民數記 4:20 「只是他們連片時不可進去觀看聖所，免得他們死亡」。此為嚴格的聖潔邊界條例：哥轄子孫在聖物被祭司遮蓋前，絕不可進入會幕直視聖物，即使極短暫（「連片時」）亦同。違犯者必死，體現神聖榮耀不可被褻瀆直視的神學原則。
development: 從「不可觸摸」（v.15）進階為「不可直視」，構建多層次聖潔保護圈：遮蓋→抬運→不看→不觸→存活。
accumulations:
- book: 民數記
  chapter: 4
  summary: 禁止哥轄子孫進去觀看聖所，哪怕片刻，違者必死。
  relation: 聖潔邊界條例的核心條款，配合祭司遮蓋與派定職任，確保利未人存活。
