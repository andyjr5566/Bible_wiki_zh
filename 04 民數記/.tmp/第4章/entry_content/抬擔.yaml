- 搬運重擔
status: formal
definition: 民數記第4章中利未人核心職任動作，指以肩扛或杠抬方式搬運會幕結構與器物品。三族分工：哥轄抬至聖物（用杠）、革順抬幔帳繩索、米拉利抬板柱座橛。本章強調「各人按所辦的事、所擔的擔」被數點分派。
development: 本詞將利未人服事具體化為體力與屬靈雙重負擔的具體行動，體現聖所移動中的秩序神學。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載三族抬擔內容：哥轄抬聖物（v.15）、革順抬幔帳（v.25-26）、米拉利抬板柱（v.31-32），總結為「做抬物之工」（v.47）與「各人按所辦的事、所擔的擔」（v.49）。
  relation: 本章以抬擔為核心職任，建立會幕移動時的神聖物流體系。
