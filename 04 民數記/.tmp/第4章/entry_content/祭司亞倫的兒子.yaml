name: 祭司亞倫的兒子
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 指亞倫的兒子以利亞撒和以他瑪（民數記3:4），他們作為祭司協助父親亞倫執行會幕聖職。本章多處顯示其關鍵角色：第5、15節「亞倫和他兒子要進去」遮蓋聖物；第16節以利亞撒掌管「點燈的油與香料，並當獻的素祭和膏油，也要看守全帳幕與其中所有的，並聖所和聖所的器具」；第19節「亞倫和他兒子要進去派他們各人所當辦的，所當抬的」；第27-28節革順族「在亞倫和他兒子的吩咐」下服事，「在祭司亞倫兒子以他瑪的手下」；第33節米拉利族同樣「在祭司亞倫兒子以他瑪的手下」。祭司兒子們負責聖物的直接處理、職任分派與監督，是會幕運作的核心領導層。
development: 亞倫兒子們的職分體現祭司職任的傳承與分工：以利亞撒掌管聖所物品與油香，以他瑪監督革順、米拉利兩族的勞力服事，共同維繫會幕的聖潔與秩序。
accumulations:
