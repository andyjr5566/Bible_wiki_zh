name: 辦事
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指利未人在會幕中執行具體服事工作，包括搬運、遮蓋、看守器具等職務。經文以「在會幕裡辦事」搭配「任職」作為被數點的雙重條件（民4:3, 23,
  30, 35, 39, 43, 47）。
development: 三族辦事內容不同：哥轄族搬運至聖之物（4:4, 15），革順族抬會幕幔帳（4:24-26），米拉利族抬會幕板柱（4:31-32），皆在祭司監督下進行。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載三族利未人在會幕裡辦事的具體分工與人數統計。
  relation: 顯示利未人服事的實際內容與組織架構，辦事非泛指而是有明確分派的具體職任。
