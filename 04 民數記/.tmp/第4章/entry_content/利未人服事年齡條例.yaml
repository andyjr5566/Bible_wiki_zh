name: 利未人服事年齡條例
type: 主題
secondary_types: []
aliases:
- 利未人服事年齡
- 利未人任職年齡
status: formal
definition: 指耶和華吩咐摩西、亞倫對利未人三大家族（哥轄、革順、米拉利）進行數點、派定職任時所訂定的年齡資格：從三十歲直到五十歲，凡前來任職、在會幕裡辦事的，都要被數點（民4:3,
  23, 30, 35, 39, 43, 47）。這年齡區間代表完全力壯、能勝任會幕搬運與服事重擔的成熟期。
accumulations:
- book: 民數記
  chapter: 4
  summary: 本章三次重複「從三十歲直到五十歲，凡前來任職、在會幕裡辦事的」作為哥轄、革順、米拉利三族被數點的統一標準（4:3, 23, 30），並在總結時再次確認（4:47）。
  relation: 確立利未人服事的法定年齡界限，作為後續各族分工與人數統計的前提條件。
