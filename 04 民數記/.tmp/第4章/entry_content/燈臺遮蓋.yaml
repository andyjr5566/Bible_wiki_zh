name: 燈臺遮蓋
type: 神學
secondary_types: []
aliases:
- 金燈臺遮蓋
- 燈臺包裹
status: formal
definition: 指起營時亞倫和他兒子對燈臺及其器具進行的遮蓋程序：用藍色毯子遮蓋燈臺、燈盞、剪子、蠟花盤、一切盛油的器皿；再把燈臺和一切器具包在海狗皮裡，放在抬架上（民4:9-10）。不像桌子有朱紅色毯子，燈臺只有藍色毯子與海狗皮兩層。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載燈臺遮蓋的兩層次序：藍色毯子遮蓋燈臺與所有器具（燈盞、剪子、蠟花盤、油器）→ 包在海狗皮裡 → 放抬架（4:9-10），強調器具與燈臺一同被遮蓋。
  relation: 預表基督為世界的光（約8:12）在行軍中被遮蔽（藍色指天上本源，海狗皮指世上遮蔽），器具同被遮蓋顯示事奉功能完全依賴基督。
