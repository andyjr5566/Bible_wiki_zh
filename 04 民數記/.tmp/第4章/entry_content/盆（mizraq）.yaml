definition: 希伯來文 mizraq（מִזְרָק），指用於盛血、灰或祭物的盆/盤。民數記 4:14 列於銅壇器具：「火鼎、肉鍤子、鏟子、盤子」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 作為銅壇器具之一，在壇被遮蓋前擺置其上，隨壇抬運。
  relation: 祭壇事奉的基本容器，屬哥轄子孫抬運範圍。
