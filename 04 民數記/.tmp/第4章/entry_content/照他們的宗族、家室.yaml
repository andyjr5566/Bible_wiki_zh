name: 照他們的宗族、家室
type: 主題
secondary_types: []
aliases:
- 按宗族家室
status: formal
definition: 見民數記 4:2, 22, 29, 34, 38, 42，神吩咐數點利未人（哥轄、革順、米拉利三族）時，必須依照「宗族、家室」為單位進行。此為普查的組織單位原則，確保各族服事職任傳承有序。
development: 此原則貫穿本章三次普查（哥轄、革順、米拉利），反映以色列社會以宗族、家室為基本組織架構，服事分工亦循此結構。
accumulations:
- book: 民數記
  chapter: 4
  summary: 摩西、亞倫照耶和華吩咐，將利未人三族按宗族、家室數點。
  relation: 本章三族普查共同遵循的組織原則。
