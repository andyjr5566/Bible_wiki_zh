status: formal
definition: 民數記第4章7-8、13節出現的動作用語。指祭司將特定顏色的毯子鋪設在聖物桌面或壇面上，作為蒙蓋的第一層。如陳設餅桌子上鋪藍色毯子，再擺放器具；銅壇上收去灰後鋪紫色毯子，再擺放器具。此動作區別於「蒙蓋」（覆蓋在上方），強調在物件表面鋪設基底層。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載在陳設餅桌子上鋪藍色毯子，擺放盤子、調羹、爵、杯與常設餅；在銅壇上收去灰後鋪紫色毯子，擺放火鼎、肉鍤子、鏟子、盤子等器具。
  relation: 本章聖物包裹程序中的基底鋪設動作，配合器具擺放與上層蒙蓋，構成完整遮蓋體系。
