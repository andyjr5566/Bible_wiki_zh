name: 亞倫和他兒子包裹聖物
type: 主題
secondary_types: []
aliases:
- 祭司包裹聖物
- 亞倫父子遮蓋聖器
status: formal
definition: 指會幕起營時，亞倫和他兒子（祭司）必須先進入聖所，將約櫃、桌子、燈臺、金壇、銅壇及聖所器具依規定遮蓋包裹妥當（用幔子、藍色毯子、朱紅色毯子、紫色毯子、海狗皮、穿上槓），哥轄子孫才可進來抬運，免得他們因觸摸聖物而死（民4:5-15）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 逐項記載包裹程序：約櫃三層遮蓋（4:5-6）、陳設餅桌子遮蓋（4:7-8）、燈臺遮蓋（4:9-10）、金香壇遮蓋（4:11）、聖所器具遮蓋（4:12）、銅壇遮蓋（4:13-14），強調「亞倫和他兒子把聖所和聖所的一切器具遮蓋完了，哥轄的子孫就要來抬」（4:15）。
  relation: 建立「祭司包裹、利未抬運」的聖潔防線，保護聖物榮耀與利未人性命，預表基督大祭司為信徒遮蓋、代求的中保職分。
