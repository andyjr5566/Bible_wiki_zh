name: 抬約櫃的槓是否可抽出來
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 出埃及記25:15明確命令「這槓要常在櫃的環內，不可抽出來」，然而民數記4:6在記載起營包裹約櫃時卻寫道「把槓穿上」（insert its
  poles），產生條例規範上的解經疑義（GT）。解經學者指出，希伯來文「穿上」（sam/sim）字義極廣，包含放置、裝置、調整、轉動或繫緊（adjust and
  fasten）等動詞意涵（GT賈斯樂）。在實務操作上，約櫃的槓平日始終留在金環之內未曾完全抽出；當起營要依次包裹內幔、海狗皮與純藍色毯子時，祭司必須暫時拉動或調整槓的位置以便將三層覆蓋物順暢蒙蓋，隨後再將槓重新推入、整理並固定緊實（adjust
  and fasten），稱為「把槓穿上」（GT、KC）。因此兩處指示在原則與操作上完全一致，並無衝突。
accumulations:
- book: 民數記
  chapter: 4
  summary: 本章第6節記載起營包裹約櫃後「把槓穿上」，引出與出25:15「槓不可抽出來」之對比與語義解析。
  relation: 解釋會幕起營搬運操作細節，證實神的話語精密不阿與文意協調。
