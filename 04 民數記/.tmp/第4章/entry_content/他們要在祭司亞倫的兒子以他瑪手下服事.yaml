definition: 指革順族（v.28）與米拉利族（v.33）均在祭司亞倫兒子以他瑪的監督下服事會幕職任。
development: 本章兩次出現（v.28、33），顯示以他瑪掌管非至聖物的利未人事奉；以利亞撒則掌管聖所器具與油香（v.16）。
