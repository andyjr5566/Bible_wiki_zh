status: formal
definition: 民數記第4章中對利未三族（哥轄、革順、米拉利）男丁進行的官方人口登記，限三十至五十歲、能前來任職在會幕辦事者，由摩西、亞倫、會眾首領執行，照耶和華吩咐按宗族、家室逐名記載，結果作為職任分派依據。
development: 本章數點非單純統計，乃為聖所服事編組的行政與神學行動，強調各人按職任被數點。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載三族分別被數點：哥轄二千七百五十名（v.36）、革順二千六百三十名（v.40）、米拉利三千二百名（v.44），總計八千五百八十名（v.48）。
  relation: 本章數點行動直接連結職任分派與會幕搬運秩序，體現神秩序觀。
