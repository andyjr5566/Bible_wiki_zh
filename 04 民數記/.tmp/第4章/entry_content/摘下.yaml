definition: 民數記第4章5節記載的動作用語。指起營時，亞倫和他兒子進去將遮掩櫃的幔子（即會幕內幔，分隔聖所與至聖所）摘下取下，用以蒙蓋法櫃。此為聖物包裹程序的啟始動作，象徵會幕拆遷、神同在移動的開始。
