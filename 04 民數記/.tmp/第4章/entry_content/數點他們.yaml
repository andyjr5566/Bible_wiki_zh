name: 數點他們
type: 主題
secondary_types: []
aliases:
- 數點米拉利子孫
status: formal
definition: 見民數記 4:29, 34, 38, 42, 46, 49，本章對利未人三族執行「數點」行動的核心動詞。神命摩西數點哥轄（4:2）、革順（4:22）、米拉利（4:29）；摩西、亞倫與首領遵命執行（4:34,
  38, 42, 46），總結說「摩西按他們所辦的事、所擔的擔，憑耶和華的吩咐數點他們」（4:49）。
development: 「數點」不僅統計人數，更連結服事職任（所辦的事、所擔的擔），體現神對會幕搬運人力的精確調度。
accumulations:
- book: 民數記
  chapter: 4
  summary: 摩西、亞倫與會眾首領遵耶和華吩咐，分別數點哥轄、革順、米拉利三族利未人。
  relation: 本章普查行動的執行與神學意義。
