name: 約櫃三層遮蓋
type: 神學
secondary_types: []
aliases:
- 法櫃三層蓋
- 約櫃遮蓋次序
status: formal
definition: 指起營時亞倫和他兒子對約櫃進行的三層遮蓋程序：先用遮掩櫃的幔子（內幔）蒙蓋法櫃，再用海狗皮蓋在上頭，最外層蒙上純藍色的毯子，最後把槓穿上（民4:5-6）。三層材質由內而外：幔子（分別）、海狗皮（保護）、藍色毯子（天上屬性），象徵神同在的榮耀與聖潔在行軍中被妥善遮蔽。
accumulations:
- book: 民數記
  chapter: 4
  summary: 詳細記載約櫃遮蓋的三步驟次序與材質（4:5-6），作為哥轄子孫搬運至聖之物的首項操作，強調「不可摸聖物，免得他們死亡」（4:15）。
  relation: 神學上預表基督（約櫃）在榮耀中被遮蔽（腓2:6-8），藍色指向天上本源，海狗皮指向世上保護，幔子指向分別為聖；也對應新約「天上真聖所」（來9:23-24）的遮蓋實體。
