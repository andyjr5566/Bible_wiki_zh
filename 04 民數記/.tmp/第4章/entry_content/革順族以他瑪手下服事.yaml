status: formal
definition: 指民數記第4章28節規定，革順子孫在會幕裡所辦的事、所抬的物，都在祭司亞倫兒子以他瑪的手下服事。以他瑪負責監督革順族抬運帳幕幔子、蓋、門簾、院子帷子、繩子等柔性結構物。
development: 本章第22-28節詳細記載革順族被數點人數（2,630名）、服事年齡（30-50歲）、具體抬運物品清單，並明確其隸屬於以他瑪監督。這體現利未人三大家族（哥轄、革順、米拉利）職任分工與祭司監督架構：以他瑪管轄結構性搬運，以利亞撒管轄聖所器具與供應品。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載革順族人數、服事內容，並規定其在以他瑪手下服事。
  relation: 本章利未人職任分派體系的重要組成部分，顯示祭司對利未家族的監督權柄。
