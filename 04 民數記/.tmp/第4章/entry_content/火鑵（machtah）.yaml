status: formal
definition: 希伯來文 machtah（מַחְתָּה），指用於盛火、炭或香的火鼎/火鑵。民數記 4:14 列在銅壇器具中：「所用的一切器具，就是火鼎、肉鍤子、鏟子、盤子，一切屬壇的器具」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 銅壇遮蓋前，需將火鼎等器具擺在壇上，再蒙上海狗皮、穿上杠。
  relation: 屬銅壇器具，由哥轄子孫抬運，屬至聖之物範疇。
