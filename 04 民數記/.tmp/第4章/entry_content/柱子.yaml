definition: 民數記 4:31-32 記載米拉利子孫所抬運的會幕結構組件，包括「帳幕的板、閂、柱子，和帶卯的座」以及「院子四圍的柱子和其上帶卯的座、橛子、繩子」。柱子是支撐帳幕幔帳與院子帷子的直立木柱。
accumulations:
- book: 民數記
  chapter: 4
  summary: 米拉利子孫負責抬運會幕的柱子與院子四圍的柱子，並按名指定器具。
  relation: 屬米拉利子孫職任，在以他瑪手下服事。
