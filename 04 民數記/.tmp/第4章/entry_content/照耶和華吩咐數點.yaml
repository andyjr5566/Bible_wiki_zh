name: 照耶和華吩咐數點
type: 主題
secondary_types: []
aliases:
- 按耶和華吩咐數點
- 遵命數點
status: formal
definition: 強調人口普查完全遵循神的指示而非人意。民數記4章四次重複此語（第37、41、45、49節）：哥轄、革順、米拉利三族及利未人總數，皆「照耶和華藉摩西所吩咐數點」。顯示事奉資格（30-50歲）、職任分派、人數統計皆出於神的主權安排。
development: 此公式化語句貫穿全章，將行政動作（數點）神學化：數點不是單純統計，而是確認神揀選、呼召的人員名單。摩西、亞倫、首領只是執行者，權柄源於耶和華的吩咐。
