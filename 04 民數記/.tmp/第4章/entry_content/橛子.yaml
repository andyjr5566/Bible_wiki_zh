status: formal
definition: 指用於固定帳幕幔帳與院子帷子的橛子（帳棚釘）。民數記 4:32 列在米拉利子孫所抬運的器具中：「院子四圍的柱子和其上帶卯的座、橛子、繩子」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 米拉利子孫負責抬運會幕的板、閂、柱子、帶卯的座，以及院子四圍的柱子、帶卯的座、橛子、繩子。
  relation: 屬於米拉利家族服事範圍，顯示會幕結構拆裝的具體組件。
