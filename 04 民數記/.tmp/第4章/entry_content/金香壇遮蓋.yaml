name: 金香壇遮蓋
type: 神學
secondary_types: []
aliases:
- 金壇遮蓋
- 香壇包裹
status: formal
definition: 指起營時亞倫和他兒子對金香壇進行的遮蓋程序：在金壇上鋪藍色毯子，蒙上海狗皮，把槓穿上（民4:11）。與燈臺同為兩層（藍色毯子+海狗皮），無朱紅色毯子，強調禱告香氣直達天庭（藍色）而在世上被遮蔽（海狗皮）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載金香壇遮蓋的三步驟：鋪藍色毯子→蒙海狗皮→穿槓（4:11），簡潔明確，作為聖所內器具遮蓋的代表性範例。
  relation: 預表基督為中保的代求（來7:25）在曠野行軍中持續不斷（藍色毯子覆蓋），外表看似普通（海狗皮）實則直通天庭。
