status: formal
definition: 指圍繞會幕院子的帷幔（出埃及記 27:9-18）。民數記 4:26 記載革順子孫負責抬運「院子的帷子和門簾（院子是圍帳幕和壇的）、繩子，並所用的器具」。這些帷子由細麻製成，高五肘，掛在銅柱與帶卯的銅座上，界定聖所與外院的界限。
development: 從出埃及記的製作規範，到民數記 4 章具體分派給革順家族搬運，顯示會幕結構的模組化與利未人職任的明確劃分。
accumulations:
- book: 民數記
  chapter: 4
  summary: 革順子孫被派抬運院子的帷子、門簾、繩子及器具，在以他瑪手下服事（4:25-26, 28）。
  relation: 本章具體落實出埃及記 27 章的帷子規格，交由革順族負責運輸與看守。
