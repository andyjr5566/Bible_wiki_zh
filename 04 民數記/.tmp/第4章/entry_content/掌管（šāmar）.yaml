status: formal
definition: 希伯來文 šāmar（看守、守護、掌管）。民數記 4:16 記載以利亞撒「所要看守的是點燈的油與香料，並當獻的素祭和膏油，也要看守全帳幕與其中所有的，並聖所和聖所的器具」。此詞體現祭司對聖物、聖所器物及儀式用品的全權保管責任。
development: 從具體物品（油、香、素祭、膏油）延伸至空間整體（全帳幕、聖所），顯示祭司掌管範圍的層級擴大。
accumulations:
- book: 民數記
  chapter: 4
  summary: 以利亞撒掌管點燈油、香料、素祭、膏油，並看守全帳幕與聖所器具。
  relation: 祭司掌管職能涵蓋儀式消耗品與聖所結構性器具，確保敬拜連續性。
