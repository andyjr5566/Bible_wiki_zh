name: 至聖之物
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指會幕中最聖潔的器具，包括法櫃、陳設餅桌子、燈臺、金壇、銅壇及其器具（民4:4-14）。這些物件必須由亞倫和他兒子用特定毯子與海狗皮遮蓋妥當後，才可由哥轄子孫搬運（4:15）。
development: 經文逐項記載遮蓋程序：法櫃三層遮蓋（幔子、海狗皮、藍色毯子，4:5-6）；桌子、燈臺、金壇、銅壇各有指定顏色毯子與海狗皮（4:7-14）。哥轄人不可觸摸也不可進去觀看，免得死亡（4:15,
  19-20）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 列舉至聖之物清單與遮蓋規格，規定哥轄族搬運資格與禁忌。
  relation: 至聖之物是會幕聖潔等級最高的項目，其搬運程序體現神聖空間的保護機制與祭司中介角色。
