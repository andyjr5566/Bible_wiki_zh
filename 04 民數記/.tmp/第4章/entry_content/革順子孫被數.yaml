name: 革順子孫被數
type: 主題
secondary_types: []
aliases:
- 革順族人口普查
- 革順人被數點
status: formal
definition: 民數記 4:22-23, 38-41 記載摩西、亞倫照耶和華吩咐，按宗族、家室數點革順子孫，從三十歲到五十歲、凡前來任職在會幕裡辦事的男丁，共二千六百三十名。他們負責抬運會幕的幔子、罩棚、海狗皮蓋、門簾、院子帷子與繩索等，在以他瑪手下服事。
development: 革順族職任專司會幕柔性結構（幔帳、帷子），體現利未人按材質與功能分工的邏輯。
accumulations:
- book: 民數記
  chapter: 4
  summary: 革順子孫按宗族家室被數，30-50 歲任職辦事者共 2,630 名，掌管會幕幔帳與院子帷子搬運（4:22-24, 38-41）。
  relation: 本章第二組普查，職任專司織物結構，歸以他瑪督導。
