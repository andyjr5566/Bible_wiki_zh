definition: 指民數記 4 章中規定利未人（特別是哥轄子孫）在搬運至聖之物時，不可直接觀看聖物，否則必死（參 4:15, 19-20）。這反映神聖物的極度聖潔與保護措施。
development: ''
accumulations:
- book: 民數記
  chapter: 4
  summary: 規定哥轄子孫搬運聖物時，必須由亞倫和他兒子先遮蓋聖物，哥轄人不可觸摸也不可觀看，免得死亡。
  relation: 本條目直接對應本章關於聖物遮蓋與禁止窺視的條文。
