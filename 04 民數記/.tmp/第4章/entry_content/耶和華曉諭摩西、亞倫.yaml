status: formal
definition: 民數記 4 章出現兩次的神聖啟示公式（4:1, 4:17），標誌著哥轄族搬運聖物規例（4:1-15）與保護哥轄人不致死亡的補充條例（4:17-20）均出自耶和華直接吩咐，確立律法權威與祭司執行責任的雙重保障。
development: 此公式在五經中頻繁出現（如出埃及記 12:1、利未記 11:1），民數記 4 章雙重使用凸顯「搬運聖物」與「生命保護」兩大主題皆屬神主權安排，非人為規劃。
accumulations:
- book: 民數記
  chapter: 4
  summary: 4:1 開啟哥轄族職任條例；4:17 開啟保護哥轄族生命條例，兩段經文構成完整聖物搬運法規。
  relation: 本章結構骨幹，確立後續所有細節（遮蓋、抬運、年齡、人數）的神學依據。
