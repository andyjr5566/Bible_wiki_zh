status: formal
definition: 希伯來文 bad（בַּד），指用於抬運聖物（如法櫃、桌子、壇）的杠/棍。民數記 4 章記載亞倫和他兒子用藍色毯子、海狗皮遮蓋聖物後，「把杠穿上」（4:6,
  8, 11, 14），由哥轄子孫抬運，不可直接觸摸聖物。
accumulations:
- book: 民數記
  chapter: 4
  summary: 記載法櫃、陳設餅桌子、金香壇、銅壇等聖物遮蓋後穿上杠，由哥轄子孫抬運。
  relation: 本章核心操作細節，顯示聖物搬運的聖潔規範。
