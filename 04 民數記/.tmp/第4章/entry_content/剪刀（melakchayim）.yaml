definition: 希伯來文 מְלַקְחַיִם (mēlaqḥayim)，指修剪燈芯的剪刀（剪子）。民數記 4:9 列在燈臺器具中，起營時與燈盞、蠟花盤、油器一同被藍色毯子遮蓋。
accumulations:
- book: 民數記
  chapter: 4
  summary: 起營時剪刀作為燈臺器具之一，被藍色毯子遮蓋，再用海狗皮包裹。
  relation: 屬哥轄子孫搬運的聖物，不可直接觸摸。
