status: formal
definition: 民數記4:12泛指聖所內除大件傢俱（約櫃、桌子、燈臺、金壇、銅壇）以外的所有聖器。起營時要包在藍色毯子裡，用海狗皮蒙上，放在抬架上，由哥轄子孫抬運。第16節又稱「聖所和聖所的器具」歸以利亞撒看守。
development: 本章第12節列為獨立類別處理遮蓋搬運，第16節納入以利亞撒掌管範圍。涵蓋火鼎、肉鍤子、鏟子、盤子等壇器（第14節）及其他未列名聖器，體現聖所器物管理的全面性。
