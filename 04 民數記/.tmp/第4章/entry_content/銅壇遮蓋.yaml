- 壇的遮蓋
status: formal
definition: 指民數記第4章13-14節規定，起營時祭司亞倫和他兒子須先收去壇上的灰，鋪上紫色毯子，擺上壇的一切器具（火鼎、肉鍤子、鏟子、盤子），再蒙上海狗皮，穿上槓，由哥轄子孫抬運。此程序強調聖物遮蓋的秩序與聖潔界限，保護利未人不因觸摸聖物而死。
development: 本章詳細記載銅壇（燔祭壇）起營時的三層遮蓋步驟：紫色毯子為第一層，器具置其上，海狗皮為外層保護。紫色象徵王權與贖罪，呼應壇的贖罪功能。此遮蓋屬於「至聖之物」搬運程序的一部分，由亞倫父子親自包裹，哥轄人僅負責抬運，不可觸摸。
accumulations:
- book: 民數記
  chapter: 4
  summary: 規定銅壇起營時的遮蓋步驟：收灰、鋪紫色毯子、擺器具、蒙海狗皮、穿槓。
  relation: 本章核心搬運條例之一，顯示聖物遮蓋的神學秩序與利未人職任分工。
