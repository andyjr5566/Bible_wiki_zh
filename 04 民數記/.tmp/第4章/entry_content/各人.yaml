status: formal
definition: 強調利未人在會幕服事中按個人受派定具體職任與抬擔物件（民4:19, 49）。第19節「派他們各人所當辦的，所當抬的」；第49節「各人按所辦的事、所擔的擔被數點」。體現神聖服事的個人責任制與秩序性，避免職任模糊導致觸犯聖潔。
accumulations:
- book: 民數記
  chapter: 4
  summary: 經文兩次使用「各人」：祭司派定各人職任抬擔（第19節）；摩西按各人職任抬擔數點他們（第49節）。
  relation: 各人按職任服事是會幕運作的基本單位，配合祭司分派與數點，構成有序的聖潔服事體系。
