status: formal
definition: 希伯來文 ya'eh（יָעֶה），指清理壇上灰燼的鏟子。民數記 4:13-14 先「收去壇上的灰」，再將鏟子等器具擺在壇上遮蓋。
accumulations:
- book: 民數記
  chapter: 4
  summary: 屬銅壇器具，在收灰後與火鼎、肉鍤子、盤子一同被遮蓋抬運。
  relation: 顯示壇的日常維護（收灰）與搬運準備的連貫性。
