status: formal
definition: 指以色列各支派的領袖，協助摩西、亞倫執行利未人普查。民數記4:34、46記載「摩西、亞倫與會眾的諸首領」及「摩西、亞倫並以色列眾首領」共同數點哥轄、革順、米拉利三族及利未人總數。他們代表會眾見證神吩咐的執行，確保程序公開公正。
development: 首領們在數點中扮演見證與協助角色，不具決定權（權柄在耶和華吩咐）。他們的參與將利未人的事奉編制置於全會眾監督下，體現共同體對聖職人員的認同與問責。
