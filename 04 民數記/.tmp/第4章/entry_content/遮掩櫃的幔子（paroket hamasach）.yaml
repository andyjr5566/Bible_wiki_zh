name: 遮掩櫃的幔子（paroket hamasach）
type: 原文
secondary_types: []
aliases:
- 遮掩櫃的幔子
status: formal
definition: 希伯來文 paroket hamasach（פָּרֹכֶת הַמָּסָךְ），即「遮掩櫃的幔子」，又稱「內幔」或「遮掩幔」。民數記4:5記載起營時亞倫和他兒子先進去摘下此幔子，用以蒙蓋法櫃，為約櫃三層遮蓋之第一層，象徵聖與至聖的分隔。
development: 本章第5節詳細描述起營時處理約櫃的程序：先摘下遮掩櫃的幔子蒙蓋法櫃，再蓋海狗皮、純藍色毯子，把槓穿上。此幔子平時垂在聖所與至聖所之間，起營時轉為約櫃遮蓋之用。
accumulations:
- book: 民數記
  chapter: 4
  summary: 第5節記載起營時亞倫和他兒子摘下遮掩櫃的幔子蒙蓋法櫃，為約櫃遮蓋程序第一步。
  relation: 約櫃搬運前的遮蓋儀式核心步驟，體現至聖物不可直視、不可觸摸的聖潔原則。
