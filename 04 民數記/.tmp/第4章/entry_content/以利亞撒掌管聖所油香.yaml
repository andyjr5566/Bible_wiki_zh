status: formal
definition: 指民數記第4章16節記載，祭司亞倫的兒子以利亞撒被委派看守點燈的油、香料、常獻的素祭和膏油，並掌管全帳幕與其中所有的、聖所和聖所的器具。他是大祭司繼承人，負責聖所核心供應品的管理與監督。
development: 以利亞撒在此章首次明確被賦予具體掌管職任，區別於亞倫和他兒子包裹聖物的共同工作。他的掌管範圍涵蓋光（油）、香（香料）、祭（素祭）、膏（膏油）四大類，象徵祭司職分的綜合性。後來他在約書亞記中繼承大祭司職分，此處為其職任預備。
