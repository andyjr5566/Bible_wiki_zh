name: 利未人任職年齡的差異
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 聖經關於利未人開始在會幕或聖殿任職的年齡記載存在顯著差異：民數記4:3規定為「三十歲」，民數記8:24規定為「二十五歲」，而以斯拉記3:8與歷代志上23:24則記載為「二十歲」（GT）。傳統解經與學者解經提供合理的制度調和與歷史發展解釋：(1)
  民數記4:3的30歲是專指在曠野漂泊時期正式負擔「會幕搬運與負重（melakah）」的成熟壯年要求；(2) 民數記8:24的25歲則是利未人進入會幕擔任「學徒與見習訓練（baabodath）」的年齡，經過5年實務學習與觀察，至30歲始正式獨立接管重任（GT艾基斯、賈斯樂）；(3)
  大衛與被擄歸回時期調降至20歲，係因聖殿建成立後會幕已無拆卸搬運之苦勞，且歸回時期利未人人數極為稀少（僅74名），故降低門檻以應建殿與督理之急需（GT）。三處經文並無矛盾，實反映不同時代背景與職務性質的彈性調整（GT）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 本章第3節記錄利未人搬運會幕的任職年齡為30歲至50歲，引發與民8:24（25歲）及拉3:8（20歲）年齡差異的解經討論。
  relation: 澄清舊約儀文律法在歷史演變與職務階梯中的完美和諧，消除表面經文對立。
