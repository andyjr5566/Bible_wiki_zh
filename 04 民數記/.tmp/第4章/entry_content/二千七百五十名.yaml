definition: 哥轄子孫中符合服事年齡（三十至五十歲）被數點的總人數（民4:36）。此數字來自摩西、亞倫與會眾首領照耶和華吩咐，按家室、宗族數點的結果（4:34-37）。
development: 哥轄族人數最多，負責搬運至聖之物（4:4, 15, 36）。此數字佔利未人總數8,580的約32%，反映哥轄族在聖物搬運上的核心角色。
accumulations:
