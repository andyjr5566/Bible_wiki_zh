definition: 希伯來文 mazleg（מַזְלֵג），指祭壇上用以翻動祭肉的三叉鍤/叉子。民數記 4:14 作「肉鍤子」，屬銅壇器具之一。
accumulations:
- book: 民數記
  chapter: 4
  summary: 列於銅壇器具清單中（火鼎、肉鍤子、鏟子、盤子），隨壇被遮蓋抬運。
  relation: 銅壇事奉器具，顯示祭司處理祭物的具體工具。
