definition: 民數記 4 章詳細列出會幕（帳幕）中一切使用的器具，包括陳設餅桌子上的盤子、調羹、奠酒的爵、杯；燈臺的燈盞、剪刀、油壺；金香壇、銅壇的火鑵、肉鍤子、鏟子、盤子；以及帳幕的幔子、板、閂、柱子、帶卯的座、院子帷子、門簾、繩子、橛子等（參
  4:7-14, 25-26, 31-32）。
