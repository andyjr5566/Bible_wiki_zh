name: 哥轄子孫搬運至聖之物
type: 主題
secondary_types: []
aliases:
- 哥轄族搬運聖物
- 哥轄人抬至聖物
status: formal
definition: 指哥轄子孫在會幕起營時，受亞倫和他兒子指派，負責抬運「至聖之物」（約櫃、陳設餅桌子、燈臺、金香壇、銅壇及聖所器具）的職任。但必須由亞倫和他兒子先將聖物遮蓋妥當，哥轄人才可進來抬運，不可親手摸聖物，免得死亡（民4:4-15,
  19-20）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 詳細記載哥轄子孫被數點（4:34-36）、職任範圍（4:4-15）、亞倫父子包裹聖物的程序（4:5-14）、以利亞撒掌管油香膏油素祭（4:16）、以及不可觸摸聖物、不可進去觀看聖所的嚴禁（4:18-20）。
  relation: 顯示至聖物搬運的嚴格聖潔秩序：祭司包裹、利未人抬運、嚴禁直視觸摸，保護聖物榮耀與利未人性命。
