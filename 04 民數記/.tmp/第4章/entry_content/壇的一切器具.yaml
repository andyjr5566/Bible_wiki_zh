name: 壇的一切器具
type: 主題
secondary_types: []
aliases:
- 銅壇器具
- 祭壇器具
status: formal
definition: 民數記 4:14 列舉銅壇（燔祭壇）屬器：火鼎（火鑵）、肉鍤子（叉子）、鏟子、盤子（盆），並「一切屬壇的器具」。起營時先收去壇上灰，鋪紫色毯子，將器具擺在壇上，蒙海狗皮，穿杠抬運（4:13-14）。此清單對應出埃及記
  27:3, 38:3 製作規定，皆為銅製，區別於聖所金器，屬院子聖物，同由哥轄子孫抬運（4:15）。
development: 從出埃及記製作銅器，到民數記 4 章遮蓋程序（紫色毯子獨用於銅壇），再到列王紀上 7:45 所羅門聖殿銅器延續，希伯來書 9:13-14
  以牛羊血灑壇預表基督獻上自己潔淨良心。
accumulations:
- book: 民數記
  chapter: 4
  summary: 4:13-14 收灰、鋪紫色毯子、擺器具（火鼎、肉鍤子、鏟子、盤子）、蒙海狗皮、穿杠；4:15 由哥轄子孫抬運。
  relation: 本章銅壇遮蓋程序的完整器具清單，顯示院子聖物同樣受嚴格保護。
