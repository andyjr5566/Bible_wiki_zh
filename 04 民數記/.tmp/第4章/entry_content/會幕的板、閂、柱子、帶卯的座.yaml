status: formal
definition: 指會幕結構的主要組件：板（立板）、閂（橫閂）、柱子（支撐柱）、帶卯的座（帶榫卯結構的銅座）。民數記 4:31 列為米拉利子孫搬運的職任範圍。
development: 本章僅列舉名稱與歸屬職任，未述製造細節；製造規格見出埃及記 26:15-30、36-37。
