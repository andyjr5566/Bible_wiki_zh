name: 抬架（會幕器具搬運）
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 抬架（carrying frame / bars，原文指槓或專用攜帶架）是會幕起營搬運時，專用於承載無法直接穿槓搬運之聖所器具（如金燈檯及其一切剪子盤子油器、金香壇相關器具、聖所一切使用器具，以及祭壇遮蓋後的附屬器皿）的專用搬運工具（v10,
  12, 15；CT、GT）。聖所中至聖物件除約櫃、桌子、兩座壇設有固有環槓外，其餘精緻聖器皆須先經祭司以藍布與海狗皮嚴密包裹後，放置於抬架之上由哥轄子孫肩抬（CT、GT）。這確保一切聖物絕不直接接觸人的雙手或曠野地面，維護神絕對的聖潔規範與尊榮（BH）。
accumulations:
- book: 民數記
  chapter: 4
  summary: 本章第10、12、15節記載金燈檯與聖所各樣器具包裹海狗皮後，均須放置於抬架上由哥轄子孫扛抬。
  relation: 補充會幕聖器運輸的具體安全裝置，凸顯對聖物嚴禁直接觸摸的保護措施。
