name: 哥轄子孫被數
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記4:34-37記載摩西、亞倫與會眾首領遵耶和華吩咐，按家室、宗族數點哥轄子孫，從三十歲到五十歲、凡前來任職在會幕裡辦事者，共二千七百五十名。哥轄族負責搬運至聖之物（約櫃、桌子、燈臺、壇等），須由祭司先遮蓋後始可抬運。
development: 本章第1-20節先定哥轄族職任（搬運至聖物），第34-37節執行數點。數點結果作為服事編制依據，強調「照耶和華藉摩西所吩咐數點」與年齡資格（30-50歲）。
accumulations:
