status: formal
definition: 希伯來文 kap（כַּף），指掌心狀的勺/調羹，用於盛香或素祭。民數記 4:7 陳設餅桌子上器具：「將盤子、調羹、奠酒的爵，和杯擺在上頭」。
accumulations:
- book: 民數記
  chapter: 4
  summary: 陳設餅桌子上的器具之一，隨桌子以藍色毯子鋪設、朱紅色毯子蒙蓋、海狗皮覆蓋、穿上杠抬運。
  relation: 聖所內器具，屬哥轄子孫抬運之至聖物。
