name: 燈盞（ner）
type: 原文
secondary_types: []
aliases:
- 燈盞
status: formal
definition: 希伯來文 נֵר (nēr)，指燈臺上的燈盞，即盛油置火芯的小容器。民數記 4:9 記載起營時，亞倫和他兒子要用藍色毯子遮蓋燈臺與其上所用的燈盞、剪刀、蠟花盤，並一切盛油的器皿。
accumulations:
- book: 民數記
  chapter: 4
  summary: 起營時燈盞與燈臺器具一同被藍色毯子遮蓋，再用海狗皮包裹，放在抬架上。
  relation: 屬哥轄子孫搬運的至聖物之一，不可直接觸摸。
