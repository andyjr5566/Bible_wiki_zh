status: formal
definition: 希伯來文 tekelet（תְּכֵלֶת），指用藍色羊毛織成的毯子/布。民數記第4章多次出現：包裹約櫃（第6節）、鋪在陳設餅桌子上（第7節）、遮蓋燈臺及器具（第9節）、包裹金香壇（第11節）、包裹聖所一切器具（第12節）。藍色象徵天上屬性、神聖與律法（繫於衣服邊緣的藍繩，民15:38），為至聖物遮蓋的首層顏色。
development: 本章藍色毯子使用頻率最高，覆蓋所有聖所內部器具（約櫃、桌子、燈臺、金壇、器具）。第6節約櫃遮蓋順序：幔子→海狗皮→藍色毯子（最外層）；第7-8節桌子：藍色毯子（第一層）→器具→朱紅色毯子→海狗皮；第9-10節燈臺：藍色毯子遮蓋→海狗皮包裹；第11節金壇：藍色毯子→海狗皮；第12節器具：藍色毯子包裹→海狗皮。藍色毯子直接接觸聖物，象徵天上的覆庇。
