name: 八千五百八十名
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記第4章記載利未人三大家族（哥轄、革順、米拉利）中，從三十歲到五十歲、前來任職在會幕裡辦事、做抬物之工的男丁總數。經文第47-48節指出：「凡被數的利未人……從三十歲直到五十歲，凡前來任職、在會幕裡做抬物之工的，共有八千五百八十名。」此數字為哥轄族二千七百五十名（第36節）、革順族二千六百三十名（第39節）、米拉利族三千二百名（第43節）之總和，反映曠野時期利未人服事會幕的動員規模。
development: 本章透過三次分族點數（第34-45節），最後彙總得出此數，強調「照耶和華藉摩西所吩咐數點」（第37、41、45、49節），顯示服事秩序的神聖性與精確性。
accumulations:
- book: 民數記
  chapter: 4
  summary: 統計利未人三族服事會幕的合格男丁總數為八千五百八十名，為哥轄、革順、米拉利三族人數之和。
  relation: 本章核心統計數據，呈現利未人服事會幕的完整人力配置。
