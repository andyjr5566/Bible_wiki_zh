    type: 主題
    evidence: "民4:4-20 哥轄子孫在會幕搬運至聖之物，所辦的事乃是這樣：亞倫和他兒子要進去摘下遮掩櫃的幔子，用以蒙蓋法櫃...哥轄子孫要來抬，卻不可觸摸聖物，免得他們死亡。CT：哥轄族負責最聖物，預表信徒負責傳遞基督真理。KC：哥轄人不可觸摸聖物，須祭司先包裹。BH：約櫃三層遮蓋：幔子、海狗皮、純藍色毯子。"
