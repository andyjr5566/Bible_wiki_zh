book: 民數記
chapter: 4
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 奉耶和華命令，與亞倫共同數點利未哥轄、革順、米拉利三族30至50歲任職男子，並主持全族8,580名任職男子的精確登記，完全遵照神的命令分配職責（v1, 17, 21, 29, 34, 41, 45, 46, 49）。
  relation: 作為神與百姓之間的中保，忠心執行神對利未聖職秩序的全面規劃與落實。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 與摩西同受神命數點利未三族任職男子；其兒子以利亞撒與以他瑪分別監督哥轄、革順、米拉利子孫在會幕的搬運事工（v1, 5, 15, 17, 19, 27, 28, 33, 34, 37, 41, 45, 46）。亞倫父子本身負責先進聖所將至聖物包紮遮蓋，確保哥轄人安全抬運。
  relation: 作為大祭司，亞倫是在神與利未人之間建立聖潔屏障的關鍵人物，確保至聖物的神聖不受侵犯。
- title: 以利亞撒
  path: link_folder/人物/以利亞撒.md
  summary: 亞倫長子，在本章被指定親自看守並管理聖所內的點燈油、香料、常獻素祭與膏油，並總督哥轄子孫的搬運事工（v16）。
  relation: 預示大祭司的繼承角色，承擔至聖所事工最核心的監督責任，確保事奉秩序不因人員流動而中斷。
- title: 以他瑪
  path: link_folder/人物/以他瑪.md
  summary: 亞倫幼子，被指定督理革順子孫（v28）與米拉利子孫（v33）的所有搬運事工，負責分派兩族所看守的帳幕器具與骨架器件。
  relation: 彰顯祭司統轄利未人事奉的層次結構，由祭司代表神的權柄向利未支派發出具體分派。
- title: 利未三族分工
  path: link_folder/事件/利未三族分工.md
  summary: 本章詳細確立哥轄、革順、米拉利三族在會幕起營搬運上的精確職責分工：哥轄負責至聖物、革順負責織物與覆蓋、米拉利負責板閂骨架，並在祭司亞倫父子的統轄下完成8,580名任職男子的數點（v1-49）。
  relation: 三族分工是神對利未支派事奉秩序的完整制度化，確保每次起營移動都能有條不紊、絕無遺漏。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 本章的主要場景與焦點：神的會幕在起營移動時需要三族利未人按嚴格分工拆卸、包紮與搬運全部器具，從至聖物（哥轄）到幔子帷子（革順）到板閂骨架（米拉利），整個會幕結構完整地被分擔扛抬（v1-49）。
  relation: 會幕作為神同在的居所，其精密搬運制度彰顯神旅程中無處不在的聖潔要求與周密保護。
- title: 約櫃
  path: link_folder/主題/約櫃.md
  summary: 至聖物之首，起營時由大祭司亞倫父子先以遮掩幔子、海狗皮、純藍色毯子依次蒙蓋並調整槓位，再由哥轄子孫肩抬（v5-6）。嚴禁哥轄人觸摸或片時窺視，違者必死（v15, 20）。
  relation: 作為神同在的焦點，約櫃的搬運規範確立了神聖領域與人類事奉者之間必要的聖潔隔絕。
- title: 陳設餅桌子
  path: link_folder/主題/陳設餅桌子.md
  summary: 起營時以藍色毯子覆蓋（擺上盤、爵、碗與常設的餅），再蒙朱紅色毯子與海狗皮，把槓穿上由哥轄子孫肩抬（v7-8）。
  relation: 陳設餅桌子象徵神與百姓之間的立約交通，其嚴密包紮保護神聖筵席的潔淨不被曠野沾染。
- title: 金燈臺
  path: link_folder/主題/金燈臺.md
  summary: 起營時連同剪子、蠟花盤與盛燈油的一切器具用藍色毯子遮蓋，包在海狗皮裡，放在抬架上由哥轄子孫肩抬（v9-10）。
  relation: 金燈臺代表神的啟示之光，其精心包紮確保真理之光在旅途中得到完整護守。
- title: 金香壇（香壇）
  path: link_folder/主題/金香壇（香壇）.md
  summary: 起營時鋪藍色毯子、蒙海狗皮，把槓穿上由哥轄子孫肩抬（v11）。香壇相關的聖所一切使用器具另以藍色毯子包裹放在抬架上（v12）。
  relation: 金香壇象徵信徒的禱告上達神前，其搬運規範維護禱告事奉的聖潔與持續。
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: 起營時先收去壇上的灰，鋪紫色毯子，擺上所有屬壇的器具（鏟子、肉叉子、刮盤等），蒙上海狗皮穿上槓（v13-14），由哥轄子孫肩抬。
  relation: 銅壇代表救贖的完全，起營前必須先收灰潔淨，保持祭壇的聖潔尊榮，象徵十字架的工作永遠有效。
- title: 海狗皮頂蓋
  path: link_folder/主題/海狗皮頂蓋.md
  summary: 本章（v6, 8, 10, 11, 12, 14, 25）是海狗皮在聖物搬運中最集中使用的記載，作為一切至聖物和聖所器具的最外層防護覆蓋，保護聖物免受曠野風沙與侵污，同時成為搬運期間與世界隔絕的「不透明屏障」。
  relation: 海狗皮外表平凡粗糙但內藏神聖寶貴，預表基督謙卑人性外表下所包藏的無窮神聖榮耀（KC）。
- title: 內幔（隔聖所至聖所的幔子）
  path: link_folder/主題/內幔（隔聖所至聖所的幔子）.md
  summary: 本章v5記載起營時，亞倫及其兒子先進聖所，將遮掩櫃的內幔（即隔開至聖所與聖所的幔子）取下，直接蒙蓋約櫃作為第一層覆蓋，隨後再加海狗皮與純藍色毯子。
  relation: 內幔在搬運中轉化為約櫃的第一層保護，象徵神的榮耀隔絕只有在祭司中保的安排下才能被合宜地攜帶與同行。
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: 本章大量使用三色毯子包紮不同等級的聖物：純藍色（tekhelet）蒙蓋約櫃最外層及金壇等（v6, 7, 9, 11, 12）；朱紅色蒙蓋陳設餅桌子（v8）；紫色蒙蓋銅壇（v13）。
  relation: 三色在聖物搬運中承載神學意涵：藍色象徵神聖天啟、朱紅色象徵犧牲救贖、紫色象徵君王尊貴，構成會幕搬運期間的視覺神學敘事（KC）。
- title: 不可摸約櫃（撒下6：6-7）
  path: link_folder/互文/不可摸約櫃（撒下6：6-7）.md
  summary: 民數記4:15禁止哥轄子孫觸摸聖物，撒母耳記下6:6-7記載大衛時代烏撒因伸手扶住約櫃而遭神擊殺，成為違背本章禁令的歷史教訓。
  relation: 兩段經文形成嚴肅的互文印證：曠野時期的禁令在數百年後以真實的死亡案例彰顯其不可冒犯的嚴肅性，提醒後世尊重神所設立的聖潔邊界。
