    type: "事件"
    evidence: "民23:7-10 巴蘭便題起詩歌說：巴勒引我出亞蘭，摩押王引我出東山，說：來啊，為我咒詛雅各；來啊，怒罵以色列。神沒有咒詛的，我焉能咒詛？耶和華沒有怒罵的，我焉能怒罵？我從高處看他，從小山望他；這是獨居的民，不列在萬民中。丁良才：巴蘭被迫祝福，宣告以色列蒙福、獨特、得勝。"
    surfaces:
      - "題起詩歌"
      - "神沒有咒詛的我焉能咒詛"
      - "獨居的民"
      - "不列在萬民中"
  - name: "巴勒不滿帶巴蘭往毘斯迦"
    type: "事件"
    evidence: "民23:11-14 巴勒對巴蘭說：你向我做的是什麼事呢？我領你來咒詛我的仇敵，不料，你竟為他們祝福。...於是領巴蘭到了瑣腓田，上了毘斯迦山頂，築了七座壇；每座壇上獻一隻公牛，一隻公羊。丁良才：巴勒試圖換地點、換角度，企圖找到咒詛的切入點。    surfaces:
      - "你竟為他們祝福"
      - "往別處去"
      - "只能看見他們邊界上的人"
      - "毘斯迦山頂"
  - name: "巴蘭第二次詩歌預言"
    type: "事件"
    evidence: "民23:18-24 巴蘭就題詩歌說：巴勒，你起來聽；西撥的兒子，你聽我言。神非人，必不致說謊，也非人子，必不致後悔。他說話豈不照著行呢？他發言豈不要成就呢？我奉命祝福；神也曾賜福，此事我不能翻轉。丁良才：宣告神的信實、不變、祝福不可撤銷。"
    surfaces:
