name: 巴蘭築七壇獻祭
type: 事件
secondary_types: []
aliases:
- 巴蘭建七壇
- 七壇獻祭
status: formal
definition: 巴蘭指示巴勒在摩押地建造七座壇，並在每壇上獻一隻公牛、一隻公羊，作為求問耶和華、試圖咒詛以色列的儀式準備（民23:1-2, 14, 29-30）。此舉顯示巴蘭雖受雇於巴勒，仍試圖透過祭祀儀式尋求神的指示，但神最終掌控預言內容。
development: 此事件發生三次（淨光高處、毘斯迦山頂、毘珥山頂），每次皆築七壇、獻公牛公羊，形成「三次嘗試、三次祝福」的文學結構，凸顯神旨不可逆轉。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴蘭三次吩咐巴勒築七壇獻祭（第1-2、14、29-30節），作為求神發預言的前置儀式。
  relation: 本章核心敘事骨架，串連三輪預言場景。
