name: 巴勒不滿帶巴蘭往毘斯迦
type: 事件
secondary_types: []
aliases:
- 巴勒帶巴蘭上毘斯迦
- 巴勒換地點求咒詛
status: formal
definition: 巴勒聽完第一首詩歌大為不滿，指責巴蘭竟為敵人祝福（民23:11）。巴蘭回應只能傳達耶和華的話（第12節）。巴勒遂提議往別處去，只能看見以色列邊界上的人，在那裡為他咒詛（第13節）。於是帶巴蘭到瑣腓田、毘斯迦山頂，再築七壇獻祭（第14節）。
development: 此為第二輪預言的場景轉換，巴勒企圖透過改變視野範圍（只看邊界）與地點（毘斯迦），操控預言結果，顯示人謀算無法扭轉神旨。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴勒不滿第一次預言，帶巴蘭往毘斯迦山頂，再築七壇獻祭（第11-14節）。
  relation: 連接第一、二輪預言的敘事轉折，凸顯巴勒執迷不悟與神旨堅定的對比。
