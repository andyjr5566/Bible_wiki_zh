name: 神將話傳給巴蘭
type: 事件
secondary_types: []
aliases:
- 耶和華將話傳給巴蘭
- 神賜預言給巴蘭
status: formal
definition: 耶和華主動臨到巴蘭，將話語放在他口中，命令他回到巴勒那裡按所領受的說（民23:5, 16）。此事件發生三次（第5、16節及24章），強調預言源自神的主權啟示，非巴蘭自創或巴勒操控。
development: 三次神將話傳給巴蘭，分別對應三首詩歌預言，內容從「不咒詛/祝福」（第一次）、進到「神不說謊/祝福不可撤銷」（第二次）、最後到「彌賽亞星杖預言」（民24章），層層遞進彰顯神旨。
accumulations:
- book: 民數記
  chapter: 23
  summary: 耶和華兩次將話傳給巴蘭（第5、16節），指示他回去向巴勒宣說。
  relation: 本章預言權威的神學基礎，確立「神說話、人傳達」的先知模式。
