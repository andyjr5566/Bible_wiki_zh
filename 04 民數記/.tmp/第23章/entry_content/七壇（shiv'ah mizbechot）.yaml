status: formal
definition: 希伯來文「שִׁבְעָה מִזְבְּחוֹת」（shiv'ah mizbechot），意指七座祭壇。本章三次記載巴蘭要求巴勒築七壇，每壇獻一公牛一公羊（民23:1-2,14-15,29-30），象徵完整的獻祭儀式，試圖尋求神的啟示。
development: ''
accumulations:
- book: 民數記
  chapter: 23
  summary: 三次築七壇獻祭，分別在淨光高處、毘斯迦山、毘珥山。
  relation: 七壇作為儀式框架，連結巴蘭三次求問神的過程。
