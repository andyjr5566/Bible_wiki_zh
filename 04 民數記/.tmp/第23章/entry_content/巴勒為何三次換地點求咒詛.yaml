name: 巴勒為何三次換地點求咒詛
type: 解經爭議
secondary_types: []
aliases:
- 巴勒換地點原因
status: formal
definition: 經文記載巴勒帶巴蘭至淨光高處（民23:3）、毘斯迦山（民23:14）、毘珥山（民23:28）三地求咒詛。學者解釋包括：① 古近東信仰地點影響神靈顯現；②
  巴勒試圖尋找「視野」能見以色列全軍的高處；③ 象徵人謀算多端仍無法改變神旨意。本章未明說具體原因，故形成解經爭議。
