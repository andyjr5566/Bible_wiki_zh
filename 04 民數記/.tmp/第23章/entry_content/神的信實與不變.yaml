name: 神的信實與不變
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 本章巴蘭第二次詩歌宣告「神非人，必不致說謊，也非人子，必不致後悔；他說話豈不照著行呢？他發言豈不要成就呢？」（民 23:19）並說「我奉命祝福；神也曾賜福，此事我不能翻轉」（民
  23:20），顯示神的話語完全可靠、旨意不變、祝福不可撤銷，體現神的信實與不變屬性。
development: 民數記 23 章記載巴蘭三次嘗試咒詛以色列，神卻兩次透過詩歌預言宣告祂的信實：不說謊、不後悔、所說必成就、所賜福不可廢去。這成為舊約神學中「神的信實與不變」的重要見證經文。
