- 第一首詩歌預言
status: formal
definition: 巴蘭領受神話後，題起第一首詩歌（民23:7-10），內容宣告：神未咒詛雅各、未怒罵以色列；以色列是獨居的民、不列在萬民中；雅各的塵土無法數算、以色列四分之一不可計算；巴蘭願如義人之死而死。此詩確立以色列蒙福、分別為聖的身分。
development: 此為三首詩歌之首，回應巴勒「咒詛雅各、怒罵以色列」的請求，以「神未咒詛」直接反制，並以「獨居」、「塵土眾多」、「義人之終」三意象奠定以色列蒙福基調。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴蘭第一首詩歌預言（第7-10節），宣告以色列蒙福、分別、眾多、終局美好。
  relation: 本章預言序曲，直接回應巴勒咒詛意圖，確立神保護以色列的主題。
