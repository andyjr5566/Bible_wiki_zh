name: 神的祝福不可撤銷
type: 神學
secondary_types: []
aliases:
- 祝福不可翻轉
- 神賜福不可廢
status: formal
definition: 巴蘭宣告：「我奉命祝福；神也曾賜福，此事我不能翻轉。」（民23:20）基於神不說謊、不後悔的屬性（第19節），神對亞伯拉罕、以撒、雅各所立的約與賜下的祝福，具有不可廢棄的永久效力，任何咒詛、法術、人謀皆無法推翻。
development: 此真理貫穿救恩史：從亞伯拉罕之約（創12:3）、西乃之約、大衛之約，至新約在基督裡「應許都是是」（林後1:20）。本章語境中，直接回應巴勒三次求咒詛的徒勞，並預示以色列終極得勝。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴蘭第二首詩歌第20節宣告奉命祝福、神賜福不可翻轉。
  relation: 本章核心神學應用，將「神的信實」具體化為「祝福不可撤銷」的保證。
