name: 巴蘭第二次詩歌預言
type: 事件
secondary_types: []
aliases:
- 巴蘭二次詩歌
- 第二首詩歌預言
status: formal
definition: 在毘斯迦山頂，神再將話傳給巴蘭，巴蘭題起第二首詩歌（民23:18-24）。核心宣告：神非人、不說謊、不後悔、言必行、發必成（第19節）；巴蘭奉命祝福、神賜福不可翻轉（第20節）；神未見雅各罪孽、未見以色列奸惡、耶和華與他同在、有歡呼王的聲音（第21節）；神領他們出埃及、有野牛之力、無法術占卜可害、神為他行大事（第22-23節）；民如母獅、公獅興起、不吃野食、不喝血、不躺臥（第24節）。
development: 此詩較首詩更具神學深度，從神屬性（信實、不變）推演祝福不可撤銷，並宣告以色列無罪、神同在、得勝如獅，徹底粉碎咒詛企圖。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴蘭第二首詩歌預言（第18-24節），宣告神的信實、祝福不可撤銷、以色列無罪、得勝如獅。
  relation: 本章神學高峰，確立「神不說謊不後悔」與「祝福不可撤銷」核心教義，並預示以色列終極得勝。
