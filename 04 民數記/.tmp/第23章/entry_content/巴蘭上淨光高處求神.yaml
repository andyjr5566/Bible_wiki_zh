name: 巴蘭上淨光高處求神
type: 事件
secondary_types: []
aliases:
- 巴蘭往淨光高處
- 巴蘭求神迎見
status: formal
definition: 巴蘭在第一次獻祭後，囑咐巴勒站在燔祭旁，自己往「淨光的高處」去，盼望耶和華來迎見他、將話傳給他（民23:3-4）。「淨光」意指「光脊/高處」，是古代近東常見的求神之地。
development: 此為三次求神地點之首，巴蘭主動尋求神的啟示，卻只能傳達神賜下的祝福話語，反諷地成就神保護以色列的旨意。
accumulations:
- book: 民數記
  chapter: 23
  summary: 巴蘭離開壇旁，上淨光高處等候神迎見（第3-4節）。
  relation: 開啟第一輪預言的場景轉換點。
