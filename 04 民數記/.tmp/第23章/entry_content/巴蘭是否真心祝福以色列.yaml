status: formal
definition: 學者對巴蘭在三次預言中是否真心順服神、或僅被迫說出祝福存在分歧。本章顯示巴蘭雖口稱「耶和華所說的我必謹守」（民23:12,26），但其先前以占卜為業（民22:7）且後來教導巴勒使以色列犯罪（民31:16），引發關於其內心動機的爭議。
