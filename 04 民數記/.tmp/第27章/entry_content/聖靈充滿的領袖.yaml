name: 聖靈充滿的領袖
type: 神學
secondary_types: []
aliases:
- 被聖靈充滿的領袖
- 心中有聖靈的領袖
status: formal
definition: 民數記27:18神揀選約書亞的關鍵條件：「嫩的兒子約書亞是心中有聖靈的」。表明屬靈領袖的資格首重聖靈內住與充滿，而非單靠血統或才幹。此「聖靈」賦予領袖智慧、勇氣與屬靈分辨，使他能帶領神的百姓。舊約中聖靈臨到特定人物（如士師、先知、君王）為特定任務賜能，約書亞是明確被神指定為繼任領袖並因聖靈而合格的典範。
development: 神主動揀選（v.18）→ 摩西按手委任（v.23）→ 約書亞領受智慧之靈（申34:9），形成舊約領袖聖靈恩膏的傳承模式。
accumulations:
- book: 民數記
  chapter: 27
  summary: 神指定約書亞為繼任者的依據是「心中有聖靈」，確立屬靈領袖資格的神學基準。
  relation: 本章領導權交接的神學核心，連結按手傳承與牧人意象。
