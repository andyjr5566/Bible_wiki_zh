name: 產業繼承律例
type: 神學
secondary_types: []
aliases:
- 繼承律例
- 產業歸屬律法
status: formal
definition: 神因西羅非哈女兒的陳情，向摩西頒布的以色列人產業繼承典章（民27:6-11）。規定：1. 無子者產業歸女兒（v.8）；2. 無女兒歸弟兄（v.9）；3.
  無弟兄歸父親的弟兄（v.10）；4. 父親無弟兄歸族中最近親屬（v.11）。此律例確保家族產業不因無男性後裔而轉離本族，體現神對產業公義與家族延續的看顧。
development: 律例由具體個案（西羅非哈女兒）引出，神宣示「說得有理」（v.7），進而制定普遍適用的法律條文，成為以色列人「律例典章」（v.11）。
accumulations:
- book: 民數記
  chapter: 27
  summary: 神頒布產業繼承次序律例：女兒→弟兄→伯叔→最近親屬，作為永遠典章。
  relation: 本章神學核心，回應女兒陳情並建立繼承法理基礎。
