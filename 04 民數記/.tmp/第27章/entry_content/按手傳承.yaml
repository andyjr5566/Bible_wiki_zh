name: 按手傳承
type: 事件
secondary_types: []
aliases:
- 按手委任
- 按手授職
status: formal
definition: 民數記27:18-23記載，神吩咐摩西將約書亞領來，按手在他頭上（v.18, 23），使他站在祭司以利亞撒和全會眾面前，囑咐他，將尊榮給他幾分。這儀式在公開場合進行，象徵權柄、靈恩與職分的傳遞。按手在舊約有獻祭認同（利1:4）、傳授智慧（申34:9）、委任職分（徒6:6；提前4:14）等意義。此處結合聖靈恩膏（v.18）與制度權柄（v.20-21），成為聖經領袖繼任按手傳承的範式。
development: 神命令（v.18）→ 摩西執行按手（v.23）→ 公開委任於祭司會眾前（v.19-22）→ 賜予尊榮權柄（v.20）→ 建立烏陵求問機制（v.21），完成屬靈與行政雙重傳承。
accumulations:
- book: 民數記
  chapter: 27
  summary: 摩西按手約書亞，公開委任繼任者，傳遞權柄與尊榮，建立領袖交接儀式範式。
  relation: 本章領導權交接的具體儀式行動，連結聖靈充滿的領袖與祭司求問制度。
