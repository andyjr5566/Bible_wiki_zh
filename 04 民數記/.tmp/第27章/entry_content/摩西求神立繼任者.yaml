name: 摩西求神立繼任者
type: 事件
secondary_types: []
aliases:
- 摩西禱告求繼任者
status: formal
definition: 民數記27:15-17記載，摩西得知自己即將去世後，禱告懇求「耶和華萬人之靈的神」立一個人治理會眾，能在會眾面前出入、引導他們，免得耶和華的會眾如同沒有牧人的羊群一般。這禱告顯出摩西對百姓屬靈福祉的牧者之心，也引出神揀選約書亞的回應。
development: 摩西不為自己求延壽，只為百姓求領袖；使用「萬人之靈的神」稱呼神，強調神掌管生命氣息與領袖恩賜；引用「牧人意象」形容百姓需要。
accumulations:
- book: 民數記
  chapter: 27
  summary: 摩西代禱求神立繼任領袖，免得百姓如無牧之羊。
  relation: 本章領導權交接的禱告發端，直接導致約書亞被立。
