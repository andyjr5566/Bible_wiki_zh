name: 西羅非哈女兒求產業
type: 事件
secondary_types: []
aliases:
- 西羅非哈女兒來求產業
status: formal
definition: 民數記第27章1-5節記載，瑪拿西族西羅非哈的五個女兒（瑪拉、挪阿、曷拉、密迦、得撒）因父親在曠野去世且無兒子，來到會幕門口，在摩西、祭司以利亞撒、眾首領與全會眾面前陳情，請求在父親的弟兄中得著產業，免得父親的名從族中被除掉。這事件促使神頒布產業繼承律例，確立女兒在無子情況下的繼承權。
development: 事件始於女兒們主動陳情（v.1-4），摩西將案件呈到耶和華面前（v.5），神判斷女兒說得有理並頒布律例（v.6-11），成為以色列人世世代代的典章。
accumulations:
- book: 民數記
  chapter: 27
  summary: 西羅非哈五女向摩西與會眾陳情，請求繼承父親產業，神判准並頒布繼承律例。
  relation: 本章前半段核心事件，引出產業繼承律例的建立。
