name: 約書亞被立為繼任者
type: 人物
secondary_types: []
aliases:
- 約書亞繼任摩西
- 繼任領袖約書亞
status: formal
definition: 民數記27:18-23記載，神指示摩西將嫩的兒子約書亞領來，因他「心中有聖靈」。摩西按手在他頭上，使他站在祭司以利亞撒和全會眾面前囑咐他，將尊榮給他幾分，使以色列全會眾都聽從他。約書亞要站在以利亞撒面前，以利亞撒憑烏陵的判斷在耶和華面前為他求問，他和全會眾遵命出入。這確立約書亞為摩西正式繼任者，兼具屬靈恩膏（聖靈）與制度權柄（按手、烏陵）。
development: 經歷神揀選（v.18）→ 摩西按手傳承（v.19-20）→ 公開委任於祭司與會眾前（v.21-22）→ 正式生效（v.23），完成領導權有序交接。
accumulations:
- book: 民數記
  chapter: 27
  summary: 神揀選約書亞為繼任者，摩西按手委任，賜予尊榮與權柄，建立祭司求問機制。
  relation: 本章高潮，完成從摩西到約書亞的領導權移交。
