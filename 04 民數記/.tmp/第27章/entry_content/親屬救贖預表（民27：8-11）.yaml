definition: 民數記 27:8-11 規定無子者之產業依序歸女兒、弟兄、父親的弟兄、族中最近親屬，這順序預表新約中基督作親屬救贖者（如路得記 4、希伯來書
  2:11-12）為信徒贖回產業。
