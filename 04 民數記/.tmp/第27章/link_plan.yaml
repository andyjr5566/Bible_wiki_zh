  suggested_type: 神學
  evidence: 民27:8-11 神頒布繼承次序律例：1)有女兒歸女兒 2)無女歸弟兄 3)無弟兄歸伯叔 4)無伯叔歸最近親屬。這律例保障家族名分不滅、產業不轉離支派，預表基督裡男女同為後嗣（加3:28）、親屬救贖（得3-4章）。
  surfaces:
