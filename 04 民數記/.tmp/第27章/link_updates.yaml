"updates":
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "本章重點：以利亞撒作為大祭司，與摩西同聽西羅非哈女兒求產業案件（民27:1-2）；後為約書亞按手立繼任者（民27:19-23），憑烏陵在耶和華面前為約書亞求問（民27:21）。以利亞撒代表祭司職分在領袖交棒與產業案件中的屬靈權柄。"
  "relation": "本章是以利亞撒接任大祭司（民20:28）後，首次參與重大司法案件（西羅非哈女兒產業權）與領袖交棒儀式（約書亞按手）。祭司以利亞撒與先知摩西的雙重見證（民27:2,19-23），預表基督作大祭司與君王的雙重職分（來7:1-3）。烏陵求問機制（民27:21）確立約書亞領導權的神聖來源，延續民26章普查中祭司權柄的功能。"
- "title": "會幕門口"
  "path": "link_folder/地點/會幕門口.md"
  "summary": "本章重點：西羅非哈五女兒站在會幕門口，在摩西、以利亞撒、眾首領、全會眾面前為父陳情求產業（民27:2）。會幕門口作為神與人相會、審判案件、公開裁決的神聖場所。"
  "relation": "本章將會幕門口定位為「產業繼承律例」頒布的歷史現場。女兒們在此公開陳情（民27:2-4），摩西呈到耶和華面前（民27:5），神當面回應（民27:6-11），全會眾見證（民27:2）。此地點連結出29章祭司就職、民6章拿細耳人滿期、民27章產業案件與領袖交棒，構成「神聖門檻」的救恩史功能：審判、立約、委任、相會。"
