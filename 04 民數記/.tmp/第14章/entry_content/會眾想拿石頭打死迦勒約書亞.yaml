name: 會眾想拿石頭打死迦勒約書亞
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 全會眾拒絕迦勒、約書亞的勸勉，反說「拿石頭打死他們二人」（民14:10a）。顯示百姓頑梗悖逆已達極點，不僅拒絕神，更要除滅神的忠心僕人。
development: 正當會眾動手時，耶和華的榮光在會幕中向以色列眾人顯現，神親自介入阻止暴行並發出審判。
accumulations:
- book: 民數記
  chapter: 14
  summary: 會眾因信心見證而暴怒，欲石擊迦勒約書亞。
  relation: 觸發神榮光顯現與審判宣告的直接原因。
