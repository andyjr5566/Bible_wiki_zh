name: 代禱改變神審判
type: 神學
secondary_types: []
aliases:
- 摩西代禱轉移審判
- 代禱蒙神垂聽
status: formal
definition: 民數記 14:11-20 記載，神因百姓不信欲用瘟疫擊殺、另立摩西為大國（民 14:12）。摩西為百姓代禱，理由：1) 埃及人與列邦會誤解神無力領民入地（民
  14:13-16）；2) 引用神「不輕易發怒、豐盛慈愛、赦免罪孽」的屬性（民 14:17-18）；3) 求神照大慈愛赦免，如從埃及至今常赦免他們（民 14:19）。神回應：「我照著你的話赦免了他們」（民
  14:20）。代禱改變了「滅絕全民」的審判，但不改變「不信一代倒斃曠野」的管教（民 14:22-35）。
development: 摩西代禱預表基督永遠活著為信徒代求（來 7:25），基督代禱不僅延緩審判，更在十字架上承擔審判，使信者得永生；但神仍管教兒女（來 12:6）。
accumulations:
- book: 民數記
  chapter: 14
  summary: 摩西為百姓代禱，神赦免不滅絕全民，但維持對不信者的管教審判。
  relation: 本章轉折點，連結神忿怒宣告（11-12節）與赦免宣告（20節）及後續管教（21-35節）。
