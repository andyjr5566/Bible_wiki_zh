name: 耶和華榮光在會幕顯現
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 會眾欲石擊迦勒、約書亞時，耶和華的榮光忽然在會幕中向以色列眾人顯現（民14:10b）。神的同在以可見榮光彰顯，介入審判與拯救，證實迦勒、約書亞的話出於神。
development: 榮光顯現後，神向摩西宣告要擊殺百姓另立摩西為大國，開啟摩西代禱與神赦免定罪的對話。
accumulations:
- book: 民數記
  chapter: 14
  summary: 神榮光在會幕顯現，介入百姓悖逆與暴行。
  relation: 本章神學高峰，神親自降臨處理悖逆，奠定後續審判與憐憫的基調。
