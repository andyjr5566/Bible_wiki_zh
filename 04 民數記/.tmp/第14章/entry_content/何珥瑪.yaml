status: formal
definition: 何珥瑪（希伯來文 חָרְמָה，Hormah，意為「毀滅」、「分別為聖」、「全然毀滅」）位於迦南南地、亞瑪力人與迦南人居住之區域（民 14:45）。民數記
  14:45 記載，以色列人擅自上山進攻，被亞瑪力人、迦南人擊退，「直到何珥瑪」。此地名見證屬肉體悔改的失敗。後在民數記 21:1-3，以色列人順服神、許願毀滅迦南人，神聽禱告，將迦南人交付他們，遂將該地名為何珥瑪（意為「分別為聖/毀滅」），應驗地名含義。
development: 何珥瑪從「敗軍之地」（民 14）轉為「得勝毀滅之地」（民 21），對比不信與順服的結果。
accumulations:
- book: 民數記
  chapter: 14
  summary: 百姓擅自上山被擊退之地，地名意「毀滅」，見證屬肉體悔改的失敗。
  relation: 本章結局地點，連結百姓擅自上山事件與後來民 21 章得勝對比。
