name: 神命百姓轉向紅海曠野
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 因亞瑪力人、迦南人住在谷中，神命百姓「明天你們要轉回，從紅海的路往曠野去」（民14:25）。這標誌著進取迦南的嘗試正式終結，四十年曠野漂流生活開始；也是神審判「你們的屍首必倒在這曠野」（32）的具體啟動步驟。
development: 百姓事後「屬肉體的悔改」擅自上山（40-44），卻因神不與他們同在，被亞瑪力人、迦南人擊敗直到何珥瑪（45），印證轉向紅海曠野命令的不可逆性。
accumulations:
- book: 民數記
  chapter: 14
  summary: 神命百姓轉回紅海曠野路，啟動四十年漂流審判。
  relation: 審判執行的起點，與「一日頂一年」四十年漂流直接掛鉤。
