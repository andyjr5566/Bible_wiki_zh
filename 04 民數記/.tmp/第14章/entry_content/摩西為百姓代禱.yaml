name: 摩西為百姓代禱
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 摩西為百姓向耶和華代禱（民14:13-19），理由包括：埃及人與列邦會誤解神無力領民進地（13-16）；引述神自己啟示的屬性「不輕易發怒、豐盛慈愛、赦免罪孽過犯」（17-18，參出34:6-7）；求神照大慈愛赦免，如從埃及以來常赦免他們（19）。這是舊約最偉大的代禱之一，預表基督的代求（來7:25）。
development: 神應允摩西的代禱說「我照著你的話赦免了他們」（20），但隨即宣告不信者必死在曠野（21-23）。
accumulations:
- book: 民數記
  chapter: 14
  summary: 摩西為悖逆百姓代禱，引述神榮耀與屬性求赦免。
  relation: 本章神學核心，展現中保代禱改變審判進程，預表基督永遠活著替我們代求。
