name: 迦勒得進迦南地
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華單獨提到迦勒：「因他另有一個心志，專一跟從我，我就把他領進他所去過的那地；他的後裔也必得那地為業」（民14:24）。後又重申：惟有迦勒和約書亞才能進去（30），且報惡信者死、迦勒約書亞存活（38）。這是信心得勝的具體應驗。
development: 迦勒的「另有一個心志」（不同於百姓的不信）成為得地依據；四十五年後約書亞記14章迦勒得希伯崙為業，完全應驗。
accumulations:
- book: 民數記
  chapter: 14
  summary: 神應許迦勒因專一跟從神，必得進迦南地並得為業。
  relation: 信心與不信分水嶺的正面典範，預表屬天基業的得勝者。
