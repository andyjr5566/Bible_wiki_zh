name: 迦勒何時進迦南地
type: 解經爭議
secondary_types: []
aliases:
- 迦勒進迦南時間
- 迦勒得地時間爭議
status: formal
definition: 關於迦勒何時實際進入迦南地、得希伯崙為業，解經家有不同看法：(1) 約書亞記 14:6-15 記載迦勒在迦南分地時（征服戰後約 7 年），向約書亞求給希伯崙，時年
  85 歲，推算窺探地時 40 歲，曠野漂流 40 年，入地後征戰 5-7 年才得地；(2) 民數記 14:24 神應許「我就把他領進他所去過的那地」，有人視為進入迦南地的應許，非即時實現；(3)
  迦勒在曠野 40 年期間是否曾短暫進入迦南邊境（如民 13:22 迦勒獨自上希伯崙），屬推測性細節，經文未明確記載。核心爭議在於「神應許迦勒進地」與「實際得地為業」的時間差距，以及曠野漂流期間迦勒的行蹤。
development: 此爭議涉及曠野漂流 40 年期間兩代人的交替、迦勒作為「另有一個心志」少數派的特殊地位、以及約書亞記分地記載的時間順序。解經需區分「神的應許宣告」（民
  14:24）、「曠野漂流存活」（民 14:30, 38）、「實際進地征戰」（書 14:6-15）三個階段。
accumulations:
- book: 民數記
  chapter: 14
  summary: 第 24 節神應許迦勒「我就把他領進他所去過的那地」；第 30 節「惟有耶孚尼的兒子迦勒和嫩的兒子約書亞才能進去」；第 38 節「其中惟有嫩的兒子約書亞和耶孚尼的兒子迦勒仍然存活」。
  relation: 提供神對迦勒進地的應許宣告與曠野存活見證，為爭議討論的經文依據。
