name: 神的忍耐與公義並行
type: 神學
secondary_types: []
aliases:
- 忍耐與公義
- 神屬性：忍耐公義並存
status: formal
definition: 民數記 14 章展現神忍耐與公義並行：神「不輕易發怒，並有豐盛的慈愛，赦免罪孽和過犯」（民 14:18，引用出 34:6-7），摩西代禱引用此屬性求赦免（民
  14:17-19），神回應「我照著你的話赦免了他們」（民 14:20）——顯示忍耐；但緊接宣告「遍地要被我的榮耀充滿」（民 14:21），並審判「試探我這十次」者不得見應許地（民
  14:22-23），成年人屍首倒在曠野（民 14:29-35）——顯示公義。赦免不等於免除管教後果。
development: 此神學張力貫穿舊約，摩西代禱預表基督代禱（來 7:25），基督在十字架上滿足公義、成就忍耐，使信者得赦免且不至滅亡，仍可能經歷管教（來 12:5-11）。
accumulations:
- book: 民數記
  chapter: 14
  summary: 摩西引用神屬性代禱，神赦免卻仍執行審判，彰顯忍耐與公義並行。
  relation: 本章神學核心，連結摩西代禱、赦免宣告、審判執行三大段落。
