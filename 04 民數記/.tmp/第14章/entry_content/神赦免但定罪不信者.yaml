name: 神赦免但定罪不信者
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華說「我照著你的話赦免了他們」（民14:20），但指著永生起誓：遍地要被神榮耀充滿；凡看見神榮耀神蹟仍試探神十次、不聽話的人，斷不得看見應許之地，凡藐視神的、一個也不得看見（21-23）。赦免（不即時滅絕）與定罪（失去產業）並存，彰顯神忍耐與公義並行。
development: 隨後具體宣告：二十歲以上發怨言者屍首倒在曠野（29-30），唯迦勒、約書亞得進地（24,30,38）；兒女漂流四十年，一日頂一年（33-34）。
accumulations:
- book: 民數記
  chapter: 14
  summary: 神赦免不即時滅絕，但定罪不信一代必死在曠野，失去產業。
  relation: 審判與憐憫的張力，確立四十年漂流與新一代得地的框架。
