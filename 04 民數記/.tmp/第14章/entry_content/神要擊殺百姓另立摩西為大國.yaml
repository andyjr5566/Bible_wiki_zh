name: 神要擊殺百姓另立摩西為大國
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華對摩西說，百姓藐視祂、不信祂，祂要用瘟疫擊殺他們，使他們不得承受迦南地，並叫摩西的後裔成為大國、比他們強勝（民14:11-12）。這是神對持續悖逆（試探十次）的公義審判宣告。
development: 摩西隨即為百姓代禱，引述神的屬性（不輕易發怒、豐盛慈愛）求赦免；神應允赦免但宣告不信者必死在曠野。
accumulations:
- book: 民數記
  chapter: 14
  summary: 神宣告要瘟疫擊殺悖逆百姓，另立摩西為大國。
  relation: 審判宣告與摩西代禱的對話核心，顯明神的公義與摩西中保角色。
