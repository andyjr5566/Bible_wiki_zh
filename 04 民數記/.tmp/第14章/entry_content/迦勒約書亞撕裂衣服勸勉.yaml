name: 迦勒約書亞撕裂衣服勸勉
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 窺探地的迦勒、約書亞撕裂衣服，向全會眾宣告迦南地極美，勸勉百姓不可背叛耶和華、也不要怕居民，因耶和華與他們同在（民14:6-9）。這是信心的見證，與十探子的惡報形成強烈對比。
development: 勸勉未被接納，反激起會眾想用石頭打死他們；神的榮光隨即顯現介入。
accumulations:
- book: 民數記
  chapter: 14
  summary: 迦勒約書亞撕裂衣服，見證美地並勸勉百姓信靠神。
  relation: 信心與不信的分水嶺事件，確立迦勒約書亞得進迦南的依據。
