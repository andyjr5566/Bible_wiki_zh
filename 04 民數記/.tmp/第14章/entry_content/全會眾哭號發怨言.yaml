name: 全會眾哭號發怨言
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 以色列全會眾在聽完十探子惡報後，當夜大聲喧嚷、哭號，並向摩西、亞倫發怨言，說寧願死在埃及或曠野，不願進迦南地；甚至彼此商議立首領回埃及（民14:1-4）。這顯露百姓因不信而拒絕神的應許，將神的拯救視為禍害。
development: 此事件為全章審判的導火線，引發後續神的忿怒、摩西代禱、以及四十年曠野漂流的判決。
accumulations:
- book: 民數記
  chapter: 14
  summary: 百姓聽惡報後集體哭號、發怨言、想回埃及，拒絕進迦南地。
  relation: 本章起始事件，導致神審判與摩西代禱的連續劇情。
