"chapter": !!int "14"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民14章記載摩西亞倫俯伏在全會眾面前，摩西以神榮耀、屬性、應許為據代禱求赦免百姓，神照話赦免。摩西傳達神命百姓轉向紅海曠野，百姓擅自上山摩西勸阻。四份註解均記載摩西作中保領袖擋在破口前，預表基督代禱(來7:25)。"
  "relation": "本章為摩西代禱事奉的高峰：面對神要擊殺百姓另立摩西為大國的提議，摩西不為自己謀利，反以神榮耀與列邦見證為據代求，神照話赦免。展現摩西「極其謙和，勝過世上眾人」(民12:3)的中保胸襟，與民12章米利暗事件形成呼應。"
- "title": "約書亞"
  "path": "link_folder/人物/約書亞.md"
  "summary": "民14:6,30,38 記載嫩的兒子約書亞與迦勒撕裂衣服勸勉百姓，神說唯有嫩的兒子約書亞和耶孚尼的兒子迦勒能進那地，報惡信探子死時約書亞仍存活。丁良才：預表基督拯救；啟導本：明日的領袖；串珠註釋：約書亞意為耶和華是拯救。"
  "relation": "本章確立約書亞與迦勒作為「信心派」代表的地位：在全會眾想拿石頭打死他們時(10節)，神親自介入保護；神起誓唯有他們二人能進應許地(30節)。與民11章約書亞請摩西禁止說預言、民13章改名、民27章接續摩西領袖地位形成完整軌跡。"
- "title": "迦勒"
  "path": "link_folder/人物/迦勒.md"
  "summary": "民14:6,24,30,38 記載耶孚尼的兒子迦勒與約書亞撕裂衣服勸勉，神說僕人迦勒因另有一個心志專一跟從我，必領進那地，後裔得為業。報惡信探子死時迦勒仍存活。丁良才：迦勒全心跟從耶和華；啟導本：專一跟從神的代價與獎賞。"
  "relation": "本章為迦勒生平最高榮譽時刻：神親自稱他為「我的僕人迦勒」(24節)，賜予「另有一個心志、專一跟從我」的最高評價，應許他與後裔得地為業。與民13章迦勒勸勉上去得地、書14章迦勒八十五歲求希伯崙山地形成「全心跟從耶和華」的完整見證。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民14:5,26 摩西亞倫俯伏在全會眾面前，耶和華對摩西亞倫說：這惡會眾向我發怨言到幾時呢？四份註解均記載亞倫與摩西同為中保領袖面對百姓悖逆，但在代禱中摩西獨自發言，亞倫同在卻無獨立代禱記載。"
  "relation": "本章顯示亞倫作為大祭司與摩西同俯伏代求(5節)，但神對話對象為摩西亞倫(26節)，代禱內容僅記摩西所說(13-19節)。與出埃及記亞倫作摩西代言人、行神蹟、見法老形成對比，顯示亞倫在民數記中角色轉為配搭者而非主導者。"
- "title": "紅海曠野"
  "path": "link_folder/地點/紅海曠野.md"
  "summary": "民14:25 神命百姓轉回，從紅海的路往曠野去。此為加低斯巴尼亞拒絕進地後的撤退路線，標誌著四十年漂流的起點。丁良才：神命令撤退，不再強迫進地；啟導本：不信者失去進地機會。"
  "relation": "本章將紅海曠野從出埃及記渡海得救地(出14-15)轉為民數記不信審判下的漂流起點：民14:25「明天你們要轉回，往紅海曠野去」開啟四十年漂流。地理上連接加低斯巴尼亞(南)與西乃山(西)，神學上從「出埃及得救」轉為「不信漂流」的反轉見證。"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "民14章全章背景為加低斯巴尼亞(參13:26)。此為探子報告地、百姓哭號發怨言地、神審判漂流四十年地、迦勒約書亞信心得勝地。丁良才：加低斯位於巴蘭曠野內；艾基斯：加低斯與普嫩同緯度；啟導本：迦南邊境綠洲。"
  "relation": "本章將加低斯確立為「信心抉擇分水嶺」：探子在此展示果實證實應許(13:27)，十探子惡信使百姓心消化(13:31-14:4)，神審判一代人倒斃曠野(14:29-35)，迦勒約書亞因信得生(14:24,30)。成為聖經神學中「加低斯巴尼亞試驗」的經典定義點(來3:7-19)。"
- "title": "摩西代禱預表基督代禱（來7：25）"
  "path": "link_folder/互文/摩西代禱預表基督代禱（來7：25）.md"
  "summary": "民14:13-19 摩西以神榮耀、屬性、應許為據代禱，神說：我照你的話赦免了。來7:25 基督長遠活著，替他們祈求，能以拯救到底。丁良才：中保代禱能轉移審判；啟導本：摩西預表基督作完全中保；串珠註釋：代禱是屬靈權柄運用。"
  "relation": "本章為摩西代禱最完整記載：面對神要擊殺百姓另立摩西為大國的提議(12節)，摩西不為自己謀利，反以神在列邦榮耀(13-16節)、神屬性忍耐慈愛赦免(17-18節)、神從埃及至今常赦免(19節)三重依據代求，神照話赦免(20節)。預表基督作大祭司長遠活著替信徒代求(來7:25)，在神面前擋在破口前(結22:30)。"
