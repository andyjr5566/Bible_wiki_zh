    evidence: "民14:36-37 那些報惡信的探子遭瘟疫死在耶和華面前。丁良才：十探子非故意作惡，乃不信眼光所致；啟導本：帶領百姓跌倒者責任更重；串珠註釋：惡信非謊言乃不信視角。"
    surfaces:
      - "十探子惡信動機"
      - "不信眼光"
      - "帶領跌倒責任"
      - "非故意作惡"