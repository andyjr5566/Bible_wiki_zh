"book": "民數記"
"chapter": !!int "33"
"updates":
- "title": "蘭塞"
  "path": "link_folder/地點/蘭塞.md"
  "summary": "本章重點：以色列人從蘭塞起行（民33:3,5），正月十五日逾越節次日出發，在埃及人眼前昂然無懼而去。蘭塞作為出埃及的起行地，見證神擊殺埃及長子、敗壞他們的神（民33:4）。"
  "relation": "本章將蘭塞定位為「出埃及路程」的第一站（民33:3,5），連結創47:11雅各家居住蘭塞、出1:11以色列人建蘭塞積貨城、出12:37出埃及起行地。  從蘭塞到疏割的轉接，見證神從埃及拯救、開啟曠野旅程的歷史起點。"
- "title": "疏割"
  "path": "link_folder/地點/疏割.md"
  "summary": "本章重點：以色列人從蘭塞起行，安營在疏割（民33:5-6）。疏割作為出埃及後第一個安營地，意為「棚/帳棚」，預表曠野漂流的臨時性與神的保護。  "
  "relation": "本章將疏割作為出埃及路線的轉接站（民33:5-6），連結創33:17雅各在疏割搭棚、出12:37/13:20/14章疏割為出埃及第一站、書13:27疏割屬迦得支派。  疏割見證神帶領百姓從埃及奴役進入曠野學校的第一步。"
- "title": "以琳"
  "path": "link_folder/地點/以琳.md"
  "summary": "本章重點：以色列人來到以琳，有十二股水泉、七十棵棕樹，在那裡安營（民33:9-10）。以琳的豐富水源與棕樹，在曠野中成為神供應豐盛的見證。"
  "relation": "本章將以琳作為曠野旅程中「神豐盛供應」的關鍵站口（民33:9-10），連結出15:27以琳十二泉七十棕樹、民33:8-9從瑪拉到以琳的轉折。  以琳預表基督作生命泉源（約4:14、7:37-38）、教會在曠野得享神豐盛恩典。"
- "title": "瑪拉"
  "path": "link_folder/地點/瑪拉.md"
  "summary": "本章重點：以色列人在伊坦曠野走了三天，安營在瑪拉（水苦），神指示摩西將一棵樹丟在水中，水就變甜（民33:8-9，參出15:23-25）。預表基督十字架使苦水變甜（彼前2:24）。"
  "relation": "本章將瑪拉作為「曠野試煉與神醫治」的關鍵站口（民33:8-9），連結出15:23-25瑪拉水苦變甜、來12:15免得有毒根生出擾亂。  瑪拉見證神在曠野中將試煉轉為恩典、苦水變甜的救贖樣式。"
- "title": "利非訂"
  "path": "link_folder/地點/利非訂.md"
  "summary": "本章重點：以色列人安營在利非訂，百姓沒有水喝，神吩咐摩西擊打磐石出水（民33:14-15，參出17:1-7）。磐石預表基督（林前10:4），擊打預表十字架。"
  "relation": "本章將利非訂作為「磐石出水、神供應生命水」的關鍵站口（民33:14-15），連結出17:1-7擊打磐石、林前10:4磐石就是基督、約7:37-39信我的人腹中要流出活水江河。  利非訂見證神在曠野中擊打磐石（基督）賜下生命水的救贖真理。"
- "title": "西乃的曠野"
  "path": "link_folder/地點/西乃的曠野.md"
  "summary": "本章重點：以色列人安營在西乃曠野，領受律法、建造會幕、住留一年（民33:15-16，參出19-民10）。西乃是舊約之約、律法頒布之地。"
  "relation": "本章將西乃曠野作為「舊約立約、律法頒布」的核心站口（民33:15-16），連結出19-民10西乃住留一年、加3:19-25律法為蒙子名分的師傅、來12:18-24西乃山與錫安山對比。  西乃曠野見證神與以色列立約、賜下律法作導師引到基督。"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "本章重點：以色列人安營在尋的曠野，就是加低斯（民33:36-37）。探子惡報、百姓拒絕進迦南、神判四十年漂流（民13-14）。加低斯是曠野漂流的轉折點。"
  "relation": "本章將加低斯作為「曠野漂流轉折、探子惡報、神判四十年」的關鍵站口（民33:36-37），連結民13-14探子惡報、來3:16-19因不信不能進入安息、民32:8-13摩西責備流便迦得像加低斯探子。  加低斯見證不信的後果、神公義審判與恩典並存。"
- "title": "何珥山"
  "path": "link_folder/地點/何珥山.md"
  "summary": "本章重點：祭司亞倫在何珥山死，享壽123歲（民33:37-39）。何珥山位於以東邊界，是亞倫祭司職分終結、以利亞撒接任之地。"
  "relation": "本章將何珥山作為「亞倫死、祭司職分傳承」的關鍵站口（民33:37-39），連結民20:22-29亞倫死於何珥山、來7:23-24基督作永遠大祭司、民20:25-28以利亞撒接任。  何珥山見證舊約祭司職分終結、基督永遠祭司職分的優越性。"
- "title": "亞巴琳山"
  "path": "link_folder/地點/亞巴琳山.md"
  "summary": "本章重點：以色列人安營在尼波對面的亞巴琳山裡（民33:47-48）。摩西在尼波山（亞巴琳山脈）觀看應許之地、死在那裡（申34:1-5）。預表基督升天前賜福門徒（路24:50-51）。"
  "relation": "本章將亞巴琳山作為「摩西觀望應許之地、生平終結」的關鍵站口（民33:47-48），連結申34:1-5摩西在尼波山死、路24:50-51基督升天賜福、來11:13-16信心先驅遠望應許。  亞巴琳山見證神僕人摩西生平的完成、應許之地的遠望與得著。"
- "title": "摩押平原"
  "path": "link_folder/地點/摩押平原.md"
  "summary": "本章重點：以色列人在摩押平原沿約但河安營，從伯耶施末直到亞伯什亭，對面就是耶利哥（民33:48-49）。這是進迦南前最後安營地。"
  "relation": "本章將摩押平原作為「進迦南前最後預備、第二次普查、分地指示、摩西遺囑」的關鍵站口（民33:48-49），連結民22:1/26:3/33:50-56摩押平原諸事件、書1-3渡河征服、來4:1-11進入安息。  摩押平原見證曠野漂流結束、新一代預備得著應許。"
- "title": "約但河"
  "path": "link_folder/地點/約但河.md"
  "summary": "本章重點：耶和華在摩押平原約但河邊曉諭摩西：你們過約但河進迦南地（民33:50-51）。約但河是曠野與應許之地分界，渡河預表信徒與基督同死同活（羅6:3-4）。"
  "relation": "本章將約但河作為「曠野與應許之地分界、渡河得業」的關鍵站口（民33:50-51），連結書1-3渡河征服、羅6:3-4與基督同死同活、來4:1-11進入安息。  約但河見證從曠野漂流到得著應許、從死到生的救恩轉折。"
