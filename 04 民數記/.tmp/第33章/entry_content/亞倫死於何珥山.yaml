name: 亞倫死於何珥山
type: 事件
secondary_types: []
aliases:
- 亞倫之死
- 祭司亞倫死於何珥山
status: formal
definition: 以色列人出埃及後四十年，五月初一日，祭司亞倫遵耶和華吩咐上何珥山，死在那裡，享壽一百二十三歲（民33:38-39）。何珥山位於以東地邊界（民33:37），為亞倫離世與以利亞撒接任大祭司的地點（參民20:22-29）。
development: 經文精確記載日期（四十年五月初一）與年齡（123歲），強調亞倫死於曠野漂流結束前夕，象徵舊一代祭司職任的結束。何珥山為以東邊界，預示以色列即將繞過以東進入摩押平原。
accumulations:
- book: 民數記
  chapter: 33
  summary: 記載亞倫在何珥山去世的時間（出埃及四十年五月初一）、地點（何珥山，以東邊界）與年齡（123歲），作為路程記載中的關鍵歷史錨點。
  relation: 標誌曠野漂流期結束、進入迦南前夕的重要事件，連結西乃至加低斯諸站與後續摩押平原諸站。
