name: 迦南人亞拉得王聽聞
type: 事件
secondary_types: []
aliases:
- 亞拉得王聽聞以色列來到
- 迦南南地王聽聞
status: formal
definition: 住在迦南南地（尼革夫）的迦南人亞拉得王聽說以色列人來了（民33:40）。此事對應民數記21:1-3，亞拉得王攻擊以色列、擄掠人口，以色列許願毀滅其城邑，耶和華聽從，將迦南人交付以色列，名該地為何珥瑪。
development: 經文在路程記載中插入此簡短記事（v.40），作為地理邊界標記：以色列已抵達迦南南地邊緣。亞拉得王的聽聞與對抗，預示迦南征服戰爭的開端，也呼應第52節「趕出居民」的命令。
accumulations:
- book: 民數記
  chapter: 33
  summary: 記載迦南南地亞拉得王聽聞以色列人來到的消息，作為路程記載中唯一的外部政治反應記事。
  relation: 標示以色列抵達迦南邊境，連結亞倫之死與後續進入摩押平原的路程，呼應本章結尾的征服命令。
