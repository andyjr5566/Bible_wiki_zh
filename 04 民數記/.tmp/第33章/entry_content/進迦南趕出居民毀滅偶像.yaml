name: 進迦南趕出居民毀滅偶像
type: 神學
secondary_types: []
aliases:
- 趕出迦南居民
- 毀滅迦南偶像
- 征服迦南命令
status: formal
definition: 耶和華在摩押平原吩咐摩西，以色列人過約但河進迦南地時，要從面前趕出所有居民，毀滅一切鏨成的石像、鑄成的偶像，拆毀一切邱壇（民33:51-52）。這是建立聖潔國度、防止拜偶像污染的根本命令，強調「因我把那地賜給你們為業」（v.53）。
development: 此命令屬聖戰（herem）神學範疇，要求徹底清除迦南宗教文化痕跡。石像（maskit）、鑄像（massēkā）、邱壇（bāmā）代表迦南多神崇拜體系。不順從將導致「眼中的刺、肋下的荊棘」（v.55），並招致同樣審判（v.56）。
accumulations:
- book: 民數記
  chapter: 33
  summary: 記載神在摩押平原透過摩西頒布的進迦南三大命令：趕出居民、毀滅偶像、拆毀邱壇，並宣告地業賜予的法理依據。
  relation: 本章神學高潮，將地理路程記載轉化為神學倫理命令，奠定征服時代的屬靈原則。
