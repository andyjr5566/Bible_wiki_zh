- 民數記三十三章路程
status: formal
definition: 民數記第33章記載以色列人出埃及後在曠野四十年間的四十二個站口（路程）。經文開頭指出這是摩西遵耶和華吩咐記載的路程（民33:1-2），詳細列舉從蘭塞起行至摩押平原的各站名稱與順序，作為以色列歷史地理與神帶領證據的官方紀錄。
development: 本章作為「路程記」（希伯來文 masse'ot）的獨立文獻單元，結構上屬於祭司文獻（P）傳統，強調耶和華吩咐摩西記載（v.2），並以「起行……安營」的固定公式串聯各站，呈現神在歷程中信實的帶領。
accumulations:
- book: 民數記
  chapter: 33
  summary: 完整記載以色列人出埃及至摩押平原的四十二個站口，包含起行與安營的地點序列，並插入關鍵事件（如紅海渡過、亞倫之死、亞拉得王聽聞）。
  relation: 本章核心內容，提供路程記載的完整框架與神學意圖。
