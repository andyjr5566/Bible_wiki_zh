name: 蘭塞起行
type: 事件
secondary_types: []
aliases:
- 從蘭塞起行
- 拉美西斯起行
status: formal
definition: 以色列人在正月十五日（逾越節次日）從蘭塞（即拉美西斯，出1:11）昂然無懼地起行出埃及（民33:3-5）。此時埃及人正葬埋長子，耶和華已擊殺長子並敗壞埃及的神，標誌出埃及救贖行動的正式啟動。
development: 蘭塞為出埃及的起點，地名對應埃及東尼羅河三角洲的皮-拉美西斯。經文強調「在一切埃及人眼前昂然無懼地出去」（v.3），顯示神大能的拯救與以色列人得勝的姿態。
accumulations:
- book: 民數記
  chapter: 33
  summary: 記載以色列人從蘭塞起行安營疏割，並註明日期（正月十五日）與背景（逾越節次日、埃及葬長子、耶和華敗壞埃及諸神）。
  relation: 路程記載的起始事件，確立出埃及的時間錨點與神學意義。
