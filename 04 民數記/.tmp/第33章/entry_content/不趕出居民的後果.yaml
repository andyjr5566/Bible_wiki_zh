name: 不趕出居民的後果
type: 神學
secondary_types: []
aliases:
- 容留迦南人的後果
- 眼中的刺肋下的荊棘
status: formal
definition: 耶和華警告若以色列人不趕出迦南居民，所容留的居民必作眼中的刺、肋下的荊棘，在所住之地擾害他們（民33:55）；而且神素常有意怎樣待迦南人（審判），也必照樣待以色列人（v.56）。這揭示立約共同體的聖潔邊界：不順從將導致失去地業與遭受同樣審判。
development: 「眼中的刺、肋下的荊棘」為生動比喻，指持續性的屬靈干擾與軍事威脅（參士1:27-36，2:3）。第56節「照樣待你們」預言後來以色列因拜偶像被擄（王下17、25）。此警告構成申命記式「順從得福、悖逆受咒」神學的核心見證。
accumulations:
- book: 民數記
  chapter: 33
  summary: 記載神對不順從趕出居民命令的嚴厲警告：剩餘居民成為持續禍患，神將以審判迦南人的同樣方式審判以色列。
  relation: 本章神學結論，以審判警告封閉路程記載，強調地理遷徙的終極目的是建立聖潔的立約國度。
