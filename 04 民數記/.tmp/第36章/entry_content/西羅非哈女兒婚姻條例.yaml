name: 西羅非哈女兒婚姻條例
type: 事件
secondary_types: []
aliases:
- 西羅非哈女兒婚姻法
- 民數記36條例
status: formal
definition: 根據民數記36章，耶和華吩咐摩西頒布條例，規定西羅非哈的女兒若要繼承產業，必須嫁給同宗支派（瑪拿西支派）的人，以防產業轉移至其他支派。
development: 此條例源於瑪拿西支派族長向摩西陳情，擔心女兒嫁外族導致產業流失，摩西按耶和華指示頒布。
accumulations:
