status: formal
definition: 記載西羅非哈五位女兒遵照耶和華命令，嫁給伯叔的兒子（同宗支派），以保留家族產業於瑪拿西支派。
development: 女兒們在摩西傳達耶和華吩咐後，依序嫁給同族表親，完成產業保全。
