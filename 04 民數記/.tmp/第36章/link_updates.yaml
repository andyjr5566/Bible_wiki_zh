"book": "民數記"
"chapter": !!int "36"
"updates":
- "title": "瑪拿西"
  "path": "link_folder/人物/瑪拿西.md"
  "summary": "民36章記載瑪拿西支派（基列族長）因西羅非哈女兒繼承產業後若嫁外族會導致支派產業外流、禧年時永久流失，向摩西陳情。神採納其意見，規定承業女子只許嫁同宗支派人，既保障女兒繼承權，又守住支派土地不外流。"
  "relation": "本章事件主體；瑪拿西支派首領代表家族利益向神陳情，獲神採納"
- "title": "禧年（yobel）"
  "path": "link_folder/神學/禧年（yobel）.md"
  "summary": "民36:4指出若西羅非哈女兒嫁外族，禧年（第五十年）時產業將永久歸入夫族，瑪拿西支派雖可按贖產業程序贖回，但禧年後仍歸夫支派。此條例體現禧年制度下產業歸屬的最終重置機制，保障各支派祖傳產業不永久流失。"
  "relation": "本章產業外流問題的關鍵時間節點；禧年制度使跨支派婚姻導致的產業轉移成為永久性"
- "title": "西羅非哈"
  "path": "link_folder/人物/西羅非哈.md"
  "summary": "民36章延續27章西羅非哈女兒求產業案：因西羅非哈無子，五女繼承產業（27:7-11），但若嫁外族將導致產業跨支派流失。神判定承業女子只許嫁同宗支派人（v6），五女遂嫁伯叔兒子，產業留在族中（v10-12）。西羅非哈案由此完整閉環：從「地位」（得產業）到「責任」（守產業）。"
  "relation": "本章事件核心背景人物；其無子狀況引發兩階段律例頒布（27章得業、36章守業）"
- "title": "密迦"
  "path": "link_folder/人物/密迦.md"
  "summary": "民36:11列於西羅非哈五女之四（瑪拉、得撒、曷拉、密迦、挪阿）。五女順服神命，嫁給伯叔兒子（堂兄弟），產業留在瑪拿西支派。密迦作為承業女子，體現「在神許可範圍內的自由最安全蒙福」（靈糧堂GT）。"
  "relation": "西羅非哈四女；本章事件直接參與者，順服婚姻條例嫁入族中"
- "title": "摩押平原"
  "path": "link_folder/地點/摩押平原.md"
  "summary": "民36:13「這是耶和華在摩押平原─約但河邊、耶利哥對面─藉著摩西所吩咐以色列人的命令典章」。民數記以此地作結，說明以色列人遠望迦南美地，已為進入應許地預備。此地是神在西奈山後再次頒布律法之地（申1:5），本書主人公是神而非摩西。"
  "relation": "本章及全書結束地點；神在此頒布最後命令典章，裝備百姓進地"
- "title": "約但河"
  "path": "link_folder/地點/約但河.md"
  "summary": "民36:13「約但河邊、耶利哥對面」。約但河是進入應許地的界限。以色列人站在河東，遠望西岸美地。民數記曠野旅程記述至此完滿結束，尚須交代摩西之死與約書亞帶領進迦南。"
  "relation": "本章及全書地理定位標記；曠野旅程終點、征服迦南起點"
- "title": "耶利哥"
  "path": "link_folder/地點/耶利哥.md"
  "summary": "民36:13「耶利哥對面」。耶利哥是迦南第一座要攻取的城（書6章）。以色列人在摩押平原對面耶利哥，預備過河征服。代表屬靈爭戰的起點，神的命令典章裝備百姓面對前路爭戰。"
  "relation": "本章及全書地理定位標記；臨近應許地入口，預表即將面對的屬靈爭戰"
