book: "民數記"
chapter: 36
candidates:
  - name: "西羅非哈女兒婚姻條例"
    type: "事件"
    evidence: |
      經文：民36:1-12。基列族長向摩西陳情：西羅非哈女兒若嫁外族，產業將轉歸夫族，導致瑪拿西支派產業減少，禧年時永久流失。神判定：承業女子只許嫁同宗支派人（v6），西羅非哈五女遂嫁伯叔兒子，產業留在族中（v10-12）。
      BibleHub：女兒可自由選擇丈夫，但必須在父親支派內（v6），確保產業不跨支派流轉（v7-9）。
      靈糧堂CT：此條例解決27章留下的漏洞——女兒繼承產業後若嫁外族，禧年時產業永久歸夫族。神規定「只許嫁同宗支派」，保守各支派產業完整。
      靈糧堂GT：承業女子婚姻受限於支派界限，體現神尊重自由（可隨意嫁人）同時賦予責任（須嫁同族），自由在神許可範圍內最安全蒙福。
      KingComments：此章從「地位」（27章）轉向「責任」——享受產業也要守住產業。教會當地見證不可因屬靈婚姻關係而流失，須「持守你所有的」（啟3:11）。
    surfaces:
      - "西羅非哈女兒婚姻條例"
      - "西羅非哈女兒嫁人條例"
      - "承業女子婚姻規定"

  - name: "產業不可轉離族"
    type: "神學"
    evidence: |
      經文：民36:7-9。「以色列人的產業就不從這支派歸到那支派，因為以色列人要各守各祖宗支派的產業」（v7）；「凡在以色列支派中得了產業的女子必作同宗支派人的妻」（v8）；「這樣，他們的產業就不從這支派歸到那支派」（v9）。
      BibleHub：神禁止產業跨支派流轉，各支派須守住祖宗產業。這反映神的秩序與設計，預表屬靈產業的守持（弗1:11-14）。
      靈糧堂CT：產業是盟約賜與，各家庭所得地業即其在盟約中的分。古近東無其他國家賦予土地如此深刻宗教意義。拿伯不賣葡萄園即守此條例（王上21:23）。
      靈糧堂GT：支派保留女兒所繼承土地，確保地業完整。律法完善具有漸進性與預表性（來10:1），神重視與百姓關係勝過社會制度。
      KingComments：信徒須「留在蒙召的景況中」（林前7:20），神為我們選定產業（詩47:4）。末世呼召：「持守你所有的」（啟3:11），不否認主名，將權柄歸主。

  - name: "女兒得產業嫁同族"
    type: "事件"
    evidence: |
      經文：民36:10-12。「耶和華怎樣吩咐摩西，西羅非哈的眾女兒就怎樣行」（v10）；五女瑪拉、得撒、曷拉、密迦、挪阿「都嫁了他們伯叔的兒子」（v11）；「她們嫁入約瑟兒子、瑪拿西子孫的族中；她們的產業仍留在同宗支派中」（v12）。
      BibleHub：五女順服神命，嫁給伯叔兒子（堂兄弟），產業留在瑪拿西支派。本書以順服結束，滿有盼望。
      靈糧堂CT：女兒名字見於四處（26:33, 27:1, 36:11, 書17:3），強調其歷史地位。她們放棄感情自由，順服神旨意，婚姻為神榮耀保存創造秩序（創2:18-25），非單為人快樂（林前7:25-38）。
      靈糧堂GT：西羅非哈女兒順服神旨意，嫁入瑪拿西族中。婚姻是神所制訂，為神榮耀保存秩序，單純為快樂而結合違背神旨意（林前7:25-38）。
      KingComments：五女表現順服，這本充滿悖逆的書以順服作結。她們婚姻選擇受限於神許可範圍，神賜自由同時賦予義務（約8:32）。

  - name: "產業歸屬條例總結"
    type: "事件"
    evidence: |
      經文：民36:13。「這是耶和華在摩押平原─約但河邊、耶利哥對面─藉著摩西所吩咐以色列人的命令典章」。
      靈糧堂CT：本節是民數記總結，將摩押平原與西奈山命令典章列為平等（利26:46, 27:34）。以「約但河邊、耶利哥對面」作結，說明以色列人遠望美地，已為定居預備。耶和華要作他們的神，住在他們中間。強調全書是神所默示，非摩西個人手記，主人公是神。
      靈糧堂GT：本書以「約但河邊、耶利哥對面」作結，說明以色列人此際遠望隔岸美地，已為定居作好準備。他們將永居斯土，因這是神賜給亞伯拉罕子孫為業之地。強調本書是神所默示，主人公是使用摩西拯救以色列並帶領他們進入迦南的神。
      KingComments：最後一句話是總結與強調——不是摩西，而是神自己說話。神知道我們在哪裡、要往哪裡去，賜下命令典章裝備我們前路。

  - name: "基列"
    type: "人物"
    evidence: |
      經文：民36:1「約瑟的後裔，瑪拿西的孫子，瑪吉的兒子基列，他子孫中的諸族長」。
      靈糧堂CT：瑪拿西僅有一子瑪吉，瑪吉僅一子基列，基列有六子（參26:29-32）。瑪拿西支派八個家族，一個是兒子，一個孫子，六個曾孫。「諸族長」指瑪拿西曾孫輩六個族長。基列族產業在約但河東（32:39）。
      靈糧堂GT：基列子孫家族即西羅非哈女兒所屬家族。基列後裔族長談論女兒結婚產業問題，因他們是此問題負責人（27:1-11）。
      KingComments：基列人是瑪拿西支派的重要族群，其族長代表家族利益向摩西陳情。

  - name: "瑪拿西"
    type: "人物"
    evidence: |
      經文：民36:1「約瑟的後裔，瑪拿西的孫子」；v5「約瑟支派的人說得有理」；v12「她們嫁入約瑟兒子、瑪拿西子孫的族中」。
      靈糧堂CT：約瑟支派指以法蓮、瑪拿西二支派，此處特指基列人（瑪拿西後裔）。瑪拿西支派首領提出問題，神採納其意見，既滿足女兒繼承權，也保守支派土地不外流。
      靈糧堂GT：西羅非哈屬瑪拿西支派，是基列孫子（27:1）。基列後裔諸族長提出個案，因與他們切身相關。分地原則按家室人數（33:54）。
      KingComments：瑪拿西支派在以色列歷史中扮演重要角色，代表約瑟雙重分賜的一半。

  - name: "禧年"
    type: "神學"
    evidence: |
      經文：民36:4「到了以色列人的禧年，這女兒的產業就必加在他們丈夫支派的產業上」。
      靈糧堂CT：禧年指第五十年（利25:10），產業買賣到禧年所有權歸還原主。若女兒嫁外族，瑪拿西人雖買回地，禧年時仍歸夫族。瑪拿西首領出於持守神祝福心願，將問題帶到神面前。
      靈糧堂GT：禧年是萬物從捆綁得釋放之年。繼承產業女子嫁外族，產業歸夫名下；雖可按贖產業程序贖回，但禧年後永遠屬夫支派。
      KingComments：禧年預表基督帶來的終極釋放與恢復（路4:18-19），反映神對土地主權與供應。

  - name: "西羅非哈"
    type: "人物"
    evidence: |
      經文：民36:2「我們兄弟西羅非哈的產業分給他的眾女兒」；v6「論到西羅非哈的眾女兒」；v10-11「西羅非哈的眾女兒……西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈無子，女兒繼承產業（27:7-11）。其女兒名字記於四處（26:33, 27:1, 36:11, 書17:3）。女兒表徵教會中信心較軟弱信徒。
      靈糧堂GT：西羅非哈女兒因父無子提出繼承問題，摩西求問神，訂立女兒可繼承產業新例（27:6）。本章處理女兒出嫁導致產業外流問題。
      KingComments：西羅非哈女兒在27章展現信心（希伯來書11章未列名的信心英雄），本章展現順服。

  - name: "瑪拉"
    type: "人物"
    evidence: |
      經文：民36:11「西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈五女長女名瑪拉。五女都嫁伯叔兒子，順服神命，產業留在族中。
      靈糧堂GT：五女名字見於26:33, 27:1, 36:11, 書17:3四處，強調歷史真實性。

  - name: "得撒"
    type: "人物"
    evidence: |
      經文：民36:11「西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈五女次女名得撒。五女同嫁伯叔兒子，順服神旨意。

  - name: "曷拉"
    type: "人物"
    evidence: |
      經文：民36:11「西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈五女三女名曷拉。五女放棄感情自由，為神榮耀順服婚姻條例。

  - name: "密迦"
    type: "人物"
    evidence: |
      經文：民36:11「西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈五女四女名密迦。婚姻為神榮耀保存創造秩序，非單為人快樂。

  - name: "挪阿"
    type: "人物"
    evidence: |
      經文：民36:11「西羅非哈的女兒瑪拉、得撒、曷拉、密迦、挪阿」。
      靈糧堂CT：西羅非哈五女五女名挪阿。五女順服神命，嫁入瑪拿西族中，產業留在同宗支派。

  - name: "摩押平原"
    type: "地點"
    evidence: |
      經文：民36:13「這是耶和華在摩押平原─約但河邊、耶利哥對面─藉著摩西所吩咐以色列人的命令典章」。
      靈糧堂CT：民數記以「摩押平原、約但河邊、耶利哥對面」作結，說明以色列人遠望迦南美地，已為進入應許地預備。此地是神在西奈山後再次頒布律法之地（參申1:5）。
      靈糧堂GT：本書以此地作結，說明以色列人此際遠望隔岸美地，已為定居作好準備。他們將永居斯土，因這是神賜給亞伯拉罕子孫為業之地。
      KingComments：神知道我們在哪裡、要往哪裡去，在摩押平原賜下命令典章裝備前路。

  - name: "約但河"
    type: "地點"
    evidence: |
      經文：民36:13「約但河邊、耶利哥對面」。
      靈糧堂CT：約但河是進入應許地的界限。以色列人站在河東，遠望西岸美地。民數記旅程記述至此完滿結束，尚須交代摩西之死與約書亞帶領進迦南。
      靈糧堂GT：約但河邊是民數記曠野旅程的終點，也是約書亞記征服迦南的起點。

  - name: "耶利哥"
    type: "地點"
    evidence: |
      經文：民36:13「耶利哥對面」。
      靈糧堂CT：耶利哥是迦南第一座要攻取的城（書6章）。以色列人在摩押平原對面耶利哥，預備過河征服。
      靈糧堂GT：耶利哥對面標示以色列人當時地理位置，臨近應許地入口。
      KingComments：耶利哥代表屬靈爭戰的起點，神的命令典章裝備百姓面對前路爭戰。