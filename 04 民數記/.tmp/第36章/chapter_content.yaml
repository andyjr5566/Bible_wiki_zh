organization: '### 基列族長的憂慮與請求（v1-4）

  約瑟後裔瑪拿西支派中，基列家族的族長來到摩西和以色列首領面前，提出關於[[西羅非哈]]女兒繼承產業的後續問題。他們指出：若西羅非哈的女兒嫁給別支派的人，她們所得的祖產就會隨著婚姻歸入丈夫的支派，導致[[瑪拿西]]支派透過拈鬮所得的產業減少；到了[[禧年（yobel）|禧年]]，這產業更會永久轉離原支派。這反映出以色列社會極度重視「支派產業不可流失」的原則。


  ### 耶和華的判斷：婚姻限制在同宗支派內（v5-9）

  摩西照耶和華的話回應：約瑟支派的人說得有理。耶和華頒布[[西羅非哈女兒婚姻條例]]——西羅非哈的女兒可以隨意嫁人，**但必須嫁給同宗支派的人**（即父親家族內部）。這項條例確立了[[女兒得產業嫁同族]]的原則，使以色列人的產業不從這支派歸到那支派，各支派都能守住祖宗的產業。這是[[產業不可轉離族]]制度的具體落實。


  ### 女兒們的順服與條例的落實（v10-12）

  西羅非哈的五個女兒——瑪拉、[[得撒]]、[[曷拉]]、[[密迦]]、[[挪阿]]——完全遵行耶和華的吩咐，嫁給了伯叔的兒子（即堂兄弟），屬於瑪拿西支派家族內部。她們的產業因此仍留在同宗支派中，成為條例生效的首個案例。


  ### 總結：摩押平原的命令典章（v13）

  本章以地點標記作結：這些命令典章是耶和華在[[摩押平原]]、[[約但河]]邊、[[耶利哥]]對面，藉著摩西吩咐以色列人的。這標誌著《民數記》法律部分的收尾，也為即將進入迦南地的產業分配奠定法律基礎。


  > [!important] 本章樞紐

  > **產業歸屬條例總結**：民數記 27 章解決「女兒可否繼承」，36 章解決「女兒繼承後嫁人產業歸屬」。兩章合讀，完整呈現神對產業公義與支派完整的雙重保障。


  > [!note] 歷史神學注記

  > 此條例屬「案例法」發展：先有個案（27 章），後有補充限制（36 章），顯示律法在具體社會情境中逐步完善，而非一次性頒布完備法典。'
