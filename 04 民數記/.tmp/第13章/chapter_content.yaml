organization: '### 神命令差遣十二探子（v1-3）

  耶和華主動曉諭[[摩西]]，吩咐從[[巴蘭的曠野]]差遣十二個探子去窺探[[迦南地]]。這是神的主權命令（[[耶和華曉諭摩西差遣探子]]），而非單純回應百姓要求（參申
  1:22-23），雖然後者記載百姓曾請求派人窺探，但本章強調神的主動啟動。每支派要選一位[[探子是否為各支派首領|族長]]，顯示這是國家層級的正式偵察任務。


  ### 十二探子名單與何西阿改名（v4-16）

  經文詳細列出十二支派探子名單（[[十二探子名單]]），每人皆為該支派首領。值得注意的是[[何西阿改名約書亞|摩西將嫩的兒子何西阿改名為約書亞]]（v16），「何西阿」意為「拯救」，「約書亞」意為「耶和華拯救」，這名字改變預表他將成為帶領百姓進入應許地的領袖，也預表基督耶穌（希
  4:8-9）。'
