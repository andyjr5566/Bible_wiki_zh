status: formal
definition: 希伯來文 עֲנָקִים (Anaqim)，指居住在希伯崙一帶的巨人族群。民數記13:22、28、33 記載探子在希伯崙看見亞衲族人亞希幔、示篩、撻買，並稱他們為「偉人」（13:33），使探子心生恐懼。
development: 亞衲族人成為十探子報惡信的主要理由，象徵人眼中的不可逾越障礙，與神的應許形成張力。
accumulations:
- book: 民數記
  chapter: 13
  summary: 記載探子在希伯崙看見亞衲族人，並將其描述為身量高大的偉人。
  relation: 本章提供亞衲族人出現的地點與探子的反應。
