name: 十探子報惡信使百姓膽怯
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 記載與迦勒同去的十探子報惡信，稱「我們不能上去攻擊那民，因為他們比我們強壯」，並誇大地勢「吞吃居民」、居民身量高大、見亞衲族人（偉人後裔），自視如蚱蜢（民13:31-33）。此惡信使全會眾膽怯、發怨言。
development: 眼見的恐懼壓倒神的應許，導致後來曠野漂流四十年的審判。
accumulations:
- book: 民數記
  chapter: 13
  summary: 十探子發布惡報，誇大敵勢，自卑如蚱蜢，使百姓喪膽。
  relation: 不信方的代表性見證，直接引發百姓悖逆。
related_entries:
- 十二探子
