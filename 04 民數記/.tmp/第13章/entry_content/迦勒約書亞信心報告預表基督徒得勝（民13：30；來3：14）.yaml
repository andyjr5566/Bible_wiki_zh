name: 迦勒約書亞信心報告預表基督徒得勝（民13：30；來3：14）
type: 互文
secondary_types: []
aliases:
- 迦勒約書亞信心報告預表基督徒得勝
status: formal
definition: 民數記13:30 迦勒宣告「我們足能得勝」，約書亞同心協力，這信心的報告在新約被視為預表基督徒靠主得勝的屬靈爭戰（參希伯來書3:14、4:11）。迦勒、約書亞代表持守神應許、不隨眾不信的信心榜樣。
development: 互文關聯顯示舊約探子的信心行動預表新約信徒在基督裡得勝，強調「信心與眼見的對比」。
accumulations:
- book: 民數記
  chapter: 13
  summary: 迦勒與約書亞發出信心報告，鼓勵百姓進取迦南。
  relation: 作為舊約預表，指向新約基督徒靠信心得勝的真理。
