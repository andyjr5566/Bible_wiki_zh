name: 迦勒勸勉百姓上去得地
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 記載迦勒在摩西面前安撫百姓，宣稱「我們立刻上去得那地吧！我們足能得勝」（民13:30）。展現以神應許為本的信心，與十探子的恐懼形成強烈對比。
development: 迦勒的信心宣告為後續約書亞同心合一、神應許迦勒得地奠基。
accumulations:
- book: 民數記
  chapter: 13
  summary: 迦勒在會眾面前發聲勸勉上去得地，宣告必能得勝。
  relation: 信心方的代表性見證，對抗不信的惡報。
