name: 探子回來報告
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 記載探子在四十天後回到巴蘭曠野加低斯，向摩西、亞倫及全會眾報告並展示果實（民13:26-29）。報告內容：地確流奶與蜜，但居民強壯、城邑堅固寬大、見亞衲族人，並列出亞瑪力、赫、耶布斯、亞摩利、迦南諸族分布。
development: 報告前半肯定應許，後半強調阻礙，引發百姓恐懼與不信。
accumulations:
- book: 民數記
  chapter: 13
  summary: 探子在加低斯向會眾報告窺探結果，呈上果實，陳述地勢與敵情。
  relation: 連結窺探行動與百姓反應的關鍵節點。
related_entries:
- 加低斯
