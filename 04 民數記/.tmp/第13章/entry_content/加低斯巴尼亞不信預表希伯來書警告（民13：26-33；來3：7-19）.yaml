status: formal
definition: 民數記13:26-33 記載探子在加低斯巴尼亞回報惡信，百姓不信，成為希伯來書3:7-19 引用詩篇95:7-11 警告信徒不可硬著心、重蹈曠野不信覆轍的預表。
development: 互文強調不信的嚴重後果，勸勉新約信徒持守信心，免得落在神的忿怒中。
accumulations:
- book: 民數記
  chapter: 13
  summary: 探子在加低斯巴尼亞報惡信，百姓不信，成為新約警告的舊約背景。
  relation: 舊約不信事件作為新約希伯來書警告的預表基礎。
