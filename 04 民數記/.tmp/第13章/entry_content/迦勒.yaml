aliases:
- 迦勒（耶孚尼的兒子）
status: formal
definition: 迦勒是猶大支派的探子，耶孚尼的兒子（13:6）。他在探子回報時安撫百姓，宣告「我們立刻上去得那地吧！我們足能得勝」（13:30），展現堅定的信心，成為後來得地的關鍵人物。
development: 迦勒與約書亞同為信心報告的代表，後在約書亞記14章得希伯崙為業。
accumulations:
- book: 民數記
  chapter: 13
  summary: 迦勒作為猶大支派探子，發表信心報告，鼓勵百姓進取迦南。
  relation: 本章記載迦勒的名字、身分及信心行動。
