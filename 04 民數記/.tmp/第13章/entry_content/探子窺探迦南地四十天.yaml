name: 探子窺探迦南地四十天
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 記載探子從尋的曠野到利合、哈馬口，經希伯崙（見亞衲族人亞希幔、示篩、撻買），至以實各谷砍取一掛葡萄、石榴、無花果（民13:21-25）。歷時四十天，證實迦南地確為流奶與蜜之地。
development: 實地考察過程中發現巨人族群與豐盛果實，形成後續報告「好地與強敵」並存的張力。
accumulations:
