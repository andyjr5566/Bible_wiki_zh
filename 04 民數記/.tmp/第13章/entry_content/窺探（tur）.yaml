- tur
status: formal
definition: 希伯來動詞 תּוּר (tur)，意為「窺探、偵察、巡視」。在民數記13:2、16-17、21、25、32 等處出現，描述摩西差遣探子去窺探迦南地的行動。語義側重主動、詳細的觀察與情報蒐集。
development: 本章多次使用 tur（如13:2「打發人去窺探」、13:17「摩西打發他們去窺探迦南地」、13:21「他們上去窺探那地」），強調任務的主動性與全面性。
accumulations:
- book: 民數記
  chapter: 13
  summary: 多處使用希伯來文 tur 表達探子窺探迦南的行動。
  relation: 原文用法說明探子任務的性質。
