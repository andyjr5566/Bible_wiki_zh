name: 何西阿何時改名約書亞
type: 解經爭議
secondary_types: []
aliases: []
status: formal
definition: 民數記13:16記載摩西將嫩的兒子何西阿改名為約書亞，這是聖經中首次出現該改名。關於改名的確切時間，學者有不同看法：有人認為在出埃及前已改名，也有人認為在此刻才改名。本章經文顯示摩西在差遣探子時才為他改名。
accumulations:
- book: 民數記
