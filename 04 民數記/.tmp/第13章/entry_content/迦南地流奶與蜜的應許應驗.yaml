name: 迦南地流奶與蜜的應許應驗
type: 神學
secondary_types: []
aliases:
- 迦南地流奶與蜜
status: formal
definition: 根據民數記13:27，探子回報說那地果然是流奶與蜜之地，證實神對亞伯拉罕、以撒、雅各的應許在迦南地得到初步應驗。這顯示神的信實，雖然百姓因不信而延遲進入，但應許的內容已在探子所帶回的果實中顯現。
development: 本章記載探子帶回葡萄、石榴、無花果作為流奶與蜜的具體見證（13:23-24），並由迦勒在13:30宣告「我們足能得勝」，顯示信心對應許的回應。
accumulations:
- book: 民數記
  chapter: 13
  summary: 探子窺探迦南地四十天，帶回果實並報告地流奶與蜜，應驗神的應許。
  relation: 直接記載應許應驗的經文根據。
