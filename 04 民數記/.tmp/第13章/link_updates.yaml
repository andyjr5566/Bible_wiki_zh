"book": "04 民數記"
"chapter": !!int "13"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民13章記載耶和華曉諭摩西差遣十二探子窺探迦南地，摩西照吩咐從巴蘭曠野打發，改何西阿名為約書亞，詳細吩咐窺探任務（察看地土、民強弱、城邑堅固、地土肥瘠、樹木有無）。四份註解均記載摩西作中保領袖執行神命，展現領袖順服與委派權柄。"
  "relation": "本章補充摩西在曠野漂流期的關鍵領導行動：從出埃及記中帶領出埃及、過紅海、曠野供應，到此處差遣探子作為進迦南前的軍事偵察與信心試驗雙重目的，顯示摩西忠心執行神旨意的中保角色。"
- "title": "約書亞"
  "path": "link_folder/人物/約書亞.md"
  "summary": "民13:8,16 記載以法蓮支派嫩的兒子何西阿為十二探子之一，摩西稱他為約書亞。丁良才：預表基督拯救；啟導本：明日的領袖；串珠註釋：約書亞意為耶和華是拯救。艾基斯解釋出埃及記早用約書亞名乃摩西寫作時回顧採用。"
  "relation": "本章為約書亞生平關鍵轉折：從摩西助手（出17:9,24:13）到探子代表，再獲摩西改名預示領袖職分，預表基督作拯救者帶領神子民進安息。與民14章迦勒同為信心派、後繼摩西領袖地位（民27:18-20）形成完整軌跡。"
- "title": "巴蘭的曠野"
  "path": "link_folder/地點/巴蘭的曠野.md"
  "summary": "民13:3,26 摩西從巴蘭曠野打發探子，探子回到巴蘭曠野加低斯。此地原為民10:12以色列離開西乃山後第一個主要安營地，今在民13章成為探子出發與返回基地，串聯「起行順服」（民10）→「慾望審判」（民11）→「權柄挑戰潔淨」（民12）→「探子試驗」（民13）的試煉舞台。"
  "relation": "本章確立巴蘭曠野為以色列從西乃山出發後經歷連續試煉（慾望、嫉妒、不信）的核心舞臺，預表後來四十年漂流的中心區域，地理上連接西乃與迦南邊境加低斯巴尼亞。"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "民13:26 探子到了巴蘭曠野加低斯，回報摩西亞倫會眾。丁良才：加低斯位於巴蘭曠野內；艾基斯：加低斯與普嫩同緯度；啟導本：迦南邊境綠洲。此為探子報告地、民14章百姓哭號拒絕進地、神判漂流四十年的悲劇現場。"
  "relation": "本章將加低斯從單純行程地標提升為「信心抉擇」的分水嶺：探子在此展示果實證實應許（v27），十探子惡信使百姓心消化（v31-33），直接導致民14章神審判一代人倒斃曠野。"
- "title": "希伯崙"
  "path": "link_folder/地點/希伯崙.md"
  "summary": "民13:22 探子上南地到了希伯崙，那裡有亞衲族人亞希幔、示篩、撻買。丁良才：希伯崙建城比埃及瑣安早七年；啟導本：亞衲族人居住地。此為探子路線關鍵點，見證迦南地居民強壯、城邑堅固。"
  "relation": "本章記載希伯崙為探子窺探路線的深入點（v22），亞衲族人居住證實十探子報告「居民強壯、城邑堅固」的真實性，同時葡萄豐收（v23-24）證實地土極美，形成「地美民強」的信心試驗張力。"
- "title": "安密巴"
  "path": "link_folder/地點/安密巴.md"
  "summary": "民13:23-24 探子到了以實各谷，割下一枝葡萄掛在杠上，兩人用槓抬著，又帶石榴無花果，因此稱那地為以實各谷（意為葡萄串）。丁良才：以實各意為葡萄串；啟導本：果實豐盛見證。此為探子帶回果實證實「流奶與蜜」應許的具體地點。"
  "relation": "本章以以實各谷（安密巴）作為神應許應驗的有形見證：一枝葡萄需兩人抬、石榴無花果豐盛，直接回應民13:27「地確實流奶與蜜」，成為迦勒約書亞信心報告的物質基礎。"
- "title": "迦南地"
  "path": "link_folder/地點/迦南地.md"
  "summary": "民13:2,17,21,27 耶和華所賜給以色列人的迦南地，探子窺探四十天，證實流奶與蜜。四份註解均記載為神應許之地。探子從尋曠野到利合、希伯崙、以實各谷遍歷全地。"
  "relation": "本章為迦南地在民數記中的核心呈現：從神應許賜給（v2）、摩西吩咐窺探（v17）、探子實地遍歷（v21-25）、果實證實豐盛（v23,27）、十探子惡信（v32）到迦勒信心宣告（v30），完整呈現「應許之地」的客觀真實與主觀回應的對比。"
