"book": "民數記"
"chapter": !!int "19"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民19:1-2 耶和華曉諭摩西、亞倫說，吩咐以色列人牽紅母牛。四份註解均記載摩西作中保領袖傳達神條例。"
  "relation": "摩西作為神的中保領袖，領受並傳達紅母牛潔淨條例，確立以色列人處理死屍不潔淨的永遠定例。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民19:1-2 耶和華曉諭摩西、亞倫說。四份註解均記載亞倫作大祭司共同領受潔淨條例。"
  "relation": "亞倫作為大祭司與摩西共同領受紅母牛條例，但執行儀式由以利亞撒代行，避免大祭司因接觸死屍相關儀式而暫時不潔淨危及職務（利21:11）。"
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "民19:3-4,6 交給祭司以利亞撒牽到營外宰殺，用指頭蘸血向會幕前彈七次，把香柏木牛膝草朱紅線丟入火中。丁良才：以利亞撒代表亞倫監督宰殺；啟導本：預表基督在城外受苦。"
  "relation": "以利亞撒作為亞倫兒子、未來大祭司繼承人（民20:25-28），主持紅母牛條例：牽母牛到營外、彈血向會幕七次、監督焚燒並投入香柏木牛膝草朱紅線。此為其祭司職分傳承與神審判永久見證的關鍵登場（參民16:37-39），與民20章接任大祭司形成連貫軌跡。"
- "title": "營外"
  "path": "link_folder/地點/營外.md"
  "summary": "民19:3,9 他必牽到營外，人就把牛宰在他面前。潔淨人要收聚母牛的灰，存在營外潔淨處，給以色列會眾存留，作除污穢之水的原料。丁良才：預表主耶穌在城外受苦(來13:11-12)；啟導本：各各他在耶路撒冷城外。"
  "relation": "紅母牛在營外宰殺焚燒，牛灰存放營外潔淨處，預表基督在耶路撒冷城外各各他受苦（來13:11-12）。營外代表神不與人同在的範圍，背負罪的人都不在神的紀念裡。"
- "title": "牛膝草"
  "path": "link_folder/原文/牛膝草.md"
  "summary": "民19:6,18 牛膝草。希伯來文 אֵזוֹב (ezov) 意為牛膝草、唇形薄荷。丁良才：牛膝草表徵信心應用基督救贖；啟導本：從最大到最小表徵全世界。"
  "relation": "牛膝草在紅母牛儀式中用於將除污穢水灑在帳幕、器皿、人身上（v18），表徵信心應用基督救贖的潔淨大能。與利14:4-6, 49-52潔淨大痲瘋、出12:22逾越節灑血、詩51:7大衛求潔淨形成互文網絡。"
- "title": "香柏木（erez）"
  "path": "link_folder/原文/香柏木（erez）.md"
  "summary": "民19:6 香柏木。希伯來文 אֶרֶז (erez) 意為香柏木、堅固的木頭。丁良才：從最大到最小表徵全世界(王上4:33)；啟導本：基督降卑為人品格高尚。"
  "relation": "香柏木與牛膝草、朱紅色線一同丟入燒牛的火中（v6），從最大（香柏木）到最小（牛膝草）表徵全世界（王上4:33），朱紅色線表徵贖罪（書2:18），三者同燒預表基督受死贖罪的功效普及全人類。"
