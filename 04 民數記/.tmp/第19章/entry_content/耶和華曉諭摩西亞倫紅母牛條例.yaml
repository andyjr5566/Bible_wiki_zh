name: 耶和華曉諭摩西亞倫紅母牛條例
type: 事件
secondary_types: []
aliases:
- 紅母牛條例頒布
status: formal
definition: 耶和華對摩西、亞倫說話，頒布律法中的一條律例，吩咐以色列人牽一隻沒有殘疾、未曾負軛、純紅的母牛來，作為除污穢的儀式基礎（民19:1-2）。
development: 這是整章紅母牛條例的起始事件，確立了除污穢水的來源與法理依據，屬於祭儀律法中獨特的「條例」（chuqqah），強調順服神主權的規定。
accumulations:
- book: 民數記
  chapter: 19
  summary: 耶和華曉諭摩西亞倫，設立紅母牛條例，作為以色列會眾除污穢的永遠定例。
  relation: 本章開端事件，奠定後續宰殺、焚燒、收灰、灑水等一連串潔淨儀式的神學基礎。
