name: 祭司燒牛人不潔淨到晚上
type: 事件
secondary_types: []
aliases:
- 祭司與燒牛者不潔淨
status: formal
definition: 祭司以利亞撒與燒牛的人必不潔淨到晚上，須洗衣服、用水洗身，然後可以進營（民19:7-8）。參與儀式者反因接觸聖物而暫時不潔淨。
development: 這「聖物傳遞不潔淨」的悖論，顯示紅母牛儀式處理的是極重污穢（死），連執行聖職者也需潔淨，預表基督為我們成了咒詛（加3:13），承擔污穢使我們成聖。
accumulations:
- book: 民數記
  chapter: 19
  summary: 祭司與燒牛人不潔淨到晚上，洗衣洗身後可進營。
  relation: 強調儀式的污穢處理層級極高，連執行者也需隔離潔淨，凸顯死的污穢勢力之強。
