name: 潔淨人收牛灰存放營外潔淨處
type: 事件
secondary_types: []
aliases:
- 收集紅母牛灰
status: formal
definition: 一個潔淨的人收起母牛的灰，存在營外潔淨的地方，為以色列會眾調做除污穢的水，這本是除罪的（民19:9）。灰燼成為持續供應潔淨水的資源。
development: 灰燼存放於「營外潔淨處」，地理上分離卻儀式上潔淨，象徵基督在城外受苦卻成就完全潔淨；灰可長久保存，預表基督一次獻祭永遠有效（來9:12）。
accumulations:
- book: 民數記
  chapter: 19
  summary: 潔淨人收牛灰存放營外潔淨處，作為會眾除污穢水的原料。
  relation: 將一次性儀式轉化為持續可用的潔淨資源，連結歷代以色列人的潔淨需要。
