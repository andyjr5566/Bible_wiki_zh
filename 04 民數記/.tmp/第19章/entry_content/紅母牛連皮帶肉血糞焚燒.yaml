name: 紅母牛連皮帶肉血糞焚燒
type: 事件
secondary_types: []
aliases:
- 紅母牛全體焚燒
status: formal
definition: 人在以利亞撒眼前將母牛連皮、肉、血、糞全然焚燒（民19:5）。全燒表完全獻上，連糞也不除去，象徵基督承擔全部污穢。
development: 與一般祭牲剖開洗淨內臟不同，紅母牛連糞一併焚燒，顯示這儀式專為處理「死的污穢」，連最污穢部分也納入火中，由火的審判完全吞滅。
accumulations:
- book: 民數記
  chapter: 19
  summary: 紅母牛連皮帶肉血糞在祭司眼前焚燒。
  relation: 產生除污穢灰燼的核心事件，灰的功效建立在完全焚燒的基礎上。
