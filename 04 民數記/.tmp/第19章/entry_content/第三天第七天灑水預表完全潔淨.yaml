name: 第三天第七天灑水預表完全潔淨
type: 神學
secondary_types: []
aliases:
- 第三天第七天潔淨預表
- 灑水第三第七天完全潔淨
status: formal
definition: 神學觀點認為民數記19:12,19 規定「第三天、第七天灑水，第七天就潔淨了」預表完全的潔淨：第三天預表基督復活（第三天復活），第七天預表完全/安息（創世記七日創造），兩次灑水代表聖靈反覆應用基督贖罪功效，直到信徒在基督裡得著完全潔淨（來10:14,
  10:22）。
development: 此預表學結合時間數字神學：第三天為復活日，第七天為完全數；希伯來書10:22「心中灑淨」呼應此灑水儀式，強調潔淨是過程（第三天開始）並終極成就（第七天完全）。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第12、19節規定第三天、第七天灑除污穢水，第七天潔淨、洗衣洗澠到晚上潔淨。
  relation: 本章潔淨程序的時間結構，為新約「已經-尚未」潔淨神學提供預表框架。
