name: 摸死屍不潔淨七天
type: 事件
secondary_types: []
aliases:
- 接觸屍體不潔淨
status: formal
definition: 摸了人死屍的，就必七天不潔淨（民19:11）。第三天、第七天須用除污穢水潔淨，否則第七天仍不潔淨（民19:12）。
development: 死屍是舊約最大污穢來源，七天不潔淨對應創造七日，象徵死破壞神創造秩序；第三天、第七天灑水預表基督第三天復活與末世完全潔淨。
accumulations:
- book: 民數記
  chapter: 19
  summary: 摸死屍不潔淨七天，第三天第七天須灑水潔淨。
  relation: 觸發整個紅母牛潔淨制度運作的核心情境，確立「死」為不潔淨根源，需神供應的除污穢水解決。
