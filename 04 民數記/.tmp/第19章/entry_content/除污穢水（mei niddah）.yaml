name: 除污穢水（mei niddah）
type: 原文
secondary_types: []
aliases:
- 除污穢水
status: formal
definition: 希伯來文「mei niddah」（מֵי נִדָּה），字面意為「污穢的水」或「除污穢之水」。由紅母牛燒成的灰（v.9）與活水（v.17）調和而成，用於潔淨因屍體不潔淨的人（v.12-13,
  19-20）。
development: 七十士譯本譯為「ὕδωρ ῥαντισμοῦ」（灑水），拉丁文譯本為「aqua expiationis」（贖罪水）。新約希伯來書9:13-14、10:22以此預表基督寶血與聖靈潔淨信徒良心。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章規定潔淨人收起母牛灰存放營外潔淨處，為會眾調做除污穢水（v.9, 17），並詳述灑水程序（v.18-19）與效力（v.12-13, 20）。
  relation: 此條目為本章潔淨儀式的媒介，連結紅母牛灰與不潔淨人，是潔淨得以實現的關鍵介質。
related_entries:
- 潔淨人收牛灰存放營外潔淨處
- 用牛灰活水調製除污穢水
- 除污穢水預表聖靈潔淨能力
- 牛灰活水預表聖靈潔淨
- 牛膝草灑水預表信心應用寶血
- 灑水人洗衣服不潔淨到晚上
- 不潔淨人不灑水被剪除
