name: 拒絕潔淨被剪除預表拒絕恩典滅亡
type: 神學
secondary_types: []
aliases:
- 不潔淨不灑水被剪除預表
- 拒絕神潔淨方式滅亡
status: formal
definition: 神學觀點認為民數記19:13,20 「不潔淨人不灑水被剪除」預表拒絕神恩典救法（基督贖罪與聖靈潔淨）者必滅亡：除污穢水為神唯一指定潔淨途徑，拒絕灑水即拒絕神的供應，結果「玷污聖所」、「從民中剪除」，預表拒絕基督贖罪、抗拒聖靈（來10:26-29,
  6:4-6）者無法得救，面臨永恆剪除。
development: 此預表學強調救恩的單一性與嚴肅性：舊約儀式中「灑水」是唯一出路，新約中「基督寶血」是唯一潔淨途徑（徒4:12），故意棄絕即落入「剪除/滅亡」審判。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第13、20節規定不潔淨人若不灑水潔淨，玷污帳幕/聖所，必從以色列中剪除。
  relation: 本章潔淨律法的制裁條款，為新約「棄絕恩典無餘下贖罪祭」教義提供預表依據。
