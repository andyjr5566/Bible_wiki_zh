name: 牛膝草灑水預表信心應用寶血（來9：19-22）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 潔淨人用牛膝草蘸除污穢水灑在不潔淨人身上（v.18-19），預表信心藉著聖靈（水）將基督寶血（牛灰所代表的贖罪功效）應用在罪人心上。希伯來書9:19-22記載摩西用牛膝草灑血潔淨百姓，並宣稱「若不流血，罪就不得赦免了」。
development: 牛膝草在出埃及記12:22用於灑逾越節羔羊血於門楣，在利未記14:4-7用於潔淨痊癒的麻風病人，在詩篇51:7大衛求神「用牛膝草潔淨我」，均象徵信心領受潔淨的工具。新約將此上升為「信心接受基督贖罪」的預表。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章規定潔淨人拿牛膝草蘸水，灑在帳棚、器皿、人身上，第三天、第七天灑水（v.18-19）。
  relation: 此為牛膝草作為灑水工具的經文基礎，連結紅母牛灰與不潔淨人，預表信心的操作。
- book: 希伯來書
  chapter: 9
  summary: 19-22節回顧摩西用牛膝草灑血立約，論證血與赦免的關係，並指向基督更美的祭。
  relation: 新約明確將舊約牛膝草灑血儀式視為基督寶血潔淨良心的預表，提供神學釋經依據。
