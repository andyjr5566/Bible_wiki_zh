name: 除污穢水預表聖靈潔淨能力
type: 神學
secondary_types: []
aliases:
- 除污穢水聖靈預表
- 活水牛灰預表聖靈
status: formal
definition: 神學觀點認為民數記19:9,17「除污穢的水」（牛灰加活水）預表聖靈的潔淨能力：牛灰代表基督完成贖罪的工作（灰為火燒盡後餘燼），活水代表聖靈（約7:38-39），兩者結合成為潔淨媒介，灑在不潔淨人身上（v.18-19）預表聖靈將基督贖罪功效應用於信徒，潔淨良心脫離死行（來9:14）。
development: 此預表學連結舊約禮儀與新約真理：水在聖經常預表聖靈（弗5:26, 多3:5），牛灰預表基督贖罪成果，除污穢水即「聖靈藉著基督完成的工作潔淨信徒」。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第9、17節牛灰加活水調製除污穢水，第18-19節灑在不潔淨人身上使潔淨。
  relation: 本章潔淨禮儀的核心媒介，為新約「聖靈潔淨」教義提供預表框架。
