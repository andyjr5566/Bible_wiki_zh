name: 以利亞撒彈血向會幕前七次
type: 事件
secondary_types: []
aliases:
- 紅母牛血彈會幕七次
status: formal
definition: 祭司以利亞撒用指頭蘸牛血，向會幕前面彈七次（民19:4）。七次表完全，血指向會幕，表明潔淨權柄源於神同在處。
development: 血未進聖所，只向會幕彈灑，與贖罪日大祭司進幔內灑血不同，顯示紅母牛儀式為「除污穢」而非「贖罪進前」，屬外圍潔淨儀式。
accumulations:
- book: 民數記
  chapter: 19
  summary: 以利亞撒蘸血向會幕前彈七次。
  relation: 血的儀式動作，將祭牲生命獻於神面前，為後續焚燒與灰燼功效奠定血的根基。
