name: 不潔淨人所摸之物不潔淨
type: 事件
secondary_types: []
aliases:
- 不潔淨傳遞給物品
- 摸不潔淨人物品不潔淨
status: formal
definition: 指民數記19:22 規定，「不潔淨人所摸的一切物就不潔淨；摸了這物的人必不潔淨到晚上」。因死屍而不潔淨的人，其接觸的物品成為不潔淨媒介，再傳遞給接觸物品的人，形成二級傳遞，至晚上才潔淨。
development: 此條例確立不潔淨的傳遞性：人→物→人，強調死屍不潔淨的感染力，須嚴格隔離與潔淨程序。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第22節規定不潔淨人所摸之物不潔淨，摸物者不潔淨到晚上。
  relation: 本章不潔淨律法的總結性條款，呼應第11-16節各類不潔淨源頭，構成完整傳遞鏈。
