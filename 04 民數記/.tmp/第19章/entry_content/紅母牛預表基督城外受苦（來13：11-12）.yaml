name: 紅母牛預表基督城外受苦（來13：11-12）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 紅母牛被牽到營外宰殺焚燒（v.3, 5），預表耶穌基督在城門外受苦釘十字架（來13:11-12）。希伯來書作者明確指出：「那些獸的血被大祭司帶進聖所作贖罪祭，牠們的身體被燒在營外。所以耶穌也要在城門外受苦，好叫百姓因自己的血成為聖潔。」
development: 此互文關係強調基督受死的地點（城外/營外）象徵祂擔當世人的羞辱與咒詛（加3:13），並呼應紅母牛「連皮帶肉、血、糞」全然焚燒，預表基督完全獻上自己。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章記載以利亞撒將母牛牽到營外宰殺（v.3），並在眼前焚燒（v.5），灰燼存放營外潔淨處（v.9）。
  relation: 此為紅母牛儀式中「營外」處決與焚燒的經文基礎，直接被希伯來書引用為基督受難的預表。
- book: 希伯來書
  chapter: 13
  summary: 11-12節引用贖罪祭牲體在營外焚燒的律例，應用於耶穌在城門外受苦，闡釋其神學意義。
  relation: 新約明確確認紅母牛營外焚燒為基督城外受難的預表，提供互文釋經的權威依據。
