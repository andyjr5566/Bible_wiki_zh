name: 第三天第七天預表復活與完全（林前15：4；來10：10）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 不潔淨人必在第三天、第七天接受灑水才能潔淨（v.12, 19）。第三天預表基督第三天復活（林前15:4），第七天預表完全的潔淨與安息（來10:10「我們憑這旨意，靠耶穌基督只一次獻上祂的身體，就得以成聖」）。若第三天不潔淨自己，第七天也不潔淨（v.12），顯示必須根基於復活大能才能進入完全。
development: 猶太傳統將第三天視為「神介入拯救的日子」（創22:4；何6:2），第七日為安息日，象徵救恩的完成。新約神學將此兩時間點綜合為「已然與未然」的張力：在基督復活裏已得潔淨，在末世將得完全。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章規定不潔淨人第三天、第七天用除污穢水潔淨自己，第七天洗衣洗澡到晚上就潔淨了（v.12, 19）。
  relation: 此為潔淨儀式的時間規定，提供預表基督復活與完全成聖的經文依據。
- book: 哥林多前書
  chapter: 15
  summary: 4節宣告基督照聖經所說，第三天復活。
  relation: 新約核心福音真理，為「第三天」預表提供實現的對象。
- book: 希伯來書
  chapter: 10
  summary: 10節說明靠基督一次獻身，我們得以成聖（完全）。
  relation: 新約神學闡述「一次成聖」的完全性，對應第七天潔淨完全的預表。
