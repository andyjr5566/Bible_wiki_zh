name: 灑水人洗衣服不潔淨到晚上
type: 事件
secondary_types: []
aliases:
- 灑除污穢水者不潔淨到晚上
- 潔淨人灑水後不潔淨
status: formal
definition: 指民數記19:21 規定，「那灑除污穢水的人要洗衣服」，並「凡摸除污穢水的，必不潔淨到晚上」。執行灑水禮儀的潔淨人，因接觸除污穢水而成為次級不潔淨，須洗衣服並等到晚上才潔淨。
development: 此規定顯示除污穢水雖能潔淨不潔淨人，但本身帶有「除罪」屬性，接觸者需經過次級潔淨程序，形成不潔淨傳遞的鏈條。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第21節規定灑水人洗衣服，摸除污穢水者不潔淨到晚上。
  relation: 本章潔淨禮儀的收尾條款，呼應第7-8、10節祭司、燒牛人、收灰人同樣「不潔淨到晚上、洗衣服」的模式。
related_entries:
