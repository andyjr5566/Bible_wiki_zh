name: 不潔淨被剪除預表拒絕恩典滅亡（來10：26-29）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 經文兩次警告：不潔淨人若不灑水潔淨自己，就玷污耶和華的帳幕/聖所，必從以色列中/會中被剪除（v.13, 20）。這預表在新約時代，明知真理卻故意犯罪、輕看神兒子、把立約的血當作平常、褻慢施恩的聖靈者，將面臨更重的刑罰（來10:26-29）。
development: 「被剪除」（karat）在舊約意指從立約群體中除名，或遭神直接審判（如創17:14）。新約將此提升為永恆審判的預表，強調拒絕神所提供的唯一潔淨途徑（基督寶血）的嚴重後果。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章兩次規定不潔淨人不灑水潔淨自己，玷污帳幕/聖所，必被剪除（v.13, 20）。
  relation: 此為不潔淨律法的制裁條款，構成預表拒絕恩典滅亡的經文基礎。
- book: 希伯來書
  chapter: 10
  summary: 26-29節警告故意犯罪、踐踏神兒子、褻慢聖靈者，將受更重刑罰。
  relation: 新約直接呼應舊約「被剪除」原則，應用於新約信徒拒絕基督贖罪恩典的屬靈後果。
