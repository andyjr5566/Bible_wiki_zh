name: 不潔淨人不灑水被剪除
type: 事件
secondary_types: []
aliases:
- 拒絕潔淨被剪除
- 不潔淨不灑水從民中剪除
status: formal
definition: 指因摸死屍而不潔淨的人，若不在第3天、第7天接受除污穢水灑濺潔淨自己，即「玷污耶和華的帳幕/聖所」，必「從以色列中剪除」（民數記19:13,20)。第13節針對帳幕，第20節針對聖所，皆因「除污穢的水沒有灑在他身上」，污穢仍在身上。
development: 此條例強調潔淨禮儀的強制性，拒絕神所定潔淨方式即視為褻瀆聖所，後果為社群除名（剪除）。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第13、20節規定不潔淨人若不灑水潔淨，玷污帳幕/聖所，必被剪除。
  relation: 本章潔淨程序的制裁條款，確立「灑水」為唯一獲准進入會眾/聖所的途徑。
