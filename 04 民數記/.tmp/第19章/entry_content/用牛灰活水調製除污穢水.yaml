name: 用牛灰活水調製除污穢水
type: 事件
secondary_types: []
aliases:
- 調製除污穢水
- 牛灰活水調配潔淨水
status: formal
definition: 指照民數記19:9,17 規定，將燒紅母牛留下的灰（除罪灰）放在器皿中，倒上活水（流動的水），調製成「除污穢的水」（mei niddah），用以潔淨因死屍而不潔淨的人。第9節稱此水「本是除罪的」；第17節具體說明為不潔淨的人取灰加活水。
development: 此程序連結紅母牛焚燒產生的灰與活水，構成潔淨禮儀的核心媒介，第三天、第七天灑水即用此水。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第9節潔淨人收牛灰存放營外，為會眾調做除污穢水；第17節為不潔淨的人取燒成的除罪灰加活水。
  relation: 本章紅母牛儀式的產出物，提供後續潔淨程序（第12,18-19節）所需的媒介。
related_entries:
- 紅母牛（parah adumah）
- 潔淨人收牛灰存放營外潔淨處
- 除污穢水（mei niddah）
- 第三天第七天灑水預表完全潔淨
- 牛灰活水預表聖靈潔淨
