name: 以利亞撒牽母牛到營外宰殺
type: 事件
secondary_types: []
aliases:
- 紅母牛營外宰殺
status: formal
definition: 祭司以利亞撒將紅母牛牽到營外，在眾人面前宰殺（民19:3）。這顯示贖罪祭牲須在營外處死，預表基督在城門外受苦。
development: 以利亞撒（大祭司亞倫的兒子）而非大祭司親自執行，象徵這儀式的特殊性；營外宰殺強調污穢被帶離營盤，分離原則明確。
accumulations:
- book: 民數記
  chapter: 19
  summary: 以利亞撒牽母牛到營外，人在祭司面前宰牛。
  relation: 條例執行的第一步動作，確立「營外」為處理死潔不潔的地理神學空間。
