name: 紅母牛（parah adumah）
type: 原文
secondary_types: []
aliases:
- 紅母牛
status: formal
definition: 希伯來文「parah adumah」（פָּרָה אֲדֻמָּה），意指「紅色的母牛」。本章要求牠必須純紅、無殘疾、未曾負軛（v.2），作為除污穢水的原料，是獨特的潔淨儀式核心。
development: 猶太傳統視紅母牛為「超越理性的律例」（chok），拉比教導甚至所羅門王也無法完全明白其奧義。新約希伯來書9:13-14將其與基督獻祭平行對照。
accumulations:
- book: 民數記
  chapter: 19
  summary: 本章開篇即命令以色列人牽一隻純紅、無殘疾、未曾負軛的母牛給祭司以利亞撒，作為除罪的儀式起點。
  relation: 此條目為本章儀式的核心物件，所有後續程序（宰殺、焚燒、收灰、調水）皆圍繞此物展開。
related_entries:
