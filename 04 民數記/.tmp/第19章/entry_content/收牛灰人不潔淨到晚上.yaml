name: 收牛灰人不潔淨到晚上
type: 事件
secondary_types: []
aliases:
- 收灰者不潔淨
status: formal
definition: 收起母牛灰的人必不潔淨到晚上，要洗衣服（民19:10）。這條例給以色列人和寄居的外人作永遠的定例。
development: 即使是「潔淨人」收灰，事後也成為不潔淨，顯示紅母牛灰雖具潔淨功效，其本身帶有「死的污穢」屬性，接觸者需隔離，強調污穢傳遞的嚴肅性。
accumulations:
- book: 民數記
  chapter: 19
  summary: 收牛灰人不潔淨到晚上，須洗衣，作為永遠定例。
  relation: 確立收灰者的潔淨狀態變化，與祭司、燒牛人同樣需隔離到晚上，形成儀式參與者統一的不潔淨模式。
related_entries:
