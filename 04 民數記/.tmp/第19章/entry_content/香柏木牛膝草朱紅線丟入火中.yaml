name: 香柏木牛膝草朱紅線丟入火中
type: 事件
secondary_types: []
aliases:
- 三樣物件投火
status: formal
definition: 祭司將香柏木、牛膝草、朱紅色線丟在燒牛的火中（民19:6）。三物同用於大麻風潔淨禮（利14），象徵潔淨、生命與贖罪的綜合功效。
development: 香柏木表堅固不朽，牛膝草表卑微潔淨工具，朱紅線表贖罪之血色；三者投入火中，使灰燼帶有綜合象徵意義，成為後來調製除污穢水的關鍵成分。
accumulations:
- book: 民數記
  chapter: 19
  summary: 祭司把香柏木、牛膝草、朱紅線丟入燒牛火中。
  relation: 賦予牛灰多重象徵意義，連結其他潔淨儀式（如麻風潔淨），形成聖經潔淨神學的互文網絡。
