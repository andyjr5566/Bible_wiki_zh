name: 死屍不潔淨預表罪的死權勢
type: 神學
secondary_types: []
aliases:
- 死屍不潔淨罪的預表
- 接觸死屍預表罪污染
status: formal
definition: 神學觀點認為民數記19章「摸死屍不潔淨七天」（v.11,16）預表罪帶來的死權勢與污染力：死屍為「死」的具體呈現，羅6:23「罪的工價乃是死」，接觸死屍即接觸罪的後果，導致屬靈不潔淨，無法親近神（帳幕/聖所），須經神所定潔淨方式（除污穢水）才能恢復交通。
development: 此預表學說明罪不僅是行為，更是帶來死亡權勢的狀態（羅5:12, 8:2），舊約以儀式不潔淨預表新約屬靈實質：罪使人與神隔絕，唯有基督贖罪（紅母牛）與聖靈應用（除污穢水）能解決。
accumulations:
- book: 民數記
  chapter: 19
  summary: 第11,13,14,16,20,22節反覆強調死屍不潔淨、玷污帳幕、被剪除、傳遞不潔淨。
  relation: 本章以死屍不潔淨為核心問題，引出紅母牛與除污穢水作為神的解決方案，預表福音解決罪與死。
