    evidence: "民19:3-4 交給祭司以利亞撒執行。丁良才：免大祭司暫時不潔淨危及職務；啟導本：以利亞撒為大祭司繼承人預表基督；串珠註釋：大祭司不可沾染死屍(利21:11)。"
    surfaces:
      - "以利亞撒執行"
      - "大祭司預備"
      - "大祭司不可沾染死屍"