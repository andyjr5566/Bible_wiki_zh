name: 致咒詛的苦水
type: 主題
secondary_types: []
aliases:
- 苦水
- 咒詛的水
status: formal
definition: 民數記 5:18-24 由聖水、會幕塵土、寫有咒誓文字的墨水調和而成。婦人飲下後，若有罪則肚腹發脹、大腿消癟；若無罪則免受災害並能生育。是神聖審判的媒介。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司手拿致咒詛的苦水叫婦人喝；祭司將咒誓寫在書上，抹在苦水裡；婦人喝下，水進入腸中，若被玷污則發脹消癟，若清潔則免災懷孕。
  relation: 核心儀式元素，將隱藏的罪惡帶到神面前公開審判，兼具懲惡揚善、保護無辜、維護社群聖潔的功能。
