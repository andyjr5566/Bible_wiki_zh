status: formal
definition: 重複出現於本章兩大法條：一、驅逐不潔淨者出營（v.3）；二、犯罪認罪賠償條例（v.6）。強調神的律法在儀式潔淨與道德責任上，男女同負同受，無性別特權。
development: v.3 針對儀式不潔（痲瘋、漏症、死屍），v.6 針對道德過犯（干犯耶和華）。前後呼應，顯示營地聖潔要求涵蓋身體與靈魂兩層面，且男女平等承擔責任。
accumulations:
- book: 民數記
  chapter: 5
  summary: v.3 驅逐不潔淨者「無論男女」；v.6 犯罪認罪「無論男女」。
  relation: 本章法律對象的普遍性宣告，奠定後續條例適用範圍。
