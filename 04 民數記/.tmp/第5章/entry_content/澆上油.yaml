- 加油
status: formal
definition: 民數記5:15明令嫉妒素祭「不可澆上油」。常規素祭須加油（利2:1,4-7,15-16），但此素祭因屬「疑恨的素祭、思念的素祭，使人思念罪孽」（v.15），故禁油。油在素祭中象徵喜樂、聖靈膏抹、豐盛；此處禁油凸顯審判嚴肅、無喜樂、直面罪惡。
development: 單節經文（v.15）以否定式規定，與常規素祭形成強烈對比，強調此儀式的特殊懲戒性質。
accumulations:
- book: 民數記
  chapter: 5
  summary: 第15節規定疑恨素祭「不可澆上油」，與利未記常規素祭須加油形成對比。
  relation: 禁油標記此素祭非為馨香火祭、非為敬拜喜樂，乃為「思念罪孽」的審判儀式元素。
