name: 接過來
type: 主題
secondary_types: []
aliases:
- 取過來
- 拿取
- 從手中取
status: formal
definition: 民數記5章中祭司兩次「接過來」動作：(1) v.18 祭司把思念的素祭（疑恨素祭）放在婦人手中——隱含祭司先從丈夫手中接過素祭；(2) v.25
  祭司「從婦人的手中取（接過來）那疑恨的素祭」，在耶和華面前搖一搖、拿到壇前、取一把燒壇。動作標誌素祭從歸屬丈夫/婦人轉為歸屬祭司/耶和華，進入聖所程序。
development: 兩節經文（v.18,25）分別對應儀式起點（交給婦人手中）與終點（祭司取回搖祭燒壇），串聯整個素祭在儀式中的流轉軌跡。
accumulations:
- book: 民數記
  chapter: 5
  summary: 第18節祭司將素祭放在婦人手中（隱含自丈夫接過）；第25節祭司從婦人手中取回素祭搖祭、燒壇。
  relation: 「接過來/取」動作體現素祭從世俗歸屬進入神聖程序，配合苦水試驗的司法流程：呈遞、搖祭、紀念、焚燒。
