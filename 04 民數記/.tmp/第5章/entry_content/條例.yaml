status: formal
definition: 指耶和華賜給摩西、規範特定案件處理程序的法令（民5:29-30）。本章出現「疑恨的條例」（嫉妒條例），規定丈夫疑妻行淫時，祭司須照條例辦理苦水試驗，使男人免受罪罰、婦人擔當罪孽。
development: 條例將主觀懷疑轉化為客觀聖儀，兼顧保護無辜（免受罪罰）與懲惡（擔當罪孽），展現神律法的公義與憐憫雙軌運作。
