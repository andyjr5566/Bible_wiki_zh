name: 阿們（Amen）
type: 原文
secondary_types: []
aliases:
- 阿們
status: formal
definition: 希伯來文 ʾāmēn，意為「誠然、願如此、確定」。本章第 22 節記載婦人在飲苦水試驗時，祭司宣讀咒詛條件後，婦人雙重回應「阿們，阿們」，表示自願置身於誓約咒詛之下，確認誓詞內容真實且自甘其果。
accumulations:
- book: 民數記
  chapter: 5
  summary: 婦人於嫉妒素祭儀式中，對祭司宣讀的咒詛誓詞雙重回應「阿們，阿們」，表達順服與自誓。
  relation: 作為誓約儀式的法律確認用語，見證當事人自願承擔違約後果。
