name: 加上乳香
type: 主題
secondary_types: []
aliases:
- 加乳香
- 放乳香
status: formal
definition: 民數記5:15明令嫉妒素祭「也不可加上乳香」。常規素祭須加乳香（利2:1-2,15-16），乳香象徵禱告上達、馨香之氣；此處禁乳香同禁油，因素祭性質為「疑恨的素祭、思念的素祭，使人思念罪孽」（v.15），不屬馨香火祭範疇。
development: 單節經文（v.15）與禁油並列，共同界定此素祭的獨特身分：非獻祭敬拜、乃審判儀式配件。
accumulations:
- book: 民數記
  chapter: 5
  summary: 第15節規定疑恨素祭「不可加上乳香」，與利未記常規素祭須加乳香形成對比。
  relation: 禁乳香強調此素祭不求神悅納馨香、只求神鑑察罪孽，配合苦水試驗的查審功能。
