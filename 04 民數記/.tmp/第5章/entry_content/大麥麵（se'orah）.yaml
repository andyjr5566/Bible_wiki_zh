name: 大麥麵（se'orah）
type: 原文
secondary_types: []
aliases:
- 大麥麵
- 大麥細麵
status: formal
definition: 希伯來文 se'orah（大麥）與 qemach（細麵/麵）之組合，指由大麥磨製的細麵。民數記 5:15 規定疑恨素祭須用「大麥麵伊法十分之一」，且不可澆油、不可加乳香，象徵這不是歡慶的獻祭，而是為審判與思念罪孽的素祭。
accumulations:
- book: 民數記
  chapter: 5
  summary: 丈夫懷疑妻子行淫，帶妻到祭司面前，須獻上大麥麵伊法十分之一作為疑恨的素祭、思念的素祭。
  relation: 本章核心儀式物品，材質與禁例（無油無乳香）凸顯審判性質，區別於常規素祭。
