name: 站在耶和華面前
type: 主題
secondary_types: []
aliases:
- 在耶和華面前站立
status: formal
definition: 指人被帶至會幕/聖所前，在神臨在中接受審查或審判。民數記 5:16、18、30 三次提到祭司叫婦人「站在耶和華面前」，以及祭司「在耶和華面前搖一搖」素祭，表明整個苦水試驗程序皆在神直接臨在與權威下進行。
accumulations:
- book: 民數記
  chapter: 5
  summary: 婦人被帶到祭司面前，須站在耶和華面前接受苦水試驗；素祭也在耶和華面前搖祭。
  relation: 程序的法律效力源於神的臨在，非單靠人為儀式。
