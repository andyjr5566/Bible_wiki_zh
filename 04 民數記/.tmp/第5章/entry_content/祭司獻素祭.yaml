  chapter: 5
  summary: 祭司執行搖祭、提取紀念素祭焚燒、遞給婦人喝苦水的完整儀式動作。
  relation: 祭司作為神任命的中介，執行嫉妒條例的關鍵儀式步驟，連結供物與審判。
