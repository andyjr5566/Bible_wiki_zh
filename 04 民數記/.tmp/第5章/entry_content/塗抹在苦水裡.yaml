status: formal
definition: 祭司將書上所寫的咒詛字跡，以水洗刷/塗抹的方式溶解於苦水中（民5:23）。此儀式使咒詛之詞「內化」為水的屬性，婦人飲下時即吞入咒詛本身。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司寫完咒詛的話，將所寫的字抹在苦水裡（5:23）。
  relation: 文字與水的結合，象徵神的話語成為審判的媒介；此後水稱為「致咒詛的苦水」，具有審判功能。
