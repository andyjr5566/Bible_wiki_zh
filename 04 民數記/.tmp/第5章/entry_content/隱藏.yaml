name: 隱藏
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指妻子行淫之事「嚴密」、「瞞過他丈夫」，且「沒有作見證的人」、「當他行淫的時候也沒有被捉住」（民5:13）。此隱藏狀態使人無法透過一般法律程序定罪，須仰賴神的審判（苦水試驗）揭露。
development: 經文強調隱藏的人為見證缺失，凸顯「耶和華面前」的儀式為唯一查證管道，體現神知曉隱情、伸張公義的神學觀。
accumulations:
- book: 民數記
  chapter: 5
  summary: 妻子行淫事嚴密、瞞過丈夫、無見證、未被捉住，構成隱藏狀態。
  relation: 隱藏觸發嫉妒條例，使丈夫疑恨須帶妻至祭司，由神以苦水試驗揭露真相。
