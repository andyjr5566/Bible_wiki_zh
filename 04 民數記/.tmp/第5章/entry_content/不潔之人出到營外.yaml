name: 不潔之人出到營外
type: 主題
secondary_types: []
aliases:
- 出營外
status: formal
definition: 耶和華曉諭摩西指示以色列人，使一切身體或禮儀上不潔的人（長大痲瘋的、患漏症的、因死屍不潔淨的），無論男女，一律出到營外隔離（v2-4）。這項指令的核心理由為「這營是我所住的」（v3），因為聖潔的神親自定居在以色列軍營之中，會幕作為神的居所，絕不能容許任何與神聖潔屬性相違背的污染（CT、GT）。在衛生與公共健康層面，隔離可防止傳染病在軍營中蔓延；在靈性與神學層面，不潔不單指外在污垢，也包含死亡、罪性顯露以及身體的反常現象，不潔者留在營中會玷污全營，使百姓失去神的同在（GT）。靈意上，長大痲瘋表徵從人裏面罪性顯露出的罪污，患漏症表徵天然生命的流露與洩漏，因死屍不潔表徵沾染屬靈死亡的污穢（CT）；教會在新約時期亦當除淨舊酵，實行紀律分開，以維持團體的聖潔與神的同在（CT、KC）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 本章第1-4節命令將長大痲瘋、患漏症及摸死屍不潔者無論男女送出營外，維護神同住軍營的絕對聖潔。
  relation: 奠定民數記曠野行軍前「潔淨營地」的第一重禮儀與屬靈防線。
