name: 長大痲瘋
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指嚴重的皮膚病（希伯來文 tzara'at），根據民數記 5:2-4，患者必須被趕出營外，免得污穢神居住的營地。這條例強調營地的聖潔與神同在的純全性。
accumulations:
- book: 民數記
  chapter: 5
  summary: 耶和華吩咐摩西命以色列人使長大痲瘋的、患漏症的、因死屍不潔淨的都出營外，免得污穢營地。
  relation: 確立營地潔淨條例的基礎，顯示神聖潔的要求與祂在百姓中間同在的關係。
related_entries:
- 摩西
- 以色列
- 營外
- 營地潔淨條例
- 痲瘋
- 污穢營地
- 順服神命
- 這營是我所住的
- 曉諭
- 免得污穢
sources:
