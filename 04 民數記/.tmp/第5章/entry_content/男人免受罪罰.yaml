name: 男人免受罪罰
type: 神學
secondary_types: []
aliases:
- 丈夫無罪
- 男人為無罪
status: formal
definition: 民數記 5:31 總結條例：「男人就為無罪，婦人必擔當自己的罪孽」。指丈夫因懷疑而啟動試驗程序，無論結果如何，丈夫不負「誣告」或「處置不當」的罪責，因程序乃神所設立、祭司執行，丈夫僅履行條例權責。
accumulations:
- book: 民數記
  chapter: 5
  summary: 章末總結宣告丈夫在條例下免受罪罰，罪責完全落在婦人身上。
  relation: 保障丈夫行使條例權利不被視為報復或濫權，維持社會秩序與神聖律法權威。
