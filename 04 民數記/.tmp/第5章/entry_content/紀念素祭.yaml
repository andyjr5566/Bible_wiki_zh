name: 紀念素祭
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記 5:15, 25-26 丈夫為妻子獻上的大麥麵伊法十分之一，無油無乳香，稱為「疑恨的素祭、思念的素祭、紀念素祭」。祭司取一把在壇上燒作紀念，餘下歸祭司。此素祭將夫妻關係的爭議「記念」在神面前，求神判斷。
accumulations:
- book: 民數記
  chapter: 5
  summary: 丈夫帶大麥麵伊法十分之一作供物，不可澆油加乳香；祭司搖一搖，拿到壇前，取一把作為紀念燒在壇上，然後叫婦人喝水。
  relation: 素祭是儀式的啟動元素，將人的懷疑轉化為神面前的案件；燒作紀念象徵將判斷權完全交託給神，也是祭司分得的聖物來源之一。
