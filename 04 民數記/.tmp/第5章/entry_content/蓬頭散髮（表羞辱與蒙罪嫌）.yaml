name: 蓬頭散髮（表羞辱與蒙罪嫌）
type: 文化
secondary_types: []
aliases: []
status: formal
definition: 在民數記5:18的疑恨條例中，祭司要使被懷疑行淫的婦人站在耶和華面前，並「叫那婦人蓬頭散髮」。在古代以色列與近東文化中，解開婦女的頭髮（蓬頭散髮）具有多重嚴肅的文化與儀式意涵：(1)
  表徵羞辱與蒙罪嫌地位：頭髮在古代文化中是女人的榮耀與頭飾（林前11:15），解開頭髮使其散亂，象徵婦人此刻正處於被控不貞、失去榮耀與站在蒙罪嫌羞辱的地位上等候神表白（CT）；(2)
  表徵哀悼或悲哀姿態：在舊約中解髮散頭常為哀悼或遭災時的表示（如利13:45大痲瘋患者蓬頭散髮），此處意味著婦人需採取哀悼與悲哀痛悔的姿態，直到神的審判顯明（GT《背景》）；(3)
  表徵背離權壁與頭的順服：男人的頭象徵基督，女人的頭象徵男人（林前11:3, 5），婦人若背著丈夫行淫，即破壞了對丈夫作頭的順服權柄，蓬頭散髮乃將其不順服與混亂的真實狀態暴露於神面前（CT、GT《精讀本》）；(4)
  象徵揭露隱密：將原本包裹約束的頭髮解開，象徵審判過程將揭露隱藏的暗昧與隱情（BH）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 本章第18節規定祭司在執行疑恨試驗時需叫婦人蓬頭散髮站在神面前。
  relation: 補充舊約希伯來文化中關於婦女髮飾、蒙頭、哀悼與罪嫌審判的文化表徵。
