name: 免受罪罰
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指無辜者在神的審判儀式中被宣告無罪、免去災禍（民5:19, 28）。妻子若清潔，喝苦水後「免受這災，且要懷孕」（v28）；丈夫依條例辦理後「男人就為無罪」（v31）。此為神聖程序確認無辜的法律效果。
development: 免受罪罰透過「苦水試驗」這神蹟式審判實現，區別於人為法律程序，強調神親自伸張公義、保護無辜，並賜福（懷孕）作為無辜的積極證據。
accumulations:
- book: 民數記
  chapter: 5
  summary: 清潔婦人喝苦水免受災禍並得懷孕；丈夫依條例行事免受罪罰。
  relation: 為苦水試驗、嫉妒條例、無辜釋放、懷孕、男人免受罪罰的神學目標與結果。
