name: 服事耶和華的祭司
type: 人物
secondary_types: []
aliases: []
status: formal
definition: 指獲授權在會幕事奉、處理聖物與贖罪儀式的祭司（民5:8）。當犯罪者無親屬可受賠償時，賠償款歸屬「服事耶和華的祭司」；並主持嫉妒條例中的苦水試驗（v16-26）。
development: 本章顯示祭司兼具法律執行者（受賠償）、儀式主持者（苦水試驗）與神聖中保角色，強調其服事屬於耶和華，非屬個人職業。
