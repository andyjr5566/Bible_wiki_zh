status: formal
definition: 民數記第5章「嫉妒條例」的核心當事人。指丈夫懷疑行淫、被帶到祭司面前接受苦水試驗的女人（v.12-31）。經文稱「人的妻」（v.12）、「婦人」（v.18,19,22,24,25,27,28）、「妻子」（v.29,30,31）。若清潔則免受災且懷孕（v.28）；若被玷污則肚腹發脹、大腿消瘦、在民中被咒詛（v.27），並擔當自己的罪孽（v.31）。
development: 從被懷疑（v.12-14）、被帶到祭司（v.15）、站在耶和華面前（v.16）、蓬頭散髮手拿素祭（v.18）、發誓喝苦水（v.19-22）、祭司取素祭搖祭燒壇（v.25-26）、喝水驗身（v.27-28），完整呈現一位女性在神聖法庭中接受神判的全過程。
accumulations:
