- 發咒起誓
status: formal
definition: 民數記 5:19-22 祭司叫婦人「發咒起誓」（希伯來文 alah 與 shavu'a），內容包含條件式自我咒詛：若無罪則免災，若有罪則願大腿消癟、肚腹發脹。婦人回答「阿們，阿們」表示自願承擔誓約法律效力，將審判權移交給神。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司依條例叫婦人發咒起誓，婦人雙重回應「阿們」確認誓約生效。
  relation: 誓約是苦水試驗的法律核心，使「苦水」成為執行誓約咒詛的媒介。
