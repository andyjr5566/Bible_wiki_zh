  chapter: 5
  summary: 第12-15,29-31節描述丈夫在嫉妒條例中的角色與責任。
  relation: 丈夫作為申訴人與見證人，其「疑恨的心」觸發神聖審判程序，體現父權社會中神對婚姻關係的介入與保護。
