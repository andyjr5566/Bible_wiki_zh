status: formal
definition: 民數記第5章嫉妒條例的發起者。指心裡起了嫉妒、疑恨妻子行淫，將妻送到祭司那裡、帶上疑恨素祭的男人（v.12-15,29-31）。經文稱「他丈夫」（v.12,13,14,19,20,29）、「男人」（v.31）。若妻被玷污，男人就為無罪（v.31）；若妻清潔，男人同樣無罪，妻子免受災且懷孕（v.28-31）。丈夫的嫉妒心（疑恨）啟動整個司法程序。
development: 丈夫從懷疑（v.14）、帶妻到祭司（v.15）、獻素祭（v.15）、見證全程（v.16-26），到接受結果（v.27-31）。條例保障丈夫不因懷疑而受罰，也防止丈夫任意休妻。
accumulations:
