name: 干犯丈夫
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指妻子背著丈夫與他人行淫，觸犯婚姻盟約、得罪丈夫的行為（民5:12-13, 27, 29, 31）。經文以「干犯丈夫」描述妻子的邪行，構成「嫉妒條例」啟動的前提。
development: 本章將「干犯丈夫」視為嚴重的道德與盟約違背，須透過祭司儀式（苦水試驗）在耶和華面前查明真偽；若證實，婦人必擔當罪孽（v31）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 妻子行邪淫、得罪丈夫，稱為「干犯丈夫」，啟動疑恨條例與苦水試驗。
  relation: 本章核心案由，連結嫉妒素祭、苦水試驗、免受罪罰與擔當罪孽等神學主題。
