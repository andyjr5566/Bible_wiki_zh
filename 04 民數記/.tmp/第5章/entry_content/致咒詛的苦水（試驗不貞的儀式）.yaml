name: 致咒詛的苦水（試驗不貞的儀式）
type: 主題
secondary_types: []
aliases:
- 致咒詛的苦水
- 苦水
status: formal
definition: 「致咒詛的苦水」是民數記第5章中祭司用以試驗被懷疑行淫之婦人是否貞潔的特別聖水（v17-28）。其調製過程為：祭司取盛在瓦器里的聖水（出自會幕外院的洗濯盆），從帳幕地上取點塵土放在水中，並將寫在卷冊上的咒詛誓語抹（洗）在水裏（v17, 23）。水本身並非帶有毒素或滋味苦澀，之所以稱為「苦水」，是因為若婦人背著丈夫行了污穢不貞的事，這水進入她裡面必變苦，並引發「肚腹發脹、大腿消瘦（象徵子宮受損或喪失生育能力）」的神聖懲罰與民中咒詛（v21-22, 27；CT、GT、BH）。反之，若婦人清潔未受玷污，喝下此水後不但免受災害，反而蒙神祝福而能懷孕生子（v28）。此儀式結合了聖水（潔淨）、塵土（審判與死亡）與神的話語誓言，象徵神親自介入審判暗中罪惡，為清白者伸冤，並彰顯神對婚姻聖潔的嚴肅重視（GT、KC）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 本章第17-28節記載致咒詛苦水的調製、起誓、抹字入水及婦人喝下後的兩種顯明結果（發脹消瘦或免災懷孕）。
  relation: 展現神在曠野營中以超自然審判維護婚姻貞潔與家庭和諧的獨特律例。
