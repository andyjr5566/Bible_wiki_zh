name: 使肚腹發脹
type: 主題
secondary_types: []
aliases:
- 使肚腹發脹
status: formal
definition: 若婦人有罪（被玷污），苦水進入腸裡後導致肚腹腫脹的超自然生理現象（民5:21, 22, 27）。此為咒詛應驗的具體徵兆之一，公開顯示其隱匿的姦淫罪行。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司發咒起誓，願耶和華叫婦人肚腹發脹（5:21）；苦水入腸中，要叫肚腹發脹（5:22）；喝了後若有罪，肚腹就要發脹（5:27）。
  relation: 與「使大腿消癟」並列，構成神審判有罪婦人的雙重生理見證。
