name: 瓦器（kelei cheres）
type: 原文
secondary_types: []
aliases:
- 瓦器
status: formal
definition: 希伯來文 kelei cheres（כְּלִי חֶרֶשׂ），意指陶器、土器。民數記 5:17 祭司用瓦器盛聖水，因瓦器易碎、吸水，象徵人脆弱與儀式的一次性聖別用途。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司把聖水盛在瓦器裡，隨後加入會幕地上的塵，調配苦水。
  relation: 作為盛裝聖水的器皿，瓦器在嫉妒儀式中承載神聖液體，其材質暗示儀式的嚴肅與不可逆轉性。
related_entries:
- 亞倫和他兒子（祭司）
- 服事耶和華的祭司
- 聖水
- 會幕地上的塵
- 致咒詛的苦水
- 在耶和華面前獻上
sources:
- '和合本: 民數記 5:17 (https://biblehub.com/numbers/5.htm)'
