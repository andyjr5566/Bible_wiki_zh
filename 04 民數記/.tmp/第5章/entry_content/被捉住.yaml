status: formal
definition: 民數記5:13指出妻子行淫時「當他行淫的時候也沒有被捉住」。指通姦現場被抓獲。本條例專門處理「未被捉住、無見證、事嚴密瞞過丈夫」的隱匿通姦；若被捉住，依律法可直接處決（利20:10；申22:22），不進入苦水試驗程序。
development: 單節經文（v.13）列為啟動條件之一，與「無見證人」並列，界定嫉妒條例的適用範圍：僅限證據不足、無法人力審判的案件。
accumulations:
- book: 民數記
  chapter: 5
  summary: 第13節說明妻子行淫時「沒有被捉住」，是啟動嫉妒條例的前提。
  relation: 「未被捉住」使案件進入神聖法庭，由神親自查審，顯示神對隱匿之罪的主權審判。
