- 干犯耶和華的罪
status: formal
definition: v.6 所稱「人所常犯的罪」，指凡人在人際關係中虧負他人、因而「干犯耶和華」的過犯。經文緊接規定：承認罪、如數賠還、加上五分之一（v.7）。涵蓋財產、誠信等領域的道德債務。
development: 此條例（v.5-10）承接營地潔淨（v.1-4），從儀式潔淨進入道德倫理層面。強調得罪人即得罪神（參創39:9、詩51:4），賠償不僅是民事責任，更是贖愆祭的先決條件（v.8「贖罪的公羊在外」）。
accumulations:
- book: 民數記
  chapter: 5
  summary: v.6 定義罪的性質；v.7-8 規定認罪、賠償、贖罪祭程序。
  relation: 本章第二大法條，連結人際公義與垂直贖罪，顯示聖潔營地要求公義關係。
