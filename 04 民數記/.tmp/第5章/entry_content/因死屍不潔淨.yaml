name: 因死屍不潔淨
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 指因接觸屍體而產生的儀式不潔淨狀態。民數記 5:2-4 規定這類人必須出營外，直到潔淨為止，以維護營地聖潔。
accumulations:
- book: 民數記
  chapter: 5
  summary: 因死屍不潔淨者被列在必須出營外之人名單中，與長大痲瘋、患漏症者同例。
  relation: 屬於營地潔淨條例的一部分，彰顯死與神生命同在的對立，以及社群純潔的維護機制。
