name: 聖水
type: 主題
secondary_types: []
aliases: []
status: formal
definition: 民數記 5:17 指祭司從盆中取的水（或指分別為聖的水），盛在瓦器裡，再加上會幕地上的塵，調配成「致咒詛的苦水」。象徵神聖潔的審判媒介。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司把聖水盛在瓦器裡，取會幕地上的塵放在水中，作為嫉妒試驗的基礎液體。
  relation: 聖水與塵土結合成為苦水，是神介入審判的儀式元素，連結聖所（會幕）與人際關係的公義。
