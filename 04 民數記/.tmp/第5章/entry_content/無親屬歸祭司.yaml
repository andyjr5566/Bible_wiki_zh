name: 無親屬歸祭司
type: 主題
secondary_types: []
aliases:
- 無親屬可受賠償
status: formal
definition: 指犯罪虧負人且需賠償，但受害人已死且無親屬可受賠償之情形。本章第 8 節規定此時賠償款（本金加五分之一）歸屬服事耶和華的祭司，並以贖罪公羊為贖。
accumulations:
- book: 民數記
  chapter: 5
  summary: 規定若虧負人無親屬受賠償，賠償款歸祭司，另以公羊贖罪。
  relation: 體現賠償義務不因受害人缺席而免除，轉歸聖職人員管理，維護公義與聖潔。
