name: 使大腿消癟
type: 主題
secondary_types: []
aliases:
- 使大腿消癟
- 使大腿消瘦
status: formal
definition: 若婦人有罪，苦水導致大腿（生殖器官隱喻）萎縮消瘦的超自然現象（民5:21, 22, 27）。希伯來文「yarek」指大腿/腰脅，此處象徵生育能力被剝奪，與姦淫罪直接對應。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司發咒起誓，願耶和華叫婦人大腿消瘦（5:21）；苦水入腸中，要叫大腿消瘦（5:22）；喝了後若有罪，大腿就要消瘦（5:27）。
  relation: 與「使肚腹發脹」並列，針對生殖系統的懲罰，呼應「姦淫」罪名的屬性。
