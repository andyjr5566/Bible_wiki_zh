status: formal
definition: 若婦人沒有被玷污，卻是清潔的，就要免受這災，且要懷孕（民5:28）。苦水試驗中，神超自然地保護無辜者，不僅免除咒詛，更賜福懷孕，彰顯神的公義與恩典。
