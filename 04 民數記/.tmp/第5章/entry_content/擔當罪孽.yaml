name: 擔當罪孽
type: 神學
secondary_types: []
aliases:
- 承擔罪孽
- 負罪
status: formal
definition: 希伯來文 nasa' avon（舉起/擔負 罪孽）。民數記 5:31 「婦人必擔當自己的罪孽」，指經由苦水試驗被證實有罪者，須獨自承擔行淫的屬靈與法律後果（身體咒詛、社群咒詛），丈夫與祭司不分擔此責。呼應利未記
  5:1、17:16 等「擔當罪孽」用法，強調罪責不可轉嫁。
accumulations:
- book: 民數記
  chapter: 5
  summary: 條例結論宣告有罪婦人必自行擔當罪孽，丈夫為無罪。
  relation: 體現聖經「各人擔當自己的擔子」（加拉太 6:5）原則在婚姻盟約審判中的具體運作。
