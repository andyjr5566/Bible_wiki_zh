name: 所虧負人的
type: 主題
secondary_types: []
aliases:
- 虧負人的物
- 所欠債務
status: formal
definition: v.7 指犯罪者在人際交往中實際虧欠、損害他人的財物或權益。條例要求「如數賠還，另外加上五分之一」（v.7），體現「盜竊必加倍賠償」（出22:7,
  9）的公義原則，並將賠償對象具體化為受害人而非聖所。
development: 賠償行動先於獻祭（v.8「贖罪的公羊在外」），顯示人際和解優於宗教儀式（參太5:23-24）。若無親屬受領，款項歸「服事耶和華的祭司」（v.8），轉為聖物，防止犯罪者佔便宜。
accumulations:
- book: 民數記
  chapter: 5
  summary: v.7 規定賠償細節；v.8 處理無受領人情況。
  relation: 犯罪認罪賠償條例的核心執行項目，落實公義與聖潔的雙重要求。
