- 舉祭歸祭司
status: formal
definition: 以色列人一切聖物中所奉給祭司的舉祭，以及各人所分別為聖的物，都要歸給祭司（民5:9-10）。此規定確立祭司職分的供應來源，屬於犯罪認罪賠償條例中「無親屬歸祭司」的延伸原則。
accumulations:
- book: 民數記
  chapter: 5
  summary: 規定聖物、舉祭、分別為聖之物均歸祭司所有。
  relation: 承接認罪賠償條例（無親屬賠償歸祭司），確立祭司職分經濟基礎，屬聖物管理條例。
