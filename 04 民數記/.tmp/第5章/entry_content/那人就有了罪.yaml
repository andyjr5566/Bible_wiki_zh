name: 那人就有了罪
type: 神學
secondary_types: []
aliases:
- 那人便有罪
- 成為有罪
status: formal
definition: v.6 宣告犯「人所常犯的罪」者「那人就有了罪」。希伯來文 *ʾāšam* 兼具「負罪責」「成為贖愆祭」雙重意涵。指出罪不僅是行為，更是法律地位的改變：人在神面前成為負債者，必須透過認罪賠償與贖愆祭解決。
development: 此語句為犯罪認罪賠償條例的神學定性點。後續「承認」、「賠償」、「獻贖愆祭」（v.7-8）皆建立在「有了罪」這一事實上。呼應利未記5-6章贖愆祭條例，強調罪債必須清償，神不輕易赦免不悔改者。
accumulations:
