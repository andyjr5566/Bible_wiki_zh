status: formal
definition: 希伯來文 yarekh naphal（大腿/腰墜落/消瘦）。民數記 5:21、22、27 三次出現，作為誓約咒詛的具體身體刑罰，象徵生殖能力喪失、體力衰敗，對應懷疑行淫的罪名（生殖領域的背叛），也是神審判臨到的可見證據。
accumulations:
- book: 民數記
  chapter: 5
  summary: 誓約咒詛內容與試驗結果皆包含「大腿消癟」，作為有罪者的身體徵兆。
  relation: 與「肚腹發脹」並列，構成苦水試驗的雙重身體驗證機制。
