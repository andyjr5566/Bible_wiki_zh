name: 解髮
type: 主題
secondary_types: []
aliases:
- 蓬頭散髮
- 散髮
- 解開頭髮
status: formal
definition: 希伯來文 para'（鬆開、散亂）。民數記 5:18 祭司叫婦人「蓬頭散髮」（直譯：使婦人頭髮散開），象徵羞辱、喪禮狀態、或處於神審判下的暴露狀態（參利未記
  10:6、13:45），表明受審者失去遮蓋，直面神的鑑察。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司叫受審婦人蓬頭散髮，站在耶和華面前，手拿疑恨素祭。
  relation: 儀式動作視覺化「被揭露、無遮蓋」的狀態，配合苦水試驗的審判功能。
