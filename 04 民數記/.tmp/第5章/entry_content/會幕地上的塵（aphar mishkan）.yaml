name: 會幕地上的塵（aphar mishkan）
type: 原文
secondary_types: []
aliases:
- 會幕塵土
- 帳幕地上的塵
status: formal
definition: 希伯來文 aphar mishkan（עֲפַר הַמִּשְׁכָּן），指會幕地板上的塵土。民數記 5:17 祭司取此塵放入聖水中，象徵將神同在的見證引入審判程序。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司從帳幕的地上取點塵土，放在瓦器裡的聖水中，成為致咒詛苦水的成分。
  relation: 塵土代表神居所的聖潔與見證，使苦水試驗不只是人為儀式，乃是神親自介入的法庭審判。
related_entries:
- 亞倫和他兒子（祭司）
- 服事耶和華的祭司
- 聖水
- 瓦器
- 致咒詛的苦水
- 在耶和華面前獻上
sources:
- '和合本: 民數記 5:17 (https://biblehub.com/numbers/5.htm)'
