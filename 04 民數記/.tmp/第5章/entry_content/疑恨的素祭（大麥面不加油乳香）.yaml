name: 疑恨的素祭（大麥面不加油乳香）
type: 主題
secondary_types: []
aliases:
- 疑恨的素祭
- 思念的素祭
status: formal
definition: 當丈夫對妻子生了疑恨的心、懷疑妻子行淫卻無確鑿見證人時，丈夫需帶妻子到祭司面前，並為她帶來大麥麵伊法十分之一（約2.2公升）作為供物（v15）。這供物被稱為「疑恨的素祭」或「思念的素祭，使人思念罪孽」（v15）。與一般平安祭或常規素祭使用細麵並澆上油、加上乳香不同（利2:1），此素祭使用最賤價、最粗質的大麥麵，象徵被懷疑者與懷疑者皆處於卑下困境與悲哀心態，且絕不可澆油（油象徵聖靈與喜樂）也不可加乳香（乳香象徵神的悅納與禱告香氣），因為神絕不在不義與罪孽中得著滿足（CT、GT、KC）。此素祭不與燔祭或平安祭一同獻上，而是單獨拿在婦人手中（v18），由祭司在耶和華面前搖一搖後，取出一把作為紀念燒在壇上（v25-26），以此將疑難與暗中的罪孽完全陳明在鑒察人心的大審判主面前（CT、GT）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 本章第15、18、25-26節規範丈夫疑妻不貞時須獻上的大麥麵素祭，禁止加油與乳香，並由祭司取一把燒在壇上作為思念罪孽的紀念。
  relation: 為利未記素祭體系補充針對婚姻疑忌、無油無乳香的特殊贖罪審判性素祭。
