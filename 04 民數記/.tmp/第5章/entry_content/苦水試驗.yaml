name: 苦水試驗
type: 主題
secondary_types: []
aliases:
- 苦水試驗條例
- 喝苦水試驗
status: formal
definition: 祭司將聖水盛在瓦器中，取會幕地上的塵放在水中，寫咒詛的話抹在苦水裡，叫婦人喝。這水進入腸裡變苦，若婦人有罪，肚腹發脹、大腿消瘦，成為咒詛；若無辜，免受災且懷孕（民5:17-24,
  27-28）。此為神聖審判儀式，將隱藏之罪交託神揭示。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司調配苦水（聖水+塵土+咒詛字），婦人發誓喝下，身體反應驗證清白或有罪。
  relation: 丈夫疑妻行淫釋疑條例的核心儀式，體現神作公義審判者，超越人類證據限制。
