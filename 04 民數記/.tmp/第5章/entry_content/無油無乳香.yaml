name: 無油無乳香
type: 主題
secondary_types: []
aliases:
- 不可澆油不可加乳香
status: formal
definition: 民數記 5:15 規定疑恨素祭「不可澆上油，也不可加上乳香」。油與乳香常用於馨香的獻祭（如利未記 2:1-2），此處排除象徵此祭非為悅納、喜樂，而是為「思念罪孽」、引發神審判的儀式。
accumulations:
- book: 民數記
  chapter: 5
  summary: 疑恨素祭獻上時明確禁止加油與乳香，以區別於常規素祭。
  relation: 儀式細節強調審判與嚴肅，對應「使人思念罪孽」的功能。
