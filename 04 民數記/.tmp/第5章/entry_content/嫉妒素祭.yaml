status: formal
definition: 丈夫懷疑妻子行淫時所帶的供物：大麥麵伊法十分之一，不可澆油、加乳香（民5:15）。稱為「疑恨的素祭」（嫉妒素祭）和「思念的素祭」，使人思念罪孽。祭司取此素祭在耶和華面前搖一搖，拿到壇前，取一把作為紀念燒在壇上（民5:25-26）。
accumulations:
- book: 民數記
  chapter: 5
  summary: 丈夫為妻帶來的特殊素祭，無油無乳香，經搖祭、紀念素祭焚燒程序。
  relation: 作為苦水試驗的啟動供物，象徵將隱藏之罪帶到神面前思念、審判。
