- 嫉妒的靈
status: formal
definition: 民數記5:14,30描述丈夫「心裡起了嫉妒」（原文 ruach qin'ah，直譯「嫉妒的靈/風」），即懷疑妻子行淫的強烈情緒與動機。這種「疑恨的心」無論妻子是否真被玷污（v.14,30），都使丈夫有權將妻帶到祭司面前，依嫉妒條例辦理。神不責備丈夫的嫉妒，反提供儀式讓真相大白，保護無辜妻子、懲罰有罪者、釋放丈夫無罪（v.31）。
development: 經文兩次重述（v.14,30）強調「嫉妒/疑恨」是條例的啟動鑰匙。神學上顯示：神認真對待婚姻誓約、重視隱情、提供超自然查證機制、平衡丈夫權柄與妻子權益。
accumulations:
- book: 民數記
  chapter: 5
  summary: 第14、30節兩度提到丈夫「心裡起了嫉妒/生了疑恨的心」，作為嫉妒條例的啟動原因。
  relation: 「嫉妒的靈」非單純人類情緒，乃神所許可、納入法律程序的動機，彰顯神對婚姻聖潔的維護超越人類司法極限。
