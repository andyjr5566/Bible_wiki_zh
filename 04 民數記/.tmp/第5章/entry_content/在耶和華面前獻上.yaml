name: 在耶和華面前獻上
type: 主題
secondary_types: []
aliases:
- 在耶和華面前獻上
status: formal
definition: 指祭司將疑恨的素祭（大麥麵伊法十分之一）從婦人手中接過，在耶和華面前搖一搖，呈獻於壇前的儀式動作（民5:16, 18, 25）。象徵將案件提交至神的審判台前，尋求公義的裁決。
accumulations:
- book: 民數記
  chapter: 5
  summary: 祭司取走婦人手中的素祭，在耶和華面前搖一搖，拿到壇前（5:25）；婦人站在耶和華面前，素祭放在她手中（5:18）；祭司使婦人近前來，站在耶和華面前（5:16）。
  relation: 此動作啟動苦水試驗的司法程序，將隱藏的罪行置於神的全知鑑察之下。
