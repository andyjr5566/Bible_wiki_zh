organization: "### 營地潔淨：趕出不潔淨者（v1-4）\n\n耶和華[[曉諭]][[摩西]]，吩咐[[以色列]]人將一切[[長大痲瘋]]的、患漏症的、並因[[死屍不潔淨]]的，全都趕到[[營外]]去。無論男女，都要出到營外，==免得污穢他們的營==；因為「[[這營是我所住的]]」。以色列人[[順服神命]]，照著耶和華吩咐摩西的話去行。這段建立了[[營地潔淨條例]]的核心原則：神的同在要求營地聖潔，不潔淨者必須隔離，以免[[污穢營地]]。\n\
  \n### 犯罪認罪與賠償條例（v5-10）\n\n耶和華對摩西說，吩咐以色列人：[[無論男女]]，若犯了[[人所常犯的罪]]，干犯耶和華，[[那人就有了罪]]。他要承認所犯的罪，將[[所虧負人的]][[如數賠還]]，另外加上五分之一，歸與所虧負的人。若沒有[[親屬]]可受所賠還的，所賠還的就歸與[[服事耶和華的祭司]]；至於那為他[[贖罪]]的公羊是在外。此外，以色列人一切的[[聖物歸祭司|聖物]]中所奉給[[服事耶和華的祭司|祭司]]的舉祭都要歸與祭司；各人所[[分別為聖]]的物，無論是什麼，都要歸給祭司。這段確立了[[犯罪認罪賠償條例]]：認罪、賠償、加五分之一、[[無親屬歸祭司]]，並重申[[聖物歸祭司]]的原則。\n\
  \n### 嫉妒素祭與苦水試驗（v11-31）\n\n當[[丈夫]][[心裡起了嫉妒]]，疑恨[[妻子]]，懷疑她[[行邪淫]]、[[干犯丈夫]]，事情嚴密、[[隱藏]]、沒有[[見證人]]、也沒有被[[被捉住]]時，丈夫要將妻送到[[服事耶和華的祭司|祭司]]那裡，帶著[[大麥麵（se'orah）|大麥麵]][[素祭伊法十分之一（minchah\
  \ 'issaron ha'efah）|伊法十分之一作素祭]]，==不可[[澆上油]]，也不可[[加上乳香]]==；因為這是[[嫉妒素祭|疑恨的素祭]]，是[[嫉妒素祭|思念的素祭]]，使人思念罪孽。\n\
  \n**儀式流程：**\n\n```mermaid\nflowchart TD\n  A[\"婦人站在耶和華面前\"] --> B[\"祭司取聖水盛在瓦器<br>加會幕地上的塵\"\
  ]\n  B --> C[\"婦人解髮<br>手拿疑恨素祭\"]\n  C --> D[\"祭司手拿致咒詛苦水<br>叫婦人發誓起誓\"]\n  D --> E[\"\
  祭司寫咒詛話<br>抹在苦水裡\"]\n  E --> F[\"婦人喝苦水<br>水入腸裡變苦\"]\n  F --> G[\"祭司取素祭搖一搖<br>拿到壇前\"\
  ]\n  G --> H[\"取一把作紀念燒在壇上\"]\n  H --> I[\"婦人喝水<br>驗證結果\"]\n```\n\n祭司叫婦人[[站在耶和華面前]]，把[[聖水]]盛在[[瓦器（kelei\
  \ cheres）|瓦器]]裡，從[[會幕地上的塵（aphar mishkan）|會幕地上的塵]]取點放在水中。婦人[[解髮]]，手拿[[嫉妒素祭|思念的素祭]]，祭司手拿[[致咒詛的苦水]]，叫婦人[[發誓]]：若無人與她行淫，免受這水的災；若背著丈夫行污穢事，願耶和華叫她[[大腿消癟]]、[[肚腹發脹]]，在民中被咒詛。婦人要回答「[[阿們（Amen）|阿們]]，阿們」。祭司將咒詛話[[寫在書上]]，[[塗抹在苦水裡]]，叫婦人喝。隨後祭司從婦人手中取素祭，在耶和華面前搖一搖，拿到壇前，[[取一把]]作[[紀念素祭]][[在壇上燒]]，然後叫婦人喝水。\n\
  \n**驗證結果：**\n\n| 情況 | 結果 |\n|------|------|\n| 婦人被玷污、得罪丈夫 | 苦水入腸變苦，肚腹發脹、大腿消癟，在民中被咒詛\
  \ |\n| 婦人未被玷污、清潔 | 免受災，且要[[懷孕]] |\n\n這就是[[嫉妒條例|疑恨的條例]]。丈夫就為無罪（[[男人免受罪罰]]），婦人必[[擔當自己的罪孽]]。\n\
  \n> [!important] 本章樞紐\n> 民數記 5 章呈現三層聖潔秩序：空間上（[[營地潔淨條例]]）、社會上（[[犯罪認罪賠償條例]]）、家庭上（[[嫉妒素祭]]）。神住在營中，要求全營聖潔；人與人關係破裂需認罪賠償；隱而未發的婚姻不忠，交由神在儀式中公開審判。[[苦水試驗]]不是魔法，而是將隱情帶到神面前，由神親自伸冤或洗清。\n\
  \n> [!note] 歷史背景補充\n> 古近東也有「河水試驗」（如漢摩拉比法典 §132），但聖經版本獨特之處：① 由祭司在聖所執行，非法庭；② 使用聖水、會幕塵土、書寫咒詛，強調神的同在；③\
  \ 結果由神主權決定，非自然毒性；④ 保護婦人免受丈夫私刑，程序公開、有法律保障。\n\n### 跨章脈絡：從營地秩序到會幕事奉\n\n民數記 1–4 章建立營地佈局與利未人職任；第\
  \ 5 章轉向營地內部的道德與儀式潔淨。[[營地潔淨條例]]呼應利未記 13–15 章；[[犯罪認罪賠償條例]]發展利未記 5–6 章贖愆祭條例；[[嫉妒素祭]]則是獨特的家庭聖潔條例。這三條例共同為後續拿細耳人條例、會幕啟用鋪路：聖潔的營地、公義的社會、忠信的家庭，才配承接神的同在與祝福。"
