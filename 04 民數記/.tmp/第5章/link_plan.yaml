- name: 古代近東神明裁判（致咒詛苦水的背景比較）
  suggested_type: 背景
  evidence: BH v23-24：「神明裁判」指透過某種通常危險的機制，把被告放在神的手中——神若插手保護，即宣告清白；古代近東大部分神明裁判牽涉水、火、毒藥等危險，本段不施法術，只是製造供神作出回應的環境，故女子是假定清白直到環境證明相反。漢摩拉比法律亦包括類似案例，女子在河中接受神明裁判。GT（難解經文）：馬里文獻提到神明喝飲混和了城門泥土的水以約束神明履行誓言。GT（串珠）：真正使儀式有效的仍然是全能的神，以色列人不會以為咒詛的苦水本身有魔術能力。
  target_path: link_folder/背景/古代近東神明裁判（致咒詛苦水的背景比較）.md
- name: 致咒詛苦水儀式是否迷信之爭
  suggested_type: 解經爭議
  evidence: GT（難題篇）v11-31：兩種立場。①肯定立場：神所用的超自然方法，與人的惡毒苦刑截然不同，水本無害，神的干涉使其有效；是仁愛的方法，免除許多無辜婦女被虐待的冤屈（李道生）。②科學解釋立場：引起的原因是屬靈或心理上的作用，有罪婦人因罪惡感可產生「假性懷孕」腹脹（身心關係，psychosomatic）；苦水如測謊器，無辜女人不會有後果（賈斯樂郝威）。GT《啟導本》：以後聖經未再提到此法。
  target_path: link_folder/解經爭議/致咒詛苦水儀式是否迷信之爭.md
