book: "04 民數記"
chapter: 5
updates:
  - title: "摩西"
    path: "link_folder/人物/摩西.md"
    summary: "民5:1,5,11 耶和華曉諭摩西說...耶和華對摩西說...耶和華對摩西說。摩西作為條例傳遞者。"
    relation: "民數記第5章：摩西接收神關於營地潔淨、犯罪賠償、嫉妒條例的啟示，並傳遞給以色列人。"
  - title: "以色列"
    path: "link_folder/原文/以色列.md"
    summary: "民5:2,6,9,12,31 你吩咐以色列人...你曉諭以色列人說...以色列人一切的聖物...以色列人中...以色列人就這樣行。條例針對全會眾。"
    relation: "民數記第5章：以色列全會眾為潔淨營地、認罪賠償、嫉妒條例的對象，須順服神命。"
  - title: "亞倫和他兒子（祭司）"
    path: "link_folder/人物/亞倫和他兒子（祭司）.md"
    summary: "民5:8,15,16,17,18,19,20,21,23,25,26,28,30,31 那所賠還的就要歸與服事耶和華的祭司...把妻子帶到祭司面前...祭司叫婦人站在耶和華面前...祭司取聖水...祭司手裡拿致咒詛的苦水。祭司執行嫉妒條例、收聖物、獻祭。"
    relation: "民數記第5章：亞倫和他兒子作為祭司執行嫉妒條例、收取無親屬賠償、收聖物、獻祭，預表基督大祭司代求。"
  - title: "大祭司"
    path: "link_folder/人物/大祭司.md"
    summary: "民5:8,15,16,17,18,19,20,21,23,25,26,28,30,31 祭司...大祭司預表基督代求。KC：祭司為屬靈成熟信徒，代人擔當重擔。BH：祭司執行嫉妒條例全程。"
    relation: "民數記第5章：大祭司（祭司）執行嫉妒條例、收聖物、獻祭，預表基督大祭司代求、審判。"
  - title: "咒詛"
    path: "link_folder/神學/咒詛.md"
    summary: "民5:21,22,23,27 耶和華使你的大腿消癟，肚腹發脹...這致咒詛的苦水必進入你腸裡...婦人喝這致咒詛的苦水。CT：咒詛預表基督為我們成了咒詛（加3:13）。KC：咒詛臨到有罪者。BH：大腿消癟、肚腹發脹為咒詛徵兆。"
    relation: "民數記第5章：嫉妒條例中苦水帶來咒詛，預表基督為我們成了咒詛（加3:13），有罪者自擔其咎。"
  - title: "分別為聖"
    path: "link_folder/神學/分別為聖.md"
    summary: "民5:10 各人所分別為聖的物，無論是什麼，都要歸給祭司。CT：分別為聖歸神預表信徒完全獻給神（羅12:1）。KC：分別為聖離開人手完全獻給神。BH：聖物歸祭司供養。"
    relation: "民數記第5章：聖物分別為聖歸神，再歸祭司供養，預表信徒完全獻給神（羅12:1）。"
  - title: "曠野"
    path: "link_folder/地點/曠野.md"
    summary: "民5:1,5,11 耶和華曉諭摩西說...耶和華對摩西說...耶和華對摩西說。神在曠野向摩西啟示條例。"
    relation: "民數記第5章：神在曠野向摩西啟示潔淨營地、犯罪賠償、嫉妒條例，為以色列人起行預備。"
  - title: "西乃山"
    path: "link_folder/地點/西乃山.md"
    summary: "民5:1 耶和華曉諭摩西說。神在西乃山曉諭潔淨營地條例。"
    relation: "民數記第5章：神在西乃山向摩西啟示潔淨營地、犯罪賠償、嫉妒條例。"
  - title: "以色列全會眾"
    path: "link_folder/人物/以色列全會眾.md"
    summary: "民5:2,6,9,12,31 你吩咐以色列人...你曉諭以色列人說...以色列人一切的聖物...以色列人中...以色列人就這樣行。條例針對全會眾。"
    relation: "民數記第5章：以色列全會眾須遵行潔淨營地、認罪賠償、嫉妒條例，維持營地聖潔。"
  - title: "營外"
    path: "link_folder/地點/營外.md"
    summary: "民5:2,3,4 都出營外去...使他們出到營外...以色列人就這樣行，使他們出到營外。營外為隔離之地。"
    relation: "民數記第5章：不潔淨者（痲瘋、漏症、死屍不潔）須出營外隔離，預表教會除去邪惡舊酵（林前5:6-7）。"
  - title: "贖罪"
    path: "link_folder/神學/贖罪.md"
    summary: "民5:8 至於那為他贖罪的公羊是在外。CT：贖罪預表基督贖罪。KC：贖愆祭公羊贖罪。BH：利未記5:15-16贖罪公羊。"
    relation: "民數記第5章：贖愆祭公羊為虧負人之罪贖罪，預表基督贖罪（利未記5:15-16）。"
