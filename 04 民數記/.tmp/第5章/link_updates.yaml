book: 民數記
chapter: 5
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 本章第1、5、11節記載耶和華多次曉諭摩西，傳達不潔隔離、認罪賠償與疑恨試驗律例。
  relation: 摩西作為神與以色列民的中保，將關乎民營潔淨與家庭和睦的神聖律例忠實傳達給百姓。
- title: 大痲瘋（tsara'at，皮膚病診斷條例）
  path: link_folder/原文/大痲瘋（tsara'at，皮膚病診斷條例）.md
  summary: 本章第2節指令將長大痲瘋者送出營外隔離（v2）。GT指出此處大痲瘋指一般的傳染性皮膚疾病（如癬癩）；CT靈意表徵從人裏面罪性顯露出來的罪污；KC指出其預表爆發未經審判的罪。
  relation: 延伸利未記13-14章大痲瘋診斷與潔淨條例，落實大軍行軍安營時隔離不潔者的具體行政與屬靈防線。
- title: 漏症（身患漏症的條例）
  path: link_folder/原文/漏症（身患漏症的條例）.md
  summary: 本章第2節指令將患漏症者（性器官不正常流疾）送出營外。CT靈意表徵天然生命的洩漏與不潔；GT指出其指長期性器官流疾（利15章），預表不潔者不得立於神面前。
  relation: 延伸利未記15章漏症條例，將性器官流疾之不潔者納入營外隔離防線。
- title: 認罪
  path: link_folder/主題/認罪.md
  summary: 本章第7節規定若犯了人常犯的罪干犯耶和華，「他要承認所犯的罪」。CT靈意指出不僅要向受害人認罪，更要向神認罪（約壹1:9）；GT《精讀本》指出向對方認罪是求原諒並承認神真理的正當性。
  relation: 與利未記5-6章贖愆祭之認罪條例呼應，強調人際間虧負之對付必須以真誠認罪與賠償為基礎。
- title: 加五分之一贖回原則
  path: link_folder/主題/加五分之一贖回原則.md
  summary: 本章第7節規定虧負人者除原數賠還外，「另外加上五分之一，也歸與所虧負的人」。CT指這是懲罰性賠償；BH指出加兩成（20%）可懲戒不誠實並補償受害人之不便；GT背景比較漢摩拉比法典加六分之一利息。
  relation: 承接利未記5:16、6:5、27:13等「加五分之一」補償原則，確立舊約律法關於侵權賠償與恢復同心和睦的公義法則。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: 本章第8節規定賠償虧負之外，犯罪者仍需獻上一隻公羊作為贖罪/贖愆祭。CT與GT說明賠償處理人際損害，贖愆祭公羊處理對神的干犯，兩者並行不可偏廢。
  relation: 呼應利未記5:14-6:7贖愆祭條例，強調任何得罪人的罪本質上皆干犯了神，必須藉血祭贖罪。
- title: 舉祭（terumah）
  path: link_folder/原文/舉祭（terumah）.md
  summary: 本章第9節規定「以色列人一切的聖物中，所奉給祭司的舉祭都要歸與祭司」。CT說明舉祭指將祭物垂直向上舉起擺動表示獻給神，後歸祭司享用；BH指出這是對無土地產業之祭司階層的日常生活供應保障。
  relation: 與利未記7:14、32與民數記18章舉祭定例呼應，劃清聖物中歸給祭司應得之分的合法權益。
- title: 聖物
  path: link_folder/主題/聖物.md
  summary: 本章第9-10節規定以色列人分別為聖之物與舉祭聖物一律歸給祭司。CT說明聖物係指分別出來歸給神為聖的祭物與禮物；GT《精讀本》說明「分別為聖」意即離開人的手完全獻給神。
  relation: 連結利未記與民數記關於聖物劃歸、禁私用及供給祭司聖職的律法體系。
- title: 忌邪（嫉妒）
  path: link_folder/原文/忌邪（嫉妒）.md
  summary: 本章第14與30節「疑恨的心」（原文 qin'ah：妒忌、狂熱），指丈夫對妻子生了疑忌的心。GT與KC說明此疑恨若出自維護婚姻純潔之真愛，本身不構成犯罪；KC並延伸至神對祂子民不貞（拜偶像/世俗妥協）的神聖忌邪（林後11:2）。
  relation: 深化舊約中關於忌邪/嫉妒之原文涵義，從神對選民的神聖忌邪延伸至人際婚姻中維護純潔的保護性疑忌。
- title: 搖祭（tenufah）
  path: link_folder/原文/搖祭（tenufah）.md
  summary: 本章第25節規定祭司要從婦人手中取疑恨的素祭，「在耶和華面前搖一搖」。CT說明這是將素祭前後擺動獻給神；本章將搖祭用於無油無乳香的大麥面素祭，是搖祭用於非平安祭脈絡的特例。
  relation: 補充出埃及記29章、利未記7章、8章、14章、23章搖祭體系，展現搖祭動作在疑恨審判儀式中的獨特應用。
- title: 紀念份
  path: link_folder/原文/紀念份.md
  summary: 本章第26節規定祭司要從疑恨素祭中「取出一把，作為這事的紀念，燒在壇上」。CT說明紀念指將這事向神陳明；GT《精讀本》說明這是作為獻給「神的證據」。
  relation: 呼應利未記2:2、5:12常規素祭取出一把作為紀念份燒在壇上的典章，將疑案陳明於神面前。
- title: 伊法
  path: link_folder/原文/伊法.md
  summary: 本章第15節規定疑恨素祭的份量為「大麥麵伊法十分之一」。GT說明十分之一伊法約折合2.2公升，此乃個人獻素祭的標準乾量單位。
  relation: 與出埃及記16:36、利未記5:11、6:20等處伊法容量單位及十分之一伊法素祭份量相互對照。
- title: 洗濯盆（銅盆）
  path: link_folder/主題/洗濯盆（銅盆）.md
  summary: 本章第17節祭司盛在瓦器裡的「聖水」，CT與GT均指出係取自會幕外院的銅洗濯盆（出30:18）。GT《精讀本》指出洗濯盆的水象徵潔淨信徒靈魂的活水與基督寶血。
  relation: 連結出埃及記30:18與40:30洗濯盆之潔淨功能，將事奉洗滌聖水延伸用於試驗隱密罪惡的儀式中。
- title: 污穢
  path: link_folder/主題/污穢.md
  summary: 本章貫穿「污穢」主題：v3「免得污穢他們的營」，v13, 19, 20, 27, 29「背著丈夫行了污穢的事」。CT與GT指出污穢包含疾病、死亡、罪惡與性不貞，神同住的軍營與婚姻絕不容許污穢。
  relation: 連結利未記11-15章與民數記全書關於潔淨與污穢的神學架構，維護神同在之軍營的絕對聖潔。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: 本章第15、18、25-26節規範「疑恨的素祭」，使用最粗賤的大麥麵，且絕不可澆油、不可加乳香（v15）。CT與KC指出此乃特殊的贖罪審判性素祭，無油無乳香因為神絕不在不義中得喜樂。
  relation: 為利未記第2章與第6章素祭體系補充針對婚姻疑忌、不加油乳香的特殊素祭變體。
