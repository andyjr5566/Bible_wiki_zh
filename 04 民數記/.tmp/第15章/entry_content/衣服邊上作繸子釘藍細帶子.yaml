name: 衣服邊上作繸子釘藍細帶子
type: 事件
secondary_types: []
aliases:
- 繸子條例
- 穿繸子誡命
status: formal
definition: 耶和華曉諭摩西，吩咐以色列人世世代代在衣服邊上做繸子，又在底邊的繸子上釘一根藍細帶子。佩帶這繸子，好叫他們看見就記念遵行耶和華一切的命令，不隨從自己的心意、眼目行邪淫，使他們記念遵行神一切的命令，成為聖潔，歸與耶和華他們的神。結語重申：我是耶和華你們的神，曾把你們從埃及地領出來，要作你們的神。
development: 此條例（37-41節）作為本章結語，從獻祭、贖罪、審判轉向日常生活的聖潔提醒。繸子與藍細帶子成為視覺符號，時刻提醒百姓屬神的身分與順服的責任，將敬拜從聖所延伸至日常穿著。
accumulations:
- book: 民數記
  chapter: 15
  summary: 頒布繸子條例，規定製作方式（衣服邊、藍細帶子）與功能（視覺提醒、防止隨心意眼目行邪淫、成為聖潔），並以出埃及救贖為順服基礎。
  relation: 本章第五段（37-41節），以日常穿著儀式封閉全章，將聖潔要求內在化、生活化。
