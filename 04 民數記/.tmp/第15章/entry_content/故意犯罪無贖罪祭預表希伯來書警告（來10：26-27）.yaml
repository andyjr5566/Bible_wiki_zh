name: 故意犯罪無贖罪祭預表希伯來書警告（來10：26-27）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 15 章 30-31 節規定：「那擅敢行事的……他褻瀆了耶和華，必從民中剪除……因他藐視耶和華的言語，違背耶和華的命令，那人總要剪除；他的罪孽要歸到他身上。」這「擅敢行事」（高舉手、故意悖逆）無贖罪祭可贖，必被剪除。新約希伯來書
  10:26-27 警告：「我們得知真道以後，若故意犯罪，贖罪的祭就再沒有了，只能切切等候審判和那燒滅眾敵人的烈火。」兩者高度平行：舊約故意違背摩西律法者死無赦，新約故意踐踏神兒子、以聖約的血為平常者，刑罰更重（來
  10:29）。民數記 15 章 32-36 安息日撿柴人即為「擅敢行事」的具體執行案例。
development: 從舊約儀式律法下的「剪除」（社群除名/死刑）推進到新約終極審判的「烈火」；希伯來書作者刻意引用民數記 15 原則（來 10:28 「干犯摩西律法的，憑兩三個見證人，尚且不得憐恤而死」），以此為較輕者，反襯棄絕基督之罪的極重。
accumulations:
- book: 民數記
  chapter: 15
  summary: 規定誤犯罪有贖罪祭可贖，但擅敢行事（故意犯罪）無贖罪祭，必從民中剪除，罪孽歸到自己身上。
  relation: 本章故意犯罪律法為希伯來書 10:26-27 警告的直接舊約背景與神學基礎。
