name: 繸子（tzitzit）
type: 原文
secondary_types: []
aliases:
- 繸子
status: formal
definition: 希伯來文「צִיצִת」（tzitzit），原意為「髮辮、穗、流蘇」。民數記 15 章 38-39 節神吩咐以色列人「世世代代在衣服邊上做繸子」，即在外袍四角的下擺縫上流蘇。這繸子不只是裝飾，更配合「藍細帶子」（techelet）作為視覺記號，提醒百姓記念遵行耶和華一切命令，成為聖潔。猶太傳統後發展為塔利特（禱告披肩）與小塔利特（日常內穿四角衣）上的流蘇，並有特定打結方式（如
  7-8-11-13 圈）對應神名數值。
development: 從舊約外袍四角流蘇發展為猶太教核心儀式服飾元素；新約時代耶穌衣服邊上也有繸子（太 9:20, 14:36），耶穌責備法利賽人「將繸子做得寬大」（太
  23:5）顯示其宗教象徵意義已被異化為炫耀屬靈地位的工具。
accumulations:
- book: 民數記
  chapter: 15
  summary: 神吩咐摩西囑咐以色列人世世代代在衣服邊上做繸子，並在繸子上釘藍細帶子，作為記念遵行命令的記號。
  relation: 本章儀式律法的核心原文術語，定義繸子的形式、材質與神學功能。
