name: 安息日為立約記號
type: 神學
secondary_types: []
aliases:
- 安息日約記
status: formal
definition: 雖本章未明說「安息日為立約記號」（此語見出31:13,17；結20:12,20），但第32-36節安息日撿柴人被石頭打死的嚴厲審判，彰顯安息日作為西乃之約核心誡命（十誡第四條）與神聖潔身分記號的神學地位。故意犯安息日屬「擅敢行事」，直接攻擊約的記號，因此受極刑。安息日預表永恆安息（來4:9），違背安息日即拒絕進入神的安息。
development: 本章將安息日條例（出20,31章）的違犯後果具體化：在曠野漂流期間，首個記載的故意犯罪案例即為犯安息日，顯示安息日作為約記號的不可侵犯性，也預表新約信徒當竭力進入那安息（來4:11）。
accumulations:
- book: 民數記
  chapter: 15
  summary: 記載安息日撿柴人被處死，作為故意犯罪被剪除的首個執行案例，間接確立安息日為立約記號的嚴肅性。
  relation: 連結本章故意犯罪條例（30-31節）與具體執行（32-36節），將安息日提升為約忠誠的試金石。
