name: 進迦南獻祭預表基督徒獻上生活（羅12：1）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 15 章 1-16 節在曠野漂流將盡、即將進入迦南之際，神再次頒布獻祭條例（燔祭、平安祭、甘心祭、節期祭），規定素祭（細麵、油）與奠祭（酒）的分量，強調「你們到了我所賜給你們居住的地」才施行。這預表基督徒在恩典時代（屬靈的迦南），不再獻牛羊，卻要將身體獻上，當作活祭，是聖潔的、是神所喜悅的，乃是理所當然的事奉（羅
  12:1）。細麵、油、酒分別預表基督完美人性（細麵）、聖靈膏抹（油）與喜樂奉獻的生命（酒），信徒靠基督的馨香之祭（弗 5:2），將生活各面獻給神。
development: 從舊約進地後的物質獻祭制度，轉型為新約信徒在基督裡屬靈的生活獻祭；希伯來書 13:15-16 進一步闡明「讚美的祭」與「行善捨財的祭」是神所喜悅的新約祭物。
accumulations:
- book: 民數記
  chapter: 15
  summary: 神曉諭摩西，以色列人進迦南地後獻各類祭（燔祭、平安祭等）須配搭素祭與奠祭，作為馨香火祭獻給耶和華。
  relation: 本章獻祭條例為進迦南敬拜生活的藍圖，構成新約「生活獻祭」互文預表的舊約基礎。
