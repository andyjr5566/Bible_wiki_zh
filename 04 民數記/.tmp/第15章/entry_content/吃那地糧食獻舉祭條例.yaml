name: 吃那地糧食獻舉祭條例
type: 事件
secondary_types: []
aliases:
- 初熟麥子舉祭條例
status: formal
definition: 耶和華吩咐摩西曉諭以色列人，當他們進入神領他們進去的那地，吃那地糧食時，就要把舉祭獻給耶和華。具體作法是用初熟的麥子磨麵做餅，當作舉祭奉獻，像舉禾場的舉祭一樣舉起。這條例要世世代代遵行，用初熟的麥子磨麵當舉祭獻給耶和華。
development: 此條例（17-21節）緊接一般獻祭條例之後，專門針對「吃那地糧食」這一進地後的基本生存行為設定獻祭，強調「初熟」與「舉起」的動作，承認土地與收成皆屬神，百姓乃是管家。
accumulations:
- book: 民數記
  chapter: 15
  summary: 規定進迦南地後吃糧食時，須將初熟麥子磨麵做餅作舉祭獻上，世世代代為永遠定例。
  relation: 本章第二段獻祭條例（17-21節），從動物祭轉向農產初熟祭，完整涵蓋進地後敬拜生活。
