name: 藍細帶子（techelet）
type: 原文
secondary_types: []
aliases:
- 藍細帶子
status: formal
definition: 希伯來文「תְּכֵלֶת」（techelet），指一種藍色或紫藍色的羊毛線。民數記 15 章 38 節規定：「在底邊的繸子上釘一根藍細帶子」。這藍色染料傳統上取自一種名為「希倫」（chilazon）的海蝸牛（現代學術多認定為
  Murex trunculus），顏色呈天藍色，象徵天上的屬性、神的榮耀與聖潔。猶太教律法規定每根繸子須有一根 techelet 線（或依拉比意見佔特定比例），但第二聖殿時期後染料來源失傳，猶太人多僅用白線，現代有嘗試復原染料。藍細帶子與繸子結合，使百姓看見時聯想至天上的神與祂的命令。
development: 從舊約祭司長袍（出 28:31）、會幕幔子（出 26:1）至平民繸子上的藍帶，techelet 成為連結神聖空間與日常生活的顏色記號；新約啟示錄
  15:6 七位天使穿著潔白光明的細麻衣，胸間束著金帶，呼應這「天上的顏色」終極實現。
accumulations:
- book: 民數記
  chapter: 15
  summary: 規定繸子上必須釘一根藍細帶子（techelet），作為提醒百姓仰望天上神命令的視覺標記。
  relation: 本章繸子條例中不可或缺的材質元素，賦予繸子「仰望天上」的神學色彩。
