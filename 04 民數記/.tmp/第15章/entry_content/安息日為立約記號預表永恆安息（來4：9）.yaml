name: 安息日為立約記號預表永恆安息（來4：9）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 15 章 32-36 節記載安息日撿柴人被石頭打死，顯示安息日作為耶和華與以色列立約記號（出 31:13, 17；結 20:12,
  20）的嚴肅性。違背安息日即屬「擅敢行事」（民 15:30），褻瀆立約之神。這預表新約信徒進入「神的安息」（來 4:9-11），不再拘守一日，卻要竭力進入那安息，免得有人落在同樣不信順的樣子。安息日審判的嚴厲，預警故意拒絕基督救恩、不進永恆安息者將面臨更嚴厲的審判（來
  10:26-31）。
development: 從舊約安息日作為立約外在記號與審判標準，轉型為新約基督作為安息日的主（太 12:8），信徒靠信進入屬靈永恆安息；希伯來書將曠野世代因不信不得進安息（來
  3-4 章）與民數記 15 故意犯罪被剪除平行對照。
accumulations:
- book: 民數記
  chapter: 15
  summary: 記載安息日撿柴人因故意違背安息日條例，被全會眾在營外石頭打死，彰顯安息日作為立約記號的神聖不可侵犯。
  relation: 本章歷史案例作為安息日立約記號嚴肅性的鐵證，為新約「永恆安息」互文提供舊約對照基礎。
