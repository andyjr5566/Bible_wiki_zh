name: 誤犯有恩典故意無憐憫
type: 神學
secondary_types: []
aliases:
- 誤犯蒙恩故意被剪除
status: formal
definition: 神設立截然不同的對待：誤犯罪（不知情、非故意）有贖罪祭管道，祭司贖罪後蒙赦免，會眾與個人、本地人與外人同享恩典；但故意犯罪（擅敢行事、藐視神言語、違背神命令）無贖罪祭可獻，必從民中剪除，罪孽歸到自己身上。這揭示神聖潔公義的雙重面向：對軟弱有憐憫（詩103:13-14），對悖逆無寬容（來10:26-31）。
development: 此神學原則貫穿22-31節，並在第32-36節安息日撿柴案例中具體執行。新約希伯來書引用此原則警告信徒不可故意犯罪，確立舊約條例的屬靈延續性。
accumulations:
- book: 民數記
  chapter: 15
  summary: 對比誤犯（22-29節）與故意犯罪（30-31節）的截然不同結局，確立「有恩典/無憐憫」的神學張力。
  relation: 為本章22-31節條例的神學核心，並透過32-36節案例驗證，成為新約警告故意犯罪的舊約根基。
