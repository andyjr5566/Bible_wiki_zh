name: 進迦南地後獻祭條例
type: 事件
secondary_types: []
aliases:
- 迦南地獻祭規定
status: formal
definition: 以色列人進入迦南地後，獻給耶和華的火祭（燔祭、平安祭、還願祭、甘心祭、節期祭）所需遵守的具體條例。每隻祭牲須配搭特定分量的素祭（細麵調油）與奠祭（酒）：綿羊羔用細麵伊法十分之一、油酒各一欣四分之一；公綿羊用細麵伊法十分之二、油酒各一欣三分之一；公牛用細麵伊法十分之三、油半欣、酒半欣。此條例適用於所有本地人，且寄居的外人也必照樣辦理，在耶和華面前歸一例。
development: 此條例在曠野漂流判決後頒布，強調敬拜的標準化與包容性（外人同歸一例），預表新約時代外邦人同蒙恩典、同作後嗣（弗3:6）。
accumulations:
- book: 民數記
  chapter: 15
  summary: 詳細列出進地後各類祭牲（羊羔、公羊、公牛）配搭素祭奠祭的精確度量標準，並確立本地人與外人同一條例的原則。
  relation: 為本章1-16節核心內容，規範新世代進地後的敬拜細節。
