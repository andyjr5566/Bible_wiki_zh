"book": "04 民數記"
"chapter": !!int "15"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民15章記載耶和華對摩西說，曉諭以色列人進迦南地獻祭條例、誤犯贖罪條例、安息日撿柴審判、衣服作繸子條例。摩西傳達神條例、執行安息日撿柴人石頭打死審判。四份註解均記載摩西作中保領袖傳達神條例、執行神審判。"
  "relation": "本章為摩西在曠野漂流末期（第三十九年）傳達新世代進地條例的關鍵時刻：從出埃及記西乃山領受律法、民數記前期曠野漂流，到此處神重申應許賜地給新世代，摩西忠心傳達祭祀、贖罪、安息日、繸子等條例，展現中保領袖將神旨意完整傳遞給新世代的忠心。"
- "title": "以色列"
  "path": "link_folder/原文/以色列.md"
  "summary": "民15:2,14-16,22,27-30 你們到了我所賜給你們居住的地，寄居的外人與本地人同歸一例。全會眾誤犯、個人誤犯、故意犯罪分別處分。四份註解均記載以色列人為條例接受對象，外人同歸一例預表福音時代外邦人同蒙恩。"
  "relation": "本章確立以色列（含寄居外人）為神條例的接受主體：進地獻祭、吃地糧食舉祭、誤犯贖罪、故意犯罪剪除、安息日條例、繸子條例均適用於全會眾。與出埃及記西乃山立約、利未記祭司條例形成連續，預表新約時代神子民普世性。"
- "title": "迦南地"
  "path": "link_folder/地點/迦南地.md"
  "summary": "民15:2,18 你們到了我所賜給你們居住的地，吃那地糧食。四份註解均記載為神應許賜給以色列人的地，農產豐富可獻素祭奠祭，神計畫不因舊世代不信而廢棄。"
  "relation": "本章為迦南地在民數記中的核心應許重申：雖舊世代因不信倒斃曠野（民14），神仍重申「你們到了我所賜給你們居住的地」（v2,18），素祭奠祭用量大（伊法、欣）暗示迦南地農產豐富。與民13-14章探子報告「流奶與蜜」形成呼應，確立神應許不落空。"
- "title": "曠野"
  "path": "link_folder/地點/曠野.md"
  "summary": "民15:32 以色列人在曠野時，有人安息日撿柴。丁良才：曠野漂流期間；啟導本：四十年漂流背景。此為民14章審判後、民20章第二次加低斯前的漂流時期。"
  "relation": "本章將曠野從「漂流審判之地」（民14）轉為「新世代受教之地」：神在曠野向新世代頒布進地條例（v1-21）、贖罪條例（v22-31）、安息日審判（v32-36）、繸子條例（v37-41）。曠野成為神預備新世代進地的教室，而非單純審判場。"
- "title": "營外"
  "path": "link_folder/地點/營外.md"
  "summary": "民15:35-36 耶和華吩咐摩西，那人必被治死，全會眾在營外用石頭打死他。丁良才：營外為不潔淨之地；啟導本：罪人被趕出營外。安息日撿柴人在營外被石頭打死，預表罪人被隔絕於神子民群體之外。"
  "relation": "本章具體記載營外作為執行死刑之地：安息日撿柴人被全會眾在營外石頭打死（v35-36）。與利未記10:4-5拿答亞比戶屍首被抬到營外、民5:2-3趕逐不潔淨者出營外、來13:11-13基督在營外受苦形成神學脈絡：營外為審判與隔絕之地，基督卻在營外成就救贖。"
- "title": "舉祭（terumah）"
  "path": "link_folder/原文/舉祭（terumah）.md"
  "summary": "民15:19-21 你們吃那地糧食，要舉祭獻給耶和華。原文 תְּרוּמָה (terumah) 意為舉起、獻上、分別為聖。丁良才：舉祭表徵將初熟歸神；啟導本：進地後首要承認神是供應者。初熟麵做餅作舉祭，預表基督為初熟果子（林前15:20）。"
  "relation": "本章將舉祭從利未記祭司條例（利2:9,7:14,22:12）延伸至全民進地生活：吃那地糧食時要舉祭（v19-21），將初熟麵做餅獻上，象徵全盤收成歸屬神。與民18:8-19祭司得舉祭、申26:1-11初熟果子獻上形成完整神學：神是供應源頭，百姓以初熟回應。"
