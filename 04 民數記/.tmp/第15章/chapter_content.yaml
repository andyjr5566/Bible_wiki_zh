organization: '### 進迦南地獻祭條例與舉祭規定（v1-21）

  本章開啟新世代進入 [[迦南地]] 的崇拜藍圖。[[耶和華曉諭摩西進迦南地獻祭條例]] 明確規定：無論燔祭、平安祭、還願或甘心祭，都要按牲畜種類搭配特定比例的
  [[伊法、欣、細麵、油、酒（''ephah, hin, solet, shemen, yayin）|細麵、油、酒]] 作為素祭與奠祭（v4-10）。這套 [[進迦南地後獻祭條例]]
  強調「馨香之祭」重複出現四次，預表基督徒將生活獻上為活祭（[[進迦南獻祭預表基督徒獻上生活（羅12：1）]]）。更關鍵的是，[[外人與本地人同歸一例]]（v14-16），寄居者與以色列人共享同一條例，彰顯神恩典的普遍性。接著
  [[吃那地糧食獻舉祭條例]] 要求初熟麥子磨麵做餅作舉祭（v19-21），象徵全盤收成歸屬神，也預表初熟果子基督（林前15:20）。


  ### 誤犯與故意犯罪的截然不同結局（v22-31）

  經文劃出 ==誤犯==（shegagah）與 ==擅敢行事==（high hand）的紅線。會眾或個人誤犯，有贖罪祭遮蓋，祭司代贖即蒙赦免（v22-29）；但故意褻瀆耶和華言語、違背命令者，「必從民中剪除」（v30-31），[[誤犯有恩典故意無憐憫]]
  成為贖罪制度的分水嶺。這預表新約對故意持續犯罪的嚴厲警告（[[故意犯罪無贖罪祭預表希伯來書警告（來10：26-27）]]）。


  ### 安息日撿柴人被石頭打死（v32-36）

  [[安息日撿柴人]] 在曠野撿柴，被帶到 [[摩西]]、亞倫與全會眾面前，關在 [[營外]] 監內等候判決。耶和華判決死刑，全會眾在營外用石頭打死他。這事件確立
  [[安息日為立約記號]] 的嚴肅性（出31:13-17），也引發後世討論：[[安息日撿柴是否故意犯罪]]？文本呈現為擅敢違背已知誡命，故屬「高舉手」犯罪，無贖罪餘地。[[犯安息日者被石頭打死]]
  成為立約忠誠的負面見證，預表永恆安息的嚴肅（[[安息日為立約記號預表永恆安息（來4：9）]]）。


  ### 繸子與藍細帶子：聖潔的視覺提醒（v37-41）

  神吩咐世世代代在衣服邊緣做 [[繸子（tzitzit）]]，並在繸子上釘 [[藍細帶子（techelet）]]。這 [[衣服邊上作繸子釘藍細帶子]] 的設計，功能單純而深遠：看見就記念遵行一切命令，不隨從心意眼目行邪淫（v39）。[[繸子為聖潔視覺提醒]]
  將律法內在化為日常穿著的邊緣標記，預表基督徒聖潔生活的外在見證（[[繸子預表基督徒聖潔生活（彼前1：15-16）]]）。結尾「我是耶和華─你們的神，曾把你們從埃及地領出來」再次錨定救贖身份。關於繸子是否演變為律法主義負擔，留待後世詮釋（[[繸子是否為律法主義負擔]]）。


  > [!important] 本章樞紐

  > 民數記15章在「曠野漂流」（14章審判）與「進地準備」之間，以崇拜條例、贖罪分級、安息日死刑、繸子提醒四大支柱，為新世代立下進地後的聖潔憲章：神同在的地，必須有聖潔的崇拜、清楚的罪責界線、立約的時間記號、與日常的身份標記。


  > [!question] 懸而未決

  > - 撿柴人是否知情故犯？經文未明說動機，只記錄判決。

  > - 繸子藍色染料（techelet）來源在第二聖殿時期失傳，現代猶太教多用白繸子，何時恢復仍有爭議。'
