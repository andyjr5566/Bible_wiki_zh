status: formal
definition: 按家族數點猶大支派二十歲以上能出戰的男丁，共七萬六千五百名，列出三個主要家族（示拉、法勒斯、謝拉）及法勒斯下的兩個子家族（希斯倫、哈母勒）；並提到猶大長子珥、俄南早死在迦南。
development: 民數記 26:19-22 記載猶大支派家族結構、人數與早死長子的背景。
