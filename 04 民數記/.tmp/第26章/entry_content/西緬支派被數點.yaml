definition: 按家族數點西緬支派二十歲以上能出戰的男丁，共二萬二千二百名，列出五個家族（尼母利、雅憫、雅斤、謝拉、掃羅）。
development: 民數記 26:12-14 記載西緬支派家族結構與人數，顯示該支派人數較少。
