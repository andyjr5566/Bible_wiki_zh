name: 普查總數與分地指示
type: 事件
secondary_types: []
aliases:
- 以色列總人數統計
- 分地原則指示
status: formal
definition: 民數記第26章51-56節記載，第二次普查以色列全會眾（二十歲以上、能出去打仗的男丁）總數為六十萬零一千七百三十名。隨後耶和華曉諭摩西，要按人名數目將地分給他們為業：人多的多分，人少的少分，但仍要拈鬮分地，按祖宗支派名字承受為業，按所拈的鬮、看人數多寡分給產業。
development: 此總數與第一次普查（民數記1:46，六十萬零三千五百五十名）相近，減少一千八百二十名。顯示神在曠野四十年間保守以色列民族整體數量穩定。分地指示結合「按人數比例」與「拈鬮」兩原則，體現神主權與公義並重。
accumulations:
- book: 民數記
  chapter: 26
  summary: 給出第二次普查總數（六十萬零一千七百三十名），並記載神關於按人數比例與拈鬮分地的具體指示。
  relation: 本章普查的總結性事件，直接連結應許之地的產業分配，為約書亞記分地記事鋪路。
