name: 利未人被數點
type: 事件
secondary_types: []
aliases:
- 利未支派人口普查
status: formal
definition: 民數記第26章57-62節記載，利未人按家族被數點，分為革順、哥轄、米拉利三大家族，下轄立尼、希伯倫、瑪利、母示、可拉等族。哥轄生暗蘭，暗蘭娶約基別生亞倫、摩西、米利暗。亞倫生拿答、亞比戶、以利亞撒、以他瑪；拿答、亞比戶因獻凡火死亡。利未人一個月以上的男丁共二萬三千。他們不在以色列人中被數，也不分產業，因耶和華是他們的產業。
development: 利未人普查單獨列出，年齡標準不同（一個月以上 vs 二十歲以上），且不計入以色列總數。這呼應民數記1:47-53與3:14-39的規定，強調利未人分別為聖歸神、無地上產業的特殊地位。
accumulations:
- book: 民數記
  chapter: 26
  summary: 記載利未人三大家族結構、祭司家系（亞倫系）、一個月以上男丁總數（二萬三千），並重申利未人無地上產業。
  relation: 本章普查的補充記載，與以色列十二支派普查並列，凸顯利未人獨特的事奉呼召與產業安排。
