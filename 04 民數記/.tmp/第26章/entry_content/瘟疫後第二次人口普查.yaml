status: formal
definition: 瘟疫結束後，耶和華吩咐摩西和祭司以利亞撒在摩押平原、約但河邊對著耶利哥，按宗族數點以色列所有二十歲以上能出戰的男丁，作為分地與產業分配的依據。
development: 本章開頭（民數記 26:1-4）記載神命令進行第二次普查，目的在於重新確認各支派兵力與產業分配基礎。
