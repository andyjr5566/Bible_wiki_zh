name: 亞設支派被數點
type: 事件
secondary_types: []
aliases:
- 亞設支派人口普查
status: formal
definition: 民數記第26章44-47節記載，在摩押平原進行的第二次人口普查中，亞設支派按家族被數點。亞設的兒子有音拿、亦施韋、比利亞等族；比利亞的兒子有希別、瑪結等族。亞設的女兒名叫西拉。被數的男丁（二十歲以上、能出去打仗的）共有五萬三千四百名。此數字較第一次普查（民數記1:41，四萬一千五百名）增加了一萬一千九百名。
development: 本事件發生在瘟疫之後（民26:1），由摩西和祭司以利亞撒在摩押平原、耶利哥對面的約但河邊執行。普查目的是為了按人數分配迦南地產業（民26:52-56）。
accumulations:
- book: 民數記
  chapter: 26
  summary: 記載亞設支派在第二次普查中被數點的家族結構與總數（五萬三千四百名），並提及亞設女兒西拉。
  relation: 本章普查的核心事件之一，顯示亞設支派在曠野四十年間人口增長，為後續分地提供依據。
