name: 約瑟支派被數點（瑪拿西、以法蓮）
type: 事件
secondary_types: []
aliases:
- 約瑟支派被數點
- 瑪拿西被數點
- 以法蓮被數點
status: formal
definition: 按家族分別數點約瑟兩個兒子瑪拿西與以法蓮的支派。瑪拿西支派共五萬二千七百名，列出瑪吉、基列等家族，並記載西羅非哈無子只有五女兒的事；以法蓮支派共三萬二千五百名，列出書提拉、比結、他罕等家族。
development: 民數記 26:28-37 詳細記載瑪拿西與以法蓮兩支派的家族結構、人數及西羅非哈女兒繼承產業的預告。
accumulations:
- book: 民數記
  chapter: 26
  summary: 記載約瑟支派下瑪拿西、以法蓮兩支派被數點的家族名單、總數及西羅非哈女兒的註記。
  relation: 顯示約瑟雙份產業的應驗，並為後來女兒繼承產業立法鋪路。
