name: 流便支派被數點
type: 事件
secondary_types: []
aliases:
- 流便族被數
status: formal
definition: 按家族數點流便支派二十歲以上能出戰的男丁，共四萬三千七百三十名，並列出其四個家族（哈諾、法路、希斯倫、迦米）及法路後代大坍、亞比蘭因叛亂被吞滅的事蹟。
development: 民數記 26:5-11 詳細記載流便支派的家族結構、人數與大坍、亞比蘭叛亂的歷史提醒。
accumulations:
- book: 民數記
  chapter: 26
  summary: 記載流便支派被數點的家族名單、總數及大坍、亞比蘭叛亂的插曲。
  relation: 展示長子支派雖有特權，因罪失去地位，成為警戒。
