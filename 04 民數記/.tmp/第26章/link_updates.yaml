"book": "民數記"
"chapter": !!int "26"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "本章重點：摩西在瘟疫後接受神命令，與以利亞撒共同進行第二次人口普查（民26:1-4）；在摩押平原、約但河邊向以色列人宣告普查指示；見證老一代在曠野死盡、僅迦勒約書亞存留（民26:63-65）。摩西作為神的僕人、中保與領袖，完成最後一次全國性點閱，為分地產業鋪路。"
  "relation": "本章是摩西領袖生涯末期的關鍵行動：從西乃曠野第一次普查（民1章）到摩押平原第二次普查，跨越三十八年，摩西見證神對應許的信實——總數基本不變（603,550→601,730），老一代死盡、新一代興起。此普查直接服務於分地指示（民26:52-56），也是摩西交棒給約書亞前的最後行政使命。"
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "本章重點：以利亞撒作為大祭司（亞倫兒子），與摩西共同接受神命令進行第二次人口普查（民26:1,3-4）；在摩押平原、約但河邊向以色列人宣告普查指示；見證利未人單獨點閱共23,000人（一個月以上男丁，民26:57-62）。以利亞撒代表祭司職分在普查中的屬靈權柄。"
  "relation": "本章標誌以利亞撒接替父親亞倫（民20:28）後首次參與全國性重大行政行動。普查不僅是軍事點閱，更關乎產業分配（民26:52-56）與利未人無地業的神學宣示（民26:62）。以利亞撒與摩西的雙重領導（君王/先知+祭司）預表基督作大祭司與君王的雙重職分（來7:1-3）。"
- "title": "迦勒"
  "path": "link_folder/人物/迦勒.md"
  "summary": "本章重點：迦勒（耶孚尼的兒子）與約書亞是從西乃曠野第一次普查（民1章）存留到第二次普查（民26章）的僅有兩人（民26:64-65）。經文明確指出：「除了耶孚尼的兒子迦勒和嫩的兒子約書亞以外，連一個人也沒有存留」。迦勒因專心跟從耶和華（民14:24）而得進應許之地。"
  "relation": "本章是迦勒「專心跟從耶和華」應許的歷史驗證點。三十八年前探子報告時迦勒與約書亞獨持異見（民13-14章），如今老一代死盡、新一代興起，迦勒成為神信實守約的活見證。此存留預表屬靈得勝者必得著應許（啟2:7, 3:21），也是民26:65「迦勒約書亞存留預表得勝者」互文條目的歷史基礎。"
- "title": "約書亞"
  "path": "link_folder/人物/約書亞.md"
  "summary": "本章重點：約書亞（嫩的兒子）與迦勒是從西乃曠野第一次普查存留到第二次普查的僅有兩人（民26:64-65）。經文明確指出：「除了耶孚尼的兒子迦勒和嫩的兒子約書亞以外，連一個人也沒有存留」。約書亞作為摩西的服事者、後繼領袖，見證神對應許的信實。"
  "relation": "本章是約書亞接任領袖前的關鍵歷史定位：他與迦勒同為「專心跟從耶和華」的見證人，親歷老一代死盡、新一代興起的全過程。此存留不僅是歷史事實，更預表基督（約書亞同名）帶領神子民進入安息（來4:8-9）。約書亞在本章的存留為民27:18-23摩西按手立約書亞、民31-34章征服迦南鋪墊。"
- "title": "可拉的背叛（預告）"
  "path": "link_folder/人物/可拉的背叛（預告）.md"
  "summary": "本章重點：經文在流便支派點閱中插入歷史回顧——大坍、亞比蘭（流便支派）與可拉一黨同向耶和華爭鬧，地開口吞滅他們，火燒滅二百五十人，作為警戒（民26:9-10）。同時註記「可拉的眾子沒有死亡」（民26:11），保留了可拉後裔的祭司職分（參詩篇42等）。"
  "relation": "本章在普查名冊中插入可拉叛亂回顧，雙重目的：(1) 警戒新一代不可重蹈覆轍，叛逆神所立權柄（摩西、亞倫）必受審判；(2) 區分可拉本人與其後裔——可拉死、後裔存留，顯示神審判公義且憐憫存留餘民。此事件為「可拉叛亂與大坍亞比蘭被吞預表叛逆下場（民26:9-10）」互文條目提供歷史錨點，也說明流便支派人數銳減（46,500→43,730）的部分原因。"
- "title": "摩押平原"
  "path": "link_folder/地點/摩押平原.md"
  "summary": "本章重點：第二次人口普查發生在「摩押平原與耶利哥相對的約但河邊」（民26:3,63）。這是以色列人曠野漂流結束、進入應許之地前夕的最後安營地（參民22:1）。摩押平原位於約但河東岸，對面即耶利哥，為征服迦南的前哨基地。"
  "relation": "本章將摩押平原定位為「第二次人口普查」與「分地指示」的歷史現場。從西乃曠野（民1章）到摩押平原（民26章），地理移動對應屬靈轉折：老一代死盡、新一代興起、普查為分地產業預備。此地點連結民22-25章巴蘭事件、民27章立約書亞、民31章米甸之戰、約書亞記渡河征服，是曠野漂流與迦南征服的分水嶺。"
- "title": "約但河"
  "path": "link_folder/地點/約但河.md"
  "summary": "本章重點：第二次人口普查在「摩押平原與耶利哥相對的約但河邊」進行（民26:3,63）。約但河是曠野與應許之地的分界線，渡河即進迦南。本章普查為渡河後分地產業（民26:52-56）作準備，河邊點閱象徵新一代已預備好承受應許。"
  "relation": "本章將約但河定位為普查與分地指示的地理基準點。普查總數（601,730）直接服務於「按著名數將地分給他們為業」（民26:53-56），河邊點閱預表新約信徒在基督裡被數算、為承受天上基業預備（弗1:11, 彼前1:4）。約但河後來成為以利亞、以利沙、施洗約翰、主耶穌受洗等關鍵救恩事件的舞台，本章是其救恩史功能的起點之一。"
- "title": "耶利哥"
  "path": "link_folder/地點/耶利哥.md"
  "summary": "本章重點：第二次人口普查在「摩押平原與耶利哥相對的約但河邊」進行（民26:3,63）。耶利哥位於約但河西岸，是以色列人進迦南後將面對的第一座堅固城（書6章）。本章普查在耶利哥對面完成，預示征服戰役即將展開。"
  "relation": "本章將耶利哥作為普查的地理参照點——「與耶利哥相對」強調以色列人已抵達應許之地門檻。普查為分地產業（民26:52-56）與征服耶利哥（書6章）雙重預備。耶利哥後來成為神奇蹟拆毀城牆、賜予以色列人首勝的地點，本章普查在其對面完成，構成「應許→預備→得著」的救恩史張力。"
