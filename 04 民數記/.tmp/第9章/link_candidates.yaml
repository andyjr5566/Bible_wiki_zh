    surfaces:
      - "二月十四日"
      - "補守逾越節"
      - "第二次逾越節"

  - name: "因死屍不潔延後守節"
    type: "事件"
    evidence: "民9:6-7 有幾個人因死屍不潔（據註解為米沙利、以利撒反處理拿答、亞比戶屍體），不能在正月十四日守節，向摩西、亞倫陳情。四份註解均確認此背景。"
