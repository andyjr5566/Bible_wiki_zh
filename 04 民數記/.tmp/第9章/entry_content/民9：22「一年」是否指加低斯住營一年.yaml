name: 民9：22「一年」是否指加低斯住營一年
type: 解經爭議
secondary_types: []
aliases:
- 民數記9:22一年爭議
- 加低斯住營一年說
status: formal
definition: 針對民數記9:22「雲彩停留在帳幕上，無論是兩天，是一月，是一年」中「一年」一詞的釋經爭議。希伯來文原文為「יָמִים」（yamim，字面意「日子、年日」），和合本譯為「一年」（參利未記25:29「滿了年日」同詞）。爭議核心在於：此處「一年」是否具體指涉以色列人後來在加低斯巴尼亞（加低斯）停留的長時間（參申命記1:46「你們在加低斯住了許多日子」），抑或僅為文學修辭上的極端值（兩天、一月、一年），構成遞進式的數目並列（merism），強調無論時間長短，百姓絕對順服雲彩的引導而不自行決定起行安營。
development: 早期猶太註釋（如拉希 Rashi）傾向視為具體指加低斯的停留；中世紀註釋（如伊本·以斯拉 Ibn Ezra）則主張這是假設性的極端情況，非指特定歷史事件。現代保守派註釋（如《聖經精讀註釋》CT、《拾穗》GT、KC、BH
  諸家）多採後說：經文列舉「兩天、一月、一年」為時間長短的代表性範圍，意在神學上強調「遵耶和華的吩咐」（v.18, 20, 23）的絕對性，而非預言，並非歷史預測或回顧加低斯事件（加低斯事件發生於民13-14章，時間晚於本章西乃立約後第二年）。
accumulations:
- book: 民數記
  chapter: 9
  summary: 本章記載雲彩引導以色列人起行安營的規則，第22節列舉雲彩停留可能的時間長度：「兩天、一月、一年」，成為釋經爭議焦點。
  relation: 核心經文出處，爭議詞彙「一年」（yamim）即見於此。
