status: formal
definition: 逾越節（正月十四日黃昏）緊接無酵節（正月十五至二十一日），民9:11 提到二月十四日黃昏守逾越節，並以無酵餅同吃，顯示兩節期在禮儀上緊密相連。
development: ''
accumulations:
- book: 民數記
  chapter: 9
  summary: 第11節規定補守逾越節時「要用無酵餅與苦菜，和逾越節的羊羔同吃」，反映逾越節與無酵節重疊的習慣。
  relation: 本章補守條例保留無酵餅元素，證明兩節期在禮儀上的重疊關係。
