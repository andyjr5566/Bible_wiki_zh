book: "04 民數記"
chapter: 9
updates:
- title: "米沙利、以利撒反"
  path: "link_folder/人物/米沙利、以利撒反.md"
  summary: "民9:6-7 註解一致指認「有幾個人」為米沙利、以利撒反（利10:4-5 奉摩西命處理拿答、亞比戶屍體），因接觸屍體不潔七天（民19:11），趕不上正月十四日逾越節，向摩西、亞倫陳情求解。丁良才、啟導本、串珠註釋、聖經精讀本均確認此背景。"
  relation: "本章提供米沙利、以利撒反因公務（處理屍體）而不潔、錯過逾越節的具體案例，觸發神賜下二月補守逾越節條例（民9:10-12）。"
- title: "拿答"
  path: "link_folder/人物/拿答.md"
  summary: "民9:6 註解關聯：拿答（亞倫長子）與亞比戶獻凡火被火燒死（利10:1-2），屍體由米沙利、以利撒反抬出營外（利10:4-5），導致後者不潔七天，成為民9:6「有幾個人因死屍而不潔淨」的背景原因。"
  relation: "拿答之死間接導致民9章補守逾越節條例的頒布，屬本章歷史背景鍵鍵人物。"
- title: "亞比戶"
  path: "link_folder/人物/亞比戶.md"
  summary: "同上，亞比戶（亞倫次子）與拿答同被火燒死（利10:1-2），屍體處理導致米沙利、以利撒反不潔，引發民9:6-7 陳情案。"
  relation: "亞比戶之死為本章補守逾越節條例的間接誘因。"
- title: "西乃的曠野"
  path: "link_folder/地點/西乃的曠野.md"
  summary: "民9:1,5 耶和華在西乃曠野吩咐摩西；以色列人在西乃曠野正月十四日黃昏守逾越節。ccbiblestudy_GT、舊約背景註釋：西乃山腳下周邊曠野地帶，尚未出發飄流前駐營處。本章事件發生於第二年正月（立帳幕之月），早於民1:1（二月初一）數點人口。"
  relation: "本章逾越節守節地點、雲彩遮蓋帳幕起始地點，均為西乃曠野。"
- title: "不潔淨（tame）"
  path: "link_folder/原文/不潔淨（tame）.md"
  summary: "民9:6-7,10,13 因死屍而不潔淨（טָמֵא tame），不能守逾越節。民19:11-13 摸死屍不潔七天，須用紅母牛灰潔淨。聖經精讀本：日常生活犯罪未解決，可能使鄰舍沾染自己的罪，應在神面前及早解決。"
  relation: "本章將「因死屍不潔」列為補守逾越節的正當理由之一（另一為遠方行路），確立禮儀不潔不阻絕恩典參與的原則。"
- title: "基督預表（逾越節羔羊）"
  path: "link_folder/神學/基督預表（逾越節羔羊）.md"
  summary: "民9:12 羊羔骨頭一根也不可折斷 → 約19:33,36 基督被釘十字架骨頭未斷，應驗此預表。丁良才、串珠註釋、聖經精讀本、KingComments 均引用。"
  relation: "本章補守逾越節條例重申羔羊骨頭不可折斷，強化逾越節羔羊預表基督完全贖罪的神學意義。"
