organization: "### 首次守逾越節與補救條例（v1-14）\n以色列人出埃及後**第二年正月**在**[[西乃的曠野|西乃曠野]]**，照耶和華吩咐在**十四日黃昏**（[[猶太曆法黃昏算日|日落算日]]）守**[[逾越節第二年首次守節|首次曠野逾越節]]**（v1-5）。然而，有數人因觸**[[不潔淨（tame）|死屍而不潔淨]]**（[[死屍不潔條例（民19：11-13）|參民19條例]]）無法按期獻供，他們向摩西、亞倫陳情：「為何被阻止？」（v6-7）。摩西求問耶和華，神頒布**[[補守逾越節條例|補救條例]]**：因**[[因死屍不潔延後守節|不潔]]**或**[[遠方行路延後守節|在遠方行路]]**者，可在**二月十四日黃昏**守逾越節（v9-11）。此節仍須遵守核心律例：吃羔羊配**無酵餅與苦菜**、**不可留到早晨**、**羔羊骨頭一根不可折斷**（[[逾越節羔羊骨頭不可折斷|預表基督骨頭不被折斷]]；[[基督預表（逾越節羔羊）|林前5:7]]）。若潔淨不在路卻推辭不守，必**從民中剪除**（v13）。**[[外人守逾越節同歸一例|寄居外人]]**願守節，同歸一例（v14；[[外人守逾越節（出12：48-49）|出12:48-49]]）。這條例後來在**[[希西家守二月逾越節（代下三十）|希西家時代]]**再次被啟用，也預表**[[逾越節與主餐（林前5：7-8,\
  \ 11：24-25）|主餐]]**的恩典邀請。\n\n| 比較項目 | 正月逾越節（v1-5） | 二月逾越節（v9-12） |\n| --- | --- |\
  \ --- |\n| **日期** | 正月十四日黃昏 | 二月十四日黃昏 |\n| **對象** | 全會眾 | 不潔者、遠行者 |\n| **除酵** |\
  \ 七日除酵（出12:15） | 僅當日吃無酵餅（經文未提七日除酵） |\n| **核心律例** | 羔羊、無酵餅、苦菜、骨頭不折、不可留至晨 | 同正月逾越節核心律例\
  \ |\n| **預表意義** | 基督作逾越節羔羊一次獻上 | 恩典給「錯過」者第二次機會 |\n\n> [!note] 關於二月逾越節的除酵規定\n> 經文僅提「要用無酵餅與苦菜，和逾越節的羊羔同吃」（v11），未重複「七日吃無酵餅」的命令。猶太傳統（如密西拿\
  \ Pesachim 9:3）多認為二月逾越節**只有一天**，不需除酵七日，這顯示神的恩典在補救條例上簡化了禮儀負擔，卻保留了核心預表（羔羊、骨頭不折）。\n\
  \n### 雲彩遮蓋與以色列人起行安營（v15-23）\n**[[帳幕立起之日雲彩遮蓋|立帳幕之日]]**（[[第二年正月初一立帳幕|出40:17]]），**[[法櫃的帳幕（見證的帳幕）|見證的帳幕]]**被雲彩遮蓋，夜間狀如火（**[[晝夜雲彩不斷|晝夜不斷]]**；[[會幕雲光（出40：34-38）|出40:34-38]]、[[雲柱火柱引導（出13：21-22）|出13:21-22]]）。雲彩**[[雲彩收上去起行|收上去]]**→百姓**起行**；雲彩**[[雲彩停住安營|停住]]**→百姓**安營**（v17）。**[[雲彩停留長短不定（兩天一月一年）|停留長短不定]]**——或兩天、一月、一年（**[[民9：22「一年」是否指加低斯住營一年|或指加低斯巴尼亞長期駐營]]**），以色列人**[[遵雲彩起行安營|全憑耶和華吩咐]]**起行安營（v18-22），絕對**[[順服神的主權引導|順服神的主權引導]]**（v23）。\n\
  \n```mermaid\nflowchart TD\n  A[\"雲彩遮蓋帳幕（晝雲夜火）\"] --> B{\"雲彩動態\"}\n  B -- \"收上去\"\
  \ --> C[\"以色列人起行\"]\n  B -- \"停住/降下\" --> D[\"以色列人安營\"]\n  C --> E[\"遵耶和華吩咐\"]\n\
  \  D --> E\n  E --> F[\"順服神主權引導\"]\n  style A fill:#e1f5fe\n  style F fill:#fff3e0\n\
  ```\n\n> [!important] 本章樞紐\n> **「遵耶和華的吩咐起行，也遵耶和華的吩咐安營」**（v23）貫穿全章：前半段守節**[[守（shamar）|謹守]]**神的**定期**（moed），後半段行程**聽從**神的**帶領**（雲彩）。禮儀與生活同歸於**順服**一個中心。\n\
  \n> [!question] 經文未明說的細節\n> 1. **[[三位祭司能否宰殺所有逾越節羊羔|三位祭司能否宰殺所有逾越節羊羔]]**：當時僅有亞倫、以利撒反、以他瑪三位祭司（拿答、亞比戶已死），若全會眾同時宰羊，人力極緊；或許採分批、或利未人協助宰殺（代殺、祭司灑血）。\n\
  > 2. **[[民9：22「一年」是否指加低斯住營一年|民9:22「一年」]]**：是否指後來在加低斯巴尼亞停留的三十八年中的第一年？經文未明確對應，僅作為「長短不定」的極端例證。\n\
  \n### 跨章脈絡：禮儀與引導的雙重順服\n本章呈現曠野生活的兩大支柱：**定期的禮儀**（逾越節）與**不定期的引導**（雲彩）。前者要求百姓在神設定的**時間**裡[[守（shamar）|謹守]]條例，神甚至提供**[[補守逾越節條例|補救條例]]**讓不潔、遠行者不至失落恩典；後者要求百姓在神未設定的**時間**裡，隨時預備跟隨雲彩動靜。兩者共同塑造「順服」的群體身分——不僅在聖所前，更在曠野路上。這雙重順服預表新約信徒：定期記念**[[逾越節與主餐（林前5：7-8,\
  \ 11：24-25）|主餐]]**宣告主死，日常靠**聖靈引導**（羅8:14）行事為人，同樣是「遵主吩咐起行，遵主吩咐安營」。"
