organization: "### 迦南地界線確定（v1-12）\n\n耶和華向摩西詳細勾劃 **[[迦南地界線|迦南四境]]**，作為以色列人將要承受的產業範圍。四界依序為：\n\
  \n| 方向 | 經文路線 | 關鍵地標 |\n|------|----------|----------|\n| **南界** | 尋的曠野 → 亞克拉濱坡\
  \ → 加低斯巴尼亞 → 哈薩亞達 → 押們 → 埃及小河 → 海 | [[亞克拉濱坡]], [[加低斯]], [[埃及河的地理辨識|埃及小河]] |\n| **西界**\
  \ | 大海（地中海） | — |\n| **北界** | 大海 → [[何珥山]] → [[哈馬口]] → 西達達 → [[示斐崙]] → [[以難]] |\
  \ [[何珥山]], [[哈馬口]], [[示斐崙]], [[以難]] |\n| **東界** | 以難 → 示番 → 利比拉東邊 → [[基內烈湖]]東邊 →\
  \ 約但河 → [[鹽海]] | [[利比亞]], [[基內烈湖]], 約但河, [[鹽海]] |\n\n這些界線不僅是地理邊界，更在神學上 **[[迦南地界線預表屬靈產業|預表屬靈產業的確定範圍]]**——神所賜的福分有明確界限，非人自行擴張。\n\
  \n### 產業分配原則與二支派半（v13-15）\n\n摩西宣告：這地要 **[[按宗族拈鬮分地|按宗族拈鬮]]** 分給 **九個半支派**。[[拈鬮分地預表神主權|拈鬮]]一動作強調產業分配完全出於神的主權揀選，而非人謀劃。與此同時，**[[約但河東二支派半|流便、迦得、瑪拿西半支派]]**\
  \ 已在約但河東、耶利哥對面領受產業，顯示神的應許跨越約但河兩岸。\n\n### 分地首領名單（v16-29）\n\n為執行分地，神指定兩位總負責人——祭司 **以利亞撒**\
  \ 與 **約書亞**，並從各支派選立一位首領協助。名單如下：\n\n```mermaid\nmindmap\n  root((分地領導層))\n    總負責\n\
  \      以利亞撒（祭司）\n      約書亞（嫩的兒子）\n    各支派首領\n      猶大: 迦勒（耶孚尼兒子）\n      西緬: 示母利（亞米忽兒子）\n\
  \      便雅憫: 以利達（基斯倫兒子）\n      但: 布基（約利兒子）\n      瑪拿西: 漢聶（以弗兒子）\n      以法蓮: 基母利（拾弗但兒子）\n\
  \      西布倫: 以利撒番（帕納兒子）\n      以薩迦: 帕鐵（阿散兒子）\n      亞設: 亞希忽（示羅米兒子）\n      拿弗他利: 比大黑（亞米忽兒子）\n\
  ```\n\n這十位首領連同兩位總負責人，共同構成 **[[分地首領名單|分地執行團隊]]**；在預表層面，他們 **[[分地首領預表基督與使徒|預表基督與使徒]]**\
  \ 將屬靈產業分賜給神的子民。\n\n### 神學預表與跨章脈絡\n\n> [!important] 本章樞紐\n> **地界確定 → 拈鬮分地 → 首領執行**\
  \ 三步驟完整呈現「應許之地」從藍圖落實為產業的過程。這模式在約書亞記 13-21 章全面展開，並指向新約「在基督裡得著產業」（弗 1:11, 14）。\n\n\
  - **地界的神聖性**：界線由耶和華親自「曉諭」摩西（v1, 13, 16），非人議定，呼應創世記 15:18-21 亞伯拉罕之約的具體化。\n- **拈鬮的神學意義**：箴言\
  \ 16:33「籤投在懷中，凡所定的乃是出於耶和華」；拈鬮排除人為操控，確立 **[[拈鬮分地預表神主權|神主權]]**。\n- **首領的代表性**：各支派一名首領，體現「合一中分工」的團體性；迦勒（猶大）作為四十年前探子中的忠心者，今參與分地，見證神應許的成就。\n\
  - **二支派半的特殊地位**：他們雖居約但河東，仍屬以色列整體產業架構，預表教會雖在地上分散，在基督裡同為一體（林前 12:12-13）。\n\n> [!question]\
  \ 待考地名辨識\n> 部分地標（如「示番」、「西達達」、「西斐崙」）在考古學上尚無定論；[[哈馬口]] 普遍認同為今敘利亞哈馬附近的奧龍特斯河谷入口，作為北界門戶。"
