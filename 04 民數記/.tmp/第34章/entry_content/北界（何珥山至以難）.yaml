name: 北界（何珥山至以難）
type: 事件
secondary_types: []
aliases:
- 北界
status: formal
definition: 迦南地北界走向：從大海起畫到何珥山，從何珥山劃到哈馬口，通到西達達、西斐崙，直到哈薩以難（民34:7-9）。此界線橫跨黎巴嫩山脈南麓至敘利亞邊境地帶。
development: 北界涉及多個難以確切辨識的古地名（如西達達、西斐崙），顯示應許之地北界延伸至哈馬口一帶。
accumulations:
- book: 民數記
  chapter: 34
  summary: 經文第7-9節記載北界從大海經何珥山、哈馬口、西達達、西斐崙至哈薩以難。
  relation: 迦南地界線四面中的北面具體實現。
