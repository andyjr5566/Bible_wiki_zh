name: 迦南地界線
type: 事件
secondary_types: []
aliases:
- 迦南四境
status: formal
definition: 耶和華吩咐摩西向以色列人宣告，他們進入迦南地後，所要承受為業的地界範圍（民34:1-12）。經文詳細描繪南、西、北、東四面的地理界標，確立神應許之地的具體疆域，作為後續拈鬮分地的依據。
development: 本章為「分地」叙事的地理前言，界線的劃定彰顯神對應許之地主權的具體實踐。
accumulations:
- book: 民數記
  chapter: 34
  summary: 耶和華曉諭摩西，詳細劃定以色列人在迦南地承受為業的四境界線（南、西、北、東）。
  relation: 本章核心事件，為後續拈鬮分地（v.13-29）提供地理法律依據。
