name: 東界（以難至鹽海）
type: 事件
secondary_types: []
aliases:
- 東界
status: formal
definition: 迦南地東界走向：從哈薩以難劃到示番，下到亞延東邊的利比拉，達到基尼烈湖（加利利海）東邊，下到約但河，通到鹽海為止（民34:10-12）。約但河與鹽海構成天然東界。
development: 東界沿約但河谷向南，連接北界終點哈薩以難，最終回到南界起點鹽海，形成閉合迴路。
accumulations:
- book: 民數記
  chapter: 34
  summary: 經文第10-12節記載東界從哈薩以難經示番、利比拉、基尼烈湖、約但河至鹽海。
  relation: 迦南地界線四面中的東面具體實現，閉合四境迴路。
