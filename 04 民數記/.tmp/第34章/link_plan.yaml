- name: 東界（以難至鹽海）
  suggested_type: 事件
  evidence: 民34:10-12 東界從以難經示斐崙、利比亞、基內烈湖東岸、約但河、直到鹽海。示斐崙在約但河東、利比亞在基內烈湖東北、基內烈湖即加利利海、約但河為東界天然分界、鹽海即死海。丁良才：東界預表屬靈產業有基督寶血作根基（來9:12）。
