    type: "人物"
    evidence: "民34:16-29 耶和華指定以利亞撒祭司、約書亞、各支派一個首領分地：猶大迦勒、西緬示母利、便雅憫以利達、但布基、約瑟瑪拿西漢尼業、以法蓮基木利、西布倫以利撒番、以薩迦帕鐵、亞設亞希忽、拿弗他利比大黑。丁良才：分地首領預表基督與使徒分賜恩賜（弗4:11-12）。"
    surfaces:
