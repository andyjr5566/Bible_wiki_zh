  - name: "按宗族拈鬮分地"
    type: "神學"
    evidence: "民34:13-15 摩西吩咐以色列人：你們要按宗族拈鬮承受這地，因耶和華吩咐將地分給九個半支派。流便、迦得、瑪拿西半支派已在約但河東得業。丁良才：拈鬮預表神主權分賜產業（箴16:33、徒1:26），九個半支派預表教會完全數（12-2.5=9.5）。"
