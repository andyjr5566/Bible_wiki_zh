book: "民數記"
chapter: 34
candidates:
  - name: "迦南地界線"
    type: "事件"
    evidence: "民34:1-12 耶和華曉諭摩西吩咐以色列人：你們進迦南地，那地要按四圍的邊界歸你們為業。詳細列舉南、西、北、東四界：南界從尋的曠野沿以東邊界、鹽海盡頭、亞克拉濱坡、尋、加低斯巴尼亞、哈薩亞達、亞斯門、埃及小河、直到大海；西界為大海；北界從大海經何珥山、哈馬口、西達達、西斐崙、哈薩以難、直到以難；東界從以難經示斐崙、利比亞、基內烈湖東岸、約但河、直到鹽海。丁良才：地界預表基督徒屬靈產業界限（弗1:11、彼前1:4）。"
    surfaces:
      - "迦南地"
      - "四圍的邊界"
      - "歸你們為業"
      - "南界"
      - "西界"
      - "北界"
      - "東界"
  - name: "南界（尋的曠野至埃及小河）"
    type: "事件"
    evidence: "民34:3-5 南界從尋的曠野沿以東邊界、鹽海盡頭、亞克拉濱坡、尋、加低斯巴尼亞、哈薩亞達、亞斯門、埃及小河、直到大海。尋的曠野在西乃半島東北，加低斯巴尼亞為探子惡報之地，埃及小河（瓦迪艾利許）為埃及與迦南天然分界。丁良才：南界預表屬靈產業與世界分別（林後6:17）。"
    surfaces:
      - "尋的曠野"
      - "以東邊界"
      - "鹽海盡頭"
      - "亞克拉濱坡"
      - "加低斯巴尼亞"
      - "哈薩亞達"
      - "亞斯門"
      - "埃及小河"
  - name: "西界（大海）"
    type: "事件"
    evidence: "民34:6 西界就是大海。大海即地中海，為迦南西界天然屏障，亦為航海貿易通道。丁良才：西界預表屬靈產業有神作保障（詩121:5-8）。"
    surfaces:
      - "西界"
      - "大海"
      - "地中海"
  - name: "北界（何珥山至以難）"
    type: "事件"
    evidence: "民34:7-9 北界從大海經何珥山、哈馬口、西達達、西斐崙、哈薩以難、直到以難。何珥山在黎巴嫩山脈北端，哈馬口為進入敘利亞要道，以難在大馬色北方。丁良才：北界預表屬靈產業向著豐盛擴展（弗3:18-19）。"
    surfaces:
      - "北界"
      - "何珥山"
      - "哈馬口"
      - "西達達"
      - "西斐崙"
      - "哈薩以難"
      - "以難"
  - name: "東界（以難至鹽海）"
    type: "事件"
    evidence: "民34:10-12 東界從以難經示斐崙、利比亞、基內烈湖東岸、約但河、直到鹽海。示斐崙在約但河東、利比亞在基內烈湖東北、基內烈湖即加利利海、約但河為東界天然分界、鹽海即死海。丁良才：東界預表屬靈產業有基督寶血作根基（來9:12）。"
    surfaces:
      - "東界"
