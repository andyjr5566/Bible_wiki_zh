"book": "民數記"
"chapter": !!int "34"
"updates":
- "title": "鹽海"
  "path": "link_folder/地點/鹽海.md"
  "summary": "本章重點：南界從鹽海盡頭起、東界直到鹽海（民34:3,12）。鹽海即死海，地球最低點，鹽度極高，無生物存活。預表審判（創19:24-25）、與生命水對比（結47:8-9、啟22:1）。"
  "relation": "本章將鹽海作為迦南地界南界起點、東界終點，見證神應許之地的完整邊界。鹽海「審判」與「生命水」（結47:8-9、啟22:1）形成對比，預表基督救贖將死海變為生命水。  連結創19:24-25所多瑪審判、結47:8-9死海醫治、啟22:1生命水河。  連結民34:3,12鹽海作為南界起點、東界終點。  連結結47:8-9死海得醫治、啟22:1生命水河。  連結創19:24-25所多瑪審判。"
- "title": "埃及河的地理辨識"
  "path": "link_folder/解經爭議/埃及河的地理辨識.md"
  "summary": "本章重點：南界至埃及小河（瓦迪艾利許），為埃及與迦南天然分界（民34:5）。預表脫離世界（埃及）進入應許之地（林後6:17、加1:4）。"
  "relation": "本章將埃及小河作為南界終點，見證神將百姓從埃及（世界）領入迦南（應許之地）的救恩歷程。
  連結林後6:17脫離世界、加1:4脫離今世。
  連結民34:5南界至埃及小河。
  連結林後6:17脫離世界、加1:4脫離今世。"
- "title": "加低斯"
  "path": "link_folder/地點/加低斯.md"
  "summary": "本章重點：南界經加低斯巴尼亞（民34:4）。探子惡報之地、百姓拒絕進迦南、神判四十年漂流（民13-14）。預表不信的後果、神公義審判與恩典並存（來3:16-19）。"
  "relation": "本章將加低斯作為南界關鍵點，見證不信的後果與神公義審判。
  連結民13-14探子惡報、來3:16-19因不信不能進入安息。
  連結民34:4南界經加低斯巴尼亞。
  連結民13-14探子惡報、來3:16-19因不信不能進入安息。  連結民32:8-13摩西責備流便迦得像加低斯探子。"
- "title": "何珥山"
  "path": "link_folder/地點/何珥山.md"
  "summary": "本章重點：北界經何珥山（民34:7-8）。亞倫死於何珥山（民20:22-29、33:37-39），祭司職分傳給以利亞撒。預表舊約祭司職分終結、基督永遠祭司（來7:23-24）。"
  "relation": "本章將何珥山作為北界關鍵點，見證亞倫死、祭司職分傳承、基督永遠祭司優越性。
  連結民20:22-29亞倫死於何珥山、來7:23-24基督永遠祭司、民20:25-28以利亞撒接任。
  連結民34:7-8北界經何珥山。
  連結民20:22-29亞倫死於何珥山、來7:23-24基督永遠祭司、民20:25-28以利亞撒接任。
  連結民33:37-39亞倫死於何珥山、來7:23-24基督永遠祭司、民20:25-28以利亞撒接任。  連結民20:25-28以利亞撒接任大祭司。"
