"chapter": !!int "16"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民16章記載摩西面對可拉大坍亞比蘭背叛，聽見俯伏在地讓神表白，設計香爐試驗，召喚大坍亞比蘭被拒，甚發怒求神不收納供物，吩咐會眾離開惡人帳棚，宣告地開口吞滅為神打發證據，摩西亞倫俯伏代禱擋在破口前，吩咐以利亞撒收香爐錘作包壇銅，面對會眾抱怨再次俯伏代禱，指揮亞倫拿香爐贖罪止住瘟疫。四份註解均記載摩西作中保領袖面對背叛展現謙卑與權柄。"
  "relation": "本章為摩西領袖生涯中最嚴峻的權柄危機：從民12章米利暗亞倫嫉妒、民14章百姓不信，到此處利未人可拉聯同流便支派首領公開背叛祭司職分與領導權。摩西全程不為自己辯護，唯一發怒是為神榮耀（v15），兩次俯伏代禱（v4,22,45）展現「極其謙和，勝過世上眾人」（民12:3）的中保胸襟，預表基督不為自己開口（賽53:7）。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民16章記載亞倫與可拉一黨各拿香爐在耶和華面前獻香，神火燒滅二百五十獻香人，亞倫兒子以利亞撒收香爐錘作包壇銅，會眾發怨言時亞倫拿香爐跑到會眾中間在死人活人中間站住贖罪，瘟疫止住。四份註解均記載亞倫作大祭司被神揀選、贖罪中保。"
  "relation": "本章為亞倫大祭司職分的公開驗證：香爐試驗中神以火審判僭越者（v35），亞倫香爐被接納；瘟疫爆發時亞倫跑到會眾中間在死人活人中間站住贖罪（v48），預表基督大祭司進入死亡權勢中拯救（來2:14-15）。與出埃及記亞倫作摩西代言人、行神蹟、見法老形成對比，此處亞倫獨立行使大祭司贖罪職分。"
- "title": "可拉的背叛（預告）"
  "path": "link_folder/人物/可拉的背叛（預告）.md"
  "summary": "民16:1,8-11,19,32 利未曾孫哥轄孫子以斯哈兒子可拉，嫉妒亞倫祭司職分，聚集二百五十首領攻擊摩西亞倫。摩西對可拉說：神已叫你們利未人親近祂辦會幕事，你們還要謀祭司職分。地開口吞滅可拉和屬他一切人。四份註解均記載可拉為背叛首領，猶大書11節引為警戒。"
  "relation": "本章確立可拉為「背叛神權柄」的經典反面教材：身為利未人已有親近神職分（v9），卻貪圖祭司職分（v10），被猶大書11節列為假教師警戒「在可拉的背叛中滅亡」。與民12章米利暗亞倫嫉妒摩西、民14章百姓不信形成「嫉妒-不信-背叛」遞進。"
- "title": "以利亞撒"
  "path": "link_folder/人物/以利亞撒.md"
  "summary": "民16:37-39 亞倫的兒子以利亞撒從火中撿起香爐，把火撒在別處，將香爐錘作包壇的銅，為以色列人作記號，免得外人僭越獻香。丁良才：以利亞撒執行神吩咐作永久見證；啟導本：神審判的記號由祭司繼承者執行。"
  "relation": "本章為以利亞撒在民數記中的關鍵登場：作為亞倫兒子、未來大祭司繼承人（民20:25-28），執行收取審判香爐、錘作包壇銅的職務（v37-39），象徵祭司職分傳承與神審判的永久見證。與民19章以利亞撒主持紅母牛條例、民20章接任大祭司形成連貫軌跡。"
- "title": "火鑵（machtah）"
  "path": "link_folder/原文/火鑵（machtah）.md"
  "summary": "民16:6,17,18,37,38,39,46,47 原文 מַחְתָּה (machtah) 意為香爐、火盤、盛火器。丁良才：香爐是祭司獻香專用器具，僭越者被火審判；啟導本：香爐代表祭司代禱權柄。本章香爐出現8次：可拉一黨二百五十個、亞倫一個、以利亞撒收取、錘作包壇銅、亞倫贖罪拿香爐。"
  "relation": "本章將machtah從單純器具提升為神學符號：香爐代表祭司親近神的特權（v6-7），僭越使用者被火燒滅（v35），被審判者的香爐變為包壇銅作永久警戒（v38-39），亞倫贖罪時拿香爐跑到會眾中間（v46-47）。與利未記10:1拿答亞比戶獻凡火、來9:4金香爐在至聖所形成神學脈絡。"
- "title": "摩西代禱預表基督代禱（來7：25）"
  "path": "link_folder/互文/摩西代禱預表基督代禱（來7：25）.md"
  "summary": "民16:22,45 摩西亞倫俯伏說：神啊，一人犯罪，你豈要向全會眾發怒？摩西對亞倫說：拿香爐快到會眾那裡贖罪。來7:25 基督長遠活著，替他們祈求，能以拯救到底。丁良才：中保代禱能轉移審判；啟導本：摩西預表基督作完全中保；串珠註釋：代禱是屬靈權柄運用。"
  "relation": "本章提供摩西代禱最完整記載：面對神要滅絕全會眾（v21），摩西以「一人犯罪，豈要向全會眾發怒」為據代禱（v22），神聽從；瘟疫爆發時摩西指揮亞倫拿香爐贖罪（v46-47），亞倫在死人活人中間站住瘟疫止住（v48）。雙重代禱預表基督作大祭司長遠活著替信徒代求（來7:25），在神面前擋在破口前（結22:30）。"
