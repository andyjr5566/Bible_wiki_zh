name: 吞滅（bala）
type: 原文
secondary_types: []
aliases:
- 吞滅
status: formal
definition: 希伯來文 **בָּלַע (bālaʿ)**，意為「吞下、吞滅」。本章 v30、32、33 使用此詞描述地開口將可拉一黨連同家眷、財物「吞下去」，並說他們「活活地墜落陰間」。
development: 詞語在 v30 作為神創作新事的預告，v32-33 實際發生，強調審判的徹底性。
accumulations:
- book: 民數記
  chapter: 16
  summary: 使用 bala 描述地吞滅叛徒。
  relation: 原文詞彙研究，說明審判方式的用語。
related_entries:
