name: 可拉是否為利未人嫉妒祭司職分
type: 解經爭議
secondary_types: []
aliases:
- 可拉是否為利未人嫉妒祭司職分
status: formal
definition: 學者討論可拉（利未族哥轄子孫）發動叛亂是否源於對祭司職分的嫉妒（v9-10），摩西指出神已將利未人分別為聖事奉，卻仍想要祭司職任，顯示可能動機。
development: 經文呈現摩西的責備（v9-10）與可拉的行動（v1-3），留給釋經者判斷動機屬嫉妒或屬屬靈爭戰。
accumulations:
