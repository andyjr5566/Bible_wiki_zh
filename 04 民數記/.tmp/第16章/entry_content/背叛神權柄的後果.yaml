status: formal
definition: 可拉、大坍、亞比蘭等人背叛神所設立的權柄，導致地開口吞滅他們（v31-33）、火燒滅二百五十獻香者（v35）、瘟疫擊殺一萬四千七百人（v49），顯示悖逆神權柄的嚴重後果。
development: 經文依次記載三重審判：地吞、火燒、瘟疫，層層遞進說明背叛的代價。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載三重審判回應背叛神權柄。
  relation: 本章神學重點，說明悖逆的嚴重後果。
