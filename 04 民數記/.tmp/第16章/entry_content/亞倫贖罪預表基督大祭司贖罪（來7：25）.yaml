status: formal
definition: 亞倫在瘟疫中站立死人活人中間贖罪（民16:47-48），預表基督作永遠的大祭司，長遠活著為信徒代求（來7:25），兩者皆在生死界限施行中保贖罪。
development: 從亞倫一次性的贖罪行動（民16）延伸至基督永恆的代求職分（來7:25），構成類型學對應。
