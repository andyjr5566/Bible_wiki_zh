name: 香爐錘作包壇銅為記號
type: 事件
secondary_types: []
aliases:
- 銅香爐包壇
- 香爐作紀念
status: formal
definition: 耶和華吩咐摩西叫亞倫兒子以利亞撒從火中撿起二百五十人的銅香爐，把火撒在別處，因香爐是聖的（民16:36-37）。將這些犯罪自害己命之人的香爐錘成片子，包在壇上，給以色列人作記號，免得外人（非亞倫後裔）近前在耶和華面前燒香，遭可拉一黨的下場（民16:38-40）。以利亞撒照著辦了（民16:39）。
development: 此記號長久保存（列王紀上8:8暗示），成為祭司職分專屬亞倫家系的鐵證，預表新約信徒藉基督大祭司才能坦然無懼進入至聖所（來10:19-22）。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載以利亞撒將被燒者的銅香爐錘作包壇銅，立為永久紀念。
  relation: 將審判的器皿轉化為教導的記號，鞏固神主權揀選祭司的真理。
