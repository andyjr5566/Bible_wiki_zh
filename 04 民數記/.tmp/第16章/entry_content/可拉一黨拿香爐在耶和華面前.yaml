name: 可拉一黨拿香爐在耶和華面前
type: 事件
secondary_types: []
aliases:
- 香爐試驗
- 獻香對質
status: formal
definition: 摩西吩咐可拉一黨與亞倫各拿香爐（火鑵，machtah），盛火加香，在耶和華面前獻香，以此測試誰是神所揀選的聖潔者（民16:6-7, 16-17）。可拉招聚全會眾到會幕門前，摩西、亞倫與二百五十個首領同站在會幕門前，耶和華的榮光向全會眾顯現（民16:18-19）。這是一場公開的聖職對質。
development: 此試驗確立祭司職分專屬亞倫家系，並預表新約中唯有基督為大祭司，信徒藉著祂才能親近神（來5:4-5, 10:19-22）。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載香爐試驗的規定、執行過程與耶和華榮光的顯現。
  relation: 為神公開揀選祭司、審判僭越聖職者的關鍵場景。
