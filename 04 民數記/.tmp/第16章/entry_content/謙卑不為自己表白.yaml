name: 謙卑不為自己表白
type: 神學
secondary_types: []
aliases:
- 謙卑不為自己表白
status: formal
definition: 摩西面對可拉一黨的指控，並未為自己辯護，而是俯伏在地，讓耶和華親自顯明誰是祂所揀選的（民16:4-5,15,28-30）。這顯示屬靈領袖的謙卑與對神主權的信靠。
development: 從摩西初期的俯伏（v4）到向神禱告請求神顯明（v15,28-30），見證謙卑不為自己表白的屬靈原則。
accumulations:
- book: 民數記
  chapter: 16
  summary: 摩西面對叛亂不自辯，俯伏禱告，讓神為他伸冤。
  relation: 本章核心神學主題，展現領袖謙卑與神主權。
