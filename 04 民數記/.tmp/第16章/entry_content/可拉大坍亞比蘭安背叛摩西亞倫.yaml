name: 可拉大坍亞比蘭安背叛摩西亞倫
type: 事件
secondary_types: []
aliases:
- 可拉黨之亂
status: formal
definition: 利未人可拉（以斯哈兒子）聯同流便支派的大坍、亞比蘭（以利押兒子）與安（比勒兒子），並會中二百五十位有名望的首領，聚集攻擊摩西、亞倫，指控他們擅自專權，因全會眾個個聖潔，耶和華在他們中間，質問為何自高超過耶和華的會眾（民16:1-3）。大坍、亞比蘭更拒絕摩西召喚，控訴摩西將他們從流奶與蜜之地領出來在曠野殺死，且未賜田地產業，指責摩西要剜他們眼睛（民16:12-14）。這是對神所立權柄的公開叛逆。
development: 此事件為民數記中最嚴重的領導權危機，顯示利未人嫉妒祭司職分（民16:9-10）與流便支派覬覦領導地位的結合，成為後世警戒背叛神權柄的典型（猶大書1:11）。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載可拉、大坍、亞比蘭、安及二百五十首領聯合背叛摩西亞倫的緣起、對質過程與神的審判。
  relation: 本章核心敘事的起因，引發後續香爐試驗、地裂吞滅、火燒、瘟疫等一連串審判與贖罪事件。
