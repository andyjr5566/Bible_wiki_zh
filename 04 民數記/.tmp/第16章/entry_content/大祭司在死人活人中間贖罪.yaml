name: 大祭司在死人活人中間贖罪
type: 神學
secondary_types: []
aliases:
- 大祭司在死人活人中間贖罪
status: formal
definition: 亞倫拿著香爐站在死人與活人中間，為百姓贖罪，瘟疫才止住（v47-48），彰顯大祭司作中保、在生死界限施行贖罪的職能。
development: 從摩西吩咐亞倫速去贖罪（v46）到亞倫奔跑至會中、站在死人活人中間（v47-48），見證大祭司代贖的急迫與效力。
accumulations:
- book: 民數記
  chapter: 16
  summary: 亞倫在瘟疫中站立死人活人中間贖罪，瘟疫止息。
  relation: 本章展現大祭司贖罪中保角色的關鍵場景。
