name: 火燒滅二百五十獻香的人
type: 事件
secondary_types: []
aliases:
- 火燒獻香者
status: formal
definition: 在地吞滅可拉、大坍、亞比蘭後，有火從耶和華那裡出來，燒滅了獻香的二百五十個人（民16:35）。這些人是參與香爐試驗、僭越祭司職分的首領，他們的死與被吞滅者同屬對神聖職的冒犯，只是審判方式不同（火
  vs 地）。
development: 火燒象徵神聖潔的烈怒與審判（來12:29），亦預表末世火湖的審判（啟20:15），強調非神所召不可僭越聖職（來5:4）。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載火從耶和華出來燒滅二百五十個獻香首領。
  relation: 與地裂吞滅並列，構成對叛亂首領兩面的徹底審判（吞滅主謀、火燒跟從）。
related_entries:
- 可拉一黨拿香爐在耶和華面前
- 火鑵（machtah）
- 背叛神權柄的後果
- 神審判背叛預表末世審判
