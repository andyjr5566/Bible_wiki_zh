name: 神主權揀選祭司與領袖
type: 神學
secondary_types: []
aliases:
- 神的揀選權柄
- 祭司職分專屬亞倫
status: formal
definition: 本章核心神學主題：領導權與祭司職分非人自取，乃神主權揀選（民16:5, 7, 28, 30, 40）。神藉香爐試驗、地裂、火燒、瘟疫、包壇銅記號等多重方式，公開確認摩西的領袖地位與亞倫家系的祭司特權。凡僭越者必受審判，凡順服者蒙保全。這主權揀選原則貫穿舊約（申18:5,
  撒上2:28）至新約（來5:4-5, 彼前2:9）。
development: 此真理奠定以色列敬拜制度根基，預表基督為神所立的獨一大祭司與君王（來5:5-6, 啟19:16），信徒的屬靈祭司身分亦基於神在基督裡的揀選（弗1:4,
  彼前2:5）。
accumulations:
- book: 民數記
  chapter: 16
  summary: 通過叛亂、試驗、審判、贖罪、立記號的一連串事件，系統呈現神主權揀選領袖與祭司的神學真理。
  relation: 本章所有事件的神學總結，為後世理解祭司制度、領導權威、敬拜準則提供規範性依據。
