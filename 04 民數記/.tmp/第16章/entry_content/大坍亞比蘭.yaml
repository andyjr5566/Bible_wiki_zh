name: 大坍亞比蘭
type: 人物
secondary_types: []
aliases:
- 大坍
- 亞比蘭
status: formal
definition: 以利押的兒子，流便支派人，與可拉同謀背叛摩西、亞倫（v1,12-14），拒絕摩西召喚並指控摩西將他們從埃及領出來要在曠野殺死他們（v13-14），最終與家眷被地吞滅（v27,31-33）。
development: 從拒絕上去見摩西（v12）到公開指控摩西（v13-14），再到與可拉一同被審判（v31-33），完整呈現其悖逆過程。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載大坍、亞比蘭參與叛亂、拒絕召喚、被地吞滅。
  relation: 本章主要叛亂人物之一，展現悖逆後果。
