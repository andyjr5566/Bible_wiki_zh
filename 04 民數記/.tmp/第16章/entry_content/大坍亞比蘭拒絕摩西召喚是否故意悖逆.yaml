status: formal
definition: 針對大坍、亞比蘭拒絕上去見摩西（v12）並發出指控（v13-14），學者爭論這是否屬故意悖逆神所立權柄，還是出於誤解與恐懼。
development: 經文呈現他們的拒絕與指控，摩西憤怒禱告（v15），神隨後審判（v31-33），供釋經者評估其心態。
