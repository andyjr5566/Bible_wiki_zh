name: 會眾抱怨摩西亞倫殺害耶和華百姓
type: 事件
secondary_types: []
aliases:
- 會眾發怨言
- 百姓控告領袖
status: formal
definition: 審判發生第二天，以色列全會眾向摩西、亞倫發怨言說：「你們殺了耶和華的百姓了」（民16:41）。會眾聚集攻擊摩西、亞倫，向會幕觀看，雲彩遮蓋會幕，耶和華榮光顯現（民16:42-43）。百姓不認同神的審判，反倒怪罪執行神旨意的領袖，顯示剛硬悖逆的心。
development: 此舉引發隨後的瘟疫審判，顯示百姓與首領同惡相濟，也襯托出摩西亞倫再次為百姓代求的恩慈。
accumulations:
- book: 民數記
  chapter: 16
  summary: 記載會眾次日發怨言，指控摩西亞倫殺害耶和華百姓，導致神再次發怒。
  relation: 連接前段審判與後段瘟疫，凸顯百姓屬靈瞎眼與領袖代禱的對比。
