name: 米利暗長大痲瘋
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 雲彩從會幕上挪開，耶和華向他們發怒而去；不料，米利暗長了大痲瘋，有雪那樣白（民12:9-10），作為神對毀謗僕人之罪的即時審判。
development: 痲瘋在舊約常表徵罪污與隔絕（利13-14），米利暗作為女先知領袖，因嫉妒而受此刑，成為警戒。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載神怒氣發作後，米利暗立即長大痲瘋，證明毀謗神揀選僕人的嚴重後果。
  relation: 直接回應第9節「耶和華就向他們二人發怒而去」的審判執行。
