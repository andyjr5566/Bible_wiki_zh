name: 神的僕人摩西盡忠
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 耶和華見證：「我的僕人摩西不是這樣；他是在我全家盡忠的」（民12:7），「僕人」（ebed）與「盡忠」（ne'eman）強調摩西作神家中忠心管家的職分，超越一般先知身分，新約引用作基督忠心的預表（來3:2,5）。
development: 「盡忠」一詞在舊約用於形容大衛（撒上22:14）、尼希米（尼7:2）等忠心執事，奠定屬靈領袖以忠心為首要資格的原則。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載神親自見證摩西在神全家盡忠，確立其權柄與特權的神學基礎。
  relation: 直接回應米利暗亞倫質疑「耶和華不也與我們說話」的屬靈地位差異。
