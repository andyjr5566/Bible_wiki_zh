name: 民12：3摩西謙和描述是否出自摩西筆下
type: 解經爭議
secondary_types: []
aliases:
- 摩西謙和作者爭議
- 民12:3作者問題
status: formal
definition: 關於民數記 12:3 「摩西為人極其謙和，勝過世上的眾人」這句括號內的描述，是否出自摩西親筆，歷來是解經學者爭論的焦點。支持摩西作者說者認為這是摩西在聖靈感動下客觀真實的自我陳述，屬於「謙和者不自知其謙」的神聖悖論；質疑者則認為這句話打破敘事流暢性，語氣像是後人（如約書亞或以斯拉）為摩西作傳時的編輯性插入，屬於「後摩西增補」。
development: 早期猶太傳統（塔木德 Baba Batra 14b）堅持摩西寫下托拉「除了最後八節」，包含此節。中世紀拉希（Rashi）解釋「謙和」為「忍耐、卑微」，未質疑作者。近代文獻假說將此視為
  J/E/P 文獻中後期編輯者的注釋。保守派學者（如凱爾、德爾、柯爾曼）辯護說古代近東自傳體常有第三人稱自我評價，且「謙和」（anav）在希伯來文語境指「依靠神而非自強」，非道德自誇，故不排除摩西筆下。
accumulations:
- book: 民數記
  chapter: 12
  summary: 經文第 3 節以括號形式插入「摩西為人極其謙和，勝過世上的眾人」，作為神介入審判米利暗、亞倫的背景說明，強調摩西不爭競的特質與神揀選的關係。
  relation: 本章核心爭議經文，直接關係到摩西五經作者身份的內部證據評估。
