name: 米利暗關鎖營外七天
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華命令將米利暗關鎖在營外七天，引用父親吐唾沫在女兒臉上蒙羞七天的習俗（民12:14-15）；百姓不動身，直等她被領進來。
development: 七天關鎖象徵完全的潔淨期（利14:8），也顯示共同體為肢體受苦而等候的合一見證。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載神判定米利暗關鎖營外七天，百姓停行等候，彰顯審判與憐憫並存。
  relation: 結束本章審判叙事，為百姓後續起行作鋪墊。
