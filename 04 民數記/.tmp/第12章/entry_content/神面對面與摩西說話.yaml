name: 神面對面與摩西說話
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 耶和華宣告：「我的僕人摩西不是這樣；他是在我全家盡忠的。我要與他面對面說話，乃是明說，不用謎語，並且他必見我的形象」（民12:6-8），確立摩西超越一般先知（異象、夢）的獨特啟示模式。
development: 此為舊約先知論的高峰，奠定摩西律法權威的啟示基礎，新約視為基督先知職分的預表（來3:5-6）。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載神公開見證摩西獨特的面對面啟示關係，責備米利暗亞倫毀謗不懼怕。
  relation: 本章神學核心，回應毀謗者質疑「耶和華單與摩西說話」的真相。
