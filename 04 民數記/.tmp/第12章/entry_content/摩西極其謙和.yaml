name: 摩西極其謙和
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 經文插入評價：「摩西為人極其謙和，勝過世上的眾人」（民12:3），希伯來文 anav 指柔順、自卑、倚靠神，非軟弱。此屬性成爲神為他辯護、面對面說話的神學依據。
development: 謙和在舊約常與承受地為業相關（詩37:11），新約列為聖靈果子（加5:23）與基督性情（太11:29）。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載摩西謙和的屬性描述，作為神揀選他獨特啟示關係的內在依據。
  relation: 解釋為何神不因摩西不自辯而置之不理，反而親自為他伸冤。
