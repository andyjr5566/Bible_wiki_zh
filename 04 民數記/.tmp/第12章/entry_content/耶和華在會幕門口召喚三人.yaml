definition: 耶和華忽然對摩西、亞倫、米利暗說話，命三人出來到會幕；耶和華在雲柱中降臨，站在會幕門口，召喚亞倫和米利暗二人出來（民12:4-5）。
development: 神主動介入，以會幕門口為法庭場景，公開處理領袖間的紛爭。
