name: 摩西代禱預表基督代禱（來7：25）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 12:13 摩西為得罪神的米利暗哀求醫治，展現中保代求職能。希伯來書 7:25 指出基督「既然長遠活著，替他們祈求，就能拯救到底」。摩西作為舊約中保的影兒（來
  3:5），其一次性的代禱（為米利暗）預表基督在天上聖所永遠、有效、完全的代禱（為眾信徒），不僅求肉體醫治，更求屬靈永生與恩典。
development: 對比摩西代禱需神另行規定「關鎖七天」的管教程序，基督代禱基於祂一次獻祭的完全贖罪，使信徒得以坦然無懼地來到施恩寶座前（來 4:16）。
accumulations:
- book: 民數記
  chapter: 12
  summary: 摩西為米利暗代禱求醫治。
  relation: 本章摩西代禱行動，作為希伯來書 7:25 基督永遠代禱的舊約預表影兒。
