name: 嫉妒引發神怒氣
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 米利暗亞倫因嫉妒摩西的屬靈地位與獨特啟示關係而毀謗，導致「耶和華就向他們二人發怒而去」（民12:9），顯示嫉妒屬靈權柄、毀謗神揀選僕人屬嚴重干犯神榮耀之罪，必招致神烈怒審判。
development: 聖經多處警戒嫉妒（箴14:30，雅3:16），此事件為舊約嫉妒招致物理審判（痲瘋）的典型案例。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載嫉妒毀謗引發神烈怒離去，隨即執行痲瘋審判的神學因果關係。
  relation: 解釋第10節米利暗長痲瘋的神學原因，非單純疾病乃神聖潔忌邪的反應。
