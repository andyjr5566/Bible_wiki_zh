name: 父親吐唾沫女兒臉（申25：9）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 民數記 12:14 神責備米利暗時說：「他父親若吐唾沫在他臉上，他豈不蒙羞七天嗎？」此語引用/呼應申命記 25:9 關於「不願娶嫂子者，嫂子當在長老面前脫他的鞋，吐唾沫在他臉上」的律法習俗。申
  25:9 是兄弟拒行利未婚姻義務受羞辱；民 12:14 轉用為父女關係，將羞辱主體從「嫂子」轉為「父親」，強度升級：神作為屬靈父親，因女兒（米利暗）干犯神的長子（摩西），施以公開羞辱（關鎖營外七天），以恢復秩序與聖潔。
development: 此互文顯示律法典內部的意象轉用，從社會倫理制裁（申 25）轉為神聖管教權柄（民 12），七天期滿後得潔淨復歸，呼應利未記 12-15 章潔淨律的邏輯。
accumulations:
