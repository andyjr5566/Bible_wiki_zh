name: 摩西為同工代禱
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記 12:13 記載亞倫承認罪愆、求摩西代禱後，「摩西哀求耶和華說：神啊，求你醫治他！」摩西雖遭毀謗，仍展現極大恩慈與中保職分，為得罪神的同工（姊姊米利暗、哥哥亞倫）切切代求。這彰顯屬靈領袖「不以惡報惡、以善勝惡」的屬性，並預表基督為罪人代求的大祭司職任。
development: 此事件為舊約「先知代禱」典範（參創 20:7，撒上 12:23），並直接成為新約希伯來書 7:25 基督「長遠活著，替他們祈求」的預表基礎。
accumulations:
- book: 民數記
  chapter: 12
  summary: 摩西為得罪神的米利暗哀求醫治，神應允並規定潔淨程序。
  relation: 本章展現摩西謙和、盡忠、代求的中保形象，回應神在 v.7-8 對摩西「盡忠、面對面說話」的見證。
