name: 痲瘋表徵罪污
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記 12 章記載米利暗因毀謗摩西，被耶和華擊打長大痲瘋，「有雪那樣白」（v.10）。亞倫承認這是「愚昧犯罪」（v.11），並求摩西代禱。痲瘋在律法中屬不潔淨之病（利
  13-14 章），此處作為神對驕傲、毀謗僕人之罪的審判記號，象徵罪污使人在神面前不潔、隔絕。
development: 此神學意義在後續聖經中延伸，如以賽亞書 1:18 以「雪」比喻罪得赦免後的潔白，形成「痲瘋白如雪」與「罪污白如雪」的對比張力。
accumulations:
- book: 民數記
  chapter: 12
  summary: 米利暗因毀謗摩西長大痲瘋，白如雪；亞倫稱此為罪，摩西代禱醫治。
  relation: 本章核心敘事，確立痲瘋作為神審判毀謗罪、驕傲罪的具體表徵。
