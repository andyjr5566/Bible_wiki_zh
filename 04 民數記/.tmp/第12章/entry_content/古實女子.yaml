name: 古實女子
type: 人物
secondary_types: []
aliases:
- 古實婦人
status: formal
definition: 民數記 12:1 提到「摩西娶了古實女子為妻」。古實通常指埃及南方、紅海西岸的努比亞地區（今蘇丹一帶），居民膚色黝黑。經文未明說此女子是否為西坡拉（出
  2:21 米甸祭司葉忒羅的女兒），亦未說明摩西是再娶或西坡拉已亡。米利暗、亞倫因這古實女子毀謗摩西，顯示種族、血統或婚姻關係成為他們質疑摩西獨特領導地位的藉口。
development: 猶太傳統（如拉希註釋）常認定古實女子即西坡拉，因「古實」喻指外貌出眾；但現代學者多傾向視為第二任妻子或不同時期的婚姻記載。
accumulations:
- book: 民數記
  chapter: 12
  summary: 摩西娶古實女子，引發米利暗亞倫毀謗。
  relation: 本章衝突的導火索，雖非核心神學焦點，卻揭露人心嫉妒借題發揮的實況。
