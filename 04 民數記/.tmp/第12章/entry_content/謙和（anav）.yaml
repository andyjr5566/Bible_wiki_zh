name: 謙和（anav）
type: 原文
secondary_types: []
aliases:
- 謙卑
- 柔和
status: formal
definition: 希伯來文 **עָנָו (ʿānāv)**，字根意為「受苦的、卑微的、謙遜的」。民數記 12:3 形容摩西：「摩西為人極其謙和，勝過世上的眾人」。此詞在舊約常描述在神面前認清自己有限、完全倚靠神、不爭競不自誇的屬靈品格（如詩
  25:9, 37:11, 149:4）。此處作為摩西不自辯、由神親自伸冤的內在原因。
development: 七十士譯本譯為 πραΰς (praus)，新約馬太福音 5:5「溫柔的人有福了」同用此詞族，將摩西的謙和視為基督徒美德的典範。
accumulations:
- book: 民數記
  chapter: 12
  summary: 經文括號說明摩西極其謙和，勝過世人，作為神維護摩西的背景說明。
  relation: 本章神學鋪陳的關鍵屬性，解釋為何摩西不自辯、神卻親自出面審判毀謗者。
related_entries:
