name: 摩西為米利暗代禱
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 亞倫承認愚昧犯罪，求摩西代禱；摩西哀求耶和華說：「神啊，求你醫治他！」（民12:11-13），展現謙和不記惡、為逼迫者代求的屬靈胸襟。
development: 此代禱預表基督為過犯者代求（來7:25），也印證民12:3「摩西極其謙和」的實踐。
accumulations:
- book: 民數記
  chapter: 12
  summary: 記載摩西為得罪的姊姊米利暗向神切切代禱求醫治。
  relation: 為米利暗最終得醫治、關鎖七天後復原的轉捩點。
