organization: '### 米利暗亞倫毀謗摩西（v1-3）

  經文開篇記載 [[米利暗]] 與 [[亞倫]] 因摩西娶了 [[古實女子]] 為妻而 [[毀謗（qalal）|毀謗]] 他，質疑「難道耶和華單與摩西說話，不也與我們說話嗎？」（v2）。這不僅是家庭內部的嫉妒，更是對神所立權柄的挑戰。經文特意插入一句括號說明：「摩西為人極其謙和，勝過世上的眾人」（v3），希伯來文
  **anav** 指在神面前甘心順服、不爭競的柔和，這成為神後來為他伸冤的關鍵依據。關於這句描述是否出自摩西筆下、古實女子是否即西坡拉，歷來為釋經家討論焦點（見
  [[民12：3摩西謙和描述是否出自摩西筆下]]、[[古實女子是否為西坡拉]]）。


  ### 耶和華在會幕門口召喚三人（v4-8）

  神「忽然」召三人到會幕，在雲柱中降臨，站在會幕門口單獨召喚亞倫與米利暗（v4-5）。神以三級對比闡明摩西的獨特地位：普通先知藉異象、夢溝通（v6）；摩西卻是「在我全家盡忠的」（v7），神與他「面對面說話，乃是明說，不用謎語，並且他必見我的形像」（v8）。這段宣告確立了
  [[神面對面與摩西說話]] 的特殊啟示模式，也成為後來先知職分分級的依據。神責問：「你們毀謗我的僕人摩西，為何不懼怕呢？」（v8），直指 [[嫉妒引發神怒氣]]
  的核心。


  ### 米利暗長大痲瘋與摩西代禱（v9-15）

  神怒氣發作離去，雲彩挪開，[[米利暗長大痲瘋]]，「有雪那樣白」（v10）。[[痲瘋表徵罪污]] 在舊約中常象徵屬靈污穢與社群隔離。亞倫承認愚昧犯罪，請求摩西代求（v11-12）；摩西隨即發出簡短卻有力的代禱：「神啊，求你醫治他！」（v13），展現
  [[摩西為同工代禱]] 且不記怨的謙和。神判斷須關鎖營外七天，引用「父親吐唾沫在女兒臉上，豈不蒙羞七天嗎？」的習慣律（申 25:9），表明 [[父親吐唾沫女兒臉羞恥七天]]
  的羞辱與潔淨邏輯（v14）。百姓不動營，直等米利暗被領進來（v15），顯示共同體對肢體恢復的等候。


  ### 百姓從哈洗錄起行到巴蘭曠野（v16）

  事件結束後，百姓從 [[哈洗錄]] 起行，在 [[巴蘭的曠野]] 安營，標誌著以色列繼續向應許之地推進。


  ### 跨章脈絡與預表整理

  本章呈現三層張力：**權柄挑戰—神聖辯護—中保代求**。[[米利暗亞倫毀謗摩西]] 預表猶太領袖後來逼迫基督（[[米利暗亞倫毀謗摩西預表猶太領袖逼迫基督]]）；[[摩西為米利暗代禱]]
  預表基督作大祭司長遠活著替信徒代求（[[摩西代禱預表基督代禱（來7：25）]]）；[[痲瘋預表罪污（賽1：18）]] 指向惟有神能潔淨的救贖。關於米利暗的痲瘋是否永久、摩西謙和描述的作者身分，仍屬開放釋經議題（[[米利暗長痲瘋是否為永久性懲罰]]、[[民12：3摩西謙和描述是否出自摩西筆下]]）。


  > [!important] 本章樞紐

  > 神親自定義摩西的獨特中保身分（v7-8），使後來一切「像摩西的先知」（申 18:15）預表都建立在這段啟示之上。


  > [!question] 待釐清

  > - 古實女子與西坡拉是否同一人？若非，摩西是否重婚？

  > - 米利暗為何獨受懲罰？亞倫為何倖免？（參猶太傳統：米利暗為首謀者）'
