"updates":
- "title": "米利暗"
  "path": "link_folder/人物/米利暗.md"
  "summary": "民12章記載米利暗與亞倫因摩西娶古實女子毀謗摩西，質疑耶和華是否單與摩西說話。耶和華在雲柱中降臨會幕門口，區分先知（異象、夢）與摩西（面對面、明說、見形像），確立摩西獨特地位。米利暗因此長大痲瘋有雪那樣白，亞倫求摩西代禱，摩西哀求耶和華醫治她。耶和華命米利暗在營外關鎖七天，百姓等她才起行。此事顯明米利暗從出埃及記2章守望嬰孩摩西的姊姊、15章女先知帶領婦女歌唱，到此處因嫉妒權柄受審判、又因摩西代禱得醫治的完整軌跡。"
  "relation": "本章為米利暗生平關鍵轉折：從屬靈領袖（女先知）因嫉妒犯罪受審，又因弟弟摩西代禱得潔淨恢復，預表神恩典中的管教與復原。"
- "title": "亞倫"
  "path": "link_folder/人物/亞倫.md"
  "summary": "民12章亞倫與米利暗同謀毀謗摩西，見米利暗長痲瘋立即承認愚昧犯罪，請求摩西代禱（v11-12）。亞倫作為大祭司卻未能分辨神的權柄次序，反成為挑戰者；事後他不為自己求情，只為米利暗求摩西代禱，顯出祭司職分的軟弱與對中保的依賴。本章補充亞倫在出埃及記4-11章作摩西代言人、行神蹟、見法老後，在民數記轉為挑戰權柄的負面記載。"
  "relation": "本章揭示亞倫雖為大祭司，仍屬血氣軟弱，需仰賴摩西這真中保代求，預表舊約祭司制的不完全與基督大祭司的完全。"
- "title": "哈洗錄"
  "path": "link_folder/地點/哈洗錄.md"
  "summary": "民12:16記載米利暗關鎖七天期滿被領進營後，百姓從哈洗錄起行，在巴蘭曠野安營。哈洗錄作為民11章抵達安營地（基博羅哈他瓦後），在民12章成為米利暗事件結束後的下一站起行點，串聯「慾望之墓」（基博羅哈他瓦）→「米利暗受審潔淨」（哈洗錄）→「探子出發基地」（巴蘭曠野）的地理神學脈絡。"
  "relation": "本章將哈洗錄從單純行程地標（民11）提升為「潔淨等待」的見證地：百姓在此靜默等候七天，見證神管教與恩典並行。"
- "title": "巴蘭的曠野"
  "path": "link_folder/地點/巴蘭的曠野.md"
  "summary": "民12:16百姓從哈洗錄起行，在巴蘭曠野安營。此地原為民10:12以色列人離開西乃山後第一個主要安營地，今在民12章米利暗事件後再次被提及，成為民13章探子出發的基地。地理上位於西乃半島北部、迦南南境，三天路程；神學上從「起行順服」（民10）→「慾望審判」（民11）→「權柄挑戰潔淨」（民12）→「探子試驗」（民13）的試煉舞台。"
  "relation": "本章確立巴蘭曠野為以色列從西乃山出發後經歷連續試煉（慾望、嫉妒、不信）的核心舞臺，預表後來四十年漂流的中心區域。"
- "title": "毀謗（qalal）"
  "path": "link_folder/原文/毀謗（qalal）.md"
  "summary": "民12:1、8兩次出現 qalal（毀謗/藐視/詛咒）。v1米利暗亞倫「毀謗」摩西（因娶古實女子）；v8神責問「你們毀謗我的僕人摩西，為何不懼怕呢？」原文 qalal 含「輕視、咒詛、視為輕賤」，嚴重於單純批評，屬挑戰神所立權柄的屬靈叛逆。出22:28「不可毀謗神與官長」提供律法背景。丁良才註解指出 qalal 在此非尋常爭吵，乃屬靈層面的藐視神揀選。"
  "relation": "本章將 qalal 從出埃及記律法條文（出22:28）引入敘事實踐：米利暗亞倫的毀謗直接觸犯「不可毀謗神與官長」，招致神親自審判（痲瘋），確立 qalal 的嚴重屬靈後果。"
