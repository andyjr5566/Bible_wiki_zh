organization: '### 亞拉得之戰與何珥瑪之名（v1-3）

  以色列人從 [[何珥山]] 起行，繞行 [[以東]] 之地，取道 [[海（紅海）|紅海]]。住南地的 [[亞拉得王（Arad）]] 聽說以色列從亞他林路來，主動出擊並擄掠數人。以色列人向耶和華發願：若神將這民交付，必將其城邑盡行毀滅（[[以色列向耶和華發願毀滅迦南人]]）。耶和華應允，迦南人被毀滅，那地便名為何珥瑪（意即「毀滅」）。這是新一代以色列人首次經歷得勝，顯出神信實帶領進入應許之地的開端。


  ### 火蛇審判與銅蛇拯救（v4-9）

  行程艱難，百姓心中煩躁（[[百姓因路難行心中煩躁]]），再次發怨言攻擊神與摩西（[[百姓怨謗神和摩西]]），嫌棄嗎哪為「淡薄食物」。耶和華降下 [[火蛇（saraph）]]
  咬死許多人（[[耶和華使火蛇咬百姓]]，[[火蛇審判預表罪的後果]]）。百姓認罪求摩西代禱（[[百姓認罪求摩西禱告]]），神指示摩西製造銅蛇掛在桿子上（[[銅蛇掛在桿子上]]），凡被咬仰望便活（[[仰望銅蛇預表信心得救]]）。這事件成為新約核心預表：耶穌引用「摩西在曠野怎樣舉蛇，人子也必照樣被舉起」（約
  3:14），直指十字架救贖（[[銅蛇預表基督被舉起]]）。後世希西家王毀壞銅蛇（[[銅蛇被毀滅預表除去偶像（王下18：4）]]），因百姓將其當作偶像燒香（[[銅蛇是否後來成了偶像]]），學者並討論火蛇是自然現象還是純神蹟（[[火蛇是否為自然現象還是神蹟]]）。


  ### 曠野行程：從阿伯到比珥的井（v10-20）

  以色列遷徙：[[阿伯]] → 以耶亞巴琳 → 撒烈谷 → [[亞嫩河]]（摩押與亞摩利交界） → [[比珥]]（[[比珥（Beer）]]，意即「井」）。在比珥，耶和華賜水，百姓唱詩：「井啊，湧上水來！」（[[以色列在比珥向井歌唱]]），領袖用圭用杖挖掘（[[井預表聖靈活水]]）。此段記載引用《耶和華的戰記》詩歌片段（v14-15），見證神在曠野供應的歷史見證。行程繼續經瑪他拿、拿哈列、巴末，至摩押地的谷、毘斯迦
  山頂。


  ### 征服亞摩利王西宏與巴珊王噩（v21-35）

  以色列求經過 [[亞摩利王西宏]] 之地（[[以色列求經過亞摩利王西宏地]]），承諾不偏離王道、不飲井水。西宏拒絕並主動出兵攻擊（[[西宏不容以色列經過並攻擊]]），在雅雜交戰，以色列大勝（[[以色列戰勝亞摩利王西宏]]），佔領從
  [[亞嫩河]] 到 [[雅博]] 全境，包括首都 [[希實本]] 及其鄉村（[[以色列奪取亞摩利人城邑]]）。經文引用古詩歌描述希實本曾屬摩押，後被西宏奪取（v27-30）。摩西又派人窺探
  [[雅謝]]，佔領其鎮市（[[以色列佔領雅謝]]）。隨後轉向 [[巴珊]]，[[巴珊王噩]] 在 [[以得來]] 交戰，神應許「不要怕，已交在你手中」，以色列盡滅噩與其民，得其地（[[以色列戰勝巴珊王噩]]）。這兩場戰役奠定約旦河東岸產業基礎，並被申命記、詩篇反覆引用（[[以色列戰勝亞摩利王西宏互文（申2：24-37；3：1-7；詩135：10-12；136：17-22）]]、[[以色列戰勝巴珊王噩互文（申3：1-11；詩135：10-12；136：17-22）]]）。


  ### 跨章脈絡：從審判到產業的轉折

  本章呈現關鍵轉折：舊一代在曠野倒斃（火蛇審判），新一代經歷得勝（亞拉得、西宏、噩）。銅蛇事件確立「仰望得生」的信心原則，預表基督十字架；比珥之井預表聖靈活水（約
  7:37-39）。地理上，以色列已抵達摩押平原、毘斯迦 山頂，摩西即將在此眺望應許之地並交棒約書亞。兩場東岸戰役不僅軍事勝利，更是神實現「將地賜給亞伯拉罕後裔」應許的具體步驟。'
