book: "民數記"
chapter: 21
candidates:
  - name: "亞拉得王攻擊以色列"
    type: "事件"
    evidence: "民21:1 住南地的迦南人亞拉得王，聽說以色列人從亞他林路來，就和以色列人爭戰，擄了他們幾個人。丁良才：迦南人可能出其不意，擄走了幾個掉隊的以色列人。"
    surfaces:
      - "亞拉得王"
      - "亞他林路"
      - "擄了他們幾個人"
  - name: "以色列向耶和華發願毀滅迦南人"
    type: "事件"
    evidence: "民21:2-3 以色列人向耶和華發願說：你若將這民交付我手，我就把他們的城邑盡行毀滅。耶和華應允了以色列人，把迦南人交付他們，他們就把迦南人和迦南人的城邑盡行毀滅。那地方的名便叫何珥瑪（就是毀滅的意思）。丁良才：禱告表徵信靠神。"
    surfaces:
      - "向耶和華發願"
      - "城邑盡行毀滅"
      - "何珥瑪"
  - name: "百姓因路難行心中煩躁"
    type: "事件"
    evidence: "民21:4 他們從何珥山起行，往紅海那條路走，要繞過以東地。百姓因這路難行，心中甚是煩躁。丁良才：心中煩躁表徵肉體的蠢動。"
    surfaces:
      - "從何珥山起行"
      - "繞過以東地"
      - "心中甚是煩躁"
  - name: "百姓怨謗神和摩西"
    type: "事件"
    evidence: "民21:5 百姓說：你們為什麼把我們從埃及領出來、使我們死在曠野呢？這裡沒有糧，沒有水，我們的心厭惡這淡薄的食物。丁良才：表徵傾向肉體的情慾，厭煩屬靈事物的平淡。"
    surfaces:
      - "從埃及領出來"
      - "死在曠野"
