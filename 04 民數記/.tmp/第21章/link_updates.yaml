"book": "民數記"
"chapter": !!int "21"
"updates":
- "title": "摩西"
  "path": "link_folder/人物/摩西.md"
  "summary": "民21:7-9 百姓到摩西那裡認罪，求摩西禱告。摩西為百姓禱告。耶和華對摩西說：你製造一條火蛇，掛在桿子上。摩西製造一條銅蛇，掛在桿子上。四份註解均記載摩西作中保領袖、代禱者。"
  "relation": "摩西在民21章再次作為中保代禱者：百姓認罪求禱告，摩西為百姓禱告，神吩咐製造銅蛇，摩西順服製造。這是摩西代禱事奉的又一高峰，預表基督為信徒代禱(來7:25)。"
- "title": "何珥山"
  "path": "link_folder/地點/何珥山.md"
  "summary": "民21:4 他們從何珥山起行，往紅海那條路走，要繞過以東地。民20:22-29 亞倫死在何珥山。丁良才：何珥山是亞倫去世之所。"
  "relation": "何珥山作為民21章行程的起點，連結亞倫之死(民20章)與新一代進迦南的旅程。從何珥山繞道紅海、繞過以東地，標誌曠野漂流末期的轉折。"
- "title": "海（紅海）"
  "path": "link_folder/地點/海（紅海）.md"
  "summary": "民21:4 往紅海那條路走，要繞過以東地。丁良才：紅海即指現在的亞卡巴灣(王上9:26)。"
  "relation": "紅海(亞卡巴灣)作為繞過以東地的路徑，連結出埃及記14章過紅海的拯救歷史，提醒以色列人神過去的拯救與信實。"
- "title": "以東"
  "path": "link_folder/地點/以東.md"
  "summary": "民21:4 要繞過以東地。民20:14-21 以東王拒絕以色列經過。丁良才：以東人不念弟兄之情，以色列只能繞道。"
  "relation": "以東拒絕以色列經過(民20章)，迫使以色列繞道紅海，延長曠野旅程。這預示後來以東在巴比倫入侵時落井下石(俄巴底亞書)，也迫使以色列繞道摩押、亞摩利地。"
- "title": "雅博"
  "path": "link_folder/原文/雅博.md"
  "summary": "民21:24 以色列人用刀殺了他，得了他的地，從亞嫩河到雅博河，直到亞捫人的境界。丁良才：雅博河是亞摩利與亞捫的界河。"
  "relation": "雅博河作為亞摩利王西宏疆界的北界(民21:24)，與亞嫩河(南界)共同界定以色列從亞摩利人手中得的地。與申2:24-25、3:16呼應，見證神應許賜地的應驗。"
