definition: 以色列人轉回向巴珊去的地域。巴珊王噩率眾出戰，被以色列擊敗，以色列得了他的地（民21:33-35）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載以色列進入巴珊、擊敗噩王、佔領該地（33-35節）。
  relation: 本章最後征戰地點，完成約旦河東岸從亞嫩河到黑門山區域的佔領。
