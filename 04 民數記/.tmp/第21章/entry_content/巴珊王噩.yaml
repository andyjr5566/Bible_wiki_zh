name: 巴珊王噩
type: 人物
secondary_types: []
aliases:
- 噩
status: formal
definition: 巴珊王，率領眾民在以得來與以色列交戰（民21:33）。耶和華吩咐摩西不要怕他，因神已將他和他的地交在以色列手中（民21:34）。以色列殺了他、他的眾子並眾民，無一倖免，得了他的地（民21:35）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載噩在以得來出戰、被神交付以色列、全軍覆沒、地土被奪取（33-35節）。
  relation: 本章第二場征戰的敵對君王，其戰敗完成以色列對約旦河東岸主要區域的佔領。
