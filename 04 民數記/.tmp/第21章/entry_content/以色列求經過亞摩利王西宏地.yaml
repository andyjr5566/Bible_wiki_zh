name: 以色列求經過亞摩利王西宏地
type: 事件
secondary_types: []
aliases:
- 以色列請求通過西宏領地
status: formal
definition: 以色列差遣使者去見亞摩利王西宏，說：「求你容我們從你的地經過；我們不偏入田間和葡萄園，也不喝井裡的水，只走大道，直到過了你的境界」（民21:21-22）。這是和平外交嘗試，承諾不侵犯資源、只走王道。
development: 西宏拒絕並主動出戰（民21:23），導致以色列被迫反擊並佔領其全地，成為進入迦南的第一個重大軍事勝利。
accumulations:
- book: 民數記
  chapter: 21
  summary: 以色列派使者向西宏請求和平通行，承諾不損害民生資源，僅走大道，西宏拒絕並發動攻擊。
  relation: 開啟約旦河東岸征服戰役，直接導致以色列奪取亞摩利地、佔領希實本，並為後續巴珊之戰鋪路。
