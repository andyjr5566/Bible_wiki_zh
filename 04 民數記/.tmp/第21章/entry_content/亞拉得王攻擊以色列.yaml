name: 亞拉得王攻擊以色列
type: 事件
secondary_types: []
aliases:
- 亞拉得王之戰
status: formal
definition: 住南地的迦南人亞拉得王聽說以色列人從亞他林路來，就和以色列人爭戰，擄了他們幾個人（民21:1）。這是以色列進入迦南地前的第一次軍事衝突，促使以色列向耶和華發願求得勝。
development: 亞拉得王主動出擊，擄掠以色列人，成為後續何珥瑪之戰的導火線。
accumulations:
- book: 民數記
  chapter: 21
  summary: 亞拉得王聽聞以色列行蹤，出戰擄掠百姓，引發以色列發願毀滅迦南人。
  relation: 本章敘事起點，觸發以色列向神許願與後續毀滅迦南城邑。
