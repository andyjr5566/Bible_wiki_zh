status: formal
definition: 記載亞摩利王西宏拒絕以色列人和平通過其領土的請求，反而率軍出到曠野雅雜與以色列人交戰的事件（民21:21-23）。
development: 以色列派使者求經過西宏之地，承諾不偏入田間葡萄園、不喝井水、只走大道（21:22）。西宏不允，招聚眾民出到曠野，在雅雜攻擊以色列（21:23）。
accumulations:
