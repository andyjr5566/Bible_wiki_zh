name: 銅蛇預表基督被舉起
type: 神學
secondary_types: []
aliases:
- 銅蛇為基督被舉起的預表
status: formal
definition: 神學類型學解讀：摩西在曠野舉起銅蛇（民21:8-9），預表耶穌基督被舉起在十字架上（約3:14-15），使一切信他的得永生。
development: 耶和華吩咐摩西製造銅蛇掛在桿子上，凡被咬的望一望就活（21:8-9）。新約約翰福音3:14-15明確指出這是基督被舉起的預表。銅蛇被舉起在桿子上，象徵基督被釘十字架；以色列人仰望得醫治，象徵罪人仰望基督得救恩。
accumulations:
- book: 民數記
  chapter: 21
  summary: 銅蛇掛桿子，仰望者得生，成為基督被舉起救贖的舊約預表。
  relation: 本章歷史事件在新約啟示中被證明為救贖真理的預表性圖畫。
