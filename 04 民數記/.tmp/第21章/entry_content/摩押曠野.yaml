name: 摩押曠野
type: 地點
secondary_types: []
aliases: []
status: formal
definition: 以色列人行經的曠野區域，位於摩押東邊。以色列人從阿伯起行，安營在與摩押相對的曠野（民21:11）。亞嫩河是摩押的邊界（民21:13）。以色列人後來住在亞摩利人之地，臨近此曠野（民21:31-32）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載以色列行經此曠野、靠近亞嫩河邊界、並在比珥得水等事件（11, 13, 16, 20節）。
  relation: 本章中後段地理背景，見證以色列從漂流走向得地的過渡地帶。
