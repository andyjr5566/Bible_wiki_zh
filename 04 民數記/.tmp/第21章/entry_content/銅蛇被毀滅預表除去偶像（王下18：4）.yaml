name: 銅蛇被毀滅預表除去偶像（王下18：4）
type: 互文
secondary_types: []
aliases:
- 銅蛇被毀滅預表除去偶像
status: formal
definition: 列王紀下 18:4 記載希西家王除去邱壇、毀壞柱像、砍下木偶，並打碎摩西所造的銅蛇，因以色列人向銅蛇燒香，希西家蔑稱其為「nehushtan」（一塊銅）。此互文揭示民數記
  21:9 的銅蛇原為神醫治恩典的器具，後在歷史長河中被異化為偶像崇拜對象，需經改革王除去以恢復純正敬拜，預表屬靈改革中除去一切取代神地位的事物。
development: 從曠野救恩器具 → 王國時期偶像 → 改革時期被毀，展現屬靈退廢與復興的循環。
accumulations:
- book: 民數記
  chapter: 21
  summary: 銅蛇的起源與正當用途（21:9）。
  relation: 提供互文的源頭，確立銅蛇原本的神聖功能。
- book: 列王紀下
  chapter: 18
  summary: 希西家毀滅銅蛇的改革行動（18:4）。
  relation: 互文的應驗端，顯示銅蛇如何被異化並被神所揀選的王除去。
