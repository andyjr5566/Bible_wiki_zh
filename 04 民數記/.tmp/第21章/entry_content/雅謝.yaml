definition: 亞摩利人的城邑。摩西打發人窺探，以色列人佔了雅謝的鎮市，趕出那裡的亞摩利人（民21:32）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載摩西派探子、以色列佔領雅謝並趕出亞摩利人（32節）。
  relation: 以色列鞏固對亞摩利地佔領的具體行動，顯示神賜地應許的逐步實現。
