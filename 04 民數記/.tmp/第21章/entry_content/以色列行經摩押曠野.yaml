name: 以色列行經摩押曠野
type: 事件
secondary_types: []
aliases:
- 以色列遍歷摩押曠野
status: formal
definition: 以色列人從何珥山起行，先後安營在阿伯、以耶亞巴琳（與摩押相對的曠野）、撒烈谷、亞嫩河那邊（民21:10-13）。亞嫩河是摩押與亞摩利人的邊界（民21:13）。經文引用《耶和華的戰記》記載相關地理（民21:14-15）。後又從曠野往瑪他拿、拿哈列、巴末、摩押地的谷、毘斯迦山頂（民21:18-20）。
development: 此為進入迦南前的最後階段行軍，繞過以東、摩押，直抵約旦河東岸平原，完成曠野漂流四十年的地理軌跡。
accumulations:
- book: 民數記
  chapter: 21
  summary: 詳細記載以色列在摩押曠野地區的行軍路線與安營地點，含地理邊界說明與古籍引用。
  relation: 連接銅蛇事件與比珥井歌唱，為後續征服亞摩利王西宏、巴珊王噩鋪路。
