name: 仰望銅蛇預表信心得救
type: 神學
secondary_types: []
aliases:
- 望銅蛇得生為因信稱義的預表
status: formal
definition: 神學類型學解讀：被蛇咬的以色列人只要仰望銅蛇就活（民21:8-9），預表罪人單靠信心仰望基督，不靠行為即得救恩（約3:14-15；弗2:8-9）。
development: 耶和華設立拯救條件：製造銅蛇掛桿子上，凡被咬的「一望這蛇，就必得活」（21:8）。摩西照做，凡被蛇咬的「一望這銅蛇就活了」（21:9）。這不需要任何功德、儀式或努力，只需單純仰望，完美預表新約「因信稱義」的核心真理。
accumulations:
- book: 民數記
  chapter: 21
  summary: 仰望銅蛇即得醫治，預表單純信心接受基督救贖即得永生。
  relation: 將歷史拯救事件提升為救恩論的基礎範式，強調拯救完全出於神主動供應、人單方面信心回應。
