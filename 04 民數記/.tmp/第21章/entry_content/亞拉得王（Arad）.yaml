name: 亞拉得王（Arad）
type: 人物
secondary_types: []
aliases:
- 亞拉得迦南王
status: formal
definition: 住南地（尼革夫）的迦南王，聽說以色列從亞他林路來，主動出兵攻擊以色列並擄掠數人（民21:1），後被以色列向耶和華發願毀滅（民21:2-3）。
development: 亞拉得王聽聞以色列行蹤，發動襲擊擄掠（21:1）。以色列向耶和華發願若神交付這民，必毀滅其城（21:2）。耶和華應允，以色列盡行毀滅迦南人及其城邑，地名叫何珥瑪（毀滅）（21:3）。他是本章首位被以色列擊敗的迦南王，開啟征服迦南地的序幕。
accumulations:
- book: 民數記
  chapter: 21
  summary: 迦南王亞拉得主動攻擊以色列，反被以色列在神幫助下毀滅，地名改為何珥瑪。
  relation: 展示神保護祂百姓、審判攔阻神計劃之敵人的公義，也是以色列首次在神帶領下「毀滅」迦南城邑的先例。
