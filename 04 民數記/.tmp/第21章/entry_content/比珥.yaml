name: 比珥
type: 地點
secondary_types: []
aliases:
- 比珥井
status: formal
definition: 比珥意為「井」。以色列人出埃及漂流期間，在摩押曠野邊界、亞嫩河北側安營的地點（民21:16）。此處因耶和華吩咐摩西招聚百姓賜水，成為神在曠野供應生命水的見證地；百姓並在此唱「井啊，湧上水來」的詩歌（民21:17-18），紀念首領用杖挖掘、神使水湧出的恩典。
development: 民數記 21 章記載以色列人從撒烈谷起行，安營在亞嫩河那邊，隨後來到比珥。這井是神主動應許賜水的地方（民21:16），百姓以詩歌回應（民21:17-18），彰顯神在曠野艱難中信實供應。後續行程從比珥往瑪他拿、拿哈列、巴末，直抵毘斯迦山頂（民21:19-20）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 以色列人抵達比珥，神賜水並吩咐摩西招聚百姓飲用；百姓唱詩讚美這口由首領用杖挖掘的井。
  relation: 本章地理行程的關鍵站點，見證神在曠野供應水源，並引發百姓詩歌敬拜。
