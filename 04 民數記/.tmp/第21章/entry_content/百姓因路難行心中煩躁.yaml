name: 百姓因路難行心中煩躁
type: 事件
secondary_types: []
aliases:
- 百姓因路途艱難煩躁
status: formal
definition: 以色列從何珥山起行，往紅海路走，要繞過以東地。百姓因這路難行，心中甚是煩躁（民21:4）。這是曠野漂流末期對神帶領方式的不滿表現。
development: 繞行以東地導致路程加長、環境惡劣，百姓耐心耗盡，為後續怨謗埋下伏筆。
accumulations:
- book: 民數記
  chapter: 21
  summary: 以色列繞行以東，路途艱難，百姓心生煩躁，成為怨謗神與摩西的前因。
  relation: 連接何珥山出發與紅海路線，說明百姓屬靈低落的環境背景。
