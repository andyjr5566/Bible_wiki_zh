name: 亞摩利王西宏
type: 人物
secondary_types: []
aliases:
- 西宏
status: formal
definition: 亞摩利人的王，住在希實本。曾與摩押先王爭戰，奪取全地直到亞嫩河（民21:26）。拒絕以色列人和平經過其地，率眾軍在雅雜攻擊以色列（民21:23），被以色列用刀殺死，其地從亞嫩河到雅博河被以色列佔有（民21:24-25）。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載西宏拒絕以色列經過、出戰雅雜、被殺、地土被奪取的過程（21-31節）。
  relation: 本章核心敵對人物，其戰敗標誌以色列開始佔有約旦河東岸之地。
