name: 銅蛇（nehushtan）
type: 原文
secondary_types: []
aliases:
- 銅蛇
status: formal
definition: 希伯來文 nehushtan（נְחֻשְׁתָּן），由 nachash（蛇）與 nechosheth（銅/青銅）構成。民數記 21:9
  記載摩西製造銅蛇掛在桿子上，凡被火蛇咬的仰望便活。後來在列王紀下 18:4，希西家王因以色列人向銅蛇燒香，將其毀滅並蔑稱「nehushtan」（一塊銅），顯示原本的救恩器具可能異化為偶像。
development: 從曠野醫治器具發展為後期王國時期的偶像崇拜對象，最終被改革王除去。
accumulations:
- book: 民數記
  chapter: 21
  summary: 記載銅蛇的製造、懸掛與醫治功用（21:9）。
  relation: 本章為銅蛇的起源記載，確立其作為神醫治恩典管道的地位。
- book: 列王紀下
  chapter: 18
  summary: 記載希西家毀滅銅蛇，稱其為 nehushtan（18:4）。
  relation: 互文見證銅蛇後來被當作偶像崇拜，需被除去以恢復純正敬拜。
