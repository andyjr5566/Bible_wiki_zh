name: 以色列戰勝亞摩利王西宏
type: 神學
secondary_types: []
aliases:
- 神賜以色列勝過西宏
status: formal
definition: 神學視角：以色列擊敗亞摩利王西宏並佔領其地（民21:23-26），彰顯耶和華實現應許、將敵人交在祂百姓手中的主權與信實。
development: 西宏不容以色列經過，反出兵攻擊（21:23）。以色列用刀殺了他，得了他的地從亞嫩河到雅博河（21:24）。奪取一切城邑，住希實本及其鄉村（21:25）。這不僅是軍事勝利，更是神應許「我已將他和他的地為業」（申2:31）的應驗，顯明神掌管列國興衰、為祂子民爭戰。
accumulations:
- book: 民數記
  chapter: 21
  summary: 以色列靠神得勝西宏，佔領亞摩利地，見證神信實實現賜地應許。
  relation: 為後續征服巴珊王噩、分配約旦東岸地業奠定神學基礎：爭戰屬耶和華，得地靠神賜予。
