name: 以色列戰勝亞摩利王西宏互文（申2：24-37；3：1-7；詩135：10-12；136：17-22）
type: 互文
secondary_types: []
aliases:
- 以色列戰勝亞摩利王西宏互文
status: formal
definition: 民數記 21:21-31 記載以色列求經過西宏地被拒、在雅雜交戰、擊殺西宏並佔領希實本等地。此事在申命記 2:24-37、3:1-7 作為摩西回顧歷史的見證重述，強調神將西宏交在以色列手中；詩篇
  135:10-12、136:17-22 則將擊殺西宏列入「大能作為」，配合「因他的慈愛永遠長存」的副歌，成為以色列敬拜中紀念神信實的固定素材。
development: 從歷史記載 → 律法書回顧 → 詩篇敬拜詠唱，形成多層次的神學傳承鏈。
accumulations:
- book: 民數記
  chapter: 21
  summary: 戰勝西宏的完整敘事，含外交交涉、戰鬥、佔領與詩歌引用（21:21-31）。
  relation: 本章為原始歷史記載，提供互文網絡的基礎數據。
- book: 申命記
  chapter: 2
  summary: 摩西回顧神吩咐攻擊西宏並賜勝（2:24-37）。
  relation: 互文見證同一事件在約書傳承中的神學詮釋：主動權在神。
- book: 詩篇
  chapter: 135
  summary: 將擊殺西宏列為神大能作為（135:10-12）。
  relation: 互文見證事件進入敬拜禮儀，成為讚美神永恆慈愛的具體依據。
