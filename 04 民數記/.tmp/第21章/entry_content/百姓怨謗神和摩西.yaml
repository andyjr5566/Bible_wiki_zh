name: 百姓怨謗神和摩西
type: 事件
secondary_types: []
aliases:
- 百姓發怨言攻擊神與摩西
status: formal
definition: 百姓怨讟神和摩西說：「你們為什麼把我們從埃及領出來、使我們死在曠野呢？這裡沒有糧，沒有水，我們的心厭惡這淡薄的食物」（民21:5）。這是曠野漂流期間最嚴重的集體叛逆之一，直接針對神的拯救與供應。
development: 從抱怨環境轉為攻擊神的屬性與摩西的領導，並輕慢嗎哪（淡薄的食物），觸發神的審判。
accumulations:
- book: 民數記
  chapter: 21
  summary: 百姓因煩躁而公開怨謗神與摩西，控訴出埃及、缺糧缺水、厭惡嗎哪，引發火蛇審判。
  relation: 承接路途煩躁，直接導致耶和華使火蛇咬百姓的審判。
related_entries:
- 百姓因路難行心中煩躁
