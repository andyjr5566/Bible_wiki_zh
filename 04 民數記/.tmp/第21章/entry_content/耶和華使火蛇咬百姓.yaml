name: 耶和華使火蛇咬百姓
type: 事件
secondary_types: []
aliases:
- 火蛇審判
- 耶和華差遣火蛇
status: formal
definition: 耶和華使火蛇（saraph）進入百姓中間，蛇就咬他們，以色列人中死了許多（民21:6）。「火蛇」意指毒蛇燒灼般的毒性，或指蛇身如火，為神主動差遣的審判工具。
development: 神以百姓怨謗的對象（曠野環境）中的生物為杖，施行嚴厲審判，死傷慘重，逼迫百姓認罪。
accumulations:
- book: 民數記
  chapter: 21
  summary: 神差遣火蛇咬殺百姓，作為對怨謗神與摩西的直接審判，造成大量死亡。
  relation: 回應百姓怨謗，並為銅蛇拯救預備舞台，預表基督被舉起（約3:14-15）。
