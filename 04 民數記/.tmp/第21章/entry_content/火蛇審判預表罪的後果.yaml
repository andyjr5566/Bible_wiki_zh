name: 火蛇審判預表罪的後果
type: 神學
secondary_types: []
aliases:
- 火蛇為罪之審判的預表
status: formal
definition: 神學解讀：耶和華因百姓怨謗而使火蛇進入營中咬死許多人（民21:6），預表罪的後果是死亡，神對悖逆的公義審判。
development: 百姓因路難行怨讟神和摩西（21:4-5），耶和華使火蛇進入百姓中間咬他們，以色列人中死了許多（21:6）。火蛇的毒害導致死亡，象徵罪的工價乃是死（羅6:23），神對不信與怨謗的嚴厲審判。
accumulations:
- book: 民數記
  chapter: 21
  summary: 火蛇咬死百姓，展示神對怨謗悖逆的審判，預表罪必招致死亡。
  relation: 為銅蛇拯救鋪陳背景，凸顯人無法自救、唯有神提供拯救途徑的神學張力。
