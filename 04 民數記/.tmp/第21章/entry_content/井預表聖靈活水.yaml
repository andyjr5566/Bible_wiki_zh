name: 井預表聖靈活水
type: 神學
secondary_types: []
aliases:
- 比珥井為聖靈活水的預表
status: formal
definition: 神學解讀：神在比珥賜井水給以色列人（民21:16-18），百姓向井歌唱「井啊，湧上水來」，預表聖靈如活水澆灌信徒（約7:37-39），滿足屬靈渴慕。
development: 以色列來到比珥（井的意思），耶和華吩咐摩西招聚百姓賜水（21:16）。百姓唱歌：「井啊，湧上水來！你們要向這井歌唱」（21:17）。井是首領用圭用杖挖掘的（21:18）。這在曠野乾旱中神主動供應生命水，預表基督應許賜下的聖靈活水（約4:14；7:37-39），由神主動開啟、領袖配合、百姓歡呼領受。
accumulations:
- book: 民數記
  chapter: 21
  summary: 神在比珥賜井，百姓歌唱慶祝，預表聖靈時代神將活水澆灌渴慕的子民。
  relation: 曠野漂流中神持續供應生命資源的具體彰顯，對應屬靈生命不斷需要聖靈澆灌的真理。
