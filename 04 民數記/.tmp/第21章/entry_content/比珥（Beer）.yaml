name: 比珥（Beer）
type: 原文
secondary_types: []
aliases:
- Beer
- בְּאֵר
status: formal
definition: 希伯來文 בְּאֵר (Be'er)，基本字義為「井、水井」。在民數記 21:16 作地名「比珥」使用，經文括號註明「比珥就是井的意思」。此處指神賜水的特定井口，由首領、尊貴人用圭、杖挖掘而成（民21:18），象徵神透過領袖權柄供應生命水源。
development: 該詞在舊約常作普通名詞「井」（如創21:19、26:19），此處專有名詞化為地名，強調「神所賜之井」的神學意義。七十士譯本音譯為 Βηρ
  (Bēr)；拉丁武加大譯本譯為 Beer。新約約翰福音 4 章雅各井事件與「活水」教導，常被視為此類「神供應之井」的應驗與深化。
accumulations:
- book: 民數記
  chapter: 21
  summary: 經文第 16 節出現「比珥（比珥就是井的意思）」，第 17-18 節以「井」為主詞記載百姓詩歌與挖掘過程。
  relation: 本章唯一出現此希伯來詞作地名處，凸顯「井」作為神恩典供應的核心意象。
