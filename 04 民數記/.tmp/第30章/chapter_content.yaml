organization: "### 總綱：人不可食言（v1-2）\n經文開篇即確立核心原則：人向耶和華[[許願與起誓律例|許願或起誓]]，[[不可食言（lo yachel\
  \ devaro）|不可食言]]，必須按口中所出的一切話行（v2）。這不僅是道德勸勉，更是立約群體中「言出必行」的法律基石。摩西向各支派首領傳達此[[父女夫妻律例（chuqqim\
  \ av uvat, ish ve'ishah）|律例]]，凸顯其在家庭與部落層面的執行權威。\n\n### 情境一：父家女子的許願與父親遮蓋權（v3-5）\n\
  年幼仍在父家的女子許願[[刻苦約束自己（anah nephesh）|約束自己]]，父親聽見當日若[[丈夫天天默許堅定願誓|默默不言]]，願誓立定（v4）；若父親當日[[女子許願父親權柄|不應承]]，願誓落空，耶和華必赦免她（v5）。這揭示父親在女兒婚前擁有屬靈遮蓋權柄，可在「聽見的日子」單方面廢棄女兒的屬靈負債，保護家庭免受輕率許願（[[冒失話（nidrei\
  \ shegagah）|冒失話]]）的捆綁。\n\n### 情境二：出嫁婦人與丈夫的權柄互動（v6-8, 10-15）\n經文細分兩種狀況：\n1. **婚前許願/冒失話帶入婚姻（v6-8）**：丈夫聽見當日默許則立定，若當日廢去則赦免。\n\
  2. **婚後在丈夫家中許願（v10-15）**：丈夫擁有更完整的[[丈夫家中許願丈夫權柄|決定權]]——可堅定、可廢去（v13）。**關鍵機制**在於「聽見的日子」：\n\
  \   - **默許（天天默默不言）**：視為[[丈夫天天默許堅定願誓|堅定]]（v14）。\n   - **事後廢去**：丈夫必[[丈夫事後廢去擔當罪孽|擔當婦人的罪孽]]（v15），顯示屬靈遮蓋伴隨責任。\n\
  \n### 情境三：寡婦與被休婦人的完全自主（v9）\n脫離父權與夫權遮蓋的女子（寡婦、被休者），其許願「都要為定」，無人可廢。這確立了獨立女性在屬靈誓約上的完全法律人格。\n\
  \n### 決策流程圖：女子許願的效力判定\n```mermaid\nflowchart TD\n  A[女子許願/起誓] --> B{身分狀態}\n  B -->|年幼在父家|\
  \ C[父親聽見當日]\n  B -->|已出嫁/在夫家| D[丈夫聽見當日]\n  B -->|寡婦/被休| E[願誓立定 無人可廢]\n  C --> F{父親回應}\n\
  \  D --> G{丈夫回應}\n  F -->|默許| H[願誓立定]\n  F -->|不應承/廢去| I[願誓落空 耶和華赦免]\n  G -->|默許/天天默許|\
  \ J[願誓堅定]\n  G -->|當日廢去| K[願誓落空 耶和華赦免]\n  G -->|事後廢去| L[願誓落空 丈夫擔當罪孽]\n```\n\n###\
  \ 對照表：三類女子許願權柄比較\n| 類別 | 權柄持有者 | 廢棄時限 | 廢棄後果 | 經文 |\n|---|---|---|---|---|\n| **父家女子**\
  \ | 父親 | 聽見當日 | 願誓落空，耶和華赦免女子 | v3-5 |\n| **夫家婦人** | 丈夫 | 聽見當日 / 事後 | 當日廢：赦免；事後廢：丈夫擔罪\
  \ | v6-8, 10-15 |\n| **寡婦/被休** | 本人 | 不適用 | 願誓永立定 | v9 |\n\n### 總結律例（v16）\n經文以「這是耶和華所吩咐摩西的律例」收尾，將上述案例法定性為[[父女夫妻律例（chuqqim\
  \ av uvat, ish ve'ishah）|父女、夫妻之間的永久律例]]。核心神學張力在於：**屬靈權柄（遮蓋）與責任（擔罪）的對等**——丈夫/父親的默許非被動，而是主動承擔誓約生效的屬靈後果；其廢棄權非專制，乃保護家庭免受[[冒失話（nidrei\
  \ shegagah）|冒失話]]之害。這章為後世拉比傳統《Nedarim》誓約法典奠定經文基礎。"
