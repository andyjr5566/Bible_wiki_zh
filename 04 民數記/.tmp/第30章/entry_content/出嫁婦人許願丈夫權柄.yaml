name: 出嫁婦人許願丈夫權柄
type: 神學
secondary_types: []
aliases:
- 出嫁婦人許願夫權
status: formal
definition: 民30:6‑8規定，已出嫁的婦人若有願或冒失話，丈夫聽見當日若默許，願便立定；丈夫若在聽見當日不應承，願即廢去，耶和華必赦免她。
development: ''
accumulations:
- book: 民數記
  chapter: 30
  summary: 闡述丈夫對妻子許願的確認或廢棄權柄，並說明神對丈夫不應承時的赦免。
  relation: 顯示婚姻關係中屬靈遮蓋權柄的具體運作。
