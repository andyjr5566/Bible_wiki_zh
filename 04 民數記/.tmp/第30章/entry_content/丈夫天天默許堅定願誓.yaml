name: 丈夫天天默許堅定願誓
type: 神學
secondary_types: []
aliases:
- 丈夫天天默許
status: formal
definition: 民30:13‑14說明，丈夫若天天向妻子默默不言，即視為堅定妻子所許的願與約束自己的話；因丈夫聽見的日子向她默許，使這兩樣堅定。
