status: formal
definition: 希伯來文「לֹא יַחֵל דְּבָרוֹ」（lo yachel devaro），字面「不可使他話落空」。民30:2規定「人若向耶和華許願或起誓……不可食言，必要按口中所出的一切話行」。
development: ''
accumulations:
- book: 民數記
  chapter: 30
  summary: 核心原則：許願起誓者不可違背自己的話，必須履行。
  relation: 為本章所有許願處理的基礎律例。
