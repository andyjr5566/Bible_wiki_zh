status: formal
definition: 希伯來文「חֻקִּים אָב וּבַת, אִישׁ וְאִשָּׁה」（chuqqim av uvat, ish ve'ishah），意指「父女、夫妻的律例」。民30:16總結本章為「丈夫待妻子，父親待女兒，女兒年幼、還在父家，耶和華所吩咐摩西的律例」。
development: ''
accumulations:
