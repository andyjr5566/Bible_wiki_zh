name: 冒失話（nidrei shegagah）
type: 原文
secondary_types: []
aliases:
- 冒失話
status: formal
definition: 希伯來文「נִדְרֵי שְׁגָגָה」（nidrei shegagah），意指「錯誤/冒失的願誓」。民30:6、8、12提到妻子「口中出了約束自己的冒失話」，丈夫可在聽見當日廢去。
development: ''
accumulations:
- book: 民數記
  chapter: 30
  summary: 形容婦人無心或輕率發出的約束話語，仍屬許願範疇，受丈夫權柄管轄。
  relation: 與「出嫁婦人許願丈夫權柄」、「丈夫家中許願丈夫權柄」直接相關。
related_entries:
- 出嫁婦人許願丈夫權柄
- 丈夫家中許願丈夫權柄
