- name: 不可食言
  suggested_type: 原文
  evidence: 民30:2 不可食言，必要按口中所出的一切話行。食言（chalal）意為褻瀆、使成俗、破壞神聖性。預表基督話語全然可信（約14:6）、信徒當說誠實話（弗4:25、雅5:12）。
  surfaces:
  - phrase: 不可食言
  - phrase: 按口中所出的一切話行
  - phrase: 食言
  target_path: link_folder/原文/不可食言.md
- name: 冒失話
  suggested_type: 原文
  evidence: 民30:6,8,12 冒失話（bittuy sefatayim）意為嘴唇的冒失、輕率發出的話。聖經警告不可冒失許願（傳5:2,4-5），預表信徒當謹守嘴唇（詩141:3、箴13:3）。
  surfaces:
  - phrase: 冒失話
  - phrase: 口中出了約束自己的冒失話
  - phrase: 輕率發出的話
  target_path: link_folder/原文/冒失話.md
- name: 刻苦約束自己
  suggested_type: 原文
  evidence: 民30:13 刻苦約束自己（anah nephesh）意為苦待靈魂、禁食、自潔。連結大贖罪日刻苦己心（利16:29-31）、耶穌在曠野禁食（太4:2）、保羅攻克己身（林前9:27）。
  surfaces:
  - phrase: 刻苦約束自己
  - phrase: 起了誓
