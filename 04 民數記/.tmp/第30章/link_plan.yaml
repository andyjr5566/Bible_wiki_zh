- name: 許願與起誓律例
  suggested_type: 事件
  evidence: 民30:1-16 摩西曉諭以色列各支派首領：人向耶和華許願、起誓約束自己，不可食言，必要按口中所出的一切話行。女子在父家許願、父親默許則為定、父親不應承則廢去；出嫁後丈夫有同樣權柄；寡婦、被休婦人許願自為定。丈夫可堅定、可廢去，若天天默許則堅定，若事後廢去則擔當婦人罪孽。丁良才：許願表徵信徒獻上自己為活祭（羅12:1），不可輕率。
  surfaces:
  - phrase: 許願
  - phrase: 起誓
  - phrase: 不可食言
  - phrase: 按口中所出的一切話行
  - phrase: 各支派首領
  target_path: link_folder/事件/許願與起誓律例.md
