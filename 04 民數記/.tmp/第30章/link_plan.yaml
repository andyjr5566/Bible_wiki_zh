- name: 丈夫天天默許堅定願誓
  suggested_type: 神學
  evidence: 民30:13-14 丈夫天天向妻子默默不言，就算堅定所許的願和約束的話；因丈夫聽見日子向他默許。持續默許等於主動確認，預表基督持續代求堅固信徒（來7:25、羅8:34）。
  surfaces:
