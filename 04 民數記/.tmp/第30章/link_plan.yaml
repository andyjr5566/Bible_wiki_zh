- name: 寡婦被休婦人許願自主
  suggested_type: 神學
  evidence: 民30:9 寡婦或被休婦人所許的願、約束自己的話，都要為定。無男性權柄遮蓋，直接對神負責，預表信徒在基督裡直接進入神面前（來4:16、10:19-22）。
  surfaces:
