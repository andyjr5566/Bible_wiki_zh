  suggested_type: 原文
  evidence: 民30:16 這是丈夫待妻子、父親待女兒、女兒年幼還在父家，耶和華所吩咐摩西的律例。家庭屬靈秩序：父權→夫權→基督權（林前11:3），律例確立家庭屬靈治理架構。
  surfaces:
