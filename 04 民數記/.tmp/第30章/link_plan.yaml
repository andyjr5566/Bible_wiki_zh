- name: 屬靈遮蓋權柄
  suggested_type: 神學
  evidence: 民30:3-15 父親、丈夫對女子許願有確認、廢去權柄，構成屬靈遮蓋體系：父權（女兒在父家）→夫權（出嫁後）→基督權（在基督裡）。預表教會在基督遮蓋下得保護（弗1:22-23、西1:18）。
