  suggested_type: 神學
  evidence: 民30:6-8 出嫁婦人有願在身或冒失話，丈夫聽見默許則為定；丈夫聽見日子不應承則廢去，耶和華赦免她。丈夫權柄預表基督作教會頭（弗5:23）、代求信徒（來7:25）。
