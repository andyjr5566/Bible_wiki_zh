organization: "### 利未人產業與逃城設置（v1-15）\n耶和華在摩押平原吩咐摩西，從以色列各支派產業中撥出 **四十八座城** 給利未人居住，連同四圍\
  \ **一千肘** 的郊野，再外延 **二千肘** 作為牧場（v4-5）。這 [[利未人四十八城|四十八座城]] 中，指定 **六座為逃城**——約但河東三座、迦南地西三座（v13-14），為\
  \ [[誤殺與故殺界線|誤殺人者]] 提供庇護，使其不至於在未經審判前死於 [[報血者|報血者]] 手中（v11-12）。逃城不僅保護以色列人，也庇護寄居的外人（v15），顯示神的公義不分國籍。\n\
  \n### 故殺與誤殺的法律界線（v16-28）\n本章以具體器具與動機劃分 ==故殺== 與 ==誤殺==，建立司法判斷標準：\n\n| 類別 | 判斷依據\
  \ | 處置 |\n|------|----------|------|\n| **故殺** | 用鐵器、石頭、木器等足以致死之器械；或因怨恨、埋伏、仇恨出手（v16-21)\
  \ | 死刑，[[報血者|報血者]] 親自執行（v19,21） |\n| **誤殺** | 無仇恨、無預謀、無看見而誤擊（v22-23) | 逃往 [[逃城六座|逃城]]，會眾\
  \ 審判後庇護至 [[大祭司死預表基督|大祭司]] 死（v24-25） |\n\n```mermaid\nflowchart TD\n  A[\"人被打死\"\
  ] --> B{\"有無仇恨/預謀?\"}\n  B -- \"有\" --> C[\"故殺 → 死刑\\n(報血者執行)\"]\n  B -- \"無\" -->\
  \ D[\"誤殺 → 逃往逃城\"]\n  D --> E[\"會眾審判\"]\n  E --> F[\"庇護至大祭司死\"]\n  F --> G[\"大祭司死後歸本業\"\
  ]\n  G --> H[\"若逾境 → 報血者殺之無罪\"]\n```\n\n> [!important] **樞紐機制：大祭司之死**\n> [[逃城保護期限|逃城保護期限]]\
  \ 以 **受膏大祭司之死** 為終點（v25,28）。這不僅是時間標記，更預表 [[大祭司死預表基督|基督大祭司的死]] 為信徒帶來最終釋放——[[逃城預表基督|逃城預表基督]]，祂是我們永久的避難所（來\
  \ 6:18-20）。\n\n### 審判原則與地土潔淨（v29-34）\n1. **兩個見證人原則**：定死刑案需憑兩三見證，不可憑單一口供（v30），防止冤殺。\n\
  2. **不可贖故殺人命**：謀殺罪不可用贖價代替（v31），亦不可為逃城中人收贖價縮短保護期（v32）——生命不可買賣。\n3. **血污染地土**：流人血污穢之地，非流殺人者血無法潔淨（v33），因耶和華住在以色列中間（v34）。這奠定「地」與「約」的神學連結：公義審判維繫神的同在。\n\
  \n### 跨章脈絡：逃城制度的救贖預表\n- **歷史實踐**：約書亞記 20 章落實六座逃城（[[基低斯|基低斯]]、[[希伯崙|希伯崙]]、[[拉末基列|拉末基列]]、[[哥蘭|哥蘭]]\
  \ 等），對應本章地理分佈。\n- **神學深化**：逃城制度揭示「公義與憐憫並存」——神不輕縱有罪（民 35:33），卻為軟弱者開生路。新約將此指向基督：祂是更美的逃城（來\
  \ 6:18）、更大的大祭司（來 7:26-27），其死一次成就永遠贖罪，信徒在祂裡得享永不撤銷的庇護。"
