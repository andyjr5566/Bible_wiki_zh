book: "民數記"
chapter: 35
candidates:
  - name: "利未人四十八城"
    type: "事件"
    evidence: "民35:1-8 耶和華在摩押平原、耶利哥對面的約但河邊曉諭摩西：吩咐以色列人從所得的產業中把城邑給利未人居住，也要把城邑四圍的郊野給利未人。共四十八座城，連同郊野都給利未人。丁良才：利未人無產業，分散在以色列中教導律法，預表基督徒分散在世上作鹽光（太5:13-16）。"
    surfaces:
      - "利未人四十八城"
      - "利未人城邑"
      - "四十八城"
      - "利未人郊野"
  - name: "逃城"
    type: "事件"
    evidence: "民35:9-15 耶和華曉諭摩西：你們過約但河進迦南地，要選定逃城，給誤殺人的逃往那裡，免得報血的追上殺他。共六座逃城，三座在約但河東，三座在迦南地。丁良才：逃城預表基督是罪人的避難所（來6:18）。"
    surfaces:
      - "逃城"
      - "六座逃城"
      - "誤殺人逃城"
      - "約但河東三座逃城"
      - "迦南地三座逃城"
  - name: "誤殺與故殺界線"
    type: "神學"
    evidence: "民35:16-24 詳細列舉故殺與誤殺的界線：用鐵器、石頭、木器打死、推人、丟石頭、仇恨打死、敵意推人、丟東西打死均為故殺；若無仇恨、無敵意、無謀算、無看見、無敵意推人、丟石頭打死均為誤殺。丁良才：神看重心意，誤殺可逃往逃城，故殺必被治死。"
    surfaces:
      - "誤殺"
      - "故殺"
      - "誤殺與故殺界線"
      - "仇恨殺人"
      - "無心殺人"
  - name: "報血者"
    type: "人物"
    evidence: "民35:19,21,24,27 報血者（go'el hadam）有權殺故殺人者，若誤殺者逃到逃城，報血者不可殺他。丁良才：報血者預表基督為信徒伸冤（羅12:19）、也預表撒但作控告者（啟12:10）。"
    surfaces:
      - "報血者"
      - "go'el hadam"
      - "伸冤者"
  - name: "逃城保護期限"
    type: "神學"
    evidence: "民35:25,28,32 誤殺者必住在逃城直到大祭司死，大祭司死後才可回本地。若大祭司死前出逃城，報血者殺他不負血罪。丁良才：大祭司死預表基督死釋放被擄者（來9:15-17）。"
    surfaces:
      - "逃城保護期限"
      - "大祭司死"
      - "誤殺者釋放"
      - "大祭司死預表基督"
  - name: "兩個見證人原則"
    type: "神學"
    evidence: "民35:30 殺人者必憑兩個見證人或以上才可被治死，一個見證人不可定死罪。丁良才：神的公義要求確實見證（申17:6、太18:16、提前5:19）。"
    surfaces:
      - "兩個見證人"
      - "見證人原則"
      - "不可單憑一個見證人"
  - name: "不可贖故殺人命"
    type: "神學"
    evidence: "民35:31 故殺人命不可收贖價，必被治死。丁良才：人命貴重，神的公義不可用金銀贖回（詩49:7-8、彼前1:18-19）。"
    surfaces:
      - "不可贖故殺人命"
      - "人命不可贖"
      - "神的公義"
  - name: "污染地土"
    type: "神學"
    evidence: "民35:33-34 流人血污染地土，除非流血者的血澆在地上，地才不被污染。耶和華住在以色列中，地不可被污染。
丁良才：地土被血污染預表罪污染世界，基督血洗淨世界（來9:22、啟22:1）。"
    surfaces:
      - "污染地土"
      - "流人血污染地"
      - "基督血洗淨"
  - name: "哥蘭"
    type: "地點"
    evidence: "民35:14 約但河東、瑪拿西地巴珊的哥蘭，為逃城之一。丁良才：哥蘭意為「喜樂」，逃城預表在基督裡得喜樂（約15:11）。"
    surfaces:
      - "哥蘭"
      - "巴珊哥蘭"
      - "逃城哥蘭"
  - name: "拉末基列"
    type: "地點"
    evidence: "民35:14 約但河東、迦得地的拉末基列，為逃城之一。丁良才：拉末基列意為「高處」，逃城預表基督是我們的高台（詩61:2-3）。"
    surfaces:
      - "拉末基列"
      - "基列拉末"
      - "逃城拉末基列"
  - name: "基低斯"
    type: "地點"
    evidence: "民35:14 約但河西、拿弗他利山地的基低斯，為逃城之一。丁良才：基低斯意為「聖別」，逃城預表基督使我們成聖（來10:10）。"
    surfaces:
      - "基低斯"
      - "拿弗他利山地基低斯"
      - "加利利基低斯"
  - name: "示劍"
    type: "地點"
    evidence: "民35:14 約但河西、以法蓮山地的示劍，為逃城之一。丁良才：示劍意為「肩」，基督擔當我們的重擔（賽9:6、太11:28-30）。"
    surfaces:
      - "示劍"
      - "以法蓮山地示劍"
      - "基利心山"
  - name: "希伯崙"
    type: "地點"
    evidence: "民35:14 約但河西、猶大山地的希伯崙，為逃城之一。
丁良才：希伯崙意為「聯盟」，基督使我們與神聯盟（來8:6、林後5:18-19）。"
    surfaces:
      - "希伯崙"
      - "猶大山地希伯崙"
      - "基利亞巴"
  - name: "逃城預表基督"
    type: "神學"
    evidence: "民35:9-34 六座逃城預表基督：(1) 基督是罪人的避難所（來6:18）；(2) 基督死釋放被擄者（來9:15）；(3) 基督使我們成聖（來10:10）；(4) 基督擔當我們重擔（太11:28-30）；(5) 基督使我們與神和好（林後5:18-19）；(6) 基督是我們的高台（詩61:2-3）。丁良才：逃城六座，六為人數，基督成全人的不完全。"
    surfaces:
      - "逃城預表基督"
      - "基督是避難所"
      - "基督死釋放被擄者"
      - "基督使我們成聖"
      - "基督擔當重擔"
      - "基督使我們與神和好"
      - "基督是高台"
