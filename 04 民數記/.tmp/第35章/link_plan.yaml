- name: 利未人四十八城
  suggested_type: 事件
  evidence: 民35:1-8 耶和華在摩押平原、耶利哥對面的約但河邊曉諭摩西：吩咐以色列人從所得的產業中把城邑給利未人居住，也要把城邑四圍的郊野給利未人。共四十八座城，連同郊野都給利未人。丁良才：利未人無產業，分散在以色列中教導律法，預表基督徒分散在世上作鹽光（太5:13-16）。
  surfaces:
  - phrase: 利未人四十八城
  - phrase: 利未人城邑
  - phrase: 四十八城
  - phrase: 利未人郊野
  target_path: link_folder/事件/利未人四十八城.md
- name: 誤殺與故殺界線
  suggested_type: 神學
  evidence: 民35:16-24 詳細列舉故殺與誤殺的界線：用鐵器、石頭、木器打死、推人、丟石頭、仇恨打死、敵意推人、丟東西打死均為故殺；若無仇恨、無敵意、無謀算、無看見、無敵意推人、丟石頭打死均為誤殺。丁良才：神看重心意，誤殺可逃往逃城，故殺必被治死。
  surfaces:
  - phrase: 誤殺
  - phrase: 故殺
  - phrase: 誤殺與故殺界線
  - phrase: 仇恨殺人
  - phrase: 無心殺人
  target_path: link_folder/神學/誤殺與故殺界線.md
- name: 報血者
  suggested_type: 人物
  evidence: 民35:19,21,24,27 報血者（go'el hadam）有權殺故殺人者，若誤殺者逃到逃城，報血者不可殺他。丁良才：報血者預表基督為信徒伸冤（羅12:19）、也預表撒但作控告者（啟12:10）。
  surfaces:
  - phrase: 報血者
  - phrase: go'el hadam
  - phrase: 伸冤者
  target_path: link_folder/人物/報血者.md
- name: 逃城保護期限
  suggested_type: 神學
  evidence: 民35:25,28,32 誤殺者必住在逃城直到大祭司死，大祭司死後才可回本地。若大祭司死前出逃城，報血者殺他不負血罪。丁良才：大祭司死預表基督死釋放被擄者（來9:15-17）。
  surfaces:
  - phrase: 逃城保護期限
  - phrase: 大祭司死
  - phrase: 誤殺者釋放
  - phrase: 大祭司死預表基督
  target_path: link_folder/神學/逃城保護期限.md
- name: 兩個見證人原則
  suggested_type: 神學
  evidence: 民35:30 殺人者必憑兩個見證人或以上才可被治死，一個見證人不可定死罪。丁良才：神的公義要求確實見證（申17:6、太18:16、提前5:19）。
  surfaces:
  - phrase: 兩個見證人
  - phrase: 見證人原則
  - phrase: 不可單憑一個見證人
  target_path: link_folder/神學/兩個見證人原則.md
- name: 不可贖故殺人命
  suggested_type: 神學
  evidence: 民35:31 故殺人命不可收贖價，必被治死。丁良才：人命貴重，神的公義不可用金銀贖回（詩49:7-8、彼前1:18-19）。
  surfaces:
  - phrase: 不可贖故殺人命
  - phrase: 人命不可贖
  - phrase: 神的公義
  target_path: link_folder/神學/不可贖故殺人命.md
