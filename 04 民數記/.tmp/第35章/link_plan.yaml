  evidence: 民35:33-34 流人血污染地土，除非流血者的血澆在地上，地才不被污染。耶和華住在以色列中，地不可被污染。 丁良才：地土被血污染預表罪污染世界，基督血洗淨世界（來9:22、啟22:1）。
