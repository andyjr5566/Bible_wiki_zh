status: formal
definition: 民數記 35:30 規定故殺人須憑幾個見證人的口才能處死，不可憑一個見證定罪，確保審判公正。
development: 此原則貫穿舊約法律，強調見證的多重性。
accumulations:
- book: 民數記
  chapter: 35
  summary: 訂定死刑案件需多見證人之法律原則。
  relation: 為故殺審判程序的基石，與不可贖故殺人命相輔相成。
