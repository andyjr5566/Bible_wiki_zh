name: 逃城六座
type: 事件
secondary_types: []
aliases:
- 六座逃城
- 避難城六座
status: formal
definition: 民數記 35:6-7, 13-15 規定利未人四十八城中劃出六座作逃城：約但河東三座（比珥、拉末、哥蘭），迦南地西三座（基低斯、示劍、希伯崙）。這六座城為誤殺人者提供庇護，使其免於報血者追殺，須住在城內直等到大祭司死後才可歸回產業（35:25,
  28）。
development: 約書亞記 20 章具體落實六座逃城的指定；士師記與列王記記載逃城制度的執行情況；第二聖殿時期猹拉比傳統（馬所拉學者、米示拿《馬吉特篇》）詳細規範逃城道路標示、城門不關、審判程序等細節。
accumulations:
- book: 民數記
  chapter: 35
  summary: 第 6-7, 13-15 節命定六座逃城數目與分布（約但河東西各三），第 11-12, 22-28 節規定誤殺人逃城保護條例與大祭司死後釋放機制。
  relation: 本章確立逃城六座的法律地位、地理分布、保護對象（誤殺人者）、保護期限（大祭司在世期間）及釋放條件，為後續歷史書落實提供法源。
