definition: 民數記 35:19,21,27 稱「報血仇的」為被害者的近親，有權在故殺者被定罪後親自執行死刑，亦可在逃城境外殺誤殺者而不負流血之罪。
development: 其角色體現舊約公義與贖罪機制的結合。
accumulations:
