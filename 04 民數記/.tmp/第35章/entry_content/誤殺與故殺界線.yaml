status: formal
definition: 民數記 35:16-24 區分故殺（使用鐵器、石頭、木器、懷恨推倒、埋伏、仇恨打擊）與誤殺（無仇恨、無預謀、無意擊中），作為審判與逃城保護的依據。
development: 此界線決定報血者是否可殺、誤殺者是否可得逃城庇護。
accumulations:
- book: 民數記
  chapter: 35
  summary: 列舉故殺與誤殺的具體情形，提供會眾審判標準。
  relation: 為逃城制度與報血者權限的神學基礎。
