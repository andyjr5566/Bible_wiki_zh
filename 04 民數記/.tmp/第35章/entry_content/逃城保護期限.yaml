name: 逃城保護期限
type: 神學
secondary_types: []
aliases:
- 逃城保護期限
status: formal
definition: 民數記 35:25-28 規定誤殺者須住在逃城，直等到受聖膏的大祭司死了，才可返回產業；若在大祭司死前離開逃城，報血者殺之不負罪。
development: 大祭司之死象徵贖罪完成，結束庇護期。
accumulations:
- book: 民數記
  chapter: 35
  summary: 闡述誤殺者在逃城的居住期限與大祭司死亡的關鍵角色。
  relation: 與大祭司死預表基督、逃城預表基督有神學連結。
