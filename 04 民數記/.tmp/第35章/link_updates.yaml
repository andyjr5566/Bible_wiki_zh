"updates":
- "title": "希伯崙"
  "path": "link_folder/地點/希伯崙.md"
  "summary": "本章重點：希伯崙為逃城之一（民35:14），位於猶大山地。原名基列亞巴，為亞伯拉罕家族祖墳地（創23:19）、大衛受膏為王之地（撒下5:3）。丁良才：希伯崙意為「聯盟」，基督使我們與神聯盟（來8:6、林後5:18-19）。"
  "relation": "本章將希伯崙列為逃城之一（民35:14），見證基督使我們與神聯盟（來8:6、林後5:18-19）。連結創13:18亞伯拉罕在希伯崙築壇、創23:19撒拉葬於希伯崙、撒下5:3大衛在希伯崙受膏。  連結創13:18亞伯拉罕在希伯崙築壇。
  連結創23:19撒拉葬於希伯崙。
  連結撒下5:3大衛在希伯崙受膏。
  連結來8:6基督作更美之約的中保。
  連結林後5:18-19基督使我們與神和好。"
