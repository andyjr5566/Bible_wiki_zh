  suggested_type: 事件
  evidence: v9-12，若身邊有人猝死沾染頭，第7日剃頭，第8日獻兩隻鳥（贖罪祭與燔祭），並牽一歲公羊羔作贖愆祭，先前的日子歸徒然（void days）。CT：即便被動沾染亦屬失落，須認罪並重新開始。KC：unforeseen
    defilement requires sacrifice and restarting; previous days are void.
  surfaces:
  - phrase: 先前的日子要歸徒然
  target_path: link_folder/事件/意外沾染死屍與重新潔淨條例.md
- name: 拿細耳人滿期還俗條例
  suggested_type: 事件
  evidence: v13-21，滿了離俗日子到會幕門口獻公羊羔作燔祭、母羊羔作贖罪祭、公綿羊作平安祭，並一筐無酵餅、素祭與奠祭；在會幕門口剃頭將頭髮放在平安祭火上燒，祭司搖一搖已煮的前腿與無酵餅（搖祭），之後方可喝酒。CT：將羞辱的長髮在平安祭火上燒，在恩典中恢復榮美；喝酒表表徵享受神國度的喜樂（太26:29）。KC：the
    hair burned on the peace offering fire shows the immense value God places on voluntary
    dedication.
  target_path: link_folder/事件/拿細耳人滿期還俗條例.md
