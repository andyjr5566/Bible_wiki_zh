  suggested_type: 主題
  evidence: v5「不可用剃頭刀剃頭，要由髮綹長長了…離俗歸神的憑據是在他頭上」（v7）。CT：甘心為主忍受羞辱（林前11:14），順服神的權柄與頭。KC：long
    hair represents giving up earthly authority to take the place of total submission
    to God; hair as the secret of strength (Samson).
  surfaces:
