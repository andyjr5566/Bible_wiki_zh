  suggested_type: 主題
  evidence: v6-7「不可挨近死屍。他的父母或是弟兄姊妹死了的時候，他不可因他們使自己不潔淨」。CT：神最厭惡死亡（罪的結果），拿細耳人的要求比祭司更嚴格（利21:1-3），斷絕肉體感情，讓神居首位。KC：death
