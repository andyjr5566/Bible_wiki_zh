book: 民數記
chapter: 6
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 本章第1與22節記載耶和華曉諭摩西，傳達拿細耳人的願與亞倫的大祭司祝福定例。
  relation: 摩西作為律法與神聖啟示的中保，將關乎平民自願成聖與大祭司祝福百姓的定例傳達給以色列人。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 本章第23與27節記載耶和華指示摩西告訴亞倫及其子孫大祭司階層，要奉神的名為以色列人祝禱宣告「願耶和華賜福給你，保護你…」（v23-27）。
  relation: 確立亞倫及其子孫大祭司職分中，為屬神子民帶下三一神賜福保護、光照賜恩與仰臉賜平安的神聖祝禱職責。
- title: 燔祭（olah）
  path: link_folder/原文/燔祭（olah）.md
  summary: 本章第11與14節規定拿細耳人在沾染潔淨後與還俗期滿時，均須獻上一隻一歲公羊羔（或鳥隻）作燔祭，完全燒在壇上獻給神。
  relation: 與利未記第1章燔祭定例呼應，表徵拿細耳人將全人完全奉獻、馨香歸神的屬靈實意。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: 本章第11與14節規定拿細耳人沾染死屍潔淨與還俗期滿時，均須獻母羊羔或鳥隻作贖罪祭，以滿足神聖潔的要求並遮蓋罪咎。
  relation: 承接利未記第4章贖罪祭體系，強調自願獻身者即便還俗或無意沾染，仍須藉血祭贖罪、維持聖潔。
- title: 贖愆祭（asham）
  path: link_folder/原文/贖愆祭（asham）.md
  summary: 本章第12節規定拿細耳人因意外沾染死屍以致離俗頭蒙不潔時，須牽一隻一歲公羊羔作贖愆祭，處理玷污行為之過犯。
  relation: 與利未記5-6章及民數記5:8贖愆祭定例對照，處理自願離俗者因意外疏忽得罪神與沾染不潔之贖罪手續。
- title: 平安祭（shelamim）
  path: link_folder/原文/平安祭（shelamim）.md
  summary: 本章第14與17-18節規定拿細耳人還俗期滿時須獻公綿羊作平安祭，並將離俗頭上的長髮放在平安祭下的火上焚燒。
  relation: 深化利未記第3章平安祭定例，將拿細耳人順服奉獻的長髮融入平安祭火中，展現神人共賞的屬天和好的喜樂。
- title: 素祭（minchah）
  path: link_folder/原文/素祭（minchah）.md
  summary: 本章第15與17節規定還俗獻平安祭時同獻一筐無酵調油細麵餅與無酵薄餅，以及隨附的素祭。
  relation: 呼應利未記第2章素祭定例，以無酵與調油表徵基督完全聖潔無瑕疵的人性生命。
- title: 搖祭（tenufah）
  path: link_folder/原文/搖祭（tenufah）.md
  summary: 本章第20節規定祭司要取平安祭已煮的公羊前腿與無酵餅/薄餅，在耶和華面前搖一搖作為搖祭，後歸給祭司為聖物。
  relation: 與出埃及記29章及利未記7章搖祭定例對照，展現拿細耳人還俗時搖祭物件在祭司享用與神面前呈獻的神學意涵。
- title: 舉祭（terumah）
  path: link_folder/原文/舉祭（terumah）.md
  summary: 本章第20節提到還俗搖祭與「所搖的胸、所舉的腿同為聖物，歸給祭司」。
  relation: 承接利未記7:32與民數記5:9舉祭定例，劃清聖物中歸祭司享用之右腿與胸的神聖權益。
