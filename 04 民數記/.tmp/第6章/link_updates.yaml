  - title: "歸神"
    path: "link_folder/神學/歸神.md"
    summary: "民6:2,5,6,7,8,12,13,21 要離俗歸耶和華...直到離俗歸耶和華的日子滿了...離俗歸神的憑據...滿了離俗的日子。歸耶和華表完全獻給神。"
    relation: "民數記第6章：拿細耳人離俗歸耶和華，預表信徒完全歸主。"
  - title: "聖潔"
    path: "link_folder/神學/聖潔.md"
    summary: "民6:5,8 他要聖潔，直到離俗歸耶和華的日子滿了...他在離俗歸耶和華的一切日子是聖潔的。CT：聖潔表分別為聖歸神。KC：拿細耳人全期聖潔。BH：利未記11:44你們要聖潔因我聖潔。"
    relation: "民數記第6章：拿細耳人在離俗期間全期聖潔，預表信徒分別為聖歸神。"
  - title: "贖罪"
    path: "link_folder/神學/贖罪.md"
    summary: "民6:11,16 祭司要獻一隻為贖罪祭...祭司要獻他的贖罪祭和燔祭。CT：贖罪祭為無意之罪。KC：贖罪祭母羊羔。BH：利未記4-5章贖罪祭條例。"
    relation: "民數記第6章：拿細耳人被玷污或滿期須獻贖罪祭，預表基督贖罪。"
