name: 拿細耳人滿期還俗條例
type: 事件
secondary_types: []
aliases: []
status: formal
definition: 當拿細耳人滿了離俗的日子時，須依循嚴肅的還俗禮儀（v13-21）：(1)
  領他到會幕門口奉獻極其豐富的供物：一歲公羊羔作燔祭、一歲母羊羔作贖罪祭、公綿羊作平安祭，以及一筐無酵調油細麵餅與無酵薄餅，並同獻素祭與奠祭（v13-15）；(2)
  祭司在神面前獻贖罪祭、燔祭、平安祭與素祭奠祭（v16-17）；(3)
  拿細耳人在會幕門口剃離俗的頭，把頭髮放在平安祭下的火上焚燒（v18）；(4)
  祭司取已煮的公羊前腿與無酵餅/薄餅放在拿細耳人手上作為搖祭（tenufah），搖一搖後歸給祭司為聖物（v19-20）；(5)
  完成還俗儀式後，拿細耳人方可喝酒（v20）。將頭髮放在平安祭火上燒，象徵將過往離俗順服的年日作為馨香供物獻給神，蒙神極大珍視（CT、KC）；還俗後喝酒則象徵進入神國度的極大喜樂與更新享受（太26:29；CT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第13-21節詳細規範拿細耳人許願期滿還俗時所須獻上的五大祭物、會幕門口剃頭燒髮於平安祭火上及搖祭還俗程序。
  relation: 完備摩西律法中拿細耳人許願結束時的神聖告終禮儀與神人共享之平安喜樂。
