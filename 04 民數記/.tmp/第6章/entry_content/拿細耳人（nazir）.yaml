name: 拿細耳人（nazir）
type: 原文
secondary_types: []
aliases:
- 拿細耳
- 拿細耳人的願
status: formal
definition: 「拿細耳人」源自希伯來文 nazir，原意為「分別為聖」、「冠冕」或「離俗者」，指專一許願離俗歸給耶和華的人（v2；CT、GT）。在舊約律法體系中，神揀選利未人專責會幕事奉，但拿細耳人的特別之處在於：無論男女、任何以色列平民均可自願許願離俗歸主（v2；KC、BH）。拿細耳人的誓願可分為定期許願（多數人）與終身獻身（如參孫、撒母耳、施洗約翰；士13:5, 撒上1:11, 路1:15），其核心在於「離俗歸耶和華」（v2, 8），活出深度的分別為聖生活（CT、GT）。主耶穌基督乃是地上真正完美的拿細耳人原型，祂完全離俗、專一為父神而活（KC）。在靈意上，所有新約基督徒皆蒙召作屬靈的拿細耳人，在世俗中過與罪分別、完全歸神的生活（CT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第1-21節詳細規範拿細耳人離俗歸耶和華的許願、三大禁令、沾染潔淨與還俗獻祭定例。
  relation: 為舊約律法中平民自願全心奉獻、過高度聖潔分別生活確立制度化規範與屬靈原型。
