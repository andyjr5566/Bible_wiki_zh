name: 濃酒（shekar）
type: 原文
secondary_types: []
aliases:
- 濃酒
- 烈酒
status: formal
definition: 希伯來文 shekar（שֵׁכָר），指發酵濃度高、致醉性強的飲品，區別於「清酒」（yayin）。民數記 6:3 規定拿細耳人「要遠離清酒濃酒」，並禁止飲用由清酒、濃酒釀製的醋，顯示離俗期間須徹底斷絕一切葡萄衍生醱酵飲品。
development: 本章將濃酒與清酒並列，作為拿細耳人禁飲的兩大類酒精飲品；後世猶太律法傳統（如《拿細耳人篇》）進一步界定其釀造原料與酒精濃度門檻。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 3 節列入拿細耳人禁飲清單，強調離俗期間不可沾染。
  relation: 直接經文依據，界定離俗飲食禁忌的範圍。
