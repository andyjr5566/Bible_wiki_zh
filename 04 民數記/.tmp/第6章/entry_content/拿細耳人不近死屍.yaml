name: 拿細耳人不近死屍
type: 主題
secondary_types: []
aliases:
- 拿細耳人避免死屍
status: formal
definition: 民數記6:6-8規定拿細耳人在一切離俗的日子不可挨近死屍，即使父母、弟兄、姊妹死了，也不可因他們使自己不潔淨，「因為那離俗歸神的憑據是在他頭上」。
development: 此條例顯示拿細耳人歸神的聖潔優先於親情義務，其頭上的長髮即為「離俗歸神的憑據」。
accumulations:
- book: 民數記
  chapter: 6
  summary: 拿細耳人不可挨近死屍，連親屬過世也不可使自己不潔淨
  relation: 拿細耳人離俗歸主的純潔要求，優先於親情義務
