name: 鮮葡萄（anavim）
type: 原文
secondary_types: []
aliases:
- 鮮葡萄
- 葡萄
status: formal
definition: 希伯來文 anavim（עֲנָבִים），指新採摘、含水分豐富的葡萄果實。民數記 6:3 規定拿細耳人「不可吃鮮葡萄」，作為離俗飲食禁忌的一環，與乾葡萄並列。
development: 經文將鮮葡萄與乾葡萄分開列舉，顯示律法涵蓋葡萄果實的所有保存狀態；猶太傳統進一步規定連葡萄皮、核、未成熟葡萄（boser）亦在禁內。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 3 節明文禁止食用。
  relation: 構成拿細耳人「葡萄樹上結的，自核至皮所做的物，都不可吃」（第 4 節）的具體例項。
