name: 剃頭刀不可過頭（拿細耳人長髮）
type: 主題
secondary_types: []
aliases:
- 不可用剃頭刀剃頭
- 離俗的頭
status: formal
definition: 拿細耳人三大禁令之二為「不可用剃頭刀剃頭，要由髮綹長長了…那離俗歸神的憑據是在他頭上」（v5, 7）。在古希伯來文化與新約啟示中，男人留長髮在人看來是羞辱（林前11:14），但拿細耳人為了主甘心以辱為榮、不求人前的體面尊嚴，長髮成為順服神權柄與頭的神聖記號（CT、KC）。髮綹象徵能力與完全順服的奉獻，如參孫的力量即源於其作為拿細耳人未經剃刀的長髮（士16:17；KC、BH）。這與世俗文化中追求人前權勢相反，說明事奉神真正的能力來自於甘心站在順服與倚靠神的卑微地位上（CT、KC）。當還俗日子滿足時，長髮需剃下放在平安祭下的火上焚燒獻給神（v18）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第5與7節規定拿細耳人在離俗期間不可剃頭，長髮為其離俗歸神的頭上憑據與順服記號。
  relation: 展現舊約儀文律法中以髮型記號表徵神聖順服、捨棄自尊與大能源頭之屬靈意涵。
