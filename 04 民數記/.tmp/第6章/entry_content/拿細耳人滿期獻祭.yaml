- 拿細耳人結束儀式
status: formal
definition: 民數記6:13-20規定拿細耳人滿了離俗日子，須被領到會幕門口，獻上一歲公羊羔作燔祭、一歲母羊羔作贖罪祭、一隻公綿羊作平安祭，並一筐無酵調油細麵餅、抹油無酵薄餅及同獻的素祭奠祭。祭司獻祭後，拿細耳人在會幕門口剃離俗的頭，將髮放在平安祭下的火上；祭司取煮熟的公羊前腿、無酵餅、薄餅放在他手上作搖祭，之後拿細耳人才可以喝酒。
development: 此儀式標誌拿細耳人奉獻期程正式結束，透過獻祭、剃頭、搖祭等行動，將分別為聖的生命歸還神並恢復常態生活。
