name: 髮綹（pera）
type: 原文
secondary_types: []
aliases:
- 髮綹
- 蓬亂長髮
- 未剪之髮
status: formal
definition: 希伯來文 pera（פֶּרַע），指任由自然生長、未經修剪、呈蓬亂狀態的長髮。民數記 6:5 規定拿細耳人「不可用剃頭刀剃頭，要由髮綹長長了」，作為離俗身分的外在標記，直到離俗期滿。
development: 第 18-19 節離俗期滿時，拿細耳人須在會幕門口剃離俗的頭，將髮放在平安祭火上，象徵離俗期結束與獻上自我；參孫（士 13-16）與撒母耳（撒上
  1:11）為終身拿細耳人，髮綹為終身記號。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 5 節立下留髮條例；第 18-19 節規定期滿剃髮儀式。
  relation: 髮綹是拿細耳人「離俗歸耶和華為聖」（第 8 節）的可見見證，與禁酒、不近死屍並列為三大離俗標記。
