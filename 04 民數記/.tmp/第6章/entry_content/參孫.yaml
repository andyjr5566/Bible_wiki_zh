name: 參孫
type: 人物
secondary_types: []
aliases:
- 參孫拿細耳人
status: formal
definition: 舊約士師記13-16章記載的終身拿細耳人，自母腹中被分別為聖歸神（士13:5,7），其分別為聖的條例依循民數記第6章拿細耳人條例。參孫生平體現拿細耳人條例的應用與掙扎（曾觸死屍、飲酒、被剃髮），最終在死裡得勝，列於信心英雄榜（來11:32）。
development: 參孫為聖經中最著名的終身拿細耳人實例，其生平反映拿細耳人條例在救恩史上的具體實踐與人性軟弱。
accumulations:
