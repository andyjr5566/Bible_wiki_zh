name: 按他的力量
type: 主題
secondary_types: []
aliases:
- 照能力獻祭
- 量力而行
status: formal
definition: 雖民數記6章未直接出現此語，但第21節「他以外所能得的」隱含此意：拿細耳人除規定供物外，可按神所賜能力、財力甘心再獻。此原則見於申16:17「各人要按耶和華你神所賜給你的福分力量獻禮物」。
development: 聖經奉獻神學的核心：神不強求超過能力的獻祭（林後8:12），悅納按能力、甘心樂意的供物，體現恩典與回應的關係。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第21節「他以外所能得的」隱含按能力獻祭的原則。
  relation: 本章許願條例的彈性空間，連結舊約奉獻神學的普遍原則。
