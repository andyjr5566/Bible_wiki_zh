name: 光照
type: 神學
secondary_types: []
aliases:
- 光照
- 使臉發光
status: formal
definition: 來自民數記 6:25 亞倫祝福的第二句：「願耶和華使他的臉光照你。」希伯來文「臉」（panim）配合「光照」（or），意指神轉向子民、顯出恩寵的面容，象徵神同在的喜悅、啟示與引導。相對於「掩面」（隱藏同在），光照代表神主動以恩典臨在。
development: 此意象貫穿詩篇（如詩 4:6；31:16；67:1；80:3,7,19），並預表基督作為「神榮耀的光輝」（來 1:3）與「世界的光」（約
  8:12）。在祭司祝福中，光照緊隨保護之後，表明神不僅守護，更以恩典面容向子民傾心。
accumulations:
- book: 民數記
  chapter: 6
  summary: 亞倫祝福第二句宣告神使臉光照、賜恩給以色列人
  relation: 祭司祝福三重結構的第二層，將神的保護推進為恩寵的顯現
