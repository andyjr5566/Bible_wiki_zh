name: 搖祭的胸
type: 主題
secondary_types: []
aliases:
- 搖祭胸
- 祭司分得的胸
status: formal
definition: 指平安祭中祭司搖一搖作為搖祭的胸脯肉，屬於祭司的聖物（民6:20；參利7:30-34）。在拿細耳人滿期獻祭中，祭司取公羊前腿、無酵餅與薄餅作搖祭，搖祭的胸與舉祭的腿同歸祭司。
development: 搖祭動作象徵將供物呈獻給耶和華再歸給祭司，代表神與人共享平安祭的團契。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第20節提到搖祭的胸與舉祭的腿同為聖物，歸給祭司。
  relation: 本章拿細耳人滿期平安祭的一部分，顯示祭司分受聖物的規例。
