status: formal
definition: 民數記6:9-12規定拿細耳人若因旁邊忽然有人死而被玷污，須在第七日剃頭，第八日帶兩隻斑鳩或雛鴿到會幕門口，祭司獻一隻作贖罪祭、一隻作燔祭，為他贖罪並使頭成為聖潔；他要另選離俗日子，牽一歲公羊羔作贖愆祭，「先前的日子要歸徒然，因為他在離俗之間被玷污了」。
development: 此條例提供意外被玷污後的潔淨程序，強調離俗狀態的嚴肅性與重新奉獻的必要。
