- 歸主條例
status: formal
definition: 民數記第6章1-21節記載耶和華吩咐摩西傳給以色列人，關於男女許「特別的願」作拿細耳人、離俗歸耶和華的完整條例。內容涵蓋禁酒、留長髮、不近死屍、被玷污贖罪、滿期獻祭等各項規範，並強調「他怎樣許願就當照離俗的條例行」（6:21）。
development: 本章為舊約律法中關於自願奉獻分別為聖最詳細的單一條例，後為撒母耳、參孫、施洗約翰等終身拿細耳人的規範依據。
