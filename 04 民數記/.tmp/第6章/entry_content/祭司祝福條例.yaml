definition: 民數記6:22-27記載耶和華吩咐摩西告訴亞倫和他兒子：「你們要這樣為以色列人祝福」，並賜下三句祝福詞（三重祝福）。條例結尾強調：「他們要如此奉我的名為以色列人祝福；我也要賜福給他們」。
development: 此條例確立祭司代表神向百姓宣告祝福的制度，成為以色列敬拜與基督教禮儀的核心祝福依據。
