name: 平安（shalom）
type: 原文
secondary_types: []
aliases:
- 賜你平安
status: formal
definition: 「平安」源自希伯來文 shalom，其內涵極其豐富，遠超過單純「無戰爭或無衝突」的消極狀態，而是指身心靈全人的健全、和諧、興旺、完整、正義與美好福祉（v26；GT、BH）。在民數記6:26的亞倫祝福文中，「願耶和華向你仰臉，賜你平安」，標誌著大祭司祝禱的終極高潮——當聖靈將神的名與面光施於信徒時，信徒便得享與神、與人、與內心徹底和好的深沉平安（CT、KC）。這種平安是超越客觀環境動盪的神聖禮物，在基督裡完全實現（弗2:14「因祂是我們的平安」），使屬神的子民在曠野天路上始終擁有無可比擬的安息與穩固（CT、GT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第26節宣告大祭司祝福的終極應許「願耶和華向你仰臉，賜你平安」，奠定全人健全與神人和平的神學定義。
  relation: 為舊約希伯來文 shalom 提供最經典之大祭司祝禱語境，連結平安祭與新約基督賜平安的神學架構。
