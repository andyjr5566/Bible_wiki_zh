name: 耶和華賜福給你
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 民數記 6:24 「願耶和華賜福給你，保護你。」三重祝福的第一句。「賜福」涵蓋物質、屬靈、關係等全方位的恩典；「保護」原文 shamar 含「看守、防衛、保全」之意，指神主動以大能環繞保守受祝福者。
development: 此句奠定整個祝福的基調：神是福的源頭與守護者。猶太傳統視此為物質供應與屬靈保守的雙重應許；基督教神學常將其與「在基督裡天上各樣屬靈的福氣」（弗
  1:3）連結。
accumulations:
