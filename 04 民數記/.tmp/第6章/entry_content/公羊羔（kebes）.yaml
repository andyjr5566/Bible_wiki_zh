  chapter: 6
  summary: 第十二、十四節規定公羊羔作為贖愆祭與燔祭的獻祭動物。
  relation: 公羊羔是拿細耳人滿期獻祭及被玷污後贖罪的必要祭物，象徵完全奉獻與贖愆。
