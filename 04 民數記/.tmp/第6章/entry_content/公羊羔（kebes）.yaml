definition: 希伯來文「כֶּבֶשׂ」（kebes），指一歲的公羊羔。民數記 6:12,14 規定拿細耳人滿期或被玷污後重新許願，需牽一歲無殘疾的公羊羔作贖愆祭或燔祭。
development: ''
