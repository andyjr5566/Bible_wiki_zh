name: 剃頭
type: 主題
secondary_types: []
aliases:
- 剃頭
- 剃除頭髮
status: formal
definition: 指用刀剃去頭髮的行動。本章出現三種情境：(1) 拿細耳人旁邊忽然有人死，沾染離俗的頭，第七日剃頭（v.9）；(2) 離俗日子滿，在會幕門口剃離俗的頭（v.18）；(3)
  祭司取已煮的公羊前腿等物放在拿細耳人剃頭後的手上作搖祭（v.19）。剃頭標誌離俗期結束或被玷污後重新開始，頭髮放在平安祭火上（v.18）象徵將離俗期間的聖潔歸還神。
development: 利未記 14:8-9 潔淨禮也要求剃全身毛髮。新約保羅在堅革哩剃頭（徒 18:18）應為拿細耳人滿期儀式。剃頭在聖經儀式中代表舊狀結束、新狀開始的過渡標記。
accumulations:
