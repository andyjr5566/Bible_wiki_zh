status: formal
definition: 民數記6:5規定拿細耳人在一切許願離俗的日子「不可用剃頭刀剃頭，要由髮綹長長了」，直到離俗歸耶和華的日子滿了，這期間他要聖潔。
development: 長髮為拿細耳人離俗歸主的可見記號，代表奉獻的持續性與聖潔狀態；滿期時須在會幕門口剃頭並將髮焚於平安祭火上（6:18）。
