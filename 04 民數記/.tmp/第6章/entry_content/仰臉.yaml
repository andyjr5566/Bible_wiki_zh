- 擧臉
status: formal
definition: 來自民數記 6:26 亞倫祝福的第三句：「願耶和華向你仰臉。」希伯來文「仰臉」（nasa panim），字面「舉起臉龐」，指神轉向子民、注視他們、給予完全的接納與關注。相對於「掩面」或「轉面」，仰臉象徵神以滿意、喜悅的姿態臨在，賜下完全的和好與平安。
development: 在祭司祝福的三重結構中，仰臉作為最高潮：保護（基礎）→光照/恩待（恩典顯現）→仰臉/平安（完全和好）。此意象預表基督藉十字架成就的和好（羅
  5:1-2），使信徒得以「坦然無懼地來到施恩的寶座前」（來 4:16）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 亞倫祝福第三句宣告神向以色列人仰臉、賜平安
  relation: 祭司祝福的最高潮，將神的同在推進為完全的接納與平安
