name: 離俗歸耶和華
type: 主題
secondary_types: []
aliases:
- 離俗歸神
- 離俗
status: formal
definition: 「離俗歸耶和華」（v2, 5, 6, 8）是民數記第6章拿細耳人誓願的關鍵屬靈原則。其涵義為脫離世俗的風尚、習慣與天然肉體享樂，專一將全人分別為聖歸給神（CT、KC）。離俗並非消極地遠離人群或厭世，而是積極地以神為至寶與極大喜樂，甘願放棄地上合理合法的權利（如享用葡萄製品、維護人前體面髮飾與親情哀悼），專一順服神的權柄（CT、GT）。在舊約時代，拿細耳人的離俗表徵在律法原則下向神表達最深的愛與奉獻；在新約時代，使徒保羅勸勉信徒「不要效法這個世界」（羅12:2）、「遠離淫亂與世俗」（雅4:4），即為「離俗歸耶和華」精神的屬靈實踐（CT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第2、5、6、8節多次強調拿細耳人一切許願的日子必須「離俗歸耶和華」，不可給罪與世俗留任何地步。
  relation: 奠定舊約聖潔code中關於專一奉獻、絕對分別為聖之神學核心。
