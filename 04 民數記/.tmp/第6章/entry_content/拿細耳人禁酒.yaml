name: 拿細耳人禁酒
type: 主題
secondary_types: []
aliases:
- 拿細耳人戒酒
status: formal
definition: 民數記6:3-4規定拿細耳人在離俗期間必須徹底遠離葡萄樹一切產物：不可喝清酒、濃酒、清酒濃酒做的醋、葡萄汁，也不可吃鮮葡萄、乾葡萄，連葡萄樹上結的「自核至皮」所做的物都不可吃。
development: 此禁制為拿細耳人離俗歸主的首要外在記號，象徵生命完全分別為聖、不沾染世俗享樂。
accumulations:
- book: 民數記
  chapter: 6
  summary: 拿細耳人不可飲酒、喝醋、飲葡萄汁、吃葡萄及葡萄樹一切產物
  relation: 拿細耳人離俗歸主的首要禁制，象徵完全分別為聖
