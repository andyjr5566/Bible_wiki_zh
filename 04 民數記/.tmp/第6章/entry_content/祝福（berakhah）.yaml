name: 祝福（berakhah）
type: 神學
secondary_types: []
aliases:
- 祝福
- 祝福禱告
status: formal
definition: 希伯來文 berakhah（בְּרָכָה），指神將恩惠、保護、臨在賜予受祝福者的行動與狀態。民數記 6:23-27 記載耶和華吩咐亞倫和他兒子「要這樣為以色列人祝福」，並應許「他們要如此奉我的名為以色列人祝福；我也要賜福給他們」，確立祭司祝福為神賜福的管道。
development: 本章提供舊約最具代表性的三重祝福文本（第 24-26 節），後被會堂與教會禮儀廣泛採用；新約視其在基督裡成就（弗 1:3；來 7:1-2）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 22-27 節記載祭司祝福條例與三重祝福內容。
  relation: 為民數記 6 章的神學高潮，將拿細耳人個人離俗延伸至全會眾領受神恩的群體維度。
