definition: 民數記 6:23 「你們要這樣為以色列人祝福，說：」。此處「說」引出祭司祝福的具體內容（第 24-26 節三重祝福），標示祭司須原文宣讀神所賜的祝福詞，不得增減。
development: 在舊約祭司職分中，「說」強調宣告性說話——祭司不僅代禱，更以神的口吻向會眾宣告神的恩典旨意；新約視此為「宣講福音」的預表。
accumulations:
