name: 意外沾染死屍與重新潔淨條例
type: 事件
secondary_types: []
aliases:
- 先前的日子要歸徒然
status: formal
definition: 若拿細耳人在離俗期間，旁邊忽然有人意外猝死，以致無意中沾染了他離俗的頭（v9），律法規定了嚴謹的復原與潔淨程序：(1)
  第七日（得潔淨之日）剃頭（v9）；(2) 第八日帶兩隻斑鳩或兩隻雛鴿至會幕門口交給祭司，一隻獻作贖罪祭、一隻獻作燔祭，為他贖因死屍而有的罪，當日使頭重新成聖（v10-11）；(3)
  牽一隻一歲公羊羔作贖愆祭（asham），並重新另選離俗歸耶和華的日子（v12）。極為嚴肅的是，「先前的日子要歸徒然（void days）」（v12），因為離俗誓願在期間已被玷污（CT、GT、KC）。這提醒信徒：即便屬無意或環境被動造成的玷污，在神聖潔眼光中亦不能敷衍帶過，必須坦承疏忽、藉基督血祭贖罪，並謙卑立下新的開始，不憑過往功德自恃（CT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第9-12節規範拿細耳人意外沾染死屍時的剃頭、獻兩隻鳥（贖罪祭與燔祭）、獻公羊羔（贖愆祭）及先前日子歸徒然重新開始的條例。
  relation: 為舊約聖潔制度中處置意外沾染不潔與恢復許願提供補贖與重起頭的法定程序。
