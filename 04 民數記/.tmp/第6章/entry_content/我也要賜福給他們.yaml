name: 我也要賜福給他們
type: 神學
secondary_types: []
aliases:
- 我也要賜福給他們
- 神親自賜福
status: formal
definition: 來自民數記 6:27 結尾：「我也要賜福給他們。」希伯來文「我也」（ani gam）強調第一人稱親自行動。祭司奉名祝福（第 27 節上），神親自賜福（第
  27 節下），兩者不可分離：祭司是管道，神是源頭與擔保者。這句話將祭司祝福從人類儀式提昇為神聖約應許的確據宣告。
development: 在五經中，神親自賜福的宣告常伴隨立約確據（創 12:2-3；22:17-18；26:24）。本章作為祭司祝福的制度化文本，以「我也要賜福給他們」為封印，確保祝福不落入形式主義，成為神信實的不變錨點。
accumulations:
- book: 民數記
  chapter: 6
  summary: 祭司奉名祝福後，神宣告親自賜福給以色列人
  relation: 祭司祝福條例的神學高潮，宣示祝福的最終成就者是耶和華自己
