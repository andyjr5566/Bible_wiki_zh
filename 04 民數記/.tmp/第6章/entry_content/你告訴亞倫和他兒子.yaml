name: 你告訴亞倫和他兒子
type: 主題
secondary_types: []
aliases:
- 吩咐亞倫及子孫
- 祭司祝福委託
status: formal
definition: 耶和華吩咐摩西將祭司祝福的詞語傳給亞倫和他兒子，授權他們奉耶和華的名為以色列人祝福（民6:23）。這是神設立祭司祝福職分的正式委託命令。
development: 確立祭司作為神祝福管道的神學地位，祝福非出於祭司私意，乃奉神命、用神名、按神詞，神親自成就（民6:27）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第23節記載耶和華曉諭摩西：「你告訴亞倫和他兒子說……」。
  relation: 本章祭司祝福條例的起始命令，確立祝福的權源與傳遞鏈。
