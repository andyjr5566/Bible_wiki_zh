  summary: 第十四節規定母羊羔作為贖罪祭的獻祭動物。
  relation: 母羊羔是拿細耳人滿期獻祭中贖罪祭的指定祭物，與公羊羔燔祭、公綿羊平安祭共同構成完整獻祭。
