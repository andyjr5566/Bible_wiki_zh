name: 終身拿細耳人
type: 主題
secondary_types: []
aliases:
- 終身拿細耳人
- 終身歸主者
status: formal
definition: 指自出生至死終身守拿細耳人條例（離俗歸耶和華）的人。本章（民 6:2-21）規定的拿細耳人條例著重「許願離俗的日子」（v.5,8,13），屬暫時性許願；但聖經另有記載參孫（士
  13:5,7）、撒母耳（撒上 1:11）自母腹中被分別為拿細耳人，終身不剃頭、不飲酒、不近死屍。本章條例為終身拿細耳人提供規範框架，兩者共享「離俗歸耶和華」的核心神學。
development: 終身拿細耳人屬神主權揀選（如參孫、撒母耳、施洗約翰路 1:15），暫時拿細耳人屬人自願許願（民 6:2）。兩者同指向「完全歸主」的聖潔生活，新約在信徒「獻上身體為活祭」（羅
  12:1）中得以普世化應驗。
accumulations:
- book: 民數記
  chapter: 6
  summary: 規定拿細耳人離俗條例（禁酒、留髮、不近死屍、滿期獻祭），為終身拿細耳人提供規範依據
  relation: 本章條例雖著重暫時許願，其聖潔標準與儀式構成終身拿細耳人生活的規範基礎
