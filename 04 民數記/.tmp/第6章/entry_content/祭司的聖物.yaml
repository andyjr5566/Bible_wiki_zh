name: 祭司的聖物
type: 主題
secondary_types: []
aliases:
- 歸給祭司的聖物
- 祭司得分
status: formal
definition: 指獻祭中分別為聖、歸祭司享用的部分，包括搖祭的胸、舉祭的腿（民6:20）。這些聖物源於百姓獻給耶和華的供物，神再賜予事奉祂的祭司作為生活供應。
development: 體現「祭壇上的祭物，分給祭司」的原則（林前9:13），聖物嚴禁外人吃，須在聖處吃（利22:10-16）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第20節明確指出搖祭的胸、舉祭的腿同為聖物，歸給祭司。
  relation: 本章平安祭結構中祭司分受的法律依據。
