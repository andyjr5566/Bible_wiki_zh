name: 舉祭的腿
type: 主題
secondary_types: []
aliases:
- 舉祭腿
- 祭司分得的腿
- 公羊前腿
status: formal
definition: 指平安祭中祭司舉起獻給耶和華的右腿（或前腿），作為祭司的聖物（民6:19-20；參利7:32-34）。拿細耳人滿期時，祭司取已煮的公羊一條前腿，與搖祭的胸同歸祭司。
development: 舉祭動作象徵將供物高舉歸給神，再賜予祭司作為事奉的分，彰顯神供應事奉者。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第19-20節記載祭司取公羊前腿與搖祭的胸同為聖物歸祭司。
  relation: 本章拿細耳人滿期獻祭中祭司得分的具體規定。
