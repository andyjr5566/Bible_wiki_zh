name: 葡萄汁（mishrat anavim）
type: 原文
secondary_types: []
aliases:
- 葡萄汁
- 浸漬葡萄汁
status: formal
definition: 希伯來文 mishrat anavim（מִשְׁרַת עֲנָבִ意），字面為「葡萄浸泡液」，指未發酵或發酵極淺的葡萄汁液。民數記 6:3
  列為拿細耳人不可喝之物，顯示離俗禁令涵蓋葡萄果實的一切液態形態，不論是否含酒精。
development: 七十士譯本譯為 oinos（酒），但馬所拉文本區分「清酒/濃酒」（已發酵）與「葡萄汁」（未發酵或初期），反映律法對葡萄產物全方位的管制。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 3 節獨立列出，與清酒、濃酒、醋、鮮葡萄、乾葡萄並列。
  relation: 確立拿細耳人飲食禁忌的完整性——連未發酵葡萄汁亦在禁內。
