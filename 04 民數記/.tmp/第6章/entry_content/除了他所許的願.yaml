name: 除了他所許的願
type: 主題
secondary_types: []
aliases:
- 除許願外所能得的
- 自願獻祭
status: formal
definition: 指拿細耳人除了為離俗所許願應獻的規定供物外，若他還有能力、甘心樂意再獻上的供物（民6:21「和他以外所能得的獻給耶和華」）。這顯示敬拜不僅止於最低要求，更包含自願的豐盛回應。
development: 對應「按他的力量」（申16:17）的奉獻原則，神悅納甘心樂意的獻祭，超越律法定額的愛心表達。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第21節提到拿細耳人除了許願的供物，還有「他以外所能得的」獻給耶和華。
  relation: 本章條例中顯示敬拜的自願性與豐盛性，補充許願條例的剛性規定。
related_entries:
