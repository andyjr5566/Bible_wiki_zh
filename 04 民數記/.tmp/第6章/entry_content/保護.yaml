- 庇護
status: formal
definition: 來自民數記 6:24 亞倫祝福的第一句：「願耶和華賜福給你，保護你。」希伯來動詞 shamar（שָׁמַר），原意「守護、看顧、遵守」，指神主動的看顧與防護，使受祝福者免受惡害、得以存活。此詞在祭司祝福中作為神賜福的具體行動，彰顯立約神對子民的信實看顧。
development: 在舊約中，神的保護常與立約信實連結（如創 28:15；詩 121:7-8）。本章作為祭司祝福的開啟，奠定神作為守護者的根基意象，後續「光照、恩待、仰臉、平安」皆建立在「保護」的安全基礎上。
accumulations:
