name: 葡萄樹（gefen）
type: 原文
secondary_types: []
aliases:
- 葡萄樹
- 葡萄藤
status: formal
definition: 希伯來文 gefen（גֶּפֶן），指結實的葡萄藤樹。民數記 6:4 以「葡萄樹上結的」為總稱，涵蓋果實、汁液、酒、醋及一切衍生物，作為拿細耳人飲食禁忌的源頭界定。
development: 經文由具體清單（第 3 節）上升至來源層級（第 4 節），形成「源頭管制」邏輯；拉比律法據此推衍出連葡萄葉、嫩梢、未開花花序亦在禁內。
accumulations:
- book: 民數記
  chapter: 6
  summary: 第 4 節作為禁忌總綱，統攝第 3 節各項。
  relation: 為拿細耳人飲食禁忌的本體論依據——凡屬葡萄樹產出者皆禁。
