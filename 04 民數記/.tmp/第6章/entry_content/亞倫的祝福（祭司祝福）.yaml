name: 亞倫的祝福（祭司祝福）
type: 主題
secondary_types: []
aliases:
- 亞倫的祝福
status: formal
definition: 「亞倫的祝福」（v22-27）亦稱「祭司的祝福（Aaronic Blessing）」，是耶和華曉諭摩西傳給亞倫及其子孫大祭司階層，用以奉神的名為以色列全會眾祝禱的神聖公式文（v23, 27）。祝福文由三句漸進增長的神聖對稱句組成，共包含三重祝福：(1)「願耶和華賜福給你，保護你」（v24；暗示聖父的護佑與供應）；(2)「願耶和華使他的臉光照你，賜恩給你」（v25；暗示聖子基督的恩典與福音光照）；(3)「願耶和華向你仰臉，賜你平安」（v26；暗示聖靈的同在與真平安；CT、GT、KC）。耶和華宣告：「他們要如此奉我的名（將我的名放置在）為以色列人祝福，我也要賜福給他們」（v27）。此祝福展現了神渴望主動將自己無限的豐盛、恩典、保護與平安傾倒給屬祂子民的神聖心意（CT、KC）。
accumulations:
- book: 民數記
  chapter: 6
  summary: 本章第22-27節記載神親自制定並交託亞倫父子大祭司階層為以色列百姓祝禱的三重祝福祝文。
  relation: 為全本聖經中最著名、最古老之大祭司祝禱公式文，確立新舊約三一神賜福保護、光照賜恩與仰臉賜平安的神學範本。
