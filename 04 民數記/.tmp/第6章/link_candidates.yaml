    type: 主題
    evidence: "民6:23-27 你們要這樣為以色列人祝福...他們要奉我的名給以色列人祝福，我也要賜福給他們。CT：亞倫祝福為大祭司代求預表。KC：祭司祝福非人意，乃神命。BH：祝福公式化，三句雙關語。"
