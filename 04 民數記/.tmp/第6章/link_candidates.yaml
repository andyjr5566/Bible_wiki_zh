  # === C 類：全新條目 ===
  - name: 拿細耳人條例
    type: 主題
    evidence: "民6:1-21 耶和華對摩西說：無論男女許了特別的願，就是拿細耳人的願，要離俗歸耶和華。CT：拿細耳人預表信徒分別為聖歸主。KC：拿細耳人三禁：禁酒、留長髮、不近死屍。BH：拿細耳人聖潔程度超過祭司，接近大祭司。"
    surfaces: ["拿細耳人", "離俗歸耶和華", "特別的願", "許願", "分別為聖", "終身離俗", "暫時離俗"]

  - name: 拿細耳人禁酒
    type: 主題
    evidence: "民6:3-4 他就要遠離清酒濃酒，也不可喝什麼清酒濃酒做的醋；不可喝什麼葡萄汁，也不可吃鮮葡萄和乾葡萄。在一切離俗的日子，凡葡萄樹上結的，自核至皮所做的物，都不可吃。CT：遠離酒表不貪世上快樂，以主為樂。KC：禁戒葡萄製品，防微杜漸。BH：葡萄為迦南主要產品，與豐饒崇拜有關。"
    surfaces: ["遠離清酒濃酒", "不可喝葡萄汁", "不可吃鮮葡萄乾葡萄", "葡萄樹上結的", "自核至皮", "禁酒", "葡萄製品"]

  - name: 拿細耳人留長髮
    type: 主題
    evidence: "民6:5 在他一切許願離俗的日子，不可用剃頭刀剃頭，要由髮綹長長了。他要聖潔，直到離俗歸耶和華的日子滿了。CT：留長髮表承認神主權，甘心為主受羞辱。KC：長髮為神所賜，表生命能力。BH：參孫頭髮為見證，剃去則能力離開。"
    surfaces: ["不可用剃頭刀剃頭", "由髮綹長長了", "要聖潔", "離俗歸耶和華的日子滿了", "留長髮", "髮綹", "承認神主權"]

  - name: 拿細耳人不近死屍
    type: 主題
    evidence: "民6:6-7 在他離俗歸耶和華的一切日子，不可挨近死屍。他的父母或是弟兄姐妹死了的時候，他不可因他們使自己不潔淨，因為那離俗歸神的憑據是在他頭上。CT：不近死屍表效法神聖潔，寧遠離親屬。KC：拿細耳人比祭司更嚴格，像大祭司一樣。BH：離俗歸神的憑據就是未剃的頭髮。"
    surfaces: ["不可挨近死屍", "父母弟兄姐妹死了", "不可因他們使自己不潔淨", "離俗歸神的憑據", "在頭上", "不近死屍", "效法神聖潔"]

  - name: 拿細耳人被玷污贖罪
    type: 主題
    evidence: "民6:9-12 若有人在旁邊忽然死亡，使這拿細耳人沾染了不潔淨，他要在第七天剃頭，在第八天把兩隻斑鳩或兩隻雛鴿拿到祭司那裡，到會幕門口。祭司要獻一隻為贖罪祭，一隻為燔祭，為他贖那因死屍的罪。他要當天使頭聖潔，又要重新許願，離俗的日子要從頭算起，因為他離俗的頭被玷污了。CT：被玷污須重新開始，預表信徒跌倒須悔改重來。KC：第七天剃頭，第八天獻祭，離俗日子從頭算起。BH：贖罪祭、燔祭、平安祭、素祭全獻上。"
    surfaces: ["忽然死亡", "沾染了不潔淨", "第七天剃頭", "第八天獻祭", "贖罪祭", "燔祭", "贖那因死屍的罪", "當天使頭聖潔", "重新許願", "從頭算起", "離俗的頭被玷污了"]

  - name: 拿細耳人滿期獻祭
    type: 主題
    evidence: "民6:13-21 拿細耳人滿了離俗的日子，條例乃是這樣：他要被領到會幕門口，把沒有殘疾的一歲公羊羔獻為燔祭，一歲母羊羔獻為贖罪祭，一隻公綿羊獻為平安祭，和一筐無酵餅...祭司要在耶和華面前獻他的贖罪祭和燔祭，又要獻公綿羊為平安祭，將那筐無酵餅作素祭...拿細耳人要在會幕門口剃了離俗的頭，把頭髮放在平安祭的火上。CT：滿期獻祭預表事奉完成獻上自己。KC：四祭全獻：燔祭、贖罪祭、平安祭、素祭。BH：剃頭髮放在平安祭火上，祭司搖胸腿作搖祭。"
    surfaces: ["滿了離俗的日子", "被領到會幕門口", "一歲公羊羔", "燔祭", "一歲母羊羔", "贖罪祭", "公綿羊", "平安祭", "一筐無酵餅", "素祭", "剃了離俗的頭", "頭髮放在平安祭的火上", "搖祭", "胸腿"]

  - name: 祭司祝福條例
    type: 主題
    evidence: "民6:22-27 耶和華曉諭摩西說：你告訴亞倫和他兒子說：你們要這樣為以色列人祝福，說：耶和華賜福給你，保護你；耶和華使臉光照你，恩待你；耶和華向你仰臉，賜你平安。他們要奉我的名給以色列人祝福，我也要賜福給他們。CT：三重祝福預表三一神賜福。KC：祭司代神宣告祝福，神親自賜福。BH：賜福、保護、光照、恩待、仰臉、平安六重祝福。"
    surfaces: ["祭司祝福", "耶和華賜福給你", "保護你", "使臉光照你", "恩待你", "向你仰臉", "賜你平安", "奉我的名", "給以色列人祝福", "我也要賜福給他們", "三重祝福", "三一神"]

