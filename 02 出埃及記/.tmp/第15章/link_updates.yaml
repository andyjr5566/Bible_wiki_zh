book: 出埃及記
chapter: 15
updates:
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: "v1-18 摩西之歌歌頌的對象；v3「耶和華是戰士，祂的名是耶和華」；v11「眾神之中，誰能像你」；v18「耶和華必作王，直到永永遠遠」；v26「我耶和華是醫治你的」"
  relation: "本章是全卷第一次以詩歌認識神：祂是戰士（v3）、是力量詩歌拯救（v2）、是至聖至榮（v11）、是王（v18）、是醫治者（v26）；《舊約背景註釋》指出關鍵分別——巴力與瑪爾杜克在神話中制服海洋的化身，耶和華卻是用真實的海、在歷史中擊敗真實的人"
- title: 審判
  path: link_folder/神學/審判.md
  summary: "v7「推翻那些起來攻擊你的；你發出烈怒如火，燒滅他們像燒碎稭一樣」；v10「他們如鉛沉在大水之中」；v12「你伸出右手，地便吞滅他們」"
  relation: "第14章的事件在本章成為詩歌：仇敵六句誇口（v9「我要追趕、我要追上…」）對上神一口氣（v10「你叫風一吹」）——KC：「消滅仇敵在神不過是呼出一口氣的代價」；v12 的「地」按烏迦列文可作陰間"
- title: 救恩
  path: link_folder/神學/救恩.md
  summary: "v2「耶和華是我的力量，我的詩歌，也成了我的拯救」——14:13「看耶和華今天向你們所要施行的救恩」的應驗"
  relation: "《丁道爾》指出本卷「救恩」的意義是漸進的：14:13 與本節只含救命或戰勝的意思，「『救恩』的屬靈意義隨舊約啟示而漸進，其屬物質的意義逐步消減」——然而二者對希伯來人並無鮮明分別；本節後為詩118:14、賽12:2 直接引用"
