organization:
  本章主題: 建造會幕的材料與核心器具的樣式
  結構:
  - 奉獻材料的原則與清單（1-9節）
  - 約櫃與施恩座的樣式（10-22節）
  - 陳設餅桌子的樣式（23-30節）
  - 金燈臺的樣式（31-40節）
  核心信息:
  - 神啟示會幕的建造，目的是「使我可以住在他們中間」，表明神渴望與祂的子民同住。
  - 所有材料必須出於「甘心樂意的奉獻」，預表新約中神喜悅捐得樂意的人。
  - 會幕和一切器具必須「照著在山上指示你的樣式」製造，強調天上真帳幕的影像與完全的順服。
  - 約櫃（皂莢木包精金）預表基督的神人二性；施恩座（蔽罪座）預表基督為挽回祭，遮蓋律法的定罪，成為神與人相會之處。
  - 陳設餅桌子預表基督是生命的糧，供應神子民在神面前的交通與事奉。
  - 金燈臺（一塊精金錘出）預表教會為金燈臺，在聖靈的光照下為主發光，彰顯基督是世界的光。
