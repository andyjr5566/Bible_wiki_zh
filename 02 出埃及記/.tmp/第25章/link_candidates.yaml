book: 出埃及記
chapter: 25
candidates:
  - name: 摩西
    type: 人物
    section: 人物
  - name: 西乃山
    type: 地點
    section: 地點
    evidence: 摩西仍在山上四十晝夜中領受建會幕的指示，承接出24:15-18（出25:9,40）
  - name: 甘心樂意的奉獻
    type: 神學
    section: 神學
    evidence: 凡甘心樂意的人可送禮物歸神作建聖所之用；奉獻動機須出於甘心非勉強（出25:2-3）
  - name: 神住在人間
    type: 神學
    section: 神學
    evidence: 又當為我造聖所，使我可以住在他們中間，是建造會幕的核心理由（出25:8）
  - name: 山上的樣式
    type: 神學
    section: 神學
    evidence: 製造帳幕和其中一切器具都要照所指示的樣式，全書多次重複強調（出25:9,40）
  - name: 會幕材料的豫表
    type: 神學
    section: 神學
    evidence: 金、銀、銅、藍紫朱紅線、細麻、山羊毛、染紅公羊皮、海狗皮、皂莢木、油、香料、寶石，各按其性質豫表基督與救恩（出25:3-7）
  - name: 基路伯與火劍
    type: 神學
    section: 神學（既有條目累積）
    evidence: 出25:18-20兩個金錘出的基路伯安在施恩座兩頭；既有條目「基路伯與火劍」已涵蓋創3:24基路伯把守生命樹道路，本章屬同一天使類屬的第二次聖經出現，累積本章資料而非另建新條目
  - name: 約櫃
    type: 主題
    section: 主題
    evidence: 皂莢木包精金所造，長二肘半寬高一肘半，內存法版，是立約見證（出25:10-16,21-22）
  - name: 施恩座
    type: 主題
    section: 主題
    evidence: 精金所造約櫃蓋，神在此與摩西相會說話，是遮罪、施恩之處（出25:17,21-22）
  - name: 基路伯（施恩座）
    type: 主題
    section: 主題
    evidence: 兩個金錘出的基路伯，安在施恩座兩頭，高張翅膀相對遮掩施恩座（出25:18-20）；與既有條目「基路伯與火劍」（創3:24守護生命樹）為不同實體，各按最小穩定限定詞分檔
  - name: 陳設餅桌子
    type: 主題
    section: 主題
    evidence: 皂莢木包精金所造，桌上常擺陳設餅在耶和華面前（出25:23-30）
  - name: 金燈臺
    type: 主題
    section: 主題
    evidence: 精金一塊錘出，六枝七盞，杏花杯球花裝飾，是聖所唯一光源（出25:31-39）
  - name: 皂莢木（atzei shittim）
    type: 原文
    section: 原文
    evidence: 產於西乃曠野的堅硬木材，用以製造約櫃、桌子、燈臺骨架與槓（出25:5,10,13,23,28）
  - name: 禮物（terumah）
    type: 原文
    section: 原文
    evidence: 甘心奉獻歸神的供物，非強索之物（出25:2-3）
  - name: 法版（edut）
    type: 原文
    section: 原文
    evidence: 刻十誡的兩塊石版，是神與人立約的見證（出25:16,21）
  - name: 約1：14
    type: 互文
    section: 互文（既有條目累積）
    evidence: 道成肉身，支搭帳棚住在我們中間，對照出25:8神住在人間
  - name: 約6：31-35 耶穌是生命的糧
    type: 互文
    section: 互文（既有條目累積）
    evidence: 既有條目已涵蓋出16嗎哪與約6:31-35「我就是生命的糧」；出25:30陳設餅常擺耶和華面前是同一NT宣告的第二個舊約豫表，累積本章資料而非另建「約6:35」新條目
  - name: 天上事的形狀和影像（來8：5）
    type: 互文
    section: 互文
    evidence: 摩西謹慎照山上指示的樣式建造帳幕，對照出25:9,40
  - name: 頭一層帳幕作現今的表樣（來9：8-9）
    type: 互文
    section: 互文
    evidence: 頭一層帳幕仍存的時候，進入至聖所的路還未顯明，對照出25:8-9
  - name: 天上真帳幕的祭物（來9：11-12）
    type: 互文
    section: 互文
    evidence: 基督作大祭司經過更大更全備的帳幕，成就永遠的救贖，對照出25:9
  - name: 天上真聖所（來9：23-24）
    type: 互文
    section: 互文
    evidence: 地上帳幕是天上事物的複本，基督親自進入天上真聖所，對照出25:8-9
  - name: 挽回祭（羅3：25）
    type: 互文
    section: 互文
    evidence: 神設立耶穌作挽回祭，原文與施恩座同字，對照出25:17
  - name: 耶穌以身體為殿（約2：19-21）
    type: 互文
    section: 互文
    evidence: 耶穌以自己的身體為殿，對照出25:8-9
  - name: 世界的光（約8：12）
    type: 互文
    section: 互文
    evidence: 我是世界的光，跟從我的必得著生命的光，對照出25:31-37金燈臺
  - name: 七個金燈臺的奧祕（啟1：20）
    type: 互文
    section: 互文
    evidence: 七個金燈臺就是七個教會，對照出25:31-39
  - name: 精金之城（啟21：18）
    type: 互文
    section: 互文
    evidence: 新耶路撒冷是精金所造，對照出25:11,24,31等處精金
  - name: 四活物的形象（結1：5-11）
    type: 互文
    section: 互文
    evidence: 以西結所見基路伯異象，人面獸身有翅膀，對照出25:18-20
  - name: 金燈臺與聖靈（亞4：1-6）
    type: 互文
    section: 互文
    evidence: 撒迦利亞所見金燈臺異象，七盞燈是神的靈，對照出25:31-37
  - name: 不可摸約櫃（撒下6：6-7）
    type: 互文
    section: 互文
    evidence: 烏撒摸約櫃遭擊殺，顯明約櫃的神聖不可直接觸碰，對照出25:14-15槓不可抽出
  - name: 甘心樂意的奉獻（林後9：7）
    type: 互文
    section: 互文
    evidence: 各人隨本心所酌定的，捐得樂意的人是神所喜愛的，對照出25:2甘心樂意的奉獻
  - name: 聖殿中的基路伯（王上6：23-28）
    type: 互文
    section: 互文
    evidence: 所羅門聖殿至聖所內兩個包金的基路伯，對照出25:18-20
