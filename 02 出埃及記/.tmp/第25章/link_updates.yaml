book: 出埃及記
chapter: 25
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 耶和華在山上向摩西曉諭建造聖所、約櫃、施恩座、陳設餅桌子與金燈臺的材料與樣式（出25:1,9,40）。
  relation: 承接出24章摩西進入雲中四十晝夜與神相會，本章是神在那四十晝夜中所說的話之首段內容——摩西作為領受並要傳達建造樣式的中保。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 摩西仍在西乃山雲中的四十晝夜期間，領受建造會幕、約櫃、施恩座、桌子與燈臺的指示，並被吩咐要照「山上指示的樣式」製造（出25:9,40）。
  relation: 本章承接出24:15-18摩西進入雲中——西乃山此時是神向摩西啟示會幕藍圖（天上樣式）的地點，而非公開頒布誡命的場景。
- title: 約1：14
  path: link_folder/互文/約1：14.md
  summary: 出25:8「又當為我造聖所，使我可以住在他們中間」是建造會幕的核心理由；GT指出「住」字原文即shekinah，與約1:14道成肉身「住在我們中間」同源呼應。
  relation: 西乃山以幽暗榮耀顯現的神，在本章吩咐建造會幕使祂「住在他們中間」——這居所主題預表約1:14道成肉身、恩典真理住在人間的終極實現。
