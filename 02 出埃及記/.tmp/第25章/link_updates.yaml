book: 出埃及記
chapter: 25
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出25:1,9,40 耶和華曉諭摩西，指示會幕與器具的樣式，摩西照著樣式建造。
  relation: 出25章是摩西領受會幕指示的起點，預表基督作中保領受天上事物的樣式（來8:5）。
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: 出25:2 向以色列人收納禮物，凡甘心樂意的都可收下。
  relation: 出25:2以色列人甘心奉獻建造會幕，預表新約教會樂意奉獻（林後9:7）。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出25:1,40 神在西乃山曉諭摩西，指示會幕樣式。
  relation: 出25章神在西乃山向摩西啟示會幕樣式，確立西乃山作為律法與會幕指示的頒布地。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出25:8 「又當為我造聖所，使我可以住在他們中間」。
  relation: 出25:8會幕建造的核心目的——神與百姓同住，預表道成肉身（約1:14）與新耶路撒冷（啟21:3）。
- title: 約1：14
  path: link_folder/互文/約1：14.md
  summary: 出25:8 神住在百姓中間，約1:14 道成肉身住在我們中間。
  relation: 約1:14是出25:8的終極應驗——會幕預表基督道成肉身作神與人同住的真實帳幕。
