book: 出埃及記
chapter: 25
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 耶和華在西乃山向摩西曉諭建造聖所、約櫃、施恩座、陳設餅桌子與金燈臺的材料與樣式（出25:1,9,40）。
  relation: 承接出24章摩西進入雲中四十晝夜與神相會，本章是那四十晝夜期間神所曉諭的首段內容——摩西作為領受並要將建造樣式傳達給以色列人的中保。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 摩西仍在西乃山雲中的四十晝夜期間，領受建造會幕、約櫃、施恩座、桌子與燈臺的指示，並被吩咐要照「山上指示的樣式」製造（出25:9,40）。
  relation: GT指出本章承接出24:15-18摩西進入雲中——西乃山此時是神向摩西啟示會幕藍圖（天上樣式）的地點；會幕的經歷是西乃山經歷的延續，神在此曉諭「又當為我造聖所，使我可以住在他們中間」（出25:8）。
- title: 基路伯與火劍
  path: link_folder/神學/基路伯與火劍.md
  summary: 出25:18-20神吩咐用金子錘出兩個基路伯，安在施恩座兩頭，高張翅膀相對遮掩施恩座，臉對臉朝向施恩座。
  relation: 施恩座上的基路伯與創3:24伊甸園東邊把守生命樹道路的基路伯同屬一類守護聖潔的天使；BH指出基路伯象徵神的臨在與守護，其翅膀遮掩施恩座預表神對恩典的保護——伊甸園的基路伯阻擋人手接近生命樹，施恩座的基路伯則見證神在赦罪恩典中向人開啟相會之處，二者形成禁止與施恩的對照。
- title: 約1：14
  path: link_folder/互文/約1：14.md
  summary: 出25:8神吩咐「又當為我造聖所，使我可以住在他們中間」，是建造會幕的核心理由。
  relation: CT指出會幕是神住在人間的雛形，最終應驗於基督道成肉身「住在」我們中間（約一14），並延續到教會作為神的居所——與本條目既有的出20章「幽暗中的神」對比呼應，本章進一步展開神「住在人間」的具體居所藍圖。
- title: 約6：31-35 耶穌是生命的糧
  path: link_folder/互文/約6：31-35 耶穌是生命的糧.md
  summary: 出25:23-30記載陳設餅桌子的製作，桌上要常在耶和華面前擺陳設餅（出25:30）。
  relation: BH指出十二個陳設餅代表以色列十二支派，象徵神持續的供應與同在；CT指明陳設餅預表基督是生命的糧（約六35）——與既有條目已涵蓋的出16嗎哪同為約6:31-35「我就是生命的糧」宣告的第二個舊約豫表，嗎哪供應曠野路上肉身生命，陳設餅則在聖所中常存耶和華面前，象徵基督作生命之糧的持續同在。
