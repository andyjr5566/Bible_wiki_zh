name: 陳設餅桌子
type: 主題
secondary_types: []
aliases:
- 陳設餅的桌子
- 擺陳設餅的桌子
status: formal
definition: 陳設餅桌子是用皂莢木製作、包上精金的一張桌子，長二肘、寬一肘、高一肘半，四圍鑲金牙邊，並有一掌寬的橫梁與金牙邊。桌子的四角安有金環，可穿皂莢木包金的杠以便抬運。桌上常擺陳設餅，共十二個，代表以色列十二支派，在神面前作為立約子民蒙悅納的記號。桌子與其上的盤子、調羹、爵、瓶等器具皆用精金製作，表明基督是生命的糧，供應神子民並使他們在神面前得享交通。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示摩西製作陳設餅桌子，規定尺寸、材料與配件，並命令常擺陳設餅在神面前。
  relation: 本章詳述桌子的構造與其上器具，顯明神在聖所中為祂的子民預備生命的供應與持續的交通。
