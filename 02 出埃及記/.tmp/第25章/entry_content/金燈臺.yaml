name: 金燈臺
type: 主題
secondary_types: []
aliases:
- 金燈檯
- 燈臺
- 燈檯
status: formal
definition: 金燈臺是用一他連得精金錘出的聖所燈具，由座、幹、杯、球、花接連一塊組成。燈臺兩旁各杈出三個枝子，連同中央主幹共有七個枝子，每枝上有杏花形狀的杯、球、花。祭司要點亮七個燈盞，使燈光對照。燈臺象徵基督是世界的光，也預表教會在地上為神發光；其附屬器具蠟剪與蠟花盤亦用精金製作，表明光的功用需經修剪與維護。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示摩西用精金錘出一個燈臺，包括七個枝子與杏花形狀的杯、球、花，並點七盞燈照亮聖所。
  relation: 本章詳述金燈臺的設計、裝飾與功用，顯明神在聖所中設立光照，預表基督與教會在黑暗中顯出生命之光。
