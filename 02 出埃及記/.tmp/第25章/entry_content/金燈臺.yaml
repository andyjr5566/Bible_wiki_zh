name: 金燈臺
type: 主題
secondary_types: []
aliases:
- 燈臺
- 精金的燈臺
- 七盞燈金燈臺
status: formal
definition: 金燈臺是用一他連得精金一塊錘出來的器具，位於會幕聖所內。其設計如同一棵開花的杏樹，有中央主幹和兩旁各三個枝子，共七個燈盞。燈臺是聖所內唯一的光源，祭司需常點燈使燈光對照，象徵神同在發出的光輝與聖靈的
  illumination。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示用一塊精金錘出燈臺，包含座、幹、杯、球、花及七個燈盞，並配備精金的蠟剪和蠟花盤。
  relation: 金燈臺表徵基督與教會在黑暗世代中發出生命之光的見證，其錘打過程預表受苦試煉，七燈表徵地上的完全。
related_entries:
- 會幕材料的豫表
- 世界的光（約8：12）
- 七個金燈臺的奧祕（啟1：20）
- 金燈臺與聖靈（亞4：1-6）
- 山上的樣式
sources:
