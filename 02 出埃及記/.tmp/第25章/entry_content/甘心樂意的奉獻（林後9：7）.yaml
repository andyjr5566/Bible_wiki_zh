name: 甘心樂意的奉獻（林後9：7）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 出埃及記25章記載神吩咐摩西告訴以色列人，當為神送禮物來建造會幕，但有一個先決條件：「凡甘心樂意的，你們就可以收下歸我」。這表明神悅納的奉獻必須出於自願且內心驅策的動機，而非出於勉強或被逼。哥林多後書9章7節直接引用並延續了這個原則：「各人要隨本心所酌定的，不要作難，不要勉強，因為捐得樂意的人是神所喜愛的」。這顯示了新舊約中奉獻的屬靈原則一致，神看重的是人甘心樂意的心。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神吩咐收下以色列人甘心樂意獻上的禮物，作為建造會幕的材料。
  relation: 會幕材料甘心樂意的奉獻原則，對應了新約保羅教導捐得樂意的人是神所喜愛的。
