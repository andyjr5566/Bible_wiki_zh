name: 甘心樂意的奉獻（林後9：7）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 保羅在哥林多後書教導信徒「各人要隨本心所酌定的，不要作難，不要勉強，因為捐得樂意的人是神所喜愛的」（林後9：7）。此原則與出埃及記25章神吩咐摩西只收「凡甘心樂意的」禮物（出25：2）完全一致，表明神在舊約和新約中都看重奉獻者的內心動機，而非外在數量或強制性的捐輸。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神曉諭摩西，以色列人當為祂送禮物來建造聖所，但只有甘心樂意的人，才可以收下他們的禮物歸給神。
  relation: 林後9：7直接呼應出埃及記25：2甘心樂意的奉獻原則，將舊約建造會幕的奉獻精神應用在新約教會的捐輸上，強調神喜悅出於愛心而非勉強的奉獻。
