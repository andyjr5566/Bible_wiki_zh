name: 天上事的形狀和影像（來8：5）
type: 互文
secondary_types: []
aliases:
- 來8:5
status: formal
definition: 來8:5指出地上祭司的事奉不過是天上真聖所的「形狀和影像」，並引用出25:40，強調摩西建造會幕時必須完全照著在山上指示的樣式。此節直接連結出25:9,40的命令，說明會幕的樣式具有屬天的原型。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 出25:9,40兩次強調製造帳幕和器具必須「照著在山上指示你的樣式」，來8:5引用此原則，指出地上會幕是天上真帳幕的副本。
  relation: 來8:5為出25章「山上的樣式」提供了新約神學詮釋，表明會幕是基督與新約的預表。
related_entries:
- 山上的樣式
- 來9:8-9
- 來9:23-24
sources:
