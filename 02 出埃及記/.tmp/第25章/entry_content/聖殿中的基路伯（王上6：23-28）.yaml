name: 聖殿中的基路伯（王上6：23-28）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 列王紀上記載所羅門在聖殿內殿用橄欖木造兩個基路伯，各高十肘，翅膀張開共二十肘，並以精金包裹（王上6：23-28）。這與出埃及記25章在施恩座兩頭用金子錘出兩個基路伯的設計（出25：18-20）一脈相承，但尺寸與材料有所擴展，表明從曠野會幕到固定聖殿的延續與發展，基路伯始終象徵守護神榮耀同在的天使。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示要用金子錘出兩個基路伯，安在施恩座的兩頭，二基路伯要高張翅膀遮掩施恩座，臉對臉朝著施恩座。
  relation: 王上6：23-28的聖殿基路伯是出埃及記25章施恩座上基路伯的放大與具體化，從精金錘出的小像發展為巨型包金木雕，但守護神寶座與彰顯神榮耀的功能保持不變。
