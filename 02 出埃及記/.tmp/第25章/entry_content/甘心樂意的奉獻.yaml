name: 甘心樂意的奉獻
type: 神學
secondary_types: []
aliases:
- 甘心樂意
- 樂意的奉獻
status: formal
definition: '神吩咐摩西收取建造會幕的材料時，強調奉獻必須出於甘心樂意。神不勉強人，而是喜悅「心受驅策」而自願獻上的禮物。這原則表明真實的敬拜與事奉源於內心的感恩與對神的愛，而非外在的規條或壓力。這也預表新約信徒當以樂意的心奉獻自己與財物給神。

  '
development: '在出埃及記中，此原則體現於百姓將自己從埃及所得的財物甘心獻上；到了新約，保羅在哥林多後書明確引用此原則，教導「各人要隨本心所酌定的，不要作難，不要勉強，因為捐得樂意的人是神所喜愛的」。

  '
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神吩咐摩西收下以色列人甘心樂意獻上的禮物作為建造會幕的材料。
  relation: 奠定了屬靈奉獻的基本原則：神悅納出於自願而非勉強的禮物。
