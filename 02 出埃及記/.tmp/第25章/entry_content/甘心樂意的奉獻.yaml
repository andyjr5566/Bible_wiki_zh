name: 甘心樂意的奉獻
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 指出埃及記第25章所啟示的奉獻原則：建造會幕的材料必須來自以色列人自願獻上的禮物，而非強制徵收。神吩咐摩西「凡甘心樂意的，你們就可以收下歸我」（出25:2），強調奉獻的動機必須出於內心的驅策與對神的愛，而非勉強或外在壓力。這原則表明神看重奉獻者的心態過於禮物本身的價值，也預表新約中「捐得樂意的人是神所喜愛的」（林後9:7）的教導。
development:
- 神主動提出需要禮物，但將回應的自由完全留給人——「凡甘心樂意的」才收下。
- 禮物清單涵蓋金屬、紡線、皮料、木料、油、香料、寶石等，代表全人全心的奉獻。
- 甘心樂意的奉獻使會幕的建造成為全民參與的敬拜行動，而非少數人的任務。
- 此原則貫穿整本聖經：從會幕、聖殿到新約教會的奉獻，神始終悅納出於自願與信心的擺上。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神吩咐摩西收取以色列人甘心樂意獻上的禮物，作為建造會幕的材料。
  relation: 本章首次明確立下奉獻的「甘心樂意」原則，成為會幕建造的基礎。
