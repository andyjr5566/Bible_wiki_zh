name: 頭一層帳幕作現今的表樣（來9：8-9）
type: 互文
secondary_types: []
aliases:
- 來9:8-9
status: formal
definition: 來9:8-9說明在頭一層帳幕（聖所）仍存的時候，進入至聖所的路還未顯明；那頭一層帳幕是現今的一個表樣（parabolē），所獻的禮物和祭物都不能叫禮拜的人得以完全。此節指向出25章所描述的會幕結構，特別是聖所與至聖所的分隔，預表基督未來開通進入神面前的路。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 出25章詳細描述約櫃、陳設餅桌子、金燈臺等在聖所與至聖所內的擺設，構成頭一層帳幕的禮拜體系。
  relation: 來9:8-9指出出25章所設立的會幕禮拜只是預表性的，真正的完全需等到基督作為大祭司進入天上真聖所。
