name: 禮物（terumah）
type: 原文
secondary_types: []
aliases:
- 禮物
- 奉獻
status: formal
definition: 希伯來文 terumah，指分別出來、舉起獻給神的供物或舉祭。在出25:2-3中，神吩咐以色列人為建造會幕而甘心樂意送來的禮物，就是 terumah，強調奉獻必須出於自願的心，而非勉強。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神曉諭摩西，要從甘心樂意的以色列人中收取 terumah，作為建造聖所的材料。
  relation: terumah 是建造會幕一切材料的來源，表明神的居所建立在祂子民自願奉獻的基礎上。
related_entries:
- 甘心樂意的奉獻
- 會幕材料的豫表
sources:
- ccbiblestudy 註解（出25:2）
- BibleHub Study (Exodus 25:2)
