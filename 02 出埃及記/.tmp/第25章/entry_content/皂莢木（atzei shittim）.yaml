name: 皂莢木（atzei shittim）
type: 原文
secondary_types: []
aliases:
- 皂莢木
status: formal
definition: 希伯來文 atzei shittim，指產於西乃曠野的金合歡木，質地堅硬、耐久且不易朽壞。本章中皂莢木被指定為製作約櫃、陳設餅桌子、抬杠等聖所器具的主要木材，外包精金。皂莢木象徵基督堅固、不朽壞的人性，如根出於乾地，經過精金包裹顯出神性與人性的聯合。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指定皂莢木為製作約櫃、桌子與杠的材料，並要求用金包裹。
  relation: 本章多次提及皂莢木，作為聖所核心器具的基礎材料，表明基督人性的堅固與神性榮耀的遮蓋。
related_entries:
