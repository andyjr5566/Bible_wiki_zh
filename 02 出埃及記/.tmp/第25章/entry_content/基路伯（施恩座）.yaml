name: 基路伯（施恩座）
type: 主題
secondary_types: []
aliases:
- 榮耀的基路伯
- 二基路伯
status: formal
definition: 基路伯是與神榮耀和同在密切相關的天使活物。在出埃及記25章中，神指示要用金子錘出兩個基路伯，安在施恩座的兩頭，彼此接連一塊。牠們要高張翅膀遮掩施恩座，臉對臉朝著施恩座，象徵守護神的聖潔與榮耀，並作為神在地上看不見之寶座的可見象徵。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示用金子錘出兩個基路伯安在施恩座兩頭，高張翅膀遮掩施恩座，臉朝著施恩座。
  relation: 基路伯的翅膀遮掩施恩座，表徵保護恩典並彰顯神榮耀的見證，神要在二基路伯中間與人相會並說話。
related_entries:
