name: 基路伯（施恩座）
type: 主題
secondary_types: []
aliases:
- 基路伯
status: formal
definition: 基路伯是天使的一種，常與神的榮耀和臨在相關。在施恩座上，兩個基路伯由同一塊精金錘出，安在施恩座兩頭，彼此接連一塊。二基路伯高張翅膀遮掩施恩座，臉對臉、朝著施恩座。他們象徵守護神聖空間、彰顯神的榮耀，並在贖罪日彈血之處見證遮蓋之恩。神從二基路伯中間向摩西說話，表明神臨在於恩典與公義相會之處。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示摩西在施恩座兩頭用金子錘出兩個基路伯，翅膀遮掩施恩座，臉對臉朝著施恩座。
  relation: 本章詳述基路伯的製作方式、位置與姿態，顯明他們與施恩座一體相連，守護並見證神在恩典中與人相會的奧秘。
