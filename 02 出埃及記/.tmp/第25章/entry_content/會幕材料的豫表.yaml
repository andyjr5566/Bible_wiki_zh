name: 會幕材料的豫表
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 出埃及記25:3-7所列建造會幕的禮物清單，每一項材料都具有豫表（typological）意義，指向基督的位格與工作、信徒的屬靈經歷，以及教會的建造。金表徵神的性情與榮耀；銀表徵救贖；銅表徵審判；藍色線表徵屬天；紫色線表徵君尊；朱紅色線表徵流血犧牲；細麻表徵聖潔的義行；山羊毛表徵贖罪；染紅的公羊皮表徵流血的救贖；海狗皮表徵外表無佳形美容卻經得起苦難；皂莢木表徵基督堅固不朽的人性；油表徵聖靈；香料表徵基督的馨香與美德；寶石表徵聖靈變化信徒後所顯出的榮耀。
development:
- 材料從金屬、紡織品、皮料、木料、油、香料到寶石，涵蓋礦物、植物、動物三界，代表受造界的全部。
- 越接近神（至聖所）的材料越貴重（精金），反映神聖潔與榮耀的遞進。
- 皂莢木包精金的結構（約櫃、桌子）豫表基督神人二性——人性為木、神性為金。
- 這些材料來自百姓甘心樂意的奉獻，豫表信徒將自己所有的獻給神，參與教會的建造。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神詳細列出建造會幕所需的各類材料，包括金屬、紡線、皮料、木料、油、香料和寶石。
  relation: 本章的材料清單是會幕豫表的基礎，每一項材料都指向基督或信徒的屬靈實際。
