name: 會幕材料的豫表
type: 神學
secondary_types: []
aliases:
- 會幕材料的預表
- 建造材料的屬靈意義
status: formal
definition: '神指定用於建造會幕的各種材料（金、銀、銅、細麻、木、皮、油、香料、寶石等）皆具有深刻的屬靈豫表意義。這些材料描繪了基督的神性與人性、祂的救贖工作、聖靈的運行，以及信徒在聖靈裡經歷變化後的屬靈美德。

  '
development: '這些材料不僅是物質的奉獻，更預表了基督的各方面榮美與工作。例如皂莢木預表基督堅固無朽壞的人性，精金預表祂的神性，染紅的公羊皮預表祂流血的救贖。這些豫表在基督身上得著完全的應驗與彰顯。

  '
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 列舉了金銀銅、木與各色紡線等建造會幕的材料，並隱含其屬靈豫表。
  relation: 藉由物質材料的屬性描繪基督的位格、工作與教會建造的屬靈實際。
