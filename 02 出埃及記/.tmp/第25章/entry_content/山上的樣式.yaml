name: 山上的樣式
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 神在出埃及記25章兩次強調（25:9, 25:40），摩西製造帳幕和其中一切器具，都必須「照著在山上指示你的樣式」。這表明會幕的設計不是出於人的構想，而是源於神在西乃山上向摩西啟示的屬天藍圖。地上的會幕是「天上事的形狀和影像」（來8:5），因此每一細節都具有神學意義，必須嚴格遵照神的指示，不可擅自更改。這原則教導：神的事工必須按照神的啟示和方法執行，順服是執行神計畫的關鍵。
development:
- 出25:9 在列出材料後立即強調「都要照我所指示你的樣式」，確立建造的權威來源。
- 出25:40 在燈臺指示結束時再次重申「要謹慎做這些物件，都要照著在山上指示你的樣式」，形成首尾呼應。
- 希伯來書8:5 引用此原則，說明地上的會幕是天上真帳幕的副本與影兒。
- 這原則預表基督——祂是那「真帳幕」的實體，神一切的豐盛都有形有體地居住在祂裡面（西2:9）。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神兩次吩咐摩西，製造帳幕和一切器具必須完全按照在山上指示的樣式。
  relation: 本章以「山上的樣式」為建造的最高準則，確保會幕準確反映屬天的啟示。
