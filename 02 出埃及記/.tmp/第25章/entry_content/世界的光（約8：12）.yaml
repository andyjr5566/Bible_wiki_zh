name: 世界的光（約8：12）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 耶穌在約翰福音中宣告「我是世界的光」，與出埃及記25章金燈臺在聖所中持續發光照耀的功用形成互文對應；金燈臺預表基督是生命與真理的光，照亮在神面前事奉的道路。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 金燈臺用精金錘成，七盞燈要在聖所中持續點燃，使燈光對照，象徵神同在的光照與引導。
  relation: 金燈臺的設計與功用預表基督作為世界的光，在教會與信徒生命中持續發出生命與真理的光。
related_entries:
- 金燈臺
- 約8:12
