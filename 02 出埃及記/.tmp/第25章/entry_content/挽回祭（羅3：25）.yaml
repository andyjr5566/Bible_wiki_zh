name: 挽回祭（羅3：25）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 保羅在羅馬書宣告神設立耶穌作挽回祭（hilasterion），藉著人的信與耶穌的血，顯明神的義，赦免人的罪。
development: 出埃及記第25章記載施恩座（kapporet）安在法櫃上邊，是神施恩蔽罪之處。羅3：25所用的希臘文 hilasterion 與七十士譯本中施恩座同字，表明基督就是那真正的施恩座。神設立基督為挽回祭，藉著祂的血，使相信的人得蒙赦罪，滿足神公義的要求。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示用精金造施恩座，安在法櫃上邊，作為蔽罪施恩之處，預表基督的挽回祭。
  relation: 施恩座預表基督為挽回祭，藉著祂的血使相信者蒙赦罪，滿足神的公義。
