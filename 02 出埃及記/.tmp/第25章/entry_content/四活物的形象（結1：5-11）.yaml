name: 四活物的形象（結1：5-11）
type: 互文
secondary_types: []
aliases:
- 四活物的形象
status: formal
definition: 出埃及記25章記載神吩咐摩西用金子錘出兩個基路伯，安在施恩座的兩頭，並高張翅膀遮掩施恩座。基路伯是天使級別的活物，象徵神的榮耀與保護。在以西結書1章5-11節中，先知看見了四個活物的異象，其形象包含了人、獅、牛、鷹的臉面和翅膀，這與守護神寶座的基路伯形象相互呼應。會幕中基路伯的設計，反映了天上寶座周圍活物的事奉，表明地上的施恩座正是天上寶座的彰顯。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神吩咐用金子錘出兩個基路伯安在施恩座上，高張翅膀並臉對臉朝著施恩座。
  relation: 施恩座上基路伯的形象與事奉，對應了以西結異象中四活物守護神天上寶座的榮耀景象。
