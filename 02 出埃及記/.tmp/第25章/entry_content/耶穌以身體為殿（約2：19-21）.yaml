name: 耶穌以身體為殿（約2：19-21）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 出埃及記25章神吩咐以色列人為祂造聖所，使祂可以住在他們中間。這帳幕預表了道成肉身的耶穌基督，正如約翰福音2章19-21節所宣告，耶穌以自己的身體為殿。會幕是神在人間暫時的居所，而耶穌基督才是神榮耀同在的真正彰顯。
development: 本章第8節明確指出建造聖所的目的是讓神住在百姓中間。會幕被稱為神在人間的帳幕，這預表在約翰福音1章14節中應驗於基督身上。當耶穌論到聖殿被拆毀後三日內要再建立起來時，祂乃是指著自己的身體說的，表明祂已取代了物質的帳幕，成為神與人相會的終極所在。
