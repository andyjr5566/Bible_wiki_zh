name: 耶穌以身體為殿（約2：19-21）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 耶穌對猶太人說「你們拆毀這殿，我三日內要再建立起來」，以祂的身體為真聖殿，預示復活後建立新的敬拜中心。
development: 出埃及記第25章記載神吩咐以色列人為祂造聖所，使祂可以住在他們中間。地上的會幕與後來的聖殿都是神同在的記號。約2：19-21中，耶穌以自己的身體為殿，表明祂是神與人同在的真正所在。祂的死與復活建立了以祂為中心的敬拜，應驗了會幕所預表的實體。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神吩咐以色列人為祂造聖所，使祂可以住在他們中間，預表基督為真聖殿。
  relation: 地上聖所預表基督的身體為真殿，藉祂的死與復活成就神與人永遠的同在。
