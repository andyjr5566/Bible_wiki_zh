name: 把守生命樹的道路（創3：24）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 創世記中基路伯被安設在伊甸園東邊把守生命樹的道路，與出埃及記25章施恩座上二基路伯的設置形成互文；基路伯從執行審判轉為見證神在施恩座上的憐憫與同在。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 施恩座兩頭用金子錘出兩個基路伯，高張翅膀遮掩施恩座，臉朝著施恩座。
  relation: 基路伯在伊甸園把守生命樹，在會幕中則守護施恩座，表明神公義的要求已藉贖罪得滿足，人可進到神面前。
