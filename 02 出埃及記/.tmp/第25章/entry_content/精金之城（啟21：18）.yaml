name: 精金之城（啟21：18）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 新耶路撒冷城本身是精金的，與出埃及記25章聖所器具（如約櫃、桌子、燈臺）用精金製造的要求形成互文；精金表徵神的性情與榮耀，在永世中完全彰顯。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 約櫃、陳設餅桌子、金燈臺及相關器具都要用精金製造或包裹，表明神聖潔榮耀的性質。
  relation: 會幕中精金的使用預表新耶路撒冷全然彰顯神的榮耀，信徒也被變化為精金之質。
