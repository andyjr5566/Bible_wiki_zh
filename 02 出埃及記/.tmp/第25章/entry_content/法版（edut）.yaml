name: 法版（edut）
type: 原文
secondary_types: []
aliases:
- 法版
- 見證版
- 石版
status: formal
definition: 希伯來文 edut，意為「見證」，特指神賜給摩西的兩塊石版，上面刻有十誡，作為神與以色列人立約的見證。出25:16,21中，神吩咐將 edut
  放入法櫃內，因此法櫃又稱為「見證的櫃」。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神命令摩西將祂所要賜給的法版（edut）放在約櫃裡，作為立約的永久見證。
  relation: edut 是約櫃的核心內容，表明神的律法與公義是祂與子民關係的根基。
related_entries:
- 約櫃
- 施恩座
sources:
