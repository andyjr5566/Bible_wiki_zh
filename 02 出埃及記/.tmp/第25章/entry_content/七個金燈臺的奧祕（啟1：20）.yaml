name: 七個金燈臺的奧祕（啟1：20）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 啟示錄中七個金燈臺代表七個教會，與出埃及記25章聖所內用精金錘成的七盞燈金燈臺形成互文；教會作為金燈臺，在世上肩負為主發光的使命。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 金燈臺由一塊精金錘出，上有七個燈盞，祭司要點燈使燈光對照，照亮聖所。
  relation: 金燈臺預表教會作為基督身體的見證，在黑暗中顯出屬天的光，與啟示錄中七教會的象徵一致。
