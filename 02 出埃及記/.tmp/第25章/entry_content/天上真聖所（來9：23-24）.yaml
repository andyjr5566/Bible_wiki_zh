name: 天上真聖所（來9：23-24）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 希伯來書指出地上會幕是天上真聖所的影像，基督不是進入人手所造的聖所，而是進入天堂本身，顯在神面前。
development: 出埃及記第25章詳述地上會幕的樣式，必須照神在山上指示的樣式製造。來9：23-24說明地上照天上樣式造的物件須用牛羊之血潔淨，但天上的本物須用更美的祭物——基督的血。基督如今為我們顯在神面前，成就了地上會幕所指向的實體。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示摩西建造聖所與其中器具，必須照山上指示的樣式，作為天上真聖所的影像。
  relation: 地上會幕是天上真聖所的影像與預表，基督進入天堂本身，成就更美之約。
