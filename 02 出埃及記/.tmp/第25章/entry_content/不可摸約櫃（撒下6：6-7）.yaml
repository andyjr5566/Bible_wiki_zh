name: 不可摸約櫃（撒下6：6-7）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 撒母耳記下記載大衛運送約櫃時，牛失前蹄，烏撒伸手扶住約櫃，神因他的錯誤而擊殺他（撒下6：6-7）。此事件直接反映約櫃的聖潔與不可觸摸的禁令，與出埃及記25章關於約櫃的製造和搬運規定（出25：12-15）形成互文，強調人必須按神的樣式與方法親近神，不可用屬肉體的方式插手神的事工。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神指示約櫃要安四個金環，穿皂莢木包金的杠以便抬櫃，且杠要常在環內不可抽出，確保搬運時人手不直接觸碰約櫃。
  relation: 撒下6：6-7的事件正是違反了出埃及記25章所定下不可觸碰約櫃的原則，顯明神的聖潔不容人用不敬虔的方式來維護或協助。
