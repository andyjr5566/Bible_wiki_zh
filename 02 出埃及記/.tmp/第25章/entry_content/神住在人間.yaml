name: 神住在人間
type: 神學
secondary_types: []
aliases:
- 神與人同住
- 神住在我們中間
status: formal
definition: '神吩咐以色列人為祂造聖所，核心目的乃是「使我可以住在他們中間」。這揭示了神救贖的最終目標不是僅僅拯救人脫離苦難，而是要恢復神與人之間的相交與同在。會幕作為神在地上的居所，是神與人同在的雛形與具體彰顯。

  '
development: '此主題貫穿全本聖經。在舊約，神藉會幕與聖殿住在百姓中間；在新約，這應許在耶穌基督身上應驗，祂「道成肉身，住在我們中間」；最終在新天新地中，「神的帳幕在人間，祂要與人同住」。

  '
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神命令百姓造聖所，使祂能住在以色列人中間。
  relation: 點出建造會幕的最高神學目的：神渴望與祂的子民同住。
