name: 神住在人間
type: 神學
secondary_types: []
aliases: []
status: formal
definition: 出埃及記25:8「又當為我造聖所，使我可以住在他們中間」所揭示的核心神學主題：聖潔、超越的神願意降卑，住在祂救贖的子民中間。會幕（mishkan，字根意為「居住」）的建造正是為了實現神與人同住的旨意。這主題從伊甸園神與人同行、會幕與聖殿、道成肉身的基督（約1:14「住在我們中間」原文為「支搭帳幕」）、教會作為神的居所（弗2:22），一直延伸到新天新地中「神的帳幕在人間」（啟21:3）。
development:
- 出25:8 是建造會幕的核心目的宣言：神要住在以色列人中間。
- 會幕的至聖所內，神在法櫃施恩座上二基路伯中間與摩西相會說話（出25:22），表明神的同在有具體的彰顯之處。
- 神的「住」（shekinah）與祂的榮耀同在相連，會幕完工時雲彩遮蓋、榮光充滿（出40:34-38）。
- 這主題預表基督的道成肉身——神親自成為人，住在人間；也預表教會作為聖靈的殿，神藉聖靈內住信徒中間。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 神宣告建造聖所的目的，是要住在以色列人中間，並在施恩座上與摩西相會。
  relation: 本章首次明確宣告神要「住在他們中間」，是整個會幕建造的神學核心。
