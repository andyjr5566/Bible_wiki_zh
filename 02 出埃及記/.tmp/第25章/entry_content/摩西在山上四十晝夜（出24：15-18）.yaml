name: 摩西在山上四十晝夜（出24：15-18）
type: 互文
secondary_types: []
aliases:
- 出24:15-18
status: formal
definition: 出24:15-18記載摩西登上西奈山，進入雲中，在山上停留四十晝夜，耶和華的榮耀在山頂上顯現。這段敘述是神頒布會幕建造指示的直接背景，出25:1即接續此事件，神在山上曉諭摩西關於會幕的樣式。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 出25:1「耶和華曉諭摩西說」直接延續出24:15-18摩西上山進入雲中與神相會的場景。
  relation: 出24:15-18為出25章神啟示會幕樣式提供了時間與空間背景，表明建造指示源於神在榮耀中的直接啟示。
related_entries:
