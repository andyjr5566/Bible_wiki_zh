name: 四活物的形像（結1：5-11）
type: 互文
secondary_types: []
aliases: []
status: formal
definition: 以西結所見四活物的異象，與出埃及記25章施恩座上二基路伯的形像形成互文；基路伯作為神榮耀的侍從與寶座的守護者，在先知異象中進一步啟示其屬天樣式。
accumulations:
- book: 出埃及記
  chapter: 25
  summary: 二基路伯安在施恩座兩頭，高張翅膀遮掩施恩座，臉對臉朝著施恩座。
  relation: 會幕中的基路伯與以西結異象中的四活物同屬天使一類，圍繞神寶座彰顯神的榮耀與聖潔。
