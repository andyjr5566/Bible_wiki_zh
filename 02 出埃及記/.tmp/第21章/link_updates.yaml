book: 出埃及記
chapter: 21
updates:
- title: 太5：21-22
  path: link_folder/互文/太5：21-22.md
  summary: 出21:12-14的殺人律例區分蓄意與誤殺，太5:21-22基督進一步指出動怒與恨弟兄等同殺人的屬靈層面，將律法從行為層面提升到內心層面。
  relation: 出21:12的「打人以致打死的必要把他治死」是太5:21-22所引用「不可殺人」誡命的典章應用；基督將其深化至內心動機。
- title: 加5：1
  path: link_folder/互文/加5：1.md
  summary: 出21:2-6的希伯來奴僕在第七年得自由，預表基督釋放信徒得自由。加5:1宣告「基督釋放了我們，叫我們得以自由」，呼應舊約奴僕釋放條例的恩典精神。
  relation: 出21:2的奴僕自由條例是加5:1屬靈自由的舊約預表；自願為奴的愛（出21:5-6）對比基督裡的自由。
- title: 太5：17
  path: link_folder/互文/太5：17.md
  summary: 出21:1-36的典章是律法的具體應用，太5:17基督宣告「我來不是要廢掉律法，乃是要成全」，典章中公義與人道的原則在基督裡得著更深層的成全。
  relation: 出21章的典章（mishpatim）是太5:17所說基督要成全的律法的一部分；基督將同態復仇法（出21:24）深化為愛與饒恕。
- title: 耶31：33
  path: link_folder/互文/耶31：33.md
  summary: 出21:1的典章是外在的律法條文，耶31:33預言新約「我要將我的律法放在他們裡面，寫在他們心上」，從外在典章轉為內在生命。
  relation: 出21章的典章是舊約外在律法的代表；耶31:33的新約應許將這些典章的原則內化於信徒心中。
- title: 古代近東法典
  path: link_folder/背景/古代近東法典.md
  summary: 出21章的典章與古代近東法典（漢摩拉比法典、埃施嫩納法典）有結構相似性，但以色列律法更注重人道與公義。例如漢摩拉比法典債奴期限為三年，出21:2為六年；漢摩拉比按社會地位差別處罰，出21:24的同態復仇法適用於所有人。
  relation: 出21:2的六年奴僕期限、出21:24的以眼還眼、出21:28-32的牛觸死人條例均可與漢摩拉比法典比較，顯示以色列律法的獨特人道精神。
- title: 希伯來人
  path: link_folder/人物/希伯來人.md
  summary: 出21:2的「希伯來人」指因貧窮或負債賣身為奴的以色列人。此稱呼強調同為神的子民，雖在世上身分不同，但在神面前享有同等的自由權利。原文「希伯來」意為「過河的人」。
  relation: 出21:2-6的希伯來奴僕條例保障同族奴僕的人道待遇，六年後自由釋放，有別於外邦奴隸制度。
- title: 舍客勒
  path: link_folder/原文/舍客勒.md
  summary: 出21:32記載牛觸死奴僕的賠償為「三十舍客勒銀子」，這是古代奴僕的標準身價。舍客勒作為重量與幣制單位，約11.5公克。此金額後來成為猶大賣主的價銀（太26:15）。
  relation: 出21:32的三十舍客勒是舍客勒作為賠償幣制的具體應用案例，也是聖經中唯一明確記載奴僕身價的經文。
