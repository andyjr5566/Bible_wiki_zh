book: 出埃及記
chapter: 12
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: v1,21,28,31,35,50 摩西曉諭、召長老傳達、行禮、法老半夜召見、百姓照摩西的話要金銀衣裳、以色列眾人照耶和華吩咐摩西去行
  relation: 第12章摩西是逾越節設立的傳遞者與出埃及的執行者——v28,50 兩次強調「耶和華怎樣吩咐摩西...以色列人就怎樣行」顯示摩西作為中保的完全順服
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: v1,31,50 與摩西同受曉諭、被法老半夜召見、與摩西同在以色列眾人順服中
  relation: 亞倫在本章與摩西並列但單獨發言/行動減少——本章轉折為摩西單獨成為中保，亞倫同為立約見證人
- title: 法老
  path: link_folder/人物/法老.md
  summary: v29-32 法老長子被殺、夜間與臣僕埃及眾人起來、半夜召摩西亞倫說「起來！連你們帶以色列人，從我民中出去...去事奉耶和華吧...連羊群牛群帶著走吧！並要為我祝福」
  relation: 法老在第12章 完全反轉——從10:28「你再見我的面必死」到本章 v31-32 主動召見、求祝福、徹底降服；10:28 威脅與12:32「為我祝福」形成強烈對比
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: v1,12,29,30,33,37,41,42 耶和華在埃及地曉諭、要巡行埃及地擊殺長子、半夜埃及遍地大哀號、埃及人催促以色列人快快出離、以色列人從蘭塞起行往疏割、正滿430年那一天耶和華的軍隊從埃及地出來
  relation: 埃及作為審判場域與奴役地的雙重身分在本章終結—— Israelites 出埃及的那夜成為「耶和華的夜」(v42)
- title: 蘭塞
  path: link_folder/地點/蘭塞.md
  summary: v37 以色列人從蘭塞起行往疏割——蘭塞作為 Israelites 出埃及的起行地
  relation: 蘭塞在本章首次被明確指出為出埃及的起頭地（也見創47:11 約瑟安置父家於蘭塞）
- title: 疏割
  path: link_folder/地點/疏割.md
  summary: v37 以色列人從蘭塞起行往疏割——出埃及路線的第一站
  relation: 疏割作為出埃及路線第一站在本章首次出現；後續路線在出13-14章延伸
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: v1,11,12,13,14,23,27,29,42,50,51 全章核心施事者——在埃及地曉諭摩西亞倫、設立逾越節、半夜親自巡行擊殺埃及長子、敗壞埃及一切的神、保護以色列家、領以色列軍隊出埃及
  relation: 本章是出埃及記中耶和華作為救贖主最具體彰顯的一章——親自執行 (v12「我要巡行」)、親自保護 (v23「耶和華要巡行擊殺...他看見血...就必越過」)、親自領出 (v51「耶和華將以色列人按著他們的軍隊從埃及地領出來」)
- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: v1,43 兩次「耶和華曉諭摩西亞倫說」—— v1 啟動逾越節設立、v43 啟動逾越節條例補充
  relation: 本章是「耶和華的話臨到」雙重設立 Christianity 立約晚餐基礎——設立逾越節與設定外邦人參與條例
- title: 分別百姓
  path: link_folder/神學/分別百姓.md
  summary: v13,23,27 血記保護、耶和華越過 Israelites 家；v27 「越過以色列人的房屋，救了我們各家」；v36 以色列在埃及人眼前蒙恩
  relation: 第8章蠅災歌珊分別、第9章畜疫 Israelites 牲畜免死、第10章黑暗 Israelites 家有亮光——本章 v7,13,23,27 把分別主題推到血記的核心救贖 culmination
- title: 知道我是耶和華
  path: link_folder/神學/知道我是耶和華.md
  summary: v12「我是耶和華」透過擊殺埃及頭生的、敗壞埃及一切的神來彰顯——同晚耶和華身分在審判與保護兩面同時被認識
  relation: 第7-9章各災「知道我是耶和華」的宣告在第12章具體執行——透過 Egypt 敗壞與 Israelites 蒙救 two-sided 彰顯
- title: 出埃及為要事奉神
  path: link_folder/神學/出埃及為要事奉神.md
  summary: v31 法老終於說「依你們所說的，去事奉耶和華吧」——前9章「容我的百姓去好事奉我」呼聲完全應驗
  relation: 第3章以來「好事奉耶和華」的宣告在本章 v31 法老親口應驗；v50「耶和華怎樣吩咐摩西亞倫，以色列眾人就怎樣行了」 задʻ顯示 Israelites 出 Egypt 即為事奉
- title: 傳於後代
  path: link_folder/神學/傳於後代.md
  summary: v14,17,24,47 「世世代代永遠的定例」四次重複；v26-27 「你們的兒女問...你們就說：這是獻給耶和華逾越節的祭...救了我們各家」——代代教導救贖事件
  relation: 第10章 v2「傳於兒子孫子耳中」預表；第12章 v14,24 逾越節、無酵節「永遠定例」總括—— Israelites 宗教教育核心節期由此設立
- title: "神蹟（miraculous signs）"
  path: "link_folder/神學/神蹟（miraculous signs）.md"
  summary: v12,29-30 耶和華半夜親自巡行、擊殺 Egypt 一切頭生、敗壞一切的神——第十災是空前絕後的最大奇事
  relation: 第11章 v9-10「使我的奇事在 Egypt 地多起來」的預告在第12章具體執行——逾越節當晚是出 Egypt 記中奇事序列的最高點
- title: 神的主權與預定
  path: link_folder/神學/神的主權與預定.md
  summary: v40-41 「Israelites 住在 Egypt 共四百三十年。正滿了四百三十年的那一天，耶和華的軍隊都從 Egypt 地出來了」——預定的時刻精準成就
  relation: 創15:13「四百年」預言、創15:14「後來他們必帶著許多財物出來」預言——在 v40-41 一刻不差地應驗
- title: 法老心剛硬
  path: link_folder/神學/法老心剛硬.md
  summary: v30,33 法老夜間起來、Egypt 眾人都起來；v33 Egypt 人催促 Israelites 快快出離「我們都要死了」——法老最終完全反轉
  relation: 第7-11章「耶和華使法老心剛硬」在本章達到反轉終點——第11章 v10 預告的最後一次明確「剛硬」記載，第12章則顯示法老被末災完全擊潰
- title: "第十災（殺長子之災）"
  path: "link_folder/歷史/第十災（殺長子之災）.md"
  summary: v29-30 半夜耶和華把 Egypt 地所有長子盡都殺了——從坐寶座法老到監中囚虜、以及一切頭生牲畜；Egypt 遍地大哀號、無一家不死一人
  relation: 第11章 v4-5,8 摩西宣告末災的具體執行—— v29-30 是宣告應驗；應驗創15:14「懲罰那國」
- title: 長子之死
  path: link_folder/歷史/長子之死.md
  summary: v29 從坐寶座的法老長子、到被擄囚在監裡之人的長子、一切頭生的牲畜盡都殺了；v30 Egypt 大哀號、無一家不死一人
  relation: 第11章 v5 預告「從坐寶座的法老直到磨子後的婢女」+ 第12章 v29「從坐寶座的法老直到被擄囚在監裡之人」——社會上下全層擊殺預言精准成就
- title: 埃及人給以色列人財物
  path: link_folder/歷史/埃及人給以色列人財物.md
  summary: v35-36 Israelites 照摩西的話向 Egypt 人要金器、銀器、衣裳；耶和華叫百姓在 Egypt 人眼前蒙恩，Egypt 人給他們所要的——把 Egypt 人的財物奪去了
  relation: 第11章 v2-3 吩咐要金器銀器+百姓蒙恩的預言在第12章 v35-36 完全應驗——具體應驗創15:14
- title: 催逼離開
  path: link_folder/歷史/催逼離開.md
  summary: v33 Egypt 人催促百姓、打發他們快快出離那地「我們都要死了」；v39 因被催逼離開 Egypt 不能耽延、生麵未發起、烤成無酵餅
  relation: 第11章 v1 預告「他容你們去的時候，總要催逼你們都從這地出去」+ 第12章 v33,39 精準應驗——「Egypt 人催促」+「生麵未發」是預言的具體執行
- title: 災殃
  path: link_folder/原文/災殃.md
  summary: v13「我一見這血，就越過你們去。我擊殺 Egypt 地頭生的時候，災殃必不臨到你們身上滅你們」——「災殃」原文 nagaʿ 在逾越節血記保護語境中
  relation: 第11章 v1 第十災宣告中 nagaʿ 作擊打性質——第12章 v13 把 nagaʿ 與血記保護並列：災殃臨到 Egypt、越過 Israel
- title: 創十五14 亞伯拉罕之約的財物應驗
  path: "link_folder/互文/創十五14 亞伯拉罕之約的財物應驗.md"
  summary: v35-36 Israelites 照摩西的話向 Egypt 人要金器銀器衣裳、Egypt 人給他們所要的——把 Egypt 人的財物奪去了；創15:14 預言具體成就
  relation: 第11章 v2-3 吩咐應驗創15:14 的預告、第12章 v35-36 具體取得財物——本章是創15:14 預言的最終執行點
- title: 詩七八51、一三六10 擊殺長子
  path: "link_folder/互文/詩七八51、一三六10 擊殺長子.md"
  summary: v29 半夜耶和華擊殺 Egypt 地所有長子——詩78:51「他擊殺 Egypt 一切長子」+詩136:10「稱謝那擊殺 Egypt 之長子的，因他的慈愛永遠長存」直接回顧此事件
  relation: 第11章 v4-5 末災宣告、第12章 v29 具體執行——詩篇救贖史詠唱把第12章 v29 的擊殺長子作為核心記憶
