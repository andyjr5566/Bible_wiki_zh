book: 出埃及記
chapter: 12
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: "v1,21,28,31,35,50 摩西曉諭、召長老傳達、行禮、法老半夜召見、百姓照摩西的話要金銀衣裳、以色列眾人照耶和華吩咐摩西去行"
  relation: "第12章摩西是逾越節設立的傳遞者與出埃及的執行者——v28,50 兩次強調「耶和華怎樣吩咐摩西…以色列人就怎樣行」顯示摩西作為中保的完全順服"
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: "v1,31,50 與摩西同受曉諭、被法老半夜召見、與摩西同在以色列眾人順服中"
  relation: "亞倫在本章與摩西並列但單獨發言與行動減少——本章轉折為摩西單獨成為中保，亞倫同為立約見證人"
- title: 法老
  path: link_folder/人物/法老.md
  summary: "v29-32 法老長子被殺、夜間與臣僕埃及眾人起來、半夜召摩西亞倫說「起來！連你們帶以色列人，從我民中出去…去事奉耶和華吧…連羊群牛群帶著走吧！並要為我祝福」"
  relation: "法老在第12章完全反轉——從10:28「你再見我的面必死」到本章 v31-32 主動召見、求祝福、徹底降服；CT 指出「法老這一個行動直接違反了他自己的話」"
- title: 閒雜人
  path: link_folder/人物/閒雜人.md
  summary: "v38「又有許多閒雜人，並有羊群牛群，和他們一同上去」——閒雜人首次隨以色列人出埃及"
  relation: "《丁道爾》指原文作「混雜群」，字根與8:21 蠅災同；各家或視為日後犯罪之因（民11:4），或如《精讀本》讀為恩典的開口——「通過割禮儀式，他們完全被納入以色列共同體內」，正是 v43-51 條例要處理的問題"
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: "v1,12,29,30,33,37,41,42 耶和華在埃及地曉諭、巡行埃及地擊殺長子、半夜埃及遍地大哀號、埃及人催促以色列人快快出離、以色列人從蘭塞起行往疏割、正滿四百三十年那一天耶和華的軍隊從埃及地出來"
  relation: "埃及作為審判場域與奴役地的雙重身分在本章終結——以色列人出埃及的那夜成為「耶和華的夜」（v42）"
- title: 蘭塞
  path: link_folder/地點/蘭塞.md
  summary: "v37 以色列人從蘭塞起行往疏割——蘭塞是出埃及的起行地"
  relation: "CT 指蘭塞位於歌珊境內，以色列人曾在那裡為埃及人建造積貨城（1:11）——為奴之地成了得自由的起點"
- title: 疏割
  path: link_folder/地點/疏割.md
  summary: "v37 以色列人從蘭塞起行往疏割——出埃及路線的第一站"
  relation: "《串珠》指疏割約在蘭塞東南八十公里，是出埃及後第一個紮營地；《舊約背景註釋》指從蘭塞到疏割約一日腳程，是往東離開埃及的正常路徑"
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: "v1,11,12,13,14,23,27,29,42,50,51 全章核心施事者——在埃及地曉諭摩西亞倫、設立逾越節、半夜親自巡行擊殺埃及長子、敗壞埃及一切的神、保護以色列家、領以色列軍隊出埃及"
  relation: "本章是出埃及記中耶和華作為救贖主最具體彰顯的一章——親自執行（v12「我要巡行」）、親自保護（v23「他看見血…就必越過」）、親自領出（v51）；v42「耶和華的夜」另譯作「耶和華親自守夜」"
- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: "v1,43 兩次「耶和華曉諭摩西、亞倫說」—— v1 啟動逾越節設立、v43 啟動逾越節條例補充"
  relation: "本章「耶和華的話臨到」兩次出現，分別立下節期本身與參與節期的資格；CT 指 v1「在埃及地」暗示逾越節並非在西乃山下首創"
- title: 分別百姓
  path: link_folder/神學/分別百姓.md
  summary: "v13,23,27 血記保護、耶和華越過以色列人的家；v27「越過以色列人的房屋，救了我們各家」；v36 以色列人在埃及人眼前蒙恩"
  relation: "第8章蠅災分別歌珊、第9章畜疫、第10章黑暗中以色列家有亮光——本章把分別主題推到血記這個核心：CT 指「作記號」是神順命之子民的記號"
- title: 知道我是耶和華
  path: link_folder/神學/知道我是耶和華.md
  summary: "v12「又要敗壞埃及一切的神。我是耶和華」——審判埃及諸神與保護以色列，同夜彰顯祂的名"
  relation: "第7-9章各災「知道我是耶和華」的宣告在本章具體執行；CT 指「我是耶和華」意即祂是獨一的真神，凡祂所說的必定成就"
- title: 出埃及為要事奉神
  path: link_folder/神學/出埃及為要事奉神.md
  summary: "v31 法老終於說「依你們所說的，去事奉耶和華吧」——前面各章「容我的百姓去，好事奉我」的要求完全應驗"
  relation: "第3章以來「好事奉耶和華」的宣告在 v31 由法老親口說出；CT 指此時「法老不再提出他的條件，完全照摩西亞倫的要求」"
- title: 傳於後代
  path: link_folder/神學/傳於後代.md
  summary: "v14,17,24「世世代代永遠的定例」；v26-27「你們的兒女問…你們就說：這是獻給耶和華逾越節的祭…救了我們各家」——代代教導救贖事件"
  relation: "第10章 v2「傳於你兒子和你孫子的耳中」的延續；BH 指 v26 預期下一代提問，突顯把信仰傳下去的重要，口傳是古代近東教育的主要方式"
- title: "神蹟（miraculous signs）"
  path: "link_folder/神學/神蹟（miraculous signs）.md"
  summary: "v12,29-30 耶和華半夜親自巡行、擊殺埃及一切頭生的、敗壞埃及一切的神——第十災是空前絕後的最大奇事"
  relation: "第11章 v9「使我的奇事在埃及地多起來」的預告在本章執行——逾越節當晚是出埃及記奇事序列的最高點"
- title: 神的主權與預定
  path: link_folder/神學/神的主權與預定.md
  summary: "v40-41「以色列人住在埃及共有四百三十年。正滿了四百三十年的那一天，耶和華的軍隊都從埃及地出來了」——預定的時刻精準成就"
  relation: "CT 指「正滿了」似乎有意強調連一天也不提早也不延遲；《串珠》則把重點放在「在日期滿足之後，神要將百姓拯救出來」"
- title: 法老心剛硬
  path: link_folder/神學/法老心剛硬.md
  summary: "v30,33 法老與埃及眾人夜間都起來；v33 埃及人催促以色列人快快出離「我們都要死了」——剛硬到此完全被擊潰"
  relation: "第7-11章「耶和華使法老的心剛硬」在本章走到終點——第11章 v10 是最後一次明確記載，本章顯示法老被末災完全擊潰、主動催逼以色列人離開"
- title: "第十災（殺長子之災）"
  path: "link_folder/歷史/第十災（殺長子之災）.md"
  summary: "v29-30 半夜耶和華把埃及地所有長子盡都殺了——從坐寶座的法老到被擄囚在監裡之人，以及一切頭生的牲畜；埃及遍地大哀號、無一家不死一個人的"
  relation: "第11章 v4-6 摩西宣告末災，本章 v29-30 是宣告的應驗；BH 讀出埃及的哀號與以色列的靜默形成強烈對比"
- title: 長子之死
  path: link_folder/歷史/長子之死.md
  summary: "v29 從坐寶座的法老的長子、到被擄囚在監裡之人的長子、一切頭生的牲畜盡都殺了；v30 埃及大哀號、無一家不死一個人的"
  relation: "第11章 v5 預告「從坐寶座的法老直到磨子後的婢女」，本章 v29 作「直到被擄囚在監裡之人」——CT 指兩者相當，都意指社會最上層直到最卑賤的庶民"
- title: 埃及人給以色列人財物
  path: link_folder/歷史/埃及人給以色列人財物.md
  summary: "v35-36 以色列人照摩西的話向埃及人要金器、銀器和衣裳；耶和華叫百姓在埃及人眼前蒙恩，以致埃及人給他們所要的——他們就把埃及人的財物奪去了"
  relation: "第11章 v2-3 的吩咐在本章應驗，並應驗創15:14；CT 指「眼前蒙恩」意即心甘情願，所拿的都是埃及人同意給的；《啟導本》誠實指出這批金銀後來既造了金牛犢（32:2-4），也建了會幕（35:22-24）"
- title: 催逼離開
  path: link_folder/歷史/催逼離開.md
  summary: "v33 埃及人催促百姓、打發他們快快出離那地「我們都要死了」；v39 因被催逼離開埃及不能耽延、生麵沒有發起、烤成無酵餅"
  relation: "第11章 v1 預告「總要催逼你們都從這地出去」在本章應驗；CT 指「從前是強留，現在催促，兩者都出於強烈的意願」，並應驗6:1「趕出」的預言"
- title: 災殃
  path: link_folder/原文/災殃.md
  summary: "v13「我擊殺埃及地頭生的時候，災殃必不臨到你們身上滅你們」——災殃在逾越節血記保護的語境中出現"
  relation: "CT 的原文字義：「災殃」是致命的重擊、瘟疫；第11章 v1 的災殃是擊打性質，本章 v13 把它與血記並列——災殃臨到埃及、越過以色列"
- title: "寄居的（ger）"
  path: "link_folder/原文/寄居的（ger）.md"
  summary: "v45「寄居的和雇工人都不可吃」；v48「若有外人寄居在你們中間，願向耶和華守逾越節，他所有的男子務要受割禮」"
  relation: "《中文聖經註釋》辨析本章兩個「寄居的」不是同一字：v45 的 toshav 含短暫寄居之意，如今日的遊客，不知以色列人的習俗；v48 的 ger 是長居甚至終生的寄居，受割禮後「他也就像本地人一樣」"
- title: "割禮作為立約記號"
  path: "link_folder/主題/割禮作為立約記號.md"
  summary: "v44,48 用銀子買的奴僕既受了割禮就可以吃；外人寄居的所有男子務要受割禮，然後才容他前來遵守，他也就像本地人一樣；未受割禮的都不可吃這羊羔"
  relation: "本章把割禮定為參與逾越節的唯一界線——《中文聖經註釋》：「不可喫羊羔的人，並不是血統的問題，也不是住地的問題，而是被認可與否的問題。被認可的條件，是割禮」；並由此推出 v49「以色列實質上是一個宗教的結合體，而不是一個血緣和地緣的結合體」"
- title: "創十五14 亞伯拉罕之約的財物應驗"
  path: "link_folder/互文/創十五14 亞伯拉罕之約的財物應驗.md"
  summary: "v35-36 以色列人向埃及人要金器銀器衣裳、埃及人給他們所要的——「他們就把埃及人的財物奪去了」"
  relation: "創15:14「後來他們必帶著許多財物從那裡出來」在本章最終執行；《精讀本》讀為「如同戰場上的勝利者獲取戰利品」，《丁道爾》指本節字眼故意令人想起3:22 的應許"
- title: "詩七八51、一三六10 擊殺長子"
  path: "link_folder/互文/詩七八51、一三六10 擊殺長子.md"
  summary: "v29 半夜耶和華擊殺埃及地所有的長子——詩78:51、詩136:10 兩次以此為神救贖大能的記念"
  relation: "第11章 v4-5 宣告、本章 v29 執行——詩篇的救贖史詠唱把擊殺長子當作以色列信仰的核心記憶"
