book: 出埃及記
chapter: 39
updates:
- title: 以弗得
  path: link_folder/原文/以弗得.md
  summary: 出39:2-7 用金線和藍色、紫色、朱紅色線並撚的細麻做以弗得；把金子錘成薄片剪出線來與藍紫朱紅線用巧匠的手工一同繡上；又為以弗得做兩條相連的肩帶接連在以弗得的兩頭；其上巧工織的帶子和以弗得一樣的做法用以束上與以弗得接連一塊；又琢出兩塊紅瑪瑙鑲在金槽上，按著以色列兒子的名字雕刻；將這兩塊寶石安在以弗得的兩條肩帶上為以色列人做紀念石。KC：a golden thread woven in the ephod is a picture of Divine glory shining through all the traits of the holy Manhood of the Lord Jesus。CT靈意：以弗得表徵政權擔在基督的肩頭上（賽9:6）。
  relation: 本章首次記載以弗得的實際製作，並補充了出28章未提及的細節——金子錘成薄片剪出線來繡入（v3）；金線表徵神性的榮耀貫穿基督人性的各樣美德；肩帶上的兩塊紅瑪瑙刻以色列十二子名字，表徵大祭司肩負全體神子民。
- title: 胸牌（決斷胸牌）
  path: link_folder/原文/胸牌（決斷胸牌）.md
  summary: 出39:8-21 用巧匠的手工做胸牌，和以弗得一樣的做法，用金線與藍色紫色朱紅色線並撚的細麻做的；胸牌是四方的疊為兩層，長一虎口寬一虎口；上面鑲著寶石四行共十二顆，按著以色列十二個兒子的名字刻十二個支派的名字；用精金擰成如繩子的鍊子穿過胸牌兩頭的環子，又把鍊子的那兩頭接在兩槽上安在以弗得前面肩帶上；用一條藍細帶子把胸牌的環子和以弗得的環子繫住，使胸牌貼在以弗得巧工織的帶子上不可與以弗得離縫。CT：胸牌表徵基督胸懷眾聖徒，在神面前作紀念。
  relation: 本章首次記載胸牌的實際製作——十二寶石刻十二支派名字，表徵全體神子民都在大祭司基督的胸懷中被帶到神面前；藍細帶子將胸牌與以弗得緊繫不可離縫，表徵基督的愛與公義（以弗得）和胸懷（胸牌）永不分離。
- title: 十二寶石（胸牌寶石）
  path: link_folder/主題/十二寶石（胸牌寶石）.md
  summary: 出39:10-14 胸牌上鑲著寶石四行：第一行紅寶石、紅璧璽、紅玉；第二行綠寶石、藍寶石、金鋼石；第三行紫瑪瑙、白瑪瑙、紫晶；第四行水蒼玉、紅瑪瑙、碧玉。這都鑲在金槽中。這些寶石都是按著以色列十二個兒子的名字，彷彿刻圖書，刻十二個支派的名字。
  relation: 本章首次記載十二寶石的實際鑲嵌——四行三列共十二顆，每顆刻一個支派名字；寶石各不相同卻同鑲於金槽中，表徵十二支派各有獨特榮美卻同建於神性（金）的根基上。
- title: 外袍（以弗得的外袍）
  path: link_folder/主題/外袍（以弗得的外袍）.md
  summary: 出39:22-26 他用織工做以弗得的外袍，顏色全是藍的；袍上留一領口，口的周圍織出領邊來彷彿鎧甲的領口免得破裂；在袍子底邊上用藍色紫色朱紅色線並撚的細麻做石榴；又用精金做鈴鐺，把鈴鐺釘在袍子周圍底邊上的石榴中間：一個鈴鐺一個石榴交替排列。CT靈意：藍色全袍表徵屬天性質；鈴鐺表徵見證，石榴表徵生命的豐盛。KC：bells of pure gold between pomegranates。
  relation: 本章首次記載外袍的實際製作——全藍的袍子表徵基督完全屬天的性質；底邊鈴鐺與石榴交替，表徵見證（鈴鐺的聲音）與生命果子（石榴）的平衡。
- title: 內袍（雜色內袍）
  path: link_folder/主題/內袍（雜色內袍）.md
  summary: 出39:27 他用織成的細麻布為亞倫和他的兒子做內袍。細麻布表徵聖潔的義行（啟19:8）；內袍是貼身衣物，表徵基督內在的聖潔品格。
  relation: 本章首次記載內袍的實際製作——細麻布織成，為亞倫和他兒子共用；內袍表徵基督和信徒內在的聖潔，是事奉神的基礎。
- title: 冠冕（裹頭巾）
  path: link_folder/原文/冠冕（裹頭巾）.md
  summary: 出39:28,30-31 並用細麻布做冠冕和華美的裹頭巾；用精金做聖冠上的牌，在上面按刻圖書之法刻著「歸耶和華為聖」；又用一條藍細帶子將牌繫在冠冕上。CT：冠冕表徵基督的榮耀與權柄；金牌刻「歸耶和華為聖」表徵基督完全分別為聖歸於神。
  relation: 本章首次記載冠冕與聖冠牌的實際製作——精金聖冠牌以藍細帶子繫於冠冕上，表徵基督的聖潔（歸耶和華為聖）以屬天的聯結（藍帶子）繫於祂的榮耀（冠冕）之上。
- title: 褲子（細麻布褲子）
  path: link_folder/主題/褲子（細麻布褲子）.md
  summary: 出39:28 用撚的細麻布做褲子。褲子為遮蓋下體（出28:42-43），表徵信徒在神面前需要遮蓋肉體的羞恥。
  relation: 本章首次記載褲子的實際製作——撚的細麻布製成，表徵以聖潔的義行遮蓋肉體的羞恥，使事奉者在神面前不致露醜。
- title: 腰帶（繡花腰帶）
  path: link_folder/主題/腰帶（繡花腰帶）.md
  summary: 出39:29 又用藍色、紫色、朱紅色線並撚的細麻，以繡花的手工做腰帶。腰帶用以束腰，表徵以真理和公義約束自己（弗6:14）。
  relation: 本章首次記載腰帶的實際製作——藍紫朱紅線與細麻繡花而成，表徵事奉者以屬天、君尊、犧牲的真理約束自己，以聖潔束腰。
- title: 聖衣（祭司聖服）
  path: link_folder/主題/聖衣（祭司聖服）.md
  summary: 出39:1,41 比撒列用藍色紫色朱紅色線做精緻的衣服在聖所用以供職，又為亞倫做聖衣；精工做的禮服和祭司亞倫並他兒子在聖所用以供祭司職分的聖衣。CT：聖衣的主要構成材料必須是屬天超越（藍色）、君尊（紫色）、蒙恩得救的信徒（朱紅色線），才能供祭司的職分；亞倫預表基督，祂今天在天上在神面前作大祭司（來4:14-7:28）。KC：this chapter contains the expression 'as the LORD commanded Moses' ten times——it emphasizes the importance of the priestly garments。
  relation: 本章完成全部祭司聖衣的實際製作——從以弗得、胸牌、外袍到內袍、冠冕、褲子、腰帶，共七件；聖衣表徵基督是我們的榮耀和華美，我們總要披戴基督（羅13:14）。
- title: 金線
  path: link_folder/原文/金線.md
  summary: 出39:2-3 用金線和藍色紫色朱紅色線並撚的細麻做以弗得；把金子錘成薄片剪出線來，與藍紫朱紅線用巧匠的手工一同繡上。KC：a golden thread woven in the ephod is a picture of Divine glory (gold) shining through all the traits of the holy Manhood of the Lord Jesus；all truths concerning His person are interrelated——nothing can be separated, although there may be distinction。
  relation: 本章首次記載金線的實際製作工藝——金子錘成薄片再剪出線來繡入以弗得；金線表徵神性的榮耀貫穿基督人性的各樣美德，不可分離卻有區別（神人二性）。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出39:1,5,7,21,26,29,31,32,42,43 「是照耶和華所吩咐摩西的」在本章出現十次——從以弗得（v1）、腰帶（v5）、寶石（v7）、胸牌繫住（v21）、鈴鐺石榴（v26）、腰帶（v29）、聖冠牌（v31）、完工總結（v32,42,43）。KC：this chapter contains the expression 'as the LORD commanded Moses' ten times——it emphasizes the importance of the priestly garments and leaves nothing to the imagination of man。CT：顯示摩西準確而詳細地順服了神命令中的每個細節。
  relation: 本章是「山上的樣式」在祭司聖衣層面的全面執行——「是照耶和華所吩咐摩西的」十次重述為全書之冠，顯明聖衣的每一細節（材料、顏色、寶石排列、鈴鐺石榴交替）都不可憑人意更改。
- title: 比撒列（Bezalel）
  path: link_folder/人物/比撒列（Bezalel）.md
  summary: 出39:1 比撒列用藍色紫色朱紅色線做精緻的衣服在聖所用以供職，又為亞倫做聖衣。比撒列不僅製作會幕器具（出37-38章），也親手製作祭司聖衣。
  relation: 本章記載比撒列在聖衣製作中的角色——從會幕建築（出36-38）到祭司聖衣（出39），比撒列的工藝涵蓋了神居所的全部範圍。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 出39:32-43 帳幕一切的工就這樣做完了——凡耶和華所吩咐摩西的以色列人都照樣做了；他們送到摩西那裡：帳幕和帳幕的一切器具、染紅公羊皮的蓋和海狗皮的頂蓋和遮掩櫃的幔子、法櫃和櫃的杠並施恩座、桌子和桌子的一切器具並陳設餅、精金的燈臺和擺列的燈盞與燈臺的一切器具並點燈的油、金壇膏油馨香的香料會幕的門簾、銅壇和壇上的銅網壇的杠並壇的一切器具洗濯盆和盆座、院子的帷子和柱子並帶卯的座院子的門簾繩子橛子並帳幕和會幕中一切使用的器具、精工做的禮服和祭司亞倫並他兒子在聖所用以供祭司職分的聖衣。KC：Moses observed that everything was made according to the example shown to him on the mountain（Heb 8:5）；the tabernacle has not yet been set up, but everything is ready。
  relation: 本章是會幕建造的完工總結——從出36章的建築結構、出37章的內部器具、出38章的外院器具，到出39章的祭司聖衣，全部完工；摩西檢查後給他們祝福，會幕已預備好等待立起（出40章）。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出39章 皂莢木在會幕器具中廣泛使用（出36-38章），本章雖以聖衣為主，但完工清單（v33-40）回顧了所有皂莢木製作的器具——板、閂、杠、柱子等。
  relation: 本章的完工清單回顧了皂莢木在整個會幕中的使用，皂莢木作為會幕骨架的通用材料，其堅固耐腐的特性貫穿全部建造。
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: 出39:1-3,5,8,24,29 以弗得、胸牌、外袍石榴、腰帶均用藍色紫色朱紅色線。三色線從會幕幔子（出36章）延伸到祭司聖衣（出39章），貫穿整個會幕的紡織品。CT靈意：藍色線表徵屬天（出24:10）；紫色線表徵君尊；朱紅色線表徵流血犧牲。
  relation: 本章記載三色線在祭司聖衣中的全面使用——從以弗得到腰帶，藍紫朱紅貫穿全部七件聖衣；三色線從會幕幔子延伸到祭司身上，表徵基督屬天、君尊、犧牲的三重性質不僅覆蓋神的居所，也穿戴在事奉者身上。
