  - name: "摩西的祝福"
    type: "事件"
    evidence: "出39:42-43 這一切工作都是以色列人照耶和華所吩咐摩西做的；耶和華怎樣吩咐的他們就怎樣做了；摩西看見一切的工都做成了就給他們祝福。KC：Moses observed that everything was made according to the example shown to him on the mountain（Heb 8:5）；Moses blessed them——thus the Lord Jesus looks at all our work and blesses us to the degree of all our obedience。此為會幕建造完工的總結場景，摩西以祝福回應百姓的順服。建議新建條目"
    surfaces:
      - phrase: "摩西看見一切的工都做成了，就給他們祝福"
        verses: [43]

