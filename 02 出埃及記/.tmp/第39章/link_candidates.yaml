  - name: "鈴鐺與石榴（大祭司袍子）"
    type: "原文"
    evidence: "出39:24-26 在袍子底邊上用藍色紫色朱紅色線並撚的細麻做石榴；又用精金做鈴鐺，把鈴鐺釘在袍子周圍底邊上的石榴中間：一個鈴鐺一個石榴交替排列。CT：鈴鐺表徵見證，石榴表徵生命的豐盛。KC：bells of pure gold between the pomegranates。BH：the alternating bells and pomegranates symbolize the balance of proclamation and fruitfulness。建議新建條目"
