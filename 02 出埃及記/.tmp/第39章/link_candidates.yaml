  - name: "歸耶和華為聖"
    type: "神學"
    evidence: "出39:30-31 他用精金做聖冠上的牌，在上面按刻圖書之法刻著「歸耶和華為聖」；又用一條藍細帶子將牌繫在冠冕上。已有條目「聖潔」等可涵蓋，或B類累積至相關條目"
    surfaces:
