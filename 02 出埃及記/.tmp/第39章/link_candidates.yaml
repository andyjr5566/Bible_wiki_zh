book: "出埃及記"
chapter: 39
candidates:
  - name: "以弗得"
    type: "原文"
    evidence: "出39:2-7 用金線和藍色、紫色、朱紅色線並撚的細麻做以弗得；把金子錘成薄片剪出線來與藍紫朱紅線用巧匠的手工一同繡上；又為以弗得做兩條相連的肩帶接連在以弗得的兩頭；其上巧工織的帶子和以弗得一樣的做法用以束上與以弗得接連一塊；又琢出兩塊紅瑪瑙鑲在金槽上，按著以色列兒子的名字雕刻；將這兩塊寶石安在以弗得的兩條肩帶上為以色列人做紀念石。KC：a golden thread woven in the ephod is a picture of Divine glory shining through all the traits of the holy Manhood of the Lord Jesus。已有條目「以弗得」"
    surfaces:
      - phrase: "以弗得"
        verses: [2, 3, 4, 5, 6, 7, 8, 19, 20, 21, 22]

  - name: "胸牌（決斷胸牌）"
    type: "原文"
    evidence: "出39:8-21 用巧匠的手工做胸牌，和以弗得一樣的做法，用金線與藍色紫色朱紅色線並撚的細麻做的；胸牌是四方的疊為兩層，長一虎口寬一虎口；上面鑲著寶石四行：紅寶石紅璧璽紅玉、綠寶石藍寶石金鋼石、紫瑪瑙白瑪瑙紫晶、水蒼玉紅瑪瑙碧玉，都鑲在金槽中；這些寶石按著以色列十二個兒子的名字刻十二個支派的名字；用精金擰成如繩子的鍊子；做兩個金槽和兩個金環安在胸牌的兩頭；把那兩條擰成的金鍊子穿過胸牌兩頭的環子；又把鍊子的那兩頭接在兩槽上安在以弗得前面肩帶上；做兩個金環安在胸牌的兩頭在以弗得裡面的邊上；又做兩個金環安在以弗得前面兩條肩帶的下邊挨近相接之處在以弗得巧工織的帶子以上；用一條藍細帶子把胸牌的環子和以弗得的環子繫住使胸牌貼在以弗得巧工織的帶子上不可與以弗得離縫。已有條目「胸牌（決斷胸牌）」"
    surfaces:
      - phrase: "胸牌"
        verses: [8, 9, 10, 15, 16, 17, 19, 21]

  - name: "十二寶石（胸牌寶石）"
    type: "主題"
    evidence: "出39:10-14 胸牌上鑲著寶石四行，每行三顆共十二顆，按著以色列十二個兒子的名字刻十二個支派的名字。已有條目「十二寶石（胸牌寶石）」"
    surfaces:
      - phrase: "寶石"
        verses: [10, 11, 12, 13, 14]

  - name: "外袍（以弗得的外袍）"
    type: "主題"
    evidence: "出39:22-26 他用織工做以弗得的外袍，顏色全是藍的；袍上留一領口，口的周圍織出領邊來彷彿鎧甲的領口免得破裂；在袍子底邊上用藍色紫色朱紅色線並撚的細麻做石榴；又用精金做鈴鐺，把鈴鐺釘在袍子周圍底邊上的石榴中間：一個鈴鐺一個石榴，一個鈴鐺一個石榴，在袍子周圍底邊上用以供職。已有條目「外袍（以弗得的外袍）」"
    surfaces:
      - phrase: "外袍"
        verses: [22, 23, 24, 25, 26]

