  relation: 第13章摩西作為耶和華中保——曉諭+百姓傳遞+歷史應驗者（帶約瑟骸骨）；從第12章出埃及執行者延伸到第13章信仰傳遞者
- title: 法老
  path: link_folder/人物/法老.md
  summary: v15,17 v15「那時法老幾乎不容我們去」回顧剛硬；v17「法老容百姓去的時候」
  relation: 本章對法老的回顧——用末災擊殺長子的歷史回顧來設立頭生條例「耶和華就把埃及地所有頭生的...都殺了，因此我把一切頭生的公牲畜獻給耶和華為祭」
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: v19 摩西把約瑟骸骨一同帶去——約瑟曾叫以色列人嚴嚴起誓說「神必眷顧你們，你們要把我的骸骨從這裡一同帶上去」
  relation: 創50:25 約瑟臨終遺命在400+年後具體應驗——出埃及同時應驗先祖信心遺命；約書亞記24:32 埋骸骨於示劍完成
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: v3,5,9,15,17,18 為奴之家、用大能的手領出來、恐怕百姓回埃及、以色列人出埃及地
  relation: 第13章把「埃及」從地理名詞轉為屬靈記號——「為奴之家」象徵罪的轄制、被耶和華大能的手領出；後續紅海曠野路、雲柱火柱引導
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: v5,11 耶和華領進迦南人、赫人、亞摩利人、希未人、耶布斯人之地——向祖宗起誓應許給以色列的那地
  relation: 本章把「進迦南」從未來應許（第6章）推進到具體路線規劃（v17-18 繞道走紅海曠野）；進迦南應許需要繞道屬靈操練
- title: 流奶與蜜之地
  path: link_folder/神學/流奶與蜜之地.md
  summary: v5 向祖宗起誓應許給你那流奶與蜜之地——本章在出埃及後重申應許地的豐富
  relation: 創15:18-21、出3:8,17、出13:5——應許地特性「流奶與蜜」貫穿出埃及記
- title: 疏割
  path: link_folder/地點/疏割.md
  summary: v20 從疏割起行、在曠野邊的以倘安營——疏割作為出埃及第二站
  relation: 第12章 v37 以色列從蘭塞起行往疏割、第13章 v20 從疏割起行往以倘——疏割是出埃及路線的轉接站
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: v1,5,8,9,11,12,14,15,16,21,22 全章核心施事者——曉諭、領進迦南、大能的手、頭生歸祂為聖、雲柱火柱日間夜間引導
  relation: 本章耶和華既是「領出埃及的救贖主」也是「日間夜間引導百姓的同行神」——v21-22 雲柱火柱「總不離開百姓的面前」
- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: v1「耶和華曉諭摩西說」——啟動頭生條例設立
  relation: 第12章雙重曉諭（逾越節+條例補充）、第13章再次曉諭（頭生條例）——出12-13章連續三章由「耶和華的話」設立以色列核心節例
- title: 神的主權與預定
  path: link_folder/神學/神的主權與預定.md
  summary: v17-18 非利士地道路雖近、神卻不領他們從那裡走——神領百姓繞道行走紅海曠野路；神的護理與引導超越人的判斷
  relation: 神主權在本章具體彰顯：神不讓百姓走捷徑而是繞道——因神知道百姓生命未成熟、引導他們走適合他們屬靈狀態的路；預表新約：「我們曉得萬事都互相效力，叫愛神的人得益處」（羅8:28）
- title: 傳於後代
  path: link_folder/神學/傳於後代.md
  summary: v8,14,16 v8「你要告訴你的兒子」、v9「在手上作記號、額上記念」、v14「日後你的兒子問...你就說」、v16「在手上作記號、額上作經文」——代代信仰教育
  relation: 第12章 v26-27 兒女問父代答、第13章 v8,14 兒子問父代答——救贖記憶的代代傳遞具體模式設立；v9,16「手上記號、額上經文」發展為猶太人 tefillin
- title: 出埃及為要事奉神
  path: link_folder/神學/出埃及為要事奉神.md
  summary: v3「你們要記念從埃及為奴之家出來的這日」、v8「耶和華在我出埃及的時候為我所行的事」、v14「耶和華用大能的手將我們從埃及為奴之家領出來」——記念出埃及是信仰教育的核心
  relation: 出12章出埃及完成、第13章 v3-9, 14-16 設立記念教育——「為奴之家」vs「事奉耶和華」的對比貫穿全章
- title: 亞筆月
  path: link_folder/原文/亞筆月.md
