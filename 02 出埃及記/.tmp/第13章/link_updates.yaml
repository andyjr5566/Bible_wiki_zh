book: 出埃及記
chapter: 13
updates:
- title: 無酵餅
  path: link_folder/原文/無酵餅.md
  summary: "v6-7「你要吃無酵餅七日，到第七日要向耶和華守節」；「在你四境之內不可見有酵的餅，也不可見發酵的物」——無酵節條例的重申"
  relation: "第12章設立無酵節，本章重申並把它與頭生分別為聖並列；KC 指出「真正與世界分別、獻身給神，就沒有酵的地位」——成聖與無酵屬於彼此"
- title: 出埃及
  path: link_folder/歷史/出埃及.md
  summary: "v8「這是因耶和華在我出埃及的時候為我所行的事」——父親向兒子述說出埃及，是個人的見證而非歷史課"
  relation: "本章把出埃及從事件轉為記憶的機制：曆法（亞筆月）、節期（無酵節）、飲食（無酵餅）、家庭問答（v8, 14）——KC：「這解釋不是一篇神學論文，而是一家之主個人的見證」"
- title: 利未人代替長子
  path: link_folder/神學/利未人代替長子.md
  summary: "v13「凡你兒子中頭生的都要贖出來」——長子必須被贖，本章未言贖法，民3:12 以利未人代替、民18:16 定贖價五舍客勒"
  relation: "《丁道爾》：「耶和華為自己揀選了利未人，來代替以色列的一切長子。就如某隻羊羔代替某位長子，利未人也可代替全部的以色列人」；《中文聖經註釋》另算出頭生的多出利未人273名，各繳五舍客勒交給亞倫（民3:46-51）"
- title: 長子之死
  path: link_folder/歷史/長子之死.md
  summary: "v15「那時法老幾乎不容我們去，耶和華就把埃及地所有頭生的，無論是人是牲畜，都殺了」——第十災被追述為獻頭生與贖長子的緣由"
  relation: "第12章 v29 的事件在本章成為條例的根據：「因此，我把一切頭生的公牲畜獻給耶和華為祭，但將頭生的兒子都贖出來」——擊殺長子之夜，是以色列一切頭生歸神的理由"
- title: 以色列人的軍隊
  path: link_folder/神學/以色列人的軍隊.md
  summary: "v18「以色列人出埃及地，都帶著兵器上去」——原文作「列陣」，以軍隊的陣容前進"
  relation: "12:41「耶和華的軍隊」的延續；《每日研經叢書》指這是要強調他們不是散兵游勇之逃命——「凡是神掌管之處，急速不會變成恐慌」；但《啟導本》誠實指出這枝毫無訓練的軍隊決非埃及軍隊的對手，他們能勝是因為耶和華為他們爭戰（14:14）"
