book: 出埃及記
chapter: 1
candidates:
  - name: 以色列
    type: 原文
    evidence: 1、7、9、12-13、20節；「以色列的眾子」承接創世記；在埃及生養眾多、極其強盛
  - name: 雅各
    type: 人物
    evidence: 1、5節；眾子各帶家眷與雅各一同來到埃及；凡從雅各而生的共七十人
  - name: 埃及
    type: 地點
    evidence: 1、5、8節；雅各家寄居之地，也是後來為奴之地
  - name: 約瑟
    type: 人物
    evidence: 5-6、8節；已經在埃及；他和那一代都死了；新王不認識約瑟
  - name: 流便
    type: 人物
    evidence: 2節；雅各長子（利亞所生）
  - name: 西緬
    type: 人物
    evidence: 2節；利亞所生
  - name: 利未
    type: 人物
    evidence: 2節；利亞所生；摩西與亞倫從此支派而出
  - name: 猶大（雅各之子）
    type: 人物
    evidence: 2節；利亞所生；主耶穌從他而出
    surfaces:
      - {phrase: 猶大, verses: [2]}
  - name: 以薩迦（價值）
    type: 人物
    evidence: 3節；利亞所生
    surfaces:
      - {phrase: 以薩迦, verses: [3]}
  - name: 西布倫（同住）
    type: 人物
    evidence: 3節；利亞所生
    surfaces:
      - {phrase: 西布倫, verses: [3]}
  - name: 便雅憫
    type: 人物
    evidence: 3節；拉結所生
  - name: 但（審判）
    type: 人物
    evidence: 4節；辟拉所生
    surfaces:
      - {phrase: 但, verses: [4]}
  - name: 拿弗他利
    type: 人物
    evidence: 4節；辟拉所生
  - name: 迦得（萬幸）
    type: 人物
    evidence: 4節；悉帕所生
    surfaces:
      - {phrase: 迦得, verses: [4]}
  - name: 亞設（有福）
    type: 人物
    evidence: 4節；悉帕所生
    surfaces:
      - {phrase: 亞設, verses: [4]}
  - name: 法老
    type: 人物
    evidence: 11、19、22節；為他建造積貨城；收生婆向他回話；他吩咐眾民把男孩丟在河裡
  - name: 施弗拉
    type: 人物
    evidence: 15節；希伯來收生婆之一；名字意為「秀麗、佳美」——法老無名，她卻留名
  - name: 普阿
    type: 人物
    evidence: 15節；希伯來收生婆之一；名字意為「光耀、芳香」
  - name: 比東
    type: 地點
    evidence: 11節；積貨城之一；考證為開羅東北約六十哩的拉塔巴遺址
  - name: 蘭塞
    type: 地點
    evidence: 11節；積貨城之一；即達巴遺址，曾為許克所斯首都亞華里斯
  - name: 雅各家七十人與七十五人
    type: 解經爭議
    evidence: 5節；「凡從雅各而生的，共有七十人」——徒7:14 的七十五人依七十士譯本，計算範圍不同
    surfaces:
      - {phrase: 雅各而生的，共有七十人, verses: [5]}
  - name: 生養眾多與治理
    type: 主題
    evidence: 7節；「生養眾多、繁茂、強盛、滿了那地」——原文刻意重複創1:28 的祝福用詞
    surfaces:
      - {phrase: 生養眾多, verses: [7]}
  - name: 積貨城制度
    type: 歷史
    evidence: 11節；積貨城兼具儲糧、行政與軍事功能，是各區的地理與活動中心
    surfaces:
      - {phrase: 積貨城, verses: [11]}
  - name: 苦害中仍然增長
    type: 神學
    evidence: 12節；「越發苦害他們，他們越發多起來，越發蔓延」——法老的巧計弄巧成拙
    surfaces:
      - {phrase: 越發多起來，越發蔓延, verses: [12]}
  - name: 埃及的強迫勞役與製磚
    type: 歷史
    evidence: 14節；和泥、做磚、田間各樣的工；埃及少雨，磚不經火燒，摻碎草曬乾
    surfaces:
      - {phrase: 做苦工, verses: [14]}
  - name: 古代收生婆
    type: 文化
    evidence: 15節；收生婆不只助產，也是受孕、妊娠、生產、育嬰全程的顧問
    surfaces:
      - {phrase: 收生婆, verses: [15]}
  - name: 敬畏神
    type: 神學
    evidence: 17、21節；「但是收生婆敬畏神」；「收生婆因為敬畏神，神便叫她們成立家室」
  - name: 順服神勝過君王命令
    type: 神學
    evidence: 17節；「不照埃及王的吩咐行」——順從神，不順從人（徒5:29）
    surfaces:
      - {phrase: 不照埃及王的吩咐行, verses: [17]}
  - name: 神保守救贖計畫中的生命
    type: 神學
    evidence: 17節；「竟存留男孩的性命」——原文含「任令甚至幫助其存活」之意
    surfaces:
      - {phrase: 存留男孩的性命, verses: [17]}
  - name: 法老與希律殺害男嬰的對照
    type: 互文
    evidence: 22節；法老吩咐眾民把男孩丟在河裡——與希律殺伯利恆男嬰對照（太2:16；啟12:4）
    surfaces:
      - {phrase: 法老吩咐他的眾民, verses: [22]}
