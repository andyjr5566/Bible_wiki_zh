name: 神的指頭（路11：20）
type: 互文
secondary_types: []
aliases:
- 神的指頭
status: formal
definition: 「神的指頭」在出埃及記31章18節中指神親自將十誡寫在兩塊石版上，象徵神直接的能力與權威，而非字面上的肉身手指。此一表達在路加福音11章20節中再次出現，耶穌說「我若靠著神的能力（原文作神的指頭）趕鬼」，將舊約中神頒佈律法的能力，連結到新約中基督藉神能力趕鬼的事工。
development: 出埃及記使用「神的指頭」強調法版上的誡命是神親自的工作，具有不可變更的權威。路加福音11章20節引用相同的喻象，說明耶穌趕鬼的神蹟同樣是神直接能力的彰顯。這構成了舊約律法頒佈與新約國度權能展現之間的互文關聯，皆指向神親自的介入與作為。
accumulations:
