name: 亞何利亞伯（Oholiab）
type: 人物
secondary_types: []
aliases:
- 亞何利亞伯
status: formal
definition: 亞何利亞伯是但支派中亞希撒抹的兒子，神分派他與比撒列同工，擔任建造會幕的助手。他的名字原文意思是「父親的帳幕」或「父神是我的帳幕」，非常貼切地表達了他對建造會幕的委身。他與比撒列一同負責建造會幕及其中一切器物，並教導其他同工。
development: 亞何利亞伯作為比撒列的副手，突顯了神工作中同工配搭的重要性。但支派並非領導支派，但神的恩典也使用但支派的人，表明神的揀選不受人的背景限制。他的角色說明了在建造神的居所時，需要不同恩賜的人彼此相助、互相支援。
accumulations:
- book: 出埃及記
  chapter: 31
  summary: 神分派但支派的亞何利亞伯與比撒列同工，並賜智慧給所有心裡有智慧的工匠。
  relation: 亞何利亞伯作為助手與比撒列配搭，表徵為著建造教會須彼此相助、同心同工。
