name: 比撒列（Bezalel）
type: 人物
secondary_types: []
aliases:
- 比撒列
status: formal
definition: 比撒列是猶大支派中戶珥的孫子、烏利的兒子，神親自提名選召他作建造會幕的工頭。他的名字原文意思是「在神的庇蔭之下」，表徵有分於建造教會何等有福。神以祂的靈充滿他，使他有智慧、聰明、知識，能想出巧工，用金、銀、銅製造各物，又能刻寶石、雕刻木頭，作各樣的工。
development: 比撒列是聖經中第一位被明確描述為被神的靈充滿以執行特定任務的人。他的選召強調了神的主權揀選，其家族背景（祖父戶珥曾扶助摩西）顯示了信心的傳承。他與亞何利亞伯同工，並教導其他有智慧的人一同建造會幕，預表了建造教會需要倚靠聖靈的能力與多樣的恩賜配搭。
accumulations:
- book: 出埃及記
  chapter: 31
  summary: 神提名選召猶大支派的比撒列，以神的靈充滿他，賜他智慧與巧工技能以建造會幕。
  relation: 比撒列的蒙召與聖靈充滿，預表了建造神的居所（教會）必須完全倚靠神的靈與恩賜。
related_entries:
