name: 蒙靈充滿的智慧恩賜（比撒列、亞何利亞伯）
type: 神學
secondary_types: []
aliases:
- 蒙靈充滿的智慧恩賜
status: formal
definition: 指神將祂的靈賜給比撒列和亞何利亞伯，使他們有智慧、聰明、知識，能做各樣建造會幕的工。這不僅是天然的才幹，更是聖靈賦予的特殊恩賜，使他們能想出巧工，並教導他人。這恩賜涵蓋了金工、木工、雕刻、織布等各樣技能，為要完成神所吩咐的建造工程。
development: 此神學概念表明，神的工作只能依靠神的智慧和能力才能完成。舊約中技巧與傑出之處皆歸功於神的靈，這預表了新約時代聖靈賜給信徒各樣屬靈恩賜以建造教會。神不僅呼召人，更賜下所需的屬靈與技術裝備，確保工程照著神的旨意成就。
accumulations:
- book: 出埃及記
  chapter: 31
  summary: 神以祂的靈充滿比撒列和亞何利亞伯，賜他們智慧、聰明、知識與各樣巧工的技能。
  relation: 聖靈充滿賜下的智慧恩賜，是為了成就建造會幕的聖工，表徵倚靠神的靈方能成事。
