book: 出埃及記
chapter: 31
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出31:1-11,18 神吩咐摩西揀選比撒列、亞何利亞伯製作會幕器具，將法版交給摩西。
  relation: 出31章是摩西領受會幕工匠揀選與安息日律法、領受法版的章節，摩西作為中保傳達神的啟示。
- title: 比撒列
  path: link_folder/人物/比撒列.md
  summary: 出31:2-5 神揀選猶大支派的比撒列（戶珥孫子、烏利兒子），以聖靈充滿他，賜智慧、聰明、知識和各樣工藝技能，負責製作會幕器具。
  relation: 出31:2-5確立比撒列作為會幕總工程師的神聖呼召，預表基督被聖靈膏立（路4:18, 徒10:38）與信徒領受屬靈恩賜（林前12:4-11）。
- title: 亞何利亞伯
  path: link_folder/人物/亞何利亞伯.md
  summary: 出31:6 神分派但支派的亞何利亞伯（亞希撒抹兒子）與比撒列同工，同被神的靈充滿，有智慧作工。
  relation: 出31:6確立亞何利亞伯作為比撒列助手的身分，預表聖靈賜恩賜給教會肢體同工（林前12:4-11, 弗4:11-12）。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出31:18 神在西乃山將法版交給摩西，與摩西說完話。
  relation: 西乃山是神啟示會幕工匠、安息日律法、賜法版的地點，出31章屬於西乃山啟示的總結。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出31:7-11 比撒列和亞何利亞伯製作會幕、法櫃、施恩座、器具、祭司聖衣、膏油、聖香。
  relation: 出31章詳細列舉會幕所有器具的製作指派，確立會幕建造的完整藍圖。
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: 出31:7-9 會幕聖所內器具（桌子、燈臺、香壇）由比撒列製作。
  relation: 出31章列舉聖所內所有器具的製作指派，聖所是祭司事奉的核心區域。
- title: 聖靈
  path: link_folder/神學/聖靈.md
  summary: 出31:3 神以靈充滿比撒列，賜智慧、聰明、知識、工藝技能。
  relation: 出31:3聖靈充滿比撒列預表基督被聖靈膏立（路4:18, 徒10:38）與信徒領受聖靈恩賜（林前12:4-11, 弗4:11-12）。
- title: 法櫃
  path: link_folder/神學/法櫃.md
  summary: 出31:7 比撒列製作法櫃，法櫃是會幕至聖所核心，盛放法版。
  relation: 出31:7法櫃是會幕核心，預表基督是神同在的中心（來9:11-12, 約1:14）。
- title: 施恩座
  path: link_folder/神學/施恩座.md
  summary: 出31:7 施恩座在法櫃上，神從施恩座上與摩西相會。
  relation: 出31:7施恩座預表基督作挽回祭（羅3:25, 來9:5），神在基督裡與人相會（來9:11-12）。
- title: 膏油
  path: link_folder/神學/膏油.md
  summary: 出31:11 比撒列製作膏油，用於膏抹會幕、器具、祭司，分別為聖。
  relation: 出31:11膏油預表聖靈膏抹（撒上16:13, 路4:18, 徒10:38），基督意為受膏者，信徒領受聖靈膏抹（約壹2:20,27, 林後1:21-22）。
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: 出31:13-17 神吩咐守安息日，作為神與以色列人永遠的約、證據，使他們知道耶和華使他們成聖。
  relation: 出31:13-17安息日預表基督是安息日的主（太12:8, 可2:28, 路6:5），信徒在基督裡得真安息（來4:9-11, 太11:28-30）。
- title: 來3：1-6
  path: link_folder/互文/來3：1-6.md
  summary: 來3:1-6 基督作神家的兒子，比摩西忠心，比撒列建造會幕預表基督建造教會。
  relation: 來3:1-6將出31章比撒列建造會幕預表基督建造教會——基督是神家的兒子，比摩西、比撒列更榮耀。
  relation: ''
