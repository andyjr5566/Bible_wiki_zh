book: 出埃及記
chapter: 31
updates:
- title: 分別為聖
  path: link_folder/神學/分別為聖.md
  summary: 出31:13 神吩咐以色列人務要守安息日，「因為這是你我之間世世代代的證據，使你們知道我耶和華是叫你們成為聖的」。CT 指出本節表明遵守安息日的理由之一，是使神的百姓認識神藉設立安息日將他們分別為聖；14節「以為聖日」即將安息日從平常日子分別出來歸為聖。
  relation: 本章將「分別為聖」繫於安息日的記號——成聖的主詞是耶和華（叫你們成為聖的是神自己），守安息日則是百姓對此分別的認識與回應。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出31:18 「耶和華在西乃山和摩西說完了話，就把兩塊法版交給他，是神用指頭寫的石版。」GT 引中文聖經註釋：這是接出24:15-18 摩西上山六天後進入雲中，獲神給予出25-31章的一切指示；現在這些話都說完了，神便將法版交給摩西。
  relation: 西乃山在本章是出25-31章整段會幕啟示的總結場景——山上的話語以神親手寫的法版為印記交付摩西。
- title: 猶大支派
  path: link_folder/人物/猶大支派.md
  summary: 出31:2 神提名選召建造會幕的工頭比撒列出自猶大支派，是戶珥的孫子、烏利的兒子。GT 指出十二支派中實質只有三個支派在全部舊約中佔顯著地位：利未支派是祭司、以法蓮支派是北國領導支派，而猶大支派是君王的世家（創49:8-10）；德萊維並指出戶珥、烏利、比撒列三名同見於代上2:20 猶大支派迦勒家族的族譜。
  relation: 本章顯明猶大支派除君王世家的身分外，也在會幕建造上居首——首位明確被神的靈充滿以作聖工的巧匠比撒列即出自此支派，與但支派的亞何利亞伯配搭同工。
- title: 戶珥
  path: link_folder/人物/戶珥.md
  summary: 出31:2 比撒列是戶珥的孫子、烏利的兒子。GT 指出此戶珥是否即出17:10、24:14 與亞倫同扶摩西手、代摩西聽訟的戶珥，已無可考證；但德萊維指出戶珥、烏利、比撒列三名皆出現於代上2:20 猶大支派迦勒家族族譜（同名不必同人）。CT 補充聖經提特定人物時常附帶父祖名字以免同名混淆。
  relation: 本章以「戶珥的孫子」界定比撒列的家系，使會幕巧匠的譜系與猶大支派迦勒家族相連；若此戶珥即扶摩西手者，則其家族橫跨爭戰代禱（出17）、司法（出24）與聖工建造（出31）三種事奉。
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: 出31:12-17 神在交付會幕工程之後重申安息日：務要守神的安息日，因這是神與以色列人之間世世代代的證據，使百姓知道耶和華是叫他們成為聖的；干犯者治死、做工者剪除；以色列人要世世代代守安息日為永遠的約，因為六日之內耶和華造天地，第七日便安息舒暢。CT/BH 指出此段強調即使建造會幕的聖工也不可廢安息日；GT 引丁道爾：安息日與割禮同為立約記號——割禮是個人的證據，安息日是團體恆常奉行的證據。
  relation: 本章將安息日與會幕建造並列為一體兩面（串珠：安息日使百姓知道神叫他們成聖，神在會幕中與人相會也達到同一目標），是「立約證據」語意最完整的一段，並以創造的安息（第七日安息舒暢）為其根基。
- title: 法版（edut）
  path: link_folder/原文/法版（edut）.md
  summary: 出31:18 耶和華在西乃山和摩西說完了話，就把兩塊法版交給他，是神用指頭寫的石版。GT/BH 指出「法版」原文即「見證版」，是「法櫃」（見證櫃）一名的由來；此節總結出25-31章神在山上的全部指示。CT 指出兩塊版各載五誡（或前四後六之分）而非一式兩份，因神不需要法版作證據，兩塊都交給了摩西；「神用指頭寫」是擬人法，指神能力的直接作為（參出8:19、路11:20）。
  relation: 本章是法版首次實際交付之處（應驗出24:12 的應許），石版與其上的字皆是神的工作，與第二次由摩西鑿版、神寫字（出34:1,28）形成對照；此版後為摩西在金牛犢事件中摔碎（出32:19）。
