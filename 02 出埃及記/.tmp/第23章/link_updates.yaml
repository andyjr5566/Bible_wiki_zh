book: 出埃及記
chapter: 23
updates:
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: 出23:12以人道理由重申安息日：六日做工，第七日安息，使牛驢可以歇息，並使婢女的兒子和寄居的都可以舒暢。
  relation: 出23:12補充了安息日的人道層面，與出20:8-11的創造紀念和申5:15的救贖紀念並列為安息日的三重意義。
- title: 寄居的（ger）
  path: link_folder/原文/寄居的（ger）.md
  summary: 出23:9「不可欺壓寄居的，因為你們在埃及地作過寄居的，知道寄居的心」，強調設身處地的同理心。
  relation: 出23:9與出22:21相同命令，但更深入指出「知道寄居的心」，針對審判官不可因寄居者無親族保護而屈枉正直。
- title: 出20：12
  path: link_folder/互文/出20：12.md
  summary: 出23:12安息日使「婢女的兒子」得舒暢，體現第五誡孝敬父母所延伸的家庭關懷與社會責任。
  relation: 出23:12將第五誡的家庭倫理延伸至安息日的人道關懷，使僕婢家庭也得享安息。
- title: 出20：3
  path: link_folder/互文/出20：3.md
  summary: 出23:13「別神的名你不可提，也不可從你口中傳說」與出23:24「不可跪拜他們的神」為第一誡的具體應用。
  relation: 出23:13,24將第一誡的不可有別神延伸至不可提別神名、不可跪拜、不可效法其行為、要拆毀神像。
- title: 申15：1-11
  path: link_folder/互文/申15：1-11.md
  summary: 出23:10-11安息年使窮人有吃的、野獸可吃，與申15豁免年釋放債務同屬七年週期的社會關懷制度。
  relation: 出23:10-11的安息年與申15的豁免年互補：安息年關懷土地與窮人飲食，豁免年關懷債務與奴僕釋放。
- title: 申16：18-20
  path: link_folder/互文/申16：18-20.md
  summary: 出23:1-8的司法公正律例——不可隨眾行惡、不可偏護窮人、不可受賄賂——為申16:18-20設立審判官制度的具體倫理指引。
  relation: 出23:1-8為申16:18-20審判官制度提供倫理基礎：審判官須公正、不可看人面、不可收賄賂。
- title: 申24：17
  path: link_folder/互文/申24：17.md
  summary: 出23:6「不可在窮人爭訟的事上屈枉正直」與出23:9「不可欺壓寄居的」，與申24:17不可向寄居的和孤兒屈枉正直平行。
  relation: 出23:6,9與申24:17同屬保護弱勢的司法倫理，確保寄居者和窮人在法律面前得公正對待。
- title: 詩146：9
  path: link_folder/互文/詩146：9.md
  summary: 出23:9不可欺壓寄居者的命令，與詩146:9「耶和華保護寄居的、扶持孤兒寡婦」一致，神親自作弱勢的保護者。
  relation: 出23:9的司法保護寄居者原則在詩146:9中提升為神屬性的宣告：神親自保護寄居者。
- title: 賽10：2
  path: link_folder/互文/賽10：2.md
  summary: 出23:6不可屈枉窮人的命令，與賽10:2先知責備以色列「屈枉窮人、奪去我民中困苦人的理」形成對比。
  relation: 出23:6的司法公義原則在賽10:2中成為先知審判以色列的標準：屈枉窮人即違背神的律法。
- title: 耶5：28
  path: link_folder/互文/耶5：28.md
  summary: 出23:6不可屈枉窮人的命令，與耶5:28先知責備「不為孤兒伸冤、不為窮人辨屈」形成對比。
  relation: 出23:6的司法公義原則在耶5:28中成為先知審判的依據：不為窮人辨屈即背約。
- title: 耶7：5-6
  path: link_folder/互文/耶7：5-6.md
  summary: 出23:9不可欺壓寄居者的命令，與耶7:5-6「不可欺壓寄居的和孤兒寡婦」平行，為進入聖殿敬拜的條件。
  relation: 出23:9的保護寄居者原則在耶7:5-6中成為敬拜神的前提條件：欺壓寄居者即失去敬拜資格。
- title: 耶22：3
  path: link_folder/互文/耶22：3.md
  summary: 出23:6,9的司法公義與保護寄居者命令，與耶22:3「不可虧負寄居的和孤兒寡婦」平行。
  relation: 出23:6,9的司法倫理在耶22:3中成為君王治理的標準：行公義、保護弱勢者。
- title: 結22：7
  path: link_folder/互文/結22：7.md
  summary: 出23:9不可欺壓寄居者的命令，與結22:7先知責備以色列「在你中間有輕慢父母的、有欺壓寄居的、有虧負孤兒寡婦的」形成對比。
  relation: 出23:9的保護寄居者原則在結22:7中成為先知審判耶路撒冷的依據之一。
- title: 結22：12
  path: link_folder/互文/結22：12.md
  summary: 出23:8「不可受賄賂，因為賄賂能叫明眼人變瞎了」，與結22:12先知責備「在你中間有為流人血受賄賂的」形成對比。
  relation: 出23:8的不可受賄賂原則在結22:12中成為先知審判的依據：收賄賂流人血即違背神的律法。
- title: 亞7：10
  path: link_folder/互文/亞7：10.md
  summary: 出23:6,9的司法公義與保護寄居者命令，與亞7:10「不可欺壓寡婦、孤兒、寄居的和貧窮人」平行。
  relation: 出23:6,9的保護弱勢原則在亞7:10中成為被擄歸回後神對百姓的勸誡。
- title: 瑪3：5
  path: link_folder/互文/瑪3：5.md
  summary: 出23:1,6,9的司法公義律例，與瑪3:5神必臨近審判「欺壓寡婦孤兒的、屈枉寄居的」平行。
  relation: 出23:1,6,9的司法倫理在瑪3:5中成為末後審判的標準：神必親自作見證審判違背者。
- title: 太23：23
  path: link_folder/互文/太23：23.md
  summary: 出23:1-9的司法公義律例，與太23:23「律法上更重的事就是公義、憐憫、信實」一致，耶穌強調律法的精義。
  relation: 出23:1-9的司法公義是太23:23「公義、憐憫、信實」的舊約基礎，耶穌呼籲回歸律法精義。
- title: 羅13：1-7
  path: link_folder/互文/羅13：1-7.md
  summary: 出23:1-8的司法公正律例——不可隨眾行惡、不可受賄賂——為羅13:1-7掌權者為神差役的舊約基礎。
  relation: 出23:1-8的司法倫理在羅13:1-7中提升為新約的掌權者原則：審判官代表神施行公義。
- title: 加5：1
  path: link_folder/互文/加5：1.md
  summary: 出23:12安息日使僕婢得舒暢，與加5:1「基督釋放了我們叫我們得以自由」同屬釋放與安息的主題。
  relation: 出23:12安息日使僕婢得舒暢預表加5:1基督釋放信徒得自由的真安息。
- title: 加6：2
  path: link_folder/互文/加6：2.md
  summary: 出23:5「看見恨你人的驢壓臥在重馱之下，不可走開，務要和驢主一同抬開重馱」，與加6:2「各人的重擔要互相擔當」平行。
  relation: 出23:5幫助仇敵抬開重擔是加6:2互相擔當重擔的舊約先例，愛仇敵即成全基督的律法。
- title: 腓2：6-7
  path: link_folder/互文/腓2：6-7.md
  summary: 出23:12安息日使僕婢得舒暢，與腓2:6-7基督「取了奴僕的形像」同屬降卑服事的主題。
  relation: 出23:12安息日關懷僕婢預表腓2:6-7基督降卑為奴僕，使人在祂裡面得真安息。
- title: 西1：15
  path: link_folder/互文/西1：15.md
  summary: 出23:24「要把神像盡行拆毀、打碎他們的柱像」，與西1:15基督為「不能看見之神的像」對比：偶像為假像，基督為真像。
  relation: 出23:24拆毀偶像的命令在西1:15中由基督作為神的真像來成全：敬拜真像、棄絕假像。
- title: 提前1：8-11
  path: link_folder/互文/提前1：8-11.md
  summary: 出23:1-9的司法公正律例——不可作假見證、不可殺無辜——為提前1:8-11「律法是為不法之人設的」的舊約案例。
  relation: 出23:1-9的司法律例在提前1:8-11中歸類為律法的正當功用：約束不法與不義。
- title: 提前5：8
  path: link_folder/互文/提前5：8.md
  summary: 出23:6不可屈枉窮人的命令，與提前5:8「人若不看顧親屬就是背了真道」同屬關懷責任的主題。
  relation: 出23:6的司法保護窮人原則在提前5:8中延伸為家庭關懷責任：不看顧家人即違背信仰。
- title: 來4：9-10
  path: link_folder/互文/來4：9-10.md
  summary: 出23:12安息日使牛驢僕婢寄居者都歇息，與來4:9-10「必另有一安息日的安息為神的子民存留」同屬安息主題。
  relation: 出23:12的人道安息日預表來4:9-10在基督裡的終末安息：歇了自己的工、享受神的安息。
- title: 來10：5
  path: link_folder/互文/來10：5.md
  summary: 出23:18-19獻祭條例——不可將祭血與有酵餅同獻、初熟之物送到神殿——預表來10:5基督以身體為祭。
  relation: 出23:18-19的獻祭條例在來10:5中由基督成全：祂以身體為祭、除去舊酵、獻上真正的初熟果子。
- title: 雅1：27
  path: link_folder/互文/雅1：27.md
  summary: 出23:6,9不可屈枉窮人、不可欺壓寄居者的命令，與雅1:27「看顧在患難中的孤兒寡婦」同屬純正虔誠的表現。
  relation: 出23:6,9的保護弱勢律例是雅1:27純正虔誠的舊約基礎：看顧弱勢即清潔沒有玷污的虔誠。
- title: 雅4：17
  path: link_folder/互文/雅4：17.md
  summary: 出23:4-5遇見仇敵牛驢失迷要牽回、看見恨你人驢壓臥要幫助，與雅4:17「人若知道行善卻不去行就是罪」平行。
  relation: 出23:4-5的愛仇敵律例是雅4:17知行合一原則的舊約案例：知道善而不行即為罪。
- title: 彼前2：9
  path: link_folder/互文/彼前2：9.md
  summary: 出23:22「你若實在聽從祂的話，照著我一切所說的去行」，與彼前2:9「惟有你們是被揀選的族類、有君尊的祭司」同屬聽從與身分的主題。
  relation: 出23:22聽從使者話語的條件在彼前2:9中成為信徒身分的基礎：被揀選為聖潔國度、屬神的子民。
- title: 彼前5：2
  path: link_folder/互文/彼前5：2.md
  summary: 出23:20神差遣使者在前引導保護，與彼前5:2「務要牧養在你們中間神的群羊」同屬引導與牧養的主題。
  relation: 出23:20神差遣使者引導預表彼前5:2基督為大牧者、長老為群羊的牧養者。
- title: 約壹3：17
  path: link_folder/互文/約壹3：17.md
  summary: 出23:6不可屈枉窮人的命令，與約壹3:17「看見弟兄窮乏卻塞住憐恤的心」同屬關懷窮乏的主題。
  relation: 出23:6的司法保護窮人原則在約壹3:17中延伸為愛心的實際行動：憐恤窮乏的弟兄。
- title: 啟19：15
  path: link_folder/互文/啟19：15.md
  summary: 出23:27神使敵人驚駭逃跑，與啟19:15基督用利劍擊殺列國、用鐵杖轄管同屬神審判仇敵的主題。
  relation: 出23:27神使敵人驚駭逃跑預表啟19:15基督再來時的終末審判：以公義擊殺列國。
- title: 啟22：15
  path: link_folder/互文/啟22：15.md
  summary: 出23:1,7不可佈散謠言、不可殺無辜的命令，與啟22:15「凡好說謊言、編造虛謊的」在城外同屬虛謊與聖城的對立。
  relation: 出23:1,7的不可作假見證原則在啟22:15中成為新耶路撒冷的入城標準：說謊者不得進入。
- title: 民35：9-34
  path: link_folder/互文/民35：9-34.md
  summary: 出23:7「不可殺無辜和有義的人，因我必不以惡人為義」，與民35:9-34逃城制度同屬保護無辜者的律法。
  relation: 出23:7的不可殺無辜原則在民35中具體化為逃城制度：誤殺者可逃往逃城免受報仇者殺害。
- title: 書20：1-9
  path: link_folder/互文/書20：1-9.md
  summary: 出23:7不可殺無辜的命令，與書20:1-9設立逃城的實踐同屬保護無辜者的律法體系。
  relation: 出23:7的不可殺無辜原則在書20中實現為迦南地的六座逃城，確保誤殺者得公正審判。
- title: 詩15：5
  path: link_folder/互文/詩15：5.md
  summary: 出23:8「不可受賄賂」，與詩15:5「不受賄賂以害無辜」同屬義人品格標準。
  relation: 出23:8的不可受賄賂原則在詩15:5中成為聖殿朝見神的資格：不收賄賂害無辜者方能住在神的聖山。
- title: 古代近東偶像崇拜
  path: link_folder/背景/古代近東偶像崇拜.md
  summary: 出23:24「不可跪拜他們的神、不可事奉他、不可效法他們的行為、要把神像盡行拆毀、打碎他們的柱像」，針對迦南宗教的偶像崇拜。
  relation: 出23:24的拆毀偶像命令是古代近東偶像崇拜背景下的具體應用：以色列須徹底清除迦南宗教影響。
