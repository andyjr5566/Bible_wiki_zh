book: 出埃及記
chapter: 38
updates:
- title: 銅壇（燔祭壇）
  path: link_folder/主題/銅壇（燔祭壇）.md
  summary: 出38:1-7 用皂莢木做燔祭壇，是四方的，長五肘寬五肘高三肘；在壇的四拐角上做四個角與壇接連一塊，用銅把壇包裹；做壇上的盆、鏟子、盤子、肉鍤子、火鼎，一切器具用銅做；為壇做一個銅網安在壇四面的圍腰板以下，從下達到壇的半腰；為銅網的四角鑄四個環子作為穿杠的用處；用皂莢木做杠用銅包裹；把杠穿在壇兩旁的環子內用以抬壇，並用板做壇，壇是空的。CT靈意：皂莢木做燔祭壇表徵耶穌的十字架（來13:10-13）；四方的表徵耶穌公義且完全；五肘（長寬）表負責任、三肘（高）表合於神的標準。KC：this altar is the meeting place where God meets His people；the basis is the continual burnt offering（Exo 29:38-45）；Hebrews makes clear this altar and the sacrifice have been fulfilled in Christ（Heb 13:10）。
  relation: 本章首次記載銅壇的實際製作——銅壇是會幕中最大的器具（5×5×3肘），置於院子入口處，表徵十字架是人到神面前的第一步；壇是空的，表徵基督虛己倒空自己（腓2:7）。
- title: 壇的四角
  path: link_folder/主題/壇的四角.md
  summary: 出38:2 在壇的四拐角上做四個角，與壇接連一塊，用銅把壇包裹。CT靈意：角指拯救的能力（路1:69）；十字架的能力無堅不摧，能把我們拯救到完全的地步；祭壇的角也為著栓住祭牲（詩118:27）——基督的愛如同慈繩愛索拴住我們（羅12:1；林後5:14-15）。
  relation: 本章首次記載銅壇四角的實際製作——四個角與壇接連一塊、同被銅包裹；角表徵基督拯救的能力（拯救的角），也表徵護庇（王上1:50）。
- title: 壇的銅網
  path: link_folder/主題/壇的銅網.md
  summary: 出38:4-5 為壇做一個銅網，安在壇四面的圍腰板以下，從下達到壇的半腰；為銅網的四角鑄四個環子作為穿杠的用處。CT靈意：銅網一面托住祭牲一面幫助焚燒，表徵我們不但不逃避十字架，且要歡迎十字架的對付；壇的半腰就是和約櫃相同高度（出25:10），表徵十字架的救贖合乎神公義的要求。
  relation: 本章首次記載銅網的實際製作——銅網位於壇的半腰（與約櫃同高），表徵十字架的救贖完全滿足神公義的標準；銅網的四角鑄環穿杠，表徵十字架的信息要傳揚到四方。
- title: 壇的器具（盆、鏟子、盤子、肉鍤子、火鼎）
  path: link_folder/主題/壇的器具（盆、鏟子、盤子、肉鍤子、火鼎）.md
  summary: 出38:3 他做壇上的盆、鏟子、盤子、肉鍤子、火鼎；這一切器具都是用銅做的。CT：盆用來收拾祭牲和祭物全燒後遺留在祭壇上的灰；鏟子供清除灰燼；盤子供盛放祭牲的血；肉鍤子供插取和置放肉塊；火鼎供盛放和移送火炭。
  relation: 本章首次記載銅壇器具的實際製作——五樣器具全用銅造，表徵一切與十字架相關的事奉都必須經過神的審判；盆收灰、鏟清灰，表徵我們須時常清理裡面的灰才能心裡火熱（羅12:11）。
- title: 洗濯盆（銅盆）
  path: link_folder/主題/洗濯盆（銅盆）.md
  summary: 出38:8 他用銅做洗濯盆和盆座，是用會幕門前伺候的婦人之鏡子做的。CT：銅表徵審判；洗濯盆表徵話中之水的洗淨（弗5:26）；銅鏡原是用來照出自己的面貌——我們要在神審判的光中看見自己得罪神的地方。KC：the laver represents the Word of God；the Word is also compared with a mirror（Jam 1:23-25）；the women's mirror gives a complete image but is not a means to change——the mirror of the Word of God does give a means to change。
  relation: 本章首次記載洗濯盆的實際製作，並揭示其獨特材料來源——婦人捐出銅鏡；鏡子原為照見自己、妝飾自己，獻上後成為洗淨祭司的盆，表徵從自我中心轉向事奉神的生命轉變。
- title: 會幕院子
  path: link_folder/主題/會幕院子.md
  summary: 出38:9-20 做帳幕的院子：南面帷子寬一百肘、柱子二十根、帶卯銅座二十個；北面同樣；西面帷子寬五十肘、柱子十根、帶卯座十個；東面寬五十肘，門兩邊各有帷子十五肘、柱子三根、帶卯座三個；院子四面的帷子都是用撚的細麻做的；柱子帶卯的座是銅的，鉤子和杆子是銀的，柱頂用銀子包，一切柱子用銀杆連絡；院子的門簾以繡花的手工用藍色紫色朱紅色線和撚的細麻織的，寬二十肘高五肘；門簾柱子四根、帶卯銅座四個。KC：the building and the objects are surrounded by linen hangings held up by pillars；the east side is where the sun rises——reminding us of the Lord Jesus as 'the Sunrise from on high'（Lk 1:78; Mal 4:2）。
  relation: 本章首次記載會幕院子的實際建造——院子以細麻帷子圍繞，將聖與俗分開；東面為入口（日出之地），表徵基督是進入神同在的唯一門戶（約10:9）；柱子立於銅座（審判）、以銀杆連絡（救贖），表徵信徒在審判與救贖的基礎上連結。
- title: 院子門簾
  path: link_folder/主題/院子門簾.md
  summary: 出38:18-19 院子的門簾是以繡花的手工，用藍色、紫色、朱紅色線和撚的細麻織的，寬二十肘高五肘，與院子的帷子相配；帷子的柱子四根，帶卯的銅座四個，柱子上的鉤子和杆子是銀的，柱頂是用銀子包的。KC：the screen in the gate of the court is colored——only through this gate someone can enter。
  relation: 本章首次記載院子門簾的實際製作——門簾是院子唯一的彩色入口（與白色細麻帷子對比），表徵基督是通往神國度的唯一門戶；四根柱子立於銅座，表徵進入需要經過審判的煉淨。
- title: 帶卯的銅座（院子柱子座）
  path: link_folder/主題/帶卯的銅座（院子柱子座）.md
  summary: 出38:10-20,30-31 院子柱子帶卯的座是銅的：南面二十個、北面二十個、西面十個、東面門兩邊各三個、門簾柱子四個；帳幕一切的橛子和院子四圍的橛子都是銅的；會幕門帶卯的座也是銅的。KC：pillars have their place in the tabernacle, but also tent pegs——pillars are impressive, while tent pegs seem insignificant, however both are needed；without pillars there can be no building, without pegs the pillars will not remain standing。
  relation: 本章首次記載院子銅座的實際鑄造數量——共六十個帶卯銅座為院子柱子的根基；銅表審判，院子柱子立於銅座表徵信徒在世上作見證必須經過神審判的煉淨。
- title: 銀杆（連絡柱子）
  path: link_folder/主題/銀杆（連絡柱子）.md
  summary: 出38:17,19,28 院子一切的柱子都是用銀杆連絡的；柱子的鉤子和杆子是銀的，柱頂是用銀子包的；用那一千七百七十五舍客勒銀子做柱子上的鉤子，包裹柱頂並柱子上的杆子。銀表救贖；銀杆將所有柱子連絡成一體，表徵信徒在基督的救贖裡彼此連結。
  relation: 本章首次記載銀杆的實際製作與用料數量——一千七百七十五舍客勒銀子用於鉤子、柱頂和杆子；銀杆連絡全院柱子，表徵救贖的連結使全體信徒合而為一。
- title: 橛子與繩子的預表
  path: link_folder/神學/橛子與繩子的預表.md
  summary: 出38:20,31 帳幕一切的橛子和院子四圍的橛子都是銅的。KC：pillars are impressive, while tent pegs seem insignificant, however both are needed；without pillars there can be no building, without pegs the pillars will not remain standing。橛子深埋地中人所不見，卻擔起支持會幕的工作；銅表審判，橛子用銅造表徵隱藏的事奉者經歷過神的審判與煉淨。
  relation: 本章首次記載橛子的實際製作——帳幕和院子四圍的橛子全用銅造；橛子雖不顯眼，卻是會幕穩固不可或缺的根基，表徵教會中默默支撐的無名事奉者。
- title: 比撒列（Bezalel）
  path: link_folder/人物/比撒列（Bezalel）.md
  summary: 出38:22-23 凡耶和華所吩咐摩西的都是猶大支派戶珥的孫子、烏利的兒子比撒列做的；與他同工的有但支派中亞希撒抹的兒子亞何利亞伯，他是雕刻匠，又是巧匠，又能用藍色紫色朱紅色線和細麻繡花。
  relation: 本章在材料統計之後再次確認比撒列的總工頭身分——「凡耶和華所吩咐摩西的都是比撒列做的」，並補充亞何利亞伯的具體技能（雕刻、巧匠、繡花），為全體工匠團隊作總結。
- title: 亞何利亞伯（Oholiab）
  path: link_folder/人物/亞何利亞伯（Oholiab）.md
  summary: 出38:23 與比撒列同工的有亞何利亞伯，他是雕刻匠，又是巧匠，又能用藍色紫色朱紅色線和細麻繡花。此處補充了亞何利亞伯的具體技能分類——雕刻匠（雕刻寶石與木頭）、巧匠（設計圖案）、繡花（紡織彩色幔子）。
  relation: 本章在材料統計之後補充亞何利亞伯的技能細節，與比撒列並列為全體工匠團隊的雙核心；猶大支派的比撒列與但支派的亞何利亞伯同工，表徵全以色列的合一事奉。
- title: 舍客勒
  path: link_folder/原文/舍客勒.md
  summary: 出38:24-29 為聖所一切工作使用所獻的金子，按聖所的平，有二十九他連得並七百三十舍客勒；會中被數的人所出的銀子有一百他連得並一千七百七十五舍客勒；所獻的銅有七十他連得並二千四百舍客勒。BH：a talent was a large unit of weight；the shekel was the standard unit。KC：the gold comes from voluntary gifts, the silver from those that are numbered——each pays half a shekel（Exo 30:11-16）。
  relation: 本章首次記載會幕材料的完整統計數字，舍客勒作為基本計量單位貫穿金銀銅三種材料的統計；「按聖所的平」表明聖所自有標準度量，表徵神有祂自己的衡量標準。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出38:22 凡耶和華所吩咐摩西的都是猶大支派戶珥的孫子、烏利的兒子比撒列做的。全章每一物件都嚴格依照神在山上指示的樣式——銅壇（出27:1-8）、洗濯盆（出30:17-21）、院子帷子與柱子（出27:9-19）。KC：everything is counted——to God every sacrifice, every contribution to the tabernacle is important。
  relation: 本章以材料統計（v21-31）作為「山上的樣式」執行完成的數據總結——金銀銅的每一舍客勒都被數點記錄，表徵神對照祂吩咐所做的每一細節都記念不忘（來6:10）。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出38:1,6 燔祭壇和抬壇的杠用皂莢木製作。皂莢木的堅固耐腐特性使其能承受祭壇的高溫與重量。
  relation: 本章記載皂莢木在銅壇（院子最大器具）中的使用——皂莢木作壇的骨架、外包銅以耐火，表徵基督的人性（木）承受神審判的火（銅）而屹立不毀。
- title: 銅
  path: link_folder/主題/銅.md
  summary: 出38:2-8,10-12,14-15,17,19-20,29-31 壇包銅、壇的器具用銅、銅網用銅、洗濯盆和盆座用銅、院子柱子帶卯的座用銅、門簾柱子座用銅、橛子用銅；所獻的銅有七十他連得並二千四百舍客勒。CT靈意：銅表徵神的審判。KC：bronze。
  relation: 本章記載銅在會幕外院中的全面使用——從銅壇到洗濯盆、從柱子座到橛子，銅（審判）貫穿整個外院；七十他連得並二千四百舍客勒的銅全數用於審判相關的器具。
- title: 銀子
  path: link_folder/主題/銀子.md
  summary: 出38:10-12,17,19,25-28 院子柱子的鉤子和杆子用銀子做、柱頂用銀子包；會中被數的人所出的銀子有一百他連得並一千七百七十五舍客勒；用那一百他連得銀子鑄造聖所帶卯的座和幔子柱子帶卯的座，一百他連得共一百帶卯的座每帶卯的座用一他連得；用那一千七百七十五舍客勒銀子做柱子上的鉤子包裹柱頂並柱子上的杆子。KC：the silver comes from those that are numbered——each of the numbered people has to pay half a shekel；the sockets of the sanctuary are made from this silver——everyone is part of the house of God on the same basis。
  relation: 本章首次記載銀子的完整統計與用途分配——一百他連得銀子鑄造一百個帶卯的銀座（每座一他連得），表徵每個信徒在救贖根基上的分量相等；一千七百七十五舍客勒用於鉤子與杆子，表徵救贖的連結。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出38:21-31 全章以材料統計作結——金銀銅的每一舍客勒都被數點記錄，表明神對祂居所建造的每一細節都記念不忘。KC：everything is counted——to God every sacrifice, every contribution to the tabernacle, His dwelling, is important；it will be a memorial for them before Him（Exo 30:16）。會幕院子以細麻帷子圍繞，將聖與俗分開，神的同在在院子內、在帳幕中具體實現。
  relation: 本章完成會幕外院與一切器具的建造，神的居所從至聖所（出37）延伸到聖所（出37）再到外院（出38），神的同在由內向外逐步展開；材料統計顯明每一個人的奉獻都在神面前被記念。
