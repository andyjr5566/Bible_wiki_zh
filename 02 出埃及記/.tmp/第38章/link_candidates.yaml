    evidence: "出38:17,19,28 院子一切的柱子都是用銀杆連絡的；柱子的鉤子和杆子是銀的，柱頂是用銀子包的；用那一千七百七十五舍客勒銀子做柱子上的鉤子，包裹柱頂並柱子上的杆子。已有條目「銀杆（連絡柱子）」"
