    evidence: "出38:10-12,17,19,25-28 院子柱子的鉤子和杆子用銀子做、柱頂用銀子包；會中被數的人所出的銀子有一百他連得並一千七百七十五舍客勒；用那一百他連得銀子鑄造聖所帶卯的座和幔子柱子帶卯的座，一百他連得共一百帶卯的座每帶卯的座用一他連得；用那一千七百七十五舍客勒銀子做柱子上的鉤子包裹柱頂並柱子上的杆子。KC：the silver comes from those that are numbered——the sockets of the sanctuary are made from this silver——everyone is part of the house of God on the same basis。已有條目「銀子」"
