  - name: "金銀銅統計（出38：24-31）"
    type: "事件"
    evidence: "出38:24-31 為聖所一切工作使用所獻的金子有二十九他連得並七百三十舍客勒；銀子有一百他連得並一千七百七十五舍客勒；銅有七十他連得並二千四百舍客勒。KC：everything is counted——to God every sacrifice, every contribution to the tabernacle is important；it will be a memorial for them before Him（Exo 30:16）。此為會幕建造的完整材料統計，具獨特歷史價值。建議新建條目或納入各材料條目累積"
