  - name: "以他瑪"
    type: "人物"
    evidence: "出38:21 這是法櫃的帳幕中利未人所用物件的總數，是照摩西的吩咐，經祭司亞倫的兒子以他瑪的手數點的。以他瑪是亞倫的第四子（出6:23），在此首次以獨立角色出現——負責數點會幕一切物件的總數。KC：everything is counted——to God every sacrifice, every contribution to the tabernacle is important。已有條目「以他瑪」或涵蓋於「亞倫的祭司譜系」"
    surfaces:
      - phrase: "以他瑪"
        verses: [21]

