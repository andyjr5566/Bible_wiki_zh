  - name: "舍客勒"
    type: "原文"
    evidence: "出38:24-29 為聖所一切工作使用所獻的金子，按聖所的平，有二十九他連得並七百三十舍客勒；會中被數的人所出的銀子有一百他連得並一千七百七十五舍客勒；所獻的銅有七十他連得並二千四百舍客勒。BH：a talent was a large unit of weight；the shekel was the standard unit。已有條目「舍客勒」"
    surfaces:
      - phrase: "舍客勒"
        verses: [24, 25, 26, 28, 29]

  - name: "一比加"
    type: "原文"
    evidence: "出38:26 凡過去歸那些被數之人的，從二十歲以外，有六十萬零三千五百五十人，按聖所的平，每人出銀半舍客勒，就是一比加。一比加（beka）是半舍客勒的重量單位，源自希伯來文「分裂」之意。BH：a beka a head, that is half a shekel。建議新建條目或納入舍客勒累積"
    surfaces:
      - phrase: "一比加"
        verses: [26]

  - name: "六十萬零三千五百五十人"
    type: "事件"
    evidence: "出38:26 凡過去歸那些被數之人的，從二十歲以外，有六十萬零三千五百五十人。這是出埃及後第一次人口統計（民1章有更詳細的第二次），每人出銀半舍客勒作為會幕的贖價銀（出30:11-16）。KC：the silver comes from those that are numbered——each of the numbered people has to pay half a shekel；the sockets of the sanctuary are made from this silver——everyone is part of the house of God on the same basis。建議新建條目或納入相關條目"
    surfaces:
      - phrase: "六十萬零三千五百五十人"
        verses: [26]

