name: 一比加
type: 原文
secondary_types: []
aliases:
- beka
- 比加
status: formal
definition: 希伯來文 beka，原文意為「一半」。在出埃及記第三十八章中，一比加等同於半舍客勒，是按聖所的平所制定的重量與貨幣單位。神規定凡二十歲以外的男丁被數點時，每人須出銀半舍客勒作為贖命銀，此半舍客勒即為一比加。這表明無論貧富，每個人在神面前的贖價都是相同的，彰顯了在救贖與建造會幕的責任上人人平等的原則。
accumulations:
- book: 出埃及記
  chapter: 38
  summary: 記載凡被數點的二十歲以上男丁，每人出銀半舍客勒，就是一比加。
  relation: 一比加作為贖命銀的單位，表徵建造教會人人有責，且每人都需在基督的救贖根基上盡同等的基本責任。
