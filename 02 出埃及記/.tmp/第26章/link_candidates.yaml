book: 出埃及記
chapter: 26
candidates:
  - name: 山上的樣式
    type: 神學
    section: 神學（既有條目累積）
    evidence: 要照著在山上指示你的樣式立起帳幕，重申出25:9,40的原則並應用於帳幕的立起本身（出26:30）
  - name: 天上真聖所（來9：23-24）
    type: 互文
    section: 互文（既有條目累積）
    evidence: 山上指示的樣式對照天上真聖所的複本主題，本章應用於帳幕立起（出26:30）
  - name: 皂莢木（atzei shittim）
    type: 原文
    section: 原文（既有條目累積）
    evidence: 用皂莢木做帳幕豎板、閂、內幔柱子與門簾柱子，皆包裹金子（出26:15,26,29,32,37）
  - name: 約櫃
    type: 主題
    section: 主題（既有條目累積）
    evidence: 把法櫃抬進幔子內，安於至聖所（出26:33）
  - name: 施恩座
    type: 主題
    section: 主題（既有條目累積）
    evidence: 把施恩座安在至聖所內的法櫃上（出26:34）
  - name: 陳設餅桌子
    type: 主題
    section: 主題（既有條目累積）
    evidence: 把桌子安在幔子外帳幕的北面（出26:35）
  - name: 金燈臺
    type: 主題
    section: 主題（既有條目累積）
    evidence: 把燈臺安在帳幕的南面，與桌子彼此相對（出26:35）
  - name: 會幕材料的豫表
    type: 神學
    section: 神學（既有條目累積）
    evidence: 藍紫朱紅細麻、山羊毛、染紅公羊皮、海狗皮、金銀銅，各按材質再次豫表基督與教會（出26:1,7,14,19,31,36）
  - name: 來10：19-20
    type: 互文
    section: 互文（既有條目累積）
    evidence: 幔子將聖所和至聖所隔開，把法櫃抬進幔子內，是既有條目已預告的出26:33直接應驗
  - name: 林後5：21
    type: 互文
    section: 互文（既有條目累積）
    evidence: 山羊毛所織罩棚，CT/GT靈意註解明指其表徵耶穌代替人成為罪（出26:7）
  - name: 來10：5
    type: 互文
    section: 互文（既有條目累積）
    evidence: 內幔柱子上的金鉤，CT靈意註解明指其表徵基督的身體出於神的預備（出26:32）
  - name: 內幔
    type: 主題
    section: 主題
    evidence: 藍紫朱紅細麻織成、繡上基路伯的幔子，掛在四根包金皂莢木柱上，將聖所和至聖所隔開，法櫃抬進其內（出26:31-34）；與門簾同材質但有基路伯、掛四柱銀座，兩者為不同實體
  - name: 門簾
    type: 主題
    section: 主題
    evidence: 帳幕出入口的簾子，繡花手工織成，無基路伯，掛在五根包金皂莢木柱上，柱子安在銅座上（出26:36-37）；CT/GT/BH皆指其表徵基督是門
  - name: 海狗皮（塔哈皮）
    type: 原文
    section: 原文
    evidence: 罩棚最外層頂蓋，呂振中譯本原文音譯「塔哈皮」，外表粗糙卻堅固耐苦（出26:14）
  - name: 無佳形美容（賽53：2-3）
    type: 互文
    section: 互文
    evidence: KC明引賽53:2-3描述基督無佳形美容卻無人喜悅祂，對應海狗皮外表不美觀卻堅固耐苦的預表（出26:14）
  - name: 我是門（約10：7-9）
    type: 互文
    section: 互文
    evidence: CT/GT/BH三來源皆指帳幕門簾預表約10:7,9「我是羊的門」「我就是門」，唯獨藉此門可進入蒙恩（出26:36）
