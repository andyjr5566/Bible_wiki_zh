book: 出埃及記
chapter: 26
updates:
- title: 基路伯（施恩座）
  path: link_folder/主題/基路伯（施恩座）.md
  summary: 出26:1、31 經文提到十幅幔子與內幔均繡上基路伯。CT/GT/KC/BH 註解：基路伯表徵神的榮耀、守護聖潔、天上的實體；巧匠手工表徵聖靈工作、受苦管教。
  relation: 本章新增基路伯出現在內層幕幔與內幔上，延伸了基路伯從施恩座（出25）到會幕幔子的預表範圍，彰顯神榮耀充滿整個會幕。
- title: 施恩座
  path: link_folder/主題/施恩座.md
  summary: 出26:34 經文記載把施恩座安在至聖所內的法櫃上。KC/BH 註解：施恩座是大祭司灑血贖罪之處，預表基督作挽回祭。
  relation: 本章確立施恩座在至聖所內的具體位置（法櫃上），與內幔（v33）共同構成至聖所的核心佈局。
- title: 約櫃
  path: link_folder/主題/約櫃.md
  summary: 出26:33-34 經文提到法櫃在至聖所內，施恩座安在其上。CT/GT/KC/BH 註解：約櫃預表基督道成肉身（木表人性、金表神性），內藏法版見證神約。
  relation: 本章將約櫃定位於至聖所內（內幔以內），作為神同在的中心，與施恩座、內幔共同構成至聖所佈局。
- title: 陳設餅桌子
  path: link_folder/主題/陳設餅桌子.md
  summary: 出26:35 經文記載桌子安在幔子外帳幕北面。KC/BH 註解：桌子預表基督神人二性，十二餅代表十二支派，象徵神持續供應與相交。
  relation: 本章確定桌子在聖所內的具體位置（北面，幔子外），與燈臺（南面）相對，構成聖所雙核心器具佈局。
- title: 金燈臺
  path: link_folder/主題/金燈臺.md
  summary: 出26:35 經文記載燈臺安在帳幕南面，與桌子相對。KC/BH 註解：燈臺預表基督與教會發光見證，錘打過程預表受苦試煉，七燈表徵完全。
  relation: 本章確定燈臺在聖所內的具體位置（南面，與桌子相對），為聖所提供唯一光源，照亮桌上陳設餅。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出26:30 經文明確說「要照著在山上指示你的樣式立起帳幕」。來8:5、9:23-24 指出地上帳幕是天上真聖所的影兒/副本。
  relation: 本章作為帳幕結構詳細規範的總結，再次強調一切建造必須遵循山上樣式，將出25-26章的具體規格納入「照樣式」的神學框架。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出26:15、26、32、37 多處用皂莢木作板、閂、柱子。CT/GT/KC/BH 註解：皂莢木表徵基督堅固不朽壞的人性，包金表徵神性彰顯於人性中。
  relation: 本章大量使用皂莢木構建帳幕骨架（豎板、閂、內幔柱、門簾柱），將皂莢木的應用從器具（出25）擴展到整個會幕結構框架。
- title: 銀子
  path: link_folder/主題/銀子.md
  summary: 出26:19、21、23、25、32、37 記載銀座（每板兩個，共96個）、內幔柱銀座（4個）、門簾柱無銀座（用銅座）。KC/BH 註解：銀表贖價（彼前1:18-19），雙銀座表徵信徒靠基督寶血贖回、雙重確據（因過犯被交付、因稱義復活 羅4:25）。
  relation: 本章系統性記載銀座在帳幕結構中的分佈（豎板96個、內幔柱4個），確立銀作為「贖價」在會幕地基中的核心地位。
