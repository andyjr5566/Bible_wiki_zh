book: 出埃及記
chapter: 26
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出26:1,30 神指示摩西照山上樣式造會幕，摩西傳達指示並監督建造。
  relation: 出26章是摩西領受會幕建造指示的核心章節，摩西作為中保傳達神的啟示。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出26:30 神在西乃山向摩西指示會幕樣式。
  relation: 西乃山是神啟示會幕樣式的地點，出26:30明確指出「照著在山上指示你的樣式」。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出26:1-30 詳細記載會幕的結構、材料、尺寸與組裝方式。
  relation: 出26章是會幕建造指示的核心章節，涵蓋幔子、罩棚、豎板、閂、柱子等所有結構細節。
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: 出26:33 幔子將聖所與至聖所隔開；聖所內放陳設餅桌子與燈臺。
  relation: 出26:33-35 規定聖所的空間配置與陳設，聖所是祭司日常事奉的場所。
- title: 西乃的曠野
  path: link_folder/地點/西乃的曠野.md
  summary: 出26 會幕在西乃曠野中建造、立起、遷徙。
  relation: 會幕作為可移動的聖所，陪伴以色列人在西乃曠野四十年漂流。
- title: 基路伯
  path: link_folder/神學/基路伯.md
  summary: 出26:1,31 幔子與隔幔繡基路伯，象徵神的榮耀與守護。
  relation: 出26:1,31 基路伯繡於會幕幔子與隔幔上，象徵神的榮耀臨在與聖潔守護。
- title: 施恩座
  path: link_folder/神學/施恩座.md
  summary: 出26:34 施恩座安在至聖所內法櫃上，神從此與摩西相會。
  relation: 出26:34 施恩座是神與人相會之處，預表基督作挽回祭（羅3:25，來9:5）。
- title: 法櫃
  path: link_folder/神學/法櫃.md
  summary: 出26:33-34 法櫃置於至聖所內，施恩座蓋其上，內裝法版。
  relation: 出26:33-34 法櫃是約的核心，放在至聖所內，代表神的約與同在。
- title: 燈臺
  path: link_folder/神學/燈臺.md
  summary: 出26:35 燈臺放在聖所南面，與陳設餅桌子相對。
  relation: 出26:35 燈臺照亮聖所，預表基督為世界的光（約8:12），也預表教會作光的見證（太5:14，啟1:20）。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出26:1,30,33-34 會幕是神與百姓同住的居所，幔子隔開聖所至聖所。
  relation: 出26章通篇展現神渴望與人同住，會幕結構體現神聖潔與恩典並存。
- title: 神的榮耀
  path: link_folder/神學/神的榮耀.md
  summary: 出26:1,31 基路伯繡於幔子上彰顯神的榮耀；會幕結構彰顯神的聖潔榮耀。
  relation: 出26:1,31 基路伯與會幕結構共同彰顯神的榮耀與聖潔。
- title: 聖靈
  path: link_folder/神學/聖靈.md
  summary: 出26:1,31 「巧匠的手工」繡基路伯，預表聖靈的工作（出31:3, 35:31）。
  relation: 出26:1,31 巧匠手工預表聖靈賜予智慧技藝，建造神的居所。
- title: 約1：14
  path: link_folder/互文/約1：14.md
  summary: 約1:14「道成了肉身，住在我們中間」（原文「支搭帳幕在我們中間」）。
  relation: 約1:14是出26會幕「神住在百姓中間」的終極應驗——基督道成肉身作神與人同住的真實帳幕。
- title: 來10：19-20
  path: link_folder/互文/來10：19-20.md
  summary: 來10:19-20「我們藉著耶穌的血，得以坦然無懼進入至聖所，是藉著祂給我們開了一條又新又活的路，從幔子這邊過去，這幔子就是祂的身體」。
  relation: 來10:19-20將出26:31-33隔幔預表基督的身體，基督肉身被裂開，為信徒開了進入神面前的路。
