book: 出埃及記
chapter: 26
updates:
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 本章30節重申「要照著在山上指示你的樣式立起帳幕」，將樣式原則從材料器具的規格延伸至帳幕本身的實際立起與組裝。
  relation: 出25:9,40論材料與器具須照樣式製作，本章30節將同一原則應用於帳幕的搭建施工本身，顯明從設計到落實都必須嚴格遵循神所啟示的樣式，不容許人的主觀更動。
- title: 天上真聖所（來9：23-24）
  path: link_folder/互文/天上真聖所（來9：23-24）.md
  summary: 本章30節同樣記載「照著在山上指示你的樣式立起帳幕」，將帳幕的實際搭建與山上啟示的屬天樣式相連。
  relation: 承接出25:9,40地上帳幕為天上真聖所複本的主題，本章顯明不僅材料器具、連帳幕的搭建方式都必須完全符合天上樣式，強化地上帳幕作為天上實體影像的預表意義。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 本章記載皂莢木用於製作帳幕豎板（v15）、橫閂（v26）、內幔柱子（v32）與門簾柱子（v37），皆包裹金子，並用金環套閂連結（v29）。
  relation: 皂莢木在本章從出25章約櫃、桌子、燈臺等器具的材料，延伸為帳幕本身的結構骨架（豎板、閂）與內幔、門簾的柱子，顯明基督堅固人性不僅是器具的根基，更是整個帳幕結構得以站立的基礎。
- title: 約櫃
  path: link_folder/主題/約櫃.md
  summary: 本章33節記載法櫃被抬進幔子內，安置於至聖所，幔子將聖所和至聖所隔開。
  relation: 承接出25章約櫃的製作規格，本章交代約櫃在帳幕整體結構中的確切位置——安於至聖所內幔子後方，突顯其神聖性與唯獨大祭司可親近的隔絕地位。
- title: 施恩座
  path: link_folder/主題/施恩座.md
  summary: 本章34節記載施恩座被安置在至聖所內的法櫃上。
  relation: 承接出25章施恩座的製作規格與神在此與摩西相會說話的應許，本章確立施恩座的最終安置位置在至聖所內，藉由內幔與聖所隔開，成為神與人相會的至聖之地。
- title: 陳設餅桌子
  path: link_folder/主題/陳設餅桌子.md
  summary: 本章35節記載桌子安置在幔子外、帳幕的北面，與燈臺彼此相對。
  relation: 承接出25章陳設餅桌子的製作規格，本章確立其在聖所內（幔子外）北面的具體位置，與金燈臺南北相對，共同構成聖所內的陳設格局。
- title: 金燈臺
  path: link_folder/主題/金燈臺.md
  summary: 本章35節記載燈臺安置在帳幕的南面，與陳設餅桌子彼此相對。
  relation: 承接出25章金燈臺的製作規格，本章確立其在聖所內南面的具體位置，與陳設餅桌子南北相對，其燈光是聖所內祭司事奉時唯一的光源。
- title: 會幕材料的豫表
  path: link_folder/神學/會幕材料的豫表.md
  summary: 本章再次列舉藍色、紫色、朱紅色線、細麻、山羊毛、染紅公羊皮、海狗皮、金、銀、銅等材料，分別用於帳幕的幔子、罩棚、豎板、閂、內幔與門簾。
  relation: 承接出25章材料豫表的原則，本章將同樣材料應用於帳幕的結構層面——銀座表徵救贖根基、銅座表徵審判煉淨、金子包裹表徵神性彰顯於人性，進一步豐富材料豫表基督位格與教會建造的屬靈意義。
- title: 來10：19-20
  path: link_folder/互文/來10：19-20.md
  summary: 本章31-33節記載內幔繡上基路伯、掛在四根柱子上，將聖所和至聖所隔開，法櫃被抬進幔子內。
  relation: 直接應驗此條目主題發展所預告的「出26:33幔子隔開至聖所」，本章內幔正是來10:19-20所指「祂的身體」之預表對象，確立幔子作為儀式隔離的具體記載，為後續基督裂開幔子、開通又新又活道路的應驗鋪墊。
- title: 林後5：21
  path: link_folder/互文/林後5：21.md
  summary: 本章7節記載用山羊毛織十一幅幔子作為帳幕以上的罩棚，CT/GT靈意註解指出山羊毛表徵為贖罪而被剪除，罩棚表徵耶穌代替人成為罪。
  relation: 罩棚以山羊毛（贖罪祭常用材料）製成，覆蓋在內層幔子之外，預表基督甘願站在罪人的地位上代替人成為罪，正是林後5:21「神使那無罪的替我們成為罪」的舊約豫表對應。
- title: 來10：5
  path: link_folder/互文/來10：5.md
  summary: 本章32節記載內幔柱子上有金鉤用以懸掛內幔，CT靈意註解指出金鉤表徵基督的身體出於神的預備。
  relation: 承接出21、22、23章「身體豫備」的預表鏈，本章金鉤懸掛內幔（幔子本身表徵基督的身體，來10:20）的細節，進一步呼應來10:5「你曾給我預備了身體」，深化道成肉身完美順服的預表脈絡。
