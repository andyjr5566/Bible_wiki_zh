name: 無佳形美容（賽53：2-3）
type: 互文
secondary_types: []
aliases:
- 無佳形美容
status: formal
definition: 以賽亞書53章2-3節預言基督「無佳形美容」、被人藐視，這與出埃及記26章14節會幕最外層覆蓋的「海狗皮」形成互文關聯。海狗皮外表粗糙不美觀，但質地堅韌，能抵擋曠野的風雨侵蝕。這表徵主耶穌在地上時，外貌不雅觀並非因為犯罪，乃是為了受試探和攻擊而經歷憂患痛苦；祂雖無外表的華美，卻有堅韌的人性，足能保護信徒不受撒但和世界的侵害。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 記載會幕最外層用海狗皮做頂蓋，從外表看顯得簡陋無華。
  relation: 海狗皮的外表無華對應以賽亞書中基督無佳形美容的預言，表徵祂隱藏的榮耀與堅韌的保護。
related_entries:
