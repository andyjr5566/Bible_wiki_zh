status: formal
definition: 會幕織物使用的三種染色線：藍色（tekhelet，取自蝸牛分泌物）、紫色（argaman，同源料不同工藝）、朱紅色（tola'at shani，蚧蟲染料）。三色線與撚的細麻結合，織製內層幔子、內幔、門簾，並繡上基路伯（出26:1,
  31, 36）。
development: 本章三處幔子皆採用此三色線配搭，構成會幕視覺核心：藍色指向天上/神聖，紫色象徵王權/榮耀，朱紅色預表贖罪/生命，三色交織彰顯神榮耀同在的屬天實體。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 內層十幅幔子、內幔、門簾均以三色線配合細麻織製，並繡基路伯。
  relation: 三色線貫穿會幕所有進入點與分隔幔子，標示聖所空間的屬天屬性與救贖意涵。
