name: 至聖所
type: 地點
secondary_types: []
aliases:
- 幔子內
status: formal
definition: 至聖所是帳幕最內層的空間，由繡上基路伯的內幔與聖所隔開。本章指示要把法櫃抬進幔子內，並將施恩座安在至聖所內的法櫃上，作為神臨在與施恩的至高之處。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 規定內幔將聖所和至聖所隔開，法櫃與施恩座安置於至聖所內。
  relation: 至聖所作為神榮耀臨在的隱密處，彰顯了神的聖潔與人親近神的限制。
related_entries:
- 聖所
- 內幔（隔聖所至聖所的幔子）
- 約櫃
- 施恩座
- 基路伯（施恩座）
sources:
- '本章經文: 出埃及記 第26章（https://www.biblegateway.com/passage/?search=Exodus+26&version=CUV）'
