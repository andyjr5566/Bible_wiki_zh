status: formal
definition: 指用皂莢木製成、包金的橫向連接桿，穿過豎板上的金環，將各塊豎板鎖緊成牆。出埃及記 26 章規定帳幕南、北、西三面各做五閂（v.26-27），中間的一根長閂從這頭通到那頭貫穿全側（v.28），閂與板同樣用金子包裹（v.29），使帳幕結構成為一體。
development: ''
