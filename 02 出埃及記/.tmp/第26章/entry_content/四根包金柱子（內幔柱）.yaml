name: 四根包金柱子（內幔柱）
type: 主題
secondary_types: []
aliases:
- 內幔柱
status: formal
definition: 四根包金柱子是支撐內幔的柱子，材質為皂莢木，外面包金。柱子上有金鉤，用來掛內幔。這四根柱子安在四個帶卯的銀座上，設立於帳幕內部，用以懸掛隔開聖所與至聖所的幔子。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 神吩咐用皂莢木做四根包金的柱子，安在銀座上，用以懸掛隔開聖所與至聖所的幔子。
  relation: 柱子支撐內幔，象徵支撐神聖潔與公義的要求，也預表基督堅固的見證支撐了通往神面前的道路。
related_entries:
- 皂莢木（atzei shittim）
- 金子（包金）
- 銀座（帶卯的銀座）
- 內幔（隔聖所至聖所的幔子）
- 聖所
- 至聖所
sources:
