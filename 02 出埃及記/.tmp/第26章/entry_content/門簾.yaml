name: 門簾
type: 主題
secondary_types: []
aliases:
- 帳幕的門簾
- 簾子
status: formal
definition: 門簾是指會幕東面入口處的簾子。出埃及記26章36節記載，這門簾要用藍色、紫色、朱紅色線和撚的細麻，用繡花的手工織成。它與內幔的材料和顏色相同，但上面沒有繡上基路伯。門簾掛在五根用金子包裹的皂莢木柱子上，柱子上有金鉤，並用銅鑄造五個帶卯的座作為基座（出26:37）。門簾表徵基督是門（約10:7），人藉著這門能進入聖所，得著與神相交、光照並親近神的恩典。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 記載門簾的繡花材料與工法，以及懸掛於五根包金皂莢木柱子和銅座上的規格。
  relation: 門簾作為會幕的入口，表徵基督是通往神面前的唯一門路。
related_entries:
- 我是門（約10：7-9）
