- 鈕扣
- 幔子鈕扣
status: formal
definition: 內層十幅幔子兩組各自末幅邊上所做的五十個鈕扣，材質/顏色為藍色（tekhelet）。兩組幔子各五十個鈕扣，兩兩相對，供金鉤穿過連結，使幔子合成一個帳幕（出26:4-5）。藍色呼應幔子織物中的藍色線，指向天上屬性。
development: 鈕扣與金鉤配合，實現幔子的模組化連接。藍色材質與幔子織物一致，強調整體設計的統一性。數目五十（禧年數）暗示完全、自由、恢復的神學意涵。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 在兩組幔子末幅邊各做五十個藍色鈕扣，兩兩相對，供金鉤連結。
  relation: 藍色鈕扣作為連接點，配合金鉤將分離的幔子合一，象徵屬天屬性（藍色）與神聖榮耀（金）聯手建立會幕的完整覆蓋。
