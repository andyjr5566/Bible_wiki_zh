name: 帳幕門簾
type: 主題
secondary_types: []
aliases:
- 門簾
status: formal
definition: 帳幕門簾是帳幕入口的簾子，使用藍色、紫色、朱紅色線和撚的細麻，以繡花的手工織成。此門簾掛在五根包金的皂莢木柱子上，柱子上有金鉤，並用銅鑄造五個帶卯的座作為支撐。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 神吩咐用細麻與各色線織帳幕的門簾，並掛於五根包金柱子上。
  relation: 門簾作為帳幕的入口，象徵進入神居所的唯一途徑，預表基督為通往神面前的門。
related_entries:
- 撚的細麻
- 藍色、紫色、朱紅色線
- 五根包金柱子（門簾柱）
- 皂莢木（atzei shittim）
- 金子（包金）
- 銅
- 會幕（帳幕整體）
- 聖所
sources:
- 'CT: Exodus 26 — 門簾的材質與製作（https://www.chinesetool.com/christianresource/bible/exodus/26.html）'
