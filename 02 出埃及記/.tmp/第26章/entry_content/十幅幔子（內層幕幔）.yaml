status: formal
definition: 會幕最內層的覆蓋，由十幅幔子組成，每幅長二十八肘、寬四肘，用撚的細麻與藍色、紫色、朱紅色線織成，並繡上基路伯。五幅相連成兩組，再以五十個金鉤透過藍色鈕扣連結，合成一個完整的帳幕（出26:1-6）。
development: 本章詳細規範內層幔子的材質、尺寸、連接方式，強調其為會幕核心結構，將聖所與至聖所包覆其中，象徵神同在的遮蓋與榮耀。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 規範十幅幔子的材質、尺寸、繡工、連接細節，構成會幕的第一層覆蓋。
  relation: 作為會幕最內層幔子，直接覆蓋聖所與至聖所，彰顯神同在的榮耀與分別為聖。
