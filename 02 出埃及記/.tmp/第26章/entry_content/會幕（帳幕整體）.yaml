name: 會幕（帳幕整體）
type: 主題
secondary_types: []
aliases:
- 帳幕
- 會幕
status: formal
definition: 本章詳細記載了會幕（帳幕整體）的結構與建造指示。帳幕由內層的十幅細麻幔子、外層的山羊毛罩棚、染紅公羊皮蓋子與海狗皮頂蓋組成，並以皂莢木豎板為骨架，透過金鉤與銅鉤將各部件相連，成為一個可移動的神聖空間，作為神與人相會之處。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 詳細記載帳幕的幔子、罩棚、豎板、閂及內幔與門簾的製作規格與組裝方式。
  relation: 帳幕整體結構的設計彰顯了神居住在人中的神聖次序與分別為聖的法則。
related_entries:
- 山上的樣式
- 十幅幔子（內層幕幔）
- 十一幅山羊毛幔子（罩棚）
- 染紅的公羊皮蓋子
- 海狗皮頂蓋
- 皂莢木豎板
- 閂（橫閂）
- 內幔（隔聖所至聖所的幔子）
- 帳幕門簾
sources:
