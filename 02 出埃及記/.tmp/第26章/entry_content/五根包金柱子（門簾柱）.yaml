name: 五根包金柱子（門簾柱）
type: 主題
secondary_types: []
aliases:
- 門簾柱
status: formal
definition: 五根包金柱子是支撐帳幕門簾的柱子，材質為皂莢木，用金子包裹。柱子上有金鉤用以掛門簾，並為這五根柱子用銅鑄造五個帶卯的座作為基座。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 神吩咐用皂莢木做五根包金的柱子，安在銅座上，用以懸掛帳幕的門簾。
  relation: 五根門簾柱支撐入口，象徵蒙恩者藉著神公義（銅座）與神性（包金）的根基，得以進入聖所事奉神。
related_entries:
- 皂莢木（atzei shittim）
- 金子（包金）
- 銅
- 帳幕門簾
- 會幕（帳幕整體）
- 聖所
sources:
- 'CT: Exodus 26 — 門簾柱子的材質與結構（https://www.chinesetool.com/christianresource/bible/exodus/26.html）'
- 'GT: Exodus 26 — 門簾柱子的屬靈意涵（https://www.gotquestions.org/Exodus-26.html）'
