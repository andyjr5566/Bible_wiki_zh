name: 皂莢木豎板
type: 主題
secondary_types: []
aliases:
- 帳幕的豎板
status: formal
definition: 皂莢木豎板是構成帳幕主體結構的木板。材質為皂莢木，每塊長十肘、寬一肘半，每塊有兩榫相對。帳幕南面與北面各有二十塊板，西面（後面）有六塊板，後面的拐角有兩塊板。板底下有帶卯的銀座，兩卯接一塊板上的兩榫。板要用金子包裹，並有金環套閂。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 神吩咐用皂莢木做帳幕的豎板，並詳細規定其尺寸、數量與結構。
  relation: 豎板構成帳幕的骨架，象徵教會的骨架與根基，信徒在基督裡被建造成為神的居所。
related_entries:
- 皂莢木（atzei shittim）
- 銀座（帶卯的銀座）
- 閂（橫閂）
- 拐角板（雙板）
- 金子（包金）
- 會幕（帳幕整體）
