name: 金子（包金）
type: 主題
secondary_types: []
aliases:
- 金
- 包金
status: formal
definition: 金子在本章廣泛用於帳幕的建造，包括使幔子相連的五十個金鉤、包裹皂莢木豎板與閂、製作板上的金環、內幔四根柱子的包金與金鉤，以及門簾柱子的包金。金子象徵著神聖的尊貴與純潔。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 記載金子用於製作金鉤、包裹豎板與閂、製作金環，以及包裹內幔與門簾的柱子。
  relation: 金子的廣泛使用彰顯了帳幕作為神居所的尊貴、榮耀與神聖性。
related_entries:
- 五十個金鉤
- 皂莢木豎板
- 閂（橫閂）
- 四根包金柱子（內幔柱）
- 五根包金柱子（門簾柱）
sources:
- '本章經文: 出埃及記 第26章（https://www.biblegateway.com/passage/?search=Exodus+26&version=CUV）'
