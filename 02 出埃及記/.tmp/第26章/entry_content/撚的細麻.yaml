name: 撚的細麻
type: 原文
secondary_types: []
aliases:
- 撚的細麻
status: formal
definition: 指由多股細紗撚合編織而成的高品質細麻布，在出埃及記中用作帳幕內層幔子與內幔的材料，象徵聖潔與榮耀。
accumulations:
- book: 出埃及記
  chapter: 26
  summary: 用作製造帳幕十幅幔子、內幔及門簾的基礎材料。
  relation: 與藍色、紫色、朱紅色線並用，構成帳幕最內層的聖潔遮蓋。
related_entries:
- 十幅幔子（內層幕幔）
- 藍色、紫色、朱紅色線
- 內幔（隔聖所至聖所的幔子）
- 帳幕門簾
