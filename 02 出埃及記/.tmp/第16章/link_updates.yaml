book: 出埃及記
chapter: 16
updates:
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: "v1-2「以色列全會眾」——《中文聖經註釋》與 CT 都指出這是五經首次使用這個詞；全會眾一同起行、一同發怨言、一同看見耶和華的榮光（v10）"
  relation: "CT 從這個詞讀出目的：以色列人出埃及最主要的目的是為著事奉神，因此必須聚集在一起、『全會眾』同工配搭才能達成——「這個『全會眾』也就成了新約時代『教會』的模型」"
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: "v1 出埃及後第二個月十五日；v3「巴不得我們早死在埃及地…那時我們坐在肉鍋旁邊，吃得飽足」；v6「你們要知道是耶和華將你們從埃及地領出來的」；v32 嗎哪要留到世世代代，使後人看見神當日將他們領出埃及地"
  relation: "本章的埃及是一個被記憶篡改的埃及：《精讀本》指這是把悲慘的奴僕生活「浪漫化」；《丁道爾》：「奴隸沒有多少肉吃，印象中的卻是巨形的肉鍋」——神降嗎哪正是要提醒他們，領他們出埃及的是誰"
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: "v4 應許降下糧食並試驗百姓；v7,10 耶和華的榮光在雲中顯現——這是神首次向以色列全會眾顯現；v12「你們就知道我是耶和華你們的神」；v28「你們不肯守我的誡命和律法，要到幾時呢？」"
  relation: "本章神以恩典回應怨言：KC 指「祂顯現不是要滅絕他們，而是要用祂是誰來使他們折服」；v28 的責備顯出神的忍耐——CT：「『要到幾時呢？』可見神仍滿有恩慈、寬容、忍耐，等待著祂的子民能夠悔改」（羅2:4）"
- title: 迦南
  path: link_folder/人物/迦南.md
  summary: "v35「以色列人吃嗎哪共四十年，直到進了有人居住之地，就是迦南的境界」——嗎哪的終點"
  relation: "書5:10-12 記以色列人進迦南吃那地的出產後嗎哪就止住了；丁良才指「四十年」是囫圇數，《精讀本》算出實為三十九年十一個月——曠野的食物為應許之地的食物所取代"
