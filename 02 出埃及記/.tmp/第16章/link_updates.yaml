book: 出埃及記
chapter: 16
updates:
- title: 聽命順從蒙醫治
  path: link_folder/主題/聽命順從蒙醫治.md
  summary: |
    第16章延伸了聽命順從的原則。神賜嗎哪時說「我好試驗他們遵不遵我的法度」（v4），將每日收取嗎哪的規定作為試驗以色列人是否順從的具體方式。v27-28記載有人在安息日仍出去收取，神說「你們不肯守我的誡命和律法，要到幾時呢？」——這與15:26「你若留意聽耶和華你神的話」形成對照：聽命順從不僅是蒙醫治的條件，也是每日生活的考驗。
  relation: |
    第16章將聽命順從的原則從瑪拉的單次試驗（苦水變甜）延伸到每日的持續試驗（收取嗎哪）。神以「每天收每天的分」訓練百姓每日倚靠和順從，並以安息日規定測試他們是否遵守神的法度。CT指出神試驗人的目的不是為知道（神全知），而是使人顯出實際光景。
- title: 神試驗亞伯拉罕
  path: link_folder/神學/神試驗亞伯拉罕.md
  summary: |
    出埃及記第16章記載神以嗎哪試驗以色列全會眾。v4「我好試驗他們遵不遵我的法度」——神藉每日收取嗎哪的規定（每天收每天的分、第六日雙倍、第七日不可收取）試驗百姓是否順從。v27-28記載有人在安息日仍出去收取，神責備他們不肯守誡命和律法。這與創22章神試驗亞伯拉罕獻以撒的模式相似：神以具體命令試驗人的順從，結果顯出人的真實光景。
  relation: |
    出16的試驗與創22的試驗都是神以具體命令測試順從。不同在於：創22是單次極限考驗（獻獨生子），出16是每日持續考驗（每天收每天的分）。CT指出神試驗的目的不是為知道結果，而是使受試驗者顯出實際光景。GT指出嗎哪的試驗包含兩層：是否每日倚靠神（不囤積），是否遵守安息日（第六日雙倍收取）。
- title: 以色列人的怨言
  path: link_folder/歷史/以色列人的怨言.md
  summary: |
    第16章記載以色列全會眾在汛的曠野為缺糧發怨言（v2-3）。這是出埃及後第二次大規模怨言——百姓說「巴不得我們早死在埃及地、耶和華的手下；那時我們坐在肉鍋旁邊，吃得飽足」（v3）。他們將埃及的奴隸生活浪漫化，忘記了神的拯救。摩西指出「你們的怨言不是向我們發的，乃是向耶和華發的」（v8）。神以賜下鵪鶉和嗎哪回應怨言，同時以收取規定試驗他們。
  relation: |
    第16章的怨言是曠野怨言模式的第三次出現（第14章面對追兵、第15章瑪拉缺水、第16章汛的曠野缺糧）。怨言對象從摩西亞倫升級到直接針對神（v3「巴不得我們早死在耶和華的手下」）。CT指出怨言出於不信、忘恩、論理不公。GT指出百姓其實並非真的快要餓死（他們還有牲畜），而是懷戀埃及的肉食。
- title: 以琳
  path: link_folder/地點/以琳.md
  summary: |
    第16章記載以色列全會眾從以琳起行（v1），離開這片有十二股水泉、七十棵棕樹的綠洲，進入汛的曠野。以琳雖好，仍不能久留——神要帶領百姓繼續前行。
  relation: |
    以琳是出15:27的安息之處，出16:1的起行之地。CT指出以琳雖有水有綠蔭，仍不能久留，必須啟程前行——預表信徒不可停留在過往的屬靈經歷中。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: |
    第16章亞倫的角色包括：(1) 與摩西一同被百姓發怨言（v2）；(2) 摩西吩咐亞倫告訴全會眾就近耶和華面前（v9）；(3) 亞倫正說話時耶和華的榮光在雲中顯現（v10）；(4) 摩西吩咐亞倫拿罐子盛一滿俄梅珥嗎哪，存在耶和華面前（v33），亞倫照辦（v34）。
  relation: |
    亞倫在第16章的角色從被埋怨的領袖（v2）到傳話者（v9-10）再到保存嗎哪的執行者（v33-34），展現其祭司職分的雛形——將百姓帶到神面前，並保存神供應的記念。
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: |
    第16章摩西的角色包括：(1) 被全會眾發怨言（v2-3）；(2) 傳達神的應許——晚上吃肉早晨吃餅（v6-8）；(3) 吩咐亞倫叫百姓就近耶和華（v9）；(4) 傳達收取嗎哪的規定（v16-19）；(5) 向不聽話留嗎哪到早晨的人發怒（v20）；(6) 傳達安息日規定（v22-26）；(7) 責備百姓在安息日出去收取（v27-30）；(8) 吩咐保存一俄梅珥嗎哪（v32-33）。
  relation: |
    摩西在第16章展現了領袖在百姓怨言中的處境——「我們算什麼，你們竟向我們發怨言呢？」（v7-8），並忠實傳達神的吩咐。CT指出摩西的處境越來越不好受，但他始終順從神。
