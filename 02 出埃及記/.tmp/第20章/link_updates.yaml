book: 出埃及記
chapter: 20
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: |
    摩西在第二十章作為神與百姓之間的中保角色更加明確。神直接從天上向全體百姓頒布十誡（1-17節），百姓因神的威嚴顯現而極其懼怕，請求摩西代替神向他們說話（19節）。摩西安慰百姓不要懼怕，解釋神降臨的目的是試驗他們、使他們敬畏神不致犯罪（20節）。隨後摩西獨自挨近神所在的幽暗之中（21節），領受關於築壇獻祭的進一步指示（22-26節）。摩西在此章展現了中保、先知和領袖的三重角色。
  relation: |
    摩西是神頒布十誡時的中保。百姓因懼怕神的直接顯現而請求摩西作中介（19節：「求你和我們說話，我們必聽；不要神和我們說話，恐怕我們死亡」）。摩西向百姓解釋神降臨的正面目的（20節），並獨自進入神的幽暗領受進一步啟示（21節）。摩西的中保角色預表基督作為神與人之間唯一的中保（提前2：5）。
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: |
    第二十章以「神吩咐這一切的話說」（1節）開始，耶和華親自從天上向以色列全會眾頒布十誡。第2節宣告「我是耶和華你的神，曾將你從埃及地為奴之家領出來」，以救贖主的身份作為頒布誡命的基礎。十誡的每一條都反映耶和華的本性：祂是獨一的神（3節）、是忌邪的神（5節）、是聖潔的神（7節）、是創造主（11節）。百姓因耶和華威嚴的顯現（雷轟、閃電、角聲、山上冒煙）而極其懼怕（18節）。耶和華隨後指示築壇獻祭的規則（22-26節），強調祂名的所在即賜福的所在（24節）。
  relation: |
    耶和華是十誡的頒布者。祂以「我是耶和華你的神，曾將你從埃及地為奴之家領出來」（2節）作為十誡的引言，表明誡命基於救贖恩典而非單純律法要求。十誡的每一條都彰顯耶和華的本性：獨一性、忌邪性、聖潔性、創造性。耶和華在雷轟、閃電、角聲和煙霧中威嚴降臨西乃山（18節），使百姓深刻體驗祂的可畏與聖潔。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: |
    第二十章記載神在西乃山從天上向以色列百姓頒布十誡（1-17節）。西乃山在頒布律法時伴隨雷轟、閃電、角聲和山上冒煙的現象（18節），彰顯神的威嚴與聖潔。百姓因這些現象而發顫，遠遠站立（18節）。摩西隨後挨近神所在的幽暗之中（21節），領受關於築壇的指示。西乃山因此成為神與以色列立約、頒布律法的核心地點。
  relation: |
    西乃山是神頒布十誡的地點。神在雷轟、閃電、角聲和煙霧中從天上向百姓說話（1、18節）。百姓因神的威嚴顯現而懼怕，遠遠站立（18、21節）。摩西獨自進入幽暗之中領受進一步指示（21節）。西乃山因此成為律法頒布和神人相遇的關鍵場所。
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: |
    第二十章第2節，神在頒布十誡的引言中宣告：「我是耶和華你的神，曾將你從埃及地為奴之家領出來。」埃及在此作為以色列過去為奴之地的象徵，與神救贖恩典形成對比。神以救贖主而非創造主的身份頒布誡命，強調誡命是基於祂將百姓從埃及奴役中拯救出來的恩典行動。埃及的提及使十誡與出埃及的救贖歷史緊密相連。
  relation: |
    埃及在十誡引言中作為以色列過去為奴之地被提及（2節：「曾將你從埃及地為奴之家領出來」）。神以救贖主身份頒布誡命，將律法要求建立在出埃及的救贖恩典之上。埃及的提及使十誡與整個出埃及敘事緊密相連。
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: |
    第四誡（8-11節）命令「當記念安息日，守為聖日」。安息日的基礎是神的創造：六日之內耶和華造天地海和其中的萬物，第七日便安息，所以神賜福與安息日，定為聖日（11節）。安息日的規定包括：六日要勞碌作工，第七日無論何人（兒女、僕婢、牲畜、寄居的客旅）都不可作工（9-10節）。安息日是向耶和華守的聖日（10節）。此誡命在申命記5：15以出埃及的救贖為安息日的另一基礎。新約指出安息日的終末應驗在基督裡的真安息（來4：9-10）。
  relation: |
    第四誡（8-11節）詳細規定安息日的遵守。安息日的基礎是神的創造（11節），六日勞碌、第七日安息。安息日適用於所有人，包括兒女、僕婢、牲畜和寄居者（10節）。神賜福與安息日，定為聖日（11節）。安息日指向創造的完成和基督裡的終末安息（來4：9-10）。
- title: 神的降臨
  path: link_folder/神學/神的降臨.md
  summary: |
    第二十章記載神在西乃山威嚴降臨頒布十誡。神「從天上」向百姓說話（22節），伴隨雷轟、閃電、角聲和山上冒煙的現象（18節）。百姓因這些現象而發顫，遠遠站立（18節），並請求摩西作中介（19節）。摩西解釋神降臨的目的是「試驗你們，叫你們時常敬畏他，不致犯罪」（20節）。隨後摩西挨近神所在的幽暗之中（21節）。神的降臨在此彰顯了祂的威嚴、聖潔和可畏，同時也顯明祂願意與百姓建立關係。
  relation: |
    神在雷轟、閃電、角聲和煙霧中威嚴降臨西乃山頒布十誡（1、18節）。百姓因神的顯現而極其懼怕（18-19節）。摩西解釋神降臨的正面目的：試驗百姓、使他們敬畏神不致犯罪（20節）。神從天上說話（22節），摩西進入幽暗中領受進一步指示（21節）。
- title: 敬畏神
  path: link_folder/神學/敬畏神.md
  summary: |
    第二十章第20節，摩西對懼怕的百姓說：「不要懼怕；因為神降臨是要試驗你們，叫你們時常敬畏他，不致犯罪。」此處區分了「懼怕」（terror）與「敬畏」（fear of God）。神降臨的目的不是要毀滅百姓，而是要透過威嚴的顯現使他們產生持久的敬畏之心，從而遠離罪惡。敬畏神是防止犯罪的內在動力（參箴16：6「因敬畏耶和華遠離惡事」），也是智慧的開端（箴9：10）。
  relation: |
    摩西教導百姓區分「懼怕」與「敬畏」（20節）。神降臨的目的是試驗百姓，使他們時常敬畏神，不致犯罪。敬畏神是防止犯罪的內在動力，也是智慧的開端（箴9：10；箴16：6）。
- title: 燔祭
  path: link_folder/神學/燔祭.md
  summary: |
    第二十章第24節，神指示以色列人築土壇，在上面以牛羊獻為燔祭和平安祭。燔祭（`olah）是全然焚燒獻給神的祭，象徵完全的奉獻與贖罪。此處是神在西乃山頒布十誡後首次指示獻祭制度，將敬拜的具體形式與十誡的道德要求相結合。燔祭預表基督作為完全的祭物獻上自己（弗5：2）。
  relation: |
    神在頒布十誡後指示築壇獻祭（24節），燔祭是其中一種。燔祭以牛羊獻上，全然焚燒歸給神，象徵完全的奉獻。此為西乃立約後首次指示獻祭制度。
- title: 神的聖潔
  path: link_folder/神學/神的聖潔.md
  summary: |
    第二十章透過多個層面彰顯神的聖潔：十誡的道德要求反映神的聖潔本性（3-17節）；神在雷轟、閃電、角聲和煙霧中威嚴降臨（18節），使百姓懼怕而不敢靠近；神指示築壇時規定不可用鑿成的石頭（25節），因為人的工具會污穢壇；不可用臺階上壇（26節），免得露出下體。這些規定強調人在聖潔的神面前必須保持謙卑和敬畏，不可將人的驕傲或工藝帶入敬拜。
  relation: |
    神的聖潔在十誡的道德要求（3-17節）、威嚴的顯現（18節）和築壇規定（25-26節）中彰顯。不可用鑿成的石頭築壇（25節），因人的工具會污穢壇；不可用臺階（26節），免得露出下體。這些規定強調在聖潔的神面前必須保持謙卑和敬畏。
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: |
    第二十章中，以色列作為神頒布十誡的對象出現。神對摩西說「你要向以色列人這樣說」（22節），表明十誡和築壇指示是向全體以色列人頒布的。以色列是神從埃及為奴之家領出來的百姓（2節），是神立約的對象。十誡的每一條誡命都以單數第二人稱「你」對以色列人說話，表明誡命既是向全體會眾、也是向每一個別以色列人頒布的。
  relation: |
    以色列是十誡的接受者和立約的對象。神宣告「我是耶和華你的神，曾將你從埃及地為奴之家領出來」（2節），以救贖主身份向以色列頒布誡命。神吩咐摩西「你要向以色列人這樣說」（22節），將十誡和築壇指示傳達給全體百姓。
