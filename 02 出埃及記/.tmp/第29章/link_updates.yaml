book: 出埃及記
chapter: 29
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出29:1-46 摩西奉神吩咐為亞倫和他兒子行成聖禮，洗身、穿聖衣、膏立、獻祭。
  relation: 出29章是摩西執行祭司成聖禮的章節，摩西作為中保執行神的吩咐。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出29:1-37 亞倫和他兒子被成聖為祭司，洗身、穿聖衣、受膏立、按手、獻贖罪祭、燔祭、承接聖職禮。
  relation: 出29章詳細記載亞倫家族祭司成聖禮的全過程，確立亞倫家族祭司職分的神聖性。
- title: 亞倫的祭司譜系
  path: link_folder/人物/亞倫的祭司譜系.md
  summary: 出29:1,9,29-30 亞倫和他兒子（拿答、亞比戶、以利亞撒、以他瑪）被膏立為祭司，聖衣留給子孫繼承。
  relation: 出29章確立亞倫家族祭司職分的世襲性，聖衣與膏立傳給後裔（v29-30）。
- title: 拿答
  path: link_folder/人物/拿答.md
  summary: 出29:1 拿答是亞倫長子，被成聖為祭司，後因獻凡火被神擊殺（利10:1-2）。
  relation: 出29:1確立拿答作為亞倫長子、祭司家族成員的身分，後因獻凡火被神擊殺（利10:1-2）。
- title: 亞比戶
  path: link_folder/人物/亞比戶.md
  summary: 出29:1 亞比戶是亞倫次子，被成聖為祭司，後因獻凡火被神擊殺（利10:1-2）。
  relation: 出29:1確立亞比戶作為亞倫兒子、祭司家族成員的身分，後因獻凡火被神擊殺（利10:1-2）。
- title: 以利亞撒
  path: link_folder/人物/以利亞撒.md
  summary: 出29:1 以利亞撒是亞倫三子，被成聖為祭司，後繼承大祭司職分（民20:25-28）。
  relation: 出29:1確立以利亞撒作為亞倫兒子、祭司家族成員的身分，後成為大祭司。
- title: 以他瑪
  path: link_folder/人物/以他瑪.md
  summary: 出29:1 以他瑪是亞倫四子，被成聖為祭司，後管理利未人事務（民4:28, 7:8）。
  relation: 出29:1確立以他瑪作為亞倫兒子、祭司家族成員的身分，後管理利未人事務。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出29 神在西乃山向摩西啟示祭司成聖禮的細節。
  relation: 西乃山是神啟示會幕、祭司、獻祭等律法的地點，出29章屬於西乃山啟示的延續。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出29:4,10-11,30-32,42-44 會幕門口是成聖禮、獻祭、神與百姓相會的地點。
  relation: 出29章詳細規定會幕門口的成聖禮、獻祭儀式，會幕是祭司事奉與神相會的核心場所。
- title: 院子
  path: link_folder/地點/院子.md
  summary: 出29:11,31-34 宰殺祭牲、煮肉、吃餅都在會幕門口/院子進行。
  relation: 出29章院子是獻祭、成聖禮進行的場所，預表教會在世上分別為聖（來9:11-12, 23-24）。
- title: 祭司職分
  path: link_folder/神學/祭司職分.md
  summary: 出29:1,9,29-30,44 亞倫和他兒子被成聖為祭司，憑永遠的定例得了祭司職任。
  relation: 出29章確立祭司職分的神聖性、成聖禮程序、聖衣象徵意義、膏立與分別為聖程序，預表基督作大祭司（來5:1-5, 7:26-28）。
- title: 分別為聖
  path: link_folder/神學/分別為聖.md
  summary: 出29:1,21,33,36-37 亞倫和他兒子被分別為聖，壇被潔淨成聖，凡挨著壇的都成為聖。
  relation: 出29章確立分別為聖的儀式——洗身、穿聖衣、膏立、按手、獻贖罪祭、膏油與血彈在身上，預表基督被聖靈膏立（路4:18, 徒10:38）與信徒被聖靈分別為聖（林後1:21-22）。
- title: 贖罪祭
  path: link_folder/神學/贖罪祭.md
  summary: 出29:10-14,36 公牛為贖罪祭，按手、宰殺、抹血在壇角、倒血在壇腳、燒脂油，贖罪祭為祭司與百姓贖罪。
  relation: 出29:10-14,36贖罪祭預表基督一次獻上自己成就永遠贖罪（來9:11-12, 24-26, 10:10-12）。
- title: 燔祭
  path: link_folder/神學/燔祭.md
  summary: 出29:15-18,38-42 公綿羊為燔祭，按手、宰殺、灑血、切塊洗淨、全燒在壇上，早晚各一隻羊羔為常獻燔祭。
  relation: 出29:15-18,38-42燔祭預表基督一次獻上自己成就永遠贖罪（來10:10-12），信徒獻上自己作活祭（羅12:1）。
- title: 平安祭
  path: link_folder/神學/平安祭.md
  summary: 出29:28 搖祭的胸和舉祭的腿歸祭司，從以色列人的平安祭中作為獻給耶和華的舉祭。
  relation: 出29:28平安祭預表基督使信徒與神和好（羅5:1, 西1:20），信徒與神與聖徒享有屬靈交通（約壹1:3, 林前10:16-17）。
- title: 永遠的定例
  path: link_folder/神學/永遠的定例.md
  summary: 出29:9,28,35,42 祭司職分、聖衣、搖祭舉祭、常獻燔祭都是永遠的定例。
  relation: 出29章多處提到永遠的定例，預表基督永遠的祭司職分（來7:24-25）與信徒永遠的祭司身分（彼前2:9）。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出29:43-45 會幕因神的榮耀成聖，神住在以色列人中間，作他們的神。
  relation: 出29:43-45會幕因神榮耀成聖，神住在百姓中間，預表道成肉身住在我們中間（約1:14），聖靈內住信徒（約14:16-17, 林前3:16）。
- title: 神的榮耀
  path: link_folder/神學/神的榮耀.md
  summary: 出29:43 會幕就要因我的榮耀成為聖。
  relation: 出29:43會幕因神榮耀成聖，預表基督榮耀彰顯（約1:14, 來1:3），新耶路撒冷有神榮耀（啟21:23）。
- title: 無酵餅
  path: link_folder/原文/無酵餅.md
  summary: 出29:2,23 無酵餅、調油無酵餅、抹油薄餅用於承接聖職禮，預表基督無罪（來4:15）與聖靈膏抹（約3:34, 林後1:21-22）。
  relation: 出29:2,23無酵餅預表基督無罪的生命與聖靈膏抹，信徒當除去舊酵（林前5:7-8）。
