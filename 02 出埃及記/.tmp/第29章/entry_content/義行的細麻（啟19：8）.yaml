name: 義行的細麻（啟19：8）
type: 互文
secondary_types: []
aliases:
- 義行的細麻衣
status: formal
definition: 出埃及記二十九章記載祭司就職時必須穿上細麻布做的內袍（出29:5,8），細麻衣象徵聖潔與公義的生活行為。新約啟示錄十九章8節指出，新婦（教會）蒙恩得穿光明潔白的細麻衣，這細麻衣就是聖徒所行的義。舊約祭司穿上細麻內袍的條例，預表新約信徒在基督裡披戴義行，成為聖潔的祭司體系。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 亞倫和他兒子就職時穿上內袍，這內袍是用純白細麻布做成的，象徵生活行為的聖潔。
  relation: 祭司穿上細麻內袍預表信徒在神面前披戴基督的義與聖徒所行的義，成為君尊的祭司。
related_entries:
