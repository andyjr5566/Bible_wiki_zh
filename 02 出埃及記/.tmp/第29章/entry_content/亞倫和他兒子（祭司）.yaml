name: 亞倫和他兒子（祭司）
type: 人物
secondary_types: []
aliases:
- 亞倫和他兒子
status: formal
definition: 亞倫和他兒子是神從利未支派中揀選，分別為聖擔任祭司職分的人。亞倫為首任大祭司，預表基督是我們的大祭司；他的兒子們則為祭司，預表新約信徒皆為祭司。本章詳述他們承接聖職的禮儀，包括洗身、穿戴聖衣、受膏、獻祭，以及領受祭物為分，表明他們被神設立為神人之間的中保。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 亞倫和他兒子經過洗身、穿戴聖衣、受膏、獻贖罪祭、燔祭與承接聖職之祭，七天之久被分別為聖，得以供祭司的職分。
  relation: 亞倫和他兒子承接聖職的禮儀預表基督與信徒的祭司職分，表明事奉神必須先蒙救贖、披戴基督並受聖靈膏抹。
related_entries:
- 承接聖職（分別為聖）
- 洗身（水洗）
- 膏油（聖膏油）
- 聖衣（祭司聖服）
- 贖罪祭
- 燔祭
- 搖祭/舉祭
- 信徒作祭司（彼前2:5
- 9）
