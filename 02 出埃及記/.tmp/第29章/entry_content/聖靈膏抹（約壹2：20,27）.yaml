name: 聖靈膏抹（約壹2：20,27）
type: 互文
secondary_types: []
aliases:
- 聖靈的膏抹
status: formal
definition: 在出埃及記二十九章中，膏油被用來膏抹祭司和祭壇，使其分別為聖（出29:7,21,36）。膏油在聖經中常作為聖靈的預表。新約約翰壹書二章20及27節指出，信徒從聖者受了膏抹，並且這膏抹是真實的，教導信徒認識神。這應驗了舊約祭司受膏的屬靈意義，表明新約信徒藉著聖靈的膏抹得著分別為聖與事奉的能力。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 亞倫受膏時，摩西將膏油倒在他頭上膏他，並與壇上的血一同彈在亞倫和其兒子及衣服上，使他們成聖。
  relation: 舊約祭司承接聖職時物質的膏油抹身，預表新約信徒藉聖靈的膏抹得成聖並得著屬靈的恩膏教訓。
related_entries:
- 膏油（聖膏油）
- 承接聖職（分別為聖）
- 亞倫和他兒子（祭司）
