name: 信徒作祭司（彼前2：5,9）
type: 互文
secondary_types: []
aliases:
- 信徒作祭司
- 信徒皆祭司
status: formal
definition: 出埃及記29章詳述亞倫和他兒子透過洗身、穿聖衣、受膏與獻祭來承接祭司聖職。這舊約的祭司制度預表新約的救恩。正如彼得前書2章5、9節所言，新約信徒因著基督的救贖，也被揀選成為「聖潔的國民」與「有君尊的祭司」，藉著耶穌基督奉獻神所悅納的靈祭。舊約祭司需洗淨、穿上聖衣並被聖靈膏抹，對應新約信徒因信稱義、披戴基督並受聖靈，得以直接來到神面前事奉祂。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 亞倫父子透過洗身、穿聖衣、受膏與獻祭被設立為祭司，在會幕事奉神。
  relation: 舊約祭司的設立預表新約信徒在基督裡成為聖潔國度與君尊的祭司，奉獻靈祭。
