name: 基督作智慧（林前1：30）
type: 互文
secondary_types: []
aliases:
- 基督成為我們的智慧
status: formal
definition: 出埃及記二十九章記載祭司承接聖職時，需獻上細麥麵做成的無酵餅、調油的餅和抹油的薄餅（出29:2）。細麥麵代表經過磨細與對付的基督，成為均勻且柔細的供應。新約哥林多前書一章30節指出，神使基督成為我們的智慧、公義、聖潔與救贖。舊約祭司獻上細麥麵餅的條例，預表基督成為信徒事奉神時所需的生命智慧與內在供應。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 祭司就職時需獻上用細麥麵做成的無酵餅、調油的無酵餅與抹油的無酵薄餅。
  relation: 細麥麵預表經過十字架磨細對付的基督，成為新約信徒事奉神時的智慧與生命供應。
