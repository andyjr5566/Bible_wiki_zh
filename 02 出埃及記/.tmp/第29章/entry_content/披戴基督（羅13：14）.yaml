name: 披戴基督（羅13：14）
type: 互文
secondary_types: []
aliases:
- 披戴基督
status: formal
definition: 出埃及記29章記載，亞倫在承接聖職前需先用水洗身，隨後穿上內袍、外袍、以弗得等聖衣。這些聖衣象徵著公義、救恩與聖潔，預表新約信徒「披戴基督」（羅馬書13:14）。正如祭司不能赤身或穿著己服來事奉神，必須穿上神所預備的聖衣；信徒在基督裡也需脫去舊人，穿上新人，將基督的屬性與榮美在生活中彰顯出來，方能履行祭司的事奉。
accumulations:
