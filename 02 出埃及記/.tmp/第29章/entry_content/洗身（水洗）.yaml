name: 洗身（水洗）
type: 神學
secondary_types: []
aliases:
- 洗身
- 水洗
- 用水洗身
status: formal
definition: 「洗身」是祭司承接聖職的第一步，在會幕門口用水洗淨全身。水在聖經中預表神的道（弗五26），具有潔淨生命與除去污穢的功用。此儀式表明事奉神者必須有清潔的良心和行為，在消極方面洗淨罪惡的不潔，積極方面加添神的成分。這洗禮是
  New Testament 洗禮的先驅，象徵屬靈的潔淨與重生，指出信徒在事奉神之前，必須先藉著神的道得著潔淨。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 神吩咐摩西將亞倫和他兒子帶到會幕門口，用水洗身，作為供祭司職分前的潔淨儀式。
  relation: 水洗的行動確立了事奉神必須先潔淨自己的原則，預表信徒藉著神的道得潔淨後方能事奉。
