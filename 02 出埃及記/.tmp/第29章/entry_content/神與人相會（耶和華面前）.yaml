name: 神與人相會（耶和華面前）
type: 神學
secondary_types: []
aliases:
- 耶和華面前
- 神與人相會
status: formal
definition: 指神應許在會幕門口、祭壇前與以色列人相會並向他們說話。這表明神渴望與祂的子民建立親密的關係，而這相會的基礎在於祭壇上的流血與獻祭。神的榮耀降臨使會幕成聖，神也藉著住在以色列人中間，顯明祂是他們的神。
accumulations:
- book: 出埃及記
  chapter: 29
  summary: 神應許在會幕門口、常獻燔祭壇前與以色列人相會並說話，使會幕因祂的榮耀成聖，並住在以色列人中間。
  relation: 神與人相會是設立祭司、祭壇與每日獻祭的終極目的，彰顯神要與人同在的神學主題。
related_entries:
