book: 出埃及記
chapter: 24
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出24:1-2,9,12-18 摩西獨自親近神、上山領受石版律法誡命、在山上四十晝夜、作中保預表基督。
  relation: 出24章展示摩西作中保的最高點——獨自進入神的榮耀雲中，領受律法，預表基督作新約中保（來3:1-6, 8:6, 9:15, 12:24）。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出24:1,9-11,14 亞倫與拿答、亞比戶、七十長老上山遠遠下拜、看見神並吃喝；摩西上山時囑咐亞倫和戶珥處理爭訟。
  relation: 出24章顯示亞倫作為祭司代表與長老同上山見神（v9-11），但在摩西上山領石版時留下處理民事（v14），顯示祭司職事與中保職事的分工。
- title: 約書亞
  path: link_folder/人物/約書亞.md
  summary: 出24:13 約書亞作摩西的幫手，隨摩西上神的山，但未進入雲中。
  relation: 出24:13是約書亞在出埃及記中第二次出現（首次出17:9），陪伴摩西上山預表他將來接續摩西領導百姓進迦南。
- title: 戶珥
  path: link_folder/人物/戶珥.md
  summary: 出24:14 摩西上山前囑咐長老等候，有亞倫、戶珥同在，凡有爭訟的可就近他們。
  relation: 出24:14顯示戶珥與亞倫同為摩西不在時的臨時領袖，呼應出17:12戶珥扶持摩西手的角色。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出24:13,16-18 神的榮耀停於西乃山，雲彩遮蓋六天，第七天從雲中召摩西，摩西進入雲中在山上四十晝夜。
  relation: 出24章是西乃山上神與以色列立約的高潮——神的榮耀如烈火顯現，摩西進入雲中領受律法，確立西乃山作為立約之山的地位。
- title: 西乃之約
  path: link_folder/神學/西乃之約.md
  summary: 出24:3-8 立約儀式：摩西述說命令、百姓應許、寫約書、築壇立柱、獻燔祭平安祭、灑血在壇上與百姓身上、宣告「這是立約的血」。
  relation: 出24章是西乃之約正式締結的儀式章節，灑血儀式預表新約基督的血（來9:18-22, 太26:28），約書寫成確立成文律法。
- title: 神的榮耀
  path: link_folder/神學/神的榮耀.md
  summary: 出24:16-17 耶和華的榮耀停於西乃山，雲彩遮蓋山六天，第七天從雲中召摩西；榮耀在山頂形狀如烈火，以色列人眼前看見。
  relation: 出24章展示神的榮耀在立約時的顯現——雲彩與烈火雙重意象，預表神聖潔的臨在與審判，摩西得以進入榮耀中（來12:18-24對比西乃山與錫安山）。
- title: 中保
  path: link_folder/神學/中保.md
  summary: 出24:2,12-18 惟獨摩西可以親近耶和華，作百姓與神之間的中保；上山領受石版律法誡命，在山上四十晝夜。
  relation: 出24章是摩西作中保最完整的展示：獨自親近神（v2）、領受律法（v12）、進入榮耀雲中（v15-18），全面預表基督作新約中保（來3:1-6, 8:6, 9:15, 12:24）。
