name: 摩西求神同去並蒙應允
type: 事件
secondary_types: []
aliases:
- 摩西求神同行
- 神應允同去
status: formal
definition: 神起初表示要差遣使者領百姓前往迦南地，但祂自己不與百姓同去。摩西隨後在會幕中向神懇求，表明若神不親自同去，就不要把他們從這裡領上去。摩西強調，神與他們同去才是以色列民與地上萬民有分別的明證。神因摩西在祂眼前蒙恩且按名認識他，最終應允摩西所求，承諾必親自和他同去，使摩西得安息。
accumulations:
- book: 出埃及記
  chapter: 33
  summary: 摩西堅持若無神親自同去就不啟程，神因摩西蒙恩而應允與百姓同行。
  relation: 摩西的代求恢復了神與以色列人的立約關係，確保神親自同在成為選民獨特的記號。
related_entries:
- 硬著頸項的百姓
- 面對面見神
