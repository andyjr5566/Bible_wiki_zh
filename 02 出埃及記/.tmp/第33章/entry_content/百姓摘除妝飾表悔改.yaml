name: 百姓摘除妝飾表悔改
type: 事件
secondary_types: []
aliases:
- 摘除妝飾
- 悲哀不佩戴妝飾
status: formal
definition: 以色列百姓聽見神不與他們同去的凶信後，感到悲哀並自動摘除身上的妝飾品。隨後神透過摩西吩咐他們把身上的妝飾摘下來，以表明悔改與自卑。這不僅是哀悼的表現，也因為先前百姓曾用這些金飾製造金牛犢犯罪，神要求他們去除與偶像的關連。從住何烈山以後，百姓就把身上的妝飾摘得乾淨，成為曠野行程中的永久規例。
accumulations:
- book: 出埃及記
  chapter: 33
  summary: 百姓聽見神不親自同去的凶信而悲哀，並按神吩咐摘除身上妝飾以表悔改。
  relation: 摘除妝飾標誌著百姓對金牛犢之罪的悔悟，並為神後續決定如何待他們留下空間。
