name: 迦南七族（迦南地原住民）
type: 背景
secondary_types: []
aliases:
- 迦南地原住民
- 迦南六族
status: formal
definition: 指迦南地的原住民，包含迦南人、亞摩利人、赫人、比利洗人、希未人、耶布斯人。撒瑪利亞抄本和七十士譯本在出埃及記33章2節中加入了革迦撒人，湊足通常所稱的迦南地七族（參徒十三19）。這些群體代表著盤踞在迦南地的異教文化，神應許差遣使者在其前面攆出這些居民，領百姓到流奶與蜜之地。
accumulations:
- book: 出埃及記
  chapter: 33
  summary: 神應許差遣使者攆出迦南人、亞摩利人等六族，領百姓進入應許之地。
  relation: 顯示神對迦南地異教文化的審判，以及祂信守對亞伯拉罕、以撒、雅各的誓約。
