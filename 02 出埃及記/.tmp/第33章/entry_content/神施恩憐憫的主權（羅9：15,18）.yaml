name: 神施恩憐憫的主權（羅9：15,18）
type: 互文
secondary_types: []
aliases:
- 神施恩憐憫的主權
status: formal
definition: 出埃及記33章19節記載神宣告：「我要恩待誰就恩待誰；要憐憫誰就憐憫誰。」這句話強調神的恩典與憐憫不受任何外力控制，完全出於祂自己的主權。使徒保羅在羅馬書9章15節與18節引用此經文，用以論證神在救贖歷史中的主權揀選，說明神對罪人的恩待與憐憫並非基於人的行為或功勞，而是神白白賜予的恩典。
accumulations:
- book: 出埃及記
  chapter: 33
  summary: 神宣告祂要顯出一切的恩慈，並強調祂要恩待誰就恩待誰，要憐憫誰就憐憫誰。
  relation: 彰顯神在施恩與憐憫上的絕對主權，為新約保羅論證神揀選之恩的互文基礎。
