name: 橛子與繩子的預表
type: 神學
secondary_types:
- 預表
aliases:
- 帳幕的橛子
- 院子的橛子
status: formal
definition: 橛子（peg）與繩子（cord）是固定會幕與院子帷子的基礎零件。橛子深埋地下，繩子則將柱子緊緊綁在橛子上以維持結構穩固。在神學預表上，隱藏於地下的橛子預表甘心隱藏自己、默默承受重擊以高舉基督的服事者；繩子則預表將信徒與基督的受苦和羞辱緊緊相連的愛之繩索。
development: 會幕中的器具人所共見，惟有橛子深埋地中不為人見，卻擔負起支持整個會幕的重任。這預表在教會中不為人知卻承擔穩固根基的隱藏事奉。橛子一面尖以便深入地下，一面禿以便承受重擊，預表事奉者需深入隱藏並堪受批評與攻擊。柱子的豎立需靠繩子綁緊橛子，這繩子預表神的愛，如同雙份的愛之繩索將我們與基督的受苦連結，吸引信徒跟隨主並效法祂的死，在患難與試煉中不發怨言。
accumulations:
- book: 出埃及記
  chapter: 35
  summary: 摩西列出建造會幕所需的各種零件，其中包括帳幕的橛子、院子的橛子以及這兩處的繩子。
  relation: 本章首次將橛子與繩子並列於會幕建造的清單中，為其隱藏事奉與愛之連結的神學預表提供了具體的物質基礎。
