book: 出埃及記
chapter: 35
updates:
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出35:1,4,10,29 摩西招聚全會眾宣告「這是耶和華所吩咐的話，叫你們照著行」，呼召心裡有智慧的都要來做「耶和華一切所吩咐的」，百姓也將禮物拿來做「耶和華藉摩西所吩咐的一切工」。GT 引丁道爾：出35-39章幾乎逐字複述出25-31章的材料，所點出的教訓是摩西忠心實踐神的指示（出25:9），並以七次重述「是照耶和華所吩咐摩西的」加以強調。
  relation: 本章開啟「山上樣式」由啟示轉入執行的階段——建造不憑巧匠的創意，乃照神在山上所指示的樣式；KC 指出神賜創意卻不將運用之權留給人自定，凡所設計必須源於神的靈。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出35章重啟會幕建造，KC 指出這顯明出32-34章人的罪並未取消或縮減神的恩典——神照樣成就祂的旨意，會幕如今臨到一個跌倒過的百姓中間，神仍要住在他們中間。
  relation: 本章以行動印證34章立約恢復的同在應許：百姓甘心樂意奉獻、巧匠受靈充滿動工，神居所的建造正式展開，同在由應許進入具體的居所預備。
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: 出35:1-3 摩西招聚全會眾，在宣布會幕建造之前先重申安息日：六日做工，第七日守為安息聖日，干犯者治死；並補充獨特禁令「當安息日，不可在你們一切的住處生火」。GT 引丁道爾：此禁令舊約僅見此處，可能針對建造聖所金工所用的火而發；正統猶太教至今視點火為安息日禁止的「工作」。丁道爾並指出安息日律法在出31章位居該段結尾、在本章位居開頭，是故意的安排——百姓即使捲入建造帳幕的熱潮，仍不可稍忘守聖日。
  relation: 本章開頭重提安息日十分合宜（串珠）：神剛與百姓重新立約（出34章），而安息日正是約的標記（出31:16）；聖工的熱心不得逾越神所設的安息界線。
- title: 甘心樂意的奉獻
  path: link_folder/神學/甘心樂意的奉獻.md
  summary: 出35:4-9,20-29 摩西呼籲「凡樂意獻的可以拿耶和華的禮物來」，全會眾回應：凡心裡受感和甘心樂意的，連男帶女，將金器（胸前針、耳環、戒指、手釧）、各色紡線、皮料、皂莢木、銀銅、寶石、香料都拿了來；有智慧的婦女親手紡線，眾官長獻上寶石。GT 引丁良才歸納百姓的捐法六層：甘心樂意、按著所有、人人都捐、豐豐富富、足夠有餘、獻給真神；並指出本段有三等人——凡心裡樂意獻的、凡心裡有智慧的、凡心裡受感的。
  relation: 本章是「甘心樂意」語彙最密集的一章（5,21,22,26,29節五現）；KC 對照出32:3 同樣的金環曾獻給金牛犢——獻給世界的已然失落，如今百姓將剩餘的獻給神，構成奉獻對象的強烈對比。
- title: 比撒列（Bezalel）
  path: link_folder/人物/比撒列（Bezalel）.md
  summary: 出35:30-33 摩西向以色列人正式宣告：耶和華已提名召猶大支派中戶珥的孫子、烏利的兒子比撒列，以神的靈充滿他，使他有智慧、聰明、知識能做各樣的工——想出巧工、用金銀銅製造各物、刻寶石鑲嵌、雕刻木頭。GT 指出摩西早知神以主權揀選了比撒列（出31:1-11），此處只是向會眾傳達神的主權；神根據自己的預知呼召人（徒9:15），且從不後悔（羅11:29）。
  relation: 出31章是神在山上對摩西說、本章是摩西向會眾公告——同一選召的兩個場景；本章並補充「心裡靈明，能教導人」（34節），比撒列由受召者成為教導者，開始實際帶領全體工匠。
- title: 亞何利亞伯（Oholiab）
  path: link_folder/人物/亞何利亞伯（Oholiab）.md
  summary: 出35:34-35 耶和華使比撒列和但支派中亞希撒抹的兒子亞何利亞伯「心裡靈明，能教導人」，使他們的心滿有智慧，能做雕刻、巧匠、繡花（藍紫朱紅線和細麻）、機匠等各樣的工。GT 引丁良才分工細節：雕刻的工是比撒列所做之工的總稱，巧匠的工（幔子、內幔、以弗得、胸牌）、繡花的工（門簾、腰帶）、機匠的工（單色布幔、內袍）則多屬亞何利亞伯所轄。
  relation: 本章在出31:6 的基礎上增添「能教導人」的職分——兩位工頭不只自己做工，更要將神所賜的技藝傳授眾工匠，使全體奉獻的智慧人都能各按其分參與聖工。
- title: 但支派
  path: link_folder/人物/但支派.md
  summary: 出35:34 亞何利亞伯出自但支派，與猶大支派的比撒列同蒙選召、心裡靈明能教導人。
  relation: 本章重申出31:6 的配搭；領導支派（猶大）與非領導支派（但）的工匠同工建造會幕，見證神恩典的包容性。
- title: 猶大支派
  path: link_folder/人物/猶大支派.md
  summary: 出35:30 摩西向會眾宣告神已提名召猶大支派中戶珥的孫子、烏利的兒子比撒列作會幕工程的工頭。
  relation: 承接出31:2 的選召，本章是此選召向全會眾的公告場景，猶大支派的比撒列正式就任並開始教導眾工匠。
- title: 戶珥
  path: link_folder/人物/戶珥.md
  summary: 出35:30 摩西宣告比撒列的家系：猶大支派中戶珥的孫子、烏利的兒子。CT 指出聖經提特定人物時附帶父祖名字以免同名混淆。
  relation: 戶珥之名隨其孫比撒列的就任再次出現，其家系（代上2:19-20 迦勒—戶珥—烏利—比撒列）與會幕建造正式相連。
- title: 蒙靈充滿的智慧恩賜（比撒列、亞何利亞伯）
  path: link_folder/神學/蒙靈充滿的智慧恩賜（比撒列、亞何利亞伯）.md
  summary: 出35:31,34-35 摩西向會眾宣告神以祂的靈充滿比撒列，使他有智慧、聰明、知識能做各樣的工，又使他和亞何利亞伯心裡靈明能教導人，使他們的心滿有智慧能做各樣的工。KC 指出神賜創意，卻不將如何運用創意留給人自行決定——所設計的必須源於神的靈，不在乎合人的口味，乃在乎合神自己；正如日後聖殿的樣式由大衛從神領受交給所羅門（代上28:11-12），教會的聚集也有主明確的引導（林前11:23、14:37）。
  relation: 本章將出31章的恩賜宣告落實到會眾層面，並擴及有智慧的婦女（25-26節）——聖靈的恩賜不分男女、不分名匠與無名工人，全體各按恩賜參與神居所的建造。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 出35:4-19 摩西向全會眾傳達建造會幕的材料清單（金銀銅、紡線、皮料、皂莢木、油、香料、寶石）與零件清單（帳幕和罩棚、蓋、鉤子、板、閂、柱子、帶卯的座，直到院子的橛子繩子與祭司聖衣），百姓奉獻材料用以做會幕和其中一切的使用（21節）。KC 指出金牛犢之罪並未使神收回或縮減祂的恩典——會幕如今臨到一個跌倒的百姓中間，神照樣成就祂的旨意。
  relation: 本章是會幕由「山上樣式的啟示」（出25-31）轉入「實際建造」（出36-40）的樞紐：摩西忠心轉述（來3:5-6 摩西在神的全家盡忠、基督卻治理神的家），百姓以奉獻與技藝回應。
- title: 陳設餅桌子
  path: link_folder/主題/陳設餅桌子.md
  summary: 出35:13 建造清單列出「桌子和桌子的槓與桌子的一切器具，並陳設餅」。
  relation: 陳設餅桌子列入本章向會眾公告的製作清單，屬聖所器具之一；KC 靈意指做桌子的代表維繫信徒相交，使神得著祂的喜悅與糧食。
- title: 施恩座
  path: link_folder/主題/施恩座.md
  summary: 出35:12 建造清單列出「櫃和櫃的槓，施恩座和遮掩櫃的幔子」。KC 補充「遮掩櫃的幔子」即民4:5 所說的幔子——起營時亞倫和他兒子要取下這幔子蓋在法櫃上。
  relation: 施恩座隨約櫃列入本章公告的製作清單之首，居至聖所器具之先，反映其在會幕中的中心地位。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出35:7,24 皂莢木列於奉獻材料清單，凡有皂莢木可做什麼使用的百姓也都拿了來。GT 引串珠：皂莢木盛產於西乃半島，質堅耐用。
  relation: 本章顯明皂莢木的來源——百姓甘心樂意的奉獻；此木在曠野隨處可得，卻因奉獻歸聖而成為會幕器具的骨幹。
- title: 以弗得
  path: link_folder/原文/以弗得.md
  summary: 出35:9,27 紅瑪瑙與別樣的寶石可以鑲嵌在以弗得和胸牌上；眾官長把寶石都拿了來。GT 引丁良才：這些官長或是百姓的長老，或是十二支派的首領。
  relation: 本章交代以弗得寶石的來源——眾官長的奉獻；居高位者獻上最貴重之物，與平民的紡線、金環各按所有，同成聖工。
- title: 胸牌（決斷胸牌）
  path: link_folder/原文/胸牌（決斷胸牌）.md
  summary: 出35:9,27 寶石鑲嵌在以弗得和胸牌上，由眾官長奉獻。
  relation: 胸牌寶石由眾官長供應，十二支派的名字將刻在其上（出28:21），首領們的奉獻與所代表的支派相稱。
