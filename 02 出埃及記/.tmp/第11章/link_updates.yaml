book: 出埃及記
chapter: 11
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: v1-3 摩西領受耶和華宣告「再使一樣災殃」的話語，並轉告百姓要金銀器物；v4-8 向法老宣告半夜巡行、長子必死、氣忿忿離開法老——是摩西對法老最後一次發言；v9-10 與亞倫在法老面前行奇事
  relation: 摩西在埃及人眼中看為極大（v3）——KC認為是基督預表；本章宣告最後一災後便「氣忿忿離開」不再回頭，呼應十28-29 法老逐客令
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: v10 與摩西同在法老面前行了這一切奇事
  relation: 出埃及記連續九章以來亞倫與摩西同工的最後一次併列記載——下一章起逾越節設立由摩西主述
- title: 法老
  path: link_folder/人物/法老.md
  summary: v1 宣告他將「催逼」以色列人離開，從「不容」反轉為主動驅趕；v5 法老坐寶座的長子必死；v10 耶和華使法老心剛硬不容以色列人出離他的地
  relation: 法老在第11章預告中成為被神直接審判的對象——長子之死對付的正是法老作為太陽神之子的家族繼承；法老的剛硬與耶和華「使奇事多起來」互為因果
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: v4 耶和華半夜巡行埃及遍地；v5 從坐寶座的法老直到磨子後的婢女所有長子都死；v6 埃及遍地有大哀號空前絕後；v7 唯以色列中連狗也不敢搖舌
  relation: 埃及作為審判場域——本章是耶和華「親自」出去巡行的最後一災序場，將第12章逾越節血記保護與遍地哀號作強烈對比
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: v1 對摩西宣告末災；v3 叫百姓在埃及人眼前蒙恩；v4「我必出去巡行埃及遍地」——親自執行審判；v7 將埃及人與以色列人分別出來；v9-10 使奇事在埃及多起來、使法老心剛硬
  relation: 本章是耶和華在前九災透過摩西亞倫執行的轉折——他親自出去，將審判主權直接彰顯；「分別出來」是耶和華作為立約神的核心屬性
- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: v1,9 兩次「耶和華對摩西說」——啟動末災宣告與法老不聽的預告
  relation: 本章「耶和華的話臨到」雙重出現：第一次啟示末災內容（v1-3），第二次預告法老仍不聽從而奇事增多（v9-10）
- title: 法老心剛硬
  path: link_folder/神學/法老心剛硬.md
  summary: v10 耶和華使法老的心剛硬不容以色列人出離他的地——出埃及記中最後一次明確標示神使法老剛硬
  relation: 法老剛硬化進入尾聲——下一階段不再透過宣告與警告，而是耶和華親自出手執行殺長子之災
- title: 分別百姓
  path: link_folder/神學/分別百姓.md
  summary: v7「至於以色列中，無論是人是牲畜，連狗也不敢向他們搖舌，好叫你們知道耶和華是將埃及人和以色列人分別出來」
  relation: 第11章把第8章（蠅災「歌珊分別」）第9章（畜疫「以色列牲畜無一死」）第10章（黑暗「以色列家有亮光」）的分別主題推到極致——連最微賤的狗也不敢嗆聲，全層保護預告逾越節血記
- title: "神蹟（miraculous signs）"
  path: "link_folder/神學/神蹟（miraculous signs）.md"
  summary: v9-10「使我的奇事在埃及地多起來」「摩西、亞倫在法老面前行了這一切奇事」
  relation: 本章是奇事序列的統計性回顧——從第7章杖變蛇到第10章黑暗之災的所有奇事在 v10「這一切奇事」整合，並預告下一階段（殺長子、過紅海）將是更大的奇事
- title: 傳於後代
  path: link_folder/神學/傳於後代.md
  summary: v2「你要傳於百姓的耳中，叫他們男女各人向鄰舍要金器銀器」——本章「傳於耳中」的內容是要金器銀器的吩咐，作為出埃及前的最後準備
  relation: 第10章 v2「傳於你兒子和你孫子的耳中」是神蹟敘述的代代相傳；第11章 v2「傳於百姓的耳中」則是當下行動指令——兩章同一動詞但語境不同：一是回顧、一是即時執行
- title: 出埃及為要事奉神
  path: link_folder/神學/出埃及為要事奉神.md
  summary: v1「他必容你們離開這地…他容你們去的時候，總要催逼你們都從這地出去」——釋放即將完成，並且是由法老主動催逼
  relation: 第10章摩西堅持「連一蹄也不留下」；第11章預告法老將反過來催逼，完全應驗第6章以來「容我的百姓去好事奉我」的呼聲
- title: 知道我是耶和華
  path: link_folder/神學/知道我是耶和華.md
  summary: v7「好叫你們知道耶和華是將埃及人和以色列人分別出來」——「知道」目的從個人性（神自己）推到以色列群體性
  relation: 第7章至第9章各災「知道我是耶和華」宣告；第11章把知道目的明確化為「分別出來」——分別神學與知識神學在此合一
