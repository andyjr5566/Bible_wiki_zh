book: 出埃及記
chapter: 32
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出32章全章以摩西為軸：在山上獲神告知百姓敗壞（7-8節）、拒絕神「使你的後裔成為大國」的提議而據理代求（10-13節）、手拿法版下山（15節）、見牛犢與跳舞便發烈怒摔碎法版（19節）、焚燒磨碎牛犢撒水叫百姓喝（20節）、責問亞倫（21節）、站在營門召聚利未人討罪（26-28節）、次日再上山求赦免甚至願從冊上被塗抹己名（30-32節）。GT 引啟導本：摩西作為領袖的高貴品格從此事可見——他堅決依從神的命令嚴懲罪惡，卻又能為犯罪的百姓自責向神代求。
  relation: 本章是摩西中保職分最立體的一章：在神面前為百姓、在百姓面前為神；串珠指出本章充滿對比——摩西與神在山上交談時亞倫與百姓在山下妄為，摩西與百姓的罪認同時亞倫卻推卸責任。
- title: 利未
  path: link_folder/人物/利未.md
  summary: 出32:26-29 摩西呼召「凡屬耶和華的，都要到我這裡來」，利未的子孫都聚集到他那裡，照摩西的話各人殺他的弟兄與同伴並鄰舍，那天被殺的約有三千。GT 引丁良才：利未當日為自己和父家的名譽發過血氣的熱心而受咒詛（創34:25-27、創49:5-7），這時他的後裔因顧神的榮耀發了純正的熱心，就使從前的咒詛變為祝福（民3:1-13）；啟導本指出本段敘述利未人擔任祭司職事的起源。
  relation: 本章是利未支派命運的轉捩點——同樣的刀劍，從示劍的血氣之怒轉為為神的聖潔執行審判，創49:7「分居」的咒詛自此轉化為分散全地事奉神的祝福（申33:9）。
- title: 中保
  path: link_folder/神學/中保.md
  summary: 出32:7-14,30-34 摩西兩度居間：神說「你且由著我」（10節），GT 引中文聖經註釋指這是神在字裡行間敞開大門邀請代求；摩西第一次站在神的角度為百姓求（11-13節），第二次站在百姓立場求神赦罪、甚至願被塗抹己名（31-32節）。GT 引丁良才：摩西在這幾節中為中保被試驗，正如亞伯拉罕（創22）與主耶穌（太4）；串珠指出本章摩西作中保的角色再次浮現。
  relation: 本章是「中保」職分在出埃及記的高峰場景——攔阻神怒、代罪認罪、甘願代死三個層次依次出現，KC 指出摩西不能替百姓死，唯有完全無罪的主耶穌能成就，故此摩西是那位真中保的影兒（提前2:5）。
- title: 神的後悔與憂傷
  path: link_folder/神學/神的後悔與憂傷.md
  summary: 出32:14 「於是耶和華後悔，不把所說的禍降與祂的百姓。」GT 詳論：啟導本指「後悔」原文意為「改變主意」，神決不改變（民23:19、瑪3:6），但有權因人的回轉或中保的代求作出對應的賞罰（耶18:5-11、摩7:1-6、拿3:9）；丁道爾稱此為「人情法」（anthropopathism）——神鑑於新出現的因素（摩西的代求）重新制定行事方針，聖經明證神的應許和警告始終以人的回應為條件（結33:13-16）；賈斯樂郝威《聖經難解經文詮釋手冊》：改變的是情況而非神——摩西的代求把百姓帶入神的憐憫之下。
  relation: 本章是「耶和華後悔」語意辨析的經典場景：與撒上15:29「決不後悔」表面張力並存，來源一致解為神本性不變、作法因中保代求而轉——這正是代禱蒙垂聽的神學根基。
- title: 不可為自己雕刻偶像
  path: link_folder/神學/不可為自己雕刻偶像.md
  summary: 出32:1-8 百姓要求亞倫「為我們做神像」，鑄了金牛犢向它下拜獻祭，直接違反十誡第二誡（出20:4-6）。CT 指出『做神像』直接違反「不可作甚麼形像」的誡命；GT 引舊約聖經背景註釋：他們在「向耶和華守節」時崇拜牛犢，顯示所觸犯的是第二誡（不可造像敬拜）而非第一誡（不可有別神）——牛犢是耶和華的代表而非另一位神；串珠指出他們的錯誤不是以別神代替耶和華，而是要為祂鑄造一個形像。
  relation: 本章是第二誡頒布（出20:4）後首次、也是最嚴重的集體違犯，誡命與罪行相隔僅四十日；神的審判（治死三千人、降災）顯明以可見形像代表真神在神眼中的嚴重性。
- title: 耶和華的使者
  path: link_folder/神學/耶和華的使者.md
  summary: 出32:34 神對摩西說「現在你去領這百姓，往我所告訴你的地方去，我的使者必在你前面引路；只是到我追討的日子，我必追討他們的罪」。GT 引丁良才：這使者不是出23:20-23 那位（名裡有耶和華的名、能赦免罪的）使者，見33:1-3 的說明；聖經精讀本則解為神的另一種顯現。
  relation: 本章「我的使者」出現於赦免與追討並陳的語境——神未收回引路的應許，卻在同行的等級上留下伏筆，成為33章「差使者但我自己不同去」與摩西力爭神親自同行的前奏。
- title: 法版（edut）
  path: link_folder/原文/法版（edut）.md
  summary: 出32:15-19 摩西手拿兩塊法版下山：「這版是兩面寫的，這面那面都有字，是神的工作，字是神寫的，刻在版上」；及至看見牛犢與跳舞，便把兩塊版扔在山下摔碎了。GT 引啟導本：這是聖經唯一說明法版兩面都有字的記載；舊約聖經背景註釋：兩塊版大概是兩個抄本，正反兩面刻字在當時並不罕見，手掌大小的石版足以寫下十五至二十行字。
  relation: 本章記法版的首次毀壞——摔碎不是洩憤而是廢約的象徵動作（見「摩西摔碎法版（廢約的象徵）」條目）；「神的工作、神寫的字」與34章摩西鑿版、神寫字形成第一次與第二次法版的對照。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出32章的事件以西乃山為舞台：摩西在山上四十晝夜領受法版（出24:18、32:1），神命他「下去吧」（7節），摩西下山在山下摔碎法版（19節），次日又「上耶和華那裡去」代求（30-31節）。GT 指出百姓所說的「遲延」即指摩西在山上的四十晝夜。
  relation: 西乃山在本章成為聖與俗的分界——山上是神的啟示與代求，山下是偶像與放肆；摩西在山上山下之間的往返正是中保職分的空間寫照。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出32:1-6,21-25,35 摩西遲延不下山，百姓聚集到亞倫那裡要求造神像引路；亞倫未求問神便自作主張，吩咐百姓摘下妻子兒女耳上的金環，鑄成一隻牛犢，又在牛犢面前築壇、宣告「明日要向耶和華守節」。摩西下山責問時，亞倫推諉「這百姓專於作惡，是你知道的」，甚至說「我把金環扔在火中，這牛犢便出來了」。GT 引申9:20 指出神向亞倫甚是發怒要滅絕他，因摩西代求才免於死；KC 指出亞倫身為在神面前代表百姓的人，卻使自己淪為百姓的奴僕；GT 又引猶太傳說（未必可靠）謂戶珥因抵擋百姓被殺，故亞倫懼怕而屈從。
  relation: 本章是亞倫一生最大的失敗——意志薄弱、順應民意過於堅守真理的領袖借鏡：頭一步錯便步步錯（收金環、鑄犢、築壇、宣告守節），事後又如亞當諉過於人。CT 指出亞倫雖行此事，神後來仍立他為大祭司，顯明揀選不在乎人的道德，乃出於神的恩典；他自己「被軟弱所困」（來5:2），正需要有人替他祈求。
- title: 約書亞
  path: link_folder/人物/約書亞.md
  summary: 出32:17-18 約書亞聽見百姓呼喊的聲音，對摩西說「在營裡有爭戰的聲音」；摩西聽出這不是打勝仗或打敗仗的聲音，乃是人歌唱的聲音。GT 指出約書亞是戰士出身（出17:8-13 擊敗亞瑪力人），故直覺以為是爭戰；他在摩西進入雲中的三十多天一直在半山等候未離開，顯出他的忍耐忠心。
  relation: 本章顯出年輕的約書亞與老練的摩西之別：KC 指出年輕信徒可能因缺乏經驗而誤判神百姓的光景，以為喧鬧的場面是屬靈爭戰，實際上是繞金牛犢的跳舞；約書亞未參與山下拜偶像之罪，為他日後承接領袖職分留下伏筆。
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 出32:13 摩西代求時求神「記念你的僕人亞伯拉罕、以撒、以色列。你曾指著自己起誓說：我必使你們的後裔像天上的星那樣多，並且我所應許的這全地，必給你們的後裔，他們要永遠承受為業」。GT 指出神向亞伯拉罕的應許見創15:5,18、17:2-6、22:16-18；BH 指出「指著自己起誓」是最高形式的誓言（創22:16），因為沒有比神更大的可以指著起誓。
  relation: 本章中亞伯拉罕之約成為摩西代求最有力的根據——神作事不能違反祂信實的話語；神在10節「使你的後裔成為大國」的提議，實質是以摩西取代亞伯拉罕後裔的地位，摩西卻拒絕此試探，回到神向列祖所起的誓求神轉意。
- title: 以撒
  path: link_folder/人物/以撒.md
  summary: 出32:13 摩西代求時求神記念亞伯拉罕、以撒、以色列，及神向他們起誓的後裔與土地應許。GT 指出神向以撒的應許見創26:4「我要加增你的後裔，像天上的星那樣多」。
  relation: 以撒在本章與亞伯拉罕、雅各（以色列）並列為神起誓立約的三代承受者，是摩西代求時「神的信實不能落空」論證的一環。
