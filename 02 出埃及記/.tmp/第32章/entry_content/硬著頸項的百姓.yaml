name: 硬著頸項的百姓
type: 神學
secondary_types: []
aliases:
- 硬著頸項
- 頸項剛硬
status: formal
definition: 出埃及記32:9記載，耶和華對摩西說：「我看這百姓真是硬著頸項的百姓。」原文為固定片語（CT原文字義：首字含硬著頸項、冥頑不靈、艱難之意；次字「頸項」意為頸、固執），取自農牧比喻——牛馬牲畜不肯順服駕馭者的牽引轉向。這句評斷緊接在百姓鑄造金牛犢、「快快偏離了我所吩咐的道」（8節）之後，是神對百姓本性的總結性論斷，並構成神考慮「將他們滅絕」（10節）的理由。GT引丁良才註釋指出，這比喻其後在聖經中反覆出現，形容以色列背逆不順從（申命記9:6、13，10:16；歷代志下30:8；使徒行傳7:51等），成為以色列悖逆本性的代表性稱謂。
accumulations:
- book: 出埃及記
  chapter: 32
  summary: 神在9節親自宣告「這百姓真是硬著頸項的百姓」，作為10節神考慮發烈怒滅絕百姓的理由。
  relation: 此神學論斷是連接金牛犢悖逆行為（1-8節）與神烈怒審判意向（10節）的關鍵樞紐，也直接引出摩西代求（11-14節）挽回局面。
related_entries:
- 金牛犢事件
- 摩西為百姓代求（金牛犢）
- 摩西摔碎法版（廢約的象徵）
