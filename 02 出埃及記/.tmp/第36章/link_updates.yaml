book: 出埃及記
chapter: 36
updates:
- title: 比撒列（Bezalel）
  path: link_folder/人物/比撒列（Bezalel）.md
  summary: 出36:1-2,8 摩西正式召集比撒列和亞何利亞伯及一切心裡有智慧的工匠開工；比撒列親手製造十幅幔子（v8），以巧匠的手工繡上基路伯。CT：比撒列是負總責的工頭（出35:30-33），名字意為「在神的庇蔭之下」。KC：Moses is here a picture of the Lord Jesus——for the construction of the church, the Lord Jesus has given gifts（Eph 4:11-12）。
  relation: 本章是比撒列由「被提名選召」（出31、35章）進入「實際帶領建造」的轉折點；他親手製作最內層的幕幔，並統籌全體工匠照神所吩咐的施工。
- title: 亞何利亞伯（Oholiab）
  path: link_folder/人物/亞何利亞伯（Oholiab）.md
  summary: 出36:1-2 亞何利亞伯與比撒列同被摩西召來，帶領一切心裡受感前來做工的智慧人正式開工。CT：亞何利亞伯是比撒列的副手，協助管理建造會幕的事工（出35:34-35），名字意為「父親的帳幕」。
  relation: 本章是亞何利亞伯由「被提名」（出31:6）和「被公告」（出35:34）進入「實際同工帶領」的階段；他與比撒列的配搭成為全體工匠的領導核心。
- title: 蒙靈充滿的智慧恩賜（比撒列、亞何利亞伯）
  path: link_folder/神學/蒙靈充滿的智慧恩賜（比撒列、亞何利亞伯）.md
  summary: '出36:1-2 凡蒙耶和華賜智慧聰明、知道做聖所各樣使用之工的，都要照耶和華所吩咐的做工；凡耶和華賜他心裡有智慧而且受感前來做這工的，摩西把他們一同召來。CT：神的工人必須是神賜他心裡有智慧，單靠自己的智慧聰明遠遠不及神的要求，「不是倚靠勢力，不是倚靠才能，乃是倚靠我（神）的靈方能成事」（亞4:6）。KC：two things are important in every work for the Lord——adequacy and willingness；competence is not from themselves but from God（2Cor 3:5）；Moses is a picture of the Lord Jesus who has given gifts for the construction of the church（Eph 4:11-12）。BH：the skills and abilities are portrayed as gifts from God（James 1:17）；God equips those He calls。'
  relation: 本章將出35章的恩賜宣告落實到開工行動——智慧人「各都離開他所做的工」（v4）來投入聖工，顯明恩賜的運用需要順服的行動配合；KC 強調 adequacy（神賜的才幹）與 willingness（心中的受感）兩者缺一不可。
- title: 甘心樂意的奉獻
  path: link_folder/神學/甘心樂意的奉獻.md
  summary: 出36:3-7 百姓每早晨還把甘心獻的禮物拿來，以致材料富富有餘；工匠們來對摩西說百姓所拿來的太多、比耶和華吩咐作的工程所需要使用的足而有餘；摩西傳命在全營中宣告「無論男女，不必再為聖所拿什麼禮物來」，這樣才攔住百姓不再拿禮物來。CT：百姓每早晨表明是繼續的奉獻，不是一陣熱心過去了；教會缺乏之際理當鼓勵奉獻，但富富有餘之時就應攔住，「只要有衣有食，就當知足」（提前6:8）。GT/丁道爾：神子民領受了救恩和赦罪之愛，這是典型的回應；捨不得財寶而拖延未獻的人發現神已經用不著他們了，一定又失望又沮喪。KC：the secret behind such generosity is 'they first gave themselves to the Lord'（2Cor 8:5）；'God loves a cheerful giver'（2Cor 9:7）；if He finds that enough has been given, He lets you know。BH：the ongoing nature of the offerings shows generosity and dedication；'morning after morning' emphasizes regularity and consistency（Lam 3:22-23）。
  relation: 本章是「甘心樂意」的高潮——奉獻從出35章的熱烈響應發展到「富富有餘、必須停止」的程度；這是聖經唯一記載因奉獻過多而領袖下令停止收奉獻的事件，顯明神子民在蒙赦免後感恩之心的爆發力（路7:47）。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 出36:8-38 全章記載帳幕的實際建造：十幅幔子（v8-13）、十一幅山羊毛罩棚（v14-18）、染紅公羊皮蓋與海狗皮頂蓋（v19）、四十八塊皂莢木豎板與九十六個銀座（v20-30）、十五根包金閂（v31-34）、內幔與四根柱子（v35-36）、門簾與五根柱子（v37-38）。KC：in the description of the tabernacle in Exodus 25, the ark comes first, for it is most important to God；when constructing the tabernacle the building comes first——the first spiritual lesson that the believer must learn is what the church is。BH：the sanctuary was the dwelling place of God among His people, a precursor to the Temple, symbolizing God's desire to dwell with humanity（John 1:14）。
  relation: 本章是會幕由「山上的樣式」（出25-31）和「材料奉獻」（出35）進入「實體建造」的關鍵章節；建造從建築結構開始（非從約櫃開始），KC 指出這意味信徒首先需要認識教會是神的家，以此為基礎才能理解其他真理。
- title: 十幅幔子（內層幕幔）
  path: link_folder/主題/十幅幔子（內層幕幔）.md
  summary: 出36:8-13 比撒列用撚的細麻和藍色、紫色、朱紅色線製造十幅幔子，用巧匠的手工繡上基路伯；每幅長二十八肘寬四肘；五幅相連、另五幅相連；末幅邊上做五十個藍色鈕扣，兩兩相對，用五十個金鉤使幔子相連成一個帳幕。CT靈意：十表徵人的完全；幔子表徵耶穌人性的美麗；細麻表潔白和聖潔（啟19:8）；藍色線表屬天（出24:10）；紫色線表君尊；朱紅色線表流血犧牲；基路伯表彰顯神的榮耀；巧匠的手工表聖靈的工作。KC：the colored curtains represent in a special way the multiple facets of the glory of the Lord Jesus, each color representing a certain aspect of His glory（Col 1:19; 2:9）。
  relation: 本章是十幅幔子由「設計規格」（出26:1-6）進入「實際織造」的執行記錄；比撒列親手製作，並首次記載「五十個金鉤」的實際製作與連結過程。
- title: 十一幅山羊毛幔子（罩棚）
  path: link_folder/主題/十一幅山羊毛幔子（罩棚）.md
  summary: 出36:14-18 用山羊毛織十一幅幔子作為帳幕以上的罩棚；每幅長三十肘寬四肘；五幅連成一幅、六幅連成一幅；末幅邊上各做五十個鈕扣，用五十個銅鉤使罩棚連成一個。KC：the curtain of goats' hair speaks of the separation from the world；the truth of the separation from the world is also seen only by those who live in the presence of God。GT：第二幅幔子用山羊毛織成，為作罩住第一幅幔子，所以比它大（出26:7-13）。
  relation: 本章是罩棚由「設計規格」（出26:7-13）進入「實際織造」的執行記錄；十一幅比內層十幅多一幅，且用銅鉤（非金鉤）連結——銅表審判，罩棚表徵基督站在人的地位上擔罪。
- title: 五十個金鉤（vavei zahav）
  path: link_folder/主題/五十個金鉤（vavei zahav）.md
  summary: 出36:13 又做五十個金鉤，使幔子相連，這才成了一個帳幕。CT靈意：金表神性；五十個金鉤表徵神性的能力促成完美的聯結。KC：the colored curtains are called 'the tabernacle'——it is as if this is the actual dwelling place of God。
  relation: 本章首次記載金鉤的實際製作與使用；金鉤將兩組各五幅的內層幕幔連結成一整個帳幕，五十（5×10）表徵負責任顯出完美的聯結。
- title: 五十個銅鉤
  path: link_folder/主題/五十個銅鉤.md
  summary: 出36:18 又做五十個銅鉤，使罩棚連成一個。罩棚為山羊毛織成（v14-17），以銅鉤連結（非金鉤）。銅在會幕中表徵審判，銅鉤連結罩棚表徵基督擔當人的罪而受神審判，使信徒得以連結在祂裡面。
  relation: 本章首次記載銅鉤的實際製作；與內層幕幔的金鉤形成對比——金鉤（神性聯結）用於內層、銅鉤（審判聯結）用於罩棚，層層預表基督工作的不同面向。
- title: 染紅的公羊皮蓋子
  path: link_folder/主題/染紅的公羊皮蓋子.md
  summary: 出36:19 並用染紅的公羊皮做罩棚的蓋。KC：the covering of rams' skins dyed red has everything to do with dedication to God；it is the counterpart of the goats' hair covering——separation on the one hand must be followed by dedication to God on the other。BH：rams were considered valuable animals, often used in sacrifices, symbolizing substitution and atonement；the red dye likely symbolizes blood, pointing to the sacrificial system and ultimately to the blood of Christ（Heb 9:22）。
  relation: 本章首次記載染紅公羊皮蓋的實際製作；作為第三層覆蓋（罩棚之上），公羊皮染紅表徵基督為人流血捨命完成救贖——分別（山羊毛罩棚）必須繼之以奉獻（染紅公羊皮）。
- title: 海狗皮頂蓋
  path: link_folder/主題/海狗皮頂蓋.md
  summary: 出36:19 再用海狗皮做一層罩棚上的頂蓋。KC：the covering of porpoise skins is visible to the people；it is not beautiful, but it is useful——it protects the tabernacle from heat and storm and rain；for the world, the dwelling place of God has nothing attractive。BH：the fine leather served as an additional protective layer, ensuring the tabernacle's longevity as the Israelites journeyed through the wilderness；this layer can be seen as a type of Christ, who covers and protects His people（Ps 91:4）。
  relation: 本章首次記載海狗皮頂蓋的實際製作；作為最外層覆蓋，海狗皮無佳形美容卻堅固耐苦，表徵基督在地上無佳形美容（賽53:2），卻保護信徒免受世俗與撒但的侵害。
- title: 皂莢木豎板
  path: link_folder/主題/皂莢木豎板.md
  summary: 出36:20-30 用皂莢木做帳幕的豎板，每塊長十肘寬一肘半，有兩榫相對；南面二十塊、北面二十塊、西面六塊加拐角兩塊，共四十八塊板配九十六個帶卯銀座。KC：each board is from the same material, they all have the same length and have the same foundation——the distinction between 'clergy' and 'layman' is alien to God's Word。BH：acacia wood was chosen for its durability and resistance to decay, symbolizing incorruptibility and purity, qualities associated with Christ。GT：榫起到讓板堅實地插入銀座的作用，信徒因著基督的救贖建造神的聖殿——教會；48塊板每塊需要2個銀座，共96個銀座。
  relation: 本章首次記載豎板的實際製作；48塊板（6×8）表徵舊造的人（6）在復活裡（8）成為建造教會的材料；每塊板兩榫插入兩銀座，表徵信徒以基督的救贖為根基站立。
- title: 拐角板（雙板）
  path: link_folder/主題/拐角板（雙板）.md
  summary: 出36:28-29 帳幕後面的拐角做板兩塊，板的下半截是雙的、上半截是整的，直到第一個環子；在帳幕的兩個拐角上都是這樣做。BH：the corners were crucial for structural integrity；coupled together from bottom to top and fitted into a single ring——this can be seen as a metaphor for the unity and completeness of God's covenant。GT：第一個環子指套在連接豎板的閂上的環。
  relation: 本章首次記載拐角板的實際製作；下半截雙的（行動上彼此適應）、上半截整的（心靈在聖靈裡合一），以環子箍住——表徵教會轉彎處（關鍵時刻）需要加倍的力量與聖靈的合一。
- title: 閂（橫閂）
  path: link_folder/主題/閂（橫閂）.md
  summary: 出36:31-34 用皂莢木做閂：南面五閂、北面五閂、西面五閂，共十五根；板腰間的中閂從這一頭通到那一頭；用金子將板包裹，又做板上的金環套閂，閂也用金子包裹。GT：閂起到把會幕的豎板互相套住的作用。KC：all boards are held together by five bars, one of which is applied in a special way（the middle bar passing through from end to end）。BH：the crossbars provided structural support, ensuring the stability of the tabernacle。
  relation: 本章首次記載閂的實際製作；三面各五閂共十五根（5×3），表徵三一神使信徒有力量負起連結的責任；中閂貫通全體，表徵聖靈所賜合而為一的心貫穿全教會。
- title: 金子（包金）
  path: link_folder/主題/金子（包金）.md
  summary: 出36:34,36,38 用金子將板包裹，又做板上的金環套閂，閂也用金子包裹；內幔的四根皂莢木柱子用金包裹，柱子上有金鉤；門簾的五根柱子，柱頂和杆子用金子包裹。KC：the boards overlaid with gold and their rings of gold as holders for the bars。BH：gold signifies the preciousness and divine nature of the structure。
  relation: 本章首次記載包金的實際執行——板、閂、內幔柱、門簾柱頂和杆子全部包金；皂莢木（人性）包金（神性）表徵信徒披戴基督，金環套閂表徵聖靈的連結。
- title: 內幔（隔聖所至聖所的幔子）
  path: link_folder/主題/內幔（隔聖所至聖所的幔子）.md
  summary: 出36:35-36 用藍色、紫色、朱紅色線和撚的細麻織幔子，以巧匠的手工繡上基路伯；為幔子做四根皂莢木柱子用金包裹，柱子上有金鉤，鑄四個帶卯的銀座。GT：幔子掛在聖所和至聖所入口，為了維護神的榮耀和聖潔用幔子擋住至聖所；唯獨神指定的人在指定的時間用指定的禮物用指定的方法才能進入幔子內；基督作為中保用死亡撕裂了它（來10:19-20）。KC：the veil is called 'the second veil' in Hebrews（Heb 9:3）；we may even have boldness to enter by the blood of Jesus（Heb 10:19-20）；God Himself has shown that the way to Him is free by tearing the veil from top to bottom（Mt 27:51）。
  relation: 本章首次記載內幔的實際製作；四根柱子立於銀座（救贖根基），金鉤懸掛幔子——幔子隔開神與人，但基督的身體為我們撕裂了這阻隔。
- title: 四根包金柱子（內幔柱）
  path: link_folder/主題/四根包金柱子（內幔柱）.md
  summary: 出36:36 為幔子做四根皂莢木柱子，用金包裹，柱子上有金鉤，又為柱子鑄了四個帶卯的銀座。內幔柱子立於銀座（非銅座），表徵以救贖為根基；四根柱子表徵四方（全地）的信徒在救贖基礎上見證基督。
  relation: 本章首次記載內幔柱子的實際製作；與門簾的五根柱子（立於銅座）形成對比——內幔柱立於銀座（救贖），門簾柱立於銅座（審判），反映進入神同在的不同層次。
- title: 帳幕門簾
  path: link_folder/主題/帳幕門簾.md
  summary: 出36:37-38 拿藍色、紫色、朱紅色線和撚的細麻，用繡花的手工織帳幕的門簾；又為簾子做五根柱子和柱子上的鉤子，用金子把柱頂和柱子上的杆子包裹，柱子有五個帶卯的銅座。GT/丁良才：聖書裡從前沒有提到這些柱頂和杆子（出26:37），會幕第二個講法圖也沒有畫上這些杆子，這些柱頂和杆子是叫柱子相連，和外院的杆子一樣（出27:10）。KC：a screen is hung for the entrance to the holy place；behind this is 'the outer one'（Heb 9:2a）where priests go daily to do their service。
  relation: 本章首次記載門簾的實際製作，並補充了出26章未提及的細節——柱頂和杆子（柱子相連用）；門簾表徵基督是門（約10:9），五根柱子立於銅座表徵信徒須經歷審判的煉淨才能為基督作見證。
- title: 五根包金柱子（門簾柱）
  path: link_folder/主題/五根包金柱子（門簾柱）.md
  summary: 出36:38 為簾子做五根柱子和柱子上的鉤子，用金子把柱頂和柱子上的杆子包裹，柱子有五個帶卯的銅座。GT/丁良才補充：柱頂和杆子是叫柱子相連，和外院的杆子一樣（出27:10）。五根柱子立於銅座（非銀座），銅表審判；五表徵向神負責的見證。
  relation: 本章首次記載門簾柱子的實際製作，並補充了出26章未提及的柱頂和杆子細節；五根柱子立於銅座與內幔四根柱子立於銀座形成對比——進入聖所需要經過審判（銅）的煉淨。
- title: 撚的細麻
  path: link_folder/原文/撚的細麻.md
  summary: 出36:8,35,37 十幅幔子、內幔、門簾均用撚的細麻製造。CT：撚的細麻指用手撚的細麻線織成的布幔。KC：fine twisted linen。BH：finely spun linen was a luxurious and costly material, indicating the tabernacle's sacredness；linen was often associated with purity and righteousness（Rev 19:8）。CT靈意：細麻表徵潔白和聖潔（啟19:8）。
  relation: 本章記載撚的細麻在三種幔子（內層幕幔、內幔、門簾）中的實際使用；細麻的潔白貫穿整個會幕的紡織品，表徵聖潔是神居所的基本性質。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出36:20,31,36 豎板、閂、內幔柱子均用皂莢木製作。BH：acacia wood was chosen for its durability and resistance to decay, making it ideal for the harsh desert environment；it is native to the Sinai region。KC：each board is from the same material——acacia wood。
  relation: 本章記載皂莢木在豎板、閂、柱子三類結構件中的實際使用；皂莢木的堅固耐腐特性使其成為會幕骨架的唯一木材，表徵基督人性的不朽與可靠。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出36:1 都要照耶和華所吩咐的做工。CT：所有事奉神的人都要遵照神的旨意行事，並不是自己想要做甚麼就做甚麼；要做神的聖工必須是照神所吩咐的作工，不能摻有半點自己的意思在裡面。KC：no detail is unimportant；every repetition underlines what has been said before and indicates its certainty（Phil 3:1）；as God has shown it on the mountain, so it is made, with those materials and in that form。BH：the construction was not left to human creativity but was to follow the divine blueprint given to Moses on Mount Sinai（Exo 25:9）；this obedience is a recurring theme in Scripture。
  relation: 本章是「山上的樣式」由啟示進入執行的第一章——全章每一細節（幔子尺寸、鈕扣數目、鉤子材質、板數與座數）都嚴格複述出26章的規格，KC 指出 knowing that something has to happen is different from doing it and doing it as it was said。
- title: 帶卯的銅座（院子柱子座）
  path: link_folder/主題/帶卯的銅座（院子柱子座）.md
  summary: 出36:38 帳幕門簾的五根柱子有五個帶卯的座，是銅的。CT：門簾柱子用銅座（非銀座），與內幔柱子的銀座不同。銅在會幕中表徵審判；門簾柱立於銅座，表徵進入聖所必須經過神審判的煉淨。
  relation: 本章首次記載門簾柱銅座的實際鑄造；銅座與銀座的對比貫穿會幕——內幔柱立於銀座（救贖根基）、門簾柱立於銅座（審判煉淨），反映親近神的不同層次。
- title: 藍色鈕扣（lula'ot tekhelet）
  path: link_folder/主題/藍色鈕扣（lula'ot tekhelet）.md
  summary: 出36:11-12,17 在相連的幔子末幅邊上做藍色的鈕扣，每邊五十個，兩兩相對；罩棚的末幅邊上也做五十個鈕扣。CT靈意：藍色的鈕扣表徵屬天的聯結。
  relation: 本章首次記載藍色鈕扣的實際製作——不僅用於內層幕幔（v11-12），也用於罩棚（v17）；藍色表屬天，鈕扣使幔子得以相連，表徵屬天的聯結使信徒合而為一。
- title: 銀座（帶卯的銀座）
  path: link_folder/主題/銀座（帶卯的銀座）.md
  summary: 出36:24,26,30,36 每塊豎板底下兩個帶卯的銀座，南面四十個、北面四十個、西面十六個（含拐角），共九十六個；內幔柱子也鑄四個帶卯的銀座。GT：榫起到讓板堅實地插入銀座的作用，信徒因著基督的救贖建造神的聖殿——教會。BH：silver often symbolizes redemption in the Bible；the forty bases suggest a foundation of redemption。
  relation: 本章首次記載銀座的實際鑄造數量——九十六個銀座為四十八塊豎板的根基，每塊板兩座；銀表救贖，信徒站立在基督救贖的根基上。
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: 出36:8,35,37 十幅幔子、內幔、門簾均用撚的細麻和藍色、紫色、朱紅色線製造。CT靈意：藍色線表徵屬天（出24:10）；紫色線表徵君尊；朱紅色線表徵流血犧牲。BH：blue symbolized the heavens and divine revelation, purple was a color of royalty and wealth, and scarlet represented sacrifice and atonement。
  relation: 本章記載三色線在三種幔子中的實際使用；藍紫朱紅貫穿內層幕幔、內幔、門簾，表徵基督屬天、君尊、犧牲的三重性質覆蓋整個會幕。
- title: 基路伯（施恩座）
  path: link_folder/主題/基路伯（施恩座）.md
  summary: 出36:8,35 十幅幔子和內幔上均以巧匠的手工繡上基路伯。CT靈意：巧匠的手工表徵聖靈的工作；繡表徵受苦的管教；基路伯表徵彰顯神的榮耀。BH：cherubim are angelic beings often associated with the presence of God（Gen 3:24; Ezek 10）；their depiction on the curtains symbolized the heavenly reality of God's throne room。
  relation: 本章記載基路伯繡於幔子上的實際製作——不僅施恩座上有錘出的基路伯（出37:7-9），幕幔和內幔上也繡有基路伯，表徵神的榮耀充滿整個會幕。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出36:8-38 全章記載會幕實體建造的展開——從幔子、罩棚、豎板到內幔與門簾，每一細節都照神所吩咐的做成。KC：in the description of the tabernacle in Exodus 25, the ark comes first, for it is most important to God；when constructing the tabernacle the building comes first——the first spiritual lesson is what the church is, the dwelling place of God。BH：the sanctuary was the dwelling place of God among His people, symbolizing God's desire to dwell with humanity（John 1:14）。
  relation: 本章是神同在由「應許」（出25:8）和「樣式啟示」（出25-31）進入「居所實體建造」的關鍵一步；每一塊板、每一幅幔子都在為神住在人間預備具體的空間。
