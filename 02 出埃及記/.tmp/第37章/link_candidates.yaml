  - name: "精金"
    type: "主題"
    evidence: "出37:2,6,11,16,17,22,23,24,26 約櫃裡外包精金、施恩座用精金、桌子包精金、桌子器皿用精金、燈臺用精金、燈臺七個燈盞用精金、香壇包精金。GT/精讀本：聖所裡只有施恩座和燈臺是用精金製作的；精金希伯來文表示「純金」，是從普通金子中提煉出來的精華。已有條目「精金」"
