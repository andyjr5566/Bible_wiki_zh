  - name: "杏花杯球花（燈臺裝飾）"
    type: "原文"
    evidence: "出37:19-22 燈臺每枝上有三個杯形狀像杏花，有球有花；燈臺上有四個杯形狀像杏花有球有花；每兩個枝子以下有球與枝子接連一塊；球和枝子是接連一塊，都是一塊精金錘出來的。CT：杏花是早春開花，表徵復活的生命。GT/精讀本：枝子離開杆不能發光，信徒若離開基督同樣一事無成。KC：cups shaped like almond blossoms, bulbs and flowers——the walk in the light produces the fruit of light（Eph 5:9）。BH：the almond tree is the first to bloom in spring, symbolizing watchfulness and new life（Jer 1:11-12）。建議新建條目"
