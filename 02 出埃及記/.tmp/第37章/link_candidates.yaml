  - name: "山上的樣式"
    type: "神學"
    evidence: "出37章全章 每一件器具的製作都嚴格依照神在山上指示的樣式（出25-30章）。GT/丁道爾：本段的安排依照建築工程的自然次序，材料經過小心而有系統的重整，並非無意識的重複。KC：after the house is made, the furniture that will be placed in the house is made——first the ark, followed by the mercy seat with the cherubim。已有條目「山上的樣式」"