book: 出埃及記
chapter: 37
updates:
- title: 比撒列（Bezalel）
  path: link_folder/人物/比撒列（Bezalel）.md
  summary: 出37:1 比撒列用皂莢木做櫃。GT/丁良才：比撒列親自製造法櫃，無非因為約櫃是至聖的，不然就是比撒列指揮人做的。GT/精讀本：在聖物的具體製作過程中唯一提到的人物是比撒列，因為他是被選出來做櫃的人，可能是當時充滿神的智慧的最好的工匠。
  relation: 本章記載比撒列親手製作至聖之物——約櫃與施恩座；他是唯一被提名製作約櫃的工匠，顯明此工之聖與其人之尊。
- title: 約櫃
  path: link_folder/主題/約櫃.md
  summary: 出37:1-5 比撒列用皂莢木做櫃，長二肘半寬一肘半高一肘半，裡外包精金、四圍鑲金牙邊；鑄四個金環安在四腳上，這邊兩環那邊兩環；用皂莢木做兩根杠用金包裹，把杠穿在櫃旁的環內以便抬櫃。CT靈意：皂莢木做櫃表徵神與人立約的見證；裡外包精金表徵耶穌的神人二性；金環安在四腳上表徵為著行動到處顯揚基督。KC：the ark is the only object in the holy of holies；Hebrews calls it 'the ark of the covenant'（Heb 9:4）and describes its glory as 'covered on all sides with gold'（Heb 9:4a）。BH：the Ark served as the earthly throne of God；its portability was essential for the Israelites' wilderness journey。
  relation: 本章首次記載約櫃的實際製作——比撒列親手製造；約櫃是至聖所唯一的物件，表徵基督是神與人相會的唯一中心。
- title: 施恩座
  path: link_folder/主題/施恩座.md
  summary: 出37:6-9 用精金做施恩座，長二肘半寬一肘半（與約櫃尺寸完全相同）；用金子錘出兩個基路伯安在施恩座兩頭，二基路伯接連一塊，高張翅膀遮掩施恩座，臉對臉朝著施恩座。CT：施恩座希伯來原文字根有「遮蓋」的意思，具有遮蓋罪或贖罪的功用；施恩座的尺寸跟約櫃一模一樣——公義多大，恩典也多大；恩典在公義之上。KC：the mercy seat has become for us 'the throne of grace', to which we may draw near with confidence（Heb 4:16）。BH：the mercy seat was where the high priest would sprinkle the blood on the Day of Atonement, foreshadowing Christ's ultimate sacrifice（Rom 3:25）。
  relation: 本章首次記載施恩座的實際製作——精金錘出，與約櫃同尺寸；施恩座遮蓋約櫃內的法版，表徵恩典遮蓋律法的定罪，基督是我們的挽回祭。
- title: 基路伯（施恩座）
  path: link_folder/主題/基路伯（施恩座）.md
  summary: 出37:7-9 用金子錘出兩個基路伯安在施恩座兩頭，二基路伯接連一塊（同一塊精金錘出），高張翅膀遮掩施恩座，臉對臉朝著施恩座。CT：基路伯是「榮耀的基路伯」（來9:5），神的榮耀照射在他們身上；用金子錘出表徵神榮耀的見證需經過受苦的試煉。KC：Hebrews speaks of 'the cherubim of glory overshadowing the mercy seat'（Heb 9:5）。BH：the cherubim facing each other and looking toward the mercy seat highlights the centrality of God's atonement and presence。
  relation: 本章首次記載施恩座上基路伯的實際製作——兩個基路伯與施恩座由同一塊精金錘出，表徵神榮耀的見證與神的恩典不可分割；臉對臉朝著施恩座，表徵他們在深思神聖憐憫的奧秘。
- title: 陳設餅桌子
  path: link_folder/主題/陳設餅桌子.md
  summary: 出37:10-16 用皂莢木做一張桌子，長二肘寬一肘高一肘半（與約櫃同高），包精金、四圍鑲金牙邊；四圍各做一掌寬的橫梁鑲金牙邊；鑄四個金環安在四腳四角上挨近橫梁，穿杠抬桌子；用精金做桌子上的器皿——盤子、調羹、奠酒的瓶和爵。KC：a table speaks of fellowship；through the work of the Lord Jesus, fellowship is possible with God and with each other；the table is as high as the ark——our fellowship is at the level of the Person and the work of Christ（1Cor 1:9）。BH：the Table of Showbread held the bread of the Presence, representing God's provision and fellowship with His people。
  relation: 本章首次記載陳設餅桌子的實際製作；桌子與約櫃同高，表徵信徒的交通（桌子）與基督的位格和工作（約櫃）在同一水平——我們蒙召進入祂兒子耶穌基督的交通（林前1:9）。
- title: 金燈臺
  path: link_folder/主題/金燈臺.md
  summary: 出37:17-24 用精金做一個燈臺，座和幹與杯、球、花都是接連一塊錘出來的；兩旁杈出六個枝子（這旁三個那旁三個），每枝有三個杯形狀像杏花有球有花；燈臺上有四個杯形狀像杏花有球有花；每兩個枝子以下有球與枝子接連一塊；球和枝子都是一塊精金錘出來的；用精金做七個燈盞並蠟剪和蠟花盤；用精金一他連得做燈臺和一切器具。CT靈意：座比方基督為根基（林前3:11），幹比方基督在祂的百姓當中凡事居首位（西1:18），六個枝子比方信徒。KC：after the table the lampstand is made——our fellowship can only take place in the light（1Jn 1:7）；the walk in the light produces the fruit of light（Eph 5:9）。BH：the lampstand was crafted from a single piece of gold, emphasizing unity and perfection；the almond blossoms symbolize watchfulness and new life（Jer 1:11-12）。
  relation: 本章首次記載金燈臺的實際製作——整塊精金一他連得錘出，七個燈盞表徵完全的光照；燈臺在陳設餅桌子對面，表徵交通（桌子）必須在光中（燈臺）進行（約壹1:7）。
- title: 金香壇（香壇）
  path: link_folder/主題/金香壇（香壇）.md
  summary: 出37:25-28 用皂莢木做香壇，是四方的，長一肘寬一肘高二肘，壇的四角與壇接連一塊；用精金把壇的上面與四面並四角包裹，四圍鑲金牙邊；做兩個金環安在牙子邊以下兩旁兩根橫撐上，作為穿杠的用處以便抬壇；用皂莢木做杠用金包裹。KC：the golden altar of incense represents worship；Hebrews says this altar is in the holy of holies（Heb 9:3-4a）——its actual function belongs to the holy of holies；Aaron can enter the sanctuary surrounded by the incense, otherwise he will die（Lev 16:13）。BH：the altar of incense was placed before the veil, symbolizing the prayers of the saints ascending to God（Rev 5:8; 8:3-4）。
  relation: 本章首次記載金香壇的實際製作；香壇高二肘（高過約櫃和桌子），表徵敬拜和禱告是升向至高之神的；希伯來書將其歸入至聖所，顯明其功能屬於至聖所的敬拜。
- title: 壇的四角（香壇）
  path: link_folder/主題/壇的四角（香壇）.md
  summary: 出37:25-26 香壇的四角與壇接連一塊，用精金包裹。四角表徵能力與拯救（角在聖經中常象徵力量）；香壇的四角與壇一體，表徵基督的代禱能力與祂的位格不可分離。
  relation: 本章首次記載香壇四角的實際製作——與壇接連一塊、同被精金包裹；香壇的四角表徵基督代禱的完全能力。
- title: 聖膏油
  path: link_folder/原文/聖膏油.md
  summary: 出37:29 又按做香之法做聖膏油和馨香料的淨香。KC：the Lord Jesus is 'anointed with the Holy Spirit and with power'（Acts 10:38）；in the perfumer we can see a picture of the Holy Spirit, Who is only able to give what is necessary to perform our service in the house of God。
  relation: 本章以聖膏油和淨香的製作作為會幕器具製造的收尾——膏油表徵聖靈的膏抹，淨香表徵基督的馨香之氣；兩者都是事奉神不可或缺的。
- title: 聖香（清淨聖潔的香）
  path: link_folder/原文/聖香（清淨聖潔的香）.md
  summary: 出37:29 又按做香之法做馨香料的淨香。KC：the pure, fragrant incense of spices rises to God as a pleasant fragrance；all the powerful deeds of Christ spread a pleasant fragrance, a sacrifice to God as a fragrant aroma（Eph 5:2）。
  relation: 本章記載淨香的實際製作——與聖膏油並列為會幕器具製造的收尾；香表徵基督的馨香之氣升到神面前，膏油表徵聖靈的膏抹，兩者相輔相成。
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 出37:1,4,10,15,25,28 約櫃、杠、陳設餅桌子及其杠、香壇及其杠均用皂莢木製作。BH：acacia wood is durable and resistant to decay, symbolizing the enduring nature of God's covenant；acacia trees were common in the Sinai region。CT：皂莢木生長在曠野，是一種堅固不易朽壞的木頭，表明主耶穌的性質非常堅固不會朽壞。
  relation: 本章記載皂莢木在至聖所和聖所全部五件器具（約櫃、施恩座除外、桌子、燈臺除外、香壇）中的使用；皂莢木成為會幕器具的通用骨架材料，表徵基督人性的堅固不朽貫穿整個會幕。
- title: 精金
  path: link_folder/主題/精金.md
  summary: 出37:2,6,11,16,17,22,23,24,26 約櫃裡外包精金、施恩座用精金、桌子包精金、桌子器皿用精金、燈臺整塊用精金錘出、七個燈盞用精金、香壇包精金。GT/精讀本：聖所裡只有施恩座和燈臺是用精金製作的；精金希伯來文表示「純金」，是從普通金子中提煉出來的精華。KC：pure gold。BH：pure gold signifies the holiness and divine nature；gold, a precious and incorruptible metal, symbolizes purity and the glory of God。
  relation: 本章記載精金在至聖所和聖所全部器具中的廣泛使用——從約櫃到燈盞；精金（純金）表徵神性的純淨與榮耀，施恩座和燈臺更是整塊精金錘出，表徵基督神性的完全。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 出37章全章 每一件器具的製作都嚴格依照神在山上指示的樣式（出25-30章）——約櫃（出25:10-16）、施恩座（出25:17-22）、陳設餅桌子（出25:23-30）、金燈臺（出25:31-40）、金香壇（出30:1-10）、聖膏油與淨香（出30:22-38）。GT/丁道爾：本段的安排依照建築工程的自然次序，材料經過小心而有系統的重整，並非無意識的重複。KC：after the house is made, the furniture that will be placed in the house is made——first the ark, followed immediately by the mercy seat with the two cherubim。
  relation: 本章是「山上的樣式」在會幕器具層面的全面執行——從至聖所的約櫃與施恩座，到聖所的桌子、燈臺、香壇，再到膏油與香，每一件都照神在山上所指示的規格製作。
