book: 出埃及記
chapter: 27
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出27:1-21 神吩咐摩西造銅祭壇、院子、門簾、經理燈油，摩西忠心傳達神的指示。
  relation: 出27章是摩西領受會幕建造指示的延續，摩西作為中保忠心傳達神的啟示。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出27:21 亞倫和他的兒子在會幕中法櫃前的幔外，從晚上到早晨經理燈油，使燈常常點著。
  relation: 出27:21確立亞倫家族祭司職分的具體事奉——經理燈油，預表基督作大祭司的代求事奉（來7:25）。
- title: 亞倫的祭司譜系
  path: link_folder/人物/亞倫的祭司譜系.md
  summary: 出27:21 亞倫和他的兒子世世代代在耶和華面前經理燈油，作以色列人永遠的定例。
  relation: 出27:21將祭司職分確立為亞倫家族的世代產業，預表基督永遠的祭司職分（來7:24）。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出27 會幕建造指示（銅祭壇、院子、燈油）在西乃山領受。
  relation: 西乃山是神啟示會幕建造細節的地點，出27章屬於西乃山啟示的延續。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出27:9-19 院子圍繞會幕，銅祭壇置於院子，燈油在會幕內點燃。
  relation: 出27章詳細規定會幕院子、祭壇、燈油等配置，完善會幕建造藍圖。
- title: 祭司職分
  path: link_folder/神學/祭司職分.md
  summary: 出27:21 亞倫和他的兒子在會幕中法櫃前的幔外，從晚上到早晨經理燈油，作以色列人世世代代永遠的定例。
  relation: 出27:21確立祭司職分的核心事奉——經理燈油，預表基督作大祭司的代求事奉（來7:25）與信徒作王室祭司（彼前2:9）。
