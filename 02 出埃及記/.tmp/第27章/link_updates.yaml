book: 出埃及記
chapter: 27
updates:
- title: 皂莢木（atzei shittim）
  path: link_folder/原文/皂莢木（atzei shittim）.md
  summary: 本章記載壇和槓都用皂莢木(出27:1,6)，表徵道成肉身的耶穌、堅固不朽壞的人性。
  relation: 皂莢木作為祭壇和槓的材料，預表基督人性作為救贖工作的基礎。
- title: 銅
  path: link_folder/主題/銅.md
  summary: 本章大量使用銅：包壇、器具、銅網、銅環、包槓、院子銅座(出27:2-3,4,6,10-11,12,14-15,17-18)，表徵神的審判、經過審判不被消滅的公義。
  relation: 銅在祭壇和院子中的大量使用，預表基督在十字架上承受神公義審判。
- title: 銀子
  path: link_folder/主題/銀子.md
  summary: 本章記載柱子上的鉤子和杆子都用銀子做，院子四圍柱子用銀杆連絡(出27:10-11,17)，表徵贖價(彼前1:18-19)，銀杆表信徒靠贖價聯結。
  relation: 銀子在院子結構中的使用，預表基督贖價作為信徒站立與聯結的根基。
- title: 撚的細麻
  path: link_folder/原文/撚的細麻.md
  summary: 本章記載院子帷子和門簾都用撚的細麻(出27:9,16,18)，表徵潔白聖潔(啟19:8)、基督純潔人性。
  relation: 細麻作為院子圍牆材料，預表信徒在基督裡的義行與聖潔生活。
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: 本章記載院子門簾用藍色、紫色、朱紅色線和撚的細麻繡花織成(出27:16)，表徵神性、君尊、流血贖罪。
  relation: 三色線在門簾上的使用，預表基督作為唯一的門(約10:7)，融合神性、王權與救贖。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: 本章說「都照著在山上指示你的樣式做」(出27:8)。來8:5、9:23-24 指出地上帳幕是天上真聖所的影兒/副本。
  relation: 祭壇和院子製作嚴守神的樣式，彰顯敬拜必須出於神的啟示與精確順服。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 本章多次使用「會幕」「帳幕」指代整體結構(出27:9,19,21)，會幕=神與人會面之處、基督和教會的預表(弗2:20-21)。
  relation: 祭壇和院子是會幕外院的核心，預表基督十字架救恩與教會見證的根基。
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: 本章提到「在會幕中法櫃前的幔外」(出27:21)，聖所是祭司事奉區域。
  relation: 聖所是大祭司穿聖衣事奉的場所，預表基督進入天上聖所為信徒代求。
- title: 至聖所
  path: link_folder/地點/至聖所.md
  summary: 本章暗示幔子內為至聖所（法櫃所在）(出27:21)，至聖所是神同在最濃厚處。
  relation: 至聖所是大祭司一年一次進入的至聖地，預表基督一次永遠進入天上至聖所成就永遠救贖。
