name: 壇的四角
type: 主題
secondary_types: []
aliases:
- 祭壇的四角
- 壇角
status: formal
definition: 壇的四角是製作銅壇時在壇的四個拐角上做出的角狀突出物，與壇接連一塊。其功用為繫住祭牲、抹上祭牲的血，後來也成為求告者依附得著護庇的象徵。角象徵力量與能力，表徵基督拯救的能力。
accumulations:
- book: 出埃及記
  chapter: 27
  summary: 規定要在壇的四拐角上做四個角，與壇接連一塊，並用銅包裹。
  relation: 壇的四角表徵十字架無堅不摧的拯救能力，能將信徒拯救到底，且其救恩的福音要傳遍四方。
related_entries:
- 銅壇（燔祭壇）
- 銅
- 拯救的角（路1:69）
sources:
