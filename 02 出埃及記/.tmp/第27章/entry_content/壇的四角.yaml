- 'GT: 出埃及記第二十七章拾穗 — 四個角的功用與意義（https://www.ccbiblestudy.org/Old%20Testament/02Exo/02GT27.htm）'
- 'KC: Exodus 27:1-8 — The four horns of the altar show the power of the sacrifice（https://www.kingcomments.com/en/bible-studies/Exo/27）'
