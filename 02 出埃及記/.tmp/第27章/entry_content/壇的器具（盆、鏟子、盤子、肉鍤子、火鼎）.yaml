name: 壇的器具（盆、鏟子、盤子、肉鍤子、火鼎）
type: 主題
secondary_types: []
aliases:
- 祭壇的器具
- 銅製器具
status: formal
definition: 指銅壇（燔祭壇）上供獻祭與維護之用的各項附屬器具，包含收灰的盆、清除灰燼的鏟子、盛放祭牲血的盤子、插取和置放肉塊的肉鍤子，以及盛放和移送火炭的火鼎。本章規定這一切器具都必須用銅製作。銅表徵神的審判與忍耐，這些器具的材質與功用表明獻祭事工必須經過神審判的煉淨，並預表基督十字架救贖工作中滿足神公義要求的各個層面。
development: 在舊約的獻祭禮儀中，這些器具是維持祭壇運作不可或缺的工具。灰代表經過火燒煉淨的結果，盆和鏟子用以清理灰燼，表徵十字架對付與煉淨的工作；盤子盛血用於贖罪，預表基督寶血的潔淨；肉鍤子與火鼎則用於妥善處理祭物與火炭，表明事奉的嚴謹與次序。這些器具全用銅做，強調凡通不過神審判的地方，十字架就將其置之於死。
accumulations:
- book: 出埃及記
  chapter: 27
  summary: 規定製作盆、鏟子、盤子、肉鍤子、火鼎等壇上一切器具，且皆須用銅製作。
  relation: 銅製器具表徵神審判的煉淨與忍耐，預表基督在十字架上滿足神公義要求的救贖工作。
