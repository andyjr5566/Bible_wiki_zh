name: 銅壇（燔祭壇）
type: 主題
secondary_types: []
aliases:
- 祭壇
- 燔祭壇
- 銅壇
status: formal
definition: 銅壇又稱燔祭壇，是設在會幕外院入口處的祭壇，供獻祭牲之用。材質是用皂莢木做壇，外麵包銅，長寬各五肘、高三肘，呈四方形且壇內中空。銅表徵神的審判，壇表徵耶穌的十字架，為人流血贖罪。
accumulations:
- book: 出埃及記
  chapter: 27
  summary: 詳細記載銅壇的材質、尺寸（長五肘、寬五肘、高三肘）、結構（中空）及相關配件的製作法則。
  relation: 銅壇是會幕外院最大的器具，表徵基督在十字架上受神公義的審判，成為通往神的道路與救贖根基。
