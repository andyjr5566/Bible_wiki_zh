name: 院子門簾
type: 主題
secondary_types: []
aliases:
- 院子的門簾
- 會幕院子的門簾
status: formal
definition: 指會幕院子東面中央寬二十肘的入口所懸掛的簾子。本章規定此門簾要用藍色、紫色、朱紅色線和撚的細麻，以繡花的手工織成，並掛在四根帶有銅座的柱子上。此門簾的材質與聖所的門簾相同，作為進入神聖院子的唯一入口，表徵基督是通往神的門。
development: 門簾的顏色與材質充滿預表意義：藍色表徵基督的屬天與神性，紫色表徵君王與作王的應許，朱紅色線表徵流血的救贖，撚的細麻則表徵無瑕疵的義行。門簾懸掛於四根柱子上，四表徵受造之物與福音的普世性，表明基督道成肉身完成救贖，成為任何人進入神恩典的唯一途徑。
accumulations:
- book: 出埃及記
  chapter: 27
  summary: 規定院子東面門簾長二十肘，用藍色、紫色、朱紅色線和撚的細麻繡花織成，掛於四根柱子上。
  relation: 門簾表徵基督是通神之門，其色彩與材質預表基督的神性、王權、救贖與無瑕義行。
