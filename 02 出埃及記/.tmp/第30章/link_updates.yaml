book: 出埃及記
chapter: 30
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出30:11-16,22-33,34-38 神吩咐摩西收贖罪銀、調聖膏油、做聖香，摩西忠心執行。
  relation: 出30章是摩西領受會幕器具、膏油、聖香製作指示的章節，摩西作為中保傳達神的啟示。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出30:7-8,30 亞倫在香壇上早晚燒香，被聖膏油膏立為祭司。
  relation: 出30章確立亞倫在香壇事奉、受膏立為祭司的職分，預表基督作大祭司（來5:1-5, 7:26-28）。
- title: 亞倫的祭司譜系
  path: link_folder/人物/亞倫的祭司譜系.md
  summary: 出30:30 亞倫和他兒子被膏立為祭司，世世代代永遠的定例。
  relation: 出30:30確立亞倫家族祭司職分的世襲性，聖膏油傳給後裔（v31）。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出30 神在西乃山向摩西啟示香壇、洗濯盆、聖膏油、聖香的製作細節。
  relation: 西乃山是神啟示會幕器具、膏油、聖香等律法的地點，出30章屬於西乃山啟示的延續。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出30:16,26-29,36 贖罪銀作會幕使用，聖膏油抹會幕與器具，洗濯盆放在會幕與壇中間。
  relation: 出30章詳細規定會幕器具的膏抹、洗濯盆位置、贖罪銀用途，完善會幕建造藍圖。
- title: 會幕門口
  path: link_folder/地點/會幕門口.md
  summary: 出30:18,20 洗濯盆放在會幕門口，亞倫和兒子進會幕前洗手洗腳。
  relation: 出30:18,20洗濯盆放在會幕門口，祭司進會幕前必洗手洗腳，預表基督開了新又活的路（來10:19-20）。
- title: 院子
  path: link_folder/地點/院子.md
  summary: 出30:18 洗濯盆放在會幕和壇中間，屬院子範圍。
  relation: 出30:18洗濯盆放在院子內會幕與壇之間，院子是獻祭、洗濯、事奉的場所。
- title: 壇
  path: link_folder/地點/壇.md
  summary: 出30:18,20 洗濯盆放在會幕和壇中間，祭司就近壇前供職前洗濯。
  relation: 出30:18,20洗濯盆位於壇與會幕之間，壇是獻祭核心，洗濯是親近壇前的準備。
- title: 洗濯盆
  path: link_folder/神學/洗濯盆.md
  summary: 出30:17-21 銅洗濯盆和盆座，放在會幕與壇中間，盛水供亞倫和兒子洗手洗腳，免得死亡，世世代代永遠的定例。
  relation: 出30:17-21洗濯盆預表基督話語潔淨（約15:3, 弗5:26）、聖靈重生的洗（多3:5）、信徒認罪得潔淨（約壹1:9）。
- title: 贖罪
  path: link_folder/神學/贖罪.md
  summary: 出30:11-16 贖罪銀半舍客勒，富足不可多出、貧窮不可少出，作會幕使用、贖生命、作紀念。
  relation: 出30:11-16贖罪銀預表基督寶血贖罪（彼前1:18-19, 來9:12），人人平等在神面前（羅3:23-24）。
- title: 永遠的定例
  path: link_folder/神學/永遠的定例.md
  summary: 出30:8,10,16,21,31 香壇常燒香、贖罪禮、贖罪銀、洗濯盆、聖膏油、聖香都是永遠的定例。
  relation: 出30章多處提到永遠的定例，預表基督永遠的祭司職分（來7:24-25）與信徒永遠的祭司身分（彼前2:9）。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出30:6,36 香壇放在法櫃前幔子外，神在那裡與摩西相會；會幕因神榮耀成聖。
  relation: 出30:6,36香壇是神與人相會之處，預表基督是神與人相會的中保（提前2:5），信徒藉基督進入神面前（來10:19-22）。
- title: 神的榮耀
  path: link_folder/神學/神的榮耀.md
  summary: 出30:36 會幕因神的榮耀成聖，香壇在神面前為至聖。
  relation: 出30:36會幕因神榮耀成聖，預表基督榮耀彰顯（約1:14, 來1:3），新耶路撒冷有神榮耀（啟21:23）。
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: 出30:12,16,31,36 以色列人被數、贖罪銀、聖膏油、聖香都與以色列人相關。
  relation: 出30章多處提到以色列人，預表教會作神的子民（彼前2:9）。
- title: 災殃
  path: link_folder/原文/災殃.md
  summary: 出30:12 數點以色列人若不獻贖價，必有災殃。
  relation: 出30:12贖價預表基督贖罪免去災殃（羅6:23, 加3:13）。
- title: 舍客勒
  path: link_folder/原文/舍客勒.md
  summary: 出30:13,15 贖價半舍客勒，一舍客勒二十季拉。
  relation: 出30:13,15舍客勒是聖所平的貨幣單位，預表基督寶血的價值（彼前1:18-19）。
