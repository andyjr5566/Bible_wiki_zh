name: 精金
type: 主題
secondary_types: []
aliases:
- 精金
- 純金
- 淨金
status: formal
definition: 在出埃及記30章中，精金被用來包裹金香壇的上面、四圍並四角，以及鑲上金牙邊和製作金環。精金表徵基督的神性、榮耀與威嚴。金的美麗體現了神的榮耀和威嚴，其不變的屬性體現了神對約的不變性。會幕中重要的器具都用精金包裹，特別是施恩座則是完全用精金製作的，表明敬拜與事奉必須完全根據並彰顯神聖別的性情。
development: 精金包裹皂莢木表徵神性覆蓋人性，是基督道成肉身的預表。在香壇的應用上，精金包裹表徵基督神性的榮耀以及保守的能力，說明眾聖徒的禱告與代求之所以蒙神悅納，完全是因為基督神性的榮美與遮蓋。
accumulations:
- book: 出埃及記
  chapter: 30
  summary: 記載金香壇需用精金包裹上面、四圍、四角，並鑲上金牙邊。
  relation: 精金包裹香壇表徵基督的神性與榮耀，彰顯代求的事奉必須完全根據神聖別的性情。
