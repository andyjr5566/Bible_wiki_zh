name: 義行的細麻（啟19：8）
type: 互文
secondary_types:
- 神學
aliases:
- 義行的細麻
status: formal
definition: 「義行的細麻」出自啟示錄19:8，描繪新婦（教會/信徒）蒙恩穿上光明潔白的細麻衣，這細麻衣就是聖徒所行的義。在出埃及記的帳幕與祭司事奉中，充滿了對聖潔、公義與敬拜生活的預表，這些舊約的聖物與條例最終在新約信徒的義行中得著屬靈的應驗與彰顯。
development: 出埃及記第30章中多項關於會幕事奉的條例，預表了新約信徒在基督裡所行的義。首先，祭司在銅洗濯盆洗手洗腳以潔淨自己（出30:19-21），預表信徒藉著神的道得著潔淨（弗5:26），這潔淨的生活是義行的基礎。其次，大祭司在金香壇早晚燒特製的聖香（出30:7-8），聖香象徵眾聖徒的祈禱（啟5:8），這晝夜不息的代求與敬拜，正是聖徒在神面前所獻上的義行。此外，聖香必須加上鹽並搗得極細（出30:35-36），鹽能防腐並象徵神不廢壞的約，這表明信徒的禱告與事奉必須純淨、專一為著神，不可攙雜肉體的動機，如此才符合「義行」的標準。最終，這些在舊約中藉著律法與祭司職分所維持的聖潔事奉，在啟示錄中彰顯為羔羊婚娶時教會穿上的「義行的細麻」。
accumulations:
- book: 出埃及記
  chapter: 30
  summary: 本章透過洗濯盆的潔淨、金香壇的燒香與聖香的調製，預表了信徒在神面前聖潔、禱告與專一事奉的義行。
  relation: 祭司的潔淨與燒香事奉預表了新約信徒因著道得潔淨，並以禱告與敬拜作為所行的義，最終彰顯為啟示錄中的細麻衣。
