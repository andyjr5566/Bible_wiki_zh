name: 亞倫和他兒子（祭司）
type: 人物
secondary_types: []
aliases:
- 亞倫和他的兒子
- 祭司
status: formal
definition: 亞倫是以色列首任大祭司，其兒子們亦被設立為祭司，形成世世代代繼承的祭司體系。在出埃及記第30章中，亞倫被指派每日早晚在金香壇上燒香，並在贖罪日於壇角上行贖罪之禮；同時，亞倫和他的兒子需在銅洗濯盆洗手洗腳以免死亡，並受聖膏油膏抹以供祭司的職分。
development: 亞倫和他兒子作為祭司，承擔了會幕中代求、潔淨與獻祭的核心事奉。他們每日燒香表徵基督晝夜不息的代求；洗濯盆的洗手洗腳表明事奉神者必須每日藉著神的話語潔淨行為與道路；而聖膏油的膏立則表明事奉的能力在於聖靈的澆灌。亞倫的祭司職分預表了耶穌基督作為永恆大祭司的完美事奉。
accumulations:
- book: 出埃及記
  chapter: 30
  summary: 亞倫被指派每日早晚燒香並於贖罪日行贖罪之禮；亞倫和兒子需在洗濯盆潔淨並受聖膏油膏立為祭司。
  relation: 亞倫父子祭司的職分預表基督的大祭司事奉，其燒香代求、洗濯潔淨與受膏事奉，彰顯了基督代禱、話語潔淨與聖靈膏抹的屬靈實際。
