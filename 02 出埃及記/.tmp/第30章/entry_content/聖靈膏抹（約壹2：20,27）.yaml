name: 聖靈膏抹（約壹2：20,27）
type: 互文
secondary_types: []
aliases:
- 聖靈膏抹（約壹2:20
- 27）
status: formal
definition: 出埃及記30章22至33節記載神吩咐用上品香料與橄欖油調和製成聖膏油，用以抹會幕、法櫃及一切器具，並膏亞倫和他的兒子使他們成聖供祭司職分。這聖膏油預表聖靈的工作。約翰壹書2章20與27節指出信徒從主受了恩膏，這恩膏常在信徒裡面，教訓他們認識神。舊約中聖膏油分別為聖的功用，對應新約中聖靈膏抹在信徒身上的工作，使其成聖並得著事奉的能力。正如會幕與祭司需經膏抹才能事奉，新約信徒的事奉也必須倚靠聖靈的膏抹與同在。
accumulations:
