name: 胸牌（決斷胸牌）
type: 原文
secondary_types: []
aliases:
- 決斷胸牌
- breastpiece of judgment
status: formal
definition: 希伯來文 חֹשֶׁן מִשְׁפָּט (choshen mishpat)，原文字義為「審判的胸」或「決斷的胸牌」。這是一個四方形、疊為兩層的布袋，長寬各一虎口，用與以弗得相同的貴重材料製成。其上鑲有四行共十二塊寶石，刻著以色列十二支派的名字，袋內放置烏陵和土明，用以尋求神的旨意與判斷。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 詳細記載決斷胸牌的材料、尺寸、十二寶石的排列，以及用金鏈和藍細帶子將胸牌緊繫於以弗得上的作法。
  relation: 決斷胸牌表徵基督愛教會，將神的子民記掛在心上，並按照父神的旨意與公義建造教會，為百姓尋求神的引導。
related_entries:
- 以弗得
- 烏陵和土明
- 十二寶石（胸牌寶石）
- 精金
- 藍色、紫色、朱紅色線
