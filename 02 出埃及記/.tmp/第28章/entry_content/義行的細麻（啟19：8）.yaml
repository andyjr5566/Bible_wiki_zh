name: 義行的細麻（啟19：8）
type: 互文
secondary_types: []
aliases:
- 細麻衣
- 聖徒所行的義
status: formal
definition: 啟示錄十九章八節記載新婦（教會）蒙恩得穿光明潔白的細麻衣，這細麻衣就是聖徒所行的義。 出埃及記二十八章多次提及祭司聖衣的製作需用「細麻」（出28:5,6,8,15,39,42），細麻在聖經中
  象徵純潔、公義與聖潔。大祭司與祭司穿上細麻製成的內袍、腰帶、冠冕與褲子，表徵他們在神面前 必須有聖潔無瑕疵的行事為人。這預表新約信徒作為祭司體系，應當活出基督那義的屬性，以聖潔的
  行為作為事奉的妝飾。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 祭司聖衣的各部分均需用細麻製作，以表徵純潔與公義。
  relation: 預表新約信徒應以聖潔公義的行為作為屬靈的妝飾事奉神。
