name: 冠冕（裹頭巾）
type: 原文
secondary_types: []
aliases:
- 冠冕
- 裹頭巾
- 禮冠
status: formal
definition: 希伯來原文音譯為「mitsnephet」，原文字義指「包頭巾」或「禮冠」。在出埃及記第二十八章中，大祭司亞倫的冠冕是用純白的細麻布做成的頭巾式禮冠（出28:39），其前方用一條藍細帶子繫著刻有「歸耶和華為聖」的精金牌子（出28:37）。冠冕表徵大祭司的權柄與順服，其純白細麻材質則表徵基督的聖潔無瑕疵。亞倫的兒子（普通祭司）也穿戴裹頭巾，但原文用字不同，且其上沒有金牌，這區別了普通祭司與大祭司的職分。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 大祭司的冠冕用細麻布做成，前方繫有刻著「歸耶和華為聖」的精金牌子，普通祭司也穿戴裹頭巾但無金牌。
  relation: 冠冕上的金牌表徵基督為教會自己分別為聖，並在神面前擔當百姓的罪孽，使選民蒙神悅納。
