name: 十二寶石（胸牌寶石）
type: 主題
secondary_types: []
aliases:
- 胸牌寶石
- 十二支派寶石
status: formal
definition: 大祭司決斷胸牌上鑲嵌的四行十二塊寶石，每塊刻有以色列十二支派的名字。這十二種寶石表徵教會所該有的光景以及在神心目中的寶貴，十二塊寶石排成四行（四乘三）表徵受造的人（四）蒙恩而得與三一神（三）合而為一。寶石鑲在金槽中，表徵教會緊密連結於神。
development: 在出埃及記28章中，十二寶石被鑲嵌在決斷的胸牌上，每塊寶石按著以色列十二個兒子的名字，彷彿刻圖書般刻上十二支派的名字。大祭司亞倫進聖所時，要將刻著以色列兒子名字的胸牌帶在胸前，在耶和華面前常作紀念。這表徵基督將神的子民記掛在祂的心上，且教會是基督的信，在各處顯揚基督。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 胸牌上鑲有四行十二種寶石，每塊刻有以色列十二支派的名字，鑲在金槽中。
  relation: 表徵基督愛教會並將教會記掛在心上，以及教會在神心目中的寶貴與緊密連結於神。
