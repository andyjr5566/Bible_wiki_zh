name: 外袍（以弗得的外袍）
type: 主題
secondary_types: []
aliases:
- 以弗得的外袍
- 藍色外袍
status: formal
definition: 這是穿在以弗得下面的一件長袍，顏色全是藍色的。袍子頂部中央留有領口並織出領邊以防破裂。袍子周圍底邊交替裝飾著用藍色、紫色、朱紅色線做的石榴和金鈴鐺。大祭司供職進出聖所時必須穿上，藉由鈴鐺的響聲確認其存活，以免死亡。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 詳細記載以弗得外袍的純藍色材料、領口設計，以及底邊交替裝飾金鈴鐺與石榴的規定和供職時的穿著要求。
  relation: 藍色外袍表徵基督對教會的關懷全然屬天，金鈴鐺與石榴交替表徵警戒與供應生命相輔相成，領口表徵基督是教會的頭。
