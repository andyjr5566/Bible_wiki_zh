name: 烏陵和土明
type: 原文
secondary_types: []
aliases:
- 烏陵
- 土明
- Urim and Thummim
status: formal
definition: 烏陵（Urim）原文字義為「光明」，土明（Thummim）原文字義為「完美」或「全備」。這是兩塊用於尋求神旨意、進行決斷的聖物，被放置在大祭司的決斷胸牌裡。聖經並未明確記載其外觀與確切使用方法，但藉此神向以色列人顯明祂的引導與判斷。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 記載神吩咐摩西將烏陵和土明放在決斷的胸牌裡，使亞倫進到耶和華面前時常帶在胸前，為以色列人作決斷。
  relation: 烏陵和土明表徵基督愛教會，為教會求好處並符合神的心腸，預表聖靈在信徒心中光照並顯明神的旨意。
related_entries:
