name: 披戴基督（羅13：14）
type: 互文
secondary_types: []
aliases:
- 披戴主耶穌基督
status: formal
definition: 新約羅馬書十三章十四節教導信徒「總要披戴主耶穌基督，不要為肉體安排，去放縱私慾」。 此一屬靈原則對應出埃及記第二十八章祭司聖衣的穿戴。舊約大祭司亞倫供職時必須穿上
  神所指定的全副聖衣（出28:42-43），以遮掩肉體的羞恥、免得擔罪而死；這表徵信徒在 新約時代必須披戴基督的義與聖潔，不可憑肉體事奉神。正如祭司的聖衣為榮耀、為華美，
  基督自己就是信徒的榮耀與華美，事奉神的人必須在生活與事奉中完全穿戴基督。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 祭司供職時必須穿上聖衣與細麻布褲子以遮掩下體，免得擔罪而死。
  relation: 預表新約信徒當披戴基督，遮蓋肉體的羞恥，以聖潔的妝飾事奉神。
