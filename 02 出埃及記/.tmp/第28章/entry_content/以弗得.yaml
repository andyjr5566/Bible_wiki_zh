status: formal
definition: 希伯來文 אֵפוֹד (ephod)，原文字義為「祭司披肩或斗篷」。這是大祭司聖衣中最特出的一件，形狀像圍裙或背心，用金線和藍色、紫色、朱紅色線並撚的細麻以巧匠的手工織成。以弗得有兩條肩帶，肩帶上鑲有刻著以色列十二支派名字的紅瑪瑙，用以在神面前作為紀念。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 詳細記載以弗得的製作材料、巧匠織法、兩條肩帶的連接方式，以及肩帶上鑲嵌刻有以色列兒子名字的紅瑪瑙寶石。
  relation: 以弗得表徵政權擔在基督的肩頭上，大祭司穿著以弗得在神面前肩負以色列十二支派，預表基督承擔神選民的重任。
