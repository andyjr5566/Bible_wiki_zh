name: 牌子（冠冕牌）
type: 原文
secondary_types: []
aliases:
- 金牌
- 歸耶和華為聖的牌
status: formal
definition: 原文字義為「花」或「羽毛、翅膀」，指花朵狀的純金飾物。這面牌用精金製作，上面按刻圖書之法刻著「歸耶和華為聖」，用一條藍細帶子繫在冠冕的前面。大祭司戴在額上，用以擔當干犯聖物條例的罪孽，使以色列人在神面前蒙悅納。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 記載用精金做牌、刻上「歸耶和華為聖」、用藍細帶子繫於冠冕前，以及大祭司額上擔當罪孽使百姓蒙悅納的條例。
  relation: 純金牌表徵基督為教會自己分別為聖，並以真理使教會成聖，在神面前擔當教會的罪孽，使教會蒙神悅納。
related_entries:
