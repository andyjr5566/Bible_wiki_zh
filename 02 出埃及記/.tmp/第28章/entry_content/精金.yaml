name: 精金
type: 主題
secondary_types: []
aliases:
- 純金
status: formal
definition: 指純正、潔淨的金子。在出埃及記28章中，精金被用來製作大祭司聖衣上的配件，如擰成的金鍊子、金環、以及刻有「歸耶和華為聖」的金牌。精金象徵神聖的純淨、榮耀以及不可朽壞的屬性。
development: 本章中精金被用於大祭司服飾的多個重要部位：用精金擰成如繩的鍊子連接胸牌與以弗得，表徵基督以神聖的慈繩愛索記掛神的選民；用精金做一面牌刻著「歸耶和華為聖」，表徵基督為教會自己分別為聖，也以真理使教會成聖。精金的使用強調了祭司職分的神聖性與榮耀。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 精金被用來製作胸牌的鍊子、金環，以及冠冕前刻有「歸耶和華為聖」的金牌。
  relation: 表徵基督在神性裡牢牢記掛選民，並以神聖的屬性擔當教會的罪孽使教會成聖。
