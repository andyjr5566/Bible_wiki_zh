name: 信徒作祭司（彼前2：5,9）
type: 互文
secondary_types:
- 神學
aliases:
- 聖潔的祭司
- 有君尊的祭司
status: formal
definition: '新約信徒憑藉耶穌基督的救贖，成為聖潔並有君尊的祭司，藉著祂奉獻神所悅納的靈祭。 在出埃及記中，祭司的職分僅限於亞倫及其子孫，他們必須穿戴特製的聖衣、受膏並分別為聖才能供職；
  然而新約啟示，所有蒙恩得救的信徒皆有分於祭司的體系，不須再透過人間挑選的祭司作中保， 而是直接藉著大祭司耶穌基督進到神面前事奉。

  '
development: '舊約時代，以色列人本蒙召作祭司的國度，卻因悖逆而將祭司職分限於亞倫家族。 出埃及記第二十八章詳述亞倫及其兒子供祭司職分時必須穿戴的聖衣與受膏條例，
  這些外在的聖衣與分別為聖的規條，預表了基督作為大祭司的完美屬性與工作。 到了新約，因著基督一次獻上永遠的贖罪祭，信徒成為聖潔的祭司體系， 不再需要物質的聖衣或人間的亞倫後裔來中保，而是披戴基督、受聖靈膏抹，直接事奉神。

  '
