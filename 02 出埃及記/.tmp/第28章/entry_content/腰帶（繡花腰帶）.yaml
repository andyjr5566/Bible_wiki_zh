name: 腰帶（繡花腰帶）
type: 主題
secondary_types: []
aliases:
- 繡花腰帶
- 腰帶
- 束腰帶
status: formal
definition: 腰帶是祭司聖服中用來束腰的帶子，大祭司的腰帶是用繡花的手工精巧製成（出28:39），用以束上內袍，使事奉時不致鬆脫。腰帶雖被外袍遮蓋，卻是最華美有價值的，顯明凡歸於神的，無論看得見或看不見，都必須是上好的。腰帶表徵基督與教會在神面前乃是以謙卑束腰（彼前五5），也預表裝備信徒的真理（弗六14），是事奉神之人不可缺少的自身美德與隨時預備做工的態度。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 大祭司和普通祭司都有腰帶，大祭司的腰帶用繡花手工做成，為榮耀與華美。
  relation: 繡花腰帶表徵基督與教會以謙卑束腰，並預表事奉者需以真理裝備自己，預備服事神。
