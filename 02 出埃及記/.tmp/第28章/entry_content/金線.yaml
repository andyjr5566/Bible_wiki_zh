name: 金線
type: 原文
secondary_types: []
aliases:
- 金絲
status: formal
definition: 製作大祭司聖衣（以弗得、胸牌和腰帶）所使用的貴重材料之一。金在聖經中常象徵神性、純淨和君王權柄。在祭司服飾的語境中，金線代表神聖的本質和神的榮耀，其不可朽壞性也指向神與祂子民立約的永恆性質。
development: 出埃及記28章多次提到要用金線和藍色、紫色、朱紅色線並撚的細麻製作以弗得與決斷胸牌。金線表徵信徒有分於神生命的性情。在屬靈預表上，聖衣的材料必須包含金線，說明事奉神的人不能單憑自己的才幹，必須有分於神聖的性情才能在神面前供祭司的職分。
accumulations:
- book: 出埃及記
  chapter: 28
  summary: 製作以弗得、胸牌巧工織的帶子時，指定要使用金線與其他彩色線及細麻摻雜編織。
  relation: 表徵大祭司的服事必須有分於神聖的性情與生命的榮耀，預表基督神性的彰顯。
