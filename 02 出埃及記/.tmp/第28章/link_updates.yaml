book: 出埃及記
chapter: 28
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出28:1-5 神吩咐摩西從以色列人中選亞倫和他的兒子供祭司職分，為他們做聖衣。
  relation: 出28章是摩西領受祭司聖衣製作指示的章節，摩西作為中保傳達神的啟示。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出28:1-43 亞倫被神揀選為大祭司，穿戴聖衣（以弗得、胸牌、外袍、冠冕等）供祭司職分。
  relation: 出28章詳細記載亞倫祭司聖衣的製作規格，確立亞倫家族祭司職分的神聖性。
- title: 拿答
  path: link_folder/人物/拿答.md
  summary: 出28:1 拿答是亞倫的長子，被神揀選供祭司職分。
  relation: 出28:1確立拿答作為亞倫兒子、祭司家族成員的身分，後因獻凡火被神擊殺（利10:1-2）。
- title: 亞比戶
  path: link_folder/人物/亞比戶.md
  summary: 出28:1 亞比戶是亞倫的次子，被神揀選供祭司職分。
  relation: 出28:1確立亞比戶作為亞倫兒子、祭司家族成員的身分，後因獻凡火被神擊殺（利10:1-2）。
- title: 以利亞撒
  path: link_folder/人物/以利亞撒.md
  summary: 出28:1 以利亞撒是亞倫的三子，被神揀選供祭司職分，後繼承大祭司職分（民20:25-28）。
  relation: 出28:1確立以利亞撒作為亞倫兒子、祭司家族成員的身分，後成為大祭司。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出28 神在西乃山向摩西啟示祭司聖衣的製作細節。
  relation: 西乃山是神啟示會幕、祭司、聖衣等律法的地點，出28章屬於西乃山啟示的延續。
- title: 會幕
  path: link_folder/地點/會幕.md
  summary: 出28:1-43 祭司聖衣是為在會幕中供職所做，亞倫穿戴聖衣在會幕中事奉。
  relation: 出28章詳細規定祭司在會幕中事奉時所穿的聖衣，會幕是祭司事奉的場所。
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: 出28:35 亞倫穿著外袍進聖所供職，袍上的響聲被聽見，使他不至於死亡。
  relation: 出28章規定祭司聖衣是為在聖所中事奉所用，聖所是祭司事奉的核心區域。
- title: 祭司職分
  path: link_folder/神學/祭司職分.md
  summary: 出28:1,40-43 神揀選亞倫和他的兒子供祭司職分，穿聖衣、受膏立、分別為聖。
  relation: 出28章確立祭司職分的神聖性、聖衣的象徵意義、膏立與分別為聖的程序，預表基督作大祭司（來5:1-5, 7:26-28）。
- title: 分別為聖
  path: link_folder/神學/分別為聖.md
  summary: 出28:41 為亞倫和他兒子穿上聖衣，膏立他們，將他們分別為聖，好供祭司職分。
  relation: 出28:41確立分別為聖的儀式——穿聖衣、膏立、授職，預表基督被聖靈膏立（路4:18, 徒10:38）與信徒被聖靈分別為聖（林後1:21-22）。
- title: 永遠的定例
  path: link_folder/神學/永遠的定例.md
  summary: 出28:43 這要為亞倫和他的後裔作永遠的定例。
  relation: 出28:43確立祭司職分與聖衣制度的永久性，預表基督永遠的祭司職分（來7:24-25）與信徒永遠的祭司身分（彼前2:9）。
- title: 彼前2：9
  path: link_folder/互文/彼前2：9.md
  summary: 彼前2:9「你們是被揀選的族類，是有君尊的祭司，是聖潔的國度，是屬神的子民」。
  relation: 彼前2:9將出28章亞倫祭司職分應用到新約信徒——信徒在基督裡成為王室祭司，獻上屬靈祭物（羅12:1, 彼前2:5）。
  relation: ''
