book: 出埃及記
chapter: 28
updates:
- title: 信徒作祭司（彼前2：5,9）
  path: link_folder/互文/信徒作祭司（彼前2：5,9）.md
  summary: 出28:1 神從以色列人中揀選亞倫和他的兒子供祭司職分。KC 由此對彼前2:5 的「聖潔的祭司」作了一個關鍵的分辨：新約沒有一個被特別呼召作祭司的階級——「那是羅馬天主教會嚴重的錯誤之一」；對教會的信徒而言是一個共同的祭司職分。而亞倫兒子的衣服同樣是「為榮耀，為華美」（28:40），KC：「我們可以像主耶穌一樣完全地，作為祭司站在神面前。祂就是我們的完全。」
  relation: 出19:6 已宣告「你們要歸我作祭司的國度」，但出28 顯明親近神仍是有門檻的——神自己揀選誰可以近前來（來5:4）。KC 把這個張力接到新約：門檻不在身分而在使用——「只有那些真的親近神的人，才在運用這祭司職分。許多信徒沒有使用這特權，常常是因為錯誤的教導。」出28 因此是彼前2:5,9 的舊約底稿：祭司的資格全在所穿的聖衣（基督）而不在自己，沒有祂「我們赤裸的肉體就顯露出來」（28:42-43）。
- title: 義行的細麻（啟19：8）
  path: link_folder/互文/義行的細麻（啟19：8）.md
  summary: 出28:5、39 祭司聖衣的材料包含細麻，內袍、冠冕、褲子皆以細麻織成。KC 讀大祭司的白細麻：「白細麻說到祂作為人的完全」；而亞倫兒子的細麻褲子則是為遮蓋赤身，免得他們「擔罪而死」（28:42-43）。
  relation: 細麻在會幕系統裡一路從院子帷子（出27:9）走到祭司聖衣（出28），到啟19:8 收束為「這細麻是聖徒所行的義」。出27 的細麻是外人從院子外看見的，出28 的細麻卻是穿在祭司身上、貼著身體的——同一種材料，一個是見證給世人看，一個是資格站在神面前。而兩處都不是自己織的：細麻是神指定的材料，正如啟19:8「就蒙恩得穿光明潔白的細麻衣」——是被賜的。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: "本章記載神揀選亞倫和兒子供祭司職分，穿聖衣分別為聖，預表基督作大祭司按麥基洗德等次(來7:17)。"
  relation: "亞倫作為大祭司的呼召與聖衣，預表基督完全的大祭司職分，是本章祭司制度的核心人物。"
- title: 亞倫的祭司譜系
  path: link_folder/人物/亞倫的祭司譜系.md
  summary: "本章列舉亞倫四子拿答、亞比戶、以利亞撒、以他瑪同供祭司職分，預表信徒祭司體系(彼前2:9)。"
  relation: "亞倫兒子們的祭司職分延續了亞倫的呼召，預表新約信徒都有分於祭司體系。"
- title: 藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）
  path: link_folder/主題/藍色、紫色、朱紅色線（tekhelet, argaman, tola'at shani）.md
  summary: "本章多處用藍色、紫色、朱紅色線製作以弗得、胸牌、外袍、冠冕牌等聖衣(出28:5,6,8,15,31,33,37)，表徵神性、君尊、流血贖罪。"
  relation: "三色線貫穿聖衣製作，預表基督神人二性與救贖工作的完美結合。"
- title: 撚的細麻
  path: link_folder/原文/撚的細麻.md
  summary: "本章多處用撚的細麻做聖衣、內袍、褲子(出28:5,6,8,15,39,42)，表徵潔白聖潔(啟19:8)、基督純潔人性。"
  relation: "細麻作為聖衣基礎材料，預表信徒在基督裡的義行與聖潔生活。"
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: "本章整章聖衣製作都照神指示(出28:1-43)，預表天上真實。來8:5、9:23-24 指出地上帳幕是天上真聖所的影兒/副本。"
  relation: "聖衣製作嚴守神的樣式，彰顯敬拜必須出於神的啟示與精確順服。"
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: "本章提到亞倫和兒子進會幕、就近壇供職(出28:43)，會幕是神與人會面之處。"
  relation: "祭司聖衣的功用在會幕中服事，預表基督在天上真聖所的代求工作。"
- title: 聖所
  path: link_folder/地點/聖所.md
  summary: "本章提到亞倫進聖所、在耶和華面前(出28:29,30,35,43)，聖所是祭司事奉區域。"
  relation: "聖所是大祭司穿聖衣事奉的場所，預表基督進入天上聖所為信徒代求。"
- title: 至聖所
  path: link_folder/地點/至聖所.md
  summary: "本章暗示胸牌、烏陵土明在至聖所使用(出28:29,30,35)，至聖所是神同在最濃厚處。"
  relation: "至聖所是大祭司一年一次進入的至聖地，預表基督一次永遠進入天上至聖所成就永遠救贖。"
