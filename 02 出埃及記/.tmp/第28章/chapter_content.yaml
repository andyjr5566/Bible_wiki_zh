organization: '### 祭司聖衣的總則與材料（v1-5）

  出埃及記第二十八章記載了祭司聖衣的製作法則。CT指出，神揀選亞倫和他的兒子供祭司職分，亞倫預表主耶穌是我們的大祭司，而他的兒子們則預表所有蒙恩得救的信徒，都有分於祭司的體系。BH進一步說明，亞倫從以色列人中被選出，強調祭司是百姓在神面前的代表，這祭司的體系最終預表耶穌基督作為永遠的大祭司。神吩咐摩西為亞倫做聖衣，CT指出其目的是「為榮耀，為華美」，榮耀表徵彰顯基督的神性，華美表徵彰顯基督的人性。BH亦補充，這些聖衣象徵將祭司分別為聖歸給神，其華美反映了神聖潔的屬性。製作聖衣的工匠必須是「心中有智慧的，就是我用智慧的靈所充滿的」，CT指出這表徵不是世上的智慧，乃是神所賜的智慧方能明白基督的奧秘；BH則將此連結至新約的屬靈恩賜，表明神裝備祂所呼召的人。聖衣的材料包括金線、藍色、紫色、朱紅色線和細麻，CT靈意解釋這些材料表徵信徒必須蒙恩得救（朱紅色線）、被分別為聖（細麻）、有分於神生命的性情（金線）、心思屬天超越（藍色），並顯出君尊（紫色）。KC亦指出，這些材料與帳幕的材料相同，將亞倫的祭司事奉與神的居所緊密相連。


  ### 以弗得與決斷胸牌的屬靈意涵（v6-30）

  本章花費極大篇幅描述以弗得與決斷胸牌的製作。CT指出，以弗得是大祭司穿的特製背心，表徵政權擔在基督的肩頭上。以弗得的兩條肩帶上鑲有兩塊紅瑪瑙，刻著以色列十二支派的名字，CT指出紅瑪瑙表徵神的選民經過聖靈的雕刻與更新，而將寶石安在肩帶上表徵基督紀念並承擔神選民的重任。BH亦說明，肩膀在古代近東文化中代表力量與責任，大祭司將十二支派的名字擔在肩上，預表基督為屬祂的人代求。決斷的胸牌要與以弗得同樣做法，CT指出胸牌四方的形狀表徵基督在正直裡愛教會，疊為兩層表徵祂堅固不移的愛。胸牌上鑲有十二種寶石，CT指出這十二塊寶石排成四行（四乘三），表徵受造的人蒙恩與三一神合而為一，且教會在神心目中極為寶貴。KC強調，胸牌上的每塊寶石代表一個支派，每個信徒在主耶穌心中都有獨特的位置與榮耀。胸牌內放有烏陵和土明，CT指出這表徵基督愛教會，為教會求好處是符合神的心腸；BH則指出烏陵和土明用於尋求神的旨意，表明祭司在神面前為百姓作決斷的職責。KC進一步應用，當我們遇到難處時，可轉向主耶穌，祂的決斷出於祂對我們的愛。


  ### 外袍、金牌與其他祭司衣物的預表（v31-43）

  以弗得的外袍顏色全是藍的，CT指出這表徵基督對教會的關懷全然屬天；BH亦指出藍色象徵天上的源頭與神的同在。外袍底邊交替裝飾著石榴與金鈴鐺，CT指出石榴表徵生命的豐滿，金鈴鐺表徵警戒，兩者相輔相成；當大祭司供職時，鈴鐺的響聲使他不至於死亡，表徵警戒有助於屬靈生命。BH說明鈴鐺的聲音讓外面的百姓知道大祭司在聖所內依然存活且蒙悅納。大祭司的冠冕前有一面精金做的牌子，刻著「歸耶和華為聖」，CT指出這表徵基督為教會自己分別為聖，也以真理使教會成聖；BH指出這金牌提醒大祭司必須擔當百姓在獻祭時干犯聖物條例的罪孽，使百姓在神面前蒙悅納。KC則強調，這金牌預表主耶穌作大祭司，確保我們雖有軟弱，卻因祂的聖潔在神面前蒙悅納。至於內袍、腰帶和裹頭巾，CT指出這些表徵基督與教會的聖潔無瑕疵與謙卑束腰；KC補充，內袍預表主耶穌在事奉中與祂的子民深深認同。最後，祭司必須穿上細麻布褲子遮掩下體，CT指出這表徵遮蓋羞恥以免得罪神；BH亦說明這是為了與異教赤身獻祭的習俗區別，維持聖所的尊嚴。


  ### 跨章脈絡與預表整理

  出埃及記第二十八章的祭司聖衣，整體預表了基督作為大祭司的榮耀與華美，以及祂對教會的愛與代求。CT與KC一致指出，亞倫預表基督，亞倫的兒子預表新約的信徒祭司體系。聖衣的每一件物件都指向基督的屬性與事工：以弗得與胸牌上的寶石表明基督將信徒擔在肩上、懷在心裡，在神面前常作紀念；外袍的藍色與金鈴鐺見證祂屬天的根源與活潑的代求；金牌上的「歸耶和華為聖」顯明祂以聖潔遮蓋教會的軟弱。BH則從古代近東背景補充，祭司的世襲制度、聖衣的貴重材料與烏陵土明的使用，都凸顯了祭司職分的神聖與嚴肅性。這章不僅是舊約禮儀的記載，更是新約信徒事奉的屬靈啟蒙，提醒信徒必須披戴基督（羅13:14），在聖靈的膏抹下，以聖潔的生命來事奉神。'
