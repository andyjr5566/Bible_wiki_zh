book: 出埃及記
chapter: 34
updates:
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 出34:9-10 摩西在神宣告性情後代求「求你在我們中間同行」，神隨即宣告「我要立約，要在百姓面前行奇妙的事，是在遍地萬國中所未曾行的」。KC 指出神應許與他們同去並立約，33章懸而未決的同行問題在此以立約的形式落定。
  relation: 本章將「神的同在」由33章的應許推進為約的實體——同行不再只是摩西個人蒙恩的果效，而是神與以色列全體更新之約的內容。
- title: 神的榮耀
  path: link_folder/神學/神的榮耀.md
  summary: 出34:5-8 耶和華在雲中降臨，在摩西面前經過，宣告耶和華的名——這是33:18-23 摩西求見榮耀的實現：神的榮耀以性情宣告（有憐憫有恩典……萬不以有罪的為無罪）的形式經過，摩西急忙伏地下拜。KC 指出摩西在此看見了他上一章所求的榮耀經過；34:29-35 摩西面皮發光，正是與神榮耀相交的返照。
  relation: 本章顯明神的榮耀核心不是外顯的威嚴而是祂的性情（恩慈與公義）；榮耀經過的果效留在中保臉上，成為百姓可見的見證。
- title: 忌邪（嫉妒）
  path: link_folder/原文/忌邪（嫉妒）.md
  summary: 出34:14 「不可敬拜別神；因為耶和華是忌邪的神，名為忌邪者。」CT 原文字義注「忌邪的」即嫉妒的；GT 引蘇佐楊對原文 qanna 的解析：音「克拿」，神要克服、擒拿一切祂所不喜的人事物，中文譯「忌邪」避免了「妒忌」一詞的道德誤解，只譯出原意的一部分；CT 引高雅倫：這嫉妒是排他性個人關係（如婚姻）受破壞時的專一反應，源於神的獨一性與祂和以色列的獨特關係。
  relation: 本章「名為忌邪者」使 qanna 由屬性描述（出20:5）升格為神的名字，是此原文詞在五經中語意最重的一次出現。
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出34章摩西的角色貫穿全章：遵命鑿出兩塊石版、清晨獨自上西乃山（4節）、聽聞神宣告性情後急忙伏地下拜並四度代求（8-9節）、領受立約條款並奉命寫上（27節）、在耶和華那裡四十晝夜不吃飯不喝水（28節）、下山時面皮發光而不自知（29節）、以帕子蒙臉往返於神與百姓之間（33-35節）。GT 引丁道爾：摩西不知道自己面皮發光，與施洗約翰、保羅一樣不自知其超卓，正是真屬靈偉人的記號（民12:3）。
  relation: 本章是摩西中保職分的榮耀面——32章他為罪代求、33章他求神同在，本章他成為約的執筆者與神榮光的反照者；GT 指出這段與主耶穌登山變像相似而迥異：摩西自始至終只是神使用的媒介，將真神旨意轉述的神人先知。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 出34:30-31 亞倫和以色列眾人看見摩西的面皮發光就怕挨近他；摩西叫他們來，亞倫和會眾的官長才回到他那裡，摩西就與他們說話。KC 指出律法主義的人被恩典驚嚇——亞倫與百姓的懼怕正顯明人在神榮光前的本相。
  relation: 與32章鑄犢的失敗相對，本章亞倫以敬畏者的姿態重新出現在摩西面前，恢復了他在會眾中領受神話語的位分，為利未記中就任大祭司鋪路。
- title: 硬著頸項的百姓
  path: link_folder/神學/硬著頸項的百姓.md
  summary: 出34:9 摩西在神宣告性情後代求：「主啊，我若在你眼前蒙恩，求你在我們中間同行，因為這是硬著頸項的百姓。」KC 指出這是引人注目的理由——正因百姓頑梗，摩西才求神同行：百姓靠自己的力量永遠到不了應許地，唯有神親自帶領；他憑「神是神並非世人」（何11:9）為百姓懇求。
  relation: 「硬著頸項」在本章從神拒絕同行的理由（33:3,5）反轉為摩西求神同行的理由，顯明中保代求的邏輯——愈是頑梗軟弱，愈需要神的同在與恩典。
- title: 迦南七族（迦南地原住民）
  path: link_folder/背景/迦南七族（迦南地原住民）.md
  summary: 出34:11 神應許「我要從你面前攆出亞摩利人、迦南人、赫人、比利洗人、希未人、耶布斯人」。GT 指出撒瑪利亞抄本和七十士譯本在此名單加上革迦撒人，湊足通稱的迦南地七族；丁道爾指出詳舉族名的用意是藉成事之難反映神蹟之大（申4:38），但勝利有條件——以色列必須遵守神隨後頒布的命令（12-26節）。
  relation: 本章攆出七族的應許緊接立約條款（不可與那地居民立約、要拆毀祭壇柱像木偶），顯明得地與守約互為表裡；神應許的「奇妙可畏之事」（10節）即以驅逐七族為主要內容。
- title: 忌邪的神
  path: link_folder/神學/忌邪的神.md
  summary: 出34:14 「不可敬拜別神；因為耶和華是忌邪的神，名為忌邪者。」CT 引高雅倫：「嫉妒」所指的是排他性的個人關係（如婚姻）遭破壞時導致的強烈反應，不當視作偏執而應看為專一——真愛妻子的丈夫不容妻子與人分享，神也不與對手分享以色列。GT 引蘇佐楊對原文 qanna 的解析：既「克」且「拿」，神要克服、擒拿一切祂所不喜的。KC 指出神的忌邪不是把自己與金銀木石之神相比，而是不願祂的百姓因牽連偶像而自取滅亡——祂尋求的是百姓的幸福。
  relation: 本章是「名為忌邪者」的出處——忌邪從神的屬性（出20:5）升格為神的名字，緊接於禁止與迦南居民立約、通婚、吃祭物的條款中，構成立約排他性的神學根據。
- title: 西乃山
  path: link_folder/地點/西乃山.md
  summary: 出34:2-4,29,32 摩西遵命清晨帶著鑿好的兩塊石版再上西乃山，神在雲中降臨山頂宣告祂的名；此次全山戒嚴比第一次更嚴（連約書亞也不得同行、山根不可放牧羊群牛群），CT 認為主因是金牛犢事件後摩西須留約書亞看守營地，也因神要向摩西顯出祂的榮耀；摩西在山上四十晝夜不吃不喝，末了手拿法版下山，面皮發光。
  relation: 西乃山在本章見證立約的更新——同一座山，第一次領版以百姓毀約告終，第二次領版以摩西面光與約的恢復收場。
- title: 頭生歸神為聖
  path: link_folder/歷史/頭生歸神為聖.md
  summary: 出34:19-20 立約條款重申「凡頭生的都是我的；一切牲畜頭生的，無論是牛是羊，公的都是我的……凡頭生的兒子都要贖出來。誰也不可空手朝見我」。GT 引丁道爾：代贖頭生人畜的規條插在除酵節（紀念出埃及）的背景中十分合宜，因為這作法正是紀念以色列蒙拯救——神在逾越之夜擊殺埃及長子而保全以色列頭生的。
  relation: 頭生歸神在本章被納入更新之約的「禮儀十誡」，與除酵節相連成為救贖紀念的一環；KC 指出神藉頭生的權利要百姓承認祂對他們一切所有的主權。
- title: 驢用羊羔代贖
  path: link_folder/原文/驢用羊羔代贖.md
  summary: 出34:20 「頭生的驢要用羊羔代贖，若不代贖就要打折它的頸項。」CT 指出驢屬不潔牲畜不能獻神，故以羊羔代贖，不贖則打折頸項使之無用（參民18:15）。GT 引《聖經難解經文詮釋手冊》討論本節與民18:15-16（不潔牲畜用銀子贖出）的差異：神指示修改先前的律法以利聖所的收入，情況所需使律法以另一方式執行。
  relation: 本章在立約更新中重申此條例（與出13:13 同），潔與不潔、代贖與毀壞的對比繼續指向救贖的替代原則。
- title: 三大節期
  path: link_folder/神學/三大節期.md
  summary: 出34:18,22-24 更新之約重申三大節期：除酵節（亞筆月吃無酵餅七天，因這月出了埃及）、七七節（收割初熟麥子時，又稱收割節、五旬節）、收藏節（年底，又稱住棚節），一切男丁一年三次朝見主耶和華以色列的神；並附加應許「你一年三次上去朝見耶和華你神的時候，必沒有人貪慕你的地土」（24節）。GT 引丁道爾：順命守節的農夫需要這保證——不必擔心朝聖時被鄰舍侵奪土地；丁良才指出歷史上仇敵沒有一次趁三大節期出兵侵掠以色列，顯明神應許的效力。
  relation: 本章與出23:14-17 平行而增添了 v21「雖在耕種收割的時候也要安息」與 v24 的保障應許，KC 指出三大節期表達神對百姓的奉獻與一切所有的主權。
- title: 逾越節
  path: link_folder/歷史/逾越節.md
  summary: 出34:25 「你不可將我祭物的血和有酵的餅一同獻上。逾越節的祭物也不可留到早晨。」GT 引串珠：與出23:18 稍異，此處明指那不可留到早晨的祭物屬於逾越節；聖經精讀本指出祭物的血象徵贖罪、餅中之酵象徵罪惡，故不能同獻；舊約聖經背景註釋指出禁留殘羹是筵席稱聖的表徵。
  relation: 逾越節條例在更新之約中隨除酵節重現（18節），維繫「這約」與出埃及救贖事件的連結。
- title: 出23：19不可用山羊羔母奶煮山羊羔
  path: link_folder/解經爭議/出23：19不可用山羊羔母奶煮山羊羔.md
  summary: 出34:26 立約條款末句重申「不可用山羊羔母的奶煮山羊羔」，與出23:19、申14:21 三度出現。CT 提出二解：以母奶煮其子有殘忍之嫌；此乃迦南異教祭祀習俗，為真神所不喜。GT 引舊約聖經背景註釋：煮食或獻祭時禁止混合奶和肉的猶太潔食規例即以本節為根據，此令亦可能是針對迦南宗教崇拜方式的反應。
  relation: 本條例在更新之約中位居結尾（與初熟之物同節），顯明其在「禮儀十誡」框架中的正式地位，不僅是飲食細則。
- title: 十誡
  path: link_folder/神學/十誡.md
  summary: 出34:28 「摩西在耶和華那裡四十晝夜，也不吃飯也不喝水。耶和華將這約的話，就是十條誡，寫在兩塊版上。」GT 指出原文「十句話」；學者對本章11-26節可否歸納為「禮儀十誡」爭論甚多（中文聖經註釋臚列其十條並指出其漏洞），丁道爾認為兩套律法基本神學並無衝突，若「十言」已在本段背後的假設之中，問題便不存在；GT 並指出申10:10 說這是第二個四十晝夜，摩西一直俯伏祈求神赦免百姓（申9:18,25），故不吃不喝。
  relation: 本章十誡被重寫於摩西所鑿的第二套法版上，是約的恢復而非新約——第一次立約時的律法照樣有效；「寫」的主詞在1節（我要寫）與27節（你要寫上）之間的張力，GT 引丁道爾解為神書寫與摩西書寫同樣真實，反映妥拉是神心思的表達。
