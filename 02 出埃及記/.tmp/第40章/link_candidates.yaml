    evidence: "出40:16-33 摩西親自立起帳幕、擺設器具、獻祭、洗濯——他不僅是建造者，也執行祭司的服事。KC：Moses sets an example in everything as a servant in God's house（Heb 3:5）；he acts as a builder and also as a priest；he is a picture of the Lord Jesus, Who is also greater than Moses, for Christ is 'Son over His house'（Heb 3:6）。已有條目「摩西」"
