  - name: "神的同在"
    type: "神學"
    evidence: "出40:34-38 雲彩遮蓋會幕，耶和華的榮光就充滿了帳幕——這是出埃及記全書的高潮：神降臨並住在祂的百姓中間。KC：a mighty moment occurs, the goal of all previous work: God comes to dwell with His people。BH：the glory of the LORD filling the tabernacle signifies the culmination of the Exodus narrative。已有條目「神的同在」"
