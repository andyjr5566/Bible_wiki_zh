name: 永遠當祭司的職任
type: 神學
secondary_types: []
aliases:
- 世世代代祭司的職任
- 祭司的職分
status: formal
definition: 神吩咐摩西怎樣膏亞倫，也要照樣膏亞倫的兒子，使他們供祭司的職分。並且應許他們世世代代凡受膏的，就永遠當祭司的職任。這確立了亞倫家世襲的祭司制度，表明祭司的職分是神親立的聖約，具有永久的有效性。
development: 亞倫體系的祭司職任是預表耶穌基督永遠的祭司職分。正如亞倫後代世襲祭司職分，基督照著麥基洗德的等次成為永遠的大祭司。同時，這也預表新約信徒皆為祭司，被呼召成為君尊的祭司體系，宣揚神的美德。
accumulations:
- book: 出埃及記
  chapter: 40
  summary: 亞倫和他兒子受膏承接祭司職分，神立下世世代代受膏者永遠當祭司職任的應許。
  relation: 確立了亞倫家的祭司體系，預表基督永遠的祭司職分與信徒祭司的身分。
