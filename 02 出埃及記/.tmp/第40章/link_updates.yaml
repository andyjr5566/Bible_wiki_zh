book: 出埃及記
chapter: 40
updates:
- title: 法版（edut）
  path: link_folder/原文/法版（edut）.md
  summary: 出40:20 又把法版放在櫃裡，把杠穿在櫃的兩旁，把施恩座安在櫃上。法版是神與以色列立約的見證（出25:16,21），此時正式放入約櫃內，成為會幕立起後的第一個動作。
  relation: 本章記載法版正式放入約櫃的歷史時刻——立幕後摩西首先將法版放進櫃中，表徵神的話（法版）是會幕的中心與根基；法版在櫃內、施恩座在櫃上，表徵律法被恩典遮蓋。
- title: 會幕（帳幕整體）
  path: link_folder/主題/會幕（帳幕整體）.md
  summary: 出40:2,17-33 神吩咐摩西正月初一日立起帳幕；摩西照吩咐立起帳幕——安座、立板、穿閂、立柱子；搭罩棚蓋頂蓋；把法版放櫃裡、杠穿櫃旁、施恩座安櫃上；把櫃抬進帳幕掛上遮掩櫃的幔子；把桌子安在會幕內北邊幔子外將餅陳設在耶和華面前；把燈臺安在會幕內南邊與桌子相對在耶和華面前點燈；把金壇安在會幕內的幔子前在壇上燒了馨香料做的香；掛上帳幕的門簾；在會幕的帳幕門前安設燔祭壇把燔祭和素祭獻在其上；把洗濯盆安在會幕和壇的中間盆中盛水以便洗濯；摩西和亞倫並亞倫的兒子在這盆裡洗手洗腳；在帳幕和壇的四圍立了院帷把院子的門簾掛上——這樣摩西就完了工。KC：the workers prepared everything, but Moses erects the house of God；Moses sets an example in everything as a servant in God's house（Heb 3:5）；he is a picture of the Lord Jesus, Who is greater than Moses, for Christ is 'Son over His house—whose house we are'（Heb 3:6）。
  relation: 本章是會幕由「建造完成」（出39:32-43）進入「正式立起並啟用」的高潮——摩西親自立幕、擺設器具、獻祭、洗濯，會幕從材料與零件成為神實際居住的所在；正月初一日立幕，表徵新的開始。
- title: 耶和華的榮光
  path: link_folder/神學/耶和華的榮光.md
  summary: '出40:34-35 當時雲彩遮蓋會幕，耶和華的榮光就充滿了帳幕；摩西不能進會幕因為雲彩停在其上並且耶和華的榮光充滿了帳幕。KC：a mighty moment occurs, the goal of all previous work——God comes to dwell with His people；the cloud, the symbol of God''s presence, takes possession of the tabernacle。BH：the glory of the LORD filling the tabernacle signifies God''s approval and presence, the culmination of the Exodus narrative。'
  relation: 本章是出埃及記全書的高潮——神的榮光充滿帳幕，神正式住在祂的百姓中間；摩西也不能進入，表徵神的榮耀超越最偉大的領袖；此場景與王上8:10-11聖殿落成時同樣，預表基督道成肉身時榮光的顯現（約1:14）。
- title: 山上的樣式
  path: link_folder/神學/山上的樣式.md
  summary: '出40:16,19,21,23,25,27,29,32 「是照耶和華所吩咐他的」在本章出現八次——從摩西照吩咐而行（v16）、搭罩棚蓋頂蓋（v19）、掛幔子遮掩櫃（v21）、擺設陳設餅（v23）、點燈（v25）、燒香（v27）、獻燔祭和素祭（v29）、洗手洗腳（v32）。KC：the starting point keeps coming back——to do everything as the LORD has commanded and not to act according to one''s own insight。'
  relation: 本章是「山上的樣式」在立幕與啟用層面的最終執行——摩西親自立幕、擺設、獻祭、洗濯，每一步都「是照耶和華所吩咐他的」；從出25章山上指示到出40章立幕完成，全書以順服神的樣式為框架。
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 出40:16-33 摩西親自立起帳幕——安座、立板、穿閂、立柱子、搭罩棚、蓋頂蓋；把法版放櫃裡、杠穿櫃旁、施恩座安櫃上；把櫃抬進帳幕掛幔子；把桌子安在北邊擺陳設餅；把燈臺安在南邊點燈；把金壇安在幔子前燒香；掛門簾；安設燔祭壇獻燔祭和素祭；安洗濯盆盛水，與亞倫和他兒子洗手洗腳；立院帷掛院門簾——這樣摩西就完了工。KC：Moses sets an example in everything as a servant in God's house（Heb 3:5）；he acts as a builder and also as a priest, among whom he is counted, although he is not appointed as such by the LORD（Psa 99:6）；he is a picture of the Lord Jesus, Who is greater than Moses, for Christ is 'Son over His house'（Heb 3:6）。
  relation: 本章是摩西在出埃及記中最獨特的行動——他不僅是傳達神話語的先知，更親手立起會幕並執行祭司的服事（擺餅、點燈、燒香、獻祭）；摩西作為神家中忠心的僕人（來3:5），預表基督是治理神家的兒子（來3:6）。
- title: 亞倫和他兒子（祭司）
  path: link_folder/人物/亞倫和他兒子（祭司）.md
  summary: 出40:12-15,31 神吩咐使亞倫和他兒子到會幕門口來用水洗身；給亞倫穿上聖衣又膏他使他成聖可以給神供祭司的職分；給他兒子穿上內袍；照樣膏他們使他們給神供祭司的職分，他們世世代代凡受膏的就永遠當祭司的職任；摩西和亞倫並亞倫的兒子在洗濯盆裡洗手洗腳。KC：the often-repeated use of anointing oil recalls our incessant need for the grace and guidance of the Holy Spirit。
  relation: 本章是亞倫和他兒子正式受膏就任祭司職分的歷史時刻——洗身（水洗）、穿聖衣（披戴基督）、受膏（聖靈膏抹），三步驟構成祭司就職禮；「世世代代永遠當祭司的職任」確立了亞倫祭司譜系的永久性。
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: '出40:34-38 當時雲彩遮蓋會幕，耶和華的榮光就充滿了帳幕；摩西不能進會幕因為雲彩停在其上並且耶和華的榮光充滿了帳幕；每逢雲彩從帳幕收上去以色列人就起程前往；雲彩若不收上去他們就不起程直等到雲彩收上去；日間耶和華的雲彩是在帳幕以上，夜間雲中有火在以色列全家的眼前，在他們所行的路上都是這樣。KC：a mighty moment occurs, the goal of all previous work——God comes to dwell with His people；the cloud, the symbol of God''s presence, takes possession of the tabernacle；what He later says to Ezekiel applies: ''This is the place of My throne and the place of the soles of My feet, where I will dwell among the sons of Israel forever''（Eze 43:7a）。BH：the glory of the LORD filling the tabernacle signifies the culmination of the Exodus narrative——God dwelling among His people。'
  relation: 本章是出埃及記全書的最高潮——神的同在從應許（出25:8「又當為我造聖所使我可以住在他們中間」）到實現（雲彩遮蓋會幕、榮光充滿帳幕）；神的同在不僅是靜態的居住，更是動態的引導——雲彩收上去便起程、不收上去便停留，日間雲彩夜間火柱，在他們所行的路上都是這樣。
