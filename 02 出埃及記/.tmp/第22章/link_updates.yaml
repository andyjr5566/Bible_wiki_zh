book: 出埃及記
chapter: 22
updates:
- title: 審判官（elohim）
  path: link_folder/原文/審判官（elohim）.md
  summary: 出22:8-9中「審判官」原文為elohim，與「神」同字。受託保管財物者若找不到賊，須就近審判官（神）起誓證明清白，表明審判官代表神判斷是非。
  relation: 出22:8-9延續出21:6的用法，審判官作為神的代表處理財物糾紛，以起誓方式解決無證人的爭議。
- title: 出20：15
  path: link_folder/互文/出20：15.md
  summary: 出22:1-4的偷竊賠償律例是第八誡「不可偷盜」的具體應用，以五牛賠一牛、四羊賠一羊的重罰嚇阻盜竊。
  relation: 出22:1-4將出20:15的禁令轉化為賠償比例，加倍賠還體現公義原則。
- title: 出20：12
  path: link_folder/互文/出20：12.md
  summary: 出22:28「不可毀謗你百姓的官長」與第五誡「當孝敬父母」同屬尊重權柄的原則，官長為神所設立的權威。
  relation: 出22:28擴展第五誡的尊重原則至社會治理層面，官長如同家庭的父母代表神治理。
- title: 利19：18
  path: link_folder/互文/利19：18.md
  summary: 出22:21-27保護寄居者、寡婦、孤兒、窮人的律例，以「要愛人如己」為基礎，以色列人因在埃及作過寄居的而應善待弱勢。
  relation: 出22:21-27將利19:18的愛人如己具體化為社會保護法規。
- title: 申16：18-20
  path: link_folder/互文/申16：18-20.md
  summary: 出22:8-9中審判官定誰有罪誰就加倍賠還，與申16:18-20設立審判官行公義的命令一致，審判官代表神施行公正。
  relation: 出22:8-9為申16:18-20設立審判官制度的具體案例應用。
- title: 書20：1-9
  path: link_folder/互文/書20：1-9.md
  summary: 出22:2-3區分夜間與白天殺賊的責任，夜間自衛無流血罪，白天則有罪，與逃城制度同屬區分故意與誤殺的法律原則。
  relation: 出22:2-3的自衛殺人原則與書20:1-9逃城制度共同構成以色列的殺人案件處理體系。
- title: 路19：8
  path: link_folder/互文/路19：8.md
  summary: 撒該悔改後宣告「若訛詐了誰就還他四倍」，直接回應出22:1偷羊四倍賠償的律例，體現悔改與賠償的關聯。
  relation: 路19:8的四倍賠還是出22:1賠償律例在新約悔改情境中的具體實踐。
- title: 羅13：1-7
  path: link_folder/互文/羅13：1-7.md
  summary: 出22:28「不可毀謗你百姓的官長」與羅13:1-7順服掌權者的教導一致，官長為神所設立，毀謗官長等同反抗神的秩序。
  relation: 出22:28為羅13:1-7順服掌權者原則的舊約律法基礎。
- title: 羅13：8
  path: link_folder/互文/羅13：8.md
  summary: 出22:1-15的賠償律例體現「凡事不可虧欠人」的原則，偷竊、損壞、受託遺失都須賠償，不可使他人受損。
  relation: 出22:1-15的賠償原則是羅13:8「不可虧欠人」的舊約法律基礎。
- title: 約13：34
  path: link_folder/互文/約13：34.md
  summary: 出22:21-27保護寄居者、寡婦、孤兒、窮人的律例體現神對弱勢的愛，與「彼此相愛」的新命令精神一致。
  relation: 出22:21-27的保護弱者律例是約13:34彼此相愛命令的舊約基礎。
- title: 來10：5
  path: link_folder/互文/來10：5.md
  summary: 出22:29「頭生的兒子歸給我」預表基督將身體獻上為祭，來10:5引用詩40:6「你曾給我預備了身體」應驗於基督。
  relation: 出22:29頭生歸神的原則在來10:5中由基督以身體為祭完美應驗。
- title: 申22：8
  path: link_folder/互文/申22：8.md
  summary: 出22:29「不可遲延」獻上初熟果子，與申22:8的不可取母鳥原則同屬尊重生命秩序的律法。
  relation: 出22:29的不可遲延獻祭與申22:8尊重生命秩序同屬以色列的聖潔生活規範。
- title: 賽50：1
  path: link_folder/互文/賽50：1.md
  summary: 出22:3「若他一無所有就要被賣頂他所偷的物」，以色列人因罪被賣為奴的概念在賽50:1中用於描述以色列因罪孽被離棄。
  relation: 出22:3被賣為奴的賠償原則在賽50:1中成為以色列屬靈狀態的比喻。
- title: 太5：23-24
  path: link_folder/互文/太5：23-24.md
  summary: 出22:29「不可遲延」獻上初熟果子，與太5:23-24獻祭前先與弟兄和好的教導同屬正確的奉獻態度。
  relation: 出22:29的奉獻律例與太5:23-24的奉獻精神共同強調奉獻須出於正確的內心態度。
- title: 太6：25-34
  path: link_folder/互文/太6：25-34.md
  summary: 出22:26-27窮人外袍須日落前歸還，因「他拿什麼睡覺呢」，神顧念窮人基本需要，與太6:25-34「不要憂慮衣食」同屬神看顧的基本供應。
  relation: 出22:26-27神顧念窮人禦寒衣物是太6:25-34神供應基本需要的舊約基礎。
- title: 太7：12
  path: link_folder/互文/太7：12.md
  summary: 出22:21-27保護弱者的律例體現「你們願意人怎樣待你們也要怎樣待人」的金律，以色列因在埃及作過寄居的而善待寄居者。
  relation: 出22:21-27的保護弱者律例是太7:12金律的舊約法律體現。
- title: 提前1：8-11
  path: link_folder/互文/提前1：8-11.md
  summary: 出22:18-20列出行邪術、與獸淫合、祭祀別神三項死罪，與提前1:8-11「律法是為不法之人設的」一致，律法約束悖逆行為。
  relation: 出22:18-20的死罪律例是提前1:8-11律法功用的舊約案例。
- title: 提前5：8
  path: link_folder/互文/提前5：8.md
  summary: 出22:22-24神嚴懲苦待寡婦孤兒者，「使你們的妻子為寡婦兒女為孤兒」，與提前5:8「不照顧自己家人比不信的人還不好」同屬家庭責任的教導。
  relation: 出22:22-24的保護寡婦孤兒律例是提前5:8家庭照顧責任的舊約基礎。
- title: 來10：5
  path: link_folder/互文/來10：5.md
  summary: 出22:29頭生歸神預表基督獻上身體為祭，來10:5引用詩40:6應驗於基督。
  relation: 出22:29頭生歸神的原則在來10:5中由基督以身體為祭完美應驗。
- title: 彼前5：2
  path: link_folder/互文/彼前5：2.md
  summary: 出22:7-13受託看管財物與牲畜須負全責的律例，與彼前5:2「務要牧養神的群羊」同屬忠心看管的責任。
  relation: 出22:7-13的受託看管責任是彼前5:2牧養群羊的舊約法律基礎。
- title: 約壹3：15
  path: link_folder/互文/約壹3：15.md
  summary: 出22:2-3區分夜間自衛殺賊無罪與白天殺賊有罪，體現殺人動機的判斷，與約壹3:15「凡恨弟兄的就是殺人的」同屬內心動機的審查。
  relation: 出22:2-3的殺人動機區分是約壹3:15內心審查原則的舊約法律案例。
- title: 敬畏神
  path: link_folder/神學/敬畏神.md
  summary: 出22:28-31列出不可毀謗神、不可毀謗官長、獻初熟果子、頭生歸神、不可吃撕裂的肉等條例，共同體現敬畏神的聖潔生活。
  relation: 出22:28-31的禮儀律例是敬畏神主題在出埃及記典章中的具體應用。
