book: 出埃及記
chapter: 9
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 本章中摩西為三場災（畜疫5、瘡6、雹7）的執行者：傳達神宣告、以爐灰向天撒落、行神蹟使瘡降、向天伸杖召雷雹，並首次「出城舉手禱告」使雷雹止住，以解明「全地都是屬耶和華的」（出9:1、8、13、22-23、29、33)。
  relation: 第9章展現摩西從「宣告者」（5、6 災之預告）→「執行者」（以爐灰撒向天、向天伸杖）→「代求者」（出城舉手）的三重角色遞進。第12、35 兩節「正如耶和華對/藉著摩西所說的」亦為其代言人角色的驗證。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 本章亞倫與摩西一同奉命取爐灰、站在法老面前（出9:8、10），但實際執行「向天揚灰」「撒向天」之動作由摩西單獨執行；二人皆免受瘡災（11）。
  relation: 亞倫於第6 瘡災作為「共睹證人」，但祭司性的實際施行權歸摩西（11 節：「行法術的在摩西面前站立不住」）。
- title: 法老
  path: link_folder/人物/法老.md
  summary: 法老於第9章出現第一次書面認罪：「耶和華是公義的；我和我的百姓是邪惡的」（27），並首次招摩西來代求。然而隨雷雹止住（34），立刻「越發犯罪，他和他的臣僕都硬著心」——第二次轉硬，見證非真悔。
  relation: 本章記法老的五個重要瞬間：①派人查驗以色列牲畜連一隻也無死（7）；②首次書面認罪（27）；③請摩西為之代求（28）；④收回承諾（34）；⑤硬心至第十災前不變（35）。其硬化在第12 節首次出現「耶和華使法老的心剛硬」之主動語態。
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: 本章三度展示以色列從三場災中分別出來：「凡屬以色列人的，一樣不死」（4）；「行法術的在摩西面前站立不住，因為在他們身上...和一切埃及人身上都有這瘡」對比以色列人無瘡（11）；「惟獨以色列人所住的歌珊地沒有冰雹」（26）。
  relation: 本章的「分別」累積——蝗災前以色列人三層從埃及人當中區分出來：牲畜（第五災）、身體（第六災）、地土（第七災）。
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 本章埃及地承受三場真實災害——畜疫使田間牲畜幾乎全死（6）；瘡災使人畜都生瘡、術士亦站立不住（10-11）；雹災「埃及成國以來，遍地沒有這樣的」（24），麻與大麥被擊打、小麥延後（25、31-32）。
  relation: 第16 節「叫你知道在普天下沒有像我的」之宣告，使埃及同時作為：「受罰地」、「彰顯神大能之舞臺」（16）、以及藉此讓神名「傳遍天下」（16）之工具；並第15 節「我若伸手用瘟疫攻擊你和你的百姓，你早就從地上除滅了」之保留（與第6 節對照）。
- title: 歌珊地
  path: link_folder/地點/歌珊地.md
  summary: 本章繼第8章蠅災後第二次明確「歌珊」免災：「惟獨以色列人所住的歌珊地沒有冰雹」（26）。
  relation: 歌珊地的「三次分別」累積——本章為第二次，連同第8 章22 節、第10 章23 節黑暗之災，歌珊地在十災中作為「神分別保護」之標誌地名。
- title: 希伯來人的神
  path: link_folder/神學/希伯來人的神.md
  summary: 本章第1 與第13 節兩次宣告「耶和華希伯來人的神」之身份，作為每一場災之開場宣告：第一災（5）、第七災（13）皆以此宣告起首。
  relation: 「希伯來人的神」與「普天下沒有像我的」（14）、「全地都是屬耶和華的」（29）為一組遞進式宣告：歸屬→主權→主權覆蓋全地。詳見本章主題發展。
- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: 本章中「耶和華對摩西說」四次出現於關鍵節段：第1 節（第五災開場）、第8 節（第六瘡災）、第13 節（第七雹災）、第22 節（施行雹災前最後宣告）。亦有「耶和華的話」（19、20 法老臣僕所懼怕）作分敬畏與不敬畏的試金石。
  relation: 第9 章「耶和華的話」與第19-20 節「懼怕耶和華的話」的臣僕作為決定其躲入與否——使「話」本身成為法則審判的邊界（出9:20-21）。
