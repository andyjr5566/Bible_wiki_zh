book: 出埃及記
chapter: 9
updates:
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: 本章中「耶和華」出現逾 20 次，為全章之核心主詞——祂吩咐摩西(1、8、13、22)、定時(4-5)、行這事(6)、分別以色列牲畜(4)、使法老心剛硬(12)、宣告「普天下沒有像我的」(14)、「叫你存立為顯大能使名傳天下」(16)、打雷下雹有火閃到地上(23)、保護歌珊地無災(26)、垂聽摩西出城舉手之禱告使雷雹止住(33)。
  relation: 第9章展示「耶和華」作為三場災（5、6、7）之唯一施行者、分別神與全地之主——本章為出埃及記「耶和華是誰」之回答的一個重要累積節點。
