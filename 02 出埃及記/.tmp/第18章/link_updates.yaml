book: 出埃及記
chapter: 18
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 第18章摩西的角色包括：(1) 迎接岳父葉忒羅，向他下拜親嘴問安（v7）；(2) 向葉忒羅述說耶和華為以色列所行的一切事（v8）；(3) 坐著審判百姓從早到晚（v13）；(4) 聽從岳父建議揀選有才能的人設立千夫長百夫長等（v24-25）；(5) 讓岳父返回本地（v27）。CT指出摩西向岳父下拜是後輩之禮。KC指出摩西接受葉忒羅的建議預表基督在千禧年國中將治理權柄分賜給忠心的信徒（路19:16-19）。
  relation: 第18章展現摩西作為領袖的人性面——有家庭感情（迎接妻兒）、有工作困境（獨自審判從早到晚）、有謙卑受教（聽從岳父建議）。KC指出摩西預表基督，西坡拉預表經過曠野的教會——教會在大災難時不在地上，正如西坡拉在出埃及旅程中不在摩西身邊。
- title: 葉忒羅
  path: link_folder/人物/葉忒羅.md
  summary: 第18章是葉忒羅的核心章節。v1他聽見神為摩西和以色列所行的一切事便帶摩西妻兒來訪。v5他到神的山與摩西會面。v7摩西迎接他向他下拜。v8-9摩西述說神的作為後葉忒羅甚歡喜。v10-11葉忒羅稱頌耶和華說「耶和華比萬神都大」。v12他獻燔祭和平安祭與亞倫和眾長老在神面前吃飯。v13-23他觀察摩西獨自審判百姓便建議分層負責。v24摩西聽從他的建議。v27他返回本地。CT指出葉忒羅是米甸祭司中事奉獨一真神的人。KC指出葉忒羅預表外邦人在千禧年國中與以色列同享喜樂。
  relation: 第18章是葉忒羅在出埃及記中的核心出場——他帶來摩西的家人、稱頌耶和華、獻祭與以色列長老同席、並建議分層治理制度。CT指出葉忒羅的三個名字：流珥（本名）、葉忒羅（祭司職稱）、何巴（可能指內兄）。
- title: 西坡拉
  path: link_folder/人物/西坡拉.md
  summary: 第18章v2記載葉忒羅帶著摩西的妻子西坡拉來到摩西那裡——就是摩西從前打發回去的。CT指出摩西大概在見到亞倫後，因埃及之行危險而打發妻兒回米甸。KC指出西坡拉預表經過曠野的教會——教會在大災難時不在地上，正如西坡拉在出埃及旅程中不在摩西身邊，但在得救後重新出現與摩西團聚。
  relation: 西坡拉在第18章重新出場——從出4:24-26割禮事件後被打發回米甸，到第18章由葉忒羅帶回與摩西團聚。KC指出這預表教會在大災難後與基督重新聯合。
- title: 以利以謝
  path: link_folder/人物/以利以謝.md
  summary: 第18章v4記載以利以謝的名字意義——「我父親的神幫助了我，救我脫離法老的刀」。CT指出以利以謝的原文字義是「神是幫助」或「我的神是我的幫助」。GT指出以利以謝在五經中僅此一次出現，他的名字與革舜所代表的絕望相比，顯示摩西信心重燃。KC指出以利以謝名字意為「神是我的幫助」——提醒在困難中神是幫助。
  relation: 以利以謝在第18章的名字解釋見證摩西的信仰告白——從革舜的「寄居」到以利以謝的「神是幫助」，顯示摩西從孤獨到信心的轉變。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 第18章v12記載亞倫和以色列的眾長老都來了，與摩西的岳父在神面前吃飯。CT指出亞倫參與葉忒羅的獻祭團契——代表以色列領袖接納葉忒羅。GT指出亞倫在猶太傳統中是說服摩西打發妻兒回米甸的人——因埃及之行危險。
  relation: 亞倫在第18章的角色是與葉忒羅同席吃飯——代表以色列領袖層與外邦祭司的團契。KC指出這預表千禧年國中以色列與外邦人同享喜樂。
- title: 以色列的眾長老
  path: link_folder/人物/以色列的眾長老.md
  summary: 第18章v12記載亞倫和以色列的眾長老都來了，與摩西的岳父在神面前吃飯。CT指出眾長老參與葉忒羅的獻祭團契——代表以色列全會眾的領袖層接納葉忒羅。v21葉忒羅建議摩西從百姓中揀選有才能的人——這些人可能從長老中選出。v25摩西從以色列人中揀選有才能的人立為首領。
  relation: 以色列的眾長老在第18章參與與葉忒羅的獻祭團契（v12），並成為分層治理制度的基礎——葉忒羅建議從百姓中揀選有才能的人（v21），摩西照辦（v25）。
- title: 神的山
  path: link_folder/地點/神的山.md
  summary: 第18章v5記載葉忒羅帶著摩西的妻子和兩個兒子來到神的山，就是摩西在曠野安營的地方。CT指出神的山指西乃山，又稱何烈山。GT指出神的山被用作西乃山的稱號，以色列人此時可能已如19:2所言遷移到西乃山腳下。BH指出葉忒羅知道這山是以色列朝聖的目的地。
  relation: 神的山在第18章是葉忒羅與摩西會面的地點——以色列人已到達西乃山腳下安營，葉忒羅在此與摩西團聚並提供建議。
- title: 何烈山
  path: link_folder/地點/何烈山.md
  summary: 第18章v5提及「神的山」即何烈山（西乃山）。CT指出神的山指西乃山，神在山頂上召見摩西（19:20），又稱何烈山（3:1）。GT指出何烈山脈一直延伸到利非訂，以色列人就在山腳下安營。
  relation: 何烈山在第18章作為葉忒羅來訪的地理背景——以色列人已到達何烈山腳下安營，預備領受西乃之約。
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: 第18章v1記載「神為摩西和神的百姓以色列所行的一切事，就是耶和華將以色列從埃及領出來的事」。v10葉忒羅說「將這百姓從埃及人的手下救出來」——「這百姓」即以色列人。CT指出葉忒羅對以色列人的親切感遠勝於對埃及人，除了因和摩西結親之外，也因他的家族極可能是亞伯拉罕的庶出後裔（創二十五2）。v25摩西從以色列人中揀選有才能的人立為首領——以色列民正式組織起來。
  relation: 以色列在第18章是神拯救的對象——葉忒羅聽見神為以色列所行的事而來訪，摩西向葉忒羅見證神如何拯救以色列，葉忒羅稱頌神拯救以色列脫離埃及人的手。
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: 第18章多處提及耶和華的名：v1「耶和華將以色列從埃及領出來」；v8摩西將「耶和華為以色列的緣故向法老和埃及人所行的一切事」述說與葉忒羅；v9葉忒羅因「耶和華待以色列的一切好處」甚歡喜；v10葉忒羅說「耶和華是應當稱頌的」；v11「耶和華比萬神都大」。CT指出葉忒羅屢次口稱神的名耶和華，並且心裡相信神的作為，可以看出他是一個得救的人（羅十9-10）。
  relation: 耶和華在第18章是葉忒羅稱頌和敬拜的對象——摩西的見證使葉忒羅承認「耶和華比萬神都大」並獻祭敬拜。
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 第18章v1記載「耶和華將以色列從埃及領出來的事」；v4以利以謝的名字意為「救我脫離法老的刀」——指摩西四十歲時從埃及逃往米甸（二15）；v8摩西述說「耶和華為以色列的緣故向法老和埃及人所行的一切事」；v10葉忒羅稱頌神「救了你們脫離埃及人和法老的手」；v11「我現今在埃及人向這百姓發狂傲的事上得知，耶和華比萬神都大」。CT指出「發狂傲的事」指埃及人因藐視並抗拒耶和華神而惡待以色列人的事。
  relation: 埃及在第18章是神拯救以色列脫離的對象——摩西向葉忒羅見證神如何將以色列從埃及領出來，葉忒羅因此稱頌耶和華。
- title: 法老
  path: link_folder/人物/法老.md
  summary: 第18章v4以利以謝的名字意為「救我脫離法老的刀」——CT指出這指摩西四十歲時從埃及逃往米甸的事（二15）。v8摩西述說「耶和華為以色列的緣故向法老和埃及人所行的一切事」。v10葉忒羅稱頌神「救了你們脫離埃及人和法老的手」。CT指出「所行的一切事」指神在埃及地所行十災的神蹟，迫使法老無條件容讓以色列人離開埃及。
  relation: 法老在第18章是神審判的對象——摩西向葉忒羅見證神如何向法老和埃及人行一切事，使法老容讓以色列人離開。
