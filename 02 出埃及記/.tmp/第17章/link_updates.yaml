book: 出埃及記
chapter: 17
updates:
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: "v1 全會眾遵耶和華的吩咐按著站口從汛的曠野往前行；v5-6 摩西在以色列的長老眼前擊打磐石；v7「因以色列人爭鬧」；v8 亞瑪力人來和以色列人爭戰；v11 摩西何時舉手以色列人就得勝"
  relation: "本章是以色列人出埃及後第一次自己爭戰：KC 指在埃及他們是奴隸、沒有爭戰，在紅海是神爭戰，到了曠野卻有一場必須由百姓自己去打的仗——而勝負仍不在山下，在山頂舉手的那雙手上"
- title: 耶和華
  path: link_folder/神學/耶和華.md
  summary: "v2「為什麼試探耶和華呢」；v6「我必在何烈的磐石那裡，站在你面前」；v7「耶和華是在我們中間不是？」；v15 摩西築壇起名叫耶和華尼西；v16「耶和華已經起了誓，必世世代代和亞瑪力人爭戰」"
  relation: "本章的耶和華被百姓「試驗」——KC 指特別之處不是神試驗百姓，而是以色列在試驗神，向祂索求同在的憑據；而祂的回答是站在磐石那裡讓摩西擊打，並在得勝後被立為旌旗（尼西）"
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: "v3「你為什麼將我們從埃及領出來，使我們和我們的兒女並牲畜都渴死呢？」——第三次怨言仍以埃及為對照"
  relation: "與14:11、16:3 同一句型：每逢困境便回頭望埃及；CT 指這話「表明他們只在意眼前的難處，卻把他們從前的困境忘得一乾二淨」；而摩西手中正拿著「先前擊打河水的杖」——同一根杖在埃及使水變血，在何烈使磐石出水"
