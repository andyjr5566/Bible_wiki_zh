book: 出埃及記
chapter: 17
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 第17章摩西的角色包括：(1) 面對百姓因缺水爭鬧時呼求耶和華（v4）；(2) 照神吩咐拿杖帶長老擊打何烈磐石出水（v5-6）；(3) 命名瑪撒和米利巴（v7）；(4) 命約書亞選人與亞瑪力人爭戰，自己與亞倫戶珥上山頂舉手（v9-11）；(5) 手發沉時坐在石頭上由亞倫戶珥扶手直到日落（v12）；(6) 築壇命名耶和華尼西（v15）。CT指出摩西在難中常呼求耶和華（v4），KC指出摩西在山上舉手預表基督在天上代求。
  relation: 第17章展現摩西作為中保的多重角色——在百姓與神之間調停（磐石出水）、在屬靈爭戰中代求（舉手得勝）、在得勝後敬拜（築壇耶和華尼西）。KC指出摩西、亞倫、戶珥三人在山上代表基督：摩西代表救贖者，亞倫代表大祭司（來4:15），戶珥代表純潔（whiteness）。
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: 第17章亞倫與摩西、戶珥一同上山頂（v10），在摩西手發沉時扶著摩西的手——一個在這邊一個在那邊，使摩西的手穩住直到日落（v12）。KC指出亞倫代表大祭司，能「體恤我們的軟弱」（來4:15）；亞倫與戶珥扶手預表代求與配搭。
  relation: 亞倫在第17章的角色是扶持者——當摩西的手發沉時，亞倫與戶珥各在一邊扶住，使以色列人得勝。KC指出這代表基督作大祭司的代求，以及信徒在屬靈爭戰中的配搭。
- title: 汛的曠野
  path: link_folder/地點/汛的曠野.md
  summary: 第17章v1記載以色列全會眾從汛的曠野往前行，按著站口到利非訂安營。CT指出「按著站口」指以色列人在西乃曠野移動時安營的地方，前後四十年間一共停留過四十二個站口（民33:15-49）。GT指出利非訂位於從汛的曠野到西乃山的中途。
  relation: 汛的曠野在第17章是起點——以色列人從此往前行到利非訂，在那裡因缺水爭鬧並與亞瑪力人爭戰。
- title: 神的試驗
  path: link_folder/神學/神的試驗.md
  summary: 第17章v2摩西指出百姓與他爭鬧就是「試探耶和華」，v7命名那地為瑪撒（試探）。CT指出百姓的爭鬧動機是試探神——「耶和華是在我們中間不是？」KC指出特別之處不是神試驗百姓，而是百姓試驗神——他們挑戰神，要求祂證明自己的同在。
  relation: 第17章將試驗主題翻轉——不是神試驗百姓（如出16的嗎哪試驗），而是百姓試探神（v2「為什麼試探耶和華呢？」）。百姓質疑神的同在（v7「耶和華是在我們中間不是？」），顯露不信的惡心。來3:8-9以此為鑑戒：「不可硬著心，像在曠野試探的日子」。
- title: 以色列人的怨言
  path: link_folder/歷史/以色列人的怨言.md
  summary: 第17章v2-3記載百姓在利非訂因缺水與摩西爭鬧——「給我們水喝吧！」並發怨言說「你為什麼將我們從埃及領出來，使我們和我們的兒女並牲畜都渴死呢？」CT指出百姓的錯有四層：口出無理妄言、不是請求乃是強要、全無謝恩之意、沒有靠主之心。GT指出百姓幾乎要拿石頭打死摩西（v4），顯示爭鬧的嚴重性。
  relation: 第17章是出埃及後第三次怨言——第一次在紅海邊因追兵（出14:11-12），第二次在汛的曠野因缺糧（出16:2-3），第三次在利非訂因缺水。怨言的嚴重程度升級——從發怨言到爭鬧，再到幾乎拿石頭打死摩西。
